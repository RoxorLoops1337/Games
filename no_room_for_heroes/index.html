<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<title>No Room For Heroes — Build the Dungeon</title>
<style>
  :root{
    --ink:#e9e0ff; --gold:#ffd34d; --hp:#ff4d6d; --mana:#4dc3ff; --xp:#7bdc6b;
    --panel:#1b1530; --panel2:#241a40; --line:#6b4fb0; --accent:#b985ff;
    --pix:'Press Start 2P','Courier New',monospace;   /* 16-bit pixel button/title font */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#0c0916;color:var(--ink);
    font-family:'Trebuchet MS',system-ui,sans-serif;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  /* The game lives in a 16:9 letterboxed frame, centered — like a console
     game. Uses the DYNAMIC viewport so the bottom panel is never hidden
     behind the mobile browser toolbar; vh fallback for older browsers.
     Capped at 1280×720 so the DOM UI doesn't get comically small on
     huge monitors (the canvas itself scales crisply at any size). */
  body{display:flex;align-items:center;justify-content:center;}
  #app{position:relative;display:flex;flex-direction:column;margin:auto;
    width:min(100vw, 177.78vh, 1280px);  height:min(100vh, 56.25vw, 720px);
    width:min(100vw, 177.78dvh, 1280px); height:min(100dvh, 56.25vw, 720px);}
  /* portrait PHONES get a rotate gate (iPad portrait stays allowed) */
  #rotate{display:none;position:fixed;inset:0;z-index:999;background:#0c0916;
    flex-direction:column;align-items:center;justify-content:center;gap:12px;
    text-align:center;font-size:19px;color:var(--ink);}
  #rotate .ph{font-size:56px;animation:rotph 1.8s ease-in-out infinite;}
  @keyframes rotph{0%,18%{transform:rotate(0)}55%,100%{transform:rotate(90deg)}}
  @media (orientation:portrait) and (max-width:560px){ #rotate{display:flex;} }
  /* Top status bar */
  #topbar{display:flex;align-items:center;gap:8px;background:#140f24;
    padding:calc(6px + env(safe-area-inset-top,0px)) 10px 6px;
    border-bottom:2px solid var(--line);font-size:13px;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:5px;background:#221a3c;border:1px solid #3a2c66;
    padding:3px 8px;border-radius:6px;white-space:nowrap;}
  .stat b{font-size:14px;}
  .bar{position:relative;width:140px;height:14px;background:#0a0716;border:1px solid #3a2c66;
    border-radius:7px;overflow:hidden;}
  .bar > i{position:absolute;left:0;top:0;bottom:0;border-radius:7px;transition:width .2s;}
  .bar > span{position:absolute;inset:0;text-align:center;font-size:10px;line-height:14px;
    text-shadow:0 1px 1px #000;font-weight:bold;}
  .gold{color:var(--gold);} .small{font-size:11px;opacity:.85;}
  /* boss HP+mana readout beside the run abilities */
  .bossmini{display:flex;align-items:center;gap:5px;padding:3px 7px;border-radius:9px;
    background:#140f24;border:1px solid var(--line);}
  .bossmini > span{font-size:20px;}
  .bmbars{display:flex;flex-direction:column;gap:2px;}
  .bmbars .bar{width:88px;height:11px;}
  .bmbars .bar > span{line-height:11px;font-size:9px;}
  /* Canvas */
  #stage{flex:1;position:relative;min-height:0;overflow:hidden;background:#0c0916;
    display:flex;line-height:0;}
  canvas{display:block;image-rendering:pixelated;
    image-rendering:crisp-edges;touch-action:none;}
  #hint{position:absolute;left:50%;top:8px;transform:translateX(-50%);
    background:rgba(10,7,22,.85);border:1px solid var(--line);padding:4px 12px;border-radius:8px;
    font-size:12px;pointer-events:none;opacity:0;transition:opacity .25s;max-width:90%;text-align:center;}
  #hint.show{opacity:1;}
  /* Floaty combat text */
  /* Bottom control panels */
  #panel{background:#140f24;border-top:2px solid var(--line);
    padding:7px 8px calc(7px + env(safe-area-inset-bottom,0px));
    min-height:74px;flex:0 0 auto;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  /* 16-bit pixel buttons: blocky border, hard drop-shadow bevel, pixel font.
     The hard 0-blur shadow reads as a raised pixel edge; :active presses it in. */
  button{font-family:var(--pix);cursor:pointer;color:var(--ink);background:var(--panel2);
    border:2px solid var(--line);border-radius:3px;padding:11px 14px;font-size:10px;font-weight:normal;
    line-height:1.6;letter-spacing:.5px;text-transform:uppercase;
    box-shadow:0 3px 0 #100b22, inset 0 0 0 1px rgba(255,255,255,.05);
    min-height:42px;touch-action:manipulation;transition:transform .05s,background .15s,box-shadow .05s;}
  button:hover:not(:disabled){background:#34265e;}
  button:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #100b22, inset 0 0 0 1px rgba(255,255,255,.05);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.go{background:#2c8a4a;border-color:#52d97e;box-shadow:0 3px 0 #14401f, inset 0 0 0 1px rgba(255,255,255,.08);}
  button.go:hover:not(:disabled){background:#36a558;}
  button.go:active:not(:disabled){box-shadow:0 1px 0 #14401f, inset 0 0 0 1px rgba(255,255,255,.08);}
  button.buy{background:#5a4a18;border-color:var(--gold);box-shadow:0 3px 0 #2e2408, inset 0 0 0 1px rgba(255,255,255,.07);}
  /* keep the descriptive sub-lines inside menu buttons in the readable font */
  button .small{font-family:'Trebuchet MS',system-ui,sans-serif;text-transform:none;letter-spacing:0;}
  /* hand scrolls horizontally so it never shoves the action buttons away */
  .cards{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;}
  .cards .card{flex:0 0 auto;}
  .card{position:relative;width:78px;min-height:62px;border-radius:8px;border:2px solid var(--line);
    background:linear-gradient(160deg,#2a2046,#1a1330);padding:5px 4px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;cursor:grab;touch-action:none;
    transition:transform .08s,border-color .15s;}
  .card:hover{transform:translateY(-3px);}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
  .cardghost{position:fixed;left:0;top:0;transform:translate(-50%,-65%);z-index:60;pointer-events:none;
    opacity:.92;cursor:grabbing;box-shadow:0 8px 22px rgba(0,0,0,.6);border-color:var(--gold);}
  .card .ic{font-size:24px;line-height:1;}  .card .nm{font-size:10px;margin-top:3px;font-weight:bold;}
  .card .lv{position:absolute;top:2px;right:4px;font-size:9px;color:var(--gold);}
  .card .x{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;
    background:#a02040;border:1px solid #ff6b8a;font-size:11px;line-height:16px;text-align:center;color:#fff;}
  .abil{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:74px;padding:6px 8px;}
  .abil > span{pointer-events:none;}   /* taps always land on the button, never a child being re-rendered */
  .abil .c{font-size:10px;color:var(--mana);}
  .abil.overdrive{border-color:#ff7a2e;}
  .abil.overdrive.rdy{border-color:#ffd34d;color:#fff;
    background:linear-gradient(#7a3a14,#3a1c08);box-shadow:0 0 14px #ff9a3a;animation:odpulse 1s ease-in-out infinite;}
  .abil.overdrive.rdy .c{color:#ffe9a8;}
  @keyframes odpulse{0%,100%{box-shadow:0 0 10px #ff9a3a;}50%{box-shadow:0 0 22px #ffd34d,0 0 8px #ff5470;}}
  .abil:disabled .c{color:#888;}
  .pill{font-size:11px;padding:2px 8px;border-radius:10px;background:#2a2046;border:1px solid #3a2c66;}
  /* Overlay screens */
  #overlay{position:absolute;inset:0;background:rgba(8,6,16,.93);z-index:50;display:none;
    flex-direction:column;align-items:center;justify-content:safe center;text-align:center;overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:calc(18px + env(safe-area-inset-top,0px)) 18px calc(18px + env(safe-area-inset-bottom,0px));}
  #overlay.show{display:flex;}
  /* aftermath reward reveal */
  .amstage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:260px;}
  .amtitle{font-size:15px;color:#cdbcff;letter-spacing:.5px;opacity:.9;}
  .ambook,.amchest{font-size:74px;line-height:1;filter:drop-shadow(0 5px 12px rgba(0,0,0,.55));}
  .amcount{font-size:30px;font-weight:bold;color:#ffd34d;text-shadow:0 2px 6px #000;min-height:34px;}
  .flyicon{position:absolute;font-size:24px;z-index:62;pointer-events:none;text-shadow:0 1px 3px #000;
    transition:transform .5s cubic-bezier(.5,-.3,.3,1.25),opacity .5s;}
  @keyframes ampop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
  .ampop{animation:ampop .26s ease-out;}
  .amunlabel{font-size:18px;font-weight:bold;color:#6ad97e;letter-spacing:3px;text-shadow:0 0 10px #6ad97e88;}
  .amcard{padding:16px 22px;border-radius:16px;border:2px solid var(--gold);max-width:300px;
    background:linear-gradient(160deg,#2a2046,#1a1330);box-shadow:0 0 28px #ffd34d88;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    animation:amreveal .55s cubic-bezier(.2,.85,.3,1.3);}
  .amcic{font-size:46px;line-height:1;}
  .amcname{font-size:21px;font-weight:bold;color:#ffe9a8;}
  .amkind{font-size:10px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#1a1330;
    background:var(--gold);border-radius:8px;padding:2px 8px;}
  .amdesc{font-size:13px;line-height:1.35;opacity:.92;margin-top:3px;}
  @keyframes amreveal{0%{transform:scale(.1) rotate(-200deg);opacity:0}70%{transform:scale(1.12) rotate(7deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  #overlay h1{font-size:34px;margin:0 0 4px;color:var(--gold);letter-spacing:1px;
    text-shadow:0 2px 0 #4a2e7a,0 0 18px rgba(185,133,255,.5);}
  #overlay h2{font-size:20px;margin:6px 0;color:var(--accent);}
  #overlay p{max-width:620px;line-height:1.5;font-size:14px;opacity:.92;margin:6px 0;}
  .choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .choice{width:160px;background:linear-gradient(160deg,#241a40,#15102a);border:2px solid var(--line);
    border-radius:12px;padding:12px;cursor:pointer;transition:transform .1s,border-color .15s;}
  .choice:hover{transform:translateY(-4px);border-color:var(--gold);}
  .choice .big{font-size:40px;}
  /* painted card-art icons (icons/<type>.png) replacing the emoji on card faces */
  .card .ic .cardimg{width:50px;height:50px;object-fit:contain;display:block;margin:0 auto -2px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));}
  .choice .big .cardimg{width:78px;height:78px;object-fit:contain;display:block;margin:0 auto;filter:drop-shadow(0 3px 6px rgba(0,0,0,.55));}
  .amcic .cardimg{width:62px;height:62px;object-fit:contain;display:block;margin:0 auto;}
  .cardghost .ic .cardimg{width:54px;height:54px;object-fit:contain;display:block;margin:0 auto;}
  .choice h3{margin:6px 0 4px;font-size:16px;color:var(--gold);}
  .choice .desc{font-size:12px;opacity:.85;line-height:1.35;}
  .choice .stats{font-size:11px;margin-top:6px;opacity:.8;}
  .menu-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .menu-btns button{font-size:11px;padding:13px 20px;}
  /* ===== Cinematic title screen ===== */
  #overlay.titlemode{padding:0;background:#0c0916;}        /* let the art go full-bleed */
  .titlescreen{position:absolute;inset:0;overflow:hidden;}
  .titlescreen .tbg{position:absolute;inset:0;background:#0c0916 center/cover no-repeat;
    background-image:url('title/bg.png');}
  .titlescreen .tbg.missing{background:
    radial-gradient(120% 90% at 78% 22%,#3a2470 0%,#1a1030 55%,#0c0916 100%);}   /* fallback if art absent */
  .titlelogo{position:absolute;left:50%;top:3%;width:min(440px,58%);height:auto;z-index:2;
    image-rendering:pixelated;filter:drop-shadow(0 8px 16px rgba(0,0,0,.6));
    transform-origin:50% 50%;animation:logoTwirl 2s cubic-bezier(.25,.46,.45,.94) both;}
  .titlelogo-fallback{position:absolute;left:50%;top:5%;z-index:2;width:84%;text-align:center;
    font-family:var(--pix);font-size:26px;line-height:1.4;color:var(--gold);
    text-shadow:0 3px 0 #4a2e7a,0 0 18px rgba(185,133,255,.5);
    transform-origin:50% 50%;animation:logoTwirl 2s cubic-bezier(.25,.46,.45,.94) both;}
  .titlestart{position:absolute;left:50%;bottom:9%;transform:translateX(-50%);z-index:3;
    animation:titleStartIn .45s ease-out 1.9s both;}
  .titlestart button{font-size:15px;padding:16px 34px;min-height:54px;letter-spacing:1px;
    background:#b0202a;border-color:#ff6a72;color:#fff;
    box-shadow:0 4px 0 #5a0d12, inset 0 0 0 1px rgba(255,255,255,.12);animation:titlePulse 1.6s ease-in-out infinite;}
  .titlestart button:hover:not(:disabled){background:#c8262f;}
  .titlestart button:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 #5a0d12, inset 0 0 0 1px rgba(255,255,255,.12);}
  /* SNES-style: zoom in slowly from a tiny point while spinning 4½×, settle */
  @keyframes logoTwirl{
    0%   {transform:translate(-50%,0) scale(.02) rotate(-1620deg);opacity:0;}
    10%  {opacity:1;}
    82%  {transform:translate(-50%,0) scale(1.05) rotate(16deg);}   /* zoomed in, last of the spin, slight overshoot */
    92%  {transform:translate(-50%,0) scale(.985) rotate(-4deg);}
    100% {transform:translate(-50%,0) scale(1) rotate(0);}
  }
  @keyframes titleStartIn{0%{opacity:0;transform:translate(-50%,24px);}100%{opacity:1;transform:translate(-50%,0);}}
  @keyframes titlePulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.22);}}
  @media (max-width:560px){ .titlelogo{top:5%;width:74%;} .titlestart button{font-size:12px;padding:13px 24px;} }
  .ko{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px;font-size:13px;opacity:.85;}
  .tag{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;background:#2a2046;margin:2px;}
  @media (max-width:560px){
    #topbar{font-size:11px;gap:5px;padding:5px 7px;}
    .stat{padding:2px 6px;gap:3px;}
    .bar{width:80px;height:13px;}
    #overlay h1{font-size:26px;} .choice{width:140px;}
    .card{width:66px;min-height:58px;}
    .abil{min-width:62px;padding:5px 6px;}
    button{padding:8px 10px;}
  }
  @media (max-width:380px){ .bar{width:64px;} #topbar{font-size:10px;} }
  /* SHORT screens (landscape phones ~360-480px tall): compact everything so
     the dungeon gets the height, not the chrome. Buttons especially — the
     desktop pixel buttons read comically big at this size. */
  @media (max-height:540px){
    button{padding:6px 10px;font-size:9px;min-height:30px;box-shadow:0 2px 0 #100b22, inset 0 0 0 1px rgba(255,255,255,.05);}
    button.go{box-shadow:0 2px 0 #14401f, inset 0 0 0 1px rgba(255,255,255,.08);}
    button.buy{box-shadow:0 2px 0 #2e2408, inset 0 0 0 1px rgba(255,255,255,.07);}
    .menu-btns{gap:8px;margin-top:8px;}
    .menu-btns button{font-size:9px;padding:9px 14px;}
    #topbar{font-size:11px;gap:4px;padding:3px 7px 3px;}
    .stat{padding:1px 6px;gap:3px;} .stat b{font-size:12px;}
    .bar{width:90px;height:12px;}
    #panel{min-height:52px;padding:4px 6px calc(4px + env(safe-area-inset-bottom,0px));}
    .row{gap:5px;}
    .card{width:58px;min-height:48px;} .card .ic .cardimg{width:36px;height:36px;}
    .abil{min-width:54px;padding:3px 5px;}
    #overlay h1{font-size:20px;} #overlay h2{font-size:13px;margin:3px 0;}
    #overlay p{font-size:12px;margin:4px 0;}
    .choices{gap:8px;margin-top:6px;}
    .choice{width:124px;padding:8px;} .choice .big{font-size:26px;} .choice h3{font-size:13px;}
    .choice .big .cardimg{width:52px;height:52px;}
    #inspect{font-size:11px;line-height:1.4;padding:6px 22px 6px 8px;}
    #inspect button{min-height:26px;padding:4px 8px;font-size:8px;}
    .pauserow button{font-size:8px;min-height:26px;}
    .rbzoom button{width:28px;height:28px;font-size:15px;}
    #pausebtn,#audiobtn{width:28px;height:28px;font-size:13px;}
    .titlestart button{font-size:11px;padding:10px 20px;min-height:40px;}
    .titlelogo{width:min(300px,46%);}
  }
  /* inspection tooltip */
  #inspect{position:absolute;left:8px;bottom:8px;max-width:min(340px,calc(100% - 16px));
    max-height:calc(100% - 16px);overflow-y:auto;overscroll-behavior:contain;
    background:rgba(12,9,22,.94);border:1.5px solid var(--accent);border-radius:10px;
    padding:8px 26px 8px 10px;font-size:12px;line-height:1.5;z-index:20;
    opacity:0;transform:translateY(6px);transition:opacity .12s,transform .12s;pointer-events:none;}
  #inspect.show{opacity:1;transform:translateY(0);pointer-events:auto;}
  #inspect b{color:var(--gold);}
  #inspect .ix{position:sticky;float:right;top:-2px;margin-left:6px;cursor:pointer;color:#ff8a9a;font-size:13px;z-index:1;}
  #inspect button{margin-top:6px;padding:6px 10px;min-height:34px;font-size:9px;}
  #inspect .small{opacity:.7;font-size:11px;}
  /* keep the action buttons (Upgrade/Demolish) pinned & reachable even when the
     bubble's text is long enough to scroll */
  #inspect .ibtns{position:sticky;bottom:0;display:flex;gap:6px;flex-wrap:wrap;
    background:rgba(12,9,22,.97);padding:6px 0 2px;margin-top:6px;}
  #inspect .ibtns button{margin-top:0;}
  #audiobtn{position:absolute;top:6px;right:6px;z-index:21;width:34px;height:34px;padding:0;
    font-size:16px;border-radius:8px;background:rgba(20,15,36,.8);border:1px solid var(--line);}
  #pausebtn{position:absolute;top:6px;right:46px;z-index:21;width:34px;height:34px;padding:0;
    font-size:18px;border-radius:8px;background:rgba(20,15,36,.8);border:1px solid var(--line);}
  .pauserow{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .pauserow label{font-weight:bold;font-size:14px;}
  .pauserow input[type=range]{flex:1;max-width:210px;accent-color:var(--accent);height:24px;}
  .pauserow button{font-size:9px;padding:6px 10px;min-height:34px;}
  #relicbar{position:absolute;top:5px;left:5px;z-index:21;display:flex;gap:3px;flex-wrap:wrap;
    max-width:calc(100% - 128px);}
  .relicchip{width:32px;height:32px;border-radius:7px;border:2px solid;
    background:radial-gradient(circle at 50% 38%, rgba(60,52,86,.95), rgba(20,15,34,.95));
    display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer;
    font-size:19px;
    font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla","EmojiOne Color","Android Emoji",sans-serif;
    text-shadow:0 1px 2px rgba(0,0,0,.6);overflow:hidden;}
  .relicchip .ric{display:block;transform:translateY(.5px);}
  /* ---- Rune Page: spellbook skill tree ---- */
  .runebook{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .rbback{position:absolute;top:10px;left:10px;z-index:6;font-weight:bold;letter-spacing:1px;
    padding:8px 16px;border-radius:9px;background:linear-gradient(#5a4326,#3a2a16);
    border:2px solid #caa15e;color:#ffe9b8;box-shadow:0 3px 0 #2a1d0e;}
  .rbpts{position:absolute;top:12px;right:16px;z-index:6;font-size:26px;font-weight:bold;
    color:#ffe9a8;text-shadow:0 2px 4px #000,0 0 10px #c9881f;display:flex;align-items:center;gap:4px;}
  .rbpts .rbscroll-ic{font-size:22px}
  .rbview{position:absolute;inset:0;overflow:hidden;touch-action:none;cursor:grab;}
  .rbview:active{cursor:grabbing;}
  .rtree{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;border-radius:16px;
    background:radial-gradient(ellipse at 50% 28%,#f0e3c2 0%,#e0c99e 62%,#cdb487 100%);
    border:7px solid #6a4a2a;
    box-shadow:inset 0 0 46px rgba(110,74,30,.45),inset 0 0 0 3px #b58a52,0 10px 34px rgba(0,0,0,.55);}
  .rnode{position:absolute;border-radius:12px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;cursor:pointer;border:2.5px solid;box-sizing:border-box;
    transition:transform .08s;}
  .rnode:active{transform:scale(.92);}
  .rnode .ric{font-size:27px;line-height:1;}
  .rnode .rcnt{position:absolute;bottom:-10px;font-size:11px;font-weight:bold;line-height:1;
    background:#171024;border:1.5px solid;border-radius:7px;padding:1px 5px;white-space:nowrap;}
  .rn-max{background:linear-gradient(#2e6a3c,#1c3f25);border-color:#6ad97e;box-shadow:0 0 12px #6ad97e88,inset 0 0 8px #0006;}
  .rn-max .rcnt{color:#abf3b4;border-color:#6ad97e;}
  .rn-buy{background:linear-gradient(#4a3a14,#2c2410);border-color:#ffd34d;box-shadow:0 0 13px #ffd34daa,inset 0 0 8px #0006;animation:runepulse 1.3s ease-in-out infinite;}
  .rn-buy .rcnt{color:#ffe9a8;border-color:#ffd34d;}
  .rn-cost{background:linear-gradient(#3a241a,#241812);border-color:#b0563a;box-shadow:inset 0 0 8px #0007;}
  .rn-cost .rcnt{color:#e0a98c;border-color:#b0563a;}
  .rn-lock{background:linear-gradient(#211b30,#15111f);border-color:#3a3450;opacity:.78;}
  .rn-lock .ric{filter:grayscale(1);opacity:.55;}
  .rn-lock .rcnt{color:#8a7aa8;border-color:#3a3450;}
  @keyframes runepulse{0%,100%{box-shadow:0 0 9px #ffd34d88,inset 0 0 8px #0006;}50%{box-shadow:0 0 18px #ffd34d,inset 0 0 8px #0006;}}
  .rnode.rn-sel{outline:3px solid #fff;outline-offset:1px;transform:scale(1.08);z-index:3;}
  .rbranchhdr{position:absolute;transform:translateX(-50%);white-space:nowrap;font-size:12px;
    font-weight:bold;letter-spacing:.3px;padding:2px 8px;border-radius:8px;border:1.5px solid;
    background:rgba(245,235,205,.92);box-shadow:0 1px 3px rgba(80,50,10,.35);}
  .rbzoom{position:absolute;right:10px;bottom:84px;z-index:7;display:flex;flex-direction:column;gap:6px;}
  .rbzoom button{width:40px;height:40px;padding:0;font-size:22px;font-weight:bold;border-radius:10px;
    background:linear-gradient(#3a2a16,#241808);border:2px solid #caa15e;color:#ffe9b8;box-shadow:0 3px 0 #1c130a;}
  .rbzoom button:active{transform:translateY(2px);box-shadow:0 1px 0 #1c130a;}
  /* buy popup anchored next to the selected rune (inside the transformed tree) */
  .rbpop{position:absolute;transform:translateX(-50%);width:220px;z-index:6;
    padding:8px 10px;border-radius:11px;background:rgba(16,11,30,.97);border:2px solid var(--accent);
    box-shadow:0 6px 20px rgba(0,0,0,.7);color:#f0e6d0;}

  .rbpop::after{content:"";position:absolute;left:50%;margin-left:-8px;border:8px solid transparent;}
  .rbpop.below::after{top:-16px;border-bottom-color:var(--accent);}
  .rbpop.above::after{bottom:-16px;border-top-color:var(--accent);}
  .rbhint{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(8px + env(safe-area-inset-bottom,0px));
    z-index:7;font-size:12px;opacity:.8;padding:6px 14px;border-radius:10px;background:rgba(16,11,30,.9);
    border:1px solid var(--accent);}
  /* ---- Tutorial coach banner + highlights ---- */
  #tutbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:22;
    width:min(520px,calc(100% - 56px));display:none;align-items:center;gap:10px;

  #tutbar.show{display:flex;}
  #tutbar .tuttext{flex:1;font-size:13px;line-height:1.4;text-align:left;}
  #tutbar .tutskip{font-size:11px;padding:5px 8px;min-height:0;background:#2a2040;border-color:#4a3a72;}

  .tut-pulse{animation:tutpulse 1s ease-in-out infinite;border-color:var(--gold)!important;}
  /* locked content (boss select / unlocks screen) */
  .choice.rlocked{opacity:.55;cursor:default;border-color:#3a3450;}
  .unlockgrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:680px;margin:0 auto;}
  .ucard{width:96px;padding:8px 4px;border-radius:10px;border:2px solid #3a3450;background:#1a1430;
    display:flex;flex-direction:column;align-items:center;gap:2px;}

<body>
<div id="rotate"><div class="ph">📱</div><b>Rotate your device</b><span class="small" style="opacity:.75">No Room For Heroes plays in landscape (16:9)</span></div>
<div id="app">
  <div id="topbar"></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint"></div>
    <div id="inspect"></div>
    <div id="tutbar"></div>
    <div id="relicbar"></div>
    <button id="pausebtn" title="Menu &amp; settings" onclick="openPauseMenu()">☰</button>
    <button id="audiobtn" title="Sound on/off">🔊</button>
    <!-- zoom buttons removed — pinch / wheel zoom only (they sat over the boss) -->
  </div>
  <div id="panel"></div>
  <div id="overlay"></div>
</div>
<script>
"use strict";
/* ============================================================================
   NO ROOM FOR HEROES — build a reverse dungeon. Heroes walk in from the left toward
   your boss on the right; kill them with trap rooms, monster rooms and a shop
   that arms them (so you can loot it all back). Auto-resolve combat + manual
   boss abilities. Campaign + Endless.
   ========================================================================== */

const CV = document.getElementById('cv');
const X = CV.getContext('2d');
const stage = document.getElementById('stage');
const topbar = document.getElementById('topbar');
const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const hintEl = document.getElementById('hint');
const inspectEl = document.getElementById('inspect');
const tutBar = document.getElementById('tutbar');
const relicBar = document.getElementById('relicbar');
let inspectHover = false;        // shown by hover (auto-hides) vs pinned by a tap
let inspectPinned = false;       // a tapped bubble stays until ✕ / tap elsewhere
let lastPtrCX = null;            // last pointer x in stage px — anchors the bubble
let lastPtrCY = null;            // last pointer y in stage px — anchors the bubble vertically
let _inspHideT = 0, _overInspect = false;

// Virtual render space. VH is fixed so sprites stay a constant size; VW is
// derived from the live screen aspect each resize, so the canvas is crisp and
// undistorted in any orientation (portrait shows fewer rooms, camera follows).
let VW = 960, VH = 420;          // virtual units (recomputed in resize())
let baseK = 1;                   // virtual→device-pixel scale
let cssW = 960, cssH = 420;      // canvas CSS size in px
let zoom = 1;                    // dungeon zoom (pinch / buttons / wheel)
const ZMIN = 0.45, ZMAX = 1.7;
const STAGEW = 132;              // staging area (left of the entrance) for waiting heroes
const FLOOR = 330;          // y of the floor line
const LIFT = 14;            // px heroes & monsters are raised off the floor line (they walk a touch higher)
const ROOM_W = 200;         // pixel width of one room/cell

/* ----------------------------- content tables ---------------------------- */
// Room cards. type = id. "trap" rooms hit passing heroes; "monster" rooms
// spawn a blocker that must be killed; "shop" arms heroes (you profit).
const ROOMS = {
  spike:    {kind:'trap',   name:'Spike Pit',  ic:'🦷', col:'#9aa4b2', dmg:6,  rate:0.45, elem:'phys', desc:'Fast cheap spikes. Shatters frozen heroes.'},
  flame:    {kind:'trap',   name:'Flame Jet',  ic:'🔥', col:'#ff7a2e', dmg:11, rate:0.8,  burn:4, elem:'fire', desc:'Hits hard + burns. Ignites oiled heroes.'},
  arrow:    {kind:'trap',   name:'Dart Wall',  ic:'🎯', col:'#caa15e', dmg:5,  rate:0.3,  elem:'phys', pierce:true, desc:'Very rapid, pierces armor.'},
  oil:      {kind:'trap',   name:'Oil Slick',  ic:'🛢️', col:'#3a3a2a', dmg:3,  rate:0.7,  elem:'oil',  desc:'Coats heroes in oil — slows them, primes fire & lightning.'},
  frost:    {kind:'trap',   name:'Frost Trap', ic:'❄️', col:'#9adfff', dmg:5,  rate:0.6,  elem:'ice',  desc:'Chills heroes (slow). Then any hit SHATTERS for a burst.'},
  tesla:    {kind:'trap',   name:'Tesla Coil', ic:'⚡', col:'#fff34d', dmg:9,  rate:0.7,  elem:'shock',desc:'Lightning. Chains across the party if they are oiled.'},
  // ---- counter cards (unlockable) ----
  magebane: {kind:'trap',   name:'Mage-Bane',  ic:'🔮', col:'#b163ff', dmg:7,  rate:0.5,  elem:'phys', vsClass:['mage','cleric'], vsMult:2.6, desc:'2.6× damage to mages & clerics.'},
  maul:     {kind:'trap',   name:'Armor Crusher',ic:'🔨',col:'#9aa4b2', dmg:13, rate:0.7,  elem:'phys', pierceAll:true, desc:'Ignores ALL armor — crushes armored heroes.'},
  gallows:  {kind:'trap',   name:'Gallows',    ic:'⚰️', col:'#6a5a8a', dmg:8,  rate:0.6,  elem:'phys', vsLowHp:0.4, vsMult:3, desc:'Executes the wounded: 3× damage under 40% HP.'},
  hexward:  {kind:'trap',   name:'Hexward',    ic:'🧿', col:'#4dc3ff', dmg:6,  rate:0.45, elem:'phys', vsElite:true, vsMult:2.2, desc:'2.2× damage to elite (trait-bearing) heroes.'},
  bombard:  {kind:'trap',   name:'Bombard',    ic:'💣', col:'#e0823a', dmg:15, rate:2.4,  elem:'phys', aoe:1, desc:'Lobs shells that hit EVERY hero within one room of the blast — punishes a strung-out corridor.'},
  venom:    {kind:'trap',   name:'Venom Vent', ic:'🐍', col:'#7bdc6b', dmg:3,  rate:0.7,  elem:'phys', poison:4, desc:'Weak hit, but injects STACKING poison. A 🔥flame room then COMBUSTS the stacks for a burst.'},
  corrode:  {kind:'trap',   name:'Acid Sprayer',ic:'🧪',col:'#b6e84d', dmg:5,  rate:0.6,  elem:'phys', acid:3, desc:'Corrodes ARMOR each spray, so every later hit bites deeper. Melts armored heroes.'},
  hexbrand: {kind:'trap',   name:'Hex Brand',  ic:'🎯', col:'#ff5470', dmg:4,  rate:1.3,  elem:'phys', mark:true, desc:'Brands a hero — the NEXT hit on them DETONATES for +120%. Pair before a heavy hitter.'},
  runestone:{kind:'trap',   name:'Runestone',  ic:'🔯', col:'#b985ff', dmg:0,  rate:99,   elem:'phys', amp:0.20, desc:'Deals NO damage — AMPLIFIES every trap & guard in this room and the two beside it by +20%.'},
  goblin:   {kind:'monster',name:'Goblin Den', ic:'👺', col:'#5fae54', hp:18, atk:7, feeds:true, desc:'Spawns goblins every wave (Lv 1-2: 1, Lv 3-4: 2, Lv 5: 3 · cap 20). Each goblin levels from its own kills — +30% HP & +20% ATK per level. Immune to your own traps. Survivors return and heal between waves.'},
  skeleton: {kind:'monster',name:'Bone Pit',   ic:'💀', col:'#d8d2c2', hp:32, atk:11,  desc:'Scales hard with levels.'},
  warden:   {kind:'monster',name:'Warden',     ic:'🛡️', col:'#c9a14d', hp:58, atk:8, taunt:true, desc:'Tanky jailer — strikes the WHOLE party stalled in its room. Load that room with traps.'},
  totem:    {kind:'monster',name:'War Totem',  ic:'🗿', col:'#7a9e6a', hp:30, atk:2, totem:true, desc:'Support: while alive, +25% trap & guard output to the rooms on EITHER side. Protect it.'},
  warcamp:  {kind:'monster',name:'War Camp',   ic:'🏕️', col:'#c98a3a', hp:50, atk:8, warcamp:true, desc:'A drill-yard blocker. The monster rooms on EITHER side are pre-trained: +30% HP & ATK each wave.'},
  slime:    {kind:'monster',name:'Gel Cube',   ic:'🟩', col:'#6ad9b0', hp:34, atk:7, split:true, desc:'Splits — reforms once at 60% HP when slain. Soaks burst; weak to ☠poison & 💥AoE.'},
  ogre:     {kind:'monster',name:'Ogre Lair',  ic:'👹', col:'#b0563a', hp:58, atk:19, desc:'Late-game wall of pain.'},
  shop:     {kind:'shop',   name:'Shop',       ic:'🛒', col:'#caa15e', desc:'Heroes buy your stock — you keep the gold. Higher levels sell at a steeper markup.'},
  minion:   {kind:'monster',name:'Corrupted',  ic:'🧟', col:'#9a5cff', hp:30, atk:7, minion:true, desc:'A turned hero that guards a room.'},
};
// Cards you can DRAFT (minions only come from corrupting heroes in town).
const ROOM_KEYS = Object.keys(ROOMS).filter(k=>k!=='minion');
// Room types with a painted card-art icon (icons/<type>.png); else fall back to the emoji.
const HAS_ICON = new Set(['spike','flame','arrow','oil','frost','tesla','magebane','maul','gallows','hexward','bombard','venom','corrode','hexbrand','goblin','skeleton','ogre','warden','totem','slime']);
function cardFace(type){ return HAS_ICON.has(type) ? '<img class="cardimg" src="icons/'+type+'.png" alt="" draggable="false">' : null; }
const MAX_LEVEL = 5;   // a trap/monster can be upgraded this many times
// Effective values after rune bonuses (RB):
function maxLevel(){ return MAX_LEVEL + (RB.upCap||0); }
function handCap(){ return 5 + (RB.hand||0); }
function abilCost(c){ const p=G.boss?G.boss.pAbilCost||0:0; return Math.max(1, Math.round(c*(1-Math.min(0.8,(RB.abilCost||0)+p)))); }
function abilDmg(x){ const p=G.boss?G.boss.pAbilDmg||0:0; return Math.round(x*(1+(RB.abilDmg||0)+p)); }
function townCost(c){ return Math.max(1, Math.round(c*(1-(RB.townDisc||0)))); }
// Shop sale price scales with the shop room's level (+40% markup per level).
function shopMarkup(lvl){ return 1.6 + ((lvl||1)-1)*0.4; }
function shopCap(room){ return ((room&&room.lvl)||1)+1; }   // Lv1 holds 2 items, +1 slot per level
function salePrice(room, key){ return Math.round(ITEMS[key].price * shopMarkup(room?room.lvl:1)); }

// Fusing two components yields a synergy multiplier on the room's output.
// Some pairs are great, some are duds (diminishing returns).
const SYNERGY_PAIRS = {
  'flame+skeleton':{m:1.35,name:'Funeral Pyre'},
  'flame+goblin':  {m:1.25,name:'Roasting Pit'},
  'ogre+spike':    {m:1.30,name:'Impaler'},
  'arrow+goblin':  {m:1.25,name:'Ambush'},
  'arrow+skeleton':{m:1.20,name:'Bone Volley'},
  'flame+spike':   {m:1.20,name:'Searing Pit'},
  // elemental reaction combos
  'flame+oil':     {m:1.45,name:'Inferno'},      // oil then ignite
  'oil+tesla':     {m:1.40,name:'Conduction'},   // wet then chain lightning
  'frost+spike':   {m:1.35,name:'Flash Freeze'}, // chill then shatter
  'frost+tesla':   {m:1.30,name:'Superconductor'},
  'arrow+frost':   {m:1.30,name:'Brittle Bones'},
  'oil+spike':     {m:1.15,name:'Slippery'},
  // monster + monster pair identities — a mechanical twist on top of the
  // multiplier (fx hooks are applied to the guards in buildCells)
  'goblin+skeleton':{m:1.10,name:'Grave Horde',    fx:'feedBoth',  desc:'Every hero slain here feeds BOTH guards (no cap).'},
  'ogre+warden':    {m:1.10,name:'Gatehouse',      fx:'tauntBoth', desc:'BOTH guards strike the whole party stalled in the room.'},
  'ogre+slime':     {m:1.10,name:'Sludge Colossus',fx:'splitBoth', desc:'BOTH guards reform once at 60% HP when slain.'},
  'ogre+skeleton':  {m:1.25,name:'Bone Colossus',  desc:'A late-game wall — both guards hit ×1.25 harder.'},
  'goblin+slime':   {m:1.10,name:'Spawning Vats',  fx:'feedBoth',  desc:'Every hero slain here feeds BOTH guards (no cap).'},
};
function roomParts(r){ const p=[r.type]; if(r.part2)p.push(r.part2); if(r.part3)p.push(r.part3); return p; }
function synergyInfo(parts){
  if(parts.length<2) return {m:1, name:'', tone:'neutral'};
  // the best NAMED pair anywhere in the room wins — a 3-part room keeps its identity
  let best=null;
  for(let a=0;a<parts.length;a++) for(let b=a+1;b<parts.length;b++){
    const hit=SYNERGY_PAIRS[[parts[a],parts[b]].sort().join('+')];
    if(hit && (!best || hit.m>best.m)) best=hit;
  }
  if(best) return {...best, tone:'good'};
  const kinds=parts.map(t=>ROOMS[t].kind);
  const nm=kinds.filter(k=>k==='monster').length, nt=kinds.filter(k=>k==='trap').length;
  if(nm&&nt) return {m:1.18, name:'Pinned Down', tone:'good'};
  if(nm>=2) return {m:1, name:'Pack', tone:'good'};   // separate guards, one after the other
  if(nt>=2) return {m:1.08, name:'Hazard Field', tone:'good'};
  return {m:1, name:'Unstable', tone:'bad'};
}
function comboName(r){ return roomParts(r).map(t=>ROOMS[t].name).join(' + '); }

// ---- Aging dungeon: veteran rooms, merging & corruption ----------------
// Rooms that have killed a lot of heroes become "veterans": they hit harder
// AND bite a % of the hero's max HP every strike, so they never fall off vs
// late-game tanks. The kill count that already drives fusing also drives this.
const VET_KILLS = 6;     // hero deaths in a room per veteran rank
const VET_MAX   = 6;     // rank cap (was 8 — caps the snowball)
const VET_DMG   = 0.09;  // +9% trap/monster output per rank (was 12%)
const VET_BITE  = 0.006; // % of hero MAX HP per rank per hit (was 1.2% — halved to tame the snowball)
const CORRUPT_PCT  = 0.015; // toll: drain this % of max HP each populated room a hero passes
const CORRUPT_BOSS = 0.06;  // the boss strikes +6% harder per corruption stack a hero carries
function vetRank(room){ return room ? Math.min(VET_MAX, Math.floor((room.kills||0)/VET_KILLS)) : 0; }
function vetMul(room){ return 1 + vetRank(room)*VET_DMG; }
function roomUpgradeCost(room){ return Math.max(1, Math.round((25 + 22*room.lvl) * (room.part3?1.8:room.part2?1.4:1) * (1-(RB.townDisc||0)))); }
// A room holds up to 3 parts. The 3rd costs gold (tall builds compete with wide
// ones instead of strictly beating them) and its guard joins at 85% strength.
const FUSE3_GOLD=250, GUARD3_MUL=0.85;
// Stacked TRAPS discount (mirrors the 3rd-guard rule): in a multi-trap room
// the 1st damage-trap hits full, the 2nd at 80%, the 3rd at 60%. Without it,
// full-trap stacking strictly dominated every other build (owner's A2 run:
// 248k trap dmg vs 0 guard dmg).
const TRAP_STACK_MUL=[1, 0.8, 0.6];
// Can room `from` be merged INTO room `into` (turning `into` into a combo)?
function canFuseRooms(into, from){
  return !!(into && from && roomParts(into).length<3 && !from.part2 && !from.part3
    && into.def.kind!=='shop' && from.def.kind!=='shop' && !roomParts(into).includes(from.type));
}

// ---- Boss doctrine helpers (dungeon-wide rules for the active boss) ----
function bossDoc(){ return (G && G.boss && G.boss.doc) || ''; }
function monFeeds(def){ return !!(def.feeds || bossDoc()==='undeath'); }   // Undeath: every monster feeds
// "Fed" growth per hero that died in the room. UNCAPPED but with diminishing
// returns: ~+3%/kill for the first few corpses (same early feel), then the
// curve bends so it keeps climbing forever without the old runaway.
//   old linear: 10→1.30  50→2.50  100→4.00  200→7.00  (applied to BOTH hp & atk)
//   now:        10→1.21  50→1.54  100→1.72  200→1.91
function feedMul(kills){ return 1 + 0.30 * Math.log1p(0.10 * (kills||0)); }
function bastionMul(){ return bossDoc()==='bastion' ? 1.25 : 1; }          // Bastion: tougher guards
// Barracks (in-run, gold-funded): a global Monster Rank that buffs EVERY monster's HP & ATK.
function barracksMul(){ const b=G&&G.barracks; return (b&&b.built)? 1 + 0.16*b.lvl : 1; }

// Shop stock items: arm the heroes (makes them stronger) for instant gold.
const ITEMS = {
  sword:  {name:'Sword',  ic:'🗡️', price:14, atk:4,  desc:'+4 hero ATK'},
  armor:  {name:'Armor',  ic:'🛡️', price:16, def:3,  desc:'+3 hero armor'},
  potion: {name:'Potion', ic:'🧪', price:12, heal:0.5, desc:'Hero heals mid-fight'},
  great:  {name:'Greatsword', ic:'⚔️', price:30, atk:9, desc:'+9 hero ATK'},
};

// Hero classes (scaled by difficulty + index at spawn).
const CLASSES = {
  warrior:{name:'Warrior', ic:'⚔️', hp:1.35, atk:1.0, armor:2, spd:46, col:'#c45a4a', tint:'#e8c07a'},
  rogue:  {name:'Rogue',   ic:'🗡️', hp:0.85, atk:1.1, armor:0, spd:74, col:'#4a8c5a', tint:'#caa', dodge:0.35},
  mage:   {name:'Mage',    ic:'✨', hp:0.7,  atk:1.45,armor:0, spd:50, col:'#5a6cc4', tint:'#9ad'},
  cleric: {name:'Cleric',  ic:'✝️', hp:1.0,  atk:0.8, armor:1, spd:48, col:'#c9c46a', tint:'#fff', selfheal:true},
};
const CLASS_KEYS = Object.keys(CLASSES);

// Elite traits ("affixes"). Tougher heroes roll these; chance climbs with
// progress. Effects are applied in buildHero / combat ticks.
const TRAITS = {
  hardy:    {name:'Hardy',    ic:'🛡',  col:'#7bdc6b', desc:'+60% HP'},
  berserk:  {name:'Berserker',ic:'😤',  col:'#ff7a4d', desc:'+40% ATK, strikes faster'},
  armored:  {name:'Armored',  ic:'⛨',  col:'#9aa4b2', desc:'+6 armor'},
  swift:    {name:'Swift',    ic:'💨',  col:'#9adfff', desc:'moves & acts faster'},
  vampiric: {name:'Vampiric', ic:'🩸',  col:'#d0407a', desc:'heals from the damage it deals'},
  zealot:   {name:'Zealot',   ic:'✨',  col:'#ffe14d', desc:'regenerates HP constantly'},
};
const TRAIT_KEYS = Object.keys(TRAITS);

// ===== TOWN INTERLUDE content (every 5 kills) =====
// The town runs on DREAD (earned per kill), separate from gold (which builds
// the dungeon). Boss upgrades, sabotage, schemes and corruption all cost dread.
const TOWN_UPGRADES = {
  reinforce:{name:'Reinforce Throne', ic:'🏰', base:7, desc:'+30 max HP and heal that much.'},
  sharpen:  {name:'Sharpen Claws',    ic:'🗡️', base:6, desc:'+5 boss attack.'},
  attune:   {name:'Dark Attunement',  ic:'🔷', base:6, desc:'+20 max mana & faster regen.'},
  ascend:   {name:'Empower Boss',     ic:'🐲', base:11,desc:'+1 boss level (stronger abilities).'},

// Campaign: keep your dungeon between levels; targets + difficulty ramp up.
// Campaign is a 50-level siege. Each LEVEL is one wave; clearing it advances you.
// Waves grow in size; every 5th level is a milestone with mini-boss(es) + a reward
// (odd 5s = relic, even 5s = mandate + a Town visit). Level 50 → the King finale.
const CAMP_LEVELS=50;
function campLevel(){ return (G.levelIdx||0)+1; }
function campPower(){ return Math.max(1, Math.ceil(campLevel()*0.7)); }   // hero stat-scaler (gentler than 1:1 with level)                  // 1..50 (levelIdx is 0-based)
function levelComp(L){
  const ms = (L%5===0);
  const champs  = ms ? (1 + Math.floor((L-5)/15)) : 0;            // mini-bosses: 1 (5-15), 2 (20-30), 3 (35-45), 4 (50)
  const normals = ms ? Math.floor(L/10)                          // milestone escort (small)
                     : Math.min(5, 1 + Math.floor((L-1)/6));      // regular waves grow 1→5
  return { champs, normals };
}

// they aren't yours until you extract. Close the dungeon to KEEP all of it; die

const DEATH_KEEP=0.5;                    // fraction kept if the throne falls
function pendingResources(){             // the haul you've gathered so far this run
  // Per-kill loot rolls (see heroDies): 20% wood / 20% stone / 20% rune / 10% shards / 30% nothing.
  // Champions roll twice. Quarry still scales the wood/stone/shards haul.
  const d=G.drops||{}, m=quarryMul();
  return { wood:Math.floor((d.wood||0)*m), stone:Math.floor((d.stone||0)*m), shards:Math.floor((d.shards||0)*m) };
}
// Bank the run's haul into the persistent town. frac<1 = death penalty; withGold
// converts leftover treasury gold into a bonus (only on a clean extraction/win).
function bankResources(frac, withGold){
  const p=pendingResources();
  // the penalty applies only to the gathered haul; a gold-conversion bonus (clean
  // extraction/win) is added in full afterwards so the two are never coupled.
  let w=Math.floor(p.wood*frac), s=Math.floor(p.stone*frac), sh=Math.floor(p.shards*frac);
  if(withGold){ const g=Math.max(0,G.gold||0); w+=Math.floor(g/90); s+=Math.floor(g/180); }
  TOWN.res.wood+=w; TOWN.res.stone+=s; TOWN.res.shards+=sh;
  saveTown();
  G.townGain={wood:w,stone:s,shards:sh};
  return G.townGain;
}

const CARD_RARITY={
  spike:'common', arrow:'common', oil:'common', goblin:'common', skeleton:'common',
  flame:'special', frost:'special', tesla:'special', venom:'special', ogre:'special', shop:'special',
  magebane:'rare', gallows:'rare', hexward:'rare', corrode:'rare', warden:'rare', slime:'rare',

const CARD_TIER_W={ common:100, special:50, rare:24, epic:10 };   // base offer weights
function cardRarity(t){ return CARD_RARITY[t]||'common'; }
// Offer weight for a card — rarer tiers stay genuinely rare early and only
// become likely as a run deepens (no epic counter-cards in the opening rounds).
function cardWeight(t, L){
  const r=cardRarity(t), base=CARD_TIER_W[r]||100;
  const mult = r==='epic' ? Math.max(0.08, L*0.16 - 0.25)   // ~0 until a few levels in
             : r==='rare' ? Math.max(0.3, 1 + (L-2)*0.06)   // slightly scarcer in the first rounds too
             : 1;
  return base*mult;
}

function pickCardWeighted(pool, L, exclude){
  const cand = exclude ? pool.filter(t=>!exclude.has(t)) : pool;
  const list = cand.length ? cand : pool;
  let tot=0; for(const t of list) tot+=cardWeight(t, L||0);
  let r=Math.random()*tot;
  for(const t of list){ r-=cardWeight(t, L||0); if(r<=0) return t; }
  return list[list.length-1];
}

const RELIC_BY_TIER={};
TIER_ORDER.forEach(t=>RELIC_BY_TIER[t]=Object.keys(RELICS).filter(k=>RELICS[k].tier===t));

function tierWeights(L){
  // Early relics are mostly common/special/rare; epics+ ramp in from thresholds,
  // so a fresh save won't roll two epics on its first relic screen.
  return { common:Math.max(3,30-L*3), special:20, rare:4+L*1.2,
    epic:Math.max(0,(L-4))*0.8, legendary:Math.max(0,(L-10))*0.5, mythic:Math.max(0,(L-18))*0.3 };
}
function rollTier(L){
  const w=tierWeights(L); let tot=0; for(const t in w) tot+=w[t];
  let r=Math.random()*tot;
  for(const t of TIER_ORDER){ r-=w[t]; if(r<=0) return t; }
  return 'common';
}
function rollRelicChoices(n){
  const L = G.mode==='campaign' ? G.levelIdx*1.3 : G.totalSlain/12;
  const owned=new Set(G.relics);
  const picks=[]; let guard=0;
  while(picks.length<n && guard++<200){
    let t=rollTier(L);
    let pool=RELIC_BY_TIER[t].filter(id=>!owned.has(id)&&!picks.includes(id));
    if(!pool.length){ // fall back across tiers
      pool=Object.keys(RELICS).filter(id=>!owned.has(id)&&!picks.includes(id));
      if(!pool.length) break;
    }
    picks.push(pool[ri(0,pool.length-1)]);
  }
  return picks;
}

/* ----------------------- traveling merchant -----------------------------
   A wandering trader who turns up in the Hero Town between milestones and
   sells relics for dread. Stock is rolled fresh each visit (weighted by the
   same tier curve as drafts) and priced by rarity.                         */
const MERCHANT_PRICE={ common:8, special:14, rare:22, epic:34, legendary:48, mythic:66 };
function rollMerchant(){
  // Visits most town stops, but not every one — keeps the encounter special.
  if(Math.random()<0.25){ return {visiting:false, stock:[]}; }
  const n = 2 + (Math.random()<0.5?1:0);              // 2–3 wares
  const ids = rollRelicChoices(n);
  const stock = ids.map(id=>({ id, tier:RELICS[id].tier,
    price:Math.max(1, Math.round(MERCHANT_PRICE[RELICS[id].tier]*(1-(RB.townDisc||0)))), sold:false }));
  return { visiting:true, stock };
}
function buyMerchantRelic(idx){
  const m=G.merchant; if(!m||!m.visiting) return;
  const w=m.stock[idx]; if(!w||w.sold) return;
  if(G.relics.includes(w.id)){ w.sold=true; renderTown(); return; }   // already owned elsewhere
  if(G.dread<w.price){ showHint('Not enough dread.'); return; }
  G.dread-=w.price; w.sold=true; addRelic(w.id);
  showHint('🛒 Acquired '+RELICS[w.id].ic+' '+RELICS[w.id].name+'!');
  renderTown(); renderTop();
}

// Size the canvas backing store to the stage, derive VW from the real aspect.
function resize(){
  const r = stage.getBoundingClientRect();
  if(r.width<2 || r.height<2) return;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cssW = r.width; cssH = r.height;
  VH = 420;                                   // fixed virtual height
  VW = Math.max(360, Math.round(VH * cssW / cssH));
  CV.width  = Math.round(cssW * dpr);
  CV.height = Math.round(cssH * dpr);
  CV.style.width = cssW + 'px';
  CV.style.height = cssH + 'px';
  baseK = CV.height / VH;                      // == CV.width / VW
}

function initAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  try{ AC=new (window.AudioContext||window.webkitAudioContext)();
    sfxBus=AC.createGain();   sfxBus.gain.value=sfxVol;   sfxBus.connect(AC.destination);
    musicBus=AC.createGain(); musicBus.gain.value=musVol; musicBus.connect(AC.destination);
    startMusic(); }catch(_){ AC=null; }
}
function tone(freq,dur,type,vol,slideTo,bus){
  if(!AC||!audioOn) return;
  const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(bus||sfxBus||AC.destination); o.start(t); o.stop(t+dur+0.02);
}
function noiseBurst(dur,vol,cut){
  if(!AC||!audioOn) return;
  const t=AC.currentTime, n=Math.max(1,Math.floor(AC.sampleRate*dur));
  const buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf;
  const g=AC.createGain(); g.gain.value=vol||0.18;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||2600;
  s.connect(f); f.connect(g); g.connect(sfxBus||AC.destination); s.start();
}

const MT_NOTE={c:0,d:2,e:4,f:5,g:7,a:9,b:11};
function mtMidi(t){ const m=/^([a-g])(#?)(\d)$/.exec(t); if(!m) return null;
  return 12*(+m[3]+1)+MT_NOTE[m[1]]+(m[2]?1:0); }
const mtHz=n=>440*Math.pow(2,(n-69)/12);
function mtParseSeq(s){ const ev=[]; let t=0;
  for(const tok of s.trim().split(/\s+/)){ const i=tok.lastIndexOf(':');
    const n=tok.slice(0,i), d=+tok.slice(i+1);
    if(n!=='-'){ const m=mtMidi(n); if(m!=null) ev.push({t,m,d}); } t+=d; }
  return {ev,len:t}; }
function mtParseDrums(s){ const ev=[]; const str=s.replace(/\s+/g,'');
  for(let i=0;i<str.length;i++) if(str[i]!=='.') ev.push({t:i,k:str[i]});
  return {ev,len:str.length}; }
const _mtDuty={};
function mtDutyWave(p){ if(_mtDuty[p]) return _mtDuty[p];
  const N=32, re=new Float32Array(N), im=new Float32Array(N);
  for(let n=1;n<N;n++) im[n]=(2/(n*Math.PI))*Math.sin(Math.PI*n*p);
  return _mtDuty[p]=AC.createPeriodicWave(re,im); }
let _mtNoiseBuf=null;
function mtNoise(){ if(_mtNoiseBuf) return _mtNoiseBuf;
  _mtNoiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const d=_mtNoiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return _mtNoiseBuf; }
const MUSIC_SCALE=0.55;            // chip tracks under the SFX
let _mtSrcs=[];
function mtTone(when,dur,freq,wave,duty,vol){
  const o=AC.createOscillator(), g=AC.createGain();
  if(wave==='pulse') o.setPeriodicWave(mtDutyWave(duty)); else o.type='triangle';
  o.frequency.value=freq;
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(vol*MUSIC_SCALE,when+0.006);
  g.gain.setValueAtTime(vol*MUSIC_SCALE,when+Math.max(0.01,dur-0.035));
  g.gain.linearRampToValueAtTime(0,when+dur);
  o.connect(g); g.connect(musicBus); o.start(when); o.stop(when+dur+0.02); _mtSrcs.push(o); }
function mtDrum(when,k,vol){
  vol*=MUSIC_SCALE;
  if(k==='k'){ const o=AC.createOscillator(), g=AC.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(130,when); o.frequency.exponentialRampToValueAtTime(38,when+0.1);
    g.gain.setValueAtTime(vol,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.13);
    o.connect(g); g.connect(musicBus); o.start(when); o.stop(when+0.15); _mtSrcs.push(o); return; }
  const s=AC.createBufferSource(); s.buffer=mtNoise();
  const f=AC.createBiquadFilter(), g=AC.createGain();
  if(k==='s'){ f.type='bandpass'; f.frequency.value=1800; f.Q.value=0.8;
    g.gain.setValueAtTime(vol*0.9,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.12); }
  else { f.type='highpass'; f.frequency.value=6000;
    const len=(k==='H')?0.14:0.045;
    g.gain.setValueAtTime(vol*0.5,when); g.gain.exponentialRampToValueAtTime(0.001,when+len); }
  s.connect(f); f.connect(g); g.connect(musicBus); s.start(when); s.stop(when+0.2); _mtSrcs.push(s); }
let musicMood=null, _mtParsed=null, _mtStep=0, _mtLoopStart=0, _mtStepDur=0;
function mtStart(mood){
  const t=MUSIC_TRACKS[mood]; if(!t||!AC) return;
  for(const s of _mtSrcs){ try{ s.stop(); }catch(_){ } } _mtSrcs=[];
  _mtParsed={ lead:mtParseSeq(t.lead.seq), arp:mtParseSeq(t.arp.seq),
              bass:mtParseSeq(t.bass.seq), drums:mtParseDrums(t.drums.seq), t };
  _mtStepDur=60/t.bpm/4; _mtStep=0; _mtLoopStart=AC.currentTime+0.06;
}
function musicTick(){
  if(!audioOn||!AC||!_mtParsed) return;
  try{
    if(_mtSrcs.length>360) _mtSrcs=_mtSrcs.slice(-120);   // keep the stop-list bounded
    const horizon=AC.currentTime+0.4, loopLen=_mtParsed.lead.len, t=_mtParsed.t;
    while(_mtLoopStart+_mtStep*_mtStepDur < horizon){
      const step=_mtStep%loopLen, base=_mtLoopStart+_mtStep*_mtStepDur;
      for(const ch of ['lead','arp','bass'])
        for(const e of _mtParsed[ch].ev) if(e.t===step)
          mtTone(base, e.d*_mtStepDur*0.92, mtHz(e.m), ch==='bass'?'tri':'pulse', t[ch].duty||0, t[ch].vol);
      for(const e of _mtParsed.drums.ev) if(e.t===step) mtDrum(base, e.k, t.drums.vol);
      _mtStep++;
    }
  }catch(_){ }
}
function scheduleMusic(){ if(_musicTimer) clearInterval(_musicTimer); _musicTimer=setInterval(musicTick,40); }
function startMusic(){ if(!AC||_musicTimer) return; mtStart(musicMood||'title'); scheduleMusic(); }
function setMusicMood(mood){
  if(!MUSIC_TRACKS[mood] || mood===musicMood) return;
  musicMood=mood;
  if(AC) mtStart(mood);
}
// Pick the mood from the current game state (called each frame; no-ops if same).
let uiScreen='title';   // which overlay screen is up when no run is active
function updateMusicMood(){
  let mood;
  if(G && G.phase==='town') mood='town';
  else if(G && (G.phase==='build'||G.phase==='run')){
    mood='wave';
    if(G.phase==='run' && G.heroes && G.heroes.some(h=>(h.champion||h.king) && h.state!=='dead')) mood='boss';
    else if(G.phase==='run' && G.boss && G.boss.hp/G.boss.maxHp < 0.30) mood='boss';
  }
  else mood=(uiScreen==='town')?'town':(uiScreen==='title'?'title':'menu');
  setMusicMood(mood);
}

function haulStr(p){ const a=[]; if(p.wood)a.push('🪵'+p.wood); if(p.stone)a.push('🪨'+p.stone); if(p.shards)a.push('🔮'+p.shards); return a.length?a.join(' '):'no resources yet'; }

function difficulty(){
  const threat = 1 + G.bounty*0.15;
  // Campaign: a steady level ramp drives it (hero power also scales with level), so
  // it does NOT compound on cumulative kills the way Endless does.
  // The realm escalates steeply: a fresh run (no runes/town/extra slots) is meant to
  // be brutal — only the smartest 5-room dungeon squeaks past ~20% of the time, and
  // meta-progression is what makes victory reliable. Two ramp terms make the back
  // half + King the real filter while keeping the opening fair.
  if(G.mode==='campaign'){ const L=campLevel(); return (1 + (L-1)*0.02) * (1 + (L-1)*0.034) * threat * (1+(RUNES.asc||0)*0.18); }   // L1=1.0 → L50≈5.3× (first runs are brutal — meta is the path to winning); 👑 Ascension +18%/crown
  return (1 + G.totalSlain*0.05) * threat;   // Endless ramps via totalSlain only
}

/* 🏆 Endless leaderboard — Cloudflare Pages Function (/api/board) + KV.
   Fails soft: if the function/KV binding isn't deployed, the screen says so. */
// Boards come as {day,week,month,all} (older server: just {top} → map to all).
function lbShape(j){ return { day:j.day||[], week:j.week||[], month:j.month||[], all:j.all||j.top||[] }; }
async function lbFetch(){
  for(let a=0;a<3;a++){                                  // transient fetch hiccups: retry with backoff
    try{ const r=await fetch('/api/board'); if(r.ok) return lbShape(await r.json()); }catch(_){ }
    await new Promise(res=>setTimeout(res, 350*(a+1)));
  }
  return null;
}
async function lbSubmit(score){
  for(let a=0;a<2;a++){
    try{ const r=await fetch('/api/board',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({name:lbName(), score})});
      if(r.ok) return lbShape(await r.json());
      if(r.status===429) return lbFetch();               // throttled — the score is likely already up there
    }catch(_){ }
    await new Promise(res=>setTimeout(res, 500));
  }
  return null;
}
// Endless auto-upload: fire on every run end (close OR death) so the board
// reflects the run without the player tapping "Submit my best". No prompt —
// falls back to "Anonymous" if no name is stored yet. Fully silent failure.
function lbAutoSubmit(){
  if(!G || G.mode!=='endless') return;
  const score = Math.max(G.totalSlain||0, RUNES.best||0);
  if(score<=0) return;
  let name='Anonymous';
  try{ name = (localStorage.getItem('bm_lbname')||'').trim() || 'Anonymous'; }catch(_){ }
  try{ fetch('/api/board',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({name, score})}).catch(()=>{}); }catch(_){ }
}
function lbName(){
  let n=null; try{ n=localStorage.getItem('bm_lbname'); }catch(_){ }
  if(!n){ n=(typeof prompt==='function' ? (prompt('Name for the public leaderboard:','Boss')||'') : '').trim().slice(0,16);
    if(n){ try{ localStorage.setItem('bm_lbname',n); }catch(_){ } } }
  return n||'Anonymous';
}
let LB_DATA=null, LB_TAB='day';
const LB_TABS=[['day','📅 Daily'],['week','🗓️ Weekly'],['month','📆 Monthly'],['all','👑 All-time']];
function lbPickTab(t){ LB_TAB=t; renderLB(LB_DATA); }
function renderLB(boards){
  LB_DATA=boards;
  const tabs=document.getElementById('lbtabs');
  if(tabs) tabs.innerHTML=LB_TABS.map(([k,lbl])=>
    `<button onclick="lbPickTab('${k}')" style="padding:6px 10px;min-height:30px;font-size:9px;${k===LB_TAB?'border-color:var(--gold);color:var(--gold);':''}">${lbl}</button>`).join('');
  const el=document.getElementById('lbbody'); if(!el) return;
  if(boards===null){ el.innerHTML='Leaderboard offline — the server isn\'t set up yet (KV binding "BOARD" in the Cloudflare Pages project).'; return; }
  const top=boards[LB_TAB]||[];
  if(!top.length){ el.innerHTML='No entries '+(LB_TAB==='all'?'yet':'this '+(LB_TAB==='day'?'day':LB_TAB))+' — be the first!'; return; }
  el.innerHTML='<div style="max-width:320px;margin:0 auto;text-align:left;line-height:1.8">'
    +top.slice(0,10).map((e,i)=>`<div style="display:flex;justify-content:space-between;gap:14px">
      <span>${['🥇','🥈','🥉'][i]||(i+1)+'.'} ${e.name}</span><b style="color:#ffd34d">${e.score}</b></div>`).join('')+'</div>';
}

async function cloudBackup(){
  let r=null;
  try{
    r=await fetch('/api/save',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({code:cloudCode(), data:{v:1, runes:RUNES, town:TOWN}})});
    if(!r.ok) throw 0;
    const j=await r.json();
    try{ localStorage.setItem('bm_cloud_'+saveSlot, j.code); }catch(_){ }
    openCloud('✔ Backed up just now — code below works on any device.');
  }catch(_){
    // say WHY, so a server-side problem is diagnosable from the hint
    if(r && r.status===429) showHint('☁️ One backup per 10s — wait a moment and try again.');
    else if(r && r.status===503) showHint('☁️ Cloud storage isn\'t configured on the server.');
    else showHint('☁️ Backup failed ('+(r?'HTTP '+r.status:'network')+') — try again in a moment.');
  }
}
let _restoreArm=null;
async function cloudRestore(){
  const inp=document.getElementById('cloudcode');
  let code=((inp&&inp.value)||'').trim().toUpperCase().replace(/[^A-Z2-9]/g,'');
  if(code.length!==8){ showHint('That doesn\'t look like a sync code (XXXX-XXXX).'); return; }
  code=code.slice(0,4)+'-'+code.slice(4);
  if(_restoreArm!==code){ _restoreArm=code;
    showHint('⚠️ This OVERWRITES Slot '+saveSlot+' — tap Restore again to confirm.'); return; }
  _restoreArm=null;
  try{
    const r=await fetch('/api/save?code='+code); if(!r.ok) throw 0;
    const d=(await r.json()).data;
    if(!d || !d.runes || !d.town) throw 0;
    try{
      localStorage.setItem('bossmonster_runes_'+saveSlot, JSON.stringify(d.runes));
      localStorage.setItem('bossmonster_town_'+saveSlot, JSON.stringify(d.town));
      localStorage.setItem('bm_cloud_'+saveSlot, code);
    }catch(_){ }
    loadRunes(); applyRunes(); loadTown();
    openCloud('✔ Restored into Slot '+saveSlot+'.');
  }catch(_){ showHint('☁️ Restore failed — check the code.'); }
}

// Discovery: a keyword glossary + every reaction, so combos are learnable.
const KEYWORDS={
  Primer:    {col:'#9adfff', txt:'Applies a lingering status (oil/chill) a Detonator consumes. Place it BEFORE detonators.'},
  Detonator: {col:'#ff7a2e', txt:'Triggers a reaction on a primed hero. Place it AFTER the primer that sets it up.'},
  Poison:    {col:'#7bdc6b', txt:'Stacking damage-over-time — pile several sources, then a 🔥 fire room Combusts the stacks.'},
  Mark:      {col:'#ff5470', txt:'Brands a hero so the NEXT hit Detonates for +120%. Put it just before a heavy hitter.'},
  'Armor-shred':{col:'#b6e84d', txt:'Corrodes armor so every later hit lands harder. Pairs with fast/weak traps.'},
  Burn:      {col:'#ff9a3a', txt:'Damage-over-time. Ignite (oil→fire) stacks a big one.'},
  AoE:       {col:'#e0823a', txt:'Hits multiple heroes at once. Loves a strung-out corridor or a Warden kill-box.'},
  Amplifier: {col:'#b985ff', txt:'Boosts nearby rooms instead of dealing damage. Surround it with your best traps.'},
  Pierce:    {col:'#caa15e', txt:'Ignores hero armor — the answer to armored raiders.'},
  Taunt:     {col:'#c9a14d', txt:'Holds the whole party in one room and hits them all. Stack traps in that room.'},
  Support:   {col:'#7a9e6a', txt:'Buffs the rooms on either side while alive. Protect it behind your line.'},
  Split:     {col:'#6ad9b0', txt:'Reforms once when slain, so it holds the party twice as long.'},
  Scaling:   {col:'#5fae54', txt:'Grows permanently with every hero that dies in its room.'},
  Counter:   {col:'#b163ff', txt:'Bonus damage to a specific kind of hero (class / elite / wounded).'},
};
const REACTIONS=[
  {ic:'🔥', name:'Ignite',        how:'🔥 fire on an 🛢️ oiled hero',          pay:'heavy burst + big burn'},
  {ic:'☠️', name:'Combust',       how:'🔥 fire on a ☠️ poisoned hero',         pay:'burst scaling with poison stacks'},
  {ic:'💥', name:'Thermal Shock', how:'fire on a chilled hero, or ice on a burning one', pay:'sudden-swing burst'},
  {ic:'🧊', name:'Encase',        how:'❄ ice on an 🛢️ oiled hero',            pay:'freezes them solid (a sitting duck)'},
  {ic:'❄', name:'Shatter',        how:'💥 phys or ⚡ shock on a chilled/frozen hero', pay:'burst, cracks the ice'},
  {ic:'⚡', name:'Conduct',        how:'⚡ shock on an 🛢️ oiled hero',          pay:'arcs to the WHOLE party'},
  {ic:'⚡', name:'Overload',       how:'⚡ shock on a ❄ chilled hero',          pay:'stuns them solid'},
  {ic:'🎯', name:'Detonate',      how:'any hit on a 🎯 marked hero',           pay:'+120% damage (consumes the mark)'},
];
// Derive a card's keyword tags from its properties.
function cardTags(def){
  const t=[];
  if(def.elem==='oil'||def.elem==='ice') t.push('Primer');
  if(def.elem==='fire'||def.elem==='shock') t.push('Detonator');
  if(def.elem==='phys' && def.dmg && !def.amp && !def.poison && !def.acid && !def.mark) t.push('Detonator'); // shatters chilled
  if(def.poison) t.push('Poison');
  if(def.mark) t.push('Mark');
  if(def.acid) t.push('Armor-shred');
  if(def.burn) t.push('Burn');
  if(def.aoe) t.push('AoE');
  if(def.amp) t.push('Amplifier');
  if(def.pierce||def.pierceAll) t.push('Pierce');
  if(def.taunt) t.push('Taunt');
  if(def.totem) t.push('Support');
  if(def.split) t.push('Split');
  if(def.feeds) t.push('Scaling');
  if(def.vsClass||def.vsElite||def.vsLowHp) t.push('Counter');
  return [...new Set(t)];
}

function openTownBuilder(){ uiScreen='town'; overlay.classList.add('show'); townPopId=null; townZoom=1; townCamX=0; townCamY=0; renderTownBuilder(); }
function resBar(){
