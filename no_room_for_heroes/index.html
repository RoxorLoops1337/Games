    <span title="Shards">🔮 <span style="color:#c79bff">${TOWN.res.shards}</span></span></div>`;
}
function costStr(c){ if(!c) return ''; const p=[]; if(c.wood)p.push(`🪵${c.wood}`); if(c.stone)p.push(`🪨${c.stone}`); if(c.shards)p.push(`🔮${c.shards}`); return p.join(' '); }

/* ---- Town Builder as a MAP: plots on a painted village, tap to build ---- */
// World is 960×520. Each building has a fixed home on the map; unbuilt = a
// staked-out foundation, built = a little painted structure that grows with
// level. Tapping a plot opens an anchored popup (same pattern as the runebook).
const TOWN_W=960, TOWN_H=520;
const TOWN_PLOTS={
  foundry: {x:150,y:205}, quarry:{x:115,y:340}, smithy:{x:165,y:465},
  guild:   {x:370,y:235}, watch: {x:483,y:160}, inn:   {x:600,y:235},
  sanctum: {x:300,y:345}, den:   {x:665,y:350},
  treasury:{x:395,y:470}, vault: {x:520,y:478},
  obelisk: {x:825,y:185}, library:{x:805,y:315}, shrine:{x:845,y:455},
};
// Optional painted backdrop (owner-generated art). Drop a 16:9 image at
// town/map_bg.png (generated from the 16:9 cover plate of this 960×520 world)
// and it replaces the procedural terrain; plots/buildings/villagers draw on top.
let TOWN_BG=null;
if(typeof Image!=='undefined'){ TOWN_BG=new Image(); TOWN_BG.onload=()=>{TOWN_BG._ok=true;}; TOWN_BG.onerror=()=>{}; TOWN_BG.src='town/map_bg.png'; }
// Painted building art (town/<id>.png) — drawn over its plot when present;
// otherwise the procedural building (drawTownBuilding) is used. Same _ok flag.
const BUILD_IMG={};
if(typeof Image!=='undefined'){ for(const _id in TOWN_PLOTS){ const im=new Image(); im.onload=()=>{im._ok=true;}; im.onerror=()=>{}; im.src='town/'+_id+'.png'; BUILD_IMG[_id]=im; } }
let townPopId=null;
// pan/zoom state (persists while the screen is open so a rebuild keeps your view)
let townZoom=1, townCamX=0, townCamY=0;
const TOWN_ZMAX=3;
// world units visible at zoom 1 (the full-screen canvas COVERS the viewport, so
// this is ≤ the world on the cramped axis; defaults = whole world for tests)
let _tVisW=TOWN_W, _tVisH=TOWN_H, _tKCss=1;
function townMeasure(cv){
  const r=cv.getBoundingClientRect();
  const cw=(r.width>0?r.width:920), ch=(r.height>0?r.height:520);
  _tKCss=Math.max(cw/TOWN_W, ch/TOWN_H);            // css px per world unit at zoom 1 (cover)
  _tVisW=cw/_tKCss; _tVisH=ch/_tKCss;
}
function townClampCam(){
  townZoom=Math.max(1, Math.min(TOWN_ZMAX, townZoom));
  townCamX=Math.max(0, Math.min(TOWN_W - _tVisW/townZoom, townCamX));
  townCamY=Math.max(0, Math.min(TOWN_H - _tVisH/townZoom, townCamY));
}
function townZoomAt(f, cssX, cssY, cv){   // zoom about a css-pixel anchor
  const kc=_tKCss*townZoom;
  const wx=townCamX + cssX/kc, wy=townCamY + cssY/kc;
  townZoom*=f; townClampCam();
  const kc2=_tKCss*townZoom;
  townCamX=wx - cssX/kc2; townCamY=wy - cssY/kc2;
  townClampCam();
}
function townZoomBtn(f){
  const cv=document.getElementById('towncv'); if(!cv) return;
  const r=cv.getBoundingClientRect();
  if(f===0){ townZoom=1; townCamX=0; townCamY=0; townClampCam(); }
  else townZoomAt(f, (r.width||920)/2, (r.height||520)/2, cv);
  drawTownMap(cv); if(townPopId) showTownPop(townPopId);
}
function renderTownBuilder(){
  overlay.classList.add('show');
  // full-screen takeover, same pattern as the runebook (absolute inset:0 —
  // also the iOS flex-%-height fix)
  overlay.innerHTML=`<div id="townmap" style="position:absolute;inset:0;overflow:hidden;touch-action:none">
      <canvas id="towncv" style="position:absolute;inset:0;width:100%;height:100%;cursor:pointer"></canvas>
      <button class="rbback" onclick="openStronghold()">‹ BACK</button>
      <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:4;background:rgba(12,9,22,.78);border:1px solid var(--line);border-radius:10px;padding:5px 14px;display:flex;gap:14px;align-items:center;white-space:nowrap">
        <b style="color:var(--gold)">🏗️ Town Builder</b>
        <span title="Wood">🪵 <b style="color:#d6a86a">${TOWN.res.wood}</b></span>
        <span title="Stone">🪨 <b style="color:#c8cdd6">${TOWN.res.stone}</b></span>
        <span title="Shards">🔮 <b style="color:#c79bff">${TOWN.res.shards}</b></span>
      </div>
      <div id="townpop" style="position:absolute;display:none;z-index:5;max-width:230px;background:rgba(12,9,22,.96);border:1.5px solid var(--accent);border-radius:10px;padding:8px 10px;font-size:12px;line-height:1.45;text-align:left"></div>
      <div style="position:absolute;bottom:12px;right:12px;z-index:4;display:flex;gap:5px">
        <button onclick="townZoomBtn(1.45)" style="width:42px;height:42px;padding:0;font-size:18px">＋</button>
        <button onclick="townZoomBtn(1/1.45)" style="width:42px;height:42px;padding:0;font-size:18px">－</button>
        <button onclick="townZoomBtn(0)" style="width:42px;height:42px;padding:0;font-size:15px">⤢</button>
      </div>
      <div class="small" style="position:absolute;bottom:14px;left:12px;z-index:4;opacity:.65;max-width:46%;text-align:left">Tap a plot to build · green 🔨 = affordable · drag to pan, pinch/＋− to zoom</div>
    </div>`;
  const cv=document.getElementById('towncv');
  const host=document.getElementById('townmap');
  const cw=(+host.clientWidth>0)?+host.clientWidth:920;
  const ch=(+host.clientHeight>0)?+host.clientHeight:520;
  const dpr=(typeof devicePixelRatio==='number'&&devicePixelRatio>0)?devicePixelRatio:1;
  cv.width=Math.round(cw*dpr); cv.height=Math.round(ch*dpr);
  townMeasure(cv); townClampCam();
  drawTownMap(cv);
  // re-render on rotation / window resize while the map is open
  if(!window._townRsHook){ window._townRsHook=true;
    window.addEventListener('resize', ()=>{ if(document.getElementById('towncv')) setTimeout(renderTownBuilder,120); }); }
  // one-finger: tap (inspect) or drag (pan). two fingers: pinch zoom. wheel: zoom.
  const ptrs={}; let panned=false, pinch0=null;
  cv.addEventListener('pointerdown', e=>{
    ptrs[e.pointerId]={x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY};
    panned=false;
    const v=Object.values(ptrs);
    if(v.length===2) pinch0={d:Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y)||1, z:townZoom};
  });
  cv.addEventListener('pointermove', e=>{
    const p=ptrs[e.pointerId]; if(!p) return;
    const v=Object.values(ptrs);
    if(v.length===2 && pinch0){
      const d=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y)||1;
      const r=cv.getBoundingClientRect();
      const mx=(v[0].x+v[1].x)/2-r.left, my=(v[0].y+v[1].y)/2-r.top;
      const f=(pinch0.z*(d/pinch0.d))/townZoom;
      townZoomAt(f, mx, my, cv); panned=true;
      p.x=e.clientX; p.y=e.clientY; drawTownMap(cv); hideTownPop(); return;
    }
    const dx=e.clientX-p.x, dy=e.clientY-p.y;
    if(panned || Math.abs(e.clientX-p.sx)>8 || Math.abs(e.clientY-p.sy)>8){
      panned=true;
      const kc=_tKCss*townZoom;
      townCamX-=dx/kc; townCamY-=dy/kc; townClampCam();
      drawTownMap(cv); hideTownPop();
    }
    p.x=e.clientX; p.y=e.clientY;
  });
  const ptrUp=e=>{
    const p=ptrs[e.pointerId]; delete ptrs[e.pointerId];
    if(Object.keys(ptrs).length<2) pinch0=null;
    if(!p || panned) return;
    const r=cv.getBoundingClientRect(); const kc=_tKCss*townZoom;
    const wx=townCamX+(e.clientX-r.left)/kc, wy=townCamY+(e.clientY-r.top)/kc;
    const id=townPlotAt(wx,wy);
    if(id) showTownPop(id); else hideTownPop();
  };
  cv.addEventListener('pointerup', ptrUp);
  cv.addEventListener('pointercancel', e=>{ delete ptrs[e.pointerId]; pinch0=null; });
  cv.addEventListener('wheel', e=>{ e.preventDefault();
    const r=cv.getBoundingClientRect();
    townZoomAt(e.deltaY<0?1.15:1/1.15, e.clientX-r.left, e.clientY-r.top, cv);
    drawTownMap(cv); if(townPopId) showTownPop(townPopId);
  }, {passive:false});
  if(townPopId) showTownPop(townPopId);   // re-open after a build re-render
}
function townPlotAt(wx,wy){
  let best=null,bd=58;
  for(const id in TOWN_PLOTS){ const p=TOWN_PLOTS[id];
    const d=Math.hypot(wx-p.x, wy-(p.y-22));   // plots are anchored at the foot; aim mid-building
    if(d<bd){ bd=d; best=id; } }
  return best;
}
function hideTownPop(){ townPopId=null; const el=document.getElementById('townpop'); if(el) el.style.display='none'; }
function showTownPop(id){
  const el=document.getElementById('townpop'), cv=document.getElementById('towncv');
  if(!el||!cv) return;
  townPopId=id;
  const b=BUILDINGS[id]; const lvl=townLvl(id), maxed=lvl>=b.max;
  const next=maxed?null:buildingCost(id,lvl+1); const afford=canAfford(next);
  const pips=`<span style="color:#ffd34d">${'◆'.repeat(lvl)}${'◇'.repeat(b.max-lvl)}</span>`;
  el.innerHTML=`<b style="color:var(--gold)">${b.ic} ${b.name}</b> ${pips}
    <span style="float:right;cursor:pointer;color:#ff8a9a" onclick="hideTownPop()">✕</span>
    <div class="small" style="opacity:.85;margin:3px 0">${b.desc}</div>
    <div class="small" style="color:#9adfff">${lvl>0?b.lvlText(lvl):''}${maxed?'':(lvl>0?'<br>':'')+(maxed?'':`<span style="opacity:.75">Next: ${b.lvlText(lvl+1)}</span>`)}</div>
    ${maxed?'<div class="small" style="color:#7bdc6b;font-weight:bold;margin-top:4px">✔ FULLY BUILT</div>'
      :`<button class="go" ${afford?'':'disabled'} onclick="buildTown('${id}')" style="margin-top:6px;padding:6px 10px;font-size:12px;min-height:34px">${lvl>0?`Upgrade → Lv ${lvl+1}`:'Build'} · ${costStr(next)}</button>`}`;
  // anchor next to the plot (through the pan/zoom transform), clamped inside the map
  const r=cv.getBoundingClientRect(); const k=_tKCss*townZoom;
  const p=TOWN_PLOTS[id];
  el.style.display='block';
  const ew=el.offsetWidth||220, eh=el.offsetHeight||120;
  let x=(p.x-townCamX)*k+18, y=(p.y-60-townCamY)*k-eh/2;
  if(x+ew > (r.width||920)-6) x=(p.x-townCamX)*k-ew-18;
  el.style.left=Math.round(Math.max(6,x))+'px';
  el.style.top =Math.round(Math.max(6,Math.min(((r.height||520))-eh-6, y)))+'px';
}
// ---- the painted map ----
function drawTownMap(cv){
  const c=cv.getContext('2d'); if(!c) return;
  const k=(cv.width/_tVisW)*townZoom;   // device px per world unit (cover-scaled)
  c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,cv.width,cv.height);
  c.setTransform(k,0,0,k,-townCamX*k,-townCamY*k); c.imageSmoothingEnabled=false;
  const P=(x,y,w,h,col)=>{ c.fillStyle=col; c.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); };
  if(TOWN_BG && TOWN_BG._ok){
    // the painted 16:9 backdrop covers world x≈[17.75,942.25] (cover-plate crop);
    // draw it uniformly scaled to span the full width (crops ~10 world px top/bottom)
    c.drawImage(TOWN_BG, 0, -10, TOWN_W, 540);
  } else {
  // night meadow
  const g=c.createLinearGradient(0,0,0,TOWN_H); g.addColorStop(0,'#16241a'); g.addColorStop(1,'#0e1812');
  c.fillStyle=g; c.fillRect(0,0,TOWN_W,TOWN_H);
  // mottled grass + a pond
  for(let i=0;i<70;i++){ const sx=(i*157)%TOWN_W, sy=40+((i*211)%(TOWN_H-60));
    P(sx,sy,14+(i%3)*8,6,'rgba(60,110,70,.10)'); }
  c.fillStyle='#1d3a52'; c.beginPath(); c.ellipse(905,80,70,34,0,0,7); c.fill();
  c.fillStyle='#27506e'; c.beginPath(); c.ellipse(905,78,58,26,0,0,7); c.fill();
  // roads: a main street with a plaza loop
  const road=(x0,y0,x1,y1,w)=>{ c.strokeStyle='#4a3b2a'; c.lineWidth=w; c.lineCap='round';
    c.beginPath(); c.moveTo(x0,y0); c.lineTo(x1,y1); c.stroke();
    c.strokeStyle='#5d4a33'; c.lineWidth=w-8; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x1,y1); c.stroke(); };
  road(40,415,920,415,26);                       // main street
  road(483,415,483,205,20);                      // up to the watchtower
  road(200,415,160,250,16); road(660,395,815,250,16);
  // plaza
  c.fillStyle='#5d4a33'; c.beginPath(); c.ellipse(483,300,120,58,0,0,7); c.fill();
  c.fillStyle='#4a3b2a'; c.beginPath(); c.ellipse(483,300,120,58,0,0,7); c.lineWidth=4; c.strokeStyle='#3a2e20'; c.stroke();
  // fountain
  P(467,288,32,10,'#7a8494'); P(471,280,24,8,'#9aa4b2'); P(477,270,12,10,'#4dc3ff');
  // scattered trees & rocks (fixed, decorative)
  const tree=(x,y,s)=>{ P(x-2*s,y-6*s,4*s,7*s,'#4a3320');
    c.fillStyle='#274a2e'; c.beginPath(); c.arc(x,y-9*s,6*s,0,7); c.fill();
    c.fillStyle='#2f5c38'; c.beginPath(); c.arc(x-3*s,y-7*s,4*s,0,7); c.arc(x+3*s,y-8*s,4*s,0,7); c.fill(); };
  [[60,140,1.2],[250,120,1],[340,140,0.8],[700,120,1.1],[600,485,1],[320,500,0.9],[745,470,1.2],[40,495,1]].forEach(t=>tree(t[0],t[1],t[2]));
  [[210,160],[770,140],[60,260],[915,360]].forEach(r=>{ P(r[0],r[1],16,9,'#5a6470'); P(r[0]+3,r[1]-4,9,5,'#6d7884'); });
  }
  // villagers: the town comes alive as it grows (2 souls per built building)
  const pop=Math.min(26, Object.values(TOWN.built||{}).filter(v=>v>0).length*2);
  const VCOLS=['#c45a4a','#4a8c5a','#5a6cc4','#c9c46a','#9a5cff','#b06a2e'];
  for(let v=0;v<pop;v++){
    const r1=((v*127)%83)/83, r2=((v*61)%71)/71;
    const vx=90+r1*790, vy=403+r2*16;
    P(vx-1.5,vy-9,3,6,VCOLS[v%VCOLS.length]);      // body on the main street
    P(vx-1,vy-12,2.5,3,'#e8c07a');                 // head
  }
  // plots
  for(const id in TOWN_PLOTS){ drawTownPlot(c,P,id); }
}
function drawTownPlot(c,P,id){
  const p=TOWN_PLOTS[id], b=BUILDINGS[id], lvl=townLvl(id), maxed=lvl>=b.max;
  const x=p.x, y=p.y;
  if(lvl<1){
    // staked-out foundation
    c.strokeStyle='rgba(255,211,77,.45)'; c.lineWidth=2; c.setLineDash([5,4]);
    c.strokeRect(x-26,y-40,52,40); c.setLineDash([]);
    P(x-26,y-3,52,3,'rgba(255,211,77,.25)');
    c.globalAlpha=0.5; c.font='20px Trebuchet MS'; c.textAlign='center';
    c.fillText(b.ic, x, y-14); c.globalAlpha=1;
  } else {
    drawTownBuilding(c,P,id,x,y,lvl);
  }
  // name + level pips
  c.font='bold 10px Trebuchet MS'; c.textAlign='center';
  c.fillStyle=lvl>0?'#e9e0ff':'rgba(233,224,255,.55)';
  c.fillText(b.name, x, y+13);
  c.fillStyle='#ffd34d'; c.font='9px Trebuchet MS';
  c.fillText('◆'.repeat(lvl)+'◇'.repeat(b.max-lvl), x, y+24);
  // affordable hammer
  if(!maxed && canAfford(buildingCost(id,lvl+1))){
    c.font='13px Trebuchet MS'; c.fillText('🔨', x+32, y-34);
  }
  c.textAlign='left';
}
// Little painted structures. All share a foot anchor (x = center, y = ground);
// they grow a bit with level and fly a banner when fully built.
function drawTownBuilding(c,P,id,x,y,lvl){
  const b=BUILDINGS[id], s=1+(lvl-1)*0.12, maxed=lvl>=b.max;
  const art=BUILD_IMG[id];
  if(art && art._ok){                               // painted art: bottom-centred on the plot
    const DH=Math.round(72*s);
    const iw=art.naturalWidth||art.width||1, ih=art.naturalHeight||art.height||1;
    const DW=Math.round(DH*iw/ih);
    c.drawImage(art, Math.round(x-DW/2), Math.round(y-DH+4), DW, DH);
    return;
  }
  const W=Math.round(48*s), H=Math.round(34*s), x0=x-W/2, y0=y-H;
  const wall={guild:'#8a7a5c',sanctum:'#5c4a8a',inn:'#7a5c40',den:'#4a4438',watch:'#6d6154',
    quarry:'#6d655a',vault:'#5f6772',treasury:'#7a6a3a',obelisk:'#2c2733',library:'#4a3d5c',
    smithy:'#5c4338',shrine:'#5c5066',foundry:'#54504a'}[id]||'#6a5a45';
  const roof={guild:'#a8413a',sanctum:'#8a5cff',inn:'#b06a2e',den:'#3a342c',watch:'#7a4a3a',
    quarry:'#4a443c',vault:'#3e4754',treasury:'#ffd34d',obelisk:'#16121e',library:'#7a5cb0',
    smithy:'#3a302a',shrine:'#9a8ab0',foundry:'#807a70'}[id]||'#8a4a3a';
  if(id==='obelisk'){             // a black spike, not a house
    c.fillStyle=wall; c.beginPath(); c.moveTo(x-10*s,y); c.lineTo(x,y-58*s); c.lineTo(x+10*s,y); c.closePath(); c.fill();
    P(x-3,y-46*s,6,8,'#b985ff');
  } else if(id==='watch'){        // tall tower with a beacon
    P(x0+W*0.28,y-58*s,W*0.44,58*s,wall); P(x0+W*0.22,y-62*s,W*0.56,8,roof);
    P(x-4,y-70*s,8,10,'#ff9a3a'); P(x-2,y-74*s,4,5,'#ffd34d');
  } else if(id==='sanctum'){      // wizard tower with a crystal
    P(x0+W*0.2,y-52*s,W*0.6,52*s,wall);
    c.fillStyle=roof; c.beginPath(); c.moveTo(x0+W*0.1,y-52*s); c.lineTo(x,y-72*s); c.lineTo(x0+W*0.9,y-52*s); c.closePath(); c.fill();
    P(x-3,y-66*s,6,7,'#c79bff'); P(x-6,y-30*s,12,12,'#2a2342');
  } else {                        // generic hall, flavoured by palette
    P(x0,y0,W,H,wall);
    c.fillStyle=roof; c.beginPath(); c.moveTo(x0-4,y0); c.lineTo(x,y0-16*s-(id==='guild'?4:0)); c.lineTo(x0+W+4,y0); c.closePath(); c.fill();
    P(x-5,y-12*s,10,12*s,'#2a2030');                          // door
    P(x0+6,y0+6,8,7,'#ffe9a0'); P(x0+W-14,y0+6,8,7,'#ffe9a0'); // lit windows
    if(id==='smithy'||id==='foundry'){ P(x0+W-10,y0-14,7,14,'#3a3430'); P(x0+W-9,y0-20,5,5,'rgba(200,200,200,.5)'); } // chimney+smoke
    if(id==='inn'){ P(x0-8,y0+4,4,16,'#4a3320'); P(x0-12,y0+2,12,9,'#b06a2e'); }   // hanging sign
    if(id==='quarry'){ P(x0-14,y-8,12,8,'#5a6470'); P(x0-10,y-13,7,5,'#6d7884'); } // rock pile
    if(id==='vault'){ P(x-7,y-16*s,14,4,'#9aa4b2'); }
  }
  c.font=Math.round(13+3*s)+'px Trebuchet MS'; c.textAlign='center';
  c.fillText(b.ic, x, y-H*0.45);
  if(maxed){ // banner flies from the actual rooftop (the tall builds aren't house-height)
    let fx=x+W/2, fy=y0-22;
    if(id==='obelisk'){ fx=x+2; fy=y-58*s; }
    else if(id==='watch'){ fx=x+W*0.30; fy=y-70*s; }
    else if(id==='sanctum'){ fx=x+4; fy=y-72*s; }
    P(fx-1,fy,2,14,'#caa15e'); c.fillStyle='#ffd34d';
    c.beginPath(); c.moveTo(fx+1,fy); c.lineTo(fx+12,fy+4); c.lineTo(fx+1,fy+8); c.closePath(); c.fill(); }
  c.textAlign='left';
}

// A guided first run: contextual coach steps that advance as you actually
// select a card, place it, start a wave, slay a hero, and level a room.
const TUT_STEPS=[

let runeSel=null;

// First tap a node to inspect it (detail bar appears); tap it again — or the

function tapRune(id){
  const n=RUNE_NODES[id]; if(!n) return;
  if(runeSel!==id){ runeSel=id; sfx('buy'); renderRunes(); return; }   // 1st tap: select+inspect
  buyRune(id);                                                          // 2nd tap: buy
}
function buyRune(id){
  const n=RUNE_NODES[id]; if(!n) return;
  runeSel=id;
  if(!runeUnlocked(n)){ const p=RUNE_NODES[n.req]; showHint('🔒 Unlock '+(p?p.name:'the rune above')+' first.'); renderRunes(); return; }
  if(ranksOf(id)>=n.maxRank){ showHint('✔ '+n.name+' is maxed.'); renderRunes(); return; }
  const cost=runeCost(n);
  if(RUNES.points<cost){ showHint('Need '+cost+'◆ (you have '+RUNES.points+').'); renderRunes(); return; }
  RUNES.points-=cost; RUNES.ranks[id]=ranksOf(id)+1; saveRunes();
  sfx('upgrade'); showHint(n.ic+' '+n.name+' → rank '+ranksOf(id)+'/'+n.maxRank);
  renderRunes();
}
function renderRunes(){
  overlay.classList.add('show');
  const COLW=126, ROWH=104, PAD=26, NODE=58, HDR=30;
  const topPad=PAD+HDR;                              // header band above the tree
  let maxCol=0,maxRow=0; RUNE_LIST.forEach(n=>{ if(n.col>maxCol)maxCol=n.col; if(n.row>maxRow)maxRow=n.row; });
  const W=Math.round(PAD*2+maxCol*COLW+NODE), H=Math.round(topPad+PAD+maxRow*ROWH+NODE);
  const cx=n=>PAD+n.col*COLW+NODE/2, cy=n=>topPad+n.row*ROWH+NODE/2;
  let paths='';
  RUNE_LIST.forEach(n=>{ if(!n.req)return; const p=RUNE_NODES[n.req]; if(!p)return;
    const lit=ranksOf(p.id)>0; const x1=cx(p),y1=cy(p)+NODE/2-6,x2=cx(n),y2=cy(n)-NODE/2+6, my=(y1+y2)/2;
    paths+=`<path d="M${x1} ${y1} V${my} H${x2} V${y2}" stroke="${lit?'#e8c06a':'#7a6038'}" stroke-width="${lit?5:3}" fill="none" opacity="${lit?0.95:0.5}" stroke-linejoin="round"/>`; });
  const heads=RUNE_BRANCHES.map(b=>{
    const x=PAD+b.col*COLW+NODE/2;
    return `<div class="rbranchhdr" style="left:${x}px;top:${topPad+ROWH-28}px;color:${b.c};border-color:${b.c}">${b.ic} ${b.name}</div>`;}).join('');
  const nodes=RUNE_LIST.map(n=>{
    const r=ranksOf(n.id), maxed=r>=n.maxRank, unlocked=runeUnlocked(n), cost=runeCost(n), afford=RUNES.points>=cost;
    const cls = (maxed?'rn-max':(unlocked?(afford?'rn-buy':'rn-cost'):'rn-lock')) + (n.id===runeSel?' rn-sel':'');
    const x=Math.round(PAD+n.col*COLW), y=Math.round(topPad+n.row*ROWH);
    const ic = unlocked? n.ic : '🔒';
    return `<div class="rnode ${cls}" style="left:${x}px;top:${y}px;width:${NODE}px;height:${NODE}px"
      onclick="tapRune('${n.id}')" title="${n.name}: ${n.desc} (${cost}◆/rank)">
      <span class="ric">${ic}</span><span class="rcnt">${r}/${n.maxRank}</span></div>`;}).join('');
  // buy popup — anchored NEXT TO the selected node (lives inside the tree so it
  // pans & zooms glued to its rune). Falls below the node, or above for low rows.
  let pop='', hint='';
  const s=runeSel?RUNE_NODES[runeSel]:null;
  if(s){ const r=ranksOf(s.id), maxed=r>=s.maxRank, unlocked=runeUnlocked(s), cost=runeCost(s), afford=RUNES.points>=cost;
    const action = maxed ? '<span style="color:#7bdc6b;font-weight:bold">✔ MAXED</span>'
      : !unlocked ? `<span style="color:#ff9aae">🔒 unlock ${RUNE_NODES[s.req].name} first</span>`
      : `<button class="go" ${afford?'':'disabled'} onclick="buyRune('${s.id}')">Buy · ${cost}◆</button>`;
    const below = s.row < maxRow/2;
    const vpos = below ? `top:${Math.round(cy(s)+NODE/2+12)}px` : `bottom:${Math.round(H-(cy(s)-NODE/2-12))}px`;
    pop=`<div class="rbpop ${below?'below':'above'}" style="left:${Math.round(cx(s))}px;${vpos}">
      <div class="rbpoprow"><span class="rbpopic">${unlocked?s.ic:'🔒'}</span>
        <div style="text-align:left;min-width:0">
          <b>${s.name}</b> <span class="small">· ${r}/${s.maxRank} · ${cost}◆</span><br>
          <span class="small" style="opacity:.9">${s.desc}</span></div></div>
      <div class="rbpopact">${action}</div></div>`;
  } else {
    hint=`<div class="rbhint">Tap a rune to inspect it · tap again (or Buy) to spend a point.</div>`;
  }
  overlay.innerHTML=`<div class="runebook">
    <button class="rbback" onclick="openStronghold()">‹ BACK</button>
    <div class="rbpts">${RUNES.points} <span class="rbscroll-ic">📜</span></div>
    <div class="rbview" id="rbview"><div class="rtree" id="rtree" style="width:${W}px;height:${H}px">
      <svg width="${W}" height="${H}" style="position:absolute;left:0;top:0;pointer-events:none">${paths}</svg>
      ${heads}
      ${nodes}
      ${pop}
    </div></div>
    <div class="rbzoom"><button onclick="runeZoomBtn(1)" aria-label="zoom in">＋</button><button onclick="runeZoomBtn(-1)" aria-label="zoom out">－</button></div>
    ${hint}
  </div>`;
  setupRuneViewport(W, H);
}
// ---- rune page pan/zoom: a persistent transform so re-renders never jump ----
let runeView=null;                 // {x,y,scale} kept across renders
let runeVP=null;                   // viewport metrics {vw,vh,W,H,minS,maxS}
let runeDragged=false;             // did this gesture move enough to count as a pan?
// Fit & center the tree on first open; thereafter you can pan & pinch/zoom to
// look around. A drag is swallowed from the click so node taps still register.
function setupRuneViewport(W,H){
  const vp=document.getElementById('rbview'), tree=document.getElementById('rtree');
  if(!vp||!tree) return;
  const vw=vp.clientWidth||window.innerWidth, vh=vp.clientHeight||window.innerHeight;
  const usableH=Math.max(120, vh-96);                         // leave room for the detail bar
  const fit=Math.min(vw/W, usableH/H, 1)*0.98;
  runeVP={ vw, vh, W, H, minS:Math.max(0.3, fit*0.8), maxS:2.6 };
  if(!runeView){                                              // first open → fit & centre
    runeView={ scale:fit, x:(vw-W*fit)/2, y:Math.max(46,(usableH-H*fit)/2) };
  }
  applyRuneView();
  attachRuneGestures(vp);
}
function clampRuneView(){
  if(!runeView||!runeVP) return;
  const {vw,vh,W,H}=runeVP, s=runeView.scale, tw=W*s, th=H*s, m=80;
  runeView.x = tw<=vw ? clamp(runeView.x,0,vw-tw) : clamp(runeView.x, vw-tw-m, m);
  runeView.y = th<=vh ? clamp(runeView.y,0,vh-th) : clamp(runeView.y, vh-th-m, m);
}
function applyRuneView(){
  const tree=document.getElementById('rtree'); if(!tree||!runeView) return;
  clampRuneView();
  tree.style.transform=`translate(${runeView.x}px,${runeView.y}px) scale(${runeView.scale})`;
}
function runeZoomAround(mx,my,ns){
  const s=runeView.scale; ns=clamp(ns, runeVP.minS, runeVP.maxS);
  const tx=(mx-runeView.x)/s, ty=(my-runeView.y)/s;          // tree point under the cursor
  runeView.scale=ns; runeView.x=mx-tx*ns; runeView.y=my-ty*ns;
  applyRuneView();
}
function runeZoomBtn(dir){
  const vp=document.getElementById('rbview'); if(!vp||!runeView) return;
  runeZoomAround(vp.clientWidth/2, vp.clientHeight/2, runeView.scale*(dir>0?1.25:0.8));
}
function attachRuneGestures(vp){
  if(vp._runeGestures) return;        // attach once per element (renderRunes recreates the DOM though)
  vp._runeGestures=true;
  const pts=new Map(); let panStart=null, pinch=null, captured=false;
  const rect=()=>vp.getBoundingClientRect();
  // IMPORTANT: do NOT capture the pointer on down — that swallows node taps on iOS.
  // Only capture once an actual drag/pinch begins, so a clean tap reaches the node.
  vp.onpointerdown=e=>{
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY}); runeDragged=false;
    if(pts.size===1){ panStart={x:e.clientX,y:e.clientY,vx:runeView.x,vy:runeView.y}; }
    else if(pts.size===2){ const[a,b]=[...pts.values()];
      pinch={ d0:Math.hypot(a.x-b.x,a.y-b.y)||1, s0:runeView.scale }; panStart=null; }
  };
  const grab=id=>{ if(!captured){ try{ vp.setPointerCapture(id); }catch(_){} captured=true; } };
  vp.onpointermove=e=>{
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size>=2 && pinch){ const[a,b]=[...pts.values()]; const d=Math.hypot(a.x-b.x,a.y-b.y);
      const r=rect(), mx=(a.x+b.x)/2-r.left, my=(a.y+b.y)/2-r.top;
      runeZoomAround(mx,my, pinch.s0*(d/pinch.d0)); runeDragged=true; grab(e.pointerId); }
    else if(panStart){ const dx=e.clientX-panStart.x, dy=e.clientY-panStart.y;
      if(Math.abs(dx)+Math.abs(dy)>8){ runeDragged=true; grab(e.pointerId); }
      if(runeDragged){ runeView.x=panStart.vx+dx; runeView.y=panStart.vy+dy; applyRuneView(); } }
  };
  const up=e=>{ pts.delete(e.pointerId);
    if(pts.size<2) pinch=null;
    if(pts.size===0){ panStart=null; captured=false; }
    else if(pts.size===1){ const p=[...pts.values()][0]; panStart={x:p.x,y:p.y,vx:runeView.x,vy:runeView.y}; } };
  vp.onpointerup=up; vp.onpointercancel=up;
  vp.onwheel=e=>{ e.preventDefault(); const r=rect();
    runeZoomAround(e.clientX-r.left, e.clientY-r.top, runeView.scale*(e.deltaY<0?1.12:0.89)); };
  // if the gesture was a pan/pinch, swallow the node click so it doesn't buy/select
  vp.addEventListener('click', e=>{ if(runeDragged){ e.stopPropagation(); e.preventDefault(); } }, true);
}

function chooseBoss(key){
  applyRunes();                                  // lock in this run's rune bonuses

  const maxHp=Math.round(b.maxHp*(1+RB.bossHp)*bossMasteryHp(mLvl)*glass) + RB.bossHpFlat;
  const atk=Math.round(b.atk*(1+RB.bossAtk)*bossMasteryAtk(mLvl)) + RB.bossAtkFlat;
  G.boss={ key, ...b, atk, hp:maxHp, maxHp, lvl:1, masteryLvl:mLvl, smiteCd:0, rage:0,
    mana:60+RB.manaFlat, maxMana:100+RB.manaFlat, manaRegen:5.5+RB.manaRegen,
    abil:[...b.sig, b.pool[0]].map(id=>({id,cd:0})) };

  // gold/dread lands on them instead of being overwritten; the base starting
  // amounts (and any relic rb bonuses, now folded into RB) are added afterwards.
  G.gold=0; G.dread=0;
  // Relic Shrine: begin the run already bearing relic(s)
  G.shrineRelics=[];
  for(let i=0;i<shrineRelics();i++){ const id=randomRelicId(townLvl('shrine')); if(id){ addRelic(id); G.shrineRelics.push(id); } }

  G.gold+=30+RB.gold0+townGold0();   // Treasury: bonus starting gold (on top of any relic gold)

  zoom=1; camX=0;
  { const seen=new Set(); for(let i=0;i<RB.cards0;i++){ const t=pickCardWeighted(unlockedRoomKeys(), runDepth(), seen); seen.add(t); G.hand.push({type:t, lvl:1}); } }
  gotoLoadout();                                  // pick your 3 abilities
}

    <div style="height:8px"></div>
    <div class="choices" style="max-width:520px">${poolCards}</div>
    <div class="menu-btns"><button onclick="gotoBossSelect()">← Back</button><button class="go" ${loadoutSel.length!==1?'disabled':''} onclick="confirmLoadout()">⚔️ Enter the dungeon →</button></div>`;
}

/* ============================== PHASE: BUILD ============================= */
// In build, allow the camera a little past the entrance so the upcoming heroes
// waiting at the gate are visible.
function minCam(){
  if(!(G && (G.phase==='run' || G.phase==='build'))) return 0;
  return worldLeft();   // pan across the whole painted landscape (gate-only when no art)
}
function gotoBuild(first){
  G.phase='build'; G.hero=null; G.heroes=[]; selCard=-1; pickupIdx=-1;
  G.brokenCells={};                              // doorways get patched up between waves
  if(G.mode==='campaign') prepCampaignWave();    // roll THIS level's wave so the staging preview matches the spawn
  else ensureQueue(Math.max(3, G.guildLvl+1+(hasEdict('warband')?1:0)));   // endless: pre-roll the next arrivals to preview (Warband +1)
  smithyRestock();                                // Dark Smithy: free shop stock
  frameWave();                                    // the gameplay framing (boss right, gate + a slice of landscape)
  if(first){
    if(G.shrineRelics && G.shrineRelics.length)
      showHint('🛐 The Shrine grants you '+G.shrineRelics.map(id=>RELICS[id].ic+' '+RELICS[id].name).join(' & ')+'!');
    else showHint('Tap a card then a slot to build · tap a room to move it · drag to pan.');
    if(cssH>cssW*1.1) setTimeout(()=>showHint('↻ Tip: rotate to landscape for a wider dungeon view.'),2800);
  }
  render();
}

// Geometry helper: corridor = slots (left→right) then boss room (rightmost).
function corridorWidth(){ return (G.slots+1)*ROOM_W; }
function cellX(i){ return i*ROOM_W; }        // left edge of cell i (0..slots-1 rooms, slots=boss)

// The 2nd room stays affordable, but every slot AFTER #2 explodes exponentially
// (~50, 120, 276, 635, 1461, …) — a 4th/5th room is a major commitment.
function slotCost(){
  const s=G.slots;                                   // current count: this buys the (s+1)th room
  const base = s<=1 ? 50 : 120*Math.pow(2.3, s-2);
  return Math.max(1, Math.round(base*(1-(RB.slotCost||0))));
}
// First runs are capped at 5 corridor rooms. The ceiling is raised — slowly and
// preciously — by meta-progression (a deep rune, the War Foundry building) and by
// run-found relics, so a wider dungeon is an earned reward.
const SLOT_CAP_BASE=5;
function townSlotBonus(){ return [0,1,2][townLvl('foundry')]||0; }   // War Foundry: +1 cap per level (max 2)
// The cap gates the campaign's power curve; Endless stays an uncapped sandbox.
function slotCap(){ return (G&&G.mode==='endless') ? 99 : SLOT_CAP_BASE + (RB.slotMax||0) + townSlotBonus(); }

function buySlot(){
  if(G.slots>=slotCap()){ showHint('🧱 Slot cap reached ('+slotCap()+'). Raise it with runes, the War Foundry, or relics.'); return; }
  const c=slotCost();
  if(G.gold<c){ showHint('Not enough gold.'); return; }
  G.gold-=c; G.slots++; G.rooms.unshift(null);   // new slot extends to the LEFT
  // existing rooms keep their objects; unshift(null) puts new empty slot far left
  pickupIdx=-1; camX=0;                           // pan to reveal the new slot
  showHint('New slot added on the far left. Drag to pan the dungeon.');
  render();
}
// Gold sink: spend loot to patch the throne's HP between waves (the boss only
// otherwise heals via abilities/runes), so surplus gold always has a use.
function repairCost(){ const b=G.boss; const heal=Math.min(b.maxHp-b.hp, Math.ceil(b.maxHp*0.20)); return {heal, cost:Math.max(1,Math.ceil(heal*0.8))}; }
function repairThrone(){
  if(!G || G.phase!=='build' || !G.boss) return;
  if(G.boss.hp>=G.boss.maxHp){ showHint('The throne is already at full HP.'); return; }
  const {heal,cost}=repairCost();
  if(G.gold<cost){ showHint('Not enough gold to repair ('+cost+'g).'); return; }
  G.gold-=cost; G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+heal);
  floater(bossX(), FLOOR-96, '🩹 +'+heal+' HP', '#7bdc6b'); burst(bossX(),FLOOR-50,'#7bdc6b',10);
  sfx('upgrade'); showHint('Throne repaired +'+heal+' HP for '+cost+'g.'); render();
}

function selectCard(i){
  selCard = (selCard===i?-1:i);
  pickupIdx=-1;
  if(selCard>=0 && G.hand[selCard]){ showInspect(describeCard(G.hand[selCard]), false); tutEvent('select'); }
  else hideInspect();
  render();
}
// Extra cards aren't dead weight: scrap any hand card for gold (by rarity) to
// keep funding room levels, the Barracks & the Black Market once your 5 rooms are set.
const SCRAP_GOLD={ common:10, special:16, rare:26, epic:40 };
function cardScrapGold(type){ return SCRAP_GOLD[cardRarity(type)] || 10; }
function discardCard(i){
  const card=G.hand[i]; if(!card) return;
  const g=cardScrapGold(card.type);
  G.gold+=g;
  G.hand.splice(i,1); if(selCard===i)selCard=-1; else if(selCard>i)selCard--;
  sfx('buy'); showHint('🔧 Scrapped '+(card.label||ROOMS[card.type].name)+' for '+g+' gold.');
  if(typeof renderTop==='function') renderTop();
  render();
}
function roomName(r){ return r?(r.type==='minion'?(r.label||'Corrupted'):ROOMS[r.type].name):'empty'; }
function canFuse(room,card){
  return roomParts(room).length<3
    && room.def.kind!=='shop' && ROOMS[card.type].kind!=='shop'
    && !roomParts(room).includes(card.type);
}

// Place / upgrade by tapping a slot index (0..slots-1).
function tapSlot(idx){
  // No card selected → REARRANGE mode: tap a room to pick up, tap a slot to drop.
  if(selCard<0){
    const here=G.rooms[idx];
    if(pickupIdx<0){
      if(!here){ showHint('Pick a card to build, or tap a room to move it.'); return; }
      pickupIdx=idx; showHint('Moving '+roomName(here)+' — tap any slot to drop (swaps if full).');
      render(); return;
    }
    if(pickupIdx===idx){ pickupIdx=-1; showHint('Move cancelled.'); render(); return; }
    const tmp=G.rooms[pickupIdx]; G.rooms[pickupIdx]=G.rooms[idx]; G.rooms[idx]=tmp;
    pickupIdx=-1; showHint('Rooms rearranged.'); render(); return;
  }
  placeCard(selCard, idx);
}
// Apply hand card `ci` to slot `idx` (build / upgrade / fuse). Returns true on success.
function placeCard(ci, idx){
  const card=G.hand[ci]; if(!card) return false;
  const room=G.rooms[idx];
  if(!room){
    // build new room here
    G.rooms[idx]=makeRoom(card.type, card.lvl, card);
    G.hand.splice(ci,1);
    burst(cellX(idx)+ROOM_W/2, FLOOR-30, ROOMS[card.type].col, 14);
    showHint(ROOMS[card.type].name+' built!'); tutEvent('place');
  } else if(roomParts(room).includes(card.type)){
    // upgrade matching room/part (capped)
    if(room.lvl>=maxLevel()){ showHint(comboName(room)+' is already max level ('+maxLevel()+').'); return false; }
    room.lvl++;
    G.hand.splice(ci,1);
    burst(cellX(idx)+ROOM_W/2, FLOOR-30, '#ffd34d', 16);
    floater(cellX(idx)+ROOM_W/2, FLOOR-70, 'LVL '+room.lvl, '#ffd34d');
    showHint(comboName(room)+' upgraded to Lv '+room.lvl+(room.lvl>=maxLevel()?' (max)':'')+'!'); tutEvent('upgrade');
  } else if(canFuse(room,card)){
    // fuse a 2nd (free) or 3rd (gold) trap/monster into this room
    const third=!!room.part2;
    if(third && G.gold<FUSE3_GOLD){ showHint('A 3rd part costs '+FUSE3_GOLD+'g — not enough gold.'); return false; }
    if(third){ G.gold-=FUSE3_GOLD; room.part3=card.type; }
    else room.part2=card.type;
    if(card.type==='minion'){ room.minHp=card.minHp; room.minAtk=card.minAtk; if(!room.label) room.label=card.label; }  // carry the corrupted hero's stats
    G.hand.splice(ci,1);
    const info=synergyInfo(roomParts(room));
    burst(cellX(idx)+ROOM_W/2, FLOOR-40, '#9a5cff', 20);
    floater(cellX(idx)+ROOM_W/2, FLOOR-80, info.name||'COMBO', info.tone==='bad'?'#ff7a8a':'#7bdc6b');
    showHint('Fused → '+comboName(room)+(info.name?' ('+info.name+', ×'+info.m.toFixed(2)+')':'')+(third?' (−'+FUSE3_GOLD+'g)':'')+'!');
  } else if(roomParts(room).length>=3){
    showHint(comboName(room)+' is already a full combo — 3 parts max.');
    return false;
  } else {
    showHint('Can\'t place that here (shops can\'t fuse).');
    return false;
  }
  selCard=-1; sfx('upgrade');
  render();
  return true;
}

function makeRoom(type,lvl,card){
  const def=ROOMS[type];
  const r={type,lvl,def,kills:0,part2:null,part3:null};
  if(def.kind==='shop') r.stock=[];
  if(type==='minion'){            // carry the corrupted hero's stats + name
    r.minHp = card?.minHp || def.hp;
    r.minAtk = card?.minAtk || def.atk;
    r.label = card?.label || 'Corrupted';
  }
  return r;
}

// Stock the shop (build phase). Adds item to first shop room.
function stockShop(itemKey){
  const it=ITEMS[itemKey];
  if(G.gold<it.price){ showHint('Not enough gold to stock that.'); return; }
  const shop=G.rooms.find(r=>r&&r.type==='shop' && (r.stock||[]).length<shopCap(r))
          || G.rooms.find(r=>r&&r.type==='shop');
  if(!shop){ showHint('Build a Shop room first.'); return; }
  if((shop.stock||[]).length>=shopCap(shop)){ showHint('Shop is full — Lv '+shop.lvl+' holds '+shopCap(shop)+' items. Level it up for more slots.'); return; }
  G.gold-=it.price; shop.stock.push({key:itemKey, sold:false});
  showHint(it.name+' stocked. Heroes pay '+salePrice(shop,itemKey)+'g (Lv '+shop.lvl+' shop).');
  render();
}

// Begin a wave: build cells geometry, spawn the raiding party, switch to run.
function startWave(){
  smithyRestock();                  // ensure shops built this phase get their free gear
  buildCells();
  spawnGroup(G.guildLvl+1);
  spawnDenGoblinsForWave();         // 👺 +1 goblin per den (cap 20) marches out this wave
  G.phase='run'; speedMul=1; frameWaveRun();      // hug the right edge, heroes just in frame
  // refill some mana each wave + rune-granted HP regen
  G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana+30);
  if(RB.bossRegen) G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+RB.bossRegen);
  tutEvent('wave');
  render();
}

function buildCells(){
  G.cells=[];
  for(let i=0;i<G.slots;i++){
    const r=G.rooms[i];
    const cell={index:i, x0:cellX(i), x1:cellX(i)+ROOM_W, room:r, kind:'empty', traps:[], mon:null, shop:false};
    if(r){
      const parts=roomParts(r);
      const sI=synergyInfo(parts);
      const syn=sI.m + (parts.length>1?(RB.synergy||0):0);
      cell.syn=syn;
      const vm=vetMul(r); cell.vet=vetRank(r);   // veteran rank powers this cell
      // 👺 Pure Goblin Den = a SPAWNER — no stationary guard; goblins march out per wave
      const monParts=parts.filter(p=>ROOMS[p] && ROOMS[p].kind==='monster');
      const pureGoblin=monParts.length>0 && monParts.every(p=>p==='goblin');
      if(pureGoblin) cell.spawner='goblin';
      let guards=[], hasShop=false; const bm=barracksMul();
      for(const p of parts){
        const def=ROOMS[p];
        if(def.kind==='trap'){
          const di=cell.traps.filter(t=>!t.def.amp).length;     // damage-trap index in this room
          cell.traps.push({type:p, def, fireT:0, stackMul: def.amp?1:TRAP_STACK_MUL[Math.min(di,2)]});
          if(def.amp) cell.ampSelf=(cell.ampSelf||0)+def.amp;     // Runestone amplifier (this + adjacent)
        } else if(def.kind==='monster'){
          if(pureGoblin) continue;                                 // spawner: handled by spawnDenGoblinsForWave
          if(def.taunt) cell.warden=true;                        // strikes the whole stalled party
          if(def.totem) cell.totem=true;                         // buffs adjacent rooms while alive
          const bHp = p==='minion'? (r.minHp||def.hp) : def.hp;   // ||def guards a NaN/missing minion stat
          const bAtk= p==='minion'? (r.minAtk||def.atk): def.atk;
          // "Fed" monsters grow with every hero that died in this room — uncapped.
          // Under the Undeath doctrine, ALL monster rooms feed.
          const feed = (monFeeds(def) || sI.fx==='feedBoth') ? feedMul(r.kills) : 1;   // Grave Horde/Spawning Vats: the pair shares the feast
          const bas = bastionMul();   // Bastion doctrine: tougher guards
          // Each monster is its OWN guard — separate HP & attack, with the combo
          // multiplier applied individually (fused monsters = guards in a row;
          // the 3rd joins at 85% so tall rooms don't strictly beat wide dungeons).
          const g3 = guards.length>=2 ? GUARD3_MUL : 1;
          const hp = Math.round(bHp  * (0.9 + (r.lvl-1)*0.85) * feed * bas * syn * vm * (1+(RB.monHp||0)) * bm * g3);
          const atk= Math.round(bAtk * (1.0 + (r.lvl-1)*0.9)  * feed * bas * syn * vm * (1+(RB.monDmg||0)) * bm * g3);
          guards.push({hp, maxHp:hp, atk, atkT:0, alive:true, split:!!def.split});
        } else if(def.kind==='shop'){
          hasShop=true; (r.stock||[]).forEach(s=>s.sold=false);
        }
      }
      // monster-pair identities (Gatehouse / Sludge Colossus)
      if(sI.fx==='tauntBoth' && guards.length>1) cell.warden=true;
      if(sI.fx==='splitBoth') guards.forEach(g=>{ g.split=true; });
      if(guards.length){ cell.mon=guards[0]; cell.mon2=guards[1]||null; cell.mon3=guards[2]||null; }   // each steps up when the one before falls
      cell.shop=hasShop;
      cell.kind = guards.length ? 'monster' : (cell.traps.length ? 'trap' : (hasShop ? 'shop' : 'empty'));
    }
    G.cells.push(cell);
  }
  // 🏕️ War Camp aura: monster rooms beside a War Camp are pre-drilled (+30% HP & ATK).
  for(const c of G.cells){
    if(!c.room) continue;
    if(!roomParts(c.room).includes('warcamp')) continue;
    for(const j of [c.index-1, c.index+1]){
      const nb=G.cells[j]; if(!nb) continue;
      for(const g of [nb.mon, nb.mon2, nb.mon3]){ if(g){ g.hp=Math.round(g.hp*1.30); g.maxHp=g.hp; g.atk=Math.round(g.atk*1.30); } }
    }
  }
  // boss cell
  G.cells.push({index:G.slots, x0:cellX(G.slots), x1:cellX(G.slots)+ROOM_W, kind:'boss', traps:[]});
}

/* ============================== PHASE: RUN =============================== */
// Heroes are pre-generated into a queue so the town can preview & sabotage the
// next arrivals. A spec is a lightweight seed; buildHero turns it into a unit.
function genHeroSpec(){
  // Campaign scales heroes by LEVEL (a 50-level run kills hundreds, so spawn-count
  // would explode); Endless keeps the running spawn counter.
  const power = (G.mode==='campaign') ? campPower() : G.heroSeq++;
  // Endless: every CHAMP_EVERY-th arrival is a champion. Campaign champions come
  // only from milestone levels (spawnGroup), never injected here.
  if(G.mode!=='campaign' && power>0 && power%CHAMP_EVERY===0){
    const type=pick(CHAMP_KEYS);
    return {cls:CHAMPIONS[type].cls, power, traits:[], name:rollName(), champion:type, rivalGen:0,
            debuff:{atkMul:1, burn:0, robbed:false}};
  }
  const cls=pickHeroClass();
  // elite chance climbs with progress; later heroes can roll two traits.
  // Elite Vanguard edict pushes both far higher.
  const vanguard=hasEdict('eliteVanguard');
  const eliteChance=clamp((vanguard?0.45:0.06) + power*0.02, 0, vanguard?0.95:0.7);
  const traits=[];
  if(Math.random()<eliteChance){
    const pool=[...TRAIT_KEYS];
    traits.push(pool.splice(ri(0,pool.length-1),1)[0]);
    if((power>=7||vanguard) && Math.random()<(vanguard?0.6:0.35)) traits.push(pool.splice(ri(0,pool.length-1),1)[0]);
  }
  return {cls, power, traits, name:rollName(), rivalGen:0,
          debuff:{atkMul:1, burn:0, robbed:false}};
}
// Pull the next spec, letting a due rival cut the line ahead of fresh heroes.
// (ETA is counted down once per wave in spawnGroup — NOT here, or every queue
//  refill/preview would burn the timer and rivals would return at random.)
function nextSpec(){
  const i=G.pendingRivals.findIndex(r=>r.eta<=0);
  if(i>=0) return G.pendingRivals.splice(i,1)[0].spec;
  return genHeroSpec();
}
function ensureQueue(k){ while(G.queue.length<k) G.queue.push(nextSpec()); }

// A hero who reached the throne swears revenge and returns stronger.
function makeRival(h){
  const gen=(h.rivalGen||0)+1;
  const traits=[...new Set([...(h.specTraits||[]), pick(TRAIT_KEYS)])];
  G.pendingRivals.push({ eta: ri(2,4), spec:{
    cls:h.cls, power:(h.specPower||0)+2+gen, traits,
    name:h.heroName, rivalGen:gen,
    title: RIVAL_TITLES[Math.min(gen-1, RIVAL_TITLES.length-1)],
    rival:true, debuff:{atkMul:1, burn:0, robbed:false}
  }});
}

function pickHeroClass(){
  const r=Math.random();
  if(r<0.4) return 'warrior';
  if(r<0.65) return 'rogue';
  if(r<0.85) return 'mage';
  return 'cleric';
}

// Loot economy. Gold scales gently (softened difficulty) so income doesn't
// balloon as heroes get stronger — power should outpace your purse.
function softGoldD(d){ return 1 + (d-1)*0.45; }
function heroGold(n,d,robbed){ return Math.round((7 + n*2.2)*softGoldD(d)*(robbed?0.35:1)); }
function heroBounty(n,d){ return Math.round((4 + n*1.2)*softGoldD(d)); }

// Preview a spec's headline stats (for the town roster) without instantiating.
function previewStats(spec){
  const c=CLASSES[spec.cls]; const n=spec.power; const d=difficulty();
  let hp=(32 + n*8.5)*c.hp*d, atk=(5 + n*1.6)*c.atk*d;
  if(spec.traits.includes('hardy')) hp*=1.6;
  if(spec.traits.includes('berserk')) atk*=1.4;
  atk*=spec.debuff.atkMul;
  if(spec.champion){ const ch=CHAMPIONS[spec.champion]; hp*=ch.hpMul; atk*=ch.atkMul; }
  return {hp:Math.round(hp), atk:+atk.toFixed(1), gold:heroGold(n,d,spec.debuff.robbed)};
}

// Build a single hero unit from a spec (applies traits, sabotage, schemes).
function buildHeroFromSpec(spec){
  let cls=spec.cls;
  if(G.fx.temple>0 && cls==='cleric') cls='warrior';   // temple burned: no clerics
  const d=difficulty(); const c=CLASSES[cls]; const n=spec.power;
  const tr=spec.traits;
  let hp=(32 + n*8.5) * c.hp * d;
  let atk=(5 + n*1.6) * c.atk * d;
  let armor=c.armor + Math.floor(n*0.45);
  let spd=c.spd;
  let atkSpeed=1;                       // multiplier on attack interval (<1 faster)
  // ---- elite traits ----
  if(tr.includes('hardy'))   hp*=1.6;
  if(tr.includes('berserk')){ atk*=1.4; atkSpeed*=0.65; }
  if(tr.includes('armored')) armor+=6;
  if(tr.includes('swift')){ spd*=1.5; atkSpeed*=0.8; }
  // ---- run edicts (chosen at run start) ----
  if(hasEdict('ironHorde'))    hp*=1.35;
  if(hasEdict('bloodPact'))    atk*=1.25;
  if(hasEdict('swiftRaiders')) spd*=1.30;
  // ---- town sabotage ----
  atk*=spec.debuff.atkMul;
  // ---- champion mini-boss ----
  const champ = spec.champion ? CHAMPIONS[spec.champion] : null;
  let gold=heroGold(n,d,spec.debuff.robbed), bounty=heroBounty(n,d);
  if(champ){ hp*=champ.hpMul; atk*=champ.atkMul; armor+=2; gold=Math.round(gold*2.5); bounty=Math.round(bounty*3); }
  if(spec.king){ hp*=8; atk*=1.3; armor+=10; spd*=0.92; gold=0; bounty=0; }   // 👑 the finale boss-raider (tuned via sim: a solid dungeon wins ~90%, but he can smash rooms, pressure the throne, and end a weak run)
  hp=Math.round(hp); atk=+atk.toFixed(1);
  const h={
    cls, ...c, name:cls, traits:tr,
    elite: tr.length>0 || !!champ,
    heroName: spec.name, title: spec.title || (champ?champ.title:null),
    champion: spec.champion||null, champIc: champ?champ.ic:null, champCol: champ?champ.col:null,
    rival: !!spec.rival, rivalGen: spec.rivalGen||0,
    king: !!spec.king,
    specPower: n, specTraits: tr,
    maxHp:hp, hp:hp, atk, _atkBase:atk, armor, spd, atkSpeed,
    gold, bounty,
    vampiric: tr.includes('vampiric'),
    regen: tr.includes('zealot') || c.selfheal,
    reachedThrone:false,
    x: 8, y: FLOOR-34, yOff:0,
    state:'walking',         // walking | fighting | shopping | boss | dead
    cellIndex:-1,
    atkT:0, hasPotion:false, items:[], burn:0, burnT:0,
    freeze:0, shopT:0, walkAnim:0,
    shieldT:0, specialT:5,   // champion special timers
    spellT:ri(2,6), rallyT:0, blessT:0, evadeT:0, surgeT:0,   // class-spell cooldown + active buff timers
  };
  let startBurn=spec.debuff.burn + (G.fx.well>0 ? 5+Math.floor(n*0.5) : 0);
  if(startBurn>0){ h.burn=startBurn; h.burnT=6; }
  return h;
}

// Spawn a raiding party of n heroes (guild house size) that enter together.
// A champion arrives ALONE — a dramatic mini-boss duel.
// A fresh champion spec (used by campaign milestones — not pulled from the queue).
function champSpec(){
  const type=pick(CHAMP_KEYS);
  return {cls:CHAMPIONS[type].cls, power:campPower(), traits:[], name:rollName(), champion:type, rivalGen:0,
          debuff:{atkMul:1, burn:0, robbed:false}};
}
// Roll the upcoming CAMPAIGN wave exactly once per level and cache it in G.queue,
// so the staging preview, the town roster, and any town meddling all act on the
// SAME specs that will actually raid. (Endless keeps its rolling queue.)
function prepCampaignWave(){
  if(G.mode!=='campaign') return;
  if(G.waveLevel===campLevel()) return;   // already rolled for this level (an emptied
                                          // queue from corruption stays empty — don't re-roll)
  for(const r of G.pendingRivals) r.eta--;                  // rivals tick one wave closer (once per wave)
  const comp=levelComp(campLevel());
  const specs=[];
  for(let i=0;i<comp.champs;i++)  specs.push(champSpec());
  let normals=comp.normals + (hasEdict('warband')?1:0);
  for(let i=0;i<normals;i++)      specs.push(nextSpec());
  if(!specs.length) specs.push(nextSpec());                 // safety: never an empty wave
  G.queue=specs;
  G.waveLevel=campLevel();
}
function spawnGroup(n){
  // 👑 THE KING — a lone finale raider, spawned in place of a normal party.
  if(G.kingDue){
    G.kingDue=false; G.kingFight=true;
    const h=buildHeroFromSpec(kingSpec());
    h.x=-60; h.yOff=-LIFT;                // the King strides in from outside too (same lifted line)
    G.heroes=[h]; G.heroNum++;
    banner('👑 THE HIGH KING', '#ffd34d', 'Fell him and rule forever');
    shake(12); sfx('boss');

    return;
  }
  let specs=[];
  if(G.mode==='campaign'){
    prepCampaignWave();          // ensure the cached wave exists (rivals tick inside)
    specs=G.queue.splice(0);     // consume the exact wave the player just previewed
    G.waveLevel=null;            // force a fresh roll for the next level
  } else {
    for(const r of G.pendingRivals) r.eta--;   // endless: rivals tick per wave here
    ensureQueue(1);
    const champ = !!(G.queue[0] && G.queue[0].champion);
    const count = champ ? 1 : n + (hasEdict('warband')?1:0);   // Warband edict: +1 raider per party
    ensureQueue(count);
    for(let k=0;k<count;k++) specs.push(G.queue.shift());
  }
  if(!specs.length) specs.push(nextSpec());    // never start with no heroes (e.g. corrupted the whole wave)
  G.heroes=[];
  const count=specs.length;
  for(let k=0;k<count;k++){
    const h=buildHeroFromSpec(specs[k]);
    h.x = -56 - k*40;                     // start OUTSIDE the rooms (left of the gate) and march in
    h.yOff = -LIFT;                       // all on the same line, lifted off the floor (matches align tool)
    G.heroes.push(h); G.heroNum++;
  }
  const anyChamp=G.heroes.find(h=>h.champion);
  const anyRival=G.heroes.find(h=>h.rival && !h.champion);
  if(anyChamp){
    banner('⚔️ CHAMPION APPROACHES', anyChamp.champCol||'#ffd34d',
      anyChamp.heroName+(anyChamp.title?' '+anyChamp.title:''));
    shake(8); sfx('boss'); }
  else if(anyRival){
    banner('😡 YOUR RIVAL RETURNS', '#ff5470',
      (anyRival.heroName||'A grudge-bearer')+' remembers your throne');
    shake(6); sfx('boss'); }
  // town-wide schemes last per WAVE, not per hero
  if(G.fx.well>0) G.fx.well--; if(G.fx.smith>0) G.fx.smith--; if(G.fx.temple>0) G.fx.temple--;
  G.waveStartSlain=G.totalSlain; G.waveEnding=false;
  G.hero=leadHero();
}
function leadHero(){
  let best=null;
  for(const h of G.heroes){ if(h.state!=='dead' && (!best || h.x>best.x)) best=h; }
  return best;
}

/* ============================ GOBLIN DEN SPAWNERS ========================
   A pure Goblin Den is a spawner, not a stationary guard. room.goblins is
   an ARRAY of persistent units (each {kills}). Every wave the den adds
   `goblinSpawnRate(lvl)` new units (cap 20). Goblins march LEFT through the
   dungeon (your own traps don't hurt them), attack any hero they meet,
   level up from kills (HP/ATK scale with level), and survivors are banked
   back into the den when the wave ends. Survivors heal to full between
   waves; the slain are gone.
*/
const GOBLIN_DEN_CAP = 20;
const GOBLIN_HP_FRAC = 0.55, GOBLIN_ATK_FRAC = 0.34;   // hp raised: full-atk retaliation 1-shot them
const GOBLIN_SPD = 50;                       // px/sec
const GOBLIN_LVL_MAX = 10;
const GOBLIN_XP_PER_LVL = 3;                 // kills needed for each level up
const GOBLIN_HP_PER_LVL = 0.30;              // +30% maxHp per level
const GOBLIN_ATK_PER_LVL = 0.20;             // +20% atk per level
function goblinSpawnRate(lvl){ return Math.floor(((lvl||1)-1)/2)+1; }   // Lv1-2 → 1, Lv3-4 → 2, Lv5 → 3
function goblinLevel(kills){ return Math.min(GOBLIN_LVL_MAX, 1+Math.floor((kills||0)/GOBLIN_XP_PER_LVL)); }
// Migrate older saves: room.goblins used to be a number (= survivor count).
function ensureGoblinArray(r){
  if(typeof r.goblins==='number'){ const n=r.goblins; r.goblins=[]; for(let i=0;i<n;i++) r.goblins.push({kills:0}); }
  if(!Array.isArray(r.goblins)) r.goblins=[];
  return r.goblins;
}
function spawnDenGoblinsForWave(){
  G.minions = [];
  if(!G.cells) return;
  for(const cell of G.cells){
    if(cell.spawner!=='goblin' || !cell.room) continue;
    const r=cell.room;
    const arr=ensureGoblinArray(r);
    // add this wave's new recruits, respecting the cap
    const add=Math.min(goblinSpawnRate(r.lvl), GOBLIN_DEN_CAP - arr.length);
    for(let i=0;i<add;i++) arr.push({kills:0});
    // derive per-goblin base stats from room state, then scale per individual level
    const parts=roomParts(r); const sI=synergyInfo(parts); const syn=sI.m + (parts.length>1?(RB.synergy||0):0);
    const def=ROOMS.goblin; const bas=bastionMul(), bm=barracksMul(), vm=vetMul(r);
    const feed=feedMul(r.kills||0);
    const baseHp =Math.round(def.hp *(0.9+(r.lvl-1)*0.85)*feed*bas*syn*vm*(1+(RB.monHp ||0))*bm);
    const baseAtk=Math.round(def.atk*(1.0+(r.lvl-1)*0.9 )*feed*bas*syn*vm*(1+(RB.monDmg||0))*bm);
    arr.forEach((unit,i)=>{
      const lvl=goblinLevel(unit.kills);
      const hp =Math.max(2, Math.round(baseHp *GOBLIN_HP_FRAC *(1+(lvl-1)*GOBLIN_HP_PER_LVL )));
      const atk=Math.max(1, Math.round(baseAtk*GOBLIN_ATK_FRAC*(1+(lvl-1)*GOBLIN_ATK_PER_LVL)));
      G.minions.push({
        type:'goblin', home:cell.index, _src:unit,
        x: cell.x0 + ROOM_W*(0.55 + (i%6)*0.04),
        y: FLOOR,
        hp, maxHp:hp, atk,
        atkT: 0.4 + Math.random()*0.6,
        state:'walking', cellIndex:cell.index, walkAnim:Math.random()*6,
        kills: unit.kills||0, lvl
      });
    });
  }
}
function endWaveGoblins(){
  if(!G.minions) return;
  const byHome={};
  for(const g of G.minions){ if(g.hp>0) (byHome[g.home]=byHome[g.home]||[]).push({kills:g.kills||0}); }
  if(G.cells) for(const cell of G.cells){
    if(cell.spawner!=='goblin' || !cell.room) continue;
    cell.room.goblins = byHome[cell.index] || [];
  }
  G.minions = [];
}
function goblinValidTarget(g, h){
  return !!(h && (G.heroes||[]).includes(h) && h.hp>0 && h.state!=='dead' && h.x>=0 && h.cellIndex===g.cellIndex);
}
function goblinStep(g, dt){
  if(g.hp<=0){ g.engaged=null; return; }
  const c = cellAt(g.x); if(c) g.cellIndex=c.index;
  // LOCK onto a hero and hold until one of us dies — so we fight to the finish
  // instead of landing one hit and clipping straight through.
  let target = goblinValidTarget(g, g.engaged) ? g.engaged : null;
  if(!target){
    let bestDx=Infinity;
    for(const h of (G.heroes||[])){
      if(!goblinValidTarget(g,h)) continue;
      const dx=Math.abs(h.x-g.x); if(dx<bestDx){ bestDx=dx; target=h; }
    }
    g.engaged=target;
  }
  if(target){
    g.state='fighting';
    const dx=target.x-g.x;
    if(Math.abs(dx)>16) g.x += Math.sign(dx)*GOBLIN_SPD*dt;   // close in, then hold the line
    g.walkAnim += dt*8;
    g.atkT -= dt;
    if(g.atkT<=0){
      g.atkT = 0.9;
      target.hp -= g.atk;
      floater(target.x, target.y-40, '-'+g.atk, '#5fae54');
      burst(target.x, target.y-22, '#5fae54', 4);
      if(target.hp<=0){
        target.hp=0; g.engaged=null;
        // 👺 the killing blow earns the goblin XP — level shown next wave
        g.kills=(g.kills||0)+1;
        const newLvl=goblinLevel(g.kills);
        if(newLvl>g.lvl){ g.lvl=newLvl; floater(g.x, g.y-58, 'LVL '+newLvl+' ⭐', '#ffd34d', true); sfx('combo'); }
        heroDies(target);
      } else {
        // the hero swings back each exchange (40% of its atk) — the trade
        // continues until the goblin or the hero falls
        const back=Math.max(1, Math.round((target.atk||1)*0.4));
        g.hp -= back;
        floater(g.x, g.y-40, '-'+back, '#ff7a8a');
        if(g.hp<=0){ g.hp=0; g.engaged=null; burst(g.x, g.y-18, '#5fae54', 14); sfx('hit'); }
      }
    }
    return;
  }
  g.state='walking'; g.engaged=null;
  g.x -= GOBLIN_SPD*dt;
  g.walkAnim += dt*8;
  if(g.x < 6) g.x = 6;
}
function goblinTick(dt){
  if(!G.minions || !G.minions.length) return;
  for(const g of G.minions) goblinStep(g, dt);
  G.minions = G.minions.filter(g=>g.hp>0);
}
// One marching den goblin with its own animation state (walk / slash clips
// from the LPC sheet, facing LEFT like stationed guards). Falls back to the
// procedural drawMonster while the sheet isn't loaded.
function drawDenGoblinSprite(g, sx, clipName){

  const name = clipName || (g.state==='fighting' ? cfg.atk : 'walk');

  if(!img||!img._ok) return false;
  const now=performance.now();
  if(g._mc!==name){ g._mc=name; g._mt=0; }
  const dtm=Math.min(0.1,(now-(g._ml||now))/1000); g._ml=now;
  g._mt=(g._mt||0)+dtm;
  const frame=Math.floor(g._mt*clip.fps)%clip.n;
  const S=cfg.scale, srcX=frame*clip.fw, srcY=cfg.dirRow*clip.fh;
  const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=false;
  X.drawImage(img, srcX,srcY,clip.fw,clip.fh,
    Math.round(sx-clip.ax*S), Math.round(FLOOR-LIFT-clip.ay*S), Math.round(clip.fw*S), Math.round(clip.fh*S));
  X.imageSmoothingEnabled=sm;

}
function drawDenGoblins(tx){
  if(!G.minions || !G.minions.length) return;
  for(const g of G.minions){

    const sx=tx(g.x);

      X.fillText('⭐'+g.lvl, sx, g.y-52); X.textAlign='left';
    }

}
// Is h the frontmost (enemy-facing) hero in its current fight/boss group?
function isFrontHero(h){
  for(const o of G.heroes){
    if(o===h || o.state==='dead') continue;
    if(h.state==='boss'){ if(o.state==='boss' && o.x>h.x) return false; }
    else if(o.cellIndex===h.cellIndex && (o.state==='fighting'||o.state==='walking') && o.x>h.x) return false;
  }
  return true;
}

function heroDmg(h, raw, pierce){
  let armor = pierce==='full' ? 0 : pierce ? Math.max(0,h.armor-3) : h.armor;
  if(h.acid>0) armor=Math.max(0, armor - h.acid);     // Acid corrodes armor so later hits bite
  return Math.max(1, Math.round(raw - armor));
}
// While a ROOM (trap or guard) is dealing damage this is set to it, so the
// battle report can attribute every point — including nested reaction chains —
// to the room that caused it. Anything outside a room context = boss/elements.
let _roomDmgCtx=null;
function dealToHero(h, raw, label, pierce, elem, noDodge){
  if(!h||h.state==='dead') return;
  // rogue dodge (an aimed Smite can't be dodged)
  const dodgeCh=(h.dodge||0)+(h.evadeT>0?0.25:0);   // 🗡️ Evasion spell adds dodge
  if(!noDodge && dodgeCh>0 && Math.random()<dodgeCh){ floater(h.x, h.y-50,'DODGE','#9adfff'); return; }
  let dmg=heroDmg(h,raw,pierce);
  const crit = Math.random()<0.12;              // your dungeon can land critical hits
  if(crit) dmg*=2;
  if(h.shieldT>0){ dmg=Math.max(1,Math.round(dmg*0.4)); }   // champion shield (−60%)
  // 🎯 DETONATE — a Hex Brand makes the NEXT hit on a marked hero hit far harder
  if(h.mark>0 && label!=='HEAL'){ dmg=Math.round(dmg*(1+MARK_AMP)); h.mark=0;
    floater(h.x, h.y-66, '🎯 DETONATE', '#ff5470'); burst(h.x,h.y-24,'#ff5470',16); sfx('crit'); if(G.stats)G.stats.reactions++; }
  h.hp-=dmg;
  h.dmgTaken=(h.dmgTaken||0)+dmg;               // telemetry: how much your dungeon stripped from this hero
  if(G.stats){ if(_roomDmgCtx) _roomDmgCtx.dmg=(_roomDmgCtx.dmg||0)+dmg;
    else if(label!=='HEAL') G.stats.abilDmg=(G.stats.abilDmg||0)+dmg; }   // boss abilities / Smite / elements
  if(crit){ floater(h.x, h.y-52, 'CRIT -'+dmg, '#ffd34d'); burst(h.x,h.y-20,'#ffd34d',12);
    shake(6); hitStop=0.05; sfx('crit'); }
  else { floater(h.x+ri(-8,8), h.y-44, '-'+dmg, label==='HEAL'?'#7bdc6b':'#ff7a8a');
    burst(h.x, h.y-20, '#ff4d6d', 6); sfx('hit'); }
  if(h.hp<=0){ h.hp=0; heroDies(h); return; }
  elementReact(h, elem||'phys', dmg);           // elemental status + reactions
}
// Apply an element's status to a hero and resolve reactions with existing ones.
// Elemental priming & reactions are a KEY mechanic: traps coat heroes with a
// status that PERSISTS as they walk the corridor, so the ORDER of your rooms
// decides the combo. Oil them first, then a later flame room IGNITES; chill
// then crush to SHATTER; oil then frost to ENCASE; etc. Each reaction a hero
// suffers in quick succession escalates the next (reaction chain).
const PRIME_OIL=12, PRIME_ICE=10, PRIME_SHOCK=9;   // long enough to cross rooms
const MARK_AMP=1.2;                                // 🎯 Hex Brand: the next hit deals +120%
const POISON_CAP=10;                               // ☠️ poison stacks cap (keeps Combust from snowballing)
// Teach the ordering combos in tooltips. Element → how to chain it across rooms.
const ELEM_COMBO={
  oil:  'Coats heroes (slows them) and primes them. Put it <b>before</b> a 🔥flame (Ignite), ⚡tesla (Conduct) or ❄frost (Encase) room.',
  fire: '🔥 Ignites <b>oiled</b> heroes, ☠️ <b>Combusts</b> poisoned ones, and 💥 thermal-shocks <b>chilled</b> ones. Put it <b>after</b> an oil, venom or frost room.',
  ice:  '❄ Chills (slows); a later phys/shock hit then <b>Shatters</b>. Encases <b>oiled</b> heroes. Put before crushers, or after oil.',
  shock:'⚡ Conducts through <b>oiled</b> heroes to the party, and ⚡ <b>Overloads</b> (stuns) <b>chilled</b> ones. Put it <b>after</b> an oil or frost room.',
  phys: '💥 Shatters <b>chilled/frozen</b> heroes for a burst. Put it <b>after</b> a frost room.',
};
function reactMul(h){ return (1 + Math.min(h.reactCount||0, 4)*0.25) * (hasMandate('conductor')?1.3:1); }   // escalating chain (capped at +100%); Conductor mandate +50%
function popReact(h,label,col,x){
  h.reactCount=(h.reactCount||0)+1; h.reactT=3;              // combo window
  if(G.stats) G.stats.reactions++;                           // telemetry: elemental combos landed
  const chain=h.reactCount;
  floater(h.x,h.y-66, label+(chain>1?' ×'+chain:'')+' -'+x, col, chain>=3);   // chains pop big
  burst(h.x,h.y-24,col,16+Math.min(chain,6)*3); shake(6+Math.min(chain,6)); sfx('crit');
  if(chain>=3) flash(col, Math.min(0.3, 0.10+chain*0.03), 0.22);             // escalating reaction spectacle
  if(chain>=4) slowmo(0.25);
  gainRage(2);                                                                // reactions feed Overdrive
}
function elementReact(h, elem, baseDmg){
  if(!h || h.state==='dead') return;
  const rm=reactMul(h);          // snapshot once — a single hit can't self-amplify across its own reactions
  // priming statuses — refreshed while in the room, then carried down the hall
  if(elem==='oil')  h.oil  =Math.max(h.oil||0,  PRIME_OIL);
  else if(elem==='ice')  h.chill=Math.max(h.chill||0,PRIME_ICE);
  else if(elem==='shock') h.shock=Math.max(h.shock||0,PRIME_SHOCK);

  // 🔥 IGNITE — fire on an OILED hero: the oil flashes off in a heavy burst + burn
  if(elem==='fire' && h.oil>0){
    h.oil=0; const x=Math.round((baseDmg*1.3+18)*rm); h.hp-=x;
    h.burn=(h.burn||0)+10; h.burnT=5; popReact(h,'🔥 IGNITE','#ff7a2e',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ☠️ COMBUST — fire on a POISONED hero detonates the venom for a stack-scaled burst
  if(elem==='fire' && h.poison>0){
    const x=Math.round((Math.min(h.poison,POISON_CAP)*3 + baseDmg*0.5 + 8)*rm); h.hp-=x; h.poison=0; h.poisonT=0;
    popReact(h,'☠️ COMBUST','#9be86b',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ⚡ OVERLOAD — lightning on a CHILLED hero stuns them solid
  if(elem==='shock' && h.chill>0 && !(h.freeze>0)){
    const x=Math.round((baseDmg*0.6+8)*rm); h.hp-=x; h.chill=0; h.freeze=1.2;
    popReact(h,'⚡ OVERLOAD','#fff34d',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // 🧊 ENCASE — ice on an OILED hero: wet + cold freezes them SOLID (a sitting duck)
  else if(elem==='ice' && h.oil>0 && !(h.freeze>0)){
    const x=Math.round((baseDmg*0.7+8)*rm); h.hp-=x;
    h.freeze=2.0; h.chill=PRIME_ICE; popReact(h,'🧊 ENCASE','#bfefff',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ❄ SHATTER — a phys/shock impact on a CHILLED/frozen hero cracks the ice
  if((elem==='phys'||elem==='shock') && (h.chill>0||h.freeze>0)){
    h.chill=0; const x=Math.round((baseDmg*0.9+12)*rm); h.hp-=x;
    popReact(h,'❄ SHATTER','#9adfff',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // 💥 THERMAL SHOCK — opposite temperatures: fire on a CHILLED hero, or ice on a
  // BURNING hero. The sudden swing cracks them for a burst.
  if((elem==='fire' && h.chill>0) || (elem==='ice' && h.burn>0)){
    const x=Math.round((baseDmg*1.0+12)*rm); h.hp-=x;
    if(elem==='fire') h.chill=0; else { h.burn=0; h.burnT=0; }
    popReact(h,'💥 THERMAL SHOCK','#ff5470',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ⚡ CONDUCT — lightning on an OILED (wet) hero arcs to the rest of the party.
  // Oil is NOT consumed, so a wet hero can still be ignited afterwards.
  if(elem==='shock' && h.oil>0){
    let arced=0;
    for(const o of G.heroes){ if(o===h||o.state==='dead') continue;
      const cd=Math.round(baseDmg*0.6*rm); o.hp-=cd; floater(o.x,o.y-50,'⚡-'+cd,'#fff34d'); burst(o.x,o.y-20,'#fff34d',6);
      arced++; if(o.hp<=0){o.hp=0;heroDies(o);} }
    if(arced){ h.reactCount=(h.reactCount||0)+1; h.reactT=3;
      floater(h.x,h.y-66,'⚡ CONDUCT ×'+arced,'#fff34d'); shake(5); sfx('crit'); }
  }
}
function healBoss(amt){
  const b=G.boss; const before=b.hp;
  b.hp=Math.min(b.maxHp,b.hp+amt);
  if(b.hp>before){ floater(bossX(), FLOOR-90, '+'+Math.round(b.hp-before), '#7bdc6b');
    burst(bossX(), FLOOR-50, '#7bdc6b', 8); }
}
function bossX(){ return cellX(G.slots)+ROOM_W*0.6; }
// 🔮 Boss ability bolts — a glowing projectile that flies from the throne, ACROSS
// the rooms, to the target, so every ability visibly originates from the boss.
let bossBolts=[];
function bossBolt(tx,ty,col,ic){
  if(!G||!G.boss) return;
  bossBolts.push({ x0:bossX(), y0:(typeof bossCastY==='function'?bossCastY():FLOOR-110),
    x1:tx, y1:(ty!=null?ty-28:FLOOR-40), t:0, dur:0.30, col:col||G.boss.col||'#ff5470', ic:ic||'' });
}

function castAbility(slot){
  if(G.phase!=='run') return;
  const target=leadHero();
  if(!target){ return; }
  const a=G.boss.abil[slot]; const def=a&&ABIL[a.id];
  if(!def){ return; }
  const cost=abilCost(def.cost);
  if(a.cd>0){ showHint(def.name+' on cooldown.'); return; }
  if(G.boss.mana<cost){ showHint('Not enough mana.'); return; }
  G.boss.mana-=cost; a.cd=def.cd*(1-(RB.abilCd||0));
  def.run(target);
  // bolt(s) from the boss to the target(s) so you see where the power comes from
  const living=(G.heroes||[]).filter(h=>h&&h.state!=='dead');
  if(def.aoe && living.length) living.forEach(h=>bossBolt(h.x, h.y, G.boss.col, def.ic));
  else bossBolt(target.x, target.y, G.boss.col, def.ic);
  burst(bossX(), bossCastY(), G.boss.col, 12);
  shake(5); sfx('cast');
  render();
}

// ---- Smite: an active, AIMED boss strike for the throne stand ----
// Heroes who reach the throne used to be a near-automatic loss you only watched.
// Smite is a free, no-mana burst on a SHORT cooldown that you fire by hand —
// tap a hero on your throne to aim it (or the button / spacebar hits the
// front-most). The skill is choosing the moment and the target: finish a
// wounded raider, or focus the champion before it chunks your HP.
const SMITE_MUL=2.4, SMITE_CD=1.6;
const RAGE_MAX=100;                 // 💥 Overdrive meter — fills as you fight, unleashes a screen-clearing wrath
function gainRage(n){ const b=G&&G.boss; if(b) b.rage=Math.min(RAGE_MAX,(b.rage||0)+n); }
function throneHeroes(){ return (G && G.heroes) ? G.heroes.filter(h=>h && h.state==='boss' && h.hp>0) : []; }
function smite(target){
  if(G.phase!=='run' || !G.boss) return;
  const b=G.boss;
  const at=throneHeroes();
  if(!at.length){ showHint('No hero has reached the throne to smite.'); return; }
  if((b.smiteCd||0)>0){ showHint('⚔️ Smite is recharging.'); return; }
  // aim: the tapped hero if it's at the throne, else the front-most (closest to the boss)
  const t=(target && target.state==='boss' && target.hp>0) ? target : at.reduce((a,c)=>c.x>a.x?c:a, at[0]);
  const dmg=Math.max(1, Math.round(b.atk*SMITE_MUL*(1+(RB.abilDmg||0))));
  b.smiteCd=SMITE_CD*(1-(RB.abilCd||0));
  bossBolt(t.x, t.y, '#ffd34d', '⚔️');
  floater(t.x, t.y-72, '⚔️ SMITE', '#ffd34d'); burst(t.x, t.y-24, '#ffd34d', 22);
  shake(8); hitStop=0.05; sfx('crit');
  dealToHero(t, dmg, 'SMITE', false, 'phys', true);   // aimed → ignores dodge
  renderPanel();
}
// 💥 OVERDRIVE — when the Rage meter is full, unleash a screen-clearing wrath:
// a heavy armor-piercing blast on EVERY living raider, leaving survivors burning
// and chilled. The signature power-fantasy moment.
let overdriveT=0;
function castOverdrive(){
  if(G.phase!=='run' || !G.boss) return;
  const b=G.boss;
  if((b.rage||0) < RAGE_MAX){ showHint('💥 Overdrive is still charging.'); return; }
  b.rage=0;
  // cinematic
  flash(b.col||'#ff5470', 0.55, 0.55); slowmo(0.7); shake(16); sfx('relic'); hitStop=0.06;
  floater(bossX(), FLOOR-150, '💥 OVERDRIVE!', b.col||'#ff5470', true);
  overdriveT=0.6;                                   // drives the corridor shockwave in draw()
  const living=(G.heroes||[]).filter(h=>h && h.state!=='dead');
  for(const h of living){
    const dmg=Math.round(h.maxHp*0.45 + 25 + (b.lvl||1)*6);
    burst(h.x, h.y-24, b.col||'#ff5470', 18);
    dealToHero(h, dmg, 'OVERDRIVE', 'full', null, true);   // pierces all armor, can't be dodged
    if(h.state!=='dead'){ h.burn=(h.burn||0)+8; h.burnT=4; h.chill=Math.max(h.chill||0,3); }
  }
  renderPanel();
}

function heroDies(h){
  if(!h || h.state==='dead') return;
  h.state='dead'; h.diedAt=performance.now();   // drives the death animation
  // 👑 The King falls — the realm is yours forever.
  if(h.king){
    G.totalSlain++;
    burst(h.x, h.y-30, '#ffd34d', 64); burst(h.x,h.y-60,'#fff',40);
    floater(h.x, h.y-96, '👑 THE KING IS SLAIN!', '#ffd34d', true);
    flash('#ffd34d', 0.5, 0.6); slowmo(0.5); shake(16); sfx('relic');
    trueVictory(); return;
  }
  // loot: carried gold + bounty (threat dial + rune bonuses)
  // loot the hero's full purse (incl. what they spent at your shop — that sale was pure profit on top)
  const loot=Math.round((h.gold + (h.spent||0) + h.bounty) * (1 + G.bounty*0.12) * (1+(RB.loot||0)) * (hasEdict('leanCoffers')?0.60:1) * (hasMandate('goldVeins')?1.3:1)) + (RB.goldKill||0);
  G.gold+=loot;
  // dread: 1 base + per trait + bonus for elites/rivals/throne-reachers + runes
  const dread=1 + h.traits.length + (h.elite?1:0) + (h.rival?2:0) + (h.reachedThrone?1:0)
    + (RB.dreadKill||0) + townDreadKill() + (h.elite?(RB.eliteDread||0):0) + (h.reachedThrone?(RB.throneDread||0):0);
  G.dread+=dread;
  G.survived++; G.totalSlain++;
  // Loot drop: 20% wood / 20% stone / 20% rune / 10% shards / 30% nothing. Champions roll twice.
  if(!G.drops) G.drops={wood:0,stone:0,shards:0,runes:0};
  const lootRolls = h.champion ? 2 : 1;
  for(let i=0;i<lootRolls;i++){
    const r=Math.random();
    if(r<0.20){      G.drops.wood++;   floater(h.x, h.y-66-i*16, '+1 🪵', '#b58a4e'); }
    else if(r<0.40){ G.drops.stone++;  floater(h.x, h.y-66-i*16, '+1 🪨', '#a8a8b4'); }
    else if(r<0.60){ G.drops.runes++;  floater(h.x, h.y-66-i*16, '+1 ᚱ',  '#b985ff'); }
    else if(r<0.70){ G.drops.shards++; floater(h.x, h.y-66-i*16, '+1 💠', '#9adfff'); }
  }
  // Devour passive: the boss feasts on the fallen
  if(G.boss.feed) healBoss(Math.round(G.boss.maxHp*G.boss.feed));
  if(hasMandate('bloodthrone')) healBoss(Math.round(G.boss.maxHp*0.03));   // Bloodthrone mandate: heal per kill
  // Gluttony doctrine: every kill permanently grows the boss
  if(G.boss.doc==='gluttony'){ G.boss.maxHp+=5; G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+5); G.boss.atk+=0.6;
    floater(bossX(), FLOOR-110, '😋 GROW', '#b0563a'); }
  // kill streak: rewards an airtight dungeon (resets if a hero strikes the boss)
  G.combo=(G.combo||0)+1;
  let comboBonus=0;
  if(G.combo>=3){ comboBonus=G.combo; G.gold+=comboBonus;
    floater(h.x, h.y-78, '🔥 COMBO x'+G.combo+' +'+comboBonus+'g', '#ff9a3a'); sfx('combo'); }
  comboCallout(G.combo, h.x);
  gainRage(8);                                  // 💥 every kill stokes the boss's wrath
  // room XP: credit the room the hero was IN when it fell (toward fusing a 2nd
  // part / veteran ranks). Use the tracked cellIndex, not the raw x — a kill a
  // pixel past a boundary used to lose its credit.
  const dcell=(h.cellIndex>=0 && h.cellIndex<G.cells.length) ? G.cells[h.cellIndex] : cellAt(h.x);
  if(dcell && dcell.room && dcell.room.def.kind!=='shop'){
    dcell.room.kills=(dcell.room.kills||0)+1;
  }
  // a hero who touched the throne returns with a grudge
  if(h.reachedThrone) makeRival(h);
  burst(h.x, h.y-20, '#ffd34d', 22);
  floater(h.x, h.y-60, '+'+loot+'g', '#ffd34d');
  floater(h.x+18, h.y-44, '+'+dread+'☠', '#b985ff');
  shake(4); sfx('kill');
  // extra juice for the heroes that matter most
  if(h.elite && !h.champion){ burst(h.x,h.y-24,'#ffd34d',16); flash('#ffd34d',0.18,0.22); shake(6); }
  if(h.reachedThrone && !h.champion){ flash('#9be86b',0.16,0.2); }
  const nm = h.heroName ? h.heroName+(h.title?' '+h.title:'') : CLASSES[h.cls].name;
  if(h.champion){
    // a felled champion is a big payday + a guaranteed relic
    G.dread+=6; G.relicDue=true;
    floater(h.x, h.y-92, '👑 CHAMPION SLAIN! 🏺', h.champCol||'#ffd34d', true); burst(h.x,h.y-30,h.champCol||'#ffd34d',46);
    flash(h.champCol||'#ffd34d', 0.4, 0.45); slowmo(0.55); shake(12); sfx('relic');
    showHint('🏆 '+nm+' is slain! Big loot + a relic awaits.');
  } else {
    showHint(nm+' slain! +'+loot+'g, +'+dread+' dread'+(h.reachedThrone?' — but they vow to return…':'.'));
  }
  tutEvent('kill');
}

// Called once after the whole raiding party is wiped out.
function afterWave(){
  if(G.phase!=='run') return;          // run already ended (closed/lost/won) — don't resurrect it
  G.waveEnding=false;
  endWaveGoblins();                    // bank surviving goblins back into their dens
  if(G.mode==='campaign'){ campaignAdvance(); return; }   // each wave cleared = a level beaten
  // Endless: town every 5 kills, relic every 10, mandate every 25
  G.townDue = Math.floor(G.waveStartSlain/5) !== Math.floor(G.totalSlain/5);
  G.relicDue = Math.floor(G.waveStartSlain/10) !== Math.floor(G.totalSlain/10);
  G.mandateDue = Math.floor(G.waveStartSlain/25) !== Math.floor(G.totalSlain/25);
  gotoReward();
}
// Campaign: a wave was just cleared → bank gold, hand out milestone rewards, and
// advance to the next level. (Level 50 cleared → the finale.)
function campaignAdvance(){
  const L=campLevel();                       // the level just beaten (1..50)
  if(L>=CAMP_LEVELS){ campaignVictory(); return; }
  G.gold += 25 + L*4;                          // per-level gold
  if(L%5===0){
    if((L/5)%2===0){ G.mandateDue=true; G.townDue=true; }   // 10,20,30,40 → 📜 mandate + 🏚 town
    else { G.relicDue=true; }                               // 5,15,25,35,45 → 🏺 relic
    showHint('★ Level '+L+' cleared — milestone reward!');
  }
  G.levelIdx++;                                // next level
  gotoReward();                                // card draft → (relic/mandate/town flags) → build next level
}

// The King: a lone, colossal raider who shrugs off corruption and smashes rooms.
function kingSpec(){
  return {cls:'warrior', power:campPower(), traits:[], name:'The High King', title:'', king:true,
          debuff:{atkMul:1, burn:0, robbed:false}};
}
function destroyRoom(cell){
  const idx=cell.index;
  if(idx<0 || idx>=G.rooms.length || !G.rooms[idx]) return;
  const nm=roomName(G.rooms[idx]);
  G.rooms[idx]=null;
  cell.room=null; cell.traps=[]; cell.mon=null; cell.mon2=null; cell.mon3=null; cell.shop=false; cell.syn=1; cell.ampSelf=0; cell.totem=false;
  burst(cell.x0+ROOM_W/2, FLOOR-30, '#ff5470', 42); burst(cell.x0+ROOM_W/2, FLOOR-64,'#ffd34d',28);
  floater(cell.x0+ROOM_W/2, FLOOR-100, '💥 '+nm+' SMASHED!', '#ff5470', true);
  shake(12); flash('#ff5470',0.22,0.3); sfx('lose');
  showHint('👑 The King smashes your '+nm+'!');
}
function trueVictory(){
  if(G.phase==='win') return;
  G.phase='win'; overlay.classList.add('show'); sfx('win');
  // 👑 ASCENSION: every crown taken raises the next campaign's difficulty —

    <div style="font-size:60px">${G.boss.ic}👑💔</div>

       challenge you — ${G.boss.name} rules the realm <b>eternal</b>, having buried
       <b>${G.totalSlain}</b> heroes and a king.</p>
    <p style="color:#c79bff">👑 <b>ASCENSION ${RUNES.asc}</b> — from now on the realm sends stronger heroes (+${Math.round(RUNES.asc*18)}% campaign difficulty). Prove it again.</p>
    ${battleReportHTML()}
    <p style="color:#ffd34d">🔮 +${earned} rune points (${RUNES.points}◆ total)</p>
    ${townGainLine('kept')}
    ${G.newUnlocks&&G.newUnlocks.length?`<p style="color:#6ad97e">🔓 Unlocked: ${G.newUnlocks.map(u=>(u.ic||'')+' '+(u.name||u)).join(', ')}!</p>`:''}
    <div class="menu-btns">
      <button class="go" onclick="gotoMenu()">★ Main menu</button>
      <button onclick="openRunes()">🔮 Rune Page</button>
