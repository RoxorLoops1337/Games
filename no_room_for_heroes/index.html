function bossDies(){
  const b=G.boss;
  // Phylactery: rise once instead of falling
  if(b.reviveHp && !b.revived){
    b.revived=true; b.hp=Math.round(b.maxHp*b.reviveHp); b.mana=b.maxMana;
    b.reviveT=1.4;                                  // brief invulnerability so a 2nd throne hero can't re-kill instantly
    for(const o of (G.heroes||[])){ if(o.state==='boss'){ o.state='walking'; o.x=cellX(G.slots)-12; o.atkT=0.6; } }  // blast them off the throne
    floater(bossX(), FLOOR-100, '☠️ THE LICH RISES!', '#7ad0c0'); burst(bossX(),FLOOR-50,'#7ad0c0',30);
    shake(10); sfx('relic'); showHint('Phylactery! '+b.name+' claws back from death.');
    return;
  }
  G.phase='lose'; overlay.classList.add('show');
  shake(12); sfx('lose');
  const earned=awardRunes();
  lbAutoSubmit();                                // endless: auto-push the run to the public board
  const keep=deathKeep(), lostPct=Math.round((1-keep)*100);
  bankResources(keep, false);                    // keep your Vault fraction; no gold bonus on a death
  const score = G.kingFight
    ? `So close — the High King breached the throne after you survived all ${CAMP_LEVELS} waves. The crown endures… this time.`
    : G.mode==='campaign'
    ? `You fell on Level ${campLevel()}/${CAMP_LEVELS} after slaying ${totalKills()} heroes.`
    : `You reigned ${G.survived} heroes before the throne fell.`;
  const summary=`<h1 style="color:#ff6b8a">THE THRONE HAS FALLEN</h1>
    <div style="font-size:54px">${G.boss.ic}💔</div>
    ${buildPostmortem()}
    ${battleReportHTML()}
    <p>${score}</p>
    <p style="opacity:.7">Dead is dead — the fallen throne swallowed <b>${lostPct}%</b> of your haul. Next time, <b>close the dungeon</b> to keep it all.${townLvl('vault')<3?' (A bigger 🏦 Vault keeps more.)':''}</p>
    <p style="color:#ffd34d">🔮 +${earned} rune points earned (${RUNES.points}◆ total)</p>
    ${townGainLine('kept')}
    ${G.newUnlocks&&G.newUnlocks.length?`<p style="color:#6ad97e">🔓 Unlocked: ${G.newUnlocks.map(u=>(u.ic||'')+' '+(u.name||u)).join(', ')}!</p>`:''}
    <div class="menu-btns">
      <button class="go" onclick="openRunes()">🔮 Rune Page</button>
      <button onclick="openTownBuilder()">🏗️ Town Builder</button>
      ${G.mode==='endless'?'<button onclick="openLeaderboard()">🏆 Leaderboard</button>':''}
      <button onclick="gotoMenu()">Main menu</button>
    </div>`;
  aftermathSequence(earned, summary);
}
// One-line summary of the Wood/Stone/Shards a run banked for the Town Builder.
function townGainLine(verb){
  const g=G.townGain; if(!g||(g.wood+g.stone+g.shards<=0)) return '';
  const p=[]; if(g.wood)p.push('🪵 '+g.wood); if(g.stone)p.push('🪨 '+g.stone); if(g.shards)p.push('🔮 '+g.shards);
  return `<p style="color:#d6a86a">🏗️ Town resources ${verb||'banked'}: +${p.join(' · ')}</p>`;
}
/* ===================== AFTERMATH — animated reward reveal =================
   Before the final summary, play a little sequence: rune points fly into a book
   (plop), town resources fly into a chest (ching), then each unlock spin-zooms in
   to be tapped through. Skip jumps straight to the summary. */
let _amTimers=[], _amQueue=[], _amSummary=null;
function amClearTimers(){ _amTimers.forEach(t=>clearTimeout(t)); _amTimers=[]; }
function amSched(fn,ms){ const t=setTimeout(fn,ms); _amTimers.push(t); return t; }
function amSetText(id,txt){ const e=document.getElementById(id); if(e) e.textContent=txt; }
function amPop(id){ const e=document.getElementById(id); if(e){ e.classList.remove('ampop'); void e.offsetWidth; e.classList.add('ampop'); } }
function amSpawnFly(icon,color,targetId){
  const tgt=document.getElementById(targetId); if(!tgt||!overlay) return;
  const o=overlay.getBoundingClientRect(), t=tgt.getBoundingClientRect();
  const tx=t.left-o.left+t.width/2, ty=t.top-o.top+t.height/2;
  const sx=o.width*0.5+(Math.random()*220-110), sy=o.height*0.80;
  const el=document.createElement('div'); el.className='flyicon'; el.textContent=icon; if(color) el.style.color=color;
  el.style.left=sx+'px'; el.style.top=sy+'px'; overlay.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.transform='translate('+(tx-sx)+'px,'+(ty-sy)+'px) scale(.4)'; el.style.opacity='.15'; }));
  amSched(()=>el.remove(),720);
}
function aftermathSequence(earned, summaryHtml){
  _amSummary=summaryHtml; amClearTimers();
  const g=G.townGain||{wood:0,stone:0,shards:0};
  const unlocks=(G.newUnlocks||[]).slice();
  _amQueue=[];
  if(earned>0) _amQueue.push({t:'runes',n:earned});
  if((g.wood||0)+(g.stone||0)+(g.shards||0)>0) _amQueue.push({t:'res',g});
  unlocks.forEach(u=>_amQueue.push({t:'unlock',u}));
  overlay.classList.add('show');
  if(!_amQueue.length){ amShowSummary(); return; }   // nothing to celebrate → straight to summary
  overlay.innerHTML='<div id="amstage" class="amstage"></div>'+
    '<div class="menu-btns" style="margin-top:12px"><button onclick="amSkip()">Skip ⏭</button></div>';
  amNext();
}
function amNext(){
  amClearTimers();
  const st=_amQueue.shift();
  if(!st){ amShowSummary(); return; }
  if(st.t==='runes') amStageRunes(st.n);
  else if(st.t==='res') amStageRes(st.g);
  else amStageUnlock(st.u);
}
function amStageRunes(n){
  const s=document.getElementById('amstage'); if(!s){ amNext(); return; }
  s.innerHTML='<div class="amtitle">🔮 Rune points earned</div><div class="ambook" id="amtgt">📖</div><div class="amcount" id="amcount">0 ◆</div>';
  const N=Math.max(1,Math.min(n,25)), travel=520, stagger=Math.max(45,Math.min(150,1000/N));
  for(let i=0;i<N;i++){
    amSched(()=>amSpawnFly('◆','#ffd34d','amtgt'), i*stagger);
    amSched(()=>{ sfx('plop'); amSetText('amcount', Math.min(n,Math.round((i+1)*(n/N)))+' ◆'); amPop('amtgt'); }, i*stagger+travel);
  }
  amSched(()=>{ amSetText('amcount', n+' ◆'); amNext(); }, N*stagger+travel+750);
}
function amStageRes(g){
  const s=document.getElementById('amstage'); if(!s){ amNext(); return; }
  s.innerHTML='<div class="amtitle">🏗️ Town resources gathered</div><div class="amchest" id="amtgt">🧰</div><div class="amcount" id="amcount"></div>';
  const types=[['wood','🪵','#d6a86a'],['stone','🪨','#c8cdd6'],['shards','🔮','#c79bff']].filter(t=>g[t[0]]>0);
  const got={wood:0,stone:0,shards:0};
  const draw=()=>amSetText('amcount', types.map(t=>t[1]+' '+got[t[0]]).join('   '));
  draw(); let delay=0;
  types.forEach(([key,icon,col])=>{
    const amt=g[key], N=Math.max(1,Math.min(amt,8)), stagger=85;
    for(let i=0;i<N;i++){
      amSched(()=>amSpawnFly(icon,col,'amtgt'), delay+i*stagger);
      amSched(()=>{ sfx('ching'); got[key]=Math.min(amt,Math.round((i+1)*(amt/N))); draw(); amPop('amtgt'); }, delay+i*stagger+470);
    }
    delay+=N*stagger+280;
  });
  amSched(()=>{ types.forEach(t=>got[t[0]]=g[t[0]]); draw(); amNext(); }, delay+750);
}
function amStageUnlock(u){
  const s=document.getElementById('amstage'); if(!s){ amNext(); return; }
  if(typeof u==='string') u={ic:'',name:u,kind:'',desc:''};   // legacy/back-compat
  const ic=u.ic||'', name=u.name||'', kind=u.kind||'', desc=u.desc||'';
  const face = (u.key && HAS_ICON.has(u.key)) ? cardFace(u.key) : ic;   // painted icon for card unlocks
  s.innerHTML='<div class="amunlabel">✦ UNLOCKED ✦</div>'+
    '<div class="amcard" onclick="amNext()">'+
      (face?'<div class="amcic">'+face+'</div>':'')+
      '<div class="amcname">'+name+'</div>'+
      (kind?'<div class="amkind">'+kind+'</div>':'')+
      (desc?'<div class="amdesc">'+desc+'</div>':'')+
    '</div>'+
    '<div class="menu-btns"><button class="go" onclick="amNext()">Next ▶</button></div>';
  sfx('relic');
}
function amSkip(){ amClearTimers(); if(overlay&&overlay.querySelectorAll) overlay.querySelectorAll('.flyicon').forEach(e=>e.remove()); _amQueue=[]; amShowSummary(); }
function amShowSummary(){ amClearTimers(); if(_amSummary!=null && overlay) overlay.innerHTML=_amSummary; }
function totalKills(){ return G.totalSlain; }
// Capture just enough of the hero who felled the throne for the post-mortem.
function snapshotHero(h){
  return { heroName:h.heroName, title:h.title, cls:h.cls, elite:!!h.elite, champion:h.champion||null,
    traits:[...(h.specTraits||h.traits||[])], power:h.specPower||0, rivalGen:h.rivalGen||0,
    maxHp:h.maxHp, dmgTaken:Math.round(h.dmgTaken||0), dodge:h.dodge||0, armor:h.armor||0 };
}
// 📜 Battle report: which rooms actually carried the run (damage attributed in
// dealToHero via _roomDmgCtx; kills tracked per room in heroDies).
function battleReportHTML(){
  const s=G.stats||{};
  const rooms=(G.rooms||[]).filter(r=>r && ((r.dmg||0)>0 || (r.kills||0)>0))
    .sort((a,b)=>(b.dmg||0)-(a.dmg||0)).slice(0,6);
  const rows=rooms.map((r,i)=>{
    const ic=roomParts(r).map(p=>ROOMS[p].ic).join('');
    return `<div style="display:flex;gap:8px;justify-content:space-between">
      <span>${i===0?'🏆 ':''}${ic} ${comboName(r)} <span class="small" style="opacity:.6">Lv${r.lvl}</span></span>
      <span style="color:#ffd34d">${r.dmg||0} dmg · ${r.kills||0} kill${(r.kills||0)===1?'':'s'}</span></div>`;
  }).join('');
  const totals=`<div class="small" style="opacity:.8;margin-top:5px;border-top:1px solid #3a2c5a;padding-top:4px">
    🦷 traps ${s.trapDmg||0} · 👹 guards ${s.monDmg||0} · 🐉 boss &amp; elements ${s.abilDmg||0}
    · ⚛️ reactions ${s.reactions||0} · 🚪 breaches ${s.breaches||0}</div>`;
  if(!rooms.length && !(s.trapDmg||s.monDmg||s.abilDmg)) return '';
  return `<div style="text-align:left;max-width:440px;margin:6px auto;background:#1b1430;border:1px solid #3a2c5a;border-radius:10px;padding:9px 13px;font-size:12px;line-height:1.55">
    <b style="color:#9adfff">📜 Battle report</b><br>${rows||'<span class="small" style="opacity:.6">no rooms dealt damage</span>'}${totals}</div>`;
}
// Build the "why you lost" panel: who broke through + the single most useful lesson.
function buildPostmortem(){
  const k=G.killer, s=G.stats||{}; const cls=k&&CLASSES[k.cls]?CLASSES[k.cls]:null;
  // scan the built dungeon for composition
  let traps=0, mons=0; const elems=new Set();
  for(const c of (G.cells||[])){ if(c.kind==='boss') continue;
    if(c.traps){ traps+=c.traps.length; c.traps.forEach(t=>{ if(t.def&&t.def.elem) elems.add(t.def.elem); }); }
    if(c.mon) mons++; }
  const pct = (k&&k.maxHp) ? Math.min(100,Math.round(100*k.dmgTaken/k.maxHp)) : 0;
  const name = k ? (k.heroName ? k.heroName+(k.title?' '+k.title:'') : (cls?cls.name:'A hero')) : 'A hero';
  const icon = k&&k.champion ? '👑' : (cls?cls.ic:'⚔️');
  const traitTxt = k&&k.traits&&k.traits.length ? ' · '+k.traits.join(', ') : '';
  const who = k ? `${icon} <b>${name}</b> <span style="opacity:.8">(${cls?cls.name:'?'}${k.rivalGen?` · grudge ×${k.rivalGen}`:''}${k.elite?' · elite':''}${traitTxt})</span>` : 'A hero';
  // collect tips by relevance, show the best few
  const tips=[];
  if(k){
    if(k.traits.includes('swift')) tips.push('🏃 They were <b>Swift</b> — front-load your damage or slow them (oil/chill rooms, or the Overgrowth doctrine).');
    if(k.cls==='rogue'||k.dodge>=0.3) tips.push('🗡️ Rogues <b>dodge ~35%</b> of direct hits — lean on burn DoT and crushers, which can’t be dodged.');
    if(k.traits.includes('armored')||k.armor>=8) tips.push('🛡️ Heavy <b>armor</b> blunted your traps — add piercing rooms (🔱spikes pierce) or the Bastion doctrine.');
    if(k.traits.includes('hardy')) tips.push('❤️ A <b>Hardy</b> raider has huge HP — you need sustained damage: a longer corridor or stacked DoT.');
  }
  if(elems.size>=2 && (s.reactions||0)===0) tips.push('⚛️ Your elemental rooms <b>never combo’d</b> — order matters: oil BEFORE flame/tesla/frost, frost before crushers.');
  else if(elems.size===1 && (s.reactions||0)===0 && [...elems][0]!=='oil') tips.push('⚛️ Put an 🛢️<b>oil</b> room BEFORE your '+[...elems][0]+' room to unlock reactions.');
  const tot=(s.trapDmg||0)+(s.monDmg||0);
  if(tot>0 && s.trapDmg>s.monDmg*5) tips.push('Your guards barely fought — a blocker monster holds heroes in your traps longer.');
  else if(tot>0 && s.monDmg>s.trapDmg*5) tips.push('Almost all damage came from guards — traps soften the <b>whole</b> party, not just the front hero.');
  if((s.breaches||0)>=3) tips.push(`<b>${s.breaches}</b> heroes reached your throne this run — the corridor leaks; deepen it or add a chokepoint.`);
  if(G.slots<=2) tips.push('A <b>longer dungeon</b> (more slots) means more trap ticks before the throne.');
  if(pct>=85) tips.push('So close — they reached the throne nearly dead. A little more corridor damage or 🩹 Repair would’ve held.');
  else if(pct<40) tips.push('They barely took a scratch — your corridor needs more raw damage or better element combos.');
  const top = tips.slice(0,3);
  return `<div style="text-align:left;max-width:440px;margin:6px auto;background:#1b1430;border:1px solid #3a2c5a;border-radius:10px;padding:10px 13px">
    <div style="margin-bottom:5px">${who} reached the throne.</div>
    <div class="small" style="opacity:.9;margin-bottom:6px">Your corridor stripped <b style="color:${pct>=70?'#7bdc6b':pct>=40?'#ffd34d':'#ff7a8a'}">${pct}%</b> of their HP before the throne · 🪤 ${s.trapDmg||0} trap · 👹 ${s.monDmg||0} guard · ⚛️ ${s.reactions||0} reactions</div>
    ${top.length?'<div class="small" style="color:#caa15e;font-weight:bold;margin-bottom:2px">What would’ve held the throne:</div>'+top.map(t=>`<div class="small" style="line-height:1.3;margin:3px 0">• ${t}</div>`).join(''):''}
  </div>`;
}
// Bank this run's rune points (delta since last banking) into the pool.
// Income now flows from per-kill loot rolls (20% rune per slain hero, champions roll twice)
// + 1 per campaign chapter cleared, then edict/library multipliers.
function awardRunes(){
  const drops = (G.drops && G.drops.runes) || 0;
  const total = Math.floor((drops + (G.mode==='campaign'? G.levelIdx : 0)) * edictRewardMul() * libraryMul());
  const delta = Math.max(0, total - (G.runesBanked||0));
  G.runesBanked = total;
  RUNES.points += delta;
  // bank lifetime kills + detect newly-unlocked content
  const before=RUNES.kills;
  const kd=Math.max(0, G.totalSlain - (G.killsBanked||0));
  G.killsBanked=G.totalSlain; RUNES.kills+=kd;
  const after=RUNES.kills;
  G.newUnlocks=[];
  for(const k in UNLOCK_BOSS){ if(UNLOCK_BOSS[k]>before && UNLOCK_BOSS[k]<=after)
    G.newUnlocks.push({ic:BOSSES[k].ic, name:BOSSES[k].name, kind:'New Boss', desc:BOSSES[k].blurb}); }
  for(const k in UNLOCK_CARD){ if(UNLOCK_CARD[k]>before && UNLOCK_CARD[k]<=after)
    G.newUnlocks.push({ic:ROOMS[k].ic, name:ROOMS[k].name, kind:ROOMS[k].kind==='trap'?'New Trap':ROOMS[k].kind==='monster'?'New Monster':'New Card', desc:ROOMS[k].desc, key:k}); }
  // bank boss mastery XP for the boss you played + detect a level-up
  if(G.boss && G.boss.key){
    if(!RUNES.bossXp) RUNES.bossXp={};
    const bk=G.boss.key, lvlBefore=bossLevelOf(bk);
    const bd=Math.max(0, G.totalSlain - (G.bossXpBanked||0)); G.bossXpBanked=G.totalSlain;
    RUNES.bossXp[bk]=(RUNES.bossXp[bk]||0)+bd;
    const lvlAfter=bossLevelOf(bk);
    if(lvlAfter>lvlBefore) G.newUnlocks.push({ic:BOSSES[bk].ic, name:BOSSES[bk].name.split(' ')[0]+' · Mastery Lv '+lvlAfter,
      kind:'Boss Mastery', desc:'Permanently stronger '+BOSSES[bk].name.split(' ')[0]+' — more HP & attack every run you play it.'});
  }
  if(G.mode==='endless') RUNES.best=Math.max(RUNES.best||0, G.totalSlain||0);   // personal endless record
  saveRunes();
  return delta;
}

/* ============================= PHASE: REWARD ============================= */
function gotoReward(){
  G.phase='reward';
  // draft 3 room cards, weighted by what helps (slightly favor what you own to enable upgrades)
  const owned = new Set(G.rooms.filter(Boolean).map(r=>r.type).filter(t=>t!=='minion'));
  G.drafts=[];
  const pool=unlockedRoomKeys();
  const choices=3+(RB.draft||0);
  const L=runDepth(); const shown=new Set();
  for(let i=0;i<choices;i++){
    let t;
    if(Math.random()<0.45 && owned.size){
      const ownPool=[...owned].filter(o=>!shown.has(o));     // favor what you own (enables upgrades)
      t = ownPool.length ? pick(ownPool) : pickCardWeighted(pool, L, shown);
    } else t=pickCardWeighted(pool, L, shown);               // else rarity-weighted; rarer shows up less
    shown.add(t);
    G.drafts.push({type:t, lvl:1});
  }
  overlay.classList.add('show');
  overlay.innerHTML=`<h1>Spoils of War</h1>
    <p>Draft one room card. ${G.hand.length>=handCap()?`<b style="color:#ff8a8a">Hand full (${handCap()}) — picking will need a discard, or skip.</b>`:`Hold up to ${handCap()}.`}</p>
    <div class="choices">${G.drafts.map((c,i)=>{
      const d=ROOMS[c.type]; const tr=cardRarity(c.type); const tc=(RELIC_TIERS[tr]||{}).col||'#888';
      return `<div class="choice" onclick="takeDraft(${i})" style="border-color:${tc};box-shadow:0 0 10px ${tc}33">
        <div class="big">${cardFace(c.type)||d.ic}</div><h3>${d.name}</h3>
        <div class="desc">${d.desc}</div>
        <div class="stats" style="color:${tc};font-weight:bold;letter-spacing:.5px">${(RELIC_TIERS[tr]||{}).name||'Common'} · ${d.kind.toUpperCase()}</div></div>`;}).join('')}</div>
    <div class="menu-btns"><button onclick="skipDraft()">Skip draft</button></div>`;
}
function takeDraft(i){
  if(G.hand.length>=handCap()){
    showHint('Hand full — discard a card in build, or skip.'); return;
  }
  G.hand.push(G.drafts[i]);
  overlay.classList.remove('show');
  afterReward();
}
function skipDraft(){ overlay.classList.remove('show'); afterReward(); }
// After the card draft, drop into the town if a 5-kill interlude is due.
function afterReward(){
  if(G.relicDue){ G.relicDue=false;
    gotoRelicChoice('Relic Unearthed', 'A power stirs in the deep — claim one.', afterRelicMaybeMandate); return; }
  afterRelicMaybeMandate();
}
function afterRelicMaybeMandate(){
  if(G.mandateDue){ G.mandateDue=false; gotoMandateChoice(townOrBuild); return; }
  townOrBuild();
}
function townOrBuild(){ if(G.townDue){ G.townDue=false; gotoTown(); } else gotoBuild(false); }

/* ============================== RELIC DRAFT ============================= */
function gotoRelicChoice(title, subHtml, onPick){
  G.phase='relic'; G._relicPick=onPick||null;
  const choices=rollRelicChoices(3); G._relicChoices=choices;
  overlay.classList.add('show');
  overlay.innerHTML=`<h1 style="color:#b163ff">🏺 ${title}</h1>
    <p>${subHtml||'Choose a relic to empower your dungeon.'}</p>
    <div class="choices">${choices.map((id,i)=>{ const r=RELICS[id]; const tc=RELIC_TIERS[r.tier];
      return `<div class="choice" style="width:208px;border-color:${tc.col}" onclick="pickRelic(${i})">
        <div class="big">${r.ic}</div>
        <div class="small" style="color:${tc.col};font-weight:bold;letter-spacing:1px">${tc.name.toUpperCase()}</div>
        <h3 style="margin:4px 0">${r.name}</h3>
        <div class="desc">${r.desc}</div></div>`;}).join('')}</div>
    ${G.relics.length?`<p class="small" style="opacity:.75">Held: ${G.relics.map(id=>RELICS[id].ic).join(' ')}</p>`:''}`;
}
function pickRelic(i){
  if(G.phase!=='relic') return;
  const id=G._relicChoices && G._relicChoices[i]; if(!id) return;
  addRelic(id); sfx('relic');
  const r=RELICS[id]; showHint(r.ic+' '+r.name+' ('+RELIC_TIERS[r.tier].name+') claimed!');
  const done=G._relicPick; G._relicChoices=null; G._relicPick=null;
  overlay.classList.remove('show');
  if(done) done(); else gotoBuild(false);
}

/* ============================== MANDATE DRAFT =========================== */
function rollMandateChoices(n){
  const pool=MANDATE_KEYS.filter(id=>!hasMandate(id));
  const out=[]; const bag=[...pool];
  while(out.length<n && bag.length) out.push(bag.splice(ri(0,bag.length-1),1)[0]);
  return out;
}
function gotoMandateChoice(onDone){
  const choices=rollMandateChoices(3);
  if(!choices.length){ (onDone||townOrBuild)(); return; }   // all mandates owned — skip
  G.phase='mandate'; G._mandatePick=onDone||null; G._mandateChoices=choices;
  overlay.classList.add('show');
  overlay.innerHTML=`<h1 style="color:#ff9a3a">⚖️ Decree a Mandate</h1>
    <p>A standing rule for the rest of your reign — choose one to reshape your dungeon.</p>
    <div class="choices">${choices.map((id,i)=>{ const m=MANDATES[id];
      return `<div class="choice" style="width:208px;border-color:#ff9a3a" onclick="pickMandate(${i})">
        <div class="big">${m.ic}</div>
        <h3 style="margin:4px 0">${m.name}</h3>
        <div class="desc">${m.desc}</div></div>`;}).join('')}</div>
    ${G.mandates.length?`<p class="small" style="opacity:.75">In force: ${G.mandates.map(id=>MANDATES[id].ic+' '+MANDATES[id].name).join(' · ')}</p>`:''}`;
}
function pickMandate(i){
  if(G.phase!=='mandate') return;
  const id=G._mandateChoices && G._mandateChoices[i]; if(!id) return;
  G.mandates.push(id);
  if(id==='reinforced' && G.boss){ G.boss.maxHp=Math.round(G.boss.maxHp*1.20); G.boss.hp=G.boss.maxHp; }
  sfx('relic'); showHint(MANDATES[id].ic+' Mandate decreed: '+MANDATES[id].name);
  const done=G._mandatePick; G._mandateChoices=null; G._mandatePick=null;
  overlay.classList.remove('show');
  (done||townOrBuild)();
}

/* ============================== PHASE: TOWN ============================== */
// Interlude every 5 kills. Runs on DREAD (earned per kill). You reach into the
// hero town to: resolve an EVENT, set your THREAT, empower the boss, buy
// town-wide SCHEMES, and sabotage/corrupt the previewed arrivals.

// Random dilemmas. Each option's run() applies an effect and returns a line.
const EVENTS = [
  { t:'Cursed Caravan 🛒', d:'A smuggler will sell the heroes cursed war-gear — for a cut.',
    opts:[
      {l:'Take the cut (+6 ☠, next 3 heroes +20% ATK)', run:()=>{ G.dread+=6;
        G.queue.slice(0,3).forEach(s=>s.debuff.atkMul*=1.2); return 'Blood money taken.'; }},
      {l:'Burn the caravan', run:()=>'The smuggler flees empty-handed.'} ]},
  { t:'Plague Rats 🐀', d:'Diseased rats nest beneath the town well.',
    opts:[
      {l:'Loose the plague (poison next 5)', run:()=>{ G.fx.well=Math.max(G.fx.well,5); return 'The well runs foul.'; }},
      {l:'Sell the antidote (+5 ☠)', run:()=>{ G.dread+=5; return 'Coin from the desperate.'; }} ]},
  { t:'The Deserter 🚪', d:'A frightened recruit will betray his comrades for the right master.',
    opts:[
      {l:'Corrupt him (free minion)', cond:()=>G.hand.length<handCap(), run:()=>{ grantMinionCard(G.totalSlain+1); return 'A turncoat joins your halls.'; }},
      {l:'Make an example (+5 ☠)', run:()=>{ G.dread+=5; return 'His screams spread dread.'; }} ]},
  { t:"Champion's Vow ⚔️", d:'A famed champion swears to end you and rallies the town.',
    opts:[
      {l:'Taunt them (+1 threat, +6 ☠)', run:()=>{ G.bounty=clamp(G.bounty+1,-2,3); G.dread+=6; return 'You raise the stakes.'; }},
      {l:'Lie low (−1 threat)', run:()=>{ G.bounty=clamp(G.bounty-1,-2,3); return 'You fade into rumor.'; }} ]},
];

function gotoTown(){
  G.phase='town';
  if(G.mode==='campaign') prepCampaignWave(); else ensureQueue(3);   // show the real next wave in the roster
  G.corruptedThisTown=0;                                              // 1 corruption per town visit
  G.townEvent={ ...pick(EVENTS), done:false, outcome:'' };
  G.merchant=rollMerchant();
  renderTown();
}
function chooseEvent(i){
  const ev=G.townEvent; if(!ev||ev.done) return;
  const opt=ev.opts[i];
  if(opt.cond && !opt.cond()){ showHint('You can\'t do that right now.'); return; }
  ev.done=true; ev.outcome=opt.run();
  showHint(ev.outcome); renderTown(); renderTop();
}

// Boss empowerments are repeatable — each level costs ~40% more than the last.
function upgradeCost(key){ return townCost(Math.round(TOWN_UPGRADES[key].base * Math.pow(1.4, G.townBuys[key]||0))); }
function buyUpgrade(key){
  if(townLvl('sanctum')<(SANCTUM_UNLOCK[key]||1)){ showHint("Build the Sorcerer's Sanctum higher first."); return; }
  const cost=upgradeCost(key);
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  G.dread-=cost; G.townBuys[key]=(G.townBuys[key]||0)+1;
  const b=G.boss;
  if(key==='reinforce'){ b.maxHp+=30; b.hp+=30; }
  else if(key==='sharpen'){ b.atk+=5; }
  else if(key==='attune'){ b.maxMana+=20; b.mana=Math.min(b.maxMana,b.mana+20); b.manaRegen=(b.manaRegen||6)+2; }
  else if(key==='ascend'){ b.lvl+=1; }
  showHint(TOWN_UPGRADES[key].name+'!'); renderTown(); renderTop();
}

function schemeCost(key){ return Math.max(1, Math.round(townCost(TOWN_SCHEMES[key].cost)*denDisc())); }
function buyScheme(key){
  if(!townHas('den')){ showHint("Build the Smugglers' Den first."); return; }
  const s=TOWN_SCHEMES[key]; const c=schemeCost(key);
  if(G.fx[key]>0){ showHint('Already active.'); return; }
  if(G.dread<c){ showHint('Not enough dread.'); return; }
  G.dread-=c; G.fx[key]=s.waves;
  showHint(s.name+' — active '+s.waves+' waves.'); renderTown(); renderTop();
}
function setThreat(d){ if(!townHas('watch')){ showHint('Build the Watchtower first.'); return; } G.bounty=clamp(G.bounty+d,-2,3); renderTown(); renderTop(); }

const GUILD_MAX=3;   // party of up to 4
function guildCost(){ return townCost(9 + G.guildLvl*7); }
function buyGuild(){
  const cap=townLvl('guild');
  if(!cap){ showHint('Build the Guild House in the Town Builder first.'); return; }
  if(G.guildLvl>=cap){ showHint('Guild is at its built ceiling (Lv '+cap+'). Upgrade the Guild House to raise it.'); return; }
  const cost=guildCost();
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  G.dread-=cost; G.guildLvl++;
  showHint('Guild House Lv '+G.guildLvl+' — heroes now raid in parties of '+(G.guildLvl+1)+'!');
  renderTown(); renderTop();
}

// ---- Barracks: a HoMM-style training camp, funded with GOLD in town ----
const BARRACKS_BUILD=160;           // gold to raise the camp
const BARRACKS_MAX=8;               // max Monster Rank
// Each rank costs WAY more than the last — a steep exponential gold sink
// (~240, 456, 866, 1646, 3127, 5942, 11290, 21451).
function barracksDrillCost(){ return Math.round(240 * Math.pow(1.9, (G.barracks&&G.barracks.lvl)||0)); }
function buildBarracks(){
  if(!G.barracks) G.barracks={built:false,lvl:0};
  if(G.barracks.built) return;
  if(G.gold<BARRACKS_BUILD){ showHint('Not enough gold to raise the Barracks.'); return; }
  G.gold-=BARRACKS_BUILD; G.barracks.built=true;
  sfx('upgrade'); showHint('🏋️ Barracks raised — now drill your monsters with gold!');
  renderTown(); renderTop();
}
function drillBarracks(){
  if(!G.barracks||!G.barracks.built){ showHint('Build the Barracks first.'); return; }
  if(G.barracks.lvl>=BARRACKS_MAX){ showHint('Monster Rank is maxed.'); return; }
  const c=barracksDrillCost();
  if(G.gold<c){ showHint('Not enough gold to drill ('+c+'g).'); return; }
  G.gold-=c; G.barracks.lvl++;
  sfx('upgrade'); showHint('🏋️ Monster Rank '+G.barracks.lvl+' — every monster +'+Math.round(0.16*G.barracks.lvl*100)+'% HP & ATK!');
  renderTown(); renderTop();
}

// ---- Black Market: an adjustable gold <-> dread exchange (dread is precious) ----
const BM_SELL=100;   // 1 dread  → 100 gold
const BM_BUY=200;    // 1 dread ← 200 gold (buying fear costs dearly)
function bmAdjust(d){ G.bmAmt=Math.max(1, Math.min(999, (G.bmAmt||1)+d)); renderTown(); }
function bmSell(){   // dread → gold
  const n=G.bmAmt||1;
  if(G.dread<n){ showHint('Not enough dread.'); return; }
  G.dread-=n; G.gold+=n*BM_SELL; sfx('buy');
  showHint('💱 Sold '+n+' ☠ for '+(n*BM_SELL)+'g.'); renderTown(); renderTop();
}
function bmBuy(){     // gold → dread
  const n=G.bmAmt||1; const cost=n*BM_BUY;
  if(G.gold<cost){ showHint('Not enough gold.'); return; }
  G.gold-=cost; G.dread+=n; sfx('buy');
  showHint('💱 Bought '+n+' ☠ for '+cost+'g.'); renderTown(); renderTop();
}

function sabotageCost(spec,key){ return Math.max(1, Math.round(townCost(TOWN_SABOTAGE[key].cost + Math.floor(spec.power*0.3))*innDisc())); }
function corruptCost(){ return Math.max(1, Math.round(townCost(CORRUPT_COST)*innDisc())); }
function sabotage(idx,key){
  const spec=G.queue[idx]; if(!spec) return;
  if(townLvl('inn')<(INN_UNLOCK[key]||1)){ showHint('Build the Inn higher to do that.'); return; }
  const cost=sabotageCost(spec,key);
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  if(key==='intimidate'){
    if(spec.debuff.atkMul<1){ showHint('Already intimidated.'); return; }
    G.dread-=cost; spec.debuff.atkMul=0.7;
  } else if(key==='poison'){
    G.dread-=cost; spec.debuff.burn += 6 + Math.floor(spec.power);
  } else if(key==='rob'){
    if(spec.debuff.robbed){ showHint('Already robbed.'); return; }
    const g=previewStats(spec).gold; G.dread-=cost; G.gold+=Math.round(g*0.6); spec.debuff.robbed=true;
    showHint('Robbed for '+Math.round(g*0.6)+'g — they arrive poorer.');
  }
  renderTown(); renderTop();
}

// ---- corruption: turn a previewed hero into a placeable minion card ----
function minionCardFromSpec(spec){
  // A corrupted hero defends with a solid chunk of their former might — but a
  // champion is turned into a normal-scale minion (no boss-tier HP multiplier).
  const base = spec.champion ? {...spec, champion:null} : spec;
  const ps=previewStats(base);
  return { type:'minion', lvl:1, minHp:Math.round(ps.hp*0.6),
           minAtk:Math.max(3,Math.round(ps.atk*0.65)), label:(spec.name||'Thrall') };
}
function grantMinionCard(power){
  if(G.hand.length>=handCap()){ showHint('Hand full — make room first.'); return false; }
  const spec={cls:pick(CLASS_KEYS), power, traits:[], name:rollName(), debuff:{atkMul:1,burn:0,robbed:false}};
  G.hand.push(minionCardFromSpec(spec)); return true;
}
function corruptHero(idx){
  const spec=G.queue[idx]; if(!spec) return;
  if(townLvl('inn')<INN_UNLOCK.corrupt){ showHint('Build the Inn (Lv 2) to corrupt heroes.'); return; }
  if((G.corruptedThisTown||0)>=1){ showHint('Only one corruption per town visit.'); return; }
  const cc=corruptCost();
  if(G.dread<cc){ showHint('Not enough dread.'); return; }
  if(G.hand.length>=handCap()){ showHint('Hand full — play a card first.'); return; }
  G.dread-=cc; G.queue.splice(idx,1); G.corruptedThisTown=(G.corruptedThisTown||0)+1;
  // Campaign: corrupting a hero simply shrinks THIS wave (don't refill with strangers).
  G.hand.push(minionCardFromSpec(spec)); if(G.mode!=='campaign') ensureQueue(3);
  showHint((spec.name||'A hero')+' is corrupted into a minion!'); renderTown(); renderTop();
}

/* ============================ UPDATE / SIM ============================== */
function update(dt){
  if(paused) return;                 // pause menu freezes the whole simulation
  // animate floaters/particles always
  floats.forEach(f=>{ f.y+=f.vy*dt; f.life-=dt*0.9; });
  floats=floats.filter(f=>f.life>0);
  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=380*dt; p.life-=dt; });
  particles=particles.filter(p=>p.life>0);
  if(bossBolts.length){ bossBolts.forEach(b=>{ b.t+=dt; }); bossBolts=bossBolts.filter(b=>b.t<b.dur); }
  if(shakeT>0) shakeT=Math.max(0,shakeT-dt);   // screen-shake decay
  if(flashT>0) flashT=Math.max(0,flashT-dt);   // screen-flash decay
  if(slowT>0) slowT=Math.max(0,slowT-dt);      // slow-mo decay (real time)
  if(overdriveT>0) overdriveT=Math.max(0,overdriveT-dt);   // Overdrive shockwave

  if(G.phase!=='run' || !G.heroes.length) return;
  // hit-pause: briefly freeze the sim on big hits for impact
  if(hitStop>0){ hitStop=Math.max(0,hitStop-dt); return; }
  const sdt = slowT>0 ? dt*0.35 : dt;          // bullet-time slows the SIM, not the FX
  const steps=speedMul; // scale sim by running update multiple conceptual times
  for(let s=0;s<steps && G.phase==='run';s++){
    for(const h of G.heroes){ if(G.phase!=='run') break; if(h.state!=='dead') simStep(h,sdt); }
    if(G.phase==='run') aoeTrapTick(sdt);
    if(G.phase==='run') goblinTick(sdt);
  }
  if(G.phase!=='run') return;
  G.hero=leadHero();

  // ability cooldowns + mana regen
  G.boss.abil.forEach(a=>{ if(a.cd>0)a.cd=Math.max(0,a.cd-dt*speedMul); });
  if(G.boss.reviveT>0) G.boss.reviveT=Math.max(0, G.boss.reviveT-dt*speedMul);   // post-revive invuln
  if(G.boss.smiteCd>0) G.boss.smiteCd=Math.max(0, G.boss.smiteCd-dt*speedMul);   // active Smite cooldown
  G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana + dt*speedMul*(G.boss.manaRegen||6));

  // wave ends when the whole party is wiped — survived the raid
  if(G.phase==='run' && !G.waveEnding && G.heroes.every(h=>h.state==='dead')){
    G.waveEnding=true; killCamT=0.6; flash('#ffd34d',0.10,0.25);   // savor the last kill in slow-mo
    setTimeout(afterWave, 850);
  }

  // Camera anchors as far RIGHT as it can while every living hero stays in
  // frame: leftmost hero - margin is the left edge; the right limit pins the
  // boss to the screen edge. (Old behaviour tracked the lead → centred the
  // view as heroes advanced, dragging it left even though the throne was the
  // important thing.)
  if(!panning && performance.now()>panHoldUntil && G.heroes && G.heroes.length){
    const visW=VW/zoom;                            // ACTUAL visible width at the current zoom
    const mxT=corridorWidth()-visW;                // boss flush right
    let leftmost=Infinity;
    for(const h of G.heroes) if(h && h.state!=='dead' && h.x<leftmost) leftmost=h.x;
    if(!isFinite(leftmost)) leftmost=corridorWidth();
    const target=clamp(leftmost-24, Math.min(minCam(),mxT), mxT);
    camX += (target-camX)*Math.min(1,dt*6);
  }
}

function simStep(h,dt){
  if(!h||h.state==='dead') return;

  // status: burn
  if(h.burn>0 && h.burnT>0){
    h._burnAcc=(h._burnAcc||0)+dt;
    if(h._burnAcc>=0.5){ h._burnAcc=0; h.hp-=h.burn; floater(h.x,h.y-50,'-'+h.burn,'#ff9a3a');
      if(h.hp<=0){h.hp=0;heroDies(h);return;} }
    h.burnT-=dt;
  }
  // status: poison — stacking DoT (every poison source piles more stacks)
  if(h.poison>0 && h.poisonT>0){
    h._poisAcc=(h._poisAcc||0)+dt;
    if(h._poisAcc>=0.5){ h._poisAcc=0; const pd=Math.ceil(h.poison); h.hp-=pd; floater(h.x,h.y-44,'☠'+pd,'#9be86b');
      if(h.hp<=0){h.hp=0;heroDies(h);return;} }
    h.poisonT-=dt;
  }
  // regeneration trickle (clerics + zealot trait)
  if(h.regen && h.state!=='dead' && h.hp<h.maxHp){
    h.hp=Math.min(h.maxHp, h.hp + h.maxHp*0.025*dt);
  }
  // champion mini-boss specials; regular heroes cast their class spell
  if(h.champion) championTick(h,dt);
  else heroSpellTick(h,dt);
  // elemental status timers
  if(h.oil>0) h.oil-=dt;
  if(h.chill>0) h.chill-=dt;
  if(h.shock>0) h.shock-=dt;
  if(h.acid>0){ h.acidT-=dt; if(h.acidT<=0) h.acid=0; }   // corrosion wears off
  if(h.mark>0){ h.markT-=dt; if(h.markT<=0) h.mark=0; }   // brand fades if no hit lands
  // reaction-chain window: combo decays if no new reaction lands in time
  if(h.reactT>0){ h.reactT-=dt; if(h.reactT<=0) h.reactCount=0; }
  // freeze: the HERO is immobilised (can't move or attack) — but the dungeon's
  // traps and monsters keep punishing the sitting duck.
  const frozen = h.freeze>0;
  if(frozen) h.freeze-=dt;

  const cell=(h.x>=0)?cellAt(h.x):null;   // still marching in → no cell, no traps
  if(cell && cell.index!==h.cellIndex && h.state==='walking' && !frozen){
    h.cellIndex=cell.index; onEnterCell(h,cell);
  }

  if(h.state==='walking'){
    // traps still fire on a frozen/standing hero
    if(cell && cell.traps && cell.traps.length) trapTick(h,cell,dt);
    if(h.state==='dead' || frozen) return;
    // a den goblin locked onto this hero holds it in place — stand and trade
    // blows (goblinStep resolves the fight) until the goblin (or hero) dies
    if((G.minions||[]).some(g=>g.hp>0 && g.engaged===h)){ h.walkAnim+=dt*10; return; }
    const slow=(h.oil>0?0.6:1)*(h.chill>0?0.7:1)*(bossDoc()==='overgrowth'?0.75:1)*(hasMandate('quicksand')?0.88:1);   // oil & chill slow movement; Overgrowth/Quicksand slow everyone
    h.x += h.spd*slow*dt;
    h.walkAnim+=dt*10;
    // a living monster blocks: keep walking until the monster's advancing sprite
    // reaches you, then engage. (The monster slides left in the draw step.)
    if(cell && cell.mon && cell.mon.alive){
      const monF = (cell.room && cell.room._monF!==undefined) ? cell.room._monF : 0.74;
      const monX = cell.x0 + ROOM_W*monF;
      if(monX <= h.x + 24){ h.state='fighting'; h.atkT=0; cell.mon.atkT=0; return; }
    }
    // reached boss room? stand INSIDE it (in front of the boss), not at the door
    if(h.x >= cellX(G.slots)+ROOM_W*0.30){
      if(h.champion==='thief'){ thiefSteal(h); return; }   // robs you instead of fighting
      if(!h.reachedThrone && G.stats) G.stats.breaches++;
      h.state='boss'; h.reachedThrone=true; h.x=cellX(G.slots)+ROOM_W*0.44;
    }
  }
  else if(h.state==='fighting'){
    const cellM=G.cells[h.cellIndex];
    // combo synergy: traps keep chipping while the monster pins the hero
    if(cellM && cellM.traps && cellM.traps.length) trapTick(h,cellM,dt);
    if(h.state==='dead') return;
    if(!cellM||!cellM.mon||!cellM.mon.alive){ if(!frozen) h.state='walking'; return; }
    fightTick(h, cellM.mon, dt, cellM, isFrontHero(h), frozen);
  }
  else if(h.state==='shopping'){
    if(frozen) return;
    h.shopT-=dt;
    if(h.shopT<=0){ doShopping(h, G.cells[h.cellIndex]); h.state='walking'; }
  }
  else if(h.state==='boss'){
    bossFightTick(h,dt,isFrontHero(h),frozen);
  }
}

function cellAt(x){
  for(const c of G.cells){ if(x>=c.x0 && x<c.x1) return c; }
  // Left of the corridor (party members still entering) → first cell, NOT the
  // boss. Only x past the far end falls through to the boss cell.
  return x<0 ? G.cells[0] : G.cells[G.cells.length-1];
}
// 💥 A champion (or the King) doesn't use the door — it goes THROUGH the
// doorway: screen shake, a stone-debris burst, billowing dust, and the cell's
// art flips to its rooms/<k>_broken.png variant (once per cell per wave).
function smashDoorway(h,cell){
  if(!G.brokenCells) G.brokenCells={};
  if(G.brokenCells[cell.index]) return;
  G.brokenCells[cell.index]=true;
  const x=cell.x0+6;
  shake(9); sfx('hit'); sfx('boss');
  burst(x, FLOOR-40, '#9aa4b2', 16);                       // flying stone
  burst(x, FLOOR-90, '#6d6154', 12);
  burst(x, FLOOR-20, '#3a3430', 8);
  for(let i=0;i<14;i++)                                     // slow dust cloud
    particles.push({x:x+rnd(-12,26), y:FLOOR-rnd(10,120), vx:rnd(-18,30), vy:rnd(-26,-6), life:rnd(.8,1.5), col:i%2?'#8a8398':'#5d5668', sz:rnd(4,8)});
  floater(x+10, FLOOR-120, '💥', '#caa15e', true);
}
function onEnterCell(h,cell){
  if((h.champion||h.king) && cell.kind!=='boss') smashDoorway(h,cell);
  // 👑 The King shrugs off corruption and SMASHES rooms as he marches through.
  if(h.king){
    if(cell.room && cell.kind!=='boss' && Math.random()<KING_SMASH) destroyRoom(cell);
    // (no corruption toll, no shopping — fall through to the throne-room handling)
  } else {
  // Corruption toll: every populated room a hero walks through drains a slice of
  // their MAX HP and leaves a corruption stack. Even a worthless early room still
  // softens the raider — and the deeper the dungeon, the more stacks pile up,
  // which the boss cashes in (see bossFightTick).
  if(cell.room && cell.kind!=='boss'){
    h.corrupt=(h.corrupt||0)+1;
    const toll=Math.round(CORRUPT_PCT*h.maxHp*(hasMandate('tollKeeper')?2:1));   // Toll Keeper mandate: double corruption toll
    if(toll>0){ h.hp-=toll; floater(h.x, h.y-58, '☣ -'+toll, '#b06bff'); burst(h.x,h.y-22,'#9a5cff',5);
      if(h.hp<=0){ h.hp=0; heroDies(h); return; } }
  }
  // 🗡️ a rogue always slips in and disarms the room's traps for a few seconds on entry
  if(h.cls==='rogue' && cell.kind!=='boss' && cell.traps && cell.traps.length){
    cell._disarmT=DISARM_DUR; floater(h.x, h.y-72, '🗡️ DISARMED', '#5fd17a');
  }
  }
  // Monsters are handled by the walking branch: the hero walks up to the
  // blocker (passing through any trap in the room) before the fight starts.
  if(!h.king && cell.shop && G.fx.smith===0 && cell.room && cell.room.stock.some(s=>!s.sold)){
    h.state='shopping'; h.x=cell.x0+ROOM_W*0.5; h.shopT=0.8;
  } else if(cell.kind==='boss'){
    if(h.champion==='thief'){ thiefSteal(h); return; }
    // step inside the throne room rather than stopping at the door
    if(!h.reachedThrone && G.stats) G.stats.breaches++;
    h.state='boss'; h.reachedThrone=true; h.x=cell.x0+ROOM_W*0.44;
  }
}

// Champion specials, ticked each frame for champion heroes.
function championTick(h,dt){
  if(h.shieldT>0) h.shieldT-=dt;
  if(h.champion==='berserker'){
    let m = 1 + (1 - h.hp/h.maxHp)*0.6;                    // enrage as HP drops (max +60%)
    if(h.cursed)  m *= 0.55;                               // boss debuffs must survive the
    if(h.dreaded) m *= 0.7;                                // per-frame recompute, not be wiped
    h.atk = +(h._atkBase*m).toFixed(1);
    return;
  }
  h.specialT-=dt;
  if(h.specialT>0) return;
  if(h.champion==='paladin'){
    h.specialT=6; h.shieldT=1.8;
    floater(h.x, h.y-72, '🛡 SHIELD UP', '#ffd34d'); sfx('cast');
  } else if(h.champion==='necromancer'){
    h.specialT=6; const heal=Math.round(h.maxHp*0.10);
    h.hp=Math.min(h.maxHp, h.hp+heal);
    floater(h.x, h.y-72, '💀 SIPHON +'+heal, '#b163ff'); healHero(h,0); sfx('cast');
  }
}
// ---- class spells: every regular hero auto-casts a signature ability on its
// own cooldown (champions use championTick instead). Buffs fold into damage via
// heroAtkMul / the dodge check. Clerics heal AND bless the whole party.
function heroAtkMul(h){ return (h.rallyT>0?1.30:1) * (h.blessT>0?1.20:1) * (h.surgeT>0?1.60:1); }
function heroSpellTick(h,dt){
  if(h.rallyT>0) h.rallyT-=dt;
  if(h.blessT>0) h.blessT-=dt;
  if(h.evadeT>0) h.evadeT-=dt;
  if(h.surgeT>0) h.surgeT-=dt;
  // only cast once they're in the dungeon and in/near a fight (not still strolling in)
  if(h.x<8 || h.freeze>0) return;
  h.spellT-=dt;
  if(h.spellT>0) return;
  if(h.cls==='cleric'){
    // heal the most-wounded living ally (incl. self) + bless the whole party's attacks
    const allies=(G.heroes||[]).filter(o=>o&&o.state!=='dead');
    let low=null; for(const o of allies){ if(o.hp<o.maxHp && (!low || o.hp/o.maxHp<low.hp/low.maxHp)) low=o; }
    if(low){ healHero(low, Math.round(low.maxHp*0.12)); }
    for(const o of allies) o.blessT=4;
    floater(h.x, h.y-78, '🙏 BLESS', '#ffe9a8'); sfx('cast');
    h.spellT=ri(5,7);
  } else if(h.cls==='warrior'){
    h.rallyT=4; floater(h.x, h.y-72, '⚔️ WAR CRY', '#ff9a3a'); sfx('cast');
    h.spellT=ri(6,8);
  } else if(h.cls==='mage'){
    h.surgeT=2.6; floater(h.x, h.y-72, '✨ ARCANE SURGE', '#9ad'); sfx('cast');
    h.spellT=ri(5,7);
  } else if(h.cls==='rogue'){
    h.evadeT=3; floater(h.x, h.y-72, '🗡️ EVASION', '#9adfff'); sfx('cast');
    h.spellT=ri(6,9);
  } else { h.spellT=6; }
}
// The gold thief reaches the throne and escapes with your gold (no loot, no kill).
function thiefSteal(h){
  if(h.state==='dead') return;
  const stolen=Math.round(G.gold*0.20)+30;
  G.gold=Math.max(0, G.gold-stolen);
  floater(bossX(), FLOOR-92, h.heroName+' ROBBED you −'+stolen+'g', '#ff7a8a');
  showHint('💰 '+h.heroName+' '+(h.title||'the Gold Thief')+' escaped with '+stolen+' gold!');
  shake(8); sfx('lose');
  G.combo=0; h.state='dead'; h.escaped=true;   // gone — no loot, no kill credit
}

// Fire every trap in the cell (a combo room can hold two), scaled by synergy.
// Positional amplification for a cell: Runestone traps (this + adjacent rooms)
// and living War Totems (adjacent rooms) multiply trap & guard output.
function ampAt(idx){
  let m=1;
  for(let j=idx-1;j<=idx+1;j++){ const c=G.cells&&G.cells[j]; if(!c) continue;
    if(c.ampSelf) m+=c.ampSelf;                                       // Runestone reaches this + adjacent
    if(j!==idx && c.totem && c.mon && c.mon.alive) m+=0.25;           // adjacent living War Totem
  }
  return m;
}
// Apply a trap's lingering statuses (poison / acid / mark) to a hero it just hit.
function applyTrapStatus(h, d, r){
  if(!h || h.state==='dead') return;
  if(d.poison){ h.poison=Math.min(POISON_CAP, (h.poison||0)+d.poison+((r&&r.lvl||1)-1)); h.poisonT=4; }   // stacks (capped), +1/level
  if(d.acid){ h.acid=(h.acid||0)+d.acid; h.acidT=4; }
  if(d.mark && !(h.mark>0)){ h.mark=1; h.markT=4; floater(h.x,h.y-58,'🎯 MARKED','#ff5470'); }
}
const DISARM_DUR=3;   // 🗡️ a rogue who enters a trap room shuts its traps off for this many seconds
function trapTick(h,cell,dt){
  if(cell._disarmT>0) return;                      // traps are disarmed — they don't fire
  const r=cell.room; const syn=cell.syn||1; const doc=bossDoc(); const amp=ampAt(cell.index);
  for(const tr of cell.traps){
    if(tr.def.aoe) continue;        // area traps fire once per interval in aoeTrapTick, not per-hero
    if(tr.def.amp) continue;        // Runestone deals no damage — it only amplifies (ampAt)
    tr.fireT-=dt;
    if(tr.fireT<=0){
      tr.fireT=tr.def.rate * (hasMandate('hairTrigger')?0.88:1);   // Hair Trigger mandate: traps fire faster
      tr.firedAt=performance.now();                                // drives the painted strike animation
      const d=tr.def;
      let dmg=d.dmg * (1 + (r.lvl-1)*0.4) * syn * (1+(RB.trapDmg||0)) * (tr.stackMul||1);
      // counter-card bonuses vs certain heroes
      if(d.vsClass && d.vsClass.includes(h.cls)) dmg*=d.vsMult;
      if(d.vsElite && h.elite) dmg*=d.vsMult;
      if(d.vsLowHp && h.hp < h.maxHp*d.vsLowHp) dmg*=d.vsMult;
      // veteran rooms hit harder AND bite a slice of max HP (stays relevant late)
      const vr=cell.vet||0; if(vr){ dmg=dmg*(1+vr*VET_DMG) + vr*VET_BITE*h.maxHp; }
      if(doc==='inferno') dmg*=1.2;                            // Inferno doctrine: +20% trap damage
      dmg*=amp;                                                // Runestone / War Totem amplification
      const pierce = (doc==='bastion'||hasMandate('pierceHalls')||d.pierceAll) ? 'full' : !!d.pierce;  // Bastion/Piercing Halls: ignore armor
      _roomDmgCtx=r; dealToHero(h, Math.round(dmg), 'HIT', pierce, d.elem); _roomDmgCtx=null;
      if(d.burn){ h.burn=d.burn+(r.lvl-1)*2; h.burnT=3; }
      else if((doc==='inferno'||hasMandate('wildfire')) && h.state!=='dead'){ h.burn=Math.max(h.burn||0, 3+(r.lvl-1)); h.burnT=3; }  // Inferno/Wildfire: every trap sets ablaze
      applyTrapStatus(h, d, r);                                  // poison / acid / mark
      if(doc==='soulengine' && G.boss){ G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana+1); }            // Soul Engine: traps fuel mana
      if(G.stats) G.stats.trapDmg+=Math.round(dmg);
      burst(h.x, h.y-20, d.col, 5);
      if(h.state==='dead') return;
    }
  }
}

// Area traps (Bombard) fire at the CELL level once per interval — independent of
// which hero is standing on them — and strike EVERY live hero whose room is
// within the blast radius. This rewards a long, strung-out corridor (the party
// spread across rooms all eat the same shell) rather than one bunched kill-room.
function heroCellIndex(o){ if(o.x<0) return -1;   // outside the gate — untargetable
  return (o.cellIndex>=0 && o.cellIndex<G.cells.length) ? o.cellIndex : cellAt(o.x).index; }
function aoeTrapTick(dt){
  if(G.phase!=='run' || !G.heroes.length) return;
  const doc=bossDoc();
  for(const cell of G.cells){
    if(!cell.traps || !cell.traps.length) continue;
    if(cell._disarmT>0){ cell._disarmT=Math.max(0,cell._disarmT-dt); continue; }   // disarmed: decay + don't fire
    const r=cell.room; const syn=cell.syn||1; const vr=cell.vet||0;
    for(const tr of cell.traps){
      const d=tr.def; if(!d.aoe) continue;
      tr.fireT-=dt;
      if(tr.fireT>0) continue;                       // still charging
      // find targets in range; if none, hold the charge until someone is
      const lo=Math.max(0, cell.index-d.aoe), hi=cell.index+d.aoe;   // never reach outside the gate
      const targets=G.heroes.filter(o=>o && o.state!=='dead' && heroCellIndex(o)>=lo && heroCellIndex(o)<=hi);
      if(!targets.length) continue;
      tr.fireT=d.rate * (hasMandate('hairTrigger')?0.88:1);
      tr.firedAt=performance.now();                             // drives the painted strike animation
      let base=d.dmg * (1 + (r.lvl-1)*0.4) * syn * (1+(RB.trapDmg||0)) * (tr.stackMul||1);
      if(vr) base*=(1+vr*VET_DMG);
      if(doc==='inferno') base*=1.2;
      base*=ampAt(cell.index);                                  // Runestone / War Totem amplification
      const pierce=(doc==='bastion'||hasMandate('pierceHalls')||d.pierceAll)?'full':!!d.pierce;
      for(const o of targets){
        const dmg=Math.round(base + (vr?vr*VET_BITE*o.maxHp:0));
        _roomDmgCtx=r; dealToHero(o, dmg, 'BOOM', pierce, d.elem); _roomDmgCtx=null;
        if(o.state!=='dead' && (doc==='inferno'||hasMandate('wildfire'))){ o.burn=Math.max(o.burn||0, 3+(r.lvl-1)); o.burnT=3; }
        applyTrapStatus(o, d, r);
        if(G.stats) G.stats.trapDmg+=dmg;
      }
      if(doc==='soulengine' && G.boss) G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana+targets.length);
      burst(cell.x0+ROOM_W*0.5, FLOOR-40, d.col, 18); shake(4); sfx('boss');
      floater(cell.x0+ROOM_W*0.5, FLOOR-94, '💥 BOMBARD ×'+targets.length, d.col);
    }
  }
}

function fightTick(h, mon, dt, cell, isFront, frozen){
  // hero attacks monster (all party members in the room gang up) — unless frozen
  if(!frozen){
    h.atkT-=dt;
    if(h.atkT<=0){
      h.atkT=0.7*h.atkSpeed;
      const dmg=Math.max(1,Math.round(h.atk*heroAtkMul(h)));
      mon.hp-=dmg;
      if(h.vampiric) healHero(h, dmg*0.4);
      floater(cell.x0+ROOM_W*0.7, FLOOR-60,'-'+dmg,'#fff');
      if(mon.hp<=0){
        // Undying Legion mandate: each guard claws back once per wave
        if(hasMandate('undyingLegion') && !mon.revivedOnce){
          mon.revivedOnce=true; mon.hp=Math.round(mon.maxHp*0.5); mon.alive=true; mon.atkT=0.4;
          burst(cell.x0+ROOM_W*0.68,FLOOR-30,'#9a5cff',16); floater(cell.x0+ROOM_W*0.68,FLOOR-78,'💀 RISES','#b985ff');
          return; }
        // Gel Cube: reforms once at 60% HP when slain
        if(mon.split && !mon.didSplit){
          mon.didSplit=true; mon.hp=Math.round(mon.maxHp*0.6); mon.alive=true; mon.atkT=0.3;
          burst(cell.x0+ROOM_W*0.68,FLOOR-30,'#6ad9b0',16); floater(cell.x0+ROOM_W*0.68,FLOOR-78,'🟩 SPLIT','#6ad9b0');
          return; }
        mon.alive=false; burst(cell.x0+ROOM_W*0.68,FLOOR-30,cell.room.def.col,16);
        floater(cell.x0+ROOM_W*0.68,FLOOR-70,'SLAIN','#ff9a9a');
        // the next fused guard steps up to take its place (up to 3 in a row)
        if(cell.mon2 && cell.mon2.alive){ cell.mon=cell.mon2; cell.mon2=cell.mon3||null; cell.mon3=null; cell.mon.atkT=0.3;
          floater(cell.x0+ROOM_W*0.55, FLOOR-88, '⚔️ NEXT GUARD', '#ffd34d'); }
        return; }
    }
  }
  // monster strikes the front hero — or, for a Warden, the WHOLE party in the room
  if(isFront){
    mon.atkT-=dt;
    if(mon.atkT<=0){
      mon.atkT=0.9;
      const amp=ampAt(cell.index);
      const targets = cell.warden
        ? G.heroes.filter(o=>o && o.state==='fighting' && o.cellIndex===cell.index)   // taunt: hit everyone stalled here
        : [h];
      for(const t of targets){
        const vr=cell.vet||0; const bite=vr?Math.round(vr*VET_BITE*t.maxHp):0;
        const dmg=Math.round((mon.atk+bite)*amp);
        _roomDmgCtx=cell.room; dealToHero(t, dmg, 'HIT'); _roomDmgCtx=null;
        if(G.stats) G.stats.monDmg+=dmg;
        maybePotion(t);
      }
      if(cell.warden && targets.length>1) floater(cell.x0+ROOM_W*0.5, FLOOR-86, '🛡️ ×'+targets.length, '#c9a14d');
      if(bossDoc()==='soulengine' && G.boss){ G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana+2); }  // Soul Engine: guards fuel mana
    }
  }
}

function healHero(h, amt){
  if(!h||h.state==='dead'||amt<=0) return;
  const before=h.hp; h.hp=Math.min(h.maxHp, h.hp+amt);
  if(Math.round(h.hp)-Math.round(before)>=1) floater(h.x+10, h.y-46, '+'+Math.round(h.hp-before), '#7bdc6b');
}
function maybePotion(h){
  if(h.hasPotion && h.hp < h.maxHp*0.4){
    h.hasPotion=false;
    const heal=Math.round(h.maxHp*0.5);
    h.hp=Math.min(h.maxHp,h.hp+heal);
    floater(h.x,h.y-56,'+'+heal,'#7bdc6b');
  }
}

function doShopping(h, cell){
  // buy affordable, unsold items; price scales with the shop's level → you profit
  for(const s of cell.room.stock){
    if(s.sold) continue;
    const price=salePrice(cell.room, s.key);
    if(h.gold>=price){
      h.gold-=price; G.gold+=price; h.spent=(h.spent||0)+price; s.sold=true;   // sale is PROFIT — loot adds spent back
      const it=ITEMS[s.key];
      if(it.atk) h.atk+=it.atk;
      if(it.def) h.armor+=it.def;
      if(it.heal) h.hasPotion=true;
      floater(cell.x0+ROOM_W*0.5, FLOOR-70, '+'+price+'g', '#ffd34d');
      floater(h.x, h.y-44, it.ic+' bought', '#caa15e');
      sfx('buy');
    }
  }
}

function bossFightTick(h,dt,isFront,frozen){
  const b=G.boss;
  // every hero at the throne hammers the boss — unless frozen, or the boss is
  // briefly invulnerable just after a Phylactery revive
  if(!frozen && !(b.reviveT>0)){
    h.atkT-=dt;
    if(h.atkT<=0){
      h.atkT=0.8*h.atkSpeed;
      const dr=Math.min(0.85,(RB.bossDR||0)+(b.passiveDR||0));
      const dmg=Math.max(1,Math.round(h.atk*heroAtkMul(h)*(1-dr)));
      b.hp-=dmg;
      if(G.combo>0) G.combo=0;                 // defense breached — streak broken
      if(h.vampiric) healHero(h, dmg*0.4);
      if(b.thorns){ dealToHero(h, Math.round(dmg*b.thorns), 'THORNS'); }  // Spiked Throne reflect
      floater(bossX(), FLOOR-90, '-'+dmg, '#ff7a8a');
      burst(bossX(), FLOOR-50, '#ff4d6d', 6);
      shake(3); sfx('boss'); gainRage(3);        // being struck at the throne stokes wrath too
      if(b.hp<=0){ b.hp=0; G.killer=snapshotHero(h); bossDies(); return; }
    }
  }
  // boss only swings at the front hero
  if(isFront){
    h._batk=(h._batk||0)-dt;
    if(h._batk<=0){
      h._batk=1.0;
      const cm=1+(h.corrupt||0)*CORRUPT_BOSS;          // corruption empowers the boss
      dealToHero(h, Math.round(b.atk*cm), 'SLAM');
      maybePotion(h);
    }
  }
}

/* ============================== RENDER =================================== */
let _bgGrad=null,_bgGradH=0, _thrGrad=null,_thrKey='', _demGrad=null,_demKey='';
// nameplate banner (champion/King/rival arrivals) + wave-end slow-mo kill cam
let bannerMsg=null, killCamT=0;
function banner(text, col, sub){ bannerMsg={text, sub:sub||'', col:col||'#ffd34d', t:0, dur:2.4}; }
function drawBanner(){
  if(!bannerMsg) return;
  const m=bannerMsg, p=m.t/m.dur;
  const a=Math.min(1, p*6, (1-p)*4);                  // quick in, gentle out
  const slide=(1-Math.min(1,p*5))*40;
  X.setTransform(1,0,0,1,0,0);
  const W=CV.width, bh=Math.round(CV.height*0.16), by=Math.round(CV.height*0.24);
  X.globalAlpha=a*0.78; X.fillStyle='#0c0916'; X.fillRect(0,by,W,bh);
  X.globalAlpha=a; X.fillStyle=m.col;
  X.fillRect(0,by,W,3); X.fillRect(0,by+bh-3,W,3);
  X.textAlign='center';
  X.font='bold '+Math.round(bh*0.34)+'px Trebuchet MS';
  X.fillText(m.text, W/2+slide, by+bh*0.46);
  if(m.sub){ X.font=Math.round(bh*0.22)+'px Trebuchet MS'; X.fillStyle='#e9e0ff';
    X.fillText(m.sub, W/2+slide*1.4, by+bh*0.80); }
  X.textAlign='left'; X.globalAlpha=1;
}
// Optional painted arena backdrop — drop art at arena/bg.png and it fills the
// screen behind the dungeon (green entrance on the left → storm-lit throne on
// the right), panning slightly toward the boss as the camera moves. Falls back
// to the plain gradient sky when absent.
let ARENA_BG=null;
if(typeof Image!=='undefined'){ ARENA_BG=new Image();
  ARENA_BG.onload=()=>{ ARENA_BG._ok=true;
    // the build camera may have been fitted before the art arrived (tiny no-art
    // world) — re-frame the full scene now that its true extent is known
    if(typeof G!=='undefined' && G && (G.phase==='build'||G.phase==='run') && typeof frameWave==='function') frameWave();
  };
  ARENA_BG.onerror=()=>{}; ARENA_BG.src='arena/bg.png'; }
// The backdrop IS the scene: a fixed landscape whose RIGHT edge is the boss's
// throne room; rooms build leftward over it. These helpers define its extent.
const ARENA_H=()=>VH*1.16;                       // sky + zoom-out headroom
function arenaNativeW(){ if(!(ARENA_BG&&ARENA_BG._ok)) return 0;
  const iw=ARENA_BG.naturalWidth||ARENA_BG.width||1, ih=ARENA_BG.naturalHeight||ARENA_BG.height||1;
  return ARENA_H()*iw/ih; }
// world width of the drawn scene: the art at native scale, stretched only if a
// huge dungeon outgrows it (the art must always cover the rooms + staging)
function arenaW(){ const aw=arenaNativeW(); return aw?Math.max(aw, corridorWidth()+STAGEW):0; }
function worldLeft(){ const aw=arenaW(); return aw? corridorWidth()-aw : -STAGEW; }
function draw(){
  const sh = shakeT>0 ? shakeMag*(shakeT/0.22) : 0;
  const ox = sh? (Math.random()*2-1)*sh : 0, oy = sh? (Math.random()*2-1)*sh : 0;
  // background fills the WHOLE canvas at any zoom (device space)
  X.setTransform(1,0,0,1,0,0); X.imageSmoothingEnabled=false;
  if(!_bgGrad || _bgGradH!==CV.height){          // gradients are costly to build on Safari — cache until resize
    _bgGrad=X.createLinearGradient(0,0,0,CV.height);
    _bgGrad.addColorStop(0,'#1a1230'); _bgGrad.addColorStop(1,'#0c0916');
    _bgGradH=CV.height;
  }
  X.fillStyle=_bgGrad; X.fillRect(0,0,CV.width,CV.height);

  if(!G) return;
  if(G.phase==='menu'||G.phase==='bossSelect'||G.phase==='edicts'){ X.setTransform(baseK,0,0,baseK,0,0); drawIdleScene(); return; }

  // (the painted arena backdrop is drawn in WORLD space inside drawDungeon, so
  //  it zooms & pans together with the rooms and the boss)

  // Zoom: scale the world about the floor line so it stays pinned to the bottom.
  const z = (G.phase==='build'||G.phase==='run') ? zoom : 1;
  const k = baseK*z, tY = FLOOR*baseK*(1-z);
  X.setTransform(k,0,0,k, ox*baseK, tY+oy*baseK);

  // Camera: follows the hero in run; drag to pan in build. Visible world width
  // grows when zoomed out (VW/z), so the whole dungeon can fit on screen.
  // The BOSS anchors to the screen's right edge: the rightmost visible world
  // is always the boss cell's right edge, so any spare width fills with the
  // painted landscape to the LEFT — never dead space right of the throne.
  const maxCam=corridorWidth()-VW/z;
  camX=clamp(camX, Math.min(minCam(),maxCam), maxCam);
  const tx = (wx)=>wx-camX;
  const isBuild = (G.phase==='build');
  drawDungeon(tx, 1, isBuild);

  // floaters & particles (world space)
  particles.forEach(p=>{ X.globalAlpha=clamp(p.life,0,1); X.fillStyle=p.col;
    const sx=tx(p.x); X.fillRect(sx, p.y, p.sz, p.sz); });
  X.globalAlpha=1;

  // 🔮 boss ability bolts — glowing projectiles streaking from the throne across
  // the corridor to their targets, with a comet trail so the source reads clearly
  if(bossBolts.length){
    X.lineCap='round';
    for(const b of bossBolts){
      const p=clamp(b.t/b.dur,0,1), e=p*p*(3-2*p);          // smoothstep ease
      const x=b.x0+(b.x1-b.x0)*e, y=b.y0+(b.y1-b.y0)*e, sx=tx(x);
      const te=Math.max(0,e-0.22), txp=tx(b.x0+(b.x1-b.x0)*te), typ=b.y0+(b.y1-b.y0)*te;
      X.strokeStyle=b.col; X.globalAlpha=0.55; X.lineWidth=6;
      X.beginPath(); X.moveTo(txp,typ); X.lineTo(sx,y); X.stroke();
      X.fillStyle=b.col; X.globalAlpha=0.9; X.beginPath(); X.arc(sx,y,7,0,Math.PI*2); X.fill();
      X.globalAlpha=0.3; X.beginPath(); X.arc(sx,y,14,0,Math.PI*2); X.fill();
      if(b.ic){ X.globalAlpha=clamp(1-p*0.3,0,1); X.font='18px Trebuchet MS'; X.textAlign='center';
        X.fillText(b.ic, sx, y+6); X.textAlign='left'; }
    }
    X.globalAlpha=1;
  }
  floats.forEach(f=>{ X.globalAlpha=clamp(f.life,0,1); X.textAlign='center';
    if(f.big){ const sz=Math.round(22+(1-f.life)*8);   // big callouts grow as they rise
      X.font='bold '+sz+'px Trebuchet MS';
      X.lineWidth=4; X.strokeStyle='rgba(0,0,0,.65)'; X.strokeText(f.txt, tx(f.x), f.y);
      X.fillStyle=f.col; X.fillText(f.txt, tx(f.x), f.y);
    } else { X.fillStyle=f.col; X.font='bold 16px Trebuchet MS'; X.fillText(f.txt, tx(f.x), f.y); } });
  X.globalAlpha=1; X.textAlign='left';

  // 💥 Overdrive shockwave — a bright ring sweeping out from the throne
  if(overdriveT>0){
    const p=1-(overdriveT/0.6);                 // 0→1 over the effect
    const cx=tx(cellX(G.slots)+ROOM_W*0.6), cy=FLOOR-40;
    const r=20+p*VW*1.1;
    X.globalAlpha=clamp(1-p,0,1)*0.8; X.strokeStyle=(G.boss&&G.boss.col)||'#ff5470'; X.lineWidth=10+(1-p)*18;
    X.beginPath(); X.arc(cx,cy,r,0,Math.PI*2); X.stroke(); X.globalAlpha=1;
  }

  // full-screen colour flash (device space, above everything)
  if(flashT>0 && flashDur>0){
    X.setTransform(1,0,0,1,0,0);
    X.globalAlpha=clamp(flashMax*(flashT/flashDur),0,1); X.fillStyle=flashCol;
    X.fillRect(0,0,CV.width,CV.height); X.globalAlpha=1;
  }
}

function drawDungeon(tx, scale, isBuild){
  // Painted backdrop in WORLD space — zooms & pans with the dungeon. Stretched
  // to frame the corridor (staging on the left → boss & throne on the right),
  // with the carved wall landing on the floor line.
  if(ARENA_BG && ARENA_BG._ok){
    const bgH=ARENA_H(), bgW=arenaW();                    // the scene, at native scale
    const bgTop=FLOOR-0.76*bgH;                           // wall (~76% down the art) sits on the floor
    X.imageSmoothingEnabled=true;
    X.drawImage(ARENA_BG, tx(worldLeft()), bgTop, bgW, bgH);   // right edge = the boss's throne
    X.imageSmoothingEnabled=false;
  }
  // floor (drawn wide/tall so it still covers the screen when zoomed out).
  // With a painted backdrop, let its carved wall show through — just lay a
  // translucent shade below the floor line so rooms/heroes still read.
  if(ARENA_BG && ARENA_BG._ok){
    X.fillStyle='rgba(18,12,30,.34)'; X.fillRect(-VW, FLOOR, VW*4, VH);
    X.fillStyle='rgba(46,35,80,.65)'; X.fillRect(-VW, FLOOR, VW*4, 4);
  } else {
    X.fillStyle='#241a3a';
    X.fillRect(-VW, FLOOR, VW*4, VH);
    X.fillStyle='#2e2350';
    X.fillRect(-VW, FLOOR, VW*4, 6);
  }

  // each cell. Front-of-hero trap parts are collected here and replayed after
  // the party draws, so e.g. a translucent flame can lick over the heroes.
  _frontTraps=[];
  for(let i=0;i<G.slots+1;i++){
    const isBoss=(i===G.slots);
    const x0=tx(cellX(i)); const w=ROOM_W*scale;
    drawRoomBg(x0,w,isBoss,i);
    if(isBoss){ drawBoss(x0+w*0.6); continue; }
    const room=G.rooms[i];
    const dropTarget = isBuild && pickupIdx>=0;   // we're holding a room to move
    if(!room){
      const beingDragged = roomDrag && roomDrag.dragging && i===roomDrag.from;   // empty slot picked up
      // empty slot — show the stone room art; overlay the placeable hint in build
      const ea = ROOM_IMG.empty && ROOM_IMG.empty._ok;
      if(ea){ if(beingDragged){ X.save(); X.globalAlpha=0.45; } drawRoomArt(x0,w,cellArt('empty',i)); drawCandles(x0,w,i); if(beingDragged) X.restore(); }
      if(isBuild || !ea){
        X.strokeStyle=beingDragged?'#ffd34d':(isBuild&&(selCard>=0||dropTarget))?'#ffd34d':'#4a3a72';
        X.setLineDash([6,5]); X.lineWidth=beingDragged?3:2;
        X.strokeRect(x0+6, FLOOR-120, w-12, 110); X.setLineDash([]);
        X.fillStyle=(isBuild&&(selCard>=0||dropTarget||beingDragged))?'#ffd34d':'#8a7ab8'; X.font='12px Trebuchet MS'; X.textAlign='center';
        X.fillText(beingDragged?'↔ moving':(dropTarget?'drop here':'empty'), x0+w/2, FLOOR-58); X.textAlign='left';
      }
      // tutorial: pulse the first empty slot during the "place" step
      if(isBuild && G && G.tutHi==='slot' && i===G.rooms.findIndex(r=>!r)){
        const pu=0.5+0.5*Math.sin(performance.now()/220);
        X.strokeStyle='#ffd34d'; X.globalAlpha=0.5+0.5*pu; X.lineWidth=3; X.setLineDash([]);
        X.strokeRect(x0+3, FLOOR-126, w-6, 122); X.globalAlpha=1;
      }
    } else if(roomDrag && roomDrag.dragging && i===roomDrag.from){
      // the room being dragged: lifted + faded
      const _ft=_frontTraps; _frontTraps=null;   // lifted room: draw its traps inline so they rise with it
      X.save(); X.globalAlpha=0.5; X.translate(0,-48); drawRoomFull(x0, w, room, i); X.restore();
      _frontTraps=_ft;
    } else {
      drawRoomFull(x0, w, room, i);
    }
    // picked-up room highlight
    if(isBuild && i===pickupIdx){
      X.strokeStyle='#ffd34d'; X.setLineDash([4,4]); X.lineWidth=3;
      X.strokeRect(x0+3, FLOOR-150, w-6, 150); X.setLineDash([]);
    }
    // drop-target highlight (dragging a card OR re-ordering/merging a room here)
    if(isBuild && (i===cardDragSlot || (roomDrag && roomDrag.dragging && i===roomDragTo))){
      const merge = roomDrag && roomDrag.dragging && i===roomDragTo && roomDragMerge;
      const pu=0.5+0.5*Math.sin(performance.now()/160);
      X.strokeStyle=merge?'#b06bff':'#7bdc6b'; X.globalAlpha=0.5+0.5*pu; X.lineWidth=4; X.setLineDash([]);
      X.strokeRect(x0+2, FLOOR-152, w-4, 152); X.globalAlpha=1;
      if(merge){ X.fillStyle='#e0c2ff'; X.font='bold 12px Trebuchet MS'; X.textAlign='center';
        X.fillText('⊕ MERGE', x0+w/2, FLOOR-160); X.textAlign='left'; }
    }
    // slot number tag in build
    if(isBuild){
      X.fillStyle='rgba(0,0,0,.4)'; X.fillRect(x0+4, FLOOR-138, 22,16);
      X.fillStyle='#cdbaff'; X.font='11px Trebuchet MS';
      X.fillText(i+1, x0+10, FLOOR-126);
    }
  }
  // upcoming heroes waiting at the gate (build only)
  if(isBuild) drawWaitingHeroes(tx);
  // hero
  // draw the whole raiding party (dead first so living draw on top)
  const party=(G.heroes&&G.heroes.length)?G.heroes:(G.hero?[G.hero]:[]);
  party.filter(h=>h.state==='dead').forEach(h=>drawHeroDead(tx(h.x), h));
  party.filter(h=>h.state!=='dead').forEach(h=>drawHero(tx(h.x), h));
  if(G.phase==='run') drawDenGoblins(tx);    // 👺 marching goblins from Den spawners
  // front-of-hero trap layers, replayed over the party (see HERO_LAYER)
  if(_frontTraps){ for(const f of _frontTraps) f(); _frontTraps=null; }
}
// Build a lightweight hero object from a queued spec for drawing/preview.
function previewHeroObj(spec){
  let cls=spec.cls; if(G.fx.temple>0 && cls==='cleric') cls='warrior';
  const c=CLASSES[cls]; const ps=previewStats(spec);
  const champ=spec.champion?CHAMPIONS[spec.champion]:null;
  return { cls, ...c, traits:spec.traits, elite:(spec.traits.length>0)||!!champ,
    champion:spec.champion||null, champIc:champ?champ.ic:null, champCol:champ?champ.col:null,
    heroName:spec.name, title:spec.title||(champ?champ.title:null),
    hp:ps.hp, maxHp:ps.hp, gold:ps.gold, state:'idle', walkAnim:0, yOff:0,
    shieldT:0, freeze:0, chill:0, oil:0, shock:0 };
}
// Show the next wave standing ready in the staging zone left of the entrance.
function drawWaitingHeroes(tx){
  if(G.mode==='campaign') prepCampaignWave();    // make sure the cached wave is rolled
  if(!G.queue || !G.queue.length) return;
  // Campaign: the whole wave is queued, so show it all. Endless: a champion raids
  // alone, otherwise the guild-sized party.
  let n;
  if(G.mode==='campaign') n=Math.min(G.queue.length, 9);
  else n=G.queue[0].champion ? 1 : Math.min(G.queue.length, G.guildLvl+1+(hasEdict('warband')?1:0));
  const hasChamp = G.queue.slice(0,n).some(s=>s.champion);
  // gate line at the entrance
  X.strokeStyle='rgba(120,100,170,.5)'; X.setLineDash([4,5]); X.lineWidth=2;
  X.beginPath(); X.moveTo(tx(0), FLOOR-150); X.lineTo(tx(0), FLOOR); X.stroke(); X.setLineDash([]);
  for(let k=0;k<n;k++){
    const h=previewHeroObj(G.queue[k]);
    const wx = -STAGEW*0.62 + k*14;
    h.yOff = (k-(n-1)/2)*13;
    X.globalAlpha=0.92; drawHero(tx(wx), h); X.globalAlpha=1;
  }
  X.fillStyle=hasChamp?'#ff7a8a':'#cdbaff'; X.font='bold 11px Trebuchet MS'; X.textAlign='center';
  X.fillText(hasChamp?'⚔️ CHAMPION!':'⏳ Next wave →', tx(-STAGEW*0.5), FLOOR-128);
  X.textAlign='left';
}

function drawRoomBg(x0,w,isBoss,i){
  X.fillStyle=isBoss?'#2a1530':'#191230';
  X.fillRect(x0, FLOOR-150, w, 150);
  // wall pillars
  X.fillStyle='#120c24';
  X.fillRect(x0, FLOOR-150, 4, 150);
  X.fillStyle=isBoss?'#5a2a4a':'#251b44';
  X.fillRect(x0, FLOOR-150, w, 5);
  if(isBoss){
    // throne glow (cached — only moves when the corridor gains a slot)
    const tk=x0+'_'+w;
    if(!_thrGrad || _thrKey!==tk){
      _thrGrad=X.createRadialGradient(x0+w*0.6,FLOOR-70,8,x0+w*0.6,FLOOR-70,90);
      _thrGrad.addColorStop(0,'rgba(180,60,140,.35)'); _thrGrad.addColorStop(1,'rgba(0,0,0,0)');
      _thrKey=tk;
    }
    X.fillStyle=_thrGrad; X.fillRect(x0,FLOOR-150,w,150);
  }
}

// chunky pixel rect helper
function px(x,y,w,h,c){ X.fillStyle=c; X.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

// Draw ONE layout part of a trap (its n copies), with its light effect.
// Returns true if any painted art was drawn. Flame columns ignite LEFT to
// RIGHT (copy c fires 70ms after the previous one).
function drawTrapPart(x0,w,type,p,pi,cell){
  let firedAt=null;
  if(G && G.phase==='run' && cell && cell.traps){
    const tr=cell.traps.find(t=>t.type===type); if(tr && tr.firedAt) firedAt=tr.firedAt;
  } else if(G && G.phase==='build'){
    firedAt=(performance.now() - (performance.now()%2400)) + (TRAP_PHASE[type]||0);
  }
  const id=p.art||type, rec=ART[id]; if(!rec) return false;
  const mode=p.mode||TRAP_ANIM[type];
  const n=p.n||1, gap=p.gap||0.2, seed=(cell?cell.index*3:0)+pi*4+1;
  const N=rec.frames.length;
  const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=false;
  // flame reads as 50% see-through so heroes appear to walk through the fire
  const partAlpha=(p.alpha!=null?p.alpha:(type==='flame'?0.5:1));
  let drew=false;
  for(let c=0;c<n;c++){
    let img, inten=1;
    if(N>1){
      const idx=(mode==='loop') ? Math.floor(performance.now()/110+seed+c*3)%N
                                : strikeIdx(N, firedAt!=null?firedAt+c*70:null, type);
      img=rec.frames[idx]||rec.frames[0]; inten=idx/(N-1);
    } else img=rec.frames[0]||rec.static;
    if(!(img&&(img._ok||img.complete)&&img.width)) continue;
    drew=true;
    const dh=p.h||100, dw=dh*(img.width/img.height);
    const fx=(p.fx!=null?p.fx:.5)+(c-(n-1)/2)*gap;
    const px0=x0+w*fx-dw/2, py=FLOOR-(p.fy||0)-dh;
    if(partAlpha<1){ X.save(); X.globalAlpha*=partAlpha; }
    if(p.flip){ X.save(); X.translate(Math.round(px0+dw/2),0); X.scale(-1,1);
      X.drawImage(img, Math.round(-dw/2), Math.round(py), Math.round(dw), Math.round(dh)); X.restore(); }
    else X.drawImage(img, Math.round(px0), Math.round(py), Math.round(dw), Math.round(dh));
    if(partAlpha<1) X.restore();
    // light: heat per flame column (follows the strike), vapor per poison part
    if(type==='flame'){ const l=lightCfg('flame');
      if(l) drawGlow(x0+w*fx, FLOOR-(l.fy||70), l.r||56, LIGHT_COL.heat, 0.55*Math.pow(inten,1.3)*(l.a||1)); }
    else if(type==='venom'){ const l=lightCfg('venom'+pi);
      if(l) drawGlow(x0+w*(l.fx!=null?l.fx:fx), FLOOR-(l.fy||34), l.r||44, LIGHT_COL.vapor,
        0.32*(l.a||1)*(0.825+0.175*Math.sin(performance.now()/260+seed*2.1))); }   // 65–100% of peak, quick simmer
    // accent glows: a base ambient that flares with the strike (inten). Position
    // falls back to the trap's own centre when the layout has no light entry yet.
    else if(type==='frost')
      trapAccentGlow('frost',x0,w,fx,p,LIGHT_COL.frost, 0.16+0.34*inten);
    else if(type==='tesla'){ const fl=0.62+0.38*Math.abs(Math.sin(performance.now()/55+seed)); // electric flicker
      trapAccentGlow('tesla',x0,w,fx,p,LIGHT_COL.tesla, (0.14+0.40*inten)*fl); }
    else if(type==='hexward'){ const pu=0.78+0.22*Math.sin(performance.now()/430+seed); // slow arcane pulse
      trapAccentGlow('hexward',x0,w,fx,p,LIGHT_COL.hexward, (0.16+0.30*inten)*pu); }
    else if(type==='corrode'){ const bub=0.85+0.15*Math.sin(performance.now()/180+seed); // toxic simmer
      trapAccentGlow('corrode',x0,w,fx,p,LIGHT_COL.corrode, (0.18+0.30*inten)*bub); }
    else if(type==='magebane'){ const pu=0.74+0.26*Math.sin(performance.now()/380+seed); // arcane pulse
      trapAccentGlow('magebane',x0,w,fx,p,LIGHT_COL.magebane, (0.16+0.30*inten)*pu); }
  }
  X.imageSmoothingEnabled=sm;
  return drew;
}
function drawTrapProp(x0,w,cx,type,cell){
  // procedural fallback prop (painted parts are drawn by drawTrapPart)
  if(type==='spike'){
    for(let s=0;s<5;s++){ const sx=x0+18+s*((w-36)/4);
      px(sx,FLOOR-14,10,14,'#cfd6e0'); px(sx+2,FLOOR-14,6,8,'#9aa4b2'); }
  } else if(type==='flame'){
    px(cx-26,FLOOR-10,52,10,'#3a2a1a');
    for(let f=0;f<3;f++){ const fx=cx-20+f*20;
      px(fx,FLOOR-34,8,24,'#ff7a2e'); px(fx+1,FLOOR-26,6,16,'#ffd34d'); }
  } else if(type==='arrow'){
    px(x0+8,FLOOR-90,8,80,'#3a2c1a');
    for(let a=0;a<4;a++){ px(x0+16,FLOOR-80+a*18,18,3,'#caa15e'); }
  } else if(type==='oil'){
    px(cx-28,FLOOR-7,56,7,'#23231a');                       // slick puddle
    X.globalAlpha=0.5; px(cx-20,FLOOR-9,40,4,'#4a4a2a'); X.globalAlpha=1;
    px(cx-10,FLOOR-22,8,15,'#1a1a12'); px(cx-9,FLOOR-30,6,8,'#2a2a1a'); // barrel
  } else if(type==='frost'){
    for(let s=0;s<4;s++){ const sx=cx-21+s*14;
      px(sx,FLOOR-20,6,20,'#bfefff'); px(sx+1,FLOOR-26,4,8,'#9adfff'); }
    X.globalAlpha=0.25; px(cx-26,FLOOR-12,52,12,'#9adfff'); X.globalAlpha=1;
  } else if(type==='tesla'){
    px(cx-3,FLOOR-40,6,40,'#6a6a7a'); px(cx-9,FLOOR-46,18,8,'#caa15e');  // coil
    const t=performance.now()/120;
    X.strokeStyle='#fff34d'; X.lineWidth=2; X.globalAlpha=0.6+0.4*Math.sin(t);
    X.beginPath(); X.moveTo(cx-9,FLOOR-44); X.lineTo(cx-2,FLOOR-52); X.lineTo(cx+6,FLOOR-46); X.lineTo(cx+10,FLOOR-54); X.stroke();
    X.globalAlpha=1;
  } else if(type==='magebane'){
    px(cx-9,FLOOR-12,18,12,'#3a2c4a'); px(cx-11,FLOOR-2,22,3,'#241a30');   // stand
    X.fillStyle='#b163ff'; X.beginPath(); X.arc(cx,FLOOR-26,11,0,7); X.fill();          // orb
    X.fillStyle='#e0b3ff'; X.beginPath(); X.arc(cx-3,FLOOR-29,3.5,0,7); X.fill();        // glint
    const t=performance.now()/240; X.globalAlpha=0.25+0.15*Math.sin(t);
    X.fillStyle='#b163ff'; X.beginPath(); X.arc(cx,FLOOR-26,15,0,7); X.fill(); X.globalAlpha=1;
  } else if(type==='maul'){
    px(cx-3,FLOOR-54,6,54,'#5a4326');                                       // handle
    px(cx-17,FLOOR-66,34,16,'#9aa4b2');                                     // hammer head
    px(cx-17,FLOOR-66,7,16,'#6a7280'); px(cx+10,FLOOR-66,7,16,'#6a7280');   // dark caps
    px(cx-12,FLOOR-63,4,4,'#cfd6e0');                                       // shine
  } else if(type==='gallows'){
    px(cx-24,FLOOR-6,46,6,'#3a2c1a');                                       // platform
    px(cx-20,FLOOR-72,7,66,'#5a4326');                                      // upright post
    px(cx-20,FLOOR-72,32,7,'#5a4326');                                      // top beam
    px(cx+8,FLOOR-65,3,15,'#caa39a');                                       // rope
    X.strokeStyle='#caa39a'; X.lineWidth=2;                                 // noose loop
    X.beginPath(); X.arc(cx+9,FLOOR-44,6,0,7); X.stroke();
  } else if(type==='hexward'){

// frames race UP fast (~0.11s), then run back DOWN slow (~0.48s), then rest
// on frame 0 (armed) until the next fire. Works with any frame count — 4-5
// frames is plenty; more only adds smoothness. Static art shows as-is.
const TRAP_RISE=110, TRAP_FALL=480;
function artFrame(id, firedAt, loop){
  const r=ART[id]; if(!r) return null;
  const N=r.frames.length;
  if(!N) return r.static;
  if(N===1) return r.frames[0];
  if(loop) return r.frames[Math.floor(performance.now()/110+(loop===true?0:loop))%N]||r.frames[0];
  let f=0;
  if(firedAt!=null){
    const e=performance.now()-firedAt;
    if(e<TRAP_RISE) f=Math.max(0, Math.min(N-1, Math.floor(e/TRAP_RISE*N)));   // max(0): cascaded copies fire slightly later                  // snap up
    else if(e<TRAP_RISE+TRAP_FALL) f=Math.max(0, N-1-Math.floor((e-TRAP_RISE)/TRAP_FALL*N)); // ease down

function drawTeslaArcs(x0, w, cell){

    X.strokeStyle='#9adfff'; X.lineWidth=1.4; X.globalAlpha=0.4+0.4*fade;
    for(let i=1;i<targets.length;i++) drawJaggedBolt(targets[i-1].x, targets[i-1].y-30, targets[i].x, targets[i].y-30);

    const dt=Math.min(0.1,(now-(h._champLast||now))/1000); h._champLast=now;
    h._champT=(h._champT||0)+dt;

    h._champT=(h._champT||0)+dt;
    im = ROGUE_IDLE[Math.floor(h._champT*ROGUE_IDLE_FPS)%5]; dh=ROGUE_IDLE_DH;
  } else {
    h._champClip='idle'; h._champLast=now; im=ROGUE_WALK[0] || ROGUE_IDLE[0]; dh=ROGUE_IDLE_DH;

  X.drawImage(im, Math.round(sx-dw/2), Math.round(footY-dh+2), dw, dh);

}

function drawChampion(sx, footY, h){
  const moving = h.state==='walking' && !(h.freeze>0) && (h._animPX===undefined || Math.abs(h.x-h._animPX)>0.02);
  const fighting = (h.state==='fighting'||h.state==='boss') && !(h.freeze>0);
  const now=performance.now();
  let im, dh=CHAMP_DH;
  if(fighting && champAtkReady()){
    // sync the swing to the attack timer so the blade lands when the damage does:
    // h.atkT counts down from the attack interval to 0 (the hit) each swing
    const iv=(h.state==='boss'?0.8:0.7)*(h.atkSpeed||1);
    const prog=Math.max(0, Math.min(0.999, 1-(h.atkT||0)/iv));
    im=CHAMP_ATK[Math.floor(prog*14)]; dh=CHAMP_ATK_DH;
    h._champClip='attack'; h._champLast=now;
  } else if(moving){
    if(h._champClip!=='walk'){ h._champClip='walk'; h._champT=0; }
    const dt=Math.min(0.1,(now-(h._champLast||now))/1000); h._champLast=now;
    h._champT=(h._champT||0)+dt;
    im=CHAMP_WALK[1+Math.floor(h._champT*12)%11];          // walk cycle = frames 1..11 @12fps
  } else { h._champClip='idle'; h._champLast=now; im=CHAMP_WALK[0]; }   // neutral stance
  h._animPX=h.x;
  if(!im||!im._ok) return false;
  const dw=Math.round(dh*(im.width/im.height));
  const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=true;
  X.drawImage(im, Math.round(sx-dw/2), Math.round(footY-dh+2), dw, dh);
  X.imageSmoothingEnabled=sm;
  return true;
}

function drawHeroDead(sx,h){
  const y=FLOOR+(h.yOff||0);

  // the Super Knight set.
  const useRogue = isRogueChamp(h) && ROGUE_DEATH.length && ROGUE_DEATH.every(im=>im&&im._ok);
  const arr = useRogue ? ROGUE_DEATH : (h.champion ? CHAMP_DEATH : null);
  if(arr && arr.length){
    const dhBase = useRogue ? ROGUE_DEATH_DH : CHAMP_DEATH_DH;
    const N=arr.length;
    const f=Math.min(N-1, h.diedAt!=null ? Math.floor((performance.now()-h.diedAt)/CHAMP_DEATH_MS) : N-1);
    const im=arr[f];
    if(im && im._ok){
      const dh=dhBase, dw=dh*(im.width/im.height);
      const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=false;
      X.drawImage(im, Math.round(sx-dw/2), Math.round(y-dh), Math.round(dw), Math.round(dh));
