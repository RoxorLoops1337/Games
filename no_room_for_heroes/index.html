// Real boss artwork (small quantized PNGs in bosses/). Preloaded; drawBoss
// falls back to the procedural body until/unless the image is ready.
const BOSS_IMG={};
if(typeof Image!=='undefined'){
  ['dragon','golem','lich','ent','demon','ogre'].forEach(k=>{
    const im=new Image(); im.onload=()=>{ im._ok=true; }; im.src='bosses/'+k+'.png'; BOSS_IMG[k]=im;
  });
}
// Demon idle: 4 frames played as a ping-pong loop (0→1→2→3→2→1→…)
const DEMON_IDLE=[]; const DEMON_PP=[0,1,2,3,2,1];
if(typeof Image!=='undefined'){
  for(let i=0;i<4;i++){ const im=new Image(); im.onload=()=>{im._ok=true;}; im.src='sprites/demon/demon_idle_'+i+'.png'; DEMON_IDLE.push(im); }
}
function demonIdleReady(){ return DEMON_IDLE.length===4 && DEMON_IDLE.every(im=>im&&im._ok); }
function demonIdleFrame(){ return DEMON_IDLE[DEMON_PP[Math.floor(performance.now()/170)%DEMON_PP.length]]; }  // ~6fps ping-pong
// Azzaroth's purple arcane glow. front=false → back-glow + ground pool (drawn
// behind the sprite); front=true → rising magic motes (drawn in front).
function drawDemonAura(cx, y, dw, dh, front){
  const now=performance.now(); const pulse=0.5+0.5*Math.sin(now/640);
  if(!front){
    const gx=cx, gy=y-dh*0.55, gr=dw*0.72;
    // cached gradient at peak alpha; the pulse modulates via globalAlpha instead
    // of rebuilding the gradient (with its toFixed string churn) every frame
    const dk=Math.round(gx)+'_'+Math.round(gy)+'_'+Math.round(gr);
    if(!_demGrad || _demKey!==dk){
      _demGrad=X.createRadialGradient(gx,gy,3, gx,gy,gr);
      _demGrad.addColorStop(0,'rgba(190,90,240,0.48)');
      _demGrad.addColorStop(0.45,'rgba(150,55,210,0.226)');
      _demGrad.addColorStop(1,'rgba(150,55,210,0)');
      _demKey=dk;
    }
    X.globalAlpha=0.708+0.292*pulse;
    X.fillStyle=_demGrad; X.beginPath(); X.arc(gx,gy,gr,0,7); X.fill();
    X.globalAlpha=1;
    // ground light pool under the throne
    X.globalAlpha=0.16+0.10*pulse; X.fillStyle='#b06bff';
    X.beginPath(); X.ellipse(cx,y,dw*0.42,9,0,0,7); X.fill(); X.globalAlpha=1;
  } else {
    // rising arcane motes
    for(let i=0;i<7;i++){
      const seed=i*0.137, prog=((now/1000*0.4)+seed)%1;       // 0..1, loops ~2.5s
      const my=y-3 - prog*(dh*0.95);
      const mx=cx + Math.sin(now/780 + i*1.9)*(dw*0.34) + (i-3)*2;
      const a=Math.sin(prog*Math.PI)*0.75; if(a<=0) continue;
      const sz=2+(i%2);
      X.globalAlpha=a*0.5; X.fillStyle='#d9a8ff'; X.fillRect(mx-1,my-1,sz+2,sz+2);  // soft halo
      X.globalAlpha=a;     X.fillStyle='#f0d6ff'; X.fillRect(mx,my,sz,sz);          // bright core
    }
    X.globalAlpha=1;
  }
}

  const ch=h.champion?CHAMPIONS[h.champion]:null;

    `❤️ <b>${Math.ceil(h.hp)}</b>/${h.maxHp} HP · 🗡️ <b>${(+h.atk).toFixed(1)}</b> atk · 🛡 ${h.armor} armor`,
    `🏃 speed ${Math.round(h.spd)} · 💰 ${h.gold}${h.dodge?' · 35% dodge':''}`];
  if(ch) lines.push(`<span style="color:${ch.col}">${ch.desc}</span>`+(h.shieldT>0?' · 🛡 shielded':''));
  if(h.traits&&h.traits.length) lines.push('Traits: '+h.traits.map(t=>TRAITS[t].ic+' '+TRAITS[t].name).join(', '));
  const fx=[h.burn>0?'🔥 burning':'',h.freeze>0?'❄️ frozen':'',h.chill>0?'❄️ chilled':'',
    h.oil>0?'🛢️ oiled':'',h.shock>0?'⚡ shocked':'',h.reactCount>1?'⚛️ reaction ×'+h.reactCount:'',
    h.corrupt>0?'☣ corrupt ×'+h.corrupt:'',h.hasPotion?'🧪 potion':''].filter(Boolean).join(' · ');
  if(fx) lines.push(fx);
  return lines.join('<br>');
}
function describeBoss(){
  const b=G.boss;
  const lines=[`<b>${b.ic} ${b.name}</b> · Lv ${b.lvl}${b.masteryLvl>1?` · ★ Mastery ${b.masteryLvl}`:''}`,
    `❤️ <b>${Math.ceil(b.hp)}</b>/${b.maxHp} HP · 🗡️ ${b.atk} atk · 🔷 ${Math.floor(b.mana)}/${b.maxMana} mana`,
    'Abilities: '+b.abil.map(a=>ABIL[a.id].ic+' '+ABIL[a.id].name).join(', ')];
  if(b.doc&&DOCTRINES[b.doc]) lines.push(`<span style="color:${b.col};font-weight:bold">${DOCTRINES[b.doc].ic} ${DOCTRINES[b.doc].name}</span> — ${DOCTRINES[b.doc].desc}`);
  if(b.passive&&PASSIVES[b.passive]) lines.push(`<span style="color:${b.col}">✦ ${PASSIVES[b.passive].name}</span> — ${PASSIVES[b.passive].desc}`);
  const totalDR=Math.min(0.85,(RB.bossDR||0)+(b.passiveDR||0));
  if(totalDR) lines.push(`Damage reduction: ${Math.round(totalDR*100)}%`);
  if(G.relics&&G.relics.length)
    lines.push('Relics: '+G.relics.map(id=>{const r=RELICS[id];return `<span style="color:${RELIC_TIERS[r.tier].col}">${r.ic}${r.name}</span>`;}).join(', '));
  if(G.mandates&&G.mandates.length)
    lines.push('Mandates: '+G.mandates.map(id=>`<span style="color:#ff9a3a">${MANDATES[id].ic}${MANDATES[id].name}</span>`).join(', '));
  return lines.join('<br>');
}

/* ============================ CANVAS INPUT =============================== */
// Drag to pan the dungeon (build + run); a tap (no drag) places/upgrades a room
// in the build phase. Panning during a run temporarily suspends auto-follow.
let drag=null, panning=false, panHoldUntil=0;
let pointers={}, pinch=null;
let roomDrag=null, roomDragTo=-1, roomDragX=0, roomDragMerge=false;
function clientToVX(e){ const rect=CV.getBoundingClientRect();
  return (e.clientX-rect.left)*(VW/rect.width); }
function clientToWorldX(e){ return camX + clientToVX(e)/zoom; }
function clientToVY(e){ const rect=CV.getBoundingClientRect();
  const deviceY=(e.clientY-rect.top)*(CV.height/rect.height);
  const z=(G&&(G.phase==='build'||G.phase==='run'))?zoom:1; const k=baseK*z; const tY=FLOOR*baseK*(1-z);
  return (deviceY - tY)/k; }
// Move a room from one slot to another, pushing the rooms in between over.
function moveRoom(from,to){
  if(from===to || from<0 || to<0 || from>=G.slots || to>=G.slots) return;
  const [r]=G.rooms.splice(from,1); G.rooms.splice(to,0,r);
  sfx('upgrade'); showHint('Rooms rearranged.'); render();
}
// Merge built room `from` INTO `to`, recycling an old room into a combo.
function fuseRooms(from,to){
  const a=G.rooms[from], b=G.rooms[to];
  if(!canFuseRooms(b,a)) return;
  const third=!!b.part2;
  if(third){ if(G.gold<FUSE3_GOLD){ showHint('A 3rd part costs '+FUSE3_GOLD+'g — not enough gold.'); return; } G.gold-=FUSE3_GOLD; }
  if(third) b.part3=a.type; else b.part2=a.type;
  if(a.type==='minion'){ b.minHp=a.minHp; b.minAtk=a.minAtk; if(!b.label) b.label=a.label; }  // carry the corrupted hero's stats
  b.kills=(b.kills||0)+(a.kills||0);   // carry the absorbed room's veteran progress
  b.lvl=Math.min(maxLevel(), Math.max(b.lvl, a.lvl));
  G.rooms[from]=null;                  // the absorbed room's slot opens up
  if(selCard>=0) selCard=-1; pickupIdx=-1;
  const info=synergyInfo(roomParts(b));
  burst(cellX(to)+ROOM_W/2, FLOOR-40, '#9a5cff', 24);
  floater(cellX(to)+ROOM_W/2, FLOOR-86, info.name||'MERGED', info.tone==='bad'?'#ff7a8a':'#7bdc6b');
  sfx('upgrade'); showHint('Merged → '+comboName(b)+(info.name?' ('+info.name+' ×'+info.m.toFixed(2)+')':'')+'!');
  render(); showInspectEntity({kind:'room',room:b});
}
// Spend gold to level a room up (alternative to drawing a matching card).
function upgradeRoomGold(idx){
  if(!G || G.phase!=='build') return;
  const room=G.rooms[idx]; if(!room) return;
  if(room.lvl>=maxLevel()){ showHint(comboName(room)+' is already max level.'); return; }
  const cost=roomUpgradeCost(room);
  if(G.gold<cost){ showHint('Not enough gold — need '+cost+'g.'); return; }
  G.gold-=cost; room.lvl++;
  burst(cellX(idx)+ROOM_W/2, FLOOR-30, '#ffd34d', 16);
  floater(cellX(idx)+ROOM_W/2, FLOOR-70, 'LVL '+room.lvl, '#ffd34d');
  sfx('upgrade'); showHint(comboName(room)+' upgraded to Lv '+room.lvl+' for '+cost+'g.');
  render(); showInspectEntity({kind:'room',room});
}
// Max zoom-out is EXACTLY the full painted scene — never further (no void).
function zMin(){ return Math.min(ZMAX, VW/Math.max(1, corridorWidth()-worldLeft())); }
function setZoom(z){ zoom=clamp(z, zMin(), ZMAX); }
function zoomBy(f){ setZoom(zoom*f); draw(); }
// The gameplay framing: boss flush right, the rooms, the gate, and about one
// room's worth of landscape beyond it — used at wave start and back in build.
function frameWave(){ if(!G) return;
  const vis=Math.min(corridorWidth()-worldLeft(), corridorWidth()+STAGEW+ROOM_W);
  zoom=clamp(VW/Math.max(1,vis), zMin(), ZMAX);
  camX=corridorWidth()-VW/zoom; draw();
}
// Wave-start framing: camera as far RIGHT as possible while the marching
// party is still in frame (leftmost hero + a small margin → right edge = boss).
function frameWaveRun(){ if(!G) return;
  let heroLeft=-STAGEW;
  if(G.heroes&&G.heroes.length) heroLeft=Math.min.apply(null,G.heroes.map(h=>h.x));
  const vis=corridorWidth()-(heroLeft-24);
  zoom=clamp(VW/Math.max(1,vis), zMin(), ZMAX);
  camX=corridorWidth()-VW/zoom; draw();
}
function zoomFit(){ if(!G) return;   // fit the WHOLE scene (landscape → throne)
  zoom=clamp(VW/Math.max(1,corridorWidth()-worldLeft()), zMin(), 1.2); camX=worldLeft(); draw(); }

CV.addEventListener('pointerdown', e=>{
  { const _r=CV.getBoundingClientRect(); lastPtrCX=e.clientX-_r.left; lastPtrCY=e.clientY-_r.top; }   // anchor for the inspect bubble
  if(!G || (G.phase!=='build' && G.phase!=='run')) return;
  e.preventDefault();
  pointers[e.pointerId]={x:e.clientX,y:e.clientY};
  if(Object.keys(pointers).length===2){           // begin pinch-zoom
    const v=Object.values(pointers);
    pinch={ d0:Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y)||1, z0:zoom };
    drag=null; panning=false; cardDrag=null; endCardGhost(); return;
  }
  try{ CV.setPointerCapture(e.pointerId); }catch(_){}
  // In build, pressing ON a slot (no card selected) picks it up to drag — works
  // for EMPTY slots too, so the gap can be repositioned in the corridor.
  if(G.phase==='build' && selCard<0){
    const slot=Math.floor(clientToWorldX(e)/ROOM_W); const vy=clientToVY(e);
    if(slot>=0 && slot<G.slots && vy>FLOOR-152 && vy<FLOOR+16){
      roomDrag={ id:e.pointerId, from:slot, sx:e.clientX, sy:e.clientY, dragging:false };
      return;
    }
  }
  drag={ id:e.pointerId, startCX:e.clientX, cam0:camX, moved:false };
  panning=true;
}, {passive:false});

CV.addEventListener('pointermove', e=>{
  if(pointers[e.pointerId]) pointers[e.pointerId]={x:e.clientX,y:e.clientY};
  if(pinch){ const v=Object.values(pointers); if(v.length>=2){
    const d=Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y); setZoom(pinch.z0*(d/pinch.d0)); } return; }
  if(roomDrag && e.pointerId===roomDrag.id){
    const dx=e.clientX-roomDrag.sx, dy=e.clientY-roomDrag.sy;
    if(!roomDrag.dragging && Math.hypot(dx,dy)>8){ roomDrag.dragging=true; hideInspect(); }
    if(roomDrag.dragging){ e.preventDefault();
      roomDragX=clientToWorldX(e);
      roomDragTo=clamp(Math.floor(roomDragX/ROOM_W), 0, G.slots-1);
      // dropping onto the CENTRE of another (fusable) room merges; edges reorder
      const frac=roomDragX/ROOM_W - roomDragTo;
      roomDragMerge = roomDragTo!==roomDrag.from && frac>0.28 && frac<0.72
        && canFuseRooms(G.rooms[roomDragTo], G.rooms[roomDrag.from]);
      draw();
    }
    return;
  }
  if(!drag || e.pointerId!==drag.id) return;
  const rect=CV.getBoundingClientRect();
  const dxV=(e.clientX-drag.startCX)*(VW/rect.width);
  if(Math.abs(e.clientX-drag.startCX)>6) drag.moved=true;
  const maxCam=corridorWidth()-VW/zoom;
  camX=clamp(drag.cam0 - dxV/zoom, Math.min(minCam(),maxCam), maxCam);
});
CV.addEventListener('wheel', e=>{
  if(!G || (G.phase!=='build' && G.phase!=='run')) return;
  e.preventDefault(); zoomBy(e.deltaY<0 ? 1.12 : 0.9);
}, {passive:false});

function endDrag(e){
  if(e){ delete pointers[e.pointerId]; if(Object.keys(pointers).length<2) pinch=null; }
  if(roomDrag && (!e || e.pointerId===roomDrag.id)){
    if(roomDrag.dragging && roomDragTo>=0 && roomDragTo!==roomDrag.from){
      if(roomDragMerge && canFuseRooms(G.rooms[roomDragTo], G.rooms[roomDrag.from]))
        fuseRooms(roomDrag.from, roomDragTo);
      else moveRoom(roomDrag.from, roomDragTo);
    } else if(!roomDrag.dragging){
      const r=G.rooms[roomDrag.from]; if(r) showInspectEntity({kind:'room',room:r});   // tap = inspect
    }
    roomDrag=null; roomDragTo=-1; roomDragMerge=false; draw(); return;
  }
  if(!drag || (e && e.pointerId!==drag.id)) return;
  if(!drag.moved){                              // a clean tap
    const wx=clientToWorldX(e);
    const idx=Math.floor(wx/ROOM_W);
    if(G.phase==='build' && idx>=0 && idx<G.slots){
      tapSlot(idx);
      const r=G.rooms[idx]; showInspectEntity(r?{kind:'room',room:r}:{kind:'empty'});
    } else {
      const ent=entityAt(wx);                    // boss in build, or hero/room/boss in run
      // tapping a hero at your throne AIMS a Smite at it; otherwise inspect
      if(G.phase==='run' && ent && ent.kind==='hero' && ent.h.state==='boss' && ent.h.hp>0) smite(ent.h);
      else showInspectEntity(ent);
    }
  } else if(G.phase==='run'){
    panHoldUntil = performance.now()+3500;       // keep your panned view for a bit
  }
  drag=null; panning=false;
}
CV.addEventListener('pointerup', endDrag);
CV.addEventListener('pointercancel', endDrag);

// Desktop hover inspection. A PINNED bubble (from a tap) survives empty-space
// hover so it can't be wiped out while the mouse travels toward its buttons —
// but hovering a DIFFERENT entity replaces it, so room info (veteran XP etc.)
// stays browsable. Hover-empty hides on a short grace timer.
CV.addEventListener('mousemove', e=>{
  { const _r=CV.getBoundingClientRect(); lastPtrCX=e.clientX-_r.left; lastPtrCY=e.clientY-_r.top; }
  if(drag || !G || (G.phase!=='build' && G.phase!=='run')) return;
  // only the band the rooms/actors actually occupy — hovering the empty floor
  // below (or the sky above) shouldn't pop the bubble
  const wy=clientToVY(e);
  if(wy>FLOOR+14 || wy<FLOOR-214){ if(inspectHover) hideInspectSoon(); return; }
  const ent=entityAt(clientToWorldX(e));
  if(!ent || ent.kind==='empty'){ if(inspectHover) hideInspectSoon(); return; }
  // keep the pinned bubble intact: same entity, OR a custom pinned dialog
  // (inspectEnt===null, e.g. the demolish confirm) which hover must NEVER
  // replace — that was wiping the "Yes, demolish" box mid-mouse-travel
  if(inspectPinned && (inspectEnt===null || sameInspectEnt(ent))) return;
  showInspectEntity(ent, true);
});
CV.addEventListener('mouseleave', ()=>{ if(inspectHover) hideInspectSoon(); });

/* ---- Drag a hand card onto a room slot to build/upgrade/fuse ---- */
let cardDrag=null, cardDragSlot=-1, cardGhost=null;
function slotUnderPointer(e){
  const rect=CV.getBoundingClientRect();
  if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom) return -1;
  const idx=Math.floor(clientToWorldX(e)/ROOM_W);
  return (idx>=0 && idx<G.slots) ? idx : -1;
}
function startCardGhost(ci){
  const c=G.hand[ci]; if(!c) return; const d=ROOMS[c.type];
  cardGhost=document.createElement('div'); cardGhost.className='card cardghost';
  cardGhost.innerHTML=`<div class="ic">${cardFace(c.type)||d.ic}</div><div class="nm">${c.label||d.name}</div>`;
  document.body.appendChild(cardGhost);
}
function moveCardGhost(x,y){ if(cardGhost){ cardGhost.style.left=x+'px'; cardGhost.style.top=y+'px'; } }
function endCardGhost(){ if(cardGhost){ cardGhost.remove(); cardGhost=null; } }
panel.addEventListener('pointerdown', e=>{
  if(!G || G.phase!=='build') return;
  if(e.target.closest('.x')) return;                 // discard button
  const cardEl=e.target.closest('.card'); if(!cardEl) return;
  cardDrag={ id:e.pointerId, ci:+cardEl.dataset.ci, sx:e.clientX, sy:e.clientY, dragging:false };
});
window.addEventListener('pointermove', e=>{
  if(!cardDrag || e.pointerId!==cardDrag.id) return;
  const dx=e.clientX-cardDrag.sx, dy=e.clientY-cardDrag.sy;
  if(!cardDrag.dragging && Math.hypot(dx,dy)>8){ cardDrag.dragging=true; startCardGhost(cardDrag.ci); hideInspect(); }
  if(cardDrag.dragging){
    e.preventDefault();
    moveCardGhost(e.clientX,e.clientY);
    const s=slotUnderPointer(e);
    if(s!==cardDragSlot){ cardDragSlot=s; draw(); }
  }
}, {passive:false});
function endCardDrag(e){
  if(!cardDrag || (e && e.pointerId!==cardDrag.id)) return;
  if(cardDrag.dragging){
    const slot=slotUnderPointer(e);
    endCardGhost();
    if(slot>=0) placeCard(cardDrag.ci, slot);
    else showHint('Drop a card onto a room slot to build there.');
  } else {
    selectCard(cardDrag.ci);                          // it was a tap, not a drag
  }
  cardDrag=null; cardDragSlot=-1;
  if(G && (G.phase==='build')) draw();
}
window.addEventListener('pointerup', endCardDrag);
window.addEventListener('pointercancel', e=>{ endCardGhost(); cardDrag=null; cardDragSlot=-1; });

/* keyboard: ability hotkeys + space=start/speed */
window.addEventListener('keydown', e=>{
  if(!G) return;
  if(G.phase==='run'){
    if(e.key>='1'&&e.key<='3'){ const i=+e.key-1; if(i<G.boss.abil.length) castAbility(i); }
    if(e.key==='q'||e.key==='Q'){ castOverdrive(); }       // 💥 Overdrive ultimate
    // Space smites when heroes are at the throne (the active moment), else toggles speed
    if(e.key===' '){ e.preventDefault(); if(throneHeroes().length) smite(); else toggleSpeed(); }
  } else if(G.phase==='build' && e.key===' '){ e.preventDefault(); startWave(); }
});

/* ================================ LOOP ================================== */
function frame(ts){
  const raw=Math.min(0.05,(ts-last)/1000)||0; last=ts;
  let dt=raw;
  if(killCamT>0){ killCamT-=raw; dt*=0.25; }          // wave-end kill cam: brief slow-mo
  if(bannerMsg){ bannerMsg.t+=raw; if(bannerMsg.t>=bannerMsg.dur) bannerMsg=null; }
  if(G && G.phase==='run'){ update(dt); updateTop(); }
  else { update(dt); }
  draw();
  drawBanner();
  if(AC) updateMusicMood();   // music follows the game state
  // keep run panel cooldowns fresh
  if(G&&G.phase==='run'){ updateRunPanel(); }
  requestAnimationFrame(frame);
}
// Update ability buttons WITHOUT rebuilding the DOM — rebuilding mid-tap was
// destroying the button between touchstart/touchend, eating the click (notably
// on iPad). The Smite button also carries class "abil", so the live count is
// abil.length + 1; matching that is what stops the per-frame rebuild.
function updateRunPanel(){
  if(!G||G.phase!=='run'||!G.boss) return;
  const btns=panel.querySelectorAll('.abil');
  const n=G.boss.abil.length;
  if(btns.length!==n+2){ renderPanel(); return; }      // +2 = Smite and Overdrive buttons
  const setDis=(el,v)=>{ if(el.disabled!==v) el.disabled=v; };
  const setCls=(el,c,on)=>{ if(el.classList.contains(c)!==on) el.classList.toggle(c,on); };
  const setTxt=(el,v)=>{ if(el && el.textContent!==v) el.textContent=v; };  // only touch the DOM on a real change
  for(let i=0;i<n;i++){
    const a=G.boss.abil[i], def=ABIL[a.id], cost=abilCost(def.cost);
    setDis(btns[i], a.cd>0||G.boss.mana<cost);
    setTxt(btns[i].querySelector('.c'), a.cd>0 ? '⏳'+a.cd.toFixed(1)+'s' : '🔷'+cost);
  }
  const b=G.boss;
  // Smite (btns[n]) — refresh its ready/aim state live
  const sb=btns[n], sready=(b.smiteCd||0)<=0, has=G.heroes.some(h=>h&&h.state==='boss'&&h.hp>0);
  setDis(sb, !sready||!has);
  setTxt(sb.querySelector('.c'), (b.smiteCd||0)>0 ? '⏳'+b.smiteCd.toFixed(1)+'s' : (has?'aim!':'—'));
  // Overdrive (btns[n+1]) — charges with Rage
  const ob=btns[n+1], oready=(b.rage||0)>=RAGE_MAX;
  setDis(ob, !oready); setCls(ob, 'rdy', oready);
  setTxt(ob.querySelector('.c'), oready ? 'READY!' : Math.floor(b.rage||0)+'%');
  // live boss HP + mana + rage readout
  const hp=document.getElementById('pbhp'), hpT=document.getElementById('pbhpT');
  const mn=document.getElementById('pbmana'), mnT=document.getElementById('pbmanaT');
  const rg=document.getElementById('pbrage'), rgT=document.getElementById('pbrageT');
  if(hp) hp.style.width=(b.hp/b.maxHp*100)+'%';
  if(hpT) setTxt(hpT, Math.ceil(b.hp)+'/'+b.maxHp);
  if(mn) mn.style.width=(b.mana/b.maxMana*100)+'%';
  if(mnT) setTxt(mnT, Math.floor(b.mana)+'/'+b.maxMana);
  if(rg) rg.style.width=((b.rage||0)/RAGE_MAX*100)+'%';
  if(rgT) setTxt(rgT, '💥 '+Math.floor(b.rage||0)+'%');
}

/* keep the canvas matched to the stage (rotation, panel-height changes, etc.) */
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,150));
if(window.ResizeObserver){ new ResizeObserver(resize).observe(stage); }

loadSlot();
loadRunes();
loadTown();
loadAudioPref();
loadVolPrefs();
// Phones: keep the game fullscreen (hides the browser's address bar). Not
// once-only — if the first attempt fails or the user drops out of fullscreen,
// the next tap re-engages it. Throttled so an intentional exit isn't fought
// more than once per few seconds.
let _fsLast=0;
window.addEventListener('pointerdown', async ()=>{
  try{
    if(Math.min(screen.width||9999, screen.height||9999) > 560) return;   // phones only
    if(document.fullscreenElement) return;                                // already fullscreen
    const now=Date.now(); if(now-_fsLast<3000) return; _fsLast=now;
    if(document.documentElement.requestFullscreen)
      await document.documentElement.requestFullscreen({navigationUI:'hide'});
    if(screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
  }catch(_){ }
});
// Audio can only start after a user gesture; wake it on the first interaction.
window.addEventListener('pointerdown', ()=>{ if(audioOn) initAudio(); }, {once:false});
window.addEventListener('keydown', ()=>{ if(audioOn) initAudio(); }, {once:false});
{ const ab=document.getElementById('audiobtn');
  if(ab){ ab.textContent=audioOn?'🔊':'🔇';
    ab.addEventListener('click', e=>{ e.stopPropagation(); toggleAudio(); }); } }
resize();
titleScreen();
requestAnimationFrame(frame);
</script>
