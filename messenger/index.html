<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Messenger — tiny planet deliveries</title>
<meta name="description" content="A cozy little game: run around a tiny planet and deliver letters and parcels to its residents." />
<style>
  :root{
    --ink:#3a3550;
    --paper:#fdf6ec;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#bfe3f0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block}

  /* ---- loading / intro ---- */
  #intro{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;background:linear-gradient(160deg,#cdeaf2,#f6e7d6);z-index:50;transition:opacity .6s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-size:clamp(34px,9vw,68px);margin:0;letter-spacing:.5px;font-weight:800;
    color:#4a4366;text-shadow:0 2px 0 #fff}
  #intro p{margin:0;max-width:330px;text-align:center;line-height:1.5;opacity:.8;font-size:15px}
  #play{appearance:none;border:none;cursor:pointer;font:inherit;font-weight:700;font-size:18px;
    padding:14px 34px;border-radius:999px;color:#fff;background:#f0926b;box-shadow:0 8px 0 #cf6f4c,0 12px 22px rgba(0,0,0,.18);
    transition:transform .08s,box-shadow .08s}
  #play:active{transform:translateY(5px);box-shadow:0 3px 0 #cf6f4c,0 6px 14px rgba(0,0,0,.18)}
  .spin{width:30px;height:30px;border-radius:50%;border:4px solid #ffffff80;border-top-color:#fff;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---- HUD ---- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:20}
  .pill{position:absolute;background:#fffffff0;border-radius:16px;padding:10px 14px;
    box-shadow:0 6px 16px rgba(60,50,80,.16);backdrop-filter:blur(4px)}
  #score{top:14px;left:14px;display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px}
  #score .coin{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe79a,#f4b740);
    box-shadow:inset 0 0 0 2px #d99a22}
  #deliv{top:14px;right:14px;font-weight:700;font-size:15px;opacity:.92}

  #task{left:50%;transform:translateX(-50%);bottom:max(20px,env(safe-area-inset-bottom));max-width:min(520px,90vw);
    text-align:center;font-size:15px;line-height:1.35;font-weight:600;opacity:0;transition:opacity .3s}
  #task.show{opacity:1}
  #task b{color:#e07a4e}

  /* outfit button */
  #wardrobeBtn{position:fixed;right:16px;bottom:max(96px,calc(env(safe-area-inset-bottom) + 96px));
    width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;background:#fff;
    box-shadow:0 6px 16px rgba(60,50,80,.22);display:grid;place-items:center;z-index:21;font-size:28px}
  #wardrobeBtn:active{transform:scale(.94)}

  /* action button */
  #actBtn{position:fixed;left:50%;transform:translateX(-50%);
    bottom:max(86px,calc(env(safe-area-inset-bottom) + 86px));
    pointer-events:auto;border:none;cursor:pointer;font:inherit;font-weight:800;font-size:16px;color:#fff;
    padding:14px 30px;border-radius:999px;background:#6ec08a;box-shadow:0 7px 0 #4f9c6b,0 10px 18px rgba(0,0,0,.16);
    z-index:21;opacity:0;pointer-events:none;transition:opacity .2s,transform .08s}
  #actBtn.show{opacity:1;pointer-events:auto}
  #actBtn:active{transform:translateX(-50%) translateY(4px);box-shadow:0 3px 0 #4f9c6b}

  /* joystick */
  #stick{position:fixed;left:18px;bottom:max(24px,calc(env(safe-area-inset-bottom) + 24px));
    width:130px;height:130px;border-radius:50%;background:#ffffff55;border:2px solid #ffffff90;
    z-index:21;touch-action:none;display:none}
  #knob{position:absolute;left:35px;top:35px;width:60px;height:60px;border-radius:50%;
    background:#ffffffdd;box-shadow:0 4px 10px rgba(0,0,0,.18)}
  body.touch #stick{display:block}

  /* wardrobe panel */
  #wardrobe{position:fixed;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center}
  #wardrobe.open{display:flex}
  #wardrobe .scrim{position:absolute;inset:0;background:rgba(40,34,56,.35)}
  #wardrobe .sheet{position:relative;width:min(460px,96vw);background:var(--paper);
    border-radius:22px 22px 0 0;padding:18px 18px max(22px,env(safe-area-inset-bottom));
    box-shadow:0 -8px 30px rgba(0,0,0,.2);animation:rise .25s ease}
  @keyframes rise{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  #wardrobe h2{margin:2px 0 14px;font-size:19px;text-align:center}
  .row{margin-bottom:14px}
  .row .lab{font-size:13px;font-weight:700;opacity:.6;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .sw{width:38px;height:38px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:transform .08s}
  .sw:active{transform:scale(.9)}
  .sw.on{border-color:#3a3550;box-shadow:0 0 0 2px #fff inset}
  #closeWardrobe{margin-top:6px;width:100%;border:none;cursor:pointer;font:inherit;font-weight:800;font-size:16px;
    padding:13px;border-radius:14px;background:#6c63a6;color:#fff}

  /* floating emoji popups handled in canvas-space via DOM */
  .pop{position:fixed;pointer-events:none;font-size:30px;z-index:25;transition:transform 1.1s ease-out,opacity 1.1s;will-change:transform,opacity}

  .hintkeys{position:fixed;left:14px;bottom:14px;font-size:12px;opacity:.55;z-index:21}
  body.touch .hintkeys{display:none}
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div class="pill" id="score"><span class="coin"></span><span id="coins">0</span></div>
  <div class="pill" id="deliv">✉️ 0 delivered</div>
  <div class="pill" id="task"></div>
</div>

<button id="wardrobeBtn" title="Change outfit">👕</button>
<button id="actBtn">Pick up</button>
<div id="stick"><div id="knob"></div></div>
<div class="hintkeys">WASD / arrows to move · <b>E</b> or Space to act</div>

<div id="wardrobe">
  <div class="scrim"></div>
  <div class="sheet">
    <h2>Wardrobe</h2>
    <div class="row" data-part="hair"><div class="lab">Hair</div><div class="swatches"></div></div>
    <div class="row" data-part="top"><div class="lab">Top</div><div class="swatches"></div></div>
    <div class="row" data-part="bottom"><div class="lab">Bottoms</div><div class="swatches"></div></div>
    <div class="row" data-part="shoes"><div class="lab">Shoes</div><div class="swatches"></div></div>
    <button id="closeWardrobe">Done</button>
  </div>
</div>

<div id="intro">
  <h1>Messenger</h1>
  <p>You’re the courier for a tiny planet. Pick up letters and parcels from its residents and run them across the world.</p>
  <button id="play">Start delivering</button>
  <div style="font-size:12px;opacity:.6">A cozy clone of abeto’s “Messenger”.</div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

// ---------------------------------------------------------------------------
// Tiny-planet delivery game. Everything lives on the surface of one small
// sphere; "down" is always toward the planet centre. You walk a courier
// around it, pick up parcels from senders, and drop them at recipients.
// ---------------------------------------------------------------------------

const PLANET_R = 12;
const GRAV_UP = new THREE.Vector3(); // reused scratch

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#bfe3f0');
scene.fog = new THREE.Fog('#bfe3f0', 38, 78);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);

// ---------------------------------------------------------------------------
// Cel / toon shading: a stepped gradient ramp gives banded lighting, and every
// solid mesh gets a dark inverted-hull outline. This is what makes it read as
// the same flat, illustrated look as the original.
// ---------------------------------------------------------------------------
function makeToonGradient(steps){
  const data = new Uint8Array(steps);
  for (let i=0;i<steps;i++) data[i] = Math.round(255 * (i+1)/steps);
  const tex = new THREE.DataTexture(data, steps, 1, THREE.RedFormat);
  tex.minFilter = tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false; tex.needsUpdate = true;
  return tex;
}
const gradientMap = makeToonGradient(3);
function toonMat(p={}){
  return new THREE.MeshToonMaterial({
    color: p.color,
    gradientMap,
    flatShading: !!p.flatShading,
    transparent: !!p.transparent,
    opacity: p.opacity!=null ? p.opacity : 1,
    emissive: p.emissive!=null ? p.emissive : 0x000000,
    emissiveIntensity: p.emissiveIntensity!=null ? p.emissiveIntensity : 1,
  });
}
const outlineMat = new THREE.MeshBasicMaterial({ color:'#332e47', side:THREE.BackSide });
function addOutline(mesh, k=0.09){
  const o = new THREE.Mesh(mesh.geometry, outlineMat);
  o.scale.multiplyScalar(1 + k);
  o.castShadow = false; o.receiveShadow = false;
  mesh.add(o);
  return mesh;
}

// ---- lighting: soft, warm key + cool fill ----
const sun = new THREE.DirectionalLight('#fff3df', 1.9);
sun.position.set(20, 30, 16);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 90;
sun.shadow.camera.left = -28; sun.shadow.camera.right = 28;
sun.shadow.camera.top = 28; sun.shadow.camera.bottom = -28;
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(new THREE.HemisphereLight('#dff1ff', '#8a9a6a', 0.5));
scene.add(new THREE.AmbientLight('#ffffff', 0.2));

// ---- starry / cloudy backdrop bubbles for depth ----
(function backdrop(){
  const g = new THREE.SphereGeometry(0.6, 8, 8);
  const m = new THREE.MeshBasicMaterial({ color:'#ffffff', transparent:true, opacity:.5 });
  for (let i=0;i<40;i++){
    const c = new THREE.Mesh(g, m);
    const dir = randDir();
    c.position.copy(dir.multiplyScalar(50 + Math.random()*25));
    const s = 1 + Math.random()*4; c.scale.set(s, s*0.7, s);
    scene.add(c);
  }
})();

// ---------------------------------------------------------------------------
// Planet
// ---------------------------------------------------------------------------
const planet = new THREE.Group();
scene.add(planet);

const planetMat = toonMat({ color:'#9ccb6b', flatShading:true, roughness:1 });
const planetGeo = new THREE.IcosahedronGeometry(PLANET_R, 6);
// gentle bumps so the surface reads as rolling hills
{
  const pos = planetGeo.attributes.position;
  const v = new THREE.Vector3();
  for (let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos, i);
    const n = v.clone().normalize();
    const bump = 0.45*Math.sin(n.x*4.0)*Math.cos(n.y*3.0) + 0.35*Math.sin(n.z*5.0+1.3);
    v.addScaledVector(n, bump*0.5);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  planetGeo.computeVertexNormals();
}
const planetMesh = new THREE.Mesh(planetGeo, planetMat);
planetMesh.receiveShadow = true; planetMesh.castShadow = true;
planet.add(planetMesh);

// little water disc patches + sandy rim
function addPatch(dir, r, color, lift){
  const g = new THREE.CircleGeometry(r, 24);
  const m = toonMat({ color, roughness:.6, metalness:0, flatShading:false });
  const mesh = new THREE.Mesh(g, m);
  placeOnSurface(mesh, dir, lift);
  mesh.receiveShadow = true;
  planet.add(mesh);
}
function randDir(){
  const v = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1);
  if (v.lengthSq() < 1e-4) v.set(0,1,0);
  return v.normalize();
}
// orient a flat object so its +Z faces outward at point `dir` on the sphere
const _q = new THREE.Quaternion();
function placeOnSurface(obj, dir, lift=0.02){
  const up = dir.clone().normalize();
  obj.position.copy(up).multiplyScalar(PLANET_R + lift);
  _q.setFromUnitVectors(new THREE.Vector3(0,0,1), up);
  obj.quaternion.copy(_q);
}
// upright object (its +Y is "up" away from planet)
function placeUpright(obj, dir, lift=0){
  const up = dir.clone().normalize();
  obj.position.copy(up).multiplyScalar(PLANET_R + lift);
  obj.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), up);
}

for (let i=0;i<4;i++) addPatch(randDir(), 1.5+Math.random()*1.6, '#7ec8e3', 0.03);
for (let i=0;i<3;i++) addPatch(randDir(), 1.0+Math.random(), '#e9d8a6', 0.04);

// ---------------------------------------------------------------------------
// Scenery: trees, rocks, houses
// ---------------------------------------------------------------------------
function makeTree(){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.18,0.9,6),
    toonMat({ color:'#9b6a43', roughness:1 }));
  trunk.position.y = 0.45; trunk.castShadow = true; addOutline(trunk, 0.12);
  g.add(trunk);
  const leafMat = toonMat({ color:'#5fae5a', flatShading:true, roughness:1 });
  for (let i=0;i<2;i++){
    const c = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55-i*0.12, 0), leafMat);
    c.position.y = 1.0 + i*0.4; c.castShadow = true; addOutline(c, 0.07);
    g.add(c);
  }
  return g;
}
function makeRock(){
  const m = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3+Math.random()*0.3, 0),
    toonMat({ color:'#9aa0a8', flatShading:true, roughness:1 }));
  m.castShadow = true; m.receiveShadow = true; addOutline(m, 0.08);
  return m;
}
function makeHouse(color){
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.9,1.1),
    toonMat({ color, roughness:.9, flatShading:true }));
  body.position.y = 0.45; body.castShadow = true; body.receiveShadow = true; addOutline(body, 0.06);
  g.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(0.95,0.6,4),
    toonMat({ color:'#c8553d', flatShading:true, roughness:.9 }));
  roof.position.y = 1.15; roof.rotation.y = Math.PI/4; roof.castShadow = true; addOutline(roof, 0.06);
  g.add(roof);
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.45,0.05),
    toonMat({ color:'#5b3b2a' }));
  door.position.set(0,0.27,0.56); g.add(door);
  return g;
}

const houseColors = ['#f3c969','#ec9a6d','#a7d3e8','#d6a0c4','#bcd99b','#f0a3a3'];
const decorDirs = [];
function farFromOthers(dir, list, minDot){ // minDot: larger = closer allowed
  for (const d of list) if (dir.dot(d) > minDot) return false;
  return true;
}
// scatter trees & rocks
for (let i=0;i<70;i++){
  let dir; let tries=0;
  do { dir = randDir(); tries++; } while (tries<8 && !farFromOthers(dir, decorDirs, 0.985));
  decorDirs.push(dir);
  const obj = Math.random()<0.72 ? makeTree() : makeRock();
  const s = 0.8 + Math.random()*0.6; obj.scale.setScalar(s);
  placeUpright(obj, dir, -0.05);
  obj.rotateY(Math.random()*Math.PI*2);
  planet.add(obj);
}

// ---------------------------------------------------------------------------
// Character builder (player + residents share the same rig)
// ---------------------------------------------------------------------------
function makeCharacter(opts){
  const o = Object.assign({ skin:'#f2c89a', hair:'#3a2a22', top:'#e9746a', bottom:'#4a6ea8', shoes:'#3a3550' }, opts);
  const g = new THREE.Group();
  const parts = {};
  const mat = c => toonMat({ color:c, roughness:.85, flatShading:false });

  // legs
  const legGeo = new THREE.CapsuleGeometry(0.11, 0.32, 3, 8);
  parts.legL = new THREE.Mesh(legGeo, mat(o.bottom));
  parts.legR = new THREE.Mesh(legGeo, mat(o.bottom));
  parts.legL.position.set(-0.13, 0.32, 0);
  parts.legR.position.set( 0.13, 0.32, 0);
  // shoes
  const shoeGeo = new THREE.BoxGeometry(0.2,0.12,0.3);
  parts.shoeL = new THREE.Mesh(shoeGeo, mat(o.shoes)); parts.shoeL.position.set(0,-0.22,0.05);
  parts.shoeR = new THREE.Mesh(shoeGeo, mat(o.shoes)); parts.shoeR.position.set(0,-0.22,0.05);
  parts.legL.add(parts.shoeL); parts.legR.add(parts.shoeR);

  // torso
  parts.top = new THREE.Mesh(new THREE.CapsuleGeometry(0.22,0.34,4,10), mat(o.top));
  parts.top.position.y = 0.78;
  // arms
  const armGeo = new THREE.CapsuleGeometry(0.085,0.3,3,8);
  parts.armL = new THREE.Mesh(armGeo, mat(o.top)); parts.armL.position.set(-0.3,0.85,0);
  parts.armR = new THREE.Mesh(armGeo, mat(o.top)); parts.armR.position.set( 0.3,0.85,0);
  // head
  parts.head = new THREE.Mesh(new THREE.SphereGeometry(0.27,16,16), mat(o.skin));
  parts.head.position.y = 1.28;
  // hair cap
  parts.hair = new THREE.Mesh(new THREE.SphereGeometry(0.29,16,16,0,Math.PI*2,0,Math.PI*0.62), mat(o.hair));
  parts.hair.position.y = 1.31;
  // eyes
  const eyeMat = toonMat({ color:'#3a3550' });
  const eyeGeo = new THREE.SphereGeometry(0.035,8,8);
  const eL = new THREE.Mesh(eyeGeo, eyeMat); eL.position.set(-0.09,1.3,0.25);
  const eR = new THREE.Mesh(eyeGeo, eyeMat); eR.position.set( 0.09,1.3,0.25);

  for (const k in parts){ parts[k].castShadow = true; addOutline(parts[k], 0.1); }
  g.add(parts.legL, parts.legR, parts.top, parts.armL, parts.armR, parts.head, parts.hair, eL, eR);
  g.userData.parts = parts;
  g.userData.colors = o;
  return g;
}
function setOutfit(char, part, color){
  const p = char.userData.parts;
  char.userData.colors[part] = color;
  if (part==='hair') p.hair.material.color.set(color);
  if (part==='top'){ p.top.material.color.set(color); p.armL.material.color.set(color); p.armR.material.color.set(color); }
  if (part==='bottom'){ p.legL.material.color.set(color); p.legR.material.color.set(color); }
  if (part==='shoes'){ p.shoeL.material.color.set(color); p.shoeR.material.color.set(color); }
}

// ---------------------------------------------------------------------------
// Player: tracked as a frame on the sphere (position + forward tangent)
// ---------------------------------------------------------------------------
const player = makeCharacter(loadOutfit());
planet.add(player);

const P = new THREE.Vector3(0,1,0);                 // position on unit sphere (will be *R)
let forward = new THREE.Vector3(0,0,1);             // tangent heading
const playerPivot = new THREE.Group();              // holds the char so we can bob/animate
planet.add(playerPivot);
playerPivot.add(player);

function up(){ return GRAV_UP.copy(P).normalize(); }

// orient & place player group from P + forward
function syncPlayer(){
  const u = up();
  // keep forward tangent to sphere
  forward.addScaledVector(u, -forward.dot(u)).normalize();
  const right = new THREE.Vector3().crossVectors(forward, u).normalize();
  const m = new THREE.Matrix4().makeBasis(right, u, forward);
  playerPivot.position.copy(u).multiplyScalar(PLANET_R - 0.08);
  playerPivot.quaternion.setFromRotationMatrix(m);
}
P.set(0,1,0); forward.set(0,0,1); syncPlayer();

// ---------------------------------------------------------------------------
// Residents
// ---------------------------------------------------------------------------
const residents = [];
const names = ['Pim','Otto','Wren','Suki','Bao','Niko','Elsie','Mori','Tuk','Vera','Pol','Juni','Hana','Ravi','Lumi','Cob'];
function spawnResidents(n){
  for (let i=0;i<n;i++){
    let dir; let tries=0;
    do { dir = randDir(); tries++; } while (tries<12 && !farFromOthers(dir, residents.map(r=>r.dir), 0.992));
    const house = makeHouse(houseColors[i % houseColors.length]);
    placeUpright(house, dir, -0.05);
    house.rotateY(Math.random()*Math.PI*2);
    planet.add(house);

    // resident stands beside their house
    const char = makeCharacter({
      skin: ['#f2c89a','#e0b487','#caa06f','#f6d6b8'][i%4],
      hair: ['#3a2a22','#6b4a2f','#222','#8a5a3a','#caa'][i%5],
      top:  houseColors[(i+2)%houseColors.length],
      bottom: ['#4a6ea8','#6c63a6','#3a3550','#7a7'][i%4],
      shoes:'#3a3550'
    });
    char.scale.setScalar(0.92);
    const cpivot = new THREE.Group();
    planet.add(cpivot);
    // offset slightly around the house dir
    const offset = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();
    const rdir = dir.clone().addScaledVector(offset, 0.06).normalize();
    const u = rdir.clone();
    const fwd = offset.clone().addScaledVector(u, -offset.dot(u)).normalize();
    const right = new THREE.Vector3().crossVectors(fwd, u).normalize();
    cpivot.position.copy(u).multiplyScalar(PLANET_R - 0.05);
    cpivot.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(right, u, fwd));
    cpivot.add(char);

    // bobbing marker (envelope / parcel) shown when active
    const marker = makeMarker();
    marker.visible = false;
    cpivot.add(marker);
    marker.position.y = 2.0;

    residents.push({ dir:rdir, name:names[i%names.length], pivot:cpivot, char, marker,
                     worldPos:new THREE.Vector3() });
  }
}
function makeMarker(){
  const g = new THREE.Group();
  // envelope
  const env = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.34,0.06),
    toonMat({ color:'#fff7e8', roughness:.6, emissive:'#ffd', emissiveIntensity:.15 }));
  const flap = new THREE.Mesh(new THREE.ConeGeometry(0.30,0.18,3),
    toonMat({ color:'#f0c27a' }));
  flap.rotation.z = Math.PI; flap.rotation.y = Math.PI/2; flap.scale.set(1,1,0.1); flap.position.y=0.02;
  // up/down arrow halo
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.42,0.05,8,20),
    new THREE.MeshBasicMaterial({ color:'#ffce5c' }));
  ring.rotation.x = Math.PI/2; ring.position.y = -0.5;
  g.add(env, flap, ring);
  g.userData.ring = ring;
  return g;
}

spawnResidents(12);

// ---------------------------------------------------------------------------
// Quest logic
// ---------------------------------------------------------------------------
let coins = 0, delivered = 0;
let carrying = null;     // resident object we picked up FROM (the parcel)
let sender = null, recipient = null;
const elCoins = document.getElementById('coins');
const elDeliv = document.getElementById('deliv');
const elTask = document.getElementById('task');
const actBtn = document.getElementById('actBtn');

// a parcel that rides on the player's hands while carrying
const carryParcel = makeParcel();
carryParcel.visible = false;
player.add(carryParcel);
carryParcel.position.set(0, 0.95, 0.35);
function makeParcel(){
  const g = new THREE.Group();
  const box = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.34,0.34),
    toonMat({ color:'#d8a15a', roughness:.85, flatShading:true }));
  box.castShadow = true; addOutline(box, 0.1);
  const tieA = new THREE.Mesh(new THREE.BoxGeometry(0.36,0.05,0.36),
    toonMat({ color:'#b5763a' }));
  const tieB = tieA.clone(); tieB.rotation.y = Math.PI/2;
  g.add(box, tieA, tieB);
  return g;
}

function newQuest(){
  // choose two distinct residents
  const a = residents[Math.floor(Math.random()*residents.length)];
  let b = a;
  while (b === a) b = residents[Math.floor(Math.random()*residents.length)];
  sender = a; recipient = b;
  sender.marker.visible = true;
  sender.marker.userData.kind = 'pickup';
  recipient.marker.visible = false;
  setTask(`New parcel waiting with <b>${sender.name}</b>. Go pick it up!`);
}
function setTask(html){ elTask.innerHTML = html; elTask.classList.add('show'); }

newQuest();

// ---------------------------------------------------------------------------
// Interaction: nearest active resident within range → act button
// ---------------------------------------------------------------------------
let actTarget = null, actMode = null; // 'pickup' | 'deliver'
function updateInteraction(){
  // compute world positions of residents
  const playerWorld = playerPivot.position;
  let best = null, bestD = 2.6*2.6, mode = null;

  if (!carrying){
    // looking for sender to pick up
    if (sender){
      sender.pivot.getWorldPosition(sender.worldPos);
      const d = sender.worldPos.distanceToSquared(playerWorld);
      if (d < bestD){ best = sender; bestD = d; mode='pickup'; }
    }
  } else {
    if (recipient){
      recipient.pivot.getWorldPosition(recipient.worldPos);
      const d = recipient.worldPos.distanceToSquared(playerWorld);
      if (d < bestD){ best = recipient; bestD = d; mode='deliver'; }
    }
  }
  actTarget = best; actMode = mode;
  if (best){
    actBtn.textContent = mode==='pickup' ? 'Pick up ✉️' : 'Deliver 📦';
    actBtn.classList.add('show');
  } else {
    actBtn.classList.remove('show');
  }
}

function doAct(){
  if (!actTarget) return;
  if (actMode==='pickup'){
    carrying = sender;
    sender.marker.visible = false;
    carryParcel.visible = true;
    recipient.marker.visible = true;
    recipient.marker.userData.kind = 'deliver';
    setTask(`Deliver to <b>${recipient.name}</b> — follow the marker.`);
    popEmoji(sender.worldPos, '✉️');
  } else if (actMode==='deliver'){
    carrying = null;
    carryParcel.visible = false;
    recipient.marker.visible = false;
    delivered++; coins += 10 + Math.floor(Math.random()*8);
    elDeliv.textContent = `✉️ ${delivered} delivered`;
    elCoins.textContent = coins;
    popEmoji(recipient.worldPos, ['💛','🙏','✨','😊','🎉'][Math.floor(Math.random()*5)]);
    setTask(`Thanks! <b>+${coins>0?'coins':''}</b> Nice delivery. Finding the next one…`);
    actBtn.classList.remove('show'); actTarget=null;
    setTimeout(newQuest, 900);
  }
}
actBtn.addEventListener('click', doAct);

// floating emoji popup in screen space
function popEmoji(worldPos, emoji){
  const v = worldPos.clone().add(up().multiplyScalar(2)).project(camera);
  if (v.z>1) return;
  const x = (v.x*0.5+0.5)*innerWidth, y = (-v.y*0.5+0.5)*innerHeight;
  const el = document.createElement('div');
  el.className='pop'; el.textContent=emoji;
  el.style.left=(x-15)+'px'; el.style.top=(y-15)+'px';
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.transform='translateY(-70px) scale(1.4)'; el.style.opacity='0'; });
  setTimeout(()=>el.remove(), 1200);
}

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
const keys = {};
addEventListener('keydown', e=>{
  keys[e.key.toLowerCase()] = true;
  if (e.key===' '|| e.key.toLowerCase()==='e'){ e.preventDefault(); doAct(); }
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

// touch joystick
let stickVec = {x:0,y:0};
const stick = document.getElementById('stick');
const knob = document.getElementById('knob');
let stickId = null;
function setKnob(dx,dy){
  const r=45; const len=Math.hypot(dx,dy); const cl=Math.min(len,r);
  const ang=Math.atan2(dy,dx);
  knob.style.left = (35 + Math.cos(ang)*cl)+'px';
  knob.style.top  = (35 + Math.sin(ang)*cl)+'px';
  stickVec.x = Math.cos(ang)*(cl/r); stickVec.y = Math.sin(ang)*(cl/r);
}
stick.addEventListener('touchstart', e=>{ stickId=e.changedTouches[0].identifier; onStick(e.changedTouches[0]); e.preventDefault(); }, {passive:false});
stick.addEventListener('touchmove', e=>{ for(const t of e.changedTouches) if(t.identifier===stickId) onStick(t); e.preventDefault(); }, {passive:false});
function endStick(e){ for(const t of e.changedTouches) if(t.identifier===stickId){ stickId=null; stickVec={x:0,y:0}; knob.style.left='35px'; knob.style.top='35px'; } }
stick.addEventListener('touchend', endStick); stick.addEventListener('touchcancel', endStick);
function onStick(t){ const r=stick.getBoundingClientRect(); setKnob(t.clientX-r.left-65, t.clientY-r.top-65); }

if (matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window) document.body.classList.add('touch');

// ---------------------------------------------------------------------------
// Wardrobe
// ---------------------------------------------------------------------------
const palettes = {
  hair:   ['#3a2a22','#6b4a2f','#111','#caa05a','#b5533a','#5a5a7a','#d98cae','#9a9a9a'],
  top:    ['#e9746a','#f0a35e','#f4cf63','#6ec08a','#5aa0d0','#8a78c0','#d98cae','#e7e2d8'],
  bottom: ['#4a6ea8','#6c63a6','#3a3550','#7a8c5a','#a05a4a','#2a3a4a','#c98a5a','#5a5a5a'],
  shoes:  ['#3a3550','#222','#e7e2d8','#b5533a','#5aa0d0','#6ec08a','#caa05a','#7a5a3a'],
};
const wardrobe = document.getElementById('wardrobe');
document.getElementById('wardrobeBtn').addEventListener('click', ()=> wardrobe.classList.add('open'));
document.getElementById('closeWardrobe').addEventListener('click', ()=>{ wardrobe.classList.remove('open'); saveOutfit(); });
wardrobe.querySelector('.scrim').addEventListener('click', ()=>{ wardrobe.classList.remove('open'); saveOutfit(); });

wardrobe.querySelectorAll('.row').forEach(row=>{
  const part = row.dataset.part;
  const box = row.querySelector('.swatches');
  palettes[part].forEach(col=>{
    const sw = document.createElement('div');
    sw.className='sw'; sw.style.background=col;
    if (player.userData.colors[part]===col) sw.classList.add('on');
    sw.addEventListener('click', ()=>{
      setOutfit(player, part, col);
      box.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
      sw.classList.add('on');
    });
    box.appendChild(sw);
  });
});
function loadOutfit(){
  try { return JSON.parse(localStorage.getItem('messenger_outfit')) || {}; } catch { return {}; }
}
function saveOutfit(){
  try { localStorage.setItem('messenger_outfit', JSON.stringify(player.userData.colors)); } catch {}
}

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
const SPEED = 3.4;       // surface units / sec
const TURN = 2.6;        // rad / sec
let walkPhase = 0;
const clock = new THREE.Clock();

function moveInput(){
  // returns {fwd, turn} in -1..1
  let f=0, t=0;
  if (keys['w']||keys['arrowup']) f+=1;
  if (keys['s']||keys['arrowdown']) f-=1;
  if (keys['a']||keys['arrowleft']) t+=1;
  if (keys['d']||keys['arrowright']) t-=1;
  if (stickVec.x||stickVec.y){
    f += -stickVec.y;      // up on stick = forward
    t += -stickVec.x;      // left on stick = turn left
  }
  return { f:Math.max(-1,Math.min(1,f)), t:Math.max(-1,Math.min(1,t)) };
}

function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  const { f, t } = moveInput();

  // turn: rotate forward around up
  if (t){
    const u = up();
    forward.applyAxisAngle(u, t*TURN*dt);
  }
  // move: rotate position & forward around the right axis
  const moving = Math.abs(f) > 0.02;
  if (moving){
    const u = up();
    const right = new THREE.Vector3().crossVectors(forward, u).normalize();
    const ang = f*SPEED*dt / PLANET_R;
    const q = new THREE.Quaternion().setFromAxisAngle(right, ang);
    P.applyQuaternion(q); P.normalize();
    forward.applyQuaternion(q);
  }
  syncPlayer();

  // walk animation
  const targetAmp = moving ? 1 : 0;
  walkPhase += dt * (moving? 10 : 0);
  const sw = Math.sin(walkPhase) * 0.5 * targetAmp;
  const pp = player.userData.parts;
  pp.legL.rotation.x = sw; pp.legR.rotation.x = -sw;
  pp.armL.rotation.x = -sw*0.8; pp.armR.rotation.x = sw*0.8;
  player.position.y = Math.abs(Math.sin(walkPhase))*0.06*targetAmp;
  // idle breathing for everyone's head
  player.userData.parts.head.position.y = 1.28 + Math.sin(clock.elapsedTime*2)*0.01;

  // spin planet decor markers / bob
  const tnow = clock.elapsedTime;
  for (const r of residents){
    if (r.marker.visible){
      r.marker.rotation.y = tnow*1.5;
      r.marker.position.y = 2.0 + Math.sin(tnow*3)*0.12;
      r.marker.userData.ring.scale.setScalar(1 + Math.sin(tnow*3)*0.08);
    }
    // residents gently face/idle
    r.char.userData.parts.head.rotation.y = Math.sin(tnow*0.7 + r.dir.x*9)*0.3;
  }
  if (carrying) carryParcel.rotation.y = tnow*0.5;

  updateInteraction();

  // ---- camera: trail behind & above the player, on the surface frame ----
  const u = up();
  const right = new THREE.Vector3().crossVectors(forward, u).normalize();
  const camPos = playerPivot.position.clone()
      .addScaledVector(u, 4.2)
      .addScaledVector(forward, -6.2);
  camera.position.lerp(camPos, 1 - Math.pow(0.001, dt));
  const look = playerPivot.position.clone().addScaledVector(u, 1.0);
  camera.up.copy(u);
  camera.lookAt(look);

  // keep sun roughly overhead-ish relative to player for nice shadows
  sun.position.copy(playerPivot.position).addScaledVector(u, 30).addScaledVector(right, 12);
  sun.target.position.copy(playerPivot.position);
  sun.target.updateMatrixWorld();

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

// ---------------------------------------------------------------------------
// Resize & start
// ---------------------------------------------------------------------------
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

scene.add(sun.target);

let started = false;
function start(){
  if (started) return; started = true;
  document.getElementById('intro').classList.add('hide');
  clock.start();
  tick();
}
document.getElementById('play').addEventListener('click', start);

// render one idle frame behind the intro so it's not blank
syncPlayer();
camera.position.copy(playerPivot.position).addScaledVector(up(),4.2).addScaledVector(forward,-6.2);
camera.up.copy(up()); camera.lookAt(playerPivot.position.clone().addScaledVector(up(),1));
renderer.render(scene, camera);

// apply saved outfit selections visually
(function applySaved(){
  const c = player.userData.colors;
  ['hair','top','bottom','shoes'].forEach(p=>{ if (c[p]) setOutfit(player, p, c[p]); });
})();
</script>
