<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>THE CROUPIER — slot battle sandbox</title>
<style>
  html, body { margin: 0; padding: 0; background: #140d16; height: 100%; overflow: hidden;
               touch-action: manipulation; -webkit-user-select: none; user-select: none; }
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ============================================================================
// THE CROUPIER — a slot-machine battle prototype for Dungeon Pusher.
// Standalone sandbox: no save, no dungeon — just the reel fight, so the
// owner can feel the loop before it moves into the real game.
//   SPIN → each press STOPS the next reel → NUDGE (3) → RESOLVE.
//   Your purse composition IS the odds. Rows can carry ×2/×3 markers.
//   The window can widen 3 → 4 → 5 reels.
// ============================================================================
const LW = 480, LH = 840;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1, offX = 0, offY = 0;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  scale = Math.min(canvas.width / LW, canvas.height / LH);
  offX = (canvas.width - LW * scale) / 2;
  offY = (canvas.height - LH * scale) / 2;
}
window.addEventListener('resize', resize); resize();

// ------------------------------------------------------------------- symbols
const KINDS = {
  coin:   { sym: '\u{1FA99}', col: '#f2c04a', name: 'Gold',   what: '1 dmg' },
  silver: { sym: '\u{1F6E1}\u{FE0F}', col: '#c3ccd6', name: 'Silver', what: '1 block' },
  green:  { sym: '\u{2620}\u{FE0F}', col: '#8ed67e', name: 'Venom',  what: '1 poison' },
  red:    { sym: '\u{2764}\u{FE0F}', col: '#e87a8a', name: 'Heart',  what: 'heal 1' },
  blue:   { sym: '\u{2744}\u{FE0F}', col: '#7ab0e8', name: 'Frost',  what: '1 dmg ALL, thru block' },
  lucky:  { sym: '7\u{FE0F}\u{20E3}', col: '#ffdf6b', name: 'Lucky',  what: '4 dmg' },
  bunny:  { sym: '\u{1F407}', col: '#f0e0c8', name: 'Bunny',  what: 'pairs BREED a ticket' },
  twin:   { sym: '\u{264A}',  col: '#c8a2ff', name: 'Twin',   what: '4 dmg beside its twin' },
  ember:  { sym: '\u{1F525}', col: '#ff8a4a', name: 'Ember',  what: '2 dmg — spin burns +1' },
  king:   { sym: '\u{1F451}', col: '#ffcf7a', name: 'King',   what: '1 + 1 per rowmate' },
  item:   { sym: '\u{1F5E1}\u{FE0F}', col: '#e8e0d0', name: 'Blade',  what: '6 dmg (gear ticket)' },
};
const PICKABLE = ['coin', 'silver', 'green', 'red', 'blue', 'lucky', 'bunny', 'twin', 'ember', 'king'];

// ------------------------------------------------------------------ enemies
const SETUPS = [
  { id: 'pack',  name: 'ORC PACK',    foes: [
    { name: 'Orc Grunt', sym: '\u{1F9CC}', hp: 42, atk: 3, def: null },
    { name: 'Gutter Rat', sym: '\u{1F400}', hp: 30, atk: 2, def: null }] },
  { id: 'wall',  name: 'SHIELD WALL', foes: [
    { name: 'Skeleton Guard', sym: '\u{1F480}', hp: 55, atk: 4, def: 'armor' },
    { name: 'War Totem', sym: '\u{1F5FF}', hp: 40, atk: 3, def: 'ward' }] },
  { id: 'slime', name: 'GEL & HIDE',  foes: [
    { name: 'Gel Cube', sym: '\u{1F7E2}', hp: 46, atk: 3, def: 'gel' },
    { name: 'Ogre Brute', sym: '\u{1F479}', hp: 80, atk: 5, def: 'thick' }] },
  { id: 'boss',  name: 'THE DRAGON',  foes: [
    { name: 'Vault Dragon', sym: '\u{1F409}', hp: 200, atk: 7, def: 'armor', boss: true }] },
];
const DEF_TXT = { armor: 'absorbs 2/hit', gel: 'hits capped at 2', ward: 'pack −2 dmg', thick: 'poison immune' };

// -------------------------------------------------------------------- state
const G = {
  purse: { coin: 8, silver: 6, green: 2, red: 2, blue: 2, lucky: 1, bunny: 2, twin: 2, ember: 1, king: 1 },
  bredTickets: 0,                       // bunny breeding grows the strip
  gearTickets: 1,                       // arsenal presence on the reels
  w: 3,                                 // reels (3 → 4 → 5)
  rowMul: [1, 1, 1],                    // the owner's row markers ×1/×2/×3
  setup: 0,
  screen: 'setup',                      // setup | battle | won | lost
  hp: 60, maxHp: 60, block: 0,
  foes: [], round: 0, nudges: 3,
  reels: [],                            // per reel: { strip, pos, vel, stopped, snap }
  phase: 'idle',                        // idle | spin | nudge | resolving
  queue: [], qt: 0,                     // resolve queue of {kind,row,col,mul,note}
  foeT: 0, acting: -1,
  log: [], floats: [], shake: 0, t: 0,
  spins: 0, dmgDone: 0,
};
function logLine(s, col) { G.log.unshift({ s, col: col || '#c8b8cc' }); if (G.log.length > 6) G.log.pop(); }
function float(x, y, s, col, big) { G.floats.push({ x, y, s, col: col || '#ffe9a3', t: 0, big }); }

// ------------------------------------------------------------------- strips
// every coin you own is one ticket — your purse IS the odds
function buildStrip(seedShift) {
  const t = [];
  for (const k of PICKABLE) for (let i = 0; i < (G.purse[k] | 0); i++) t.push(k);
  for (let i = 0; i < G.bredTickets; i++) t.push('bunny');
  for (let i = 0; i < G.gearTickets; i++) t.push('item');
  while (t.length < 10) t.push('coin');           // a thin purse still spins
  // fisher-yates with a cheap per-reel jiggle so reels differ
  let s = 1234567 + seedShift * 99991 + G.spins * 7919;
  const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  for (let i = t.length - 1; i > 0; i--) { const j = (rnd() * (i + 1)) | 0; const q = t[i]; t[i] = t[j]; t[j] = q; }
  return t;
}
function startBattle() {
  const su = SETUPS[G.setup];
  G.foes = su.foes.map(f => ({ ...f, maxHp: f.hp, block: 0, pois: 0, burn: 0, brace: false, hitT: 0 }));
  G.hp = G.maxHp = 60; G.block = 0; G.round = 0;
  G.screen = 'battle'; G.phase = 'idle'; G.log = []; G.spins = 0; G.dmgDone = 0;
  logLine('the house opens: ' + su.name, '#ffd75e');
}
function startSpin() {
  if (G.screen !== 'battle' || G.phase !== 'idle') return;
  G.round++; G.spins++;
  G.block = 0; G.nudges = 3;
  G.reels = [];
  for (let r = 0; r < G.w; r++) {
    const strip = buildStrip(r);
    G.reels.push({ strip, pos: Math.random() * strip.length, vel: 34 + r * 7 + Math.random() * 8, stopped: false });
  }
  G.phase = 'spin';
  logLine('round ' + G.round + ' — the reels sing');
}
function stopNext() {
  if (G.phase !== 'spin') return;
  const r = G.reels.find(x => !x.stopped);
  if (!r) return;
  r.stopped = true;
  r.pos = Math.round(r.pos) % r.strip.length;
  G.shake += 3;
  if (G.reels.every(x => x.stopped)) G.phase = 'nudge';
}
function nudge(ri, dir) {
  if (G.phase !== 'nudge' || G.nudges <= 0) return;
  const r = G.reels[ri];
  r.pos = ((Math.round(r.pos) + dir) % r.strip.length + r.strip.length) % r.strip.length;
  G.nudges--; G.shake += 2;
}
function cellKind(ri, row) {
  const r = G.reels[ri];
  return r.strip[(((Math.round(r.pos) + row) % r.strip.length) + r.strip.length) % r.strip.length];
}

// ------------------------------------------------------------------ resolve
// the paytable: 3-of-a-kind triples its line; the named recipes; specials
function resolveSpin() {
  if (G.phase !== 'nudge') return;
  const grid = [];                                 // grid[row][col]
  for (let row = 0; row < 3; row++) { grid.push([]); for (let c = 0; c < G.w; c++) grid[row].push(cellKind(c, row)); }
  const q = [];
  const emberUp = grid.flat().includes('ember');
  // ---- lines: every contiguous run of 3 in a row (and the two diagonals) ----
  const lines = [];
  for (let row = 0; row < 3; row++) for (let c = 0; c + 2 < G.w; c++) {
    lines.push({ cells: [[row, c], [row, c + 1], [row, c + 2]], mul: G.rowMul[row], label: 'row ' + (row + 1) });
  }
  lines.push({ cells: [[0, 0], [1, 1], [2, 2]], mul: 1, label: 'diagonal' });
  lines.push({ cells: [[0, G.w - 1], [1, G.w - 2], [2, G.w - 3]], mul: 1, label: 'diagonal' });
  const lineBoost = {};                            // "r,c" → extra multiplier
  const recipes = [];
  for (const ln of lines) {
    const ks = ln.cells.map(([r2, c2]) => grid[r2][c2]);
    const key3 = ks[0] === ks[1] && ks[1] === ks[2];
    if (key3 && ks[0] === 'lucky') { recipes.push({ label: '\u{1F3B0} JACKPOT 7-7-7!', fx: 'jackpot' }); }
    else if (key3 && ks[0] !== 'bunny') {
      for (const [r2, c2] of ln.cells) lineBoost[r2 + ',' + c2] = (lineBoost[r2 + ',' + c2] || 1) * 3;
      recipes.push({ label: '\u{2728} three ' + (KINDS[ks[0]] ? KINDS[ks[0]].name : ks[0]) + 's — the line pays \u{D7}3 (' + ln.label + ')' });
    }
    const sorted = ks.slice().sort().join(',');
    if (sorted === 'coin,coin,silver') recipes.push({ label: '\u{2694}\u{FE0F} SWORD & BOARD — the line shields what it strikes', fx: 'swordboard', cells: ln.cells });
    if (sorted === 'green,green,red') recipes.push({ label: '\u{2697}\u{FE0F} APOTHECARY — poison 4, heal 4', fx: 'apothecary' });
    if (ks[0] === 'blue' && ks[1] === 'blue') recipes.push({ label: '\u{2744}\u{FE0F} COLD SNAP — the third symbol hits ALL', fx: 'coldsnap', third: ks[2], cells: ln.cells });
  }
  // ---- specials judged on the window (TOUCH = grid adjacency) ----
  let bunnies = 0;
  for (let row = 0; row < 3; row++) for (let c = 0; c < G.w; c++) if (grid[row][c] === 'bunny') bunnies++;
  if (bunnies >= 2 && G.bredTickets < 6) {
    G.bredTickets++;
    recipes.push({ label: '\u{1F407} the bunnies breed — +1 bunny ticket on every strip (' + G.bredTickets + '/6)' });
  }
  const twinPaid = {};
  for (let row = 0; row < 3; row++) for (let c = 0; c + 1 < G.w; c++) {
    if (grid[row][c] === 'twin' && grid[row][c + 1] === 'twin') { twinPaid[row + ',' + c] = 1; twinPaid[row + ',' + (c + 1)] = 1; }
  }
  // ---- fire every symbol in the window ----
  for (let row = 0; row < 3; row++) for (let c = 0; c < G.w; c++) {
    const k = grid[row][c];
    let mul = G.rowMul[row] * (lineBoost[row + ',' + c] || 1);
    let note = '';
    if (k === 'king') {
      let court = 0;
      for (let c2 = 0; c2 < G.w; c2++) if (c2 !== c && grid[row][c2] !== 'king') court++;
      note = 'court ' + court;
      q.push({ kind: 'king', row, col: c, mul, court, ember: emberUp });
      continue;
    }
    if (k === 'twin') { q.push({ kind: 'twin', row, col: c, mul, paired: !!twinPaid[row + ',' + c], ember: emberUp }); continue; }
    q.push({ kind: k, row, col: c, mul, ember: emberUp, note });
  }
  for (const rc of recipes) q.push({ recipe: rc });
  G.queue = q; G.qt = 0.35;
  G.phase = 'resolving';
}
function liveFoes() { return G.foes.filter(f => f.hp > 0); }
function target() { return liveFoes()[0] || null; }
function dmgFoe(f, n, pierce) {
  if (!f || f.hp <= 0 || n <= 0) return 0;
  let d = n;
  if (f.def === 'gel') d = Math.min(2, d);
  if (f.def === 'armor' && !pierce) d = Math.max(0, d - 2);
  if (liveFoes().some(x => x.def === 'ward' && x !== f)) d = Math.max(0, d - 2);
  if (f.brace && !pierce) d = Math.max(0, d - 3);
  f.hp -= d; f.hitT = 0.3; G.dmgDone += d;
  if (f.hp <= 0 && !f.dead) { f.dead = 1; logLine(f.name + ' falls!', '#7ee787'); G.shake += 8; }
  return d;
}
function fireSymbol(s) {
  const f = target();
  const cx = reelX(s.col) + CELL / 2, cy = gridY() + s.row * CELL + CELL / 2;
  const burnRider = s.ember ? 1 : 0;
  const times = s.mul;
  if (s.kind === 'coin') { const d = dmgFoe(f, 1 * times); float(cx, cy, '-' + d, '#f2c04a'); if (burnRider && f) f.burn += 1; }
  else if (s.kind === 'silver') { G.block += 1 * times; float(cx, cy, '+' + times + '\u{1F6E1}', '#c3ccd6'); }
  else if (s.kind === 'green') { if (f && f.def !== 'thick') { f.pois += 1 * times; float(cx, cy, '☠+' + times, '#8ed67e'); } else float(cx, cy, 'immune', '#8a8a8a'); }
  else if (s.kind === 'red') { G.hp = Math.min(G.maxHp, G.hp + 1 * times); float(cx, cy, '+' + times + '\u{2764}', '#e87a8a'); }
  else if (s.kind === 'blue') { for (const x of liveFoes()) { x.hp -= 1 * times; x.hitT = 0.3; G.dmgDone += times; } float(cx, cy, '-' + times + ' ALL', '#7ab0e8'); G.foes.forEach(x => { if (x.hp <= 0 && !x.dead) { x.dead = 1; logLine(x.name + ' falls!', '#7ee787'); } }); }
  else if (s.kind === 'lucky') { const d = dmgFoe(f, 4 * times); float(cx, cy, '-' + d + '!', '#ffdf6b', true); if (burnRider && f) f.burn += 1; }
  else if (s.kind === 'bunny') { const d = dmgFoe(f, 1 * times); float(cx, cy, '-' + d, '#f0e0c8'); }
  else if (s.kind === 'twin') { const d = dmgFoe(f, (s.paired ? 4 : 1) * times); float(cx, cy, '-' + d + (s.paired ? ' \u{264A}!' : ''), '#c8a2ff', s.paired); }
  else if (s.kind === 'ember') { const d = dmgFoe(f, 2 * times); if (f) f.burn += 2; float(cx, cy, '-' + d + ' \u{1F525}', '#ff8a4a'); }
  else if (s.kind === 'king') { const d = dmgFoe(f, (1 + s.court) * times); float(cx, cy, '-' + d + ' \u{1F451}', '#ffcf7a', true); if (burnRider && f) f.burn += 1; }
  else if (s.kind === 'item') { const d = dmgFoe(f, 6 * times); float(cx, cy, '-' + d + ' \u{1F5E1}', '#e8e0d0', true); }
}
function fireRecipe(rc) {
  const f = target();
  if (rc.fx === 'jackpot') { for (const x of liveFoes()) dmgFoe(x, 24, true); G.nudges = 3; G.shake += 14; logLine(rc.label + ' 24 to ALL, nudges refilled', '#ffdf6b'); return; }
  if (rc.fx === 'swordboard') { G.block += 3; logLine(rc.label, '#c3ccd6'); return; }
  if (rc.fx === 'apothecary') { if (f && f.def !== 'thick') f.pois += 4; G.hp = Math.min(G.maxHp, G.hp + 4); logLine(rc.label, '#8ed67e'); return; }
  if (rc.fx === 'coldsnap') { for (const x of liveFoes()) dmgFoe(x, 2, true); logLine(rc.label, '#7ab0e8'); return; }
  logLine(rc.label, '#ffe9a3');
}
function foeTurn() {
  // dots first
  for (const f of liveFoes()) {
    if (f.pois > 0) { f.hp -= f.pois; G.dmgDone += f.pois; logLine(f.name + ' suffers ☠' + f.pois, '#8ed67e'); f.pois = Math.max(0, f.pois - 1); }
    if (f.burn > 0) { f.hp -= f.burn; G.dmgDone += f.burn; logLine(f.name + ' burns \u{1F525}' + f.burn, '#ff8a4a'); f.burn = Math.max(0, f.burn - 2); }
    if (f.hp <= 0 && !f.dead) { f.dead = 1; logLine(f.name + ' falls!', '#7ee787'); }
  }
  if (!liveFoes().length) { G.screen = 'won'; return; }
  for (const f of liveFoes()) {
    f.brace = false;
    const roll = Math.random();
    if (f.boss && G.round % 3 === 0) { G.hp -= Math.max(0, f.atk + 2 - G.block); G.block = 0; logLine('the dragon BREATHES — ' + (f.atk + 2) + ' fire!', '#ff9d3c'); continue; }
    if (roll < 0.2) { f.brace = true; logLine(f.name + ' braces', '#9a8aa0'); }
    else {
      const raw = roll > 0.85 ? f.atk * 2 : f.atk;
      const d = Math.max(0, raw - G.block);
      G.block = Math.max(0, G.block - raw);
      G.hp -= d;
      logLine(f.name + ' hits for ' + d + (raw !== d ? ' (' + (raw - d) + ' blocked)' : ''), d ? '#ff8a8a' : '#c3ccd6');
    }
  }
  G.shake += 4;
  if (G.hp <= 0) { G.screen = 'lost'; }
}

// -------------------------------------------------------------------- ticks
let last = 0;
function frame(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0.016);
  last = ts; G.t += dt;
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 30);
  for (const r of (G.reels || [])) {
    if (!r.stopped) r.pos = (r.pos + r.vel * dt) % r.strip.length;
  }
  if (G.phase === 'resolving') {
    G.qt -= dt;
    if (G.qt <= 0) {
      const s = G.queue.shift();
      if (s) { if (s.recipe) fireRecipe(s.recipe); else fireSymbol(s); G.qt = 0.22; }
      if (!s || !G.queue.length) {
        if (!liveFoes().length) { G.screen = 'won'; G.phase = 'idle'; }
        else { G.phase = 'idle'; G.qt = 0; setTimeout(() => { if (G.screen === 'battle') foeTurn(); }, 350); }
      }
    }
  }
  for (let i = G.floats.length - 1; i >= 0; i--) { const f = G.floats[i]; f.t += dt; if (f.t > 1.1) G.floats.splice(i, 1); }
  draw();
  requestAnimationFrame(frame);
}

// --------------------------------------------------------------------- draw
const CELL = 84;
function gridY() { return 268; }
function reelX(i) { return LW / 2 - (G.w * CELL) / 2 + i * CELL; }
const BTNS = [];
function btn(x, y, w, h, label, cb, o) {
  o = o || {};
  BTNS.push({ x, y, w: Math.max(w, 40), h: Math.max(h, 40), cb, label });
  rr(x, y, w, h, o.r || 11);
  ctx.fillStyle = o.bg || '#3a3440'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = o.border || '#7d5a24'; rr(x, y, w, h, o.r || 11); ctx.stroke();
  txt(label, x + w / 2, y + h / 2 + 1, o.font || '900 13px Verdana, sans-serif', o.col || '#ffe9a3', 'center');
}
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
function txt(s, x, y, font, col, align) {
  ctx.font = font; ctx.fillStyle = col; ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(s, x, y);
}
function draw() {
  BTNS.length = 0;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#0e0910'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(scale, 0, 0, scale, offX, offY);
  if (G.shake > 0.1) ctx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);
  ctx.fillStyle = '#1c1220'; ctx.fillRect(0, 0, LW, LH);
  txt('\u{1F3B0} THE CROUPIER', LW / 2, 34, '900 24px Georgia, serif', '#ffd75e');
  txt('slot-battle sandbox — nothing here is saved', LW / 2, 58, '600 10px Verdana, sans-serif', '#9a8aa0');
  if (G.screen === 'setup') return drawSetup();
  drawBattle();
}
function drawSetup() {
  txt('PICK YOUR PURSE — every coin is a ticket on every reel', LW / 2, 92, '800 11px Verdana, sans-serif', '#e8c877');
  PICKABLE.forEach((k, i) => {
    const x = 34 + (i % 2) * 216, y = 112 + ((i / 2) | 0) * 46;
    rr(x, y, 200, 38, 9); ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    txt(KINDS[k].sym, x + 18, y + 19, '15px serif', '#fff');
    txt(KINDS[k].name, x + 36, y + 13, '900 11px Verdana, sans-serif', KINDS[k].col, 'left');
    txt(KINDS[k].what, x + 36, y + 27, '600 8px Verdana, sans-serif', '#9a8aa0', 'left');
    btn(x + 116, y + 3, 26, 32, '−', () => { if (G.purse[k] > 0) G.purse[k]--; }, { bg: '#2a222e', border: '#9a8aa0', font: '900 14px Verdana' });
    txt('' + G.purse[k], x + 156, y + 19, '900 13px Verdana, sans-serif', '#ffe9a3');
    btn(x + 170, y + 3, 26, 32, '+', () => { G.purse[k]++; }, { border: '#ffd75e', font: '900 14px Verdana' });
  });
  const uy = 112 + 5 * 46 + 10;
  txt('THE WINDOW & THE MARKERS — your per-floor scaling picks', LW / 2, uy, '800 11px Verdana, sans-serif', '#e8c877');
  btn(34, uy + 14, 130, 38, 'REELS: ' + G.w + (G.w < 5 ? '  (+1)' : ' MAX'), () => { if (G.w < 5) G.w++; }, { border: '#7ee7e0', col: '#c8f4f0' });
  btn(174, uy + 14, 130, 38, 'RESET REELS', () => { G.w = 3; }, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc' });
  btn(314, uy + 14, 132, 38, 'GEAR: ' + G.gearTickets + ' \u{1F5E1}', () => { G.gearTickets = (G.gearTickets + 1) % 4; }, { border: '#e8e0d0', col: '#e8e0d0' });
  for (let r = 0; r < 3; r++) {
    btn(34 + r * 146, uy + 60, 136, 38, 'ROW ' + (r + 1) + ': \u{D7}' + G.rowMul[r],
      () => { G.rowMul[r] = G.rowMul[r] >= 3 ? 1 : G.rowMul[r] + 1; }, { border: '#c8a2ff', col: '#e8d8ff' });
  }
  const ey = uy + 116;
  txt('THE OPPOSITION', LW / 2, ey, '800 11px Verdana, sans-serif', '#e8c877');
  SETUPS.forEach((su, i) => {
    btn(34 + (i % 2) * 216, ey + 14 + ((i / 2) | 0) * 46, 200, 38,
      su.foes.map(f => f.sym).join(' ') + ' ' + su.name,
      () => { G.setup = i; },
      { bg: G.setup === i ? '#4a3410' : '#2a222e', border: G.setup === i ? '#ffd75e' : '#55506a' });
  });
  btn(LW / 2 - 110, ey + 118, 220, 52, '\u{25B6} DEAL ME IN', startBattle,
      { bg: '#3f9d5a', border: '#eaffef', col: '#123a24', font: '900 16px Verdana, sans-serif' });
}
function drawBattle() {
  // foes
  const fy = 96;
  G.foes.forEach((f, i) => {
    const fx = LW / 2 - (G.foes.length * 150) / 2 + i * 150 + 75;
    if (f.hitT > 0) f.hitT -= 0.016;
    txt(f.sym, fx + (f.hitT > 0 ? (Math.random() - 0.5) * 6 : 0), fy + 20, (f.boss ? '44px' : '34px') + ' serif', '#fff');
    txt(f.name, fx, fy + 52, '800 10px Verdana, sans-serif', f.hp > 0 ? '#ffe9a3' : '#5a5062');
    if (f.hp > 0) {
      rr(fx - 55, fy + 62, 110, 9, 4); ctx.fillStyle = '#33202e'; ctx.fill();
      rr(fx - 55, fy + 62, 110 * Math.max(0, f.hp / f.maxHp), 9, 4); ctx.fillStyle = '#e05a5a'; ctx.fill();
      txt(f.hp + (f.def ? '  \u{2022} ' + DEF_TXT[f.def] : ''), fx, fy + 84, '700 9px Verdana, sans-serif', '#c8a8b0');
      let dots = '';
      if (f.pois) dots += '☠' + f.pois + ' ';
      if (f.burn) dots += '\u{1F525}' + f.burn + ' ';
      if (f.brace) dots += '\u{1F6E1} ';
      if (dots) txt(dots, fx, fy + 100, '800 10px Verdana, sans-serif', '#b8f26b');
    } else txt('felled', fx, fy + 70, '700 10px Verdana, sans-serif', '#5a5062');
  });
  // the window
  const gy = gridY();
  rr(reelX(0) - 12, gy - 12, G.w * CELL + 24, 3 * CELL + 24, 16);
  ctx.fillStyle = '#241826'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#7d5a24'; rr(reelX(0) - 12, gy - 12, G.w * CELL + 24, 3 * CELL + 24, 16); ctx.stroke();
  for (let r = 0; r < 3; r++) {
    if (G.rowMul[r] > 1) {
      txt('\u{D7}' + G.rowMul[r], reelX(0) - 26, gy + r * CELL + CELL / 2, '900 14px Verdana, sans-serif', '#c8a2ff');
    }
  }
  for (let c = 0; c < G.w; c++) {
    const reel = G.reels[c];
    ctx.save();
    ctx.beginPath(); ctx.rect(reelX(c) + 2, gy, CELL - 4, 3 * CELL); ctx.clip();
    ctx.fillStyle = c % 2 ? '#2c1e30' : '#281a2c'; ctx.fillRect(reelX(c) + 2, gy, CELL - 4, 3 * CELL);
    if (reel) {
      const frac = reel.pos - Math.floor(reel.pos);
      for (let row = -1; row < 4; row++) {
        const k = reel.strip[(((Math.floor(reel.pos) + row) % reel.strip.length) + reel.strip.length) % reel.strip.length];
        const cy = gy + (row - frac) * CELL + CELL / 2;
        const kk = KINDS[k];
        if (!kk) continue;
        ctx.globalAlpha = reel.stopped ? 1 : 0.85;
        txt(kk.sym, reelX(c) + CELL / 2, cy + 2, '34px serif', '#fff');
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
    if (reel && !reel.stopped) { ctx.fillStyle = 'rgba(255,215,94,0.08)'; ctx.fillRect(reelX(c) + 2, gy, CELL - 4, 3 * CELL); }
    // nudge chips
    if (G.phase === 'nudge') {
      btn(reelX(c) + CELL / 2 - 38, gy + 3 * CELL + 18, 34, 30, '\u{25B2}', () => nudge(c, 1), { bg: '#2a222e', border: '#8a86b8', font: '900 12px Verdana' });
      btn(reelX(c) + CELL / 2 + 4, gy + 3 * CELL + 18, 34, 30, '\u{25BC}', () => nudge(c, -1), { bg: '#2a222e', border: '#8a86b8', font: '900 12px Verdana' });
    }
  }
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,215,94,0.5)';
  ctx.strokeRect(reelX(0) - 4, gy + CELL, G.w * CELL + 8, CELL);   // the payline glow (middle row)
  // the big lever
  const by = gy + 3 * CELL + 58;
  if (G.phase === 'idle') btn(LW / 2 - 110, by, 220, 52, '\u{1F3B0} SPIN  (round ' + (G.round + 1) + ')', startSpin, { bg: '#3f9d5a', border: '#eaffef', col: '#123a24', font: '900 16px Verdana, sans-serif' });
  else if (G.phase === 'spin') btn(LW / 2 - 110, by, 220, 52, '\u{270B} STOP REEL ' + (G.reels.filter(r => r.stopped).length + 1), stopNext, { bg: '#7d2430', border: '#ff9d8a', col: '#ffd9d0', font: '900 16px Verdana, sans-serif' });
  else if (G.phase === 'nudge') {
    btn(LW / 2 - 150, by, 180, 52, '\u{2696}\u{FE0F} RESOLVE', resolveSpin, { bg: '#3f9d5a', border: '#eaffef', col: '#123a24', font: '900 15px Verdana, sans-serif' });
    txt('nudges: ' + G.nudges, LW / 2 + 90, by + 26, '900 13px Verdana, sans-serif', G.nudges ? '#ffe9a3' : '#5a5062');
  } else txt('\u{2728} the window pays\u{2026}', LW / 2, by + 26, '900 14px Georgia, serif', '#ffd75e');
  // player strip
  const py = by + 70;
  rr(24, py, LW - 48, 46, 12); ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
  txt('\u{2764}\u{FE0F} ' + Math.max(0, G.hp) + ' / ' + G.maxHp, 92, py + 23, '900 14px Verdana, sans-serif', G.hp <= 15 ? '#ff8a8a' : '#ffe9a3');
  txt('\u{1F6E1}\u{FE0F} ' + G.block, 190, py + 23, '900 14px Verdana, sans-serif', '#c3ccd6');
  txt('spins ' + G.spins + ' \u{2022} dealt ' + G.dmgDone, 330, py + 23, '700 11px Verdana, sans-serif', '#9a8aa0');
  // log
  G.log.forEach((l, i) => txt(l.s, LW / 2, py + 66 + i * 15, '700 9px Verdana, sans-serif', i ? '#8d7d95' : l.col, 'center'));
  // floats
  for (const f of G.floats) {
    ctx.globalAlpha = Math.max(0, 1 - f.t);
    txt(f.s, f.x, f.y - f.t * 34, (f.big ? '900 20px' : '900 14px') + ' Verdana, sans-serif', f.col);
    ctx.globalAlpha = 1;
  }
  btn(LW - 116, 74, 92, 34, '\u{2699} SETUP', () => { G.screen = 'setup'; G.phase = 'idle'; G.reels = []; }, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc', font: '800 11px Verdana' });
  if (G.screen === 'won' || G.screen === 'lost') {
    ctx.fillStyle = 'rgba(8,4,10,0.75)'; ctx.fillRect(0, 0, LW, LH);
    txt(G.screen === 'won' ? '\u{1F3C6} THE HOUSE PAYS OUT' : '\u{1F480} THE HOUSE WINS', LW / 2, 360, '900 26px Georgia, serif', G.screen === 'won' ? '#7ee787' : '#ff8a8a');
    txt(G.spins + ' spins \u{2022} ' + G.dmgDone + ' damage dealt', LW / 2, 396, '800 12px Verdana, sans-serif', '#c8b8cc');
    btn(LW / 2 - 150, 430, 140, 46, '\u{21BB} REMATCH', startBattle, { bg: '#3f9d5a', border: '#eaffef', col: '#123a24' });
    btn(LW / 2 + 10, 430, 140, 46, '\u{2699} SETUP', () => { G.screen = 'setup'; G.reels = []; }, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc' });
  }
}

// -------------------------------------------------------------------- input
function hit(px, py) {
  const x = (px * (window.devicePixelRatio ? Math.min(window.devicePixelRatio, 2) : 1) - offX) / scale;
  const y = (py * (window.devicePixelRatio ? Math.min(window.devicePixelRatio, 2) : 1) - offY) / scale;
  for (let i = BTNS.length - 1; i >= 0; i--) {
    const b = BTNS[i];
    if (x >= b.x - 4 && x <= b.x + b.w + 4 && y >= b.y - 4 && y <= b.y + b.h + 4) { b.cb(); return true; }
  }
  return false;
}
canvas.addEventListener('pointerdown', (ev) => {
  if (!hit(ev.clientX, ev.clientY)) {
    // anywhere else: the lever — spin or stop
    if (G.screen === 'battle') { if (G.phase === 'idle') startSpin(); else if (G.phase === 'spin') stopNext(); else if (G.phase === 'nudge') resolveSpin(); }
  }
});
window.addEventListener('keydown', (ev) => {
  if (ev.key === ' ') {
    ev.preventDefault();
    if (G.screen === 'battle') { if (G.phase === 'idle') startSpin(); else if (G.phase === 'spin') stopNext(); else if (G.phase === 'nudge') resolveSpin(); }
  }
});
// debug/test handles
window.G = G; window.BTNS = BTNS; window.startSpin = startSpin; window.stopNext = stopNext; window.resolveSpin = resolveSpin;
requestAnimationFrame(frame);
</script>
