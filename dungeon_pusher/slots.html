<script>
'use strict';
// ============================================================================
// THE CROUPIER v2 — a slot-machine battle prototype for Dungeon Pusher.
// Standalone sandbox: no save, no dungeon — just the reel fight.
//   SPIN → each press STOPS the next reel → NUDGE (3) → RESOLVE.
//   Your purse composition IS the odds. Rows carry ×2/×3 markers.
// v2, on the owner's orders:
//   • the battle is STAGED like the coin pusher: foes on a stone stage with
//     HP bars and telegraphed INTENTS, the hero at the bottom, the machine
//     a brass-and-wood cabinet between them
//   • every payout FLIES: damage streaks from the window to the foe it
//     strikes, block and heals sail down to the hero — nothing is abstract
//   • the LUCK-BE-A-LANDLORD layer: a pick-1-of-3 COIN DRAFT after every
//     spin, growth coins (egg→whelp→drake, coal→diamond), the rat cult,
//     the glutton pig, slug dilution, THE DEBT (an enrage fuse), and a
//     TURBO toggle for when the ceremony is learned
// ============================================================================
const LW = 480, LH = 840;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1, offX = 0, offY = 0;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  scale = Math.min(canvas.width / LW, canvas.height / LH);
  offX = (canvas.width - LW * scale) / 2;
  offY = (canvas.height - LH * scale) / 2;
}
window.addEventListener('resize', resize); resize();

// -------------------------------------------------------------------- sound
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
function audio() { if (!ac && AC) ac = new AC(); if (ac && ac.state === 'suspended') ac.resume(); return ac; }
function tone(f, dur, type, vol, when, bend) {
  if (!ac) return;
  const t0 = ac.currentTime + (when || 0);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.setValueAtTime(f, t0);
  if (bend) o.frequency.exponentialRampToValueAtTime(Math.max(30, f * bend), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol || 0.1, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
const ST = Math.pow(2, 1 / 12);
const SND = {
  tick() { tone(1500 + Math.random() * 500, 0.025, 'square', 0.015); },
  stop(i) { tone(170 + i * 45, 0.1, 'square', 0.16); tone(85 + i * 25, 0.16, 'triangle', 0.2, 0, 0.6); },
  ching(n) { const f = 880 * Math.pow(ST, Math.min(n, 30)); tone(f, 0.08, 'square', 0.11); tone(f * 2, 0.14, 'sine', 0.09, 0.02); },
  clink(n) { tone(500 * Math.pow(ST, Math.min(n, 30) / 2), 0.05, 'triangle', 0.09); },
  whoosh() { tone(900, 0.12, 'sawtooth', 0.03, 0, 0.3); },
  line() { [0, 4, 7].forEach((st, i) => tone(660 * Math.pow(ST, st), 0.12, 'square', 0.11, i * 0.055)); },
  bigline() { [0, 4, 7, 12].forEach((st, i) => tone(660 * Math.pow(ST, st), 0.14, 'square', 0.12, i * 0.05)); },
  jackpot() { [0, 4, 7, 12, 16, 19, 24, 28, 31].forEach((st, i) => tone(523 * Math.pow(ST, st), 0.22, 'square', 0.13, i * 0.07)); },
  heat(n) { tone(180 + n * 80, 0.22, 'sawtooth', 0.11, 0, 2.2); tone(90 + n * 40, 0.3, 'triangle', 0.1, 0.02); },
  fever() { for (let i = 0; i < 9; i++) tone(280 + i * 130, 0.08, 'square', 0.09, i * 0.04); },
  hurt() { tone(140, 0.18, 'sawtooth', 0.15, 0, 0.5); tone(85, 0.28, 'sawtooth', 0.12, 0.03, 0.5); },
  ding() { tone(1320, 0.1, 'sine', 0.1); tone(1980, 0.16, 'sine', 0.07, 0.05); },
  heart() { tone(66, 0.09, 'sine', 0.22); tone(52, 0.11, 'sine', 0.16, 0.12); },
  nudge() { tone(230, 0.05, 'square', 0.11); tone(460, 0.05, 'square', 0.08, 0.035); },
  hatch() { tone(880, 0.08, 'sine', 0.1); tone(1320, 0.12, 'sine', 0.1, 0.07); tone(1760, 0.14, 'sine', 0.08, 0.15); },
  diamond() { [0, 7, 12, 16, 24].forEach((st, i) => tone(1046 * Math.pow(ST, st), 0.16, 'sine', 0.1, i * 0.06)); },
  debt() { tone(92, 0.5, 'sawtooth', 0.16, 0, 0.7); tone(61, 0.7, 'sawtooth', 0.13, 0.1, 0.7); },
  draft() { tone(660, 0.07, 'triangle', 0.1); tone(990, 0.1, 'triangle', 0.08, 0.05); },
  win() { [0, 4, 7, 12, 7, 12, 16, 24].forEach((st, i) => tone(523 * Math.pow(ST, st), 0.18, 'square', 0.11, i * 0.09)); },
  lose() { [12, 7, 4, 0].forEach((st, i) => tone(311 * Math.pow(ST, st - 12), 0.3, 'sawtooth', 0.11, i * 0.17, 0.8)); },
};

// ------------------------------------------------------------------- symbols
// dmg/blk/heal are per-symbol bases; growth coins carry their own rules
const KINDS = {
  coin:    { sym: '\u{1FA99}', col: '#f2c04a', name: 'Gold',    what: '1 dmg' },
  silver:  { sym: '\u{1F6E1}\u{FE0F}', col: '#c3ccd6', name: 'Silver',  what: '1 block' },
  green:   { sym: '\u{2620}\u{FE0F}', col: '#8ed67e', name: 'Venom',   what: '1 poison' },
  red:     { sym: '\u{2764}\u{FE0F}', col: '#e87a8a', name: 'Heart',   what: 'heal 1' },
  blue:    { sym: '\u{2744}\u{FE0F}', col: '#7ab0e8', name: 'Frost',   what: '1 dmg ALL, thru block' },
  lucky:   { sym: '7\u{FE0F}\u{20E3}', col: '#ffdf6b', name: 'Lucky',   what: '4 dmg' },
  bunny:   { sym: '\u{1F407}', col: '#f0e0c8', name: 'Bunny',   what: 'pairs BREED a ticket' },
  twin:    { sym: '\u{264A}',  col: '#c8a2ff', name: 'Twin',    what: '4 dmg beside its twin' },
  ember:   { sym: '\u{1F525}', col: '#ff8a4a', name: 'Ember',   what: '2 dmg — spin burns +1' },
  king:    { sym: '\u{1F451}', col: '#ffcf7a', name: 'King',    what: '1 + 1 per rowmate' },
  item:    { sym: '\u{1F5E1}\u{FE0F}', col: '#e8e0d0', name: 'Blade',   what: '6 dmg (gear ticket)' },
  egg:     { sym: '\u{1F95A}', col: '#f0e8d0', name: 'Egg',     what: '0 dmg — may HATCH each spin' },
  whelp:   { sym: '\u{1F423}', col: '#ffd9a0', name: 'Whelp',   what: '2 dmg — grows into a DRAKE' },
  drake:   { sym: '\u{1F409}', col: '#8ee89a', name: 'Drake',   what: '5 dmg — lays eggs on the reels' },
  coal:    { sym: '\u{26AB}',  col: '#8a8a92', name: 'Coal',    what: '0 dmg — 10 spins of pressure…' },
  diamond: { sym: '\u{1F48E}', col: '#a8ecff', name: 'Diamond', what: '4 dmg +2 per other diamond showing' },
  rat:     { sym: '\u{1F400}', col: '#b8a8c0', name: 'Rat',     what: '+1 per other rat showing; 3+ SWARM ×2' },
  pig:     { sym: '\u{1F437}', col: '#f0b8c8', name: 'Glutton', what: 'eats a gold neighbor: +1 dmg FOREVER' },
  slug:    { sym: '\u{1F40C}', col: '#6a6272', name: 'Slug',    what: 'a dud — thin purses breed them' },
};
const PICKABLE = ['coin', 'silver', 'green', 'red', 'blue', 'lucky', 'bunny', 'twin', 'ember', 'king', 'egg', 'coal', 'rat', 'pig'];
const DAMAGE_KINDS = { coin: 1, blue: 1, lucky: 1, bunny: 1, twin: 1, ember: 1, king: 1, item: 1, whelp: 1, drake: 1, diamond: 1, rat: 1, pig: 1 };
// the after-spin draft pool: [kind, weight]
const DRAFT_POOL = [['coin', 16], ['silver', 12], ['green', 6], ['red', 6], ['blue', 6], ['lucky', 4],
                    ['bunny', 4], ['twin', 4], ['ember', 4], ['king', 3],
                    ['egg', 6], ['coal', 5], ['rat', 6], ['pig', 3]];

// ------------------------------------------------------------------ enemies
const SETUPS = [
  { id: 'pack',  name: 'ORC PACK', debt: 7, foes: [
    { name: 'Orc Grunt', sym: '\u{1F9CC}', hp: 42, atk: 3, def: null },
    { name: 'Gutter Rat', sym: '\u{1F400}', hp: 30, atk: 2, def: null }] },
  { id: 'wall',  name: 'SHIELD WALL', debt: 8, foes: [
    { name: 'Skeleton Guard', sym: '\u{1F480}', hp: 55, atk: 4, def: 'armor' },
    { name: 'War Totem', sym: '\u{1F5FF}', hp: 40, atk: 3, def: 'ward' }] },
  { id: 'slime', name: 'GEL & HIDE', debt: 7, foes: [
    { name: 'Gel Cube', sym: '\u{1F7E2}', hp: 46, atk: 3, def: 'gel' },
    { name: 'Ogre Brute', sym: '\u{1F479}', hp: 80, atk: 5, def: 'thick' }] },
  { id: 'boss',  name: 'THE DRAGON', debt: 0, foes: [
    { name: 'Vault Dragon', sym: '\u{1F409}', hp: 200, atk: 7, def: 'armor', boss: true }] },
];
const DEF_TXT = { armor: 'absorbs 2/hit', gel: 'hits capped at 2', ward: 'pack −2 dmg', thick: 'poison immune' };

// -------------------------------------------------------------------- state
const G = {
  purse: { coin: 8, silver: 6, green: 2, red: 2, blue: 2, lucky: 1, bunny: 2, twin: 2, ember: 1, king: 1,
           egg: 1, coal: 1, rat: 2, pig: 0, whelp: 0, drake: 0, diamond: 0, slug: 0 },
  bredTickets: 0, gearTickets: 1,
  w: 3, rowMul: [1, 1, 1], setup: 0,
  screen: 'setup',                      // setup | battle | won | lost
  hp: 60, maxHp: 60, block: 0,
  foes: [], round: 0, nudges: 3,
  reels: [], phase: 'idle',             // idle | spin | nudge | resolving | draft
  queue: [], qt: 0, qn: 0,
  log: [], floats: [], shake: 0, t: 0,
  spins: 0, dmgDone: 0,
  heat: 0, stun: false, spinDmg: 0, spinHits: 0,
  antic: false, hints: [],
  parts: [], pops: [], lineFx: [], shots: [],
  banner: null, flash: null, freeze: 0, feverGlow: 0, hb: 0, lastTick: 0,
  // the LANDLORD layer
  draft: null,                          // {offers:[k,k,k]} after every spin
  debt: 0, debtMax: 0,                  // the enrage fuse (spins until THE CALL)
  coalAge: 0, pigFat: 0,
  turbo: false, smelted: false,
};
function spd() { return G.turbo ? 0.35 : 1; }
function logLine(s, col) { G.log.unshift({ s, col: col || '#c8b8cc' }); if (G.log.length > 6) G.log.pop(); }
function float(x, y, s, col, big) { G.floats.push({ x, y, s, col: col || '#ffe9a3', t: 0, big }); }
function banner(s, col, big, sub) { G.banner = { s, col: col || '#ffd75e', t: 0, big, sub }; }
function burst(x, y, col, n, sp2) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 6.283, v = (sp2 || 90) * (0.4 + Math.random() * 0.9);
    G.parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 50, t: 0, life: 0.45 + Math.random() * 0.35, col });
  }
  while (G.parts.length > 260) G.parts.shift();
}
function shower() {
  for (let i = 0; i < 60; i++) G.parts.push({
    x: Math.random() * LW, y: -30 - Math.random() * 420, vx: (Math.random() - 0.5) * 40,
    vy: 50 + Math.random() * 130, t: 0, life: 3.2, sym: '\u{1FA99}' });
}
// ---- the flying payout: everything the machine does STREAKS to its target
function shot(x0, y0, x1, y1, icon, label, col, onHit, big) {
  G.shots.push({ x0, y0, x1, y1, icon, label, col, onHit, big,
                 t: 0, dur: (big ? 0.34 : 0.26) * spd(), lift: 40 + Math.random() * 50 });
  SND.whoosh();
}

// ------------------------------------------------------------------- layout
const CELL = 84;
function gridY() { return 262; }
function reelX(i) { return LW / 2 - (G.w * CELL) / 2 + i * CELL; }
const HERO = { x: 74, y: 660 };
function foePos(i, n) { return { x: LW / 2 - (n * 150) / 2 + i * 150 + 75, y: 140 }; }

// ------------------------------------------------------------------- strips
// every coin you own is one ticket — your purse IS the odds; a thin purse
// pads out with worthless SLUGS (dilution is real, the landlord taught us)
function buildStrip(seedShift) {
  const t = [];
  for (const k of Object.keys(G.purse)) for (let i = 0; i < (G.purse[k] | 0); i++) t.push(k);
  for (let i = 0; i < G.bredTickets; i++) t.push('bunny');
  for (let i = 0; i < G.gearTickets; i++) t.push('item');
  while (t.length < 10) t.push('slug');
  let s = 1234567 + seedShift * 99991 + G.spins * 7919;
  const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  for (let i = t.length - 1; i > 0; i--) { const j = (rnd() * (i + 1)) | 0; const q = t[i]; t[i] = t[j]; t[j] = q; }
  return t;
}
function startBattle() {
  const su = SETUPS[G.setup];
  G.foes = su.foes.map(f => ({ ...f, maxHp: f.hp, pois: 0, burn: 0, brace: false, hitT: 0, lungeT: 0, intent: null }));
  G.hp = G.maxHp = 60; G.block = 0; G.round = 0; G.heat = 0; G.stun = false;
  G.debtMax = su.debt; G.debt = su.debt;
  G.screen = 'battle'; G.phase = 'idle'; G.log = []; G.spins = 0; G.dmgDone = 0;
  G.parts = []; G.pops = []; G.lineFx = []; G.shots = []; G.banner = null; G.draft = null; G.smelted = false;
  // the window never sits empty: the reels rest on a face-up spread
  G.reels = [];
  for (let r = 0; r < G.w; r++) {
    const strip = buildStrip(r);
    G.reels.push({ strip, pos: Math.floor(Math.random() * strip.length), vel: 0, stopped: true, bT: 0, flashT: 0 });
  }
  rollIntents();
  logLine('the house opens: ' + su.name, '#ffd75e');
}
// telegraphed intents, pusher-style: you SEE what is coming before you spin
function rollIntents() {
  for (const f of liveFoes()) {
    if (f.boss && (G.round + 1) % 3 === 0) { f.intent = { t: 'breath', n: f.atk + 2 }; continue; }
    const r = Math.random();
    f.intent = r < 0.2 ? { t: 'brace' } : r > 0.85 ? { t: 'heavy', n: f.atk * 2 } : { t: 'hit', n: f.atk };
  }
}
function startSpin() {
  if (G.screen !== 'battle' || G.phase !== 'idle') return;
  G.round++; G.spins++;
  G.block = 0; G.nudges = 3;
  G.reels = []; G.antic = false; G.hints = []; G.spinDmg = 0; G.spinHits = 0; G.stun = false;
  // ---- the growth coins tick BETWEEN spins (the landlord's planted seeds)
  growthTick();
  for (let r = 0; r < G.w; r++) {
    const strip = buildStrip(r);
    G.reels.push({ strip, pos: Math.random() * strip.length, vel: 34 + r * 7 + Math.random() * 8, stopped: false, bT: 0, flashT: 0 });
  }
  G.phase = 'spin';
  logLine('round ' + G.round + ' — the reels sing');
}
function growthTick() {
  // eggs hatch, whelps grow — each ticket rolls alone
  let hatched = 0, grown = 0;
  for (let i = 0; i < (G.purse.egg | 0); i++) if (Math.random() < 0.12) hatched++;
  if (hatched) { G.purse.egg -= hatched; G.purse.whelp = (G.purse.whelp | 0) + hatched; SND.hatch(); banner('\u{1F423} ' + (hatched > 1 ? hatched + ' EGGS HATCH!' : 'AN EGG HATCHES!'), '#ffd9a0'); logLine('a shell cracks in the purse\u{2026}', '#ffd9a0'); }
  for (let i = 0; i < (G.purse.whelp | 0); i++) if (Math.random() < 0.10) grown++;
  if (grown) { G.purse.whelp -= grown; G.purse.drake = (G.purse.drake | 0) + grown; SND.hatch(); banner('\u{1F409} A WHELP BECOMES A DRAKE!', '#8ee89a'); }
  // coal matures under pressure — all at once, a mine-collapse of riches
  if ((G.purse.coal | 0) > 0) {
    G.coalAge++;
    if (G.coalAge >= 10) {
      const n = G.purse.coal; G.purse.coal = 0; G.purse.diamond = (G.purse.diamond | 0) + n; G.coalAge = 0;
      SND.diamond(); banner('\u{1F48E} THE PRESSURE HOLDS \u{2014} ' + n + ' DIAMOND' + (n > 1 ? 'S' : '') + '!', '#a8ecff', true);
    }
  }
}
function lineDefs() {
  const lines = [];
  for (let row = 0; row < 3; row++) for (let c = 0; c + 2 < G.w; c++) {
    lines.push({ cells: [[row, c], [row, c + 1], [row, c + 2]], mul: G.rowMul[row], label: 'row ' + (row + 1) });
  }
  lines.push({ cells: [[0, 0], [1, 1], [2, 2]], mul: 1, label: 'diagonal' });
  lines.push({ cells: [[0, G.w - 1], [1, G.w - 2], [2, G.w - 3]], mul: 1, label: 'diagonal' });
  return lines;
}
function stopNext() {
  if (G.phase !== 'spin') return;
  const r = G.reels.find(x => !x.stopped);
  if (!r) return;
  r.stopped = true;
  r.pos = Math.round(r.pos) % r.strip.length;
  r.bT = 0.22; r.flashT = 0.18;
  G.shake += 3;
  SND.stop(G.reels.filter(x => x.stopped).length - 1);
  if (G.reels.every(x => x.stopped)) { G.phase = 'nudge'; computeHints(); if (G.hints.length) SND.ding(); }
  else checkAnticipation();
}
function checkAnticipation() {
  if (G.antic) return;
  for (const ln of lineDefs()) {
    const ks = ln.cells.map(([row, c]) => G.reels[c].stopped ? cellKind(c, row) : null);
    const shown = ks.filter(Boolean);
    if (ks.filter(k => k === null).length === 1 && shown.length === 2 && shown[0] === shown[1] && shown[0] !== 'slug') {
      G.antic = true;
      for (const rl of G.reels) if (!rl.stopped) rl.vel = Math.max(7, rl.vel * 0.28);
      SND.ding();
      return;
    }
  }
}
function computeHints() {
  G.hints = [];
  const seen = {};
  for (const ln of lineDefs()) {
    const ks = ln.cells.map(([row, c]) => cellKind(c, row));
    for (let miss = 0; miss < 3; miss++) {
      const others = ks.filter((_, i) => i !== miss);
      if (!others[0] || others[0] !== others[1] || others[0] === 'slug' || ks[miss] === others[0]) continue;
      const [r3, c3] = ln.cells[miss];
      const rl = G.reels[c3];
      for (const dir of [1, -1]) {
        const k2 = rl.strip[(((Math.round(rl.pos) + dir + r3) % rl.strip.length) + rl.strip.length) % rl.strip.length];
        const key = c3 + ',' + dir;
        if (k2 === others[0] && !seen[key]) { seen[key] = 1; G.hints.push({ col: c3, dir }); }
      }
    }
  }
}
function nudge(ri, dir) {
  if (G.phase !== 'nudge' || G.nudges <= 0) return;
  const r = G.reels[ri];
  r.pos = ((Math.round(r.pos) + dir) % r.strip.length + r.strip.length) % r.strip.length;
  r.bT = 0.14;
  G.nudges--; G.shake += 2;
  SND.nudge();
  computeHints();
}
function cellKind(ri, row) {
  const r = G.reels[ri];
  return r.strip[(((Math.round(r.pos) + row) % r.strip.length) + r.strip.length) % r.strip.length];
}

// ------------------------------------------------------------------ resolve
function resolveSpin() {
  if (G.phase !== 'nudge') return;
  const grid = [];
  for (let row = 0; row < 3; row++) { grid.push([]); for (let c = 0; c < G.w; c++) grid[row].push(cellKind(c, row)); }
  const q = [];
  const emberUp = grid.flat().includes('ember');
  const lineBoost = {};
  const recipes = [];
  for (const ln of lineDefs()) {
    const ks = ln.cells.map(([r2, c2]) => grid[r2][c2]);
    const key3 = ks[0] === ks[1] && ks[1] === ks[2];
    if (key3 && ks[0] === 'lucky') { recipes.push({ label: '\u{1F3B0} JACKPOT 7-7-7!', fx: 'jackpot', cells: ln.cells }); }
    else if (key3 && ks[0] !== 'bunny' && ks[0] !== 'slug') {
      for (const [r2, c2] of ln.cells) lineBoost[r2 + ',' + c2] = (lineBoost[r2 + ',' + c2] || 1) * 3;
      recipes.push({ label: 'three ' + (KINDS[ks[0]] ? KINDS[ks[0]].name : ks[0]) + 's \u{2014} \u{D7}3 (' + ln.label + ')', fx: 'three', kind: ks[0], cells: ln.cells });
    }
    const sorted = ks.slice().sort().join(',');
    if (sorted === 'coin,coin,silver') recipes.push({ label: '\u{2694}\u{FE0F} SWORD & BOARD \u{2014} +3 block', fx: 'swordboard', cells: ln.cells });
    if (sorted === 'green,green,red') recipes.push({ label: '\u{2697}\u{FE0F} APOTHECARY \u{2014} poison 4, heal 4', fx: 'apothecary', cells: ln.cells });
    if (ks[0] === 'blue' && ks[1] === 'blue') recipes.push({ label: '\u{2744}\u{FE0F} COLD SNAP \u{2014} 2 to ALL', fx: 'coldsnap', cells: ln.cells });
  }
  // ---- specials & the landlord coins, judged on the window ----
  let bunnies = 0, rats = 0, diamonds = 0;
  for (let row = 0; row < 3; row++) for (let c = 0; c < G.w; c++) {

  for (let i = G.floats.length - 1; i >= 0; i--) { const f = G.floats[i]; f.t += dt; if (f.t > 1.1) G.floats.splice(i, 1); }

}

  if (G.heat > 0) {
    const hcol = G.heat >= 4 ? '#ff6b3a' : '#ff9d5e';
    txt('\u{1F525}' + G.heat, 168, HERO.y + 6, '900 ' + (13 + G.heat) + 'px Verdana, sans-serif', hcol);
  }
  txt('spins ' + G.spins + ' \u{2022} dealt ' + G.dmgDone + ' \u{2022} purse ' + Object.values(G.purse).reduce((a, b) => a + (b | 0), 0), 300, HERO.y + 6, '700 10px Verdana, sans-serif', '#9a8aa0');
  btn(LW - 62, HERO.y - 6, 44, 34, G.turbo ? '\u{26A1}!' : '\u{26A1}', () => { G.turbo = !G.turbo; }, { bg: G.turbo ? '#4a3410' : '#2a222e', border: G.turbo ? '#ffe36b' : '#6a5a72', col: G.turbo ? '#ffe36b' : '#9a8aa0', font: '900 13px Verdana' });
  // log
  G.log.forEach((l, i) => txt(l.s, LW / 2, HERO.y + 66 + i * 14, '700 9px Verdana, sans-serif', i ? '#8d7d95' : l.col, 'center'));
  // particles
  for (const p of G.parts) {
    const a = Math.max(0, 1 - p.t / p.life);
    ctx.globalAlpha = a;
    if (p.sym) txt(p.sym, p.x, p.y, '18px serif', '#fff');
    else { ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, 3 * a + 1, 0, 6.283); ctx.fill(); }
    ctx.globalAlpha = 1;
  }
  for (const f of G.floats) {
    ctx.globalAlpha = Math.max(0, 1 - f.t);
    const punch = 1 + Math.max(0, 0.18 - f.t) * 5;
    const size = Math.round((f.big ? 20 : 14) * punch);
    txt(f.s, f.x, f.y - f.t * 34, '900 ' + size + 'px Verdana, sans-serif', f.col);
    ctx.globalAlpha = 1;
  }
  btn(LW - 108, 62, 92, 30, '\u{2699} SETUP', () => { G.screen = 'setup'; G.phase = 'idle'; G.reels = []; G.shots = []; G.draft = null; }, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc', font: '800 10px Verdana' });
  // THE DRAFT: pick 1 of 3, every spin — the landlord's engine, in a dungeon
  if (G.phase === 'draft' && G.draft) {
    ctx.fillStyle = 'rgba(8,4,10,0.7)'; ctx.fillRect(0, 0, LW, LH);
    txt('\u{1FA99} THE DRAFT', LW / 2, 300, '900 22px Georgia, serif', '#ffd75e');
    txt('one coin joins your purse — or pass, and keep the odds clean', LW / 2, 328, '700 10px Verdana, sans-serif', '#c8b8cc');
    G.draft.offers.forEach((k, i) => {
      const cx = LW / 2 + (i - 1) * 140, cy = 420;
      const kk = KINDS[k];
      rr(cx - 62, cy - 58, 124, 128, 14);
      ctx.fillStyle = 'rgba(24,14,26,0.96)'; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = kk.col; rr(cx - 62, cy - 58, 124, 128, 14); ctx.stroke();
      txt(kk.sym, cx, cy - 22, '38px serif', '#fff');
      txt(kk.name, cx, cy + 16, '900 12px Verdana, sans-serif', kk.col);
      ctx.font = '600 8px Verdana, sans-serif'; ctx.fillStyle = '#c0b0c4'; ctx.textAlign = 'center';
      const words = kk.what.split(' ');
      let line = '', ly = cy + 32;
      for (const w2 of words) {
        if ((line + ' ' + w2).length > 20) { ctx.fillText(line, cx, ly); line = w2; ly += 11; }
        else line = line ? line + ' ' + w2 : w2;
      }
      ctx.fillText(line, cx, ly);
      txt('owned: ' + (G.purse[k] | 0), cx, cy + 62, '700 9px Verdana, sans-serif', '#9a8aa0');
      BTNS.push({ x: cx - 62, y: cy - 58, w: 124, h: 128, cb: () => draftPick(i), label: 'draft:' + k });
    });
    btn(LW / 2 - 70, 510, 140, 40, 'PASS \u{2715}', draftSkip, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc' });
  }
  // banner
  if (G.banner) {
    const b = G.banner;
    const p = Math.min(1, b.t / 0.14);
    const sc = 1 + (1 - p) * 1.2;
    const alpha = b.t > 1.2 ? Math.max(0, (1.6 - b.t) / 0.4) : 1;
    const by2 = b.big ? gy + CELL * 1.5 : 236;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(LW / 2, by2); ctx.scale(sc, sc);
    ctx.fillStyle = 'rgba(10,5,12,0.72)';
    const wdt = b.big ? 200 : 150;
    rr(-wdt, -26, wdt * 2, b.sub ? 62 : 46, 14); ctx.fill();
    txt(b.s, 0, b.sub ? -6 : -2, '900 ' + (b.big ? 26 : 18) + 'px Georgia, serif', b.col);
    if (b.sub) txt(b.sub, 0, 20, '800 11px Verdana, sans-serif', '#e8d8c8');
    ctx.restore();
  }
  if (G.flash) { ctx.fillStyle = 'rgba(' + G.flash.c + ',' + Math.max(0, G.flash.a) + ')'; ctx.fillRect(0, 0, LW, LH); }
  if (G.screen === 'won' || G.screen === 'lost') {
    ctx.fillStyle = 'rgba(8,4,10,0.78)'; ctx.fillRect(0, 0, LW, LH);
    txt(G.screen === 'won' ? '\u{1F3C6} THE HOUSE PAYS OUT' : '\u{1F480} THE HOUSE WINS', LW / 2, 330, '900 26px Georgia, serif', G.screen === 'won' ? '#7ee787' : '#ff8a8a');
    txt(G.spins + ' spins \u{2022} ' + G.dmgDone + ' damage dealt', LW / 2, 364, '800 12px Verdana, sans-serif', '#c8b8cc');
    if (G.screen === 'won') {
      // LBAL's scarce removal: ONE smelt per victory — thin the deck
      txt(G.smelted ? 'the smelter cools' : '\u{2692}\u{FE0F} SMELT ONE — remove a coin, sharpen the odds:', LW / 2, 400, '800 11px Verdana, sans-serif', G.smelted ? '#9a8aa0' : '#e8d0a0');
      if (!G.smelted) {
        const owned = Object.keys(G.purse).filter(k => (G.purse[k] | 0) > 0).sort((a, b) => G.purse[b] - G.purse[a]).slice(0, 4);
        owned.forEach((k, i) => {
          const cx = LW / 2 + (i - (owned.length - 1) / 2) * 100;
          btn(cx - 44, 418, 88, 44, KINDS[k].sym + ' \u{D7}' + G.purse[k], () => smelt(k), { bg: '#2a222e', border: KINDS[k].col, col: '#e8d8dc', font: '800 11px Verdana' });
        });
      }
      for (const p of G.parts) if (p.sym) { ctx.globalAlpha = Math.max(0, 1 - p.t / p.life); txt(p.sym, p.x, p.y, '18px serif', '#fff'); ctx.globalAlpha = 1; }
    }
    btn(LW / 2 - 150, 490, 140, 46, '\u{21BB} REMATCH', startBattle, { bg: '#3f9d5a', border: '#eaffef', col: '#123a24' });
    btn(LW / 2 + 10, 490, 140, 46, '\u{2699} SETUP', () => { G.screen = 'setup'; G.reels = []; G.shots = []; }, { bg: '#2a222e', border: '#9a8aa0', col: '#d8c8dc' });
    if (G.screen === 'won') txt('your purse KEEPS its drafts, breeds and growths — rematch to run it deeper', LW / 2, 556, '600 9px Verdana, sans-serif', '#9a8aa0');
  }
}

// -------------------------------------------------------------------- input
function hit(px, py) {
  const x = (px * (window.devicePixelRatio ? Math.min(window.devicePixelRatio, 2) : 1) - offX) / scale;
  const y = (py * (window.devicePixelRatio ? Math.min(window.devicePixelRatio, 2) : 1) - offY) / scale;
  for (let i = BTNS.length - 1; i >= 0; i--) {
    const b = BTNS[i];
    if (x >= b.x - 4 && x <= b.x + b.w + 4 && y >= b.y - 4 && y <= b.y + b.h + 4) { b.cb(); return true; }
  }
  return false;
}
canvas.addEventListener('pointerdown', (ev) => {
  audio();
  if (!hit(ev.clientX, ev.clientY)) {
    if (G.screen === 'battle') { if (G.phase === 'idle') startSpin(); else if (G.phase === 'spin') stopNext(); else if (G.phase === 'nudge') resolveSpin(); }
  }
});
window.addEventListener('keydown', (ev) => {
  if (ev.key === ' ') {
    ev.preventDefault();
    audio();
    if (G.screen === 'battle') {
      if (G.phase === 'idle') startSpin();
      else if (G.phase === 'spin') stopNext();
      else if (G.phase === 'nudge') resolveSpin();
      else if (G.phase === 'draft') draftSkip();
    }
  }
});
// debug/test handles
window.G = G; window.BTNS = BTNS; window.startSpin = startSpin; window.stopNext = stopNext;
window.resolveSpin = resolveSpin; window.draftPick = draftPick; window.draftSkip = draftSkip;
requestAnimationFrame(frame);
</script>
</body>
</html>
