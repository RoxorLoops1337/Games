  function drawBackWall(t) {
    const T = theme();
    const a = w2s(0, 0, MACH.tiers[0].z);
    t = t || 0;
    ctx.save();
    // the CHASING marquee of bulbs — a real arcade top
    // (the gilded JACKPOT gauge takes this spot when its art is in)
    if (!machArt('jackpot')) {
      const nb = 16, chase = Math.floor(t * 9) % nb;
      for (let i = 0; i < nb; i++) {
        const bx = 70 + (LW - 140) * (i / (nb - 1));
        const lit = (i - chase + nb) % nb < 3;
        if (lit) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = T.accent;
          ctx.beginPath(); ctx.arc(bx, 191.5, 5.5, 0, 7); ctx.fill();
          ctx.restore();
        }
        ctx.fillStyle = lit ? '#fff2c8' : '#2a2f38';
        ctx.beginPath(); ctx.arc(bx, 191.5, 2, 0, 7); ctx.fill();
      }
    }
    const slotY = MACH.tiers[0].slotY;
    const ap = w2s(S.aimX, slotY, MACH.tiers[0].z);
    const e = eyd(slotY);
    const u = (PF.w0 + (PF.w1 - PF.w0) * e) / 100;
    const gx = PF.cx + (S.aimX - 50) * u;
    // the aim beam — clipped to the wall so it slips UNDER the cached floor
    ctx.save();
    ctx.beginPath(); ctx.rect(26, 172, LW - 52, Math.max(10, a.y - 172));
    ctx.clip();
    ctx.fillStyle = lgr('beam:' + (ap.y | 0), 0, 200, 0, ap.y,
      [[0, 'rgba(255,222,120,0.5)'], [1, 'rgba(255,222,120,0.03)']]);
    ctx.fillRect(gx - 7, 200, 14, ap.y - 200);
    ctx.restore();
    // the slot itself glows when ready
    if (S.cd <= 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.35 + 0.15 * Math.sin(t * 6);
      ctx.fillStyle = '#ffd75e';
      ctx.beginPath(); ctx.arc(gx, 191, 12, 0, 7); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = S.cd > 0 ? '#6e5320' : '#ffd75e';
    rr(gx - 10, 184, 20, 15, 4); ctx.fill();
    ctx.fillStyle = '#12151a';
    ctx.fillRect(gx - 5, 187, 10, 9);
    ctx.restore();
  }

  // the AIM GHOST: a pulsing dashed ring on the platform where the next
  // coin will land, with a falling chevron above it — the beam says which
  // lane, the ghost says exactly where. Hidden for rigs that don't aim
  // (the crane's claw, the poltergeist's self-raining purse).
  function drawAimGhost(t) {
    if (!S.battle || S.battle.phase !== 'drop' || S.victory || craneRun() || ghostRun()) return;
    const slotY = MACH.tiers[0].slotY;
    const ap = w2s(S.aimX, slotY, 0);
    const pulse = 1 + 0.14 * Math.sin(t * 5);
    const rx = Math.max(9, C.COIN_R * ap.u * 1.5) * pulse;
    ctx.save();
    ctx.globalAlpha = 0.42;
    ctx.strokeStyle = '#ffe9a3';
    ctx.lineWidth = 1.6;
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.ellipse(ap.x, ap.y, rx, rx * 0.46, 0, 0, 7); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.5;
    txt('▼', ap.x, ap.y - 15 - 3 * Math.sin(t * 5), '900 10px Verdana, sans-serif', '#ffe9a3');
    ctx.restore();
  }

  function drawTierFloor(y0, y1, z) {
    const T = theme();
    const p00 = w2s(0, y0, z), p10 = w2s(100, y0, z);
    const p01 = w2s(0, y1, z), p11 = w2s(100, y1, z);
    poly([p00, p10, p11, p01]);
    ctx.fillStyle = lgr('fl:' + fkey() + ':' + (p00.y | 0) + ':' + (p01.y | 0),
      0, p00.y, 0, p01.y, [[0, T.floorA], [1, T.floorB]]);
    ctx.fill();
    ctx.save();
    ctx.clip();
    // the runic stone slab, laid over the theme tint so each floor still
    // carries its own hue
    const slab = machArt('plat');
    if (slab) {
      ctx.globalAlpha = 0.6;
      ctx.drawImage(slab, p01.x - 6, p00.y - 4, (p11.x - p01.x) + 12, (p01.y - p00.y) + 8);
      ctx.globalAlpha = 1;
    }
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#dfe5ee';
    ctx.lineWidth = 1;
    for (const s of SCRATCH) {
      if (s.y1 < y0 || s.y1 > y1) continue;
      const a = w2s(s.x1, s.y1, z), b = w2s(s.x2, s.y2, z);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.restore();
  }

  // full-length guard rails: this machine never eats a piece off the sides
  function drawSideRails() {
    const front = tierFront(0);
    const railSkin = machArt('rail_run');
    for (const side of [0, 1]) {
      const x0 = side ? 100 : 0;
      const r1 = w2s(x0, 2, 2.4), r2 = w2s(x0, front, 2.4), r3 = w2s(x0, front, 0), r4 = w2s(x0, 2, 0);
      poly([r1, r2, r3, r4]);
      if (railSkin) {
        // the runed bronze guard rail, sheared into the rail's run
        const rg2 = ctx.createLinearGradient(0, r1.y, 0, r3.y);
        rg2.addColorStop(0, '#8a7a58'); rg2.addColorStop(1, '#4a4030');
        ctx.fillStyle = rg2; ctx.fill();
        ctx.save();
        poly([r1, r2, r3, r4]); ctx.clip();
        const bx0 = Math.min(r1.x, r2.x, r3.x, r4.x), bx1 = Math.max(r1.x, r2.x, r3.x, r4.x);
        const by0 = Math.min(r1.y, r2.y), by1 = Math.max(r3.y, r4.y);
        ctx.drawImage(railSkin, bx0 - 4, by0 - 1, (bx1 - bx0) + 8, (by1 - by0) + 2);
        ctx.restore();
      } else {
        const rg = ctx.createLinearGradient(0, r1.y, 0, r3.y);
        rg.addColorStop(0, '#b6bdc9'); rg.addColorStop(0.5, '#89909c'); rg.addColorStop(1, '#565d68');
        ctx.fillStyle = rg; ctx.fill();
      }
      // polished top edge + a whisper of gold beneath it
      ctx.strokeStyle = 'rgba(245,250,255,0.7)'; ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.moveTo(r1.x, r1.y); ctx.lineTo(r2.x, r2.y); ctx.stroke();
      ctx.strokeStyle = 'rgba(232,200,119,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(r1.x, r1.y + 2.2); ctx.lineTo(r2.x, r2.y + 2.2); ctx.stroke();
    }
  }

  function drawLip() {
    const front = tierFront(0);
    const a = w2s(0, front - MACH.lipW, 0), b = w2s(100, front - MACH.lipW, 0);
    const c2 = w2s(100, front, MACH.lipH), d = w2s(0, front, MACH.lipH);
    poly([a, b, c2, d]);
    const g = ctx.createLinearGradient(0, a.y, 0, c2.y);
    g.addColorStop(0, 'rgba(255,255,255,0.05)');
    g.addColorStop(1, 'rgba(255,255,255,0.22)');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
  }

  function drawPusherBlock(t) {
    const T = theme();
    const td = MACH.tiers[0];
    const pf = pusherFront(0);
    const zTop = td.z + C.PUSH_H, zBot = td.z;
    const tl = w2s(1, td.back, zTop), tr = w2s(99, td.back, zTop);
    const fl = w2s(1, pf, zTop), frt = w2s(99, pf, zTop);
    const bl = w2s(1, pf, zBot), br = w2s(99, pf, zBot);
    // the pusher top: the carved stone slab when its skin is in, brushed
    // steel otherwise
    poly([tl, tr, frt, fl]);
    const topSkin = machArt('pusher_top');
    const tg = ctx.createLinearGradient(0, tl.y, 0, fl.y);
    tg.addColorStop(0, '#828a98'); tg.addColorStop(0.55, '#a8b0bc'); tg.addColorStop(1, '#c2c9d4');
    ctx.fillStyle = tg; ctx.fill();
    ctx.save();
    ctx.clip();
    if (topSkin) {
      // RIGID skin: sized once for the fully-extended plate and glued to
      // the moving front edge — the back of it slides under the wall slot
      // instead of the texture stretching
      const flMax = w2s(1, C.PUSH_MAX, zTop), frMax = w2s(99, C.PUSH_MAX, zTop);
      const skinH = (flMax.y - tl.y) + 4;
      const skinW = (frMax.x - flMax.x) + 14;
      ctx.drawImage(topSkin, LW / 2 - skinW / 2, fl.y - skinH + 2, skinW, skinH);
    } else {
      ctx.globalAlpha = 0.1;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      for (let i = 0; i < 7; i++) {
        const y = tl.y + (fl.y - tl.y) * (i / 7);
        ctx.beginPath(); ctx.moveTo(tl.x, y); ctx.lineTo(tr.x, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    // the PUSH legend when no sign art is in
    const sign = machArt('push_sign');
    const py2 = (tl.y + fl.y) / 2;
    if (!sign) {
      const pfs = Math.max(10, (fl.y - tl.y) * 0.5);
      txt('▼ PUSH ▼', LW / 2, py2 + 1, '900 ' + pfs + 'px Verdana, sans-serif', 'rgba(255,255,255,0.35)');
      ctx.save();
      ctx.globalAlpha = 0.65 + 0.25 * Math.sin(t * 2.6);
      txt('▼ PUSH ▼', LW / 2, py2, '900 ' + pfs + 'px Verdana, sans-serif', T.accent);
      ctx.restore();
    }
    ctx.restore();
    // the carved wooden sign stands proud on the pusher plate (outside the
    // clip, so it overhangs like a real standee). FIXED size — it rides the
    // plate without breathing as the perspective changes
    if (sign) {
      const sh2 = 34;
      const sw2 = sh2 / imAspect(sign, 96 / 270);
      shadowImg('sign', sign, LW / 2 - sw2 / 2, fl.y - sh2 - 1, sw2, sh2, 5, 2, 'rgba(0,0,0,0.4)');
    }
    // face: the riveted iron strip when skinned, painted bevel + LED chase
    // otherwise
    poly([fl, frt, br, bl]);
    const faceSkin = machArt('pusher_face');
    if (faceSkin) {
      ctx.save();
      ctx.clip();
      ctx.drawImage(faceSkin, fl.x - 6, fl.y - 1, (frt.x - fl.x) + 12, (bl.y - fl.y) + 2);
      ctx.restore();
      ctx.strokeStyle = 'rgba(240,246,255,0.4)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
      return;
    }
    const fg = ctx.createLinearGradient(0, fl.y, 0, bl.y);
    fg.addColorStop(0, '#6d7584'); fg.addColorStop(0.45, '#494f5b'); fg.addColorStop(1, '#2c3038');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
    ctx.strokeStyle = 'rgba(232,200,119,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bl.x, bl.y - 1.5); ctx.lineTo(br.x, br.y - 1.5); ctx.stroke();
    const nLed = 10, lead = Math.floor(t * 8) % nLed;
    for (let i = 0; i < nLed; i++) {
      const u = (i + 0.5) / nLed;
      const x = fl.x + (frt.x - fl.x) * u;
      const y = (fl.y + bl.y) / 2;
      const d = (i - lead + nLed) % nLed;
      const lit = d < 3;
      if (lit) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.4 - d * 0.12;
        ctx.fillStyle = '#ff8a5e';
        ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = lit ? '#ffd0b0' : '#463034';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, 7); ctx.fill();
    }
  }

  // ---------------------------------------------------------- battle: pieces
  const ITEM_GLOW = { weapon: '#ffb46b', poison: '#b8f26b', shield: '#c8d6e8', heal: '#ff8da1', stun: '#8be7ff',
                      burn: '#ff9d3c', bleed: '#ff5a6e', pet: '#ffd75e', buff: '#ffe066' };
  function drawCoin(c, t) {
    let zv = c.z;
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const p2 = (c.y - (front - MACH.lipW)) / MACH.lipW;
      if (p2 > 0) zv += Math.min(p2, 1) * MACH.lipH;
    }
    const p = w2s(c.x, Math.min(c.y, 108), zv);
    const u = p.u;
    const rx = c.r * u;
    let ry = rx * 0.46;
    let tumble = 1;
    if (c.st === 'fall' || c.st === 'air') {
      tumble = Math.max(0.22, Math.abs(Math.cos(c.rot)));
      ry = rx * 0.46 * tumble + rx * 0.10 * (1 - tumble);
    }
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const over = (c.y - (front - c.r)) / c.r;
      if (over > 0) ry *= 1 + Math.min(over, 1) * 0.18;
    }
    ctx.save();
    if (c.st === 'tray') ctx.globalAlpha = Math.max(0, Math.min(1, c.ttl / 0.6));
    if ((c.st === 'plat' || c.st === 'air') && !c.onPush) {
      const td = MACH.tiers[c.tier];
      if (c.z > td.z + 0.5) {
        const sp = w2s(c.x, Math.min(c.y, 108), td.z);
        ctx.beginPath();
        ctx.ellipse(sp.x, sp.y, rx * Math.max(0.4, 1 - (c.z - td.z) * 0.006), ry * Math.max(0.4, 1 - (c.z - td.z) * 0.006), 0, 0, 7);
        ctx.fillStyle = 'rgba(10,10,16,0.28)';
        ctx.fill();
      }
    }
    if (c.kind === 'gem') { drawGem(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'item' || c.kind === 'chest' || c.kind === 'bag' || c.kind === 'skull') {
      drawItem(c, p, rx, t); ctx.restore(); return;
    }
    if (c.kind === 'chip') { drawChip(c, p, rx, ry, t); ctx.restore(); return; }
    const lucky = c.kind === 'lucky';
    const pal = COIN_PALS[c.kind] || COIN_PALS.coin;
    const sym = COIN_SYMS[c.kind] || '⚔';
    const pop = c.popT > 0 ? 1 + 0.22 * (c.popT / 0.18) : 1;
    const drx = rx * pop, dry = ry * pop;
    const comp = coinComposite(c.kind, pal);
    if (comp) {
      // edge + engraved face pre-composed into ONE sprite: a single
      // drawImage per coin instead of a path fill + an image (320-coin
      // turbo piles thank us)
      const sy = dry / 0.46;                                 // squash ratio vs the baked 0.46
      ctx.drawImage(comp, p.x - drx, p.y - dry, drx * 2, (comp.height / (comp.width / 2)) * sy);
    } else {
      const spr = flatSprite(c.kind, pal, sym);
      const hs = dry / (drx * 0.4583);
      const w = drx * (96 / 44), h = (66 / 96) * w * hs;
      ctx.drawImage(spr, p.x - w / 2, p.y - (24 / 66) * h, w, h);
    }
    // the dragon's breath: an alight coin flickers with living flame
    if (c.aflame) {
      ctx.save();
      ctx.globalAlpha = 0.35 + 0.2 * Math.sin(t * 9 + c.glint * 7);
      ctx.beginPath(); ctx.ellipse(p.x, p.y - dry, drx * 0.9, drx * 0.8, 0, 0, 7);
      ctx.fillStyle = '#ff9d3c'; ctx.fill();
      ctx.restore();
      txt('\u{1F525}', p.x, p.y - dry - 5 + Math.sin(t * 7 + c.glint) * 1.5,
          Math.round(10 + drx * 0.4) + 'px serif', '#fff');
    }
    const gph = (t * 0.5 + c.glint) % (Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, drx * 0.9, dry * 0.9, 0, gph, gph + 0.9);
    ctx.strokeStyle = 'rgba(255,252,230,0.85)'; ctx.lineWidth = 1.6;
    ctx.stroke();
    // COLORBLIND MARKS: every kind wears its symbol on a dark badge
    if (S.opts.cb && c.st === 'plat') {
      ctx.beginPath(); ctx.arc(p.x, p.y - dry * 0.2, drx * 0.42, 0, 7);
      ctx.fillStyle = 'rgba(10,6,14,0.75)'; ctx.fill();
      txt(sym, p.x, p.y - dry * 0.2, '900 ' + Math.max(7, Math.round(drx * 0.62)) + 'px serif', '#fff');
    }
    if (lucky && (t * 0.9 + c.glint) % 2.3 < 0.12) {
      ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 1.4;
      const sx2 = p.x + drx * 0.4, sy2 = p.y - dry * 0.4;
      ctx.beginPath();
      ctx.moveTo(sx2 - 5, sy2); ctx.lineTo(sx2 + 5, sy2);
      ctx.moveTo(sx2, sy2 - 5); ctx.lineTo(sx2, sy2 + 5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGem(c, p, rx, t) {
    const gemIm = pieceArt('gem');
    if (gemIm) {
      const gh = rx * 2.1, gw = imW(gemIm, gh);
      ctx.drawImage(gemIm, p.x - gw / 2, p.y - gh * 0.62, gw, gh);
      if ((t + c.glint) % 1.6 < 0.14) {
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.x - rx * 0.3 - 5, p.y - rx * 0.3); ctx.lineTo(p.x - rx * 0.3 + 5, p.y - rx * 0.3);
        ctx.moveTo(p.x - rx * 0.3, p.y - rx * 0.3 - 5); ctx.lineTo(p.x - rx * 0.3, p.y - rx * 0.3 + 5);
        ctx.stroke();
      }
      return;
    }
    ctx.translate(p.x, p.y);
    const s = rx * 1.15;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.62);
    ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.lineTo(0, s * 0.62);
    ctx.lineTo(-s * 0.72, -s * 0.1);
    ctx.closePath();
    const g = ctx.createLinearGradient(-s, -s, s, s);
    g.addColorStop(0, '#d8fbff'); g.addColorStop(0.45, '#4ecbe8'); g.addColorStop(1, '#1b6fa8');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = '#0d3f66'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.72, -s * 0.1); ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.moveTo(0, -s * 0.62); ctx.lineTo(0, s * 0.62);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.stroke();
    if ((t + c.glint) % 1.6 < 0.14) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3 - 5, -s * 0.3); ctx.lineTo(-s * 0.3 + 5, -s * 0.3);
      ctx.moveTo(-s * 0.3, -s * 0.3 - 5); ctx.lineTo(-s * 0.3, -s * 0.3 + 5);
      ctx.stroke();
    }
  }

  // arsenal items / chests / gold bags / cursed skulls: emoji riding the pile
  function drawItem(c, p, rx, t) {
    const it = c.kind === 'item' ? itemById(c.iid) : null;
    const icon = c.kind === 'chest' ? '\u{1F381}' : c.kind === 'bag' ? '\u{1F4B0}'
               : c.kind === 'skull' ? '☠\u{FE0F}' : (it ? it.icon : '❓');
    const bob = c.st === 'plat' ? Math.sin(t * 2 + c.glint) * 1.2 : 0;
    // decompose the fall: sideways component rotates on screen,
    // depth component (toward/away from you) foreshortens flat
    const tip = c.kind === 'item' ? (c.tip || 0) : 0;
    const tipK = Math.abs(Math.sin(tip));
    const side = Math.sin(c.tipA || 0), depth = Math.cos(c.tipA || 0);
    // the shadow spreads as the piece lies down (sideways falls stretch it
    // wide, depth falls stretch it deep)
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + rx * 0.35, rx * (1.05 + tipK * Math.abs(side) * 0.6),
                rx * (0.45 + tipK * Math.abs(depth) * 0.35), 0, 0, 7);
    ctx.fillStyle = 'rgba(20,12,8,0.45)'; ctx.fill();
    ctx.save();
    // pivot at the piece's BASE so toppling reads like a falling domino
    ctx.translate(p.x, p.y + rx * 0.25 + bob * (1 - tipK * 0.7) + tipK * depth * rx * 0.3);
    if (c.st === 'fall' || c.st === 'air') ctx.rotate(Math.sin(c.rot) * 0.3);
    else ctx.rotate(tip * side);
    const im = c.kind === 'item' ? itemArt(c.iid) : pieceArt(c.kind);
    if (im) {
      const hgt = rx * (c.kind === 'item' ? 2.9 : 2.5);
      const wdt = imW(im, hgt);
      // sideways lies foreshorten a touch; forward/backward falls squash
      // the sprite flat against the platform
      const squash = (1 - tipK * Math.abs(side) * 0.18) * (1 - tipK * Math.abs(depth) * 0.55);
      ctx.drawImage(im, -wdt / 2, -hgt * 1.05 * squash, wdt, hgt * squash);
    } else {
      txt(icon, 0, -rx * 0.75, Math.round(rx * (c.kind === 'item' ? 2.6 : 2.2)) + 'px serif', '#fff');
    }
    ctx.restore();
    // glow ring: friendly gold for loot, sickly purple for curses
    const glow = c.kind === 'skull' ? '#c86bff'
               : c.kind === 'chest' ? '#ffb0e0'
               : c.kind === 'bag' ? '#ffd75e'
               : (it ? ITEM_GLOW[it.kind] || '#ffe066' : '#ffe066');
    ctx.globalAlpha = 0.30 + 0.18 * Math.sin(t * 3 + c.glint);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.3, rx * 1.25, rx * 0.55, 0, 0, 7);
    ctx.strokeStyle = glow;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    if (c.temp && c.st === 'plat') {
      txt('FREE', p.x, p.y - rx * 1.6, '800 9px Verdana, sans-serif', '#ffe066');
    }
  }

  function drawChip(c, p, rx, ry, t) {
    const edgeH = Math.max(1.5, C.COIN_H * p.u * 0.5);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + edgeH, rx, ry, 0, 0, 7);
    ctx.fillStyle = '#0c4a5e'; ctx.fill();
    ctx.fillRect(p.x - rx, p.y, rx * 2, edgeH);
    const g = ctx.createRadialGradient(p.x - rx * 0.3, p.y - ry * 0.4, rx * 0.1, p.x, p.y, rx * 1.2);
    g.addColorStop(0, '#e8fdff'); g.addColorStop(0.5, '#57d8f0'); g.addColorStop(1, '#1a7ca0');
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, 7);
    ctx.fillStyle = g; ctx.fill();
    const hue = (t * 140 + c.glint * 60) % 360;
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'hsl(' + hue + ',95%,65%)';
    ctx.stroke();
    if (ry > 3) {
      txt('W', p.x, p.y + 0.5, '900 ' + Math.max(6, ry * 1.1) + 'px Verdana, sans-serif', 'rgba(8,50,66,0.9)');
    }
  }

  // fascia + tray bowl are bolted down — painted once into a cached strip
  function frontStatic() {
    const front = tierFront(0);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    ctx.beginPath();
    ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y);
    ctx.lineTo(r.x + 4, 648); ctx.lineTo(l.x - 4, 648);
    ctx.closePath();
    ctx.fillStyle = lgr('ff:' + fkey() + ':' + (l.y | 0), 0, l.y, 0, 648,
      [[0, '#5c5766'], [0.15, '#3a3542'], [1, '#221d28']]);
    ctx.fill();
    ctx.strokeStyle = 'rgba(235,240,250,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y); ctx.stroke();
    // gold hairline under the chevrons
    ctx.strokeStyle = 'rgba(232,200,119,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(l.x - 1, l.y + 13); ctx.lineTo(r.x + 1, r.y + 13); ctx.stroke();
    // the engraved dragon-vs-knight plate dresses the fascia
    const plate = machArt('fascia');
    if (plate) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(l.x, l.y + 14); ctx.lineTo(r.x, r.y + 14);
      ctx.lineTo(r.x + 4, 646); ctx.lineTo(l.x - 4, 646);
      ctx.closePath(); ctx.clip();
      ctx.globalAlpha = 0.92;
      ctx.drawImage(plate, l.x - 6, l.y + 12, (r.x - l.x) + 12, 646 - (l.y + 12));
      ctx.restore();
    }
    // the tray: velvet-dark bowl with a gold rim and an inner glow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 3;
    rr(58, 648, LW - 116, 52, 14);
    ctx.fillStyle = lgr('tray', 0, 648, 0, 700, [[0, '#0e070f'], [0.7, '#231622'], [1, '#31202c']]);
    ctx.fill();
    ctx.restore();
    const trayArt = machArt('tray');
    if (trayArt) {
      // the stone catch-box from the concept sheet
      ctx.save();
      rr(56, 646, LW - 112, 56, 14); ctx.clip();
      ctx.drawImage(trayArt, 54, 645, LW - 108, 58);
      ctx.restore();
    } else {
      rr(58, 648, LW - 116, 52, 14);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = lgr('trayRim', 0, 648, 0, 700, [[0, '#e8c877'], [0.6, '#9a7440'], [1, '#6a4e28']]);
      ctx.stroke();
      rr(61, 651, LW - 122, 46, 11);
      ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.stroke();
    }
  }
  function drawFrontAndTray() {
    const front = tierFront(0);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    layer('front', 0, l.y - 14, LW, 716 - (l.y - 14),
      ['f' + fkey(), S.machTheme, machArt('fascia') ? 1 : 0, machArt('tray') ? 1 : 0],
      frontStatic);
    // hazard chevrons, slowly marching toward the tray
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(l.x, l.y + 3); ctx.lineTo(r.x, r.y + 3);
    ctx.lineTo(r.x + 1, l.y + 12); ctx.lineTo(l.x - 1, l.y + 12);
    ctx.closePath(); ctx.clip();
    const scroll = (S.time * 8) % 18;
    for (let x = l.x - 36 + scroll; x < r.x + 20; x += 18) {
      ctx.fillStyle = 'rgba(240,190,60,0.55)';
      ctx.beginPath();
      ctx.moveTo(x, l.y + 12); ctx.lineTo(x + 9, l.y + 12);
      ctx.lineTo(x + 18, l.y + 2); ctx.lineTo(x + 9, l.y + 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    // the round's loot rattles around the tray until it resolves
    const items = S.tray.items;
    const trayGlow = S.battle && S.battle.loot.length > 0;
    if (trayGlow) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.10 + 0.06 * Math.sin(S.time * 5);
      rr(58, 648, LW - 116, 52, 14);
      ctx.fillStyle = '#ffae34'; ctx.fill();
      ctx.restore();
    }
    const TRAY_COL = COIN_UI;
    items.forEach((it, i) => {
      const px = LW / 2 + Math.sin(i * 2.399) * (18 + ((i * 7) % 130));
      const py = 686 - (i % 3) * 6;
      const im = it.kind === 'item' ? itemArt(it.iid) : pieceArt(it.kind);
      if (im && it.kind !== 'item' && PIECE_ART[it.kind] && it.kind !== 'gem' && it.kind !== 'bag' && it.kind !== 'skull' && it.kind !== 'chest') {
        // minted coins lie flat in the tray
        ctx.drawImage(im, px - 10, py - 9, 20, 9);
      } else if (im) {
        const hgt = it.kind === 'item' ? 22 : 18, wdt = imW(im, hgt);
        ctx.drawImage(im, px - wdt / 2, py - hgt + 2, wdt, hgt);
      } else if (it.kind === 'item') {
        const def = itemById(it.iid);
        txt(def ? def.icon : '❓', px, py - 8, '20px serif', '#fff');
      } else if (it.kind === 'skull') {
        txt('☠\u{FE0F}', px, py - 8, '16px serif', '#fff');
      } else if (it.kind === 'gem') {
        ctx.beginPath(); ctx.ellipse(px, py - 2, 8, 5, 0, 0, 7);
        ctx.fillStyle = '#4ecbe8'; ctx.fill();
      } else if (it.kind === 'bag') {
        txt('\u{1F4B0}', px, py - 8, '18px serif', '#fff');
      } else {
        ctx.beginPath(); ctx.ellipse(px, py, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = '#8a5f10'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(px, py - 2, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = TRAY_COL[it.kind] || '#f2c04a';
        ctx.fill();
        ctx.strokeStyle = 'rgba(120,80,12,0.7)'; ctx.lineWidth = 0.8; ctx.stroke();
      }
    });
  }

  // ------------------------------------------------------ the CLAW rig
  // a REAL claw game with SHOWMANSHIP: hold #1 slides the claw RIGHT
  // (release locks it), hold #2 slides it UP the board — that release
  // DROPS it. The claw plunges jaws-wide, CHOMPS the chunk in a dust
  // poof, strains as it hoists the actual pieces in its teeth, ferries
  // them swaying home, then springs open and rains the haul into the
  // tray — while the slips clatter back down onto the pile.
  const CLAW_T = { dive: 0.5, grab: 0.34, lift: 0.55, carry: 0.6, open: 0.45 };
  const CLAW = { phase: 'idle', x: 10, y: 74, t: 0, haul: [], slips: 0 };
  window.__dpClaw = function (x, y, caught, slipped) { CLAW.haul = caught || []; CLAW.slips = slipped; };
  function clawReset() { CLAW.phase = 'idle'; CLAW.x = 10; CLAW.y = 74; CLAW.t = 0; CLAW.haul = []; CLAW.slips = 0; }
  function clawTick(dt) {
    if (!craneRun() || S.screen !== 'battle' || !S.battle || S.battle.phase !== 'drop' || S.victory) {
      if (CLAW.phase !== 'idle') clawReset();
      return;
    }
    const canGrab = (S.battle.grabs || 0) > 0;
    if (CLAW.phase === 'idle') {
      if (held && canGrab) { CLAW.phase = 'movex'; }
    } else if (CLAW.phase === 'movex') {
      if (!held) CLAW.phase = 'lockx';
      else { CLAW.x += 44 * dt; if (CLAW.x > 94) CLAW.x = 6; }   // wraps — no dead ends
    } else if (CLAW.phase === 'lockx') {
      if (held) CLAW.phase = 'movey';
    } else if (CLAW.phase === 'movey') {
      if (!held) { CLAW.phase = 'dive'; CLAW.t = 0; }
      else { CLAW.y -= 36 * dt; if (CLAW.y < 6) CLAW.y = 78; }   // wraps too
    } else if (CLAW.phase === 'dive') {
      CLAW.t += dt;
      if (CLAW.t >= CLAW_T.dive) {
        CLAW.phase = 'grab'; CLAW.t = 0;
        craneDrop(CLAW.x, CLAW.y);      // jaws in the pile: the chunk is chosen
        S.shake += 2;
      }
    } else if (CLAW.phase === 'grab') {
      CLAW.t += dt;
      if (CLAW.t >= CLAW_T.grab) { CLAW.phase = 'lift'; CLAW.t = 0; }
    } else if (CLAW.phase === 'lift') {
      CLAW.t += dt;
      if (CLAW.t >= CLAW_T.lift) {
        if (CLAW.haul.length) { CLAW.phase = 'carry'; CLAW.t = 0; }
        else clawReset();               // came up empty — slink home
      }
    } else if (CLAW.phase === 'carry') {
      CLAW.t += dt;
      if (CLAW.t >= CLAW_T.carry) {
        CLAW.phase = 'open'; CLAW.t = 0;
        // the payoff: jaws spring open and the haul rains into the tray
        burstScreen(LW / 2, 655, 'item');
        if (CLAW.haul.some(p => p.kind === 'gem')) SND.gem();
        else SND.collect(3);
        S.shake += 3;
      }
    } else if (CLAW.phase === 'open') {
      CLAW.t += dt;
      if (CLAW.t >= CLAW_T.open) clawReset();
    }
  }
  // a mini piece rendered in the claw's teeth — real faces, not gold blobs
  function drawClawPiece(pc, sx, sy, rx) {
    if (pc.kind === 'gem') {
      const im = pieceArt('gem');
      if (im) { const gh = rx * 2.2, gw = imW(im, gh); ctx.drawImage(im, sx - gw / 2, sy - gh * 0.6, gw, gh); return; }
    }
    if (pc.kind === 'item' || pc.kind === 'chest' || pc.kind === 'bag' || pc.kind === 'skull') {
      const im = pc.kind === 'item' ? itemArt(pc.iid) : pieceArt(pc.kind);
      if (im) { const hh = rx * 2.4, ww = imW(im, hh); ctx.drawImage(im, sx - ww / 2, sy - hh * 0.7, ww, hh); return; }
      const it = pc.iid ? itemById(pc.iid) : null;
      const icon = pc.kind === 'chest' ? '\u{1F9F0}' : pc.kind === 'bag' ? '\u{1F4B0}'
        : pc.kind === 'skull' ? '\u{1F480}' : (it ? it.icon : '\u{2754}');
      txt(icon, sx, sy - rx * 1.1, '900 ' + Math.round(rx * 2.2) + 'px sans-serif', '#fff', 'center');
      return;
    }
    const pal = COIN_PALS[pc.kind] || COIN_PALS.coin;
    const ry = rx * 0.46;
    ctx.beginPath(); ctx.ellipse(sx, sy + rx * 0.17, rx, ry, 0, 0, 7);
    ctx.fillStyle = pal.edge; ctx.fill();
    const face = pieceArt(pc.kind);
    if (face) ctx.drawImage(face, sx - rx, sy - ry, rx * 2, ry * 2);
    else {
      const spr = flatSprite(pc.kind, pal, COIN_SYMS[pc.kind] || '⚔');
      const w = rx * (96 / 44), h = (66 / 96) * w;
      ctx.drawImage(spr, sx - w / 2, sy - (24 / 66) * h, w, h);
    }
  }
  function drawClaw(t) {
    const B = S.battle;
    const railY = 208;
    const e = eyd(MACH.tiers[0].slotY);
    const u = (PF.w0 + (PF.w1 - PF.w0) * e) / 100;
    const ph = CLAW.phase, k = nm => Math.min(1, CLAW.t / CLAW_T[nm]);
    // where the claw HEAD hangs in the world right now, and how wide the
    // jaws gape — every phase has its own body language
    let wx = CLAW.x, wy = CLAW.y, wz = 34;
    let openAmt = 9 + Math.sin(t * 2.6) * 1.2;              // idle jaws breathe, hungry
    if (ph === 'dive') {
      const q = k('dive');
      wz = 34 - 32 * q * q;                                  // gravity plunge

    } else if (ph === 'grab') {

      ctx.arc(0, 0, R, i * seg, (i + 1) * seg);
      ctx.closePath();
      ctx.fillStyle = WHEEL[i].col || WHEEL_COLS[i % 4];
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,8,4,0.6)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save();
      ctx.rotate((i + 0.5) * seg);
      // labels may be two lines (split on \n) — stack them along the spoke
      const lines = String(WHEEL[i].label).split('\n');
      lines.forEach((ln, li) =>
        txt(ln, R * 0.60, (li - (lines.length - 1) / 2) * 12, '900 11px Verdana, sans-serif', '#1d1016'));
      ctx.restore();
    }
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx, cy, R + 5, 0, 7);
    ctx.lineWidth = 8; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, 7);
    ctx.fillStyle = '#ffd75e'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - 14, cy - R - 16); ctx.lineTo(cx + 14, cy - R - 16); ctx.lineTo(cx, cy - R + 8);
    ctx.closePath();
    ctx.fillStyle = '#ff5a4e'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    txt('WHEEL OF FORTUNE', cx, cy - R - 44, '900 24px Georgia, serif', '#ffd75e', 'center', { w: 5, col: '#3a1006' });
    if (a.t > 2.6) {
      const pop = 1 + Math.sin((a.t - 2.6) * 8) * 0.05;
      const rlines = String(a.label).split('\n');
      ctx.save();
      ctx.translate(cx, cy + R + 44);
      ctx.scale(pop, pop);
      rlines.forEach((ln, li) =>
        txt(ln, 0, li * 26 - (rlines.length - 1) * 13, '900 26px Verdana, sans-serif', '#fff6c8', 'center', { w: 6, col: '#3a1006' }));
      ctx.restore();
      txt('tap to continue', cx, cy + R + 76 + (rlines.length - 1) * 14, '600 11px Verdana, sans-serif', '#c8a8b0');
    }
  }

  function drawBattle(t, dt) {

    for (const c of S.coins) {
      (c.st === 'fall' || c.st === 'tray' ? offEdge : onPlat).push(c);
    }
    const byDepth = (a, b) => (a.y + a.lay * 0.5) - (b.y + b.lay * 0.5);
    onPlat.sort(byDepth); offEdge.sort(byDepth);
    for (const c of onPlat) drawCoin(c, t);
    drawFrontAndTray();
    for (const c of offEdge) drawCoin(c, t);
    // the Crane Keeper's rig hangs over the pile during the drop phase
    if (craneRun() && (!S.battle || S.battle.phase === 'drop') && !S.victory) drawClaw(t);
    // the Rat King's scurry: painted rats dash the pile lanes they just shook
    if (S.scurryFx && S.scurryFx.length) {
      const ra2 = itemArt('rat');
      for (let i = S.scurryFx.length - 1; i >= 0; i--) {
        const fx = S.scurryFx[i];
        fx.t += dt;
        if (fx.t > 1.1) { S.scurryFx.splice(i, 1); continue; }
        const k2 = fx.t / 1.1;
        const wx2 = fx.dir > 0 ? 4 + k2 * 92 : 96 - k2 * 92;
        const p2 = w2s(wx2, fx.y, 2);
        const hop = Math.abs(Math.sin(fx.t * 18)) * 4 * p2.u;
        if (ra2) {
          const hh = 13 * p2.u, ww = imW(ra2, hh);
          ctx.save();
          ctx.translate(p2.x, p2.y - hop);
          if (fx.dir < 0) ctx.scale(-1, 1);
          ctx.drawImage(ra2, -ww / 2, -hh, ww, hh);
          ctx.restore();
        } else {
          txt('\u{1F401}', p2.x, p2.y - hop - 4, Math.round(10 * p2.u) + 'px serif', '#fff');
        }
      }
    }
    drawGlass(t);
    drawMotes(dt, 1);
    drawParticles(dt);
    const phase = S.battle ? S.battle.phase : 'drop';
    // resolve/enemy phases: dim the machine and run the cinematics
    if (phase !== 'drop' && !S.victory) {
      ctx.fillStyle = 'rgba(8,4,12,0.38)';
      ctx.fillRect(0, 160, LW, 500);
      drawLootStrip(t);
      const label = phase === 'resolve' ? '✦ RESOLVING THE TRAY ✦' : '⚔ ENEMY TURN ⚔';
      txt(label, LW / 2, 178, '900 15px Georgia, serif',
          phase === 'resolve' ? '#ffd75e' : '#ff8a8a', 'center', { w: 4, col: 'rgba(10,5,12,0.95)' });
    } else if (S.battle && (S.battle.loot.length || S.battle.banked.length)) {
      drawLootStrip(t);
    }
    drawResolveFx(dt);
    drawFloats();
    // END TURN is ALWAYS there during the drop phase — end whenever you like,
    // coins left in the purse or not. It pulses once the purse runs dry.
    if (phase === 'drop' && !S.victory) {
      drawHandRow(t);
      drawTiltCluster(t);
      const empty = S.run.wallet < 1;
      const pulse = empty ? 1 + Math.sin(t * 6) * 0.05 : 1;
      const bw = 170 * pulse;
      const bx2 = LW - 100 - bw / 2;
      const etArt = machArt('end_turn');
      if (etArt) {
        // the dragon-sealed scroll from the concept sheet
        const bh2 = bw * imAspect(etArt, 108 / 364);
        const by2 = 616 - bh2 / 2;
        // pre-glowed sprite at base size; the pulse just scales the blit
        const baseW = 170, baseH = baseW * imAspect(etArt, 108 / 364);
        const sp = shadowSprite(empty ? 'et1' : 'et0', etArt, baseW, baseH,
          empty ? 18 : 9, 0, 'rgba(255,190,80,' + (empty ? 0.6 : 0.3) + ')');
        const sc2 = bw / baseW, pad2 = sp._pad * sc2;
        ctx.drawImage(sp, bx2 - pad2, by2 - pad2, bw + pad2 * 2, bh2 + pad2 * 2);
        uiButtons.push({ x: bx2, y: by2, w: bw, h: bh2, cb: () => endRoundNow() });
      } else {
        uiBtn(bx2, 596, bw, 40, TR('END TURN ▶'), () => endRoundNow(),
              { grad: empty ? ['#ffd75e', '#c98f2a'] : ['#c8a05a', '#8a6a2a'],
                border: '#fff0c0', col: '#3a2406', font: '900 15px Verdana, sans-serif', r: 15 });
      }
      // a shine sweeps across the painted fallback (the scroll art carries
      // its own charm and a sweep would box its transparent corners)
      if (!etArt) {
        ctx.save();
        rr(bx2 + 3, 599, bw - 6, 34, 13); ctx.clip();
        const sx2 = bx2 - 60 + ((t * 110) % (bw + 120));
        const sg = ctx.createLinearGradient(sx2 - 22, 0, sx2 + 22, 0);
        sg.addColorStop(0, 'rgba(255,255,255,0)');
        sg.addColorStop(0.5, 'rgba(255,255,255,' + (empty ? 0.4 : 0.22) + ')');
        sg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(sx2 - 26, 596, 52, 40);
        ctx.restore();
      }
    }
    drawSpeedBtn(t);
    if (phase === 'drop' && !S.victory) drawTurboBtn(t);
    drawCoach(t);
    if (PHOTO) {
      // PHOTO MODE: just the machine, the pile, and the cast — no chrome.
      // One faint corner whisper so the way back is never a mystery.
      drawVignette(0.55);
      uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { PHOTO = false; } });
      ctx.globalAlpha = 0.5;
      txt('\u{1F4F7} tap to return', LW - 14, LH - 16, '600 10px Verdana, sans-serif', '#d8c8dc', 'right');
      ctx.globalAlpha = 1;
      return;
    }
    drawHUD(t);
    drawVignette(0.55);
    // hurt vignette
    if (S.hurtT > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.5, S.hurtT * 1.2);
      const g = ctx.createRadialGradient(LW / 2, LH / 2, 200, LW / 2, LH / 2, 560);
      g.addColorStop(0, 'rgba(200,20,30,0)');
      g.addColorStop(1, 'rgba(200,20,30,0.9)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, LW, LH);
      ctx.restore();
    }
    drawBanner(t);
    drawFoeInfo(t);              // the inspect card rides on top of the intro banner
    drawVictory(t);
    drawInventory(t);            // the BAG rides on top of everything
  }

  // tap a monster mid-fight to read its bestiary card: stats, its mechanic,
  // and the tactic that beats it
  const DEF_TIP = {
    gel: 'chip it with many small coins, or POISON it', armor: 'gold bounces — bring poison, lucky or weapons',
    thick: 'poison does nothing; answer with raw damage', regen: 'out-tick it with poison, or burst it down fast',
    ward: 'punch through with big hits — or kill it first',
    mirror: 'lead with a CHEAP coin to spring the mirror, then unload',
    tar: 'the DoTs slip past the tar — or feed it and claim the refund',
  };
  const TRAIT_ATK = {
    fast: 'strikes TWICE each turn', thief: 'steals coins from next round',
    venom: 'poisons you when it hits', curse: 'rains cursed skulls onto the field',
    enrage: 'FURY: +1 attack every round — kill it fast', leech: 'LEECH: heals for damage dealt — block hard',
    bleeder: 'BLEEDER: its hits leave wounds that halve each round',
    burner: 'BURNER: its hits ignite you — hot, but fades fast',
    gremlin: 'GREMLIN: filches your tray each turn — its stash returns when it dies',
    rustmite: 'RUST MITE: corrodes a pile coin into a worthless slug each turn',
    magnet: 'MAGNET: drags your pile away from the edge each turn',
    bell: 'BELL: every 10th piece you fire shields the whole pack (+5)',
    chrono: 'CHRONOPHAGE: hits of 8+ cost you a TILT charge',
    coward: 'COWARD: swaps with its weakest ally when you target it',
    twin: 'TWIN: raises its fallen partner — kill both in ONE round',
    gardener: 'GARDENER: sows skulls — clear them or they SPROUT',
    magarmor: 'MAGNETIC: hoards block every turn (more each act) — out-pace it',
    coinclone: 'COUNTERFEIT: mints dud slugs into your pile each turn',
    jackthief: 'SIPHON: drains your JACKPOT meter each turn — spend it fast',
  };
  function drawFoeInfo(t) {
    if (S.foeInfo === null || !S.foes || !S.foes[S.foeInfo]) return;
    const e = S.foes[S.foeInfo];
    // dim + a full-screen tap-catcher to dismiss
    ctx.fillStyle = 'rgba(6,3,10,0.72)'; ctx.fillRect(0, 0, LW, LH);
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { S.foeInfo = null; } });
    const cw = LW - 96, cx = LW / 2, cy = 250, ch = 340;
    const fFrame = machArt('frame_tall');
    if (fFrame) {
      shadowImg('foeframe', fFrame, cx - cw / 2 - 8, cy - 8, cw + 16, ch + 16, 18, 6, 'rgba(0,0,0,0.6)');
      // a rank-coloured accent ring inside the stone
      rr(cx - cw / 2 + 10, cy + 10, cw - 20, ch - 20, 12);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = e.boss ? 'rgba(255,215,94,0.5)' : e.elite ? 'rgba(255,157,60,0.5)' : 'rgba(200,107,255,0.4)';
      ctx.stroke();
    } else {
      rr(cx - cw / 2, cy, cw, ch, 18);
      ctx.fillStyle = 'rgba(24,14,26,0.98)'; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = e.boss ? '#ffd75e' : e.elite ? '#ff9d3c' : '#c86bff'; ctx.stroke();
    }
    // portrait
    const key = foeArtKey(e);
    if (!(key && drawArt(key, cx, cy + 96, (sheetOf(key).bh || 72), 'd', t))) {
      txt(e.icon, cx, cy + 60, '48px serif', '#fff');
    }
    txt(e.name, cx, cy + 128, '900 18px Georgia, serif', e.boss ? '#ffd75e' : '#f0e0f0', 'center', { w: 4, col: '#20081a' });
    txt('❤\u{FE0F} ' + Math.max(0, e.hp) + ' / ' + e.maxHp + '     ⚔ ' + e.atk + ' atk',
        cx, cy + 152, '800 12px Verdana, sans-serif', '#e8c8d0');
    let yy = cy + 182;
    // defensive mechanic
    if (e.def) {
      txt(DEF_BADGE[e.def] + '  ' + DEF_TXT[e.def], cx, yy, '800 11px Verdana, sans-serif', '#c3a8e0');
      yy += 18;
      txt('\u{1F449} ' + DEF_TIP[e.def], cx, yy, '700 10px Verdana, sans-serif', '#8ed67e');
      yy += 24;
    } else {
      txt('no special defence — hit it however you like', cx, yy, '700 11px Verdana, sans-serif', '#a89aae');
      yy += 24;
    }
    // attack rider
    if (e.trait && TRAIT_ATK[e.trait]) {
      txt('\u{1F5E1}\u{FE0F} ' + TRAIT_ATK[e.trait], cx, yy, '800 11px Verdana, sans-serif', '#ffb4a8');
      yy += 22;
    }
    // what it's about to do
    const it = e.intent || {};
    const plan = blackedOut() ? 'unknowable — the BLACKOUT swallows its plan'
      : e.stunned > 0 ? 'frozen — it skips its next turn'
      : it.t === 'heavy' ? 'winding up a HEAVY blow (' + (e.atk * 2) + ')'
      : it.t === 'brace' ? 'bracing — it will take half damage'
      : it.t === 'curse' ? 'about to hurl a skull volley'
      : it.t === 'sow' ? 'about to SOW skulls into the pile'
      : it.t === 'hex' ? 'weaving its signature HEX on you'
      : 'a plain strike for ' + e.atk;
    txt('this turn: ' + plan, cx, yy, '700 10px Verdana, sans-serif', '#c8b8a0');
    const pulse = 1 + Math.sin(t * 5) * 0.03;
    uiBtn(cx - 80 * pulse, cy + ch - 44, 160 * pulse, 34, 'GOT IT ▶', () => { S.foeInfo = null; },
      { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 13px Verdana, sans-serif', r: 12 });
  }

  // ------------------------------------------------------ the BAG overlay
  // Everything you carry on one card: the purse (with every relic bend
  // folded into the numbers), the arsenal, the relic shelf, and the
  // run's stats. Opened from the HUD's BAG button or the 'i' key.
  const INV_TABS = [['coins', 'COINS'], ['items', 'ITEMS'], ['relics', 'RELICS'], ['stats', 'STATS']];
  const ACT_NAMES = ['ACT I — THE CATACOMBS', 'ACT II — THE DEEP HALLS', 'ACT III — THE ABYSS', 'ACT IV — THE MINT'];
  function wrapLines(s, maxChars, maxLines) {
    const words = ('' + s).split(' ');
    const lines = [''];
    for (const w of words) {
      if (lines[lines.length - 1] && (lines[lines.length - 1] + ' ' + w).length > maxChars) lines.push(w);
      else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + w).trim();
    }
    return lines.slice(0, maxLines || 3);
  }
  function invCoinIcon(k, cx, cy, r) {
    const face = pieceArt(k);
    if (face) { ctx.drawImage(face, cx - r, cy - r, r * 2, r * 2); return; }
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7);
    ctx.fillStyle = COIN_UI[k]; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(60,40,10,0.7)'; ctx.stroke();
    txt(COIN_SYMS[k], cx, cy + 1, '800 12px serif', 'rgba(40,24,4,0.85)');
  }
  function drawInventory(t) {
    if (!S.inv || !S.run) return;
    const r = S.run;
    ctx.fillStyle = 'rgba(6,3,10,0.8)'; ctx.fillRect(0, 0, LW, LH);
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { S.inv = null; } });
    const px = 20, pw = LW - 40, py = 74, ph = 684;
    rr(px, py, pw, ph, 18);
    ctx.fillStyle = 'rgba(24,14,26,0.985)'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    rr(px + 3.5, py + 3.5, pw - 7, ph - 7, 15);
    ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(232,200,119,0.35)'; ctx.stroke();
    uiButtons.push({ x: px, y: py, w: pw, h: ph, cb: () => {} });   // the card swallows taps
    txt('\u{1F392} INVENTORY', LW / 2, py + 28, '900 21px Georgia, serif', '#ffd75e', 'center', { w: 4, col: '#3a1006' });
    const hero = heroById(r.hero) || HEROES[0];
    txt(hero.icon + ' ' + hero.name + '  •  floor ' + r.floor + '  •  ' +
        ACT_NAMES[Math.min(ACT_NAMES.length - 1, actIdx(r.floor))],
        LW / 2, py + 50, '700 10px Verdana, sans-serif', '#c8a8b0');
    // tab rail
    const tw = (pw - 24) / INV_TABS.length;
    INV_TABS.forEach(([id, label], i) => {
      const on = S.inv.tab === id;
      uiBtn(px + 12 + i * tw, py + 62, tw - 5, 27, label, () => { S.inv.tab = id; S.inv.scroll = 0; },
            { grad: on ? ['#8a6a2a', '#5a4014'] : ['#3a3440', '#262230'],
              border: on ? '#ffd75e' : '#55506a', col: on ? '#ffe9a3' : '#9a90a8',
              font: '900 11px Verdana, sans-serif', r: 9 });
    });
    // ---- the scrolling shelf: everything below the tabs pans with a drag,
    // a flick of the wheel, and clamps to the content's true height
    const vy0 = py + 96, vy1 = py + ph - 58, viewH = vy1 - vy0;
    const y0 = py + 116, x0 = px + 16, xe = px + pw - 22;
    const tab = S.inv.tab;
    let contentH = 0;
    ctx.save();
    ctx.beginPath(); ctx.rect(px + 4, vy0, pw - 8, viewH); ctx.clip();
    const sc = Math.max(0, Math.min(S.inv.scroll || 0, S.inv.maxScroll || 0));
    ctx.translate(0, -sc);
    if (tab === 'coins') {
      const inFight = S.battle && S.battle.hand;
      txt('PURSE — ' + purseTotal() + ' coins' + (inFight ? '  (this round’s hand shown too)' : ''),
          x0, y0 - 10, '800 11px Verdana, sans-serif', '#e8c877', 'left');
      COIN_KINDS.forEach((k, i) => {
        const ry = y0 + 18 + i * 96;
        rr(x0 - 6, ry - 26, pw - 20, 90, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
        invCoinIcon(k, x0 + 19, ry + 2, 19);
        const fx = coinFx(k);
        txt(COIN_INFO[k].name, x0 + 50, ry - 11, '900 15px Verdana, sans-serif', COIN_UI[k], 'left');
        txt('× ' + (r.purse[k] || 0) + (inFight ? '   (' + (S.battle.hand[k] || 0) + ' in hand)' : ''),
            x0 + 50, ry + 8, '800 12px Verdana, sans-serif', '#d8c8dc', 'left');
        txt(fx.main, xe - 4, ry - 11, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
        wrapLines(fx.mods.join('  •  ') || 'no relics bend this coin', 46, 2).forEach((ln, li) => {
          txt(ln, x0 + 50, ry + 28 + li * 14, '600 10px Verdana, sans-serif',
              fx.mods.length ? '#8ed67e' : '#8d7d95', 'left');
        });
      });
      contentH = 30 + COIN_KINDS.length * 96;
    } else if (tab === 'items') {
      txt('ARSENAL — racked onto the pile every battle, each fires once',
          x0, y0 - 10, '800 10px Verdana, sans-serif', '#e8c877', 'left');
      const ids = Object.keys(r.arsenal).filter(iid => r.arsenal[iid] > 0);
      ids.forEach((iid, i) => {
        const it = itemById(iid);
        if (!it) return;
        const ry = y0 + 20 + i * 68;
        rr(x0 - 6, ry - 24, pw - 20, 62, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
        const im = itemArt(iid);
        if (im) { const hh = 44, ww = imW(im, hh); ctx.drawImage(im, x0 + 19 - ww / 2, ry - 19, ww, hh); }
        else txt(it.icon, x0 + 19, ry + 4, '26px serif', '#fff');
        const fx = itemFx(iid);
        txt(it.name + '  × ' + r.arsenal[iid], x0 + 50, ry - 6, '900 14px Verdana, sans-serif', '#f0e0f0', 'left');
        txt(fx.main, xe - 4, ry - 6, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
        txt(wrapLines(fx.mods.join('  •  ') || '—', 52, 1)[0], x0 + 50, ry + 15,
            '600 10px Verdana, sans-serif', fx.mods.length ? '#8ed67e' : '#8d7d95', 'left');
      });
      const ny = y0 + 20 + ids.length * 68;
      // potions ride along
      rr(x0 - 6, ny - 24, pw - 20, 62, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
      txt('\u{1F9F4}', x0 + 19, ny + 4, '26px serif', '#fff');
      txt('Potion  × ' + r.potions, x0 + 50, ny - 6, '900 14px Verdana, sans-serif', '#ffd9ee', 'left');
      txt('heal ' + C.POTION_HEAL + ' HP', xe - 4, ny - 6, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
      txt('drink any time from the HUD', x0 + 50, ny + 15, '600 10px Verdana, sans-serif', '#a08a94', 'left');
      if (!ids.length) txt('the rack is empty — visit a shop!', LW / 2, y0 + 40, '700 12px Verdana, sans-serif', '#a08a94');
      contentH = 36 + (ids.length + 1) * 68;
    } else if (tab === 'relics') {
      txt('RELICS — ' + r.relics.length + ' collected', x0, y0 - 10, '800 11px Verdana, sans-serif', '#e8c877', 'left');
      r.relics.forEach((rid, i) => {
        const rl = relicById(rid);
        if (!rl) return;
        const ry = y0 + 22 + i * 58;
        rr(x0 - 6, ry - 22, pw - 20, 52, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fill();
        const ra = relicArt(rid);
        if (ra) { const hh = 42, ww = imW(ra, hh); ctx.drawImage(ra, x0 + 14 - ww / 2, ry - 18, ww, hh); }
        else txt(rl.icon, x0 + 14, ry + 2, '22px serif', '#fff');
        txt(rl.name, x0 + 40, ry - 8, '900 14px Verdana, sans-serif', RARITY[rl.rar].col, 'left');
        wrapLines(rl.desc, 50, 2).forEach((ln, li) => {
          txt(ln, x0 + 40, ry + 10 + li * 13, '600 11px Verdana, sans-serif', '#c8b8d0', 'left');
        });
      });
      if (!r.relics.length) txt('no relics yet — spin the wheel or fell a boss', LW / 2, y0 + 40, '700 12px Verdana, sans-serif', '#a08a94');
      contentH = 40 + r.relics.length * 58;
    } else {
      // STATS: the run's vitals, then every run-wide relic bend
      const core = [
        ['HP', r.hp + ' / ' + r.maxHp + (S.pPois > 0 ? '   ☠ poisoned ' + S.pPois : '')],
        ['strength', '\u{1F4AA} ' + strTotal() + (strTotal() > 0 ? '  (+' + strTotal() + ' dmg per hit)' : '')],
        ['dexterity', '\u{1F933} ' + dexTotal() + (dexTotal() > 0 ? '  (+' + dexTotal() + ' block per silver)' : '')],
        ['block', '' + r.block + (hasRelic('aegis') ? ' (carries over)' : '')],
        ['gold', fmt(r.gold)],
        ['keys', '' + r.keys],
        ['purse', purseTotal() + ' coins'],
        ['monsters slain', '' + r.kills],
        ['gold looted', fmt(r.goldEarned)],
      ];
      const rows = core.concat(runMods());
      rows.forEach((rw, i) => {
        const ry = y0 + 6 + i * 31;
        txt(rw[0], LW / 2 - 16, ry, '600 12px Verdana, sans-serif', '#9a8aa0', 'right');
        txt(rw[1], LW / 2 + 2, ry, '800 12px Verdana, sans-serif', '#ffe9a3', 'left');
      });
      contentH = 30 + rows.length * 31;
    }
    ctx.restore();
    // clamp the pan now that the tab's true height is known
    S.inv.maxScroll = Math.max(0, contentH + (y0 - vy0) - viewH);
    if ((S.inv.scroll || 0) > S.inv.maxScroll) S.inv.scroll = S.inv.maxScroll;
    if ((S.inv.scroll || 0) < 0) S.inv.scroll = 0;
    // a slim scrollbar tells the thumb there's more shelf below
    if (S.inv.maxScroll > 0) {
      const track = viewH - 8;
      const thumbH = Math.max(26, track * viewH / (viewH + S.inv.maxScroll));
      const ty = vy0 + 4 + (track - thumbH) * ((S.inv.scroll || 0) / S.inv.maxScroll);
      rr(px + pw - 10, vy0 + 4, 4, track, 2);
      ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fill();
      rr(px + pw - 10, ty, 4, thumbH, 2);
      ctx.fillStyle = 'rgba(232,200,119,0.5)'; ctx.fill();
    }
    uiBtn(LW / 2 - 80, py + ph - 46, 160, 34, TR('CLOSE ✕'), () => { S.inv = null; },
          { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 13px Verdana, sans-serif', r: 12 });
  }

  // your HAND for the round: one chip per coin type still in it — tap to
  // choose what the slot takes next
  function drawHandRow(t) {

  function drawResolveFx(dt) {

    for (let i = RINGS.length - 1; i >= 0; i--) {
      const r = RINGS[i];
      r.t += dt;
      const k = r.t / 0.38;
      if (k >= 1) { RINGS.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = (1 - k) * 0.8;
      ctx.lineWidth = 3.5 * (1 - k) + 1;
      ctx.strokeStyle = r.col;
      ctx.beginPath(); ctx.arc(r.x, r.y, 8 + k * 36, 0, 7); ctx.stroke();
      ctx.restore();

    for (let i = RFX.length - 1; i >= 0; i--) {

      f.t += dt;
      const k = Math.min(1, f.t / f.dur);
      if (k >= 1) {

  let kbFocus = -1;                  // index into uiButtons, -1 = free aim

  function kbTargets() {

  // gamepad, polled each frame: stick/dpad move & aim, A fires/presses,

  const PAD = { prev: {} };
  function padTick() {
    const pads = (typeof navigator !== 'undefined' && navigator.getGamepads) ? navigator.getGamepads() : null;
    let p = null;
    if (pads) for (let i = 0; i < pads.length && !p; i++) { if (pads[i] && pads[i].connected) p = pads[i]; }

    if (!p) return;

    const ax = (p.axes && p.axes[0]) || 0, ay = (p.axes && p.axes[1]) || 0;
    KEYS.gpl = ax < -0.4 || bt(14); KEYS.gpr = ax > 0.4 || bt(15);
    KEYS.gpu = ay < -0.4 || bt(12); KEYS.gpd = ay > 0.4 || bt(13);

      if (on && !PAD.prev[name]) down();

  // ---- the PWA rig: offline worker + the pocket-install prompt ----

  // ---- the TOWN CRIER: a hidden aria-live region narrates the game ----

  const SRW = { screen: '', floor: 0, banner: '', toast: '', victory: false, low: false };

  const entCool = {};
  function avSpawn() {
    AV.stamp = S.roomStamp;

      const p = doorCenter(OPP[S.enterDir]);
      const inX = p.x === FR.x0 ? 34 : p.x === FR.x1 ? -34 : 0;
      const inY = p.y === FR.y0 ? 34 : p.y === FR.y1 ? -34 : 0;
      AV.x = p.x + inX;
      AV.y = p.y + inY;

      AV.x = (FR.x0 + FR.x1) / 2;

  }
  function avTick(dt) {
    if (S.roomStamp !== AV.stamp) avSpawn();
    // stick + keys
    let vx = 0, vy = 0;
    if (JOY.active) {
      const d = Math.hypot(JOY.dx, JOY.dy);
      if (d > 6) {
        const k = Math.min(1, d / 48);
        vx = (JOY.dx / d) * k; vy = (JOY.dy / d) * k;
      }
    }
    if (KEYS.arrowleft || KEYS.a || KEYS.gpl) vx -= 1;
    if (KEYS.arrowright || KEYS.d || KEYS.gpr) vx += 1;
    if (KEYS.arrowup || KEYS.w || KEYS.gpu) vy -= 1;
    if (KEYS.arrowdown || KEYS.s || KEYS.gpd) vy += 1;
    const mag = Math.hypot(vx, vy);
    AV.moving = mag > 0.05;
    if (!AV.moving) return;
    if (mag > 1) { vx /= mag; vy /= mag; }

    AV.dir = Math.abs(vx) > Math.abs(vy) ? (vx > 0 ? 'r' : 'l') : (vy > 0 ? 'd' : 'u');

    AV.animT += dt;

    AV.stepAcc = (AV.stepAcc || 0) + dt;
    if (AV.stepAcc >= 0.26) { AV.stepAcc = 0; SND.step(); }

    let nx = AV.x + vx * SPD * dt;
    let ny = AV.y + vy * SPD * dt;

    const cx = (FR.x0 + FR.x1) / 2, cy = (FR.y0 + FR.y1) / 2;

    const inGapY = Math.abs(ny - cy) < DOOR_HALF - 8;

      // the LAST key deserves a second thought before it turns
      const nb2 = doorTo(dir);
      if (nb2 && S.run.keys === 1 && !S.confirm) {
        const l2 = S.run.map.links[lkey(curRoom().gx, curRoom().gy, nb2.gx, nb2.gy)];
        if (l2 && !l2.open && !l2.gold) {
          S.confirm = { msg: 'Spend your LAST key?', yesLabel: 'UNLOCK',
                        sub: 'this door stays open forever — but the other locks will wait',
                        yes: () => { tryDoor(dir); } };
          nx = Math.max(FR.x0 + HERO_R, Math.min(FR.x1 - HERO_R, nx));

    }
    if (ny > FR.y1 - HERO_R) {

  function drawRoomBox(t) {

  // the SIGN over a door: what waits in the room beyond — boss and vault

  function doorSign(dir) {

  function drawEnt(i, e, t) {
    const p = entPos(e);
    const info = ENT_INFO[e.kind];
    let icon = info.icon, label = info.name, col = '#e8dce8';
    if (e.kind === 'monster') {
      const en = enemyById(e.eid);
      icon = e.mtype === 'boss' ? bossFor(S.run.floor).icon : (en ? en.icon : info.icon);
      label = e.mtype === 'boss' ? 'THE BOSS' : e.mtype === 'elite' ? 'ELITE FOE' : (en ? en.name : 'MONSTER');
      col = e.mtype === 'boss' ? '#ffd75e' : e.mtype === 'elite' ? '#ff9d3c' : '#ffb4a8';
    } else if (e.kind === 'event') {
      const ev = eventById(e.ev);
      if (ev) { icon = ev.icon; label = ev.name; col = '#c8a8ff'; }

    ctx.save();
    if (e.done) {
      // spent dwellers fade out — and the served keeper walks off entirely
      ctx.globalAlpha = 0.28;
      const gone = e.kind === 'monster' || e.kind === 'shop';
      txt(gone ? '\u{1F4A8}' : icon, p.x, p.y - 12, '30px serif', '#fff');
      txt(e.kind === 'monster' ? 'slain' : e.kind === 'shop' ? 'moved on' : 'done',

      ctx.fillStyle = e.mtype === 'elite' ? '#ff9d3c' : '#ef4b5d'; ctx.fill();

    if (e.kind === 'stairs') {
      ctx.globalAlpha = 0.25 + 0.12 * Math.sin(t * 3);
      ctx.beginPath(); ctx.arc(p.x, p.y - 14 + bob, 34, 0, 7);
      ctx.fillStyle = '#ffd75e'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    // real sprites where we have them, emoji everywhere else
    let drewArt = false;
    if (e.kind === 'monster') {
      const key = foeArtKey(e);
      if (key) {
        const sh = sheetOf(key);
        drewArt = drawArt(key, p.x, p.y + 4 + bob * 0.4, sh.rh, 'd', t);
        if (drewArt && e.mtype === 'elite') {
          // elites run hot: a faint red heat over the sprite
          ctx.save();
          ctx.globalAlpha = 0.22 + 0.1 * Math.sin(t * 5);
          ctx.beginPath(); ctx.arc(p.x, p.y - sh.rh * 0.4, sh.rh * 0.42, 0, 7);
          ctx.fillStyle = '#ff9d3c'; ctx.fill();
          ctx.restore();
        }
      }
    } else if (e.kind === 'shop') {
      drewArt = drawArt('keeper', p.x, p.y + 4 + bob * 0.4, SHEETS.keeper.rh, 'd', t);
    }
    if (!drewArt) txt(icon, p.x, p.y - 14 + bob, size + 'px serif', '#fff');
    if (e.mtype === 'elite') txt('\u{1F525}', p.x + 20, p.y - 30 + bob, '14px serif', '#fff');
    txt(label, p.x, p.y + 18, '800 10px Verdana, sans-serif', col, 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });

    const dh = Math.hypot(AV.x - p.x, AV.y - (p.y - 6));
    if (dh < 74 && dh > 34) {
      txt('!', p.x + 18, p.y - 38 + bob, '900 14px Georgia, serif', '#ffe066', 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
    }
    ctx.restore();
  }

  function drawHero(t) {
    const hop = AV.moving ? Math.abs(Math.sin(AV.step)) * 4 : Math.sin(t * 2) * 1.5;
    ctx.beginPath(); ctx.ellipse(AV.x, AV.y + 6, 15, 6, 0, 0, 7);
    ctx.fillStyle = 'rgba(10,6,12,0.5)'; ctx.fill();
    // walk dust
    if (AV.moving && Math.random() < 0.25 && S.parts.length < 120) {
      S.parts.push({ x: AV.x - AV.fx * 10, y: AV.y + 4, vx: -AV.fx * 24 + (Math.random() - 0.5) * 12,
                     vy: -6, g: -20, life: 0, max: 0.4, col: '#9a8aa0', sz: 1.8, spin: 1, shape: 'sq' });
    }
    // the chosen adventurer, striding in their true colours
    const hero = S.run.hero || 'knight';
    const key = hero + (AV.moving ? '_walk' : '_idle');
    const sh = SHEETS[key];
    const drewArt = sh && drawArt(key, AV.x, AV.y + 6, sh.rh, AV.dir || 'd', AV.moving ? AV.animT : t);
    if (!drewArt) {
      ctx.save();
      ctx.translate(AV.x, AV.y - 14 - hop);
      if (AV.moving) ctx.rotate(AV.fx * 0.08);
      txt((heroById(hero) || HEROES[0]).icon, 0, 0, '34px serif', '#fff');
      ctx.restore();
    }
    if (S.run.keys > 0) txt('\u{1F5DD}', AV.x + 16, AV.y - 32 - hop, '11px serif', '#fff');
  }

  function drawJoystick() {
    if (!JOY.active) return;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(JOY.ox, JOY.oy, 48, 0, 7);
    ctx.lineWidth = 3; ctx.strokeStyle = '#e8dce8'; ctx.stroke();
    const d = Math.hypot(JOY.dx, JOY.dy) || 1;
    const k = Math.min(48, d);
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(JOY.ox + (JOY.dx / d) * k, JOY.oy + (JOY.dy / d) * k, 20, 0, 7);
    ctx.fillStyle = '#e8dce8'; ctx.fill();
    ctx.restore();
  }

  // what the hero knows of the floor: 2 = walked, 1 = glimpsed through a door
  function mapKnowledge() {
    const rooms = S.run.map.rooms;
    // a bought Torn Map bares its OWN floor only
    const lantern = S.run.mapFloor === S.run.floor;
    const seen = {};
    for (const k of Object.keys(rooms)) {
      const r = rooms[k];
      if (lantern || r.visited) { seen[k] = 2; continue; }
      for (const d of ['n', 's', 'e', 'w']) {
        const nb = doorTo(d, r);
        if (nb && nb.visited) { seen[k] = 1; break; }
      }
    }
    return seen;
  }
  // room footprint in map units (matches the real room proportions)
  const MAP_FOOT = { s: [0.62, 0.62], w: [1, 0.62], t: [0.62, 1], b: [1, 1] };
  function drawMapRooms(mx, my, pitch, seen, ink) {
    // ink = parchment blueprint style; otherwise the compact HUD chip
    const map = S.run.map;
    const rooms = map.rooms;
    const cell = pitch * 0.82;
    const roomRect = (r) => {
      const f = MAP_FOOT[r.size] || MAP_FOOT.b;
      const w = cell * f[0], h = cell * f[1];
      const cx2 = mx + (r.gx + 0.5) * pitch, cy2 = my + (r.gy + 0.5) * pitch;
      return { x: cx2 - w / 2, y: cy2 - h / 2, w, h, cx: cx2, cy: cy2 };
    };
    // corridors first, so rooms sit on top of them
    for (const lk of Object.keys(map.links)) {
      const [a, b] = lk.split('~').map(s2 => rooms[s2]);
      if (!a || !b) continue;
      if (!seen[rkey(a.gx, a.gy)] && !seen[rkey(b.gx, b.gy)]) continue;
      const ra = roomRect(a), rb = roomRect(b);
      const open = map.links[lk].open;
      ctx.save();
      ctx.lineWidth = Math.max(3, pitch * 0.16);
      ctx.strokeStyle = ink
        ? (open ? 'rgba(74,58,42,0.9)' : 'rgba(74,58,42,0.45)')
        : (open ? 'rgba(255,215,94,0.6)' : 'rgba(180,160,190,0.3)');
      if (!open) ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(ra.cx, ra.cy); ctx.lineTo(rb.cx, rb.cy); ctx.stroke();
      ctx.restore();
      if (!open && seen[rkey(a.gx, a.gy)] === 2 && seen[rkey(b.gx, b.gy)] === 2 && pitch > 30) {
        txt('\u{1F512}', (ra.cx + rb.cx) / 2, (ra.cy + rb.cy) / 2, '10px serif', '#fff');
      }
    }
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      const rc = roomRect(r);
      const isCur = k === map.cur;
      if (seen[k] === 2) {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        if (ink) {
          ctx.fillStyle = isCur ? '#d8c49a' : '#cfc4b2';
          ctx.fill();
          ctx.lineWidth = 2.5; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
        } else {
          ctx.fillStyle = isCur ? theme().accent : r.boss ? 'rgba(255,215,94,0.75)' : 'rgba(180,160,190,0.55)';
          ctx.fill();
        }
      } else {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        ctx.save();
        ctx.setLineDash([3, 3]);
        ctx.lineWidth = ink ? 2 : 1.2;
        ctx.strokeStyle = ink ? 'rgba(74,58,42,0.55)' : 'rgba(180,160,190,0.4)';
        ctx.stroke();
        ctx.restore();
      }
      if (r.boss && seen[k] === 2) txt('\u{1F451}', rc.cx, rc.cy, Math.max(8, pitch * 0.3) + 'px serif', '#fff');
      if (!r.boss && k === '0,0' && ink) txt('1', rc.cx, rc.cy, '700 ' + Math.max(9, pitch * 0.3) + 'px Georgia, serif', '#4a3a2a');
      if (isCur) {
        const pulse = 0.5 + 0.5 * Math.sin(S.time * 5 + performance.now() / 200);
        ctx.beginPath(); ctx.arc(rc.cx, rc.cy, Math.max(3, pitch * 0.1), 0, 7);
        ctx.fillStyle = ink ? 'rgba(168,33,58,' + (0.6 + 0.4 * pulse) + ')' : 'rgba(255,255,255,' + (0.6 + 0.4 * pulse) + ')';
        ctx.fill();
      }
    }
  }
  function mapBounds(seen) {
    const rooms = S.run.map.rooms;
    let minX = 99, maxX = -99, minY = 99, maxY = -99;
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      minX = Math.min(minX, r.gx); maxX = Math.max(maxX, r.gx);
      minY = Math.min(minY, r.gy); maxY = Math.max(maxY, r.gy);
    }
    return { minX, maxX, minY, maxY };
  }
  // the corner minimap — tap it to unroll the full blueprint
  let mapView = false;
  function drawMinimap(t) {
    if (!S.run.map) return;
    const seen = mapKnowledge();
    const ks = Object.keys(seen);
    if (!ks.length) return;
    const b = mapBounds(seen);
    const pitch = 16;
    const mw = (b.maxX - b.minX + 1) * pitch + 12;
    const mh = (b.maxY - b.minY + 1) * pitch + 12;
    const mx = LW - 14 - mw, my = 56;
    rr(mx, my, mw, mh, 8);
    ctx.fillStyle = 'rgba(10,6,12,0.82)'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(232,220,232,0.35)'; ctx.stroke();
    drawMapRooms(mx + 6 - b.minX * pitch, my + 6 - b.minY * pitch, pitch, seen, false);
    txt(TR('tap for map'), mx + mw / 2, my + mh + 8, '600 9px Verdana, sans-serif', '#a08a94');
    if (!S.room) uiButtons.push({ x: mx - 6, y: my - 6, w: mw + 12, h: mh + 24, cb: () => { mapView = true; } });
  }
  // the full blueprint, unrolled like a tabletop dungeon chart
  function drawMapView(t) {
    if (!mapView || !S.run.map) return;
    ctx.fillStyle = 'rgba(8,4,10,0.7)';
    ctx.fillRect(0, 0, LW, LH);
    // the parchment
    rr(20, 90, LW - 40, 620, 6);
    ctx.fillStyle = '#e9dfc6'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
    ctx.save();
    rr(20, 90, LW - 40, 620, 6);
    ctx.clip();
    // faint graph grid, like the reference charts
    ctx.strokeStyle = 'rgba(120,100,70,0.16)';
    ctx.lineWidth = 1;
    for (let x = 28; x < LW - 20; x += 22) {
      ctx.beginPath(); ctx.moveTo(x, 90); ctx.lineTo(x, 710); ctx.stroke();
    }
    for (let y = 98; y < 710; y += 22) {
      ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(LW - 20, y); ctx.stroke();
    }
    // burnt edges
    const eg = ctx.createRadialGradient(LW / 2, 400, 200, LW / 2, 400, 430);
    eg.addColorStop(0, 'rgba(90,60,30,0)');
    eg.addColorStop(1, 'rgba(90,60,30,0.28)');
    ctx.fillStyle = eg;
    ctx.fillRect(20, 90, LW - 40, 620);
    const seen = mapKnowledge();
    const b = mapBounds(seen);
    const cols = b.maxX - b.minX + 1, rows2 = b.maxY - b.minY + 1;
    const pitch = Math.min(64, Math.min((LW - 100) / cols, 520 / rows2));
    const ox = (LW - cols * pitch) / 2 - b.minX * pitch;
    const oy = 90 + (620 - rows2 * pitch) / 2 - b.minY * pitch;
    drawMapRooms(ox, oy, pitch, seen, true);
    ctx.restore();
    txt(theme().name + ' — FLOOR ' + S.run.floor, LW / 2, 118, '900 20px Georgia, serif', '#4a3a2a');
    const seenN = Object.values(seen).filter(v => v === 2).length;
    txt(seenN + ' / ' + Object.keys(S.run.map.rooms).length + ' rooms walked • \u{1F512} locked corridors • tap to close',
        LW / 2, 688, '700 10px Verdana, sans-serif', '#6a5138');
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { mapView = false; } });
  }

  function drawToast() {
    if (!S.toast) return;
    const a = Math.min(1, S.toast.t / 0.5);

    ctx.globalAlpha = a;
    ctx.font = '800 13px Verdana, sans-serif';

  function drawDungeon(t, dt) {
    const T = theme();
    layer('dbg', 0, 0, LW, LH, ['f' + fkey()], () => bgBase(0));
    bgBokeh(t);
    updateRoomRect();
    if (!S.room && !mapView) avTick(dt);
    if (S.screen !== 'dungeon') return;   // a bump may have started a battle
    // heading
    ctx.font = '900 26px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 7; ctx.strokeStyle = '#2a1030';
    ctx.strokeText(T.name, LW / 2 - 30, 44);
    ctx.fillStyle = lgr('dtt:' + fkey(), 0, 30, 0, 60, [[0, '#fff4d6'], [1, T.accent]]);
    ctx.fillText(T.name, LW / 2 - 30, 44);
    txt('FLOOR ' + S.run.floor, LW / 2 - 30, 74, '800 12px Verdana, sans-serif', '#c8a8b0');
    if (darkFloor()) {
      txt('\u{1F56F}\u{FE0F} THE TORCHES ARE DEAD — follow your light', LW / 2 - 30, 89,
          '700 10px Verdana, sans-serif', '#ff9d3c');
    }
    txt('\u{1F5DD} × ' + S.run.keys, LW / 2 - 30, 104, '900 16px Verdana, sans-serif',
        S.run.keys < 1 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    drawRoomBox(t);
    // dwellers + hero, back-to-front
    const ents = (curRoom() && curRoom().ents) || [];
    const order = ents.map((e, i) => ({ e, i, y: entPos(e).y }));
    order.push({ hero: true, y: AV.y });
    order.sort((a, b) => a.y - b.y);
    for (const o of order) {
      if (o.hero) drawHero(t);
      else drawEnt(o.i, o.e, t);
    }
    // a DARK floor: the room drowns in black except your torch's circle
    if (darkFloor() && !S.room) {
      const flick = 118 + Math.sin(t * 7) * 4 + Math.sin(t * 13.7) * 2;
      const dg = ctx.createRadialGradient(AV.x, AV.y - 14, flick * 0.35, AV.x, AV.y - 14, flick);
      dg.addColorStop(0, 'rgba(8,5,2,0)');
      dg.addColorStop(0.72, 'rgba(8,5,2,0.55)');
      dg.addColorStop(1, 'rgba(8,5,2,0.96)');
      ctx.save();
      ctx.beginPath();
      ctx.rect(ROOM.x - 22, ROOM.y - 6, ROOM.w + 44, ROOM.h + ROOM.wallH + 30);
      ctx.clip();
      ctx.fillStyle = dg;
      ctx.fillRect(ROOM.x - 22, ROOM.y - 6, ROOM.w + 44, ROOM.h + ROOM.wallH + 30);
      // the torch itself gutters in your fist
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.10 + 0.05 * Math.sin(t * 9);
      ctx.fillStyle = '#ff9d3c';
      ctx.beginPath(); ctx.arc(AV.x, AV.y - 14, 40, 0, 7); ctx.fill();
      ctx.restore();
    }
    drawMotes(dt, 1);
    drawParticles(dt);
    drawToast();
    drawJoystick();
    drawHUD(t);
    drawVignette(0.35);
    drawMinimap(t);
    drawBanner(t);
    if (S.uiFlash && !S.room) {
      txt(S.uiFlash.msg, LW / 2, ROOM.y + ROOM.wallH + 60, '900 15px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    }
    uiBtn(14, 12, 38, 36, '⌂', () => { S.screen = 'title'; save(); }, { r: 10, font: '20px serif' });
    uiBtn(LW - 52, 12, 38, 36, '⚙', () => { SETTINGS = true; }, { r: 10, font: '17px serif' });
    // deep in the ENDLESS, the standing decrees are posted at the gate
    if (mutCount() > 0) {
      txt('\u{1F30C} ENDLESS +' + mutCount() + ': ' + MUTS.slice(0, mutCount()).map(m => m.name).join(' • '),
          LW / 2, 134, '700 9px Verdana, sans-serif', '#c8a8ff', 'center', { w: 3, col: 'rgba(10,5,12,0.85)' });
    }
    // the floor's optional JOB, posted under the floor title
    const q = S.run.quest;
    if (q) {
      const rIcon = q.reward === 'goldkey' ? '\u{1F511}' : '\u{1F4FF}';
      txt(q.done ? '✓ quest done — ' + rIcon + ' claimed'
                 : '\u{1F4DC} ' + questTxt(q) + '  (' + Math.min(q.got, q.need) + '/' + q.need + ')  →  ' + rIcon,
          LW / 2, 120, '700 10px Verdana, sans-serif', q.done ? '#7ee787' : '#e8c877',
          'center', { w: 3, col: 'rgba(10,5,12,0.85)' });
    }
    txt('drag to walk • WASD works too', LW / 2, 704, '600 10px Verdana, sans-serif', '#8d7d95');
    drawRoomModal(t);
    drawMapView(t);
    drawInventory(t);
  }
  // ------------------------------------------------------------ room modal

  // ---- the JUICE overlays: jackpot fireworks, kill shatter, floor wipe ----
  function drawJuice(dt) {
    // JACKPOT: a golden flood + coin fountains over the pusher
    if (S.jackFx && S.screen === 'battle') {
      const f = S.jackFx;
      if (!f.lit) {
        f.lit = 1;
        for (let i = 0; i < 4; i++) burstScreen(90 + i * 100, 230 + (i % 2) * 30, 'gem');
        burstScreen(LW / 2, 640, 'item');
      }
      f.t += dt;
      const a = Math.max(0, 0.38 * (1 - f.t / 1.5));
      if (a > 0.01) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = a;
        const g = ctx.createRadialGradient(LW / 2, 400, 80, LW / 2, 400, 520);
        g.addColorStop(0, 'rgba(255,215,94,0.9)');
        g.addColorStop(1, 'rgba(255,140,40,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, LW, LH);
        ctx.restore();
      }
      if (f.t > 1.5) S.jackFx = null;
    } else if (S.jackFx && S.screen !== 'battle') S.jackFx = null;
    // KILL: a shatter ring where the foe stood
    if (S.killFx && S.screen === 'battle') {
      const f = S.killFx;
      if (!f.lit) { f.lit = 1; burstScreen(LW - 156, 70, f.boss ? 'gem' : 'item'); }
      f.t += dt;
      const k = f.t / 0.5;
      if (k < 1) {
        ctx.save();
        ctx.globalAlpha = 0.7 * (1 - k);
        ctx.lineWidth = 3 - 2 * k;
        ctx.strokeStyle = f.boss ? '#ffd75e' : '#ffe9a3';
        ctx.setLineDash([8, 6]);
        ctx.beginPath(); ctx.arc(LW - 156, 70, 18 + 70 * k, 0, 7); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      } else S.killFx = null;
    } else if (S.killFx && S.screen !== 'battle') S.killFx = null;
    // DESCENT: the dark opens onto the new floor's nameplate
    if (S.floorFx && S.screen === 'dungeon' && S.run) {
      const f = S.floorFx;
      f.t += dt;
      const hold = 0.22, fade = 0.75;
      const a = f.t < hold ? 1 : Math.max(0, 1 - (f.t - hold) / fade);
      if (a > 0.005) {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = '#0a060c';
        ctx.fillRect(0, 0, LW, LH);
        ctx.globalAlpha = Math.min(1, a * 1.4);
        txt(TR('FLOOR') + ' ' + f.floor, LW / 2, 380, '900 40px Georgia, serif', '#ffd75e', 'center', { w: 6, col: '#2a1030' });
        if (f.newAct) txt(theme().name, LW / 2, 424, '900 15px Georgia, serif', '#c8a8b0');

        if (f.pace != null) {
          txt(f.pace >= 0 ? '\u{1F47B} ' + f.pace + 's ahead of your best' : '\u{1F47B} ' + (-f.pace) + 's behind your best',
              LW / 2, f.newAct ? 450 : 424, '800 12px Verdana, sans-serif', f.pace >= 0 ? '#7ee787' : '#ff9d8a');
        }
        ctx.restore();
      }
      if (f.t > hold + fade) S.floorFx = null;
    } else if (S.floorFx && S.screen !== 'dungeon') S.floorFx = null;
  }
