  // -------------------------------------------------------- dungeon screen
  // A real crawl: drive the hero with the thumb-stick (or WASD / arrows),
  // bump into dwellers to interact, walk through doorways on any wall.
  // Rooms persist — backtrack freely — and the minimap uncovers as you go.
  // rooms come in SIZES, like a real blueprint: small cells, wide halls,
  // long galleries, big chambers. ROOM/FR are refit to the current room.
  const SIZE_DIMS = {
    s: { w: 300, h: 330 }, w: { w: 412, h: 330 },
    t: { w: 310, h: 464 }, b: { w: 412, h: 464 },
  };
  const ROOM = { x: 34, y: 168, w: LW - 68, h: 464, wallH: 56, botH: 26, sideW: 16 };
  const FR = { x0: 0, x1: 0, y0: 0, y1: 0 };
  function updateRoomRect() {
    const r = curRoom();
    const d = (r && SIZE_DIMS[r.size]) || SIZE_DIMS.b;
    ROOM.w = d.w; ROOM.h = d.h;
    ROOM.x = (LW - d.w) / 2;
    ROOM.y = 168 + (464 - d.h) / 2;
    FR.x0 = ROOM.x + ROOM.sideW; FR.x1 = ROOM.x + ROOM.w - ROOM.sideW;
    FR.y0 = ROOM.y + ROOM.wallH; FR.y1 = ROOM.y + ROOM.h - ROOM.botH;
  }
  updateRoomRect();
  const DOOR_HALF = 30, HERO_R = 13;
  function entPos(e) {
    return {
      x: FR.x0 + (FR.x1 - FR.x0) * (e.px === undefined ? 0.5 : e.px),
      y: FR.y0 + 26 + (FR.y1 - FR.y0 - 46) * (e.py === undefined ? 0.4 : e.py),
    };
  }
  function doorCenter(dir) {
    const cx = (FR.x0 + FR.x1) / 2, cy = (FR.y0 + FR.y1) / 2;
    if (dir === 'n') return { x: cx, y: FR.y0 };
    if (dir === 's') return { x: cx, y: FR.y1 };
    if (dir === 'e') return { x: FR.x1, y: cy };
    return { x: FR.x0, y: cy };
  }
  // the hero puppet + inputs
  const AV = { x: LW / 2, y: 0, stamp: -1, step: 0, moving: false, fx: 0, fy: -1 };
  const JOY = { active: false, ox: 0, oy: 0, dx: 0, dy: 0, id: null };
  const KEYS = {};
  window.addEventListener('keydown', (ev) => { KEYS[ev.key.toLowerCase()] = true; });
  window.addEventListener('keyup', (ev) => { KEYS[ev.key.toLowerCase()] = false; });
  const entCool = {};
  function avSpawn() {
    AV.stamp = S.roomStamp;
    updateRoomRect();
    for (const k of Object.keys(entCool)) delete entCool[k];
    if (S.enterDir) {
      const p = doorCenter(OPP[S.enterDir]);
      const inX = p.x === FR.x0 ? 34 : p.x === FR.x1 ? -34 : 0;
      const inY = p.y === FR.y0 ? 34 : p.y === FR.y1 ? -34 : 0;
      AV.x = p.x + inX;
      AV.y = p.y + inY;
    } else {
      AV.x = (FR.x0 + FR.x1) / 2;
      AV.y = FR.y1 - 40;
    }
  }
  function avTick(dt) {
    if (S.roomStamp !== AV.stamp) avSpawn();
    // stick + keys
    let vx = 0, vy = 0;
    if (JOY.active) {
      const d = Math.hypot(JOY.dx, JOY.dy);
      if (d > 6) {
        const k = Math.min(1, d / 48);
        vx = (JOY.dx / d) * k; vy = (JOY.dy / d) * k;
      }
    }
    if (KEYS.arrowleft || KEYS.a) vx -= 1;
    if (KEYS.arrowright || KEYS.d) vx += 1;
    if (KEYS.arrowup || KEYS.w) vy -= 1;
    if (KEYS.arrowdown || KEYS.s) vy += 1;
    const mag = Math.hypot(vx, vy);
    AV.moving = mag > 0.05;
    if (!AV.moving) return;
    if (mag > 1) { vx /= mag; vy /= mag; }
    AV.fx = vx; AV.fy = vy;
    AV.step += dt * 13;
    const SPD = 195;
    let nx = AV.x + vx * SPD * dt;
    let ny = AV.y + vy * SPD * dt;
    // doorways: walking past a wall inside a door gap steps through
    const cx = (FR.x0 + FR.x1) / 2, cy = (FR.y0 + FR.y1) / 2;
    const inGapX = Math.abs(nx - cx) < DOOR_HALF - 8;
    const inGapY = Math.abs(ny - cy) < DOOR_HALF - 8;
    const tryStep = (dir) => {
      const res = tryDoor(dir);
      if (res !== true) {
        // locked (or just unlocked): stay inside
        nx = Math.max(FR.x0 + HERO_R, Math.min(FR.x1 - HERO_R, nx));
        ny = Math.max(FR.y0 + HERO_R, Math.min(FR.y1 - HERO_R, ny));
      }
      return res;
    };
    const nbr = (dir) => doorTo(dir);   // only where a corridor was dug
    // inside a door gap the hero may step into the recess; past the
    // threshold the door is tried (unlock or walk through)
    if (ny < FR.y0 + HERO_R) {
      if (inGapX && nbr('n')) { if (ny < FR.y0 - 10) tryStep('n'); }
      else ny = FR.y0 + HERO_R;
    }
    if (ny > FR.y1 - HERO_R) {
      if (inGapX && nbr('s')) { if (ny > FR.y1 + 10) tryStep('s'); }
      else ny = FR.y1 - HERO_R;
    }
    if (nx < FR.x0 + HERO_R) {
      if (inGapY && nbr('w')) { if (nx < FR.x0 - 8) tryStep('w'); }
      else nx = FR.x0 + HERO_R;
    }
    if (nx > FR.x1 - HERO_R) {
      if (inGapY && nbr('e')) { if (nx > FR.x1 + 8) tryStep('e'); }
      else nx = FR.x1 - HERO_R;
    }
    if (S.roomStamp !== AV.stamp) { avSpawn(); return; }
    AV.x = nx; AV.y = ny;
    // bump into a dweller -> interact (once, until you step away)
    if (S.room) return;
    const ents = (curRoom() && curRoom().ents) || [];
    for (let i = 0; i < ents.length; i++) {
      const e = ents[i];
      const p = entPos(e);
      const d2 = Math.hypot(AV.x - p.x, AV.y - (p.y - 6));
      if (d2 > 52) { delete entCool[i]; continue; }
      if (d2 < 34 && !entCool[i] && (!e.done || e.kind === 'shop')) {
        entCool[i] = true;
        interact(i);
        if (S.screen !== 'dungeon') return;
      }
    }
  }

  function drawRoomBox(t) {
    const T = theme();
    const room = curRoom();
    const has = (dir) => doorTo(dir);
    const open = (dir) => has(dir) && linkOpen(room, has(dir));
    // outer dark + frame
    rr(ROOM.x - 10, ROOM.y - 10, ROOM.w + 20, ROOM.h + 20, 14);
    ctx.fillStyle = '#0d090d'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = T.cabB; ctx.stroke();
    // far wall
    ctx.fillStyle = lgr('wall:' + fkey(), 0, ROOM.y, 0, ROOM.y + ROOM.wallH,
      [[0, '#171019'], [1, T.door]]);
    ctx.fillRect(ROOM.x, ROOM.y, ROOM.w, ROOM.wallH);
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#0d090d'; ctx.lineWidth = 1.5;
    for (let r = 1; r < 3; r++) {
      const y = ROOM.y + (ROOM.wallH / 3) * r;
      ctx.beginPath(); ctx.moveTo(ROOM.x, y); ctx.lineTo(ROOM.x + ROOM.w, y); ctx.stroke();
      for (let x = ROOM.x + ((r % 2) * 28); x < ROOM.x + ROOM.w; x += 56) {
        ctx.beginPath(); ctx.moveTo(x, y - ROOM.wallH / 3); ctx.lineTo(x, y); ctx.stroke();
      }
    }
    ctx.restore();
    // side + bottom walls
    ctx.fillStyle = lgr('sw:' + fkey(), ROOM.x, 0, ROOM.x + ROOM.sideW, 0, [[0, '#171019'], [1, T.door]]);
    ctx.fillRect(ROOM.x, FR.y0, ROOM.sideW, FR.y1 - FR.y0);
    ctx.fillStyle = lgr('se:' + fkey(), ROOM.x + ROOM.w, 0, ROOM.x + ROOM.w - ROOM.sideW, 0, [[0, '#171019'], [1, T.door]]);
    ctx.fillRect(FR.x1, FR.y0, ROOM.sideW, FR.y1 - FR.y0);
    ctx.fillStyle = lgr('bw:' + fkey(), 0, ROOM.y + ROOM.h, 0, FR.y1, [[0, '#171019'], [1, T.door]]);
    ctx.fillRect(ROOM.x, FR.y1, ROOM.w, ROOM.botH);
    // tiled floor
    const fy = FR.y0;
    const fh = FR.y1 - FR.y0;
    ctx.save();
    ctx.beginPath(); ctx.rect(FR.x0, fy, FR.x1 - FR.x0, fh); ctx.clip();
    ctx.fillStyle = T.floorB;
    ctx.fillRect(FR.x0, fy, FR.x1 - FR.x0, fh);
    const TS = 46;
    for (let r = 0; r < Math.ceil(fh / TS); r++) {
      for (let cix = 0; cix < Math.ceil((FR.x1 - FR.x0) / TS); cix++) {
        if ((r + cix) % 2 === 0) continue;
        ctx.fillStyle = 'rgba(20,12,22,0.14)';
        ctx.fillRect(FR.x0 + cix * TS, fy + r * TS, TS, TS);
      }
    }
    // a dungeon floor is never that clean — sink the whole thing into gloom
    ctx.fillStyle = 'rgba(16,10,20,0.42)';
    ctx.fillRect(FR.x0, fy, FR.x1 - FR.x0, fh);
    // pools of torchlight breathe against the dark
    for (const tx of [FR.x0 + 16, FR.x1 - 16]) {
      const fl2 = 0.16 + 0.05 * Math.sin(t * 9 + tx);
      const lg2 = ctx.createRadialGradient(tx, fy + 14, 8, tx, fy + 14, 130);
      lg2.addColorStop(0, 'rgba(255,170,80,' + fl2 + ')');
      lg2.addColorStop(1, 'rgba(255,170,80,0)');
      ctx.fillStyle = lg2;
      ctx.fillRect(tx - 130, fy, 260, 200);
    }
    // cracked-tile flavour
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#0d090d'; ctx.lineWidth = 1.5;
    for (const s of SCRATCH.slice(0, 14)) {
      const x = FR.x0 + (s.x1 / 100) * (FR.x1 - FR.x0), y = fy + (s.y1 / 84) * fh;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + (s.x2 - s.x1) * 1.5, y + (s.y2 - s.y1) * 1.5); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // wall torches
    for (const tx of [FR.x0 + 16, FR.x1 - 16]) {
      const fl = 1 + Math.sin(t * 9 + tx) * 0.2;
      ctx.globalAlpha = 0.32;
      ctx.beginPath(); ctx.arc(tx, fy + 12, 20 * fl, 0, 7);
      ctx.fillStyle = '#ff9d3c'; ctx.fill();
      ctx.globalAlpha = 1;
      txt('\u{1F525}', tx, fy + 8, '18px serif', '#fff');
    }
    ctx.restore();
    // seams
    ctx.strokeStyle = 'rgba(240,246,255,0.22)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(FR.x0, FR.y0); ctx.lineTo(FR.x1, FR.y0); ctx.stroke();
    // the doorways
    for (const dir of ['n', 's', 'e', 'w']) {
      if (has(dir)) drawDoorway(dir, open(dir), t);
    }
  }

  function drawDoorway(dir, isOpen, t) {
    const p = doorCenter(dir);
    const locked = !isOpen;
    const kcol = S.run.keys < 1 && locked && Math.floor(t * 4) % 2 ? '#ff5a4e' : '#ffd75e';
    ctx.save();
    if (dir === 'n' || dir === 's') {
      const y0 = dir === 'n' ? ROOM.y : FR.y1;
      const hh = dir === 'n' ? ROOM.wallH : ROOM.botH;
      // the opening
      ctx.fillStyle = isOpen ? '#060309' : '#1c1220';
      ctx.fillRect(p.x - DOOR_HALF, y0, DOOR_HALF * 2, hh);
      ctx.strokeStyle = isOpen ? 'rgba(255,215,94,0.5)' : '#3a2f3a';
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x - DOOR_HALF, y0, DOOR_HALF * 2, hh);
      if (isOpen) {
        // a beckoning glow from the next room
        const g = ctx.createLinearGradient(0, y0, 0, y0 + (dir === 'n' ? hh + 26 : -26));
        g.addColorStop(0, 'rgba(255,200,110,0.20)');
        g.addColorStop(1, 'rgba(255,200,110,0)');
        ctx.fillStyle = g;
        ctx.fillRect(p.x - DOOR_HALF + 4, dir === 'n' ? y0 : y0 - 26, DOOR_HALF * 2 - 8, hh + 26);
        txt(dir === 'n' ? '▲' : '▼', p.x, y0 + hh / 2, '900 12px Verdana, sans-serif', 'rgba(255,220,140,0.8)');
      } else {
        // barred gate
        ctx.strokeStyle = '#4a3a50'; ctx.lineWidth = 3;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath(); ctx.moveTo(p.x + i * 16, y0 + 3); ctx.lineTo(p.x + i * 16, y0 + hh - 3); ctx.stroke();
        }
        txt('\u{1F512}', p.x, y0 + hh / 2 - 4, '13px serif', '#fff');
        txt('1\u{1F5DD}', p.x, y0 + hh / 2 + 10, '800 9px Verdana, sans-serif', kcol);
      }
    } else {
      const x0 = dir === 'w' ? ROOM.x : FR.x1;
      ctx.fillStyle = isOpen ? '#060309' : '#1c1220';
      ctx.fillRect(x0, p.y - DOOR_HALF, ROOM.sideW, DOOR_HALF * 2);
      ctx.strokeStyle = isOpen ? 'rgba(255,215,94,0.5)' : '#3a2f3a';
      ctx.lineWidth = 2;
      ctx.strokeRect(x0, p.y - DOOR_HALF, ROOM.sideW, DOOR_HALF * 2);
      if (isOpen) {
        txt(dir === 'w' ? '◀' : '▶', x0 + ROOM.sideW / 2, p.y, '900 11px Verdana, sans-serif', 'rgba(255,220,140,0.8)');
      } else {
        ctx.strokeStyle = '#4a3a50'; ctx.lineWidth = 3;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath(); ctx.moveTo(x0 + 2, p.y + i * 16); ctx.lineTo(x0 + ROOM.sideW - 2, p.y + i * 16); ctx.stroke();
        }
        txt('\u{1F512}', x0 + ROOM.sideW / 2, p.y - 8, '11px serif', '#fff');
        txt('1\u{1F5DD}', x0 + ROOM.sideW / 2, p.y + 8, '800 8px Verdana, sans-serif', kcol);
      }
    }
    ctx.restore();
  }

  function drawEnt(i, e, t) {
    const p = entPos(e);
    const info = ENT_INFO[e.kind];
    let icon = info.icon, label = info.name, col = '#e8dce8';
    if (e.kind === 'monster') {
      const en = ENEMIES.find(x => x.id === e.eid);
      icon = e.mtype === 'boss' ? BOSSES[(S.run.floor - 1) % BOSSES.length].icon : (en ? en.icon : info.icon);
      label = e.mtype === 'boss' ? 'THE BOSS' : e.mtype === 'elite' ? 'ELITE FOE' : (en ? en.name : 'MONSTER');
      col = e.mtype === 'boss' ? '#ffd75e' : e.mtype === 'elite' ? '#ff9d3c' : '#ffb4a8';
    }
    ctx.save();
    if (e.done && e.kind !== 'shop') {
      ctx.globalAlpha = 0.28;
      txt(e.kind === 'monster' ? '\u{1F4A8}' : icon, p.x, p.y - 12, '30px serif', '#fff');
      txt(e.kind === 'monster' ? 'slain' : 'done', p.x, p.y + 14, '600 9px Verdana, sans-serif', '#9a8aa0');
      ctx.restore();
      return;
    }
    ctx.beginPath(); ctx.ellipse(p.x, p.y + 6, 20, 7, 0, 0, 7);
    ctx.fillStyle = 'rgba(10,6,12,0.5)'; ctx.fill();
    const bob = Math.sin(t * 2.6 + i * 2.4) * 2.5;
    const size = e.kind === 'monster' && e.mtype === 'boss' ? 52 : e.kind === 'stairs' ? 44 : 34;
    if (e.kind === 'monster') {
      ctx.globalAlpha = 0.16 + 0.08 * Math.sin(t * 4 + i);
      ctx.beginPath(); ctx.arc(p.x, p.y - 14 + bob, size * 0.72, 0, 7);
      ctx.fillStyle = e.mtype === 'elite' ? '#ff9d3c' : '#ef4b5d'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (e.kind === 'stairs') {
      ctx.globalAlpha = 0.25 + 0.12 * Math.sin(t * 3);
      ctx.beginPath(); ctx.arc(p.x, p.y - 14 + bob, 34, 0, 7);
      ctx.fillStyle = '#ffd75e'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    txt(icon, p.x, p.y - 14 + bob, size + 'px serif', '#fff');
    if (e.mtype === 'elite') txt('\u{1F525}', p.x + 20, p.y - 30 + bob, '14px serif', '#fff');
    txt(label, p.x, p.y + 18, '800 9px Verdana, sans-serif', col, 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
    // whisper when the hero is close
    const dh = Math.hypot(AV.x - p.x, AV.y - (p.y - 6));
    if (dh < 74 && dh > 34) {
      txt('!', p.x + 18, p.y - 38 + bob, '900 14px Georgia, serif', '#ffe066', 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
    }
    ctx.restore();
  }

  function drawHero(t) {
    const hop = AV.moving ? Math.abs(Math.sin(AV.step)) * 4 : Math.sin(t * 2) * 1.5;
    ctx.beginPath(); ctx.ellipse(AV.x, AV.y + 6, 15, 6, 0, 0, 7);
    ctx.fillStyle = 'rgba(10,6,12,0.5)'; ctx.fill();
    // walk dust
    if (AV.moving && Math.random() < 0.25 && S.parts.length < 120) {
      S.parts.push({ x: AV.x - AV.fx * 10, y: AV.y + 4, vx: -AV.fx * 24 + (Math.random() - 0.5) * 12,
                     vy: -6, g: -20, life: 0, max: 0.4, col: '#8a7a90', sz: 1.8, spin: 1, shape: 'sq' });
    }
    ctx.save();
    ctx.translate(AV.x, AV.y - 14 - hop);
    if (AV.moving) ctx.rotate(AV.fx * 0.08);
    txt('\u{1F93A}', 0, 0, '34px serif', '#fff');
    ctx.restore();
    if (S.run.keys > 0) txt('\u{1F5DD}', AV.x + 16, AV.y - 32 - hop, '11px serif', '#fff');
  }

  function drawJoystick() {
    if (!JOY.active) return;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(JOY.ox, JOY.oy, 48, 0, 7);
    ctx.lineWidth = 3; ctx.strokeStyle = '#e8dce8'; ctx.stroke();
    const d = Math.hypot(JOY.dx, JOY.dy) || 1;
    const k = Math.min(48, d);
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(JOY.ox + (JOY.dx / d) * k, JOY.oy + (JOY.dy / d) * k, 20, 0, 7);
    ctx.fillStyle = '#e8dce8'; ctx.fill();
    ctx.restore();
  }

  // what the hero knows of the floor: 2 = walked, 1 = glimpsed through a door
  function mapKnowledge() {
    const rooms = S.run.map.rooms;
    const lantern = hasRelic('lantern');
    const seen = {};
    for (const k of Object.keys(rooms)) {
      const r = rooms[k];
      if (lantern || r.visited) { seen[k] = 2; continue; }
      for (const d of ['n', 's', 'e', 'w']) {
        const nb = doorTo(d, r);
        if (nb && nb.visited) { seen[k] = 1; break; }
      }
    }
    return seen;
  }
  // room footprint in map units (matches the real room proportions)
  const MAP_FOOT = { s: [0.62, 0.62], w: [1, 0.62], t: [0.62, 1], b: [1, 1] };
  function drawMapRooms(mx, my, pitch, seen, ink) {
    // ink = parchment blueprint style; otherwise the compact HUD chip
    const map = S.run.map;
    const rooms = map.rooms;
    const cell = pitch * 0.82;
    const roomRect = (r) => {
      const f = MAP_FOOT[r.size] || MAP_FOOT.b;
      const w = cell * f[0], h = cell * f[1];
      const cx2 = mx + (r.gx + 0.5) * pitch, cy2 = my + (r.gy + 0.5) * pitch;
      return { x: cx2 - w / 2, y: cy2 - h / 2, w, h, cx: cx2, cy: cy2 };
    };
    // corridors first, so rooms sit on top of them
    for (const lk of Object.keys(map.links)) {
      const [a, b] = lk.split('~').map(s2 => rooms[s2]);
      if (!a || !b) continue;
      if (!seen[rkey(a.gx, a.gy)] && !seen[rkey(b.gx, b.gy)]) continue;
      const ra = roomRect(a), rb = roomRect(b);
      const open = map.links[lk].open;
      ctx.save();
      ctx.lineWidth = Math.max(3, pitch * 0.16);
      ctx.strokeStyle = ink
        ? (open ? 'rgba(74,58,42,0.9)' : 'rgba(74,58,42,0.45)')
        : (open ? 'rgba(255,215,94,0.6)' : 'rgba(180,160,190,0.3)');
      if (!open) ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(ra.cx, ra.cy); ctx.lineTo(rb.cx, rb.cy); ctx.stroke();
      ctx.restore();
      if (!open && seen[rkey(a.gx, a.gy)] === 2 && seen[rkey(b.gx, b.gy)] === 2 && pitch > 30) {
        txt('\u{1F512}', (ra.cx + rb.cx) / 2, (ra.cy + rb.cy) / 2, '10px serif', '#fff');
      }
    }
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      const rc = roomRect(r);
      const isCur = k === map.cur;
      if (seen[k] === 2) {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        if (ink) {
          ctx.fillStyle = isCur ? '#d8c49a' : '#cfc4b2';
          ctx.fill();
          ctx.lineWidth = 2.5; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
        } else {
          ctx.fillStyle = isCur ? theme().accent : r.boss ? 'rgba(255,215,94,0.75)' : 'rgba(180,160,190,0.55)';
          ctx.fill();
        }
      } else {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        ctx.save();
        ctx.setLineDash([3, 3]);
        ctx.lineWidth = ink ? 2 : 1.2;
        ctx.strokeStyle = ink ? 'rgba(74,58,42,0.55)' : 'rgba(180,160,190,0.4)';
        ctx.stroke();
        ctx.restore();
      }
      if (r.boss && seen[k] === 2) txt('\u{1F451}', rc.cx, rc.cy, Math.max(8, pitch * 0.3) + 'px serif', '#fff');
      if (!r.boss && k === '0,0' && ink) txt('1', rc.cx, rc.cy, '700 ' + Math.max(9, pitch * 0.3) + 'px Georgia, serif', '#4a3a2a');
      if (isCur) {
        const pulse = 0.5 + 0.5 * Math.sin(S.time * 5 + performance.now() / 200);
        ctx.beginPath(); ctx.arc(rc.cx, rc.cy, Math.max(3, pitch * 0.1), 0, 7);
        ctx.fillStyle = ink ? 'rgba(168,33,58,' + (0.6 + 0.4 * pulse) + ')' : 'rgba(255,255,255,' + (0.6 + 0.4 * pulse) + ')';
        ctx.fill();
      }
    }
  }
  function mapBounds(seen) {
    const rooms = S.run.map.rooms;
    let minX = 99, maxX = -99, minY = 99, maxY = -99;
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      minX = Math.min(minX, r.gx); maxX = Math.max(maxX, r.gx);
      minY = Math.min(minY, r.gy); maxY = Math.max(maxY, r.gy);
    }
    return { minX, maxX, minY, maxY };
  }
  // the corner minimap — tap it to unroll the full blueprint
  let mapView = false;
  function drawMinimap(t) {
    if (!S.run.map) return;
    const seen = mapKnowledge();
    const ks = Object.keys(seen);
    if (!ks.length) return;
    const b = mapBounds(seen);
    const pitch = 16;
    const mw = (b.maxX - b.minX + 1) * pitch + 12;
    const mh = (b.maxY - b.minY + 1) * pitch + 12;
    const mx = LW - 14 - mw, my = 56;
    rr(mx, my, mw, mh, 8);
    ctx.fillStyle = 'rgba(10,6,12,0.82)'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(232,220,232,0.35)'; ctx.stroke();
    drawMapRooms(mx + 6 - b.minX * pitch, my + 6 - b.minY * pitch, pitch, seen, false);
    txt('tap for map', mx + mw / 2, my + mh + 8, '600 8px Verdana, sans-serif', '#8f6f78');
    if (!S.room) uiButtons.push({ x: mx - 6, y: my - 6, w: mw + 12, h: mh + 24, cb: () => { mapView = true; } });
  }
  // the full blueprint, unrolled like a tabletop dungeon chart
  function drawMapView(t) {
    if (!mapView || !S.run.map) return;
    ctx.fillStyle = 'rgba(8,4,10,0.7)';
    ctx.fillRect(0, 0, LW, LH);
    // the parchment
    rr(20, 90, LW - 40, 620, 6);
    ctx.fillStyle = '#e9dfc6'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
    ctx.save();
    rr(20, 90, LW - 40, 620, 6);
    ctx.clip();
    // faint graph grid, like the reference charts
    ctx.strokeStyle = 'rgba(120,100,70,0.16)';
    ctx.lineWidth = 1;
    for (let x = 28; x < LW - 20; x += 22) {
      ctx.beginPath(); ctx.moveTo(x, 90); ctx.lineTo(x, 710); ctx.stroke();
    }
    for (let y = 98; y < 710; y += 22) {
      ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(LW - 20, y); ctx.stroke();
    }
    // burnt edges
    const eg = ctx.createRadialGradient(LW / 2, 400, 200, LW / 2, 400, 430);
    eg.addColorStop(0, 'rgba(90,60,30,0)');
    eg.addColorStop(1, 'rgba(90,60,30,0.28)');
    ctx.fillStyle = eg;
    ctx.fillRect(20, 90, LW - 40, 620);
    const seen = mapKnowledge();
    const b = mapBounds(seen);
    const cols = b.maxX - b.minX + 1, rows2 = b.maxY - b.minY + 1;
    const pitch = Math.min(64, Math.min((LW - 100) / cols, 520 / rows2));
    const ox = (LW - cols * pitch) / 2 - b.minX * pitch;
    const oy = 90 + (620 - rows2 * pitch) / 2 - b.minY * pitch;
    drawMapRooms(ox, oy, pitch, seen, true);
    ctx.restore();
    txt(theme().name + ' — FLOOR ' + S.run.floor, LW / 2, 118, '900 20px Georgia, serif', '#4a3a2a');
    const seenN = Object.values(seen).filter(v => v === 2).length;
    txt(seenN + ' / ' + Object.keys(S.run.map.rooms).length + ' rooms walked • \u{1F512} locked corridors • tap to close',
        LW / 2, 688, '700 10px Verdana, sans-serif', '#6a5138');
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { mapView = false; } });
  }

  function drawToast() {
    if (!S.toast) return;
    const a = Math.min(1, S.toast.t / 0.5);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = '800 13px Verdana, sans-serif';
    const w = ctx.measureText(S.toast.txt).width + 36;
    rr(LW / 2 - w / 2, ROOM.y + ROOM.wallH + 12, w, 30, 15);
    ctx.fillStyle = 'rgba(12,7,14,0.92)'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#ffd75e'; ctx.stroke();
    txt(S.toast.txt, LW / 2, ROOM.y + ROOM.wallH + 27, '800 13px Verdana, sans-serif', '#ffe9a3');
    ctx.restore();
  }

  function drawDungeon(t, dt) {
    const T = theme();
    drawBackground();
    updateRoomRect();
    if (!S.room && !mapView) avTick(dt);
    if (S.screen !== 'dungeon') return;   // a bump may have started a battle
    // heading
    ctx.font = '900 26px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 7; ctx.strokeStyle = '#2a1030';
    ctx.strokeText(T.name, LW / 2 - 30, 44);
    ctx.fillStyle = lgr('dtt:' + fkey(), 0, 30, 0, 60, [[0, '#fff4d6'], [1, T.accent]]);
    ctx.fillText(T.name, LW / 2 - 30, 44);
    txt('FLOOR ' + S.run.floor, LW / 2 - 30, 74, '800 12px Verdana, sans-serif', '#c8a8b0');
    txt('\u{1F5DD} × ' + S.run.keys, LW / 2 - 30, 104, '900 16px Verdana, sans-serif',
        S.run.keys < 1 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    drawRoomBox(t);
    // dwellers + hero, back-to-front
    const ents = (curRoom() && curRoom().ents) || [];
    const order = ents.map((e, i) => ({ e, i, y: entPos(e).y }));
    order.push({ hero: true, y: AV.y });
    order.sort((a, b) => a.y - b.y);
    for (const o of order) {
      if (o.hero) drawHero(t);
      else drawEnt(o.i, o.e, t);
    }
    drawMotes(dt, 1);
    drawParticles(dt);
    drawToast();
    drawJoystick();
    drawHUD(t);
    drawVignette(0.35);
    drawMinimap(t);
    drawBanner(t);
    if (S.uiFlash && !S.room) {
      txt(S.uiFlash.msg, LW / 2, ROOM.y + ROOM.wallH + 60, '900 15px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    }
    uiBtn(14, 12, 38, 36, '⌂', () => { S.screen = 'title'; save(); }, { r: 10, font: '20px serif' });
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
    txt('drag to walk • WASD works too', LW / 2, 704, '600 9px Verdana, sans-serif', '#6a5a68');
    drawRoomModal(t);
    drawMapView(t);
  }
  // ------------------------------------------------------------ room modal
  const MODAL_INFO = {
    shop: { icon: '\u{1F9D4}', name: 'SHOPKEEPER' },
    forge: { icon: '\u{1F477}', name: 'BLACKSMITH' },
  };
  function drawRoomModal(t) {
    const room = S.room;
    if (!room) return;
    ctx.fillStyle = 'rgba(5,3,8,0.72)';
    ctx.fillRect(0, 0, LW, LH);
    const info = MODAL_INFO[room.type] || MODAL_INFO.shop;
    const isShop = room.type === 'shop';
    const isForge = room.type === 'forge' && !room.done;
    const ph = isShop ? 470 : isForge ? 330 : 220;
    const py = isShop ? 160 : 250;
    rr(36, py, LW - 72, ph, 18);
    ctx.fillStyle = 'rgba(22,13,24,0.97)'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#ffd75e'; ctx.stroke();
    txt(info.icon + '  ' + info.name, LW / 2, py + 34, '900 22px Georgia, serif', '#ffd75e', 'center', { w: 4, col: '#3a1006' });
    if (isShop) {
      txt('\u{1FA99} ' + S.run.gold + ' gold', LW / 2, py + 60, '800 13px Verdana, sans-serif', '#fff0c0');
      room.stock.forEach((it, i) => {
        const y = py + 78 + i * 46;
        const afford = !it.sold && S.run.gold >= it.price;
        uiBtn(56, y, LW - 112, 38, '', () => buyShop(i),
              { bg: it.sold ? 'rgba(20,14,20,0.9)' : afford ? 'rgba(140,90,20,0.9)' : 'rgba(40,30,36,0.9)',
                border: it.sold ? '#3a2f3a' : afford ? '#ffd75e' : '#5a4048', r: 10 });
        txt(it.label, 70, y + (it.sub ? 13 : 19), '800 12px Verdana, sans-serif',
            it.sold ? '#5a4a5a' : afford ? '#ffe9a3' : '#7a6a72', 'left');
        if (it.sub) txt(it.sub, 70, y + 28, '600 9px Verdana, sans-serif', it.sold ? '#4a3f4a' : '#b09a78', 'left');
        txt(it.sold ? 'SOLD' : it.price + ' G', LW - 70, y + 19, '900 13px Verdana, sans-serif',
            it.sold ? '#5a4a5a' : afford ? '#ffd75e' : '#7a6a72', 'right');
      });
    } else if (isForge) {
      txt('choose a boon', LW / 2, py + 60, '700 12px Verdana, sans-serif', '#c8a8b0');
      room.opts.forEach((o, i) => {
        const y = py + 80 + i * 56;
        uiBtn(56, y, LW - 112, 46, '', () => pickBoon(i),
              { bg: 'rgba(60,35,20,0.9)', border: '#ff9d3c', r: 10 });
        txt(o.label, LW / 2, y + (o.sub ? 16 : 23), '800 13px Verdana, sans-serif', '#ffe9a3');
        if (o.sub) txt(o.sub, LW / 2, y + 33, '600 9px Verdana, sans-serif', '#b09a78');
      });
    } else {
      // resolved rooms: shrine / treasure / wheel / forge-done — wrap the tale
      const words = (room.msg || '').split(' ');
      const lines = [''];
      for (const w of words) {
        if ((lines[lines.length - 1] + ' ' + w).length > 44) lines.push(w);
        else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + w).trim();
      }
      lines.slice(0, 4).forEach((ln, i) =>
        txt(ln, LW / 2, py + 70 + i * 20, '700 12px Verdana, sans-serif', '#e8dce8'));
    }
    if (!isForge) {
      uiBtn(LW / 2 - 90, py + ph - 52, 180, 38, 'LEAVE', () => closeModal(),
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 14px Verdana, sans-serif', r: 13 });
    }
    if (S.uiFlash) {
      txt(S.uiFlash.msg, LW / 2, py + ph + 24, '900 14px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e');
    }
  }

  // ------------------------------------------------------------ title/over
  function drawTitle(t) {
    ctx.fillStyle = rgr('titlebg', LW / 2, 260, 80, LW / 2, 420, 640,
      [[0, '#33202e'], [1, '#140d16']]);
    ctx.fillRect(0, 0, LW, LH);
    // a mound of coins under the logo
    for (let i = 0; i < 26; i++) {
      const cx2 = LW / 2 + Math.sin(i * 2.399) * (30 + ((i * 17) % 150));
      const cy2 = 260 + ((i * 13) % 44);
      ctx.beginPath(); ctx.ellipse(cx2, cy2 + 2, 13, 6, 0, 0, 7);
      ctx.fillStyle = '#7d5a14'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2, cy2, 13, 6, 0, 0, 7);
      ctx.fillStyle = '#f2c04a'; ctx.fill();
      ctx.strokeStyle = 'rgba(122,84,14,0.6)'; ctx.lineWidth = 1; ctx.stroke();
    }
    txt('⚔\u{FE0F}', LW / 2 - 168, 178 + Math.sin(t * 2) * 5, '34px serif', '#fff');
    txt('\u{1F409}', LW / 2 + 168, 178 + Math.cos(t * 2) * 5, '34px serif', '#fff');
    ctx.font = '900 52px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 10; ctx.strokeStyle = '#2a1030';
    ctx.strokeText('DUNGEON', LW / 2, 150);
    ctx.strokeText('PUSHER', LW / 2, 205);
    const g = lgr('logott', 0, 120, 0, 235, [[0, '#fff4d6'], [0.5, '#ffd75e'], [1, '#ff8a2a']]);
    ctx.fillStyle = g;
    ctx.fillText('DUNGEON', LW / 2, 150);
    ctx.fillText('PUSHER', LW / 2, 205);
    txt('a coin pusher roguelike', LW / 2, 330, '800 14px Verdana, sans-serif', '#c8a8b0');
    const HOW = [
      '● spend your purse of coins into the pusher each turn',
      '\u{1F3AF} the tray COLLECTS — END TURN to fire it piece by piece:',
      'gold strikes ⚔  silver shields \u{1F6E1}  green poisons ☠',
      '\u{1F5E1} your arsenal rides the pile — push it over the front',
      '\u{1F6AA} crawl the dungeon: monsters, chests, shopkeepers…',
      '\u{1F5DD} doors need KEYS — every monster slain drops one',
    ];
    HOW.forEach((h, i) => txt(h, LW / 2, 376 + i * 24, '600 11px Verdana, sans-serif', '#9a8aa0'));
    drawMotes(1 / 60, 1);
    drawVignette(0.4);
    if (S.run) {
      uiBtn(LW / 2 - 130, 520, 260, 52, '▶ CONTINUE — FLOOR ' + S.run.floor,
            () => { S.screen = 'dungeon'; save(); },
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 15px Verdana, sans-serif', r: 16 });
      uiBtn(LW / 2 - 130, 584, 260, 44, 'NEW RUN (abandons the old)', () => newRun(),
            { bg: 'rgba(90,40,20,0.9)', border: '#ff9d3c', col: '#ffd9b0', font: '800 12px Verdana, sans-serif', r: 14 });
    } else {
      const pulse = 1 + Math.sin(t * 4) * 0.03;
      uiBtn(LW / 2 - 130 * pulse, 540 - 26 * pulse + 26, 260 * pulse, 52 * pulse, '▶ ENTER THE DUNGEON', () => newRun(),
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 16px Verdana, sans-serif', r: 16 });
    }
    if (S.best.floor > 0) {
      txt('best: floor ' + S.best.floor + ' room ' + S.best.depth + '  •  ' + S.best.kills + ' kills  •  ' + fmt(S.best.gold) + ' gold looted',
          LW / 2, 668, '700 11px Verdana, sans-serif', '#8f6f78');
    }
    txt('every fight is a coin pusher. push your arsenal over the edge.', LW / 2, 700, '600 10px Verdana, sans-serif', '#6a5a68');
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
  }

  function drawOver(t) {
    ctx.fillStyle = rgr('overbg', LW / 2, 300, 60, LW / 2, 420, 620,
      [[0, '#331420'], [1, '#120a10']]);
    ctx.fillRect(0, 0, LW, LH);
    const o = S.over || { cause: 'fell', floor: 1, depth: 1, kills: 0, gold: 0 };
    txt('\u{1F480}', LW / 2, 180 + Math.sin(t * 1.5) * 4, '80px serif', '#fff');
    ctx.font = '900 40px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 8; ctx.strokeStyle = '#2a1030';
    ctx.strokeText('THE RUN ENDS', LW / 2, 268);
    ctx.fillStyle = lgr('overtt', 0, 245, 0, 292, [[0, '#ffb0b8'], [1, '#a8213a']]);
    ctx.fillText('THE RUN ENDS', LW / 2, 268);
    txt(o.cause, LW / 2, 310, '700 14px Verdana, sans-serif', '#c8a8b0');
    const rows = [
      ['reached', 'floor ' + o.floor + ', room ' + o.depth],
      ['monsters slain', '' + o.kills],
      ['gold looted', fmt(o.gold)],
    ];
    rows.forEach((rw, i) => {
      txt(rw[0], LW / 2 - 24, 370 + i * 30, '600 13px Verdana, sans-serif', '#9a8aa0', 'right');
      txt(rw[1], LW / 2 + 0, 370 + i * 30, '900 14px Verdana, sans-serif', '#ffe9a3', 'left');
    });
    if (S.best.floor > 0) {
      txt('best: floor ' + S.best.floor + ' room ' + S.best.depth + ' • ' + S.best.kills + ' kills',
          LW / 2, 480, '700 11px Verdana, sans-serif', '#8f6f78');
    }
    uiBtn(LW / 2 - 120, 530, 240, 52, '⚔\u{FE0F} AGAIN!', () => newRun(),
          { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 17px Verdana, sans-serif', r: 16 });
    uiBtn(LW / 2 - 80, 596, 160, 38, 'TITLE', () => { S.screen = 'title'; },
          { bg: 'rgba(20,10,14,0.9)', border: '#7d5a24', font: '800 13px Verdana, sans-serif', r: 12 });
  }

  // ------------------------------------------------------------------ loop
  let last = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    const dt = Math.min((ts - last) / 1000 || 0.016, 0.05);
    last = ts;
    if (S.screen === 'battle') {
      tick(dt);
      if (S.victory) S.victory.t += dt;
      if (held && !S.victory) {
        holdT += dt;
        if (holdT > 0.45 && S.cd <= 0) drop(S.aimX);
      }
    } else {
      // keep light UI timers alive outside the machine
      if (RFX.length) RFX.length = 0;
      if (S.uiFlash) { S.uiFlash.t -= dt; if (S.uiFlash.t <= 0) S.uiFlash = null; }
      if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) S.wheelAnim = null; }
      if (S.banner) { S.banner.ttl -= dt; if (S.banner.ttl <= 0) S.banner = null; }
      if (S.toast) { S.toast.t -= dt; if (S.toast.t <= 0) S.toast = null; }
      for (let i = S.floats.length - 1; i >= 0; i--) {
        const f = S.floats[i];
        f.age += dt;
        if (f.age >= f.max) S.floats.splice(i, 1);
      }
    }
    uiButtons = [];
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    if (S.screen === 'battle' && S.shake > 0.1) {
      ctx.translate((Math.random() - 0.5) * S.shake, (Math.random() - 0.5) * S.shake);
    }
    const t = S.screen === 'battle' ? S.time : ts / 1000;
    if (S.screen === 'title') drawTitle(t);
    else if (S.screen === 'dungeon' && S.run) drawDungeon(t, dt);
    else if (S.screen === 'battle' && S.run) drawBattle(t, dt);
    else if (S.screen === 'over') drawOver(t);
    else drawTitle(t);
    drawWheel();
  }
  requestAnimationFrame(frame);
})();

// particle burst — no-op headless, screen-space in the browser
function burst(wx, wy, wz, kind) {
  if (window.__dpBurst) window.__dpBurst(wx, wy, wz, kind);
}
</script>
