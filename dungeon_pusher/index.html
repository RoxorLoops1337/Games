<style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ============================================================================
// DUNGEON PUSHER — a coin pusher roguelike.
//
// The coin pusher IS the combat system, played in TURNS: each turn you
// spend a purse of coins into the machine, the tray COLLECTS what falls,
// and when YOU press END TURN it fires piece by piece — gems bank gold,
// silver coins shield the hero, gold coins strike, green coins poison,
// arsenal items hit big, cursed skulls bite last. Then the enemy takes its
// telegraphed turn. The side walls are SOLID: nothing is ever lost off the
// edges — the only way off the field is over the front, into the tray.
//
// Between fights: a real dungeon crawl. Each floor is a carved map of
// connected rooms (fog-of-war minimap, joystick movement, backtracking);
// locked doors eat a key once, monsters drop keys, the boss lairs in the
// farthest room and leaves stairs down when it falls.
//
// Physics is the 2.5D plane sim from Gold Rush Arcade: x across the platform,
// y into the machine (0 = back), z = height. Headless mode (tests): no canvas
// ctx -> sim + roguelike logic only, via window.DP.
// ============================================================================

const canvas = document.getElementById('c');
let ctx = null;
try { ctx = canvas && canvas.getContext ? canvas.getContext('2d') : null; } catch (e) { ctx = null; }
if (ctx && typeof ctx.save !== 'function') ctx = null;
const HEADLESS = !ctx;

// ---------------------------------------------------------------- constants
const C = {
  W: 100,
  PLAT_FRONT: 84,
  COIN_R: 4.6,
  COIN_H: 1.7,
  PUSH_MIN: 10, PUSH_MAX: 30, PUSH_H: 9,
  DROP_Z: 62,
  GRAV: 260,
  TRAY_Z: -30,
  FRICTION: 3.0, SETTLE: 0.5, REST: 0.05,
  LIP_G: 34,
  MAX_LAY: 2,
  DROP_CD: 0.28,
  METER_MAX: 18,                        // inserts to trigger a FRENZY rain
  SAVE_KEY: 'dungeon_pusher_save',
  START_HP: 60, START_POTIONS: 1, START_KEYS: 3,
  POTION_HEAL: 20,
  KEY_KILL: 1, KEY_ELITE: 2, KEY_BOSS: 3,   // keys paid per slain foe
  P_CHEST_KEY: 0.2,
  // combat is played in ROUNDS: a purse of coins to drop, then the tray
  // resolves piece by piece, then the enemy takes its turn
  ROUND_COINS: 10, POUCH_COINS: 2,      // base purse; each pouch adds +2
  ROUND_RAIN: 5,                        // fresh pieces rained onto the pile each round
  P_LUCKY: 0.08,                        // insert roll
  MIX: { silver: 0.20, green: 0.10, lucky: 0.05 },   // pile composition
  DMG: { gold: 1, lucky: 3 },           // per coin at resolve
  SKULL_DMG: 4,                         // + floor scaling on top; bypasses block
  ITEM_CAP: 12,                         // max arsenal items seeded per battle
};
// the order the tray resolves in: bank the loot, raise the guard, mend,
// then unleash — curses always land last
const RESOLVE_ORDER = ['gem', 'bag', 'silver', 'shielditem', 'heartitem',
                       'gold', 'lucky', 'weapon', 'green', 'vial', 'frost', 'skull'];
const RESOLVE_DELAY = { gem: 0.26, bag: 0.26, silver: 0.16, gold: 0.14, lucky: 0.22, green: 0.18 };

// ------------------------------------------------------------ the machine
// One battle cabinet, restyled per floor. Same geometry as the classic
// GOLD RUSH pusher so the proven physics constants carry over.
const MACH = {
  coin: { r: 4.6, style: 'gold', sym: '¢' },
  pushPeriod: 3.4, maxCoins: 170,
  tiers: [{ z: 0, back: 0, front: 84, min: 10, max: 30, phase: 0, slotY: 20 }],
  lipW: 7, lipH: 2.2,
};
function M() { return MACH; }
function lastTier() { return 0; }

// per-floor dungeon skins (cycled past the last one)
const FLOORS = [
  { name: 'THE CATACOMBS', room: '#33313f', cabA: '#8b93a8', cabB: '#5d6478', trim: '#d8dfe8',
    floorA: '#9aa1b0', floorB: '#cdd3de', accent: '#8be7ff', door: '#5d6478' },
  { name: 'THE SEWERS', room: '#25382c', cabA: '#7fae8c', cabB: '#527a5e', trim: '#d6efd6',
    floorA: '#8fa39a', floorB: '#bcd6c4', accent: '#7ee787', door: '#527a5e' },
  { name: 'THE CRYPT', room: '#372c44', cabA: '#a48ac8', cabB: '#71589a', trim: '#e8dcf8',
    floorA: '#9a92ab', floorB: '#cfc4de', accent: '#c86bff', door: '#71589a' },
  { name: 'THE FORGE', room: '#442a26', cabA: '#c88a6b', cabB: '#96543e', trim: '#f8dcc8',
    floorA: '#ab9490', floorB: '#dec7bc', accent: '#ff9d3c', door: '#96543e' },
];
function theme() { return FLOORS[((S.run ? S.run.floor : 1) - 1) % FLOORS.length]; }

// ------------------------------------------------------------------- items
// Your arsenal: bought in shops, won from boons and wheels. Every battle the
// whole arsenal is racked onto the pile; a collected item fires in that
// round's resolve (once per battle), and nothing is ever lost — the walls
// are solid, so unpushed gear simply waits for the next fight.
const ITEMS = [
  { id: 'sword',  icon: '\u{1F5E1}\u{FE0F}', name: 'Sword',       kind: 'weapon', dmg: 8,  cost: 26 },
  { id: 'axe',    icon: '\u{1FA93}',          name: 'War Axe',     kind: 'weapon', dmg: 14, cost: 48 },
  { id: 'hammer', icon: '\u{1F528}',          name: 'Doom Hammer', kind: 'weapon', dmg: 24, cost: 85 },
  { id: 'bomb',   icon: '\u{1F4A3}',          name: 'Bomb',        kind: 'weapon', dmg: 18, cost: 62, splash: true },
  { id: 'vial',   icon: '\u{1F9EA}',          name: 'Venom Vial',  kind: 'poison', pois: 4, cost: 40 },
  { id: 'shield', icon: '\u{1F6E1}\u{FE0F}', name: 'Shield',      kind: 'shield', block: 6, cost: 34 },
  { id: 'heart',  icon: '❤\u{FE0F}',     name: 'Heart',       kind: 'heal',   heal: 9, cost: 38 },
  { id: 'frost',  icon: '❄\u{FE0F}',     name: 'Frost Rune',  kind: 'stun',   stun: 1, cost: 55 },
];
function itemById(id) { return ITEMS.find(i => i.id === id); }

// ------------------------------------------------------------------ relics
const RELICS = [
  { id: 'whet',    icon: '\u{1FA9A}', name: 'Whetstone',   desc: 'weapons deal +30% damage' },
  { id: 'venom',   icon: '\u{1F40D}', name: 'Venom Gland', desc: 'venom vials apply +2 stacks' },
  { id: 'aegis',   icon: '\u{1F530}', name: 'Aegis',       desc: 'unspent block carries into the next round' },
  { id: 'clover',  icon: '\u{1F340}', name: 'Clover',      desc: 'lucky coins twice as often' },
  { id: 'wind',    icon: '\u{1F4A8}', name: 'Second Wind', desc: 'survive a killing blow at 1 HP (once per fight)' },
  { id: 'piggy',   icon: '\u{1F437}', name: 'Piggy Bank',  desc: '+4 gold after every victory' },
  { id: 'lantern', icon: '\u{1F3EE}', name: 'Lantern',     desc: 'the whole floor map is revealed' },
  { id: 'plate',   icon: '\u{1F6E1}\u{FE0F}', name: 'Battle Plate', desc: 'start every round with +4 block' },
];
function relicById(id) { return RELICS.find(r => r.id === id); }
function hasRelic(id) { return !!(S.run && S.run.relics.indexOf(id) >= 0); }

// ----------------------------------------------------------------- enemies
const ENEMIES = [
  { id: 'rat',     icon: '\u{1F400}', name: 'Dire Rat',       hp: 12, atk: 2, trait: null,     gold: 8 },
  { id: 'bat',     icon: '\u{1F987}', name: 'Cave Bat',       hp: 10, atk: 1, trait: 'fast',   gold: 9 },
  { id: 'slime',   icon: '\u{1FAB4}', name: 'Gloop Slime',    hp: 18, atk: 2, trait: 'tough',  gold: 11 },
  { id: 'goblin',  icon: '\u{1F47A}', name: 'Goblin Mugger',  hp: 15, atk: 3, trait: 'thief',  gold: 14 },
  { id: 'spider',  icon: '\u{1F577}\u{FE0F}', name: 'Venom Spider', hp: 13, atk: 2, trait: 'venom', gold: 12 },
  { id: 'skel',    icon: '\u{1F480}', name: 'Skeleton Guard', hp: 20, atk: 4, trait: null,     gold: 13 },
  { id: 'cultist', icon: '\u{1F9D9}', name: 'Skull Cultist',  hp: 16, atk: 3, trait: 'curse',  gold: 15 },
  { id: 'ghost',   icon: '\u{1F47B}', name: 'Restless Ghost', hp: 15, atk: 3, trait: 'regen',  gold: 14 },
  { id: 'ogre',    icon: '\u{1F479}', name: 'Ogre Brute',     hp: 30, atk: 5, trait: 'tough',  gold: 18 },
];
const BOSSES = [
  { id: 'dragon', icon: '\u{1F409}', name: 'Vault Dragon', hp: 55, atk: 5, trait: 'curse', gold: 60 },
  { id: 'lich',   icon: '\u{1F9DF}', name: 'Coin Lich',    hp: 70, atk: 6, trait: 'regen', gold: 80 },
  { id: 'demon',  icon: '\u{1F608}', name: 'Pit Boss',     hp: 85, atk: 7, trait: 'venom', gold: 100 },
];
const TRAIT_TXT = {
  fast: 'strikes twice a round', tough: 'thick hide', thief: 'steals coins from your purse',
  venom: 'poisons you on hit', curse: 'hurls cursed skulls onto the field', regen: 'regenerates each round',
};

// room inhabitants for the top-down crawl
const ENT_INFO = {
  monster: { icon: '\u{1F47E}', name: 'MONSTER' },
  chest:   { icon: '\u{1F9F0}', name: 'CHEST' },
  shop:    { icon: '\u{1F9D4}', name: 'SHOPKEEPER' },
  smith:   { icon: '\u{1F477}', name: 'BLACKSMITH' },
  shrine:  { icon: '⛲',    name: 'SHRINE' },
  wheel:   { icon: '\u{1F3A1}', name: 'WHEEL GHOST' },
  stairs:  { icon: '\u{1FA9C}', name: 'STAIRS DOWN' },
};

// ------------------------------------------------------------------- state
const S = {
  coins: [], floats: [], parts: [], rain: [],
  meter: 0,
  time: 0, phase: 0, cd: 0,
  shake: 0, aimX: 50, mute: false,
  dropped: 0, collected: 0,
  banner: null, trayPile: 0, denyT: 0, hurtT: 0,
  tray: { items: [] },                 // cosmetic: recent pickups shown in the tray
  screen: 'title',                     // title | dungeon | battle | over
  run: null,                           // the current roguelike run (see newRun)
  enemy: null,                         // live foe during battle
  battle: null,                        // round machine {round, phase, loot, queue, ...}
  victory: null,                       // battle-won overlay {t, gold, keys}
  room: null,                          // open non-battle room {type, ...}
  over: null,                          // run-ended summary {cause, floor, depth, kills, gold}
  best: { floor: 0, depth: 0, kills: 0, gold: 0 },
  wheelAnim: null, uiFlash: null, toast: null,
  pPois: 0,
  roomStamp: 0,                        // bumps on room change (avatar resets)
};

// seeded rng so tests are deterministic; browser reseeds from the clock
let rngState = 1234;
function srand(s) { rngState = (s >>> 0) || 1; }
function rng() {
  rngState |= 0; rngState = (rngState + 0x6D2B79F5) | 0;
  let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// sound hooks — no-ops headless / until the browser block installs real ones
let SND = { clink() {}, collect() {}, gem() {}, jackpot() {}, deny() {}, thud() {},
            slot() {}, hit() {}, hurt() {}, heal() {}, poison() {}, block() {},
            stun() {}, buy() {}, door() {}, dead() {}, winb() {}, reel() {} };

// ------------------------------------------------------------- persistence
function save() {
  try {
    localStorage.setItem(C.SAVE_KEY, JSON.stringify({
      v: 1, mute: S.mute, best: S.best,
      run: S.run ? {
        floor: S.run.floor, depth: S.run.depth, hp: S.run.hp, maxHp: S.run.maxHp,
        gold: S.run.gold, pouch: S.run.pouch, arsenal: S.run.arsenal,
        relics: S.run.relics, potions: S.run.potions, whet: S.run.whet,
        kills: S.run.kills, goldEarned: S.run.goldEarned, map: S.run.map,
        keys: S.run.keys, meter: S.meter,
      } : null,
    }));
  } catch (e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(C.SAVE_KEY));
    if (!d) return;
    S.mute = !!d.mute;
    if (d.best && typeof d.best === 'object') {
      S.best = { floor: d.best.floor || 0, depth: d.best.depth || 0,
                 kills: d.best.kills || 0, gold: d.best.gold || 0 };
    }
    if (d.run && typeof d.run === 'object' && d.run.hp > 0) {
      S.run = {
        floor: d.run.floor || 1, depth: d.run.depth || 1,
        hp: d.run.hp, maxHp: d.run.maxHp || C.START_HP,
        gold: d.run.gold || 0, pouch: d.run.pouch || 0, wallet: 0,
        arsenal: (d.run.arsenal && typeof d.run.arsenal === 'object') ? d.run.arsenal : {},
        relics: Array.isArray(d.run.relics) ? d.run.relics.filter(relicById) : [],
        potions: d.run.potions || 0, whet: d.run.whet || 0,
        kills: d.run.kills || 0, goldEarned: d.run.goldEarned || 0,
        map: (d.run.map && d.run.map.rooms && d.run.map.rooms[d.run.map.cur]) ? d.run.map : null,
        room: null,
        keys: (typeof d.run.keys === 'number') ? d.run.keys : C.START_KEYS,
        block: 0, windUsed: false, battleEnt: null,
      };
      for (const k of Object.keys(S.run.arsenal)) {
        if (!itemById(k) || !(S.run.arsenal[k] > 0)) delete S.run.arsenal[k];
      }
      if (!S.run.map || S.run.map.v !== 2) {
        genFloor();                    // pre-corridor saves get a fresh random floor
      } else {
        S.run.room = S.run.map.rooms[S.run.map.cur];
        S.run.depth = (S.run.room.dist || 0) + 1;
      }
      S.meter = d.run.meter || 0;
    }
  } catch (e) {}
}

// ------------------------------------------------------------------- pieces
function kindR(kind) {
  if (kind === 'gem') return 5.2;
  if (kind === 'lucky') return MACH.coin.r + 0.4;
  if (kind === 'item') return 7.6;
  if (kind === 'skull') return 5.6;
  if (kind === 'bag') return 6.2;
  if (kind === 'chest') return 7.0;
  if (kind === 'chip') return MACH.coin.r + 0.2;
  return MACH.coin.r;
}
function kindM(kind) {
  return { gem: 2.2, lucky: 1.2, item: 3.6, skull: 1.6, bag: 2.6, chest: 3.5, chip: 1.1 }[kind] || 1;
}
function mkCoin(x, y, kind, lay, st, tier) {
  tier = tier || 0;
  const td = MACH.tiers[tier];
  return {
    x, y, z: td.z + (lay || 0) * C.COIN_H, vx: 0, vy: 0, vz: 0,
    r: kindR(kind), m: kindM(kind),
    kind, st: st || 'plat', lay: lay || 0, tier,
    rot: rng() * 6.28, vrot: 0, glint: rng() * 7,
    bounces: 0, ttl: 0, scored: false, chk1: false, chk2: false, chkP: false,
    iid: null, temp: false, onPush: false,
  };
}
function place(x, y, kind, lay, st, tier) {
  const c = mkCoin(x, y, kind || 'coin', lay || 0, st || 'plat', tier || 0);
  S.coins.push(c);
  return c;
}
function spawnDrop(x, ty, kind) {
  if (S.coins.length >= MACH.maxCoins) return null;
  const c = mkCoin(x, ty, kind, 0, 'air', 0);
  c.z = C.DROP_Z; c.vz = 0; c.vrot = (rng() - 0.5) * 10;
  S.coins.push(c);
  return c;
}

// ------------------------------------------------------------------ pusher
function pusherFront(ti) {
  const td = MACH.tiers[ti || 0];
  const ph = S.phase + (td.phase || 0);
  return td.min + (td.max - td.min) * (0.5 - 0.5 * Math.cos(ph));
}
function pusherVel(ti) {
  const td = MACH.tiers[ti || 0];
  const ph = S.phase + (td.phase || 0);
  return (td.max - td.min) * 0.5 * Math.sin(ph) * (2 * Math.PI / MACH.pushPeriod);
}
function tierFront(ti) { return MACH.tiers[ti].front; }

// ---------------------------------------------------------- combat effects
// floats can pin to a world x (the machine) or to a named screen anchor
// ('enemy' | 'hero' | 'gold') — the browser maps anchors to screen spots
function floatAt(txt2, wx, col, big) {
  S.floats.push({ txt: txt2, wx: wx === undefined ? 50 : wx, wy: 96, age: 0, max: 1.3, col: col || '#ffd24a', big: !!big });
}
function floatAnchor(txt2, anchor, col, big) {
  S.floats.push({ txt: txt2, anchor, age: 0, max: 1.2, col: col || '#ffd24a', big: !!big });
}
function weaponDmg(base) {
  let d = base + (S.run ? S.run.whet : 0);
  if (hasRelic('whet')) d = Math.round(d * 1.3);
  return d;
}
function dmgEnemy(n, src) {
  if (!S.run || !S.enemy || S.enemy.hp <= 0) return 0;
  n = Math.max(1, Math.round(n));
  S.enemy.hp -= n;
  S.enemy.hitT = 0.3;
  floatAnchor('-' + n, 'enemy', src === 'pois' ? '#b8f26b' : '#ff8a6b', n >= 8);
  if (S.enemy.hp <= 0) winBattle();
  return n;
}
function poisonEnemy(stacks) {
  if (!S.run || !S.enemy || S.enemy.hp <= 0) return 0;
  S.enemy.pois += stacks;
  floatAnchor('☠ +' + stacks, 'enemy', '#b8f26b', stacks >= 3);
  SND.poison();
  return stacks;
}
function stunEnemy(rounds) {
  if (!S.run || !S.enemy || S.enemy.hp <= 0) return;
  S.enemy.stunned += rounds;
  floatAnchor('FROZEN!', 'enemy', '#8be7ff', true);
  SND.stun();
}
function addBlock(n) {
  if (!S.run) return;
  S.run.block += n;
  floatAnchor('\u{1F6E1} +' + n, 'hero', '#c8d6e8', n >= 4);
  SND.block();
}
function healPlayer(n) {
  if (!S.run) return 0;
  const before = S.run.hp;
  S.run.hp = Math.min(S.run.maxHp, S.run.hp + n);
  const got = S.run.hp - before;
  if (got > 0) floatAnchor('+' + got + ' HP', 'hero', '#7ee787', got >= 8);
  SND.heal();
  return got;
}
function addGold(n) {
  if (!S.run) return;
  S.run.gold += n;
  S.run.goldEarned += n;
  floatAnchor('+' + n + ' G', 'gold', '#ffd75e', n >= 15);
}
function addCoins(n) {
  if (!S.run) return;
  S.run.wallet += n;
  floatAnchor('+' + n + ' ●', 'hero', '#f2c04a');
}
// direct hit: curses and poison ignore your shield entirely
function hpHit(n, cause, col) {
  if (!S.run || S.run.hp <= 0) return;
  S.run.hp -= n;
  S.hurtT = 0.45;
  S.shake += Math.min(9, 3 + n * 0.5);
  floatAnchor('-' + n + ' HP', 'hero', col || '#ff5a4e', n >= 6);
  SND.hurt();
  if (S.run.hp <= 0) {
    if (hasRelic('wind') && !S.run.windUsed) {
      S.run.windUsed = true;
      S.run.hp = 1;
      S.banner = { txt: 'SECOND WIND!', ttl: 1.6, max: 1.6 };
      return;
    }
    endRun(cause || 'slain');
  }
}
function hurtPlayer(n, cause) {
  if (!S.run || S.run.hp <= 0) return;
  // block soaks first
  if (S.run.block > 0) {
    const soak = Math.min(S.run.block, n);
    S.run.block -= soak; n -= soak;
    if (soak > 0) { floatAnchor('BLOCKED ' + soak, 'hero', '#c8d6e8'); SND.block(); }
  }
  if (n <= 0) return;
  hpHit(n, cause);
}
function usePotion() {
  if (!S.run || S.run.potions < 1 || S.run.hp >= S.run.maxHp) return false;
  S.run.potions--;
  healPlayer(C.POTION_HEAL, 50);
  SND.buy();
  save();
  return true;
}

// --------------------------------------------------------------- scoring
// Nothing fires on impact any more: the tray COLLECTS. Everything that
// lands there joins the round's loot and resolves when your purse is spent.
// Only the spice — wheel chips and field chests — pops immediately.
function trayAdd(kind, extra) {
  S.tray.items.push({ kind, iid: extra && extra.iid, x: extra ? extra.x : 50 });
  if (S.tray.items.length > 24) S.tray.items.shift();
}
function scoreCoin(c) {
  S.collected++;
  if (c.kind === 'chip') {
    floatAt('WHEEL SPIN!', c.x, '#63e7ff', true);
    S.shake += 4;
    spinWheel();
    burst(c.x, 96, C.TRAY_Z, 'chip');
    return;
  }
  if (c.kind === 'chest') {
    openChest(c);
    return;
  }
  if (!S.battle) return;
  S.battle.loot.push({ k: c.kind, iid: c.iid });
  trayAdd(c.kind, { iid: c.iid, x: c.x });
  S.shake += c.kind === 'item' ? 3 : 1;
  if (c.kind === 'skull') SND.poison();
  else if (c.kind === 'gem' || c.kind === 'bag') SND.gem();
  else SND.collect(1 + (S.battle.loot.length % 5));
  burst(c.x, 96, C.TRAY_Z, c.kind);
}
function openChest(c) {
  const r = rng();
  let txt2;
  if (r < 0.35) {
    const n = 3 + ((rng() * 4) | 0);
    addCoins(n);
    txt2 = 'CHEST: +' + n + ' ● THIS ROUND';
  } else if (r < 0.6) {
    const g = 8 + ((rng() * 8) | 0);
    addGold(g);
    txt2 = 'CHEST: +' + g + ' GOLD';
  } else if (r < 0.8) {
    txt2 = 'CHEST: WHEEL SPIN!';
    spinWheel();
  } else {
    const it = ITEMS[(rng() * 4) | 0];
    grantItem(it.id, 1);
    S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
    txt2 = 'CHEST: ' + it.name + '!';
  }
  floatAt(txt2, c.x, '#ffb0e0', true);
  S.shake += 5;
  SND.gem();
  burst(c.x, 96, C.TRAY_Z, 'chest');
}
function grantItem(iid, n) {
  if (!S.run || !itemById(iid)) return;
  S.run.arsenal[iid] = (S.run.arsenal[iid] || 0) + (n || 1);
}

// FRENZY: filling the meter makes the dungeon rain bonuses on the field
function frenzy() {
  S.meter = 0;
  S.banner = { txt: 'FRENZY!', ttl: 2.2, max: 2.2 };
  S.shake += 8;
  SND.jackpot();
  const kinds = ['coin', 'coin', 'silver', 'coin', 'lucky', 'green', 'bag', 'coin'];
  kinds.forEach((kind, i) => {
    S.rain.push({ t: 0.12 * i, x: 10 + rng() * 80, y: MACH.tiers[0].slotY + rng() * 14, kind });
  });
  // two free (temporary) weapons ride the rain — lose them or use them
  for (let i = 0; i < 2; i++) {
    const it = ITEMS[(rng() * 4) | 0];
    S.rain.push({ t: 1 + 0.3 * i, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
  }
  save();
}

// -------------------------------------------------------------- lucky wheel
const WHEEL = [
  { label: '+5 ●', w: 16, fx: () => { if (S.battle) addCoins(5); else addGold(5); } },
  { label: '+15 G', w: 15, fx: () => addGold(15) },
  { label: 'HEAL 8', w: 13, fx: () => healPlayer(8) },
  { label: 'BLOCK 5', w: 12, fx: () => addBlock(5) },
  { label: 'SMITE', w: 12, fx: () => { if (S.enemy && S.enemy.hp > 0) dmgEnemy(12); else addGold(6); } },
  { label: 'ITEM', w: 9, fx: () => {
      const it = ITEMS[(rng() * ITEMS.length) | 0];
      grantItem(it.id, 1);
      floatAt(it.name + '!', 50, '#ffe066', true);
      if (S.battle) S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
    } },
  { label: '+30 G', w: 7, fx: () => addGold(30) },
  { label: 'FRENZY', w: 8, fx: () => { if (S.screen === 'battle') frenzy(); else addGold(8); } },
];
function spinWheel() {
  const total = WHEEL.reduce((a, s) => a + s.w, 0);
  let r = rng() * total, idx = 0;
  for (let i = 0; i < WHEEL.length; i++) { r -= WHEEL[i].w; if (r <= 0) { idx = i; break; } }
  WHEEL[idx].fx();
  S.wheelAnim = { t: 0, seg: idx, label: WHEEL[idx].label };
  SND.gem();
  save();
  return WHEEL[idx];
}

// -------------------------------------------------------------------- drop
function roundCoins() {
  return C.ROUND_COINS + (S.run ? (S.run.pouch || 0) * C.POUCH_COINS : 0);
}
function drop(x) {
  if (S.screen !== 'battle' || !S.run || S.victory) return false;
  if (!S.battle || S.battle.phase !== 'drop') return false;
  if (S.cd > 0) return false;
  if (S.run.wallet < 1) { S.denyT = 0.6; SND.deny(); return false; }
  S.run.wallet--; S.cd = C.DROP_CD; S.dropped++; S.meter++;
  const pLucky = C.P_LUCKY * (hasRelic('clover') ? 2 : 1);
  const kind = rng() < pLucky ? 'lucky' : 'coin';
  const ax = Math.max(8, Math.min(92, x === undefined ? S.aimX : x));
  spawnDrop(ax + (rng() - 0.5) * 2, MACH.tiers[0].slotY + (rng() - 0.5) * 5, kind);
  SND.slot();
  if (S.meter >= C.METER_MAX) frenzy();
  return true;
}
// what a fresh pile piece is made of (inserts are always gold/lucky;
// the FIELD carries the silver and venom coins you push for)
function rollPileKind() {
  const r = rng();
  const luckyP = C.MIX.lucky * (hasRelic('clover') ? 2 : 1);
  if (r < C.MIX.silver) return 'silver';
  if (r < C.MIX.silver + C.MIX.green) return 'green';
  if (r < C.MIX.silver + C.MIX.green + luckyP) return 'lucky';
  return 'coin';
}

// ------------------------------------------------------------------ battle
function scaleMult() {
  return 1 + 0.07 * (S.run.depth - 1) + 0.35 * (S.run.floor - 1);
}
function enemyPool(depth) {
  // deeper rooms unlock meaner pools
  return Math.min(ENEMIES.length, 4 + depth + (S.run.floor - 1) * 2);
}
function mkEnemy(type, eid) {
  // bosses scale by FLOOR only — their lair sits at max depth by design
  const mult = type === 'boss' ? 1 + 0.35 * (S.run.floor - 1) : scaleMult();
  let base, eliteK = 1;
  if (type === 'boss') {
    base = BOSSES[(S.run.floor - 1) % BOSSES.length];
  } else {
    base = (eid && ENEMIES.find(e => e.id === eid)) || ENEMIES[(rng() * enemyPool(S.run.depth)) | 0];
    if (type === 'elite') eliteK = 1.6;
  }
  const hp = Math.round(base.hp * mult * eliteK);
  return {
    id: base.id, icon: base.icon, name: (type === 'elite' ? 'ELITE ' : '') + base.name,
    hp, maxHp: hp,
    atk: Math.round(base.atk * mult * (type === 'elite' ? 1.3 : 1)),
    trait: base.trait, gold: Math.round(base.gold * mult * (type === 'elite' ? 1.8 : 1)),
    boss: type === 'boss', elite: type === 'elite',
    stunned: 0, pois: 0, hitT: 0, lungeT: 0,
  };
}
function startBattle(type, entIdx, eid) {
  if (!S.run) return false;
  S.run.battleEnt = (entIdx === undefined) ? null : entIdx;
  S.enemy = mkEnemy(type, eid);
  S.battle = { round: 1, phase: 'drop', loot: [], queue: [], qi: 0, qt: 0,
               stolen: 0, et: 0, struck: false };
  S.screen = 'battle';
  S.victory = null;
  S.run.windUsed = false;
  S.pPois = 0;
  S.run.wallet = roundCoins();
  S.run.block = hasRelic('plate') ? 4 : 0;
  initPile();
  S.banner = { txt: S.enemy.boss ? 'BOSS FIGHT!' : S.enemy.name, ttl: 1.8, max: 1.8 };
  SND.door();
  save();
  return true;
}

// ------------------------------------------------------- the round machine
// drop: spend your purse into the machine -> everything the tray catches is
//   this round's loot
// resolve: the loot fires one piece at a time — bank gold, raise the shield,
//   mend, then unleash on the foe; curses last
// enemy: the foe takes its telegraphed turn, then poison ticks, new round
function buildQueue(loot) {
  const q = [];
  for (const l of loot) {
    if (l.k === 'coin') q.push({ t: 'gold' });
    else if (l.k === 'item') {
      const it = itemById(l.iid);
      if (!it) continue;
      const t = it.kind === 'weapon' ? 'weapon' : it.kind === 'poison' ? 'vial'
              : it.kind === 'shield' ? 'shielditem' : it.kind === 'heal' ? 'heartitem' : 'frost';
      q.push({ t, iid: l.iid });
    } else q.push({ t: l.k });
  }
  q.sort((a, b) => RESOLVE_ORDER.indexOf(a.t) - RESOLVE_ORDER.indexOf(b.t));
  return q;
}
function startResolve() {
  const B = S.battle;
  if (!B || B.phase !== 'drop') return false;
  B.phase = 'resolve';
  B.queue = buildQueue(B.loot);
  B.loot = [];
  B.qi = 0;
  B.qt = 0.55;                          // a breath before the first piece flies
  S.tray.items.length = 0;
  if (B.queue.length) S.banner = { txt: 'YOUR TURN!', ttl: 1.0, max: 1.0 };
  return true;
}
// END TURN: the player ends their drop phase whenever they like — spent
// purse or coins still to spend — and the tray resolves what it caught
function endRoundNow() {
  if (!S.battle || S.battle.phase !== 'drop' || !S.run) return false;
  return startResolve();
}
function applyLoot(q) {
  if (!S.run) return;
  if (q.t === 'gem') addGold(15);
  else if (q.t === 'bag') addGold(8);
  else if (q.t === 'silver') addBlock(1);
  else if (q.t === 'shielditem') addBlock(itemById(q.iid).block);
  else if (q.t === 'heartitem') healPlayer(itemById(q.iid).heal);
  else if (q.t === 'gold') { dmgEnemy(C.DMG.gold); SND.collect(2); }
  else if (q.t === 'lucky') { dmgEnemy(C.DMG.lucky); SND.gem(); }
  else if (q.t === 'weapon') {
    const it = itemById(q.iid);
    floatAt(it.name + '!', 50, '#ffe066', true);
    dmgEnemy(weaponDmg(it.dmg));
    S.shake += it.splash ? 8 : 5;
    SND.hit();
  } else if (q.t === 'green') poisonEnemy(1);
  else if (q.t === 'vial') poisonEnemy(itemById(q.iid).pois + (hasRelic('venom') ? 2 : 0));
  else if (q.t === 'frost') stunEnemy(itemById(q.iid).stun);
  else if (q.t === 'skull') {
    floatAnchor('CURSED!', 'hero', '#c86bff', true);
    hpHit(C.SKULL_DMG + S.run.floor - 1, 'a cursed skull', '#c86bff');
  }
  if (window.__dpResolveFx) window.__dpResolveFx(q);
}
function enemyAct() {
  const e = S.enemy;
  if (!e || e.hp <= 0 || !S.run) return;
  if (e.stunned > 0) {
    e.stunned--;
    floatAnchor('FROZEN — turn skipped', 'enemy', '#8be7ff', true);
    SND.stun();
    return;
  }
  e.lungeT = 0.4;
  const hits = e.trait === 'fast' ? 2 : 1;
  for (let h = 0; h < hits && S.run; h++) {
    if (e.trait === 'thief') {
      S.battle.stolen += 2;
      floatAnchor('purse cut! -2 ● next round', 'hero', '#ff9d3c', true);
    }
    if (e.trait === 'venom') {
      S.pPois += 2;
      floatAnchor('POISONED!', 'hero', '#b8f26b', true);
    }
    if (e.trait === 'curse') {
      S.rain.push({ t: 0.3 + h * 0.2, x: 15 + rng() * 70, y: MACH.tiers[0].slotY + 4 + rng() * 10, kind: 'skull' });
    }
    hurtPlayer(e.atk, 'slain by ' + (e.name || 'the dungeon'));
  }
}
function endRoundTicks() {
  const e = S.enemy;
  if (e && e.hp > 0) {
    if (e.pois > 0) { const s = e.pois; e.pois--; dmgEnemy(s, 'pois'); }
    if (e.hp > 0 && e.trait === 'regen' && e.hp < e.maxHp) {
      e.hp = Math.min(e.maxHp, e.hp + 3);
      floatAnchor('+3', 'enemy', '#7ee787');
    }
  }
  if (S.run && S.pPois > 0) {
    const s = S.pPois; S.pPois--;
    hpHit(s, 'poison', '#b8f26b');
  }
}
function newRound() {
  const B = S.battle;
  B.round++;
  B.phase = 'drop';
  B.loot = []; B.queue = []; B.qi = 0; B.struck = false;
  // block melts between rounds — unless the Aegis holds it
  S.run.block = (hasRelic('aegis') ? S.run.block : 0) + (hasRelic('plate') ? 4 : 0);
  S.run.wallet = Math.max(3, roundCoins() - B.stolen);
  B.stolen = 0;
  // the dungeon re-salts the pile so long fights never run dry
  for (let i = 0; i < C.ROUND_RAIN; i++) {
    S.rain.push({ t: 0.15 * i, x: 12 + rng() * 76, y: MACH.tiers[0].slotY + rng() * 12, kind: rollPileKind() });
  }
  S.banner = { txt: 'ROUND ' + B.round, ttl: 1.3, max: 1.3 };
  save();
}
function battleTick(dt) {
  const e = S.enemy, B = S.battle;
  if (!B || !S.run) return;
  if (e) {
    if (e.hitT > 0) e.hitT -= dt;
    if (e.lungeT > 0) e.lungeT -= dt;
  }
  if (S.victory) return;
  if (B.phase === 'drop') {
    // the tray never resolves itself — the END TURN button is yours to press
  } else if (B.phase === 'resolve') {
    B.qt -= dt;
    if (B.qt <= 0) {
      if (B.qi < B.queue.length) {
        const q = B.queue[B.qi];
        B.qi++;
        applyLoot(q);
        if (!S.run || S.victory) return;
        B.qt = RESOLVE_DELAY[q.t] || 0.5;
      } else {
        B.phase = 'enemy';
        B.et = 1.1;
        B.struck = false;
      }
    }
  } else if (B.phase === 'enemy') {
    B.et -= dt;
    if (!B.struck && B.et <= 0.6) {
      B.struck = true;
      enemyAct();
      if (!S.run || S.victory) return;
    }
    if (B.et <= 0) {
      endRoundTicks();
      if (S.run && S.enemy && S.enemy.hp > 0 && !S.victory) newRound();
    }
  }
}
function winBattle() {
  const e = S.enemy;
  let gold = e.gold + (hasRelic('piggy') ? 4 : 0);
  S.run.kills++;
  addGold(gold, 50);
  // every slain monster coughs up dungeon keys
  const keys = e.boss ? C.KEY_BOSS : e.elite ? C.KEY_ELITE : C.KEY_KILL;
  S.run.keys += keys;
  floatAt('+' + keys + ' KEY' + (keys > 1 ? 'S' : '') + ' \u{1F5DD}', 50, '#ffd75e', true);
  S.victory = { t: 0, gold, keys, boss: e.boss };
  S.banner = { txt: 'VICTORY!', ttl: 2.2, max: 2.2 };
  S.shake += 8;
  SND.winb();
  if (e.boss) {
    const h = Math.round(S.run.maxHp * 0.35);
    healPlayer(h, 50);
  }
  bestify();
  save();
}
// tap CONTINUE on the victory overlay: back to the top-down room
function leaveBattle() {
  if (!S.run || S.screen !== 'battle' || !S.victory) return false;
  const boss = S.victory.boss;
  const ei = S.run.battleEnt;
  if (S.run.room && ei !== null && S.run.room.ents[ei]) S.run.room.ents[ei].done = true;
  S.victory = null; S.enemy = null; S.battle = null; S.run.battleEnt = null;
  S.coins.length = 0;
  if (boss) {              // the lair opens: stairs down appear where it fell
    S.run.room.ents = [{ kind: 'stairs', done: false, px: 0.5, py: 0.4 }];
    S.banner = { txt: 'THE STAIRS APPEAR', ttl: 1.8, max: 1.8 };
  }
  S.screen = 'dungeon';
  save();
  return true;
}
function bestify() {
  const b = S.best, r = S.run;
  if (!r) return;
  if (r.floor > b.floor || (r.floor === b.floor && r.depth > b.depth)) { b.floor = r.floor; b.depth = r.depth; }
  if (r.kills > b.kills) b.kills = r.kills;
  if (r.goldEarned > b.gold) b.gold = r.goldEarned;
}
function endRun(cause) {
  bestify();
  S.over = {
    cause: cause || 'fell',
    floor: S.run.floor, depth: S.run.depth, kills: S.run.kills, gold: S.run.goldEarned,
  };
  S.run = null;
  S.enemy = null;
  S.battle = null;
  S.victory = null;
  S.room = null;
  S.screen = 'over';
  SND.dead();

// ----------------------------------------------------------------- dungeon
// The dungeon is a top-down crawl: each room holds 1-3 inhabitants (monsters,
// chests, a shopkeeper, a blacksmith, a shrine, the wheel ghost) and locked
// exit doors. Unlocking a door EATS A KEY (once — then it stays open for
// backtracking); slain monsters cough keys up. The floor is a real MAP:
// rooms persist, and the minimap uncovers as you explore.
function newRun() {
  S.run = {
    floor: 1, depth: 1, hp: C.START_HP, maxHp: C.START_HP,
    gold: 0, pouch: 0, wallet: 0, keys: C.START_KEYS,
    arsenal: { sword: 1, shield: 1, vial: 1 },
    relics: [], potions: C.START_POTIONS, whet: 0,
    kills: 0, goldEarned: 0, map: null, room: null, block: 0, windUsed: false, battleEnt: null,
  };
  S.enemy = null; S.victory = null; S.room = null; S.over = null;
  S.meter = 0; S.pPois = 0;
  S.coins.length = 0; S.floats.length = 0; S.rain.length = 0;
  genFloor();
  S.screen = 'dungeon';
  save();
  return S.run;
}
function toast(txt2) { S.toast = { txt: txt2, t: 2.6 }; }
// roll the 1-3 inhabitants of a room at the given distance from the stairs
function genEnts(dist) {
  const r = rng();
  const n = r < 0.38 ? 1 : r < 0.82 ? 2 : 3;
  const ents = [];
  const SVC = [['chest', 30], ['shop', 22], ['smith', 16], ['shrine', 18], ['wheel', 12]];
  for (let i = 0; i < n; i++) {
    const avail = SVC.filter(s => !ents.some(e => e.kind === s[0]));
    if (rng() < 0.55 || !avail.length) {
      const mtype = dist >= 2 && rng() < 0.22 ? 'elite' : 'battle';
      const eid = ENEMIES[(rng() * enemyPool(dist + 1)) | 0].id;
      ents.push({ kind: 'monster', mtype, eid, done: false });
    } else {
      const total = avail.reduce((a, s) => a + s[1], 0);
      let rr2 = rng() * total, pick = avail[0][0];
      for (const [kind, wt] of avail) { rr2 -= wt; if (rr2 <= 0) { pick = kind; break; } }
      ents.push({ kind: pick, done: false });
    }
  }
  return ents;
}
// ------------------------------------------------------------ the floor map
const DIRS = { n: [0, -1], s: [0, 1], e: [1, 0], w: [-1, 0] };
const OPP = { n: 's', s: 'n', e: 'w', w: 'e' };
function rkey(x, y) { return x + ',' + y; }
function lkey(x1, y1, x2, y2) {
  return (y1 < y2 || (y1 === y2 && x1 < x2))
    ? x1 + ',' + y1 + '~' + x2 + ',' + y2
    : x2 + ',' + y2 + '~' + x1 + ',' + y1;
}
// scatter the room's dwellers so there is space to walk between them
function placeEnts(ents) {
  const spots = [];
  for (const e of ents) {
    for (let tries = 0; tries < 12; tries++) {
      const px = 0.16 + rng() * 0.68, py = 0.14 + rng() * 0.56;
      if (spots.every(s => Math.hypot(s[0] - px, s[1] - py) > 0.26)) {
        e.px = px; e.py = py;
        spots.push([px, py]);
        break;
      }
      if (tries === 11) { e.px = 0.5; e.py = 0.4; }
    }
  }
  return ents;
}
// carve this floor like a tabletop blueprint: a random walk of rooms of
// varying sizes, connected only where CORRIDORS were dug (plus a few extra
// loops) — so the dungeon has dead ends and winding paths, not a lattice.
// The boss lairs at the farthest room; every room's dwellers are rolled up
// front (the map exists — the fog just hides it).
function rollSize() {
  const r = rng();
  return r < 0.35 ? 's' : r < 0.57 ? 'w' : r < 0.79 ? 't' : 'b';
}
function genFloor() {
  if (!S.run) return null;
  // every floor rolls its own bones: size, sprawl and loopiness all vary
  const target = 9 + ((rng() * 4) | 0) + Math.min(3, S.run.floor - 1);
  const loopP = 0.18 + rng() * 0.27;
  const rooms = { '0,0': { gx: 0, gy: 0, ents: [], visited: true, dist: 0, boss: false, size: rng() < 0.5 ? 's' : 'w' } };
  const links = {};
  const keys2 = ['0,0'];
  let guard = 0;
  while (keys2.length < target && guard++ < 400) {
    const from = rooms[keys2[(rng() * keys2.length) | 0]];
    const dir = ['n', 's', 'e', 'w'][(rng() * 4) | 0];
    const nx = from.gx + DIRS[dir][0], ny = from.gy + DIRS[dir][1];
    if (rooms[rkey(nx, ny)]) continue;
    rooms[rkey(nx, ny)] = { gx: nx, gy: ny, ents: [], visited: false, dist: 0, boss: false, size: rollSize() };
    // the corridor that was dug to reach it
    links[lkey(from.gx, from.gy, nx, ny)] = { open: false };
    keys2.push(rkey(nx, ny));
  }
  // a few extra loop corridors between rooms that happen to touch
  for (const k of keys2) {
    const r = rooms[k];
    for (const d of ['s', 'e']) {
      const nk = rkey(r.gx + DIRS[d][0], r.gy + DIRS[d][1]);
      if (!rooms[nk]) continue;
      const lk = lkey(r.gx, r.gy, rooms[nk].gx, rooms[nk].gy);
      if (!links[lk] && rng() < loopP) links[lk] = { open: false };
    }
  }
  // distances from the start, walking the CORRIDORS
  const q = ['0,0'];
  const seen = { '0,0': true };
  while (q.length) {
    const r = rooms[q.shift()];
    for (const d of ['n', 's', 'e', 'w']) {
      const k = rkey(r.gx + DIRS[d][0], r.gy + DIRS[d][1]);
      if (rooms[k] && !seen[k] && links[lkey(r.gx, r.gy, rooms[k].gx, rooms[k].gy)]) {
        seen[k] = true; rooms[k].dist = r.dist + 1; q.push(k);
      }
    }
  }
  // the boss takes the farthest room, and lairs LARGE
  let bossK = '0,0';
  for (const k of keys2) if (rooms[k].dist > rooms[bossK].dist) bossK = k;
  for (const k of keys2) {
    const r = rooms[k];
    if (k === bossK) {
      r.boss = true;
      r.size = 'b';
      r.ents = placeEnts([{ kind: 'monster', mtype: 'boss', done: false }]);
    } else if (k === '0,0') {
      r.ents = rng() < 0.6 ? placeEnts([{ kind: 'chest', done: false }]) : [];
    } else {

    }
  }

  S.run.room = rooms['0,0'];
  S.run.depth = 1;
  S.enterDir = null;
  S.roomStamp++;

}
function curRoom() { return S.run && S.run.map ? S.run.map.rooms[S.run.map.cur] : null; }
// the room behind this wall — only if a corridor actually leads there
function doorTo(dir, from) {
  const r = from || curRoom();
  if (!r) return null;
  const nb = S.run.map.rooms[rkey(r.gx + DIRS[dir][0], r.gy + DIRS[dir][1])];
  if (!nb) return null;
  return S.run.map.links[lkey(r.gx, r.gy, nb.gx, nb.gy)] ? nb : null;
}
function linkOpen(a, b) {
  const l = S.run.map.links[lkey(a.gx, a.gy, b.gx, b.gy)];
  return !!(l && l.open);
}
// never stranded: key-broke with nothing left to slay in the uncovered
// map -> a wanderer finds YOU

// ------------------------------------------------------------- simulation

    const dx = o.x - c.x, dy = o.y - c.y;

function step(dt, quiet) {

          c.z = td.z + C.PUSH_H; c.vz = 0;

          c.vy += (rng() - 0.5) * 3;
          if (!quiet) SND.clink();
          continue;
        }
      }

      }
      if (!c.chk1 && c.z <= td.z + C.COIN_H) {

      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }

  if (S.uiFlash) {

function tick(dt) {

  // ------------------------------------------------------------------ audio
  let AC = null, master = null, noiseBuf = null;
  function audioInit() {
    if (AC) return;
    const A = window.AudioContext || window.webkitAudioContext;
    if (!A) return;
    try {
      AC = new A();
      master = AC.createGain();
      master.gain.value = 0.5;
      master.connect(AC.destination);
      const len = AC.sampleRate * 0.2;
      noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
      const ch = noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    } catch (e) { AC = null; }
  }
  function tone(f, dur, type, vol, f2) {
    if (!AC || S.mute) return;
    const t0 = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t0);
    if (f2) o.frequency.exponentialRampToValueAtTime(Math.max(f2, 30), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, vol, hp) {
    if (!AC || S.mute || !noiseBuf) return;
    const t0 = AC.currentTime;
    const src = AC.createBufferSource(); src.buffer = noiseBuf;
    const flt = AC.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = hp;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(flt); flt.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur + 0.02);
  }

  // --------------------------------------------------------------- viewport
  const LW = 480, LH = 840;
  let scale = 1, offX = 0, offY = 0;
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    scale = Math.min(canvas.width / LW, canvas.height / LH);
    offX = (canvas.width - LW * scale) / 2;
    offY = (canvas.height - LH * scale) / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  const PF = { top: 238, bot: 596, cx: LW / 2, w0: 240, w1: 442 };
  function eyd(y) {
    const t = Math.max(0, Math.min(y / 100, 1.18));
    return t * (0.72 + 0.28 * Math.min(t, 1));
  }
  function w2s(x, y, z) {
    const e = eyd(y);
    const half = (PF.w0 + (PF.w1 - PF.w0) * Math.min(e, 1)) / 2;
    const u = half * 2 / 100;
    z = z || 0;
    let off;
    if (z >= 0) off = u * (0.5 * Math.min(z, 12) + 0.62 * Math.max(0, z - 12));
    else off = u * z;
    return { x: PF.cx + (x - 50) * u, y: PF.top + (PF.bot - PF.top) * e - off, u };
  }

  // ------------------------------------------------------------------ input
  let uiButtons = [];   // rebuilt by every draw pass
  function hit(px, py) {
    for (let i = uiButtons.length - 1; i >= 0; i--) {
      const b = uiButtons[i];
      if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { b.cb(); return true; }
    }
    return false;
  }
  let held = false, holdT = 0;
  function toLogical(ev) {
    const r = canvas.getBoundingClientRect();
    const dpr = canvas.width / r.width;
    return {
      x: ((ev.clientX - r.left) * dpr - offX) / scale,
      y: ((ev.clientY - r.top) * dpr - offY) / scale,
    };
  }
  function aimFrom(p) {
    const e = eyd(MACH.tiers[0].slotY);
    const half = (PF.w0 + (PF.w1 - PF.w0) * e) / 2;
    const u = half * 2 / 100;
    S.aimX = Math.max(8, Math.min(92, 50 + (p.x - PF.cx) / u));
  }
  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    audioInit();
    if (AC && AC.state === 'suspended') AC.resume();
    const p = toLogical(ev);
    if (hit(p.x, p.y)) return;
    if (S.screen === 'battle' && !S.victory) {
      aimFrom(p);
      drop(S.aimX);
      held = true; holdT = 0;
    } else if (S.screen === 'dungeon' && !S.room && p.y > 130 && p.y < 700) {
      // the thumb-stick springs up wherever you touch

    const p00 = w2s(0, y0, z), p10 = w2s(100, y0, z);
    const p01 = w2s(0, y1, z), p11 = w2s(100, y1, z);
    poly([p00, p10, p11, p01]);
    ctx.fillStyle = lgr('fl:' + fkey() + ':' + (p00.y | 0) + ':' + (p01.y | 0),
      0, p00.y, 0, p01.y, [[0, T.floorA], [1, T.floorB]]);
    ctx.fill();
    ctx.save();
    ctx.clip();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#dfe5ee';
    ctx.lineWidth = 1;
    for (const s of SCRATCH) {
      if (s.y1 < y0 || s.y1 > y1) continue;
      const a = w2s(s.x1, s.y1, z), b = w2s(s.x2, s.y2, z);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.restore();
  }

  // full-length guard rails: this machine never eats a piece off the sides
  function drawSideRails() {
    const front = tierFront(0);
    for (const side of [0, 1]) {
      const x0 = side ? 100 : 0;
      const r1 = w2s(x0, 2, 2.4), r2 = w2s(x0, front, 2.4), r3 = w2s(x0, front, 0), r4 = w2s(x0, 2, 0);
      poly([r1, r2, r3, r4]);
      const rg = ctx.createLinearGradient(0, r1.y, 0, r3.y);
      rg.addColorStop(0, '#aeb6c2'); rg.addColorStop(1, '#5a616c');
      ctx.fillStyle = rg; ctx.fill();
      ctx.strokeStyle = 'rgba(240,246,255,0.55)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(r1.x, r1.y); ctx.lineTo(r2.x, r2.y); ctx.stroke();
    }
  }

  function drawLip() {
    const front = tierFront(0);
    const a = w2s(0, front - MACH.lipW, 0), b = w2s(100, front - MACH.lipW, 0);
    const c2 = w2s(100, front, MACH.lipH), d = w2s(0, front, MACH.lipH);
    poly([a, b, c2, d]);
    const g = ctx.createLinearGradient(0, a.y, 0, c2.y);
    g.addColorStop(0, 'rgba(255,255,255,0.05)');
    g.addColorStop(1, 'rgba(255,255,255,0.22)');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
  }

  function drawPusherBlock(t) {
    const td = MACH.tiers[0];
    const pf = pusherFront(0);
    const zTop = td.z + C.PUSH_H, zBot = td.z;
    const tl = w2s(1, td.back, zTop), tr = w2s(99, td.back, zTop);
    const fl = w2s(1, pf, zTop), frt = w2s(99, pf, zTop);
    const bl = w2s(1, pf, zBot), br = w2s(99, pf, zBot);
    poly([tl, tr, frt, fl]);
    const tg = ctx.createLinearGradient(0, tl.y, 0, fl.y);
    tg.addColorStop(0, '#8b93a0'); tg.addColorStop(1, '#b8bfca');
    ctx.fillStyle = tg; ctx.fill();
    ctx.save();
    ctx.clip();
    txt('▼ PUSH ▼', LW / 2, (tl.y + fl.y) / 2,
        '900 ' + Math.max(10, (fl.y - tl.y) * 0.5) + 'px Verdana, sans-serif', 'rgba(120,40,50,0.5)');
    ctx.restore();
    poly([fl, frt, br, bl]);
    const fg = ctx.createLinearGradient(0, fl.y, 0, bl.y);
    fg.addColorStop(0, '#697180'); fg.addColorStop(0.5, '#4c525e'); fg.addColorStop(1, '#33383f');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(230,238,250,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
    const on = Math.floor(t * 4) % 2 === 0;
    ctx.fillStyle = on ? '#ff5a4e' : '#5b2320';
    for (let i = 0; i < 8; i++) {
      const u = (i + 0.5) / 8;
      const x = fl.x + (frt.x - fl.x) * u;
      const y = (fl.y + bl.y) / 2;
      ctx.beginPath(); ctx.arc(x, y, 2.2, 0, 7); ctx.fill();
    }
  }

  // ---------------------------------------------------------- battle: pieces
  const ITEM_GLOW = { weapon: '#ffb46b', poison: '#b8f26b', shield: '#c8d6e8', heal: '#ff8da1', stun: '#8be7ff' };
  function drawCoin(c, t) {
    let zv = c.z;
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const p2 = (c.y - (front - MACH.lipW)) / MACH.lipW;
      if (p2 > 0) zv += Math.min(p2, 1) * MACH.lipH;
    }
    const p = w2s(c.x, Math.min(c.y, 108), zv);
    const u = p.u;
    const rx = c.r * u;
    let ry = rx * 0.46;
    let tumble = 1;
    if (c.st === 'fall' || c.st === 'air') {
      tumble = Math.max(0.22, Math.abs(Math.cos(c.rot)));
      ry = rx * 0.46 * tumble + rx * 0.10 * (1 - tumble);
    }
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const over = (c.y - (front - c.r)) / c.r;
      if (over > 0) ry *= 1 + Math.min(over, 1) * 0.18;
    }
    ctx.save();
    if (c.st === 'tray') ctx.globalAlpha = Math.max(0, Math.min(1, c.ttl / 0.6));
    if ((c.st === 'plat' || c.st === 'air') && !c.onPush) {
      const td = MACH.tiers[c.tier];
      if (c.z > td.z + 0.5) {
        const sp = w2s(c.x, Math.min(c.y, 108), td.z);
        ctx.beginPath();
        ctx.ellipse(sp.x, sp.y, rx * Math.max(0.4, 1 - (c.z - td.z) * 0.006), ry * Math.max(0.4, 1 - (c.z - td.z) * 0.006), 0, 0, 7);
        ctx.fillStyle = 'rgba(10,10,16,0.28)';
        ctx.fill();
      }
    }
    if (c.kind === 'gem') { drawGem(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'item' || c.kind === 'chest' || c.kind === 'bag' || c.kind === 'skull') {
      drawItem(c, p, rx, t); ctx.restore(); return;
    }
    if (c.kind === 'chip') { drawChip(c, p, rx, ry, t); ctx.restore(); return; }
    const lucky = c.kind === 'lucky';
    const pal = COIN_PALS[c.kind] || COIN_PALS.coin;
    const sym = COIN_SYMS[c.kind] || '⚔';
    const pop = c.popT > 0 ? 1 + 0.22 * (c.popT / 0.18) : 1;
    const drx = rx * pop, dry = ry * pop;
    const spr = flatSprite(c.kind, pal, sym);
    const hs = dry / (drx * 0.4583);
    const w = drx * (96 / 44), h = (66 / 96) * w * hs;
    ctx.drawImage(spr, p.x - w / 2, p.y - (24 / 66) * h, w, h);
    const gph = (t * 0.5 + c.glint) % (Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, drx * 0.9, dry * 0.9, 0, gph, gph + 0.9);
    ctx.strokeStyle = 'rgba(255,252,230,0.85)'; ctx.lineWidth = 1.6;
    ctx.stroke();
    if (lucky && (t * 0.9 + c.glint) % 2.3 < 0.12) {
      ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 1.4;
      const sx2 = p.x + drx * 0.4, sy2 = p.y - dry * 0.4;
      ctx.beginPath();
      ctx.moveTo(sx2 - 5, sy2); ctx.lineTo(sx2 + 5, sy2);
      ctx.moveTo(sx2, sy2 - 5); ctx.lineTo(sx2, sy2 + 5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGem(c, p, rx, t) {
    ctx.translate(p.x, p.y);
    const s = rx * 1.15;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.62);
    ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.lineTo(0, s * 0.62);
    ctx.lineTo(-s * 0.72, -s * 0.1);
    ctx.closePath();
    const g = ctx.createLinearGradient(-s, -s, s, s);
    g.addColorStop(0, '#d8fbff'); g.addColorStop(0.45, '#4ecbe8'); g.addColorStop(1, '#1b6fa8');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = '#0d3f66'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.72, -s * 0.1); ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.moveTo(0, -s * 0.62); ctx.lineTo(0, s * 0.62);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.stroke();
    if ((t + c.glint) % 1.6 < 0.14) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3 - 5, -s * 0.3); ctx.lineTo(-s * 0.3 + 5, -s * 0.3);
      ctx.moveTo(-s * 0.3, -s * 0.3 - 5); ctx.lineTo(-s * 0.3, -s * 0.3 + 5);
      ctx.stroke();
    }
  }

  // arsenal items / chests / gold bags / cursed skulls: emoji riding the pile
  function drawItem(c, p, rx, t) {
    const it = c.kind === 'item' ? itemById(c.iid) : null;
    const icon = c.kind === 'chest' ? '\u{1F381}' : c.kind === 'bag' ? '\u{1F4B0}'
               : c.kind === 'skull' ? '☠\u{FE0F}' : (it ? it.icon : '❓');
    const bob = c.st === 'plat' ? Math.sin(t * 2 + c.glint) * 1.2 : 0;
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.35, rx * 1.05, rx * 0.45, 0, 0, 7);
    ctx.fillStyle = 'rgba(20,12,8,0.45)'; ctx.fill();
    ctx.save();
    ctx.translate(p.x, p.y - rx * 0.4 + bob);
    if (c.st === 'fall' || c.st === 'air') ctx.rotate(Math.sin(c.rot) * 0.3);
    txt(icon, 0, 0, Math.round(rx * (c.kind === 'item' ? 2.6 : 2.2)) + 'px serif', '#fff');
    ctx.restore();
    // glow ring: friendly gold for loot, sickly purple for curses
    const glow = c.kind === 'skull' ? '#c86bff'
               : c.kind === 'chest' ? '#ffb0e0'
               : c.kind === 'bag' ? '#ffd75e'
               : (it ? ITEM_GLOW[it.kind] || '#ffe066' : '#ffe066');
    ctx.globalAlpha = 0.30 + 0.18 * Math.sin(t * 3 + c.glint);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.3, rx * 1.25, rx * 0.55, 0, 0, 7);
    ctx.strokeStyle = glow;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    if (c.temp && c.st === 'plat') {
      txt('FREE', p.x, p.y - rx * 1.6, '800 8px Verdana, sans-serif', '#ffe066');
    }
  }

  function drawChip(c, p, rx, ry, t) {
    const edgeH = Math.max(1.5, C.COIN_H * p.u * 0.5);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + edgeH, rx, ry, 0, 0, 7);
    ctx.fillStyle = '#0c4a5e'; ctx.fill();
    ctx.fillRect(p.x - rx, p.y, rx * 2, edgeH);
    const g = ctx.createRadialGradient(p.x - rx * 0.3, p.y - ry * 0.4, rx * 0.1, p.x, p.y, rx * 1.2);
    g.addColorStop(0, '#e8fdff'); g.addColorStop(0.5, '#57d8f0'); g.addColorStop(1, '#1a7ca0');
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, 7);
    ctx.fillStyle = g; ctx.fill();
    const hue = (t * 140 + c.glint * 60) % 360;
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'hsl(' + hue + ',95%,65%)';
    ctx.stroke();
    if (ry > 3) {
      txt('W', p.x, p.y + 0.5, '900 ' + Math.max(6, ry * 1.1) + 'px Verdana, sans-serif', 'rgba(8,50,66,0.9)');
    }
  }

  function drawFrontAndTray() {
    const front = tierFront(0);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    ctx.beginPath();
    ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y);
    ctx.lineTo(r.x + 4, 648); ctx.lineTo(l.x - 4, 648);
    ctx.closePath();
    ctx.fillStyle = lgr('ff:' + fkey() + ':' + (l.y | 0), 0, l.y, 0, 648,
      [[0, '#5c5766'], [0.15, '#3a3542'], [1, '#221d28']]);
    ctx.fill();
    ctx.strokeStyle = 'rgba(235,240,250,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y); ctx.stroke();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(l.x, l.y + 3); ctx.lineTo(r.x, r.y + 3);
    ctx.lineTo(r.x + 1, l.y + 12); ctx.lineTo(l.x - 1, l.y + 12);
    ctx.closePath(); ctx.clip();
    for (let x = l.x - 20; x < r.x + 20; x += 18) {
      ctx.fillStyle = 'rgba(240,190,60,0.5)';
      ctx.beginPath();
      ctx.moveTo(x, l.y + 12); ctx.lineTo(x + 9, l.y + 12);
      ctx.lineTo(x + 18, l.y + 2); ctx.lineTo(x + 9, l.y + 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    rr(58, 648, LW - 116, 52, 14);
    ctx.fillStyle = lgr('tray', 0, 648, 0, 700, [[0, '#120a12'], [1, '#2a1c24']]);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#c99ab0'; ctx.stroke();
    // the round's loot rattles around the tray until it resolves
    const items = S.tray.items;
    const trayGlow = S.battle && S.battle.loot.length > 0;
    if (trayGlow) {
      ctx.save();
      ctx.globalAlpha = 0.10 + 0.06 * Math.sin(S.time * 5);
      rr(58, 648, LW - 116, 52, 14);
      ctx.fillStyle = '#ffae34'; ctx.fill();
      ctx.restore();
    }
    const TRAY_COL = { coin: '#f2c04a', lucky: '#ffdf6b', silver: '#c3ccd6', green: '#8ed67e' };
    items.forEach((it, i) => {
      const px = LW / 2 + Math.sin(i * 2.399) * (18 + ((i * 7) % 130));
      const py = 686 - (i % 3) * 6;
      if (it.kind === 'item') {
        const def = itemById(it.iid);
        txt(def ? def.icon : '❓', px, py - 8, '20px serif', '#fff');
      } else if (it.kind === 'skull') {
        txt('☠\u{FE0F}', px, py - 8, '16px serif', '#fff');
      } else if (it.kind === 'gem') {
        ctx.beginPath(); ctx.ellipse(px, py - 2, 8, 5, 0, 0, 7);
        ctx.fillStyle = '#4ecbe8'; ctx.fill();
      } else if (it.kind === 'bag') {
        txt('\u{1F4B0}', px, py - 8, '18px serif', '#fff');
      } else {
        ctx.beginPath(); ctx.ellipse(px, py, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = '#8a5f10'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(px, py - 2, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = TRAY_COL[it.kind] || '#f2c04a';
        ctx.fill();
        ctx.strokeStyle = 'rgba(120,80,12,0.7)'; ctx.lineWidth = 0.8; ctx.stroke();
      }
    });
  }

  function drawGlass(t) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(26, 172, LW - 52, 470);
    ctx.clip();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#ffffff';
    poly([{ x: 60, y: 172 }, { x: 150, y: 172 }, { x: -40, y: 642 }, { x: -130, y: 642 }]);
    ctx.fill();
    poly([{ x: 320, y: 172 }, { x: 355, y: 172 }, { x: 165, y: 642 }, { x: 130, y: 642 }]);
    ctx.fill();
    const sx = ((t * 40) % (LW + 400)) - 200;
    ctx.globalAlpha = 0.09;
    poly([{ x: sx, y: 172 }, { x: sx + 60, y: 172 }, { x: sx - 130, y: 642 }, { x: sx - 190, y: 642 }]);
    ctx.fill();
    ctx.globalAlpha = 0.05;
    ctx.beginPath();
    ctx.ellipse(LW / 2, 130, 300, 70, 0, 0, Math.PI);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles(dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = S.parts.length - 1; i >= 0; i--) {
      const p = S.parts[i];
      p.life += dt;
      if (p.life >= p.max) { S.parts.splice(i, 1); continue; }
      p.vy += p.g * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      ctx.globalAlpha = 1 - p.life / p.max;
      ctx.fillStyle = p.col;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.spin * p.life * 4);
      const s = p.sz;
      if (p.shape === 'heart') {
        ctx.beginPath();
        ctx.moveTo(0, s * 0.7);
        ctx.bezierCurveTo(-s * 1.3, -s * 0.3, -s * 0.5, -s * 1.1, 0, -s * 0.3);
        ctx.bezierCurveTo(s * 0.5, -s * 1.1, s * 1.3, -s * 0.3, 0, s * 0.7);
        ctx.fill();
      } else if (p.shape === 'star') {
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s * 0.3, -s * 0.3); ctx.lineTo(s, 0); ctx.lineTo(s * 0.3, s * 0.3);
        ctx.lineTo(0, s); ctx.lineTo(-s * 0.3, s * 0.3); ctx.lineTo(-s, 0); ctx.lineTo(-s * 0.3, -s * 0.3);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-s / 2, -s / 2, s, s);
      }
      ctx.restore();
    }
    ctx.restore();
  }

  // ------------------------------------------------------------- ambience
  // drifting dust motes and a soft vignette put the dungeon in the air
  const MOTES = [];
  {
    const old = rngState; srand(4242);
    for (let i = 0; i < 34; i++) {
      MOTES.push({ x: rng() * LW, y: rng() * LH, r: 0.8 + rng() * 1.8,
                   vx: (rng() - 0.5) * 7, vy: -4 - rng() * 9, ph: rng() * 7 });
    }
    rngState = old;
  }
  function drawMotes(dt, warm) {
    ctx.save();
    for (const m of MOTES) {
      m.x += m.vx * dt; m.y += m.vy * dt;
      if (m.y < -6) { m.y = LH + 6; m.x = Math.random() * LW; }
      if (m.x < -6) m.x = LW + 6;
      if (m.x > LW + 6) m.x = -6;
      ctx.globalAlpha = 0.10 + 0.08 * Math.sin(S.time * 1.4 + m.ph);
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7);
      ctx.fillStyle = warm ? '#ffd9a0' : '#c8d8f0';
      ctx.fill();
    }
    ctx.restore();
  }
  function drawVignette(strength) {
    ctx.save();
    const g = rgr('vig', LW / 2, LH / 2, 240, LW / 2, LH / 2, 620,
      [[0, 'rgba(8,4,10,0)'], [1, 'rgba(8,4,10,0.9)']]);
    ctx.globalAlpha = strength || 0.5;
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, LW, LH);
    ctx.restore();
  }

  // floats pin to the machine (wx) or to a screen anchor: the foe, your
  // hero, or the gold counter — so resolve numbers pop where they land
  const ANCHORS = { enemy: { x: LW / 2, y: 96 }, hero: { x: 78, y: 636 }, gold: { x: 90, y: 756 } };
  function drawFloats() {
    for (const f of S.floats) {
      const p = f.anchor ? ANCHORS[f.anchor] || ANCHORS.hero : w2s(f.wx, f.wy, C.TRAY_Z);
      const k = f.age / f.max;
      const pop = k < 0.18 ? k / 0.18 : 1;
      const scl = (f.big ? 1.5 : 1) * (0.6 + 0.4 * pop);
      ctx.save();
      ctx.globalAlpha = Math.min(1, (1 - k) * 2);
      ctx.translate(p.x, p.y - 14 - k * 46);
      ctx.scale(scl, scl);
      txt(f.txt, 0, 0, '900 22px Verdana, sans-serif', f.col, 'center', { w: 5, col: 'rgba(30,10,5,0.9)' });
      ctx.restore();
    }
  }

  function drawBanner(t) {
    if (!S.banner) return;
    const b = S.banner;
    const k = 1 - b.ttl / b.max;
    const pop = k < 0.12 ? Math.sin((k / 0.12) * Math.PI / 2) : 1 + Math.sin(t * 9) * 0.04;
    ctx.save();
    ctx.globalAlpha = b.ttl < 0.5 ? b.ttl * 2 : 1;
    ctx.translate(LW / 2, 400);
    ctx.scale(pop, pop);
    ctx.font = '900 44px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 10; ctx.strokeStyle = '#2a1030';
    ctx.strokeText(b.txt, 0, 0);
    const g = ctx.createLinearGradient(0, -30, 0, 30);
    g.addColorStop(0, '#fff6c8'); g.addColorStop(0.5, '#ffd24a'); g.addColorStop(1, '#ff8a2a');
    ctx.fillStyle = g;
    ctx.fillText(b.txt, 0, 0);
    ctx.restore();
  }

  const WHEEL_COLS = ['#f2c04a', '#ef4b5d', '#37b6e6', '#b06be8'];
  function drawWheel() {
    if (!S.wheelAnim) return;
    const a = S.wheelAnim;
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { if (a.t > 2.8) S.wheelAnim = null; } });
    ctx.fillStyle = 'rgba(5,3,8,0.72)';
    ctx.fillRect(0, 0, LW, LH);
    const cx = LW / 2, cy = 390, R = 132;
    const k = Math.min(1, a.t / 2.6);
    const ease = 1 - Math.pow(1 - k, 3);
    const target = (Math.PI * 2) * 4 + (-Math.PI / 2) - (a.seg + 0.5) * (Math.PI / 4);
    const rot = ease * target;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(0, 0);

  const RFX = [];

  function fxIcon(q) {
    if (q.t === 'weapon' || q.t === 'vial' || q.t === 'shielditem' || q.t === 'heartitem' || q.t === 'frost') {
      const it = itemById(q.iid);

  window.__dpResolveFx = function (q) {
    const toHero = q.t === 'silver' || q.t === 'shielditem' || q.t === 'heartitem' || q.t === 'skull';
    const toGold = q.t === 'gem' || q.t === 'bag';
    const tgt = toGold ? { x: 90, y: 756 } : toHero ? { x: ANCHORS.hero.x, y: ANCHORS.hero.y + 22 } : { x: LW / 2, y: 66 };
    const big = q.t === 'weapon' || q.t === 'vial' || q.t === 'frost';
    RFX.push({
      x0: LW / 2 + (Math.random() - 0.5) * 90, y0: 672,
      x1: tgt.x, y1: tgt.y,
      t: 0, dur: big ? 0.42 : 0.26,
      icon: fxIcon(q), q,
      lift: 60 + Math.random() * 60,
      spin: (Math.random() - 0.5) * 10,
    });

  function drawResolveFx(dt) {
    for (let i = RFX.length - 1; i >= 0; i--) {
      const f = RFX[i];
      f.t += dt;
      const k = Math.min(1, f.t / f.dur);
      if (k >= 1) {
        // impact!
        burstScreen(f.x1, f.y1, f.q.t === 'skull' ? 'skull' : f.q.t === 'gem' ? 'gem' : 'item');
        RFX.splice(i, 1);
        continue;
      }
      const x = f.x0 + (f.x1 - f.x0) * k;
      const y = f.y0 + (f.y1 - f.y0) * k - Math.sin(k * Math.PI) * f.lift;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(f.spin * f.t);
      const col = LOOT_COL[f.q.t];
      if (col) {

        ctx.beginPath(); ctx.ellipse(0, 0, 9, 7 * Math.abs(Math.cos(f.t * 14)), 0, 0, 7);
        ctx.fillStyle = col; ctx.fill();
        ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.stroke();
      } else {
        txt(f.icon, 0, 0, '24px serif', '#fff');
      }
      ctx.restore();
      // sparkle trail

        S.parts.push({ x, y, vx: (Math.random() - 0.5) * 20, vy: 10, g: 30, life: 0, max: 0.3,
                       col: col || '#ffe4b0', sz: 1.6, spin: 2, shape: 'star' });

    }
