      S.confirm = {
        msg: '\u{1F4C5} POST THE DAILY?',
        sub: 'carve today\u2019s attempt onto the DAILY board — floor ' + o.floor + ', ' + o.kills + ' kills',
        yesLabel: 'POST IT', yes: () => {
          const send = () => { o.posted = true; postScore(o); };
          if (S.boardName) send();
          else NAMEPAD = { val: '', then: send };
        },
      };
    }
    if (o.seed != null) {
      txt('seed ' + seed36(o.seed) + ' — plant it with the 🌱 chip to race this dungeon',
          LW / 2, 330, '600 10px Verdana, sans-serif', '#9a8aa0');
    }
    // the REPORT CARD: the whole run, itemized
    const st2 = o.stats || { fired: 0, dealt: 0, taken: 0, bestHit: 0, t: 0 };
    const mm = Math.floor(st2.t / 60), ss = ('0' + Math.floor(st2.t % 60)).slice(-2);
    const hero2 = heroById(o.hero);
    const dinfo = DIFFS.find(d => d.id === o.diff);
    const rows = [
      ['hero', (hero2 ? hero2.icon + ' ' + hero2.name : '—')
        + (o.ng ? '  •  ♟ NG+' : '')
        + (dinfo && dinfo.id !== 'normal' ? '  •  ' + dinfo.name : '')
        + (o.muts > 0 ? '  •  ENDLESS +' + o.muts : '')],
      ['reached', 'floor ' + o.floor + ', room ' + o.depth],
      ['monsters slain', '' + o.kills],
      ['gold looted', fmt(o.gold)],
      ['coins fired', fmt(st2.fired)],
      ['damage dealt', fmt(st2.dealt)],
      ['damage taken', fmt(st2.taken)],
      ['best single hit', '' + st2.bestHit],
      ['relics collected', '' + (o.relics || 0)],
      ['run time', mm + ':' + ss],
    ];
    // the DUEL verdict outranks even the rivalry on the card
    if (o.duel) {
      rows.splice(2, 0, ['duel', o.duel.won ? '\u{1F3C6} ' + o.duel.name + ' is OUTDUG!'
                                : o.duel.tied ? '\u{2694}\u{FE0F} tied with ' + o.duel.name
                                : '\u{2694}\u{FE0F} ' + o.duel.name + ' holds at floor ' + o.duel.floor]);
    }
    // the RIVALRY verdict rides the report card
    if (o.toppled) rows.splice(2, 0, ['rival', '\u{2694}\u{FE0F} TOPPLED — deeper than ' + o.toppled + '!']);
    else if (o.rivalGap === 0) rows.splice(2, 0, ['rival', '\u{2694}\u{FE0F} matched ' + (S.rival.name || '')]);
    else if (o.rivalGap > 0) rows.splice(2, 0, ['rival', '\u{2694}\u{FE0F} ' + o.rivalGap + ' floor' + (o.rivalGap > 1 ? 's' : '') + ' short of ' + (S.rival.name || '')]);
    rows.forEach((rw, i) => {
      txt(rw[0], LW / 2 - 24, 352 + i * 26, '600 12px Verdana, sans-serif', '#9a8aa0', 'right');
      txt(rw[1], LW / 2 + 0, 352 + i * 26, '900 13px Verdana, sans-serif', '#ffe9a3', 'left');
    });
    if (o.cogsWon) txt('+' + o.cogsWon + ' ⚙ cogs for the WORKSHOP', LW / 2, 352 + rows.length * 26 + 6,
                       '900 12px Verdana, sans-serif', '#c8d6e8');
    if (S.best.floor > 0) {
      txt('best: floor ' + S.best.floor + ' room ' + S.best.depth + ' • ' + S.best.kills + ' kills',
          LW / 2, 614, '700 11px Verdana, sans-serif', '#a08a94');
    }
    uiBtn(LW / 2 - 120, 638, 240, 52, TR('⚔\u{FE0F} AGAIN!'), () => newRun(heroSel),
          { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 17px Verdana, sans-serif', r: 16 });
    // carve the fallen run onto the deep board (once per run) + the card
    if (o.floor >= 1 && !o.posted) {
      uiBtn(LW / 2 - 115, 748, 148, 34, '\u{1F3C5} CARVE IT', () => {
        const send = () => { o.posted = true; postScore(o); };
        if (S.boardName) send();
        else NAMEPAD = { val: '', then: send };
      }, { grad: ['#7d5a24', '#4a3410'], border: '#ffd75e', col: '#ffe9a3',
           font: '900 11px Verdana, sans-serif', r: 10 });
      uiBtn(LW / 2 + 41, 748, 74, 34, '\u{1F4E4} CARD', openShare,
            { bg: 'rgba(58,44,72,0.95)', border: '#c8b8e0', col: '#f0e8ff',
              font: '900 11px Verdana, sans-serif', r: 10 });
    } else {
      uiBtn(LW / 2 - 55, 748, 110, 34, '\u{1F4E4} THE CARD', openShare,
            { bg: 'rgba(58,44,72,0.95)', border: '#c8b8e0', col: '#f0e8ff',
              font: '900 11px Verdana, sans-serif', r: 10 });
    }
    uiBtn(LW / 2 - 120, 700, 116, 38, TR('TITLE'), () => { S.screen = 'title'; },
          { bg: 'rgba(20,10,14,0.9)', border: '#7d5a24', font: '800 13px Verdana, sans-serif', r: 12 });
    uiBtn(LW / 2 + 4, 700, 116, 38, '\u{2694}\u{FE0F} DUEL', () => shareDuel(o),
          { bg: 'rgba(60,26,30,0.92)', border: '#ff9d8a', col: '#ffd9d0',
            font: '900 12px Verdana, sans-serif', r: 12 });
  }
  // the CHALLENGE: this run's maze + floor as a link worth sending
  function shareDuel(o) {
    if (!o || o.seed == null) return;
    const url = location.origin + location.pathname + duelLink(o.seed, o.floor, S.boardName || 'a rival');
    if (navigator.share) {
      navigator.share({ title: 'Dungeon Pusher', text: 'outdig me — I fell at floor ' + o.floor + ' on this maze', url }).catch(() => {});
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(
        () => toast('\u{2694}\u{FE0F} challenge link copied — send it to a friend'),
        () => toast(url));
      return;
    }
    toast(url);
  }

  // ------------------------------------------------------------------ loop
  let last = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    let dt = Math.min((ts - last) / 1000 || 0.016, 0.05);
    last = ts;
    // HITSTOP: the killing blow freezes the world for a breath
    if (S.hitstop > 0 && S.opts.shake !== false) {
      S.hitstop -= dt;
      dt *= 0.12;
    } else S.hitstop = 0;
    padTick();                            // gamepad → the same KEYS/press paths
    srWatch(); srTick(dt);                // the town crier for screen readers
    if (S.screen === 'battle') {
      tick(dt);
      if (S.victory) S.victory.t += dt;
      clawTick(dt);                       // the Crane Keeper's two-move rig
      // arrows / stick sweep the aim across the slot
      let kax = 0;
      if (KEYS.arrowleft || KEYS.a || KEYS.gpl) kax -= 1;
      if (KEYS.arrowright || KEYS.d || KEYS.gpr) kax += 1;
      if (kax && !S.victory) S.aimX = Math.max(8, Math.min(92, S.aimX + kax * 64 * dt));
      if (held && !S.victory) {
        holdT += dt;
        // a short warm-up, then a steady pour paced by the turbo-shortened
        // interval (fires several coins per frame at high turbo — a true ×N)
        if (holdT > 0.22) pourStep(dt);
        else S.pourAcc = 0;
      } else S.pourAcc = 0;
    } else {
      // keep light UI timers alive outside the machine
      if (RFX.length) RFX.length = 0;
      if (S.uiFlash) { S.uiFlash.t -= dt; if (S.uiFlash.t <= 0) S.uiFlash = null; }
      if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) dismissWheel(); }
      if (S.banner) { S.banner.ttl -= dt; if (S.banner.ttl <= 0) S.banner = null; }
      if (S.toast) { S.toast.t -= dt; if (S.toast.t <= 0) S.toast = null; }
      for (let i = S.floats.length - 1; i >= 0; i--) {
        const f = S.floats[i];
        f.age += dt;
        if (f.age >= f.max) S.floats.splice(i, 1);
      }
    }
    uiButtons = [];
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    if (S.screen === 'battle' && S.shake > 0.1 && S.opts.shake) {
      ctx.translate((Math.random() - 0.5) * S.shake, (Math.random() - 0.5) * S.shake);
    }
    const t = S.screen === 'battle' ? S.time : ts / 1000;
    if (S.screen === 'title') drawTitle(t);
    else if (S.screen === 'dungeon' && S.run) drawDungeon(t, dt);
    else if (S.screen === 'battle' && S.run) drawBattle(t, dt);
    else if (S.screen === 'over') drawOver(t);
    else drawTitle(t);
    drawJuice(dt);
    if ((S.screen === 'battle' || S.screen === 'dungeon') && !PHOTO) drawHeartbeat(ts / 1000);
    drawWheel();
    drawRelicPick(t);
    drawTrophies(t);
    drawRecords(t);
    drawCodex(t);
    drawWorkshop(t);
    drawSettings(t);
    drawWhatsNew(t);
    drawBoard(t);
    drawCloud(t);
    drawCredits(t);
    drawThemes(t);
    drawShare(t);
    drawNamePad(t);
    drawIntro(t);
    drawConfirm(t);
    if (!PHOTO) drawAchToast(dt);
    // the keyboard's gold dashed ring rides whatever button holds focus
    if (S.screen !== kbScreen) { kbScreen = S.screen; kbFocus = -1; PHOTO = false; }
    if (kbFocus >= uiButtons.length) kbFocus = -1;
    if (kbFocus >= 0) {
      const b = uiButtons[kbFocus];
      ctx.setLineDash([6, 5]);
      ctx.lineWidth = 2.5; ctx.strokeStyle = '#ffe9a3';
      rr(b.x - 3, b.y - 3, b.w + 6, b.h + 6, 12); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // a DUEL link plants its maze before the first frame (then cleans the URL
  // so a reload doesn't re-arm the same challenge)
  try {
    const dl = parseDuel(location.search);
    if (dl) {
      S.duel = dl;
      S.nextSeed = dl.seed >>> 0;
      toast('\u{2694}\u{FE0F} ' + dl.name + ' reached FLOOR ' + dl.floor + ' on this maze — NEW RUN grows it');
      if (history.replaceState) history.replaceState(null, '', location.pathname);
    }
  } catch (e) {}
  requestAnimationFrame(frame);
})();

// particle burst — no-op headless, screen-space in the browser
function burst(wx, wy, wz, kind) {
  if (window.__dpBurst) window.__dpBurst(wx, wy, wz, kind);
}
// a phone-pocket thump — no-op headless, navigator.vibrate in the browser
function buzz(pattern) {
  if (window.__dpBuzz) window.__dpBuzz(pattern);
}
</script>
