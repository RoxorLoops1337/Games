// ============================================================================
// DUNGEON PUSHER — a coin pusher roguelike.
//
// The coin pusher IS the combat system, played in TURNS: each turn you
// spend a purse of coins into the machine, the tray COLLECTS what falls,
// and when YOU press END TURN it fires piece by piece — gems bank gold,
// silver coins shield the hero, gold coins strike, green coins poison,
// arsenal items hit big, cursed skulls bite last. Then the enemy takes its
// telegraphed turn. The side walls are SOLID: nothing is ever lost off the
// edges — the only way off the field is over the front, into the tray.
//
// Between fights: a real dungeon crawl. Each floor is a carved map of
// connected rooms (fog-of-war minimap, joystick movement, backtracking);
// locked doors eat a key once, monsters drop keys, the boss lairs in the
// farthest room and leaves stairs down when it falls.
//
// Physics is the 2.5D plane sim from Gold Rush Arcade: x across the platform,
// y into the machine (0 = back), z = height. Headless mode (tests): no canvas
// ctx -> sim + roguelike logic only, via window.DP.
// ============================================================================

function seed36(n) { return (n >>> 0).toString(36).toUpperCase(); }

// emoji-only heroes wear the color as an aura behind the glyph.
const HERO_SKINS = {
  knight: '#58b8ff', rogue: '#b45aff', wizard: '#7ee7a0', cleric: '#ff8a6b',
  ghost: '#8ed67e', crane: '#ff6b9d', rat: '#ffd75e', alch: '#8ef0ff',
};
function skinWorn(hid) {
  return !!(HERO_SKINS[hid] && S.deep15[hid] && S.skins[hid]);

// HERO MASTERY: deep15 counts every deep-cleared run (old saves' flag of 1
// reads as one clear) — the card wears ★ / ★★ / ★★★ at 1 / 3 / 5
function masteryStars(hid) {
  const n = S.deep15[hid] | 0;
  return n >= 5 ? 3 : n >= 3 ? 2 : n >= 1 ? 1 : 0;
}
function masteryPeak() {
  let m = 0;
  for (const h of HEROES) m = Math.max(m, masteryStars(h.id));
  return m;
}

// weighted pull from the unowned shelf — commons far more often
function rollRelicDrop() {
  if (!S.run) return null;
  const pool = RELICS.filter(rl => S.run.relics.indexOf(rl.id) < 0 && (!rl.ng || S.run.ng));
  if (!pool.length) return null;
  const total = pool.reduce((a, rl) => a + RARITY[rl.rar].w, 0);
  let r = rng() * total;
  for (const rl of pool) { r -= RARITY[rl.rar].w; if (r <= 0) return rl.id; }
  return pool[pool.length - 1].id;
}
function relicById(id) { return RELICS.find(r => r.id === id); }
function hasRelic(id) { return !!(S.run && S.run.relics.indexOf(id) >= 0); }
// pull a random UNOWNED relic of a given rarity (null if that shelf is bare)
function rollRelicByRar(rar) {
  if (!S.run) return null;
  const pool = RELICS.filter(rl => rl.rar === rar && S.run.relics.indexOf(rl.id) < 0 && (!rl.ng || S.run.ng));
  return pool.length ? pool[(rng() * pool.length) | 0].id : null;
}
// grant a random unowned relic of a rarity; returns the id, or null if none
function grantRelic(rar) {
  const id = rollRelicByRar(rar);
  if (id) S.run.relics.push(id);
  return id;
}
// a spread of up to `count` DISTINCT unowned relics of a rarity, to choose from
function rollRelicPool(rar, count) {
  if (!S.run) return [];
  const pool = RELICS.filter(rl => rl.rar === rar && S.run.relics.indexOf(rl.id) < 0 && (!rl.ng || S.run.ng)).map(rl => rl.id);
  const out = [];
  while (out.length < count && pool.length) out.push(pool.splice((rng() * pool.length) | 0, 1)[0]);
  return out;
}
// open the relic-CHOICE overlay: pick `picks` from a spread of that rarity.
// If the shelf is too full to fill the spread, grant what's left (or gold).
function openRelicPick(rar, picks) {
  if (!S.run) return false;
  const pool = rollRelicPool(rar, picks + 2);
  if (pool.length <= picks) {
    // not enough choice to be worth a menu — just grant them
    let got = 0;
    for (const id of pool) { S.run.relics.push(id); got++; floatAt(relicById(id).icon + ' ' + relicById(id).name + '!', 50, RARITY[rar].col, true); }
    if (!got) addGold(20 + S.run.floor * 4);
    save();
    return false;
  }
  S.relicPick = { pool, picks, chosen: [], rar };

}
// claim one relic from the wheel's spread; closes once `picks` are taken
function pickWheelRelic(i) {
  const rp = S.relicPick;
  if (!S.run || !rp) return false;
  const id = rp.pool[i];
  if (!id || rp.chosen.indexOf(id) >= 0 || S.run.relics.indexOf(id) >= 0) return false;
  S.run.relics.push(id);
  rp.chosen.push(id);
  SND.buy();
  if (rp.chosen.length >= rp.picks) { S.relicPick = null; }
  save();
  return true;
}
// items carry an implicit rarity by price: the pricier gear is the rarer find
function itemRar(it) { return it.cost >= 55 ? 'r' : 'c'; }
function itemsByRar(rar) { return ITEMS.filter(it => itemRar(it) === rar); }
function randItem(rar) { const pool = itemsByRar(rar); return pool[(rng() * pool.length) | 0]; }

// The inventory's effect sheet: what each coin/item ACTUALLY does right now,
// with every owned relic folded in. `main` is the headline number, `mods`
// names each relic bending it — so the bag doubles as a build overview.
function coinFx(k) {
  const mods = [];
  let main = '';
  const M = (id, txt2) => { if (hasRelic(id)) { const rl = relicById(id); mods.push((rl ? rl.name : id) + ': ' + txt2); return true; } return false; };
  if (masteryLvl(k)) mods.push('MASTERED ★: +1 (500 fired, forever)');
  if (k === 'coin') {
    let d = C.DMG.gold;
    if (strTotal() > 0) { d += strTotal(); mods.push('Strength: +' + strTotal() + ' dmg'); }
    if (M('goldedge', '+1 dmg')) d++;
    if (M('keenedge', '+1 dmg')) d++;
    if (hasRelic('berserker') && S.run && S.run.hp * 2 < S.run.maxHp) { d += 2; mods.push('Berserker: +2 dmg (below half HP)'); }
    else M('berserker', '+2 dmg while below half HP');
    main = d + ' dmg';
    if (M('twinstrike', 'strikes TWICE')) main += ' ×2';
    M('momentum', '+1 dmg per 5 gold fired');
    M('warlord', '+1 dmg per 3 gold fired');
    M('heatwave', '+1 dmg while any foe burns');
    M('matchstick', 'also applies 1 BURN');
    M('emberhoard', 'splashes 1 dmg to ALL foes');
    M('bloodgold', 'heals 1 HP on strike');
    M('bloodthirst', 'heals 1 HP on strike');
    M('taxman', '+1 gold per coin fired');
  } else if (k === 'silver') {
    let b = 1;
    if (dexTotal() > 0) { b += dexTotal(); mods.push('Dexterity: +' + dexTotal() + ' block'); }
    if (M('silvercore', '+1 block')) b++;
    if (M('bulwark', '+1 block')) b++;
    main = b + ' block';
    let d = 0;
    if (M('spikeshield', 'also deals 1 dmg')) d += 1;
    if (M('retort', 'also deals 2 dmg')) d += 2;
    if (d) main += ' + ' + d + ' dmg';
    M('alloy', 'every 3rd silver: +3 block');
    M('aegis', 'unspent block carries over');
  } else if (k === 'green') {
    let p = 1;
    if (M('venomtip', '+1 stack')) p++;
    if (M('toxicology', '+1 stack')) p++;
    if (M('twinfangs', 'poison DOUBLED')) p *= 2;
    main = p + ' poison';
    M('rustfang', 'also applies 1 BLEED');
    M('blightlord', 'also deals 1 dmg');
    M('contagion', 'spreads 1 poison to the whole pack');
    if (M('alchemist', 'heals 1 HP')) main += ' + heal 1';
    M('plaguelord', 'poison never fades');
  } else if (k === 'red') {
    let h = C.RED_HEAL;
    if (M('warmheart', '+1 HP')) h++;
    if (M('greensprig', '+1 HP')) h++;
    main = 'heal ' + h + ' HP';
    M('phoenixember', 'also grants 1 block');
    M('crimsonrain', 'also applies 1 BLEED to every foe');
  } else if (k === 'blue') {
    let d = C.DMG.blue;
    if (M('frostshard', '+1 dmg')) d++;
    if (M('permafrost', '+1 dmg')) d++;
    main = d + ' dmg to ALL foes, thru block';
    M('sparkstone', '+1 dmg against packs of 2+');
    M('hailstorm', '+1 dmg per other foe standing');
    M('dragonbreath', 'also 1 BURN to every foe');
  } else if (k === 'lucky') {
    let d = C.DMG.lucky;
    if (strTotal() > 0) { d += strTotal(); mods.push('Strength: +' + strTotal() + ' dmg'); }
    if (M('starmetal', '+2 dmg')) d += 2;
    if (M('horseshoe', '+1 dmg')) d += 1;
    if (M('assassin', '+2 dmg, pierces guards')) d += 2;
    main = d + ' dmg';
    M('luckystreak', '+1 dmg per lucky already fired');
    M('embershot', 'also applies 2 BURN');
    M('sniperlens', 'pierces braced guards');
    M('deadeye', 'pierces braced guards');
    M('bloodthirst', 'heals 1 HP on strike');
    M('clover', 'minted twice as often');
  }
  return { main, mods };
}
function itemFx(iid) {
  const it = itemById(iid);
  if (!it) return { main: '', mods: [] };
  const mods = [];
  let main = '';
  const M = (id, txt2) => { if (hasRelic(id)) { const rl = relicById(id); mods.push((rl ? rl.name : id) + ': ' + txt2); return true; } return false; };
  if (it.kind === 'weapon') {
    let w = weaponDmg(it.dmg);
    if (S.run && S.run.whet > 0) mods.push('forge-honed: +' + S.run.whet + ' dmg');
    M('whet', '+30% dmg');
    if (M('armory', '+2 dmg')) w += 2;
    if (it.id === 'sword' && M('balancedblade', '+4 dmg')) w += 4;
    if (M('heavyarms', '+30% dmg')) w = Math.round(w * 1.3);
    main = w + ' dmg' + (it.splash ? ' (splash)' : '');
    M('serrator', 'also applies 2 BLEED');
    M('butcher', '+3 dmg to bleeding foes');
    if (it.id === 'bomb') M('bombardier', 'also applies 4 BURN');
    M('vampblade', 'heals half its dmg');
    M('bloodthirst', 'heals 1 HP on strike');
  } else if (it.kind === 'poison') {
    main = ((it.pois + (hasRelic('venom') ? 2 : 0)) * (hasRelic('twinfangs') ? 2 : 1)) + ' poison';
    M('venom', '+2 stacks');
    M('twinfangs', 'poison DOUBLED');
  } else if (it.kind === 'shield') {
    main = (it.block + (hasRelic('plateup') ? 3 : 0)) + ' block';
    M('plateup', '+3 block');
    M('shieldwall', '+2 block per living pet');
  } else if (it.kind === 'heal') {
    main = 'heal ' + (it.heal + (hasRelic('fieldmedic') ? 4 : 0)) + ' HP';
    M('fieldmedic', '+4 HP');
  } else if (it.kind === 'stun') {
    const st = it.stun + (hasRelic('deepfreeze') ? 1 : 0);
    main = 'freeze a foe ' + st + ' turn' + (st > 1 ? 's' : '');
    M('deepfreeze', '+1 turn');
    M('frostsmith', 'also grants 4 block');
  } else if (it.kind === 'burn') {
    main = (it.burn + (hasRelic('arsonist') ? 3 : 0) + (hasRelic('firebrand') ? 1 : 0)) + ' BURN';
    M('arsonist', '+3 burn');
    M('firebrand', '+1 stack');
    M('slowburn', 'fades 1 slower');
    M('infernolord', 'never fades');
  } else if (it.kind === 'bleed') {
    main = (it.bleed + (hasRelic('scalpel') ? 2 : 0)) + ' BLEED';
    M('scalpel', '+2 bleed');
    M('hemorrhage', 'never fades');
  } else if (it.kind === 'buff') {
    main = it.str ? '+' + it.str + ' STRENGTH for one battle' : '+' + it.dex + ' DEXTERITY for one battle';
  } else if (it.kind === 'pet') {
    const hp = it.php + (hasRelic('kennel') ? 4 : 0) + (hasRelic('beastmaster') ? 2 : 0);
    const deed = it.id === 'pup' ? 'growls +1 block' : it.id === 'newt' ? 'spits 1 BURN' : 'gnaws 1 dmg + 1 BLEED';
    main = hp + ' HP pet';
    mods.push('soaks blows for you • ' + deed + ' each round');
    M('kennel', '+4 max HP');
    M('beastmaster', '+2 HP, bigger pack');
    M('packleader', 'acts twice a round');
    M('warhound', 'double damage');
    M('gritcollar', 'survives its first death');
    M('vengeful', 'avenges its death: 6 dmg');
  }
  return { main, mods };
}
// the run-wide numbers the stats tab reads out (relic bends included)
function runMods() {
  const tiltMods = ['crowbar', 'prybar'].filter(hasRelic).map(id => relicById(id).name + ' +1').join(', ');
  const rainB = (hasRelic('loadstone') ? 3 : 0) + (hasRelic('saltpile') ? 2 : 0);
  const handB = (hasRelic('minter') ? 1 : 0) + (hasRelic('richhand') ? 1 : 0) + (hasRelic('tollkeeper') ? 2 : 0);
  const rows = [
    ['bank slots', bankMax() + (hasRelic('strongbox') ? ' (Strongbox +2)' : '')],
    ['tilts / round', tiltCount() + (tiltMods ? ' (' + tiltMods + ')' : '')],
    ['round rain', (C.ROUND_RAIN + rainB) + ' pieces' + (rainB ? ' (+' + rainB + ' from relics)' : '')],
    ['victory offer', (hasRelic('fourth') ? 4 : 3) + ' coins' + (hasRelic('fourth') ? ' (Gambler’s Purse)' : '')],
  ];
  if (handB) rows.push(['hand bonus', '+' + handB + ' gold coin' + (handB > 1 ? 's' : '') + ' every round']);
  if (hasRelic('midas')) rows.push(['gold income', '+30% (Midas Touch)']);
  if (hasRelic('piggy')) rows.push(['victory bounty', '+' + (4 + 2 * actIdx(S.run ? S.run.floor : 1)) + ' gold (Piggy Bank)']);
  if (hasRelic('luckypenny')) rows.push(['round start', '+3 gold (Lucky Penny)']);
  if (hasRelic('plate')) rows.push(['round start', '+4 block (Battle Plate)']);
  if (hasRelic('thornmail')) rows.push(['thorns', 'half your block bites back']);
  if (hasRelic('echobell') || hasRelic('reverb')) rows.push(['first piece', 'fires twice']);
  if (hasRelic('stormcall')) rows.push(['storm', 'every 8th piece zaps ALL for 3']);
  if (hasRelic('grandbank')) rows.push(['bank payout', 'banked pieces duplicate']);
  if (hasRelic('quicksilver') || hasRelic('overdrive')) rows.push(['resolve', 'ramps 2× as fast']);
  if (hasRelic('wind')) rows.push(['second wind', S.run && S.run.windUsed ? 'SPENT' : 'ready — survives a killing blow']);
  if (hasRelic('petwhistle')) rows.push(['pets', 'summon at battle start (Pet Whistle)']);
  if (hasRelic('soulchain')) rows.push(['soul chain', '−1 damage taken while a pet lives']);
  if (hasRelic('eternalflame')) rows.push(['eternal flame', 'every battle opens with all foes burning']);
  if (hasRelic('hemorrhage')) rows.push(['bleed', 'never fades (Hemorrhage)']);
  if (hasRelic('infernolord')) rows.push(['burn', 'never fades (Inferno Lord)']);
  if (hasRelic('papercut')) rows.push(['first piece', 'applies 1 BLEED (Papercut)']);
  if (hasRelic('quartermaster')) rows.push(['first item', 'fires twice each battle']);
  return rows;
}

    p.gritUsed = true;
    p.hp = 1;
    floatAnchor(p.icon + ' refuses to fall!', 'hero', '#ffe9a3');
    return;
  }
  p.hp = 0;
  floatAnchor(p.icon + ' falls…', 'hero', '#9a8aa0', true);
  if (hasRelic('vengeful') && killer && killer.hp > 0) {
    floatAnchor('\u{1F47B} VENGEANCE', 'enemy', '#c8b8ff');
    dmgFoe(killer, 6);
  }
}
// the pack stands in front of you: an enemy blow chews through pets first
function petSoak(dmg, attacker) {
  for (const p of S.pets) {
    if (dmg <= 0) break;
    if (p.hp <= 0) continue;
    const soak = Math.min(p.hp, dmg);
    p.hp -= soak;
    dmg -= soak;
    floatAnchor(p.icon + ' -' + soak, 'hero', '#c8d6e8');
    // the FIRE BEETLE's shell scorches whatever strikes it
    if (p.iid === 'beetle' && soak > 0 && attacker && attacker.hp > 0) {
      applyBurn(attacker, 1);
      floatAnchor('\u{1FAB2} the shell SCORCHES it!', 'enemy', '#ff9d3c');
    }
    if (p.hp <= 0) petDies(p, attacker);
  }
  return dmg;
}
// the WATCH OWL sees through the blackout hex
function blackedOut() {
  return S.blackT > 0 && !S.pets.some(p => p.hp > 0 && p.iid === 'owl');
}
// every pet acts once per round (the Pack Leader drills them twice)
function petsAct() {
  if (!S.run || !S.pets.length) return;
  const acts = hasRelic('packleader') ? 2 : 1;
  const dmul = hasRelic('warhound') ? 2 : 1;
  for (const p of S.pets.slice()) {
    if (p.hp <= 0) continue;
    for (let a = 0; a < acts && S.run && !S.victory; a++) {
      if (p.iid === 'pup') addBlock(1);
      else if (p.iid === 'tortoise') addBlock(2);
      else if (p.iid === 'newt') { if (S.enemy && S.enemy.hp > 0) applyBurn(S.enemy, 1 * dmul); }
      else if (p.iid === 'rat') {
        if (S.enemy && S.enemy.hp > 0) {
          const bonus = hasRelic('bloodscent') && S.enemy.bleed > 0 ? 1 : 0;
          dmgFoe(S.enemy, 1 * dmul + bonus);
          if (S.enemy && S.enemy.hp > 0) applyBleed(S.enemy, 1, true);
        }
      }
      else if (p.iid === 'direrat') {
        if (S.enemy && S.enemy.hp > 0) {
          dmgFoe(S.enemy, 2 * dmul);
          if (S.enemy && S.enemy.hp > 0) applyBleed(S.enemy, 1, true);
        }
      }
    }
  }
  if (!S.run || S.victory) return;
  if (hasRelic('guarddog') && S.pets.some(p => p.hp > 0)) addBlock(1);
  if (hasRelic('treats')) {
    let weak = null;
    for (const p of S.pets) if (p.hp > 0 && p.hp < p.maxHp && (!weak || p.hp < weak.hp)) weak = p;
    if (weak) { weak.hp = Math.min(weak.maxHp, weak.hp + 2); floatAnchor(weak.icon + ' +2', 'hero', '#7ee787'); }
  }
}
function addBlock(n) {
  if (!S.run) return;
  S.run.block += n;
  floatAnchor('\u{1F6E1} +' + n, 'hero', '#c8d6e8', n >= 4);
  SND.block();
}
function healPlayer(n) {
  if (!S.run) return 0;
  const before = S.run.hp;
  S.run.hp = Math.min(S.run.maxHp, S.run.hp + n);
  const got = S.run.hp - before;
  if (got > 0) { floatAnchor('+' + got + ' HP', 'hero', '#7ee787', got >= 8); S.healT = 0.9; }
  // Sterling Heart: the excess hardens into a small wall
  if (hasRelic('sterling') && n > got) addBlock(Math.min(3, n - got));
  SND.heal();
  return got;
}
function addGold(n) {
  if (!S.run) return;
  let mul = 1;
  if (hasRelic('midas')) mul += 0.3;
  if (hasRelic('goldrush')) mul += 0.4;
  if (mul !== 1) n = Math.round(n * mul);
  S.run.gold += n;
  S.run.goldEarned += n;
  floatAnchor('+' + n + ' G', 'gold', '#ffd75e', n >= 15);
}
function addCoins(n) {
  if (!S.run) return;
  if (S.battle && S.battle.hand) {
    S.battle.hand.coin = (S.battle.hand.coin || 0) + n;
    syncWallet();
  }
  floatAnchor('+' + n + ' ●', 'hero', '#f2c04a');
}
// direct hit: curses and poison ignore your shield entirely
function hpHit(n, cause, col) {
  if (!S.run || S.run.hp <= 0) return;
  S.run.hp -= n;
  if (n >= 6) buzz(60);
  if (S.run.stats) S.run.stats.taken += n;
  S.hurtT = 0.45;
  S.shake += Math.min(9, 3 + n * 0.5);
  floatAnchor('-' + n + ' HP', 'hero', col || '#ff5a4e', n >= 6);
  SND.hurt();
  if (S.run.hp <= 0) {
    // Second Wind saves once; the Revenant stands you up twice per fight
    const saves = (hasRelic('wind') ? 1 : 0) + (hasRelic('revenant') ? 2 : 0);
    if ((S.run.windUsed || 0) < saves) {
      S.run.windUsed = (S.run.windUsed || 0) + 1;
      S.run.hp = 1;
      S.banner = { txt: 'SECOND WIND!', ttl: 1.6, max: 1.6 };
      return;
    }
    endRun(cause || 'slain');
  }
}
function hurtPlayer(n, cause) {
  if (!S.run || S.run.hp <= 0) return;
  if (S.run.dailyMod === 'cannon') n *= 2;   // GLASS CANNON cuts both ways
  if (weeklyOn('goldfever')) n = Math.round(n * 1.2);   // the fever's tax
  if (weeklyOn('brittle')) n = Math.round(n * 1.3);     // brittle cuts back
  // the Brass Heart drinks the battle's first blow whole
  if (hasRelic('brassheart') && S.battle && !S.battle.brassSpent && n > 0) {
    S.battle.brassSpent = 1;
    floatAnchor('\u{1F49B} the Brass Heart takes it (' + n + ')', 'hero', '#ffd75e', true);
    SND.block();
    return;
  }
  if (hasRelic('thickskin')) n = Math.max(1, n - 1);   // hide turns the edge
  if (hasRelic('leadenidol')) n = Math.max(1, n - 2);  // the idol drinks the blow
  // Soul Chain: your pack shares the pain
  if (hasRelic('soulchain') && S.pets.some(p => p.hp > 0)) n = Math.max(1, n - 1);
  const incoming = n;
  // block soaks first
  if (S.run.block > 0) {
    const soak = Math.min(S.run.block, n);
    S.run.block -= soak; n -= soak;
    if (soak > 0) { floatAnchor('BLOCKED ' + soak, 'hero', '#c8d6e8'); SND.block(); }
  }
  if (n <= 0) {
    // Guardian rewards a wall that swallowed the whole blow
    if (hasRelic('guardian') && incoming > 0) healPlayer(2);
    return;
  }
  hpHit(n, cause);
}
function usePotion() {
  if (alchRun()) return false;            // she brews — she does not drink
  if (!S.run || S.run.potions < 1 || S.run.hp >= S.run.maxHp) return false;
  S.run.potions--;
  healPlayer(C.POTION_HEAL + (hasRelic('elixir') ? 8 : 0) + (hasRelic('apothecary') ? 6 : 0));
  // the Mender splits the draught with the pack
  if (hasRelic('mender')) for (const p of S.pets) if (p.hp > 0) p.hp = Math.min(p.maxHp, p.hp + 5);
  SND.buy();
  save();
  return true;
}

// --------------------------------------------------------------- scoring
// Nothing fires on impact any more: the tray COLLECTS. Everything that
// lands there joins the round's loot and resolves when your purse is spent.
// Only the spice — wheel chips and field chests — pops immediately.
function trayAdd(kind, extra) {
  S.tray.items.push({ kind, iid: extra && extra.iid, x: extra ? extra.x : 50 });
  if (S.tray.items.length > 24) S.tray.items.shift();
}
function scoreCoin(c, quiet) {
  S.collected++;
  if (c.kind === 'chip') {
    floatAt('WHEEL SPIN!', c.x, '#63e7ff', true);
    S.shake += 4;
    spinWheel();
    burst(c.x, 96, C.TRAY_Z, 'chip');
    return;
  }
  if (c.kind === 'chest') {
    openChest(c);
    return;
  }
  // a corroded SLUG is worth nothing — it just clatters into the tray
  // (unless the MINT's job wants them counted)
  if (c.kind === 'slug') {
    questBump('slugbank', 1);
    if (hasRelic('slugsmelter')) { addGold(1); floatAt('smelted: +1 gold', c.x, '#ffd75e'); }
    else floatAt('a worthless slug…', c.x, '#8a8a8a');
    return;
  }
  if (!S.battle) return;
  // CHEESE! for the Rat King every gem is a feast: +3 HP across the
  // swarm, and every third wheel a DIRE RAT rises from the crumbs
  if (ratRun() && c.kind === 'gem' && !S.victory) {
    for (const p of S.pets) if (p.hp > 0) p.hp = Math.min(p.maxHp, p.hp + 3);
    S.run.cheese = (S.run.cheese || 0) + 1;
    floatAnchor('\u{1F9C0} CHEESE! the swarm feeds', 'hero', '#ffd75e');
    if (S.run.cheese % 3 === 0 && S.pets.length < RAT_CAP) {
      S.pets.push(mkRat(true));
      floatAnchor('\u{1F400} a DIRE RAT rises!', 'hero', '#ff9d3c', true);
    }
  }
  // the ALCHEMIST'S STILL: coins feed the brew, gems are reagents
  if (alchRun() && !S.victory) {
    if (c.kind === 'gem') {
      S.run.reagents = (S.run.reagents || 0) + 1;
      floatAnchor('\u{2697}\u{FE0F} a reagent — next draught +2', 'hero', '#8ef0ff');
    } else if (COIN_KINDS.indexOf(c.kind) >= 0) {
      S.run.brew = (S.run.brew || 0) + 1;
      if (S.run.brew >= ALCH_BREW_N) { S.run.brew -= ALCH_BREW_N; brewDraught(); }
    }
  }
  // a coin still ALIGHT from the dragon's breath sears the hand that takes it
  if (c.aflame && !S.victory) {
    S.pBurn = (S.pBurn || 0) + 2;
    floatAnchor('\u{1F525} SEARED! +2 burn', 'hero', '#ff9d3c', true);
  }
  S.battle.loot.push({ k: c.kind, iid: c.iid });
  trayAdd(c.kind, { iid: c.iid, x: c.x });
  if (quiet) return;                      // the CLAW celebrates on delivery instead
  S.shake += c.kind === 'item' ? 3 : 1;
  if (c.kind === 'skull') SND.poison();
  else if (c.kind === 'gem' || c.kind === 'bag') SND.gem();
  else SND.collect(1 + (S.battle.loot.length % 5));
  burst(c.x, 96, C.TRAY_Z, c.kind);
}
function openChest(c) {
  const r = rng();
  let txt2;
  if (r < 0.35) {
    const n = 3 + ((rng() * 4) | 0);
    addCoins(n);
    txt2 = 'CHEST: +' + n + ' ● THIS ROUND';
  } else if (r < 0.6) {
    const g = 8 + ((rng() * 8) | 0);
    addGold(g);
    txt2 = 'CHEST: +' + g + ' GOLD';
  } else if (r < 0.8) {
    txt2 = 'CHEST: WHEEL SPIN!';
    spinWheel();
  } else {
    const it = ITEMS[(rng() * 4) | 0];
    grantItem(it.id, 1);
    S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
    txt2 = 'CHEST: ' + it.name + '!';
  }
  floatAt(txt2, c.x, '#ffb0e0', true);
  S.shake += 5;
  SND.gem();
  burst(c.x, 96, C.TRAY_Z, 'chest');
}
function grantItem(iid, n) {
  if (!S.run || !itemById(iid)) return;
  // the RAT KING owns no gear: every item that would reach his hands
  // scurries into the swarm instead
  if (ratRun()) {
    for (let k = 0; k < (n || 1); k++) ratRecruit(false);
    return;
  }
  S.run.arsenal[iid] = (S.run.arsenal[iid] || 0) + (n || 1);
  // this floor's machine is already racked: the new gear drops in next fight
  if (S.run.pileFloor === S.run.floor) {
    for (let k = 0; k < (n || 1); k++) S.run.pending.push(iid);
  }
}

// JACKPOT: filling the meter catapults ONE echo of your own gear onto a
// random spot of the board — where it lands is half the prize
function frenzy() {
  S.meter = 0;
  achUnlock('jackpot');
  buzz(80);
  if (hasRelic('jackpotcharm')) { addGold(15); if (S.battle) S.battle.goldWon += 15; }
  S.banner = { txt: TR('JACKPOT!'), ttl: 2.2, max: 2.2 };
  S.shake += 12;
  S.jackFx = { t: 0 };
  SND.jackpot();
  // the Double Chime rings the jackpot twice over
  if (hasRelic('dblchime')) {
    for (let i = 0; i < 4; i++) {
      S.rain.push({ t: 0.4 + 0.18 * i, x: 12 + rng() * 76, y: MACH.tiers[0].slotY + rng() * 12, kind: rollPileKind() });
    }
  }
  const owned = [];
  if (S.run) {
    for (const iid of Object.keys(S.run.arsenal)) {
      for (let k = 0; k < S.run.arsenal[iid]; k++) owned.push(iid);
    }
  }
  if (!owned.length && ratRun()) {
    // the Rat King's jackpot rains a recruit instead of gear
    ratRecruit(false);
    return;
  }
  if (owned.length) {
    // ONE echo of your gear, CATAPULTED to a random spot on the board —
    // deep in the back or teetering right at the lip, luck decides
    const iid = owned[(rng() * owned.length) | 0];
    S.rain.push({ t: 0.4, x: 12 + rng() * 76, y: 12 + rng() * (tierFront(0) - 24), kind: 'item', iid, temp: true });
  } else {
    // no arsenal to echo? a modest coin consolation
    for (let i = 0; i < 4; i++) {
      S.rain.push({ t: 0.15 * i, x: 10 + rng() * 80, y: MACH.tiers[0].slotY + rng() * 14, kind: 'coin' });
    }
  }
  save();
}

// -------------------------------------------------------------- wheel of fortune
// The WHEEL is now the ONLY faucet for relics (alongside the boss's
// choice). Found in the dungeon it costs 5 coins to spin (see the wheel
// ghost); a free spin is granted after every ELITE. Prizes: gold, a wad of
// coins, relics, a stab of lost HP, or an item — common or rare.
function wheelCoins(n) {
  const k = COIN_KINDS[(rng() * COIN_KINDS.length) | 0];
  S.run.purse[k] = (S.run.purse[k] || 0) + n;
  floatAt('+' + n + ' ' + COIN_INFO[k].name + '!', 50, '#ffe066', true);
}
function wheelItem(rar) {
  const it = randItem(rar);
  grantItem(it.id, 1);
  floatAt(it.name + '!', 50, rar === 'r' ? '#7ab0e8' : '#ffe066', true);
  if (S.battle) S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
}
// the wheel doesn't just hand you a relic — it lets you CHOOSE. The pick
// overlay opens once the wheel is dismissed (see dismissWheel).
function wheelRelic(rar, n) {
  S.pendingPick = { rar, picks: n || 1 };
}
const WHEEL = [
  // gold in three sizes, relics, a key — and HP as the gamble. NO coins:
  // the pusher hands out coins; the wheel deals in everything else.
  { label: '+GOLD',    col: '#f2c04a', w: 13, fx: () => addGold(10 + S.run.floor * 2 + ((rng() * 8) | 0)) },
  { label: '++GOLD',   col: '#e8b24a', w: 9,  fx: () => addGold(22 + S.run.floor * 3 + ((rng() * 12) | 0)) },
  { label: 'GOLD\nRUSH', col: '#e0a038', w: 5, fx: () => addGold(45 + S.run.floor * 5 + ((rng() * 20) | 0)) },
  { label: 'COMMON\nRELIC', col: '#c8c8c8', w: 8, fx: () => wheelRelic('c', 1) },
  { label: 'COMMON\nRELIC', col: '#b8bcc8', w: 8, fx: () => wheelRelic('c', 1) },
  { label: 'RARE\nRELIC',   col: '#b06be8', w: 5, fx: () => wheelRelic('r', 1) },
  { label: '+5 HP',   col: '#8fd18f', w: 11, fx: () => healPlayer(5) },
  { label: '−5 HP',   col: '#ef4b5d', w: 10, fx: () => { S.run.hp = Math.max(1, S.run.hp - 5); floatAt('−5 HP!', 50, '#ef4b5d', true); S.shake += 5; } },
  { label: '+10 HP',  col: '#7ee787', w: 8,  fx: () => healPlayer(10) },
  { label: '−10 HP',  col: '#d63b4e', w: 7,  fx: () => { S.run.hp = Math.max(1, S.run.hp - 10); floatAt('−10 HP!', 50, '#ef4b5d', true); S.shake += 7; } },
  { label: '+25 HP',  col: '#4ecb6a', w: 4,  fx: () => healPlayer(25) },
  { label: '+1 KEY',  col: '#63c8ff', w: 10, fx: () => { S.run.keys++; floatAt('+1 KEY \u{1F5DD}!', 50, '#63c8ff', true); } },
];
function spinWheel() {
  if (!S.run) return null;
  const total = WHEEL.reduce((a, s) => a + s.w, 0);
  let r = rng() * total, idx = 0;
  for (let i = 0; i < WHEEL.length; i++) { r -= WHEEL[i].w; if (r <= 0) { idx = i; break; } }
  WHEEL[idx].fx();
  S.wheelAnim = { t: 0, seg: idx, label: WHEEL[idx].label };
  SND.gem();
  save();
  return WHEEL[idx];
}
// clear the wheel overlay — and, if it won a relic, open the CHOICE now
function dismissWheel() {
  S.wheelAnim = null;
  if (S.pendingPick) {
    const p = S.pendingPick; S.pendingPick = null;
    openRelicPick(p.rar, p.picks);
  }
}

// ------------------------------------------------------------ drop & hand
// Your purse is a DECK: every round it refills as your hand, and YOU pick
// which coin type slides into the slot next.
function syncWallet() {
  if (!S.run) return;
  const B = S.battle;
  S.run.wallet = B && B.hand ? COIN_KINDS.reduce((a, k) => a + (B.hand[k] || 0), 0) : 0;
}
function selectCoin(k) {
  S.coach.pick = 1;
  if (!S.battle || !S.battle.hand || COIN_KINDS.indexOf(k) < 0) return false;
  if ((S.battle.hand[k] || 0) < 1) return false;
  S.battle.sel = k;
  return true;
}
// when the chosen stack runs dry, slide to the next one you still hold
function autoSel() {
  const B = S.battle;
  if (!B || !B.hand) return;
  if ((B.hand[B.sel] || 0) > 0) return;
  for (const k of COIN_KINDS) {
    if ((B.hand[k] || 0) > 0) { B.sel = k; return; }
  }
}
// `force` (the hold-pour) skips the cooldown gate and manages its own timing
// via the pour budget, so turbo can fire several coins in a single frame.
// the CLAW DROP: classic claw-machine rules. Two moves park the claw over
// (x, y) — slide RIGHT, then slide UP the board — and the release drops
// it. It closes on a CHUNK (up to 6 pieces in its spread, nearest first)
// and hoists it to the tray… but claws have holes: roughly a third of the
// haul wriggles free mid-hoist and clatters back onto the pile.
function craneDrop(x, y) {
  if (!craneRun() || S.screen !== 'battle' || !S.run || S.victory) return null;
  const B = S.battle;
  if (!B || B.phase !== 'drop') return null;
  if ((B.grabs || 0) < 1) { S.denyT = 0.5; SND.deny(); return null; }
  B.grabs--;
  const near = S.coins
    .filter(c => c.st === 'plat')
    .map(c => ({ c, d: Math.hypot(c.x - x, (c.y - y) * 0.9) }))
    .filter(o => o.d <= (o.c.kind === 'item' ? 13 : 10))
    .sort((a, b) => a.d - b.d)
    .slice(0, 6);
  const caught = [], slipped = [];
  for (const o of near) {
    S.coins.splice(S.coins.indexOf(o.c), 1);
    if (rng() < 0.35) slipped.push(o.c);
    else caught.push(o.c);
  }
  // the escapees tumble back down around the grab point, stirring the pile
  for (const c of slipped) {
    const back = spawnDrop(Math.max(6, Math.min(94, x + (rng() - 0.5) * 14)),
                           Math.max(6, Math.min(78, y + (rng() - 0.5) * 10)), c.kind);
    if (back) { back.iid = c.iid || null; back.temp = !!c.temp; }
  }
  if (!near.length) {
    floatAt('the claw closes on air…', x, '#9a8aa0');
    SND.deny();
  } else {
    floatAt('\u{1F579} ' + caught.length + ' caught' + (slipped.length ? ' — ' + slipped.length + ' slipped!' : '!'),
            x, '#ffe066', true);
    SND.clink();
  }
  // hand the renderer the ACTUAL pieces so the claw is seen holding them;
  // score quietly — the tray fanfare plays when the claw delivers, not now
  if (caught.length) buzz(35);            // the CHOMP thumps in the palm
  if (window.__dpClaw) window.__dpClaw(x, y, caught.map(c => ({ kind: c.kind, iid: c.iid || null })), slipped.length);
  for (const c of caught) scoreCoin(c, true);
  return { caught: caught.length, slipped: slipped.length };
}
function drop(x, force) {
  if (S.screen !== 'battle' || !S.run || S.victory) return false;
  if (craneRun()) return false;         // the keeper's finger drives the CLAW
  const B = S.battle;
  if (!B || B.phase !== 'drop') return false;
  if (!force && S.cd > 0) return false;
  autoSel();
  const kind = B.sel;
  if ((B.hand[kind] || 0) < 1) { if (!force) { S.denyT = 0.6; SND.deny(); } return false; }
  // spawn FIRST — if the machine is packed to its cap, hold the coin back
  // in your hand rather than silently swallowing it (and don't burn the
  // cooldown, so the held stream resumes the instant the field clears)
  const ax = Math.max(8, Math.min(92, x === undefined ? S.aimX : x));
  const c = spawnDrop(ax + (rng() - 0.5) * 2, MACH.tiers[0].slotY + (rng() - 0.5) * 5, kind);
  if (!c) { S.denyT = 0.35; return false; }
  B.hand[kind]--;
  syncWallet();
  autoSel();
  S.cd = C.DROP_CD / (S.turbo || 1);        // TURBO ×2 / ×5 / ×10 / ×20 shortens the cooldown to match
  S.dropped++; S.meter++;
  S.coach.pick = 1; S.coach.drop = 1;   // a fired coin proves both lessons
  B.fired = (B.fired || 0) + 1;
  if (hasRelic('coinpress') && B.fired % 25 === 0) {
    addGold(5); B.goldWon += 5;
    floatAnchor('\u{1F3ED} the press mints +5 gold', 'hero', '#ffd75e');
  }
  if (S.run.stats) S.run.stats.fired++;

// each ACT resets the ramp with a stronger roster (the tier bases carry the
// big jumps between acts); acts past the last roster keep ramping instead
function scaleMult() {
  const act = actIdx(S.run.floor);
  const fInAct = (S.run.floor - 1) % 5;   // in-act step is raw — NG+ shifts act, not the step
  const beyond = Math.max(0, S.run.floor - ENEMY_TIERS.length * 5);
  // per-act ramp + an act carry tuned so the hand-off to a new (stronger)
  // roster never softens the curve; past the last act the beyond term must
  // cover the whole in-act ramp alone (no fresh roster to lean on)
  return (1 + 0.075 * (S.run.depth - 1) + 0.30 * fInAct + 0.50 * act + 0.9 * beyond) * dailyK() * weeklyFoeK();

function enemyPool(depth) {

  const n = curRoster().length;

      const it = itemById(l.iid);

              : it.kind === 'shield' ? 'shielditem' : it.kind === 'heal' ? 'heartitem'
              : it.kind === 'burn' ? 'burnitem' : it.kind === 'bleed' ? 'bleeditem'
              : it.kind === 'pet' ? 'petitem' : it.kind === 'buff' ? 'buffitem' : 'frost';

// ------------------------------------------------------------------ reset
function fillRows(y0, y1) {
  const step2 = MACH.coin.r * 2.05;
  for (let y = y0; y <= y1; y += step2) {
    const n = Math.floor(84 / step2);
    for (let i = 0; i < n; i++) {
      const x = 50 + (i - (n - 1) / 2) * step2 * 1.04 + (rng() - 0.5) * 2.5;
      // the field is a mix: gold to strike, silver to shield, venom to sicken
      place(x, y + (rng() - 0.5) * 2, rollPileKind(), 0, 'plat', 0);
    }
  }
}
function initPile() {
  S.coins.length = 0;
  const td = MACH.tiers[0];
  const front = td.front;
  fillRows(td.back + 42, front - 4);
  // gold on the field: a bag always, a gem sometimes
  place(30 + rng() * 40, front - 26 - rng() * 6, 'bag', 0, 'plat', 0);
  if (rng() < 0.4) place(50 + (rng() - 0.5) * 30, front - 22, 'gem', 0, 'plat', 0);
  if (rng() < 0.35) place(30 + rng() * 40, front - 30 - rng() * 4, 'chest', 0, 'plat', 0);
  if (rng() < 0.3) place(25 + rng() * 50, front - 18 - rng() * 10, 'chip', 0, 'plat', 0);
  // the arsenal rides the pile — deep enough that it takes pushing to fire
  if (S.run) {
    let placed = 0;
    const ids = Object.keys(S.run.arsenal);
    for (const iid of ids) {
      for (let k = 0; k < S.run.arsenal[iid] && placed < C.ITEM_CAP; k++) {
        const pr = place(16 + ((placed * 23) % 68) + (rng() - 0.5) * 6,
                         front - 26 - rng() * 12, 'item', 0, 'plat', 0);
        pr.iid = iid;
        placed++;
      }
    }
  }
  // a second storey: coins resting on top of the pile
  const base = S.coins.filter(c => c.kind === 'coin');
  for (let i = 0; i < Math.min(12, base.length); i++) {
    const under = base[(rng() * base.length) | 0];
    place(under.x + (rng() - 0.5) * 2, under.y + (rng() - 0.5) * 2, 'coin', 1, 'plat', 0);
  }
  // settle so nothing pops on the first frame, then sweep spillage.
  // Queued rain (the Poltergeist's purse, pending gear) waits OUT the
  // settle — otherwise the sweep would eat it mid-air.
  const savedBattle = S.battle;
  const savedRain = S.rain.splice(0, S.rain.length);
  S.battle = null;                      // the round machine sleeps during the settle
  for (let i = 0; i < 140; i++) step(1 / 60, true);
  S.battle = savedBattle;
  S.rain.push(...savedRain);
  for (let i = S.coins.length - 1; i >= 0; i--) {
    if (S.coins[i].st !== 'plat') S.coins.splice(i, 1);
  }
  S.trayPile = 0;
}
function reset() {
  S.time = 0; S.phase = 0; S.cd = 0; S.pourAcc = 0;
  S.floats.length = 0; S.parts.length = 0; S.rain.length = 0;
  S.banner = null; S.trayPile = 0; S.shake = 0;
  S.tray.items.length = 0;
  initPile();
}

// ------------------------------------------------------------- simulation
function findSupport(c, lay) {
  for (const o of S.coins) {
    if (o === c || o.st !== 'plat' || o.lay !== lay || o.tier !== c.tier) continue;
    const dx = o.x - c.x, dy = o.y - c.y;
    if (dx * dx + dy * dy < Math.pow((o.r + c.r) * 0.85, 2)) return o;
  }
  return null;
}
function landCoin(c, lay) {
  const td = MACH.tiers[c.tier];
  c.st = 'plat';
  c.lay = lay;
  c.z = td.z + lay * C.COIN_H;
  c.vz = 0; c.chk1 = false; c.chk2 = false;
  const pf = pusherFront(c.tier);
  c.y = Math.max(c.y, pf + c.r);
  c.vx += (rng() - 0.5) * 7;
  c.vy += (rng() - 0.5) * 5;
  c.popT = 0.18;
  SND.clink();
}
function step(dt, quiet) {
  S.time += dt;
  if (S.cd > 0) S.cd -= dt;
  if (S.denyT > 0) S.denyT -= dt;
  if (S.walletHitT > 0) S.walletHitT -= dt;
  if (S.hurtT > 0) S.hurtT -= dt;
  if (S.healT > 0) S.healT -= dt;
  S.phase += dt * 2 * Math.PI / MACH.pushPeriod * pushRate();
  S.shake = Math.max(0, Math.min(8, S.shake) - dt * 16);   // hard cap + brisk decay

  // the round machine runs only while the fight is live
  if (S.screen === 'battle' && !quiet) battleTick(dt);

  // rain queue (frenzy bonuses, cursed skulls)
  for (let i = S.rain.length - 1; i >= 0; i--) {
    S.rain[i].t -= dt;
    if (S.rain[i].t <= 0) {
      const r = S.rain.splice(i, 1)[0];
      const c2 = spawnDrop(r.x, r.y, r.kind);
      if (c2 && r.kind === 'item') { c2.iid = r.iid; c2.temp = !!r.temp; }
    }
  }
  if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) dismissWheel(); }

  for (const c of S.coins) {
    if (c.st === 'air') {
      const td = MACH.tiers[c.tier];
      c.vz += C.GRAV * dt;
      c.z -= c.vz * dt;
      c.rot += c.vrot * dt;
      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.5 * dt);
      c.x += c.vx * dt;
      c.vx *= Math.exp(-0.9 * dt);
      if (c.x < 9) { c.x = 9; c.vx = Math.abs(c.vx) * 0.45; }
      if (c.x > 91) { c.x = 91; c.vx = -Math.abs(c.vx) * 0.45; }
      // land ON the moving pusher shelf when it is underneath
      const pfA = pusherFront(c.tier);
      if (!c.chkP && c.z <= td.z + C.PUSH_H && c.z > td.z + C.PUSH_H - 3) {
        c.chkP = true;
        if (c.y < pfA - c.r * 0.3) {
          c.st = 'plat'; c.onPush = true; c.lay = 0;
          c.z = td.z + C.PUSH_H; c.vz = 0;
          c.vx += (rng() - 0.5) * 5;
          c.vy += (rng() - 0.5) * 3;
          if (!quiet) SND.clink();
          continue;
        }
      }
      if (!c.chk2 && c.z <= td.z + 2 * C.COIN_H) {
        c.chk2 = true;
        if (findSupport(c, 1)) { landCoin(c, 2); continue; }
      }
      if (!c.chk1 && c.z <= td.z + C.COIN_H) {
        c.chk1 = true;
        if (findSupport(c, 0)) { landCoin(c, 1); continue; }
      }
      if (c.z <= td.z) landCoin(c, 0);
    } else if (c.st === 'plat' && c.onPush) {
      const td = MACH.tiers[c.tier];
      const pf = pusherFront(c.tier);
      const pv = pusherVel(c.tier);
      if (pv > 0) c.y += pv * dt;
      const fr = Math.exp(-C.FRICTION * dt);
      c.vx *= fr; c.vy *= fr;
      if (Math.abs(c.vx) < C.SETTLE) c.vx = 0;
      if (Math.abs(c.vy) < C.SETTLE) c.vy = 0;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < c.r) { c.x = c.r; c.vx *= -0.3; }
      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }
      if (c.y < td.back + c.r * 0.5) c.y = td.back + c.r * 0.5;
      if (c.y > pf) {
        c.st = 'air'; c.onPush = false;
        c.vz = 0; c.chk1 = c.chk2 = false; c.chkP = true;
        c.vy = Math.max(c.vy, 6);
        c.vrot = (rng() - 0.5) * 8;
      }
    } else if (c.st === 'plat') {
      const td = MACH.tiers[c.tier];
      const pf = pusherFront(c.tier);
      const pv = pusherVel(c.tier);
      if (c.y - c.r < pf) {
        c.y = pf + c.r;
        if (pv > 0) c.vy = Math.max(c.vy, pv);
      }
      if (c.popT > 0) c.popT -= dt;
      const fr = Math.exp(-C.FRICTION * dt);
      c.vx *= fr; c.vy *= fr;
      if (Math.abs(c.vx) < C.SETTLE) c.vx = 0;
      if (Math.abs(c.vy) < C.SETTLE) c.vy = 0;
      const front = tierFront(c.tier);
      // the incline lip: coins stall teetering at the brink until shoved
      if (c.lay === 0 && c.vy > 0 && c.y > front - MACH.lipW && c.y <= front) {
        c.vy = Math.max(0, c.vy - C.LIP_G * dt);
      }
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.lay > 0) {
        const s = findSupport(c, c.lay - 1);
        if (s) {
          const k = Math.min(1, dt * 5);
          c.vx += (s.vx - c.vx) * k;
          c.vy += (s.vy - c.vy) * k;
        } else {
          c.lay--; c.z = td.z + c.lay * C.COIN_H;
          if (!quiet) SND.clink();
        }
      }
      // solid side walls all the way down: nothing is ever lost to the
      // sides — the only way off the field is over the FRONT, into the tray
      if (c.x < c.r) { c.x = c.r; c.vx *= -0.3; }
      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }
      // items TOPPLE: jolts (collisions, tilts, the pusher's shove) rock
      // them; leaned past the tipping point they fall flat like dominoes,
      // small leans right themselves. Purely visual — never touches x/y.
      if (c.kind === 'item') {
        const jolt = Math.abs(c.vx - c.pvx) + Math.abs(c.vy - c.pvy);
        if (jolt > 4.5) {
          c.tipV += Math.min(jolt, 30) * 0.05 * (0.4 + hash01(c.glint * 37.7 + c.x * 0.61 + c.y * 0.29));
          // a fresh knock while upright picks a fresh direction to fall in
          if (c.tip < 0.12) c.tipA = hash01(c.glint * 57.3 + c.x * 0.83 + c.y * 0.47) * Math.PI * 2;
        }
        if (c.tip < TIP_OVER) c.tipV -= c.tip * 7 * dt;
        else c.tipV += 5.5 * dt;
        c.tipV *= Math.exp(-2.2 * dt);
        c.tip += c.tipV * dt;
        if (c.tip > TIP_LIM) { c.tip = TIP_LIM; if (c.tipV > 0) c.tipV *= -0.2; }
        if (c.tip < 0) { c.tip = 0; c.tipV = 0; }
        c.pvx = c.vx; c.pvy = c.vy;
      }
      if (c.y > front) {
        c.st = 'fall'; c.vz = 0; c.vrot = (rng() - 0.5) * 12 + Math.sign(c.vy || 1) * 4;
      }
    } else if (c.st === 'fall') {
      c.vz += C.GRAV * dt;
      c.z -= c.vz * dt;
      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.2 * dt);
      c.rot += c.vrot * dt;
      // the cabinet funnels everything over the front edge into the tray
      const fx2 = Math.max(22, Math.min(78, c.x));
      c.x += (fx2 - c.x) * Math.min(1, dt * 5);
      if (c.z <= C.TRAY_Z) {
        if (!c.scored) { c.scored = true; if (!quiet) scoreCoin(c); }
        c.z = C.TRAY_Z;
        c.vz = -c.vz * 0.42;
        c.bounces++;
        c.vrot *= 0.5;
        if (c.bounces >= 3 || c.vz > -25) { c.st = 'tray'; c.ttl = 1.5; c.z = C.TRAY_Z; }
        else if (!quiet) SND.clink();
      }
    } else if (c.st === 'tray') {
      c.ttl -= dt;
    }
  }

  // coin vs coin — positional correction + impulse; same layer only.
  const cs = S.coins;
  const plats = [];
  for (const c of cs) if (c.st === 'plat') plats.push(c);
  plats.sort((a, b) => a.x - b.x);
  const REACH = kindR('item') * 2 + 0.5;
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < plats.length; i++) {
      const a = plats[i];
      for (let j = i + 1; j < plats.length; j++) {
        const b = plats[j];
        if (b.x - a.x > REACH) break;
        if (a.lay !== b.lay || a.tier !== b.tier || a.onPush !== b.onPush) continue;
        let dx = b.x - a.x, dy = b.y - a.y;
        const rr = a.r + b.r;
        const d2 = dx * dx + dy * dy;
        if (d2 >= rr * rr || d2 === 0) continue;
        const d = Math.sqrt(d2);
        const nx = dx / d, ny = dy / d;
        const overlap = rr - d;
        const ima = 1 / a.m, imb = 1 / b.m, ims = ima + imb;
        const corr = overlap * 0.8 / ims;
        a.x -= nx * corr * ima; a.y -= ny * corr * ima;
        b.x += nx * corr * imb; b.y += ny * corr * imb;
        const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
        const vn = rvx * nx + rvy * ny;
        if (vn < 0) {
          const jimp = -(1 + C.REST) * vn / ims;
          a.vx -= nx * jimp * ima; a.vy -= ny * jimp * ima;
          b.vx += nx * jimp * imb; b.vy += ny * jimp * imb;
        }
      }
    }
  }

  // cleanup
  for (let i = cs.length - 1; i >= 0; i--) {
    const c = cs[i];
    if (c.st === 'tray' && c.ttl <= 0) { cs.splice(i, 1); S.trayPile = Math.min(S.trayPile + 1, 14); }
  }

  for (let i = S.floats.length - 1; i >= 0; i--) {
    const f = S.floats[i];
    f.age += dt;
    if (f.age >= f.max) S.floats.splice(i, 1);
  }
  if (S.banner) {
    S.banner.ttl -= dt;
    if (S.banner.ttl <= 0) S.banner = null;
  }
  if (S.uiFlash) {
    S.uiFlash.t -= dt;
    if (S.uiFlash.t <= 0) S.uiFlash = null;
  }
}

function tick(dt) {
  dt = Math.min(dt, 0.05);
  if (S.run && S.run.stats) S.run.stats.t += dt;   // the run clock
  S._achT = (S._achT || 0) + dt;
  if (S._achT >= 1) { S._achT = 0; achPoll(); }    // cheap trophies, once a second
  const n = 2, sub = dt / n;
  for (let i = 0; i < n; i++) step(sub);
}

  // ------------------------------------------------------------ draw helpers
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function poly(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  }
  // pretty numbers: commas up to 9,999 — then 12.3k / 3.4M compact
  function fmt(n) {
    n = Math.floor(n);
    if (n >= 1e6) return (n / 1e6).toFixed(n >= 1e7 ? 0 : 1).replace(/\.0$/, '') + 'M';
    if (n >= 1e4) return (n / 1e3).toFixed(n >= 1e5 ? 0 : 1).replace(/\.0$/, '') + 'k';
    return ('' + n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function txt(s, x, y, font, col, align, stroke) {
    ctx.font = font;
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    if (stroke) { ctx.lineWidth = stroke.w; ctx.strokeStyle = stroke.col; ctx.strokeText(s, x, y); }
    ctx.fillStyle = col;
    ctx.fillText(s, x, y);
  }
  // a centered label that SHRINKS to its box instead of spilling over the
  // neighbors — for tight chip rows (hero-card perk/seal lines). Starts at
  // the given size and scales down only as far as the string demands.
  function fitTxt(s, cx, cy, maxW, size, col) {
    ctx.font = '700 ' + size + 'px Verdana, sans-serif';
    const tw = ctx.measureText(s).width;
    if (tw > maxW && tw > 0) size = Math.max(6, size * maxW / tw);
    txt(s, cx, cy, '700 ' + size + 'px Verdana, sans-serif', col);
  }
  function uiBtn(x, y, w, h, label, cb, opts) {
    opts = opts || {};
    // fat fingers welcome: every button's HIT box is at least 38px square
    // (visuals unchanged; overlaps resolve topmost-first, so tight rows of
    // small buttons still pick the nearest)
    const hw = Math.max(w, 38), hh = Math.max(h, 38);
    uiButtons.push({ x: x - (hw - w) / 2, y: y - (hh - h) / 2, w: hw, h: hh,
                     cb: () => { SND.tick(); cb(); } });
    const r = opts.r || 12;
    // soft offset shade grounds every button (cheaper than shadowBlur)
    rr(x - 1, y + 2, w + 2, h + 2, r + 1);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
    rr(x, y, w, h, r);
    if (opts.grad) {
      const g = ctx.createLinearGradient(0, y, 0, y + h);
      g.addColorStop(0, opts.grad[0]); g.addColorStop(1, opts.grad[1]);
      ctx.fillStyle = g;
    } else ctx.fillStyle = opts.bg || 'rgba(20,10,14,0.85)';
    ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = opts.border || '#7d5a24';
    rr(x, y, w, h, r); ctx.stroke();
    // glass gloss across the upper half
    ctx.save();
    rr(x + 2, y + 2, w - 4, Math.max(4, h * 0.44), Math.max(3, r - 3));
    const gl = ctx.createLinearGradient(0, y, 0, y + h * 0.5);
    gl.addColorStop(0, 'rgba(255,255,255,0.26)');
    gl.addColorStop(1, 'rgba(255,255,255,0.02)');
    ctx.fillStyle = gl; ctx.fill();
    ctx.restore();
    if (label) txt(label, x + w / 2, y + h / 2 + 1, opts.font || '800 15px Verdana, sans-serif', opts.col || '#f2cd5e',
                   'center', { w: 3, col: 'rgba(15,6,8,0.35)' });
  }
  function bar(x, y, w, h, frac, colA, colB, bg) {
    rr(x, y, w, h, h / 2);
    ctx.fillStyle = bg || 'rgba(0,0,0,0.55)'; ctx.fill();
    if (frac > 0.01) {
      rr(x + 1.5, y + 1.5, Math.max(h - 3, (w - 3) * Math.min(1, frac)), h - 3, (h - 3) / 2);
      const g = ctx.createLinearGradient(x, 0, x + w, 0);
      g.addColorStop(0, colA); g.addColorStop(1, colB);
      ctx.fillStyle = g; ctx.fill();
    }
  }

  // -------------------------------------------------------- battle: cabinet
  // slow drifting bokeh orbs, tinted by the floor theme (positions are fixed;
  // only alpha/drift animate, so this stays cheap)
  const BOKEH = Array.from({ length: 14 }, (_, i) => ({
    x: (i * 137.5) % 480, y: 120 + (i * 233.7) % 620,
    r: 14 + (i * 41) % 42, ph: i * 1.7, sp: 0.16 + (i % 5) * 0.05,
  }));
  // the dungeon backdrop, split so the static half can be baked into a layer:
  // base gradient + god rays are frozen (they barely move), bokeh stays live
  function bgBase(t) {
    const T = theme();
    ctx.fillStyle = rgr('bg:' + fkey(), LW / 2, 300, 60, LW / 2, 420, 620,
      [[0, T.room], [0.6, '#241a26'], [1, '#171019']]);
    ctx.fillRect(-40, -40, LW + 80, LH + 80);
    t = t || 0;
    ctx.save();
    // god-rays falling from the vault above
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 3; i++) {
      const bx = 90 + i * 150 + Math.sin(t * 0.25 + i * 2.4) * 26;
      const g = ctx.createLinearGradient(bx, 0, bx - 90, LH);
      g.addColorStop(0, 'rgba(255,236,190,0.055)');
      g.addColorStop(0.5, 'rgba(255,236,190,0.02)');
      g.addColorStop(1, 'rgba(255,236,190,0)');
      ctx.fillStyle = g;
      poly([{ x: bx - 26, y: -20 }, { x: bx + 26, y: -20 }, { x: bx - 60, y: LH + 20 }, { x: bx - 130, y: LH + 20 }]);
      ctx.fill();
    }
    ctx.restore();
  }
  function bgBokeh(t) {
    const T = theme();
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // theme-tinted bokeh, breathing slowly
    for (const b of BOKEH) {
      const a = 0.05 + 0.035 * Math.sin(t * b.sp + b.ph);
      if (a <= 0.015) continue;
      ctx.globalAlpha = a;
      const y = b.y + Math.sin(t * b.sp * 0.7 + b.ph) * 14;
      ctx.fillStyle = T.accent;
      ctx.beginPath(); ctx.arc(b.x, y, b.r, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  // the hero's strike: armed by the resolve so his lunge meets the impact
  const HFX = { until: -1, dur: 0.4, tx: 340 };
  // a glossy HP bar with a pale "damage ghost" that drains after each hit
  function hpBar(x, y, w, h, hp, maxHp, ghost, cols) {
    cols = cols || ['#ff6f6f', '#b01e36'];
    rr(x - 1, y - 1, w + 2, h + 2, (h + 2) / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.66)'; ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,255,255,0.14)'; ctx.stroke();
    const gf = Math.max(0, Math.min(1, ghost / maxHp));
    const f = Math.max(0, Math.min(1, hp / maxHp));
    if (gf > 0.01) {
      rr(x + 1, y + 1, Math.max(h - 2, (w - 2) * gf), h - 2, (h - 2) / 2);
      ctx.fillStyle = '#ffe9c9'; ctx.fill();
    }
    if (f > 0.01) {
      rr(x + 1, y + 1, Math.max(h - 2, (w - 2) * f), h - 2, (h - 2) / 2);
      ctx.fillStyle = lgr('hp:' + (x | 0) + ':' + (w | 0) + ':' + cols[0], x, 0, x + w, 0,
        [[0, cols[0]], [1, cols[1]]]);
      ctx.fill();
      // gloss strip
      rr(x + 2, y + 1.5, Math.max(2, (w - 4) * f), Math.max(1.5, (h - 3) * 0.4), 2);
      ctx.fillStyle = 'rgba(255,255,255,0.32)'; ctx.fill();
    }
  }
  // a soft light pool under a combatant's feet (cached sprite — cheap)
  function spotlight(x, y, r, col, a) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = a;
    ctx.drawImage(spotSprite(col), x - r, y - r * 0.32, r * 2, r * 0.64);
    ctx.restore();
  }
  // the arena's fixed dressing — painted ONCE into the battle base layer
  function stageChrome() {
    const stageFrame = machArt('frame_stage');
    if (stageFrame) {
      // the runic banner frame from the UI sheet IS the arena
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 5;
      ctx.drawImage(stageFrame, 12, 6, LW - 24, 138);
      ctx.restore();
    } else {
      // panel: soft shadow, arched gradient, dark outer + gold inner border
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 5;
      rr(20, 12, LW - 40, 128, 20);
      ctx.fillStyle = lgr('ep:' + fkey(), 0, 12, 0, 140, [[0, '#2c2234'], [0.72, '#1b1420'], [1, '#241a28']]);
      ctx.fill();
      ctx.restore();
      rr(20, 12, LW - 40, 128, 20);
      ctx.lineWidth = 3.5; ctx.strokeStyle = '#0e0a14'; ctx.stroke();
      rr(22.5, 14.5, LW - 45, 123, 18);
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = lgr('epRim', 0, 14, 0, 138, [[0, '#e8c877'], [0.5, '#8a6a34'], [1, '#5a4520']]);
      ctx.stroke();
    }
    // a faint arena glow behind the duel
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = rgr('epGlow:' + fkey(), LW / 2, 118, 8, LW / 2, 118, 240,
      [[0, 'rgba(255,220,160,0.10)'], [1, 'rgba(0,0,0,0)']]);
    rr(22, 14, LW - 44, 124, 19); ctx.fill();
    ctx.restore();
    // stage floorline + the hero's light pool
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(36, 112); ctx.lineTo(LW - 36, 112); ctx.stroke();
    spotlight(72, 112, 58, 'rgba(140,190,255,0.5)', 0.35);
    // wall torches flank the arena (their breathing glows stay live)
    const tcL = machArt('torch_l'), tcR = machArt('torch_r');
    if (tcL && tcR) {
      ctx.drawImage(tcL, 26, 48, 26, 55);
      ctx.drawImage(tcR, LW - 52, 48, 26, 55);
    }
  }
  function drawEnemyPanel(t, dt) {
    // the battle STAGE: your hero holds the left, the pack prowls the right
    const T = theme();
    dt = dt || 0.016;
    ctx.save();
    // torch flames breathe over the cached chrome
    if (machArt('torch_l')) {
      const fl2 = 1 + Math.sin(t * 8) * 0.12;
      for (const tx of [26, LW - 52]) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.18 + 0.07 * Math.sin(t * 9 + tx);
        ctx.fillStyle = '#ff9d3c';
        ctx.beginPath(); ctx.arc(tx + 13, 60, 16 * fl2, 0, 7); ctx.fill();
        ctx.restore();
      }
    }
    // the dueling line
    ctx.globalAlpha = 0.4 + 0.12 * Math.sin(t * 3);
    txt('⚔', 146, 64, '17px serif', '#e8c877');
    ctx.globalAlpha = 1;

    // ---- your hero, stage left ----
    const hx = 72, hy = 112;
    ANCHORS.hero.x = hx; ANCHORS.hero.y = 56;
    let hdx = 0, hlk = 0;
    if (S.run && t < HFX.until) {
      hlk = Math.max(0, Math.min(1, 1 - (HFX.until - t) / HFX.dur));
      hdx = Math.sin(hlk * Math.PI) * Math.max(0, HFX.tx - hx - 54);
    }
    ctx.beginPath(); ctx.ellipse(hx + hdx, hy + 4, 19, 5.5, 0, 0, 7);
    ctx.fillStyle = 'rgba(6,3,8,0.55)'; ctx.fill();
    ctx.save();
    ctx.translate(hx + hdx, hy - 34 + Math.sin(t * 2.4) * 2);
    if (S.hurtT > 0) ctx.rotate(Math.sin(t * 50) * 0.09);
    else if (hdx > 2) ctx.rotate(0.13);              // leaning into the blow
    const hero = S.run ? (S.run.hero || 'knight') : 'knight';
    const hkey = hero + '_idle';
    if (!(SHEETS[hkey] && drawArt(hkey, 0, 34, (SHEETS[hkey].bh || 50) * 1.12, 'r', t))) {
      txt((heroById(hero) || HEROES[0]).icon, 0, -6, '40px serif', '#fff');
    }
    if (S.hurtT > 0.2) {
      ctx.globalAlpha = Math.min(1, S.hurtT * 2);
      ctx.beginPath(); ctx.arc(0, -14, 26, 0, 7);
      ctx.fillStyle = 'rgba(255,70,60,0.35)'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    // his blade sings mid-lunge
    if (hlk > 0.3 && hlk < 0.8) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.translate(hx + hdx + 30, hy - 46);
      ctx.rotate(-0.6 + hlk * 1.5);
      txt('⚡', 0, 0, '26px serif', '#fff');
      ctx.restore();
    }
    // the shield ring: your block, made visible (the count lives in the ribbon)
    if (S.run && S.run.block > 0) {
      const pulse = 1 + Math.sin(t * 4) * 0.05;
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(hx, hy - 32, 30 * pulse, 0, 7);
      ctx.lineWidth = 3; ctx.strokeStyle = '#9fc8e8'; ctx.stroke();
      ctx.restore();
    }
    if (S.hurtT > 0.28) txt('\u{1F4A2}', hx + 26, hy - 56, '22px serif', '#fff');
    // ---- the hero card: name, HP bar + number, and a tidy status ribbon,
    // mirroring the foe's card on the right so the duel reads at a glance ----
    if (S.run) {
      const hName = (heroById(S.run.hero) || HEROES[0]).name.toUpperCase();
      txt(hName, hx, 15, '800 10px Georgia, serif', '#8fe39a', 'center', { w: 3, col: 'rgba(8,24,14,0.9)' });
      const hbw = 112, hbx = hx - hbw / 2, hby = 113;
      if (S.hpGhost === undefined || S.hpGhost < S.run.hp) S.hpGhost = S.run.hp;
      if (S.hpGhost > S.run.hp) S.hpGhost = Math.max(S.run.hp, S.hpGhost - dt * Math.max(6, S.run.maxHp * 0.55));
      const low = S.run.hp / S.run.maxHp < 0.3;
      hpBar(hbx, hby, hbw, 12, Math.max(0, S.run.hp), S.run.maxHp, S.hpGhost,
            low ? ['#ff6f6f', '#b01e36'] : ['#8fe39a', '#3f9d5a']);
      // a green ring swells off the bar while a heal lands
      if (S.healT > 0) {
        const hk = 1 - S.healT / 0.9;
        ctx.save();
        ctx.globalAlpha = (S.healT / 0.9) * 0.85;
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = '#7ee787';
        rr(hbx - 2 - hk * 7, hby - 2 - hk * 5, hbw + 4 + hk * 14, 16 + hk * 10, 9);
        ctx.stroke();
        ctx.restore();
      }
      txt(Math.max(0, S.run.hp) + ' / ' + S.run.maxHp, hx, hby + 6, '800 10px Verdana, sans-serif',
          '#f0fff0', 'center', { w: 2.5, col: 'rgba(6,26,12,0.85)' });
      // a compact status strip under the bar: block & boons first, then debuffs
      const st = [];
      if (S.run.block > 0) st.push(['\u{1F6E1}' + S.run.block, '#cfe4ff']);
      if (strTotal() > 0) st.push(['\u{1F4AA}' + strTotal(), '#ffb46b']);
      if (dexTotal() > 0) st.push(['\u{1F933}' + dexTotal(), '#8be7ff']);
      if (S.pPois > 0) st.push(['☠' + S.pPois, '#b8f26b']);
      if (S.pBleed > 0) st.push(['\u{1FA78}' + S.pBleed, '#ff5a6e']);
      if (S.pBurn > 0) st.push(['\u{1F525}' + S.pBurn, '#ff9d3c']);
      if (S.weakT > 0) st.push(['\u{2B07}' + S.weakT, '#c8b8e0']);
      if (S.taxT > 0) st.push(['\u{1FA99}☠' + S.taxT, '#ffd75e']);
      if (S.noTiltT > 0) st.push(['❄✋', '#8be7ff']);
      if (S.leadT > 0) st.push(['\u{1FAB6}', '#c8c8d6']);
      if (S.blackT > 0) st.push(['❓', '#9a8aa0']);
      if (S.rustT > 0) st.push(['\u{1F9A0}', '#c8a86a']);
      if (st.length) {
        // scale the gap so even a long list stays within the hero's column
        const wof = (s) => 12 + s[0].length * 5.5;
        const total = st.reduce((a, s) => a + wof(s), 0);
        const gap = Math.min(0, (128 - total)) / Math.max(1, st.length);
        let sx = Math.max(6, hx - Math.min(total, 128) / 2);
        for (const s of st) {
          txt(s[0], sx, hby + 22, '800 10px Verdana, sans-serif', s[1], 'left', { w: 2, col: 'rgba(8,5,12,0.85)' });
          sx += wof(s) + gap;
        }
      }
    }
    // ---- the pack: your pets stand at the hero's heel ----
    S.pets.forEach((p, pi) => {
      const px2 = hx + 38 + pi * 24, py2 = hy + 2;
      if (p.hp <= 0) {
        ctx.save(); ctx.globalAlpha = 0.25;
        txt('\u{1F4A8}', px2, py2 - 10, '14px serif', '#fff');
        ctx.restore();
        return;
      }
      const pbob = Math.sin(t * 3 + pi * 1.3) * 1.5;
      ctx.beginPath(); ctx.ellipse(px2, py2 + 2, 8, 2.6, 0, 0, 7);
      ctx.fillStyle = 'rgba(6,3,8,0.5)'; ctx.fill();
      const pa = itemArt(p.iid);
      if (pa) { const hh = 22, ww = imW(pa, hh); ctx.drawImage(pa, px2 - ww / 2, py2 - 19 + pbob, ww, hh); }
      else txt(p.icon, px2, py2 - 9 + pbob, '16px serif', '#fff');
      // a sliver of a health bar under each beast
      const pf = Math.max(0, p.hp / p.maxHp);
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(px2 - 8, py2 + 5, 16, 3);
      ctx.fillStyle = pf < 0.35 ? '#ff5a4e' : '#7ee787';
      ctx.fillRect(px2 - 8, py2 + 5, 16 * pf, 3);
    });

    // ---- the pack, stage right ----
    const foes = S.foes || [];
    const n = foes.length;
    const footY = 108;
    for (let i = 0; i < n; i++) {
      const e = foes[i];
      const scl = n <= 1 ? 1 : n === 2 ? 0.85 : 0.72;
      const cx = n === 1 ? LW - 156 : (LW - 84) - (n - 1 - i) * Math.min(122, 216 / (n - 1));
      const isTgt = S.battle && S.battle.target === i;
      if (isTgt) { ANCHORS.enemy.x = cx; ANCHORS.enemy.y = 56; }
      if (e.hp <= 0) {
        // its dust settles where it stood
        ctx.save();
        ctx.globalAlpha = S.victory ? Math.max(0.1, 1 - S.victory.t) : 0.3;
        txt('\u{1F4A8}', cx, footY - 26, '26px serif', '#fff');
        ctx.restore();
        continue;
      }
      // its attack: a full lunge ACROSS the stage at your hero
      const lk = e.lungeT > 0 ? Math.sin((0.4 - e.lungeT) / 0.4 * Math.PI) : 0;
      const it = e.intent || {};
      const charges = e.lungeT > 0 && (it.t === 'hit' || it.t === 'heavy' || !it.t);
      const dx = -lk * (charges ? Math.max(0, cx - hx - 56) : 10);
      const bob = Math.sin(t * 2.2 + i * 1.7) * 2.5;
      const breathe = 1 + Math.sin(t * 2.2 + 1 + i) * 0.03;
      const sz = (e.boss ? 64 : 52) * scl;
      // its light pool — the TARGET stands in a ring of gold
      spotlight(cx + dx, footY, 46 * scl + 14, e.boss ? 'rgba(255,215,94,0.55)' : 'rgba(239,75,93,0.45)', isTgt ? 0.5 : 0.25);
      if (isTgt && n > 1) {
        ctx.save();
        ctx.globalAlpha = 0.75 + 0.2 * Math.sin(t * 5);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffd75e';
        ctx.beginPath(); ctx.ellipse(cx + dx, footY + 1, 30 * scl + 6, (30 * scl + 6) * 0.3, 0, 0, 7); ctx.stroke();
        ctx.restore();
      }
      // menace aura — the TARGET burns brightest
      ctx.globalAlpha = ((e.boss ? 0.3 : 0.18) + 0.08 * Math.sin(t * 3)) * (isTgt ? 1.4 : 0.7);
      ctx.beginPath(); ctx.arc(cx + dx, footY - sz * 0.55, sz * 0.8 + lk * 8, 0, 7);
      ctx.fillStyle = e.boss ? '#ffd75e' : e.elite ? '#ff9d3c' : '#ef4b5d';
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.save();
      ctx.translate(cx + dx, footY - 34 * scl + bob - lk * 8);
      if (dx < -4) ctx.rotate(-0.16);                // airborne, fangs first
      ctx.scale(breathe + (e.hitT > 0 ? 0.12 : 0), 1 / (breathe + (e.hitT > 0 ? 0.12 : 0)) * breathe);
      if (e.hitT > 0) ctx.rotate(Math.sin(t * 60) * 0.08);
      if (e.stunned > 0) ctx.globalAlpha *= 0.75;
      const artKey = foeArtKey(e);
      if (!(artKey && drawArt(artKey, 0, 34 * scl, (sheetOf(artKey).bh || 76) * scl, 'l', t))) {
        txt(e.icon, 0, 0, Math.round(sz) + 'px serif', '#fff');
      }
      if (e.hitT > 0 && artKey) {
        ctx.globalAlpha = e.hitT * 1.2;
        ctx.beginPath(); ctx.arc(0, 0, sz * 0.7, 0, 7);
        ctx.fillStyle = 'rgba(255,90,80,0.4)'; ctx.fill();
      }
      ctx.restore();
      // the blow lands on your hero
      if (lk > 0.8 && charges) txt('\u{1F4A5}', hx + 30, hy - 44, '26px serif', '#fff');
      // your mark hovers over the target — tap another foe to switch
      if (isTgt && n > 1) {
        txt('▼', cx, 28 + Math.sin(t * 5) * 2, '900 13px Verdana, sans-serif', '#ffd75e', 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
      }
      // per-foe bar + status + intent — with a pale ghost that drains after hits
      if (e._ghost === undefined || e._ghost < e.hp) e._ghost = e.hp;
      if (e._ghost > e.hp) e._ghost = Math.max(e.hp, e._ghost - dt * Math.max(6, e.maxHp * 0.55));
      const bw = n === 1 ? 128 : 84;
      const by = 118;
      hpBar(cx - bw / 2, by, bw, n === 1 ? 11 : 9, Math.max(0, e.hp), e.maxHp, e._ghost);
      txt(Math.max(0, e.hp) + '/' + e.maxHp, cx, by + (n === 1 ? 5.5 : 4.5),
          '800 ' + (n === 1 ? 9 : 8) + 'px Verdana, sans-serif', '#fff4f6', 'center', { w: 2.5, col: 'rgba(40,5,12,0.8)' });
      // the wound ledger: poison, then bleed, then burn stack down the side
      let sy2 = by + 4;
      if (e.pois > 0) { txt('☠' + e.pois, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#b8f26b'); sy2 += 11; }
      if (e.bleed > 0) { txt('\u{1FA78}' + e.bleed, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#ff5a6e'); sy2 += 11; }
      if (e.burn > 0) { txt('\u{1F525}' + e.burn, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#ff9d3c'); }
      if (e.braced) txt('\u{1F6E1}', cx + bw / 2 + 11, by + 4, '11px serif', '#fff');
      if (e.block > 0) txt('\u{1F6E1}' + e.block, cx + bw / 2 + 13, by + (e.braced ? 15 : 4), '800 10px Verdana, sans-serif', '#e8c877');
      // its defensive mechanic, badged under the bar (packs); the lone foe
      // gets the full description in its header instead
      if (e.def && n > 1) txt(DEF_BADGE[e.def], cx, by + 13, '800 9px Verdana, sans-serif',
                              '#d8c8f0', 'center', { w: 2, col: 'rgba(10,5,12,0.9)' });
      const intentTxt = blackedOut() ? '❓ ???'
        : e.stunned > 0 ? '❄ skips turn'
        : it.t === 'heavy' ? '\u{1F4A5} ' + (e.atk * 2) + (e.trait === 'fast' ? '×2' : '')
        : it.t === 'brace' ? '\u{1F6E1} braces'
        : it.t === 'curse' ? '\u{1F480} skulls'
        : it.t === 'sow' ? '\u{1F480} sows'
        : it.t === 'hex' ? '\u{1F52E} HEX'
        : '⚔ ' + e.atk + (e.trait === 'fast' ? '×2' : '');
      // the telegraph: over its head in a pack, under the bar when alone
      // (the lone foe's name owns the headline spot)
      txt(intentTxt, cx, n === 1 ? by + 18 : Math.max(26, footY - sz - 20 * scl),
          '800 ' + (n === 1 ? 11 : 9) + 'px Verdana, sans-serif',
          e.stunned > 0 ? '#8be7ff' : it.t === 'heavy' ? '#ff5a4e' : it.t === 'brace' ? '#c8d6e8' : it.t === 'curse' ? '#c86bff' : '#ffb4a8',
          'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
      // tap a foe to inspect it (and, in a pack, aim your gold at it)
      if (S.battle && !S.victory) {
        const ii = i;
        uiButtons.push({ x: cx - 52, y: 16, w: 104, h: 120, cb: () => { if (n > 1) setTarget(ii); S.foeInfo = ii; } });
      }
    }
    // a gentle nudge that the foes are tappable
    if (n) {
      const tgt = S.enemy;
      if (tgt && n === 1) {
        txt(tgt.name, LW - 156, 30, '900 13px Georgia, serif', tgt.boss ? '#ffd75e' : '#e8dce8',
            'center', { w: 4, col: 'rgba(20,8,24,0.9)' });
        if (tgt.def) txt(DEF_BADGE[tgt.def] + ' ' + DEF_TXT[tgt.def], LW - 156, 43,
                         '600 9px Verdana, sans-serif', '#c3a8e0');
        if (tgt.trait) txt(TRAIT_TXT[tgt.trait], LW - 156, tgt.def ? 54 : 43, '600 9px Verdana, sans-serif', '#9a8aa0');
      } else if (tgt && tgt.hp > 0) {
        // up top, clear of the per-foe mechanic badges below the bars
        txt('\u{1F3AF} ' + tgt.name, LW / 2, 15, '800 10px Georgia, serif', '#ffd75e',
            'center', { w: 3, col: 'rgba(20,8,24,0.9)' });
      }
      // round chip
      if (S.battle) {
        rr(30, 20, 74, 22, 11);
        ctx.fillStyle = 'rgba(10,6,12,0.8)'; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = T.accent; ctx.stroke();
        txt('ROUND ' + S.battle.round, 67, 31, '900 10px Verdana, sans-serif', T.accent);
      }
    }
    ctx.restore();
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
  }

  function drawMeter(t) {
    const fr = S.meter / C.METER_MAX;
    // the gilded gauge from the cabinet concept, with our LIVE fill laid
    // into its channel — painted strip as the fallback
    const tube = machArt('jackpot');
    if (tube) {
      // the runic lightning tube: a dark ghost of it when empty, and the
      // charged version revealed from the left as the meter climbs
      const iw = 268, ih = iw * imAspect(tube, 50 / 352);
      const x0 = LW / 2 - iw / 2, y0 = 198;
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.drawImage(tube, x0, y0, iw, ih);
      ctx.fillStyle = 'rgba(10,8,20,0.5)';
      rr(x0 + 2, y0 + 2, iw - 4, ih - 4, ih / 2); ctx.fill();
      ctx.restore();
      if (fr > 0.01) {
        ctx.save();
        ctx.beginPath(); ctx.rect(x0, y0 - 4, iw * fr, ih + 8); ctx.clip();
        ctx.drawImage(tube, x0, y0, iw, ih);
        if (fr > 0.8) {
          // near-jackpot: the tube crackles
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.25 + 0.2 * Math.sin(t * 10);
          ctx.drawImage(tube, x0, y0, iw, ih);
        }
        ctx.restore();
      }
      txt('JACKPOT', x0 - 8, y0 + ih / 2, '800 9px Verdana, sans-serif',
          fr > 0.5 ? '#8be7ff' : '#8a6f4a', 'right');
      return;
    }
    // slimmed down and tucked over the coin wall — the hand row owns y144 now
    const x = 150, y = 196, w = LW - 300, h = 8;
    rr(x - 3, y - 3, w + 6, h + 6, 7);
    ctx.fillStyle = 'rgba(28,13,19,0.85)'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#6e4c1c'; ctx.stroke();
    if (fr > 0) {
      const pulse = fr > 0.8 ? 0.25 + 0.2 * Math.sin(t * 10) : 0;
      rr(x, y, Math.max(6, w * fr), h, 4);
      const g = ctx.createLinearGradient(x, 0, x + w, 0);
      g.addColorStop(0, '#ff9d3c'); g.addColorStop(1, '#ff4b2e');
      ctx.fillStyle = g; ctx.fill();
      if (pulse > 0) { ctx.fillStyle = 'rgba(255,240,180,' + pulse + ')'; ctx.fill(); }
      // gloss
      rr(x, y, Math.max(6, w * fr), h * 0.45, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
    }
    // segment ticks make the climb readable
    ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1;
    for (let i = 1; i < 6; i++) {
      const tx2 = x + (w * i) / 6;
      ctx.beginPath(); ctx.moveTo(tx2, y); ctx.lineTo(tx2, y + h); ctx.stroke();
    }
    txt('JACKPOT', x - 12, y + h / 2 + 0.5, '800 9px Verdana, sans-serif',
        fr > 0.5 ? '#ffd75e' : '#8a6f4a', 'right');
  }

  function drawCabinet() {
    const T = theme();
    ctx.save();
    const g = ctx.createLinearGradient(0, 170, 0, 700);
    g.addColorStop(0, T.cabA); g.addColorStop(1, T.cabB);
    ctx.fillStyle = g;
    ctx.fillRect(4, 170, 22, 540);
    ctx.fillRect(LW - 26, 170, 22, 540);
    const wood = machArt('rail') || machArt('cab');
    if (wood) {
      // riveted timber rails flank the cabinet, tinted by the theme beneath
      ctx.globalAlpha = 0.9;
      ctx.drawImage(wood, 4, 170, 22, 540);
      ctx.drawImage(wood, LW - 26, 170, 22, 540);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = 'rgba(255,214,120,0.16)';

  // the wall itself never moves — it lives in the battle base layer
  function drawBackWallStatic() {
    const a = w2s(0, 0, MACH.tiers[0].z);
    ctx.save();
    const g = ctx.createLinearGradient(0, 172, 0, a.y);
    g.addColorStop(0, '#20242c'); g.addColorStop(1, '#3a4049');
    ctx.fillStyle = g;
    ctx.fillRect(26, 172, LW - 52, Math.max(10, a.y - 172));
    const wallArt = machArt('backwall');
    if (wallArt) {
      // the dwarven rune-circuit wall
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.drawImage(wallArt, 26, 171, LW - 52, Math.max(12, a.y - 169));
      ctx.restore();
    } else {
      // brushed panel lines
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      for (let x = 40; x < LW - 40; x += 24) {
        ctx.beginPath(); ctx.moveTo(x, 173); ctx.lineTo(x - 4, a.y - 2); ctx.stroke();
      }

      ctx.fillStyle = '#0d1015';
