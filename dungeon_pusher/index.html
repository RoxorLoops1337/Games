// DUNGEON PUSHER — a coin pusher roguelike.
//
// The coin pusher IS the combat system, played in TURNS: each turn you
// spend a purse of coins into the machine, the tray COLLECTS what falls,
// and when YOU press END TURN it fires piece by piece — gems bank gold,
// silver coins shield the hero, gold coins strike, green coins poison,
// arsenal items hit big, cursed skulls bite last. Then the enemy takes its
// telegraphed turn. The side walls are SOLID: nothing is ever lost off the
// edges — the only way off the field is over the front, into the tray.
//
// Between fights: a real dungeon crawl. Each floor is a carved map of
// connected rooms (fog-of-war minimap, joystick movement, backtracking);
// locked doors eat a key once, monsters drop keys, the boss lairs in the
// farthest room and leaves stairs down when it falls.
//
// Physics is the 2.5D plane sim from Gold Rush Arcade: x across the platform,
// y into the machine (0 = back), z = height. Headless mode (tests): no canvas
// ctx -> sim + roguelike logic only, via window.DP.
// ============================================================================

// weighted pull from the unowned shelf — commons far more often
function rollRelicDrop() {
  if (!S.run) return null;
  const pool = RELICS.filter(rl => S.run.relics.indexOf(rl.id) < 0);
  if (!pool.length) return null;
  const total = pool.reduce((a, rl) => a + RARITY[rl.rar].w, 0);
  let r = rng() * total;
  for (const rl of pool) { r -= RARITY[rl.rar].w; if (r <= 0) return rl.id; }
  return pool[pool.length - 1].id;
}
function relicById(id) { return RELICS.find(r => r.id === id); }
function hasRelic(id) { return !!(S.run && S.run.relics.indexOf(id) >= 0); }
// pull a random UNOWNED relic of a given rarity (null if that shelf is bare)
function rollRelicByRar(rar) {
  if (!S.run) return null;
  const pool = RELICS.filter(rl => rl.rar === rar && S.run.relics.indexOf(rl.id) < 0);
  return pool.length ? pool[(rng() * pool.length) | 0].id : null;
}
// grant a random unowned relic of a rarity; returns the id, or null if none
function grantRelic(rar) {
  const id = rollRelicByRar(rar);
  if (id) S.run.relics.push(id);
  return id;
}
// a spread of up to `count` DISTINCT unowned relics of a rarity, to choose from
function rollRelicPool(rar, count) {
  if (!S.run) return [];
  const pool = RELICS.filter(rl => rl.rar === rar && S.run.relics.indexOf(rl.id) < 0).map(rl => rl.id);
  const out = [];
  while (out.length < count && pool.length) out.push(pool.splice((rng() * pool.length) | 0, 1)[0]);
  return out;
}
// open the relic-CHOICE overlay: pick `picks` from a spread of that rarity.
// If the shelf is too full to fill the spread, grant what's left (or gold).
function openRelicPick(rar, picks) {
  if (!S.run) return false;
  const pool = rollRelicPool(rar, picks + 2);
  if (pool.length <= picks) {
    // not enough choice to be worth a menu — just grant them
    let got = 0;
    for (const id of pool) { S.run.relics.push(id); got++; floatAt(relicById(id).icon + ' ' + relicById(id).name + '!', 50, RARITY[rar].col, true); }
    if (!got) addGold(20 + S.run.floor * 4);
    save();
    return false;
  }
  S.relicPick = { pool, picks, chosen: [], rar };
  save();
  return true;
}
// claim one relic from the wheel's spread; closes once `picks` are taken
function pickWheelRelic(i) {
  const rp = S.relicPick;
  if (!S.run || !rp) return false;
  const id = rp.pool[i];
  if (!id || rp.chosen.indexOf(id) >= 0 || S.run.relics.indexOf(id) >= 0) return false;
  S.run.relics.push(id);
  rp.chosen.push(id);
  SND.buy();
  if (rp.chosen.length >= rp.picks) { S.relicPick = null; }
  save();
  return true;
}
// items carry an implicit rarity by price: the pricier gear is the rarer find
function itemRar(it) { return it.cost >= 55 ? 'r' : 'c'; }
function itemsByRar(rar) { return ITEMS.filter(it => itemRar(it) === rar); }
function randItem(rar) { const pool = itemsByRar(rar); return pool[(rng() * pool.length) | 0]; }

// The inventory's effect sheet: what each coin/item ACTUALLY does right now,
// with every owned relic folded in. `main` is the headline number, `mods`
// names each relic bending it — so the bag doubles as a build overview.
function coinFx(k) {
  const mods = [];
  let main = '';
  const M = (id, txt2) => { if (hasRelic(id)) { const rl = relicById(id); mods.push((rl ? rl.name : id) + ': ' + txt2); return true; } return false; };
  if (k === 'coin') {
    let d = C.DMG.gold;
    if (M('goldedge', '+1 dmg')) d++;
    if (M('keenedge', '+1 dmg')) d++;
    if (hasRelic('berserker') && S.run && S.run.hp * 2 < S.run.maxHp) { d += 2; mods.push('Berserker: +2 dmg (below half HP)'); }
    else M('berserker', '+2 dmg while below half HP');
    main = d + ' dmg';
    if (M('twinstrike', 'strikes TWICE')) main += ' ×2';
    M('momentum', '+1 dmg per 5 gold fired');
    M('warlord', '+1 dmg per 3 gold fired');
    M('heatwave', '+1 dmg while any foe burns');
    M('matchstick', 'also applies 1 BURN');
    M('emberhoard', 'splashes 1 dmg to ALL foes');
    M('bloodgold', 'heals 1 HP on strike');
    M('bloodthirst', 'heals 1 HP on strike');
    M('taxman', '+1 gold per coin fired');
  } else if (k === 'silver') {
    let b = 1;
    if (M('silvercore', '+1 block')) b++;
    if (M('bulwark', '+1 block')) b++;
    main = b + ' block';
    let d = 0;
    if (M('spikeshield', 'also deals 1 dmg')) d += 1;
    if (M('retort', 'also deals 2 dmg')) d += 2;
    if (d) main += ' + ' + d + ' dmg';
    M('alloy', 'every 3rd silver: +3 block');
    M('aegis', 'unspent block carries over');
  } else if (k === 'green') {
    let p = 1;
    if (M('venomtip', '+1 stack')) p++;
    if (M('toxicology', '+1 stack')) p++;
    if (M('twinfangs', 'poison DOUBLED')) p *= 2;
    main = p + ' poison';
    M('rustfang', 'also applies 1 BLEED');
    M('blightlord', 'also deals 1 dmg');
    M('contagion', 'spreads 1 poison to the whole pack');
    if (M('alchemist', 'heals 1 HP')) main += ' + heal 1';
    M('plaguelord', 'poison never fades');
  } else if (k === 'red') {
    let h = C.RED_HEAL;
    if (M('warmheart', '+1 HP')) h++;
    if (M('greensprig', '+1 HP')) h++;
    main = 'heal ' + h + ' HP';
    M('phoenixember', 'also grants 1 block');
    M('crimsonrain', 'also applies 1 BLEED to every foe');
  } else if (k === 'blue') {
    let d = C.DMG.blue;
    if (M('frostshard', '+1 dmg')) d++;
    if (M('permafrost', '+1 dmg')) d++;
    main = d + ' dmg to ALL foes';
    M('sparkstone', '+1 dmg against packs of 2+');
    M('hailstorm', '+1 dmg per other foe standing');
    M('dragonbreath', 'also 1 BURN to every foe');
  } else if (k === 'lucky') {
    let d = C.DMG.lucky;
    if (M('starmetal', '+2 dmg')) d += 2;
    if (M('horseshoe', '+1 dmg')) d += 1;
    if (M('assassin', '+2 dmg, pierces guards')) d += 2;
    main = d + ' dmg';
    M('luckystreak', '+1 dmg per lucky already fired');
    M('embershot', 'also applies 2 BURN');
    M('sniperlens', 'pierces braced guards');
    M('deadeye', 'pierces braced guards');
    M('bloodthirst', 'heals 1 HP on strike');
    M('clover', 'minted twice as often');
  }
  return { main, mods };
}
function itemFx(iid) {
  const it = itemById(iid);
  if (!it) return { main: '', mods: [] };
  const mods = [];
  let main = '';
  const M = (id, txt2) => { if (hasRelic(id)) { const rl = relicById(id); mods.push((rl ? rl.name : id) + ': ' + txt2); return true; } return false; };
  if (it.kind === 'weapon') {
    let w = weaponDmg(it.dmg);
    if (S.run && S.run.whet > 0) mods.push('forge-honed: +' + S.run.whet + ' dmg');
    M('whet', '+30% dmg');
    if (M('armory', '+2 dmg')) w += 2;
    if (it.id === 'sword' && M('balancedblade', '+4 dmg')) w += 4;
    if (M('heavyarms', '+30% dmg')) w = Math.round(w * 1.3);
    main = w + ' dmg' + (it.splash ? ' (splash)' : '');
    M('serrator', 'also applies 2 BLEED');
    M('butcher', '+3 dmg to bleeding foes');
    if (it.id === 'bomb') M('bombardier', 'also applies 4 BURN');
    M('vampblade', 'heals half its dmg');
    M('bloodthirst', 'heals 1 HP on strike');
  } else if (it.kind === 'poison') {
    main = ((it.pois + (hasRelic('venom') ? 2 : 0)) * (hasRelic('twinfangs') ? 2 : 1)) + ' poison';
    M('venom', '+2 stacks');
    M('twinfangs', 'poison DOUBLED');
  } else if (it.kind === 'shield') {
    main = (it.block + (hasRelic('plateup') ? 3 : 0)) + ' block';
    M('plateup', '+3 block');
    M('shieldwall', '+2 block per living pet');
  } else if (it.kind === 'heal') {
    main = 'heal ' + (it.heal + (hasRelic('fieldmedic') ? 4 : 0)) + ' HP';
    M('fieldmedic', '+4 HP');
  } else if (it.kind === 'stun') {
    const st = it.stun + (hasRelic('deepfreeze') ? 1 : 0);
    main = 'freeze a foe ' + st + ' turn' + (st > 1 ? 's' : '');
    M('deepfreeze', '+1 turn');
    M('frostsmith', 'also grants 4 block');
  } else if (it.kind === 'burn') {
    main = (it.burn + (hasRelic('arsonist') ? 3 : 0) + (hasRelic('firebrand') ? 1 : 0)) + ' BURN';
    M('arsonist', '+3 burn');
    M('firebrand', '+1 stack');
    M('slowburn', 'fades 1 slower');
    M('infernolord', 'never fades');
  } else if (it.kind === 'bleed') {
    main = (it.bleed + (hasRelic('scalpel') ? 2 : 0)) + ' BLEED';
    M('scalpel', '+2 bleed');
    M('hemorrhage', 'never fades');
  } else if (it.kind === 'pet') {
    const hp = it.php + (hasRelic('kennel') ? 4 : 0) + (hasRelic('beastmaster') ? 2 : 0);
    const deed = it.id === 'pup' ? 'growls +1 block' : it.id === 'newt' ? 'spits 1 BURN' : 'gnaws 1 dmg + 1 BLEED';
    main = hp + ' HP pet';
    mods.push('soaks blows for you • ' + deed + ' each round');
    M('kennel', '+4 max HP');
    M('beastmaster', '+2 HP, bigger pack');
    M('packleader', 'acts twice a round');
    M('warhound', 'double damage');
    M('gritcollar', 'survives its first death');
    M('vengeful', 'avenges its death: 6 dmg');
  }
  return { main, mods };
}
// the run-wide numbers the stats tab reads out (relic bends included)
function runMods() {
  const tiltMods = ['crowbar', 'prybar'].filter(hasRelic).map(id => relicById(id).name + ' +1').join(', ');
  const rainB = (hasRelic('loadstone') ? 3 : 0) + (hasRelic('saltpile') ? 2 : 0);
  const handB = (hasRelic('minter') ? 1 : 0) + (hasRelic('richhand') ? 1 : 0) + (hasRelic('tollkeeper') ? 2 : 0);
  const rows = [
    ['bank slots', bankMax() + (hasRelic('strongbox') ? ' (Strongbox +2)' : '')],
    ['tilts / round', tiltCount() + (tiltMods ? ' (' + tiltMods + ')' : '')],
    ['round rain', (C.ROUND_RAIN + rainB) + ' pieces' + (rainB ? ' (+' + rainB + ' from relics)' : '')],
    ['victory offer', (hasRelic('fourth') ? 4 : 3) + ' coins' + (hasRelic('fourth') ? ' (Gambler’s Purse)' : '')],
  ];
  if (handB) rows.push(['hand bonus', '+' + handB + ' gold coin' + (handB > 1 ? 's' : '') + ' every round']);
  if (hasRelic('midas')) rows.push(['gold income', '+30% (Midas Touch)']);
  if (hasRelic('piggy')) rows.push(['victory bounty', '+4 gold (Piggy Bank)']);
  if (hasRelic('luckypenny')) rows.push(['round start', '+3 gold (Lucky Penny)']);
  if (hasRelic('plate')) rows.push(['round start', '+4 block (Battle Plate)']);
  if (hasRelic('thornmail')) rows.push(['thorns', 'half your block bites back']);
  if (hasRelic('echobell') || hasRelic('reverb')) rows.push(['first piece', 'fires twice']);
  if (hasRelic('stormcall')) rows.push(['storm', 'every 8th piece zaps ALL for 3']);
  if (hasRelic('grandbank')) rows.push(['bank payout', 'banked pieces duplicate']);
  if (hasRelic('quicksilver') || hasRelic('overdrive')) rows.push(['resolve', 'ramps 2× as fast']);
  if (hasRelic('wind')) rows.push(['second wind', S.run && S.run.windUsed ? 'SPENT' : 'ready — survives a killing blow']);
  if (hasRelic('petwhistle')) rows.push(['pets', 'summon at battle start (Pet Whistle)']);
  if (hasRelic('soulchain')) rows.push(['soul chain', '−1 damage taken while a pet lives']);
  if (hasRelic('eternalflame')) rows.push(['eternal flame', 'every battle opens with all foes burning']);
  if (hasRelic('hemorrhage')) rows.push(['bleed', 'never fades (Hemorrhage)']);
  if (hasRelic('infernolord')) rows.push(['burn', 'never fades (Inferno Lord)']);
  if (hasRelic('papercut')) rows.push(['first piece', 'applies 1 BLEED (Papercut)']);
  if (hasRelic('quartermaster')) rows.push(['first item', 'fires twice each battle']);
  return rows;
}

    const bossDown = r.ents.some(e => e.kind === 'monster' && e.mtype === 'boss' && e.done);
    const hasStairs = r.ents.some(e => e.kind === 'stairs');

  if (!S.run || !e || e.hp <= 0 || stacks <= 0) return 0;
  if (hasRelic('firebrand')) stacks += 1;
  if (e.def === 'gel') stacks = Math.max(1, Math.ceil(stacks / 2));
  e.burn = (e.burn || 0) + stacks;
  floatAnchor('\u{1F525} +' + stacks, 'enemy', '#ff9d3c', stacks >= 3);
  return stacks;
}
function burnEnemy(stacks) {
  return applyBurn(S.enemy, stacks);
}
function stunEnemy(rounds) {
  if (!S.run || !S.enemy || S.enemy.hp <= 0) return;
  S.enemy.stunned += rounds;
  floatAnchor('FROZEN!', 'enemy', '#8be7ff', true);
  SND.stun();
}

// ------------------------------------------------------------------- pets
// A pet is living gear: its item rides the pile, and when the tray collects
// it the beast JOINS YOUR SIDE for the battle. Pets stand between you and
// the pack — enemy blows land on them first — and each acts every round:
//   pup  (Rock Pup)    growls up +1 block
//   newt (Cinder Newt) spits 1 BURN at your target
//   rat  (Fang Rat)    gnaws 1 dmg and opens 1 BLEED
function petCap() { return C.PET_CAP + (hasRelic('beastmaster') ? 2 : 0); }
function summonPet(iid) {
  const it = itemById(iid);
  if (!S.run || !it || it.kind !== 'pet') return null;
  // a whistled pet is already on the stage — its pile copy is a morale boost
  const early = S.pets.find(p => p.iid === iid && p.hp > 0 && p.whistled && !p.rallied);
  if (early) {
    early.rallied = true;
    early.hp = Math.min(early.maxHp, early.hp + 5);
    floatAnchor(early.icon + ' rallies! +5', 'hero', '#8ed67e');
    return early;
  }
  if (S.pets.filter(p => p.hp > 0).length >= petCap()) {
    // no room in the pack — the treat feeds everyone instead
    for (const p of S.pets) if (p.hp > 0) p.hp = Math.min(p.maxHp, p.hp + 3);
    floatAnchor('the pack is full — snacks all round', 'hero', '#c8b89a');
    return null;
  }
  const hp = it.php + (hasRelic('kennel') ? 4 : 0) + (hasRelic('beastmaster') ? 2 : 0);
  const pet = { iid, icon: it.icon, name: it.name, hp, maxHp: hp };
  S.pets.push(pet);
  floatAnchor(it.icon + ' ' + it.name + ' joins!', 'hero', '#ffd75e', true);
  // Alpha Bond: your first companion each battle brings its twin
  if (hasRelic('alphabond') && S.battle && !S.battle.alphaUsed) {
    S.battle.alphaUsed = true;
    if (S.pets.filter(p => p.hp > 0).length < petCap()) {
      S.pets.push({ iid, icon: it.icon, name: it.name, hp, maxHp: hp });
      floatAnchor('\u{1F43E} its twin follows!', 'hero', '#ffd75e');
    }
  }
  return pet;
}
function petDies(p, killer) {
  if (hasRelic('gritcollar') && !p.gritUsed) {
    p.gritUsed = true;
    p.hp = 1;
    floatAnchor(p.icon + ' refuses to fall!', 'hero', '#ffe9a3');
    return;
  }
  p.hp = 0;
  floatAnchor(p.icon + ' falls…', 'hero', '#9a8aa0', true);
  if (hasRelic('vengeful') && killer && killer.hp > 0) {
    floatAnchor('\u{1F47B} VENGEANCE', 'enemy', '#c8b8ff');
    dmgFoe(killer, 6);
  }
}
// the pack stands in front of you: an enemy blow chews through pets first
function petSoak(dmg, attacker) {
  for (const p of S.pets) {
    if (dmg <= 0) break;
    if (p.hp <= 0) continue;
    const soak = Math.min(p.hp, dmg);
    p.hp -= soak;
    dmg -= soak;
    floatAnchor(p.icon + ' -' + soak, 'hero', '#c8d6e8');
    if (p.hp <= 0) petDies(p, attacker);
  }
  return dmg;
}
// every pet acts once per round (the Pack Leader drills them twice)
function petsAct() {
  if (!S.run || !S.pets.length) return;
  const acts = hasRelic('packleader') ? 2 : 1;
  const dmul = hasRelic('warhound') ? 2 : 1;
  for (const p of S.pets.slice()) {
    if (p.hp <= 0) continue;
    for (let a = 0; a < acts && S.run && !S.victory; a++) {
      if (p.iid === 'pup') addBlock(1);
      else if (p.iid === 'newt') { if (S.enemy && S.enemy.hp > 0) applyBurn(S.enemy, 1 * dmul); }
      else if (p.iid === 'rat') {
        if (S.enemy && S.enemy.hp > 0) {
          const bonus = hasRelic('bloodscent') && S.enemy.bleed > 0 ? 1 : 0;
          dmgFoe(S.enemy, 1 * dmul + bonus);
          if (S.enemy && S.enemy.hp > 0) applyBleed(S.enemy, 1, true);
        }
      }
    }
  }
  if (!S.run || S.victory) return;
  if (hasRelic('guarddog') && S.pets.some(p => p.hp > 0)) addBlock(1);
  if (hasRelic('treats')) {
    let weak = null;
    for (const p of S.pets) if (p.hp > 0 && p.hp < p.maxHp && (!weak || p.hp < weak.hp)) weak = p;
    if (weak) { weak.hp = Math.min(weak.maxHp, weak.hp + 2); floatAnchor(weak.icon + ' +2', 'hero', '#7ee787'); }
  }
}
function addBlock(n) {
  if (!S.run) return;
  S.run.block += n;
  floatAnchor('\u{1F6E1} +' + n, 'hero', '#c8d6e8', n >= 4);
  SND.block();
}
function healPlayer(n) {
  if (!S.run) return 0;
  const before = S.run.hp;
  S.run.hp = Math.min(S.run.maxHp, S.run.hp + n);
  const got = S.run.hp - before;
  if (got > 0) floatAnchor('+' + got + ' HP', 'hero', '#7ee787', got >= 8);
  // Sterling Heart: the excess hardens into a small wall
  if (hasRelic('sterling') && n > got) addBlock(Math.min(3, n - got));
  SND.heal();
  return got;
}
function addGold(n) {
  if (!S.run) return;
  let mul = 1;
  if (hasRelic('midas')) mul += 0.3;
  if (hasRelic('goldrush')) mul += 0.4;
  if (mul !== 1) n = Math.round(n * mul);
  S.run.gold += n;
  S.run.goldEarned += n;
  floatAnchor('+' + n + ' G', 'gold', '#ffd75e', n >= 15);
}
function addCoins(n) {
  if (!S.run) return;
  if (S.battle && S.battle.hand) {
    S.battle.hand.coin = (S.battle.hand.coin || 0) + n;
    syncWallet();
  }
  floatAnchor('+' + n + ' ●', 'hero', '#f2c04a');
}
// direct hit: curses and poison ignore your shield entirely
function hpHit(n, cause, col) {
  if (!S.run || S.run.hp <= 0) return;
  S.run.hp -= n;
  S.hurtT = 0.45;
  S.shake += Math.min(9, 3 + n * 0.5);
  floatAnchor('-' + n + ' HP', 'hero', col || '#ff5a4e', n >= 6);
  SND.hurt();
  if (S.run.hp <= 0) {
    // Second Wind saves once; the Revenant stands you up twice per fight
    const saves = (hasRelic('wind') ? 1 : 0) + (hasRelic('revenant') ? 2 : 0);
    if ((S.run.windUsed || 0) < saves) {
      S.run.windUsed = (S.run.windUsed || 0) + 1;
      S.run.hp = 1;
      S.banner = { txt: 'SECOND WIND!', ttl: 1.6, max: 1.6 };
      return;
    }
    endRun(cause || 'slain');
  }
}
function hurtPlayer(n, cause) {
  if (!S.run || S.run.hp <= 0) return;
  if (hasRelic('thickskin')) n = Math.max(1, n - 1);   // hide turns the edge
  // Soul Chain: your pack shares the pain
  if (hasRelic('soulchain') && S.pets.some(p => p.hp > 0)) n = Math.max(1, n - 1);
  const incoming = n;
  // block soaks first
  if (S.run.block > 0) {
    const soak = Math.min(S.run.block, n);
    S.run.block -= soak; n -= soak;
    if (soak > 0) { floatAnchor('BLOCKED ' + soak, 'hero', '#c8d6e8'); SND.block(); }
  }
  if (n <= 0) {
    // Guardian rewards a wall that swallowed the whole blow
    if (hasRelic('guardian') && incoming > 0) healPlayer(2);
    return;
  }
  hpHit(n, cause);
}
function usePotion() {
  if (!S.run || S.run.potions < 1 || S.run.hp >= S.run.maxHp) return false;
  S.run.potions--;
  healPlayer(C.POTION_HEAL + (hasRelic('elixir') ? 8 : 0) + (hasRelic('apothecary') ? 6 : 0));
  // the Mender splits the draught with the pack
  if (hasRelic('mender')) for (const p of S.pets) if (p.hp > 0) p.hp = Math.min(p.maxHp, p.hp + 5);
  SND.buy();
  save();
  return true;
}

// --------------------------------------------------------------- scoring
// Nothing fires on impact any more: the tray COLLECTS. Everything that
// lands there joins the round's loot and resolves when your purse is spent.
// Only the spice — wheel chips and field chests — pops immediately.
function trayAdd(kind, extra) {
  S.tray.items.push({ kind, iid: extra && extra.iid, x: extra ? extra.x : 50 });
  if (S.tray.items.length > 24) S.tray.items.shift();
}
function scoreCoin(c) {
  S.collected++;
  if (c.kind === 'chip') {
    floatAt('WHEEL SPIN!', c.x, '#63e7ff', true);
    S.shake += 4;
    spinWheel();
    burst(c.x, 96, C.TRAY_Z, 'chip');
    return;
  }
  if (c.kind === 'chest') {
    openChest(c);
    return;
  }
  if (!S.battle) return;
  S.battle.loot.push({ k: c.kind, iid: c.iid });
  trayAdd(c.kind, { iid: c.iid, x: c.x });
  S.shake += c.kind === 'item' ? 3 : 1;
  if (c.kind === 'skull') SND.poison();
  else if (c.kind === 'gem' || c.kind === 'bag') SND.gem();
  else SND.collect(1 + (S.battle.loot.length % 5));
  burst(c.x, 96, C.TRAY_Z, c.kind);
}
function openChest(c) {
  const r = rng();
  let txt2;
  if (r < 0.35) {
    const n = 3 + ((rng() * 4) | 0);
    addCoins(n);
    txt2 = 'CHEST: +' + n + ' ● THIS ROUND';
  } else if (r < 0.6) {
    const g = 8 + ((rng() * 8) | 0);
    addGold(g);
    txt2 = 'CHEST: +' + g + ' GOLD';
  } else if (r < 0.8) {
    txt2 = 'CHEST: WHEEL SPIN!';
    spinWheel();
  } else {
    const it = ITEMS[(rng() * 4) | 0];
    grantItem(it.id, 1);
    S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
    txt2 = 'CHEST: ' + it.name + '!';
  }
  floatAt(txt2, c.x, '#ffb0e0', true);
  S.shake += 5;
  SND.gem();
  burst(c.x, 96, C.TRAY_Z, 'chest');
}
function grantItem(iid, n) {
  if (!S.run || !itemById(iid)) return;
  S.run.arsenal[iid] = (S.run.arsenal[iid] || 0) + (n || 1);
  // this floor's machine is already racked: the new gear drops in next fight
  if (S.run.pileFloor === S.run.floor) {
    for (let k = 0; k < (n || 1); k++) S.run.pending.push(iid);
  }
}

// JACKPOT: filling the meter sprouts copies of YOUR OWN GEAR onto the
// field — three free swings of the arsenal you built, not a coin firehose
function frenzy() {
  S.meter = 0;
  if (hasRelic('jackpotcharm')) { addGold(15); if (S.battle) S.battle.goldWon += 15; }
  S.banner = { txt: 'JACKPOT!', ttl: 2.2, max: 2.2 };
  S.shake += 8;
  SND.jackpot();
  const owned = [];
  if (S.run) {
    for (const iid of Object.keys(S.run.arsenal)) {
      for (let k = 0; k < S.run.arsenal[iid]; k++) owned.push(iid);
    }
  }
  if (owned.length) {
    for (let i = 0; i < 3; i++) {
      const iid = owned[(rng() * owned.length) | 0];
      S.rain.push({ t: 0.3 + 0.35 * i, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid, temp: true });
    }
  } else {
    // no arsenal to echo? a modest coin consolation
    for (let i = 0; i < 4; i++) {
      S.rain.push({ t: 0.15 * i, x: 10 + rng() * 80, y: MACH.tiers[0].slotY + rng() * 14, kind: 'coin' });
    }
  }
  save();
}

// -------------------------------------------------------------- wheel of fortune
// The WHEEL is now the ONLY faucet for relics (alongside the boss's
// choice). Found in the dungeon it costs 5 coins to spin (see the wheel
// ghost); a free spin is granted after every ELITE. Prizes: gold, a wad of
// coins, relics, a stab of lost HP, or an item — common or rare.
function wheelCoins(n) {
  const k = COIN_KINDS[(rng() * COIN_KINDS.length) | 0];
  S.run.purse[k] = (S.run.purse[k] || 0) + n;
  floatAt('+' + n + ' ' + COIN_INFO[k].name + '!', 50, '#ffe066', true);
}
function wheelItem(rar) {
  const it = randItem(rar);
  grantItem(it.id, 1);
  floatAt(it.name + '!', 50, rar === 'r' ? '#7ab0e8' : '#ffe066', true);
  if (S.battle) S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: MACH.tiers[0].slotY + 6, kind: 'item', iid: it.id, temp: true });
}
// the wheel doesn't just hand you an relic — it lets you CHOOSE. The pick
// overlay opens once the wheel is dismissed (see dismissWheel).
function wheelRelic(rar, n) {
  S.pendingPick = { rar, picks: n || 1 };
}
const WHEEL = [
  { label: '+GOLD',   col: '#f2c04a', w: 15, fx: () => addGold(14 + S.run.floor * 3 + ((rng() * 10) | 0)) },
  { label: '+2 ●',    col: '#f2c04a', w: 14, fx: () => wheelCoins(2) },
  { label: '+3 ●',    col: '#e8b24a', w: 11, fx: () => wheelCoins(3) },
  { label: '+5 ●',    col: '#e0a038', w: 6,  fx: () => wheelCoins(5) },
  { label: 'COMMON\nITEM', col: '#8fd18f', w: 12, fx: () => wheelItem('c') },
  { label: 'RARE\nITEM',   col: '#5aa0e0', w: 7,  fx: () => wheelItem('r') },
  { label: '2 COMMON\nRELICS', col: '#c8c8c8', w: 9, fx: () => wheelRelic('c', 2) },
  { label: 'RARE\nRELIC',      col: '#b06be8', w: 6, fx: () => wheelRelic('r', 1) },
  { label: '−5 HP',   col: '#ef4b5d', w: 8,  fx: () => { S.run.hp = Math.max(1, S.run.hp - 5); floatAt('−5 HP!', 50, '#ef4b5d', true); S.shake += 5; } },
];
function spinWheel() {
  if (!S.run) return null;
  const total = WHEEL.reduce((a, s) => a + s.w, 0);
  let r = rng() * total, idx = 0;
  for (let i = 0; i < WHEEL.length; i++) { r -= WHEEL[i].w; if (r <= 0) { idx = i; break; } }
  WHEEL[idx].fx();
  S.wheelAnim = { t: 0, seg: idx, label: WHEEL[idx].label };
  SND.gem();
  save();
  return WHEEL[idx];
}
// clear the wheel overlay — and, if it won an relic, open the CHOICE now
function dismissWheel() {
  S.wheelAnim = null;
  if (S.pendingPick) {
    const p = S.pendingPick; S.pendingPick = null;
    openRelicPick(p.rar, p.picks);
  }
}

// ------------------------------------------------------------ drop & hand
// Your purse is a DECK: every round it refills as your hand, and YOU pick
// which coin type slides into the slot next.
function syncWallet() {
  if (!S.run) return;
  const B = S.battle;
  S.run.wallet = B && B.hand ? COIN_KINDS.reduce((a, k) => a + (B.hand[k] || 0), 0) : 0;
}
function selectCoin(k) {
  if (!S.battle || !S.battle.hand || COIN_KINDS.indexOf(k) < 0) return false;
  if ((S.battle.hand[k] || 0) < 1) return false;
  S.battle.sel = k;
  return true;
}
// when the chosen stack runs dry, slide to the next one you still hold
function autoSel() {
  const B = S.battle;
  if (!B || !B.hand) return;
  if ((B.hand[B.sel] || 0) > 0) return;
  for (const k of COIN_KINDS) {
    if ((B.hand[k] || 0) > 0) { B.sel = k; return; }
  }
}
function drop(x) {
  if (S.screen !== 'battle' || !S.run || S.victory) return false;
  const B = S.battle;
  if (!B || B.phase !== 'drop') return false;
  if (S.cd > 0) return false;
  autoSel();
  const kind = B.sel;
  if ((B.hand[kind] || 0) < 1) { S.denyT = 0.6; SND.deny(); return false; }
  // spawn FIRST — if the machine is packed to its cap, hold the coin back
  // in your hand rather than silently swallowing it (and don't burn the
  // cooldown, so the held stream resumes the instant the field clears)
  const ax = Math.max(8, Math.min(92, x === undefined ? S.aimX : x));
  const c = spawnDrop(ax + (rng() - 0.5) * 2, MACH.tiers[0].slotY + (rng() - 0.5) * 5, kind);
  if (!c) { S.denyT = 0.35; return false; }
  B.hand[kind]--;
  syncWallet();
  autoSel();
  S.cd = C.DROP_CD / (S.turbo || 1);        // TURBO ×2 / ×4 shortens the cooldown to match
  S.dropped++; S.meter++;
  SND.slot();
  if (S.meter >= C.METER_MAX) frenzy();
  return true;
}
// TILT the machine — the classic sin, three charges a round
function tilt(dir) {
  if (S.screen !== 'battle' || !S.run || S.victory) return false;
  const B = S.battle;
  if (!B || B.phase !== 'drop' || B.tilts < 1) return false;
  B.tilts--;
  // a gentler nudge — enough to shift the pile, not to fling it
  for (const c of S.coins) {
    if (c.st !== 'plat') continue;
    if (dir === 'l') c.vx -= 10 + rng() * 4;
    else if (dir === 'r') c.vx += 10 + rng() * 4;
    else { c.vy += 6 + rng() * 3; c.vx += (rng() - 0.5) * 4; }
  }
  S.shake += 2.5;
  SND.thud();
  return true;
}
// hold a caught piece back for next round (up to 3)
function lootKey(l) { return l.k === 'item' ? l.iid : l.k; }
function bankMax() { return C.BANK_MAX + (hasRelic('strongbox') ? 2 : 0) + (hasRelic('vault') ? 1 : 0); }
// the round-start guard from relics, stacked
function startBlock() { return (hasRelic('plate') ? 4 : 0) + (hasRelic('ironhide') ? 2 : 0) + (hasRelic('barricade') ? 3 : 0); }
function tiltCount() { return C.TILTS + (hasRelic('crowbar') ? 1 : 0) + (hasRelic('prybar') ? 1 : 0); }
function bankLoot(key) {
  const B = S.battle;
  if (!B || B.phase !== 'drop' || B.banked.length >= bankMax()) return false;
  const i = B.loot.findIndex(l => lootKey(l) === key);
  if (i < 0) return false;
  B.banked.push(B.loot.splice(i, 1)[0]);
  SND.clink();
  return true;
}
function unbankLoot(key) {
  const B = S.battle;
  if (!B || B.phase !== 'drop') return false;
  const i = B.banked.findIndex(l => lootKey(l) === key);
  if (i < 0) return false;
  B.loot.push(B.banked.splice(i, 1)[0]);
  return true;
}
// what a fresh pile piece is made of (inserts are always gold/lucky;
// the FIELD carries the silver and venom coins you push for)
function rollPileKind() {
  const r = rng();
  const luckyP = C.MIX.lucky * (hasRelic('clover') ? 2 : 1) * (hasRelic('cloverfield') ? 1.5 : 1);
  if (r < C.MIX.silver) return 'silver';
  if (r < C.MIX.silver + C.MIX.green) return 'green';
  if (r < C.MIX.silver + C.MIX.green + luckyP) return 'lucky';
  return 'coin';
}

// ------------------------------------------------------------------ battle
// each ACT resets the ramp with a stronger roster (the tier bases carry the
// big jumps between acts); acts past the last roster keep ramping instead
function scaleMult() {
  const act = actIdx(S.run.floor);
  const fInAct = (S.run.floor - 1) - act * 5;
  const beyond = Math.max(0, S.run.floor - ENEMY_TIERS.length * 5);
  // per-act ramp + an act carry tuned so the hand-off to a new (stronger)
  // roster never softens the curve; past the last act it just keeps climbing
  return 1 + 0.075 * (S.run.depth - 1) + 0.22 * fInAct + 0.33 * act + 0.3 * beyond;
}
function enemyPool(depth) {
  // deeper rooms unlock the meaner half of THIS act's roster
  const n = curRoster().length;
  const fInAct = (S.run.floor - 1) % 5;
  return Math.min(n, 4 + depth + fInAct * 2);
}
function mkEnemy(type, eid) {
  const act = actIdx(S.run.floor);
  // bosses rotate per ACT (dragon act 1, lich act 2, demon act 3, then round
  // again) and scale by floor only — their lair sits at max depth by design
  const mult = type === 'boss'
    ? 1 + 0.20 * ((S.run.floor - 1) % 5) + 0.45 * act
      + 0.3 * Math.max(0, S.run.floor - ENEMY_TIERS.length * 5)
    : scaleMult();
  let base, eliteK = 1;
  if (type === 'boss') {
    base = BOSSES[act % BOSSES.length];
  } else {
    const roster = curRoster();
    base = (eid && enemyById(eid)) || roster[(rng() * enemyPool(S.run.depth)) | 0];
    if (type === 'elite') eliteK = 1.6;
  }
  const hp = Math.round(base.hp * mult * eliteK);
  return {
    id: base.id, icon: base.icon, name: (type === 'elite' ? 'ELITE ' : '') + base.name,
    hp, maxHp: hp,
    atk: Math.round(base.atk * mult * (type === 'elite' ? 1.3 : 1)),
    trait: base.trait, def: base.def || null,
    gold: Math.round(base.gold * mult * (type === 'elite' ? 1.8 : 1)),
    boss: type === 'boss', elite: type === 'elite',
    stunned: 0, pois: 0, bleed: 0, burn: 0, hitT: 0, lungeT: 0,
  };
}
// its plan for the round, telegraphed on its panel
function rollIntent(e) {
  if (e.trait === 'curse' && rng() < 0.4) { e.intent = { t: 'curse' }; return; }
  const r = rng();
  if (r < 0.2 && e.intent && e.intent.t !== 'heavy') e.intent = { t: 'heavy', dmg: e.atk * 2 };
  else if (r < 0.36) e.intent = { t: 'brace' };
  else e.intent = { t: 'hit', dmg: e.atk };
}
// deal a hand from the purse (a thief may have cut it)
function dealHand() {
  const B = S.battle;
  B.hand = { ...S.run.purse };
  let cut = B.stolen || 0;

      // the field is a mix: gold to strike, silver to shield, venom to sicken

  if (rng() < 0.4) place(50 + (rng() - 0.5) * 30, front - 22, 'gem', 0, 'plat', 0);
  if (rng() < 0.35) place(30 + rng() * 40, front - 30 - rng() * 4, 'chest', 0, 'plat', 0);
  if (rng() < 0.3) place(25 + rng() * 50, front - 18 - rng() * 10, 'chip', 0, 'plat', 0);

  if (S.run) {

    const ids = Object.keys(S.run.arsenal);
    for (const iid of ids) {
      for (let k = 0; k < S.run.arsenal[iid] && placed < C.ITEM_CAP; k++) {
        const pr = place(16 + ((placed * 23) % 68) + (rng() - 0.5) * 6,
                         front - 26 - rng() * 12, 'item', 0, 'plat', 0);
        pr.iid = iid;
        placed++;
      }
    }
  }
  // a second storey: coins resting on top of the pile
  const base = S.coins.filter(c => c.kind === 'coin');
  for (let i = 0; i < Math.min(12, base.length); i++) {
    const under = base[(rng() * base.length) | 0];
    place(under.x + (rng() - 0.5) * 2, under.y + (rng() - 0.5) * 2, 'coin', 1, 'plat', 0);

// ------------------------------------------------------------- simulation
function findSupport(c, lay) {
  for (const o of S.coins) {
    if (o === c || o.st !== 'plat' || o.lay !== lay || o.tier !== c.tier) continue;
    const dx = o.x - c.x, dy = o.y - c.y;
    if (dx * dx + dy * dy < Math.pow((o.r + c.r) * 0.85, 2)) return o;
  }

}
function landCoin(c, lay) {

  c.lay = lay;
  c.z = td.z + lay * C.COIN_H;
  c.vz = 0; c.chk1 = false; c.chk2 = false;
  const pf = pusherFront(c.tier);
  c.y = Math.max(c.y, pf + c.r);
  c.vx += (rng() - 0.5) * 7;
  c.vy += (rng() - 0.5) * 5;

}
function step(dt, quiet) {

  if (S.denyT > 0) S.denyT -= dt;
  if (S.hurtT > 0) S.hurtT -= dt;
  S.phase += dt * 2 * Math.PI / MACH.pushPeriod * pushRate();
  S.shake = Math.max(0, Math.min(8, S.shake) - dt * 16);   // hard cap + brisk decay

  // the round machine runs only while the fight is live
  if (S.screen === 'battle' && !quiet) battleTick(dt);

    S.rain[i].t -= dt;

      const r = S.rain.splice(i, 1)[0];
      const c2 = spawnDrop(r.x, r.y, r.kind);
      if (c2 && r.kind === 'item') { c2.iid = r.iid; c2.temp = !!r.temp; }
    }

      c.z -= c.vz * dt;
      c.rot += c.vrot * dt;
      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.5 * dt);
      c.x += c.vx * dt;
      c.vx *= Math.exp(-0.9 * dt);

      if (c.x > 91) { c.x = 91; c.vx = -Math.abs(c.vx) * 0.45; }

      const pfA = pusherFront(c.tier);
      if (!c.chkP && c.z <= td.z + C.PUSH_H && c.z > td.z + C.PUSH_H - 3) {
        c.chkP = true;
        if (c.y < pfA - c.r * 0.3) {
          c.st = 'plat'; c.onPush = true; c.lay = 0;
          c.z = td.z + C.PUSH_H; c.vz = 0;
          c.vx += (rng() - 0.5) * 5;
          c.vy += (rng() - 0.5) * 3;
          if (!quiet) SND.clink();
          continue;
        }
      }
      if (!c.chk2 && c.z <= td.z + 2 * C.COIN_H) {

      if (Math.abs(c.vy) < C.SETTLE) c.vy = 0;

      c.y += c.vy * dt;
      if (c.x < c.r) { c.x = c.r; c.vx *= -0.3; }
      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }

      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }

      }
    } else if (c.st === 'fall') {

      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.2 * dt);

  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < plats.length; i++) {

  if (S.uiFlash) {

}

  const n = 2, sub = dt / n;
  for (let i = 0; i < n; i++) step(sub);
}

      ctx.fillStyle = '#ffe9c9'; ctx.fill();

        txt(e.icon, 0, 0, Math.round(sz) + 'px serif', '#fff');
      }
      if (e.hitT > 0 && artKey) {
        ctx.globalAlpha = e.hitT * 1.2;
        ctx.beginPath(); ctx.arc(0, 0, sz * 0.7, 0, 7);
        ctx.fillStyle = 'rgba(255,90,80,0.4)'; ctx.fill();
      }
      ctx.restore();
      // the blow lands on your hero
      if (lk > 0.8 && charges) txt('\u{1F4A5}', hx + 30, hy - 44, '26px serif', '#fff');
      // your mark hovers over the target — tap another foe to switch
      if (isTgt && n > 1) {
        txt('▼', cx, 28 + Math.sin(t * 5) * 2, '900 13px Verdana, sans-serif', '#ffd75e', 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
      }
      // per-foe bar + status + intent — with a pale ghost that drains after hits
      if (e._ghost === undefined || e._ghost < e.hp) e._ghost = e.hp;
      if (e._ghost > e.hp) e._ghost = Math.max(e.hp, e._ghost - dt * Math.max(6, e.maxHp * 0.55));
      const bw = n === 1 ? 128 : 84;
      const by = 118;
      hpBar(cx - bw / 2, by, bw, n === 1 ? 11 : 9, Math.max(0, e.hp), e.maxHp, e._ghost);
      txt(Math.max(0, e.hp) + '/' + e.maxHp, cx, by + (n === 1 ? 5.5 : 4.5),
          '800 ' + (n === 1 ? 9 : 8) + 'px Verdana, sans-serif', '#fff4f6', 'center', { w: 2.5, col: 'rgba(40,5,12,0.8)' });
      // the wound ledger: poison, then bleed, then burn stack down the side
      let sy2 = by + 4;
      if (e.pois > 0) { txt('☠' + e.pois, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#b8f26b'); sy2 += 11; }
      if (e.bleed > 0) { txt('\u{1FA78}' + e.bleed, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#ff5a6e'); sy2 += 11; }
      if (e.burn > 0) { txt('\u{1F525}' + e.burn, cx - bw / 2 - 13, sy2, '800 10px Verdana, sans-serif', '#ff9d3c'); }
      if (e.braced) txt('\u{1F6E1}', cx + bw / 2 + 11, by + 4, '11px serif', '#fff');
      // its defensive mechanic, badged under the bar (packs); the lone foe
      // gets the full description in its header instead
      if (e.def && n > 1) txt(DEF_BADGE[e.def], cx, by + 13, '800 8px Verdana, sans-serif',
                              '#d8c8f0', 'center', { w: 2, col: 'rgba(10,5,12,0.9)' });
      const intentTxt = e.stunned > 0 ? '❄ skips turn'
        : it.t === 'heavy' ? '\u{1F4A5} ' + (e.atk * 2) + (e.trait === 'fast' ? '×2' : '')
        : it.t === 'brace' ? '\u{1F6E1} braces'
        : it.t === 'curse' ? '\u{1F480} skulls'
        : '⚔ ' + e.atk + (e.trait === 'fast' ? '×2' : '');
      // the telegraph: over its head in a pack, under the bar when alone
      // (the lone foe's name owns the headline spot)
      txt(intentTxt, cx, n === 1 ? by + 18 : Math.max(26, footY - sz - 20 * scl),
          '800 ' + (n === 1 ? 11 : 9) + 'px Verdana, sans-serif',
          e.stunned > 0 ? '#8be7ff' : it.t === 'heavy' ? '#ff5a4e' : it.t === 'brace' ? '#c8d6e8' : it.t === 'curse' ? '#c86bff' : '#ffb4a8',
          'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
      // tap a foe to inspect it (and, in a pack, aim your gold at it)
      if (S.battle && !S.victory) {
        const ii = i;
        uiButtons.push({ x: cx - 52, y: 16, w: 104, h: 120, cb: () => { if (n > 1) setTarget(ii); S.foeInfo = ii; } });
      }
    }
    // a gentle nudge that the foes are tappable
    if (n && S.battle && !S.victory && S.foeInfo === null) {
      txt('\u{1F449} tap a foe for info', 36, 133, '600 8px Verdana, sans-serif', '#7a6a80', 'left');
    }
    if (n) {
      const tgt = S.enemy;
      if (tgt && n === 1) {
        txt(tgt.name, LW - 156, 30, '900 13px Georgia, serif', tgt.boss ? '#ffd75e' : '#e8dce8',
            'center', { w: 4, col: 'rgba(20,8,24,0.9)' });
        if (tgt.def) txt(DEF_BADGE[tgt.def] + ' ' + DEF_TXT[tgt.def], LW - 156, 43,
                         '600 8px Verdana, sans-serif', '#c3a8e0');
        if (tgt.trait) txt(TRAIT_TXT[tgt.trait], LW - 156, tgt.def ? 54 : 43, '600 8px Verdana, sans-serif', '#9a8aa0');
      } else if (tgt && tgt.hp > 0) {
        // up top, clear of the per-foe mechanic badges below the bars
        txt('\u{1F3AF} ' + tgt.name, LW / 2, 15, '800 10px Georgia, serif', '#ffd75e',
            'center', { w: 3, col: 'rgba(20,8,24,0.9)' });
      }
      // round chip
      if (S.battle) {
        rr(30, 20, 74, 22, 11);
        ctx.fillStyle = 'rgba(10,6,12,0.8)'; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = T.accent; ctx.stroke();
        txt('ROUND ' + S.battle.round, 67, 31, '900 10px Verdana, sans-serif', T.accent);
      }
    }
    ctx.restore();
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
  }

  function drawMeter(t) {
    const fr = S.meter / C.METER_MAX;
    // the gilded gauge from the cabinet concept, with our LIVE fill laid
    // into its channel — painted strip as the fallback
    const tube = machArt('jackpot');
    if (tube) {
      // the runic lightning tube: a dark ghost of it when empty, and the
      // charged version revealed from the left as the meter climbs
      const iw = 268, ih = iw * imAspect(tube, 50 / 352);
      const x0 = LW / 2 - iw / 2, y0 = 198;
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.drawImage(tube, x0, y0, iw, ih);
      ctx.fillStyle = 'rgba(10,8,20,0.5)';
      rr(x0 + 2, y0 + 2, iw - 4, ih - 4, ih / 2); ctx.fill();
      ctx.restore();
      if (fr > 0.01) {
        ctx.save();
        ctx.beginPath(); ctx.rect(x0, y0 - 4, iw * fr, ih + 8); ctx.clip();
        ctx.drawImage(tube, x0, y0, iw, ih);
        if (fr > 0.8) {
          // near-jackpot: the tube crackles
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.25 + 0.2 * Math.sin(t * 10);
          ctx.drawImage(tube, x0, y0, iw, ih);
        }
        ctx.restore();
      }
      txt('JACKPOT', x0 - 8, y0 + ih / 2, '800 8px Verdana, sans-serif',
          fr > 0.5 ? '#8be7ff' : '#8a6f4a', 'right');
      return;
    }
    // slimmed down and tucked over the coin wall — the hand row owns y144 now
    const x = 150, y = 196, w = LW - 300, h = 8;
    rr(x - 3, y - 3, w + 6, h + 6, 7);
    ctx.fillStyle = 'rgba(28,13,19,0.85)'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#6e4c1c'; ctx.stroke();
    if (fr > 0) {
      const pulse = fr > 0.8 ? 0.25 + 0.2 * Math.sin(t * 10) : 0;
      rr(x, y, Math.max(6, w * fr), h, 4);
      const g = ctx.createLinearGradient(x, 0, x + w, 0);
      g.addColorStop(0, '#ff9d3c'); g.addColorStop(1, '#ff4b2e');
      ctx.fillStyle = g; ctx.fill();
      if (pulse > 0) { ctx.fillStyle = 'rgba(255,240,180,' + pulse + ')'; ctx.fill(); }
      // gloss
      rr(x, y, Math.max(6, w * fr), h * 0.45, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
    }
    // segment ticks make the climb readable
    ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1;
    for (let i = 1; i < 6; i++) {
      const tx2 = x + (w * i) / 6;
      ctx.beginPath(); ctx.moveTo(tx2, y); ctx.lineTo(tx2, y + h); ctx.stroke();
    }
    txt('JACKPOT', x - 12, y + h / 2 + 0.5, '800 8px Verdana, sans-serif',
        fr > 0.5 ? '#ffd75e' : '#8a6f4a', 'right');
  }

  function drawCabinet() {
    const T = theme();
    ctx.save();
    const g = ctx.createLinearGradient(0, 170, 0, 700);
    g.addColorStop(0, T.cabA); g.addColorStop(1, T.cabB);
    ctx.fillStyle = g;
    ctx.fillRect(4, 170, 22, 540);
    ctx.fillRect(LW - 26, 170, 22, 540);
    const wood = machArt('rail') || machArt('cab');
    if (wood) {
      // riveted timber rails flank the cabinet, tinted by the theme beneath
      ctx.globalAlpha = 0.9;
      ctx.drawImage(wood, 4, 170, 22, 540);
      ctx.drawImage(wood, LW - 26, 170, 22, 540);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = 'rgba(255,214,120,0.16)';
    ctx.fillRect(8, 170, 3, 540);
    ctx.fillRect(LW - 12, 170, 3, 540);

  // the wall itself never moves — it lives in the battle base layer
  function drawBackWallStatic() {
    const a = w2s(0, 0, MACH.tiers[0].z);
    ctx.save();

    g.addColorStop(0, '#20242c'); g.addColorStop(1, '#3a4049');
    ctx.fillStyle = g;
    ctx.fillRect(26, 172, LW - 52, Math.max(10, a.y - 172));
    const wallArt = machArt('backwall');
    if (wallArt) {
      // the dwarven rune-circuit wall
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.drawImage(wallArt, 26, 171, LW - 52, Math.max(12, a.y - 169));
      ctx.restore();
    } else {
      // brushed panel lines
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      for (let x = 40; x < LW - 40; x += 24) {
        ctx.beginPath(); ctx.moveTo(x, 173); ctx.lineTo(x - 4, a.y - 2); ctx.stroke();
      }

      ctx.fillStyle = '#0d1015';

  function drawBackWall(t) {
    const T = theme();
    const a = w2s(0, 0, MACH.tiers[0].z);
    t = t || 0;
    ctx.save();
    // the CHASING marquee of bulbs — a real arcade top
    // (the gilded JACKPOT gauge takes this spot when its art is in)
    if (!machArt('jackpot')) {
      const nb = 16, chase = Math.floor(t * 9) % nb;
      for (let i = 0; i < nb; i++) {
        const bx = 70 + (LW - 140) * (i / (nb - 1));
        const lit = (i - chase + nb) % nb < 3;
        if (lit) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = T.accent;
          ctx.beginPath(); ctx.arc(bx, 191.5, 5.5, 0, 7); ctx.fill();
          ctx.restore();
        }
        ctx.fillStyle = lit ? '#fff2c8' : '#2a2f38';
        ctx.beginPath(); ctx.arc(bx, 191.5, 2, 0, 7); ctx.fill();
      }
    }
    const slotY = MACH.tiers[0].slotY;
    const ap = w2s(S.aimX, slotY, MACH.tiers[0].z);
    const e = eyd(slotY);
    const u = (PF.w0 + (PF.w1 - PF.w0) * e) / 100;
    const gx = PF.cx + (S.aimX - 50) * u;
    // the aim beam — clipped to the wall so it slips UNDER the cached floor
    ctx.save();
    ctx.beginPath(); ctx.rect(26, 172, LW - 52, Math.max(10, a.y - 172));
    ctx.clip();
    ctx.fillStyle = lgr('beam:' + (ap.y | 0), 0, 200, 0, ap.y,
      [[0, 'rgba(255,222,120,0.5)'], [1, 'rgba(255,222,120,0.03)']]);
    ctx.fillRect(gx - 7, 200, 14, ap.y - 200);
    ctx.restore();
    // the slot itself glows when ready
    if (S.cd <= 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.35 + 0.15 * Math.sin(t * 6);
      ctx.fillStyle = '#ffd75e';
      ctx.beginPath(); ctx.arc(gx, 191, 12, 0, 7); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = S.cd > 0 ? '#6e5320' : '#ffd75e';
    rr(gx - 10, 184, 20, 15, 4); ctx.fill();
    ctx.fillStyle = '#12151a';
    ctx.fillRect(gx - 5, 187, 10, 9);
    ctx.restore();
  }

  function drawTierFloor(y0, y1, z) {
    const T = theme();
    const p00 = w2s(0, y0, z), p10 = w2s(100, y0, z);
    const p01 = w2s(0, y1, z), p11 = w2s(100, y1, z);
    poly([p00, p10, p11, p01]);
    ctx.fillStyle = lgr('fl:' + fkey() + ':' + (p00.y | 0) + ':' + (p01.y | 0),
      0, p00.y, 0, p01.y, [[0, T.floorA], [1, T.floorB]]);
    ctx.fill();
    ctx.save();
    ctx.clip();
    // the runic stone slab, laid over the theme tint so each floor still
    // carries its own hue
    const slab = machArt('plat');
    if (slab) {
      ctx.globalAlpha = 0.6;
      ctx.drawImage(slab, p01.x - 6, p00.y - 4, (p11.x - p01.x) + 12, (p01.y - p00.y) + 8);
      ctx.globalAlpha = 1;
    }
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#dfe5ee';
    ctx.lineWidth = 1;
    for (const s of SCRATCH) {
      if (s.y1 < y0 || s.y1 > y1) continue;
      const a = w2s(s.x1, s.y1, z), b = w2s(s.x2, s.y2, z);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.restore();
  }

  // full-length guard rails: this machine never eats a piece off the sides
  function drawSideRails() {
    const front = tierFront(0);
    const railSkin = machArt('rail_run');
    for (const side of [0, 1]) {
      const x0 = side ? 100 : 0;
      const r1 = w2s(x0, 2, 2.4), r2 = w2s(x0, front, 2.4), r3 = w2s(x0, front, 0), r4 = w2s(x0, 2, 0);
      poly([r1, r2, r3, r4]);
      if (railSkin) {
        // the runed bronze guard rail, sheared into the rail's run
        const rg2 = ctx.createLinearGradient(0, r1.y, 0, r3.y);
        rg2.addColorStop(0, '#8a7a58'); rg2.addColorStop(1, '#4a4030');
        ctx.fillStyle = rg2; ctx.fill();
        ctx.save();
        poly([r1, r2, r3, r4]); ctx.clip();
        const bx0 = Math.min(r1.x, r2.x, r3.x, r4.x), bx1 = Math.max(r1.x, r2.x, r3.x, r4.x);
        const by0 = Math.min(r1.y, r2.y), by1 = Math.max(r3.y, r4.y);
        ctx.drawImage(railSkin, bx0 - 4, by0 - 1, (bx1 - bx0) + 8, (by1 - by0) + 2);
        ctx.restore();
      } else {
        const rg = ctx.createLinearGradient(0, r1.y, 0, r3.y);
        rg.addColorStop(0, '#b6bdc9'); rg.addColorStop(0.5, '#89909c'); rg.addColorStop(1, '#565d68');
        ctx.fillStyle = rg; ctx.fill();
      }
      // polished top edge + a whisper of gold beneath it
      ctx.strokeStyle = 'rgba(245,250,255,0.7)'; ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.moveTo(r1.x, r1.y); ctx.lineTo(r2.x, r2.y); ctx.stroke();
      ctx.strokeStyle = 'rgba(232,200,119,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(r1.x, r1.y + 2.2); ctx.lineTo(r2.x, r2.y + 2.2); ctx.stroke();
    }
  }

  function drawLip() {
    const front = tierFront(0);
    const a = w2s(0, front - MACH.lipW, 0), b = w2s(100, front - MACH.lipW, 0);
    const c2 = w2s(100, front, MACH.lipH), d = w2s(0, front, MACH.lipH);
    poly([a, b, c2, d]);
    const g = ctx.createLinearGradient(0, a.y, 0, c2.y);
    g.addColorStop(0, 'rgba(255,255,255,0.05)');
    g.addColorStop(1, 'rgba(255,255,255,0.22)');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
  }

  function drawPusherBlock(t) {
    const T = theme();
    const td = MACH.tiers[0];
    const pf = pusherFront(0);
    const zTop = td.z + C.PUSH_H, zBot = td.z;
    const tl = w2s(1, td.back, zTop), tr = w2s(99, td.back, zTop);
    const fl = w2s(1, pf, zTop), frt = w2s(99, pf, zTop);
    const bl = w2s(1, pf, zBot), br = w2s(99, pf, zBot);
    // the pusher top: the carved stone slab when its skin is in, brushed
    // steel otherwise
    poly([tl, tr, frt, fl]);
    const topSkin = machArt('pusher_top');
    const tg = ctx.createLinearGradient(0, tl.y, 0, fl.y);
    tg.addColorStop(0, '#828a98'); tg.addColorStop(0.55, '#a8b0bc'); tg.addColorStop(1, '#c2c9d4');
    ctx.fillStyle = tg; ctx.fill();
    ctx.save();
    ctx.clip();
    if (topSkin) {
      // RIGID skin: sized once for the fully-extended plate and glued to
      // the moving front edge — the back of it slides under the wall slot
      // instead of the texture stretching
      const flMax = w2s(1, C.PUSH_MAX, zTop), frMax = w2s(99, C.PUSH_MAX, zTop);
      const skinH = (flMax.y - tl.y) + 4;
      const skinW = (frMax.x - flMax.x) + 14;
      ctx.drawImage(topSkin, LW / 2 - skinW / 2, fl.y - skinH + 2, skinW, skinH);
    } else {
      ctx.globalAlpha = 0.1;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      for (let i = 0; i < 7; i++) {
        const y = tl.y + (fl.y - tl.y) * (i / 7);
        ctx.beginPath(); ctx.moveTo(tl.x, y); ctx.lineTo(tr.x, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    // the PUSH legend when no sign art is in
    const sign = machArt('push_sign');
    const py2 = (tl.y + fl.y) / 2;
    if (!sign) {
      const pfs = Math.max(10, (fl.y - tl.y) * 0.5);
      txt('▼ PUSH ▼', LW / 2, py2 + 1, '900 ' + pfs + 'px Verdana, sans-serif', 'rgba(255,255,255,0.35)');
      ctx.save();
      ctx.globalAlpha = 0.65 + 0.25 * Math.sin(t * 2.6);
      txt('▼ PUSH ▼', LW / 2, py2, '900 ' + pfs + 'px Verdana, sans-serif', T.accent);
      ctx.restore();
    }
    ctx.restore();
    // the carved wooden sign stands proud on the pusher plate (outside the
    // clip, so it overhangs like a real standee). FIXED size — it rides the
    // plate without breathing as the perspective changes
    if (sign) {
      const sh2 = 34;
      const sw2 = sh2 / imAspect(sign, 96 / 270);
      shadowImg('sign', sign, LW / 2 - sw2 / 2, fl.y - sh2 - 1, sw2, sh2, 5, 2, 'rgba(0,0,0,0.4)');
    }
    // face: the riveted iron strip when skinned, painted bevel + LED chase
    // otherwise
    poly([fl, frt, br, bl]);
    const faceSkin = machArt('pusher_face');
    if (faceSkin) {
      ctx.save();
      ctx.clip();
      ctx.drawImage(faceSkin, fl.x - 6, fl.y - 1, (frt.x - fl.x) + 12, (bl.y - fl.y) + 2);
      ctx.restore();
      ctx.strokeStyle = 'rgba(240,246,255,0.4)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
      return;
    }
    const fg = ctx.createLinearGradient(0, fl.y, 0, bl.y);
    fg.addColorStop(0, '#6d7584'); fg.addColorStop(0.45, '#494f5b'); fg.addColorStop(1, '#2c3038');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
    ctx.strokeStyle = 'rgba(232,200,119,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bl.x, bl.y - 1.5); ctx.lineTo(br.x, br.y - 1.5); ctx.stroke();
    const nLed = 10, lead = Math.floor(t * 8) % nLed;
    for (let i = 0; i < nLed; i++) {
      const u = (i + 0.5) / nLed;
      const x = fl.x + (frt.x - fl.x) * u;
      const y = (fl.y + bl.y) / 2;
      const d = (i - lead + nLed) % nLed;
      const lit = d < 3;
      if (lit) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.4 - d * 0.12;
        ctx.fillStyle = '#ff8a5e';
        ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = lit ? '#ffd0b0' : '#463034';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, 7); ctx.fill();
    }
  }

  // ---------------------------------------------------------- battle: pieces
  const ITEM_GLOW = { weapon: '#ffb46b', poison: '#b8f26b', shield: '#c8d6e8', heal: '#ff8da1', stun: '#8be7ff',
                      burn: '#ff9d3c', bleed: '#ff5a6e', pet: '#ffd75e' };
  function drawCoin(c, t) {
    let zv = c.z;
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const p2 = (c.y - (front - MACH.lipW)) / MACH.lipW;
      if (p2 > 0) zv += Math.min(p2, 1) * MACH.lipH;
    }
    const p = w2s(c.x, Math.min(c.y, 108), zv);
    const u = p.u;
    const rx = c.r * u;
    let ry = rx * 0.46;
    let tumble = 1;
    if (c.st === 'fall' || c.st === 'air') {
      tumble = Math.max(0.22, Math.abs(Math.cos(c.rot)));
      ry = rx * 0.46 * tumble + rx * 0.10 * (1 - tumble);
    }
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const over = (c.y - (front - c.r)) / c.r;
      if (over > 0) ry *= 1 + Math.min(over, 1) * 0.18;
    }
    ctx.save();
    if (c.st === 'tray') ctx.globalAlpha = Math.max(0, Math.min(1, c.ttl / 0.6));
    if ((c.st === 'plat' || c.st === 'air') && !c.onPush) {
      const td = MACH.tiers[c.tier];
      if (c.z > td.z + 0.5) {
        const sp = w2s(c.x, Math.min(c.y, 108), td.z);
        ctx.beginPath();
        ctx.ellipse(sp.x, sp.y, rx * Math.max(0.4, 1 - (c.z - td.z) * 0.006), ry * Math.max(0.4, 1 - (c.z - td.z) * 0.006), 0, 0, 7);
        ctx.fillStyle = 'rgba(10,10,16,0.28)';
        ctx.fill();
      }
    }
    if (c.kind === 'gem') { drawGem(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'item' || c.kind === 'chest' || c.kind === 'bag' || c.kind === 'skull') {
      drawItem(c, p, rx, t); ctx.restore(); return;
    }
    if (c.kind === 'chip') { drawChip(c, p, rx, ry, t); ctx.restore(); return; }
    const lucky = c.kind === 'lucky';
    const pal = COIN_PALS[c.kind] || COIN_PALS.coin;
    const sym = COIN_SYMS[c.kind] || '⚔';
    const pop = c.popT > 0 ? 1 + 0.22 * (c.popT / 0.18) : 1;
    const drx = rx * pop, dry = ry * pop;
    const face = pieceArt(c.kind);
    if (face) {
      // the engraved face from the piece sheet, resting on a painted edge
      ctx.beginPath(); ctx.ellipse(p.x, p.y + drx * 0.17, drx, dry, 0, 0, 7);
      ctx.fillStyle = pal.edge; ctx.fill();
      ctx.drawImage(face, p.x - drx, p.y - dry, drx * 2, dry * 2);
    } else {
      const spr = flatSprite(c.kind, pal, sym);
      const hs = dry / (drx * 0.4583);
      const w = drx * (96 / 44), h = (66 / 96) * w * hs;
      ctx.drawImage(spr, p.x - w / 2, p.y - (24 / 66) * h, w, h);
    }
    const gph = (t * 0.5 + c.glint) % (Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, drx * 0.9, dry * 0.9, 0, gph, gph + 0.9);
    ctx.strokeStyle = 'rgba(255,252,230,0.85)'; ctx.lineWidth = 1.6;
    ctx.stroke();
    if (lucky && (t * 0.9 + c.glint) % 2.3 < 0.12) {
      ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 1.4;
      const sx2 = p.x + drx * 0.4, sy2 = p.y - dry * 0.4;
      ctx.beginPath();
      ctx.moveTo(sx2 - 5, sy2); ctx.lineTo(sx2 + 5, sy2);
      ctx.moveTo(sx2, sy2 - 5); ctx.lineTo(sx2, sy2 + 5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGem(c, p, rx, t) {
    const gemIm = pieceArt('gem');
    if (gemIm) {
      const gh = rx * 2.1, gw = imW(gemIm, gh);
      ctx.drawImage(gemIm, p.x - gw / 2, p.y - gh * 0.62, gw, gh);
      if ((t + c.glint) % 1.6 < 0.14) {
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p.x - rx * 0.3 - 5, p.y - rx * 0.3); ctx.lineTo(p.x - rx * 0.3 + 5, p.y - rx * 0.3);
        ctx.moveTo(p.x - rx * 0.3, p.y - rx * 0.3 - 5); ctx.lineTo(p.x - rx * 0.3, p.y - rx * 0.3 + 5);
        ctx.stroke();
      }
      return;
    }
    ctx.translate(p.x, p.y);
    const s = rx * 1.15;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.62);
    ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.lineTo(0, s * 0.62);
    ctx.lineTo(-s * 0.72, -s * 0.1);
    ctx.closePath();
    const g = ctx.createLinearGradient(-s, -s, s, s);
    g.addColorStop(0, '#d8fbff'); g.addColorStop(0.45, '#4ecbe8'); g.addColorStop(1, '#1b6fa8');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = '#0d3f66'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.72, -s * 0.1); ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.moveTo(0, -s * 0.62); ctx.lineTo(0, s * 0.62);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.stroke();
    if ((t + c.glint) % 1.6 < 0.14) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3 - 5, -s * 0.3); ctx.lineTo(-s * 0.3 + 5, -s * 0.3);
      ctx.moveTo(-s * 0.3, -s * 0.3 - 5); ctx.lineTo(-s * 0.3, -s * 0.3 + 5);
      ctx.stroke();
    }
  }

  // arsenal items / chests / gold bags / cursed skulls: emoji riding the pile
  function drawItem(c, p, rx, t) {
    const it = c.kind === 'item' ? itemById(c.iid) : null;
    const icon = c.kind === 'chest' ? '\u{1F381}' : c.kind === 'bag' ? '\u{1F4B0}'
               : c.kind === 'skull' ? '☠\u{FE0F}' : (it ? it.icon : '❓');
    const bob = c.st === 'plat' ? Math.sin(t * 2 + c.glint) * 1.2 : 0;
    // decompose the fall: sideways component rotates on screen,
    // depth component (toward/away from you) foreshortens flat
    const tip = c.kind === 'item' ? (c.tip || 0) : 0;
    const tipK = Math.abs(Math.sin(tip));
    const side = Math.sin(c.tipA || 0), depth = Math.cos(c.tipA || 0);
    // the shadow spreads as the piece lies down (sideways falls stretch it
    // wide, depth falls stretch it deep)
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + rx * 0.35, rx * (1.05 + tipK * Math.abs(side) * 0.6),
                rx * (0.45 + tipK * Math.abs(depth) * 0.35), 0, 0, 7);
    ctx.fillStyle = 'rgba(20,12,8,0.45)'; ctx.fill();
    ctx.save();
    // pivot at the piece's BASE so toppling reads like a falling domino
    ctx.translate(p.x, p.y + rx * 0.25 + bob * (1 - tipK * 0.7) + tipK * depth * rx * 0.3);
    if (c.st === 'fall' || c.st === 'air') ctx.rotate(Math.sin(c.rot) * 0.3);
    else ctx.rotate(tip * side);
    const im = c.kind === 'item' ? itemArt(c.iid) : pieceArt(c.kind);
    if (im) {
      const hgt = rx * (c.kind === 'item' ? 2.9 : 2.5);
      const wdt = imW(im, hgt);
      // sideways lies foreshorten a touch; forward/backward falls squash
      // the sprite flat against the platform
      const squash = (1 - tipK * Math.abs(side) * 0.18) * (1 - tipK * Math.abs(depth) * 0.55);
      ctx.drawImage(im, -wdt / 2, -hgt * 1.05 * squash, wdt, hgt * squash);
    } else {
      txt(icon, 0, -rx * 0.75, Math.round(rx * (c.kind === 'item' ? 2.6 : 2.2)) + 'px serif', '#fff');
    }
    ctx.restore();
    // glow ring: friendly gold for loot, sickly purple for curses
    const glow = c.kind === 'skull' ? '#c86bff'
               : c.kind === 'chest' ? '#ffb0e0'
               : c.kind === 'bag' ? '#ffd75e'
               : (it ? ITEM_GLOW[it.kind] || '#ffe066' : '#ffe066');
    ctx.globalAlpha = 0.30 + 0.18 * Math.sin(t * 3 + c.glint);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.3, rx * 1.25, rx * 0.55, 0, 0, 7);
    ctx.strokeStyle = glow;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    if (c.temp && c.st === 'plat') {
      txt('FREE', p.x, p.y - rx * 1.6, '800 8px Verdana, sans-serif', '#ffe066');
    }
  }

  function drawChip(c, p, rx, ry, t) {
    const edgeH = Math.max(1.5, C.COIN_H * p.u * 0.5);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + edgeH, rx, ry, 0, 0, 7);
    ctx.fillStyle = '#0c4a5e'; ctx.fill();
    ctx.fillRect(p.x - rx, p.y, rx * 2, edgeH);
    const g = ctx.createRadialGradient(p.x - rx * 0.3, p.y - ry * 0.4, rx * 0.1, p.x, p.y, rx * 1.2);
    g.addColorStop(0, '#e8fdff'); g.addColorStop(0.5, '#57d8f0'); g.addColorStop(1, '#1a7ca0');
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, 7);
    ctx.fillStyle = g; ctx.fill();
    const hue = (t * 140 + c.glint * 60) % 360;
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'hsl(' + hue + ',95%,65%)';
    ctx.stroke();
    if (ry > 3) {
      txt('W', p.x, p.y + 0.5, '900 ' + Math.max(6, ry * 1.1) + 'px Verdana, sans-serif', 'rgba(8,50,66,0.9)');
    }
  }

  // fascia + tray bowl are bolted down — painted once into a cached strip
  function frontStatic() {
    const front = tierFront(0);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    ctx.beginPath();
    ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y);
    ctx.lineTo(r.x + 4, 648); ctx.lineTo(l.x - 4, 648);
    ctx.closePath();
    ctx.fillStyle = lgr('ff:' + fkey() + ':' + (l.y | 0), 0, l.y, 0, 648,
      [[0, '#5c5766'], [0.15, '#3a3542'], [1, '#221d28']]);
    ctx.fill();
    ctx.strokeStyle = 'rgba(235,240,250,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y); ctx.stroke();
    // gold hairline under the chevrons
    ctx.strokeStyle = 'rgba(232,200,119,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(l.x - 1, l.y + 13); ctx.lineTo(r.x + 1, r.y + 13); ctx.stroke();
    // the engraved dragon-vs-knight plate dresses the fascia
    const plate = machArt('fascia');
    if (plate) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(l.x, l.y + 14); ctx.lineTo(r.x, r.y + 14);
      ctx.lineTo(r.x + 4, 646); ctx.lineTo(l.x - 4, 646);
      ctx.closePath(); ctx.clip();
      ctx.globalAlpha = 0.92;
      ctx.drawImage(plate, l.x - 6, l.y + 12, (r.x - l.x) + 12, 646 - (l.y + 12));
      ctx.restore();
    }
    // the tray: velvet-dark bowl with a gold rim and an inner glow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 3;
    rr(58, 648, LW - 116, 52, 14);
    ctx.fillStyle = lgr('tray', 0, 648, 0, 700, [[0, '#0e070f'], [0.7, '#231622'], [1, '#31202c']]);
    ctx.fill();
    ctx.restore();
    const trayArt = machArt('tray');
    if (trayArt) {
      // the stone catch-box from the concept sheet
      ctx.save();
      rr(56, 646, LW - 112, 56, 14); ctx.clip();
      ctx.drawImage(trayArt, 54, 645, LW - 108, 58);
      ctx.restore();
    } else {
      rr(58, 648, LW - 116, 52, 14);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = lgr('trayRim', 0, 648, 0, 700, [[0, '#e8c877'], [0.6, '#9a7440'], [1, '#6a4e28']]);
      ctx.stroke();
      rr(61, 651, LW - 122, 46, 11);
      ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.stroke();
    }
  }
  function drawFrontAndTray() {
    const front = tierFront(0);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    layer('front', 0, l.y - 14, LW, 716 - (l.y - 14),
      ['f' + fkey(), machArt('fascia') ? 1 : 0, machArt('tray') ? 1 : 0],
      frontStatic);
    // hazard chevrons, slowly marching toward the tray
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(l.x, l.y + 3); ctx.lineTo(r.x, r.y + 3);
    ctx.lineTo(r.x + 1, l.y + 12); ctx.lineTo(l.x - 1, l.y + 12);
    ctx.closePath(); ctx.clip();
    const scroll = (S.time * 8) % 18;
    for (let x = l.x - 36 + scroll; x < r.x + 20; x += 18) {
      ctx.fillStyle = 'rgba(240,190,60,0.55)';
      ctx.beginPath();
      ctx.moveTo(x, l.y + 12); ctx.lineTo(x + 9, l.y + 12);
      ctx.lineTo(x + 18, l.y + 2); ctx.lineTo(x + 9, l.y + 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    // the round's loot rattles around the tray until it resolves
    const items = S.tray.items;
    const trayGlow = S.battle && S.battle.loot.length > 0;
    if (trayGlow) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.10 + 0.06 * Math.sin(S.time * 5);
      rr(58, 648, LW - 116, 52, 14);
      ctx.fillStyle = '#ffae34'; ctx.fill();
      ctx.restore();
    }
    const TRAY_COL = COIN_UI;
    items.forEach((it, i) => {
      const px = LW / 2 + Math.sin(i * 2.399) * (18 + ((i * 7) % 130));
      const py = 686 - (i % 3) * 6;
      const im = it.kind === 'item' ? itemArt(it.iid) : pieceArt(it.kind);
      if (im && it.kind !== 'item' && PIECE_ART[it.kind] && it.kind !== 'gem' && it.kind !== 'bag' && it.kind !== 'skull' && it.kind !== 'chest') {
        // minted coins lie flat in the tray
        ctx.drawImage(im, px - 10, py - 9, 20, 9);
      } else if (im) {
        const hgt = it.kind === 'item' ? 22 : 18, wdt = imW(im, hgt);
        ctx.drawImage(im, px - wdt / 2, py - hgt + 2, wdt, hgt);
      } else if (it.kind === 'item') {
        const def = itemById(it.iid);
        txt(def ? def.icon : '❓', px, py - 8, '20px serif', '#fff');
      } else if (it.kind === 'skull') {
        txt('☠\u{FE0F}', px, py - 8, '16px serif', '#fff');
      } else if (it.kind === 'gem') {
        ctx.beginPath(); ctx.ellipse(px, py - 2, 8, 5, 0, 0, 7);
        ctx.fillStyle = '#4ecbe8'; ctx.fill();
      } else if (it.kind === 'bag') {
        txt('\u{1F4B0}', px, py - 8, '18px serif', '#fff');
      } else {
        ctx.beginPath(); ctx.ellipse(px, py, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = '#8a5f10'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(px, py - 2, 10, 4.4, 0, 0, 7);
        ctx.fillStyle = TRAY_COL[it.kind] || '#f2c04a';
        ctx.fill();
        ctx.strokeStyle = 'rgba(120,80,12,0.7)'; ctx.lineWidth = 0.8; ctx.stroke();
      }
    });
  }

  function drawGlass(t) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(26, 172, LW - 52, 470);
    ctx.clip();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#ffffff';
    poly([{ x: 60, y: 172 }, { x: 150, y: 172 }, { x: -40, y: 642 }, { x: -130, y: 642 }]);
    ctx.fill();
    poly([{ x: 320, y: 172 }, { x: 355, y: 172 }, { x: 165, y: 642 }, { x: 130, y: 642 }]);
    ctx.fill();
    const sx = ((t * 40) % (LW + 400)) - 200;
    ctx.globalAlpha = 0.09;
    poly([{ x: sx, y: 172 }, { x: sx + 60, y: 172 }, { x: sx - 130, y: 642 }, { x: sx - 190, y: 642 }]);
    ctx.fill();
    ctx.globalAlpha = 0.05;
    ctx.beginPath();
    ctx.ellipse(LW / 2, 130, 300, 70, 0, 0, Math.PI);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles(dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = S.parts.length - 1; i >= 0; i--) {
      const p = S.parts[i];
      p.life += dt;
      if (p.life >= p.max) { S.parts.splice(i, 1); continue; }
      p.vy += p.g * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      ctx.globalAlpha = 1 - p.life / p.max;
      ctx.fillStyle = p.col;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.spin * p.life * 4);
      const s = p.sz;
      if (p.shape === 'heart') {
        ctx.beginPath();
        ctx.moveTo(0, s * 0.7);
        ctx.bezierCurveTo(-s * 1.3, -s * 0.3, -s * 0.5, -s * 1.1, 0, -s * 0.3);
        ctx.bezierCurveTo(s * 0.5, -s * 1.1, s * 1.3, -s * 0.3, 0, s * 0.7);
        ctx.fill();
      } else if (p.shape === 'star') {
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s * 0.3, -s * 0.3); ctx.lineTo(s, 0); ctx.lineTo(s * 0.3, s * 0.3);
        ctx.lineTo(0, s); ctx.lineTo(-s * 0.3, s * 0.3); ctx.lineTo(-s, 0); ctx.lineTo(-s * 0.3, -s * 0.3);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-s / 2, -s / 2, s, s);
      }
      ctx.restore();
    }
    ctx.restore();
  }

  // ------------------------------------------------------------- ambience
  // drifting dust motes and a soft vignette put the dungeon in the air
  const MOTES = [];
  {
    const old = rngState; srand(4242);
    for (let i = 0; i < 34; i++) {
      MOTES.push({ x: rng() * LW, y: rng() * LH, r: 0.8 + rng() * 1.8,
                   vx: (rng() - 0.5) * 7, vy: -4 - rng() * 9, ph: rng() * 7 });
    }
    rngState = old;
  }
  function drawMotes(dt, warm) {
    ctx.save();
    for (const m of MOTES) {
      m.x += m.vx * dt; m.y += m.vy * dt;
      if (m.y < -6) { m.y = LH + 6; m.x = Math.random() * LW; }
      if (m.x < -6) m.x = LW + 6;
      if (m.x > LW + 6) m.x = -6;
      ctx.globalAlpha = 0.10 + 0.08 * Math.sin(S.time * 1.4 + m.ph);
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7);
      ctx.fillStyle = warm ? '#ffd9a0' : '#c8d8f0';
      ctx.fill();
    }
    ctx.restore();
  }
  function drawVignette(strength) {
    ctx.save();
    const g = rgr('vig', LW / 2, LH / 2, 240, LW / 2, LH / 2, 620,
      [[0, 'rgba(8,4,10,0)'], [1, 'rgba(8,4,10,0.9)']]);
    ctx.globalAlpha = strength || 0.5;
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, LW, LH);
    ctx.restore();
  }

  // floats pin to the machine (wx) or to a screen anchor: the foe, your
  // hero, or the gold counter — so resolve numbers pop where they land
  // hero/enemy anchors live on the battle STAGE and are re-pinned every
  // frame by drawEnemyPanel (the enemy anchor tracks the TARGET foe)
  const ANCHORS = { enemy: { x: LW - 156, y: 56 }, hero: { x: 72, y: 56 }, gold: { x: 90, y: 756 } };
  function drawFloats() {
    for (const f of S.floats) {
      const p = f.anchor ? ANCHORS[f.anchor] || ANCHORS.hero : w2s(f.wx, f.wy, C.TRAY_Z);
      const k = f.age / f.max;
      const pop = k < 0.18 ? k / 0.18 : 1;
      const scl = (f.big ? 1.5 : 1) * (0.6 + 0.4 * pop);
      ctx.save();
      ctx.globalAlpha = Math.min(1, (1 - k) * 2);
      ctx.translate(p.x, p.y - 12 - k * (f.anchor ? 32 : 46));
      ctx.scale(scl, scl);
      txt(f.txt, 0, 0, '900 22px Verdana, sans-serif', f.col, 'center', { w: 5, col: 'rgba(30,10,5,0.9)' });
      ctx.restore();
    }
  }

  // a carved stone pill from the UI sheet — ember-lit when active.
  // Returns false when the art is missing so callers can fall back.
  function pillBtn(x, y, w, h, label, cb, on, col) {
    const im = machArt(on ? 'pill_glow' : 'pill');
    if (!im) return false;
    uiButtons.push({ x, y, w, h, cb });
    shadowImg(on ? 'pillg' : 'pill', im, x, y - 3, w, h + 6, 6, 2);
    txt(label, x + w / 2, y + h / 2 + 1, '900 12px Verdana, sans-serif', col,
        'center', { w: 3, col: 'rgba(30,12,4,0.6)' });
    return true;
  }
  // sticky TURBO: drop coins at double speed (mirrors the resolve-speed pill)
  function drawTurboBtn(t) {
    const on = (S.turbo || 1) > 1;
    const label = on ? '\u{26A1} ×' + S.turbo : '\u{26A1} turbo';
    if (pillBtn(14, 148, 96, 24, label, () => cycleTurbo(), on, on ? '#ffe0c0' : '#c8b89a')) return;
    uiBtn(14, 148, 96, 24, label, () => cycleTurbo(),
      { r: 12, grad: on ? ['#c85a2a', '#7a2e10'] : ['#3a3440', '#262230'],
        border: on ? '#ffb072' : '#7d5a24',
        col: on ? '#ffe0c0' : '#b8a882', font: '900 12px Verdana, sans-serif' });
  }
  // sticky resolve fast-forward: tap to cycle ×1 / ×2 / ×3 (persists)
  function drawSpeedBtn(t) {
    const mul = S.resolveMul || 1;
    const label = '\u{23E9} ×' + mul;
    if (pillBtn(LW - 86, 148, 72, 24, label, () => cycleSpeed(), mul > 1, mul > 1 ? '#ffe9a3' : '#c8b89a')) return;
    const live = S.battle && S.battle.phase !== 'drop' && !S.victory;

  const WHEEL_COLS = ['#f2c04a', '#ef4b5d', '#37b6e6', '#b06be8'];
  function drawWheel() {
    if (!S.wheelAnim) return;
    const a = S.wheelAnim;
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { if (a.t > 2.8) dismissWheel(); } });
    ctx.fillStyle = 'rgba(5,3,8,0.72)';
    ctx.fillRect(0, 0, LW, LH);
    const cx = LW / 2, cy = 390, R = 132;
    const N = WHEEL.length, seg = (Math.PI * 2) / N;
    const k = Math.min(1, a.t / 2.6);
    const ease = 1 - Math.pow(1 - k, 3);
    const target = (Math.PI * 2) * 4 + (-Math.PI / 2) - (a.seg + 0.5) * seg;
    const rot = ease * target;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, R, i * seg, (i + 1) * seg);
      ctx.closePath();
      ctx.fillStyle = WHEEL[i].col || WHEEL_COLS[i % 4];
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,8,4,0.6)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save();
      ctx.rotate((i + 0.5) * seg);
      // labels may be two lines (split on \n) — stack them along the spoke
      const lines = String(WHEEL[i].label).split('\n');
      lines.forEach((ln, li) =>
        txt(ln, R * 0.60, (li - (lines.length - 1) / 2) * 12, '900 11px Verdana, sans-serif', '#1d1016'));
      ctx.restore();
    }
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx, cy, R + 5, 0, 7);
    ctx.lineWidth = 8; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, 7);
    ctx.fillStyle = '#ffd75e'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - 14, cy - R - 16); ctx.lineTo(cx + 14, cy - R - 16); ctx.lineTo(cx, cy - R + 8);
    ctx.closePath();
    ctx.fillStyle = '#ff5a4e'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    txt('WHEEL OF FORTUNE', cx, cy - R - 44, '900 24px Georgia, serif', '#ffd75e', 'center', { w: 5, col: '#3a1006' });
    if (a.t > 2.6) {
      const pop = 1 + Math.sin((a.t - 2.6) * 8) * 0.05;
      const rlines = String(a.label).split('\n');
      ctx.save();
      ctx.translate(cx, cy + R + 44);
      ctx.scale(pop, pop);
      rlines.forEach((ln, li) =>
        txt(ln, 0, li * 26 - (rlines.length - 1) * 13, '900 26px Verdana, sans-serif', '#fff6c8', 'center', { w: 6, col: '#3a1006' }));
      ctx.restore();
      txt('tap to continue', cx, cy + R + 76 + (rlines.length - 1) * 14, '600 11px Verdana, sans-serif', '#c8a8b0');
    }
  }
