  function drawBattle(t, dt) {
    battleBase();
    drawEnemyPanel(t, dt);
    drawBackWall(t);
    drawMeter(t);
    drawPusherBlock(t);
    const onPlat = [], offEdge = [];
    for (const c of S.coins) {
      (c.st === 'fall' || c.st === 'tray' ? offEdge : onPlat).push(c);
    }
    const byDepth = (a, b) => (a.y + a.lay * 0.5) - (b.y + b.lay * 0.5);
    onPlat.sort(byDepth); offEdge.sort(byDepth);
    for (const c of onPlat) drawCoin(c, t);
    drawFrontAndTray();
    for (const c of offEdge) drawCoin(c, t);
    drawGlass(t);
    drawMotes(dt, 1);
    drawParticles(dt);
    const phase = S.battle ? S.battle.phase : 'drop';
    // resolve/enemy phases: dim the machine and run the cinematics
    if (phase !== 'drop' && !S.victory) {
      ctx.fillStyle = 'rgba(8,4,12,0.38)';
      ctx.fillRect(0, 160, LW, 500);
      drawLootStrip(t);
      const label = phase === 'resolve' ? '✦ RESOLVING THE TRAY ✦' : '⚔ ENEMY TURN ⚔';
      txt(label, LW / 2, 178, '900 15px Georgia, serif',
          phase === 'resolve' ? '#ffd75e' : '#ff8a8a', 'center', { w: 4, col: 'rgba(10,5,12,0.95)' });
    } else if (S.battle && (S.battle.loot.length || S.battle.banked.length)) {
      drawLootStrip(t);
    }
    drawResolveFx(dt);
    drawFloats();
    // END TURN is ALWAYS there during the drop phase — end whenever you like,
    // coins left in the purse or not. It pulses once the purse runs dry.
    if (phase === 'drop' && !S.victory) {
      drawHandRow(t);
      drawTiltCluster(t);
      const empty = S.run.wallet < 1;
      const pulse = empty ? 1 + Math.sin(t * 6) * 0.05 : 1;
      const bw = 170 * pulse;
      const bx2 = LW - 100 - bw / 2;
      const etArt = machArt('end_turn');
      if (etArt) {
        // the dragon-sealed scroll from the concept sheet
        const bh2 = bw * imAspect(etArt, 108 / 364);
        const by2 = 616 - bh2 / 2;
        // pre-glowed sprite at base size; the pulse just scales the blit
        const baseW = 170, baseH = baseW * imAspect(etArt, 108 / 364);
        const sp = shadowSprite(empty ? 'et1' : 'et0', etArt, baseW, baseH,
          empty ? 18 : 9, 0, 'rgba(255,190,80,' + (empty ? 0.6 : 0.3) + ')');
        const sc2 = bw / baseW, pad2 = sp._pad * sc2;
        ctx.drawImage(sp, bx2 - pad2, by2 - pad2, bw + pad2 * 2, bh2 + pad2 * 2);
        uiButtons.push({ x: bx2, y: by2, w: bw, h: bh2, cb: () => endRoundNow() });
      } else {
        uiBtn(bx2, 596, bw, 40, 'END TURN ▶', () => endRoundNow(),
              { grad: empty ? ['#ffd75e', '#c98f2a'] : ['#c8a05a', '#8a6a2a'],
                border: '#fff0c0', col: '#3a2406', font: '900 15px Verdana, sans-serif', r: 15 });
      }
      // a shine sweeps across the painted fallback (the scroll art carries
      // its own charm and a sweep would box its transparent corners)
      if (!etArt) {
        ctx.save();
        rr(bx2 + 3, 599, bw - 6, 34, 13); ctx.clip();
        const sx2 = bx2 - 60 + ((t * 110) % (bw + 120));
        const sg = ctx.createLinearGradient(sx2 - 22, 0, sx2 + 22, 0);
        sg.addColorStop(0, 'rgba(255,255,255,0)');
        sg.addColorStop(0.5, 'rgba(255,255,255,' + (empty ? 0.4 : 0.22) + ')');
        sg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(sx2 - 26, 596, 52, 40);
        ctx.restore();
      }
    }
    drawSpeedBtn(t);
    if (phase === 'drop' && !S.victory) drawTurboBtn(t);
    drawHUD(t);
    drawVignette(0.55);
    // hurt vignette
    if (S.hurtT > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.5, S.hurtT * 1.2);
      const g = ctx.createRadialGradient(LW / 2, LH / 2, 200, LW / 2, LH / 2, 560);
      g.addColorStop(0, 'rgba(200,20,30,0)');
      g.addColorStop(1, 'rgba(200,20,30,0.9)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, LW, LH);
      ctx.restore();
    }
    drawBanner(t);
    drawFoeInfo(t);              // the inspect card rides on top of the intro banner
    drawVictory(t);
    drawInventory(t);            // the BAG rides on top of everything
  }

  // tap a monster mid-fight to read its bestiary card: stats, its mechanic,
  // and the tactic that beats it
  const DEF_TIP = {
    gel: 'chip it with many small coins, or POISON it', armor: 'gold bounces — bring poison, lucky or weapons',
    thick: 'poison does nothing; answer with raw damage', regen: 'out-tick it with poison, or burst it down fast',
    ward: 'punch through with big hits — or kill it first',
  };
  const TRAIT_ATK = {
    fast: 'strikes TWICE each turn', thief: 'steals coins from next round',
    venom: 'poisons you when it hits', curse: 'rains cursed skulls onto the field',
    enrage: 'FURY: +1 attack every round — kill it fast', leech: 'LEECH: heals for damage dealt — block hard',
    bleeder: 'BLEEDER: its hits leave wounds that halve each round',
    burner: 'BURNER: its hits ignite you — hot, but fades fast',
  };
  function drawFoeInfo(t) {
    if (S.foeInfo === null || !S.foes || !S.foes[S.foeInfo]) return;
    const e = S.foes[S.foeInfo];
    // dim + a full-screen tap-catcher to dismiss
    ctx.fillStyle = 'rgba(6,3,10,0.72)'; ctx.fillRect(0, 0, LW, LH);
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { S.foeInfo = null; } });
    const cw = LW - 96, cx = LW / 2, cy = 250, ch = 340;
    const fFrame = machArt('frame_tall');
    if (fFrame) {
      shadowImg('foeframe', fFrame, cx - cw / 2 - 8, cy - 8, cw + 16, ch + 16, 18, 6, 'rgba(0,0,0,0.6)');
      // a rank-coloured accent ring inside the stone
      rr(cx - cw / 2 + 10, cy + 10, cw - 20, ch - 20, 12);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = e.boss ? 'rgba(255,215,94,0.5)' : e.elite ? 'rgba(255,157,60,0.5)' : 'rgba(200,107,255,0.4)';
      ctx.stroke();
    } else {
      rr(cx - cw / 2, cy, cw, ch, 18);
      ctx.fillStyle = 'rgba(24,14,26,0.98)'; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = e.boss ? '#ffd75e' : e.elite ? '#ff9d3c' : '#c86bff'; ctx.stroke();
    }
    // portrait
    const key = foeArtKey(e);
    if (!(key && drawArt(key, cx, cy + 96, (sheetOf(key).bh || 72), 'd', t))) {
      txt(e.icon, cx, cy + 60, '48px serif', '#fff');
    }
    txt(e.name, cx, cy + 128, '900 18px Georgia, serif', e.boss ? '#ffd75e' : '#f0e0f0', 'center', { w: 4, col: '#20081a' });
    txt('❤\u{FE0F} ' + Math.max(0, e.hp) + ' / ' + e.maxHp + '     ⚔ ' + e.atk + ' atk',
        cx, cy + 152, '800 12px Verdana, sans-serif', '#e8c8d0');
    let yy = cy + 182;
    // defensive mechanic
    if (e.def) {
      txt(DEF_BADGE[e.def] + '  ' + DEF_TXT[e.def], cx, yy, '800 11px Verdana, sans-serif', '#c3a8e0');
      yy += 18;
      txt('\u{1F449} ' + DEF_TIP[e.def], cx, yy, '700 10px Verdana, sans-serif', '#8ed67e');
      yy += 24;
    } else {
      txt('no special defence — hit it however you like', cx, yy, '700 11px Verdana, sans-serif', '#a89aae');
      yy += 24;
    }
    // attack rider
    if (e.trait && TRAIT_ATK[e.trait]) {
      txt('\u{1F5E1}\u{FE0F} ' + TRAIT_ATK[e.trait], cx, yy, '800 11px Verdana, sans-serif', '#ffb4a8');
      yy += 22;
    }
    // what it's about to do
    const it = e.intent || {};
    const plan = e.stunned > 0 ? 'frozen — it skips its next turn'
      : it.t === 'heavy' ? 'winding up a HEAVY blow (' + (e.atk * 2) + ')'
      : it.t === 'brace' ? 'bracing — it will take half damage'
      : it.t === 'curse' ? 'about to hurl a skull volley'
      : 'a plain strike for ' + e.atk;
    txt('this turn: ' + plan, cx, yy, '700 10px Verdana, sans-serif', '#c8b8a0');
    const pulse = 1 + Math.sin(t * 5) * 0.03;
    uiBtn(cx - 80 * pulse, cy + ch - 44, 160 * pulse, 34, 'GOT IT ▶', () => { S.foeInfo = null; },
      { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 13px Verdana, sans-serif', r: 12 });
  }

  // ------------------------------------------------------ the BAG overlay
  // Everything you carry on one card: the purse (with every relic bend
  // folded into the numbers), the arsenal, the relic shelf, and the
  // run's stats. Opened from the HUD's BAG button or the 'i' key.
  const INV_TABS = [['coins', 'COINS'], ['items', 'ITEMS'], ['relics', 'RELICS'], ['stats', 'STATS']];
  const ACT_NAMES = ['ACT I — THE CATACOMBS', 'ACT II — THE DEEP HALLS', 'ACT III — THE ABYSS'];
  function wrapLines(s, maxChars, maxLines) {
    const words = ('' + s).split(' ');
    const lines = [''];
    for (const w of words) {
      if (lines[lines.length - 1] && (lines[lines.length - 1] + ' ' + w).length > maxChars) lines.push(w);
      else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + w).trim();
    }
    return lines.slice(0, maxLines || 3);
  }
  function invCoinIcon(k, cx, cy, r) {
    const face = pieceArt(k);
    if (face) { ctx.drawImage(face, cx - r, cy - r, r * 2, r * 2); return; }
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7);
    ctx.fillStyle = COIN_UI[k]; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(60,40,10,0.7)'; ctx.stroke();
    txt(COIN_SYMS[k], cx, cy + 1, '800 12px serif', 'rgba(40,24,4,0.85)');
  }
  function drawInventory(t) {
    if (!S.inv || !S.run) return;
    const r = S.run;
    ctx.fillStyle = 'rgba(6,3,10,0.8)'; ctx.fillRect(0, 0, LW, LH);
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { S.inv = null; } });
    const px = 20, pw = LW - 40, py = 74, ph = 684;
    rr(px, py, pw, ph, 18);
    ctx.fillStyle = 'rgba(24,14,26,0.985)'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    rr(px + 3.5, py + 3.5, pw - 7, ph - 7, 15);
    ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(232,200,119,0.35)'; ctx.stroke();
    uiButtons.push({ x: px, y: py, w: pw, h: ph, cb: () => {} });   // the card swallows taps
    txt('\u{1F392} INVENTORY', LW / 2, py + 28, '900 21px Georgia, serif', '#ffd75e', 'center', { w: 4, col: '#3a1006' });
    const hero = heroById(r.hero) || HEROES[0];
    txt(hero.icon + ' ' + hero.name + '  •  floor ' + r.floor + '  •  ' +
        ACT_NAMES[Math.min(ACT_NAMES.length - 1, actIdx(r.floor))],
        LW / 2, py + 50, '700 10px Verdana, sans-serif', '#c8a8b0');
    // tab rail
    const tw = (pw - 24) / INV_TABS.length;
    INV_TABS.forEach(([id, label], i) => {
      const on = S.inv.tab === id;
      uiBtn(px + 12 + i * tw, py + 62, tw - 5, 27, label, () => { S.inv.tab = id; S.inv.scroll = 0; },
            { grad: on ? ['#8a6a2a', '#5a4014'] : ['#3a3440', '#262230'],
              border: on ? '#ffd75e' : '#55506a', col: on ? '#ffe9a3' : '#9a90a8',
              font: '900 11px Verdana, sans-serif', r: 9 });
    });
    // ---- the scrolling shelf: everything below the tabs pans with a drag,
    // a flick of the wheel, and clamps to the content's true height
    const vy0 = py + 96, vy1 = py + ph - 58, viewH = vy1 - vy0;
    const y0 = py + 116, x0 = px + 16, xe = px + pw - 22;
    const tab = S.inv.tab;
    let contentH = 0;
    ctx.save();
    ctx.beginPath(); ctx.rect(px + 4, vy0, pw - 8, viewH); ctx.clip();
    const sc = Math.max(0, Math.min(S.inv.scroll || 0, S.inv.maxScroll || 0));
    ctx.translate(0, -sc);
    if (tab === 'coins') {
      const inFight = S.battle && S.battle.hand;
      txt('PURSE — ' + purseTotal() + ' coins' + (inFight ? '  (this round’s hand shown too)' : ''),
          x0, y0 - 10, '800 11px Verdana, sans-serif', '#e8c877', 'left');
      COIN_KINDS.forEach((k, i) => {
        const ry = y0 + 18 + i * 96;
        rr(x0 - 6, ry - 26, pw - 20, 90, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
        invCoinIcon(k, x0 + 19, ry + 2, 19);
        const fx = coinFx(k);
        txt(COIN_INFO[k].name, x0 + 50, ry - 11, '900 15px Verdana, sans-serif', COIN_UI[k], 'left');
        txt('× ' + (r.purse[k] || 0) + (inFight ? '   (' + (S.battle.hand[k] || 0) + ' in hand)' : ''),
            x0 + 50, ry + 8, '800 12px Verdana, sans-serif', '#d8c8dc', 'left');
        txt(fx.main, xe - 4, ry - 11, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
        wrapLines(fx.mods.join('  •  ') || 'no relics bend this coin', 46, 2).forEach((ln, li) => {
          txt(ln, x0 + 50, ry + 28 + li * 14, '600 10px Verdana, sans-serif',
              fx.mods.length ? '#8ed67e' : '#6a5a68', 'left');
        });
      });
      contentH = 30 + COIN_KINDS.length * 96;
    } else if (tab === 'items') {
      txt('ARSENAL — racked onto the pile every battle, each fires once',
          x0, y0 - 10, '800 10px Verdana, sans-serif', '#e8c877', 'left');
      const ids = Object.keys(r.arsenal).filter(iid => r.arsenal[iid] > 0);
      ids.forEach((iid, i) => {
        const it = itemById(iid);
        if (!it) return;
        const ry = y0 + 20 + i * 68;
        rr(x0 - 6, ry - 24, pw - 20, 62, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
        const im = itemArt(iid);
        if (im) { const hh = 44, ww = imW(im, hh); ctx.drawImage(im, x0 + 19 - ww / 2, ry - 19, ww, hh); }
        else txt(it.icon, x0 + 19, ry + 4, '26px serif', '#fff');
        const fx = itemFx(iid);
        txt(it.name + '  × ' + r.arsenal[iid], x0 + 50, ry - 6, '900 14px Verdana, sans-serif', '#f0e0f0', 'left');
        txt(fx.main, xe - 4, ry - 6, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
        txt(wrapLines(fx.mods.join('  •  ') || '—', 52, 1)[0], x0 + 50, ry + 15,
            '600 10px Verdana, sans-serif', fx.mods.length ? '#8ed67e' : '#6a5a68', 'left');
      });
      const ny = y0 + 20 + ids.length * 68;
      // potions ride along
      rr(x0 - 6, ny - 24, pw - 20, 62, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fill();
      txt('\u{1F9F4}', x0 + 19, ny + 4, '26px serif', '#fff');
      txt('Potion  × ' + r.potions, x0 + 50, ny - 6, '900 14px Verdana, sans-serif', '#ffd9ee', 'left');
      txt('heal ' + C.POTION_HEAL + ' HP', xe - 4, ny - 6, '900 13px Verdana, sans-serif', '#ffe9a3', 'right');
      txt('drink any time from the HUD', x0 + 50, ny + 15, '600 10px Verdana, sans-serif', '#8f6f78', 'left');
      if (!ids.length) txt('the rack is empty — visit a shop!', LW / 2, y0 + 40, '700 12px Verdana, sans-serif', '#8f6f78');
      contentH = 36 + (ids.length + 1) * 68;
    } else if (tab === 'relics') {
      txt('RELICS — ' + r.relics.length + ' collected', x0, y0 - 10, '800 11px Verdana, sans-serif', '#e8c877', 'left');
      r.relics.forEach((rid, i) => {
        const rl = relicById(rid);
        if (!rl) return;
        const ry = y0 + 22 + i * 58;
        rr(x0 - 6, ry - 22, pw - 20, 52, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fill();
        txt(rl.icon, x0 + 14, ry + 2, '22px serif', '#fff');
        txt(rl.name, x0 + 40, ry - 8, '900 14px Verdana, sans-serif', RARITY[rl.rar].col, 'left');
        wrapLines(rl.desc, 50, 2).forEach((ln, li) => {
          txt(ln, x0 + 40, ry + 10 + li * 13, '600 11px Verdana, sans-serif', '#c8b8d0', 'left');
        });
      });
      if (!r.relics.length) txt('no relics yet — spin the wheel or fell a boss', LW / 2, y0 + 40, '700 12px Verdana, sans-serif', '#8f6f78');
      contentH = 40 + r.relics.length * 58;
    } else {
      // STATS: the run's vitals, then every run-wide relic bend
      const core = [
        ['HP', r.hp + ' / ' + r.maxHp + (S.pPois > 0 ? '   ☠ poisoned ' + S.pPois : '')],
        ['block', '' + r.block + (hasRelic('aegis') ? ' (carries over)' : '')],
        ['gold', fmt(r.gold)],
        ['keys', '' + r.keys],
        ['purse', purseTotal() + ' coins'],
        ['monsters slain', '' + r.kills],
        ['gold looted', fmt(r.goldEarned)],
      ];
      const rows = core.concat(runMods());
      rows.forEach((rw, i) => {
        const ry = y0 + 6 + i * 31;
        txt(rw[0], LW / 2 - 16, ry, '600 12px Verdana, sans-serif', '#9a8aa0', 'right');
        txt(rw[1], LW / 2 + 2, ry, '800 12px Verdana, sans-serif', '#ffe9a3', 'left');
      });
      contentH = 30 + rows.length * 31;
    }
    ctx.restore();
    // clamp the pan now that the tab's true height is known
    S.inv.maxScroll = Math.max(0, contentH + (y0 - vy0) - viewH);
    if ((S.inv.scroll || 0) > S.inv.maxScroll) S.inv.scroll = S.inv.maxScroll;
    if ((S.inv.scroll || 0) < 0) S.inv.scroll = 0;
    // a slim scrollbar tells the thumb there's more shelf below
    if (S.inv.maxScroll > 0) {
      const track = viewH - 8;
      const thumbH = Math.max(26, track * viewH / (viewH + S.inv.maxScroll));
      const ty = vy0 + 4 + (track - thumbH) * ((S.inv.scroll || 0) / S.inv.maxScroll);
      rr(px + pw - 10, vy0 + 4, 4, track, 2);
      ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fill();
      rr(px + pw - 10, ty, 4, thumbH, 2);
      ctx.fillStyle = 'rgba(232,200,119,0.5)'; ctx.fill();
    }
    uiBtn(LW / 2 - 80, py + ph - 46, 160, 34, 'CLOSE ✕', () => { S.inv = null; },
          { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 13px Verdana, sans-serif', r: 12 });
  }

  // your HAND for the round: one chip per coin type still in it — tap to
  // choose what the slot takes next
  function drawHandRow(t) {
    const B = S.battle;
    if (!B || !B.hand) return;
    const kinds = COIN_KINDS.filter(k => (B.hand[k] || 0) > 0);
    if (!kinds.length) return;
    const n = kinds.length;
    const w = Math.max(n * 56 + 16, 168);
    // a cheap offset shade instead of a per-frame shadowBlur
    rr(LW / 2 - w / 2 - 2, 147, w + 4, 51, 21);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
    rr(LW / 2 - w / 2, 144, w, 50, 20);
    ctx.fillStyle = 'rgba(14,8,16,0.88)'; ctx.fill();
    rr(LW / 2 - w / 2, 144, w, 50, 20);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = lgr('handRim', 0, 144, 0, 194, [[0, 'rgba(232,200,119,0.7)'], [1, 'rgba(122,90,36,0.4)']]);
    ctx.stroke();
    kinds.forEach((k, i) => {
      const cx = LW / 2 - (n * 56) / 2 + 28 + i * 56, cy = 162;
      const sel = B.sel === k;
      const r = sel ? 15 + Math.sin(t * 6) * 0.8 : 12;
      if (sel) {
        // the chosen coin sits in a halo
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const hg = ctx.createRadialGradient(cx, cy, 2, cx, cy, r + 12);
        hg.addColorStop(0, 'rgba(255,240,190,0.4)'); hg.addColorStop(1, 'rgba(255,240,190,0)');
        ctx.fillStyle = hg;
        ctx.beginPath(); ctx.arc(cx, cy, r + 12, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.beginPath(); ctx.arc(cx, cy + 2, r, 0, 7);
      ctx.fillStyle = 'rgba(10,5,2,0.7)'; ctx.fill();
      const face = pieceArt(k);
      if (face) {
        // the real minted face from the piece sheet
        ctx.drawImage(face, cx - r - 1, cy - r - 1, r * 2 + 2, r * 2 + 2);
        if (sel) {
          ctx.beginPath(); ctx.arc(cx, cy, r + 0.5, 0, 7);
          ctx.lineWidth = 2.2; ctx.strokeStyle = '#fff'; ctx.stroke();
        }
      } else {
        // a shaded coin face, lit from the upper left
        const cg = ctx.createRadialGradient(cx - r * 0.4, cy - r * 0.45, r * 0.15, cx, cy, r * 1.15);
        cg.addColorStop(0, '#ffffff'); cg.addColorStop(0.25, COIN_UI[k]); cg.addColorStop(1, COIN_UI[k]);
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7);
        ctx.fillStyle = cg; ctx.fill();
        ctx.lineWidth = sel ? 2.5 : 1.2;
        ctx.strokeStyle = sel ? '#fff' : 'rgba(60,40,10,0.7)';
        ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0, 7);
        ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(60,35,8,0.35)'; ctx.stroke();
        txt(COIN_SYMS[k], cx, cy + 1, (sel ? '800 14px' : '800 11px') + ' serif', 'rgba(40,24,4,0.85)');
      }
      // count badge
      const bx = cx + r - 1, byy = cy - r + 1;
      ctx.beginPath(); ctx.arc(bx + 5, byy, 7.5, 0, 7);
      ctx.fillStyle = 'rgba(12,6,10,0.92)'; ctx.fill();
      ctx.lineWidth = 1; ctx.strokeStyle = sel ? '#ffd75e' : 'rgba(232,200,119,0.4)'; ctx.stroke();
      txt(B.hand[k], bx + 5, byy + 0.5, '900 9px Verdana, sans-serif', '#fff0c0');
      uiButtons.push({ x: cx - 27, y: 140, w: 54, h: 48, cb: () => selectCoin(k) });
    });
    // what the chosen coin will DO, captioned inside the hand tray
    const info = COIN_INFO[B.sel];
    if (info) {
      txt(info.name.toUpperCase() + ' — ' + info.what, LW / 2, 186,
          '700 8px Verdana, sans-serif', 'rgba(255,233,163,0.85)');
    }
  }
  // TILT! Nudge the pile — three charges a round, spend them or lose them
  function drawTiltCluster(t) {
    const B = S.battle;
    if (!B) return;
    const on = B.tilts > 0;
    txt('TILT ×' + B.tilts, 78, 585, '800 10px Verdana, sans-serif', on ? '#ffe9a3' : '#6a5a4a',
        'center', { w: 3, col: 'rgba(15,6,8,0.6)' });
    const arts = [machArt('tilt_l'), machArt('tilt_f'), machArt('tilt_r')];
    [['◀', 'l'], ['▼', 'f'], ['▶', 'r']].forEach(([sym, dir], i) => {
      const x = 16 + i * 46;
      if (arts[i]) {
        // the carved stone plates from the concept sheet, lit while charged
        if (on) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.14 + 0.05 * Math.sin(t * 4 + i);
          ctx.fillStyle = '#ffca7a';
          ctx.beginPath(); ctx.arc(x + 20, 616, 24, 0, 7); ctx.fill();
          ctx.restore();
        }
        ctx.save();
        if (!on) ctx.globalAlpha = 0.45;
        shadowImg('tilt' + i, arts[i], x - 2, 594, 44, 44, 6, 3);
        ctx.restore();
        uiButtons.push({ x: x - 2, y: 594, w: 44, h: 44, cb: () => tilt(dir) });
      } else {
        uiBtn(x, 596, 40, 40, sym, () => tilt(dir),
              { grad: on ? ['#6a5a7e', '#3a3048'] : ['#3a3440', '#262230'],
                border: on ? '#c8b8e0' : '#55506a',
                col: on ? '#f0e8ff' : '#6a6580', font: '900 15px Verdana, sans-serif', r: 12 });
      }
    });
  }

  // ------------------------------------------------- resolve cinematics
  // each applied loot piece launches a projectile: silver arcs to the hero,
  // gold smacks the foe, gems ring the gold counter
  const RFX = [];
  const LOOT_ICON = {
    gold: '●', lucky: '★', silver: '●', green: '●', gem: '\u{1F48E}', bag: '\u{1F4B0}', skull: '☠\u{FE0F}',
  };
  const LOOT_COL = { gold: '#f2c04a', lucky: '#ffdf6b', silver: '#c3ccd6', green: '#8ed67e',
                     red: '#e87a8a', blue: '#7ab0e8', coin: '#f2c04a',
                     burnitem: '#ff9d3c', bleeditem: '#ff5a6e', petitem: '#ffd75e' };
  function fxIcon(q) {
    if (q.iid) {
      const it = itemById(q.iid);
      return it ? it.icon : '❓';
    }

    ctx.strokeStyle = 'rgba(240,246,255,0.22)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(FR.x0, FR.y0); ctx.lineTo(FR.x1, FR.y0); ctx.stroke();
    // the doorways
    for (const dir of ['n', 's', 'e', 'w']) {
      if (has(dir)) drawDoorway(dir, open(dir), t);
    }
  }

  function drawDoorway(dir, isOpen, t) {
    const p = doorCenter(dir);
    const locked = !isOpen;
    const kcol = S.run.keys < 1 && locked && Math.floor(t * 4) % 2 ? '#ff5a4e' : '#ffd75e';
    ctx.save();
    if (dir === 'n' || dir === 's') {
      const y0 = dir === 'n' ? ROOM.y : FR.y1;
      const hh = dir === 'n' ? ROOM.wallH : ROOM.botH;
      // the opening
      ctx.fillStyle = isOpen ? '#060309' : '#1c1220';
      ctx.fillRect(p.x - DOOR_HALF, y0, DOOR_HALF * 2, hh);
      ctx.strokeStyle = isOpen ? 'rgba(255,215,94,0.5)' : '#3a2f3a';
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x - DOOR_HALF, y0, DOOR_HALF * 2, hh);
      if (isOpen) {
        // a beckoning glow from the next room
        const g = ctx.createLinearGradient(0, y0, 0, y0 + (dir === 'n' ? hh + 26 : -26));
        g.addColorStop(0, 'rgba(255,200,110,0.20)');
        g.addColorStop(1, 'rgba(255,200,110,0)');
        ctx.fillStyle = g;
        ctx.fillRect(p.x - DOOR_HALF + 4, dir === 'n' ? y0 : y0 - 26, DOOR_HALF * 2 - 8, hh + 26);
        txt(dir === 'n' ? '▲' : '▼', p.x, y0 + hh / 2, '900 12px Verdana, sans-serif', 'rgba(255,220,140,0.8)');
      } else {
        // barred gate
        ctx.strokeStyle = '#4a3a50'; ctx.lineWidth = 3;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath(); ctx.moveTo(p.x + i * 16, y0 + 3); ctx.lineTo(p.x + i * 16, y0 + hh - 3); ctx.stroke();
        }
        txt('\u{1F512}', p.x, y0 + hh / 2 - 4, '13px serif', '#fff');
        txt('1\u{1F5DD}', p.x, y0 + hh / 2 + 10, '800 9px Verdana, sans-serif', kcol);
      }
    } else {
      const x0 = dir === 'w' ? ROOM.x : FR.x1;
      ctx.fillStyle = isOpen ? '#060309' : '#1c1220';
      ctx.fillRect(x0, p.y - DOOR_HALF, ROOM.sideW, DOOR_HALF * 2);
      ctx.strokeStyle = isOpen ? 'rgba(255,215,94,0.5)' : '#3a2f3a';
      ctx.lineWidth = 2;
      ctx.strokeRect(x0, p.y - DOOR_HALF, ROOM.sideW, DOOR_HALF * 2);
      if (isOpen) {
        txt(dir === 'w' ? '◀' : '▶', x0 + ROOM.sideW / 2, p.y, '900 11px Verdana, sans-serif', 'rgba(255,220,140,0.8)');
      } else {
        ctx.strokeStyle = '#4a3a50'; ctx.lineWidth = 3;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath(); ctx.moveTo(x0 + 2, p.y + i * 16); ctx.lineTo(x0 + ROOM.sideW - 2, p.y + i * 16); ctx.stroke();
        }
        txt('\u{1F512}', x0 + ROOM.sideW / 2, p.y - 8, '11px serif', '#fff');
        txt('1\u{1F5DD}', x0 + ROOM.sideW / 2, p.y + 8, '800 8px Verdana, sans-serif', kcol);
      }
    }
    ctx.restore();
  }

  function drawEnt(i, e, t) {
    const p = entPos(e);
    const info = ENT_INFO[e.kind];
    let icon = info.icon, label = info.name, col = '#e8dce8';
    if (e.kind === 'monster') {
      const en = enemyById(e.eid);
      icon = e.mtype === 'boss' ? BOSSES[actIdx(S.run.floor) % BOSSES.length].icon : (en ? en.icon : info.icon);
      label = e.mtype === 'boss' ? 'THE BOSS' : e.mtype === 'elite' ? 'ELITE FOE' : (en ? en.name : 'MONSTER');
      col = e.mtype === 'boss' ? '#ffd75e' : e.mtype === 'elite' ? '#ff9d3c' : '#ffb4a8';
    }
    ctx.save();
    if (e.done && e.kind !== 'shop') {
      ctx.globalAlpha = 0.28;
      txt(e.kind === 'monster' ? '\u{1F4A8}' : icon, p.x, p.y - 12, '30px serif', '#fff');
      txt(e.kind === 'monster' ? 'slain' : 'done', p.x, p.y + 14, '600 9px Verdana, sans-serif', '#9a8aa0');
      ctx.restore();
      return;
    }
    ctx.beginPath(); ctx.ellipse(p.x, p.y + 6, 20, 7, 0, 0, 7);
    ctx.fillStyle = 'rgba(10,6,12,0.5)'; ctx.fill();
    const bob = Math.sin(t * 2.6 + i * 2.4) * 2.5;
    const size = e.kind === 'monster' && e.mtype === 'boss' ? 52 : e.kind === 'stairs' ? 44 : 34;
    if (e.kind === 'monster') {
      ctx.globalAlpha = 0.16 + 0.08 * Math.sin(t * 4 + i);
      ctx.beginPath(); ctx.arc(p.x, p.y - 14 + bob, size * 0.72, 0, 7);
      ctx.fillStyle = e.mtype === 'elite' ? '#ff9d3c' : '#ef4b5d'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (e.kind === 'stairs') {
      ctx.globalAlpha = 0.25 + 0.12 * Math.sin(t * 3);
      ctx.beginPath(); ctx.arc(p.x, p.y - 14 + bob, 34, 0, 7);
      ctx.fillStyle = '#ffd75e'; ctx.fill();
      ctx.globalAlpha = 1;
    }
    // real sprites where we have them, emoji everywhere else
    let drewArt = false;
    if (e.kind === 'monster') {
      const key = foeArtKey(e);
      if (key) {
        const sh = sheetOf(key);
        drewArt = drawArt(key, p.x, p.y + 4 + bob * 0.4, sh.rh, 'd', t);
        if (drewArt && e.mtype === 'elite') {
          // elites run hot: a faint red heat over the sprite
          ctx.save();
          ctx.globalAlpha = 0.22 + 0.1 * Math.sin(t * 5);
          ctx.beginPath(); ctx.arc(p.x, p.y - sh.rh * 0.4, sh.rh * 0.42, 0, 7);
          ctx.fillStyle = '#ff9d3c'; ctx.fill();
          ctx.restore();
        }
      }
    } else if (e.kind === 'shop') {
      drewArt = drawArt('keeper', p.x, p.y + 4 + bob * 0.4, SHEETS.keeper.rh, 'd', t);
    }
    if (!drewArt) txt(icon, p.x, p.y - 14 + bob, size + 'px serif', '#fff');
    if (e.mtype === 'elite') txt('\u{1F525}', p.x + 20, p.y - 30 + bob, '14px serif', '#fff');
    txt(label, p.x, p.y + 18, '800 9px Verdana, sans-serif', col, 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
    // whisper when the hero is close
    const dh = Math.hypot(AV.x - p.x, AV.y - (p.y - 6));
    if (dh < 74 && dh > 34) {
      txt('!', p.x + 18, p.y - 38 + bob, '900 14px Georgia, serif', '#ffe066', 'center', { w: 3, col: 'rgba(10,5,12,0.9)' });
    }
    ctx.restore();
  }

  function drawHero(t) {
    const hop = AV.moving ? Math.abs(Math.sin(AV.step)) * 4 : Math.sin(t * 2) * 1.5;
    ctx.beginPath(); ctx.ellipse(AV.x, AV.y + 6, 15, 6, 0, 0, 7);
    ctx.fillStyle = 'rgba(10,6,12,0.5)'; ctx.fill();
    // walk dust
    if (AV.moving && Math.random() < 0.25 && S.parts.length < 120) {
      S.parts.push({ x: AV.x - AV.fx * 10, y: AV.y + 4, vx: -AV.fx * 24 + (Math.random() - 0.5) * 12,
                     vy: -6, g: -20, life: 0, max: 0.4, col: '#8a7a90', sz: 1.8, spin: 1, shape: 'sq' });
    }
    // the chosen adventurer, striding in their true colours
    const hero = S.run.hero || 'knight';
    const key = hero + (AV.moving ? '_walk' : '_idle');
    const sh = SHEETS[key];
    const drewArt = sh && drawArt(key, AV.x, AV.y + 6, sh.rh, AV.dir || 'd', AV.moving ? AV.animT : t);
    if (!drewArt) {
      ctx.save();
      ctx.translate(AV.x, AV.y - 14 - hop);
      if (AV.moving) ctx.rotate(AV.fx * 0.08);
      txt((heroById(hero) || HEROES[0]).icon, 0, 0, '34px serif', '#fff');
      ctx.restore();
    }
    if (S.run.keys > 0) txt('\u{1F5DD}', AV.x + 16, AV.y - 32 - hop, '11px serif', '#fff');
  }

  function drawJoystick() {
    if (!JOY.active) return;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(JOY.ox, JOY.oy, 48, 0, 7);
    ctx.lineWidth = 3; ctx.strokeStyle = '#e8dce8'; ctx.stroke();
    const d = Math.hypot(JOY.dx, JOY.dy) || 1;
    const k = Math.min(48, d);
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(JOY.ox + (JOY.dx / d) * k, JOY.oy + (JOY.dy / d) * k, 20, 0, 7);
    ctx.fillStyle = '#e8dce8'; ctx.fill();
    ctx.restore();
  }

  // what the hero knows of the floor: 2 = walked, 1 = glimpsed through a door
  function mapKnowledge() {
    const rooms = S.run.map.rooms;
    const lantern = hasRelic('lantern');
    const seen = {};
    for (const k of Object.keys(rooms)) {
      const r = rooms[k];
      if (lantern || r.visited) { seen[k] = 2; continue; }
      for (const d of ['n', 's', 'e', 'w']) {
        const nb = doorTo(d, r);
        if (nb && nb.visited) { seen[k] = 1; break; }
      }
    }
    return seen;
  }
  // room footprint in map units (matches the real room proportions)
  const MAP_FOOT = { s: [0.62, 0.62], w: [1, 0.62], t: [0.62, 1], b: [1, 1] };
  function drawMapRooms(mx, my, pitch, seen, ink) {
    // ink = parchment blueprint style; otherwise the compact HUD chip
    const map = S.run.map;
    const rooms = map.rooms;
    const cell = pitch * 0.82;
    const roomRect = (r) => {
      const f = MAP_FOOT[r.size] || MAP_FOOT.b;
      const w = cell * f[0], h = cell * f[1];
      const cx2 = mx + (r.gx + 0.5) * pitch, cy2 = my + (r.gy + 0.5) * pitch;
      return { x: cx2 - w / 2, y: cy2 - h / 2, w, h, cx: cx2, cy: cy2 };
    };
    // corridors first, so rooms sit on top of them
    for (const lk of Object.keys(map.links)) {
      const [a, b] = lk.split('~').map(s2 => rooms[s2]);
      if (!a || !b) continue;
      if (!seen[rkey(a.gx, a.gy)] && !seen[rkey(b.gx, b.gy)]) continue;
      const ra = roomRect(a), rb = roomRect(b);
      const open = map.links[lk].open;
      ctx.save();
      ctx.lineWidth = Math.max(3, pitch * 0.16);
      ctx.strokeStyle = ink
        ? (open ? 'rgba(74,58,42,0.9)' : 'rgba(74,58,42,0.45)')
        : (open ? 'rgba(255,215,94,0.6)' : 'rgba(180,160,190,0.3)');
      if (!open) ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(ra.cx, ra.cy); ctx.lineTo(rb.cx, rb.cy); ctx.stroke();
      ctx.restore();
      if (!open && seen[rkey(a.gx, a.gy)] === 2 && seen[rkey(b.gx, b.gy)] === 2 && pitch > 30) {
        txt('\u{1F512}', (ra.cx + rb.cx) / 2, (ra.cy + rb.cy) / 2, '10px serif', '#fff');
      }
    }
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      const rc = roomRect(r);
      const isCur = k === map.cur;
      if (seen[k] === 2) {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        if (ink) {
          ctx.fillStyle = isCur ? '#d8c49a' : '#cfc4b2';
          ctx.fill();
          ctx.lineWidth = 2.5; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
        } else {
          ctx.fillStyle = isCur ? theme().accent : r.boss ? 'rgba(255,215,94,0.75)' : 'rgba(180,160,190,0.55)';
          ctx.fill();
        }
      } else {
        rr(rc.x, rc.y, rc.w, rc.h, 3);
        ctx.save();
        ctx.setLineDash([3, 3]);
        ctx.lineWidth = ink ? 2 : 1.2;
        ctx.strokeStyle = ink ? 'rgba(74,58,42,0.55)' : 'rgba(180,160,190,0.4)';
        ctx.stroke();
        ctx.restore();
      }
      if (r.boss && seen[k] === 2) txt('\u{1F451}', rc.cx, rc.cy, Math.max(8, pitch * 0.3) + 'px serif', '#fff');
      if (!r.boss && k === '0,0' && ink) txt('1', rc.cx, rc.cy, '700 ' + Math.max(9, pitch * 0.3) + 'px Georgia, serif', '#4a3a2a');
      if (isCur) {
        const pulse = 0.5 + 0.5 * Math.sin(S.time * 5 + performance.now() / 200);
        ctx.beginPath(); ctx.arc(rc.cx, rc.cy, Math.max(3, pitch * 0.1), 0, 7);
        ctx.fillStyle = ink ? 'rgba(168,33,58,' + (0.6 + 0.4 * pulse) + ')' : 'rgba(255,255,255,' + (0.6 + 0.4 * pulse) + ')';
        ctx.fill();
      }
    }
  }
  function mapBounds(seen) {
    const rooms = S.run.map.rooms;
    let minX = 99, maxX = -99, minY = 99, maxY = -99;
    for (const k of Object.keys(seen)) {
      const r = rooms[k];
      minX = Math.min(minX, r.gx); maxX = Math.max(maxX, r.gx);
      minY = Math.min(minY, r.gy); maxY = Math.max(maxY, r.gy);
    }
    return { minX, maxX, minY, maxY };
  }
  // the corner minimap — tap it to unroll the full blueprint
  let mapView = false;
  function drawMinimap(t) {
    if (!S.run.map) return;
    const seen = mapKnowledge();
    const ks = Object.keys(seen);
    if (!ks.length) return;
    const b = mapBounds(seen);
    const pitch = 16;
    const mw = (b.maxX - b.minX + 1) * pitch + 12;
    const mh = (b.maxY - b.minY + 1) * pitch + 12;
    const mx = LW - 14 - mw, my = 56;
    rr(mx, my, mw, mh, 8);
    ctx.fillStyle = 'rgba(10,6,12,0.82)'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(232,220,232,0.35)'; ctx.stroke();
    drawMapRooms(mx + 6 - b.minX * pitch, my + 6 - b.minY * pitch, pitch, seen, false);
    txt('tap for map', mx + mw / 2, my + mh + 8, '600 8px Verdana, sans-serif', '#8f6f78');
    if (!S.room) uiButtons.push({ x: mx - 6, y: my - 6, w: mw + 12, h: mh + 24, cb: () => { mapView = true; } });
  }
  // the full blueprint, unrolled like a tabletop dungeon chart
  function drawMapView(t) {
    if (!mapView || !S.run.map) return;
    ctx.fillStyle = 'rgba(8,4,10,0.7)';
    ctx.fillRect(0, 0, LW, LH);
    // the parchment
    rr(20, 90, LW - 40, 620, 6);
    ctx.fillStyle = '#e9dfc6'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#4a3a2a'; ctx.stroke();
    ctx.save();
    rr(20, 90, LW - 40, 620, 6);
    ctx.clip();
    // faint graph grid, like the reference charts
    ctx.strokeStyle = 'rgba(120,100,70,0.16)';
    ctx.lineWidth = 1;
    for (let x = 28; x < LW - 20; x += 22) {
      ctx.beginPath(); ctx.moveTo(x, 90); ctx.lineTo(x, 710); ctx.stroke();
    }
    for (let y = 98; y < 710; y += 22) {
      ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(LW - 20, y); ctx.stroke();
    }
    // burnt edges
    const eg = ctx.createRadialGradient(LW / 2, 400, 200, LW / 2, 400, 430);
    eg.addColorStop(0, 'rgba(90,60,30,0)');
    eg.addColorStop(1, 'rgba(90,60,30,0.28)');
    ctx.fillStyle = eg;
    ctx.fillRect(20, 90, LW - 40, 620);
    const seen = mapKnowledge();
    const b = mapBounds(seen);
    const cols = b.maxX - b.minX + 1, rows2 = b.maxY - b.minY + 1;
    const pitch = Math.min(64, Math.min((LW - 100) / cols, 520 / rows2));
    const ox = (LW - cols * pitch) / 2 - b.minX * pitch;
    const oy = 90 + (620 - rows2 * pitch) / 2 - b.minY * pitch;
    drawMapRooms(ox, oy, pitch, seen, true);
    ctx.restore();
    txt(theme().name + ' — FLOOR ' + S.run.floor, LW / 2, 118, '900 20px Georgia, serif', '#4a3a2a');
    const seenN = Object.values(seen).filter(v => v === 2).length;
    txt(seenN + ' / ' + Object.keys(S.run.map.rooms).length + ' rooms walked • \u{1F512} locked corridors • tap to close',
        LW / 2, 688, '700 10px Verdana, sans-serif', '#6a5138');
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { mapView = false; } });
  }

  function drawToast() {
    if (!S.toast) return;
    const a = Math.min(1, S.toast.t / 0.5);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = '800 13px Verdana, sans-serif';
    const w = ctx.measureText(S.toast.txt).width + 36;
    rr(LW / 2 - w / 2, ROOM.y + ROOM.wallH + 12, w, 30, 15);
    ctx.fillStyle = 'rgba(12,7,14,0.92)'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#ffd75e'; ctx.stroke();
    txt(S.toast.txt, LW / 2, ROOM.y + ROOM.wallH + 27, '800 13px Verdana, sans-serif', '#ffe9a3');
    ctx.restore();
  }

  function drawDungeon(t, dt) {
    const T = theme();
    layer('dbg', 0, 0, LW, LH, ['f' + fkey()], () => bgBase(0));
    bgBokeh(t);
    updateRoomRect();
    if (!S.room && !mapView) avTick(dt);
    if (S.screen !== 'dungeon') return;   // a bump may have started a battle
    // heading
    ctx.font = '900 26px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 7; ctx.strokeStyle = '#2a1030';
    ctx.strokeText(T.name, LW / 2 - 30, 44);
    ctx.fillStyle = lgr('dtt:' + fkey(), 0, 30, 0, 60, [[0, '#fff4d6'], [1, T.accent]]);
    ctx.fillText(T.name, LW / 2 - 30, 44);
    txt('FLOOR ' + S.run.floor, LW / 2 - 30, 74, '800 12px Verdana, sans-serif', '#c8a8b0');
    txt('\u{1F5DD} × ' + S.run.keys, LW / 2 - 30, 104, '900 16px Verdana, sans-serif',
        S.run.keys < 1 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    drawRoomBox(t);
    // dwellers + hero, back-to-front
    const ents = (curRoom() && curRoom().ents) || [];
    const order = ents.map((e, i) => ({ e, i, y: entPos(e).y }));
    order.push({ hero: true, y: AV.y });
    order.sort((a, b) => a.y - b.y);
    for (const o of order) {
      if (o.hero) drawHero(t);
      else drawEnt(o.i, o.e, t);
    }
    drawMotes(dt, 1);
    drawParticles(dt);
    drawToast();
    drawJoystick();
    drawHUD(t);
    drawVignette(0.35);
    drawMinimap(t);
    drawBanner(t);
    if (S.uiFlash && !S.room) {
      txt(S.uiFlash.msg, LW / 2, ROOM.y + ROOM.wallH + 60, '900 15px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e', 'center', { w: 4, col: 'rgba(10,5,12,0.9)' });
    }
    uiBtn(14, 12, 38, 36, '⌂', () => { S.screen = 'title'; save(); }, { r: 10, font: '20px serif' });
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
    txt('drag to walk • WASD works too', LW / 2, 704, '600 9px Verdana, sans-serif', '#6a5a68');
    drawRoomModal(t);
    drawMapView(t);
    drawInventory(t);
  }
  // ------------------------------------------------------------ room modal
  const MODAL_INFO = {
    shop: { icon: '\u{1F9D4}', name: 'SHOPKEEPER' },
    forge: { icon: '\u{1F477}', name: 'BLACKSMITH' },
    chest: { icon: '\u{1F9F0}', name: 'A CHEST CREAKS OPEN' },
  };
  function drawRoomModal(t) {
    const room = S.room;
    if (!room) return;
    ctx.fillStyle = 'rgba(5,3,8,0.72)';
    ctx.fillRect(0, 0, LW, LH);
    const info = MODAL_INFO[room.type] || MODAL_INFO.shop;
    const isShop = room.type === 'shop';
    const isForge = room.type === 'forge' && !room.done;
    const isChest = room.type === 'chest';
    // the shelf grows with the stock — size the panel (and the LEAVE button
    // below it) to fit however many wares the keeper is showing
    const rows = isShop ? room.stock.length : 0;
    // the pack-thinning strip sizes with YOUR arsenal (up to two rows)
    const arsIds = isShop && S.run ? Object.keys(S.run.arsenal).filter(id => S.run.arsenal[id] > 0) : [];
    const arsRows = Math.min(2, Math.ceil(arsIds.length / 8)) || 0;
    const ph = isShop ? 84 + rows * 50 + (arsRows ? 30 + arsRows * 42 : 0) + 60 : isForge ? 330 : isChest ? 250 : 220;
    const py = isShop ? 132 : 250;
    const mFrame = machArt('frame_tall');
    if (mFrame) {
      shadowImg('modframe', mFrame, 28, py - 8, LW - 56, ph + 16, 18, 6, 'rgba(0,0,0,0.6)');
    } else {
      rr(36, py, LW - 72, ph, 18);
      ctx.fillStyle = 'rgba(22,13,24,0.97)'; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = '#ffd75e'; ctx.stroke();
    }
    txt(info.icon + '  ' + info.name, LW / 2, py + 34, '900 22px Georgia, serif', '#ffd75e', 'center', { w: 4, col: '#3a1006' });
    if (isShop) {
      txt('\u{1FA99} ' + S.run.gold + ' gold   •   \u{1FA99} ' + purseTotal() + ' coins',
          LW / 2, py + 60, '700 11px Verdana, sans-serif', '#fff0c0');
      const rx = LW - 54;                                   // right edge of the shelf
      room.stock.forEach((it, i) => {
        const y = py + 84 + i * 50;
        // the ware panel (label only — the buttons live to the right)
        rr(54, y, rx - 54, 44, 10);
        ctx.fillStyle = it.sold ? 'rgba(20,14,20,0.9)' : 'rgba(46,32,38,0.92)'; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = it.sold ? '#3a2f3a' : '#5a4048'; ctx.stroke();
        txt(it.label, 66, y + (it.sub ? 16 : 25), '800 12px Verdana, sans-serif',
            it.sold ? '#5a4a5a' : '#ffe9a3', 'left');
        if (it.sub) txt(it.sub, 66, y + 31, '600 9px Verdana, sans-serif', it.sold ? '#4a3f4a' : '#b09a78', 'left');
        if (it.sold) { txt('SOLD', rx - 34, y + 26, '900 13px Verdana, sans-serif', '#5a4a5a'); return; }
        // two chips: pay GOLD or pay COINS
        const goldOk = S.run.gold >= it.price;
        const coinOk = !!coinKindWith(it.coinPrice);
        const coinX = rx - 8 - 46, goldX = coinX - 4 - 56;
        uiBtn(goldX, y + 7, 56, 30, it.price + ' G', () => buyShop(i, 'gold'),
              { bg: goldOk ? 'rgba(140,90,20,0.95)' : 'rgba(40,30,36,0.9)', border: goldOk ? '#ffd75e' : '#5a4048',
                col: goldOk ? '#ffe9a3' : '#7a6a72', font: '900 12px Verdana, sans-serif', r: 8 });
        uiBtn(coinX, y + 7, 46, 30, it.coinPrice + ' ●', () => buyShop(i, 'coins'),
              { bg: coinOk ? 'rgba(40,90,120,0.95)' : 'rgba(40,30,36,0.9)', border: coinOk ? '#63c8ff' : '#5a4048',
                col: coinOk ? '#cfeeff' : '#7a6a72', font: '900 12px Verdana, sans-serif', r: 8 });
      });
      // pack thinning: the keeper buys junk out of YOUR arsenal — every
      // removal is one piece less clogging next battle's pile
      if (arsIds.length) {
        const sy = py + 84 + rows * 50 + 4;
        const remOk = purseTotal() >= C.SHOP_REMOVE;
        txt('sell the keeper your junk — tap an item to REMOVE it (' + C.SHOP_REMOVE + ' ●)',
            LW / 2, sy + 10, '700 10px Verdana, sans-serif', remOk ? '#e0a8b0' : '#7a6a72');
        arsIds.slice(0, 16).forEach((iid, i) => {
          const it2 = itemById(iid);
          if (!it2) return;
          const bx = 56 + (i % 8) * 46, by2 = sy + 22 + ((i / 8) | 0) * 42;
          uiBtn(bx, by2, 42, 36, '', () => removeArsenal(iid),
                { bg: remOk ? 'rgba(90,40,44,0.95)' : 'rgba(40,30,36,0.9)',
                  border: remOk ? '#e0707a' : '#5a4048', r: 9 });
          txt(it2.icon, bx + 16, by2 + 17, '15px serif', '#fff');
          txt('×' + S.run.arsenal[iid], bx + 34, by2 + 24, '800 9px Verdana, sans-serif', '#ffd0d4');
        });
      }
    } else if (isForge) {
      txt('choose a boon', LW / 2, py + 60, '700 12px Verdana, sans-serif', '#c8a8b0');
      room.opts.forEach((o, i) => {
        const y = py + 80 + i * 56;
        uiBtn(56, y, LW - 112, 46, '', () => pickBoon(i),
              { bg: 'rgba(60,35,20,0.9)', border: '#ff9d3c', r: 10 });
        txt(o.label, LW / 2, y + (o.sub ? 16 : 23), '800 13px Verdana, sans-serif', '#ffe9a3');
        if (o.sub) txt(o.sub, LW / 2, y + 33, '600 9px Verdana, sans-serif', '#b09a78');
      });
    } else if (isChest) {
      const p = room.prize;
      txt('the lid lifts on…', LW / 2, py + 66, '700 12px Verdana, sans-serif', '#c8a8b0');
      txt(p.icon, LW / 2, py + 116, '900 46px Georgia, serif', '#ffe9a3');
      txt(p.label, LW / 2, py + 150, '900 16px Verdana, sans-serif', '#ffd75e');
      uiBtn(56, py + ph - 58, (LW - 128) / 2, 40, 'TAKE IT', () => acceptPrize(),
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 14px Verdana, sans-serif', r: 12 });
      uiBtn(LW / 2 + 8, py + ph - 58, (LW - 128) / 2, 40, 'LEAVE IT', () => denyPrize(),
            { bg: 'rgba(60,40,44,0.95)', border: '#a06a72', col: '#e8c8cc', font: '900 14px Verdana, sans-serif', r: 12 });
    } else {
      // resolved rooms: shrine / treasure / wheel / forge-done — wrap the tale
      const words = (room.msg || '').split(' ');
      const lines = [''];
      for (const w of words) {
        if ((lines[lines.length - 1] + ' ' + w).length > 44) lines.push(w);
        else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + w).trim();
      }
      lines.slice(0, 4).forEach((ln, i) =>
        txt(ln, LW / 2, py + 70 + i * 20, '700 12px Verdana, sans-serif', '#e8dce8'));
    }
    if (!isForge && !isChest) {
      uiBtn(LW / 2 - 90, py + ph - 52, 180, 38, 'LEAVE', () => closeModal(),
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 14px Verdana, sans-serif', r: 13 });
    }
    if (S.uiFlash) {
      txt(S.uiFlash.msg, LW / 2, py + ph + 24, '900 14px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e');
    }
  }

  // ------------------------------------------------------------ title/over
  function drawTitle(t) {
    ctx.fillStyle = rgr('titlebg', LW / 2, 260, 80, LW / 2, 420, 640,
      [[0, '#33202e'], [1, '#140d16']]);
    ctx.fillRect(0, 0, LW, LH);
    // a mound of coins under the logo
    for (let i = 0; i < 26; i++) {
      const cx2 = LW / 2 + Math.sin(i * 2.399) * (30 + ((i * 17) % 150));
      const cy2 = 260 + ((i * 13) % 44);
      ctx.beginPath(); ctx.ellipse(cx2, cy2 + 2, 13, 6, 0, 0, 7);
      ctx.fillStyle = '#7d5a14'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2, cy2, 13, 6, 0, 0, 7);
      ctx.fillStyle = '#f2c04a'; ctx.fill();
      ctx.strokeStyle = 'rgba(122,84,14,0.6)'; ctx.lineWidth = 1; ctx.stroke();
    }
    txt('⚔\u{FE0F}', LW / 2 - 168, 178 + Math.sin(t * 2) * 5, '34px serif', '#fff');
    txt('\u{1F409}', LW / 2 + 168, 178 + Math.cos(t * 2) * 5, '34px serif', '#fff');
    ctx.font = '900 52px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 10; ctx.strokeStyle = '#2a1030';
    ctx.strokeText('DUNGEON', LW / 2, 150);
    ctx.strokeText('PUSHER', LW / 2, 205);
    const g = lgr('logott', 0, 120, 0, 235, [[0, '#fff4d6'], [0.5, '#ffd75e'], [1, '#ff8a2a']]);
    ctx.fillStyle = g;
    ctx.fillText('DUNGEON', LW / 2, 150);
    ctx.fillText('PUSHER', LW / 2, 205);
    txt('a coin pusher roguelike', LW / 2, 330, '800 14px Verdana, sans-serif', '#c8a8b0');
    const HOW = [
      '● spend your purse each turn — the tray COLLECTS',
      'END TURN fires it: gold strikes ⚔ silver shields \u{1F6E1} green poisons ☠',
      '\u{1F6AA} crawl the dungeon: monsters, chests, shopkeepers…',
      '\u{1F5DD} doors need KEYS — every monster slain drops one',
    ];
    HOW.forEach((h, i) => txt(h, LW / 2, 372 + i * 22, '600 11px Verdana, sans-serif', '#9a8aa0'));
    drawMotes(1 / 60, 1);
    drawVignette(0.4);
    // choose your adventurer
    txt('— CHOOSE YOUR HERO —', LW / 2, 472, '900 12px Georgia, serif', '#ffd75e');
    HEROES.forEach((h, i) => {
      const x = 22 + i * 112, y = 484, w = 104, hh = 118;
      const sel = heroSel === h.id;
      uiBtn(x, y, w, hh, '', () => { heroSel = h.id; S.heroPick = h.id; save(); },
            { bg: sel ? 'rgba(66,44,72,0.95)' : 'rgba(26,17,28,0.9)',
              border: sel ? '#ffd75e' : '#4a3a50', r: 12 });
      const key = h.id + '_idle';
      if (!(SHEETS[key] && drawArt(key, x + w / 2, y + 72, 46, 'd', t))) {
        txt(h.icon, x + w / 2, y + 48, '34px serif', '#fff');
      }
      txt(h.name, x + w / 2, y + 88, '900 11px Verdana, sans-serif', sel ? '#ffd75e' : '#c8b0cc');
      txt(h.perk, x + w / 2, y + 104, '700 7px Verdana, sans-serif', sel ? '#ffe9a3' : '#8f7f92');
      if (sel) {
        txt('▼', x + w / 2, y - 8 + Math.sin(t * 4) * 2, '900 12px Verdana, sans-serif', '#ffd75e');
      }
    });
    if (S.run) {
      uiBtn(LW / 2 - 130, 620, 260, 48, '▶ CONTINUE — FLOOR ' + S.run.floor,
            () => { S.screen = 'dungeon'; save(); },
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 15px Verdana, sans-serif', r: 16 });
      uiBtn(LW / 2 - 130, 676, 260, 40, 'NEW RUN (abandons the old)', () => newRun(heroSel),
            { bg: 'rgba(90,40,20,0.9)', border: '#ff9d3c', col: '#ffd9b0', font: '800 12px Verdana, sans-serif', r: 14 });
    } else {
      const pulse = 1 + Math.sin(t * 4) * 0.03;
      uiBtn(LW / 2 - 130 * pulse, 628, 260 * pulse, 52 * pulse, '▶ ENTER THE DUNGEON', () => newRun(heroSel),
            { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 16px Verdana, sans-serif', r: 16 });
    }
    if (S.best.floor > 0) {
      txt('best: floor ' + S.best.floor + ' room ' + S.best.depth + '  •  ' + S.best.kills + ' kills  •  ' + fmt(S.best.gold) + ' gold looted',
          LW / 2, 736, '700 11px Verdana, sans-serif', '#8f6f78');
    }
    uiBtn(LW - 52, 12, 38, 36, S.mute ? '\u{1F507}' : '\u{1F50A}', () => { S.mute = !S.mute; save(); }, { r: 10, font: '15px serif' });
  }

  function drawOver(t) {
    ctx.fillStyle = rgr('overbg', LW / 2, 300, 60, LW / 2, 420, 620,
      [[0, '#331420'], [1, '#120a10']]);
    ctx.fillRect(0, 0, LW, LH);
    const o = S.over || { cause: 'fell', floor: 1, depth: 1, kills: 0, gold: 0 };
    txt('\u{1F480}', LW / 2, 180 + Math.sin(t * 1.5) * 4, '80px serif', '#fff');
    ctx.font = '900 40px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 8; ctx.strokeStyle = '#2a1030';
    ctx.strokeText('THE RUN ENDS', LW / 2, 268);
    ctx.fillStyle = lgr('overtt', 0, 245, 0, 292, [[0, '#ffb0b8'], [1, '#a8213a']]);
    ctx.fillText('THE RUN ENDS', LW / 2, 268);
    txt(o.cause, LW / 2, 310, '700 14px Verdana, sans-serif', '#c8a8b0');
    const rows = [
      ['reached', 'floor ' + o.floor + ', room ' + o.depth],
      ['monsters slain', '' + o.kills],
      ['gold looted', fmt(o.gold)],
    ];
    rows.forEach((rw, i) => {
      txt(rw[0], LW / 2 - 24, 370 + i * 30, '600 13px Verdana, sans-serif', '#9a8aa0', 'right');
      txt(rw[1], LW / 2 + 0, 370 + i * 30, '900 14px Verdana, sans-serif', '#ffe9a3', 'left');
    });
    if (S.best.floor > 0) {
      txt('best: floor ' + S.best.floor + ' room ' + S.best.depth + ' • ' + S.best.kills + ' kills',
          LW / 2, 480, '700 11px Verdana, sans-serif', '#8f6f78');
    }
    uiBtn(LW / 2 - 120, 530, 240, 52, '⚔\u{FE0F} AGAIN!', () => newRun(heroSel),
          { grad: ['#7ed6a0', '#3f9d5a'], border: '#eaffef', col: '#123a24', font: '900 17px Verdana, sans-serif', r: 16 });
    uiBtn(LW / 2 - 80, 596, 160, 38, 'TITLE', () => { S.screen = 'title'; },
          { bg: 'rgba(20,10,14,0.9)', border: '#7d5a24', font: '800 13px Verdana, sans-serif', r: 12 });
  }

  // ------------------------------------------------------------------ loop
  let last = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    const dt = Math.min((ts - last) / 1000 || 0.016, 0.05);
    last = ts;
    if (S.screen === 'battle') {
      tick(dt);
      if (S.victory) S.victory.t += dt;
      if (held && !S.victory) {
        holdT += dt;
        // a short warm-up, then a steady pour paced by the drop cooldown
        if (holdT > 0.22 && S.cd <= 0) drop(S.aimX);
      }
    } else {
      // keep light UI timers alive outside the machine
      if (RFX.length) RFX.length = 0;
      if (S.uiFlash) { S.uiFlash.t -= dt; if (S.uiFlash.t <= 0) S.uiFlash = null; }
      if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) dismissWheel(); }
      if (S.banner) { S.banner.ttl -= dt; if (S.banner.ttl <= 0) S.banner = null; }
      if (S.toast) { S.toast.t -= dt; if (S.toast.t <= 0) S.toast = null; }
      for (let i = S.floats.length - 1; i >= 0; i--) {
        const f = S.floats[i];
        f.age += dt;
        if (f.age >= f.max) S.floats.splice(i, 1);
      }
    }
    uiButtons = [];
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    if (S.screen === 'battle' && S.shake > 0.1) {
      ctx.translate((Math.random() - 0.5) * S.shake, (Math.random() - 0.5) * S.shake);
    }
    const t = S.screen === 'battle' ? S.time : ts / 1000;
    if (S.screen === 'title') drawTitle(t);
    else if (S.screen === 'dungeon' && S.run) drawDungeon(t, dt);
    else if (S.screen === 'battle' && S.run) drawBattle(t, dt);
    else if (S.screen === 'over') drawOver(t);
    else drawTitle(t);
    drawWheel();
    drawRelicPick(t);
  }
  requestAnimationFrame(frame);
})();

// particle burst — no-op headless, screen-space in the browser
function burst(wx, wy, wz, kind) {
  if (window.__dpBurst) window.__dpBurst(wx, wy, wz, kind);
}
</script>
