// ---------- Stable radio — a cosy ambient background player (composes with the audio settings) ----------
// Pure/config layer: stations + a DETERMINISTIC note loop per station (keyed to station + step, no
// Date/Math.random). Playback (WebAudio) is DOM-only; the radio only sounds when the master audio is
// also on. Prefs (on/station/vol/heard) persist in the save. Economy-neutral (pure cosmetic/audio).
const RADIO_STATIONS=[
  {id:'sunrise', name:'Sunrise Yard', emoji:'🌅', mood:'bright & hopeful', tempo:520, type:'sine',
    scale:['C4','E4','G4','A4','C5','E5','G5'], seq:['C4','G4','C5','E5','G5','E5','C5','G4']},
  {id:'meadow',  name:'Meadow Calm',  emoji:'🌾', mood:'gentle & still',   tempo:720, type:'triangle',
    scale:['C4','D4','E4','G4','A4','C5','D5'], seq:['C4','E4','G4','A4','G4','E4','D4','C4']},
  {id:'barn',    name:'Barn Dance',   emoji:'🎻', mood:'lively & warm',    tempo:360, type:'square',
    scale:['C4','E4','F4','G4','A4','C5','E5'], seq:['C4','E4','G4','C5','A4','G4','F4','E4','G4','C5']},
  {id:'rainy',   name:'Rainy Day',    emoji:'🌧️', mood:'soft & wistful',   tempo:820, type:'sine',
    scale:['A3','C4','D4','E4','G4','A4','C5'], seq:['A3','C4','E4','A4','G4','E4','D4','C4']},
];
function radioStationDef(id){ return RADIO_STATIONS.find(s=>s.id===id)||null; }
function normRadio(r){ r=r||{};
  const st=radioStationDef(r.station)?r.station:RADIO_STATIONS[0].id;
  const heard=Array.isArray(r.heard)?r.heard.filter((id,i,a)=>radioStationDef(id)&&a.indexOf(id)===i):[];
  return { on:r.on===true, station:st, vol:(typeof r.vol==='number')?clamp(r.vol,0,1):0.5, heard }; }
function radioState(game){ return normRadio(game&&game.radio); }
function _radioCommit(game,next){ if(game) game.radio=next; return next; }
function setRadioStation(game,id){ const c=normRadio(game&&game.radio); const st=radioStationDef(id)?id:c.station;
  const heard=c.heard.indexOf(st)>=0?c.heard:c.heard.concat([st]);
  return _radioCommit(game,{ on:c.on, station:st, vol:c.vol, heard }); }
function toggleRadio(game){ const c=normRadio(game&&game.radio); const on=!c.on;
  const heard=(on && c.heard.indexOf(c.station)<0)?c.heard.concat([c.station]):c.heard;
  return _radioCommit(game,{ on, station:c.station, vol:c.vol, heard }); }
function setRadioVol(game,v){ const c=normRadio(game&&game.radio);
  return _radioCommit(game,{ on:c.on, station:c.station, vol:clamp(v,0,1), heard:c.heard }); }
// deterministic note for a given station + step (loops the station's fixed sequence)
function radioNoteAt(id,step){ const s=radioStationDef(id)||RADIO_STATIONS[0]; const seq=s.seq;
  const i=((Math.floor(step||0)%seq.length)+seq.length)%seq.length; return seq[i]; }
function radioSequence(id,steps){ const out=[], n=Math.max(0,Math.floor(steps||0)); for(let i=0;i<n;i++) out.push(radioNoteAt(id,i)); return out; }
// the radio only actually sounds when BOTH the master audio and the radio are on
function radioAudible(game){ const a=normAudio(game&&game.audio), r=radioState(game); return a.on && r.on; }
function radioEffectiveVol(game){ const a=normAudio(game&&game.audio), r=radioState(game); return (a.on&&r.on)?clamp(a.vol*r.vol,0,1):0; }

// ---------- Training (raise stats toward each horse's breed potential) ----------
const TRAIN_STATS=['speed','stamina','temperament'];
const TRAIN_LABEL={speed:'Speed',stamina:'Stamina',temperament:'Temperament'};
const TRAIN_PER_DAY=3;
function statCap(h,stat){ const b=breedDef(h.breed)||BREEDS[0]; return clamp(Math.round(b[stat]+18),40,100); }
function trainCost(h,stat){ const b=breedDef(h.breed)||BREEDS[0]; return Math.round(50*(1+h[stat]*0.03)*RARITY_MULT[b.rarity]); }
function trainCostFor(game,h,stat){ return Math.max(1,Math.round(trainCost(h,stat)*staffEffect(game,'trainCostMult'))); } // Trainer discount
function trainGain(h,stat){ const room=statCap(h,stat)-h[stat]; return room<=0?0:Math.max(1,Math.round(room*0.28*traitMult(h,'train'))); }
function canTrain(h,stat){
  if(!isAdult(h)) return {ok:false,why:'Only adults can train.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(horseAway(h)) return {ok:false,why:'Away on a trip.'};
  if(h.pregnant) return {ok:false,why:'In foal — no training.'};
  if((h.trains||0)>=TRAIN_PER_DAY) return {ok:false,why:'Rested out — try tomorrow.'};
  if(trainGain(h,stat)<=0) return {ok:false,why:'At breed potential.'};
  return {ok:true};
}
function applyTrain(h,stat){ const g=trainGain(h,stat); h[stat]=clamp(h[stat]+g,8,100); h.trains=(h.trains||0)+1; h.happy=clamp(h.happy-4,0,100);
  developAffinityFromTraining(h,stat); return g; } // schooling builds discipline affinity

function currentGoal(g){ return (g.goalIdx<GOALS.length)?GOALS[g.goalIdx]:null; }
function checkGoals(g){
  const done=[];
  while(g.goalIdx<GOALS.length && GOALS[g.goalIdx].done(g)){
    const goal=GOALS[g.goalIdx], r=goal.reward||{};
    if(r.money) g.money+=r.money; if(r.feed) g.feed+=r.feed; if(r.rep) g.rep+=r.rep;
    done.push(goal); g.goalIdx++;
  }
  return done;
}
// ---------- Ranch goals / personal aspirations board (a player-authored wishlist over EXISTING state) ----------
// DISTINCT from the scripted GOALS chain: the player pins optional aspirations from a catalogue, sees
// live tick-off progress derived from existing stats/herd, and can claim a small one-time reward when
// one is met. Composes over existing state — no new grind. Deterministic; economy-safe.
const ASP_PIN_MAX=6;
const ASPIRATIONS=[
  {id:'herd10',    label:'Grow a herd of ten',        emoji:'🐴', reward:{money:600,rep:20},  prog:g=>({have:(g.horses||[]).length, need:10})},

  {id:'everycoat', label:'Collect every coat colour',  emoji:'🎨', reward:{money:1000,rep:30}, prog:g=>{const c=codexProgress(g); return {have:c.coatsSeen, need:c.coatsTotal};}},
  {id:'topranch',  label:'Top the regional leaderboard',emoji:'🥇', reward:{money:1000,rep:40}, prog:g=>({have:playerRank(g)===1?1:0, need:1})},
  {id:'champion',  label:'Raise a Champion (3+ wins)', emoji:'🏆', reward:{money:700,rep:25},  prog:g=>({have:(g.horses||[]).some(h=>(h.wins||0)>=3)?1:0, need:1})},

  {id:'hall5',     label:'Honour five Hall-of-Famers',  emoji:'🕯️', reward:{money:1200,rep:40}, prog:g=>({have:((g.hallOfFame)||[]).length, need:5})},
  {id:'gen5',      label:'Breed a 5th-generation horse',emoji:'🌳', reward:{money:900,rep:30},  prog:g=>({have:Math.min(5,(g.stats&&g.stats.maxGen)||1), need:5})},
  {id:'seasonlord',label:'Win three Seasonal titles',   emoji:'🏵️', reward:{money:1000,rep:30}, prog:g=>({have:(g.stats&&g.stats.seasonTitles)||0, need:3})},
  {id:'rarecoat',  label:'Breed a rare-coat horse',     emoji:'🌈', reward:{money:600,rep:20},  prog:g=>({have:(g.horses||[]).some(h=>(coatOf(h).tier||0)>=2)?1:0, need:1})},

function aspirationDef(id){ return ASPIRATIONS.find(a=>a.id===id)||null; }
function normAspBoard(game){ const b=(game&&game.aspBoard&&typeof game.aspBoard==='object')?game.aspBoard:{};
  const pinned=(Array.isArray(b.pinned)?b.pinned:[]).filter(id=>!!aspirationDef(id)).filter((v,i,a)=>a.indexOf(v)===i).slice(0,ASP_PIN_MAX);
  const claimed=(Array.isArray(b.claimed)?b.claimed:[]).filter(id=>!!aspirationDef(id)).filter((v,i,a)=>a.indexOf(v)===i);
  return { pinned, claimed }; }
function aspBoard(game){ return normAspBoard(game); }
function aspirationProgress(game,id){ const a=aspirationDef(id); if(!a) return null;
  let have=0, need=1; try{ const p=a.prog(game)||{}; have=Math.max(0,p.have||0); need=Math.max(1,p.need||1); }catch(e){}
  const done=have>=need; const b=normAspBoard(game);
  return { id:a.id, label:a.label, emoji:a.emoji, have, need, done, pct:clamp(have/need,0,1),
    pinned:b.pinned.indexOf(id)>=0, claimed:b.claimed.indexOf(id)>=0, reward:a.reward||null }; }
function isAspirationPinned(game,id){ return normAspBoard(game).pinned.indexOf(id)>=0; }
function pinAspiration(game,id){ if(!aspirationDef(id)) return {ok:false,why:'No such aspiration.'};
  if(!game.aspBoard) game.aspBoard=normAspBoard(game); const b=game.aspBoard;
  if(!Array.isArray(b.pinned)) b.pinned=[]; if(!Array.isArray(b.claimed)) b.claimed=[];
  if(b.pinned.indexOf(id)>=0) return {ok:false,why:'Already pinned.'};
  if(b.pinned.length>=ASP_PIN_MAX) return {ok:false,why:'Your board is full — unpin one first.'};
  b.pinned.push(id); return {ok:true, id}; }
function unpinAspiration(game,id){ if(!game||!game.aspBoard||!Array.isArray(game.aspBoard.pinned)) return {ok:false};
  const n=game.aspBoard.pinned.length; game.aspBoard.pinned=game.aspBoard.pinned.filter(x=>x!==id); return {ok:game.aspBoard.pinned.length<n}; }
function pinnedAspirations(game){ return normAspBoard(game).pinned.map(id=>aspirationProgress(game,id)).filter(Boolean); }
function claimAspiration(game,id){ const a=aspirationDef(id); if(!a) return {ok:false,why:'No such aspiration.'};
  const pr=aspirationProgress(game,id); if(!pr.done) return {ok:false,why:'Not achieved yet.'};
  if(!game.aspBoard) game.aspBoard=normAspBoard(game); const b=game.aspBoard;
  if(!Array.isArray(b.claimed)) b.claimed=[];
  if(b.claimed.indexOf(id)>=0) return {ok:false,why:'Already claimed.'};
  b.claimed.push(id); const r=a.reward||{};
  if(r.money) game.money=(game.money||0)+r.money; if(r.rep) game.rep=(game.rep||0)+r.rep; if(r.feed) game.feed=(game.feed||0)+r.feed;
  game.stats=game.stats||{}; game.stats.aspirationsMet=(game.stats.aspirationsMet||0)+1;
  return {ok:true, reward:r}; }

function monumentDef(id){ return MONUMENTS.find(m=>m.id===id)||null; }
function normMonuments(game){ const m=(game&&game.monuments&&typeof game.monuments==='object'&&!Array.isArray(game.monuments))?game.monuments:{}; const out={};
  for(const k in m){ if(!monumentDef(k)) continue; const d=m[k]; if(typeof d==='number'&&isFinite(d)&&d>=0) out[k]=Math.floor(d); }
  return out; }
function monumentMet(game,id){ const mon=monumentDef(id); if(!mon) return false; try{ return !!mon.met(game); }catch(e){ return false; } }
function monumentEarnedDay(game,id){ const m=normMonuments(game); return (m[id]!=null)?m[id]:null; }
function monumentProgress(game,id){ const mon=monumentDef(id); if(!mon) return null;
  let have=0, need=1; try{ const p=mon.prog(game)||{}; have=Math.max(0,p.have||0); need=Math.max(1,p.need||1); }catch(e){}
  const earnedDay=monumentEarnedDay(game,id), unlocked=earnedDay!=null||have>=need;
  return { id:mon.id, name:mon.name, emoji:mon.emoji, inscription:mon.inscription, have, need,
    unlocked, done:have>=need, pct:clamp(have/need,0,1), earnedDay, rep:mon.rep||0 }; }
function checkMonuments(game){ if(!game) return [];
  if(!game.monuments||typeof game.monuments!=='object'||Array.isArray(game.monuments)) game.monuments=normMonuments(game);
  const fresh=[];
  for(const mon of MONUMENTS){ if(game.monuments[mon.id]!=null) continue; let ok=false; try{ ok=!!mon.met(game); }catch(e){}
    if(ok){ game.monuments[mon.id]=game.day||1; if(mon.rep) game.rep=(game.rep||0)+mon.rep; fresh.push(mon); } }
  if(fresh.length){ game.stats=game.stats||{}; game.stats.monuments=Object.keys(game.monuments).length; }
  return fresh; }
function monumentsUnlockedCount(game){ return Object.keys(normMonuments(game)).length; }
function monumentsGallery(game){
  const unlocked=[], locked=[];
  for(const mon of MONUMENTS){ const p=monumentProgress(game,mon.id);
    const inscription=mon.inscription.replace(/\{ranch\}/g, ranchName(game));
    if(p.earnedDay!=null){ unlocked.push({ id:mon.id, name:mon.name, emoji:mon.emoji, inscription, earnedDay:p.earnedDay, rep:mon.rep||0 }); }
    else { locked.push({ id:mon.id, name:mon.name, emoji:mon.emoji, inscription, have:p.have, need:p.need, pct:p.pct, done:p.done }); }
  }
  unlocked.sort((a,b)=>a.earnedDay-b.earnedDay);
  return { unlocked, locked, count:unlocked.length, total:MONUMENTS.length }; }

// ---------------- Audio engine (Web Audio, optional, default off) ----------------
let AC=null, masterGain=null, ambGain=null, ambTimer=null, lastSfx=0;
let radioGain=null, radioTimer=null, radioStep=0;
function audioAvailable(){ return typeof window!=='undefined' && (window.AudioContext||window.webkitAudioContext); }
function ensureAudio(){ // must be called from a user gesture
  if(AC) return true;
  if(!audioAvailable()) return false;
  try{
    const Ctor=window.AudioContext||window.webkitAudioContext; AC=new Ctor();
    masterGain=AC.createGain(); masterGain.gain.value=(G.audio&&G.audio.vol!=null?G.audio.vol:0.6)*0.5; masterGain.connect(AC.destination);
    ambGain=AC.createGain(); ambGain.gain.value=0; ambGain.connect(masterGain);
    startAmbientBed();
    return true;
  }catch(e){ AC=null; return false; }
}
function applyMasterVol(){ if(masterGain&&AC) try{ masterGain.gain.setTargetAtTime((G.audio.vol||0)*0.5, AC.currentTime, 0.05); }catch(e){} }
function playSfx(id){
  try{
    if(!G||!G.audio||!G.audio.on||!AC) return;
    const now=(typeof performance!=='undefined'&&performance.now)?performance.now():0;
    if(now-lastSfx<45) return; lastSfx=now; // throttle rapid triggers
    const def=sfxDef(id); if(!def) return;
    const t0=AC.currentTime;
    def.notes.forEach((nm,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type=def.type; o.frequency.value=noteHz(nm);
      const st=t0+i*def.step, len=def.step*1.7;
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(def.gain,st+0.008);
      g.gain.exponentialRampToValueAtTime(0.0008,st+len);
      o.connect(g); g.connect(masterGain); o.start(st); o.stop(st+len+0.02);
    });
  }catch(e){}
}
// very quiet ambient: a filtered-noise bed (louder in rain/snow) + occasional bird/cricket chirps
function startAmbientBed(){
  try{
    const buf=AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
    const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
    src.connect(lp); lp.connect(ambGain); src.start();
    scheduleChirp();
  }catch(e){}
}
function scheduleChirp(){
  if(ambTimer) return;
  const tick=()=>{
    try{
      if(G&&G.audio&&G.audio.on&&AC){
        // day → soft high bird; night → lower cricket-ish; rain hiss handled by bed gain
        const phase=((skyT/SKY_CYCLE)%1+1)%1; const night=Math.abs(phase-0.5)>0.30;
        const wx=weatherFor(G.day).id; const raining=(wx==='rain'||wx==='snow');
        // bed volume: near-silent when clear, a soft hiss in rain/snow
        if(ambGain) try{ ambGain.gain.setTargetAtTime(raining?0.05:0.012, AC.currentTime, 0.6); }catch(e){}
        if(!raining && Math.random()<0.6){ const o=AC.createOscillator(), g=AC.createGain();
          o.type='sine'; o.frequency.value=night?(280+Math.random()*80):(1400+Math.random()*700);
          const t=AC.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(night?0.03:0.05,t+0.02);
          g.gain.exponentialRampToValueAtTime(0.0006,t+ (night?0.5:0.18)); o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.6); }
      } else if(ambGain&&AC){ try{ ambGain.gain.setTargetAtTime(0, AC.currentTime, 0.3); }catch(e){} }
    }catch(e){}
    ambTimer=setTimeout(tick, 1800+Math.random()*2400);
  };
  ambTimer=setTimeout(tick, 1500);
}
function updateAudioBtn(){ const b=$('audioBtn'); if(b) b.textContent=(G.audio&&G.audio.on)?'🔊':'🔇'; }
// ---- stable radio playback (DOM-only; deterministic melody via radioNoteAt) ----
function stopRadioLoop(){ if(radioTimer){ clearTimeout(radioTimer); radioTimer=null; } if(radioGain&&AC) try{ radioGain.gain.setTargetAtTime(0, AC.currentTime, 0.2); }catch(e){} }
function startRadioLoop(){
  if(typeof document==='undefined') return;
  if(!AC || !(G.audio&&G.audio.on) || !radioState(G).on){ stopRadioLoop(); return; }
  if(radioTimer) return;
  if(!radioGain){ try{ radioGain=AC.createGain(); radioGain.gain.value=0; radioGain.connect(masterGain); }catch(e){ return; } }
  const tick=()=>{
    try{
      if(!AC || !(G.audio&&G.audio.on) || !radioState(G).on){ stopRadioLoop(); return; }
      const stn=radioStationDef(radioState(G).station)||RADIO_STATIONS[0];
      const nm=radioNoteAt(stn.id, radioStep++), vol=radioState(G).vol;
      const o=AC.createOscillator(), g=AC.createGain(); o.type=stn.type; o.frequency.value=noteHz(nm);
      const t=AC.currentTime, len=(stn.tempo/1000)*1.9;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12*vol, t+0.03); g.gain.exponentialRampToValueAtTime(0.0006, t+len);
      o.connect(g); g.connect(radioGain); o.start(t); o.stop(t+len+0.03);
      try{ radioGain.gain.setTargetAtTime(1, AC.currentTime, 0.2); }catch(e){}
      radioTimer=setTimeout(tick, stn.tempo);
    }catch(e){ stopRadioLoop(); }
  };
  radioTimer=setTimeout(tick, 60);
}
function syncRadioPlayback(){ if(typeof document==='undefined') return; if(AC && (G.audio&&G.audio.on) && radioState(G).on) startRadioLoop(); else stopRadioLoop(); }

// celebratory emoji burst from the scene banner (births, wins, goals)
function burst(emojis,count){
  if(typeof document==='undefined') return;
  const host=$('scene')||document.body; const rect=host.getBoundingClientRect?host.getBoundingClientRect():{left:0,top:0,width:360,height:96};
  const cx=(rect.left||0)+(rect.width||360)/2, cy=(rect.top||0)+(rect.height||96)*0.55;
  const arr=Array.from(emojis||'🎉✨'); const n=count||14;
  for(let i=0;i<n;i++){
    const p=el('div','burst',arr[i%arr.length]);
    const ang=(Math.PI* (0.15+ (i/n)*0.7)) ; const spd=60+ (i%5)*22;
    const dx=(i%2?1:-1)*Math.cos(ang)*spd*(0.6+ (i%3)*0.3);
    const dy=-(Math.sin(ang)*spd)-40;
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.setProperty('--dx',dx+'px'); p.style.setProperty('--dy',dy+'px');
    p.style.animationDelay=(i*14)+'ms';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1300);
  }

function pickBox(role,h,placeholder){
  const box=el('div','pickbox'+(h?' filled':''));

}
function openPicker(role){
  const want=role==='mare'?'mare':'stallion';
  const cands=G.horses.filter(h=>h.sex===want && isAdult(h) && h.rentDays===0 && !horseAway(h) && !(want==='mare'&&h.pregnant));
  if(!cands.length){ toast('No eligible '+(want)+'s. Buy or raise one!','info'); return; }
  let html='<h3>Pick a '+want+'</h3><div class="optlist">';
  cands.forEach(h=>{ html+='<div class="opt" data-pick="'+h.id+'"><div class="hface">'+horseArt(h)+'</div>'+
    '<div class="grow"><div class="hname">'+h.name+'</div><div class="hbreed">'+breedDef(h.breed).name+' · OVR '+overall(h)+'</div></div>'+
    '<div class="val">🪙'+fmt(valueOf(h))+'</div></div>'; });
  html+='</div>';
  const sh=modal(html);
  sh.querySelectorAll('[data-pick]').forEach(o=>o.onclick=()=>{ breedPick[role]=o.getAttribute('data-pick'); closeModal(); renderBreed(); });
}
function gestationDays(mare,stal){ const r=Math.max(breedDef(mare.breed).rarity,breedDef(stal.breed).rarity); return Math.max(3, 4+r+seasonGestationAdj(G.day)); } // spring shortens gestation
function breedFee(mare,stal){ if(!mare||!stal) return 0; return Math.round((80+valueOf(stal)*0.05)*seasonBreedFeeMul(G.day)*festivalMod(G.day,'breedFeeMul',1)*breederFeeMult(G)); } // spring + Foal Festival + breeder-tier discount
function doBreed(mare,stal){
  const chk=canBreed(mare,stal); if(!chk.ok) return;
  const fee=breedFee(mare,stal); if(G.money<fee){ toast('Not enough coins for the breeding fee.','bad'); return; }
  G.money-=fee;
  mare.pregnant=true; mare.gestation=gestationDays(mare,stal);
  mare.sireBreed=stal.breed; mare._sireSpeed=stal.speed; mare._sireStam=stal.stamina; mare._sireTemp=stal.temperament; mare._sireGen=stal.generation;
  // snapshot the full sire so the foal gets its coat genetics + pedigree
  mare._sire={ id:stal.id, name:stal.name, breed:stal.breed, sex:'stallion',
    speed:stal.speed, stamina:stal.stamina, temperament:stal.temperament,
    generation:stal.generation, genes:stal.genes, ped:stal.ped||null };
  breedPick.mare=null; breedPick.stallion=null;
  const warn = relatedness(mare,stal)>0 ? ' ⚠️ These horses share bloodlines — the foal may be weaker.' : '';
  toast('💞 '+mare.name+' is in foal! Due in '+mare.gestation+' days.'+warn, warn?'info':'good');
  refresh();
}

function ensureAuction(){ // lazily generate today's lots on an auction day
  if(!isAuctionDay(G.day)){ return false; }
  if(!G.auction || G.auction.day!==G.day){ G.auction={day:G.day, lots:makeAuctionLots(G,Math.random)}; save(); }
  return true;
}
function renderAuction(s){
  s.appendChild(el('div','sub','Standout horses — rare breeds, fine coats, proven winners — come to auction once a season. Bid against other buyers, or consign one of yours for a shot at top price.'));
  const live=ensureAuction();
  if(!live){ const na=nextAuction(G.day);

      else status='<div class="kv">Current bid<b>🪙'+fmt(lot.high)+(lot.bidder==='you'?' (you)':(lot.bidder==='ai'?' (rival)':''))+'</b></div>';
      const acts = (lot.won||lot.closed)?'' :
        ('<button class="btn sm blue" data-bid="'+i+'" '+(G.money<lot.high+lot.minInc?'disabled':'')+'>Bid 🪙'+fmt(lot.high+lot.minInc)+'</button>'+

function auctionBid(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return;
  const bid=lot.high+lot.minInc; if(G.money<bid){ toast('You can’t afford that bid.','bad'); return; }
  lot.high=bid; lot.bidder='you'; playSfx('tap');
  // rival responds
  const counter=aiCounter(lot,Math.random);
  if(counter!=null){ lot.high=counter; lot.bidder='ai'; toast('A rival buyer bids 🪙'+fmt(counter)+'!','info'); }
  else { toast('You’re the top bidder — claim it with 🔨!','good'); }
  save(); refresh();
}
function auctionClose(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return;
  const res=resolveAuction(lot);
  if(res.winner==='you'){
    if(freeStalls(G)<=0){ toast('No free stalls — build or upgrade a stable first!','bad'); return; }
    if(G.money<lot.high){ toast('You can’t afford the winning bid.','bad'); return; }
    G.money-=lot.high; lot.won=true; lot.closed=true; lot.horse.stable=0; G.horses.push(lot.horse);
    G.stats.auctionsWon=(G.stats.auctionsWon||0)+1; G.stats.bought=(G.stats.bought||0)+1;
    coinPop(-lot.high); burst('🔨🏆✨',14); playSfx('win'); toast('🔨 Sold! '+lot.horse.name+' is yours for 🪙'+fmt(lot.high)+'.','good');
  } else { lot.closed=true; toast('Outbid — the lot went to another buyer.','info'); }
  save(); refresh();
}
function auctionPass(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return; lot.closed=true; toast('You passed on '+lot.horse.name+'.','info'); save(); refresh(); }
function consignHorse(h){

    '<div class="btnrow"><button class="btn" id="coYes">Sell for 🪙'+fmt(price)+'</button><button class="btn ghost" id="coNo">Keep</button></div>');
  $('coNo').onclick=closeModal;

    G.horses=G.horses.filter(x=>x.id!==h.id); const rg=Math.round(overall(h)*0.3+(breedDef(h.breed).rarity)*4); G.rep+=rg;

}

// the optional "ride the round" timing minigame — a few fences, tap in the green zone
function playShowGame(h,disc,tier){
  const N=SHOW_GAME.fences, zoneHalf=SHOW_GAME.zoneHalf;
  let fence=0, scores=[], marker=0, dir=1, tPrev=null, raf=null, waited=0, speed=0.9, done=false;
  const sh=modal('<h3>'+disc.emoji+' '+disc.name+' — Ride!</h3>'+
    '<div class="msg" id="sgMsg" style="text-align:center">Tap <b>JUMP</b> as the marker crosses the <b style="color:var(--good)">green</b> zone. '+N+' fences!</div>'+
    '<div id="sgPips" style="text-align:center;font-size:15px;margin-bottom:9px;letter-spacing:2px"></div>'+
    '<div class="sgbar"><div class="sgzone" style="left:'+((0.5-zoneHalf)*100)+'%;width:'+(zoneHalf*2*100)+'%"></div><div class="sgmark" id="sgMark"></div></div>'+
    '<div class="btnrow"><button class="btn" id="sgJump" style="flex:2;font-size:18px;padding:14px 0">⬆️ JUMP</button>'+
    '<button class="btn ghost" id="sgSkip" style="flex:1">Quick result</button></div>',{center:true});
  const mark=$('sgMark'), pips=$('sgPips');
  const drawPips=()=>{ if(pips) pips.innerHTML=scores.map(s=>s>=0.66?'🟢':s>=0.33?'🟡':'🔴').join(' ')+(scores.length<N?' '+'▫️'.repeat(N-scores.length):''); };
  drawPips();
  const perfNow=()=>scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
  const cleanup=()=>{ done=true; if(raf&&typeof cancelAnimationFrame!=='undefined') cancelAnimationFrame(raf); if(typeof document!=='undefined') document.removeEventListener('keydown',onKey); };
  const finish=()=>{ const p=perfNow(); cleanup(); closeModal(); finishShow(h,disc,tier,p); };
  const advance=(s)=>{ scores.push(s); fence++; marker=0; dir=1; speed+=0.18; waited=0; drawPips();
    if(fence>=N){ finish(); } };
  const jump=()=>{ if(done) return; const s=fenceScore(marker); burst(s>=0.66?'✨🐴':'💨',6); playSfx(s>=0.66?'coin':'tap'); advance(s); };
  const skip=()=>{ cleanup(); closeModal(); finishShow(h,disc,tier,null); };
  const onKey=(e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); jump(); } };
  { const j=$('sgJump'); if(j) j.onclick=jump; } { const k=$('sgSkip'); if(k) k.onclick=skip; }
  if(typeof document!=='undefined') document.addEventListener('keydown',onKey);
  const step=(ts)=>{ if(done) return;
    if(!$('modal')||!/\bon\b/.test($('modal').className||'')){ cleanup(); finishShow(h,disc,tier, scores.length?perfNow():null); return; } // closed via ✕
    if(tPrev==null) tPrev=ts; const dt=Math.min(0.05,(ts-tPrev)/1000); tPrev=ts;
    marker+=dir*speed*dt; if(marker>=1){ marker=1; dir=-1; } else if(marker<=0){ marker=0; dir=1; }
    waited+=dt; if(waited>2.6){ advance(0); if(done) return; }
    if(mark) mark.style.left=(marker*100)+'%';
    raf=requestAnimationFrame(step);
  };
  if(typeof requestAnimationFrame!=='undefined') raf=requestAnimationFrame(step);
}

function playGroomGame(h){
  const zoneHalf=0.20, N=3; // three passes: mane, body, hooves
  let pass=0, scores=[], marker=0, dir=1, tPrev=null, raf=null, done=false, speed=1.0, waited=0;
  modal('<h3>🧽 Grooming '+((''+h.name).replace(/</g,'&lt;'))+'</h3>'+
    '<div class="msg" id="ggMsg" style="text-align:center">Tap <b>BRUSH</b> as the marker crosses the <b style="color:var(--good)">green</b> zone. '+N+' passes!</div>'+
    '<div id="ggPips" style="text-align:center;font-size:15px;margin-bottom:9px;letter-spacing:2px"></div>'+
    '<div class="sgbar"><div class="sgzone" style="left:'+((0.5-zoneHalf)*100)+'%;width:'+(zoneHalf*2*100)+'%"></div><div class="sgmark" id="ggMark"></div></div>'+
    '<div class="btnrow"><button class="btn" id="ggBrush" style="flex:2;font-size:18px;padding:14px 0">🧽 BRUSH</button>'+
    '<button class="btn ghost" id="ggSkip" style="flex:1">Quick tidy</button></div>',{center:true});
  const mark=$('ggMark'), pips=$('ggPips');
  const drawPips=()=>{ if(pips) pips.innerHTML=scores.map(s=>s>=0.66?'🟢':s>=0.33?'🟡':'🔴').join(' ')+(scores.length<N?' '+'▫️'.repeat(N-scores.length):''); };
  drawPips();
  const perfNow=()=>scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
  const cleanup=()=>{ done=true; if(raf&&typeof cancelAnimationFrame!=='undefined') cancelAnimationFrame(raf); if(typeof document!=='undefined') document.removeEventListener('keydown',onKey); };
  const finish=(perf)=>{ cleanup(); closeModal(); const r=doGroomMinigame(G,h,perf,G.day);
    if(!r.ok){ toast(r.why,'info'); openGroom(); return; }
    const res=r.result; burst('🧽✨'+(res.rating.stars>=3?'🌟':''),14); playSfx(res.rating.stars>=2?'coin':'tap');
    const fresh=checkAchievements(G), gg=checkGoals(G); save(); renderHUD(); renderTab();
    toast('🧽 '+res.rating.label+'! +'+res.groomGain+' grooming, +'+res.hoofGain+' hooves, +'+res.bond+' bond.','good'); openGroom(); };
  const brush=()=>{ if(done) return; const s=fenceScore(marker); scores.push(s); pass++; marker=0; dir=1; speed+=0.2; waited=0; drawPips();
    burst(s>=0.66?'✨':'💨',5); playSfx(s>=0.66?'coin':'tap'); if(pass>=N) finish(perfNow()); };
  const onKey=(e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); brush(); } };
  { const b=$('ggBrush'); if(b) b.onclick=brush; } { const k=$('ggSkip'); if(k) k.onclick=()=>finish(0.5); }
  if(typeof document!=='undefined') document.addEventListener('keydown',onKey);
  const step=(ts)=>{ if(done) return;
    if(!$('modal')||!/\bon\b/.test($('modal').className||'')){ cleanup(); return; }
    if(tPrev==null) tPrev=ts; const dt=Math.min(0.05,(ts-tPrev)/1000); tPrev=ts;
    marker+=dir*speed*dt; if(marker>=1){ marker=1; dir=-1; } else if(marker<=0){ marker=0; dir=1; }
    waited+=dt; if(waited>2.6){ scores.push(0); pass++; marker=0; dir=1; waited=0; drawPips(); if(pass>=N){ finish(perfNow()); return; } }
    if(mark) mark.style.left=(marker*100)+'%'; raf=requestAnimationFrame(step);
  };
  if(typeof requestAnimationFrame!=='undefined') raf=requestAnimationFrame(step);
}

// ---- Tack & equipment: per-horse equip panel ----
function tackEffectLine(t){
  const bits=[]; const tm=tackTierMult(G,t.id); // reflect the item's current upgrade tier
  if(t.show) bits.push('+'+Math.round(t.show*tm*100)+'% show');
  if(t.disc){ const d=disciplineDef(t.disc.id); bits.push('+'+Math.round(t.disc.mult*tm*100)+'% '+(d?d.name:t.disc.id)); }
  if(t.groomDecay) bits.push('grooming lasts longer');
  if(t.stressCut) bits.push('eases weather needs');
  const mark=tackTierMark(G,t.id); return (mark?mark+' ':'')+bits.join(' · ');
}

function buyHorse(h){
  const price=buyPrice(h); if(G.money<price){ toast('Not enough coins.','bad'); return; }
  if(freeStalls(G)<=0){ toast('No free stalls — build or upgrade a stable.','bad'); return; }
  G.money-=price; G.market=G.market.filter(m=>m.id!==h.id); h.stable=0; G.horses.push(h); G.stats.bought++;
  toast('🛒 Welcome home, '+h.name+'!','good'); refresh();
}
function buyFeatured(){
  const f=featuredHorse(G); if(!f) return;
  const price=featuredPrice(f);
  if(G.money<price){ toast('Not enough coins.','bad'); return; }
  if(freeStalls(G)<=0){ toast('No free stalls — build or upgrade a stable.','bad'); return; }
  G.money-=price; f.featured=false; f.stable=0; G.horses.push(f); G.stats.bought=(G.stats.bought||0)+1; G.stats.featuredBought=(G.stats.featuredBought||0)+1;
  G.featured.sold=true; coinPop(-price); burst('⭐🐴✨',14); playSfx('coin');
  toast('⭐ '+f.name+' joins '+ranchName(G)+' — a real showpiece!','good'); refresh();
}

// draw the whole card on a canvas for a crisp downloadable PNG (no external assets)
function drawCardPNG(m){
  const W=640,H=900,S=2; const cv=document.createElement('canvas'); cv.width=W*S; cv.height=H*S;
  const x=cv.getContext('2d'); x.scale(S,S);
  const rr=(px,py,w,h,r)=>{ x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+w,py,px+w,py+h,r); x.arcTo(px+w,py+h,px,py+h,r); x.arcTo(px,py+h,px,py,r); x.arcTo(px,py,px+w,py,r); x.closePath(); };
  // background
  const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#243019'); bg.addColorStop(1,'#141d0c');
  x.fillStyle=bg; x.fillRect(0,0,W,H);
  // frame
  const champ=m.champion||m.legend; x.lineWidth=6; x.strokeStyle=champ?'#e0a53a':'#3a4a24'; rr(14,14,W-28,H-28,22); x.stroke();
  // header
  x.textAlign='left'; x.fillStyle='#ffd35a'; x.font='800 40px Segoe UI, system-ui, sans-serif'; x.fillText(m.name, 40, 74);
  x.fillStyle='#c3c9a6'; x.font='600 20px Segoe UI, system-ui, sans-serif'; x.fillText(m.coat+' '+m.breedName+' · '+m.rarityName, 40, 104);
  // portrait panel
  rr(40,128,W-80,300,18); const pg=x.createRadialGradient(W/2,270,20,W/2,270,260); pg.addColorStop(0,m.coatBody); pg.addColorStop(1,'#16210f'); x.fillStyle=pg; x.fill();
  drawHorseCanvas(x, W/2-150, 200, 6.6, m.coatBody, m.coatMane);
  if(champ){ x.textAlign='right'; x.font='700 22px Segoe UI'; x.fillStyle='#ffd35a'; x.fillText(m.legend?'🏛️ LEGEND':'🏆 CHAMPION', W-52, 160); x.textAlign='left'; }
  // stat bars
  let sy=470; const stats=[['SPEED',m.speed],['STAMINA',m.stamina],['TEMPERAMENT',m.temperament],['HEALTH',m.health],['SPIRIT',m.happy]];
  x.font='700 20px Segoe UI';
  stats.forEach(([lab,v])=>{ x.fillStyle='#c3c9a6'; x.textAlign='left'; x.fillText(lab,44,sy+16);
    const bx=250,bw=300; x.fillStyle='#0d130a'; rr(bx,sy,bw,16,8); x.fill();
    const col=v>=75?'#8bd36b':v>=45?'#ffd35a':'#e5624a'; x.fillStyle=col; rr(bx,sy,Math.max(10,bw*clamp(v,0,100)/100),16,8); x.fill();
    x.fillStyle='#f4efdf'; x.textAlign='right'; x.fillText(''+Math.round(v), W-44, sy+16); sy+=44; });
  // meta row
  sy+=6; x.textAlign='left'; x.font='800 26px Segoe UI'; x.fillStyle='#f4efdf';
  x.fillText('OVR '+m.overall, 44, sy); x.fillText('Gen '+m.generation, 240, sy); if(m.value) x.fillText('🪙 '+fmt(m.value), 420, sy);
  // trait + career
  sy+=44; x.font='600 20px Segoe UI'; x.fillStyle='#69c7e0';
  if(m.traitName) x.fillText(m.traitEmoji+' '+m.traitName+' · '+m.ageLabel, 44, sy); else x.fillText(m.ageLabel, 44, sy);
  sy+=32; x.fillStyle='#c3c9a6'; x.font='500 19px Segoe UI';
  x.fillText((m.wins||m.podiums)?('🥇 '+m.wins+' wins · 🏅 '+m.podiums+' podiums'):'No show record yet', 44, sy);
  if(m.dam||m.sire){ sy+=28; x.fillText('Sire '+(m.sire||'?')+' × Dam '+(m.dam||'?'), 44, sy); }
  // footer
  x.fillStyle='#0d130a'; rr(28,H-92,W-56,60,14); x.fill();
  x.fillStyle='#ffd35a'; x.font='800 22px Segoe UI'; x.textAlign='left'; x.fillText('🐴 '+m.stable, 44, H-54);
  x.fillStyle='#c3c9a6'; x.font='600 17px Segoe UI'; x.fillText('Manager '+m.manager, 44, H-34);
  x.textAlign='right'; x.fillStyle='#c3c9a6'; x.font='600 17px Segoe UI'; x.fillText(m.stamp.season+' · Year '+m.stamp.year+' · Day '+m.stamp.day, W-44, H-44);
  x.textAlign='left';
  return cv;
}
// canvas twin of horseArt() — same shapes, tinted to the coat
function drawHorseCanvas(x,ox,oy,s,body,mane){
  const P=(d)=>{ x.beginPath(); let cx=0,cy=0; d.forEach(c=>{ if(c[0]==='M'){cx=ox+c[1]*s;cy=oy+c[2]*s;x.moveTo(cx,cy);} else if(c[0]==='L'){cx=ox+c[1]*s;cy=oy+c[2]*s;x.lineTo(cx,cy);} else if(c[0]==='Q'){x.quadraticCurveTo(ox+c[1]*s,oy+c[2]*s,ox+c[3]*s,oy+c[4]*s);} }); x.closePath(); };
  x.fillStyle=mane; P([['M',7,13],['Q',1,17,3,26],['Q',6,21,9,21]]); x.fill();            // tail
  x.fillStyle=body; x.beginPath(); x.ellipse(ox+21*s,oy+18*s,13*s,8*s,0,0,Math.PI*2); x.fill(); // body
  P([['M',30,13],['L',37,4],['L',41,6],['L',35,17]]); x.fill();                              // neck
  P([['M',35,3],['L',44,6],['L',43,12],['L',34,12]]); x.fill();                              // head
  x.fillStyle=mane; P([['M',31,12],['L',37,3],['L',39,4.5],['L',34,15]]); x.fill();          // mane
  x.fillStyle=body; [13,19,25,29.5].forEach(lx=>{ x.beginPath(); x.rect(ox+lx*s,oy+23*s,3.2*s,9*s); x.fill(); }); // legs
  x.fillStyle='#140f0b'; x.beginPath(); x.arc(ox+41*s,oy+8*s,1*s,0,Math.PI*2); x.fill();      // eye
}
function downloadCanvas(cv,name){
  try{ if(cv.toBlob){ cv.toBlob(function(bl){ if(!bl){ dataUrlDownload(cv,name); return; } const u=URL.createObjectURL(bl); const a=el('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>{try{URL.revokeObjectURL(u);}catch(e){}},1500); }); }
    else dataUrlDownload(cv,name);
  }catch(e){ dataUrlDownload(cv,name); }
}
function dataUrlDownload(cv,name){ try{ const a=el('a'); a.href=cv.toDataURL('image/png'); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }catch(e){ toast('Download not supported here.','bad'); } }
function shareCard(m,fname){
  try{
    const cv=drawCardPNG(m);
    if(navigator.share && navigator.canShare && cv.toBlob){
      cv.toBlob(function(bl){ try{ const file=new File([bl],fname,{type:'image/png'});
        if(navigator.canShare({files:[file]})){ navigator.share({files:[file], title:m.name+' — '+(m.stable||'Skyhorse Stables')}); return; }
        navigator.share({title:m.name+' — '+(m.stable||'Skyhorse Stables'), text:m.name+', a '+m.coat+' '+m.breedName+' at '+(m.stable||'Skyhorse Stables')+'.'});
      }catch(e){ downloadCanvas(cv,fname); } });
    } else { downloadCanvas(cv,fname); }
  }catch(e){ toast('Sharing not supported — try Download.','info'); }
}

// ---------------- Tick loop ----------------
function step(ts){
  if(!lastTs) lastTs=ts;
  const dt=ts-lastTs; lastTs=ts;
  if(speed>0 && !isModalOpen()){
    acc+=dt*speed;
    if(acc>=DAY_MS){ acc=0; doDay(); }
  } else acc=0;
  skyT+=Math.min(dt,100); updateSky(); // day/night breathes regardless of game speed
  tickHandle=requestAnimationFrame(step);
}
function isModalOpen(){ return $('modal').className.indexOf('on')>=0; }
// ---- day/night sky ----
function updateSky(){
  const scn=$('scene'); if(!scn) return;
  const phase=((skyT/SKY_CYCLE)%1+1)%1; // 0 midnight → 0.5 noon → 1 midnight
  const dist=Math.abs(phase-0.5);                       // 0 at noon, 0.5 at midnight
  const night=clamp((dist-0.20)/0.20,0,1);              // 0 day, 1 deep night
  const warm=clamp(1-Math.abs(dist-0.27)/0.09,0,1);     // dawn/dusk glow
  const sn=$('skyNight'), sw=$('skyWarm'); if(sn) sn.style.opacity=(night*0.82).toFixed(3); if(sw) sw.style.opacity=(warm*0.9).toFixed(3);
  // sun/moon travel an arc; sun up in the day, moon up at night
  const t=clamp((phase-0.22)/0.56,0,1);                 // 0 dawn → 1 dusk
  const x=8+t*80, arc=Math.sin(t*Math.PI), y=54-arc*40;
  const sun=$('sceneSun'); if(sun){ sun.style.left=x+'%'; sun.style.top=y+'px'; sun.style.opacity=(1-night).toFixed(3); }
  const mt=((phase+0.5)%1-0.22)/0.56; const mx=8+clamp(mt,0,1)*80, my=54-Math.sin(clamp(mt,0,1)*Math.PI)*40;
  const moon=$('sceneMoon'); if(moon){ moon.style.left=mx+'%'; moon.style.top=my+'px'; moon.style.opacity=night.toFixed(3); }
  // stable-yard clock chip (only rewrite the DOM when the minute/part actually changes)
  { const ce=$('clockEmoji'), ct=$('clockTime'); if(ce&&ct){ const c=yardClock(G,phase);
      if(ct.textContent!==c.time){ ct.textContent=c.time; ce.textContent=c.emoji; const chip=$('clockChip'); if(chip) chip.title=c.emoji+' '+c.label+' — '+c.time12; } } }
}
// ---- weather particle layer ----
function buildWeather(wxId){
  const wx=$('wx'); if(!wx) return; wx.innerHTML='';
  if(wxId==='rain'){ for(let i=0;i<16;i++){ const d=el('div','drop'); d.style.left=(4+i*6)+'%'; d.style.animationDuration=(0.5+ (i%4)*0.12)+'s'; d.style.animationDelay=(-(i%7)*0.13)+'s'; wx.appendChild(d);} }
  else if(wxId==='snow'){ for(let i=0;i<16;i++){ const f=el('div','flake','❄'); f.style.left=(3+i*6)+'%'; f.style.animationDuration=(2.4+ (i%5)*0.5)+'s'; f.style.animationDelay=(-(i%8)*0.4)+'s'; wx.appendChild(f);} }
}
function doDay(){
  // expire hay modifier
  if(G.hayExpire && G.day>=G.hayExpire){ G.hayMod=null; G.hayExpire=null; }
  const money0=G.money;
  const res=advanceDay(G,Math.random);
  (res.notes||[]).forEach(n=>toast(n.m,n.t));
  const net=G.money-money0; // rent + boarding income earned overnight
  if(net>0) coinPop(net);
  if(res.born && res.born.length){ burst('🎉🐴✨🎊',16); playSfx('foal'); } // celebrate new foals
  if(res.event) showEvent(res.event);
  save(); refresh();
}

function positionTut(step){
  const ring=$('tutRing'), bb=$('tutBubble'); if(!ring||!bb) return;
  let tgt=null; try{ tgt=step.target?document.querySelector(step.target):null; }catch(e){ tgt=null; }
  const vw=(typeof window!=='undefined'&&window.innerWidth)||360, vh=(typeof window!=='undefined'&&window.innerHeight)||640;
  if(tgt&&tgt.getBoundingClientRect){ const r=tgt.getBoundingClientRect();
    if(r.width>0&&r.height>0){
      ring.style.display='block'; ring.style.left=(r.left-6)+'px'; ring.style.top=(r.top-6)+'px'; ring.style.width=(r.width+12)+'px'; ring.style.height=(r.height+12)+'px';
      const bh=180, below=r.bottom+bh<vh;
      bb.style.transform=''; bb.style.left=Math.max(12,Math.min(vw-312,r.left))+'px';
      bb.style.top=(below?(r.bottom+14):Math.max(12,r.top-bh))+'px';
      return;
    }
  }
  ring.style.display='none'; bb.style.left='50%'; bb.style.top='42%'; bb.style.transform='translate(-50%,-50%)';
}

  const tabs=[['breeds','🐴 Breeds'],['coats','🎨 Coats'],['disc','🏆 Disciplines']].map(([id,lbl])=>
    '<span class="wlchip" data-cx="'+id+'" style="cursor:pointer;'+(codexTab===id?'border-color:var(--gold2);color:var(--gold)':'')+'">'+lbl+'</span>').join('');
  let body='';
  if(codexTab==='breeds'){
    const seen=codexSeenSets(G).breeds;
    body='<div class="swlabel">The region’s breeds — rarity, temperament & typical coats. Own or breed one to mark it <b>discovered</b>. <span class="pill">'+prog.breedsSeen+'/'+prog.breedsTotal+' seen</span></div>';
    body+=codexBreeds().map(b=>{ const disc=seen.has(b.id);
      return '<div class="lbrow" style="align-items:flex-start"><div class="lbemoji" style="font-size:20px">'+b.emoji+'</div>'+
        '<div class="grow"><div class="lbname">'+esc(b.name)+' <span class="pill">'+b.rarityName+'</span> <span class="pill">'+b.sizeLabel+'</span>'+(disc?' <span class="pill" style="color:var(--good)">✓ seen</span>':' <span class="pill" style="opacity:.55">🔒 undiscovered</span>')+'</div>'+
        '<div class="lbsub">'+esc(b.desc)+'</div>'+
        '<div class="lbsub">⚡ Spd '+b.speed+' · 🫁 Sta '+b.stamina+' · 🧠 Tmp '+b.temperament+' · 🪙 base '+fmt(b.base)+'</div>'+
        '<div class="lbsub">🎨 Coats: '+b.colors.map(esc).join(', ')+' — '+esc(b.coatLean)+'</div></div></div>'; }).join('');
  } else if(codexTab==='coats'){
    const seen=codexSeenSets(G).coats;
    body='<div class="swlabel">Coat genetics — four loci (E/A/Cr/G) plus rare Golden/Pearl mutations decide a foal’s colour & rarity tier. <span class="pill">'+prog.coatsSeen+'/'+prog.coatsTotal+' seen</span></div>';
    body+='<div class="msg" style="font-size:12px"><b>E</b> black vs red pigment · <b>A</b> agouti (bay) · <b>Cr</b> cream dilute (0/1/2 copies) · <b>G</b> grey masks the base & whitens with age. More dilution & mutations = a higher-value coat.</div>';
    let lastTier=-1;
    body+=codexCoats().map(c=>{ const disc=seen.has(c.name); let head='';
      if(c.tier!==lastTier){ lastTier=c.tier; head='<div class="swlabel" style="margin-top:8px">Tier '+c.tier+' · '+c.tierName+' <span class="pill">×'+c.valueMult.toFixed(2)+' value</span></div>'; }
      return head+'<div class="lbrow"><div class="hface" style="width:26px;height:26px;background:radial-gradient(circle at 50% 35%,'+c.css.body+',#1c2711)"></div>'+
        '<div class="grow"><div class="lbname">'+esc(c.name)+(c.tier>=2?' 🎨':'')+(disc?' <span class="pill" style="color:var(--good)">✓</span>':'')+'</div>'+
        '<div class="lbsub">'+esc(c.family)+' · '+esc(c.note)+'</div></div></div>'; }).join('');
  } else {
    body='<div class="swlabel">Show disciplines — what each rewards, and the traits that shine in it.</div>';
    body+=codexDisciplines().map(d=>{ const w=d.weights; const bars=[['⚡ Speed',w.speed],['🫁 Stamina',w.stamina],['🧠 Temperament',w.temperament]]
        .filter(x=>x[1]>0).map(x=>x[0]+' '+Math.round(x[1]*100)+'%').join(' · ');
      const syn=d.synergyTraits.length? d.synergyTraits.map(t=>t.emoji+' '+t.name+' ×'+t.mult.toFixed(2)).join(', '):'no standout trait';
      return '<div class="lbrow" style="align-items:flex-start"><div class="lbemoji" style="font-size:20px">'+d.emoji+'</div>'+
        '<div class="grow"><div class="lbname">'+esc(d.name)+(d.coatMatters?' <span class="pill" style="color:var(--gold)">🎨 looks count</span>':'')+'</div>'+
        '<div class="lbsub">'+esc(d.desc)+'</div>'+
        '<div class="lbsub">Scoring: '+bars+'</div>'+
        '<div class="lbsub">🧬 Trait synergy: '+esc(syn)+'</div></div></div>'; }).join('');
  }
  modal('<h3>📚 Codex</h3>'+
    '<div style="margin-bottom:8px">'+tabs+'</div>'+
    '<div class="divider"></div>'+
    '<div>'+body+'</div>'+
    '<div class="btnrow"><button class="btn ghost" id="cxClose" style="width:100%">Done</button></div>');
  $('cxClose').onclick=closeModal;
  document.querySelectorAll('[data-cx]').forEach(x=>x.onclick=()=>{ codexTab=x.getAttribute('data-cx'); playSfx('tap'); openCodex(); });
}
function openRegistry(){
  syncRegistry(G);
  const active=activeNamePack(G);
  const packChips=NAME_PACKS.map(p=>{ const unl=namePackUnlocked(G,p.id), on=active.id===p.id;
    return '<span class="wlchip" data-pack="'+p.id+'" style="cursor:pointer;'+(on?'border-color:var(--gold2);color:var(--gold)':(unl?'':'opacity:.5'))+'">'+p.emoji+' '+p.name+(unl?'':' 🔒⭐'+p.repReq)+(on?' ✓':'')+'</span>'; }).join('');
  const q=regQuery.trim().toLowerCase();
  const all=(G.registry||[]).slice().reverse();
  const rows=all.filter(r=>!q || (r.name||'').toLowerCase().indexOf(q)>=0 || (breedDef(r.breed)||{name:''}).name.toLowerCase().indexOf(q)>=0);
  const list = rows.length ? rows.slice(0,60).map(r=>{ const cc=r.coat?coatColor(r.coat):{body:'#7c4a26'}; const b=breedDef(r.breed)||{name:r.breed,emoji:'🐴'};
      return '<div class="lbrow"><div class="hface" style="width:30px;height:30px;background:radial-gradient(circle at 50% 35%,'+cc.body+'55,#1c2711)"></div>'+
        '<div class="grow"><div class="lbname">'+r.name+(r.wins>=3?' <span class="pill" style="color:var(--gold)">🏆</span>':'')+'</div>'+
        '<div class="lbsub">'+b.name+' · '+(r.coat||'—')+' · Gen '+(r.gen||1)+(r.wins?' · '+r.wins+'🥇':'')+'</div></div></div>'; }).join('')
    : '<div class="empty">'+(q?'No horses match “'+regQuery+'”.':'No horses registered yet.')+'</div>';
  modal('<h3>📖 Studbook</h3>'+
    '<div class="swlabel">Name pack for new foals</div><div style="margin-bottom:8px">'+packChips+'</div>'+
    '<div class="divider"></div>'+
    '<div class="swlabel">Registered horses <span class="pill">'+registrySize(G)+'</span></div>'+
    '<input class="nameIn" id="regSearch" placeholder="Search by name or breed…" value="'+regQuery.replace(/"/g,'&quot;')+'" style="margin:4px 0 8px">'+
    '<div>'+list+'</div>'+
    '<div class="btnrow"><button class="btn ghost" id="regClose" style="width:100%">Done</button></div>');
  $('regClose').onclick=closeModal;
  { const se=$('regSearch'); if(se&&se.addEventListener) se.addEventListener('input',()=>{ regQuery=se.value; const f=document.activeElement; openRegistry(); const s2=$('regSearch'); if(s2){ s2.focus(); try{ s2.setSelectionRange(regQuery.length,regQuery.length); }catch(e){} } }); }
  document.querySelectorAll('[data-pack]').forEach(x=>x.onclick=()=>{ const r=setNamePack(G, x.getAttribute('data-pack')); if(!r.ok){ toast(r.why,'info'); return; } playSfx('tap'); toast(r.pack.emoji+' '+r.pack.name+' names selected.','good'); save(); openRegistry(); });
}
function openBoard(){
  const list=currentContracts(G);
  const left=daysUntilBoardRefresh(G);
  const rows=list.map(c=>{
    const rew=[]; const r=c.reward||{}; if(r.money) rew.push('🪙'+fmt(r.money)); if(r.rep) rew.push(r.rep+'⭐'); if(r.feed) rew.push('🌾'+r.feed);
    const pct=Math.min(100, Math.round(100*c.cur/c.target));
    const right = c.claimed ? '<span class="pill" style="color:var(--good)">✓ Claimed</span>'
      : c.claimable ? '<button class="btn sm" data-claim="'+c.id+'">Claim</button>'
      : '<span class="pill">'+Math.min(c.cur,c.target)+'/'+c.target+'</span>';
    return '<div class="ctr'+(c.claimable?' claimable':'')+'"><div class="ctrtop"><div class="ctre">'+c.icon+'</div>'+
      '<div class="grow"><div class="hname" style="font-size:13px">'+c.desc+(c.repReq?' <span class="pill">⭐'+c.repReq+'</span>':'')+'</div>'+
      '<div class="ctrrew">'+(rew.length?rew.join(' · '):'—')+'</div></div>'+right+'</div>'+
      '<div class="cbar2"><i style="display:block;height:100%;width:'+pct+'%;background:'+(c.done?'var(--good)':'var(--gold)')+'"></i></div></div>'; }).join('');
  modal('<h3>📋 Notice Board</h3>'+
    '<div class="msg">Short jobs around the region. Complete them and come back to claim your reward. Fresh contracts in <b>'+left+' day'+(left!==1?'s':'')+'</b>.</div>'+
    '<div>'+rows+'</div>'+
    '<div class="btnrow"><button class="btn ghost" id="boardClose" style="width:100%">Done</button></div>');
  $('boardClose').onclick=closeModal;
  document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=()=>{ const r=claimContract(G,b.getAttribute('data-claim'));
    if(!r.ok){ toast(r.why,'bad'); return; } const rw=r.reward||{}; if(rw.money) coinPop(rw.money);
    burst('📋✨🪙',12); playSfx('goal'); const bits=[]; if(rw.money)bits.push('🪙'+fmt(rw.money)); if(rw.rep)bits.push(rw.rep+'⭐'); if(rw.feed)bits.push('🌾'+rw.feed);
    toast('📋 Contract complete! +'+bits.join(' +'),'good'); save(); renderHUD(); openBoard(); });
}
// ---------------- Prestige / New Game+ ----------------
function openPrestige(){
  if(!canPrestige(G)){ toast('Not yet — reach Master Breeder with a Hall-of-Fame legend first.','info'); return; }
  const proj=legacyPointsFor(G); const lg=G.legacy||{points:0,resets:0};
  const after={points:lg.points+proj, resets:lg.resets+1};
  const nowPct=Math.round((legacyBonus(lg,'showPrize')-1)*100), newPct=Math.round((legacyBonus(after,'showPrize')-1)*100);
  const newCoins=legacyBonus(after,'startCoins');
  modal('<h3>🌟 Retire the Ranch?</h3>'+
    '<div class="msg">Fleur passes the reins and starts anew. This <b>resets your ranch</b> — horses, coins, buildings, staff and progress all begin fresh — but your <b>Legacy is forever</b>.<br><br>'+
    'Bank <b style="color:var(--gold)">+'+fmt(proj)+' Legacy</b> (total '+fmt(after.points)+', Lv '+legacyLevel(after)+').<br>'+
    'Permanent perks grow: show prizes +'+nowPct+'% → <b>+'+newPct+'%</b>'+(newCoins?', start with <b>🪙'+fmt(newCoins)+'</b>':'')+'.<br><br>'+
    '<span style="color:var(--ink2);font-size:12px">Your Hall of Fame lives on in legend, but this ranch’s horses will be gone. This cannot be undone.</span></div>'+
    '<div class="btnrow"><button class="btn" id="pgYes" style="flex:1">🌟 Retire &amp; begin anew</button>'+
    '<button class="btn ghost" id="pgNo" style="flex:1">Not yet</button></div>',{center:true});
  $('pgNo').onclick=closeModal;
  $('pgYes').onclick=()=>{
    const ng=applyPrestige(G); G=ng; saveLegacy(G.legacy); save();
    closeModal(); burst('🌟✨🐴🏆',22); playSfx('win');
    setTab('ranch'); refresh();
    toast('🌟 A new chapter begins — Legacy '+fmt(G.legacy.points)+' pts. Welcome back, Fleur!','good');
  };
}
function openHelp(){
  const st=achievementState(G);
  modal('<h3>ℹ️ Help &amp; About</h3>'+
    '<div class="msg"><b>Skyhorse Stables</b> — you’re Fleur, raising, breeding, training and showing horses across the seasons. Buy hay, grow your herd, chase rare coats and champions, and build your estate.</div>'+
    '<div class="btnrow"><button class="btn" id="hAch" style="width:100%">🏅 Achievements &amp; Stats <span class="pill">'+st.unlocked+'/'+st.total+'</span></button></div>'+
    '<div class="btnrow"><button class="btn ghost" id="hDecor" style="width:100%">🎨 Decorate your ranch</button></div>'+
    '<div class="btnrow"><button class="btn ghost" id="hReplay" style="width:100%">▶ Replay the tutorial</button></div>'+
    '<div class="btnrow"><button class="btn ghost" id="hClose" style="width:100%">Close</button></div>',{center:true});
  $('hClose').onclick=closeModal;
  $('hReplay').onclick=()=>{ closeModal(); startTutorial(); };
  $('hDecor').onclick=()=>{ closeModal(); openDecor(); };
  $('hAch').onclick=()=>{ closeModal(); openAchievements(); };
}
function openAchievements(){
  checkAchievements(G); const st=achievementState(G); const s=G.stats||{};
  const best=Math.max(0,...(G.horses||[]).map(h=>overall(h)), s.bestOVR||0);
  const statRows=[
    ['📅 Days played', fmt(s.days||0)], ['🐣 Foals bred', fmt(s.born||0)],
    ['🛒 Horses bought', fmt(s.bought||0)], ['💰 Horses sold', fmt(s.sold||0)],
    ['🥇 Show wins', fmt(s.showWins||0)], ['🎉 Festivals attended', fmt(s.festivals||0)],
    ['💵 Best sale', '🪙'+fmt(s.bestSale||0)], ['🤑 Total earned', '🪙'+fmt(s.goldEarned||0)],
    ['♞ Stud fees', '🪙'+fmt(s.studIncome||0)], ['🏛️ Estate prestige', fmt(G.prestige||0)],
    ['🕯️ Hall of Fame', fmt((G.hallOfFame||[]).length)], ['⭐ Best overall horse', fmt(best)],
  ];
  const statHTML=statRows.map(r=>'<div class="stkv"><span>'+r[0]+'</span><b>'+r[1]+'</b></div>').join('');
  const achHTML=st.list.map(x=>'<div class="achcard'+(x.unlocked?' un':'')+'">'+
    '<div class="achic">'+(x.unlocked?x.def.icon:'🔒')+'</div>'+
    '<div class="achtx"><div class="achn">'+x.def.name+'</div><div class="achd">'+x.def.desc+'</div></div>'+
    (x.unlocked?'<div class="achok">✓</div>':'')+'</div>').join('');
  modal('<h3>🏅 Achievements &amp; Stats</h3>'+
    '<div class="seg" style="pointer-events:none"><div class="segb on">🏅 '+st.unlocked+' / '+st.total+' unlocked</div></div>'+
    '<div class="statgrid">'+statHTML+'</div>'+
    '<div class="divider"></div>'+
    '<div class="achlist">'+achHTML+'</div>'+
    '<div class="btnrow"><button class="btn ghost" id="aClose" style="width:100%">Close</button></div>');
  $('aClose').onclick=closeModal;
}

  if(!load()){ G=freshGame(loadLegacy()); }

  { const dc=$('dayChip'); if(dc) dc.onclick=openWeek; }

      toast(c.emoji+' '+c.label+' ('+c.time12+') — '+c.flavour,'info'); }; }

  { const lb=$('labBtn'); if(lb) lb.onclick=openGeneticsLab; }
  { const pb=$('persBtn'); if(pb) pb.onclick=openPersonality; }

  { const nx=$('tbNext'); if(nx) nx.onclick=()=>showTutStep((G.tut&&G.tut.step||0)+1); }
  { const sk=$('tbSkip'); if(sk) sk.onclick=()=>finishTutorial(true); }
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ playSfx('tap'); setTab(t.getAttribute('data-tab')); });
  document.querySelectorAll('#speedBtns .sbtn').forEach(b=>b.onclick=()=>{ speed=parseInt(b.getAttribute('data-sp'),10); playSfx('tap');
    document.querySelectorAll('#speedBtns .sbtn').forEach(x=>x.classList.toggle('on',x===b)); });
  { const ab=$('audioBtn'); if(ab) ab.onclick=openAudio; updateAudioBtn(); }

  setTab('ranch'); refresh();
  if(!G.seenIntro) showIntro();
  else if(dailyClaimable()) openDaily(); // returning players get their welcome-back reward
  tickHandle=requestAnimationFrame(step);

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();

})();
