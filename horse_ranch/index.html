  {id:'spring', name:'Spring', emoji:'🌸', wx:[40,70,95], breedFeeMul:0.70, gestationAdj:-1, showPrizeMul:1.00, canteenMul:1.00, feedExtra:0, hayMul:1.00, marketBonus:0, tint:'#7ec86033', note:'Foaling season — breeding is cheaper and foals come quicker.'},
  {id:'summer', name:'Summer', emoji:'🌞', wx:[66,88,99], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.15, canteenMul:1.12, feedExtra:0, hayMul:1.00, marketBonus:0, tint:'#ffd35a22', note:'Peak show season — prizes are bigger and the canteen is busy.'},
  {id:'autumn', name:'Autumn', emoji:'🍂', wx:[40,73,95], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.00, canteenMul:1.00, feedExtra:0, hayMul:0.70, marketBonus:2, tint:'#e08a3a2e', note:'Harvest — hay is cheap and the market is well stocked.'},
  {id:'winter', name:'Winter', emoji:'❄️', wx:[20,50,65], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.00, canteenMul:0.90, feedExtra:1, hayMul:1.00, marketBonus:0, tint:'#aad6f028', note:'Cold snaps — horses eat more and fewer visitors brave the chill.'},
];
function seasonOf(day){ return SEASONS[Math.floor((Math.floor(day)-1)/SEASON_LEN)%4]; }
function yearOf(day){ return Math.floor((Math.floor(day)-1)/(SEASON_LEN*4))+1; }
function seasonDay(day){ return ((Math.floor(day)-1)%SEASON_LEN)+1; } // 1..SEASON_LEN
function seasonBreedFeeMul(day){ return seasonOf(day).breedFeeMul; }
function seasonGestationAdj(day){ return seasonOf(day).gestationAdj; }
function seasonShowPrizeMul(day){ return seasonOf(day).showPrizeMul; }
function seasonCanteenMul(day){ return seasonOf(day).canteenMul; }
function seasonHayMul(day){ return seasonOf(day).hayMul; }
function seasonMarketBonus(day){ return seasonOf(day).marketBonus; }

// ---------- Horse birthday / foaling-day celebrations (READ-ONLY calendar + a bounded once-a-year fête) ----------
// Every horse's birth day is derived from EXISTING data: birthDay = game.day - age (both advance together each
// day, so it's stable). A birthday recurs every SEASON_LEN*4 days (one in-game year). The reader helpers are pure;
// the only mutating action is celebrateBirthday, guarded by a per-horse per-year stamp (h.bdayYear) so it fires at
// most once per birthday and cannot be farmed, with a small clamped happiness/bond lift. No Date/Math.random.
const BDAY_YEAR_DAYS=SEASON_LEN*4; // 56 days = one in-game year (a horse's birthday cycle)
const BDAY_HAPPY=8;   // small, clamped happiness lift on a birthday
const BDAY_BOND=5;    // small, clamped bond lift on a birthday
function ageYears(h){ return Math.floor(Math.max(0,(h&&h.age)||0)/BDAY_YEAR_DAYS); }
// the absolute game-day on which this horse was born (age & day advance together, so this is stable over time)
function birthDayOf(h, game){ const day=Math.floor((game&&game.day)||1); return day-Math.max(0,(h&&h.age)||0); }
// its date within the year cycle (1..BDAY_YEAR_DAYS) — the "birthday" in calendar terms
function birthDateOfYear(h, game){ const b=birthDayOf(h,game); return ((((b-1)%BDAY_YEAR_DAYS)+BDAY_YEAR_DAYS)%BDAY_YEAR_DAYS)+1; }
// days until this horse's next birthday (0 = today; a newborn's first is a full year out)
function daysToBirthday(h){ const age=Math.max(0,(h&&h.age)||0), r=age%BDAY_YEAR_DAYS;
  return (r===0) ? (age>0?0:BDAY_YEAR_DAYS) : (BDAY_YEAR_DAYS-r); }
function isBirthdayToday(h){ const age=Math.max(0,(h&&h.age)||0); return age>0 && age%BDAY_YEAR_DAYS===0; }
function nextBirthday(h, game){ const day=Math.floor((game&&game.day)||1), inDays=daysToBirthday(h);
  return { inDays, day:day+inDays, turning:ageYears(h)+(inDays===0?0:1) }; }
function birthdayCelebrated(game, h){ return isBirthdayToday(h) && h && h.bdayYear===yearOf((game&&game.day)||1); }
function canCelebrateBirthday(game, h){ return isBirthdayToday(h) && (!h || h.bdayYear!==yearOf((game&&game.day)||1)); }
// everyone whose birthday is today (turning ≥1)
function birthdaysToday(game){ return ((game&&game.horses)||[]).filter(isBirthdayToday)
  .map(h=>({ id:h.id, name:h.name, turning:ageYears(h), celebrated:birthdayCelebrated(game,h) })); }
// a bounded, sorted look-ahead of upcoming birthdays (soonest first; today's included at inDays 0)
function upcomingBirthdays(game, within){ const day=Math.floor((game&&game.day)||1);
  const w=Math.max(1, Math.min(BDAY_YEAR_DAYS, within||BDAY_YEAR_DAYS));
  return ((game&&game.horses)||[]).map(h=>{ const nb=nextBirthday(h,game);
      return { id:h.id, name:h.name, inDays:nb.inDays, day:nb.day, turning:nb.turning, today:nb.inDays===0,
        celebrated:birthdayCelebrated(game,h) }; })
    .filter(b=>b.inDays<=w)
    .sort((a,b)=>(a.inDays-b.inDays)||(a.name<b.name?-1:1)); }
// throw a small party for a horse ON its birthday — once per year per horse (stamped), tiny clamped bumps only
function celebrateBirthday(game, h){ if(!game||!h) return {ok:false,why:'No horse.'};
  if(!isBirthdayToday(h)) return {ok:false,why:'It’s not their birthday today.'};
  const yr=yearOf(Math.floor(game.day||1));
  if(h.bdayYear===yr) return {ok:false, already:true, why:'Already celebrated this year.'};
  h.bdayYear=yr; needsInit(h);
  h.happy=clamp((h.happy||0)+BDAY_HAPPY,0,100);
  h.bond=clamp((h.bond||0)+BDAY_BOND,0,100); if(h.needs) h.needs.bond=clamp((h.needs.bond||0)+BDAY_BOND,0,100);
  game.stats=game.stats||{}; game.stats.birthdays=(game.stats.birthdays||0)+1;
  return {ok:true, turning:ageYears(h), happy:BDAY_HAPPY, bond:BDAY_BOND}; }

// ---------- Seasonal festivals (one per season, deterministic & forecastable) ----------
const FESTIVALS=[
  {season:'spring', sday:7, id:'foalfest',  name:'Spring Foal Festival', emoji:'🌷',
   note:'Breeders gather from far and wide — breeding fees are slashed and spirits soar.',
   mods:{breedFeeMul:0.5, repBoon:15, happyBoon:8}},
  {season:'summer', sday:7, id:'grandfair', name:'Summer Grand Fair', emoji:'🎪',
   note:'The biggest show of the year — every discipline runs and prizes are boosted.',
   mods:{showPrizeMul:1.35, allShows:true, repBoon:20}},
  {season:'autumn', sday:7, id:'harvest',   name:'Autumn Harvest Market', emoji:'🧺',
   note:'A bumper harvest — hay is dirt cheap and fine horses fill the market.',
   mods:{hayMul:0.5, marketRareBoost:true, marketBonus:3, hayGift:40}},
  {season:'winter', sday:7, id:'solstice',  name:'Winter Solstice', emoji:'🎄',
   note:'Warm cheer at the canteen — visitors flock in and gifts abound.',
   mods:{canteenMul:1.6, repBoon:18, hayGift:30}},
];
function festivalDef(id){ return FESTIVALS.find(f=>f.id===id)||null; }
function festivalOn(day){ const s=seasonOf(day), sd=seasonDay(day); return FESTIVALS.find(f=>f.season===s.id && f.sday===sd)||null; }
function isFestival(day){ return !!festivalOn(day); }
function festivalMod(day,key,dflt){ const f=festivalOn(day); const d=(dflt!=null?dflt:1); return (f&&f.mods&&f.mods[key]!=null)?f.mods[key]:d; }
function nextFestival(day){ for(let i=1;i<=SEASON_LEN*4;i++){ const f=festivalOn(day+i); if(f) return {inDays:i, fest:f, day:day+i}; } return null; }
function upcomingFestivals(day,within){ within=within||7; const out=[]; for(let i=0;i<=within;i++){ const f=festivalOn(day+i); if(f) out.push({inDays:i, fest:f, day:day+i}); } return out; }

// ---------- Seasonal Fairs (multi-day headline events with a claimable, themed objective) ----------
// DISTINCT from the single-day FESTIVALS (which are passive modifiers) — a fair is a multi-day window
// with a themed mini-goal you complete for a bounded, once-per-occurrence reward. Composes with
// seasons/festivals (the season festival on sday 7 lands on the fair's final day — a crescendo).
const FAIR_LEN=5; // a fair runs season-days sday .. sday+FAIR_LEN-1 (3..7)
const FAIRS=[
  {id:'springfair', season:'spring', sday:3, name:'Spring Foal Fair', emoji:'🐣',
   theme:'Breeders show off the season’s new arrivals.', objective:'Keep a young horse (foal or yearling) in your herd',
   reward:{money:900, rep:20}, met:g=>((g.horses)||[]).some(h=>(h.age||0)<=10)},
  {id:'summerfair', season:'summer', sday:3, name:'Summer Championship Fair', emoji:'🏆',
   theme:'The show grounds are packed — bring a ring-ready horse.', objective:'Own a show-ready horse (70+ overall)',
   reward:{money:1200, rep:28}, met:g=>((g.horses)||[]).some(h=>overall(h)>=70)},
  {id:'autumnfair', season:'autumn', sday:3, name:'Autumn Harvest Market', emoji:'🧺',
   theme:'Stalls overflow with feed — stock up for winter.', objective:'Have 60+ hay in store',
   reward:{money:800, rep:16, feed:20}, met:g=>((g.feed)||0)>=60},
  {id:'winterfair', season:'winter', sday:3, name:'Winter Gala', emoji:'🎇',
   theme:'A glittering gala — present a beautifully-kept ranch.', objective:'Reach a ranch appeal of 45+',
   reward:{money:1400, rep:32}, met:g=>ranchAppealScore(g)>=45},
];
function fairDef(id){ return FAIRS.find(f=>f.id===id)||null; }
function fairFor(day){ const s=seasonOf(day).id, sd=seasonDay(day); return FAIRS.find(f=>f.season===s && sd>=f.sday && sd<f.sday+FAIR_LEN)||null; }
function currentFair(game){ return fairFor((game&&game.day)||1); }
function fairActive(game){ return !!currentFair(game); }
function fairKeyFor(day){ const f=fairFor(day); return f? f.id+'-y'+yearOf(day) : null; }
function fairKey(game){ return fairKeyFor((game&&game.day)||1); }
function fairDaysLeft(game){ const day=(game&&game.day)||1, f=fairFor(day); if(!f) return 0; return (f.sday+FAIR_LEN)-seasonDay(day); }
function nextFair(game){ const day=(game&&game.day)||1;
  for(let i=1;i<=SEASON_LEN*4;i++){ if(fairFor(day+i) && !fairFor(day+i-1)) return {inDays:i, fair:fairFor(day+i), day:day+i}; } return null; }
function fairClaimed(game,key){ key=key||fairKey(game); return Array.isArray(game&&game.fairsClaimed) && game.fairsClaimed.indexOf(key)>=0; }
function fairProgress(game){
  const f=currentFair(game); if(!f) return null;
  const key=fairKey(game), met=!!f.met(game), claimed=fairClaimed(game,key);
  return { fair:f, key, active:true, met, claimed, daysLeft:fairDaysLeft(game), reward:f.reward, objective:f.objective, canClaim:(met&&!claimed) };
}
// claim a fair's reward — validates active + objective met + not already claimed; pays ONCE per occurrence
function claimFairReward(game){
  const p=fairProgress(game); if(!p) return {ok:false,why:'No fair is on right now.'};
  if(p.claimed) return {ok:false,why:'You’ve already claimed this fair’s reward.'};
  if(!p.met) return {ok:false,why:'Objective not met yet — '+p.objective.toLowerCase()+'.'};
  if(!Array.isArray(game.fairsClaimed)) game.fairsClaimed=[];
  game.fairsClaimed.push(p.key);
  if(game.fairsClaimed.length>40) game.fairsClaimed=game.fairsClaimed.slice(-40); // bounded
  const r=p.reward||{};
  if(r.money) game.money=(game.money||0)+r.money;
  if(r.rep) game.rep=(game.rep||0)+r.rep;
  if(r.feed) game.feed=(game.feed||0)+r.feed;
  if(game.stats) game.stats.fairsWon=(game.stats.fairsWon||0)+1;
  const best=((game.horses)||[]).slice().sort((a,b)=>overall(b)-overall(a))[0];
  if(best && typeof captureMoment==='function') captureMoment(game,'snapshot',best,{caption:'Won the '+p.fair.name+'! '+p.fair.emoji});
  return {ok:true, fair:p.fair, reward:r, key:p.key};
}

// ---------- Auction house (one auction per season on season-day 10) ----------
function isAuctionDay(day){ return seasonDay(day)===10; }
function nextAuction(day){ for(let i=1;i<=SEASON_LEN*4;i++){ if(isAuctionDay(day+i)) return {inDays:i, day:day+i}; } return null; }
// a standout lot — rarer/higher-quality than normal market stock, sometimes a proven champion or rare coat
function makeAuctionLot(game,rng){
  rng=rng||Math.random;
  const maxR = (game.rep||0)>2600?5 : (game.rep||0)>1000?4 : 3;
  const pool=BREEDS.filter(b=>b.rarity>=3 && b.rarity<=maxR); const b=pool[Math.floor(rng()*pool.length)]||BREEDS.filter(x=>x.rarity>=3)[0];
  const sex=rng()<0.5?'mare':'stallion', age=10+Math.floor(rng()*14);
  const strong=base=>clamp(Math.round(base+6+rng()*10),8,100);
  const h=mkHorse({breed:b.id,sex,age,rng,purebred:true,generation:1,
    speed:strong(b.speed),stamina:strong(b.stamina),temperament:strong(b.temperament),health:98,happy:95});
  if(rng()<0.30){ h.coat={name:'Cremello',tier:2}; h.color='Cremello'; } // a flashy rare coat
  if(rng()<0.35){ h.wins=1+Math.floor(rng()*3); }                        // sometimes a proven winner
  const v=valueOf(h);
  const minInc=Math.max(20,Math.round(v*0.05));
  return { horse:h, value:v, minInc, start:Math.round(v*0.55), high:Math.round(v*0.55),
    bidder:'house', aiMax:Math.round(v*(0.95+rng()*0.45)) };
}
function makeAuctionLots(game,rng){ rng=rng||Math.random; const n=1+Math.floor(rng()*3); const out=[]; for(let i=0;i<n;i++) out.push(makeAuctionLot(game,rng)); return out; }
// after the player bids, the AI counter-bids one increment (never above its hidden ceiling), or drops out (null)
function aiCounter(lot,rng){ rng=rng||Math.random; if(!lot||lot.high>=lot.aiMax) return null; const next=lot.high+lot.minInc; if(next>lot.aiMax) return null; return next; }
// whoever holds the top bid when the hammer falls wins
function resolveAuction(lot){ return { winner:(lot&&lot.bidder==='you')?'you':'ai', price:lot?lot.high:0 }; }
// what an AI buyer pays when you consign your own horse — a chance above market for a great horse
function consignValue(h,game,rng){ rng=rng||Math.random; const v=valueOf(h);
  let f=0.9+rng()*0.4; if((h.wins||0)>=3) f+=0.12; if((coatOf(h).tier||0)>=2) f+=0.1; return Math.max(50,Math.round(v*f)); }

// ---------- Weather (deterministic per day, biased by season) ----------
const WEATHER=[
  {id:'sunny', name:'Sunny',  emoji:'☀️', canteen:1.12, feedExtra:0},
  {id:'cloudy',name:'Cloudy', emoji:'☁️', canteen:1.00, feedExtra:0},
  {id:'rain',  name:'Rainy',  emoji:'🌧️', canteen:0.85, feedExtra:0},
  {id:'snow',  name:'Snowy',  emoji:'❄️', canteen:0.80, feedExtra:1},
];
function weatherDef(id){ return WEATHER.find(w=>w.id===id)||WEATHER[1]; }
function hashDay(day){ let x=(Math.floor(day)*2654435761)>>>0; x^=x>>>15; x=Math.imul(x,2246822519)>>>0; x^=x>>>13; return x>>>0; }
function weatherFor(day){ const c=seasonOf(day).wx; const r=hashDay(day)%100; return r<c[0]?WEATHER[0] : r<c[1]?WEATHER[1] : r<c[2]?WEATHER[2] : WEATHER[3]; }
function canteenWeatherMult(day){ return weatherFor(day).canteen; }
function feedExtraFor(day){ return weatherFor(day).feedExtra + seasonOf(day).feedExtra; } // cold weather & winter both add hay
// ---------- Stable-yard clock / time-of-day (READ-ONLY presentational readout) ----------
// Maps the scene's within-day phase (0..1, where 0=midnight, 0.5=noon — the same value the sky uses)
// to a part-of-day + clock readout + a deterministic yard flavour line. Purely cosmetic; no gameplay.
const DAYPARTS=[
  {id:'night',     label:'Night',     emoji:'🌙', lo:0.00, hi:0.18},
  {id:'dawn',      label:'Dawn',      emoji:'🌅', lo:0.18, hi:0.28},
  {id:'morning',   label:'Morning',   emoji:'🌤️', lo:0.28, hi:0.42},
  {id:'noon',      label:'Midday',    emoji:'☀️', lo:0.42, hi:0.58},
  {id:'afternoon', label:'Afternoon', emoji:'🌇', lo:0.58, hi:0.72},
  {id:'dusk',      label:'Dusk',      emoji:'🌆', lo:0.72, hi:0.82},
  {id:'evening',   label:'Evening',   emoji:'🌃', lo:0.82, hi:0.92},
  {id:'night',     label:'Night',     emoji:'🌙', lo:0.92, hi:1.00},
];
function wrapPhase(p){ p=(typeof p==='number'&&isFinite(p))?p:0; p=p%1; if(p<0) p+=1; return p; }
function dayPartFor(phase){ const p=wrapPhase(phase); for(const d of DAYPARTS){ if(p>=d.lo && p<d.hi) return d; } return DAYPARTS[DAYPARTS.length-1]; }
function clockLabel(phase){ const p=wrapPhase(phase); const mins=Math.round(p*24*60)%(24*60), h=Math.floor(mins/60), m=mins%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
function clock12(phase){ const p=wrapPhase(phase); const mins=Math.round(p*24*60)%(24*60); let h=Math.floor(mins/60); const m=mins%60;
  const ap=h<12?'am':'pm'; let hh=h%12; if(hh===0) hh=12; return hh+':'+(m<10?'0':'')+m+' '+ap; }
const YARD_FLAVOURS={
  night:    ['The yard is dark and still; the horses doze in their stalls.','Only an owl and the night lantern keep watch over the barn.','A quiet, starlit night at the stables.'],
  dawn:     ['First light breaks over the paddock; the horses stir.','A cool, dewy dawn — the yard slowly wakes.','Birdsong and soft light as the stable rouses for the day.'],
  morning:  ['A busy morning of mucking out and turnout.','The yard bustles with feeds, grooming and morning rounds.','{weekday} morning at the stables, {weather} overhead.'],
  noon:     ['The sun is high; the horses graze in the midday warmth.','A bright midday — riders school in the arena.','The lunchtime lull, hay nets full under {weather} skies.'],
  afternoon:['A productive afternoon of training and chores.','The light softens as the afternoon wears on.','Afternoon rounds — a {weather} {weekday} at Skyhorse.'],
  dusk:     ['Golden dusk settles; the last horses come in from the field.','Long shadows stretch across the yard as evening nears.','A peaceful dusk, the {weather} sky fading to night.'],
  evening:  ['Evening feeds done; the barn winds down for the night.','Lanterns lit, the yard grows quiet and warm.','A calm evening settles over the stables.'],
};
function yardTimeFlavour(game, phase){ const d=dayPartFor(phase); const lines=YARD_FLAVOURS[d.id]||['A quiet moment at the yard.'];
  const day=Math.floor((game&&game.day)||1);
  let key=(day*13)>>>0; for(let k=0;k<d.id.length;k++) key=(Math.imul(key,31)+d.id.charCodeAt(k))>>>0;
  const line=lines[hashDay(key)%lines.length];
  return line.replace(/\{weekday\}/g, WEEKDAY_FULL[weekdayIndex(day)]).replace(/\{weather\}/g, weatherFor(day).name.toLowerCase()); }
function yardClock(game, phase){ const p=wrapPhase(phase), d=dayPartFor(p);
  return { phase:p, part:d.id, label:d.label, emoji:d.emoji, time:clockLabel(p), time12:clock12(p), flavour:yardTimeFlavour(game,p) }; }

// ---------- Weather & season forecast / almanac (READ-ONLY look-ahead, fully derived from game.day) ----------
// A deterministic outlook over the season/weekday calendar, weather (weatherFor is hashDay-deterministic)
// and every scheduled event (festival, fair window, auction, market/hay/show days, season finale). No state change.
function dayForecast(game, day){
  day=Math.floor(day||1);
  const season=seasonOf(day), sd=seasonDay(day), wd=weekdayIndex(day), sched=scheduleFor(day), wx=weatherFor(day);
  const events=[];
  const fest=festivalOn(day); if(fest) events.push({type:'festival', id:fest.id, name:fest.name, emoji:fest.emoji});
  const fair=(typeof fairFor==='function')?fairFor(day):null; if(fair) events.push({type:'fair', id:fair.id, name:fair.name, emoji:fair.emoji});
  if(isAuctionDay(day)) events.push({type:'auction', name:'Auction House', emoji:'🔨'});
  if(isMarketDay(day)) events.push({type:'market', name:'Market Day', emoji:'🛒'});
  if(isHayDay(day)) events.push({type:'hay', name:'Hay Delivery', emoji:'🌾'});
  const shows=showsToday(day); if(shows.length) events.push({type:'shows', name:sched.label, emoji:sched.emoji, shows:shows.slice()});
  if(sd===SEASON_LEN) events.push({type:'championship', name:season.name+' Championship finale', emoji:'🏆'});
  return { day, season:{id:season.id, name:season.name, emoji:season.emoji}, seasonDay:sd, year:yearOf(day),
    weekday:WEEKDAYS[wd], weekdayFull:WEEKDAY_FULL[wd], weather:{id:wx.id, name:wx.name, emoji:wx.emoji},
    scheduleLabel:sched.label, scheduleEmoji:sched.emoji, events };
}
function forecast(game, days){ const start=(game&&game.day)||1, n=Math.max(1, Math.min(60, days||10)), out=[];
  for(let i=0;i<n;i++) out.push(dayForecast(game, start+i)); return out; }
// the next occurrence of each planning-worthy event (festival/fair/auction/championship) within a window
function upcomingEvents(game, withinDays){ const start=(game&&game.day)||1, within=Math.min(SEASON_LEN*4, withinDays||(SEASON_LEN*2)), out=[], seen={};
  for(let i=0;i<=within;i++){ const day=start+i, f=dayForecast(game, day);
    for(const e of f.events){ if(e.type==='shows'||e.type==='market'||e.type==='hay') continue; // headline events only
      const key=e.type+':'+(e.id||e.name); if(seen[key]) continue; seen[key]=1; out.push({inDays:i, day, type:e.type, name:e.name, emoji:e.emoji}); } }
  return out.sort((a,b)=>a.inDays-b.inDays); }
// the current season's climate band + its planning modifiers + what's coming
function seasonAlmanac(game){ const day=(game&&game.day)||1, s=seasonOf(day), sd=seasonDay(day);
  const mods=[];
  if(s.breedFeeMul!==1) mods.push({label:'Breeding fees', value:(s.breedFeeMul<1?'':'+')+Math.round((s.breedFeeMul-1)*100)+'%', good:s.breedFeeMul<1});
  if(s.showPrizeMul!==1) mods.push({label:'Show prizes', value:'+'+Math.round((s.showPrizeMul-1)*100)+'%', good:s.showPrizeMul>1});
  if(s.hayMul!==1) mods.push({label:'Hay price', value:(s.hayMul<1?'':'+')+Math.round((s.hayMul-1)*100)+'%', good:s.hayMul<1});
  if(s.canteenMul!==1) mods.push({label:'Canteen trade', value:(s.canteenMul>1?'+':'')+Math.round((s.canteenMul-1)*100)+'%', good:s.canteenMul>1});
  if(s.marketBonus) mods.push({label:'Market stock', value:'+'+s.marketBonus, good:true});
  if(s.gestationAdj) mods.push({label:'Gestation', value:s.gestationAdj+'d', good:s.gestationAdj<0});
  if(s.feedExtra) mods.push({label:'Feed use', value:'+'+s.feedExtra+'/horse', good:false});
  return { season:{id:s.id, name:s.name, emoji:s.emoji, note:s.note}, seasonDay:sd, seasonLen:SEASON_LEN,
    daysLeft:SEASON_LEN-sd+1, year:yearOf(day), wxBand:s.wx.slice(), modifiers:mods, upcoming:upcomingEvents(game, SEASON_LEN) };
}

// ---------- Stable notice-board / regional gossip feed (READ-ONLY flavour headlines, keyed to game.day) ----------
// A deterministic feed of short headlines about the region — rival ranch news derived from the live
// standings, upcoming headline events from the forecast, weather chatter and the player's own standing.
// Every line is derived from EXISTING state via hashDay(game.day); nothing here mutates the game.
const GOSSIP_TEMPLATES={
  race:     ['{name} thunder to another win on the flat.','Word is {name} have a flashy new speed prospect in training.','{name} post the fastest gallop times in the county this week.'],
  jump:     ['{name} sweep the jump-offs at the regional show.','{name} unveil a bold new course at their yard.','Clear rounds all day for {name} over the poles.'],
  dressage: ['{name} score another elegant test up the centre line.','Judges praise the polish of the {name} string.','{name} host a packed dressage clinic this week.'],
  halter:   ['{name} take best-in-show with a flawless turnout.','A rare coat from {name} is turning heads in the show ring.','{name} groom their halter horses to a mirror shine.'],
  endurance:['{name} finish first over the long trail again.','{name} riders log record miles across the hills.','Steady and tireless, {name} own the endurance route.'],
};
const WEATHER_CHATTER={
  sunny: ['Fine sunny spells have the paddocks buzzing with turnout.','Riders across the region make the most of the bright weather.'],
  cloudy:['A grey, still day — good schooling weather, say the trainers.','Cloud cover keeps the yards cool for a day of chores.'],
  rain:  ['Rain softens the going; cross-country plans are on hold.','Wet weather keeps most horses in — hay nets all round.'],
  snow:  ['Snow blankets the region; yards double up on winter feed.','A frosty morning — every trough needs breaking before feeds.'],
};
// a deterministic discipline boast for one rival on a given day
function rivalBoast(rv, day){ if(!rv) return ''; day=Math.floor(day||1);
  const lines=GOSSIP_TEMPLATES[rv.disc]||['{name} keep busy at their yard.'];
  return lines[hashDay(day+rv.seed)%lines.length].replace(/\{name\}/g, rv.name); }
// a deterministic weather-chatter line for the day
function weatherChatter(day){ day=Math.floor(day||1); const wx=weatherFor(day);
  const lines=WEATHER_CHATTER[wx.id]||['Changeable skies over the region.'];
  return lines[hashDay(day*7+3)%lines.length]; }
// rival-focused headlines derived from the LIVE standings (leader, a featured boast, the ranch just ahead)
function rivalGossip(game){
  const day=Math.floor((game&&game.day)||1), rows=standings(game), out=[];
  const leader=rows[0];
  if(leader && !leader.isPlayer) out.push({kind:'rival', emoji:leader.emoji, text:leader.name+' top the regional standings this week.'});
  const rv=RIVALS[hashDay(day)%RIVALS.length]; // a deterministically-featured rival rotates by day
  out.push({kind:'rival', emoji:rv.emoji, text:rivalBoast(rv, day)});
  const meIdx=rows.findIndex(r=>r.isPlayer);
  if(meIdx>0){ const ahead=rows[meIdx-1]; if(ahead && !ahead.isPlayer)
    out.push({kind:'rival', emoji:ahead.emoji, text:ahead.name+' sit just ahead of you at #'+ahead.rank+'.'}); }
  return out;
}
// a headline about the player's own standing in the region
function standingHeadline(game){ const pr=playerRank(game), n=rivalCount()+1, ranch=ranchName(game);
  if(pr===1) return {kind:'you', emoji:'👑', text:ranch+' lead the region — the ranch to beat!'};
  if(pr<=3) return {kind:'you', emoji:'⭐', text:ranch+' hold a proud #'+pr+' of '+n+' in the standings.'};
  return {kind:'you', emoji:'🐴', text:ranch+' sit #'+pr+' of '+n+' — plenty of room to climb.'}; }
// the full ordered notice-board feed: dateline + your standing + rival gossip + upcoming events + weather
function noticeBoard(game){
  const day=Math.floor((game&&game.day)||1), s=seasonOf(day), out=[];
  out.push({kind:'season', emoji:s.emoji, text:WEEKDAY_FULL[weekdayIndex(day)]+' in '+s.name+', Year '+yearOf(day)+', at '+ranchName(game)+'.'});
  out.push(standingHeadline(game));
  for(const r of rivalGossip(game)) out.push(r);
  const up=upcomingEvents(game, SEASON_LEN).slice(0,2);
  for(const e of up){ const when=e.inDays===0?'today':e.inDays===1?'tomorrow':('in '+e.inDays+' days');
    out.push({kind:'event', emoji:e.emoji, text:e.name+' '+when+'.'}); }
  out.push({kind:'weather', emoji:weatherFor(day).emoji, text:weatherChatter(day)});
  return out;
}
// just the headline strings, optionally capped to the first `count`
function regionHeadlines(game, count){ const feed=noticeBoard(game);
  const n=(count==null)?feed.length:Math.max(1, Math.min(feed.length, count));
  return feed.slice(0,n).map(x=>x.text); }

// ---------- Ranch newsletter / weekly recap (READ-ONLY "this week at the ranch" gazette) ----------
// Aggregates the week's activity from EXISTING data. Exact week-over-week deltas come from a tiny weekly
// baseline snapshot (game.weekly) rolled at each week boundary in advanceDay; the recap itself never mutates.
function weeklyBaseline(game){ const s=(game&&game.stats)||{};
  return { day:(game&&game.day)||1, money:(game&&game.money)||0, rep:(game&&game.rep)||0,
    goldEarned:s.goldEarned||0, born:s.born||0, showWins:s.showWins||0, ceremonies:s.ceremonies||0,
    grudgeWins:s.grudgeWins||0, sold:s.sold||0, bestSale:s.bestSale||0,
    achievements:((game&&game.achievements)||[]).length }; }
// snapshot this week's baseline when the week changes (called from advanceDay). Returns true if it rolled.
function rollWeeklyStats(game){ if(!game) return false; const wk=weekOf(game.day||1);
  if(!game.weekly||typeof game.weekly!=='object'||game.weekly.week!==wk){ game.weekly={ week:wk, start:weeklyBaseline(game) }; return true; }
  return false; }
function recapHeadlineFor(st){
  if((st.wins||0)>=3) return 'A triumphant week in the show ring!';
  if((st.foals||0)>=2) return 'New life fills the foaling barn.';
  if((st.gold||0)>=1500) return 'The coffers are overflowing.';
  if((st.ceremonies||0)>=1) return 'A young horse comes of age.';
  if((st.wins||0)>=1) return 'Ribbons on the wall this week.';
  if((st.foals||0)>=1) return 'A new foal on the ground.';
  if((st.gold||0)>=400) return 'A tidy week of trade.';
  return 'Another week of quiet ranch life at the stables.';
}
function weeklyRecap(game){
  const day=(game&&game.day)||1, wk=weekOf(day), s=(game&&game.stats)||{};
  const base=(game&&game.weekly&&game.weekly.week===wk&&game.weekly.start)?game.weekly.start
    :{ goldEarned:0, born:0, showWins:0, ceremonies:0, grudgeWins:0, rep:(game&&game.rep)||0, achievements:((game&&game.achievements)||[]).length };
  const weekStartDay=(wk-1)*7+1, weekEndDay=wk*7;
  const trs=((game&&game.trophies)||[]).filter(t=>t && t.day>=weekStartDay && t.day<=day);
  const st={
    gold:Math.max(0,(s.goldEarned||0)-(base.goldEarned||0)),
    foals:Math.max(0,(s.born||0)-(base.born||0)),
    wins:Math.max(0,(s.showWins||0)-(base.showWins||0)),
    repGain:Math.max(0,((game&&game.rep)||0)-(base.rep||0)),
    ceremonies:Math.max(0,(s.ceremonies||0)-(base.ceremonies||0)),
    grudgeWins:Math.max(0,(s.grudgeWins||0)-(base.grudgeWins||0)),
    newAchievements:Math.max(0,((game&&game.achievements)||[]).length-(base.achievements||0)),
  };
  const top=((game&&game.horses)||[]).slice().sort((a,b)=>overall(b)-overall(a))[0]||null;
  return {
    week:wk, day, weekStartDay, weekEndDay, season:seasonOf(day).name, seasonEmoji:seasonOf(day).emoji, ranch:ranchName(game),
    stats:st,
    trophies:{ gold:trs.filter(t=>t.place===1).length, silver:trs.filter(t=>t.place===2).length, bronze:trs.filter(t=>t.place===3).length, list:trs.slice(0,6) },
    topHorse: top?{ id:top.id, name:top.name, overall:overall(top), breedName:(breedDef(top.breed)||{name:top.breed}).name }:null,
    rank: (typeof playerRank==='function')?playerRank(game):null,
    upcoming: (typeof upcomingEvents==='function')?upcomingEvents(game, 7):[],
    headline: recapHeadlineFor(st),
  };
}
function recapHeadlines(game){
  const r=weeklyRecap(game), out=[], st=r.stats;
  if(r.trophies.gold) out.push({emoji:'🥇', text:r.trophies.gold+' show win'+(r.trophies.gold!==1?'s':'')+' this week!'});
  if(st.foals) out.push({emoji:'🐣', text:st.foals+' foal'+(st.foals!==1?'s':'')+' born.'});
  if(st.gold) out.push({emoji:'🪙', text:'Earned '+st.gold+' coins.'});
  if(st.grudgeWins) out.push({emoji:'⚔️', text:st.grudgeWins+' grudge match'+(st.grudgeWins!==1?'es':'')+' won.'});
  if(st.ceremonies) out.push({emoji:'🎓', text:st.ceremonies+' coming-of-age ceremon'+(st.ceremonies!==1?'ies':'y')+' held.'});
  if(st.newAchievements) out.push({emoji:'🏆', text:st.newAchievements+' new achievement'+(st.newAchievements!==1?'s':'')+' unlocked.'});
  if(r.trophies.silver||r.trophies.bronze) out.push({emoji:'🎗️', text:(r.trophies.silver+r.trophies.bronze)+' podium place'+((r.trophies.silver+r.trophies.bronze)!==1?'s':'')+'.'});
  if(st.repGain) out.push({emoji:'⭐', text:'+'+st.repGain+' reputation.'});
  if(!out.length) out.push({emoji:'🌿', text:'A quiet, steady week — grooming, grazing and planning ahead.'});
  return out;
}

// ---------- Fresh game ----------
// ---------- New Game+ / Prestige (Legacy) ----------
// An optional late-game "retire the ranch" that banks persistent Legacy points
// (kept separately from the ranch save). Legacy grants small, capped permanent
// perks on future runs — a New Game+ loop. Purely opt-in and gated behind a
// well-established ranch. All bounded so it never runs away.
const PRESTIGE_REP=2200;   // Master Breeder rank
function normLegacy(l){ l=l||{}; return {points:Math.max(0,Math.floor(l.points||0)), resets:Math.max(0,Math.floor(l.resets||0))}; }
// projected Legacy points this run would bank — diminishing (sqrt) in every input, so bounded & monotonic
function legacyPointsFor(game){
  if(!game) return 0;
  const rep=game.rep||0, pres=game.prestige||0, hof=(game.hallOfFame||[]).length,
        best=(game.stats&&game.stats.bestOVR)||0, wins=(game.stats&&game.stats.showWins)||0;
  const p = Math.sqrt(rep)/3 + Math.sqrt(pres)*1.2 + hof*2 + Math.max(0,best-50)*0.3 + Math.sqrt(wins)*1.5;
  return Math.max(0, Math.floor(p));
}
function legacyLevel(legacy){ return Math.floor(Math.sqrt(((legacy&&legacy.points)||0)/25)); } // 25→L1, 100→L2, 225→L3…
// permanent, CAPPED bonuses from banked Legacy points
function legacyBonus(legacy, kind){
  const p=(legacy&&legacy.points)||0;
  if(kind==='showPrize')  return 1 + Math.min(0.40, p*0.0016);       // up to +40% show prize (~250 pts)
  if(kind==='startCoins') return Math.min(15000, Math.round(p*30));  // up to +🪙15,000 starting (~500 pts)
  if(kind==='startFeed')  return Math.min(200, Math.round(p*0.5));   // up to +200 hay starting (~400 pts)
  return 0;
}
function canPrestige(game){ return !!game && (game.rep||0)>=PRESTIGE_REP && ((game.hallOfFame||[]).length)>=1; }
// perform a prestige: bank this run's Legacy and return a fresh ranch seeded with the new total
function applyPrestige(game, legacy){
  const cur=normLegacy(legacy||(game&&game.legacy));
  const gain=legacyPointsFor(game);
  return freshGame({points:cur.points+gain, resets:cur.resets+1});
}

// ---------- Daily login streak rewards (real-world days; pure logic is stamp-driven) ----------
// The DOM supplies a real calendar-day stamp (e.g. floor(Date.now()/86400000)); these
// functions never touch Date, so they stay deterministic + testable. Bounded, non-punishing:
// missing a day just resets the streak. State persists in a separate store (survives prestige).
const DAILY_CYCLE=7;
function normDaily(d){ d=d||{}; return {last:(typeof d.last==='number'&&isFinite(d.last))?Math.floor(d.last):null, streak:Math.max(0,Math.floor(d.streak||0)), longest:Math.max(0,Math.floor(d.longest||0))}; }
function isNewDay(lastStamp, todayStamp){ return lastStamp==null || todayStamp>lastStamp; }
function streakAfter(prevStreak, lastStamp, todayStamp){
  if(lastStamp==null) return 1;                                 // first ever claim
  if(todayStamp<=lastStamp) return Math.max(1,prevStreak||1);   // already claimed today → unchanged
  if(todayStamp===lastStamp+1) return (prevStreak||0)+1;        // consecutive day → grows
  return 1;                                                     // a gap → streak resets (no penalty)
}
// bounded, gently-scaling reward with a weekly milestone bump
function dailyReward(streak){
  const s=Math.max(1,Math.floor(streak||1)), step=Math.min(s,14);
  let money=Math.min(800, 120+step*45), feed=Math.min(50, 8+step*3), rep=Math.min(15, 2+Math.floor(step/2));
  const milestone=(s%DAILY_CYCLE===0);
  if(milestone){ money=Math.min(1500,money+500); feed=Math.min(90,feed+40); rep=Math.min(30,rep+10); }
  return {money, feed, rep, milestone};
}
// a non-mutating view for the UI
function dailyState(state, todayStamp){ const d=normDaily(state);
  const claimable=isNewDay(d.last, todayStamp);
  const nextStreak=claimable?streakAfter(d.streak,d.last,todayStamp):Math.max(1,d.streak||1);
  return {last:d.last, streak:d.streak, longest:d.longest, claimable, nextStreak, reward:dailyReward(nextStreak)}; }
// claim today's reward (mutates a copy + returns it). The caller applies the reward to the game.
function claimDaily(state, todayStamp){ const d=normDaily(state);
  if(!isNewDay(d.last, todayStamp)) return {claimed:false, streak:d.streak, state:d};
  const streak=streakAfter(d.streak, d.last, todayStamp), reward=dailyReward(streak);
  d.streak=streak; d.last=todayStamp; d.longest=Math.max(d.longest, streak);
  return {claimed:true, reward, streak, milestone:reward.milestone, state:d}; }

// tiny deterministic rng so a fresh game is identical every load (nice for tutorial + tests)
function seededOnce(seed){ let s=seed>>>0; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

// ---------- Daily simulation ----------
function advanceDay(game,rng){
  rng=rng||Math.random;
  const money0=game.money; // for lifetime gold-earned tracking
  // settle the day that's ending: a full chore clear pays a small bonus & extends the streak
  const choreResult=resolveDailyChores(game, game.day);
  game.day++; game.stats.days++;
  tickGarden(game); // hay meadow grows a little each day (season-aware; dormant in winter)
  tickSmith(game); // fresh race shoes wear down over a few days
  const notes=[];
  // roll the weekly-recap baseline at the start of a new week, and nudge a fresh gazette issue
  if(rollWeeklyStats(game) && game.day>1) notes.push({t:'info',m:'📰 A new issue of the Skyhorse Gazette is out — see last week’s recap.'});
  if(choreResult.awarded){ const b=choreResult.bonus, bits=['🪙'+b.money, b.rep+'⭐']; if(b.feed) bits.push('🌾'+b.feed);
    notes.push({t:'good',m:'✅ All chores done! Streak '+choreResult.streak+' · +'+bits.join(' +')}); }

  // farrier & vet appointments booked for today resolve now (before care decay)
  { const done=resolveAppointments(game, game.day);
    for(const r of done) notes.push({t:'good',m:r.emoji+' '+r.name+'’s '+appointmentTypeDef(r.type).name.toLowerCase()+' visit went well.'}); }

  // a seasonal fair opening today gets a headline announcement
  { const f=fairFor(game.day); if(f && !fairFor(game.day-1)) notes.push({t:'good',m:f.emoji+' The '+f.name+' has begun! '+f.theme+' Complete its objective for a reward.'}); }

  // horses away in the trailer return today with their trip reward
  { const arrivals=resolveTrips(game, game.day);
    for(const a of arrivals){ const rw=a.reward||{}; const bits=[]; if(rw.money) bits.push('🪙'+rw.money); if(rw.rep) bits.push(rw.rep+'⭐');
      notes.push({t:'good',m:a.trip.emoji+' '+a.horse.name+' is back from the '+a.trip.name+' — '+a.reward.note+(bits.length?' (+'+bits.join(' +')+')':'')+'.'}); } }

  // stud-directory bookings that mature today pay their fee
  { const covers=resolveStudBookings(game, game.day);
    for(const c of covers) notes.push({t:'good',m:'♞ '+c.stallionName+' covered '+c.mareName+' — stud fee 🪙'+fmt(c.fee)+'.'}); }

  // feed consumption
  let need=0; for(const h of game.horses) need+=feedPerDay(h);
  need += game.boarders*2; // boarders eat too (you supply the hay)
  need += (game.horses.length+game.boarders)*feedExtraFor(game.day); // cold weather = extra hay
  need = Math.round(need*staffEffect(game,'feedMult')); // a Groundskeeper trims hay use
  if(game.feed>=need){
    game.feed-=need;
    for(const h of game.horses){ h.happy=clamp(h.happy+3,0,100); if(h.happy>70) h.health=clamp(h.health+2,0,100); }
  } else {
    game.feed=0;
    for(const h of game.horses){ h.happy=clamp(h.happy-14,0,100); h.health=clamp(h.health-6,0,100); }
    notes.push({t:'bad',m:'🌾 Out of feed! Your horses are hungry.'});
  }

  // staff: a Stable Hand runs the free routine each morning (before decay)
  if(staffEffect(game,'autoRoutine')) applyDailyRoutine(game);
  const staffTop=staffEffect(game,'careTopUp'), staffHeal=staffEffect(game,'vetHeal');
  const enrichBonus=enrichmentBonus(game);
  const mascotP=mascotPerk(game);

  // age + growth + pregnancy + rent
  const born=[];
  for(const h of game.horses){
    h.age++; h.trains=0; // fresh training energy each day
    { const ms=checkFoalMilestone(h); if(ms) notes.push({t:'good',m:ms.emoji+' '+h.name+' reached '+ms.name+' — hold a ceremony to celebrate!'}); } // coming-of-age milestone
    // daily care needs decay; neglect drags mood/health, a pampered horse gets a small lift
    decayNeeds(game,h);
    // staff chores: a Groom tops up care needs, a Vet heals a little (bounded — not free full care)
    if(staffTop>0){ needsInit(h); for(const id of NEED_IDS) h.needs[id]=clamp(h.needs[id]+staffTop,0,100); }
    if(staffHeal>0) h.health=clamp(h.health+staffHeal,0,100);
    // paddock enrichment: a small, hard-capped daily lift to the whole herd
    if(enrichBonus.items){ needsInit(h);
      if(enrichBonus.needLift>0) for(const id of NEED_IDS) h.needs[id]=clamp(h.needs[id]+enrichBonus.needLift,0,100);
      if(enrichBonus.happy>0) h.happy=clamp(h.happy+enrichBonus.happy,0,100);
      if(enrichBonus.bond>0) h.bond=clamp(h.bond+enrichBonus.bond,0,100); }
    // stable mascot: at most one tiny, hard-capped daily perk to the whole herd
    if(mascotP.happy||mascotP.care||mascotP.bond){ needsInit(h);
      if(mascotP.care>0) for(const id of NEED_IDS) h.needs[id]=clamp(h.needs[id]+mascotP.care,0,100);
      if(mascotP.happy>0) h.happy=clamp(h.happy+mascotP.happy,0,100);
      if(mascotP.bond>0) h.bond=clamp(h.bond+mascotP.bond,0,100); }
    { const cs=careScore(h);
      if(cs<35){ h.happy=clamp(h.happy-5,0,100); h.health=clamp(h.health-2,0,100); }
      else if(cs>=80){ h.happy=clamp(h.happy+2,0,100); } }
    if(h.rentDays>0){ h.rentDays--; if(h.rentDays===0){ h.happy=clamp(h.happy-6,0,100);} }
    if(h.pregnant){
      h.gestation--;
      if(h.gestation<=0){
        h.pregnant=false;
        const sire = h._sire || {breed:h.sireBreed||h.breed,speed:h._sireSpeed||h.speed,stamina:h._sireStam||h.stamina,temperament:h._sireTemp||h.temperament,generation:h._sireGen||1,sex:'stallion',name:'Unknown Sire',genes:h.genes,ped:null};
        const foal=breedFoal(h, sire, rng);
        foal.name=pickNameFrom(activeNamePack(game), foal.sex, rng); // foals are named from the active pack
        foal.stable=h.stable;
        if(game.breedGoal && foalMeetsGoal(foal, game.breedGoal)){ game.stats.goalsMet=(game.stats.goalsMet||0)+1; foal._metGoal=game.breedGoal; }
        awardBreederPoints(game, foal, {mare:h, sire}); // breeder's-prestige points for this bloodline event
        born.push(foal);
      }
    }
  }
  // place newborns if room, else auto-sell
  for(const f of born){
    game.stats.maxGen=Math.max(game.stats.maxGen||1, f.generation);
    const newBreed=!codexHasBreed(game,f.breed); // first of its breed? (check before registering)
    if(freeStalls(game)>0){ game.horses.push(f); game.stats.born++; registerHorse(game,f);
      notes.push({t:'good',m:'🐣 A '+breedDef(f.breed).name+' foal was born: '+f.name+'!'});
      // scrapbook: remember standout foals (only observes — never changes the foal)
      if(f.rare) captureMoment(game,'champion',f);
      else if((coatOf(f).tier||0)>=2) captureMoment(game,'rarecoat',f);
      else if(newBreed) captureMoment(game,'firstbreed',f);
    } else {
      const q=sellQuote(f); game.money+=q; game.rep+=2;
      notes.push({t:'info',m:'🐣 '+f.name+' was born but the stalls are full — sold for 🪙'+q+'.'});
    }
  }

  // peaceful passing of the very old — long warning first (elderly from OLD_AGE), then a gentle end
  const gone=game.horses.filter(h=>(h.age||0)>=LIFESPAN && h.rentDays===0 && !horseAway(h) && !h.pregnant && rng()<0.10);
  for(const h of gone){
    const rec=hofRecord(h,'passed',game.day);
    game.horses=game.horses.filter(x=>x.id!==h.id);
    inductHof(game,rec);
    notes.push({t:'info',m:'🕊️ '+h.name+' passed peacefully after a long life and enters the Hall of Fame.'});
  }

  // a gentle, once-a-day nudge if some horses are being neglected (never spammy)
  { const neg=game.horses.filter(h=>careScore(h)<34);
    if(neg.length) notes.push({t:'info',m:'🧡 '+(neg.length===1?neg[0].name+' needs':neg.length+' horses need')+' some care — visit the 🧡 Care panel or run the daily routine.'}); }

  // boarding income
  if(game.boarders>0){ const inc=game.boarders*boardRatePerStall(game); game.money+=inc; }

  // rent income (paid daily while out)
  for(const h of game.horses){ if(h.rentDays>0){ game.money+=h.rentRate; } }

  // canteen income + riding-school net (lesson fees minus teacher salaries)
  // — both get a weekday boost on busy days (e.g. Family Sunday).
  if(canteenLevel(game)>0) game.money+=Math.round(canteenIncome(game)*canteenDayMult(game.day)*canteenWeatherMult(game.day)*seasonCanteenMul(game.day)*festivalMod(game.day,'canteenMul',1));
  if(teacherCount(game)>0){
    const served=lessonsPerDay(game);
    game.money += Math.round(schoolIncome(game)*lessonDayMult(game.day)) - teacherSalaries(game);
    game.stats.lessons=(game.stats.lessons||0)+served;
    game.rep += Math.min(3, Math.floor(served/3)); // a busy school builds reputation
  }
  // stable staff wages (daily coin sink; only if you've hired anyone)
  { const pay=staffPayroll(game); if(pay>0){ game.money-=pay; game.stats.staffWages=(game.stats.staffWages||0)+pay; } }
  // retired horses in the pasture draw a small, capped stream of admiring visitors
  { const pb=pastureRepBonus(game); if(pb>0) game.rep+=pb; }
  // stable mascot rep appeal (a tiny, capped daily draw — e.g. the barn owl the visitors love)
  { if(mascotP.rep>0) game.rep+=mascotP.rep; }
  // insurance premiums (daily coin sink; only if you hold a policy)
  { const prem=insurancePremium(game); if(prem>0){ game.money-=prem; game.stats.insurancePremiums=(game.stats.insurancePremiums||0)+prem; } }
  // stud fees — visiting mares pay to breed with your at-stud stallions (no foals in your stalls)
  { const si=studIncome(game); if(si>0){ game.money+=si; game.stats.studIncome=(game.stats.studIncome||0)+si; } }

  // Market Day (weekly): fresh horses & teacher applicants arrive
  if(isMarketDay(game.day)){ restockMarket(game,rng); restockTeachers(game,rng);
    notes.push({t:'info',m:'🛒 Market Day! Fresh horses and teachers have arrived.'}); }

  // rotating Featured listing (weekly) + wishlist alert when a match appears
  refreshFeatured(game);
  { const m=wishlistMatches(game); if(m>0 && isMarketDay(game.day)) notes.push({t:'good',m:'⭐ A horse on your wishlist is available — check the Market!'}); }

  // weekly contracts board — refreshes when the week rolls over
  { const hadWeek=game.board&&game.board.week; refreshBoard(game);
    if(hadWeek!=null && hadWeek!==game.board.week) notes.push({t:'info',m:'📋 New contracts are posted on the notice board!'}); }

  // seasonal championship — crown the season leader when the season rolls over
  { ensureChamp(game);
    if(game.champ.season!==seasonIndex(game.day)){
      const award=closeSeason(game);
      if(award) notes.push({t:'good',m:'🏆 '+award.champ.name+' is crowned '+award.champ.seasonName+' Champion! +🪙'+award.prize+' +'+award.rep+'⭐'});
      else notes.push({t:'info',m:'🏆 A new championship season has begun — enter shows to score points!'});
    } }

  // seasonal festival! (deterministic, pre-announced)
  const fest=festivalOn(game.day);
  if(fest){
    const md=fest.mods||{};
    if(md.hayGift) game.feed+=md.hayGift;
    if(md.repBoon) game.rep+=md.repBoon;
    if(md.happyBoon) for(const h of game.horses) h.happy=clamp(h.happy+md.happyBoon,0,100);
    if(md.marketRareBoost) restockMarket(game,rng,{rareBoost:true,bonus:md.marketBonus||0});
    game.stats.festivals=(game.stats.festivals||0)+1;
  } else if(festivalOn(game.day+1)){
    const f2=festivalOn(game.day+1); notes.push({t:'info',m:f2.emoji+' '+f2.name+' is tomorrow — get ready!'});
  }

  // random event (~18% per day once past day 2) — festivals take the spotlight instead
  let event=null;
  if(fest) event={id:'festival', fest};
  else if(game.day>2 && rng()<0.18) event=rollEvent(game,rng);

  // occasional seasonal disaster (bounded; insurance softens the hit) — never on a festival day
  if(!fest){ const dis=rollDisaster(game,rng);
    if(dis){ const r=applyDisaster(game,dis,rng);
      notes.push({t:'bad',m:dis.emoji+' '+dis.name+' — '+dis.desc+'! −🪙'+r.net+(r.covered>0?' (insurance saved 🪙'+r.covered+')':'')}); } }

  // lifetime stats: gross gold earned overnight + best overall horse ever
  if(game.money>money0) game.stats.goldEarned=(game.stats.goldEarned||0)+(game.money-money0);
  for(const h of game.horses) game.stats.bestOVR=Math.max(game.stats.bestOVR||0, overall(h));
  syncRegistry(game); // keep the studbook up to date with the current herd

  // regional leaderboard: refresh the player's rank (movement arrows), announce climbs to the top
  { const before=game.lastRank; const pr=tickStandings(game);
    if(before!=null && pr<before && pr<=3) notes.push({t:'good',m:'📈 '+ranchName(game)+' climbed to #'+pr+' in the regional standings!'});
    if(before!=null && before!==1 && pr===1) notes.push({t:'good',m:'👑 '+ranchName(game)+' is now the #1 ranch in the region!'}); }

  // commemorative monuments: stamp any milestone reached today (a keepsake + a tiny one-time rep nod)
  { const fresh=checkMonuments(game); for(const mon of fresh) notes.push({t:'good',m:mon.emoji+' A new monument stands at '+ranchName(game)+': '+mon.name+'!'}); }

  return {notes,event,born};
}

function rollEvent(game,rng){
  const care=isCareDay(game.day), showDay=isShowDay(game.day);
  // 'show' invitations only turn up on show days; vet visits cluster on Vet & Farrier day
  const pool=EVENTS.filter(e=>game.day>=e.min && (e.id!=='show'||showDay));
  const weighted=[]; pool.forEach(e=>{ let w=e.weight;
    if(e.id==='vet'){ w=Math.max(0,Math.round(w*staffEffect(game,'vetChanceMult'))); if(care) w+=3; } // a Vet heads off call-outs
    else if(e.id==='show') w+=2;
    for(let i=0;i<w;i++) weighted.push(e); });
  if(!weighted.length) return null;
  const e=weighted[Math.floor(rng()*weighted.length)];
  if(e.id==='buyer'){
    const owned=game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!horseAway(h)&&!h.pregnant);
    if(!owned.length) return null;
    const h=owned[Math.floor(rng()*owned.length)];
    const offer=Math.round(sellQuote(h)*(1.3+rng()*0.5));
    return {id:'buyer',title:'💰 Premium Buyer',horse:h.id,offer,
      msg:'A wealthy buyer fell in love with <b>'+h.name+'</b> ('+breedDef(h.breed).name+') and offers <b>🪙'+offer+'</b> — well above market. Sell?'};
  }
  if(e.id==='hay'){ const up=rng()<0.5; return {id:'hay',up,
    msg: up?'☀️ A dry spell hit — hay prices are high this week.':'🌧️ A bumper harvest — hay is cheap this week!'}; }
  if(e.id==='show'){
    const owned=game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!horseAway(h));
    if(!owned.length) return null;
    return {id:'show',msg:'🏆 The county horse show is on! Enter a horse to compete for prize money and reputation.'};
  }
  if(e.id==='vet'){
    const sick=game.horses.filter(h=>h.health<95 && activeCareBuff(h,game.day).guard<=0); // a recent vet visit wards off the colic scare
    if(!sick.length) return null;
    const h=sick[Math.floor(rng()*sick.length)];
    const bill=Math.round(40+rng()*120);
    return {id:'vet',horse:h.id,bill,msg:'🩺 <b>'+h.name+'</b> came down with a mild colic. The vet can treat it for <b>🪙'+bill+'</b>. Pay up?'};
  }
  if(e.id==='gift'){ const amt=30+Math.floor(rng()*8)*10; return {id:'gift',amt,msg:'🎁 A neighbour thanks you for your help and drops off <b>'+amt+' bales of hay</b>!'}; }
  return null;
}

// ---------- Seasonal disasters + insurance (bounded setbacks you can protect against) ----------
// A rare adverse-event layer ON TOP of the existing weather/seasons. Every hit is small,
// capped and recoverable; buying an insurance policy softens the matching kind of loss.
const DISASTERS=[
  {id:'blizzard', name:'Blizzard',    emoji:'❄️', seasons:['winter'],                        weight:3, kind:'weather',  desc:'buried paddocks & emergency hay'},
  {id:'coldsnap', name:'Cold Snap',   emoji:'🥶', seasons:['winter'],                        weight:2, kind:'weather',  desc:'a hard frost chills the herd'},
  {id:'drought',  name:'Drought',     emoji:'🌵', seasons:['summer'],                        weight:3, kind:'weather',  desc:'water hauling & pricey hay'},
  {id:'heatwave', name:'Heatwave',    emoji:'🥵', seasons:['summer'],                        weight:2, kind:'health',   desc:'the heat saps the horses'},
  {id:'storm',    name:'Storm',       emoji:'⛈️', seasons:['spring','autumn'],               weight:3, kind:'property', desc:'wind damage to the barn'},
  {id:'colic',    name:'Colic Scare', emoji:'🩺', seasons:['spring','summer','autumn','winter'],weight:2, kind:'health', desc:'a horse takes ill'},
];
function disasterDef(id){ return DISASTERS.find(d=>d.id===id)||null; }
function disastersForSeason(seasonId){ return DISASTERS.filter(d=>d.seasons.indexOf(seasonId)>=0); }
const DISASTER_CHANCE=0.06; // ~6% per day once the ranch is established
function rollDisaster(game,rng){ rng=rng||Math.random;
  if((game.day||0)<=SEASON_LEN) return null;                 // grace period: no disasters in the first season
  if(rng()>=DISASTER_CHANCE) return null;
  const pool=disastersForSeason(seasonOf(game.day).id); if(!pool.length) return null;
  const weighted=[]; pool.forEach(d=>{ for(let i=0;i<d.weight;i++) weighted.push(d); });
  return weighted[Math.floor(rng()*weighted.length)]||null;
}
// apply a disaster (mutates game); insurance for its kind softens BOTH the coin loss and the stat dip.
function applyDisaster(game,dis,rng){ rng=rng||Math.random; if(!dis) return null;
  const herd=game.horses.length, frac=insuranceCovers(game,dis.kind), dip=b=>Math.max(0,Math.round(b*(1-frac)));
  let coin=0;
  switch(dis.id){
    case 'blizzard': coin=Math.min(400, 80+herd*28); for(const h of game.horses) h.happy=clamp(h.happy-dip(7),0,100); break;
    case 'coldsnap': coin=Math.min(250, 60+herd*18); for(const h of game.horses) h.happy=clamp(h.happy-dip(5),0,100); break;
    case 'drought':  coin=Math.min(350, 70+herd*22); for(const h of game.horses) h.happy=clamp(h.happy-dip(4),0,100); break;
    case 'heatwave': coin=Math.min(220, 60+herd*12); for(const h of game.horses) h.health=clamp(h.health-dip(7),0,100); break;
    case 'storm':    coin=Math.min(450, 150+herd*20); if(herd){ const h=game.horses[Math.floor(rng()*herd)]; h.health=clamp(h.health-dip(8),0,100); } break;
    case 'colic':    coin=Math.min(320, 120+herd*8);  if(herd){ const h=game.horses[Math.floor(rng()*herd)]; h.health=clamp(h.health-dip(12),0,100); } break;
    default: coin=100;
  }
  const ins=applyInsurance(game,dis.kind,coin);
  game.money-=ins.net; game.stats.disasterLosses=(game.stats.disasterLosses||0)+ins.net;
  if(ins.covered>0) game.stats.insurancePaid=(game.stats.insurancePaid||0)+ins.covered;
  game.stats.disasters=(game.stats.disasters||0)+1;
  return { id:dis.id, coin, net:ins.net, covered:ins.covered };
}
// ---- Insurance policies (a coin sink that caps disaster losses) ----
const INSURANCE=[
  {id:'vet',      name:'Vet Cover',     emoji:'🩺', kind:'health',   premium:12, cover:0.7, desc:'Covers 70% of illness, colic & heat costs.'},
  {id:'weather',  name:'Weather Cover', emoji:'⛈️', kind:'weather',  premium:10, cover:0.7, desc:'Softens blizzards, cold snaps & drought.'},
  {id:'property', name:'Barn Cover',    emoji:'🏚️', kind:'property', premium:10, cover:0.7, desc:'Reimburses 70% of storm & barn damage.'},
];
function insuranceDef(id){ return INSURANCE.find(p=>p.id===id)||null; }
function insuranceList(game){ return (game&&Array.isArray(game.insurance))?game.insurance:[]; }
function hasInsurance(game,id){ return insuranceList(game).indexOf(id)>=0; }
function insurancePremium(game){ return insuranceList(game).reduce((n,id)=>{ const p=insuranceDef(id); return n+(p?p.premium:0); },0); }
function insuranceCovers(game,kind){ let best=0; for(const id of insuranceList(game)){ const p=insuranceDef(id); if(p&&p.kind===kind) best=Math.max(best,p.cover); } return best; }
function buyInsurance(game,id){ const p=insuranceDef(id); if(!p) return {ok:false,why:'No such policy.'};
  if(!game.insurance) game.insurance=[];
  if(hasInsurance(game,id)) return {ok:false,why:'Already insured.'};
  game.insurance.push(id); return {ok:true,policy:p}; }
function cancelInsurance(game,id){ if(!game||!Array.isArray(game.insurance)) return {ok:false}; const had=hasInsurance(game,id); game.insurance=game.insurance.filter(x=>x!==id); return {ok:had}; }
// reduce a coin loss by the coverage fraction for its kind; returns {net, covered}
function applyInsurance(game,kind,loss){ const frac=insuranceCovers(game,kind); const covered=Math.round((loss||0)*frac); return {net:Math.max(0,(loss||0)-covered), covered}; }

// show competition scoring (legacy helper, kept for compatibility)
function showScore(h,rng){ return statAvg(h)*(0.85+ (rng?rng():Math.random())*0.4) + h.health*0.2; }

const COMP_TIERS=[
  {id:1, name:'Local Fair',            rep:0,    fee:40,  prize:[0,300,150,60,0],     repGain:[0,20,12,6,3],  fieldAvg:48, fieldSpread:16, rest:2},

function tierDef(id){ return COMP_TIERS.find(t=>t.id===id)||null; }
function tierUnlocked(game,tier){ return game.rep>=tier.rep; }

// ---------- Temperament & discipline affinity (a horse develops over time) ----------
// On top of the fixed inheritable TRAIT, each horse builds per-discipline AFFINITY the
// more you train & compete it in that discipline — so it specialises and earns a small,
// bounded aptitude bonus. Composure (mood) is a derived read of bonding + happiness + care.
const DISC_IDS=DISCIPLINES.map(d=>d.id);
const AFF_MAX=100;            // affinity points per discipline
const AFF_CAP=0.10;          // a fully-schooled horse gets +10% in its discipline (bounded)
const SPECIALIST_AT=60;      // affinity at which a horse "settles into" a speciality
const TRAIN_AFF_GAIN=6;      // schooling a stat feeds the disciplines that use it
const COMPETE_AFF_GAIN=7;    // competing in a discipline builds affinity for it
function affInit(h){ if(!h) return h; if(!h.aff||typeof h.aff!=='object') h.aff={};
  for(const id of DISC_IDS){ const v=h.aff[id]; h.aff[id]=(typeof v==='number'&&isFinite(v))?clamp(v,0,AFF_MAX):0; }
  return h; }
function affinity(h,discId){ if(!h) return 0; affInit(h); const v=h.aff[discId]; return typeof v==='number'?clamp(v,0,AFF_MAX):0; }
function gainAffinity(h,discId,amt){ if(!h||!disciplineDef(discId)) return 0; affInit(h);
  h.aff[discId]=clamp(h.aff[discId]+(amt||0),0,AFF_MAX); return h.aff[discId]; }
// a horse's schooling in a discipline gives a small, capped aptitude multiplier
function affinityMult(h,discId){ return 1 + AFF_CAP*(affinity(h,discId)/AFF_MAX); }
// the discipline a horse leans into most
function topAffinity(h){ affInit(h); let best=DISC_IDS[0], pts=affinity(h,best);
  for(const id of DISC_IDS){ const v=affinity(h,id); if(v>pts){ pts=v; best=id; } } return {id:best, pts}; }
function specialtyOf(h){ const t=topAffinity(h); return t.pts>=SPECIALIST_AT?t.id:null; } // null until settled
// composure/mood — a derived read of how settled & well-handled the horse is (0..100)
function composure(h){ if(!h) return 0; return clamp(Math.round(0.45*(h.bond||0)+0.35*(h.happy||0)+0.20*careScore(h)),0,100); }
function composureTier(h){ const c=composure(h);
  return c>=80?{id:'serene',label:'Serene',emoji:'🧘'} : c>=58?{id:'settled',label:'Settled',emoji:'🙂'}
       : c>=34?{id:'restless',label:'Restless',emoji:'😟'} : {id:'skittish',label:'Skittish',emoji:'😰'}; }
// a settled, well-bonded horse keeps its poise in the ring — a small, bounded readiness benefit
const BOND_POISE_CAP=0.05; // up to +5% from composure (bond+happy+care) — gentle & economy-safe
function bondPoiseMult(h){ return 1 + BOND_POISE_CAP*(composure(h)/100); }

// ---------- Bonding / groundwork mini-activities (build a relationship with a horse) ----------
// Short, optional handling sessions that raise the EXISTING h.bond & happy (feeding composure).
// Per-horse daily energy cap (un-farmable) + diminishing returns as bond nears the cap. No coins.
const BOND_CAP=100;
const BONDED_AT=70;            // matches the ❤ Bonded tag threshold
const GROUNDWORK_ENERGY=3;     // handling "energy" per horse per day
const GROUNDWORK_ACTIVITIES=[
  {id:'groom',    name:'Grooming',      emoji:'🧽', bond:5, happy:6, energy:1, desc:'A calm mutual grooming session — soothing and trust-building.'},
  {id:'handwalk', name:'Hand-Walk',     emoji:'🚶', bond:4, happy:4, energy:1, desc:'A quiet walk in-hand around the yard.'},
  {id:'desensit', name:'Desensitising', emoji:'🎈', bond:6, happy:2, energy:1, desc:'Tarps, flags & odd noises — builds a braver, calmer horse.'},
  {id:'roundpen', name:'Round-Pen',     emoji:'🔄', bond:8, happy:3, energy:2, desc:'Join-up groundwork — asks focus, earns real trust.'},
  {id:'liberty',  name:'Liberty Play',  emoji:'🎠', bond:7, happy:8, energy:2, desc:'Playful liberty work — joyful and connecting.'},
  {id:'trail',    name:'Trail Hack',    emoji:'🌲', bond:6, happy:7, energy:2, desc:'A relaxed hack down the trail together.'},
];
function groundworkActivityDef(id){ return GROUNDWORK_ACTIVITIES.find(a=>a.id===id)||null; }
function groundworkReset(h,day){ if(!h) return; if(h.gwDay!==day){ h.gwDay=day; h.gwEnergy=0; } }
function groundworkEnergyLeft(game,h,day){ if(!h) return 0; day=(day!=null?day:((game&&game.day)||1));
  const used=(h.gwDay===day)?(h.gwEnergy||0):0; return Math.max(0, GROUNDWORK_ENERGY-used); }
function canDoGroundwork(game,h,activityId,day){ const a=groundworkActivityDef(activityId); if(!a||!h) return false;
  return groundworkEnergyLeft(game,h,day)>=a.energy; }
function bondTier(h){ const b=(h&&h.bond)||0;
  return b>=90?{id:'devoted',label:'Devoted',emoji:'💖'} : b>=BONDED_AT?{id:'bonded',label:'Bonded',emoji:'❤'}
       : b>=40?{id:'warming',label:'Warming Up',emoji:'🙂'} : {id:'new',label:'Getting Acquainted',emoji:'👋'}; }
function bondLabel(h){ return bondTier(h).label; }
// ---------- Hoof-pick / grooming mini-game (a hands-on, BOUNDED, daily-capped way to top care) ----------
// A quick skill-timed round: the player's timing gives a 0..1 perf (the show-minigame scoring shape),
// which maps to a BOUNDED top-up of the horse's groom & hooves care needs plus a little happy/bond.
// Un-farmable via a per-horse daily energy cap (like groundwork). No coins, no new resource. Deterministic.
const GROOM_GAME={ energy:2, groom:[20,60], hoof:[12,40], happy:[2,6], bond:[1,3] }; // per-day sessions; [low-perf, high-perf] gain ranges
function groomResult(perf){ perf=clamp((typeof perf==='number'&&isFinite(perf))?perf:0,0,1);
  const lerp=r=>Math.round(r[0]+(r[1]-r[0])*perf);
  const rating = perf>=0.85?{id:'immaculate',label:'Immaculate',stars:3} : perf>=0.55?{id:'tidy',label:'Nicely turned out',stars:2} : {id:'quick',label:'A quick once-over',stars:1};
  return { perf, groomGain:lerp(GROOM_GAME.groom), hoofGain:lerp(GROOM_GAME.hoof), happy:lerp(GROOM_GAME.happy), bond:lerp(GROOM_GAME.bond), rating }; }
function groomReset(h,day){ if(!h) return; if(h.groomDay!==day){ h.groomDay=day; h.groomCount=0; } }
function groomEnergyLeft(game,h,day){ if(!h) return 0; day=(day!=null?day:((game&&game.day)||1));
  const used=(h.groomDay===day)?(h.groomCount||0):0; return Math.max(0, GROOM_GAME.energy-used); }
function canGroom(game,h,day){ return !!h && groomEnergyLeft(game,h,day)>=1; }
function doGroomMinigame(game,horse,perf,day){ if(!horse) return {ok:false,why:'No horse.'};
  day=(day!=null?day:((game&&game.day)||1));
  if(!canGroom(game,horse,day)) return {ok:false,why:'This horse has been groomed enough for today.'};
  needsInit(horse); groomReset(horse,day);
  const r=groomResult(perf);
  horse.needs.groom =clamp((horse.needs.groom||0)+r.groomGain,0,100);
  horse.needs.hooves=clamp((horse.needs.hooves||0)+r.hoofGain,0,100);
  horse.happy=clamp((horse.happy||0)+r.happy,0,100);
  horse.bond =clamp((horse.bond||0)+r.bond,0,BOND_CAP);
  horse.groomCount=(horse.groomCount||0)+1;
  game.stats=game.stats||{}; game.stats.grooms=(game.stats.grooms||0)+1;
  if(r.rating.id==='immaculate') game.stats.groomPerfect=(game.stats.groomPerfect||0)+1;
  return {ok:true, result:r, care:careScore(horse), energyLeft:groomEnergyLeft(game,horse,day) }; }
// ---------- Horse personality profile / temperament reveal (read-only flavour lens) ----------
// A rounded character read derived purely from a horse's EXISTING fields (trait, stats, bond,
// affinity, mood, life stage). No stat/economy change; deterministic — no Date/Math.random.
// Uses read-only affinity reads so it never mutates the horse.
const TRAIT_FIRE={ hot:30, bold:16, spirited:14, clever:2, lazy:-14, steady:-20, gentle:-22 };
function affinityRO(h,id){ if(!h||!h.aff||typeof h.aff!=='object') return 0; const v=h.aff[id]; return (typeof v==='number'&&isFinite(v))?clamp(v,0,AFF_MAX):0; }
function topAffinityRO(h){ let best=DISC_IDS[0], pts=affinityRO(h,best); for(const id of DISC_IDS){ const v=affinityRO(h,id); if(v>pts){ pts=v; best=id; } } return {id:best, pts}; }
function temperamentAxes(h){
  h=h||{};
  const sp=(typeof h.speed==='number'?h.speed:50), st=(typeof h.stamina==='number'?h.stamina:50), tm=(typeof h.temperament==='number'?h.temperament:55);
  const bond=(typeof h.bond==='number'?h.bond:0), happy=(h.happy==null?85:h.happy);
  const fire=clamp(Math.round(50 + (TRAIT_FIRE[h.trait]||0) + (70-tm)*0.5), 0, 100);
  const run =clamp(Math.round(50 + (sp-st)*0.8), 0, 100);
  const warmth=clamp(Math.round(0.6*bond + 0.4*happy), 0, 100);
  const mk=(id,low,high,value)=>({ id, low, high, value, leaning:(value>=60?'high':value<=40?'low':'mid'),
    label:(value>=60?high:value<=40?low:'Balanced') });
  return [ mk('fire','Calm','Fiery',fire), mk('run','Stayer','Sprinter',run), mk('warmth','Aloof','Affectionate',warmth) ];
}
function axisVal(axes,id){ const a=axes.find(x=>x.id===id); return a?a.value:50; }
// natural discipline aptitude from the stat balance (independent of any trained affinity)
function naturalAptitude(h){ h=h||{};
  const sp=(typeof h.speed==='number'?h.speed:50), st=(typeof h.stamina==='number'?h.stamina:50), tm=(typeof h.temperament==='number'?h.temperament:55);
  return DISCIPLINES.map(d=>({ id:d.id, name:d.name, emoji:d.emoji, score: d.w.speed*sp + d.w.stamina*st + d.w.temperament*tm }))
    .sort((a,b)=>b.score-a.score); }
function bestDisciplineFor(h){
  const top=topAffinityRO(h);
  if(top.pts>=SPECIALIST_AT){ const d=disciplineDef(top.id); return { id:d.id, name:d.name, emoji:d.emoji, basis:'specialty' }; }
  if(top.pts>0){ const d=disciplineDef(top.id); return { id:d.id, name:d.name, emoji:d.emoji, basis:'developing' }; }

// do a groundwork activity with a horse — bounded, deterministic; returns the outcome

// schooling a stat develops the disciplines that rely on it (called from applyTrain)

// ---------- Codex / Encyclopedia (read-only reference, entirely DERIVED from the sim's own tables) ----------
// Nothing here mutates state — it just explains breeds, coat genetics & disciplines using the

function capFirst(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }

// a plain-language note on a breed's coat tendencies, read straight from COAT_PROFILE
function coatLeanNote(breedId){
  const p=COAT_PROFILE[breedId]; if(!p) return 'A balanced spread of base colours.';
  const bits=[];

  if((p.grey||0)>=0.6) bits.push('very often grey (whitens with age)');
  else if((p.grey||0)>=0.2) bits.push('sometimes grey');
  if((p.E||0)>=0.95) bits.push('always black-pigmented');
  else if((p.E||0)<=0.05) bits.push('always red-based (chestnut lines)');
  else if((p.A||0)<=0.05) bits.push('leans solid black');
  if((p.cream||0)>=0.3) bits.push('cream dilutes are common (palomino/buckskin)');
  else if((p.cream||0)>=0.15) bits.push('the odd cream dilute');

function codexBreeds(){
  return BREEDS.map(b=>({ id:b.id, name:b.name, emoji:b.emoji, rarity:b.rarity, rarityName:(RARITY_NAME[b.rarity]||('Tier '+b.rarity)),
    base:b.base, speed:b.speed, stamina:b.stamina, temperament:b.temperament, size:b.size, sizeLabel:codexSizeLabel(b.size),

// every coat phenotype() can actually produce — name & tier are read back FROM phenotype(), never re-listed
function codexCoats(){
  const out=[], seen={};
  const push=(genes,family,note)=>{ const ph=phenotype(genes); if(seen[ph.name]) return;
    seen[ph.name]={ name:ph.name, tier:ph.tier, tierName:(COAT_TIER_NAME[ph.tier]||('Tier '+ph.tier)), valueMult:(COAT_TIER_MULT[ph.tier]||1), family, note, css:coatColor(ph.name) };
    out.push(seen[ph.name]); };
  const cream=[['n','n'],['C','n'],['C','C']], creamNote=['solid — no cream','single cream dilute','double cream dilute'];
  const bases=[ {E:['e','e'],A:['A','A'],family:'Red (chestnut) base'}, {E:['E','E'],A:['A','A'],family:'Bay base'}, {E:['E','E'],A:['a','a'],family:'Black base'} ];

// collection tracker — which breeds & coats the player has actually owned or bred (registry + herd + legends + pasture)

// ---------- Photo Mode / Scrapbook (a keepsake gallery of memorable moments) ----------
// A per-run collection of snapshots. The capture hooks only OBSERVE the sim (they never change
// stats/economy/breeding) — they just append to game.scrapbook. Bounded; pinned memories are protected.
const SCRAPBOOK_CAP=40;
const MOMENT_KINDS={
  win:       {emoji:'🏆', title:'Show Win'},
  champion:  {emoji:'✦', title:'Champion Bloodline'},
  rarecoat:  {emoji:'🎨', title:'Rare Coat'},
  firstbreed:{emoji:'🌱', title:'New Breed'},
  foal:      {emoji:'🐣', title:'Foal Born'},

function momentKindDef(kind){ return MOMENT_KINDS[kind]||{emoji:'📸', title:'Memory'}; }
function scrapbookArr(game){ if(!game) return []; if(!Array.isArray(game.scrapbook)) game.scrapbook=[]; return game.scrapbook; }
function scrapbookNextSeq(game){ let m=0; for(const e of scrapbookArr(game)){ if((e.seq||0)>m) m=e.seq; } return m+1; }
function addScrapbookEntry(game, entry){
  if(!game || !entry || !entry.kind) return null;
  const a=scrapbookArr(game);
  const day=(entry.day!=null)?entry.day:(game.day||1);
  const id=entry.id || (entry.kind+':'+(entry.horseId||'')+':'+day);
  if(a.some(e=>e.id===id)) return null; // dedup: one memory per (kind, horse, day)
  const md=momentKindDef(entry.kind);

    horseId:entry.horseId||null, name:entry.name||'', breed:entry.breed||null, breedName:entry.breedName||'',
    coat:entry.coat||null, coatTier:entry.coatTier||0, overall:entry.overall||0, gen:entry.gen||1,
    caption:entry.caption||'', day, pinned:!!entry.pinned, seq:scrapbookNextSeq(game) };

  while(a.length>SCRAPBOOK_CAP){
    let idx=-1, lo=Infinity;
    for(let i=0;i<a.length;i++){ if(!a[i].pinned && a[i].seq<lo){ lo=a[i].seq; idx=i; } }
    if(idx<0){ for(let i=0;i<a.length;i++){ if(a[i].seq<lo){ lo=a[i].seq; idx=i; } } } // all pinned → drop oldest overall
    if(idx<0) break; a.splice(idx,1);

function scrapbookList(game){ return scrapbookArr(game).slice().sort((x,y)=> (y.day-x.day) || (y.seq-x.seq)); } // newest-first
function scrapbookSize(game){ return scrapbookArr(game).length; }

function captureMoment(game, kind, horse, extra){

    if(kind==='win') caption=horse.name+' won '+(extra.tierName||'a show')+(extra.discName?' — '+extra.discName:'')+'!';

// ---------- Foal coming-of-age ceremonies (a one-time milestone beat as a foal grows up) ----------
// When a horse crosses a life-stage boundary (in advanceDay), a ceremony is queued. Holding it grants a

const FOAL_MILESTONES=[

function checkFoalMilestone(h){ if(!h) return null; const c=horseCeremonies(h);

  const m=foalMilestonePending(h); if(!m) return {ok:false,why:'No ceremony is pending for '+(h.name||'this horse')+'.'};
