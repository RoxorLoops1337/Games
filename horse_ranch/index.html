// ---------- Stable-Tour / Visitor Day (open the ranch to the public for a bounded, appeal-scaled payout) ----------
// Everything scales off EXISTING ranch state (herd quality, rare coats, champions, décor, care, pasture legends).
// No new resources; economy-safe (bounded + diminishing) and gated by a cooldown so it can't be farmed.
const VISITOR_COOLDOWN=7;     // days between Visitor Days
const VISITOR_FIRST_DAY=5;    // earliest a Visitor Day can be hosted in a fresh ranch
const VISITOR_TICKET=6;       // base coins spent per visitor
// a derived 0..100 rating of how impressive the ranch is right now
function ranchAppealScore(game){
  if(!game) return 0;
  const horses=game.horses||[];
  const topOVR = horses.length ? Math.max(0,...horses.map(h=>overall(h))) : 0;
  const champions = horses.filter(h=>(h.wins||0)>=3).length;
  const rareCoats = horses.filter(h=>((coatOf(h).tier||0)>=2)||h.rare).length;
  const decorN = ownedDecor(game).length;
  const avgCare = horses.length ? horses.reduce((s,h)=>s+careScore(h),0)/horses.length : 0;
  const legends = pastureSize(game);
  let s=0;
  s += (topOVR/100)*34;                                 // the headline horse
  s += Math.min(15, 15*(1-Math.exp(-champions/3)));     // champions (diminishing)
  s += Math.min(15, 15*(1-Math.exp(-rareCoats/3)));     // rare coats (diminishing)
  s += (decorN/DECOR.length)*16;                        // a well-dressed ranch
  s += (avgCare/100)*12;                                // visible welfare
  s += Math.min(8, 8*(1-Math.exp(-legends/4)));         // pasture legends
  return Math.round(clamp(s,0,100));
}
function nextVisitorDay(game){ const last=(game&&game.lastVisitorDay)||0; return last>0 ? last+VISITOR_COOLDOWN : VISITOR_FIRST_DAY; }
function visitorDaysUntil(game){ return Math.max(0, nextVisitorDay(game)-((game&&game.day)||1)); }
function visitorDayAvailable(game){ return !!game && ((game.day||1)>=nextVisitorDay(game)) && ((game.horses||[]).length>0); }
// expected turnout/earnings for the current state (no RNG — what the player is shown before committing)
function previewVisitorDay(game){
  const appeal=ranchAppealScore(game);
  const repDraw=Math.min(1, ((game&&game.rep)||0)/1500); // reputation pulls a bigger crowd, capped
  const isWeekend=(weekdayIndex((game&&game.day)||1)>=5); // Sat/Sun draw more
  const crowdMul=isWeekend?1.15:1.0;
  const visitors=Math.max(1, Math.round((8 + appeal*0.9 + repDraw*40)*crowdMul));
  const coins=Math.round(visitors*VISITOR_TICKET*(0.6 + appeal/100*0.9));
  const rep=Math.round(4 + appeal*0.12); // bounded ~4..16
  return { appeal, visitors, coins, rep, weekend:isWeekend };
}
// pick the horse visitors love most, for the flavour highlight
function visitorAppealOf(h){ return (h.wins||0)*10 + (((coatOf(h).tier||0)>=2)?15:0) + (h.rare?12:0) + overall(h)*0.3; }
function visitorHighlight(game){
  const horses=(game&&game.horses)||[];
  if(!horses.length) return { horse:null, text:'The quiet paddocks still charmed a few passers-by.' };
  const pick=horses.slice().sort((a,b)=>visitorAppealOf(b)-visitorAppealOf(a))[0];
  const co=coatOf(pick), bd=breedDef(pick.breed)||{name:pick.breed};
  let text;
  if((pick.wins||0)>=3) text='Visitors crowded around your champion '+pick.name+'!';
  else if((co.tier||0)>=2 || pick.rare) text='Visitors adored '+pick.name+'’s rare '+co.name+' coat!';
  else text='Visitors loved meeting '+pick.name+', your '+bd.name+'.';
  return { horse:pick, text };
}
// resolve a Visitor Day: apply the bounded payout, stamp the cooldown, return the outcome
function hostVisitorDay(game, opts){
  opts=opts||{}; const rng=opts.rng||Math.random;
  if(!visitorDayAvailable(game)) return { ok:false, why:'No Visitor Day is available yet.' };
  const p=previewVisitorDay(game);
  const varMul=0.85 + 0.30*rng(); // ±15% turnout variance
  const visitors=Math.max(1, Math.round(p.visitors*varMul));
  const coins=Math.max(0, Math.round(p.coins*varMul));
  const rep=p.rep;
  if(!game.stats) game.stats={};
  const prevBest=game.stats.bestVisitorDay||0;
  game.money=(game.money||0)+coins;
  game.rep=(game.rep||0)+rep;
  game.stats.goldEarned=(game.stats.goldEarned||0)+coins;
  game.stats.visitorDays=(game.stats.visitorDays||0)+1;
  game.stats.bestVisitorDay=Math.max(prevBest, coins);
  game.lastVisitorDay=game.day||1;
  const hl=visitorHighlight(game);
  // scrapbook keepsake on a record-breaking day (read-only observer of the sim)
  if(coins>prevBest && coins>0 && hl.horse) captureMoment(game,'snapshot',hl.horse,{caption:'Visitor Day at '+ranchName(game)+' — '+visitors+' guests, 🪙'+coins+'!'});
  return { ok:true, visitors, coins, rep, appeal:p.appeal, weekend:p.weekend, highlight:hl.text, record:(coins>prevBest) };
}

// ---------- Farrier & Vet appointments (routine upkeep → bounded, temporary buffs) ----------
// Book a farrier (soundness/shoeing) or vet (checkup) visit; it resolves in advanceDay and grants a
// small, capped, time-limited edge tied to the EXISTING health/soundness/readiness systems.
const APPOINTMENT_TYPES=[
  {id:'farrier', name:'Farrier', emoji:'🧲', fee:120, lead:1, duration:6,  cooldown:10, show:0.05, health:3, guard:0,
   desc:'Fresh shoes & balanced hooves — a few days of surer, sounder movement in the ring.'},
  {id:'vet',     name:'Vet',     emoji:'🩺', fee:180, lead:1, duration:8,  cooldown:14, show:0.03, health:16, guard:0.6,
   desc:'A checkup, teeth & vaccinations — restores condition and wards off illness for a spell.'},
];
function appointmentTypeDef(id){ return APPOINTMENT_TYPES.find(t=>t.id===id)||null; }
function appointmentsArr(game){ if(!game) return []; if(!Array.isArray(game.appointments)) game.appointments=[]; return game.appointments; }
function appointmentFee(game,type,horse){ const t=appointmentTypeDef(type); if(!t) return 0;
  // a gentle scale by the horse's value tier so prized horses cost a little more (bounded)
  const r=horse?((breedDef(horse.breed)||{rarity:1}).rarity):1; return Math.round(t.fee*(0.9+0.06*(r-1))); }
function careLastOf(horse,type){ return (horse&&horse.careLast&&typeof horse.careLast[type]==='number')?horse.careLast[type]:null; }
function hasPendingAppointment(game,horseId,type){ return appointmentsArr(game).some(a=>a.horseId===horseId && a.type===type && !a.done); }
// is a horse due for a given care type (never had it, or its cooldown has elapsed) and not already booked?
function careTypeDue(game,horse,type){ const t=appointmentTypeDef(type); if(!t||!horse||!isAdult(horse)) return false;
  if(hasPendingAppointment(game,horse.id,type)) return false;
  const last=careLastOf(horse,type); return (last==null) || (((game&&game.day)||1)-last)>=t.cooldown; }
function dueForCare(game,horse){ return APPOINTMENT_TYPES.filter(t=>careTypeDue(game,horse,t.id)).map(t=>t.id); }
function horsesDueForCare(game){ return ((game&&game.horses)||[]).filter(h=>dueForCare(game,h).length>0); }
function bookAppointment(game,type,horseId,day){
  const t=appointmentTypeDef(type); if(!t) return {ok:false,why:'Unknown appointment.'};
  const h=((game&&game.horses)||[]).find(x=>x.id===horseId); if(!h) return {ok:false,why:'No such horse.'};
  if(!isAdult(h)) return {ok:false,why:'Only adult horses need the farrier or vet.'};
  if(hasPendingAppointment(game,horseId,type)) return {ok:false,why:'Already booked.'};
  const last=careLastOf(h,type); if(last!=null && (game.day-last)<t.cooldown) return {ok:false,why:h.name+' had the '+t.name.toLowerCase()+' recently.'};
  const fee=appointmentFee(game,type,h); if((game.money||0)<fee) return {ok:false,why:'Not enough coins for the '+t.name.toLowerCase()+'.'};
  game.money-=fee;
  const due=((day!=null?day:game.day)||1)+t.lead;
  const b={ id:'ap'+(game._apc=(game._apc||0)+1), type, horseId, name:h.name, booked:game.day||1, due, fee, done:false };
  appointmentsArr(game).push(b);
  markChoreProgress(game,'appointment');
  return {ok:true, booking:b, fee};
}
// apply a matured appointment's effect to the horse (bounded; no stacking beyond one active buff per type)
function applyCareBuff(game,h,type,day){
  const t=appointmentTypeDef(type); if(!t||!h) return;
  if(!h.careLast) h.careLast={}; h.careLast[type]=day;
  if(t.health) h.health=clamp((h.health||0)+t.health,0,100);
  if(type==='vet') h.happy=clamp((h.happy||0)+2,0,100);
  if(!h.careBuff) h.careBuff={};
  h.careBuff[type]={ until:day+t.duration, show:t.show, guard:t.guard||0 };
}
// resolve every appointment that has matured on/before `day` (called from advanceDay)
function resolveAppointments(game,day){
  if(!Array.isArray(game.appointments)) { game.appointments=[]; return []; }
  const resolved=[];
  for(const a of game.appointments){
    if(a.done || a.due>day) continue;
    a.done=true;
    const h=((game.horses)||[]).find(x=>x.id===a.horseId);
    if(!h) continue; // horse sold/gone — the booking simply lapses
    applyCareBuff(game,h,a.type,day);
    if(!game.stats) game.stats={}; game.stats.appointments=(game.stats.appointments||0)+1;
    resolved.push({ type:a.type, horseId:a.horseId, name:h.name, emoji:appointmentTypeDef(a.type).emoji });
  }
  // keep the list bounded — drop old resolved bookings
  game.appointments=game.appointments.filter(a=>!a.done || a.due>=day-30);
  return resolved;
}
// the current, bounded upkeep effect on a horse (show multiplier + illness guard 0..1)
function activeCareBuff(h,day){
  const out={show:1, guard:0}; if(!h||!h.careBuff) return out;
  for(const k in h.careBuff){ const b=h.careBuff[k]; if(b && (b.until==null || b.until>=day)){ out.show*=(1+(b.show||0)); out.guard=Math.max(out.guard, b.guard||0); } }
  out.show=Math.min(out.show, 1.10); out.guard=Math.min(out.guard, 0.8); // hard caps — no runaway stacking
  return out;
}
function careAppointmentMult(h,game){ return game ? activeCareBuff(h, game.day||0).show : 1; }

function disciplineScore(h,disc,game){
  const w=disc.w;
  let s=h.speed*w.speed + h.stamina*w.stamina + h.temperament*w.temperament;
  if(disc.coat){ s += (coatOf(h).tier||0)*7 + ((breedDef(h.breed)||{rarity:1}).rarity)*3; } // looks count in Showing
  const form=(0.6+0.4*(h.health/100))*(0.7+0.3*(h.happy/100));
  return s*form*careBonusMult(h)*bondPoiseMult(h)*careAppointmentMult(h,game)*affinityMult(h,disc.id)*tackShowMult(h,game)*tackDiscMult(h,disc.id,game)*traitMult(h,'show')*traitMult(h,'disc',disc.id)*agePerformanceMult(h)*outfitTurnoutMult(game,disc)*smithShoeMult(game); // care, bond-poise, appointments, schooling, tack(+tiers), personality, age, turnout & fresh shoes shape aptitude
}
function canEnterShow(game,h){
  if(!isAdult(h)) return {ok:false,why:'Only adult horses can compete.'};
  if(tooOldToCompete(h)) return {ok:false,why:'Past competing age — time for a proud retirement.'};
  if(h.atStud) return {ok:false,why:'Standing at stud — retire from stud to compete.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'In foal — resting.'};
  if(horseAway(h)) return {ok:false,why:'Away on a trip.'};
  if((h.compCd||0)>game.day) return {ok:false,why:'Resting until day '+h.compCd+'.'};
  return {ok:true};
}

// ---------- Horse-trailer / away-trip expeditions (send a horse away for a bounded reward) ----------
// A horse loaded in the trailer is UNAVAILABLE (like rent/stud) until it returns after N days, when the
// trip resolves in advanceDay with a themed, BOUNDED payoff. Reuses existing stats/affinity/coins — no
// new resources. Economy-safe: a fee, one trip per horse at a time, and capped/diminishing gains.
const TRIP_STAT_MAX=3;   // most a clinic can add to any one stat in a single trip
const TRIP_TYPES=[
  {id:'clinic', name:'Training Clinic', emoji:'🎓', days:4, fee:260, kind:'clinic',
   desc:'Coached by the pros — comes home a touch stronger for good.'},
  {id:'trek',   name:'Endurance Trek',  emoji:'🥾', days:3, fee:160, kind:'trek',
   desc:'A long trail trek — earns coins & rep and returns fit.'},
  {id:'tour',   name:'Show Tour',        emoji:'🚌', days:5, fee:340, kind:'tour',
   desc:'A regional show circuit — bigger coins & fame, and poise from the road.'},
];
function tripTypeDef(id){ return TRIP_TYPES.find(t=>t.id===id)||null; }
function horseAway(h){ return !!(h && h.tripType && (h.tripBack||0)>0); }
function tripFee(game,type,horse){ const t=tripTypeDef(type); return t?t.fee:0; }
function canSendOnTrip(game,h){
  if(!h) return {ok:false,why:'No such horse.'};
  if(!isAdult(h)) return {ok:false,why:'Only adult horses can travel.'};
  if(horseAway(h)) return {ok:false,why:h.name+' is already away on a trip.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'In foal — resting at home.'};
  if(h.atStud) return {ok:false,why:'Standing at stud.'};
  return {ok:true};
}
function tripReturnPreview(type,horse){ const t=tripTypeDef(type); if(!t||!horse) return null;
  if(t.kind==='clinic') return {kind:'clinic', stats:'+1–'+TRIP_STAT_MAX+' to each stat (permanent) & a little schooling'};
  if(t.kind==='trek')   return {kind:'trek',  money:Math.min(700, 120+Math.round(overall(horse)*4)),  rep:Math.min(20, 6+Math.round(overall(horse)*0.1))};
  return {kind:'tour',  money:Math.min(1200, 220+Math.round(overall(horse)*7)), rep:Math.min(34, 12+Math.round(overall(horse)*0.2))}; }
function tripDaysLeft(game,h){ return horseAway(h)?Math.max(0,(h.tripBack||0)-((game&&game.day)||1)):0; }
function horsesAway(game){ return ((game&&game.horses)||[]).filter(horseAway); }
// send a horse on a trip: validate eligibility + funds + not-already-away; deduct fee; schedule return
function sendHorseOnTrip(game,type,horseId,day){
  const t=tripTypeDef(type); if(!t) return {ok:false,why:'Unknown trip.'};
  const h=((game&&game.horses)||[]).find(x=>x.id===horseId); if(!h) return {ok:false,why:'No such horse.'};
  const elig=canSendOnTrip(game,h); if(!elig.ok) return elig;
  const fee=tripFee(game,type,h); if((game.money||0)<fee) return {ok:false,why:'Not enough coins for the '+t.name.toLowerCase()+'.'};
  game.money-=fee;
  h.tripType=t.id; h.tripBack=((day!=null?day:game.day)||1)+t.days;
  return {ok:true, horse:h, trip:t, back:h.tripBack, fee};
}
// apply a trip's bounded reward to a returning horse (mutates), returns the reward summary
function applyTripReward(game,h,typeId){
  const t=tripTypeDef(typeId)||TRIP_TYPES[0]; const out={money:0, rep:0, stat:{}, aff:0, note:''};
  if(t.kind==='clinic'){
    for(const s of ['speed','stamina','temperament']){ const gain=Math.min(TRIP_STAT_MAX, Math.max(1,Math.round((100-(h[s]||0))*0.06))); // diminishing near the cap
      const before=h[s]||0; h[s]=clamp(before+gain,8,100); out.stat[s]=h[s]-before; }
    const top=topAffinity(h); if(top){ gainAffinity(h,top.id,6); out.aff=6; }
    h.happy=clamp((h.happy||0)+4,0,100); out.note='came home sharper from the clinic';
  } else if(t.kind==='trek'){
    out.money=Math.min(700, 120+Math.round(overall(h)*4)); out.rep=Math.min(20, 6+Math.round(overall(h)*0.1));
    game.money=(game.money||0)+out.money; game.rep=(game.rep||0)+out.rep;
    h.health=clamp((h.health||0)+10,0,100); h.happy=clamp((h.happy||0)+8,0,100); out.note='earned coins on the trail and came back fit';
  } else {
    out.money=Math.min(1200, 220+Math.round(overall(h)*7)); out.rep=Math.min(34, 12+Math.round(overall(h)*0.2));
    game.money=(game.money||0)+out.money; game.rep=(game.rep||0)+out.rep;
    const before=h.temperament||0; h.temperament=clamp(before+2,8,100); out.stat.temperament=h.temperament-before; // poise from the road
    h.happy=clamp((h.happy||0)+6,0,100); out.note='toured the region and made a name for itself';
  }
  if(game.stats){ game.stats.trips=(game.stats.trips||0)+1; game.stats.tripCoins=(game.stats.tripCoins||0)+(out.money||0); }
  return out;
}
// resolve every trip that has matured on/before `day` (called from advanceDay); returns the arrivals
function resolveTrips(game,day){
  const back=[];
  for(const h of ((game&&game.horses)||[])){
    if(horseAway(h) && (h.tripBack||0)<=day){
      const t=tripTypeDef(h.tripType)||TRIP_TYPES[0]; const reward=applyTripReward(game,h,t.id);
      h.tripType=null; h.tripBack=0; back.push({horse:h, trip:t, reward});
    }
  }
  return back;
}

// ---- Optional "ride the round" minigame scoring (pure) ----
// A run produces a performance 0..1; it nudges the horse's effective score by a
// small, BOUNDED amount so a good run helps but a skilled horse still matters most.
const SHOW_GAME={fences:5, zoneHalf:0.22}; // 5 fences; generous green zone (mobile-friendly)
const SHOW_PERF_CAP=0.12;                  // max ±12% swing from the minigame
// score a single fence from where the timing marker landed (0..1, centre = perfect)
function fenceScore(pos){ const d=Math.abs(clamp(pos,0,1)-0.5)/0.5; return clamp(1-d*d*0.9,0,1); }
// map a run performance 0..1 to a bounded score multiplier (0.5 = neutral 1.0)
function showPerfMult(perf){ return 1 + (clamp(perf,0,1)*2-1)*SHOW_PERF_CAP; }

function runCompetition(h,disc,tier,rng,perf,game){
  rng=rng||Math.random;
  const pm=(perf==null)?1:showPerfMult(perf); // no minigame → neutral (backward-compatible)
  const my=disciplineScore(h,disc,game)*(0.9+0.2*rng())*pm + (h.wins||0)*1.5; // experience edge
  const N=5; let better=0;
  for(let i=0;i<N;i++){ const opp=tier.fieldAvg + (rng()*2-1)*tier.fieldSpread; if(opp>my) better++; }
  const place = better===0?1 : better===1?2 : better===2?3 : 4;
  return { place, score:Math.round(my), prize:tier.prize[place]||0, rep:(tier.repGain[place]!=null?tier.repGain[place]:tier.repGain[4]) };
}
// apply a competition result to game+horse (mutates), returns the result
function applyCompetition(game,h,disc,tier,rng,perf){
  const res=runCompetition(h,disc,tier,rng,perf,game);
  if(perf!=null){ game.stats.showGamesPlayed=(game.stats.showGamesPlayed||0)+1; game.stats.bestShowPerf=Math.max(game.stats.bestShowPerf||0, clamp(perf,0,1));
    if(perf>=0.9) game.stats.clearRounds=(game.stats.clearRounds||0)+1; }
  res.prize=Math.round(res.prize*seasonShowPrizeMul(game.day)*festivalMod(game.day,'showPrizeMul',1)*legacyBonus(game.legacy,'showPrize')); // summer + festivals + legacy pay more
  game.money += res.prize; game.rep += res.rep; game.stats.goldEarned=(game.stats.goldEarned||0)+res.prize;
  h.entries=(h.entries||0)+1; h.compCd=game.day+tier.rest; markChoreProgress(game,'show');
  gainAffinity(h,disc.id, COMPETE_AFF_GAIN + (res.place===1?3:res.place<=3?1:0)); // competing (esp. placing) deepens affinity
  h.happy=clamp(h.happy-8,0,100); h.health=clamp(h.health-4,0,100); // fatigue
  if(res.place===1){ h.wins=(h.wins||0)+1; game.stats.showWins=(game.stats.showWins||0)+1; game.stats.bestTierWin=Math.max(game.stats.bestTierWin||0,tier.id);
    game.stats.disciplinesWon=game.stats.disciplinesWon||{}; game.stats.disciplinesWon[disc.id]=true;
    if(tier.id>=2) captureMoment(game,'win',h,{tierName:tier.name, discName:disc.name}); } // scrapbook: remember bigger wins (County+)
  if(res.place<=3){ h.podiums=(h.podiums||0)+1;
    game.trophies=game.trophies||[];
    game.trophies.unshift({horse:h.name,breed:h.breed,disc:disc.id,tier:tier.id,place:res.place,day:game.day});
    if(game.trophies.length>60) game.trophies.length=60;
  }
  awardChampionshipPoints(game,h,tier,res.place); // season-long championship points
  return res;
}

// ---------- Seasonal Championship Series (a season-long points league) ----------
// Show placings earn championship points across the 14-day season; at season's end
// the leading horse is crowned and paid a bounded reward, then the tally resets.
const CHAMP_POINTS={1:10, 2:6, 3:3, 4:1};   // base points by finishing place
const CHAMP_PRIZE_BASE=1200, CHAMP_PRIZE_PER_PT=12, CHAMP_PRIZE_CAP=6000; // end-of-season purse (capped, economy-safe)
function seasonIndex(day){ return Math.floor((Math.floor(day)-1)/SEASON_LEN); } // absolute season number (0-based)
function daysLeftInSeason(game){ return SEASON_LEN - seasonDay(game.day||1) + 1; } // days remaining incl. today
function champPointsFor(place, tier){ const base=CHAMP_POINTS[place]!=null?CHAMP_POINTS[place]:CHAMP_POINTS[4]; return base*((tier&&tier.id)||1); } // higher tiers worth more
function ensureChamp(game){ if(!game.champ||typeof game.champ!=='object') game.champ={season:seasonIndex(game.day||1), points:{}, meta:{}, lastChampion:null};
  if(!game.champ.points||typeof game.champ.points!=='object') game.champ.points={};
  if(!game.champ.meta||typeof game.champ.meta!=='object') game.champ.meta={};
  if(game.champ.season==null) game.champ.season=seasonIndex(game.day||1);
  return game.champ; }
function awardChampionshipPoints(game,h,tier,place){ const c=ensureChamp(game);
  if(c.season!==seasonIndex(game.day)){ c.season=seasonIndex(game.day); c.points={}; c.meta={}; } // defensive: never carry points across a season
  const pts=champPointsFor(place,tier);
  if(pts>0){ c.points[h.id]=(c.points[h.id]||0)+pts; c.meta[h.id]={name:h.name, breed:h.breed, coat:coatOf(h).name}; }
  return pts; }
function seasonStandings(game){ const c=ensureChamp(game);
  const rows=Object.keys(c.points).map(id=>{ const m=c.meta[id]||{}; return {id, points:c.points[id]||0, name:m.name||'—', breed:m.breed||null, coat:m.coat||null}; });
  rows.sort((a,b)=> b.points-a.points || (a.name<b.name?-1:1)); rows.forEach((r,i)=>r.rank=i+1); return rows; }
function seasonLeader(game){ return seasonStandings(game)[0]||null; }
function champTotalPoints(game){ const c=ensureChamp(game); return Object.keys(c.points).reduce((n,id)=>n+c.points[id],0); }
function seasonPrize(points){ return Math.min(CHAMP_PRIZE_CAP, Math.round(CHAMP_PRIZE_BASE + (points||0)*CHAMP_PRIZE_PER_PT)); }
// crown the leader (if any), pay the bounded purse, record the champion, and reset for the new season
function closeSeason(game){ const c=ensureChamp(game); const closed=c.season; const leader=seasonLeader(game); let award=null;
  if(leader && leader.points>0){
    const prize=seasonPrize(leader.points), rep=Math.min(120, 20+Math.round(leader.points*0.6));
    game.money+=prize; game.rep+=rep; game.stats.goldEarned=(game.stats.goldEarned||0)+prize;
    game.stats.seasonTitles=(game.stats.seasonTitles||0)+1;
    c.lastChampion={ name:leader.name, breed:leader.breed, coat:leader.coat, points:leader.points,
      season:closed, seasonName:SEASONS[((closed%4)+4)%4].name, year:yearOf(closed*SEASON_LEN+1), prize, rep };
    award={ champ:c.lastChampion, prize, rep };
  }
  c.season=seasonIndex(game.day); c.points={}; c.meta={}; // start the new season fresh
  return award; }

// ---------- Weekly contracts / notice board ----------
// A small board of short-term jobs that refreshes each week. Deterministic from
// weekOf(day); the only persisted state is which contracts are on the board this
// week, a stats snapshot at week-start (for "…this week" deltas) and what's claimed.
const BOARD_SIZE=3;
// 'delta' contracts measure progress since the week began; 'state' read live game state.
const CONTRACTS=[

  {id:'care90',  s:71, icon:'🧡', kind:'state', target:90,  cur:g=>Math.max(0,...(g.horses||[]).map(h=>careScore(h))), desc:t=>'Get any horse to '+t+'% care', reward:{money:450,rep:12}},
  {id:'herd8',   s:83, icon:'🐴', kind:'state', target:8,   cur:g=>(g.horses||[]).length,                             desc:t=>'Keep a herd of '+t+' horses',  reward:{money:500,rep:12}},
  // reputation-gated, richer rewards
  {id:'auction1',s:97, icon:'🔨', kind:'delta', stat:'auctionsWon', target:1, repReq:150, desc:t=>'Win a horse at auction this week',   reward:{money:1000,rep:24}},
  {id:'stud1k',  s:103,icon:'♞', kind:'delta', stat:'studIncome',  target:1000, repReq:400, desc:t=>'Earn 🪙'+fmt(t)+' in stud fees this week', reward:{money:1200,rep:26}},
  {id:'rare1',   s:109,icon:'💎', kind:'state', target:3,   cur:g=>Math.max(0,...(g.horses||[]).map(h=>(breedDef(h.breed)||{rarity:1}).rarity)), repReq:250, desc:t=>'Own a Rare-tier (or better) horse', reward:{money:900,rep:22}},
];
function contractDef(id){ return CONTRACTS.find(c=>c.id===id)||null; }
// this week's board = a deterministic pick of eligible templates, ordered by a week-seeded key
function contractsForWeek(game){
  const wk=weekOf(game.day||1);
  const eligible=CONTRACTS.filter(c=>!c.repReq||(game.rep||0)>=c.repReq);
  const ordered=eligible.map(c=>({c,k:hashDay(wk*131+c.s)})).sort((a,b)=>a.k-b.k || (a.c.id<b.c.id?-1:1));
  return ordered.slice(0,BOARD_SIZE).map(o=>o.c);
}
function boardBaseSnapshot(game){ const s=game.stats||{};
  const keys=['sold','showWins','born','trained','goldEarned','lessons','clearRounds','auctionsWon','studIncome','rented','bought'];
  const b={}; keys.forEach(k=>b[k]=s[k]||0); return b; }
// (re)generate the board when the week rolls over; returns game.board
function refreshBoard(game){ const wk=weekOf(game.day||1);
  if(!game.board || game.board.week!==wk){
    game.board={ week:wk, ids:contractsForWeek(game).map(c=>c.id), base:boardBaseSnapshot(game), claimed:[] };
  }
  if(!Array.isArray(game.board.claimed)) game.board.claimed=[];
  if(!game.board.base) game.board.base=boardBaseSnapshot(game);
  return game.board;
}
// progress toward a contract: {cur, target, done}
function contractProgress(game,c){
  let cur;
  if(c.kind==='state'){ cur=c.cur(game); }
  else { const base=(game.board&&game.board.base&&game.board.base[c.stat])||0; cur=(game.stats&&game.stats[c.stat]||0)-base; }
  cur=Math.max(0,cur); return {cur, target:c.target, done:cur>=c.target};
}
function contractDone(game,c){ return contractProgress(game,c).done; }
// resolved view of the current board (for UI): id, icon, desc, progress, claim state
function currentContracts(game){ refreshBoard(game);
  return (game.board.ids||[]).map(contractDef).filter(Boolean).map(c=>{ const pr=contractProgress(game,c);
    const claimed=game.board.claimed.indexOf(c.id)>=0;
    return {id:c.id, icon:c.icon, desc:c.desc(c.target), target:c.target, reward:c.reward, repReq:c.repReq||0,
      cur:pr.cur, done:pr.done, claimed, claimable:pr.done&&!claimed}; });
}
function claimableContracts(game){ return currentContracts(game).filter(c=>c.claimable).length; }
// claim a completed contract exactly once; pays the reward
function claimContract(game,id){ refreshBoard(game); const c=contractDef(id); if(!c) return {ok:false,why:'No such contract.'};
  if((game.board.ids||[]).indexOf(id)<0) return {ok:false,why:'Not on this week’s board.'};
  if(game.board.claimed.indexOf(id)>=0) return {ok:false,why:'Already claimed.'};
  if(!contractProgress(game,c).done) return {ok:false,why:'Not complete yet.'};
  const r=c.reward||{}; if(r.money) game.money+=r.money; if(r.feed) game.feed+=r.feed; if(r.rep) game.rep+=r.rep;
  game.board.claimed.push(id); game.stats.contractsDone=(game.stats.contractsDone||0)+1;
  return {ok:true, reward:r, contract:c}; }
function daysUntilBoardRefresh(game){ const d=game.day||1; return 7-(((Math.floor(d)-1)%7)); } // days left in the week (incl today)

// ---------- The Canteen (a little bar where visitors relax) ----------
const CANTEEN_MAX=5;
function canteenLevel(game){ return (game.canteen&&game.canteen.level)||0; }
function canteenCost(game){ const lv=canteenLevel(game); return lv>=CANTEEN_MAX?0:Math.round(700*Math.pow(1.75,lv)); } // build lv0->1, then upgrades
function canteenIncome(game){ // visitors scale with reputation (capped), herd size and lessons buzz
  const lv=canteenLevel(game); if(!lv) return 0;
  const visitors = 6 + Math.min(60,(game.rep||0)*0.015) + game.horses.length*1.5 + teacherCount(game)*4; // rep term capped → plateaus
  return Math.round((8 + lv*6) + visitors*lv*0.85);
}

// ---------- Riding School — hire teachers who give lessons ----------
const TEACHER_NAMES=['Margot','Sofie','Hans','Lena','Pieter','Anke','Bram','Nadia','Tom','Elke','Joris','Fien','Ruben','Saar'];
const TEACHER_TITLES=['Riding Instructor','Dressage Coach','Show Trainer','Vaulting Teacher','Pony Club Lead','Eventing Mentor'];
function mkTeacher(game,rng){
  rng=rng||Math.random;
  const skill=1+Math.floor(rng()*5); // 1..5 stars
  const disc=DISCIPLINES[Math.floor(rng()*DISCIPLINES.length)].id;
  return { id:'t'+(_idc++), name:TEACHER_NAMES[Math.floor(rng()*TEACHER_NAMES.length)],
    title:TEACHER_TITLES[Math.floor(rng()*TEACHER_TITLES.length)],
    skill, disc, capacity:2+skill, salary:18+skill*14, hireFee:(18+skill*14)*3 };
}
function restockTeachers(game,rng){
  rng=rng||Math.random; const n=3;
  game.teacherMarket=[]; for(let i=0;i<n;i++) game.teacherMarket.push(mkTeacher(game,rng));
  game.teacherDay=game.day;
}
function teacherCount(game){ return (game.teachers||[]).length; }
function schoolHorses(game){ return game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!horseAway(h)&&!h.pregnant).length; }
function teacherCapacityTotal(game){ return (game.teachers||[]).reduce((n,t)=>n+t.capacity,0); }
function lessonsPerDay(game){ return Math.min(teacherCapacityTotal(game), schoolHorses(game)*3); }
function lessonFee(game){ return Math.round((11 + Math.min(30, Math.round((game.rep||0)*0.006))) * curriculumFeeMult(game)); } // rep bonus capped so lessons plateau; curriculum adds a small bounded lift
function schoolLessonMult(game){ // gentle horses make better lesson mounts
  const hs=game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!horseAway(h)&&!h.pregnant);
  if(!hs.length) return 1;
  return hs.reduce((n,h)=>n+traitMult(h,'lesson'),0)/hs.length;
}
function schoolIncome(game){
  const cap=teacherCapacityTotal(game); if(!cap) return 0;
  const served=lessonsPerDay(game);
  const avgSkill=game.teachers.reduce((n,t)=>n+t.skill,0)/game.teachers.length;
  return Math.round(served*lessonFee(game)*(0.7+0.06*avgSkill)*schoolLessonMult(game));
}
function teacherSalaries(game){ return (game.teachers||[]).reduce((n,t)=>n+t.salary,0); }
function schoolNet(game){ return schoolIncome(game)-teacherSalaries(game); }
// ---------- Riding-lesson curriculum / student progression (a ladder over the EXISTING school) ----------
// The school climbs curriculum tiers as it teaches cumulative lessons (game.stats.lessons),
// each tier lifting the lesson fee by a small, BOUNDED amount. No new income faucet — it just
// gives the existing lesson business structure and a sense of progression. Deterministic.
const CURRICULUM_FEE_CAP=1.16; // hard bound on the derived lesson-fee lift (+16% at the very top)
const CURRICULUM_TIERS=[
  {id:'leadrein', name:'Lead-Rein',         emoji:'🐴', minLessons:0,    feeMult:1.00,             blurb:'First steps in the saddle — safe, gentle and slow.'},
  {id:'beginner', name:'Beginner',          emoji:'🥾', minLessons:60,   feeMult:1.04,             blurb:'Rising trot and steering — the basics are landing.'},
  {id:'interm',   name:'Intermediate',      emoji:'🎯', minLessons:200,  feeMult:1.08,             blurb:'Canter work and little courses — students grow confident.'},
  {id:'advanced', name:'Advanced',          emoji:'🏅', minLessons:500,  feeMult:1.12,             blurb:'Collected work and bigger fences — a serious riding school.'},
  {id:'squad',    name:'Competition Squad', emoji:'🏆', minLessons:1000, feeMult:CURRICULUM_FEE_CAP,blurb:'A pipeline of competition riders — the whole region takes notice.'},
];
function curriculumTierDef(id){ return CURRICULUM_TIERS.find(t=>t.id===id)||null; }
function schoolLessonsTaught(game){ return Math.max(0, Math.floor((game&&game.stats&&game.stats.lessons)||0)); }
function curriculumTierIndex(game){ const n=schoolLessonsTaught(game); let idx=0;
  for(let i=0;i<CURRICULUM_TIERS.length;i++){ if(n>=CURRICULUM_TIERS[i].minLessons) idx=i; } return idx; }
function curriculumTier(game){ return CURRICULUM_TIERS[curriculumTierIndex(game)]; }
function nextCurriculumTier(game){ const i=curriculumTierIndex(game); return i+1<CURRICULUM_TIERS.length?CURRICULUM_TIERS[i+1]:null; }
function curriculumFeeMult(game){ return Math.min(CURRICULUM_FEE_CAP, curriculumTier(game).feeMult); }
function curriculumProgress(game){
  const taught=schoolLessonsTaught(game), cur=curriculumTier(game), nxt=nextCurriculumTier(game);
  if(!nxt) return { tier:cur, next:null, taught, have:taught-cur.minLessons, need:0, frac:1, toNext:0 };
  const span=nxt.minLessons-cur.minLessons, have=taught-cur.minLessons;
  return { tier:cur, next:nxt, taught, have, need:span, frac:clamp(have/span,0,1), toNext:Math.max(0,nxt.minLessons-taught) };
}

// ---------- Stud farm — stand a top stallion at public stud for recurring income ----------
function canStand(h){
  if(!h||h.sex!=='stallion') return {ok:false,why:'Only stallions can stand at stud.'};
  if(!isAdult(h)) return {ok:false,why:'Must be a grown stallion.'};
  if(tooOldToBreed(h)) return {ok:false,why:'Too old to stand at stud.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(horseAway(h)) return {ok:false,why:'Away on a trip.'};
  return {ok:true};
}
function studFee(game,h){ // what one visiting mare pays — scales with quality & your reputation (softened)
  let fee = valueOf(h)*0.04 + (h.wins||0)*35 + (coatOf(h).tier||0)*25 + ((h.generation||1)-1)*12;
  fee *= (1 + Math.min(0.4, (game.rep||0)*0.0002)); // rep premium capped at +40%
  return Math.max(20, Math.round(fee));
}
function studDemand(game,h){ // visiting mares per day (better stallion + reputation + spring → more)
  let d = 0.35 + (h.wins||0)*0.10 + Math.min(1.5,(game.rep||0)*0.0003) + (coatOf(h).tier||0)*0.15;
  d *= (seasonOf(game.day).id==='spring'?1.4:1.0); // spring is the breeding season
  return clamp(d,0,2.0); // fewer mares overall — a passive supplement, not a jackpot
}
function studIncomeFor(game,h){ return Math.round(studFee(game,h)*studDemand(game,h)); }
function studStallions(game){ return (game.horses||[]).filter(h=>h.atStud && canStand(h).ok); }
const STUD_STACK_W=[1,0.6,0.4,0.3,0.25]; // limited visiting mares → extra stallions earn less
function studIncome(game){
  const vals=studStallions(game).map(h=>studIncomeFor(game,h)).sort((a,b)=>b-a);
  return vals.reduce((n,v,i)=>n+Math.round(v*(STUD_STACK_W[i]!=null?STUD_STACK_W[i]:0.2)),0);
}
// ---------- Balance sheet / finances summary (read-only reporting lens over the live economy) ----------
// Aggregates the SAME per-day money flows advanceDay credits (boarding, rent, canteen, lessons, stud
// income; teacher salaries, staff payroll, insurance) into a tidy accountant's view — plus lifetime
// totals from stats. No new faucet, no state change. Deterministic (derived from game state + day).
const LEDGER_CATEGORIES=[
  {id:'boarding', label:'Boarding',        emoji:'🏠',   kind:'income'},
  {id:'rent',     label:'Horse rentals',   emoji:'🐴',   kind:'income'},
  {id:'canteen',  label:'Canteen',         emoji:'🍺',   kind:'income'},
  {id:'lessons',  label:'Riding lessons',  emoji:'🎓',   kind:'income'},
  {id:'stud',     label:'Stud fees',       emoji:'♞',    kind:'income'},
  {id:'salaries', label:'Teacher salaries',emoji:'🧑‍🏫', kind:'expense'},
  {id:'staff',    label:'Stable staff',    emoji:'👥',   kind:'expense'},
  {id:'insurance',label:'Insurance',       emoji:'🛡️',   kind:'expense'},
];
function ledgerCategoryDef(id){ return LEDGER_CATEGORIES.find(c=>c.id===id)||null; }
function dailyLedger(game){
  const g=game||{}, day=g.day||1, horses=g.horses||[];
  const rentAmt=horses.reduce((n,h)=>n+((h&&(h.rentDays||0)>0)?(h.rentRate||0):0),0);
  const boardingAmt=((g.boarders||0)>0)?g.boarders*boardRatePerStall(g):0;
  const canteenAmt=(canteenLevel(g)>0)?Math.round(canteenIncome(g)*canteenDayMult(day)*canteenWeatherMult(day)*seasonCanteenMul(day)*festivalMod(day,'canteenMul',1)):0;
  const teachers=teacherCount(g);
  const lessonsAmt=teachers>0?Math.round(schoolIncome(g)*lessonDayMult(day)):0;
  const salariesAmt=teachers>0?teacherSalaries(g):0;
  const raw={ boarding:boardingAmt, rent:rentAmt, canteen:canteenAmt, lessons:lessonsAmt,
    stud:studIncome(g), salaries:salariesAmt, staff:staffPayroll(g), insurance:insurancePremium(g) };
  const line=id=>{ const d=ledgerCategoryDef(id); return { id, label:d.label, emoji:d.emoji, amount:Math.round(raw[id]||0) }; };
  const income=LEDGER_CATEGORIES.filter(c=>c.kind==='income').map(c=>line(c.id));
  const expense=LEDGER_CATEGORIES.filter(c=>c.kind==='expense').map(c=>line(c.id));
  const incomeTotal=income.reduce((n,x)=>n+x.amount,0), expenseTotal=expense.reduce((n,x)=>n+x.amount,0);
  return { day, income, expense, incomeTotal, expenseTotal, net:incomeTotal-expenseTotal };
}
function financeSummary(game){
  const led=dailyLedger(game);
  const pos=led.income.filter(x=>x.amount>0).sort((a,b)=>b.amount-a.amount);
  const neg=led.expense.filter(x=>x.amount>0).sort((a,b)=>b.amount-a.amount);
  return { net:led.net, incomeTotal:led.incomeTotal, expenseTotal:led.expenseTotal,
    biggestEarner:pos[0]||null, biggestCost:neg[0]||null, profitable:led.net>=0 };
}
function balanceSheet(game){
  const g=game||{}, st=g.stats||{}, led=dailyLedger(g);
  const lifetime=[
    {id:'earned',   label:'Total earned',        emoji:'💰',  value:st.goldEarned||0},
    {id:'bestSale', label:'Biggest single sale', emoji:'🪙',  value:st.bestSale||0},
    {id:'studInc',  label:'Stud fees earned',    emoji:'♞',   value:st.studIncome||0},
    {id:'wages',    label:'Staff wages paid',    emoji:'👥',  value:st.staffWages||0},
    {id:'premiums', label:'Insurance paid',      emoji:'🛡️',  value:st.insurancePremiums||0},
    {id:'lessons',  label:'Lessons taught',      emoji:'🎓',  value:st.lessons||0},
  ];
  return { cash:g.money||0, feed:g.feed||0, day:g.day||1,
    ledger:led, net:led.net, projection7:led.net*7, projection30:led.net*30,
    lifetime, summary:financeSummary(g) };
}

// ---------- Stud directory / outside-mares bookings (a scheduled fee-for-service income loop) ----------
// A rotating roster of named visiting mares who book YOUR standing stallions. A booking schedules a
// covering that pays a BOUNDED fee after STUD_GESTATION days (composing with canStand/studFee/atStud).
// The visiting mare leaves with the foal — no herd change. Economy-safe: fee cap, limited roster & per-
// stallion capacity, deterministic roster keyed to game.day.
const STUD_BOOK_CYCLE=4;    // days between roster refreshes
const STUD_ROSTER=3;        // visiting mares per refresh
const STUD_MAX_BOOKINGS=2;  // concurrent bookings a single stallion can carry
const STUD_GESTATION=3;     // days until a booking pays out
const STUD_FEE_CAP=1400;    // hard cap on any single booking fee
const STUD_VISIT_BREEDS=['welsh','quarter','arabian','hanoverian','thoroughbred','andalusian','friesian','haflinger','appaloosa','mustang'];
function studRosterIndex(day){ return Math.floor((Math.floor(day||1)-1)/STUD_BOOK_CYCLE); }
function nextStudRoster(game){ return (studRosterIndex((game&&game.day)||1)+1)*STUD_BOOK_CYCLE+1; }
function studRosterDaysLeft(game){ return nextStudRoster(game)-((game&&game.day)||1); }
// deterministic roster of visiting mares for a refresh index (no Date/Math.random)
function studVisitingMares(idx){ const rng=seededOnce((idx>>>0)*40503+77), out=[];
  for(let i=0;i<STUD_ROSTER;i++){
    const name=NAMES_F[Math.floor(rng()*NAMES_F.length)];
    const breed=STUD_VISIT_BREEDS[Math.floor(rng()*STUD_VISIT_BREEDS.length)];
    const quality=Math.round((0.7+rng()*0.9)*100)/100;        // 0.7..1.6 fee multiplier
    const coatTier=(rng()<0.14?2:(rng()<0.34?1:0));
    out.push({ id:'vm'+idx+'-'+i, name, breed, breedName:(breedDef(breed)||{name:breed}).name, quality, coatTier, prestige:Math.round(quality*70) });
  } return out; }
function studBookingFee(game, stallion, mare){ if(!stallion||!mare) return 0;
  const base=studFee(game, stallion);                          // reuse existing quality/rep scaling
  const mareMult=(mare.quality||1)+(mare.coatTier||0)*0.1;
  return Math.min(STUD_FEE_CAP, Math.round(base*mareMult*1.8)); } // a booked covering pays more than a passive walk-in, but capped
function studBookingsActive(game){ return ((game&&game.studBookings)||[]).filter(b=>!b.done); }
function studCapacityLeft(game, stallion){ if(!stallion) return 0;
  const used=studBookingsActive(game).filter(b=>b.stallionId===stallion.id).length; return Math.max(0, STUD_MAX_BOOKINGS-used); }
function studMareBooked(game, mareId){ return studBookingsActive(game).some(b=>b.mareId===mareId); }
// today's directory: each visiting mare + the offered fee for your best eligible stallion + booked flag
function studDirectory(game){
  const idx=studRosterIndex((game&&game.day)||1);
  const stallions=studStallions(game);
  const top=stallions.slice().sort((a,b)=>studFee(game,b)-studFee(game,a))[0]||null;
  return studVisitingMares(idx).map(m=>({ id:m.id, name:m.name, breed:m.breed, breedName:m.breedName, quality:m.quality, coatTier:m.coatTier,
    fee: top?studBookingFee(game,top,m):0, booked:studMareBooked(game,m.id), topStallion: top?top.id:null })); }
// book a covering: validate the stallion can stand + has capacity + the mare isn't already booked; schedule it
function bookStudCovering(game, stallionId, mareId, day){
  const st=((game&&game.horses)||[]).find(h=>h.id===stallionId); if(!st) return {ok:false,why:'No such stallion.'};
  if(!st.atStud) return {ok:false,why:st.name+' isn’t standing at stud.'};
  const cs=canStand(st); if(!cs.ok) return {ok:false,why:cs.why};
  const idx=studRosterIndex((day!=null?day:(game&&game.day))||1);
  const mare=studVisitingMares(idx).find(m=>m.id===mareId); if(!mare) return {ok:false,why:'That mare isn’t in the directory now.'};
  if(!Array.isArray(game.studBookings)) game.studBookings=[];
  if(studMareBooked(game, mareId)) return {ok:false,why:mare.name+' is already booked.'};
  if(studCapacityLeft(game, st)<=0) return {ok:false,why:st.name+' is fully booked ('+STUD_MAX_BOOKINGS+').'};
  const fee=studBookingFee(game, st, mare);
  const d0=(day!=null?day:game.day)||1;
  const b={ id:'sb'+(game._sbc=(game._sbc||0)+1), stallionId, stallionName:st.name, mareId, mareName:mare.name, breed:mare.breed, fee, booked:d0, due:d0+STUD_GESTATION, done:false };
  game.studBookings.push(b);
  return {ok:true, booking:b, fee, stallion:st, mare};
}
// resolve matured bookings (called from advanceDay): pay the fee ONCE, free capacity; cancel if the stallion is gone/ineligible
function resolveStudBookings(game, day){
  if(!Array.isArray(game.studBookings)){ game.studBookings=[]; return []; }
  const paid=[];
  for(const b of game.studBookings){
    if(b.done || b.due>day) continue;
    b.done=true;
    const st=((game.horses)||[]).find(h=>h.id===b.stallionId);
    if(!st || !st.atStud || !canStand(st).ok){ b.cancelled=true; continue; } // stallion sold/retired/ineligible → no fee
    game.money=(game.money||0)+b.fee; game.rep=(game.rep||0)+1;
    if(!game.stats) game.stats={};
    game.stats.studIncome=(game.stats.studIncome||0)+b.fee;       // counts as stud earnings
    game.stats.studBookings=(game.stats.studBookings||0)+1;
    paid.push({ stallionId:b.stallionId, stallionName:st.name, mareName:b.mareName, fee:b.fee });
  }
  game.studBookings=game.studBookings.filter(b=>!b.done || b.due>=day-20); // prune old
  return paid;
}

// ---------- Retirement & Hall of Fame ----------
function canRetire(h){
  if(!isAdult(h)) return {ok:false,why:'Only grown horses can retire.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'Wait until after foaling.'};
  return {ok:true};
}
function hofRecord(h,reason,day){
  const b=breedDef(h.breed)||BREEDS[0], ct=coatOf(h);
  return { id:h.id, name:h.name, breed:h.breed, breedName:b.name, coat:ct.name, coatTier:ct.tier||0,
    sex:h.sex, trait:h.trait||null, speed:Math.round(h.speed), stamina:Math.round(h.stamina), temperament:Math.round(h.temperament),
    overall:overall(h), wins:h.wins||0, podiums:h.podiums||0, generation:h.generation||1, purebred:!!h.purebred,
    rare:h.rare||null, age:h.age||0, reason:reason||'retired', day:day||0 };
}
function prestigeOf(rec){ return Math.round((rec.wins||0)*10 + (rec.podiums||0)*3 + (rec.overall||0)*0.3 + (rec.coatTier||0)*8 + ((rec.generation||1)-1)*4 + (rec.rare?15:0)); }
function legacyLine(rec,stable){
  const home=stable||'Skyhorse Stables';
  const bits=[];
  if(rec.wins>=5) bits.push('a legendary champion with '+rec.wins+' victories');
  else if(rec.wins>=3) bits.push('a celebrated champion ('+rec.wins+' wins)');
  else if(rec.wins>0) bits.push(rec.wins+'-time show winner');
  if((rec.coatTier||0)>=2) bits.push('bearer of a rare '+rec.coat+' coat');
  if((rec.generation||1)>=4) bits.push('crown of a '+rec.generation+'-generation bloodline');
  if(!bits.length) bits.push('a beloved '+rec.breedName+' of '+home);
  return (rec.reason==='passed'?'Passed peacefully at':'Retired at')+' age '+rec.age+' — '+bits.join(', ')+'.';
}
function isHofChampion(rec){ return (rec.wins||0)>=3 || (rec.coatTier||0)>=2 || (rec.generation||1)>=4; }
function inductHof(game,rec){
  game.hallOfFame=game.hallOfFame||[]; game.hallOfFame.unshift(rec);
  const p=prestigeOf(rec); game.prestige=(game.prestige||0)+p;
  game.rep += Math.round(p*0.5); // honouring a great horse lifts the estate's standing
  return p;
}
function retireHorse(game,h,day){
  const rec=hofRecord(h,'retired',day!=null?day:game.day);
  captureMoment(game,'retire',h,{day:day!=null?day:game.day}); // scrapbook: a farewell keepsake
  sendToPasture(game,h,'retired',day!=null?day:game.day); // a living legend grazes on in the pasture
  game.horses=game.horses.filter(x=>x.id!==h.id);
  return { rec, prestige:inductHof(game,rec) };
}

// ---------- Retirement Pasture / sanctuary (a visible home for retired horses) ----------
// Retired horses live on here (grazing, coat-tinted). Distinct from the Hall of Fame record.
// Their presence gives a tiny, CAPPED "ambassadors" reputation draw.
const PASTURE_CAP=60;
const PASTURE_REP_CAP=5; // most reputation/day the whole pasture can draw (economy-safe)
function sendToPasture(game,h,reason,day){ if(!game||!h) return null; if(!Array.isArray(game.pasture)) game.pasture=[];
  if(game.pasture.some(e=>e.id===h.id)) return null; // never double-add the same horse
  const rec=hofRecord(h, reason||'retired', day!=null?day:game.day);
  game.pasture.unshift(rec);
  if(game.pasture.length>PASTURE_CAP) game.pasture.length=PASTURE_CAP;
  return rec; }
function pastureList(game){ return (game&&Array.isArray(game.pasture))?game.pasture:[]; }
function pastureSize(game){ return pastureList(game).length; }
function pastureRepBonus(game){ return Math.min(PASTURE_REP_CAP, Math.floor(pastureSize(game)/2)); } // ambassadors draw visitors

function setSilks(game, parts){ if(!game) return null; const next=Object.assign({}, normSilks(game)); parts=parts||{};

  next.custom=true; game.silks=normSilksParts(next); return game.silks; }
// a PURE SVG string of the racing silks + jockey cap (no DOM) — deterministic from the parts
function silksSvg(parts, size){
  parts=normSilksParts(parts); size=size||120;
  const P=_silkHex(parts.primary), S=_silkHex(parts.secondary), pat=parts.pattern, b=[];
  b.push('<defs><clipPath id="silkClip"><rect x="26" y="30" width="48" height="64" rx="8"/></clipPath></defs>');
  b.push('<g clip-path="url(#silkClip)">');
  b.push('<rect x="26" y="30" width="48" height="64" fill="'+P+'"/>');
  if(pat==='halves'){ b.push('<rect x="50" y="30" width="24" height="64" fill="'+S+'"/>'); }
  else if(pat==='hoops'){ for(let y=38;y<94;y+=16) b.push('<rect x="26" y="'+y+'" width="48" height="8" fill="'+S+'"/>'); }
  else if(pat==='stripes'){ for(let x=32;x<74;x+=12) b.push('<rect x="'+x+'" y="30" width="6" height="64" fill="'+S+'"/>'); }
  else if(pat==='sash'){ b.push('<polygon points="26,88 26,72 62,30 74,30 74,42 38,88" fill="'+S+'"/>'); }
  else if(pat==='chevron'){ b.push('<polygon points="26,94 50,68 74,94 74,80 50,54 26,80" fill="'+S+'"/>'); }
  else if(pat==='quarters'){ b.push('<rect x="50" y="30" width="24" height="32" fill="'+S+'"/>'); b.push('<rect x="26" y="62" width="24" height="32" fill="'+S+'"/>'); }
  b.push('</g>');
  b.push('<rect x="26" y="30" width="48" height="64" rx="8" fill="none" stroke="#00000033" stroke-width="1.5"/>');
  b.push('<rect x="12" y="34" width="16" height="30" rx="6" fill="'+S+'" stroke="#00000033" stroke-width="1.5"/>');
  b.push('<rect x="72" y="34" width="16" height="30" rx="6" fill="'+S+'" stroke="#00000033" stroke-width="1.5"/>');
  b.push('<circle cx="50" cy="16" r="12" fill="'+P+'" stroke="#00000033" stroke-width="1.5"/>');
  b.push('<rect x="44" y="26" width="12" height="4" rx="2" fill="'+S+'"/>');
  const em=silkEmblemDef(parts.emblem); if(em&&em.glyph) b.push('<text x="50" y="21" font-size="13" text-anchor="middle" fill="'+S+'">'+em.glyph+'</text>');
  return '<svg viewBox="0 0 100 100" width="'+size+'" height="'+size+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stable colours">'+b.join('')+'</svg>';
}

// ---------- Paddock enrichment / toys (one-off buys → a gentle, HARD-CAPPED passive care benefit) ----------

function hasEnrichment(game,id){ return ownedEnrichment(game).indexOf(id)>=0; }
function enrichmentAffordable(game,id){ const it=enrichmentDef(id); return !!it && !hasEnrichment(game,id) && ((game&&game.money)||0)>=it.cost; }
function buyEnrichment(game,id){

// aggregate the owned items into a single HARD-CAPPED per-day bonus applied to the herd
function enrichmentBonus(game){

    happy+=e.happy||0; needLift+=e.needLift||0; bond+=e.bond||0; dr+=e.decayReduce||0; }

function adoptMascot(game,id,name){
  const d=mascotDef(id); if(!d) return {ok:false,why:'No such companion.'};
  if(!game) return {ok:false,why:'No ranch.'};
  const cur=normMascot(game.mascot), swapping=(cur.type!==id);
  if(swapping){ if((game.money||0)<d.cost) return {ok:false,why:'Not enough coins.'}; game.money-=d.cost;
    game.stats=game.stats||{}; game.stats.mascotsAdopted=(game.stats.mascotsAdopted||0)+1; }
  const nm=(((''+(name||'')).trim().slice(0,MASCOT_NAME_MAX))||d.species);
  game.mascot={ type:id, name:nm }; return {ok:true, mascot:activeMascot(game), charged:swapping?d.cost:0};
}
function renameMascot(game,name){ const cur=normMascot(game&&game.mascot); if(!cur.type) return {ok:false,why:'No mascot to name.'};
  const nm=(((''+(name||'')).trim().slice(0,MASCOT_NAME_MAX))||mascotDef(cur.type).species);
  game.mascot={ type:cur.type, name:nm }; return {ok:true, name:nm}; }
function retireMascot(game){ const had=hasMascot(game); if(game) game.mascot={type:null,name:null}; return {ok:had}; }
// the tiny, hard-capped daily effect from the active mascot's perk (neutral if none)
function mascotPerk(game){
  const m=activeMascot(game); const out={happy:0, care:0, bond:0, rep:0};
  if(!m||!m.perk) return out; const v=m.perk.value||0;
  if(m.perk.kind==='happy') out.happy=Math.min(MASCOT_PERK_CAP,v);
  else if(m.perk.kind==='care') out.care=Math.min(MASCOT_PERK_CAP,v);
  else if(m.perk.kind==='bond') out.bond=Math.min(MASCOT_BOND_CAP,v);
  else if(m.perk.kind==='rep') out.rep=Math.min(MASCOT_PERK_CAP,v);
  return out;
}
function mascotQuip(game,day){ const m=activeMascot(game); if(!m) return '';
  day=(day!=null?day:((game&&game.day)||1)); const qs=MASCOT_QUIPS[m.type]||['{name} watches over the yard.'];
  const i=hashDay(day)%qs.length; return (qs[i]||'{name} is about the yard.').replace(/\{name\}/g, m.name); }
// ---------- Seasonal hay-meadow / produce garden (a bounded, cooldown-gated home hay plot) ----------
// Sow once (a one-off cost), then harvest a CAPPED hay yield on a growth cooldown. Season-aware:
// grows faster in summer, dormant in winter. Economy-safe — a real cost, capped yield, cooldown, and
// winter dormancy mean it's a nice supplement, NOT an infinite feed faucet. Deterministic.
const GARDEN={ sowCost:600, growthDays:8, baseYield:30, yieldCap:40, happyBonus:2 };
function gardenSeasonGrowthMul(day){ const s=seasonOf(day).id; return s==='summer'?1.4 : s==='winter'?0 : 1.0; }
function normGarden(g){ g=g||{};
  const sown=g.sown===true;
  const growth=(typeof g.growth==='number'&&isFinite(g.growth))?clamp(g.growth,0,GARDEN.growthDays):0;
  const lastHarvest=(typeof g.lastHarvest==='number'&&isFinite(g.lastHarvest))?g.lastHarvest:0;
  return { sown, growth:sown?growth:0, lastHarvest }; }
function gardenYield(game){ const s=seasonOf((game&&game.day)||1); const mul=(s.id==='autumn')?1.15:1.0;
  return Math.min(GARDEN.yieldCap, Math.round(GARDEN.baseYield*mul)); }
function gardenGrowthPerDay(game){ if(!normGarden(game&&game.garden).sown) return 0; return gardenSeasonGrowthMul((game&&game.day)||1); }
function gardenState(game){
  const g=normGarden(game&&game.garden), day=(game&&game.day)||1;
  const ready = g.sown && g.growth>=GARDEN.growthDays;
  const growthPct = g.sown ? clamp(g.growth/GARDEN.growthDays,0,1) : 0;
  const perDay = gardenSeasonGrowthMul(day), remain = Math.max(0, GARDEN.growthDays-g.growth);
  const daysToHarvest = !g.sown ? null : (ready?0 : (perDay>0?Math.ceil(remain/perDay):Infinity));
  return { sown:g.sown, growth:g.growth, growthDays:GARDEN.growthDays, ready, growthPct,
    daysToHarvest, dormant:(seasonOf(day).id==='winter'), season:seasonOf(day), lastHarvest:g.lastHarvest,
    yield:gardenYield(game) };
}
function sowGarden(game){ if(!game) return {ok:false,why:'No ranch.'};
  const g=normGarden(game.garden);
  if(g.sown) return {ok:false,why:'The meadow is already sown.'};
  if((game.money||0)<GARDEN.sowCost) return {ok:false,why:'Not enough coins.'};
  game.money-=GARDEN.sowCost; game.garden={ sown:true, growth:0, lastHarvest:(g.lastHarvest||0) };
  return {ok:true, cost:GARDEN.sowCost}; }
function tickGarden(game){ if(!game) return; const g=normGarden(game.garden); if(!g.sown) return;
  const inc=gardenSeasonGrowthMul(game.day||1); if(inc<=0){ game.garden=g; return; } // dormant in winter
  g.growth=Math.min(GARDEN.growthDays, g.growth+inc); game.garden=g; }
function harvestGarden(game){ if(!game) return {ok:false,why:'No ranch.'};
  const st=gardenState(game);
  if(!st.sown) return {ok:false,why:'Nothing sown yet.'};
  if(!st.ready) return {ok:false,why:'Not ready to harvest.'};
  const hay=gardenYield(game), happy=GARDEN.happyBonus;
  game.feed=(game.feed||0)+hay;
  for(const h of (game.horses||[])) h.happy=clamp((h.happy||0)+happy,0,100); // a little fresh produce cheers the herd
  game.stats=game.stats||{}; game.stats.harvests=(game.stats.harvests||0)+1; game.stats.hayGrown=(game.stats.hayGrown||0)+hay;
  game.garden={ sown:true, growth:0, lastHarvest:(game.day||0) };
  return {ok:true, hay, happy}; }

// ---------- Paddock wildlife / bird-watching log (READ-ONLY deterministic sightings + a life-list) ----------
// Each day a small, deterministic set of visiting critters can be spotted around the ranch, derived from
// EXISTING state: game.day + the season + the day's weather + whether the hay meadow is sown / the paddock has
// enrichment (both draw more wildlife). Each has a rarity and a flavour blurb. The player keeps a bounded
// life-list of species they've spotted; spotting a NEW species gives a tiny, bounded one-time rep nudge (at
// most WILDLIFE.length·WILDLIFE_REP over the whole game). Deterministic — no Date/Math.random.
const WILDLIFE=[
  {id:'robin',     name:'Robin',         emoji:'🐦',   rarity:1, seasons:['spring','summer','autumn','winter'], weather:[],                     blurb:'A bold robin hops along the fence rail, eyeing the yard.'},
  {id:'sparrow',   name:'House Sparrow',  emoji:'🐤',   rarity:1, seasons:['spring','summer','autumn','winter'], weather:[],                     blurb:'A chattering flock of sparrows squabbles in the hedge.'},
  {id:'butterfly', name:'Butterfly',      emoji:'🦋',   rarity:1, seasons:['spring','summer'],                   weather:['sunny'],  garden:true, blurb:'Butterflies drift lazily over the paddock flowers.'},
  {id:'bee',       name:'Bumblebee',      emoji:'🐝',   rarity:1, seasons:['spring','summer'],                   weather:['sunny','cloudy'], garden:true, blurb:'Fat bumblebees work the meadow blooms.'},
  {id:'fieldmouse',name:'Field Mouse',    emoji:'🐭',   rarity:2, seasons:['spring','summer','autumn'],          weather:[],                     blurb:'A tiny field mouse darts between the hay bales.'},
  {id:'dragonfly', name:'Dragonfly',      emoji:'🪰',   rarity:2, seasons:['summer'],                            weather:['sunny'],  garden:true, blurb:'A jewel-blue dragonfly hovers by the water trough.'},
  {id:'swallow',   name:'Swallow',        emoji:'🕊️',   rarity:2, seasons:['spring','summer'],                   weather:['sunny','cloudy'],     blurb:'Swallows swoop low over the arena, chasing flies.'},
  {id:'hedgehog',  name:'Hedgehog',       emoji:'🦔',   rarity:2, seasons:['summer','autumn'],                   weather:[],         enrich:true, blurb:'A hedgehog snuffles along the muck heap at dusk.'},
  {id:'squirrel',  name:'Red Squirrel',   emoji:'🐿️',   rarity:2, seasons:['autumn'],                            weather:[],                     blurb:'A red squirrel buries acorns by the tack room.'},
  {id:'kestrel',   name:'Kestrel',        emoji:'🦅',   rarity:3, seasons:['spring','summer','autumn','winter'], weather:['sunny','cloudy'],     blurb:'A kestrel hangs motionless over the far paddock.'},
  {id:'owl',       name:'Barn Owl',       emoji:'🦉',   rarity:3, seasons:['autumn','winter'],                   weather:[],                     blurb:'A ghost-pale barn owl quarters the field at last light.'},
  {id:'fox',       name:'Red Fox',        emoji:'🦊',   rarity:3, seasons:['autumn','winter'],                   weather:[],         enrich:true, blurb:'A red fox trots along the treeline, glancing back once.'},
  {id:'pheasant',  name:'Pheasant',       emoji:'🐓',   rarity:3, seasons:['autumn','winter'],                   weather:['cloudy'],             blurb:'A cock pheasant struts from the long grass, all colour.'},
  {id:'deer',      name:'Roe Deer',       emoji:'🦌',   rarity:4, seasons:['spring','autumn','winter'],          weather:['cloudy','rain','snow'], blurb:'A roe deer steps from the woods to graze the verge.'},
  {id:'kingfisher',name:'Kingfisher',     emoji:'🐦‍⬛', rarity:4, seasons:['spring','summer'],                   weather:['sunny'],  garden:true, blurb:'A kingfisher flashes electric-blue along the stream.'},
  {id:'badger',    name:'Badger',         emoji:'🦡',   rarity:4, seasons:['spring','summer','autumn'],          weather:[],                     blurb:'Fresh diggings and a striped snout — a badger passed in the night.'},
];
const WILDLIFE_REP=2;      // tiny one-time rep per NEW species (bounded: ≤ WILDLIFE.length·WILDLIFE_REP lifetime)
const WL_BASE={1:55,2:32,3:16,4:7}; // base daily sighting chance (%) by rarity
const WL_RARITY_NAME={1:'Common',2:'Uncommon',3:'Rare',4:'Elusive'};
function wildlifeDef(id){ return WILDLIFE.find(w=>w.id===id)||null; }
function _wlHash(s){ let h=2166136261>>>0; s=''+(s||''); for(let i=0;i<s.length;i++){ h=Math.imul(h^s.charCodeAt(i),16777619)>>>0; } return h>>>0; }
// deterministic sighting chance for a species on a day, biased by season / weather / habitat (0..100)
function wildlifeChance(game, sp, day){
  if(!sp) return 0; day=Math.floor(day||1);
  const s=seasonOf(day).id, wx=weatherFor(day).id;
  let base=WL_BASE[sp.rarity]||10;
  if(sp.seasons && sp.seasons.indexOf(s)<0) base=Math.round(base*0.25); // off-season: much rarer
  if(sp.weather && sp.weather.length) base += (sp.weather.indexOf(wx)>=0)?12:-8;
  if(sp.garden && normGarden(game&&game.garden).sown) base += 14;       // a sown meadow draws pollinators & birds
  if(sp.enrich && ownedEnrichment(game).length>0) base += 10;           // enrichment / cover draws small mammals
  return clamp(base,3,92);
}
function wildlifeVisible(game, sp, day){ if(!sp) return false; day=Math.floor(day||1);
  return (hashDay((day*131)^_wlHash(sp.id))%100) < wildlifeChance(game,sp,day); }
// the deterministic set of creatures around the ranch today (rarest first)
function wildlifeToday(game){ const day=Math.floor((game&&game.day)||1);
  return WILDLIFE.filter(sp=>wildlifeVisible(game,sp,day))
    .sort((a,b)=>(b.rarity-a.rarity)||(a.id<b.id?-1:1))
    .map(sp=>({id:sp.id, name:sp.name, emoji:sp.emoji, rarity:sp.rarity, rarityName:WL_RARITY_NAME[sp.rarity], blurb:sp.blurb})); }
function normWildlifeLog(game){ if(!game) return {seen:[]}; if(!game.wildlife||typeof game.wildlife!=='object') game.wildlife={seen:[]};
  if(!Array.isArray(game.wildlife.seen)) game.wildlife.seen=[];
  game.wildlife.seen=game.wildlife.seen.filter(id=>!!wildlifeDef(id)).filter((v,i,a)=>a.indexOf(v)===i);
  return game.wildlife; }
function lifeList(game){ return normWildlifeLog(game).seen.slice(); }
function hasSpotted(game, id){ return normWildlifeLog(game).seen.indexOf(id)>=0; }
// spot a creature that's actually around today; records it on the life-list (one-time tiny rep for a NEW species)
function spotSpecies(game, id){ const sp=wildlifeDef(id); if(!sp) return {ok:false,why:'Unknown creature.'};
  const day=Math.floor((game&&game.day)||1), log=normWildlifeLog(game);
  if(log.seen.indexOf(id)>=0) return {ok:false, already:true, why:'Already on your life-list.'};
  if(!wildlifeVisible(game,sp,day)) return {ok:false, why:'Not around today — look again another day.'};
  log.seen.push(id);
  game.rep=(game.rep||0)+WILDLIFE_REP; // a tiny, bounded thrill-of-the-spot nudge
  game.stats=game.stats||{}; game.stats.wildlifeSpots=(game.stats.wildlifeSpots||0)+1;
  return {ok:true, species:sp, rep:WILDLIFE_REP, newSpecies:true}; }
function wildlifeProgress(game){ const seen=lifeList(game).length, total=WILDLIFE.length;
  return { seen, total, pct: total?seen/total:0, complete: seen>=total }; }

// ---------- Visiting farrier / traveling blacksmith (a time-limited rotating smith stall) ----------
// Like the general store's restock cycle, but themed to a traveling smith who ARRIVES for a few days
// each cycle with a small rotating set of deals — deterministic (keyed to the visit index via
// seededOnce), economy-safe (real coins, bounded effects, one buy per deal per visit). Composes with
// the EXISTING systems (hooves/care needs, hay, tack via a bounded shoe buff, coins).
const SMITH_CYCLE=12;   // days between the smith's visits
const SMITH_STAY=4;     // days the smith stays each visit
const SMITH_SLOTS=3;    // deals offered per visit
const SMITH_SHOE_DAYS=6;    // how long a set of race shoes lasts
const SMITH_SHOE_BONUS=0.03;// the tiny, bounded competition edge from fresh shoes (+3%)
const SMITH_DEALS=[
  {id:'trim',    name:'Herd Hoof-Trim',  emoji:'🧰', price:130, effect:{kind:'hooves'},                  desc:'The smith trims & checks every horse — tops the 🧰 Farrier & 🧼 Grooming needs.'},
  {id:'shoes',   name:'Racing Plates',   emoji:'🧲', price:220, effect:{kind:'shoes'},                   desc:'A set of light race shoes — a small competition edge for a few days.'},
  {id:'carekit', name:'Full Re-Shod',    emoji:'✨', price:180, effect:{kind:'carekit'},                 desc:'A top-to-toe going-over — every care need topped right up.'},
  {id:'haydeal', name:'Smithy Hay Cart',  emoji:'🌾', price:70,  effect:{kind:'feed', amount:50},        desc:'A cart of hay off the smith’s wagon — 50 bales.'},
  {id:'tonic',   name:'Hoof & Coat Tonic',emoji:'💊', price:100, effect:{kind:'tonic', health:8, happy:4},desc:'A soothing tonic — a herd-wide pick-me-up.'},
  {id:'charm',   name:'Lucky Horseshoe',  emoji:'🍀', price:180, effect:{kind:'rep', rep:10},            desc:'A forged lucky shoe nailed above the gate — a little renown.'},
];
function smithDealDef(id){ return SMITH_DEALS.find(d=>d.id===id)||null; }
function smithVisitIndex(day){ return Math.floor((Math.floor(day||1)-1)/SMITH_CYCLE); }
function smithDayInCycle(day){ return (Math.floor(day||1)-1)%SMITH_CYCLE; }
function smithVisitActive(game){ return smithDayInCycle((game&&game.day)||1) < SMITH_STAY; }
function smithVisitWindow(game){ const day=(game&&game.day)||1, idx=smithVisitIndex(day), arrive=idx*SMITH_CYCLE+1, active=smithVisitActive(game);
  return { index:idx, arrive, depart:arrive+SMITH_STAY-1, active, daysLeft:active?(SMITH_STAY-smithDayInCycle(day)):0 }; }
function nextSmithVisit(game){ const day=(game&&game.day)||1, idx=smithVisitIndex(day), arrive=(idx+1)*SMITH_CYCLE+1;
  return { arrive, inDays:arrive-day }; }
function normSmith(s){ s=s||{}; return {
  visit:(typeof s.visit==='number'&&isFinite(s.visit))?s.visit:-1,
  bought:Array.isArray(s.bought)?s.bought.filter(id=>!!smithDealDef(id)):[],
  shoesT:(typeof s.shoesT==='number'&&isFinite(s.shoesT))?clamp(s.shoesT,0,SMITH_SHOE_DAYS):0 }; }
function smithBought(game){ const s=normSmith(game&&game.smith); return (s.visit===smithVisitIndex((game&&game.day)||1))?s.bought:[]; }
function smithDealBought(game,id){ return smithBought(game).indexOf(id)>=0; }
function smithCatalogueFor(idx){ const rng=seededOnce(((idx>>>0)*2246822519+777)>>>0); const pool=SMITH_DEALS.slice(), out=[];
  for(let i=0;i<SMITH_SLOTS && pool.length;i++){ const j=Math.floor(rng()*pool.length); out.push(pool.splice(j,1)[0]); }
  return out; }
function smithRoster(game){ const idx=smithVisitIndex((game&&game.day)||1);
  return smithCatalogueFor(idx).map(it=>({ id:it.id, name:it.name, emoji:it.emoji, desc:it.desc, price:it.price, effect:it.effect, bought:smithDealBought(game,it.id) })); }
function smithDealAffordable(game,id){ const s=smithRoster(game).find(x=>x.id===id); return !!s && !s.bought && smithVisitActive(game) && ((game&&game.money)||0)>=s.price; }
function applySmithEffect(game,id){ const it=smithDealDef(id); if(!it) return null; const e=it.effect;
  if(e.kind==='hooves'){ let n=0; for(const h of (game.horses||[])){ needsInit(h); for(const nid of ['hooves','groom']){ if(h.needs[nid]<100){ n++; h.needs[nid]=100; } } } return {hooves:n}; }
  if(e.kind==='carekit'){ let n=0; for(const h of (game.horses||[])){ needsInit(h); for(const nid of NEED_IDS){ if(h.needs[nid]<100) n++; h.needs[nid]=100; } } return {caredNeeds:n}; }
  if(e.kind==='feed'){ game.feed=(game.feed||0)+e.amount; return {feed:e.amount}; }
  if(e.kind==='tonic'){ for(const h of (game.horses||[])){ h.health=clamp((h.health||0)+(e.health||0),0,100); h.happy=clamp((h.happy||0)+(e.happy||0),0,100); } return {horses:(game.horses||[]).length}; }
  if(e.kind==='rep'){ game.rep=(game.rep||0)+(e.rep||0); return {rep:e.rep}; }
  if(e.kind==='shoes'){ if(!game.smith||typeof game.smith!=='object') game.smith=normSmith(null); game.smith.shoesT=SMITH_SHOE_DAYS; return {shoesDays:SMITH_SHOE_DAYS}; }
  return null; }
function buySmithDeal(game,id){
  if(!game) return {ok:false,why:'No ranch.'};
  if(!smithVisitActive(game)) return {ok:false,why:'The farrier isn’t here right now.'};
  const slot=smithRoster(game).find(s=>s.id===id);
  if(!slot) return {ok:false,why:'Not on offer this visit.'};
  const idx=smithVisitIndex(game.day||1);
  game.smith=normSmith(game.smith);
  if(game.smith.visit!==idx){ game.smith.visit=idx; game.smith.bought=[]; } // a fresh visit → reset the bought set
  if(game.smith.bought.indexOf(id)>=0) return {ok:false,why:'Already bought this visit.'};
  if((game.money||0)<slot.price) return {ok:false,why:'Not enough coins.'};
  game.money-=slot.price; game.smith.bought.push(id);
  const effect=applySmithEffect(game,id);
  game.stats=game.stats||{}; game.stats.smithDeals=(game.stats.smithDeals||0)+1;
  return {ok:true, deal:slot, price:slot.price, effect};
}
function smithShoeActive(game){ return normSmith(game&&game.smith).shoesT>0; }
function smithShoeMult(game){ return smithShoeActive(game)?(1+SMITH_SHOE_BONUS):1; }
function tickSmith(game){ if(!game||!game.smith) return; if((game.smith.shoesT||0)>0) game.smith.shoesT=Math.max(0, game.smith.shoesT-1); }

// ---------- Ranch-tour photo album / postcard (READ-ONLY presentation over existing state) ----------
// A curated gallery + a shareable postcard assembled from the herd, scrapbook, trophies & stats.
// No economy/state change, no new persisted data. Deterministic — no Date/Math.random.
function tourHerd(game){ return ((game&&game.horses)||[]).filter(Boolean); }
function tourScrapbook(game){ // read-only: never creates game.scrapbook
  const a=(game&&Array.isArray(game.scrapbook))?game.scrapbook:[];
  return a.slice().sort((x,y)=> (y.day-x.day) || ((y.seq||0)-(x.seq||0)) || (y.pinned?1:0)-(x.pinned?1:0)); }
function tourStops(game){
  const hs=tourHerd(game), stops=[];
  if(hs.length){
    const star=hs.slice().sort((a,b)=>overall(b)-overall(a))[0];
    stops.push({ id:'star', emoji:'⭐', title:'Star of the Stable',
      subtitle:star.name+' — '+((breedDef(star.breed)||{name:star.breed}).name)+' · OVR '+overall(star), ref:star.id||null });
    const champs=hs.filter(h=>(h.wins||0)>=3);
    if(champs.length){ const c=champs.slice().sort((a,b)=>(b.wins||0)-(a.wins||0))[0];
      stops.push({ id:'champion', emoji:'🏆', title:'Champion',
        subtitle:c.name+' — '+(c.wins||0)+' show wins', ref:c.id||null }); }
    const coatH=hs.slice().sort((a,b)=>((coatOf(b).tier||0)-(coatOf(a).tier||0))||(overall(b)-overall(a)))[0];
    if((coatOf(coatH).tier||0)>0) stops.push({ id:'coat', emoji:'🎨', title:'Finest Coat',
      subtitle:coatH.name+' — '+coatOf(coatH).name+' ('+(COAT_TIER_NAME[coatOf(coatH).tier]||'Rare')+')', ref:coatH.id||null });
    const foals=hs.filter(h=>stageForAge(h.age||0).id==='foal');
    if(foals.length){ const f=foals.slice().sort((a,b)=>(a.age||0)-(b.age||0))[0];
      stops.push({ id:'foal', emoji:'🐣', title:'Newest Arrival',
        subtitle:f.name+' — '+((breedDef(f.breed)||{name:f.breed}).name)+' · '+ageLabel(f), ref:f.id||null }); }
  }
  const rt=ribbonTally(game);
  if(rt.ribbons>0) stops.push({ id:'ribbons', emoji:'🎗️', title:'Ribbon Wall',
    subtitle:rt.ribbons+' rosette'+(rt.ribbons!==1?'s':'')+' — '+rt.gold+'🥇 '+rt.silver+'🥈 '+rt.bronze+'🥉', ref:null });
  const sb=tourScrapbook(game);
  if(sb.length){ const m=sb.slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.day-a.day))[0];
    stops.push({ id:'memory', emoji:m.emoji||'📸', title:'From the Scrapbook',
      subtitle:(m.title||'Memory')+(m.name?' · '+m.name:''), ref:m.id||null }); }
  if(hs.length){ const breeds=new Set(hs.map(h=>h.breed)).size;
    stops.push({ id:'herd', emoji:'🐴', title:'The Herd',
      subtitle:hs.length+' horse'+(hs.length!==1?'s':'')+' across '+breeds+' breed'+(breeds!==1?'s':''), ref:null }); }
  return stops;
}
function tourAlbum(game){
  const g=game||{}, ranch=ranchName(g), stops=tourStops(g), st=stampFor(g);
  const hs=tourHerd(g), rt=ribbonTally(g);
  const star=hs.length?hs.slice().sort((a,b)=>overall(b)-overall(a))[0]:null;
  const headline = star ? ('Home of '+star.name+', OVR '+overall(star))
    : (rt.ribbons?('Winners of '+rt.ribbons+' rosettes'):'A brand-new ranch finding its feet');
  return { cover:{ ranch, day:st.day, stamp:st, rank:playerRank(g), rankName:rankFor(g.rep||0).name,
      headline, subtitle:'A guided tour of '+ranch }, stops, count:stops.length, empty:stops.length===0 };
}
function postcard(game){
  const g=game||{}, ranch=ranchName(g), st=stampFor(g), stops=tourStops(g);
  const lines=stops.slice(0,4).map(s=>s.emoji+' '+s.subtitle);
  if(!lines.length) lines.push('🌱 Just getting started — come back soon!');
  return { title:'Greetings from '+ranch, greeting:'Wish you were here at '+ranch+'!',
    lines, stamp:st, ranch, day:st.day, rankName:rankFor(g.rep||0).name, manager:'Fleur' };
}
function postcardText(game){
  const p=postcard(game);
  return ['📮 '+p.title, p.greeting, ''].concat(p.lines).concat(['',
    '— '+p.manager+' · '+p.stamp.season+', Year '+p.stamp.year+' (day '+p.stamp.day+')']).join('\n');
}
// ---------- Horse of the Month spotlight / feature board (READ-ONLY deterministic star pick) ----------
// Each period (a 14-day "month" = one season) the standout horse is chosen by a weighted score of
// overall + wins + bond + coat tier. Purely derived from the herd + period — no state change, no new
// persisted data. Deterministic: a clear best always wins; exact ties rotate by period.
function _spotHash(s){ let h=2166136261>>>0; s=''+(s||''); for(let i=0;i<s.length;i++){ h=Math.imul(h^s.charCodeAt(i),16777619)>>>0; } return h>>>0; }
function spotlightPeriod(game){ const day=(game&&game.day)||1; const idx=Math.floor((Math.floor(day)-1)/SEASON_LEN);
  const s=seasonOf(day), y=yearOf(day); return { index:idx, id:'p'+idx, season:s, year:y, label:s.name+' · Year '+y }; }
function spotlightScore(h){ if(!h) return 0;
  const ovr=overall(h), wins=(h.wins||0), bond=(h.bond||0), coat=(coatOf(h).tier||0);
  return Math.round(ovr*1.0 + wins*6 + bond*0.25 + coat*8 + (h.happy==null?0:h.happy*0.05)); }
function spotlightRank(h, periodIdx){ return spotlightScore(h)*1000 + (hashDay(((periodIdx+1)*97)^_spotHash(h&&(h.id||h.name)))%1000); }
function spotlightReasons(h){ if(!h) return []; const out=[];
  const wins=(h.wins||0), ovr=overall(h), coat=coatOf(h), bond=(h.bond||0), sp=(typeof specialtyOf==='function')?specialtyOf(h):null;
  if(wins>=3) out.push({emoji:'🏆', text:'a Champion with '+wins+' show wins'});
  else if(wins>0) out.push({emoji:'🥇', text:wins+' show win'+(wins!==1?'s':'')});
  if(ovr>=80) out.push({emoji:'⭐', text:'a superb '+ovr+' overall'});
  if((coat.tier||0)>=2) out.push({emoji:'🎨', text:'a rare '+coat.name+' coat'});
  if(bond>=70) out.push({emoji:'💖', text:'devoted to the yard'});
  if(sp){ const d=disciplineDef(sp); if(d) out.push({emoji:d.emoji, text:'a '+d.name+' specialist'}); }
  if(!out.length) out.push({emoji:'🐴', text:'the heart of the herd'});
  return out; }
const SPOTLIGHT_LINES=[
  '{name}, our {breed}, is the pride of {ranch} this {season} — {reason}.',
  'All eyes on {name} the {breed} this {season}: {reason}.',
  'This {season}, {name} takes the rosette as {ranch}’s star — {reason}.',
  '{ranch} salutes {name}, a {breed} to be proud of — {reason}.',
];
function spotlightCitation(game){ const s=horseOfTheMonth(game); if(!s) return '';
  const p=spotlightPeriod(game), h=s.horse, b=breedDef(h.breed)||{name:h.breed};
  const line=SPOTLIGHT_LINES[hashDay((p.index+1)*31)%SPOTLIGHT_LINES.length];
  const reason=(s.reasons[0]||{text:'a fine horse'}).text;
  return line.replace(/\{name\}/g,h.name).replace(/\{breed\}/g,b.name).replace(/\{ranch\}/g,ranchName(game)).replace(/\{season\}/g,p.season.name).replace(/\{reason\}/g,reason); }
function horseOfTheMonth(game){
  const hs=((game&&game.horses)||[]).filter(Boolean); if(!hs.length) return null;
  const p=spotlightPeriod(game);
  const star=hs.slice().sort((a,b)=>spotlightRank(b,p.index)-spotlightRank(a,p.index))[0];
  return { horse:star, id:star.id||null, name:star.name, score:spotlightScore(star),
    reasons:spotlightReasons(star), card:cardModel(star,game), period:p }; }
function spotlightBoard(game){
  const hs=((game&&game.horses)||[]).filter(Boolean), p=spotlightPeriod(game);
  if(!hs.length) return { period:p, star:null, mentions:[], empty:true };
  const ranked=hs.slice().sort((a,b)=>spotlightRank(b,p.index)-spotlightRank(a,p.index));
  const star=ranked[0];
  const mentions=ranked.slice(1,4).map(h=>({ id:h.id||null, name:h.name,
    breedName:(breedDef(h.breed)||{name:h.breed}).name, overall:overall(h), score:spotlightScore(h),
    reason:(spotlightReasons(h)[0]||{text:''}).text, coat:coatOf(h).name }));
  return { period:p, star:{ id:star.id||null, name:star.name, score:spotlightScore(star), reasons:spotlightReasons(star), card:cardModel(star,game) },
    citation:spotlightCitation(game), mentions, empty:false };
}

function achievementProgress(game){ const a=achievementState(game); return { unlocked:a.unlocked, total:a.total, pct: a.total?Math.round(100*a.unlocked/a.total):0 }; }

// ---------- Keepsake ribbon wall / rosette display (read-only aggregator over trophies[]) ----------
// A lovely wall of every show placing the ranch has earned. Pure display over the EXISTING
// trophies[] records ({horse,breed,disc,tier,place,day}); no new awards, no state change.
const ROSETTE_STYLES=[
  {place:1, id:'gold',   name:'First',  emoji:'🥇', colour:'#f2c14e', ribbon:'🏵️'},
  {place:2, id:'silver', name:'Second', emoji:'🥈', colour:'#c7cdd6', ribbon:'🎗️'},
  {place:3, id:'bronze', name:'Third',  emoji:'🥉', colour:'#cd8b57', ribbon:'🎗️'},
];
function rosetteStyleFor(place){ return ROSETTE_STYLES.find(s=>s.place===place) || {place:(place||0), id:'placed', name:'Placed', emoji:'🎗️', colour:'#9aa4af', ribbon:'🎗️'}; }
function rosetteFor(t){
  t=t||{};
  const style=rosetteStyleFor(t.place);
  const d=disciplineDef(t.disc)||{id:(t.disc||'show'), name:(t.disc||'Show'), emoji:'🏅'};
  const td=(t.tier!=null)?tierDef(t.tier):null;
  return { place:(t.place||0), placeName:style.name, emoji:style.emoji, colour:style.colour, ribbon:style.ribbon,
    disc:d.id, discName:d.name, discEmoji:d.emoji,
    tier:(t.tier!=null?t.tier:null), tierName:(td?td.name:(t.tier!=null?('Tier '+t.tier):'Show')),
    horse:(t.horse||'—'), breed:(t.breed||null), day:(t.day||0) };
}
function ribbonTally(game){
  const tr=(game&&Array.isArray(game.trophies))?game.trophies.filter(Boolean):[];
  let gold=0,silver=0,bronze=0,other=0,bestTier=0; const byDisc={};
  for(const t of tr){ const p=t.place;
    if(p===1) gold++; else if(p===2) silver++; else if(p===3) bronze++; else other++;
    if(typeof t.tier==='number' && t.tier>bestTier) bestTier=t.tier;
    const d=t.disc||'unknown'; byDisc[d]=(byDisc[d]||0)+1; }
  let topDiscipline=null, topN=0;
  for(const d of DISC_IDS){ const n=byDisc[d]||0; if(n>topN){ topN=n; topDiscipline=d; } } // stable: DISC order
  for(const d in byDisc){ if(DISC_IDS.indexOf(d)<0 && byDisc[d]>topN){ topN=byDisc[d]; topDiscipline=d; } }
  return { ribbons:tr.length, gold, silver, bronze, other, bestTier,
    bestTierName:(bestTier?((tierDef(bestTier)||{name:'Tier '+bestTier}).name):'—'),
    topDiscipline, topDisciplineName:(topDiscipline?((disciplineDef(topDiscipline)||{name:topDiscipline}).name):'—'),
    topDisciplineCount:topN, byDiscipline:byDisc };
}
function ribbonWall(game){
  const tr=(game&&Array.isArray(game.trophies))?game.trophies.filter(Boolean):[];
  const rosettes=tr.map(rosetteFor); // trophies are stored newest-first
  const tally=ribbonTally(game);
  const byPlace=ROSETTE_STYLES.map(s=>({ place:s.place, name:s.name, emoji:s.emoji, colour:s.colour,
    count:rosettes.filter(r=>r.place===s.place).length }));
  const discOrder=DISC_IDS.slice();
  Object.keys(tally.byDiscipline).forEach(d=>{ if(discOrder.indexOf(d)<0) discOrder.push(d); });
  const byDiscipline=discOrder.filter(d=>(tally.byDiscipline[d]||0)>0).map(d=>{ const dd=disciplineDef(d)||{name:d,emoji:'🏅'};
    const rs=rosettes.filter(r=>r.disc===d);
    return { disc:d, name:dd.name, emoji:dd.emoji, count:rs.length,
      gold:rs.filter(r=>r.place===1).length, silver:rs.filter(r=>r.place===2).length, bronze:rs.filter(r=>r.place===3).length }; });
  const byTier=COMP_TIERS.slice().sort((a,b)=>b.id-a.id).map(t=>({ tier:t.id, name:t.name,
    count:rosettes.filter(r=>r.tier===t.id).length })).filter(x=>x.count>0);
  // proudest: highest tier, then best place, then most recent
  const proudest=rosettes.slice().sort((a,b)=>((b.tier||0)-(a.tier||0)) || (a.place-b.place) || (b.day-a.day)).slice(0,6);
  const recent=rosettes.slice(0,6);
  const headline = tally.ribbons
    ? (tally.ribbons+' rosette'+(tally.ribbons!==1?'s':'')+' on the wall — '+tally.gold+' gold'+(tally.bestTier?', best at the '+tally.bestTierName:'')+'.')
    : 'The ribbon wall is bare — go win some rosettes!';
  return { rosettes, tally, byPlace, byDiscipline, byTier, proudest, recent, headline, empty:rosettes.length===0 };
}

function clamp(v,a,b){ return v<a?a:v>b?b:v; }

function normAudio(a){ a=a||{}; return { on:a.on===true, vol:(typeof a.vol==='number')?clamp(a.vol,0,1):0.6 }; }
