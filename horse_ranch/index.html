<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Skyhorse Stables — Horse Ranch Simulator</title>
<style>
  :root{
    --bg:#1a2416;--panel:#243019;--panel2:#2f3f22;--edge:#0c110a;--ink:#f4efdf;--ink2:#c3c9a6;
    --gold:#ffd35a;--gold2:#e0a53a;--good:#8bd36b;--bad:#e5624a;--warn:#f0a93b;--blue:#69c7e0;
    --pink:#f28bb0;--slot:#161f10;--wood:#6b4a2b;--wood2:#8a6238;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:#0a0d08;color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;overscroll-behavior:none;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  #app{width:100%;max-width:560px;min-height:100%;background:linear-gradient(#182110,#0d1109);display:flex;flex-direction:column;box-shadow:0 0 40px #000;position:relative}

  /* HUD */
  #hud{display:flex;align-items:center;gap:5px;padding:8px;background:linear-gradient(#2f3f22,#233016);border-bottom:2px solid var(--edge);font-size:13px;flex-wrap:wrap}
  .chip{background:var(--slot);border:1px solid var(--edge);border-radius:7px;padding:4px 8px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:800;font-variant-numeric:tabular-nums}
  .chip b{color:var(--gold)} .chip.feed b{color:var(--good)} .chip.rep b{color:var(--blue)} .chip.day b{color:var(--ink)}
  .spacer{flex:1}
  #speedBtns{display:flex;gap:3px}
  .sbtn{background:var(--slot);border:1px solid var(--edge);border-radius:6px;color:var(--ink2);font-weight:900;font-size:12px;padding:4px 8px;cursor:pointer;min-width:30px}
  .sbtn.on{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border-color:var(--gold2)}

  /* Scene banner */
  #scene{position:relative;height:96px;--grassTop:#8fbf68;--grassBot:#6ea34a;background:linear-gradient(#a9d0ec 0%,#c9e4f2 55%,var(--grassTop) 55%,var(--grassBot) 100%);border-bottom:2px solid var(--edge);overflow:hidden;line-height:0}
  #seasonGlass{position:absolute;inset:0;pointer-events:none;background:transparent;transition:background .8s ease}
  #skyWarm,#skyNight{position:absolute;inset:0;pointer-events:none;opacity:0}
  #skyWarm{background:linear-gradient(#ff9e5a55,#ffd08a22 55%,transparent 55%)}
  #skyNight{background:linear-gradient(#0a1330,#1b2547 40%,#0d2a33 55%,#0a1f12 100%)}
  #scene .sun,#scene .moon{position:absolute;top:12px;left:60%;width:34px;height:34px;border-radius:50%}
  #scene .sun{background:radial-gradient(circle,#fff2b0,#ffd35a 70%,#e0a53a);box-shadow:0 0 24px #ffd35a88}
  #scene .moon{width:26px;height:26px;background:radial-gradient(circle at 38% 38%,#fdfbf0,#d9dce6 70%,#aab0c2);box-shadow:0 0 18px #cdd6ff66;opacity:0}
  #scene .barn{position:absolute;bottom:24px;left:18px;width:70px;height:46px;--barnA:#a23c2e;--barnB:#7d2c22;--barnE:#4a1a13;--barnRoof:#5a2018;background:linear-gradient(var(--barnA),var(--barnB));border:2px solid var(--barnE);border-radius:3px;z-index:2}
  #scene .barn:before{content:"";position:absolute;top:-16px;left:-4px;right:-4px;height:18px;background:var(--barnRoof);clip-path:polygon(0 100%,50% 0,100% 100%)}
  #scene .barn:after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:26px;background:var(--barnE);border-radius:3px 3px 0 0}
  #sceneFlag{position:absolute;left:52px;top:0;width:2px;height:22px;background:#6b4a2a;z-index:3;display:none}
  #sceneFlag:after{content:"";position:absolute;left:2px;top:1px;border-style:solid;border-width:4px 0 4px 12px;border-color:transparent transparent transparent var(--flagC,#e8b53a);animation:flagwave 2.4s ease-in-out infinite;transform-origin:left center}
  @keyframes flagwave{0%,100%{transform:skewY(0)}50%{transform:skewY(-6deg)}}
  #sceneDecor{position:absolute;inset:0;pointer-events:none;z-index:2}
  #sceneDecor .decorProp{position:absolute;font-size:20px;filter:drop-shadow(0 1px 1px #0004);line-height:1}
  #scene .horse{position:absolute;bottom:18px;z-index:3;filter:drop-shadow(0 2px 1px #0005);animation:graze 3s ease-in-out infinite}
  #scene .horse .hsvg{display:block}
  #sceneCanteen{position:absolute;bottom:22px;right:20px;font-size:30px;filter:drop-shadow(0 2px 2px #0005);z-index:2}
  @keyframes graze{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-2px)}}
  #wx{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:4}
  .drop{position:absolute;top:-12px;width:1.5px;height:9px;background:linear-gradient(#bcd8f0,#8fb4d8);border-radius:1px;opacity:.55;animation:rainfall linear infinite}
  .flake{position:absolute;top:-10px;color:#fff;font-size:9px;opacity:.85;animation:snowfall linear infinite}
  @keyframes rainfall{0%{transform:translateY(-12px)}100%{transform:translateY(108px)}}
  @keyframes snowfall{0%{transform:translateY(-10px) translateX(0)}100%{transform:translateY(108px) translateX(8px)}}
  #sceneTitle{position:absolute;top:8px;left:12px;font-size:13px;font-weight:900;color:#2a3a18;text-shadow:0 1px 0 #ffffff70;letter-spacing:.5px;z-index:5}
  #sceneRank{position:absolute;top:26px;left:12px;font-size:11px;font-weight:800;color:#3a4a24;text-shadow:0 1px 0 #ffffff55;z-index:5}
  #sceneWeather{position:absolute;top:8px;right:12px;font-size:16px;z-index:5;text-shadow:0 1px 2px #0004}

  /* Tabs */
  #tabs{display:flex;background:#1b2411;border-bottom:2px solid var(--edge)}
  .tab{flex:1;text-align:center;padding:9px 2px 7px;font-size:11px;font-weight:800;color:var(--ink2);cursor:pointer;border-right:1px solid #0c110a;position:relative}
  .tab:last-child{border-right:none}
  .tab .ti{font-size:18px;display:block;line-height:1.1}
  .tab.on{background:linear-gradient(#2f3f22,#26331a);color:var(--gold)}
  .tab.on:after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--gold)}
  .tab .badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--bad);color:#fff;font-size:9px;font-weight:900;border-radius:8px;padding:0 4px;min-width:14px}

  /* Content */
  #main{flex:1;overflow-y:auto;padding:10px 10px 90px;-webkit-overflow-scrolling:touch}
  .sec{display:none} .sec.on{display:block}
  h2.head{font-size:13px;letter-spacing:.5px;color:var(--gold);margin:2px 0 8px;text-transform:uppercase}
  .sub{font-size:11px;color:var(--ink2);margin:-4px 0 10px}

  /* Cards */
  .card{background:linear-gradient(var(--panel2),var(--panel));border:1px solid var(--edge);border-radius:11px;padding:10px;margin-bottom:9px;box-shadow:0 2px 0 #0006}
  .row{display:flex;gap:8px;align-items:center}
  .grow{flex:1;min-width:0}
  .hname{font-weight:900;font-size:14px;display:flex;align-items:center;gap:6px}
  .hbreed{font-size:11px;color:var(--ink2);margin-top:1px}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .tag{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:20px;background:#0d130a;border:1px solid #0c110a;color:var(--ink2)}
  .tag.sex-m{color:#7fb8ff;border-color:#26405f} .tag.sex-f{color:var(--pink);border-color:#5f2640}
  .tag.stage{color:var(--gold)} .tag.pure{color:var(--good);border-color:#2f4a1c}
  .tag.preg{color:var(--pink);border-color:#5f2640;background:#2a1420}
  .tag.busy{color:var(--warn);border-color:#4a3612}
  .tag.rare{color:#d9a3ff;border-color:#4a2f5f}
  .hface{width:46px;height:46px;border-radius:10px;background:radial-gradient(circle at 50% 35%,#3a4a24,#1c2711);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid #0c110a;flex-shrink:0}
  .stats{display:flex;gap:6px;margin-top:7px}
  .stat{flex:1;background:#0d130a;border-radius:6px;padding:3px 5px;text-align:center}
  .stat .sv{font-weight:900;font-size:13px;font-variant-numeric:tabular-nums}
  .stat .sl{font-size:8.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px}
  .bar{height:5px;border-radius:3px;background:#0d130a;overflow:hidden;margin-top:2px}
  .bar>i{display:block;height:100%;border-radius:3px}
  .val{color:var(--gold);font-weight:900;font-variant-numeric:tabular-nums}

  /* Buttons */
  .btn{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border:none;border-radius:9px;font-weight:900;font-size:13px;padding:9px 12px;cursor:pointer;box-shadow:0 3px 0 #0006;white-space:nowrap}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0006}
  .btn.sm{padding:7px 10px;font-size:12px}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--edge);box-shadow:0 2px 0 #0006}
  .btn.blue{background:linear-gradient(#7fd3ec,#4aa9c8);color:#06212b}
  .btn.pink{background:linear-gradient(#f7a8c6,#df6f9c);color:#3a0a20}
  .btn.red{background:linear-gradient(#f0836e,#c73f2b);color:#2a0a05}
  .btn:disabled{filter:grayscale(.7) brightness(.7);cursor:not-allowed}
  .btnrow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}

  .empty{text-align:center;color:var(--ink2);font-size:13px;padding:26px 10px;line-height:1.6}
  .money-need{color:var(--bad)}
  .pill{display:inline-flex;align-items:center;gap:3px;background:#0d130a;border:1px solid #0c110a;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:800}

  /* Stable card */
  .stable{border-left:4px solid var(--wood2)}
  .card.locked{opacity:.6;border-left:4px solid #3a4a24}
  .stalls{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .stallDot{width:15px;height:15px;border-radius:4px;background:#0d130a;border:1px solid #0c110a}
  .stallDot.full{background:linear-gradient(var(--gold),var(--gold2));border-color:var(--gold2)}
  .stallDot.board{background:linear-gradient(#7fd3ec,#4aa9c8);border-color:#4aa9c8}
  .mapGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:6px 0}
  .mapBarn{background:#0e150b;border:1px solid #223018;border-radius:10px;padding:8px}
  .mapBarn.sel{border-color:var(--gold2);box-shadow:0 0 0 1px var(--gold2) inset}
  .mapStalls{display:flex;flex-wrap:wrap;gap:3px;margin:5px 0}
  .mapStalls .stallDot{width:12px;height:12px}

  /* Breeding picker */
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pickbox{background:#0d130a;border:2px dashed #3a4a24;border-radius:11px;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center;cursor:pointer}
  .pickbox.filled{border-style:solid;border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .pickbox .pf{font-size:34px}
  .pickbox .pn{font-weight:900;font-size:12px;margin-top:3px}
  .pickbox .ps{font-size:10px;color:var(--ink2)}
  .heart{text-align:center;font-size:22px;margin:8px 0}

  /* Modal */
  .modal{position:fixed;inset:0;background:#0a0d08d8;z-index:20;display:none;align-items:flex-end;justify-content:center}
  .modal.on{display:flex}
  .sheet{position:relative;width:100%;max-width:560px;background:linear-gradient(#2f3f22,#233016);border-top:2px solid var(--gold2);border-radius:16px 16px 0 0;padding:16px 14px 22px;max-height:82vh;overflow-y:auto;animation:slideup .22s ease-out}
  .sheetX{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border-radius:50%;border:1px solid var(--edge);background:var(--slot);color:var(--ink2);font-size:15px;font-weight:900;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sheetX:active{transform:scale(.9)} .sheetX:hover{color:var(--ink);background:#0d130a}
  @keyframes slideup{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 40px 4px 0;font-size:16px;color:var(--gold)}
  .sheet .msg{font-size:13px;line-height:1.5;color:var(--ink);margin:6px 0 12px}
  .optlist{display:flex;flex-direction:column;gap:7px}
  .opt{background:#0d130a;border:1px solid #0c110a;border-radius:9px;padding:10px;display:flex;gap:8px;align-items:center;cursor:pointer}
  .opt:active{background:#131c0d}
  .modal.center{align-items:center}
  .sheet.card2{border-radius:16px;max-width:360px;margin:0 14px}

  /* Toast */
  #toasts{position:fixed;top:64px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:30;pointer-events:none}
  /* Guided tutorial coach-marks (non-blocking hints) */
  #tutRing{position:fixed;z-index:48;border:3px solid var(--gold);border-radius:12px;box-shadow:0 0 0 4000px #0a0d0866,0 0 16px #ffd35a;pointer-events:none;display:none;transition:all .25s ease}
  #tutBubble{position:fixed;z-index:49;max-width:300px;width:calc(100% - 32px);background:linear-gradient(#2f3f22,#233016);border:1px solid var(--gold2);border-radius:14px;padding:12px 13px;box-shadow:0 10px 30px #000b;display:none}
  #tutBubble.on{display:block;animation:tin .25s ease-out}
  .tbHead{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .tbAvatar{font-size:22px}
  .tbTitle{font-weight:900;font-size:14px;color:var(--gold)}
  .tbText{font-size:13px;line-height:1.5;color:var(--ink)}
  .tbBtns{display:flex;align-items:center;gap:8px;margin-top:11px}
  .tbSkip{background:none;border:none;color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;padding:6px 2px}
  .tbStep{flex:1;text-align:center;font-size:11px;color:var(--ink2);font-weight:800}
  .tbNext{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border:none;border-radius:9px;font-weight:900;font-size:13px;padding:8px 14px;cursor:pointer;box-shadow:0 3px 0 #0006}
  .tbNext:active{transform:translateY(2px);box-shadow:0 1px 0 #0006}
  .toast{background:#0d130af0;border:1px solid var(--gold2);color:var(--ink);font-weight:800;font-size:13px;padding:8px 14px;border-radius:20px;box-shadow:0 4px 12px #000a;animation:tin .3s ease-out;max-width:90%;text-align:center}
  .toast.good{border-color:var(--good)} .toast.bad{border-color:var(--bad)} .toast.info{border-color:var(--blue)}
  @keyframes tin{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Goal bar */
  #goalBar{display:flex;align-items:center;gap:7px;padding:6px 10px;background:linear-gradient(#2a3a1c,#20301a);border-bottom:2px solid var(--edge);font-size:12px;font-weight:800}
  #goalBar .gicon{font-size:13px}
  #goalText{color:var(--gold);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #goalTip{color:var(--ink2);font-variant-numeric:tabular-nums;font-size:11px;white-space:nowrap}
  #goalBar.done #goalText{color:var(--good)}
  /* Coin pops + hud bump */
  .coinpop{position:fixed;z-index:40;font-weight:900;font-size:14px;color:var(--gold);text-shadow:0 2px 0 #000,0 0 8px #0008;pointer-events:none;animation:coinrise 1.1s ease-out forwards;white-space:nowrap}
  .coinpop.neg{color:var(--bad)}
  @keyframes coinrise{0%{transform:translateY(0);opacity:0}15%{opacity:1}100%{transform:translateY(-34px);opacity:0}}
  #hudMoney.bump{display:inline-block;animation:hudbump .3s ease-out}
  @keyframes hudbump{0%{transform:scale(1)}40%{transform:scale(1.28);color:#fff2b0}100%{transform:scale(1)}}
  .goalpop{border-color:var(--good)!important}
  .burst{position:fixed;z-index:45;font-size:20px;pointer-events:none;will-change:transform,opacity;animation:burstfly 1.2s ease-out forwards;text-shadow:0 1px 3px #0006}
  @keyframes burstfly{0%{transform:translate(0,0) scale(.4);opacity:0}18%{opacity:1;transform:translate(calc(var(--dx)*.4),calc(var(--dy)*.5)) scale(1.1)}100%{transform:translate(var(--dx),calc(var(--dy) + 120px)) scale(.9) rotate(30deg);opacity:0}}
  /* Pedigree tree */
  .pedwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:4px 0 6px}
  .pedtree{display:flex;gap:8px;align-items:center;min-width:min-content}
  .pcol{display:flex;flex-direction:column;gap:6px;justify-content:space-around;flex:0 0 auto}
  .pcol:nth-child(2){min-height:120px} .pcol:nth-child(3){min-height:160px}
  .pnode{background:#0d130a;border:1px solid #0c110a;border-radius:8px;padding:6px 8px;min-width:96px}
  .pnode.self{border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .pnode.empty2{opacity:.45;border-style:dashed}
  .pn2{font-weight:800;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ps2{font-size:10px;color:var(--ink2);white-space:nowrap}
  .pedkey{font-size:10.5px;color:var(--ink2);text-align:center;margin-bottom:4px}
  /* Trading card preview */
  .tcwrap{display:flex;justify-content:center;margin:4px 0 10px}
  .tcard{width:260px;background:linear-gradient(#243019,#141d0c);border:3px solid #3a4a24;border-radius:16px;padding:12px;box-shadow:0 8px 24px #000a}
  .tcard.tchamp{border-color:var(--gold2);box-shadow:0 8px 26px #000a,0 0 0 1px #ffd35a44 inset}
  .tctop{text-align:center;margin-bottom:6px}
  .tcname{font-weight:900;font-size:18px;color:var(--gold)}
  .tcbreed{font-size:11px;color:var(--ink2)}
  .tcport{height:132px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid #0c110a;margin-bottom:8px}
  .tcport .hsvg{width:120px;height:auto;filter:drop-shadow(0 3px 3px #0006)}
  .tctags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:8px}
  .cchip{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:20px;background:#0d130a;border:1px solid #0c110a;color:var(--ink2)}
  .cchip.sex-m{color:#7fb8ff} .cchip.sex-f{color:var(--pink)} .cchip.good{color:var(--good)} .cchip.rare{color:#d9a3ff} .cchip.gold{color:var(--gold);border-color:var(--gold2)}
  .csRow{display:flex;align-items:center;gap:6px;margin:3px 0}
  .csL{width:34px;font-size:10px;font-weight:800;color:var(--ink2)}
  .csBar{flex:1;height:8px;background:#0d130a;border-radius:5px;overflow:hidden}
  .csBar>i{display:block;height:100%;border-radius:5px}
  .csV{width:24px;text-align:right;font-size:11px;font-weight:900;font-variant-numeric:tabular-nums}
  .tcmeta{display:flex;justify-content:space-around;margin:8px 0 4px;font-size:12px;color:var(--ink2)}
  .tcmeta b{color:var(--ink)}
  .tccareer{text-align:center;font-size:10.5px;color:var(--ink2);margin-bottom:8px}
  .tcfoot{display:flex;flex-direction:column;gap:2px;background:#0d130a;border-radius:10px;padding:6px 9px;font-size:10px}
  .tcfoot span:first-child{color:var(--gold);font-weight:800} .tcfoot span:last-child{color:var(--ink2)}
  /* Achievements & stats */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:2px 0 4px}
  .stkv{display:flex;justify-content:space-between;background:#0d130a;border:1px solid #0c110a;border-radius:8px;padding:6px 9px;font-size:11.5px;color:var(--ink2)}
  .stkv b{color:var(--ink);font-variant-numeric:tabular-nums}
  .achlist{display:flex;flex-direction:column;gap:6px}
  .achcard{display:flex;align-items:center;gap:9px;background:#0d130a;border:1px solid #0c110a;border-radius:10px;padding:8px 10px;opacity:.55}
  .achcard.un{opacity:1;border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .achic{font-size:22px;width:30px;text-align:center;flex:0 0 auto}
  .achtx{flex:1;min-width:0}
  .achn{font-weight:900;font-size:13px}
  .achcard.un .achn{color:var(--gold)}
  .achd{font-size:10.5px;color:var(--ink2)}
  .achok{color:var(--good);font-weight:900;font-size:16px}
  /* This Week schedule */
  .weeklist{display:flex;flex-direction:column;gap:5px;margin:4px 0 8px}
  .weekrow{background:#0d130a;border:1px solid #0c110a;border-radius:9px;padding:7px 9px}
  .weekrow.today{border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .weekrow.fest{border-color:var(--gold);box-shadow:0 0 0 1px #ffd35a33 inset}
  .wdname{font-weight:900;font-size:13px}
  .wdnote{font-size:11px;color:var(--gold);font-weight:700;margin-top:1px}

// ---------- Breeds (based on real horse breeds) ----------
const BREEDS = [

  {id:'clydesdale',name:'Clydesdale',    emoji:'🐴', rarity:2, base:980,  speed:40, stamina:88, temperament:80, size:1.5,
   colors:['Bay','Roan','Black','Chestnut'], desc:'Gentle giant draft horse with feathered feet.'},
  {id:'arabian',   name:'Arabian',       emoji:'🐎', rarity:3, base:1350, speed:82, stamina:96, temperament:58, size:0.95,
   colors:['Grey','Bay','Chestnut','Black'], desc:'Ancient desert breed. Legendary endurance and elegance.'},
  {id:'andalusian',name:'Andalusian',    emoji:'🐎', rarity:3, base:1650, speed:74, stamina:80, temperament:78, size:1.05,

  {id:'thoroughbred',name:'Thoroughbred',emoji:'🐎', rarity:3, base:1750, speed:98, stamina:76, temperament:48, size:1.05,
   colors:['Bay','Chestnut','Brown','Grey'], desc:'Born to race. Pure speed, hot temper, big money.'},
  {id:'friesian',  name:'Friesian',      emoji:'🐎', rarity:4, base:2900, speed:66, stamina:82, temperament:82, size:1.15,

  {id:'akhalteke', name:'Akhal-Teke',    emoji:'🐎', rarity:5, base:4600, speed:90, stamina:98, temperament:60, size:1.0,
   colors:['Golden','Palomino','Cremello','Bay'], desc:'The rarest of all — a metallic, shimmering coat.'},
  {id:'welsh',     name:'Welsh Pony',     emoji:'🐴', rarity:1, base:300,  speed:55, stamina:64, temperament:78, size:0.78,
   colors:['Bay','Chestnut','Grey','Palomino'], desc:'Clever, versatile and kind — a favourite first pony.'},
  {id:'fjord',     name:'Norwegian Fjord',emoji:'🐴', rarity:1, base:340,  speed:46, stamina:80, temperament:84, size:0.9,
   colors:['Dun','Bay','Grey'], desc:'Ancient dun pony with a dorsal stripe and an unflappable heart.'},
  {id:'haflinger', name:'Haflinger',      emoji:'🐴', rarity:2, base:660,  speed:54, stamina:72, temperament:86, size:0.9,

   colors:['Grey','White','Bay'], desc:'The famous white stallions of classical high-school dressage.'},
];
const breedDef = id => BREEDS.find(b=>b.id===id) || null;
const RARITY_MULT = {1:1, 2:1.08, 3:1.18, 4:1.32, 5:1.5};
const RARITY_NAME = {1:'Common',2:'Uncommon',3:'Rare',4:'Elite',5:'Legendary'};

// ---------- Life stages (age is in game-days) ----------
const STAGES = [
  {id:'foal',    name:'Foal',    max:5,        factor:0.5,  feed:1},
  {id:'yearling',name:'Yearling',max:10,       factor:0.72, feed:1},
  {id:'adult',   name:'Adult',   max:46,       factor:1.0,  feed:2},
  {id:'senior',  name:'Senior',  max:Infinity, factor:0.62, feed:2},
];
function stageForAge(age){ for(const s of STAGES){ if(age < s.max) return s; } return STAGES[STAGES.length-1]; }
function isAdult(h){ const s=stageForAge(h.age); return s.id==='adult'||s.id==='senior'; }
function feedPerDay(h){ const s=stageForAge(h.age); const draft=(breedDef(h.breed)||{size:1}).size>=1.4?1:0; return s.feed+draft; }

// ---------- Aging: prime, decline, breeding/competing limits ----------
const PRIME_END=30;   // performance starts to gently ebb after this age
const BREED_MAX=56;   // too old to breed beyond here
const OLD_AGE=64;     // "elderly" — past competing age; retirement encouraged
const LIFESPAN=82;    // horses may peacefully pass around here (with long warning)

// ---------- Coat-colour genetics (simplified real dominant/recessive) ----------
// Four loci, two alleles each:
//   E : 'E' black pigment (dominant) / 'e' red (recessive)
//   A : 'A' agouti→bay (dominant) / 'a' uniform (recessive), only shows with E
//   Cr: 'C' cream (incomplete dominant, counts 0/1/2) / 'n' none
//   G : 'G' grey (dominant, masks base) / 'n' none
// Plus an occasional rare mutation coat ('Golden'/'Pearl').
const COAT_TIER_MULT=[1, 1.07, 1.20, 1.42];

// per-breed allele frequencies so market/starter coats look plausible
const COAT_PROFILE={

  andalusian:{E:0.6,A:0.4,cream:0.10,grey:0.55},

  clydesdale:{E:0.6,A:0.7,cream:0.05,grey:0.20},
  thoroughbred:{E:0.6,A:0.6,cream:0.05,grey:0.15},
  quarter:   {E:0.4,A:0.5,cream:0.30,grey:0.10},
  appaloosa: {E:0.5,A:0.5,cream:0.20,grey:0.20},
  mustang:   {E:0.5,A:0.6,cream:0.25,grey:0.10},
  welsh:     {E:0.5,A:0.5,cream:0.20,grey:0.25},

  paint:     {E:0.5,A:0.55,cream:0.25,grey:0.10},
  hanoverian:{E:0.6,A:0.55,cream:0.05,grey:0.30},
  lipizzaner:{E:0.6,A:0.4,cream:0.05,grey:0.85}, // mostly greys → white with age
};
const COAT_MAP={ red:['Chestnut','Palomino','Cremello'], bay:['Bay','Buckskin','Perlino'], black:['Black','Smoky Black','Smoky Cream'] };
function seedGenes(breed,rng){
  rng=rng||Math.random;
  const p=COAT_PROFILE[breed]||{E:0.5,A:0.5,cream:0.20,grey:0.10};
  const al=(f,dom,rec)=> rng()<f?dom:rec;
  const genes={
    E:[al(p.E,'E','e'), al(p.E,'E','e')],
    A:[al(p.A,'A','a'), al(p.A,'A','a')],
    Cr:[al(p.cream,'C','n'), al(p.cream*0.5,'C','n')],
    G:[al(p.grey,'G','n'), al(p.grey*0.4,'G','n')],
    mut:null,
  };
  if(p.gold && rng()<p.gold) genes.mut='Golden';
  return genes;
}
function phenotype(genes){
  if(!genes) return {name:'Bay', tier:0};
  const carries=(loc,al,def)=>(genes[loc]||def).indexOf(al)>=0;
  if(genes.mut) return {name:genes.mut, tier:3};
  if(carries('G','G',['n','n'])) return {name:'Grey', tier:1};
  const creamCount=(genes.Cr||['n','n']).filter(a=>a==='C').length;
  const black=carries('E','E',['e','e']);
  const base = !black ? 'red' : (carries('A','A',['a','a'])?'bay':'black');
  return {name:COAT_MAP[base][creamCount], tier:(creamCount===2?2:creamCount===1?1:0)};
}
function crossGenes(a,b,rng){
  rng=rng||Math.random; a=a||seedGenes(null,rng); b=b||seedGenes(null,rng);
  const one=arr=>arr[rng()<0.5?0:1];
  const child={ E:[one(a.E),one(b.E)], A:[one(a.A),one(b.A)], Cr:[one(a.Cr),one(b.Cr)], G:[one(a.G),one(b.G)], mut:null };
  const pm=a.mut||b.mut;
  if(pm && rng()<0.4) child.mut=pm; else if(rng()<0.02) child.mut = rng()<0.5?'Pearl':'Golden';
  return child;
}

function needDef(id){ return NEEDS.find(n=>n.id===id)||null; }
function freeNeedIds(){ return NEEDS.filter(n=>!n.cost).map(n=>n.id); }
// give a horse a full needs record with sensible (content) defaults — safe to call anytime
function needsInit(h){
  if(!h) return h;
  if(!h.needs||typeof h.needs!=='object') h.needs={};
  for(const n of NEEDS){ const v=h.needs[n.id];
    h.needs[n.id]=(typeof v==='number'&&isFinite(v))?clamp(v,0,100):(n.id==='bond'?60:78); }

  return h;
}
function needLevel(h,id){ if(!h) return 0; needsInit(h); const v=h.needs[id]; return typeof v==='number'?clamp(v,0,100):0; }
// overall care 0..100 = mean of all needs
function careScore(h){ if(!h) return 0; needsInit(h); let s=0; for(const id of NEED_IDS) s+=needLevel(h,id); return Math.round(s/NEED_IDS.length); }
function careTier(h){ const c=careScore(h);

// ---------- Feed-mix / nutrition planner (READ-ONLY advisory; a saved plan preference, no economy change) ----------
// Picks a hay/grain/supplement mix per horse and rates how well it matches that horse's needs, all derived from
// EXISTING state (breed, life stage, discipline affinity, condition, season & weather). Fully deterministic — no
// Date/Math.random. It may store a lightweight per-horse plan preference (game.diet.plans) but never creates
// resources, alters the feed economy, or changes any stat. Purely informational guidance.
const FEED_DIMS=[
  {id:'energy',   label:'Energy',    emoji:'⚡'},
  {id:'protein',  label:'Protein',   emoji:'💪'},
  {id:'fibre',    label:'Fibre',     emoji:'🌾'},

function feedItemDef(id){ return FEED_ITEMS.find(f=>f.id===id)||null; }
function feedItemsIn(cat){ return FEED_ITEMS.filter(f=>f.cat===cat); }
function feedCatDef(id){ return FEED_CATS.find(c=>c.id===id)||null; }
const FEED_SCALE=6; // per-dim target/supply is clamped to 0..6
// the horse's ideal nutrient profile from its state (deterministic)
function idealProfile(game, h){
  const prof={energy:2, protein:2, fibre:3, condition:2, calm:2};
  const bump=(k,n)=>{ prof[k]=(prof[k]||0)+n; };
  const disc=(typeof topAffinity==='function'&&h)?topAffinity(h).id:'race';
  if(disc==='race'||disc==='jump'){ bump('energy',2); bump('protein',1); }
  else if(disc==='endurance'){ bump('fibre',2); bump('energy',1); }
  else if(disc==='dressage'){ bump('condition',1); bump('calm',1); }
  else if(disc==='halter'){ bump('condition',2); }
  const st=(h?stageForAge(h.age||0):{id:'adult'});
  if(st.id==='foal'||st.id==='yearling'){ bump('protein',2); bump('energy',1); }
  else if(st.id==='senior'){ bump('fibre',1); bump('condition',1); bump('energy',-1); }
  const bd=breedDef(h&&h.breed)||{size:1,temperament:60};
  if((bd.size||1)>=1.4){ bump('fibre',2); }
  if((bd.temperament||60)<55){ bump('calm',2); } else if((bd.temperament||60)>=82){ bump('calm',-1); }
  const day=(game&&game.day)||1;
  const cold=(typeof feedExtraFor==='function')?feedExtraFor(day):0; if(cold) bump('energy',cold); // winter/snow → keep them warm
  if(h && (typeof careScore==='function') && careScore(h)<55){ bump('condition',1); }
  const out={}; for(const id of FEED_DIM_IDS) out[id]=clamp(Math.round(prof[id]||0),0,FEED_SCALE);
  return out;
}
// sum the chosen mix into a supply vector (clamped per dim)
function mixSupply(mix){
  const sup={}; for(const id of FEED_DIM_IDS) sup[id]=0;
  for(const cat of FEED_CATS){ const it=feedItemDef(mix&&mix[cat.id]); if(!it) continue;
    for(const id of FEED_DIM_IDS) sup[id]+=(it.v[id]||0); }
  for(const id of FEED_DIM_IDS) sup[id]=clamp(sup[id],0,FEED_SCALE);
  return sup;
}
const FEED_NOTES={
  energy:   {under:'⚡ Needs more energy for the work ahead.', over:'⚡ Rich in energy for a resting horse — ease off the grain.'},
  protein:  {under:'💪 A little more protein would build topline.', over:'💪 Very high protein — more than this horse needs.'},
  fibre:    {under:'🌾 Light on fibre — add more forage.', over:'🌾 Very high fibre; fine for a good-doer.'},
  condition:{under:'✨ A coat or joint supplement would lift condition.', over:'✨ Plenty of condition support here.'},
  calm:     {under:'😌 A hot type — a calming forage or herb would settle them.', over:'😌 A very calming mix — good for fizzy horses.'},
};
// rate a mix against the horse's ideal: 0..100 balance + per-dim breakdown + advisory notes
function dietScore(game, h, mix){
  const ideal=idealProfile(game,h), sup=mixSupply(mix);
  let gap=0; const dims=[];
  for(const d of FEED_DIMS){ const i=ideal[d.id], s=sup[d.id], diff=s-i; gap+=Math.abs(diff);
    dims.push({id:d.id, label:d.label, emoji:d.emoji, ideal:i, supply:s, diff:diff}); }
  const score=Math.round(100*(1-gap/(FEED_DIMS.length*FEED_SCALE)));
  const notes=dims.slice().sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)||FEED_DIM_IDS.indexOf(a.id)-FEED_DIM_IDS.indexOf(b.id))
    .filter(d=>Math.abs(d.diff)>=2).slice(0,3)
    .map(d=>FEED_NOTES[d.id][d.diff<0?'under':'over']);
  return {score:clamp(score,0,100), dims, notes, ideal, supply:sup};
}
function dietTier(score){ return score>=86?{id:'excellent',label:'Excellent',emoji:'🌟'} : score>=70?{id:'balanced',label:'Balanced',emoji:'✅'}
  : score>=50?{id:'adequate',label:'Adequate',emoji:'🟡'} : {id:'poor',label:'Unbalanced',emoji:'⚠️'}; }
// brute-force the best-matching mix for a horse (deterministic — 4×4×5 combos)
function suggestMix(game, h){
  let best=null, bestScore=-1;
  for(const f of feedItemsIn('forage')) for(const gr of feedItemsIn('grain')) for(const s of feedItemsIn('supp')){

function namePoolFor(game, h, themeId){

const DIARY_MOOD_META={

function diaryMoodMeta(mood){ return DIARY_MOOD_META[mood]||DIARY_MOOD_META.content; }
// a derived mood tag from EXISTING state (life-state first, then welfare, then temperament)
function horseMood(h){
  if(!h) return 'content';
  if(stageForAge(h.age||0).id==='foal') return 'foal';
  if(h.pregnant) return 'pregnant';
  if(typeof horseAway==='function' && horseAway(h)) return 'away';
  if(h.atStud) return 'atstud';
  if((h.rentDays||0)>0) return 'rented';

  if((h.wins||0)>=3 && hp>=60) return 'champion';

function diaryHash(s){ let x=2166136261>>>0; s=''+s; for(let i=0;i<s.length;i++){ x^=s.charCodeAt(i); x=Math.imul(x,16777619); } return x>>>0; }
// the deterministic flavour line for a horse on a given day (stable within a day, varies day to day)
function horseDiaryLine(h, day){

// how fast a given need decays today — season/weather stress raises it; care day &
// equipped tack (fly mask / rug / grooming kit) ease it
function needDecayFor(game,n,h){
  let d=n.decay, stress=0;
  if(game){ const day=game.day||0, seas=seasonOf(day).id;
    if(seas==='winter'&&(n.id==='rest'||n.id==='groom')) stress+=3;   // cold is hard on rest & coat
    if(seas==='summer'&&n.id==='exercise') stress+=3;                 // heat raises turnout/water needs
    if(h&&stress>0) stress=Math.max(0,stress-tackStressCut(h));       // fly mask / winter rug ease weather stress
    d+=stress;
    if(isCareDay(day)) d=Math.max(2,d-2);                            // Vet & Farrier day: lighter upkeep
  }
  if(h&&n.id==='groom') d*=tackGroomDecayMult(h);                     // grooming kit slows coat fade
  if(game) d*=enrichmentDecayMult(game);                              // paddock enrichment gently slows all decay (capped)
  return d;

// decay one horse's needs by a day (mutates); bonding level tracks how well the bond need is kept
function decayNeeds(game,h){ needsInit(h);
  for(const n of NEEDS) h.needs[n.id]=clamp(h.needs[n.id]-needDecayFor(game,n,h),0,100);
  const bl=h.needs.bond; h.bond=clamp((h.bond||0)+(bl>=70?1.2:bl>=40?0:-1.4),0,100);
  return careScore(h);
}
// cost to restore one need now (0 = free), discounted on the care weekday & by a Farrier
function careCost(game,id){ const n=needDef(id); if(!n||!n.cost) return 0;
  let c=n.cost; if(game&&isCareDay(game.day)) c=Math.round(c*0.6);
  if(game) c=Math.round(c*staffEffect(game,'careCostMult')); return Math.max(0,c); }
// full cost to satisfy every unmet paid need for a horse (a "Full care" bundle)
function fullCareCost(game,h){ needsInit(h); let c=0;
  for(const n of NEEDS){ if(n.cost && h.needs[n.id]<100) c+=careCost(game,n.id); } return c; }
// restore a single need to full (mutates game+horse). returns {ok, cost, need, gain, why}
function applyCare(game,h,id){ const n=needDef(id); if(!n) return {ok:false,why:'Unknown need.'};
  needsInit(h);
  const cost=careCost(game,id);
  if(cost>0){ if(!game||(game.money||0)<cost) return {ok:false,cost,why:'Not enough coins.'}; game.money-=cost; }
  const before=h.needs[id], gain=Math.max(0,100-before);

  return {ok:true, cost, need:n, gain};

// restore every need for one horse (pays the paid ones). returns {ok, cost, filled, why}
function applyFullCare(game,h){ needsInit(h); const cost=fullCareCost(game,h);
  if(cost>0 && (!game||(game.money||0)<cost)) return {ok:false,cost,why:'Not enough coins for full care.'};
  let filled=0; for(const id of NEED_IDS){ if(h.needs[id]<100){ applyCare(game,h,id); filled++; } }
  return {ok:true, cost, filled};

// which needs are below a threshold (for card pips / prompts)
function lowNeeds(h,thresh){ thresh=thresh==null?60:thresh; needsInit(h); return NEED_IDS.filter(id=>needLevel(h,id)<thresh); }
// stable routine: top up all FREE needs for every horse at once (once/day convenience)
function applyDailyRoutine(game){ if(!game||!game.horses) return {horses:0,filled:0};
  let filled=0; const free=freeNeedIds();
  for(const h of game.horses){ needsInit(h);
    for(const id of free){ if(h.needs[id]<100) filled++; h.needs[id]=100; }
    h.happy=clamp(h.happy+1,0,100); if(h.needs.bond>=60) h.bond=clamp((h.bond||0)+1,0,100); }

}
function routineDoneToday(game){ return !!game && game.lastRoutineDay===game.day; }

// ---------- Daily stable chores / to-do board (a gentle in-game-day checklist + small streak) ----------
// 3–4 bite-sized tasks each in-game day, drawn from EXISTING actions. Doing an action ticks its chore
// (once/day); clearing the whole list at day rollover pays a small, bounded bonus and feeds a streak.
// DISTINCT from the real-world daily-LOGIN streak and the weekly contracts board.
const CHORE_TYPES=[
  {id:'routine',    label:'Muck out & run the daily routine', emoji:'🧹'},
  {id:'care',       label:'Groom or care for a horse',        emoji:'🧴'},
  {id:'groundwork', label:'Do groundwork with a horse',       emoji:'🤝'},
  {id:'train',      label:'Train a horse',                    emoji:'🏋️'},
  {id:'show',       label:'Enter a horse in a show',          emoji:'🏆'},
  {id:'appointment',label:'Book a farrier or vet visit',      emoji:'🩺'},
];
function choreTypeDef(id){ return CHORE_TYPES.find(c=>c.id===id)||null; }
// today's deterministic list: always the two always-doable core chores + two rotating ones
function choreIdsFor(day){ const d=Math.floor(day)||1; const pool=['groundwork','train','show','appointment'];
  const i=(d-1)%pool.length; return ['routine','care', pool[i], pool[(i+2)%pool.length]]; }
function choresState(game){ if(!game) return {day:0,done:{},streak:0,lastFull:0};
  if(!game.chores||typeof game.chores!=='object') game.chores={day:0,done:{},streak:0,lastFull:0};
  if(!game.chores.done||typeof game.chores.done!=='object') game.chores.done={};
  return game.chores; }
function choresReset(game,day){ const c=choresState(game); if(c.day!==day){ c.day=day; c.done={}; } return c; }
function dailyChores(game){ const day=(game&&game.day)||1; const c=choresReset(game,day);
  return choreIdsFor(day).map(id=>{ const t=choreTypeDef(id); return {id, label:t.label, emoji:t.emoji, done:!!c.done[id]}; }); }
// tick a chore for today (once per kind per day); no-op if the kind isn't on today's list or already done
function markChoreProgress(game,kind){ if(!game) return false; const day=game.day||1;
  if(choreIdsFor(day).indexOf(kind)<0) return false; const c=choresReset(game,day);
  if(c.done[kind]) return false; c.done[kind]=true; return true; }
function choreProgress(game){ const list=dailyChores(game); const done=list.filter(x=>x.done).length;
  return {done, total:list.length, all:done>=list.length && list.length>0, list}; }
function choresStreak(game){ return (game&&game.chores&&game.chores.streak)||0; }
function choresBonus(streak){ const s=Math.max(1,Math.min(streak||1,7)); return {money:40+10*s, rep:2+Math.floor(s/2), feed:(s>=5?5:0)}; } // small, bounded, caps at streak 7
// settle the day that just finished: full-clear pays the bounded bonus once & extends the streak; a miss breaks it
function resolveDailyChores(game, finishedDay){
  const c=choresState(game); const ids=choreIdsFor(finishedDay);
  const allDone = (c.day===finishedDay) && ids.every(id=>c.done[id]);
  let bonus=null;
  if(allDone && c.lastFull!==finishedDay){
    c.lastFull=finishedDay; c.streak=(c.streak||0)+1; bonus=choresBonus(c.streak);
    game.money=(game.money||0)+bonus.money; game.rep=(game.rep||0)+bonus.rep; if(bonus.feed) game.feed=(game.feed||0)+bonus.feed;
    if(game.stats){ game.stats.choresDone=(game.stats.choresDone||0)+1; game.stats.bestChoreStreak=Math.max(game.stats.bestChoreStreak||0,c.streak); }
  } else {
    c.streak=0; // a partial or skipped day breaks the streak
  }
  return {awarded:!!bonus, bonus, allDone, streak:c.streak};

// ---------- General store / supply restock cycle (a small rotating shop of bounded deals) ----------
// A few slots that restock every STORE_CYCLE days; the catalogue is a DETERMINISTIC seeded pick by
// restock index (same day → same stock). Each slot buys once per restock and applies an EXISTING-system
// effect (feed / care needs / condition / rep). Economy-safe: bounded effects, limited stock, feed is
// never sellable so discounted hay can't be arbitraged.
const STORE_CYCLE=3;   // days between restocks
const STORE_SLOTS=3;   // items shown per restock
const STORE_ITEMS=[
  {id:'haylot',   name:'Hay Bulk Lot',   emoji:'🌾', price:60,  effect:{kind:'feed', amount:40},            desc:'A discounted lot — 40 hay bales.'},
  {id:'haycart',  name:'Feed Cart',      emoji:'🛒', price:110, effect:{kind:'feed', amount:80},            desc:'A big feed haul — 80 bales, cheap.'},
  {id:'carekit',  name:'Grooming Kit',   emoji:'🧼', price:140, effect:{kind:'carekit'},                    desc:'Top up every horse’s daily care needs at once.'},
  {id:'tonic',    name:'Wellness Tonic', emoji:'💊', price:120, effect:{kind:'tonic', health:10, happy:8},  desc:'A herd-wide pick-me-up (+condition & mood).'},
  {id:'treats',   name:'Horse Treats',   emoji:'🍎', price:70,  effect:{kind:'tonic', health:2,  happy:10}, desc:'Sweet treats — the whole herd cheers up.'},
  {id:'liniment', name:'Liniment Rub',   emoji:'🧴', price:90,  effect:{kind:'tonic', health:14, happy:2},  desc:'A soothing rub — restores condition herd-wide.'},
  {id:'advert',   name:'Village Notice', emoji:'📣', price:200, effect:{kind:'rep', rep:12},                desc:'Post a notice in the square for a reputation boost.'},
];
function storeItemDef(id){ return STORE_ITEMS.find(i=>i.id===id)||null; }
function storeRestockIndex(day){ return Math.floor((Math.floor(day||1)-1)/STORE_CYCLE); }
function storeRestockDay(game){ return storeRestockIndex((game&&game.day)||1)*STORE_CYCLE+1; }
function nextStoreRestock(game){ return (storeRestockIndex((game&&game.day)||1)+1)*STORE_CYCLE+1; }
function storeDaysLeft(game){ return nextStoreRestock(game)-((game&&game.day)||1); }
// deterministic seeded pick of STORE_SLOTS items for a restock index (no Date/Math.random)
function storeCatalogueFor(idx){ const rng=seededOnce((idx>>>0)*2654435761+12345); const pool=STORE_ITEMS.slice(), out=[];
  for(let i=0;i<STORE_SLOTS && pool.length;i++){ const j=Math.floor(rng()*pool.length); out.push(pool.splice(j,1)[0]); }
  return out; }
function storeState(game){ if(!game) return {stock:-1,sold:[]}; if(!game.store||typeof game.store!=='object') game.store={stock:-1,sold:[]};
  if(!Array.isArray(game.store.sold)) game.store.sold=[]; return game.store; }
function storeStock(game){ const idx=storeRestockIndex((game&&game.day)||1), st=storeState(game);
  if(st.stock!==idx){ st.stock=idx; st.sold=[]; }
  return storeCatalogueFor(idx).map(it=>({ id:it.id, name:it.name, emoji:it.emoji, desc:it.desc, price:it.price, effect:it.effect, sold:st.sold.indexOf(it.id)>=0 })); }
function storeItemAffordable(game,itemId){ const s=storeStock(game).find(x=>x.id===itemId); return !!s && !s.sold && ((game&&game.money)||0)>=s.price; }
// apply a store item's effect through the existing system it touches (bounded)
function applyStoreEffect(game,itemId){ const it=storeItemDef(itemId); if(!it) return null; const e=it.effect;
  if(e.kind==='feed'){ game.feed=(game.feed||0)+e.amount; return {feed:e.amount}; }
  if(e.kind==='carekit'){ let n=0; for(const h of (game.horses||[])){ needsInit(h); for(const id of NEED_IDS){ if(h.needs[id]<100) n++; h.needs[id]=100; } } return {caredNeeds:n}; }
  if(e.kind==='tonic'){ for(const h of (game.horses||[])){ h.health=clamp((h.health||0)+(e.health||0),0,100); h.happy=clamp((h.happy||0)+(e.happy||0),0,100); } return {horses:(game.horses||[]).length}; }
  if(e.kind==='rep'){ game.rep=(game.rep||0)+e.rep; return {rep:e.rep}; }
  return null; }
function buyStoreItem(game,itemId){
  const stock=storeStock(game), slot=stock.find(s=>s.id===itemId);
  if(!slot) return {ok:false,why:'Not in stock this restock.'};
  if(slot.sold) return {ok:false,why:'Already bought — back next restock.'};
  if((game.money||0)<slot.price) return {ok:false,why:'Not enough coins.'};
  game.money-=slot.price;
  storeState(game).sold.push(itemId);
  const effect=applyStoreEffect(game,itemId);
  if(game.stats){ game.stats.storeBuys=(game.stats.storeBuys||0)+1; game.stats.storeSpent=(game.stats.storeSpent||0)+slot.price; }
  return {ok:true, item:slot, price:slot.price, effect};
}

// ---------- Stable staff: hire ranch hands who ease the daily chores ----------
// Distinct from Riding-School teachers (who earn lesson income). Each role is a
// single hire (no stacking) with a daily salary — a coin sink — and one bounded,
// legible benefit folded into advanceDay / care / economy. Hire nobody → unaffected.
const MAX_STAFF=6; // one of each role
const STAFF_ROLES=[
  {id:'groom',        name:'Groom',         emoji:'🧹', salary:38, repReq:0,   kind:'careTopUp',    amount:16, desc:'Tops up every horse’s care needs a little each day.'},
  {id:'hand',         name:'Stable Hand',   emoji:'🧺', salary:30, repReq:0,   kind:'autoRoutine',             desc:'Runs the free daily stable routine every morning.'},
  {id:'farrier',      name:'Farrier',       emoji:'🧰', salary:34, repReq:150, kind:'careCostMult', mult:0.65, desc:'Cuts paid care costs (grooming & hooves) by 35%.'},
  {id:'groundskeeper',name:'Groundskeeper', emoji:'🌾', salary:28, repReq:150, kind:'feedMult',     mult:0.9,  desc:'Careful feeding — the herd eats 10% less hay.'},
  {id:'vet',          name:'Vet',           emoji:'🩺', salary:42, repReq:400, kind:'vetCare',                 desc:'Heals horses a little daily and heads off vet call-outs.'},
  {id:'trainer',      name:'Trainer',       emoji:'🏋️', salary:44, repReq:400, kind:'trainCostMult',mult:0.75, desc:'Training sessions cost 25% less.'},
];
function staffDef(id){ return STAFF_ROLES.find(r=>r.id===id)||null; }
function staffList(game){ return (game&&Array.isArray(game.staff))?game.staff:[]; }
function hasStaff(game,id){ return staffList(game).indexOf(id)>=0; }
function staffCount(game){ return staffList(game).length; }
function staffPayroll(game){ return staffList(game).reduce((n,id)=>{ const r=staffDef(id); return n+(r?r.salary:0); },0); }
function staffUnlocked(game,id){ const r=staffDef(id); return !!r && ((game&&game.rep)||0)>=r.repReq; }
function staffAffordable(game,id){ return staffUnlocked(game,id) && !hasStaff(game,id); }
function hireStaff(game,id){ const r=staffDef(id); if(!r) return {ok:false,why:'No such role.'};
  if(!game.staff) game.staff=[];
  if(hasStaff(game,id)) return {ok:false,why:'Already on the payroll.'};
  if((game.rep||0)<r.repReq) return {ok:false,why:'Needs ⭐'+r.repReq+' reputation.'};
  game.staff.push(id); return {ok:true,role:r}; }
function fireStaff(game,id){ if(!game||!Array.isArray(game.staff)) return {ok:false}; const had=hasStaff(game,id); game.staff=game.staff.filter(x=>x!==id); return {ok:had}; }
// aggregate staff effect for a given kind (single-hire roles, so a simple lookup)
function staffEffect(game,kind){
  switch(kind){
    case 'careTopUp':     return hasStaff(game,'groom')? staffDef('groom').amount : 0;
    case 'autoRoutine':   return hasStaff(game,'hand');
    case 'careCostMult':  return hasStaff(game,'farrier')? staffDef('farrier').mult : 1;
    case 'feedMult':      return hasStaff(game,'groundskeeper')? staffDef('groundskeeper').mult : 1;
    case 'trainCostMult': return hasStaff(game,'trainer')? staffDef('trainer').mult : 1;
    case 'vetHeal':       return hasStaff(game,'vet')? 5 : 0;
    case 'vetChanceMult': return hasStaff(game,'vet')? 0.4 : 1;
    default: return 0;
  }
}

// ---------- Tack & equipment: buyable gear equipped per horse ----------
// Fleur buys gear once (owned inventory), then equips it into one of a horse's
// three slots (saddle / bridle / accessory). Each physical item lives on ONE horse
// at a time — equipping it elsewhere moves it — so the player chooses who gets the
// good tack. Effects are small, capped and economy-safe (they never touch valueOf).
const TACK_SLOTS=['saddle','bridle','accessory'];
const TACK_SLOT_LABEL={saddle:'Saddle',bridle:'Bridle',accessory:'Accessory'};
const TACK_SHOW_CAP=0.12; // total show bonus from a horse's tack is capped at +12%
const TACK=[
  // — saddles (show form) —
  {id:'saddle_training',name:'Training Saddle',    emoji:'💺', slot:'saddle',    cost:500,  repReq:0,  show:0.02, desc:'A dependable everyday saddle. +2% show form.'},
  {id:'saddle_show',    name:'Competition Saddle', emoji:'🏆', slot:'saddle',    cost:2400, repReq:60, show:0.05, desc:'Feather-light competition saddle. +5% show form.'},
  // — bridles (show form / control) —
  {id:'bridle_leather', name:'Leather Bridle',     emoji:'🪢', slot:'bridle',    cost:420,  repReq:0,  show:0.02, desc:'Supple, well-fitted bridle. +2% show form.'},
  {id:'bridle_show',    name:'Silver Show Bridle', emoji:'🎀', slot:'bridle',    cost:1900, repReq:40, show:0.04, disc:{id:'dressage',mult:0.05}, desc:'Elegant bridle. +4% show form, +5% Dressage.'},
  // — accessories (utility: care / weather / a discipline) —
  {id:'groom_kit',      name:'Grooming Kit',       emoji:'🪮', slot:'accessory', cost:650,  repReq:0,  groomDecay:0.5, desc:'Brushes & combs — grooming fades half as fast.'},
  {id:'fly_mask',       name:'Fly Mask',           emoji:'🥽', slot:'accessory', cost:480,  repReq:0,  stressCut:3, desc:'Keeps flies & sun off — eases hot-weather needs.'},
  {id:'winter_rug',     name:'Winter Rug',         emoji:'🧥', slot:'accessory', cost:760,  repReq:0,  stressCut:3, desc:'A warm rug — eases cold-weather needs.'},
  {id:'leg_wraps',      name:'Leg Wraps',          emoji:'🧦', slot:'accessory', cost:980,  repReq:20, disc:{id:'jump',mult:0.06}, desc:'Support & protection. +6% Show-Jumping.'},
  {id:'show_halter',    name:'Show Halter',        emoji:'🎗️', slot:'accessory', cost:1600, repReq:40, disc:{id:'halter',mult:0.08}, desc:'A gleaming halter for the ring. +8% Showing.'},
];
function tackDef(id){ return TACK.find(t=>t.id===id)||null; }
// ensure a horse has a valid 3-slot tack record (drops gear that no longer fits its slot)
function tackInit(h){ if(!h) return h; if(!h.tack||typeof h.tack!=='object') h.tack={};
  for(const sl of TACK_SLOTS){ const id=h.tack[sl]; const t=id?tackDef(id):null;
    h.tack[sl]=(t&&t.slot===sl)?id:null; }
  return h; }
function equippedTack(h){ tackInit(h); return TACK_SLOTS.map(sl=>h.tack[sl]).filter(Boolean).map(tackDef).filter(Boolean); }
function equippedIn(h,slot){ tackInit(h); return h.tack[slot]?tackDef(h.tack[slot]):null; }
// owned inventory (ids the player has bought)
function ownedTack(game){ return (game&&game.tack&&Array.isArray(game.tack.owned))?game.tack.owned:[]; }
function hasTack(game,id){ return ownedTack(game).indexOf(id)>=0; }
function tackUnlocked(game,id){ const t=tackDef(id); return !!t && ((game&&game.rep)||0)>=t.repReq; }
function tackAffordable(game,id){ const t=tackDef(id); return !!t && !hasTack(game,id) && tackUnlocked(game,id) && ((game&&game.money)||0)>=t.cost; }
function buyTack(game,id){ const t=tackDef(id); if(!t) return {ok:false,why:'No such item.'};
  if(!game.tack) game.tack={owned:[]};
  if(hasTack(game,id)) return {ok:false,why:'Already owned.'};
  if((game.rep||0)<t.repReq) return {ok:false,why:'Needs ⭐'+t.repReq+' reputation.'};
  if((game.money||0)<t.cost) return {ok:false,why:'Not enough coins.'};
  game.money-=t.cost; game.tack.owned.push(id); return {ok:true,item:t}; }
// which horse currently wears an owned item (single physical item), or null
function tackWearer(game,id){ if(!game||!game.horses) return null;
  return game.horses.find(h=>{ tackInit(h); return TACK_SLOTS.some(sl=>h.tack[sl]===id); })||null; }
// equip an owned item onto a horse's slot; moves it off any other horse first
function equipTack(game,h,id){ const t=tackDef(id); if(!t) return {ok:false,why:'No such item.'};
  if(!hasTack(game,id)) return {ok:false,why:'You don’t own that yet.'};
  tackInit(h);
  const cur=tackWearer(game,id); if(cur){ tackInit(cur); for(const sl of TACK_SLOTS) if(cur.tack[sl]===id) cur.tack[sl]=null; }
  h.tack[t.slot]=id; return {ok:true,item:t,slot:t.slot}; }
function unequipTack(game,h,slot){ tackInit(h); const id=h.tack[slot]; h.tack[slot]=null; return {ok:true,id}; }
// ---- Tack loadout presets / quick-swap (a convenience layer over the EXISTING tack you own) ----
// Save a horse's current slot→item set as a NAMED preset, then one-tap apply it to any horse. Applying
// equips only the items you OWN (skipping unowned), so it grants NO new gear or power — it just
// reorganises what equipTack already does. Deterministic; persisted; economy-neutral.
const LOADOUT_MAX=8;        // most presets kept in the library
const LOADOUT_NAME_MAX=20;  // preset name length
function tackLoadouts(game){ return (game&&Array.isArray(game.loadouts))?game.loadouts:[]; }
function loadoutDef(game,id){ return tackLoadouts(game).find(p=>p&&p.id===id)||null; }
function normLoadouts(game){ const arr=(game&&Array.isArray(game.loadouts))?game.loadouts:[]; const out=[], used={};
  for(const p of arr){ if(!p||typeof p!=='object') continue;
    const slots={}; for(const sl of TACK_SLOTS){ const id=p.slots&&p.slots[sl], d=id?tackDef(id):null; slots[sl]=(d&&d.slot===sl)?id:null; }
    let id=(typeof p.id==='string'&&p.id)?p.id:('lo'+(out.length+1)); while(used[id]) id=id+'_';
    used[id]=1;
    const name=((''+(p.name||'')).trim().slice(0,LOADOUT_NAME_MAX))||'Loadout';
    out.push({ id, name, slots });
    if(out.length>=LOADOUT_MAX) break; }
  return out; }
// read a horse's current tack as a slot→itemId map (read-only, validates slot fit)
function captureLoadout(horse){ const t=(horse&&horse.tack)||{}, out={};
  for(const sl of TACK_SLOTS){ const id=t[sl], d=id?tackDef(id):null; out[sl]=(d&&d.slot===sl)?id:null; } return out; }
function _nextLoadoutId(game){ const used={}; tackLoadouts(game).forEach(p=>{ if(p&&p.id) used[p.id]=1; }); let n=1; while(used['lo'+n]) n++; return 'lo'+n; }
function saveLoadout(game,name,horse){ if(!game) return {ok:false,why:'No ranch.'};
  if(!Array.isArray(game.loadouts)) game.loadouts=[];
  if(game.loadouts.length>=LOADOUT_MAX) return {ok:false,why:'Your loadout library is full.'};
  const slots=captureLoadout(horse);
  const nm=((''+(name||'')).trim().slice(0,LOADOUT_NAME_MAX))||('Loadout '+(game.loadouts.length+1));
  const preset={ id:_nextLoadoutId(game), name:nm, slots };
  game.loadouts.push(preset); return {ok:true, preset}; }
function renameLoadout(game,id,name){ const p=loadoutDef(game,id); if(!p) return {ok:false,why:'No such loadout.'};
  p.name=((''+(name||'')).trim().slice(0,LOADOUT_NAME_MAX))||p.name; return {ok:true, name:p.name}; }
function deleteLoadout(game,id){ if(!game||!Array.isArray(game.loadouts)) return {ok:false}; const n=game.loadouts.length;
  game.loadouts=game.loadouts.filter(p=>p&&p.id!==id); return {ok:game.loadouts.length<n}; }
// equip a preset's OWNED items onto a horse (skips unowned; clears slots the preset leaves empty)
function applyLoadout(game,horse,id){ const p=loadoutDef(game,id); if(!p) return {ok:false,why:'No such loadout.'};
  if(!horse) return {ok:false,why:'No horse.'};
  tackInit(horse); const applied=[], skipped=[], cleared=[];
  for(const sl of TACK_SLOTS){ const want=p.slots[sl];
    if(want){ if(hasTack(game,want)){ if(horse.tack[sl]!==want){ equipTack(game,horse,want); } applied.push(want); } else skipped.push(want); }
    else if(horse.tack[sl]){ cleared.push(horse.tack[sl]); horse.tack[sl]=null; }
  }
  return {ok:true, applied, skipped, cleared}; }
// ---- Tack crafting / upgrade tiers (Standard → Fine → Masterwork) ----
// Owned gear can be upgraded through tiers; each tier lifts that item's small show/disc
// bonus a little (still under the hard caps). Tier is stored per owned item on the game.
const TACK_DISC_CAP=0.18; // a single discipline's tack bonus is capped at +18%
const TACK_TIERS=[
  {name:'Standard',   mark:'',   mult:1.00, costMul:0},
  {name:'Fine',       mark:'✦',  mult:1.40, costMul:1.5},
  {name:'Masterwork', mark:'✦✦', mult:1.80, costMul:2.6},
];
const TACK_MAX_TIER=TACK_TIERS.length-1;
function tackUpgradable(id){ const t=tackDef(id); return !!t && !!(t.show||t.disc); } // only performance gear tiers up
function tackTier(game,id){ const t=(game&&game.tack&&game.tack.tiers)||{}; const v=t[id]; return (typeof v==='number'&&v>0)?Math.min(Math.floor(v),TACK_MAX_TIER):0; }
function tackTierMult(game,id){ return TACK_TIERS[tackTier(game,id)].mult; }
function tackTierName(game,id){ return TACK_TIERS[tackTier(game,id)].name; }
function tackTierMark(game,id){ return TACK_TIERS[tackTier(game,id)].mark; }
function upgradeTackCost(game,id){ const t=tackDef(id); if(!t) return 0; const next=tackTier(game,id)+1; if(next>TACK_MAX_TIER) return 0; return Math.round(t.cost*TACK_TIERS[next].costMul); }
function canUpgradeTack(game,id){ return tackUpgradable(id) && hasTack(game,id) && tackTier(game,id)<TACK_MAX_TIER; }
function upgradeTack(game,id){
  if(!tackUpgradable(id)) return {ok:false,why:'This item can’t be upgraded.'};
  if(!hasTack(game,id)) return {ok:false,why:'You don’t own that yet.'};
  if(tackTier(game,id)>=TACK_MAX_TIER) return {ok:false,why:'Already Masterwork.'};
  const cost=upgradeTackCost(game,id); if((game.money||0)<cost) return {ok:false,why:'Not enough coins.'};
  if(!game.tack) game.tack={owned:[]}; if(!game.tack.tiers||typeof game.tack.tiers!=='object') game.tack.tiers={};
  game.money-=cost; game.tack.tiers[id]=tackTier(game,id)+1;
  return {ok:true, tier:game.tack.tiers[id], name:TACK_TIERS[game.tack.tiers[id]].name, cost}; }

// small, capped bonus accessors — pass `game` to include per-item upgrade tiers
function tackShowMult(h,game){ let s=0; for(const t of equippedTack(h)) s+=(t.show||0)*(game?tackTierMult(game,t.id):1); return 1+Math.min(TACK_SHOW_CAP,s); }
function tackDiscMult(h,discId,game){ let s=0; for(const t of equippedTack(h)) if(t.disc&&t.disc.id===discId) s+=t.disc.mult*(game?tackTierMult(game,t.id):1); return 1+Math.min(TACK_DISC_CAP,s); }
function tackGroomDecayMult(h){ let m=1; for(const t of equippedTack(h)) if(t.groomDecay) m=Math.min(m,t.groomDecay); return m; }
function tackStressCut(h){ let c=0; for(const t of equippedTack(h)) c+=(t.stressCut||0); return c; }
// total show multiplier a horse's tack gives in a discipline (for display)
function tackShowMultFor(h,discId,game){ return tackShowMult(h,game)*tackDiscMult(h,discId,game); }

function mkHorse(o){
  o=o||{}; const rng=o.rng||Math.random;
  const b=breedDef(o.breed)||BREEDS[0];
  const sex=o.sex||(rng()<0.5?'mare':'stallion');
  const vary=(base,amt)=>clamp(Math.round(base+(rng()*2-1)*amt),8,100);
  const genes=o.genes||seedGenes(b.id,rng);
  const coat=o.coat||phenotype(genes);
  const h={
    id:o.id||('h'+(_idc++)),
    name:o.name||pickName(sex,rng),
    breed:b.id, sex,
    genes, coat, color:coat.name,
    trait:o.trait||pickTrait(rng),
    age:o.age==null?12:o.age,
    speed:o.speed!=null?o.speed:vary(b.speed,10),
    stamina:o.stamina!=null?o.stamina:vary(b.stamina,10),
    temperament:o.temperament!=null?o.temperament:vary(b.temperament,10),
    health:o.health==null?92:o.health,
    happy:o.happy==null?85:o.happy,
    purebred:o.purebred!==undefined?o.purebred:true,
    generation:o.generation||1,
    rare:o.rare||null,        // rare trait tag e.g. 'Champion Bloodline'
    ped:o.ped||null, inbred:o.inbred||false,
    wins:o.wins||0, podiums:o.podiums||0, entries:o.entries||0, compCd:o.compCd||0, // show career
    atStud:o.atStud||false, // standing at public stud
    pregnant:false, gestation:0, sireBreed:null,
    rentDays:0, rentRate:0,   // >0 = out on rent
    tripType:o.tripType||null, tripBack:o.tripBack||0,   // away on a trailer trip (unavailable until tripBack)
    ceremonies:o.ceremonies||{},   // coming-of-age milestones (pending/done per milestone id)
    bdayYear:o.bdayYear||0,        // last in-game year a birthday was celebrated (once-a-year guard)
    stable:o.stable!=null?o.stable:0,
    needs:o.needs||null, bond:o.bond,  // daily care needs + bonding level (needsInit fills defaults)
    gwDay:o.gwDay||0, gwEnergy:o.gwEnergy||0, // groundwork handling energy (per-day, auto-resets)
    tack:o.tack||null,                 // equipped gear per slot (tackInit fills defaults)
    aff:o.aff||null,                   // per-discipline affinity (affInit fills defaults)
  };
  needsInit(h); tackInit(h); affInit(h);
  return h;
}

function statAvg(h){ return h.speed*0.4 + h.stamina*0.35 + h.temperament*0.25; }
function overall(h){ return Math.round(statAvg(h)); }

/* ============================================================ *
 *  ECONOMY DIALS (round 18 balancing pass) — tune here.
 *  Goal: early not grindy · mid rewarding · late not trivially rich.
 *  Passive streams have REPUTATION-CAPPED terms so they plateau; the
 *  biggest rewards stay with ACTIVE play (shows, sales, auctions).
 *   - buyPrice ×1.16 / sellQuote ×0.86–0.98 (buy>sell spread holds)
 *   - canteen visitors: rep term capped at +60 (≈rep 4000)
 *   - lesson fee: 11 + rep bonus capped at +30 (≈rep 5000)
 *   - boarding: 14 + quality·7 + rep term capped at +55
 *   - stud: fee valueOf·0.04 + rep mult ≤×1.4; demand ≤2.0;
 *     MULTIPLE at-stud stallions get diminishing weights (limited mares)
 *   - a single passive stream/day should stay below a top-tier show win (4000)
 * ============================================================ */

// ---------- Valuation ----------
function valueOf(h){
  const b=breedDef(h.breed)||BREEDS[0];
  const st=stageForAge(h.age);
  const statF = 0.55 + 0.009*statAvg(h);            // 50avg ~1.0, 100 ~1.45
  const healthF = 0.55 + 0.0045*h.health;
  const pedF = (h.purebred?1.12:0.82) * (1 + Math.min(0.4, (h.generation-1)*0.06));

  return { points:p, tier:t, next:nx, toNext: nx?Math.max(0,nx.minPoints-p):0, span: nx?(nx.minPoints-t.minPoints):0, into: p-t.minPoints }; }

// ---------- Market stock ----------
function marketPickBreed(game,rng){
  // higher reputation unlocks rarer stock
  const maxR = game.rep>2600?5 : game.rep>1300?4 : game.rep>500?3 : game.rep>120?2 : 2;
  const pool = BREEDS.filter(b=>b.rarity<=maxR);
  // weight toward commons
  const weighted=[]; pool.forEach(b=>{ const w=Math.max(1,6-b.rarity*1.2); for(let i=0;i<w;i++) weighted.push(b); });
  return weighted[Math.floor(rng()*weighted.length)];
}
function makeMarketHorse(game,rng,forceRare){
  rng=rng||Math.random;
  let b;
  if(forceRare){ const rare=BREEDS.filter(x=>x.rarity>=4); b=rare[Math.floor(rng()*rare.length)]; }
  else b=marketPickBreed(game,rng);
  const sex = rng()<0.5?'mare':'stallion';
  const age = 8+Math.floor(rng()*20); // sold as young adults
  return mkHorse({breed:b.id,sex,age,rng,purebred:true,generation:1});
}
function restockMarket(game,rng,opts){
  rng=rng||Math.random; opts=opts||{};
  const n=4+Math.floor(rng()*2)+seasonMarketBonus(game.day)+(opts.bonus||0); // autumn + festivals bring extra stock
  game.market=[]; for(let i=0;i<n;i++) game.market.push(makeMarketHorse(game,rng, opts.rareBoost&&i===0)); // festival: one guaranteed fine horse
  game.marketDay=game.day;
}

// ---------- Featured listing + buyer's wishlist ----------
// A rotating "Featured horse of the week" — a genuine standout at a premium —
// plus a persistent wishlist that badges matching market/auction horses.
const FEATURED_MARKUP=1.25; // premium over normal buy price for the showcased horse
function featuredPrice(h){ return Math.round(buyPrice(h)*FEATURED_MARKUP); }
function makeFeaturedHorse(game,rng){
  rng=rng||Math.random;
  const maxR=(game.rep||0)>1300?5:(game.rep||0)>400?4:3;
  const pool=BREEDS.filter(b=>b.rarity>=3&&b.rarity<=maxR); const b=pool[Math.floor(rng()*pool.length)]||BREEDS.filter(x=>x.rarity>=3)[0];
  const sex=rng()<0.5?'mare':'stallion', age=8+Math.floor(rng()*12);
  const strong=base=>clamp(Math.round(base+8+rng()*12),8,100);
  const h=mkHorse({breed:b.id,sex,age,rng,purebred:true,generation:2+Math.floor(rng()*3),
    speed:strong(b.speed),stamina:strong(b.stamina),temperament:strong(b.temperament),health:98,happy:95});
  const reasons=[];
  if(rng()<0.55){ const rare=rng()<0.5?{name:'Golden',tier:3}:{name:'Cremello',tier:2}; h.coat=rare; h.color=rare.name; }
  if((coatOf(h).tier||0)>=2) reasons.push('rare '+coatOf(h).name+' coat');
  if(rng()<0.5){ h.wins=2+Math.floor(rng()*4); h.podiums=h.wins+Math.floor(rng()*3); reasons.push(h.wins+'-time show winner'); }
  if(h.generation>=3) reasons.push('gen-'+h.generation+' bloodline');
  if(!reasons.length) reasons.push('exceptional conformation');
  h.featured=true;
  return {horse:h, reason:reasons.join(', ')};
}
function refreshFeatured(game){ const wk=weekOf(game.day||1);
  if(!game.featured || game.featured.week!==wk){
    const made=makeFeaturedHorse(game, seededOnce(hashDay(wk*7919+13)));
    game.featured={week:wk, horse:made.horse, reason:made.reason, sold:false};
  }
  return game.featured; }
function featuredHorse(game){ refreshFeatured(game); return (game.featured && !game.featured.sold)?game.featured.horse:null; }
function isFeatured(h){ return !!(h&&h.featured); }

function normWishlist(w){ w=w||{}; return {prefs:Array.isArray(w.prefs)?w.prefs.filter(p=>p&&typeof p==='object').slice(0,8):[]}; }
function matchesPref(h,pref){ if(!h||!pref) return false;
  if(!pref.breed&&!pref.sex&&!pref.coat&&!pref.rarity) return false; // an empty pref matches nothing
  if(pref.breed && h.breed!==pref.breed) return false;
  if(pref.sex && h.sex!==pref.sex) return false;
  if(pref.coat && coatOf(h).name!==pref.coat) return false;
  if(pref.rarity && (breedDef(h.breed)||{rarity:1}).rarity < pref.rarity) return false;
  return true; }
function matchesWishlist(h,wishlist){ const w=normWishlist(wishlist); return w.prefs.some(p=>matchesPref(h,p)); }
function addWishlistPref(game,pref){ if(!game.wishlist) game.wishlist={prefs:[]};
  pref=pref||{}; const clean={}; if(pref.breed)clean.breed=pref.breed; if(pref.sex)clean.sex=pref.sex; if(pref.coat)clean.coat=pref.coat; if(pref.rarity)clean.rarity=+pref.rarity;
  if(!Object.keys(clean).length) return {ok:false,why:'Pick at least one criterion.'};
  if(game.wishlist.prefs.some(p=>JSON.stringify(p)===JSON.stringify(clean))) return {ok:false,why:'Already on your wishlist.'};
  if(game.wishlist.prefs.length>=8) return {ok:false,why:'Wishlist is full (8).'};
  game.wishlist.prefs.push(clean); return {ok:true,pref:clean}; }
function removeWishlistPref(game,index){ if(!game.wishlist||!Array.isArray(game.wishlist.prefs)) return {ok:false}; if(index<0||index>=game.wishlist.prefs.length) return {ok:false}; game.wishlist.prefs.splice(index,1); return {ok:true}; }
function marketMatches(game){ const w=game&&game.wishlist; if(!w||!w.prefs||!w.prefs.length) return [];
  const pool=(game.market||[]).slice(); const f=featuredHorse(game); if(f) pool.push(f);
  return pool.filter(h=>matchesWishlist(h,w)); }
function auctionMatches(game){ const w=game&&game.wishlist; if(!w||!w.prefs||!w.prefs.length) return [];
  const lots=(game.auction&&game.auction.lots)||[]; return lots.filter(l=>l&&l.horse&&!l.won&&!l.closed&&matchesWishlist(l.horse,w)).map(l=>l.horse); }
function wishlistMatches(game){ return marketMatches(game).length + auctionMatches(game).length; }

// ---------- Rank / reputation ----------
const RANKS=[
  {rep:0,name:'Ranch Hand'},{rep:150,name:'Stablekeeper'},{rep:450,name:'Horse Breeder'},
  {rep:1000,name:'Ranch Owner'},{rep:2200,name:'Master Breeder'},{rep:4500,name:'Champion Stud'},
  {rep:8000,name:'Legendary Rancher'},
];
function rankFor(rep){ let r=RANKS[0]; for(const x of RANKS){ if(rep>=x.rep) r=x; } return r; }

// ---------- Rival ranches & the regional leaderboard ----------
// Named AI ranches whose reputation grows deterministically from the day counter
// (each with its own pace + favoured discipline), giving the player a living
// standings table to climb. No heavy save state — only the player's rank history
// is persisted, for movement arrows.
const RIVALS=[
  {id:'ironhoof',   name:'Ironhoof Farm',  emoji:'⚒️', disc:'race',      base:360,  pace:15, seed:11, blurb:'Blood-and-thunder racing yard.'},
  {id:'sunfire',    name:'Sunfire Ranch',  emoji:'🔥', disc:'jump',      base:220,  pace:14, seed:13, blurb:'Fearless show-jumpers.'},
  {id:'ravenwood',  name:'Ravenwood Stud', emoji:'🖤', disc:'dressage',  base:820,  pace:11, seed:3,  blurb:'Elegant dressage dynasty.'},
  {id:'golden',     name:'Golden Meadows', emoji:'🌻', disc:'halter',    base:1450, pace:8,  seed:7,  blurb:'Show-ring beauties & rare coats.'},
  {id:'silvercreek',name:'Silvercreek',    emoji:'💧', disc:'endurance', base:1850, pace:6,  seed:5,  blurb:'Old-money endurance champions.'},
];
function rivalDef(id){ return RIVALS.find(r=>r.id===id)||null; }
// how many of this rival's favoured show days have elapsed by `day` (cheap, no loop)
function rivalShowDays(rv,day){
  const per=SCHEDULE.filter(sd=>(sd.shows||[]).indexOf(rv.disc)>=0).length;
  return Math.floor(Math.max(0,day||0)/7)*per;
}
// deterministic rival reputation on a day — base + pace·day + discipline momentum + gentle wobble
function rivalRep(game,id){
  const rv=(id&&typeof id==='object')?id:rivalDef(id); if(!rv) return 0;
  const day=(game&&game.day)||1;
  let rep=rv.base + rv.pace*day + rivalShowDays(rv,day)*4;
  rep += ((hashDay(day+rv.seed)%100)-50)/50 * rv.pace*3; // ±~3 paces of deterministic wobble
  return Math.max(0,Math.round(rep));
}
// the player's leaderboard score: reputation plus half of estate prestige
function playerScore(game){ return Math.round(((game&&game.rep)||0) + ((game&&game.prestige)||0)*0.5); }
// full standings, sorted desc, player included & flagged, ranks assigned
function standings(game){
  const rows=RIVALS.map(rv=>({id:rv.id,name:rv.name,emoji:rv.emoji,disc:rv.disc,score:rivalRep(game,rv),isPlayer:false}));
  rows.push({id:'player',name:ranchName(game),emoji:'🐴',disc:null,score:playerScore(game),isPlayer:true});
  rows.sort((a,b)=> (b.score-a.score) || (a.isPlayer? -1 : b.isPlayer? 1 : a.id<b.id?-1:1));
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}
function playerRank(game){ const p=standings(game).find(r=>r.isPlayer); return p?p.rank:RIVALS.length+1; }
function leaderRanch(game){ return standings(game)[0]; }
function rivalCount(){ return RIVALS.length; }
// update the player's rank history (call once per day) — powers movement arrows & best-rank
function tickStandings(game){
  const pr=playerRank(game);
  game.prevRank=(game.lastRank!=null)?game.lastRank:pr;
  game.lastRank=pr;
  game.bestRank=(game.bestRank==null)?pr:Math.min(game.bestRank,pr);
  return pr;
}

// ---------- Rival grudge match (a distinct 1v1 challenge on top of the rivals leaderboard) ----------
// Pick one of your horses and challenge a named rival head-to-head in a discipline: your disciplineScore
// vs a rating derived from the rival's live reputation. Bounded stake/reward + a per-rival cooldown.
const GRUDGE_STAKE=200;      // entry fee (a coin sink)
const GRUDGE_COOLDOWN=5;     // days before you can re-challenge the SAME rival
const GRUDGE_WIN_CAP=900;    // hard cap on winnings
// a 0..100-ish "power" number from the rival's live reputation (grows through the game)
function grudgeRating(game, rival){ const r=(rival&&typeof rival==='object')?rival:rivalDef(rival); if(!r) return 0;
  return clamp(46 + rivalRep(game,r)/44, 46, 96); }
// the opponent's score for a given discipline (weaker outside the rival's speciality); optional rng adds ±10%
function grudgeOpponentScore(game, rival, discId, rng){ const r=(rival&&typeof rival==='object')?rival:rivalDef(rival); if(!r) return 0;
  const base=grudgeRating(game, r), discMult=(discId===r.disc)?1.0:0.86, variance=rng?(0.9+0.2*rng()):1;
  return Math.round(base*discMult*variance); }
function grudgeStateOf(game){ if(!game.grudge||typeof game.grudge!=='object') game.grudge={record:{w:0,l:0}, last:{}, vs:{}};
  if(!game.grudge.record) game.grudge.record={w:0,l:0}; if(!game.grudge.last) game.grudge.last={}; if(!game.grudge.vs) game.grudge.vs={}; return game.grudge; }
function grudgeLast(game, rivalId){ const g=(game&&game.grudge&&game.grudge.last)||{}; return g[rivalId]||0; }
function rivalChallengeReady(game, rivalId){ const last=grudgeLast(game,rivalId); return last===0 || (((game&&game.day)||1)-last)>=GRUDGE_COOLDOWN; }
function grudgeCooldownLeft(game, rivalId){ const last=grudgeLast(game,rivalId); return last===0?0:Math.max(0, GRUDGE_COOLDOWN-(((game&&game.day)||1)-last)); }
function nextGrudgeDay(game, rivalId){ const last=grudgeLast(game,rivalId); return last===0?((game&&game.day)||1):last+GRUDGE_COOLDOWN; }
function grudgeRecord(game){ const r=(game&&game.grudge&&game.grudge.record)||{w:0,l:0}; return { w:r.w||0, l:r.l||0 }; }
function grudgeRecordVs(game, rivalId){ const v=(game&&game.grudge&&game.grudge.vs&&game.grudge.vs[rivalId])||{w:0,l:0}; return { w:v.w||0, l:v.l||0 }; }
// resolve a grudge match: validate eligibility + funds + cooldown; apply the bounded stake/reward; record the result
function runGrudgeMatch(game, horseId, rivalId, discId, rng){
  rng=rng||Math.random;
  const rv=rivalDef(rivalId); if(!rv) return {ok:false,why:'No such rival.'};
  const h=((game&&game.horses)||[]).find(x=>x.id===horseId); if(!h) return {ok:false,why:'No such horse.'};
  const d=discId||rv.disc, disc=disciplineDef(d); if(!disc) return {ok:false,why:'Unknown discipline.'};
  const elig=canEnterShow(game,h); if(!elig.ok) return {ok:false,why:elig.why};       // reuse the show-eligibility rules
  if(!rivalChallengeReady(game, rivalId)) return {ok:false,why:'Challenge '+rv.name+' again in '+grudgeCooldownLeft(game,rivalId)+' day(s).'};
  if((game.money||0)<GRUDGE_STAKE) return {ok:false,why:'Not enough coins for the 🪙'+GRUDGE_STAKE+' stake.'};
  game.money-=GRUDGE_STAKE;
  const my=disciplineScore(h, disc, game)*(0.9+0.2*rng());
  const opp=grudgeOpponentScore(game, rv, d, rng);
  const win = my>=opp;
  const st=grudgeStateOf(game); st.last[rivalId]=(game.day||1);
  if(!st.vs[rivalId]) st.vs[rivalId]={w:0,l:0};
  if(!game.stats) game.stats={};
  let reward={money:0, rep:0};
  if(win){
    reward.money=Math.min(GRUDGE_WIN_CAP, GRUDGE_STAKE*2 + Math.round(grudgeRating(game,rv)*4));
    reward.rep=Math.min(30, 8+Math.round(grudgeRating(game,rv)*0.2));
    game.money+=reward.money; game.rep=(game.rep||0)+reward.rep;
    st.record.w=(st.record.w||0)+1; st.vs[rivalId].w++; game.stats.grudgeWins=(game.stats.grudgeWins||0)+1;
  } else {
    reward.rep=-Math.min(8, 3+Math.round(grudgeRating(game,rv)*0.06));
    game.rep=Math.max(0,(game.rep||0)+reward.rep);
    st.record.l=(st.record.l||0)+1; st.vs[rivalId].l++;
  }
  game.stats.grudgeMatches=(game.stats.grudgeMatches||0)+1;
  return {ok:true, win, my:Math.round(my), opp, reward, rival:rv, disc:d, stake:GRUDGE_STAKE, record:grudgeRecord(game), vs:grudgeRecordVs(game,rivalId) };
}
