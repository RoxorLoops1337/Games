<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Skyhorse Stables — Horse Ranch Simulator</title>
<style>
  :root{
    --bg:#1a2416;--panel:#243019;--panel2:#2f3f22;--edge:#0c110a;--ink:#f4efdf;--ink2:#c3c9a6;
    --gold:#ffd35a;--gold2:#e0a53a;--good:#8bd36b;--bad:#e5624a;--warn:#f0a93b;--blue:#69c7e0;
    --pink:#f28bb0;--slot:#161f10;--wood:#6b4a2b;--wood2:#8a6238;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:#0a0d08;color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;overscroll-behavior:none;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  #app{width:100%;max-width:560px;min-height:100%;background:linear-gradient(#182110,#0d1109);display:flex;flex-direction:column;box-shadow:0 0 40px #000;position:relative}

  /* HUD */
  #hud{display:flex;align-items:center;gap:5px;padding:8px;background:linear-gradient(#2f3f22,#233016);border-bottom:2px solid var(--edge);font-size:13px;flex-wrap:wrap}
  .chip{background:var(--slot);border:1px solid var(--edge);border-radius:7px;padding:4px 8px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:800;font-variant-numeric:tabular-nums}
  .chip b{color:var(--gold)} .chip.feed b{color:var(--good)} .chip.rep b{color:var(--blue)} .chip.day b{color:var(--ink)}
  .spacer{flex:1}
  #speedBtns{display:flex;gap:3px}
  .sbtn{background:var(--slot);border:1px solid var(--edge);border-radius:6px;color:var(--ink2);font-weight:900;font-size:12px;padding:4px 8px;cursor:pointer;min-width:30px}
  .sbtn.on{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border-color:var(--gold2)}

  /* Scene banner */
  #scene{position:relative;height:96px;--grassTop:#8fbf68;--grassBot:#6ea34a;background:linear-gradient(#a9d0ec 0%,#c9e4f2 55%,var(--grassTop) 55%,var(--grassBot) 100%);border-bottom:2px solid var(--edge);overflow:hidden;line-height:0}
  #seasonGlass{position:absolute;inset:0;pointer-events:none;background:transparent;transition:background .8s ease}
  #skyWarm,#skyNight{position:absolute;inset:0;pointer-events:none;opacity:0}
  #skyWarm{background:linear-gradient(#ff9e5a55,#ffd08a22 55%,transparent 55%)}
  #skyNight{background:linear-gradient(#0a1330,#1b2547 40%,#0d2a33 55%,#0a1f12 100%)}
  #scene .sun,#scene .moon{position:absolute;top:12px;left:60%;width:34px;height:34px;border-radius:50%}
  #scene .sun{background:radial-gradient(circle,#fff2b0,#ffd35a 70%,#e0a53a);box-shadow:0 0 24px #ffd35a88}
  #scene .moon{width:26px;height:26px;background:radial-gradient(circle at 38% 38%,#fdfbf0,#d9dce6 70%,#aab0c2);box-shadow:0 0 18px #cdd6ff66;opacity:0}
  #scene .barn{position:absolute;bottom:24px;left:18px;width:70px;height:46px;--barnA:#a23c2e;--barnB:#7d2c22;--barnE:#4a1a13;--barnRoof:#5a2018;background:linear-gradient(var(--barnA),var(--barnB));border:2px solid var(--barnE);border-radius:3px;z-index:2}
  #scene .barn:before{content:"";position:absolute;top:-16px;left:-4px;right:-4px;height:18px;background:var(--barnRoof);clip-path:polygon(0 100%,50% 0,100% 100%)}
  #scene .barn:after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:26px;background:var(--barnE);border-radius:3px 3px 0 0}
  #sceneFlag{position:absolute;left:52px;top:0;width:2px;height:22px;background:#6b4a2a;z-index:3;display:none}
  #sceneFlag:after{content:"";position:absolute;left:2px;top:1px;border-style:solid;border-width:4px 0 4px 12px;border-color:transparent transparent transparent var(--flagC,#e8b53a);animation:flagwave 2.4s ease-in-out infinite;transform-origin:left center}
  @keyframes flagwave{0%,100%{transform:skewY(0)}50%{transform:skewY(-6deg)}}
  #sceneDecor{position:absolute;inset:0;pointer-events:none;z-index:2}
  #sceneDecor .decorProp{position:absolute;font-size:20px;filter:drop-shadow(0 1px 1px #0004);line-height:1}
  #scene .horse{position:absolute;bottom:18px;z-index:3;filter:drop-shadow(0 2px 1px #0005);animation:graze 3s ease-in-out infinite}
  #scene .horse .hsvg{display:block}
  #sceneCanteen{position:absolute;bottom:22px;right:20px;font-size:30px;filter:drop-shadow(0 2px 2px #0005);z-index:2}
  @keyframes graze{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-2px)}}
  #wx{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:4}
  .drop{position:absolute;top:-12px;width:1.5px;height:9px;background:linear-gradient(#bcd8f0,#8fb4d8);border-radius:1px;opacity:.55;animation:rainfall linear infinite}
  .flake{position:absolute;top:-10px;color:#fff;font-size:9px;opacity:.85;animation:snowfall linear infinite}
  @keyframes rainfall{0%{transform:translateY(-12px)}100%{transform:translateY(108px)}}
  @keyframes snowfall{0%{transform:translateY(-10px) translateX(0)}100%{transform:translateY(108px) translateX(8px)}}
  #sceneTitle{position:absolute;top:8px;left:12px;font-size:13px;font-weight:900;color:#2a3a18;text-shadow:0 1px 0 #ffffff70;letter-spacing:.5px;z-index:5}
  #sceneRank{position:absolute;top:26px;left:12px;font-size:11px;font-weight:800;color:#3a4a24;text-shadow:0 1px 0 #ffffff55;z-index:5}
  #sceneWeather{position:absolute;top:8px;right:12px;font-size:16px;z-index:5;text-shadow:0 1px 2px #0004}

  /* Tabs */
  #tabs{display:flex;background:#1b2411;border-bottom:2px solid var(--edge)}
  .tab{flex:1;text-align:center;padding:9px 2px 7px;font-size:11px;font-weight:800;color:var(--ink2);cursor:pointer;border-right:1px solid #0c110a;position:relative}
  .tab:last-child{border-right:none}
  .tab .ti{font-size:18px;display:block;line-height:1.1}
  .tab.on{background:linear-gradient(#2f3f22,#26331a);color:var(--gold)}
  .tab.on:after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--gold)}
  .tab .badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--bad);color:#fff;font-size:9px;font-weight:900;border-radius:8px;padding:0 4px;min-width:14px}

  /* Content */
  #main{flex:1;overflow-y:auto;padding:10px 10px 90px;-webkit-overflow-scrolling:touch}
  .sec{display:none} .sec.on{display:block}
  h2.head{font-size:13px;letter-spacing:.5px;color:var(--gold);margin:2px 0 8px;text-transform:uppercase}
  .sub{font-size:11px;color:var(--ink2);margin:-4px 0 10px}

  /* Cards */
  .card{background:linear-gradient(var(--panel2),var(--panel));border:1px solid var(--edge);border-radius:11px;padding:10px;margin-bottom:9px;box-shadow:0 2px 0 #0006}
  .row{display:flex;gap:8px;align-items:center}
  .grow{flex:1;min-width:0}
  .hname{font-weight:900;font-size:14px;display:flex;align-items:center;gap:6px}
  .hbreed{font-size:11px;color:var(--ink2);margin-top:1px}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .tag{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:20px;background:#0d130a;border:1px solid #0c110a;color:var(--ink2)}
  .tag.sex-m{color:#7fb8ff;border-color:#26405f} .tag.sex-f{color:var(--pink);border-color:#5f2640}
  .tag.stage{color:var(--gold)} .tag.pure{color:var(--good);border-color:#2f4a1c}
  .tag.preg{color:var(--pink);border-color:#5f2640;background:#2a1420}
  .tag.busy{color:var(--warn);border-color:#4a3612}
  .tag.rare{color:#d9a3ff;border-color:#4a2f5f}
  .hface{width:46px;height:46px;border-radius:10px;background:radial-gradient(circle at 50% 35%,#3a4a24,#1c2711);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid #0c110a;flex-shrink:0}
  .stats{display:flex;gap:6px;margin-top:7px}
  .stat{flex:1;background:#0d130a;border-radius:6px;padding:3px 5px;text-align:center}
  .stat .sv{font-weight:900;font-size:13px;font-variant-numeric:tabular-nums}
  .stat .sl{font-size:8.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px}
  .bar{height:5px;border-radius:3px;background:#0d130a;overflow:hidden;margin-top:2px}
  .bar>i{display:block;height:100%;border-radius:3px}
  .val{color:var(--gold);font-weight:900;font-variant-numeric:tabular-nums}

  /* Buttons */
  .btn{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border:none;border-radius:9px;font-weight:900;font-size:13px;padding:9px 12px;cursor:pointer;box-shadow:0 3px 0 #0006;white-space:nowrap}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0006}
  .btn.sm{padding:7px 10px;font-size:12px}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--edge);box-shadow:0 2px 0 #0006}
  .btn.blue{background:linear-gradient(#7fd3ec,#4aa9c8);color:#06212b}
  .btn.pink{background:linear-gradient(#f7a8c6,#df6f9c);color:#3a0a20}
  .btn.red{background:linear-gradient(#f0836e,#c73f2b);color:#2a0a05}
  .btn:disabled{filter:grayscale(.7) brightness(.7);cursor:not-allowed}
  .btnrow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}

  .empty{text-align:center;color:var(--ink2);font-size:13px;padding:26px 10px;line-height:1.6}
  .money-need{color:var(--bad)}
  .pill{display:inline-flex;align-items:center;gap:3px;background:#0d130a;border:1px solid #0c110a;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:800}

  /* Stable card */
  .stable{border-left:4px solid var(--wood2)}
  .card.locked{opacity:.6;border-left:4px solid #3a4a24}
  .stalls{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .stallDot{width:15px;height:15px;border-radius:4px;background:#0d130a;border:1px solid #0c110a}
  .stallDot.full{background:linear-gradient(var(--gold),var(--gold2));border-color:var(--gold2)}
  .stallDot.board{background:linear-gradient(#7fd3ec,#4aa9c8);border-color:#4aa9c8}

  /* Breeding picker */
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pickbox{background:#0d130a;border:2px dashed #3a4a24;border-radius:11px;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center;cursor:pointer}
  .pickbox.filled{border-style:solid;border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .pickbox .pf{font-size:34px}
  .pickbox .pn{font-weight:900;font-size:12px;margin-top:3px}
  .pickbox .ps{font-size:10px;color:var(--ink2)}
  .heart{text-align:center;font-size:22px;margin:8px 0}

  /* Modal */
  .modal{position:fixed;inset:0;background:#0a0d08d8;z-index:20;display:none;align-items:flex-end;justify-content:center}
  .modal.on{display:flex}
  .sheet{position:relative;width:100%;max-width:560px;background:linear-gradient(#2f3f22,#233016);border-top:2px solid var(--gold2);border-radius:16px 16px 0 0;padding:16px 14px 22px;max-height:82vh;overflow-y:auto;animation:slideup .22s ease-out}
  .sheetX{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border-radius:50%;border:1px solid var(--edge);background:var(--slot);color:var(--ink2);font-size:15px;font-weight:900;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sheetX:active{transform:scale(.9)} .sheetX:hover{color:var(--ink);background:#0d130a}
  @keyframes slideup{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 40px 4px 0;font-size:16px;color:var(--gold)}
  .sheet .msg{font-size:13px;line-height:1.5;color:var(--ink);margin:6px 0 12px}
  .optlist{display:flex;flex-direction:column;gap:7px}
  .opt{background:#0d130a;border:1px solid #0c110a;border-radius:9px;padding:10px;display:flex;gap:8px;align-items:center;cursor:pointer}
  .opt:active{background:#131c0d}
  .modal.center{align-items:center}
  .sheet.card2{border-radius:16px;max-width:360px;margin:0 14px}

  /* Toast */
  #toasts{position:fixed;top:64px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:30;pointer-events:none}
  /* Guided tutorial coach-marks (non-blocking hints) */
  #tutRing{position:fixed;z-index:48;border:3px solid var(--gold);border-radius:12px;box-shadow:0 0 0 4000px #0a0d0866,0 0 16px #ffd35a;pointer-events:none;display:none;transition:all .25s ease}
  #tutBubble{position:fixed;z-index:49;max-width:300px;width:calc(100% - 32px);background:linear-gradient(#2f3f22,#233016);border:1px solid var(--gold2);border-radius:14px;padding:12px 13px;box-shadow:0 10px 30px #000b;display:none}
  #tutBubble.on{display:block;animation:tin .25s ease-out}
  .tbHead{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .tbAvatar{font-size:22px}
  .tbTitle{font-weight:900;font-size:14px;color:var(--gold)}
  .tbText{font-size:13px;line-height:1.5;color:var(--ink)}
  .tbBtns{display:flex;align-items:center;gap:8px;margin-top:11px}
  .tbSkip{background:none;border:none;color:var(--ink2);font-size:12px;font-weight:700;cursor:pointer;padding:6px 2px}
  .tbStep{flex:1;text-align:center;font-size:11px;color:var(--ink2);font-weight:800}
  .tbNext{background:linear-gradient(var(--gold),var(--gold2));color:#2a1c05;border:none;border-radius:9px;font-weight:900;font-size:13px;padding:8px 14px;cursor:pointer;box-shadow:0 3px 0 #0006}
  .tbNext:active{transform:translateY(2px);box-shadow:0 1px 0 #0006}
  .toast{background:#0d130af0;border:1px solid var(--gold2);color:var(--ink);font-weight:800;font-size:13px;padding:8px 14px;border-radius:20px;box-shadow:0 4px 12px #000a;animation:tin .3s ease-out;max-width:90%;text-align:center}
  .toast.good{border-color:var(--good)} .toast.bad{border-color:var(--bad)} .toast.info{border-color:var(--blue)}
  @keyframes tin{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Goal bar */
  #goalBar{display:flex;align-items:center;gap:7px;padding:6px 10px;background:linear-gradient(#2a3a1c,#20301a);border-bottom:2px solid var(--edge);font-size:12px;font-weight:800}
  #goalBar .gicon{font-size:13px}
  #goalText{color:var(--gold);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #goalTip{color:var(--ink2);font-variant-numeric:tabular-nums;font-size:11px;white-space:nowrap}
  #goalBar.done #goalText{color:var(--good)}
  /* Coin pops + hud bump */
  .coinpop{position:fixed;z-index:40;font-weight:900;font-size:14px;color:var(--gold);text-shadow:0 2px 0 #000,0 0 8px #0008;pointer-events:none;animation:coinrise 1.1s ease-out forwards;white-space:nowrap}
  .coinpop.neg{color:var(--bad)}
  @keyframes coinrise{0%{transform:translateY(0);opacity:0}15%{opacity:1}100%{transform:translateY(-34px);opacity:0}}
  #hudMoney.bump{display:inline-block;animation:hudbump .3s ease-out}
  @keyframes hudbump{0%{transform:scale(1)}40%{transform:scale(1.28);color:#fff2b0}100%{transform:scale(1)}}
  .goalpop{border-color:var(--good)!important}
  .burst{position:fixed;z-index:45;font-size:20px;pointer-events:none;will-change:transform,opacity;animation:burstfly 1.2s ease-out forwards;text-shadow:0 1px 3px #0006}
  @keyframes burstfly{0%{transform:translate(0,0) scale(.4);opacity:0}18%{opacity:1;transform:translate(calc(var(--dx)*.4),calc(var(--dy)*.5)) scale(1.1)}100%{transform:translate(var(--dx),calc(var(--dy) + 120px)) scale(.9) rotate(30deg);opacity:0}}
  /* Pedigree tree */
  .pedwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:4px 0 6px}
  .pedtree{display:flex;gap:8px;align-items:center;min-width:min-content}
  .pcol{display:flex;flex-direction:column;gap:6px;justify-content:space-around;flex:0 0 auto}
  .pcol:nth-child(2){min-height:120px} .pcol:nth-child(3){min-height:160px}
  .pnode{background:#0d130a;border:1px solid #0c110a;border-radius:8px;padding:6px 8px;min-width:96px}
  .pnode.self{border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .pnode.empty2{opacity:.45;border-style:dashed}
  .pn2{font-weight:800;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ps2{font-size:10px;color:var(--ink2);white-space:nowrap}
  .pedkey{font-size:10.5px;color:var(--ink2);text-align:center;margin-bottom:4px}
  /* Trading card preview */
  .tcwrap{display:flex;justify-content:center;margin:4px 0 10px}
  .tcard{width:260px;background:linear-gradient(#243019,#141d0c);border:3px solid #3a4a24;border-radius:16px;padding:12px;box-shadow:0 8px 24px #000a}
  .tcard.tchamp{border-color:var(--gold2);box-shadow:0 8px 26px #000a,0 0 0 1px #ffd35a44 inset}
  .tctop{text-align:center;margin-bottom:6px}
  .tcname{font-weight:900;font-size:18px;color:var(--gold)}
  .tcbreed{font-size:11px;color:var(--ink2)}
  .tcport{height:132px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid #0c110a;margin-bottom:8px}
  .tcport .hsvg{width:120px;height:auto;filter:drop-shadow(0 3px 3px #0006)}
  .tctags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:8px}
  .cchip{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:20px;background:#0d130a;border:1px solid #0c110a;color:var(--ink2)}
  .cchip.sex-m{color:#7fb8ff} .cchip.sex-f{color:var(--pink)} .cchip.good{color:var(--good)} .cchip.rare{color:#d9a3ff} .cchip.gold{color:var(--gold);border-color:var(--gold2)}
  .csRow{display:flex;align-items:center;gap:6px;margin:3px 0}
  .csL{width:34px;font-size:10px;font-weight:800;color:var(--ink2)}
  .csBar{flex:1;height:8px;background:#0d130a;border-radius:5px;overflow:hidden}
  .csBar>i{display:block;height:100%;border-radius:5px}
  .csV{width:24px;text-align:right;font-size:11px;font-weight:900;font-variant-numeric:tabular-nums}
  .tcmeta{display:flex;justify-content:space-around;margin:8px 0 4px;font-size:12px;color:var(--ink2)}
  .tcmeta b{color:var(--ink)}
  .tccareer{text-align:center;font-size:10.5px;color:var(--ink2);margin-bottom:8px}
  .tcfoot{display:flex;flex-direction:column;gap:2px;background:#0d130a;border-radius:10px;padding:6px 9px;font-size:10px}
  .tcfoot span:first-child{color:var(--gold);font-weight:800} .tcfoot span:last-child{color:var(--ink2)}
  /* Achievements & stats */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:2px 0 4px}
  .stkv{display:flex;justify-content:space-between;background:#0d130a;border:1px solid #0c110a;border-radius:8px;padding:6px 9px;font-size:11.5px;color:var(--ink2)}
  .stkv b{color:var(--ink);font-variant-numeric:tabular-nums}
  .achlist{display:flex;flex-direction:column;gap:6px}
  .achcard{display:flex;align-items:center;gap:9px;background:#0d130a;border:1px solid #0c110a;border-radius:10px;padding:8px 10px;opacity:.55}
  .achcard.un{opacity:1;border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .achic{font-size:22px;width:30px;text-align:center;flex:0 0 auto}
  .achtx{flex:1;min-width:0}
  .achn{font-weight:900;font-size:13px}
  .achcard.un .achn{color:var(--gold)}
  .achd{font-size:10.5px;color:var(--ink2)}
  .achok{color:var(--good);font-weight:900;font-size:16px}
  /* This Week schedule */
  .weeklist{display:flex;flex-direction:column;gap:5px;margin:4px 0 8px}
  .weekrow{background:#0d130a;border:1px solid #0c110a;border-radius:9px;padding:7px 9px}
  .weekrow.today{border-color:var(--gold2);background:linear-gradient(var(--panel2),var(--panel))}
  .weekrow.fest{border-color:var(--gold);box-shadow:0 0 0 1px #ffd35a33 inset}
  .wdname{font-weight:900;font-size:13px}
  .wdnote{font-size:11px;color:var(--gold);font-weight:700;margin-top:1px}
  .wddesc{font-size:10.5px;color:var(--ink2);margin-top:2px}
  .todaystrip{display:flex;align-items:center;gap:8px;background:linear-gradient(var(--panel2),var(--panel));border:1px solid var(--gold2);border-radius:11px;padding:9px 11px;margin-bottom:9px}
  .todaystrip .tsimoji{font-size:24px}
  .todaystrip .tslabel{font-weight:900;font-size:14px;color:var(--gold)}

// ---------- Aging: prime, decline, breeding/competing limits ----------

const NAMES_M=['Thunder','Comet','Bandit','Diesel','Ranger','Apollo','Blaze','Rocky','Titan','Dusty','Chief','Maverick','Zeus','Storm','Rebel','Duke','Cash','Rusty','Jasper','Odin'];

const COAT_TIER_MULT=[1, 1.07, 1.20, 1.42];

const COAT_PROFILE={
  friesian:  {E:1.0,A:0.0,cream:0.00,grey:0.00},

  andalusian:{E:0.6,A:0.4,cream:0.10,grey:0.55},
  shetland:  {E:0.5,A:0.5,cream:0.20,grey:0.15},
  clydesdale:{E:0.6,A:0.7,cream:0.05,grey:0.20},
  thoroughbred:{E:0.6,A:0.6,cream:0.05,grey:0.15},
  quarter:   {E:0.4,A:0.5,cream:0.30,grey:0.10},
  appaloosa: {E:0.5,A:0.5,cream:0.20,grey:0.20},
  mustang:   {E:0.5,A:0.6,cream:0.25,grey:0.10},
  welsh:     {E:0.5,A:0.5,cream:0.20,grey:0.25},
  fjord:     {E:0.6,A:0.7,cream:0.10,grey:0.10},

  paint:     {E:0.5,A:0.55,cream:0.25,grey:0.10},

};
const COAT_MAP={ red:['Chestnut','Palomino','Cremello'], bay:['Bay','Buckskin','Perlino'], black:['Black','Smoky Black','Smoky Cream'] };
function seedGenes(breed,rng){
  rng=rng||Math.random;
  const p=COAT_PROFILE[breed]||{E:0.5,A:0.5,cream:0.20,grey:0.10};
  const al=(f,dom,rec)=> rng()<f?dom:rec;
  const genes={
    E:[al(p.E,'E','e'), al(p.E,'E','e')],
    A:[al(p.A,'A','a'), al(p.A,'A','a')],
    Cr:[al(p.cream,'C','n'), al(p.cream*0.5,'C','n')],
    G:[al(p.grey,'G','n'), al(p.grey*0.4,'G','n')],

  if(!genes) return {name:'Bay', tier:0};
  const carries=(loc,al,def)=>(genes[loc]||def).indexOf(al)>=0;

  const black=carries('E','E',['e','e']);
  const base = !black ? 'red' : (carries('A','A',['a','a'])?'bay':'black');

  const child={ E:[one(a.E),one(b.E)], A:[one(a.A),one(b.A)], Cr:[one(a.Cr),one(b.Cr)], G:[one(a.G),one(b.G)], mut:null };

const COAT_CSS={
  Chestnut:{body:'#9a5a2b',mane:'#6b3c17'}, Bay:{body:'#7c4a26',mane:'#221610'},

  for(const n of NEEDS){ const v=h.needs[n.id];
    h.needs[n.id]=(typeof v==='number'&&isFinite(v))?clamp(v,0,100):(n.id==='bond'?60:78); }
  if(typeof h.bond!=='number'||!isFinite(h.bond)) h.bond=clamp(h.needs.bond*0.4,0,100);
  return h;
}
function needLevel(h,id){ if(!h) return 0; needsInit(h); const v=h.needs[id]; return typeof v==='number'?clamp(v,0,100):0; }
// overall care 0..100 = mean of all needs
function careScore(h){ if(!h) return 0; needsInit(h); let s=0; for(const id of NEED_IDS) s+=needLevel(h,id); return Math.round(s/NEED_IDS.length); }
function careTier(h){ const c=careScore(h);
  return c>=82?{id:'pampered',label:'Pampered',emoji:'✨'} : c>=58?{id:'content',label:'Content',emoji:'😊'}
       : c>=34?{id:'restless',label:'Needs care',emoji:'😕'} : {id:'neglected',label:'Neglected',emoji:'😟'}; }
// a gentle performance/mood multiplier: careScore 100→+6%, ~62→neutral, 0→-10%
function careBonusMult(h){ return 0.9 + 0.16*(careScore(h)/100); }
// how fast a given need decays today — season/weather stress raises it; care day eases it
function needDecayFor(game,n){
  let d=n.decay;
  if(game){ const day=game.day||0, seas=seasonOf(day).id;
    if(seas==='winter'&&(n.id==='rest'||n.id==='groom')) d+=3;   // cold is hard on rest & coat
    if(seas==='summer'&&n.id==='exercise') d+=3;                 // heat raises turnout/water needs
    if(isCareDay(day)) d=Math.max(2,d-2);                        // Vet & Farrier day: lighter upkeep
  }
  return d;
}
// decay one horse's needs by a day (mutates); bonding level tracks how well the bond need is kept
function decayNeeds(game,h){ needsInit(h);
  for(const n of NEEDS) h.needs[n.id]=clamp(h.needs[n.id]-needDecayFor(game,n),0,100);
  const bl=h.needs.bond; h.bond=clamp((h.bond||0)+(bl>=70?1.2:bl>=40?0:-1.4),0,100);
  return careScore(h);
}
// cost to restore one need now (0 = free), discounted on the care weekday
function careCost(game,id){ const n=needDef(id); if(!n||!n.cost) return 0;
  let c=n.cost; if(game&&isCareDay(game.day)) c=Math.round(c*0.6); return c; }
// full cost to satisfy every unmet paid need for a horse (a "Full care" bundle)
function fullCareCost(game,h){ needsInit(h); let c=0;
  for(const n of NEEDS){ if(n.cost && h.needs[n.id]<100) c+=careCost(game,n.id); } return c; }
// restore a single need to full (mutates game+horse). returns {ok, cost, need, gain, why}
function applyCare(game,h,id){ const n=needDef(id); if(!n) return {ok:false,why:'Unknown need.'};
  needsInit(h);
  const cost=careCost(game,id);
  if(cost>0){ if(!game||(game.money||0)<cost) return {ok:false,cost,why:'Not enough coins.'}; game.money-=cost; }
  const before=h.needs[id], gain=Math.max(0,100-before);
  h.needs[id]=100;
  // small mood/health payoff, tapering if it was already high (anti-spam)
  h.happy=clamp(h.happy+Math.round(gain*0.06)+(id==='bond'?1:0),0,100);
  if(id==='hooves'||id==='groom') h.health=clamp(h.health+Math.round(gain*0.03),0,100);
  if(id==='bond') h.bond=clamp((h.bond||0)+3,0,100);
  return {ok:true, cost, need:n, gain};
}
// restore every need for one horse (pays the paid ones). returns {ok, cost, filled, why}
function applyFullCare(game,h){ needsInit(h); const cost=fullCareCost(game,h);
  if(cost>0 && (!game||(game.money||0)<cost)) return {ok:false,cost,why:'Not enough coins for full care.'};
  let filled=0; for(const id of NEED_IDS){ if(h.needs[id]<100){ applyCare(game,h,id); filled++; } }
  return {ok:true, cost, filled};
}
// which needs are below a threshold (for card pips / prompts)
function lowNeeds(h,thresh){ thresh=thresh==null?60:thresh; needsInit(h); return NEED_IDS.filter(id=>needLevel(h,id)<thresh); }
// stable routine: top up all FREE needs for every horse at once (once/day convenience)
function applyDailyRoutine(game){ if(!game||!game.horses) return {horses:0,filled:0};
  let filled=0; const free=freeNeedIds();
  for(const h of game.horses){ needsInit(h);
    for(const id of free){ if(h.needs[id]<100) filled++; h.needs[id]=100; }
    h.happy=clamp(h.happy+1,0,100); if(h.needs.bond>=60) h.bond=clamp((h.bond||0)+1,0,100); }
  game.lastRoutineDay=game.day; return {horses:game.horses.length, filled};
}
function routineDoneToday(game){ return !!game && game.lastRoutineDay===game.day; }

function mkHorse(o){
  o=o||{}; const rng=o.rng||Math.random;
  const b=breedDef(o.breed)||BREEDS[0];
  const sex=o.sex||(rng()<0.5?'mare':'stallion');
  const vary=(base,amt)=>clamp(Math.round(base+(rng()*2-1)*amt),8,100);
  const genes=o.genes||seedGenes(b.id,rng);
  const coat=o.coat||phenotype(genes);
  const h={
    id:o.id||('h'+(_idc++)),
    name:o.name||pickName(sex,rng),
    breed:b.id, sex,
    genes, coat, color:coat.name,
    trait:o.trait||pickTrait(rng),
    age:o.age==null?12:o.age,
    speed:o.speed!=null?o.speed:vary(b.speed,10),
    stamina:o.stamina!=null?o.stamina:vary(b.stamina,10),
    temperament:o.temperament!=null?o.temperament:vary(b.temperament,10),
    health:o.health==null?92:o.health,
    happy:o.happy==null?85:o.happy,
    purebred:o.purebred!==undefined?o.purebred:true,
    generation:o.generation||1,
    rare:o.rare||null,        // rare trait tag e.g. 'Champion Bloodline'
    ped:o.ped||null, inbred:o.inbred||false,
    wins:o.wins||0, podiums:o.podiums||0, entries:o.entries||0, compCd:o.compCd||0, // show career
    atStud:o.atStud||false, // standing at public stud
    pregnant:false, gestation:0, sireBreed:null,
    rentDays:0, rentRate:0,   // >0 = out on rent
    stable:o.stable!=null?o.stable:0,
    needs:o.needs||null, bond:o.bond,  // daily care needs + bonding level (needsInit fills defaults)
  };
  needsInit(h);
  return h;
}

function statAvg(h){ return h.speed*0.4 + h.stamina*0.35 + h.temperament*0.25; }
function overall(h){ return Math.round(statAvg(h)); }

/* ============================================================ *
 *  ECONOMY DIALS (round 18 balancing pass) — tune here.
 *  Goal: early not grindy · mid rewarding · late not trivially rich.
 *  Passive streams have REPUTATION-CAPPED terms so they plateau; the
 *  biggest rewards stay with ACTIVE play (shows, sales, auctions).
 *   - buyPrice ×1.16 / sellQuote ×0.86–0.98 (buy>sell spread holds)
 *   - canteen visitors: rep term capped at +60 (≈rep 4000)
 *   - lesson fee: 11 + rep bonus capped at +30 (≈rep 5000)
 *   - boarding: 14 + quality·7 + rep term capped at +55
 *   - stud: fee valueOf·0.04 + rep mult ≤×1.4; demand ≤2.0;
 *     MULTIPLE at-stud stallions get diminishing weights (limited mares)
 *   - a single passive stream/day should stay below a top-tier show win (4000)
 * ============================================================ */

// ---------- Valuation ----------
function valueOf(h){
  const b=breedDef(h.breed)||BREEDS[0];
  const st=stageForAge(h.age);
  const statF = 0.55 + 0.009*statAvg(h);            // 50avg ~1.0, 100 ~1.45
  const healthF = 0.55 + 0.0045*h.health;
  const pedF = (h.purebred?1.12:0.82) * (1 + Math.min(0.4, (h.generation-1)*0.06));
  const rareF = h.rare?1.35:1;
  const coatF = coatValueMult(h);
  const winsF = 1 + Math.min(0.6, (h.wins||0)*0.05); // championship prestige
  const v = b.base * st.factor * statF * healthF * pedF * rareF * coatF * winsF * RARITY_MULT[b.rarity];
  return Math.max(50, Math.round(v));
}
function buyPrice(h){ return Math.round(valueOf(h)*1.16); }
function sellQuote(h){ return Math.round(valueOf(h)*(0.86 + 0.12*(h.happy/100))); }
function rentRate(h){ return Math.max(6, Math.round(valueOf(h)*0.028*(h.temperament/70)*(h.health/100)*traitMult(h,'rent')*agePerformanceMult(h))); }

// ---------- Stables ----------
const STARTER_STALLS=4;
function stableCost(game){ return Math.round(1200 * Math.pow(1.9, game.stables.length-1)); }
function upgradeCost(st){ return Math.round(500 * Math.pow(1.7, st.level-1)); }
function stallsOf(st){ return st.baseStalls + (st.level-1)*2; }
function totalStalls(game){ return game.stables.reduce((n,s)=>n+stallsOf(s),0); }
function usedStalls(game){ return game.horses.length + game.boarders; }
function freeStalls(game){ return totalStalls(game)-usedStalls(game); }
function stableQuality(game){ // avg level, drives boarding rate & happiness
  if(!game.stables.length) return 1;
  return game.stables.reduce((n,s)=>n+s.level,0)/game.stables.length;
}
function boardRatePerStall(game){ return Math.round(14 + stableQuality(game)*7 + Math.min(55, (game.rep||0)*0.02)); } // rep term capped so boarding plateaus

// ---------- Breeding ----------
function canBreed(mare,stallion){
  if(!mare||!stallion) return {ok:false,why:'Pick a mare and a stallion.'};
  if(mare.sex!=='mare') return {ok:false,why:'First pick must be a mare.'};
  if(stallion.sex!=='stallion') return {ok:false,why:'Second pick must be a stallion.'};
  if(!isAdult(mare)||!isAdult(stallion)) return {ok:false,why:'Both horses must be adults.'};
  if(tooOldToBreed(mare)||tooOldToBreed(stallion)) return {ok:false,why:'Too old to breed — honour them in retirement.'};
  if(mare.pregnant) return {ok:false,why:'This mare is already pregnant.'};
  if(mare.rentDays>0||stallion.rentDays>0) return {ok:false,why:'A horse is out on rent.'};
  return {ok:true};
}
function breedFoal(mare,stallion,rng){
  rng=rng||Math.random;
  const samebreed = mare.breed===stallion.breed;
  const mb=breedDef(mare.breed), sb=breedDef(stallion.breed);
  // dominant breed = rarer parent (grade horses take the flashier line)
  const dom = (sb.rarity>mb.rarity)?sb:mb;
  const breed = samebreed?mb.id:dom.id;
  const mix=(a,b,amt)=> clamp(Math.round((a+b)/2 + (rng()*2-1)*amt),8,100);
  const sex = rng()<0.5?'mare':'stallion';
  const gen = Math.max(mare.generation||1,stallion.generation||1)+1;
  // coat genetics: child inherits one allele per locus from each parent
  const genes = crossGenes(mare.genes||seedGenes(mare.breed,rng), stallion.genes||seedGenes(stallion.breed,rng), rng);
  const coat = phenotype(genes);
  // inbreeding: shared recent ancestors hurt the foal (rewards diverse lines)
  const inbred = relatedness(mare,stallion) > 0;
  const penalty = inbred?0.94:1;
  // trait inheritance: take a parent's trait, with a small chance of a fresh quirk
  const parentTrait = (rng()<0.5?mare.trait:stallion.trait) || pickTrait(rng);
  const foalTrait = rng()<0.12 ? pickTrait(rng) : parentTrait;
  const foal = mkHorse({
    breed, sex, rng, age:0, genes, coat, trait:foalTrait,
    speed:Math.round(mix(mare.speed,stallion.speed, samebreed?9:13)*penalty),
    stamina:Math.round(mix(mare.stamina,stallion.stamina, samebreed?9:13)*penalty),
    temperament:Math.round(mix(mare.temperament,stallion.temperament, samebreed?9:13)*penalty),
    health:inbred?86:96, happy:92, purebred:samebreed, generation:gen, inbred,
    ped:{ dam:{name:mare.name,breed:mare.breed,id:mare.id,ped:mare.ped||null},
          sire:{name:stallion.name,breed:stallion.breed,id:stallion.id,ped:stallion.ped||null} },
  });
  // rare trait mutation: champion bloodline (stat boost, separate from coat)
  if(rng()<0.05){
    foal.rare='Champion Bloodline';
    foal.speed=clamp(foal.speed+8,8,100); foal.stamina=clamp(foal.stamina+8,8,100);
  }
  return foal;
}

// ---------- Market stock ----------
function marketPickBreed(game,rng){
  // higher reputation unlocks rarer stock
  const maxR = game.rep>2600?5 : game.rep>1300?4 : game.rep>500?3 : game.rep>120?2 : 2;
  const pool = BREEDS.filter(b=>b.rarity<=maxR);
  // weight toward commons
  const weighted=[]; pool.forEach(b=>{ const w=Math.max(1,6-b.rarity*1.2); for(let i=0;i<w;i++) weighted.push(b); });
  return weighted[Math.floor(rng()*weighted.length)];
}
function makeMarketHorse(game,rng,forceRare){
  rng=rng||Math.random;
  let b;
  if(forceRare){ const rare=BREEDS.filter(x=>x.rarity>=4); b=rare[Math.floor(rng()*rare.length)]; }
  else b=marketPickBreed(game,rng);
  const sex = rng()<0.5?'mare':'stallion';
  const age = 8+Math.floor(rng()*20); // sold as young adults
  return mkHorse({breed:b.id,sex,age,rng,purebred:true,generation:1});
}
function restockMarket(game,rng,opts){
  rng=rng||Math.random; opts=opts||{};
  const n=4+Math.floor(rng()*2)+seasonMarketBonus(game.day)+(opts.bonus||0); // autumn + festivals bring extra stock
  game.market=[]; for(let i=0;i<n;i++) game.market.push(makeMarketHorse(game,rng, opts.rareBoost&&i===0)); // festival: one guaranteed fine horse
  game.marketDay=game.day;
}

function weekdayIndex(day){ return ((Math.floor(day)-1)%7+7)%7; } // day 1 = Monday

// Each weekday has a theme, which show disciplines run, and economic modifiers.

function isShowDay(day){ return showsToday(day).length>0; }
function disciplineOpenToday(day,discId){ return showsToday(day).indexOf(discId)>=0; }

function isCareDay(day){ return !!scheduleFor(day).care; }

function nextShowDay(day){ for(let i=1;i<=7;i++){ if(isShowDay(day+i)) return {inDays:i, wd:weekdayIndex(day+i)}; } return null; }

// ---------- Seasons (4 seasons of 2 weeks each, layered over the days) ----------

  {id:'spring', name:'Spring', emoji:'🌸', wx:[40,70,95], breedFeeMul:0.70, gestationAdj:-1, showPrizeMul:1.00, canteenMul:1.00, feedExtra:0, hayMul:1.00, marketBonus:0, tint:'#7ec86033', note:'Foaling season — breeding is cheaper and foals come quicker.'},
  {id:'summer', name:'Summer', emoji:'🌞', wx:[66,88,99], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.15, canteenMul:1.12, feedExtra:0, hayMul:1.00, marketBonus:0, tint:'#ffd35a22', note:'Peak show season — prizes are bigger and the canteen is busy.'},
  {id:'autumn', name:'Autumn', emoji:'🍂', wx:[40,73,95], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.00, canteenMul:1.00, feedExtra:0, hayMul:0.70, marketBonus:2, tint:'#e08a3a2e', note:'Harvest — hay is cheap and the market is well stocked.'},
  {id:'winter', name:'Winter', emoji:'❄️', wx:[20,50,65], breedFeeMul:1.00, gestationAdj:0,  showPrizeMul:1.00, canteenMul:0.90, feedExtra:1, hayMul:1.00, marketBonus:0, tint:'#aad6f028', note:'Cold snaps — horses eat more and fewer visitors brave the chill.'},
];
function seasonOf(day){ return SEASONS[Math.floor((Math.floor(day)-1)/SEASON_LEN)%4]; }
function yearOf(day){ return Math.floor((Math.floor(day)-1)/(SEASON_LEN*4))+1; }
function seasonDay(day){ return ((Math.floor(day)-1)%SEASON_LEN)+1; } // 1..SEASON_LEN
function seasonBreedFeeMul(day){ return seasonOf(day).breedFeeMul; }
function seasonGestationAdj(day){ return seasonOf(day).gestationAdj; }
function seasonShowPrizeMul(day){ return seasonOf(day).showPrizeMul; }
function seasonCanteenMul(day){ return seasonOf(day).canteenMul; }
function seasonHayMul(day){ return seasonOf(day).hayMul; }
function seasonMarketBonus(day){ return seasonOf(day).marketBonus; }

// ---------- Seasonal festivals (one per season, deterministic & forecastable) ----------
const FESTIVALS=[
  {season:'spring', sday:7, id:'foalfest',  name:'Spring Foal Festival', emoji:'🌷',
   note:'Breeders gather from far and wide — breeding fees are slashed and spirits soar.',
   mods:{breedFeeMul:0.5, repBoon:15, happyBoon:8}},
  {season:'summer', sday:7, id:'grandfair', name:'Summer Grand Fair', emoji:'🎪',
   note:'The biggest show of the year — every discipline runs and prizes are boosted.',
   mods:{showPrizeMul:1.35, allShows:true, repBoon:20}},
  {season:'autumn', sday:7, id:'harvest',   name:'Autumn Harvest Market', emoji:'🧺',
   note:'A bumper harvest — hay is dirt cheap and fine horses fill the market.',
   mods:{hayMul:0.5, marketRareBoost:true, marketBonus:3, hayGift:40}},
  {season:'winter', sday:7, id:'solstice',  name:'Winter Solstice', emoji:'🎄',
   note:'Warm cheer at the canteen — visitors flock in and gifts abound.',
   mods:{canteenMul:1.6, repBoon:18, hayGift:30}},
];
function festivalDef(id){ return FESTIVALS.find(f=>f.id===id)||null; }
function festivalOn(day){ const s=seasonOf(day), sd=seasonDay(day); return FESTIVALS.find(f=>f.season===s.id && f.sday===sd)||null; }
function isFestival(day){ return !!festivalOn(day); }
function festivalMod(day,key,dflt){ const f=festivalOn(day); const d=(dflt!=null?dflt:1); return (f&&f.mods&&f.mods[key]!=null)?f.mods[key]:d; }
function nextFestival(day){ for(let i=1;i<=SEASON_LEN*4;i++){ const f=festivalOn(day+i); if(f) return {inDays:i, fest:f, day:day+i}; } return null; }
function upcomingFestivals(day,within){ within=within||7; const out=[]; for(let i=0;i<=within;i++){ const f=festivalOn(day+i); if(f) out.push({inDays:i, fest:f, day:day+i}); } return out; }

// ---------- Auction house (one auction per season on season-day 10) ----------
function isAuctionDay(day){ return seasonDay(day)===10; }
function nextAuction(day){ for(let i=1;i<=SEASON_LEN*4;i++){ if(isAuctionDay(day+i)) return {inDays:i, day:day+i}; } return null; }
// a standout lot — rarer/higher-quality than normal market stock, sometimes a proven champion or rare coat
function makeAuctionLot(game,rng){
  rng=rng||Math.random;
  const maxR = (game.rep||0)>2600?5 : (game.rep||0)>1000?4 : 3;
  const pool=BREEDS.filter(b=>b.rarity>=3 && b.rarity<=maxR); const b=pool[Math.floor(rng()*pool.length)]||BREEDS.filter(x=>x.rarity>=3)[0];
  const sex=rng()<0.5?'mare':'stallion', age=10+Math.floor(rng()*14);
  const strong=base=>clamp(Math.round(base+6+rng()*10),8,100);
  const h=mkHorse({breed:b.id,sex,age,rng,purebred:true,generation:1,
    speed:strong(b.speed),stamina:strong(b.stamina),temperament:strong(b.temperament),health:98,happy:95});
  if(rng()<0.30){ h.coat={name:'Cremello',tier:2}; h.color='Cremello'; } // a flashy rare coat
  if(rng()<0.35){ h.wins=1+Math.floor(rng()*3); }                        // sometimes a proven winner
  const v=valueOf(h);
  const minInc=Math.max(20,Math.round(v*0.05));
  return { horse:h, value:v, minInc, start:Math.round(v*0.55), high:Math.round(v*0.55),
    bidder:'house', aiMax:Math.round(v*(0.95+rng()*0.45)) };
}
function makeAuctionLots(game,rng){ rng=rng||Math.random; const n=1+Math.floor(rng()*3); const out=[]; for(let i=0;i<n;i++) out.push(makeAuctionLot(game,rng)); return out; }
// after the player bids, the AI counter-bids one increment (never above its hidden ceiling), or drops out (null)
function aiCounter(lot,rng){ rng=rng||Math.random; if(!lot||lot.high>=lot.aiMax) return null; const next=lot.high+lot.minInc; if(next>lot.aiMax) return null; return next; }
// whoever holds the top bid when the hammer falls wins
function resolveAuction(lot){ return { winner:(lot&&lot.bidder==='you')?'you':'ai', price:lot?lot.high:0 }; }
// what an AI buyer pays when you consign your own horse — a chance above market for a great horse
function consignValue(h,game,rng){ rng=rng||Math.random; const v=valueOf(h);
  let f=0.9+rng()*0.4; if((h.wins||0)>=3) f+=0.12; if((coatOf(h).tier||0)>=2) f+=0.1; return Math.max(50,Math.round(v*f)); }

// ---------- Weather (deterministic per day, biased by season) ----------
const WEATHER=[
  {id:'sunny', name:'Sunny',  emoji:'☀️', canteen:1.12, feedExtra:0},
  {id:'cloudy',name:'Cloudy', emoji:'☁️', canteen:1.00, feedExtra:0},
  {id:'rain',  name:'Rainy',  emoji:'🌧️', canteen:0.85, feedExtra:0},
  {id:'snow',  name:'Snowy',  emoji:'❄️', canteen:0.80, feedExtra:1},
];
function weatherDef(id){ return WEATHER.find(w=>w.id===id)||WEATHER[1]; }
function hashDay(day){ let x=(Math.floor(day)*2654435761)>>>0; x^=x>>>15; x=Math.imul(x,2246822519)>>>0; x^=x>>>13; return x>>>0; }
function weatherFor(day){ const c=seasonOf(day).wx; const r=hashDay(day)%100; return r<c[0]?WEATHER[0] : r<c[1]?WEATHER[1] : r<c[2]?WEATHER[2] : WEATHER[3]; }
function canteenWeatherMult(day){ return weatherFor(day).canteen; }
function feedExtraFor(day){ return weatherFor(day).feedExtra + seasonOf(day).feedExtra; } // cold weather & winter both add hay

const EVENTS=[
  {id:'buyer', weight:3, min:1},
  {id:'hay',   weight:2, min:3},
  {id:'show',  weight:2, min:2},
  {id:'vet',   weight:2, min:2},
  {id:'gift',  weight:1, min:0},
];

// ---------- Fresh game ----------
function freshGame(){
  _idc=1;
  const g={
    v:1, money:1500, feed:30, rep:0, day:1,
    stables:[{id:'st1',name:'Old Barn',level:1,baseStalls:STARTER_STALLS}],
    horses:[], boarders:0, market:[], marketDay:1,
    canteen:{level:0}, teachers:[], teacherMarket:[], teacherDay:1,
    log:[], stats:{born:0,sold:0,bought:0,rented:0,days:0,bestSale:0,showWins:0,maxGen:1,trained:0,bestTierWin:0,lessons:0,studIncome:0,festivals:0,goldEarned:0,bestOVR:0,disciplinesWon:{},auctionsWon:0,consigned:0},
    trophies:[], hallOfFame:[], prestige:0, achievements:[], goalIdx:0, seenIntro:false, tut:{step:0,done:false}, audio:{on:false,vol:0.6},
    decor:normDecor(null), lastRoutineDay:0,
  };
  // start with one mare + one stallion so the player can breed immediately
  g.horses.push(mkHorse({breed:'shetland',sex:'mare',age:14,name:'Daisy',stable:0,rng:seededOnce(11)}));
  g.horses.push(mkHorse({breed:'mustang',sex:'stallion',age:16,name:'Bandit',stable:0,rng:seededOnce(29)}));
  restockMarket(g, seededOnce(7));
  restockTeachers(g, seededOnce(13));
  return g;
}
// tiny deterministic rng so a fresh game is identical every load (nice for tutorial + tests)
function seededOnce(seed){ let s=seed>>>0; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

// ---------- Daily simulation ----------
function advanceDay(game,rng){
  rng=rng||Math.random;
  const money0=game.money; // for lifetime gold-earned tracking
  game.day++; game.stats.days++;
  const notes=[];

  // feed consumption
  let need=0; for(const h of game.horses) need+=feedPerDay(h);
  need += game.boarders*2; // boarders eat too (you supply the hay)
  need += (game.horses.length+game.boarders)*feedExtraFor(game.day); // cold weather = extra hay
  if(game.feed>=need){
    game.feed-=need;
    for(const h of game.horses){ h.happy=clamp(h.happy+3,0,100); if(h.happy>70) h.health=clamp(h.health+2,0,100); }
  } else {
    game.feed=0;
    for(const h of game.horses){ h.happy=clamp(h.happy-14,0,100); h.health=clamp(h.health-6,0,100); }
    notes.push({t:'bad',m:'🌾 Out of feed! Your horses are hungry.'});
  }

  // age + growth + pregnancy + rent
  const born=[];
  for(const h of game.horses){
    h.age++; h.trains=0; // fresh training energy each day
    // daily care needs decay; neglect drags mood/health, a pampered horse gets a small lift
    decayNeeds(game,h);
    { const cs=careScore(h);
      if(cs<35){ h.happy=clamp(h.happy-5,0,100); h.health=clamp(h.health-2,0,100); }
      else if(cs>=80){ h.happy=clamp(h.happy+2,0,100); } }
    if(h.rentDays>0){ h.rentDays--; if(h.rentDays===0){ h.happy=clamp(h.happy-6,0,100);} }
    if(h.pregnant){
      h.gestation--;
      if(h.gestation<=0){
        h.pregnant=false;
        const sire = h._sire || {breed:h.sireBreed||h.breed,speed:h._sireSpeed||h.speed,stamina:h._sireStam||h.stamina,temperament:h._sireTemp||h.temperament,generation:h._sireGen||1,sex:'stallion',name:'Unknown Sire',genes:h.genes,ped:null};
        const foal=breedFoal(h, sire, rng);
        foal.stable=h.stable;
        born.push(foal);
      }
    }
  }
  // place newborns if room, else auto-sell
  for(const f of born){
    game.stats.maxGen=Math.max(game.stats.maxGen||1, f.generation);
    if(freeStalls(game)>0){ game.horses.push(f); game.stats.born++;
      notes.push({t:'good',m:'🐣 A '+breedDef(f.breed).name+' foal was born: '+f.name+'!'});
    } else {
      const q=sellQuote(f); game.money+=q; game.rep+=2;
      notes.push({t:'info',m:'🐣 '+f.name+' was born but the stalls are full — sold for 🪙'+q+'.'});
    }
  }

  // peaceful passing of the very old — long warning first (elderly from OLD_AGE), then a gentle end
  const gone=game.horses.filter(h=>(h.age||0)>=LIFESPAN && h.rentDays===0 && !h.pregnant && rng()<0.10);
  for(const h of gone){
    const rec=hofRecord(h,'passed',game.day);
    game.horses=game.horses.filter(x=>x.id!==h.id);
    inductHof(game,rec);
    notes.push({t:'info',m:'🕊️ '+h.name+' passed peacefully after a long life and enters the Hall of Fame.'});
  }

  // a gentle, once-a-day nudge if some horses are being neglected (never spammy)
  { const neg=game.horses.filter(h=>careScore(h)<34);
    if(neg.length) notes.push({t:'info',m:'🧡 '+(neg.length===1?neg[0].name+' needs':neg.length+' horses need')+' some care — visit the 🧡 Care panel or run the daily routine.'}); }

  // boarding income
  if(game.boarders>0){ const inc=game.boarders*boardRatePerStall(game); game.money+=inc; }

  // rent income (paid daily while out)
  for(const h of game.horses){ if(h.rentDays>0){ game.money+=h.rentRate; } }

  // canteen income + riding-school net (lesson fees minus teacher salaries)
  // — both get a weekday boost on busy days (e.g. Family Sunday).
  if(canteenLevel(game)>0) game.money+=Math.round(canteenIncome(game)*canteenDayMult(game.day)*canteenWeatherMult(game.day)*seasonCanteenMul(game.day)*festivalMod(game.day,'canteenMul',1));
  if(teacherCount(game)>0){
    const served=lessonsPerDay(game);
    game.money += Math.round(schoolIncome(game)*lessonDayMult(game.day)) - teacherSalaries(game);
    game.stats.lessons=(game.stats.lessons||0)+served;
    game.rep += Math.min(3, Math.floor(served/3)); // a busy school builds reputation
  }
  // stud fees — visiting mares pay to breed with your at-stud stallions (no foals in your stalls)
  { const si=studIncome(game); if(si>0){ game.money+=si; game.stats.studIncome=(game.stats.studIncome||0)+si; } }

  // Market Day (weekly): fresh horses & teacher applicants arrive
  if(isMarketDay(game.day)){ restockMarket(game,rng); restockTeachers(game,rng);
    notes.push({t:'info',m:'🛒 Market Day! Fresh horses and teachers have arrived.'}); }

  // seasonal festival! (deterministic, pre-announced)
  const fest=festivalOn(game.day);
  if(fest){
    const md=fest.mods||{};
    if(md.hayGift) game.feed+=md.hayGift;
    if(md.repBoon) game.rep+=md.repBoon;
    if(md.happyBoon) for(const h of game.horses) h.happy=clamp(h.happy+md.happyBoon,0,100);
    if(md.marketRareBoost) restockMarket(game,rng,{rareBoost:true,bonus:md.marketBonus||0});
    game.stats.festivals=(game.stats.festivals||0)+1;
  } else if(festivalOn(game.day+1)){
    const f2=festivalOn(game.day+1); notes.push({t:'info',m:f2.emoji+' '+f2.name+' is tomorrow — get ready!'});
  }

  // random event (~18% per day once past day 2) — festivals take the spotlight instead
  let event=null;
  if(fest) event={id:'festival', fest};
  else if(game.day>2 && rng()<0.18) event=rollEvent(game,rng);

  // lifetime stats: gross gold earned overnight + best overall horse ever
  if(game.money>money0) game.stats.goldEarned=(game.stats.goldEarned||0)+(game.money-money0);
  for(const h of game.horses) game.stats.bestOVR=Math.max(game.stats.bestOVR||0, overall(h));

  return {notes,event,born};
}

function rollEvent(game,rng){
  const care=isCareDay(game.day), showDay=isShowDay(game.day);
  // 'show' invitations only turn up on show days; vet visits cluster on Vet & Farrier day
  const pool=EVENTS.filter(e=>game.day>=e.min && (e.id!=='show'||showDay));
  const weighted=[]; pool.forEach(e=>{ let w=e.weight; if(e.id==='vet'&&care) w+=3; if(e.id==='show') w+=2; for(let i=0;i<w;i++) weighted.push(e); });
  if(!weighted.length) return null;
  const e=weighted[Math.floor(rng()*weighted.length)];
  if(e.id==='buyer'){
    const owned=game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!h.pregnant);
    if(!owned.length) return null;
    const h=owned[Math.floor(rng()*owned.length)];
    const offer=Math.round(sellQuote(h)*(1.3+rng()*0.5));
    return {id:'buyer',title:'💰 Premium Buyer',horse:h.id,offer,
      msg:'A wealthy buyer fell in love with <b>'+h.name+'</b> ('+breedDef(h.breed).name+') and offers <b>🪙'+offer+'</b> — well above market. Sell?'};
  }
  if(e.id==='hay'){ const up=rng()<0.5; return {id:'hay',up,
    msg: up?'☀️ A dry spell hit — hay prices are high this week.':'🌧️ A bumper harvest — hay is cheap this week!'}; }
  if(e.id==='show'){
    const owned=game.horses.filter(h=>isAdult(h)&&h.rentDays===0);
    if(!owned.length) return null;
    return {id:'show',msg:'🏆 The county horse show is on! Enter a horse to compete for prize money and reputation.'};
  }
  if(e.id==='vet'){
    const sick=game.horses.filter(h=>h.health<95);
    if(!sick.length) return null;
    const h=sick[Math.floor(rng()*sick.length)];
    const bill=Math.round(40+rng()*120);
    return {id:'vet',horse:h.id,bill,msg:'🩺 <b>'+h.name+'</b> came down with a mild colic. The vet can treat it for <b>🪙'+bill+'</b>. Pay up?'};
  }
  if(e.id==='gift'){ const amt=30+Math.floor(rng()*8)*10; return {id:'gift',amt,msg:'🎁 A neighbour thanks you for your help and drops off <b>'+amt+' bales of hay</b>!'}; }
  return null;
}

// show competition scoring (legacy helper, kept for compatibility)
function showScore(h,rng){ return statAvg(h)*(0.85+ (rng?rng():Math.random())*0.4) + h.health*0.2; }

// ---------- Shows & Competitions ----------
const DISCIPLINES=[
  {id:'race',      name:'Racing',     emoji:'🏇', w:{speed:0.70,stamina:0.25,temperament:0.05}, coat:false, desc:'Raw speed with a burst of stamina.'},
  {id:'endurance', name:'Endurance',  emoji:'🥾', w:{speed:0.20,stamina:0.70,temperament:0.10}, coat:false, desc:'Long-distance stamina and steadiness.'},
  {id:'dressage',  name:'Dressage',   emoji:'🎩', w:{speed:0.10,stamina:0.35,temperament:0.55}, coat:false, desc:'Grace, obedience and temperament.'},
  {id:'halter',    name:'Showing',    emoji:'✨', w:{speed:0.10,stamina:0.20,temperament:0.40}, coat:true,  desc:'Conformation & looks — coat and breed matter.'},
  {id:'jump',      name:'Show-Jumping',emoji:'🚧', w:{speed:0.40,stamina:0.25,temperament:0.35}, coat:false, desc:'Athletic power & a cool head over the fences.'},
];
function disciplineDef(id){ return DISCIPLINES.find(d=>d.id===id)||null; }
// tiers gated by reputation; prize/repGain indexed by place (1..3, 4=also-ran)
const COMP_TIERS=[
  {id:1, name:'Local Fair',            rep:0,    fee:40,  prize:[0,300,150,60,0],     repGain:[0,20,12,6,3],  fieldAvg:48, fieldSpread:16, rest:2},
  {id:2, name:'County Show',           rep:150,  fee:90,  prize:[0,700,350,140,0],    repGain:[0,32,19,9,4],  fieldAvg:60, fieldSpread:16, rest:3},
  {id:3, name:'Regional Championship', rep:800,  fee:200, prize:[0,1600,800,320,0],   repGain:[0,58,34,17,6], fieldAvg:73, fieldSpread:15, rest:3},
  {id:4, name:'National Grand Prix',   rep:2500, fee:450, prize:[0,4000,2000,800,0],  repGain:[0,120,66,33,10],fieldAvg:85, fieldSpread:13, rest:4},
];
function tierDef(id){ return COMP_TIERS.find(t=>t.id===id)||null; }
function tierUnlocked(game,tier){ return game.rep>=tier.rep; }
function highestTier(game){ let t=COMP_TIERS[0]; for(const x of COMP_TIERS){ if(tierUnlocked(game,x)) t=x; } return t; }
function disciplineScore(h,disc){
  const w=disc.w;
  let s=h.speed*w.speed + h.stamina*w.stamina + h.temperament*w.temperament;
  if(disc.coat){ s += (coatOf(h).tier||0)*7 + ((breedDef(h.breed)||{rarity:1}).rarity)*3; } // looks count in Showing
  const form=(0.6+0.4*(h.health/100))*(0.7+0.3*(h.happy/100));
  return s*form*careBonusMult(h)*traitMult(h,'show')*traitMult(h,'disc',disc.id)*agePerformanceMult(h); // care, personality & age shape aptitude
}
function canEnterShow(game,h){
  if(!isAdult(h)) return {ok:false,why:'Only adult horses can compete.'};
  if(tooOldToCompete(h)) return {ok:false,why:'Past competing age — time for a proud retirement.'};
  if(h.atStud) return {ok:false,why:'Standing at stud — retire from stud to compete.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'In foal — resting.'};
  if((h.compCd||0)>game.day) return {ok:false,why:'Resting until day '+h.compCd+'.'};
  return {ok:true};
}
function runCompetition(h,disc,tier,rng){
  rng=rng||Math.random;
  const my=disciplineScore(h,disc)*(0.9+0.2*rng()) + (h.wins||0)*1.5; // experience edge
  const N=5; let better=0;
  for(let i=0;i<N;i++){ const opp=tier.fieldAvg + (rng()*2-1)*tier.fieldSpread; if(opp>my) better++; }
  const place = better===0?1 : better===1?2 : better===2?3 : 4;
  return { place, score:Math.round(my), prize:tier.prize[place]||0, rep:(tier.repGain[place]!=null?tier.repGain[place]:tier.repGain[4]) };
}
// apply a competition result to game+horse (mutates), returns the result
function applyCompetition(game,h,disc,tier,rng){
  const res=runCompetition(h,disc,tier,rng);
  res.prize=Math.round(res.prize*seasonShowPrizeMul(game.day)*festivalMod(game.day,'showPrizeMul',1)); // summer + festivals pay more
  game.money += res.prize; game.rep += res.rep; game.stats.goldEarned=(game.stats.goldEarned||0)+res.prize;
  h.entries=(h.entries||0)+1; h.compCd=game.day+tier.rest;
  h.happy=clamp(h.happy-8,0,100); h.health=clamp(h.health-4,0,100); // fatigue
  if(res.place===1){ h.wins=(h.wins||0)+1; game.stats.showWins=(game.stats.showWins||0)+1; game.stats.bestTierWin=Math.max(game.stats.bestTierWin||0,tier.id);
    game.stats.disciplinesWon=game.stats.disciplinesWon||{}; game.stats.disciplinesWon[disc.id]=true; }
  if(res.place<=3){ h.podiums=(h.podiums||0)+1;
    game.trophies=game.trophies||[];
    game.trophies.unshift({horse:h.name,breed:h.breed,disc:disc.id,tier:tier.id,place:res.place,day:game.day});
    if(game.trophies.length>60) game.trophies.length=60;
  }
  return res;
}

// ---------- The Canteen (a little bar where visitors relax) ----------
const CANTEEN_MAX=5;
function canteenLevel(game){ return (game.canteen&&game.canteen.level)||0; }
function canteenCost(game){ const lv=canteenLevel(game); return lv>=CANTEEN_MAX?0:Math.round(700*Math.pow(1.75,lv)); } // build lv0->1, then upgrades
function canteenIncome(game){ // visitors scale with reputation (capped), herd size and lessons buzz
  const lv=canteenLevel(game); if(!lv) return 0;
  const visitors = 6 + Math.min(60,(game.rep||0)*0.015) + game.horses.length*1.5 + teacherCount(game)*4; // rep term capped → plateaus
  return Math.round((8 + lv*6) + visitors*lv*0.85);
}

// ---------- Riding School — hire teachers who give lessons ----------
const TEACHER_NAMES=['Margot','Sofie','Hans','Lena','Pieter','Anke','Bram','Nadia','Tom','Elke','Joris','Fien','Ruben','Saar'];
const TEACHER_TITLES=['Riding Instructor','Dressage Coach','Show Trainer','Vaulting Teacher','Pony Club Lead','Eventing Mentor'];
function mkTeacher(game,rng){
  rng=rng||Math.random;
  const skill=1+Math.floor(rng()*5); // 1..5 stars
  const disc=DISCIPLINES[Math.floor(rng()*DISCIPLINES.length)].id;
  return { id:'t'+(_idc++), name:TEACHER_NAMES[Math.floor(rng()*TEACHER_NAMES.length)],
    title:TEACHER_TITLES[Math.floor(rng()*TEACHER_TITLES.length)],
    skill, disc, capacity:2+skill, salary:18+skill*14, hireFee:(18+skill*14)*3 };
}
function restockTeachers(game,rng){
  rng=rng||Math.random; const n=3;
  game.teacherMarket=[]; for(let i=0;i<n;i++) game.teacherMarket.push(mkTeacher(game,rng));
  game.teacherDay=game.day;
}
function teacherCount(game){ return (game.teachers||[]).length; }
function schoolHorses(game){ return game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!h.pregnant).length; }
function teacherCapacityTotal(game){ return (game.teachers||[]).reduce((n,t)=>n+t.capacity,0); }
function lessonsPerDay(game){ return Math.min(teacherCapacityTotal(game), schoolHorses(game)*3); }
function lessonFee(game){ return 11 + Math.min(30, Math.round((game.rep||0)*0.006)); } // rep bonus capped so lessons plateau
function schoolLessonMult(game){ // gentle horses make better lesson mounts
  const hs=game.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!h.pregnant);
  if(!hs.length) return 1;
  return hs.reduce((n,h)=>n+traitMult(h,'lesson'),0)/hs.length;
}
function schoolIncome(game){
  const cap=teacherCapacityTotal(game); if(!cap) return 0;
  const served=lessonsPerDay(game);
  const avgSkill=game.teachers.reduce((n,t)=>n+t.skill,0)/game.teachers.length;
  return Math.round(served*lessonFee(game)*(0.7+0.06*avgSkill)*schoolLessonMult(game));
}
function teacherSalaries(game){ return (game.teachers||[]).reduce((n,t)=>n+t.salary,0); }
function schoolNet(game){ return schoolIncome(game)-teacherSalaries(game); }

// ---------- Stud farm — stand a top stallion at public stud for recurring income ----------
function canStand(h){
  if(!h||h.sex!=='stallion') return {ok:false,why:'Only stallions can stand at stud.'};
  if(!isAdult(h)) return {ok:false,why:'Must be a grown stallion.'};
  if(tooOldToBreed(h)) return {ok:false,why:'Too old to stand at stud.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  return {ok:true};
}
function studFee(game,h){ // what one visiting mare pays — scales with quality & your reputation (softened)
  let fee = valueOf(h)*0.04 + (h.wins||0)*35 + (coatOf(h).tier||0)*25 + ((h.generation||1)-1)*12;
  fee *= (1 + Math.min(0.4, (game.rep||0)*0.0002)); // rep premium capped at +40%
  return Math.max(20, Math.round(fee));
}
function studDemand(game,h){ // visiting mares per day (better stallion + reputation + spring → more)
  let d = 0.35 + (h.wins||0)*0.10 + Math.min(1.5,(game.rep||0)*0.0003) + (coatOf(h).tier||0)*0.15;
  d *= (seasonOf(game.day).id==='spring'?1.4:1.0); // spring is the breeding season
  return clamp(d,0,2.0); // fewer mares overall — a passive supplement, not a jackpot
}
function studIncomeFor(game,h){ return Math.round(studFee(game,h)*studDemand(game,h)); }
function studStallions(game){ return (game.horses||[]).filter(h=>h.atStud && canStand(h).ok); }
const STUD_STACK_W=[1,0.6,0.4,0.3,0.25]; // limited visiting mares → extra stallions earn less
function studIncome(game){
  const vals=studStallions(game).map(h=>studIncomeFor(game,h)).sort((a,b)=>b-a);
  return vals.reduce((n,v,i)=>n+Math.round(v*(STUD_STACK_W[i]!=null?STUD_STACK_W[i]:0.2)),0);
}

// ---------- Retirement & Hall of Fame ----------
function canRetire(h){
  if(!isAdult(h)) return {ok:false,why:'Only grown horses can retire.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'Wait until after foaling.'};
  return {ok:true};
}
function hofRecord(h,reason,day){
  const b=breedDef(h.breed)||BREEDS[0], ct=coatOf(h);
  return { id:h.id, name:h.name, breed:h.breed, breedName:b.name, coat:ct.name, coatTier:ct.tier||0,
    sex:h.sex, trait:h.trait||null, speed:Math.round(h.speed), stamina:Math.round(h.stamina), temperament:Math.round(h.temperament),
    overall:overall(h), wins:h.wins||0, podiums:h.podiums||0, generation:h.generation||1, purebred:!!h.purebred,
    rare:h.rare||null, age:h.age||0, reason:reason||'retired', day:day||0 };
}
function prestigeOf(rec){ return Math.round((rec.wins||0)*10 + (rec.podiums||0)*3 + (rec.overall||0)*0.3 + (rec.coatTier||0)*8 + ((rec.generation||1)-1)*4 + (rec.rare?15:0)); }
function legacyLine(rec,stable){
  const home=stable||'Skyhorse Stables';
  const bits=[];
  if(rec.wins>=5) bits.push('a legendary champion with '+rec.wins+' victories');
  else if(rec.wins>=3) bits.push('a celebrated champion ('+rec.wins+' wins)');
  else if(rec.wins>0) bits.push(rec.wins+'-time show winner');
  if((rec.coatTier||0)>=2) bits.push('bearer of a rare '+rec.coat+' coat');
  if((rec.generation||1)>=4) bits.push('crown of a '+rec.generation+'-generation bloodline');
  if(!bits.length) bits.push('a beloved '+rec.breedName+' of '+home);
  return (rec.reason==='passed'?'Passed peacefully at':'Retired at')+' age '+rec.age+' — '+bits.join(', ')+'.';
}
function isHofChampion(rec){ return (rec.wins||0)>=3 || (rec.coatTier||0)>=2 || (rec.generation||1)>=4; }
function inductHof(game,rec){
  game.hallOfFame=game.hallOfFame||[]; game.hallOfFame.unshift(rec);
  const p=prestigeOf(rec); game.prestige=(game.prestige||0)+p;
  game.rep += Math.round(p*0.5); // honouring a great horse lifts the estate's standing
  return p;
}
function retireHorse(game,h,day){
  const rec=hofRecord(h,'retired',day!=null?day:game.day);
  game.horses=game.horses.filter(x=>x.id!==h.id);
  return { rec, prestige:inductHof(game,rec) };
}

// ---------- Training (raise stats toward each horse's breed potential) ----------
const TRAIN_STATS=['speed','stamina','temperament'];
const TRAIN_LABEL={speed:'Speed',stamina:'Stamina',temperament:'Temperament'};
const TRAIN_PER_DAY=3;
function statCap(h,stat){ const b=breedDef(h.breed)||BREEDS[0]; return clamp(Math.round(b[stat]+18),40,100); }
function trainCost(h,stat){ const b=breedDef(h.breed)||BREEDS[0]; return Math.round(50*(1+h[stat]*0.03)*RARITY_MULT[b.rarity]); }
function trainGain(h,stat){ const room=statCap(h,stat)-h[stat]; return room<=0?0:Math.max(1,Math.round(room*0.28*traitMult(h,'train'))); }
function canTrain(h,stat){
  if(!isAdult(h)) return {ok:false,why:'Only adults can train.'};
  if(h.rentDays>0) return {ok:false,why:'Out on rent.'};
  if(h.pregnant) return {ok:false,why:'In foal — no training.'};
  if((h.trains||0)>=TRAIN_PER_DAY) return {ok:false,why:'Rested out — try tomorrow.'};
  if(trainGain(h,stat)<=0) return {ok:false,why:'At breed potential.'};
  return {ok:true};
}
function applyTrain(h,stat){ const g=trainGain(h,stat); h[stat]=clamp(h[stat]+g,8,100); h.trains=(h.trains||0)+1; h.happy=clamp(h.happy-4,0,100); return g; }

function currentGoal(g){ return (g.goalIdx<GOALS.length)?GOALS[g.goalIdx]:null; }
function checkGoals(g){
  const done=[];
  while(g.goalIdx<GOALS.length && GOALS[g.goalIdx].done(g)){
    const goal=GOALS[g.goalIdx], r=goal.reward||{};
    if(r.money) g.money+=r.money; if(r.feed) g.feed+=r.feed; if(r.rep) g.rep+=r.rep;
    done.push(goal); g.goalIdx++;
  }
  return done;
}

let AC=null, masterGain=null, ambGain=null, ambTimer=null, lastSfx=0;
function audioAvailable(){ return typeof window!=='undefined' && (window.AudioContext||window.webkitAudioContext); }
function ensureAudio(){ // must be called from a user gesture
  if(AC) return true;
  if(!audioAvailable()) return false;
  try{
    const Ctor=window.AudioContext||window.webkitAudioContext; AC=new Ctor();
    masterGain=AC.createGain(); masterGain.gain.value=(G.audio&&G.audio.vol!=null?G.audio.vol:0.6)*0.5; masterGain.connect(AC.destination);
    ambGain=AC.createGain(); ambGain.gain.value=0; ambGain.connect(masterGain);
    startAmbientBed();
    return true;
  }catch(e){ AC=null; return false; }
}
function applyMasterVol(){ if(masterGain&&AC) try{ masterGain.gain.setTargetAtTime((G.audio.vol||0)*0.5, AC.currentTime, 0.05); }catch(e){} }
function playSfx(id){
  try{
    if(!G||!G.audio||!G.audio.on||!AC) return;
    const now=(typeof performance!=='undefined'&&performance.now)?performance.now():0;
    if(now-lastSfx<45) return; lastSfx=now; // throttle rapid triggers
    const def=sfxDef(id); if(!def) return;
    const t0=AC.currentTime;
    def.notes.forEach((nm,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type=def.type; o.frequency.value=noteHz(nm);
      const st=t0+i*def.step, len=def.step*1.7;
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(def.gain,st+0.008);
      g.gain.exponentialRampToValueAtTime(0.0008,st+len);
      o.connect(g); g.connect(masterGain); o.start(st); o.stop(st+len+0.02);
    });
  }catch(e){}
}
// very quiet ambient: a filtered-noise bed (louder in rain/snow) + occasional bird/cricket chirps
function startAmbientBed(){
  try{
    const buf=AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
    const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
    src.connect(lp); lp.connect(ambGain); src.start();
    scheduleChirp();
  }catch(e){}
}
function scheduleChirp(){
  if(ambTimer) return;
  const tick=()=>{
    try{
      if(G&&G.audio&&G.audio.on&&AC){
        // day → soft high bird; night → lower cricket-ish; rain hiss handled by bed gain
        const phase=((skyT/SKY_CYCLE)%1+1)%1; const night=Math.abs(phase-0.5)>0.30;
        const wx=weatherFor(G.day).id; const raining=(wx==='rain'||wx==='snow');
        // bed volume: near-silent when clear, a soft hiss in rain/snow
        if(ambGain) try{ ambGain.gain.setTargetAtTime(raining?0.05:0.012, AC.currentTime, 0.6); }catch(e){}
        if(!raining && Math.random()<0.6){ const o=AC.createOscillator(), g=AC.createGain();
          o.type='sine'; o.frequency.value=night?(280+Math.random()*80):(1400+Math.random()*700);
          const t=AC.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(night?0.03:0.05,t+0.02);
          g.gain.exponentialRampToValueAtTime(0.0006,t+ (night?0.5:0.18)); o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.6); }
      } else if(ambGain&&AC){ try{ ambGain.gain.setTargetAtTime(0, AC.currentTime, 0.3); }catch(e){} }
    }catch(e){}
    ambTimer=setTimeout(tick, 1800+Math.random()*2400);
  };
  ambTimer=setTimeout(tick, 1500);
}

// celebratory emoji burst from the scene banner (births, wins, goals)
function burst(emojis,count){
  if(typeof document==='undefined') return;
  const host=$('scene')||document.body; const rect=host.getBoundingClientRect?host.getBoundingClientRect():{left:0,top:0,width:360,height:96};
  const cx=(rect.left||0)+(rect.width||360)/2, cy=(rect.top||0)+(rect.height||96)*0.55;
  const arr=Array.from(emojis||'🎉✨'); const n=count||14;
  for(let i=0;i<n;i++){
    const p=el('div','burst',arr[i%arr.length]);
    const ang=(Math.PI* (0.15+ (i/n)*0.7)) ; const spd=60+ (i%5)*22;
    const dx=(i%2?1:-1)*Math.cos(ang)*spd*(0.6+ (i%3)*0.3);
    const dy=-(Math.sin(ang)*spd)-40;
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.setProperty('--dx',dx+'px'); p.style.setProperty('--dy',dy+'px');
    p.style.animationDelay=(i*14)+'ms';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1300);
  }
}

    generation:stal.generation, genes:stal.genes, ped:stal.ped||null };

  const warn = relatedness(mare,stal)>0 ? ' ⚠️ These horses share bloodlines — the foal may be weaker.' : '';

         (lot.bidder==='you'?'<button class="btn sm" data-close="'+i+'">🔨 Claim</button>':'<button class="btn sm ghost" data-pass="'+i+'">Pass</button>'));
      const card=horseCard(h,acts);
      const meta=el('div',''); meta.innerHTML=status; card.appendChild(meta);
      s.appendChild(card);
      const bb=card.querySelector('[data-bid]'); if(bb) bb.onclick=()=>auctionBid(i);
      const cl=card.querySelector('[data-close]'); if(cl) cl.onclick=()=>auctionClose(i);
      const ps=card.querySelector('[data-pass]'); if(ps) ps.onclick=()=>auctionPass(i);
    });
  }
  // consignment
  s.appendChild(el('h2','head','🏷️ Consign a Horse'));
  s.appendChild(el('div','sub','Send one of your horses to the auction block — buyers may pay above market for a great one (a small gamble).'));
  const mine=G.horses.filter(h=>isAdult(h)&&h.rentDays===0&&!h.pregnant&&!h.atStud);
  if(!mine.length) s.appendChild(el('div','empty','No adult horses free to consign.'));
  mine.slice().sort((a,b)=>valueOf(b)-valueOf(a)).forEach(h=>{
    const c=horseCard(h,'<button class="btn sm blue" data-consign="'+h.id+'">🔨 Consign</button>');
    c.querySelector('[data-consign]').onclick=()=>consignHorse(h);

  });
}
function auctionBid(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return;
  const bid=lot.high+lot.minInc; if(G.money<bid){ toast('You can’t afford that bid.','bad'); return; }
  lot.high=bid; lot.bidder='you'; playSfx('tap');
  // rival responds
  const counter=aiCounter(lot,Math.random);
  if(counter!=null){ lot.high=counter; lot.bidder='ai'; toast('A rival buyer bids 🪙'+fmt(counter)+'!','info'); }
  else { toast('You’re the top bidder — claim it with 🔨!','good'); }
  save(); refresh();
}
function auctionClose(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return;
  const res=resolveAuction(lot);
  if(res.winner==='you'){
    if(freeStalls(G)<=0){ toast('No free stalls — build or upgrade a stable first!','bad'); return; }
    if(G.money<lot.high){ toast('You can’t afford the winning bid.','bad'); return; }
    G.money-=lot.high; lot.won=true; lot.closed=true; lot.horse.stable=0; G.horses.push(lot.horse);
    G.stats.auctionsWon=(G.stats.auctionsWon||0)+1; G.stats.bought=(G.stats.bought||0)+1;
    coinPop(-lot.high); burst('🔨🏆✨',14); playSfx('win'); toast('🔨 Sold! '+lot.horse.name+' is yours for 🪙'+fmt(lot.high)+'.','good');
  } else { lot.closed=true; toast('Outbid — the lot went to another buyer.','info'); }
  save(); refresh();
}
function auctionPass(i){ const lot=G.auction&&G.auction.lots[i]; if(!lot||lot.won||lot.closed) return; lot.closed=true; toast('You passed on '+lot.horse.name+'.','info'); save(); refresh(); }
function consignHorse(h){
  const price=consignValue(h,G,Math.random); const over=price>valueOf(h);
  modal('<h3>🔨 Consign '+h.name+'?</h3><div class="msg">'+breedDef(h.breed).name+' · OVR '+overall(h)+'<br>The auction block’s best bid: <b class="val">🪙'+fmt(price)+'</b>'+(over?' <span style="color:var(--good)">(above market!)</span>':'')+'</div>'+
    '<div class="btnrow"><button class="btn" id="coYes">Sell for 🪙'+fmt(price)+'</button><button class="btn ghost" id="coNo">Keep</button></div>');
  $('coNo').onclick=closeModal;
  $('coYes').onclick=()=>{ G.money+=price; G.stats.bestSale=Math.max(G.stats.bestSale||0,price); G.stats.goldEarned=(G.stats.goldEarned||0)+price; G.stats.consigned=(G.stats.consigned||0)+1; G.stats.sold=(G.stats.sold||0)+1;
    G.horses=G.horses.filter(x=>x.id!==h.id); const rg=Math.round(overall(h)*0.3+(breedDef(h.breed).rarity)*4); G.rep+=rg;
    coinPop(price); closeModal(); toast('🔨 '+h.name+' sold at auction for 🪙'+fmt(price)+' (+'+rg+'⭐)','good'); refresh(); };
}

// draw the whole card on a canvas for a crisp downloadable PNG (no external assets)
function drawCardPNG(m){
  const W=640,H=900,S=2; const cv=document.createElement('canvas'); cv.width=W*S; cv.height=H*S;
  const x=cv.getContext('2d'); x.scale(S,S);
  const rr=(px,py,w,h,r)=>{ x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+w,py,px+w,py+h,r); x.arcTo(px+w,py+h,px,py+h,r); x.arcTo(px,py+h,px,py,r); x.arcTo(px,py,px+w,py,r); x.closePath(); };
  // background
  const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#243019'); bg.addColorStop(1,'#141d0c');
  x.fillStyle=bg; x.fillRect(0,0,W,H);
  // frame
  const champ=m.champion||m.legend; x.lineWidth=6; x.strokeStyle=champ?'#e0a53a':'#3a4a24'; rr(14,14,W-28,H-28,22); x.stroke();
  // header
  x.textAlign='left'; x.fillStyle='#ffd35a'; x.font='800 40px Segoe UI, system-ui, sans-serif'; x.fillText(m.name, 40, 74);
  x.fillStyle='#c3c9a6'; x.font='600 20px Segoe UI, system-ui, sans-serif'; x.fillText(m.coat+' '+m.breedName+' · '+m.rarityName, 40, 104);
  // portrait panel
  rr(40,128,W-80,300,18); const pg=x.createRadialGradient(W/2,270,20,W/2,270,260); pg.addColorStop(0,m.coatBody); pg.addColorStop(1,'#16210f'); x.fillStyle=pg; x.fill();
  drawHorseCanvas(x, W/2-150, 200, 6.6, m.coatBody, m.coatMane);
  if(champ){ x.textAlign='right'; x.font='700 22px Segoe UI'; x.fillStyle='#ffd35a'; x.fillText(m.legend?'🏛️ LEGEND':'🏆 CHAMPION', W-52, 160); x.textAlign='left'; }
  // stat bars
  let sy=470; const stats=[['SPEED',m.speed],['STAMINA',m.stamina],['TEMPERAMENT',m.temperament],['HEALTH',m.health],['SPIRIT',m.happy]];
  x.font='700 20px Segoe UI';
  stats.forEach(([lab,v])=>{ x.fillStyle='#c3c9a6'; x.textAlign='left'; x.fillText(lab,44,sy+16);
    const bx=250,bw=300; x.fillStyle='#0d130a'; rr(bx,sy,bw,16,8); x.fill();
    const col=v>=75?'#8bd36b':v>=45?'#ffd35a':'#e5624a'; x.fillStyle=col; rr(bx,sy,Math.max(10,bw*clamp(v,0,100)/100),16,8); x.fill();
    x.fillStyle='#f4efdf'; x.textAlign='right'; x.fillText(''+Math.round(v), W-44, sy+16); sy+=44; });
  // meta row
  sy+=6; x.textAlign='left'; x.font='800 26px Segoe UI'; x.fillStyle='#f4efdf';
  x.fillText('OVR '+m.overall, 44, sy); x.fillText('Gen '+m.generation, 240, sy); if(m.value) x.fillText('🪙 '+fmt(m.value), 420, sy);
  // trait + career
  sy+=44; x.font='600 20px Segoe UI'; x.fillStyle='#69c7e0';
  if(m.traitName) x.fillText(m.traitEmoji+' '+m.traitName+' · '+m.ageLabel, 44, sy); else x.fillText(m.ageLabel, 44, sy);
  sy+=32; x.fillStyle='#c3c9a6'; x.font='500 19px Segoe UI';
  x.fillText((m.wins||m.podiums)?('🥇 '+m.wins+' wins · 🏅 '+m.podiums+' podiums'):'No show record yet', 44, sy);
  if(m.dam||m.sire){ sy+=28; x.fillText('Sire '+(m.sire||'?')+' × Dam '+(m.dam||'?'), 44, sy); }
  // footer
  x.fillStyle='#0d130a'; rr(28,H-92,W-56,60,14); x.fill();
  x.fillStyle='#ffd35a'; x.font='800 22px Segoe UI'; x.textAlign='left'; x.fillText('🐴 '+m.stable, 44, H-54);
  x.fillStyle='#c3c9a6'; x.font='600 17px Segoe UI'; x.fillText('Manager '+m.manager, 44, H-34);
  x.textAlign='right'; x.fillStyle='#c3c9a6'; x.font='600 17px Segoe UI'; x.fillText(m.stamp.season+' · Year '+m.stamp.year+' · Day '+m.stamp.day, W-44, H-44);
  x.textAlign='left';
  return cv;
}
// canvas twin of horseArt() — same shapes, tinted to the coat
function drawHorseCanvas(x,ox,oy,s,body,mane){
  const P=(d)=>{ x.beginPath(); let cx=0,cy=0; d.forEach(c=>{ if(c[0]==='M'){cx=ox+c[1]*s;cy=oy+c[2]*s;x.moveTo(cx,cy);} else if(c[0]==='L'){cx=ox+c[1]*s;cy=oy+c[2]*s;x.lineTo(cx,cy);} else if(c[0]==='Q'){x.quadraticCurveTo(ox+c[1]*s,oy+c[2]*s,ox+c[3]*s,oy+c[4]*s);} }); x.closePath(); };
  x.fillStyle=mane; P([['M',7,13],['Q',1,17,3,26],['Q',6,21,9,21]]); x.fill();            // tail
  x.fillStyle=body; x.beginPath(); x.ellipse(ox+21*s,oy+18*s,13*s,8*s,0,0,Math.PI*2); x.fill(); // body
  P([['M',30,13],['L',37,4],['L',41,6],['L',35,17]]); x.fill();                              // neck
  P([['M',35,3],['L',44,6],['L',43,12],['L',34,12]]); x.fill();                              // head
  x.fillStyle=mane; P([['M',31,12],['L',37,3],['L',39,4.5],['L',34,15]]); x.fill();          // mane
  x.fillStyle=body; [13,19,25,29.5].forEach(lx=>{ x.beginPath(); x.rect(ox+lx*s,oy+23*s,3.2*s,9*s); x.fill(); }); // legs
  x.fillStyle='#140f0b'; x.beginPath(); x.arc(ox+41*s,oy+8*s,1*s,0,Math.PI*2); x.fill();      // eye
}
function downloadCanvas(cv,name){
  try{ if(cv.toBlob){ cv.toBlob(function(bl){ if(!bl){ dataUrlDownload(cv,name); return; } const u=URL.createObjectURL(bl); const a=el('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>{try{URL.revokeObjectURL(u);}catch(e){}},1500); }); }
    else dataUrlDownload(cv,name);
  }catch(e){ dataUrlDownload(cv,name); }
}
function dataUrlDownload(cv,name){ try{ const a=el('a'); a.href=cv.toDataURL('image/png'); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }catch(e){ toast('Download not supported here.','bad'); } }
function shareCard(m,fname){
  try{
    const cv=drawCardPNG(m);
    if(navigator.share && navigator.canShare && cv.toBlob){
      cv.toBlob(function(bl){ try{ const file=new File([bl],fname,{type:'image/png'});

// ---------------- Tick loop ----------------
function step(ts){
  if(!lastTs) lastTs=ts;
  const dt=ts-lastTs; lastTs=ts;
  if(speed>0 && !isModalOpen()){
    acc+=dt*speed;
    if(acc>=DAY_MS){ acc=0; doDay(); }
  } else acc=0;
  skyT+=Math.min(dt,100); updateSky(); // day/night breathes regardless of game speed
  tickHandle=requestAnimationFrame(step);
}
function isModalOpen(){ return $('modal').className.indexOf('on')>=0; }
// ---- day/night sky ----
function updateSky(){
  const scn=$('scene'); if(!scn) return;
  const phase=((skyT/SKY_CYCLE)%1+1)%1; // 0 midnight → 0.5 noon → 1 midnight
  const dist=Math.abs(phase-0.5);                       // 0 at noon, 0.5 at midnight
  const night=clamp((dist-0.20)/0.20,0,1);              // 0 day, 1 deep night
  const warm=clamp(1-Math.abs(dist-0.27)/0.09,0,1);     // dawn/dusk glow
  const sn=$('skyNight'), sw=$('skyWarm'); if(sn) sn.style.opacity=(night*0.82).toFixed(3); if(sw) sw.style.opacity=(warm*0.9).toFixed(3);
  // sun/moon travel an arc; sun up in the day, moon up at night
  const t=clamp((phase-0.22)/0.56,0,1);                 // 0 dawn → 1 dusk
  const x=8+t*80, arc=Math.sin(t*Math.PI), y=54-arc*40;
  const sun=$('sceneSun'); if(sun){ sun.style.left=x+'%'; sun.style.top=y+'px'; sun.style.opacity=(1-night).toFixed(3); }
  const mt=((phase+0.5)%1-0.22)/0.56; const mx=8+clamp(mt,0,1)*80, my=54-Math.sin(clamp(mt,0,1)*Math.PI)*40;
  const moon=$('sceneMoon'); if(moon){ moon.style.left=mx+'%'; moon.style.top=my+'px'; moon.style.opacity=night.toFixed(3); }
}
// ---- weather particle layer ----
function buildWeather(wxId){
  const wx=$('wx'); if(!wx) return; wx.innerHTML='';
  if(wxId==='rain'){ for(let i=0;i<16;i++){ const d=el('div','drop'); d.style.left=(4+i*6)+'%'; d.style.animationDuration=(0.5+ (i%4)*0.12)+'s'; d.style.animationDelay=(-(i%7)*0.13)+'s'; wx.appendChild(d);} }
  else if(wxId==='snow'){ for(let i=0;i<16;i++){ const f=el('div','flake','❄'); f.style.left=(3+i*6)+'%'; f.style.animationDuration=(2.4+ (i%5)*0.5)+'s'; f.style.animationDelay=(-(i%8)*0.4)+'s'; wx.appendChild(f);} }
}
function doDay(){
  // expire hay modifier
  if(G.hayExpire && G.day>=G.hayExpire){ G.hayMod=null; G.hayExpire=null; }
  const money0=G.money;
  const res=advanceDay(G,Math.random);
  (res.notes||[]).forEach(n=>toast(n.m,n.t));
  const net=G.money-money0; // rent + boarding income earned overnight
  if(net>0) coinPop(net);
  if(res.born && res.born.length){ burst('🎉🐴✨🎊',16); playSfx('foal'); } // celebrate new foals
  if(res.event) showEvent(res.event);
  save(); refresh();
}

let tutOpen=false;

function finishTutorial(skip){ tutOpen=false; G.tut=G.tut||{step:0}; G.tut.done=true; save();
  const r=$('tutRing'), bb=$('tutBubble'); if(r)r.style.display='none'; if(bb)bb.className='';
  if(skip) toast('Tour skipped — replay anytime via ℹ️','info'); }
function showTutStep(i){
  const step=tutorialStep(i); if(!step){ finishTutorial(); toast('🎉 You’re all set — enjoy Skyhorse Stables!','good'); return; }
  tutOpen=true; G.tut=G.tut||{}; G.tut.step=i; save();

  const t=$('tbTitle'), tx=$('tbText'), stp=$('tbStep'), nx=$('tbNext');
  if(t) t.textContent=step.title; if(tx) tx.textContent=step.text; if(stp) stp.textContent=(i+1)+' / '+tutorialLen();
  if(nx) nx.textContent=(i>=tutorialLen()-1)?'Finish ✓':'Next ▸';

  playSfx('tap');

function positionTut(step){
  const ring=$('tutRing'), bb=$('tutBubble'); if(!ring||!bb) return;
  let tgt=null; try{ tgt=step.target?document.querySelector(step.target):null; }catch(e){ tgt=null; }
  const vw=(typeof window!=='undefined'&&window.innerWidth)||360, vh=(typeof window!=='undefined'&&window.innerHeight)||640;
  if(tgt&&tgt.getBoundingClientRect){ const r=tgt.getBoundingClientRect();
    if(r.width>0&&r.height>0){
      ring.style.display='block'; ring.style.left=(r.left-6)+'px'; ring.style.top=(r.top-6)+'px'; ring.style.width=(r.width+12)+'px'; ring.style.height=(r.height+12)+'px';
      const bh=180, below=r.bottom+bh<vh;
      bb.style.transform=''; bb.style.left=Math.max(12,Math.min(vw-312,r.left))+'px';
      bb.style.top=(below?(r.bottom+14):Math.max(12,r.top-bh))+'px';
      return;
    }
  }
  ring.style.display='none'; bb.style.left='50%'; bb.style.top='42%'; bb.style.transform='translate(-50%,-50%)';
}

  const achHTML=st.list.map(x=>'<div class="achcard'+(x.unlocked?' un':'')+'">'+
    '<div class="achic">'+(x.unlocked?x.def.icon:'🔒')+'</div>'+
    '<div class="achtx"><div class="achn">'+x.def.name+'</div><div class="achd">'+x.def.desc+'</div></div>'+
    (x.unlocked?'<div class="achok">✓</div>':'')+'</div>').join('');
  modal('<h3>🏅 Achievements &amp; Stats</h3>'+
    '<div class="seg" style="pointer-events:none"><div class="segb on">🏅 '+st.unlocked+' / '+st.total+' unlocked</div></div>'+
    '<div class="statgrid">'+statHTML+'</div>'+
    '<div class="divider"></div>'+
    '<div class="achlist">'+achHTML+'</div>'+
    '<div class="btnrow"><button class="btn ghost" id="aClose" style="width:100%">Close</button></div>');
  $('aClose').onclick=closeModal;
}

function boot(){
  if(!load()){ G=freshGame(); }
  if(_idc<1000) _idc=1000+G.horses.length+G.market.length;
  { const dc=$('dayChip'); if(dc) dc.onclick=openWeek; }
  { const hb=$('helpBtn'); if(hb) hb.onclick=openHelp; }
  { const db=$('decorBtn'); if(db) db.onclick=openDecor; }
  { const nx=$('tbNext'); if(nx) nx.onclick=()=>showTutStep((G.tut&&G.tut.step||0)+1); }
  { const sk=$('tbSkip'); if(sk) sk.onclick=()=>finishTutorial(true); }
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ playSfx('tap'); setTab(t.getAttribute('data-tab')); });
  document.querySelectorAll('#speedBtns .sbtn').forEach(b=>b.onclick=()=>{ speed=parseInt(b.getAttribute('data-sp'),10); playSfx('tap');
    document.querySelectorAll('#speedBtns .sbtn').forEach(x=>x.classList.toggle('on',x===b)); });
  { const ab=$('audioBtn'); if(ab) ab.onclick=openAudio; updateAudioBtn(); }
  setTab('ranch'); refresh();
  if(!G.seenIntro) showIntro();
  tickHandle=requestAnimationFrame(step);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();

})();
</script>
</body>
</html>
