<script>
'use strict';
// ============================================================================
// GOLD RUSH ARCADE — a hall of coin pusher machines.
//
// Physics is a 2.5D plane sim: x across the platform, y into the machine
// (0 = back, grows toward the player), z = absolute height. Machines are
// data: each defines one or two TIERS (playfields) with their own kinematic
// pusher. Penny Falls is the two-tier classic — its upper shelf's front edge
// is simultaneously the drop-off for tier 0 and the moving pusher face for
// tier 1, exactly like the 1964 Crompton machines.
//
// Meta game: wins pay POINTS (spendable) and refund COINS (ammo). Points
// unlock machines and buy prizes in the shop; prizes can be listed on
// PusherBay, a simulated marketplace where they sell for coins over real
// time (even while the game is closed).
//
// Headless mode (tests): no canvas ctx -> sim + economy only, via window.CP.
// ============================================================================

const canvas = document.getElementById('c');
let ctx = null;
try { ctx = canvas && canvas.getContext ? canvas.getContext('2d') : null; } catch (e) { ctx = null; }
if (ctx && typeof ctx.save !== 'function') ctx = null;
const HEADLESS = !ctx;

// ---------------------------------------------------------------- constants
const C = {
  W: 100,
  PLAT_FRONT: 84,          // gold-machine front edge (baseline; tiers override)
  GUT_LO: 1.5, GUT_HI: 98.5,
  COIN_R: 4.6, LUCKY_R: 5.0, GEM_R: 5.2, TAG_R: 6.4, BILL_R: 7.0, BALL_R: 4.8,
  COIN_H: 1.7,
  PUSH_MIN: 10, PUSH_MAX: 30, PUSH_H: 9,
  DROP_Z: 62,
  GRAV: 260,
  // pachinko board physics (see PR notes: Galton-board reflection model)
  GRAV_PEG: 225,       // balls descend slowly between the pins
  PEG_E: 0.42,         // coefficient of restitution at each pin (0.4-0.8 realistic)
  PEG_RR: 3.4,         // thin pin + coin combined collision radius in the board plane
  PEG_EXIT: 16,        // below this height the coin has left the board
  PEG_VCAP: 58,        // terminal fall speed inside the board
  TRAY_Z: -30,
  GUT_KILL: -44,
  FRICTION: 3.0, SETTLE: 0.5, REST: 0.05,
  LIP_G: 34,               // deceleration climbing the incline lip
  MAX_LAY: 2,              // coins can stack three high (lay 0,1,2)
  START_WALLET: 25, START_MONEY: 500,   // money is stored in cents
  PITY_T: 6,                            // broke bailout: +1 coin per 6s
  DROP_CD: 0.28, COMBO_WIN: 1.4, COMBO_CAP: 5,
  METER_MAX: 20,
  PTS: { coin: 10, lucky: 50, gem: 500 },
  PAY: { coin: 1, lucky: 2, gem: 5 },   // coins returned to the TRAY, not the wallet
  P_LUCKY: 0.10, P_GEM: 0.025,
  PRIZE_R: 8.0,
  TRAY_CAP: 24,                         // tray auto-collects when this full
  SAVE_KEY: 'coin_pusher_save',
  LIST_MAX: 8,
  SELL_TIERS: [                         // PusherBay pricing strategies (per unit)
    { name: 'Quick', mul: 0.7, dur: 45e3 },
    { name: 'Fair', mul: 1.0, dur: 180e3 },
    { name: 'Greedy', mul: 1.5, dur: 600e3 },
  ],
  PACKS: [                              // money -> coins; the only way in, so the
    { c: 12, m: 100 },                  // house edge on the field really bites
    { c: 70, m: 500 },
    { c: 160, m: 1000 },
  ],
  EXCHANGE: 0.6,                        // prize -> points at 60% of shop cost
};

// ---------------------------------------------------------------- machines
// Four real-world machine types (see HANDOVER / PR notes for sources):
// classic carnival pusher, UK two-tier penny falls, Japanese medal game
// with bonus-ball slot, and the US gas-station quarter bandit.
const MACHINES = {
  gold: {

    coin: { r: 4.6, val: 10, style: 'gold', sym: '¢' },

    tiers: [{ z: 0, back: 0, front: 84, min: 10, max: 30, phase: 0, slotY: 20 }],
    gutY: 36, lipW: 7, lipH: 2.2,
    tags: [
      { val: 100, col: '#43d17c' }, { val: 250, col: '#3fa9f5' }, { val: 500, col: '#ef4b5d' },
    ],
    special: null,
    prizeIds: ['paw', 'boba', 'dino'],
    theme: { room: '#2a1520', cabA: '#8c1f2e', cabB: '#4a0f1a', trim: '#f2cd5e',
             titleA: '#fff0b8', titleB: '#b07a14', sub: '#e8b6be',
             floorA: '#585f6a', floorB: '#99a1ad', accent: '#ffd75e' },
  },
  penny: {
    name: 'PENNY FALLS', sub: 'SEASIDE 2p CASCADE', unlock: 1500,
    coin: { r: 3.7, val: 5, style: 'copper', sym: '2' },
    luckyVal: 25, gemVal: 250,
    pushPeriod: 3.0, maxCoins: 210,
    // tier 0 = elevated sliding shelf; its drop edge is 'dyn' — the moving
    // face at pusherFront(1), which doubles as tier 1's pusher.
    tiers: [
      { z: 12, back: 0, front: 'dyn', min: 2, max: 12, phase: 0, slotY: 8 },
      { z: 0, back: 34, front: 86, min: 36, max: 50, phase: Math.PI, slotY: null },
    ],
    gutY: 58, lipW: 6, lipH: 2.0,
    tags: [
      { val: 50, col: '#43d17c' }, { val: 100, col: '#3fa9f5' }, { val: 250, col: '#ef4b5d' },
    ],
    special: null,
    prizeIds: ['star', 'rainbow', 'cat'],
    theme: { room: '#12303a', cabA: '#1d6d7a', cabB: '#0d3742', trim: '#f5e3b8',
             titleA: '#fdf6dd', titleB: '#c8862c', sub: '#a8d8de',
             floorA: '#5c6660', floorB: '#98a394', accent: '#ffb64a' },
  },
  neon: {
    name: 'NEON MEDAL', sub: 'TOKYO ARCADE', unlock: 6000,
    coin: { r: 4.4, val: 15, style: 'medal', sym: '★' },
    luckyVal: 75, gemVal: 750,
    pushPeriod: 3.2, maxCoins: 180,
    tiers: [{ z: 0, back: 0, front: 84, min: 10, max: 30, phase: 0, slotY: 20 }],
    gutY: 40, lipW: 7, lipH: 2.2,
    tags: [
      { val: 150, col: '#37e6b0' }, { val: 300, col: '#c86bff' }, { val: 600, col: '#ff5a8a' },
    ],
    special: 'ball', ballEvery: 22,
    prizeIds: ['controller', 'tamagotchi', 'shiba'],
    // pachinko drop: three fixed coin slots feed a chrome peg board; coins
    // ricochet pin to pin for a couple of seconds before landing on the
    // pusher shelf or the field. Staggered triangular grid (Galton board).
    slots: [30, 50, 70],
    dropZ: 70,                                   // coins enter high above the board
    pegRows: [                                   // [z, firstX, stepX]
      [63, 15, 10], [56, 20, 10], [49, 15, 10], [42, 20, 10],
      [35, 15, 10], [28, 20, 10], [21, 15, 10],
    ],
    theme: { room: '#170b2e', cabA: '#3b1a70', cabB: '#1b0b3a', trim: '#63e7ff',
             titleA: '#d9fbff', titleB: '#1f9ecf', sub: '#c9a7ff',
             floorA: '#3f4358', floorB: '#767c99', accent: '#63e7ff' },
  },
  bandit: {
    name: 'HIGH ROLLER', sub: 'VEGAS QUARTER BANDIT', unlock: 20000,
    coin: { r: 4.8, val: 25, style: 'silver', sym: '25' },
    luckyVal: 125, gemVal: 1250,
    pushPeriod: 3.8, maxCoins: 150,
    tiers: [{ z: 0, back: 0, front: 84, min: 10, max: 28, phase: 0, slotY: 20 }],
    gutY: 30, lipW: 8, lipH: 2.4,   // gutters open early: high risk, high pay
    tags: [
      { val: 500, col: '#43d17c' }, { val: 1000, col: '#f7a534' }, { val: 2500, col: '#ef4b5d' },
    ],
    special: 'bill', billVal: 1500,
    prizeIds: ['watch_black', 'arcade', 'panda'],
    theme: { room: '#26060a', cabA: '#191114', cabB: '#080506', trim: '#e8b64a',
             titleA: '#ffe9b0', titleB: '#a8681a', sub: '#d98a8a',
             floorA: '#403a44', floorB: '#79707e', accent: '#ff4b4b' },
  },
};
const MACH_IDS = ['gold', 'penny', 'neon', 'bandit'];
// expand peg rows into pin coordinates on the drop plane (x across, z height)
for (const id of MACH_IDS) {
  const m = MACHINES[id];
  if (!m.pegRows) continue;
  m.pegs = [];
  for (const [z, x0, dx] of m.pegRows) {
    for (let x = x0; x <= 86; x += dx) m.pegs.push({ x, z });
  }
}

// ------------------------------------------------------------------ prizes
const PRIZES = [
  { id: 'paw', icon: '\u{1F43E}', name: 'Paw Charm', cost: 300, base: 40 },
  { id: 'star', icon: '⭐', name: 'Lucky Star', cost: 450, base: 55 },
  { id: 'boba', icon: '\u{1F9CB}', name: 'Boba Buddy', cost: 600, base: 70 },
  { id: 'rainbow', icon: '\u{1F308}', name: 'Rainbow Charm', cost: 800, base: 95 },
  { id: 'burger', icon: '\u{1F354}', name: 'Burger Charm', cost: 1100, base: 125 },
  { id: 'controller', icon: '\u{1F3AE}', name: 'Mini Controller', cost: 1500, base: 170 },
  { id: 'sneaker', icon: '\u{1F45F}', name: 'Mini Sneaker', cost: 2000, base: 230 },
  { id: 'watch_blue', icon: '⌚', name: 'Digi Watch Blue', cost: 2800, base: 310 },
  { id: 'watch_pink', icon: '⌚', name: 'Digi Watch Pink', cost: 3200, base: 355 },
  { id: 'watch_black', icon: '⌚', name: 'Digi Watch Black', cost: 3600, base: 400 },
  { id: 'tamagotchi', icon: '\u{1F95A}', name: 'Pocket Pet', cost: 5000, base: 560 },
  { id: 'arcade', icon: '\u{1F579}\u{FE0F}', name: 'Mini Arcade', cost: 6500, base: 720 },
  { id: 'dino', icon: '\u{1F996}', name: 'Dino Plush', cost: 9000, base: 990 },
  { id: 'cat', icon: '\u{1F431}', name: 'Cat Plush', cost: 12000, base: 1300 },
  { id: 'shiba', icon: '\u{1F436}', name: 'Shiba Plush', cost: 16000, base: 1750 },
  { id: 'axolotl', icon: '\u{1F98E}', name: 'Axolotl Plush', cost: 21000, base: 2300 },
  { id: 'panda', icon: '\u{1F43C}', name: 'Panda Plush', cost: 28000, base: 3000 },
];
// saves from before the real prize art map onto the new catalog
const PRIZE_MIGRATE = {
  key: 'paw', duck: 'boba', bear: 'cat', globe: 'star', robot: 'controller',
  skate: 'sneaker', game: 'tamagotchi', boombox: 'arcade', ring: 'watch_pink',
  trophy: 'watch_black', crown: 'panda',
};
function migratePid(pid) { return PRIZE_MIGRATE[pid] || pid; }
const BUYERS = ['pixelPanda99', 'arcadeQueen', 'tokenTom', '2pTerry', 'medalMaster',
  'quarterQuinn', 'lucky_luna', 'pusherPete', 'neonNori', 'cascadeCarl',
  'goldieGwen', 'duckCollector', 'vintageVera', 'jackpotJoe', 'seasideSam'];

// ------------------------------------------------------------------- state
const S = {
  coins: [], floats: [], parts: [], rain: [],
  score: 0, best: 0, wallet: C.START_WALLET, money: C.START_MONEY,
  combo: 0, lastCollect: -99, meter: 0,
  time: 0, phase: 0, cd: 0, regen: 0,
  shake: 0, aimX: 50, mute: false,
  dropped: 0, collected: 0, lost: 0, jackpots: 0,
  coinsSpent: 0, coinsBack: 0,   // house-edge bookkeeping
  banner: null, trayPile: 0, denyT: 0,
  tray: { coins: 0, prizes: [], items: [] },  // your winnings pile up here
  prizeDebt: 0,            // won prizes owed back to the pile
  screen: 'lobby', mach: 'gold',
  unlocked: ['gold'],
  prizes: {},              // prize id -> owned count
  listings: [],            // {pid, qty, price, nextT, iv}
  slog: [],                // sale log: {pid, price, buyer}
  slotAnim: null,          // neon slot spin overlay
  pegFx: [],               // transient pin-impact flashes {x, z, t}
  wheelAnim: null,         // Lucky Wheel overlay {t, seg, label}
  lastDaily: null,         // day key of the last claimed daily gift
  side: 0,                 // which of the machine's four sides you stand at
  sideSeen: {},            // 'mach:side' -> last visit (ms) for leftover coins
  pileSalt: 12345,         // per-session flavour for the other sides' piles
  sellPick: null, sellQty: 1, uiFlash: null, buyOpen: false,
};
// session-only cache of the piles on the machine sides you walked away from
const sideStore = {};

function M() { return MACHINES[S.mach]; }
function lastTier() { return M().tiers.length - 1; }

// seeded rng so tests are deterministic; browser reseeds from the clock
let rngState = 1234;
function srand(s) { rngState = (s >>> 0) || 1; }
function rng() {
  rngState |= 0; rngState = (rngState + 0x6D2B79F5) | 0;
  let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// sound hooks — no-ops headless / until the browser block installs real ones
let SND = { clink() {}, collect() {}, gem() {}, jackpot() {}, deny() {}, thud() {},
            slot() {}, tag() {}, bill() {}, ball() {}, reel() {}, buy() {}, sold() {}, ping() {} };

// ------------------------------------------------------------- persistence
function save() {
  try {
    localStorage.setItem(C.SAVE_KEY, JSON.stringify({
      v: 3, score: S.score, best: S.best, wallet: S.wallet, money: S.money,
      meter: S.meter, mute: S.mute, jackpots: S.jackpots, collected: S.collected,
      coinsSpent: S.coinsSpent, coinsBack: S.coinsBack,
      mach: S.mach, unlocked: S.unlocked, prizes: S.prizes,
      listings: S.listings, slog: S.slog, sideSeen: S.sideSeen, lastDaily: S.lastDaily,
      tray: { coins: S.tray.coins, prizes: S.tray.prizes },
    }));
  } catch (e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(C.SAVE_KEY));
    if (!d) return;
    S.score = d.score || 0; S.best = d.best || 0;
    S.wallet = (typeof d.wallet === 'number') ? d.wallet : C.START_WALLET;
    S.meter = d.meter || 0; S.mute = !!d.mute;
    S.jackpots = d.jackpots || 0; S.collected = d.collected || 0;
    if (d.v >= 2) {
      if (MACHINES[d.mach]) S.mach = d.mach;
      if (Array.isArray(d.unlocked)) S.unlocked = d.unlocked.filter(id => MACHINES[id]);
      if (S.unlocked.indexOf('gold') < 0) S.unlocked.push('gold');
      if (d.prizes && typeof d.prizes === 'object') S.prizes = d.prizes;
      if (Array.isArray(d.slog)) S.slog = d.slog.slice(0, 8);
    }
    if (d.v >= 3) {
      S.money = (typeof d.money === 'number') ? d.money : C.START_MONEY;
      S.coinsSpent = d.coinsSpent || 0; S.coinsBack = d.coinsBack || 0;
      if (Array.isArray(d.listings)) S.listings = d.listings.filter(l => l && l.pid && l.nextT && l.qty > 0);
      if (d.tray) {
        S.tray.coins = d.tray.coins || 0;
        S.tray.prizes = Array.isArray(d.tray.prizes) ? d.tray.prizes : [];
      }
      if (d.sideSeen && typeof d.sideSeen === 'object') S.sideSeen = d.sideSeen;
      if (d.lastDaily) S.lastDaily = d.lastDaily;
    } else if (d.v === 2 && Array.isArray(d.listings)) {
      // v2 listings were coin-priced one-shots — hand the items back
      for (const l of d.listings) {
        if (l && l.pid) S.prizes[l.pid] = (S.prizes[l.pid] || 0) + 1;
      }
    }
    // old prize ids -> the new real-art catalog (all save versions)
    const mp = {};
    for (const k of Object.keys(S.prizes)) mp[migratePid(k)] = (mp[migratePid(k)] || 0) + S.prizes[k];
    S.prizes = mp;
    for (const l of S.listings) l.pid = migratePid(l.pid);
    S.tray.prizes = S.tray.prizes.map(migratePid);
    for (const s2 of S.slog) s2.pid = migratePid(s2.pid);
  } catch (e) {}
}

// ------------------------------------------------------------------- items
function kindR(kind) {
  if (kind === 'gem') return C.GEM_R;
  if (kind === 'lucky') return M().coin.r + 0.4;
  if (kind === 'tag') return C.TAG_R;
  if (kind === 'bill') return C.BILL_R;
  if (kind === 'ball') return C.BALL_R;
  if (kind === 'prize') return C.PRIZE_R;
  if (kind === 'chest') return 7.0;
  if (kind === 'chip') return M().coin.r + 0.2;
  return M().coin.r;
}
function kindM(kind) {
  return { gem: 2.2, lucky: 1.2, tag: 3.0, bill: 2.5, ball: 0.9, prize: 4.0, chest: 3.5, chip: 1.1 }[kind] || 1;
}
function mkCoin(x, y, kind, lay, st, tier) {
  tier = tier || 0;
  const td = M().tiers[tier];
  return {
    x, y, z: td.z + (lay || 0) * C.COIN_H, vx: 0, vy: 0, vz: 0,
    r: kindR(kind), m: kindM(kind),
    kind, st: st || 'plat', lay: lay || 0, tier,
    rot: rng() * 6.28, vrot: 0, glint: rng() * 7,
    bounces: 0, ttl: 0, scored: false, chk1: false, chk2: false, chkP: false,
    val: 0, col: null, pid: null, onPush: false, pegHits: 0,
  };
}
function place(x, y, kind, lay, st, tier) {
  // infer tier from depth when not given (keeps the old test API)
  if (tier === undefined) {
    tier = 0;
    const ts = M().tiers;
    for (let i = ts.length - 1; i >= 0; i--) { if (y >= ts[i].back) { tier = i; break; } }
  }
  const c = mkCoin(x, y, kind || 'coin', lay || 0, st || 'plat', tier);
  S.coins.push(c);
  return c;
}
function spawnDrop(x, ty, kind, tag) {
  if (S.coins.length >= M().maxCoins) return null;
  const c = mkCoin(x, ty, kind, 0, 'air', 0);
  c.z = M().dropZ || C.DROP_Z; c.vz = 0; c.vrot = (rng() - 0.5) * 10;
  if (tag) { c.val = tag.val; c.col = tag.col; }
  S.coins.push(c);
  return c;
}
function rollKind() {
  const r = rng();
  if (r < C.P_GEM) return 'gem';
  if (r < C.P_GEM + C.P_LUCKY) return 'lucky';
  return 'coin';
}

// ------------------------------------------------------------------ pusher
function pusherFront(ti) {
  const td = M().tiers[ti || 0];
  const ph = S.phase + (td.phase || 0);
  return td.min + (td.max - td.min) * (0.5 - 0.5 * Math.cos(ph));
}
function pusherVel(ti) {
  const td = M().tiers[ti || 0];
  const ph = S.phase + (td.phase || 0);
  return (td.max - td.min) * 0.5 * Math.sin(ph) * (2 * Math.PI / M().pushPeriod);
}
function tierFront(ti) {
  const td = M().tiers[ti];
  return td.front === 'dyn' ? pusherFront(ti + 1) : td.front;
}

// --------------------------------------------------------------- scoring
// Points are awarded the moment something lands in the tray (the dopamine
// hit), but coins and prizes SIT in the tray until you scoop them out.
function addPts(n) {
  S.score += n;
  if (S.score > S.best) S.best = S.score;
}
function trayAdd(kind, extra) {
  S.tray.items.push({ kind, pid: extra && extra.pid, col: extra && extra.col, x: extra ? extra.x : 50 });
  if (S.tray.items.length >= C.TRAY_CAP) collectTray();
}
function scoreCoin(c) {
  const now = S.time;
  S.collected++;
  if (c.kind === 'ball') {
    spinSlot();
    S.shake += 4;
    save();
    return;
  }
  if (c.kind === 'prize') {
    S.tray.prizes.push(c.pid);
    trayAdd('prize', { pid: c.pid, x: c.x });
    const p = PRIZES.find(q => q.id === c.pid);
    S.banner = { txt: 'PRIZE!', ttl: 1.6, max: 1.6 };
    S.floats.push({ txt: (p ? p.name : 'PRIZE') + '!', wx: c.x, wy: 96, age: 0, max: 1.6, col: '#ffe066', big: true });
    S.shake += 7;
    S.prizeDebt++;   // the machine restocks the field a few drops later
    SND.jackpot();
    burst(c.x, 96, C.TRAY_Z, 'tag');
    save();
    return;
  }
  if (c.kind === 'chip') {
    S.floats.push({ txt: 'WHEEL SPIN!', wx: c.x, wy: 96, age: 0, max: 1.4, col: '#63e7ff', big: true });
    S.shake += 4;
    spinWheel();
    burst(c.x, 96, C.TRAY_Z, 'tag');
    return;
  }
  if (c.kind === 'chest') {
    openChest(c);
    save();
    return;
  }
  if (c.kind === 'tag') {
    addPts(c.val);
    trayAdd('tag', { col: c.col, x: c.x });
    S.floats.push({ txt: 'TAG +' + c.val, wx: c.x, wy: 96, age: 0, max: 1.3, col: c.col || '#43d17c', big: true });
    S.shake += 4;
    SND.tag();
    burst(c.x, 96, C.TRAY_Z, 'tag');
    save();
    return;
  }
  if (c.kind === 'bill') {
    addPts(M().billVal || 1000);
    trayAdd('bill', { x: c.x });
    S.floats.push({ txt: 'CASH +' + (M().billVal || 1000), wx: c.x, wy: 96, age: 0, max: 1.4, col: '#7ee787', big: true });
    S.shake += 6;
    SND.bill();
    burst(c.x, 96, C.TRAY_Z, 'bill');
    save();
    return;
  }
  S.combo = (now - S.lastCollect <= C.COMBO_WIN) ? S.combo + 1 : 1;
  S.lastCollect = now;
  const mult = Math.min(S.combo, C.COMBO_CAP);
  const pts = c.kind === 'gem' ? M().gemVal : c.kind === 'lucky' ? M().luckyVal * mult : M().coin.val * mult;
  addPts(pts);
  S.tray.coins += C.PAY[c.kind];
  trayAdd(c.kind, { x: c.x });
  S.floats.push({ txt: '+' + pts, wx: c.x, wy: 96, age: 0, max: 1.1,
                  col: c.kind === 'gem' ? '#7be9ff' : c.kind === 'lucky' ? '#ffe066' : '#ffd24a',
                  big: c.kind !== 'coin' || mult >= 3 });
  if (mult > 1) S.floats.push({ txt: 'COMBO ×' + mult, wx: 50, wy: 60, age: 0, max: 0.9, col: '#ff9d3c', big: mult >= 4 });
  S.shake += c.kind === 'gem' ? 5 : mult > 2 ? 2 : 1;
  if (c.kind === 'gem') SND.gem(); else SND.collect(mult);
  burst(c.x, 96, C.TRAY_Z, c.kind);
  save();
}
function collectTray() {
  if (!S.tray.coins && !S.tray.prizes.length && !S.tray.items.length) return false;
  if (S.tray.coins > 0) {
    S.wallet += S.tray.coins;

  }
  for (const pid of S.tray.prizes) S.prizes[pid] = (S.prizes[pid] || 0) + 1;
  if (S.tray.prizes.length) {

  }

function jackpot() {

// neon machine: a collected bonus ball spins the slot
function spinSlot() {
  const r = rng();
  let out;
  if (r < 0.07) { out = { syms: '⭐⭐⭐', label: 'JACKPOT!' }; jackpot(); }
  else if (r < 0.20) { out = { syms: '\u{1F352}\u{1F352}\u{1F352}', label: '+25 MEDALS' }; S.tray.coins += 25; trayAdd('coin', { x: 50 }); }
  else if (r < 0.36) { out = { syms: '\u{1F48E}\u{1F48E}\u{1F48E}', label: '+600 PTS' }; addPts(600); }
  else if (r < 0.64) { out = { syms: '\u{1F514}\u{1F514}\u{1F34B}', label: '+8 MEDALS' }; S.tray.coins += 8; trayAdd('coin', { x: 50 }); }
  else { out = { syms: '\u{1F352}\u{1F514}\u{1F34B}', label: '+100 PTS' }; addPts(100); }
  S.slotAnim = { t: 0, syms: out.syms, label: out.label };
  if (!S.banner) S.banner = { txt: 'BONUS BALL!', ttl: 1.2, max: 1.2 };
  SND.ball();
  save();
  return out;
}

// Lucky Wheel — spun by wheel chips won off the field, gift chests, and the
// daily gift (after the mobile coin pusher classics)
const WHEEL = [
  { label: '25 ●', w: 17, fx: () => { S.tray.coins += 25; trayAdd('coin', { x: 50 }); } },
  { label: '+300 ✦', w: 15, fx: () => addPts(300) },
  { label: 'GEM', w: 10, fx: () => S.rain.push({ t: 0.3, x: 30 + rng() * 40, y: M().tiers[0].slotY + 6, kind: 'gem' }) },
  { label: '+$1.50', w: 13, fx: () => { S.money += 150; } },
  { label: 'PRIZE', w: 8, fx: () => { const pz = PRIZES[(rng() * 3) | 0]; S.tray.prizes.push(pz.id); trayAdd('prize', { pid: pz.id, x: 50 }); } },
  { label: '+150 ✦', w: 16, fx: () => addPts(150) },
  { label: 'METER +8', w: 15, fx: () => { S.meter += 8; if (S.meter >= C.METER_MAX) jackpot(); } },
  { label: 'JACKPOT', w: 6, fx: () => jackpot() },
];
function spinWheel() {
  const total = WHEEL.reduce((a, s) => a + s.w, 0);
  let r = rng() * total, idx = 0;
  for (let i = 0; i < WHEEL.length; i++) { r -= WHEEL[i].w; if (r <= 0) { idx = i; break; } }
  WHEEL[idx].fx();
  S.wheelAnim = { t: 0, seg: idx, label: WHEEL[idx].label };
  SND.bill();
  save();
  return WHEEL[idx];
}
function openChest(c) {
  const r = rng();
  let txt;
  if (r < 0.4) {
    const n = 8 + ((rng() * 10) | 0);
    S.tray.coins += n; trayAdd('coin', { x: c.x });
    txt = 'GIFT: +' + n + ' ●';
  } else if (r < 0.7) {
    const pts = 150 + ((rng() * 5) | 0) * 50;
    addPts(pts);
    txt = 'GIFT: +' + pts + ' PTS';
  } else if (r < 0.9) {
    txt = 'GIFT: WHEEL SPIN!';
    spinWheel();
  } else {
    const pz = PRIZES[(rng() * 3) | 0];
    S.tray.prizes.push(pz.id); trayAdd('prize', { pid: pz.id, x: c.x });
    txt = 'GIFT: ' + pz.name + '!';
  }
  S.floats.push({ txt, wx: c.x, wy: 96, age: 0, max: 1.5, col: '#ffb0e0', big: true });
  S.shake += 5;
  SND.gem();
  burst(c.x, 96, C.TRAY_Z, 'tag');
}
function claimDaily(dayKey) {
  if (!dayKey || S.lastDaily === dayKey) return false;
  S.lastDaily = dayKey;
  S.wallet += 15;
  S.money += 100;
  S.floats.push({ txt: 'DAILY GIFT: 15 ● + $1.00', wx: 50, wy: 96, age: 0, max: 1.8, col: '#7ee787', big: true });

  return true;

function drop(x) {
  if (S.cd > 0) return false;
  if (S.wallet < 1) { S.denyT = 0.6; SND.deny(); return false; }
  S.wallet--; S.cd = C.DROP_CD; S.dropped++; S.meter++; S.coinsSpent++;
  const Mv = M();
  // you always insert a COIN — specials are the machine's job to restock
  const kind = rng() < C.P_LUCKY ? 'lucky' : 'coin';
  let ax = Math.max(8, Math.min(92, x === undefined ? S.aimX : x));
  // slot machines: coins can only enter through the fixed mouths
  if (Mv.slots) {
    let bi = 0, bd = 1e9;
    Mv.slots.forEach((sx, i) => { const d = Math.abs(sx - ax); if (d < bd) { bd = d; bi = i; } });
    ax = Mv.slots[bi];
  }
  spawnDrop(ax + (rng() - 0.5) * (Mv.slots ? 0.5 : 2), Mv.tiers[0].slotY + (rng() - 0.5) * 5, kind, null);
  SND.slot();
  // machine-side events (they never eat your inserted coin)
  if (S.prizeDebt > 0 && S.dropped % 10 === 0) {
    S.prizeDebt--;
    S.rain.push({ t: 0.4, x: 20 + rng() * 60, y: Mv.tiers[0].slotY + 4 + rng() * 8,
                  kind: 'prize', pid: Mv.prizeIds[(rng() * Mv.prizeIds.length) | 0] });
  }
  if (S.dropped % 30 === 0) {
    S.rain.push({ t: 0.35, x: 20 + rng() * 60, y: Mv.tiers[0].slotY + 4 + rng() * 8, kind: 'chip' });
  }
  if (Mv.special === 'ball' && Mv.ballEvery && S.dropped % Mv.ballEvery === 0) {
    S.rain.push({ t: 0.3, x: 20 + rng() * 60, y: Mv.tiers[0].slotY + 4 + rng() * 8, kind: 'ball' });
    if (!S.banner) S.banner = { txt: 'BONUS BALL!', ttl: 1.2, max: 1.2 };
  }
  if (S.meter >= C.METER_MAX) jackpot();
  save();
  return true;
}

// ---------------------------------------------------------------- economy
function buyCoins(packIdx) {
  const p = C.PACKS[packIdx];
  if (!p || S.money < p.m) { S.uiFlash = { msg: 'NOT ENOUGH MONEY', t: 1 }; SND.deny(); return false; }
  S.money -= p.m;
  S.wallet += p.c;
  SND.buy();
  save();
  return true;
}
function exchangePrize(pid) {
  const p = PRIZES.find(q => q.id === pid);
  if (!p || !S.prizes[pid]) return false;
  S.prizes[pid]--;
  if (!S.prizes[pid]) delete S.prizes[pid];
  addPts(Math.round(p.cost * C.EXCHANGE));
  SND.buy();
  save();
  return true;
}
function buyMachine(id) {
  const m = MACHINES[id];
  if (!m || S.unlocked.indexOf(id) >= 0) return false;
  if (S.score < m.unlock) return false;
  S.score -= m.unlock;
  S.unlocked.push(id);
  SND.buy();
  save();
  return true;
}
function switchSide(dir, now) {
  now = now || 0;
  // remember this side's pile, then walk around the cabinet
  sideStore[S.mach + ':' + S.side] = S.coins.slice();
  S.side = (S.side + (dir >= 0 ? 1 : -1) + 4) % 4;
  const key = S.mach + ':' + S.side;
  if (sideStore[key]) {
    S.coins = sideStore[key];
  } else {
    // every side carries its own pile — some just look juicier than others
    srand(((S.mach.charCodeAt(0) * 97 + S.side * 7919 + S.pileSalt) >>> 0) || 1);
    initPile();
  }
  S.banner = { txt: 'SIDE ' + (S.side + 1) + ' / 4', ttl: 1.1, max: 1.1 };
  // sometimes the last player left a coin or two in this side's tray
  const last = S.sideSeen[key] || 0;
  if (now - last > 150e3 && rng() < 0.6) {
    const n = 1 + (rng() < 0.35 ? 1 : 0);
    S.tray.coins += n;
    for (let i = 0; i < n; i++) trayAdd('coin', { x: 40 + i * 12 });
    S.floats.push({ txt: 'someone left ' + n + ' coin' + (n > 1 ? 's' : '') + '!',
                    wx: 50, wy: 96, age: 0, max: 1.6, col: '#7ee787', big: true });
    SND.clink();
  }
  S.sideSeen[key] = now;
  save();
  return S.side;
}
function setMachine(id) {
  if (!MACHINES[id] || S.unlocked.indexOf(id) < 0) return false;
  S.mach = id;
  S.side = 0;
  reset();
  S.screen = 'game';
  save();
  return true;
}
function buyPrize(pid) {
  const p = PRIZES.find(q => q.id === pid);
  if (!p || S.score < p.cost) { S.uiFlash = { msg: 'NOT ENOUGH POINTS', t: 1 }; SND.deny(); return false; }
  S.score -= p.cost;
  S.prizes[pid] = (S.prizes[pid] || 0) + 1;
  SND.buy();
  save();
  return true;
}
function listPrize(pid, tier, now, qty) {
  if (S.listings.length >= C.LIST_MAX) { S.uiFlash = { msg: 'STORE FULL (' + C.LIST_MAX + ' SLOTS)', t: 1 }; return false; }
  if (!S.prizes[pid]) return false;
  const p = PRIZES.find(q => q.id === pid);
  if (!p) return false;
  qty = Math.max(1, Math.min(qty || 1, S.prizes[pid], 5));
  const t = C.SELL_TIERS[tier] || C.SELL_TIERS[1];
  S.prizes[pid] -= qty;
  if (!S.prizes[pid]) delete S.prizes[pid];
  // sells one unit per interval; buyers pay MONEY
  S.listings.push({ pid, qty, price: Math.round(p.base * t.mul), nextT: now + t.dur, iv: t.dur });
  save();
  return true;
}
function resolveSales(now) {
  let changed = false;
  for (let i = S.listings.length - 1; i >= 0; i--) {
    const l = S.listings[i];
    while (l.qty > 0 && now >= l.nextT) {
      S.money += l.price;
      S.slog.unshift({ pid: l.pid, price: l.price, buyer: BUYERS[(rng() * BUYERS.length) | 0] });
      l.qty--;
      l.nextT += l.iv;
      changed = true;
      SND.sold();
    }
    if (l.qty <= 0) S.listings.splice(i, 1);
  }
  if (S.slog.length > 8) S.slog.length = 8;
  if (changed) save();
  return changed;
}

// ------------------------------------------------------------------ reset
function fillRows(tier, y0, y1, opts) {
  const Mv = M();
  const step = Mv.coin.r * 2.05;
  let luckyLeft = opts.lucky || 0;
  for (let y = y0; y <= y1; y += step) {
    const n = Math.floor(84 / step);
    for (let i = 0; i < n; i++) {
      const x = 50 + (i - (n - 1) / 2) * step * 1.04 + (rng() - 0.5) * 2.5;
      let kind = 'coin';
      if (luckyLeft > 0 && rng() < 0.06) { kind = 'lucky'; luckyLeft--; }
      place(x, y + (rng() - 0.5) * 2, kind, 0, 'plat', tier);
    }
  }
}
function initPile() {
  S.coins.length = 0;
  const Mv = M();
  const lt = lastTier();
  const td = Mv.tiers[lt];
  const front = td.front === 'dyn' ? td.min : td.front;
  // dense pile on the payout tier, heaviest near the edge
  fillRows(lt, td.back + (lt > 0 ? 14 : 42), front - 4, { lucky: 4 });
  // penny falls: a starter spread on the upper shelf too
  if (lt > 0) fillRows(0, 10, Mv.tiers[0].min + 16, { lucky: 1 });
  // seeded specials: a gem and two point tags mid-pile
  place(50 + (rng() - 0.5) * 10, front - 22, 'gem', 0, 'plat', lt);
  for (let i = 0; i < 2; i++) {
    const tg = Mv.tags[i % Mv.tags.length];
    const t = place(22 + rng() * 56, front - 12 - rng() * 14, 'tag', 0, 'plat', lt);
    t.val = tg.val; t.col = tg.col;
  }
  // a mystery gift chest hides mid-pile
  place(30 + rng() * 40, front - 30 - rng() * 4, 'chest', 0, 'plat', lt);
  // real prizes ride the pile — deep enough that they take work to win
  Mv.prizeIds.forEach((pid, i) => {
    const pr = place(30 + i * 40 + (rng() - 0.5) * 8, front - 28 - rng() * 8, 'prize', 0, 'plat', lt);
    pr.pid = pid;
  });
  if (Mv.special === 'bill') {
    const b = place(35 + rng() * 30, front - 18, 'bill', 0, 'plat', lt);
    b.val = Mv.billVal;
  }
  // a second storey: coins resting on top of the pile
  const base = S.coins.filter(c => c.kind === 'coin' && c.tier === lt);
  for (let i = 0; i < Math.min(12, base.length); i++) {
    const under = base[(rng() * base.length) | 0];
    place(under.x + (rng() - 0.5) * 2, under.y + (rng() - 0.5) * 2, 'coin', 1, 'plat', lt);
  }
  // settle so nothing pops on the first frame, then sweep spillage
  for (let i = 0; i < 140; i++) step(1 / 60, true);
  for (let i = S.coins.length - 1; i >= 0; i--) {
    if (S.coins[i].st !== 'plat') S.coins.splice(i, 1);
  }
  S.trayPile = 0; S.lost = 0;
}
function reset() {
  // re-racks the current machine's pile; points/wallet/meter are global now
  S.combo = 0; S.lastCollect = -99; S.time = 0; S.phase = 0; S.cd = 0;
  S.floats.length = 0; S.parts.length = 0; S.rain.length = 0;
  S.banner = null; S.slotAnim = null; S.trayPile = 0; S.shake = 0;
  initPile();
  save();
}

// ------------------------------------------------------------- simulation
function findSupport(c, lay) {
  for (const o of S.coins) {
    if (o === c || o.st !== 'plat' || o.lay !== lay || o.tier !== c.tier) continue;
    const dx = o.x - c.x, dy = o.y - c.y;
    if (dx * dx + dy * dy < Math.pow((o.r + c.r) * 0.85, 2)) return o;
  }
  return null;
}
function landCoin(c, lay) {
  const td = M().tiers[c.tier];
  c.st = 'plat';
  c.lay = lay;
  c.z = td.z + lay * C.COIN_H;
  c.vz = 0; c.chk1 = false; c.chk2 = false;
  const pf = pusherFront(c.tier);
  c.y = Math.max(c.y, pf + c.r);
  c.vx += (rng() - 0.5) * 7;
  c.vy += (rng() - 0.5) * 5;
  SND.clink();
}

function step(dt, quiet) {
  S.time += dt;
  if (S.cd > 0) S.cd -= dt;
  if (S.denyT > 0) S.denyT -= dt;
  S.phase += dt * 2 * Math.PI / M().pushPeriod;
  S.shake = Math.max(0, S.shake - dt * 12);
  const Mv = M();
  const lt = lastTier();

  // the house always wins — coins only come from money. But when you're flat
  // broke (no coins, can't afford the smallest pack, nothing in the tray)
  // the arcade owner comps you a slow trickle so you're never stuck.
  if (S.wallet < 1 && S.money < C.PACKS[0].m && S.tray.coins < 1) {
    S.regen += dt;
    if (S.regen >= C.PITY_T) { S.regen = 0; S.wallet++; save(); }
  } else S.regen = 0;

  // jackpot rain queue
  for (let i = S.rain.length - 1; i >= 0; i--) {
    S.rain[i].t -= dt;
    if (S.rain[i].t <= 0) {
      const r = S.rain.splice(i, 1)[0];
      const c2 = spawnDrop(r.x, r.y, r.kind, r.kind === 'tag' ? r.tag : null);
      if (c2 && r.kind === 'prize') c2.pid = r.pid;
    }
  }
  if (S.slotAnim) { S.slotAnim.t += dt; if (S.slotAnim.t > 2.4) S.slotAnim = null; }
  if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) S.wheelAnim = null; }
  for (let i = S.pegFx.length - 1; i >= 0; i--) {
    S.pegFx[i].t -= dt;
    if (S.pegFx[i].t <= 0) S.pegFx.splice(i, 1);
  }

  for (const c of S.coins) {
    if (c.st === 'air') {
      // falling toward its target tier (from the slot, a hop, or the rain)
      const td = Mv.tiers[c.tier];
      const inBoard = Mv.pegs && c.tier === 0 && c.z > C.PEG_EXIT;
      // inside the peg board gravity is gentle and drag caps the fall speed,
      // so the pin-to-pin dance takes a visible second or two
      c.vz += (inBoard ? C.GRAV_PEG : C.GRAV) * dt;
      if (inBoard && c.vz > C.PEG_VCAP) c.vz = C.PEG_VCAP;
      c.z -= c.vz * dt;
      c.rot += c.vrot * dt;
      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.5 * dt);
      if (inBoard) {
        // Galton-board collision: reflect the velocity about the contact
        // normal with restitution, plus a whisper of chaos — the same tiny
        // contact differences that make every real Plinko path unique
        for (const pg of Mv.pegs) {
          const dx = c.x - pg.x, dz = c.z - pg.z;
          const d2 = dx * dx + dz * dz;
          if (d2 >= C.PEG_RR * C.PEG_RR || d2 < 0.0001) continue;
          const d = Math.sqrt(d2), nx = dx / d, nz = dz / d;
          c.x = pg.x + nx * C.PEG_RR;
          c.z = pg.z + nz * C.PEG_RR;
          let vx = c.vx, vzUp = -c.vz;      // board coords: z up
          const vn = vx * nx + vzUp * nz;
          if (vn < -3.5) {
            // solid strike: reflect about the normal with restitution
            const e = C.PEG_E + (rng() - 0.5) * 0.12;
            vx -= (1 + e) * vn * nx;
            vzUp -= (1 + e) * vn * nz;
            vx = vx * 0.98 + (rng() - 0.5) * 4;
            c.vx = vx; c.vz = -vzUp;
            c.vrot = (rng() - 0.5) * 16;
            c.pegHits++;
            S.pegFx.push({ x: pg.x, z: pg.z, t: 0.22 });
            if (!quiet) SND.ping();
          } else if (vn < 0) {
            // grazing/resting: kill the normal component and roll off the
            // pin toward whichever side the coin already leans
            vx -= vn * nx;
            vzUp -= vn * nz;
            // near the side rails the roll always leads back inward, so the
            // wall lane never becomes a pin-free funnel
            const s = c.x < 16 ? 1 : c.x > 84 ? -1
                    : dx !== 0 ? Math.sign(dx) : (rng() < 0.5 ? -1 : 1);
            vx += s * C.GRAV_PEG * Math.abs(nz) * dt * 0.8;
            c.vx = vx; c.vz = -vzUp;
          }
          if (c.vx > 26) c.vx = 26;
          if (c.vx < -26) c.vx = -26;
        }
      }
      c.x += c.vx * dt;
      c.vx *= Math.exp(-(inBoard ? 0.7 : 0.9) * dt);
      if (c.x < 9) { c.x = 9; c.vx = Math.abs(c.vx) * 0.45; }
      if (c.x > 91) { c.x = 91; c.vx = -Math.abs(c.vx) * 0.45; }
      if (inBoard) {
        // anti-wedge: a coin dithering in a pin pocket gets nudged free
        if (Math.abs(c.vz) < 4 && Math.abs(c.vx) < 4) c.stuckT = (c.stuckT || 0) + dt;
        else c.stuckT = 0;
        if (c.stuckT > 0.7) {
          c.stuckT = 0;
          c.vx += (rng() < 0.5 ? -1 : 1) * 14;
          c.vz = Math.max(c.vz, 8);
        }
      }
      // land ON the moving pusher shelf when it is underneath — the real
      // two-stage pusher action: ride the shelf, get scraped off later
      const pfA = pusherFront(c.tier);
      if (!c.chkP && c.z <= td.z + C.PUSH_H && c.z > td.z + C.PUSH_H - 3) {
        c.chkP = true;
        if (c.y < pfA - c.r * 0.3) {
          c.st = 'plat'; c.onPush = true; c.lay = 0;
          c.z = td.z + C.PUSH_H; c.vz = 0;
          c.vx += (rng() - 0.5) * 5;
          c.vy += (rng() - 0.5) * 3;
          if (!quiet) SND.clink();
          continue;
        }
      }
      if (!c.chk2 && c.z <= td.z + 2 * C.COIN_H) {
        c.chk2 = true;
        if (findSupport(c, 1)) { landCoin(c, 2); continue; }
      }
      if (!c.chk1 && c.z <= td.z + C.COIN_H) {
        c.chk1 = true;
        if (findSupport(c, 0)) { landCoin(c, 1); continue; }
      }
      if (c.z <= td.z) landCoin(c, 0);
    } else if (c.st === 'plat' && c.onPush) {
      // riding the pusher shelf: dragged forward as it extends; the fixed
      // back wall stops it riding back, so a retracting shelf slides out
      // from underneath until the coin tips off the front edge
      const td = Mv.tiers[c.tier];
      const pf = pusherFront(c.tier);
      const pv = pusherVel(c.tier);
      if (pv > 0) c.y += pv * dt;
      const fr = Math.exp(-C.FRICTION * dt);
      c.vx *= fr; c.vy *= fr;
      if (Math.abs(c.vx) < C.SETTLE) c.vx = 0;
      if (Math.abs(c.vy) < C.SETTLE) c.vy = 0;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < c.r) { c.x = c.r; c.vx *= -0.3; }
      if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }
      if (c.y < td.back + c.r * 0.5) c.y = td.back + c.r * 0.5;
      if (c.y > pf) {
        // scraped off the shelf edge — drop to the field below
        c.st = 'air'; c.onPush = false;
        c.vz = 0; c.chk1 = c.chk2 = false; c.chkP = true;
        c.vy = Math.max(c.vy, 6);
        c.vrot = (rng() - 0.5) * 8;
      }
    } else if (c.st === 'plat') {
      const td = Mv.tiers[c.tier];
      const isLast = c.tier === lt;
      const pf = pusherFront(c.tier);
      const pv = pusherVel(c.tier);
      if (c.y - c.r < pf) {
        c.y = pf + c.r;
        if (pv > 0) c.vy = Math.max(c.vy, pv);
      }
      const fr = Math.exp(-(c.kind === 'ball' ? 1.0 : C.FRICTION) * dt);
      c.vx *= fr; c.vy *= fr;
      const st = c.kind === 'ball' ? 0.15 : C.SETTLE;
      if (Math.abs(c.vx) < st) c.vx = 0;
      if (Math.abs(c.vy) < st) c.vy = 0;
      const front = tierFront(c.tier);
      // the incline lip: forward motion is resisted on the last stretch, so
      // coins stall teetering at the brink until the pile shoves them over
      if (isLast && c.lay === 0 && c.vy > 0 && c.y > front - Mv.lipW && c.y <= front) {
        c.vy = Math.max(0, c.vy - C.LIP_G * dt);
      }
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      // stacked coins ride their support and topple down when it slides away
      if (c.lay > 0) {
        const s = findSupport(c, c.lay - 1);
        if (s) {
          const k = Math.min(1, dt * 5);
          c.vx += (s.vx - c.vx) * k;
          c.vy += (s.vy - c.vy) * k;
        } else {
          c.lay--; c.z = td.z + c.lay * C.COIN_H;
          if (!quiet) SND.clink();
        }
      }
      // side walls; gutters only open on the payout tier
      if (!isLast || c.y < Mv.gutY) {
        if (c.x < c.r) { c.x = c.r; c.vx *= -0.3; }
        if (c.x > C.W - c.r) { c.x = C.W - c.r; c.vx *= -0.3; }
      } else if (c.x < C.GUT_LO || c.x > C.GUT_HI) {
        c.st = 'gutter'; c.vz = 0; c.vrot = (rng() - 0.5) * 14;
        S.lost++;
        if (!quiet) SND.thud();
        continue;
      }
      // over the edge: payout tier -> tray; upper tier -> hop down a level
      if (c.y > front) {
        if (isLast) {
          c.st = 'fall'; c.vz = 0; c.vrot = (rng() - 0.5) * 12 + Math.sign(c.vy || 1) * 4;
        } else {
          c.st = 'air'; c.tier++; c.vz = 0; c.chk1 = c.chk2 = false; c.chkP = true;
          c.vrot = (rng() - 0.5) * 8;
        }
      }
    } else if (c.st === 'fall') {
      c.vz += C.GRAV * dt;
      c.z -= c.vz * dt;
      c.y += c.vy * dt;
      c.vy *= Math.exp(-1.2 * dt);
      c.rot += c.vrot * dt;
      // the cabinet funnels everything that clears the front edge into the
      // tray — corner drops slide inward instead of missing the opening
      const fx2 = Math.max(22, Math.min(78, c.x));
      c.x += (fx2 - c.x) * Math.min(1, dt * 5);
      if (c.z <= C.TRAY_Z) {
        if (!c.scored) { c.scored = true; if (!quiet) scoreCoin(c); }
        c.z = C.TRAY_Z;
        c.vz = -c.vz * 0.42;
        c.bounces++;
        c.vrot *= 0.5;
        if (c.bounces >= 3 || c.vz > -25) { c.st = 'tray'; c.ttl = 1.5; c.z = C.TRAY_Z; }
        else if (!quiet) SND.clink();
      }
    } else if (c.st === 'gutter') {
      c.vz += C.GRAV * dt;
      c.z -= c.vz * dt;
      c.rot += c.vrot * dt;
    } else if (c.st === 'tray') {
      c.ttl -= dt;
    }
  }

  // coin vs coin — positional correction + impulse; same tier & layer only
  const cs = S.coins;
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < cs.length; i++) {
      const a = cs[i];
      if (a.st !== 'plat') continue;
      for (let j = i + 1; j < cs.length; j++) {
        const b = cs[j];
        if (b.st !== 'plat' || a.lay !== b.lay || a.tier !== b.tier || a.onPush !== b.onPush) continue;
        let dx = b.x - a.x, dy = b.y - a.y;
        const rr = a.r + b.r;
        const d2 = dx * dx + dy * dy;
        if (d2 >= rr * rr || d2 === 0) continue;
        const d = Math.sqrt(d2);
        const nx = dx / d, ny = dy / d;
        const overlap = rr - d;
        const ima = 1 / a.m, imb = 1 / b.m, ims = ima + imb;
        const corr = overlap * 0.8 / ims;
        a.x -= nx * corr * ima; a.y -= ny * corr * ima;
        b.x += nx * corr * imb; b.y += ny * corr * imb;
        const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
        const vn = rvx * nx + rvy * ny;
        if (vn < 0) {
          const jimp = -(1 + C.REST) * vn / ims;
          a.vx -= nx * jimp * ima; a.vy -= ny * jimp * ima;
          b.vx += nx * jimp * imb; b.vy += ny * jimp * imb;
        }
      }
    }
  }

  for (let i = cs.length - 1; i >= 0; i--) {
    const c = cs[i];
    if (c.st === 'gutter' && c.z < C.GUT_KILL) cs.splice(i, 1);
    else if (c.st === 'tray' && c.ttl <= 0) { cs.splice(i, 1); S.trayPile = Math.min(S.trayPile + 1, 14); }
  }

  for (let i = S.floats.length - 1; i >= 0; i--) {
    const f = S.floats[i];
    f.age += dt;
    if (f.age >= f.max) S.floats.splice(i, 1);
  }
  if (S.banner) {
    S.banner.ttl -= dt;
    if (S.banner.ttl <= 0) S.banner = null;
  }
  if (S.uiFlash) {
    S.uiFlash.t -= dt;
    if (S.uiFlash.t <= 0) S.uiFlash = null;
  }
  if (S.combo > 0 && S.time - S.lastCollect > C.COMBO_WIN) S.combo = 0;
}

function tick(dt) {
  dt = Math.min(dt, 0.05);
  const n = 2, sub = dt / n;
  for (let i = 0; i < n; i++) step(sub);
}

  function drawMeter(t) {
    const x = 70, y = 148, w = LW - 140, h = 15;
    const fr = S.meter / C.METER_MAX;
    rr(x - 4, y - 4, w + 8, h + 8, 9);
    ctx.fillStyle = '#1c0d13'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#6e4c1c'; ctx.stroke();
    if (fr > 0) {
      const pulse = fr > 0.8 ? 0.25 + 0.2 * Math.sin(t * 10) : 0;
      rr(x, y, Math.max(8, w * fr), h, 7);
      const g = ctx.createLinearGradient(x, 0, x + w, 0);
      g.addColorStop(0, '#ff9d3c'); g.addColorStop(1, '#ff4b2e');
      ctx.fillStyle = g; ctx.fill();
      if (pulse > 0) { ctx.fillStyle = 'rgba(255,240,180,' + pulse + ')'; ctx.fill(); }
    }
    txt('JACKPOT ' + S.meter + ' / ' + C.METER_MAX, LW / 2, y + h / 2 + 0.5,
        '800 11px Verdana, sans-serif', fr > 0.5 ? '#fff5d6' : '#caa25a');
  }

  function drawCabinet() {
    const T = M().theme;
    ctx.save();
    const g = ctx.createLinearGradient(0, 170, 0, 700);
    g.addColorStop(0, T.cabA); g.addColorStop(1, T.cabB);
    ctx.fillStyle = g;
    ctx.fillRect(4, 170, 22, 540);
    ctx.fillRect(LW - 26, 170, 22, 540);
    ctx.fillStyle = 'rgba(255,214,120,0.16)';
    ctx.fillRect(8, 170, 3, 540);
    ctx.fillRect(LW - 12, 170, 3, 540);

  }

  function drawBackWall(t) {
    const PF = PFC();
    const a = w2s(0, 0, M().tiers[0].z);
    ctx.save();
    const g = ctx.createLinearGradient(0, 172, 0, a.y);
    g.addColorStop(0, '#20242c'); g.addColorStop(1, '#3a4049');
    ctx.fillStyle = g;
    ctx.fillRect(26, 172, LW - 52, Math.max(10, a.y - 172));
    // neon chevron wall art (after the reference machine)
    if (M().pegs) {
      ctx.fillStyle = '#0d0a1c';
      ctx.fillRect(26, 172, LW - 52, Math.max(10, a.y - 172));
      const cols = ['#ff2d78', '#2da8ff', '#b02dff'];
      for (let i = 0; i < 3; i++) {
        const cx2 = 110 + i * 130;
        const col = cols[(i + Math.floor(t * 1.5)) % 3];
        for (const [lw2, al] of [[7, 0.18], [2.5, 0.9]]) {
          ctx.strokeStyle = col;
          ctx.globalAlpha = al;
          ctx.lineWidth = lw2;
          ctx.lineJoin = 'round';
          ctx.beginPath();
          ctx.moveTo(cx2 - 26, 226);
          ctx.lineTo(cx2, 206);
          ctx.lineTo(cx2 + 26, 226);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = '#12151a';
    ctx.fillRect(60, 186, LW - 120, 12);
    ctx.strokeStyle = '#565e69'; ctx.lineWidth = 1.5;
    ctx.strokeRect(60, 186, LW - 120, 12);
    const Mv = M();
    const slotY = Mv.tiers[0].slotY;
    const ap = w2s(S.aimX, slotY, Mv.tiers[0].z);
    const e = eyd(slotY);
    const u = (PF.w0 + (PF.w1 - PF.w0) * e) / 100;
    if (Mv.slots) {
      // three fixed coin mouths; the aimed one glows
      for (const sx of Mv.slots) {
        const mx = PF.cx + (sx - 50) * u;
        const active = Math.abs(sx - S.aimX) < 1;
        ctx.fillStyle = active ? (S.cd > 0 ? '#6e5320' : Mv.theme.accent) : '#3c4450';
        rr(mx - 12, 183, 24, 17, 5); ctx.fill();
        ctx.fillStyle = '#12151a';
        ctx.fillRect(mx - 6, 187, 12, 10);
        if (active) {
          ctx.fillStyle = 'rgba(99,231,255,0.16)';
          ctx.fillRect(mx - 9, 200, 18, ap.y - 200);
        }
      }
    } else {
      const gx = PF.cx + (S.aimX - 50) * u;
      const lg = ctx.createLinearGradient(0, 192, 0, ap.y);
      lg.addColorStop(0, 'rgba(255,222,120,0.55)');
      lg.addColorStop(1, 'rgba(255,222,120,0.03)');
      ctx.fillStyle = lg;
      ctx.fillRect(gx - 7, 192, 14, ap.y - 192);
      ctx.fillStyle = S.cd > 0 ? '#6e5320' : '#ffd75e';
      rr(gx - 10, 184, 20, 15, 4); ctx.fill();
      ctx.fillStyle = '#12151a';
      ctx.fillRect(gx - 5, 187, 10, 9);
    }
    // chrome peg board behind the glass
    if (Mv.pegs) {
      // backboard panel so the pin field reads as a vertical pachinko board
      const tl2 = w2s(11, slotY, (M().dropZ || C.DROP_Z) - 3), br2 = w2s(89, slotY, C.PEG_EXIT - 1);
      rr(tl2.x, tl2.y, br2.x - tl2.x, br2.y - tl2.y, 10);
      const bg2 = ctx.createLinearGradient(0, tl2.y, 0, br2.y);
      bg2.addColorStop(0, 'rgba(10,8,26,0.85)');
      bg2.addColorStop(1, 'rgba(16,12,38,0.35)');
      ctx.fillStyle = bg2; ctx.fill();
      for (const pg of Mv.pegs) {
        const pp = w2s(pg.x, slotY, pg.z);
        // pin shadow + chrome head with a specular dot
        ctx.beginPath(); ctx.arc(pp.x + 1, pp.y + 1.5, 4, 0, 7);
        ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
        const g2 = ctx.createRadialGradient(pp.x - 1.4, pp.y - 1.4, 0.4, pp.x, pp.y, 4.6);
        g2.addColorStop(0, '#ffffff'); g2.addColorStop(0.45, '#aeb9c8'); g2.addColorStop(1, '#3e4550');
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 4.1, 0, 7);
        ctx.fillStyle = g2; ctx.fill();
        ctx.beginPath(); ctx.arc(pp.x - 1.3, pp.y - 1.3, 1, 0, 7);
        ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
      }
      // impact flashes where a coin just struck a pin
      for (const fx of S.pegFx) {
        const pp = w2s(fx.x, slotY, fx.z);
        const a = fx.t / 0.22;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 5 + (1 - a) * 6, 0, 7);
        ctx.strokeStyle = 'rgba(255,240,170,' + (0.85 * a) + ')';
        ctx.lineWidth = 2; ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawTierFloor(y0, y1, z, scratches) {
    const T = M().theme;
    const p00 = w2s(0, y0, z), p10 = w2s(100, y0, z);
    const p01 = w2s(0, y1, z), p11 = w2s(100, y1, z);
    poly([p00, p10, p11, p01]);
    const g = ctx.createLinearGradient(0, p00.y, 0, p01.y);
    g.addColorStop(0, T.floorA);
    g.addColorStop(1, T.floorB);
    ctx.fillStyle = g; ctx.fill();
    if (scratches) {
      ctx.save();
      ctx.clip();
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = '#dfe5ee';
      ctx.lineWidth = 1;
      for (const s of SCRATCH) {
        if (s.y1 < y0 || s.y1 > y1) continue;
        const a = w2s(s.x1, s.y1, z), b = w2s(s.x2, s.y2, z);
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawGutters() {
    const Mv = M();
    const lt = lastTier();
    const front = tierFront(lt);
    for (const side of [0, 1]) {
      const x0 = side ? 100 : 0;
      const xin = side ? 96 : 4;
      const a = w2s(x0, Mv.gutY, 0), b = w2s(xin, Mv.gutY, 0);
      const c2 = w2s(xin, front, 0), d = w2s(x0, front, 0);
      poly([a, b, c2, d]);
      const gg = ctx.createLinearGradient(a.x, 0, b.x, 0);
      gg.addColorStop(side ? 1 : 0, 'rgba(8,6,10,0.9)');
      gg.addColorStop(side ? 0 : 1, 'rgba(8,6,10,0.0)');
      ctx.fillStyle = gg; ctx.fill();
    }
  }

  function drawLip() {
    const Mv = M();
    const lt = lastTier();
    const front = tierFront(lt);
    const a = w2s(0, front - Mv.lipW, 0), b = w2s(100, front - Mv.lipW, 0);
    const c2 = w2s(100, front, Mv.lipH), d = w2s(0, front, Mv.lipH);
    poly([a, b, c2, d]);
    const g = ctx.createLinearGradient(0, a.y, 0, c2.y);
    g.addColorStop(0, 'rgba(255,255,255,0.05)');
    g.addColorStop(1, 'rgba(255,255,255,0.22)');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(240,246,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
  }

  function drawPusherBlock(ti, t) {
    const td = M().tiers[ti];
    const pf = pusherFront(ti);
    const zTop = td.z + C.PUSH_H, zBot = td.z;
    const tl = w2s(1, td.back, zTop), tr = w2s(99, td.back, zTop);
    const fl = w2s(1, pf, zTop), frt = w2s(99, pf, zTop);
    const bl = w2s(1, pf, zBot), br = w2s(99, pf, zBot);
    poly([tl, tr, frt, fl]);
    const tg = ctx.createLinearGradient(0, tl.y, 0, fl.y);
    tg.addColorStop(0, '#8b93a0'); tg.addColorStop(1, '#b8bfca');
    ctx.fillStyle = tg; ctx.fill();
    ctx.save();
    ctx.clip();
    txt('▼ PUSH ▼', LW / 2, (tl.y + fl.y) / 2,
        '900 ' + Math.max(10, (fl.y - tl.y) * 0.5) + 'px Verdana, sans-serif', 'rgba(120,40,50,0.5)');
    ctx.restore();
    poly([fl, frt, br, bl]);
    const fg = ctx.createLinearGradient(0, fl.y, 0, bl.y);
    fg.addColorStop(0, '#697180'); fg.addColorStop(0.5, '#4c525e'); fg.addColorStop(1, '#33383f');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(230,238,250,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
    const on = Math.floor(t * 4) % 2 === 0;
    ctx.fillStyle = on ? '#ff5a4e' : '#5b2320';
    for (let i = 0; i < 8; i++) {
      const u = (i + 0.5) / 8;
      const x = fl.x + (frt.x - fl.x) * u;
      const y = (fl.y + bl.y) / 2;
      ctx.beginPath(); ctx.arc(x, y, 2.2, 0, 7); ctx.fill();
    }
  }

  // penny falls: the elevated shelf whose face pushes tier 1
  function drawShelf(t) {
    const Mv = M();
    const td0 = Mv.tiers[0];
    const face = pusherFront(1);
    drawTierFloor(td0.back, face, td0.z, false);
    // shelf front face descending to the lower field
    const fl = w2s(0, face, td0.z), frt = w2s(100, face, td0.z);
    const bl = w2s(0, face, 0), br = w2s(100, face, 0);
    poly([fl, frt, br, bl]);
    const fg = ctx.createLinearGradient(0, fl.y, 0, bl.y);
    fg.addColorStop(0, '#5a6270'); fg.addColorStop(1, '#292d34');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(230,238,250,0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(fl.x, fl.y); ctx.lineTo(frt.x, frt.y); ctx.stroke();
    drawPusherBlock(0, t);
  }

  const COIN_PAL = {
    gold: { edge: '#7d5a14', f0: '#ffedaa', f1: '#f2c04a', f2: '#ad7c1a', ring: 'rgba(122,84,14,0.55)', sym: 'rgba(136,94,18,0.85)' },
    copper: { edge: '#6e4226', f0: '#f0b98a', f1: '#c87f4a', f2: '#7d4a24', ring: 'rgba(94,52,24,0.6)', sym: 'rgba(94,52,24,0.9)' },
    silver: { edge: '#6f7680', f0: '#f4f7fa', f1: '#c3ccd6', f2: '#7e8894', ring: 'rgba(90,100,112,0.6)', sym: 'rgba(90,100,112,0.95)' },
    medal: { edge: '#8a5f10', f0: '#fff8cf', f1: '#ffd75e', f2: '#c78f18', ring: 'rgba(122,84,14,0.55)', sym: 'rgba(150,96,10,0.9)' },
  };

  function drawCoin(c, t) {
    const Mv = M();
    const inGut = c.st === 'gutter';
    // incline lip: visually climb the last stretch
    let zv = c.z;
    if (c.st === 'plat' && c.tier === lastTier()) {
      const front = tierFront(c.tier);
      const p = (c.y - (front - Mv.lipW)) / Mv.lipW;
      if (p > 0) zv += Math.min(p, 1) * Mv.lipH;
    }
    const p = w2s(c.x, Math.min(c.y, 108), zv);
    const u = p.u;
    const rx = c.r * u;
    let ry = rx * 0.46;
    let tumble = 1;
    if (c.st === 'fall' || inGut || c.st === 'air') {
      tumble = Math.max(0.22, Math.abs(Math.cos(c.rot)));
      ry = rx * 0.46 * tumble + rx * 0.10 * (1 - tumble);
    }
    // inside the pachinko board the coin rolls face-on against the glass —
    // a full round coin. It tips over into the flat view as it lands.
    let face = 0;
    if (c.st === 'air' && Mv.pegs && c.tier === 0) {
      face = Math.max(0, Math.min(1, (c.z - 10) / 8));
      ry += (rx - ry) * face;
    }
    if (c.st === 'plat') {
      const front = tierFront(c.tier);
      const over = (c.y - (front - c.r)) / c.r;
      if (over > 0) ry *= 1 + Math.min(over, 1) * 0.18;
    }
    ctx.save();
    if (inGut) ctx.globalAlpha = Math.max(0.1, 1 - (c.z / C.GUT_KILL) * 0.9);
    if (c.st === 'tray') ctx.globalAlpha = Math.max(0, Math.min(1, c.ttl / 0.6));
    // shadow (not for shelf-riders — they sit flush on the pusher top)
    if ((c.st === 'plat' || c.st === 'air') && !c.onPush) {
      const td = Mv.tiers[c.tier];
      if (c.z > td.z + 0.5) {
        const sp = w2s(c.x, Math.min(c.y, 108), td.z);
        ctx.beginPath();
        ctx.ellipse(sp.x, sp.y, rx * Math.max(0.4, 1 - (c.z - td.z) * 0.006), ry * Math.max(0.4, 1 - (c.z - td.z) * 0.006), 0, 0, 7);
        ctx.fillStyle = 'rgba(10,10,16,0.28)';
        ctx.fill();
      }
    }
    if (c.kind === 'gem') { drawGem(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'tag') { drawTag(c, p, rx, ry); ctx.restore(); return; }
    if (c.kind === 'bill') { drawBill(c, p, rx, ry); ctx.restore(); return; }
    if (c.kind === 'ball') { drawBall(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'prize' || c.kind === 'chest') { drawPrize(c, p, rx, t); ctx.restore(); return; }
    if (c.kind === 'chip') { drawChip(c, p, rx, ry, t, face); ctx.restore(); return; }
    const lucky = c.kind === 'lucky';
    const pal = lucky ? COIN_PAL.gold : (COIN_PAL[Mv.coin.style] || COIN_PAL.gold);
    const edgeH = Math.max(1.5, C.COIN_H * u * 0.5) * (0.5 + 0.5 * tumble) * (1 - face);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + edgeH, rx, ry, 0, 0, 7);
    ctx.fillStyle = pal.edge;
    ctx.fill();
    ctx.fillRect(p.x - rx, p.y, rx * 2, edgeH);
    ctx.fillStyle = 'rgba(60,38,6,0.5)';
    for (let i = -3; i <= 3; i++) {
      ctx.fillRect(p.x + i * rx / 3.6 - 0.5, p.y + edgeH * 0.2, 1, edgeH * 0.9);
    }
    const fg = ctx.createRadialGradient(p.x - rx * 0.35, p.y - ry * 0.5, rx * 0.1, p.x, p.y, rx * 1.25);
    if (lucky) {
      fg.addColorStop(0, '#fff8cf'); fg.addColorStop(0.45, '#ffdf6b'); fg.addColorStop(1, '#c78f18');
    } else {
      fg.addColorStop(0, pal.f0); fg.addColorStop(0.45, pal.f1); fg.addColorStop(1, pal.f2);
    }
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, 7);
    ctx.fillStyle = fg; ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = pal.ring;
    ctx.stroke();
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx * 0.68, ry * 0.68, 0, 0, 7);
    ctx.strokeStyle = pal.ring; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(p.x, p.y + 0.7, rx * 0.68, ry * 0.68, 0, 0, 7);
    ctx.strokeStyle = 'rgba(255,250,235,0.5)'; ctx.stroke();
    if (ry > 3) {
      // face-on coins visibly spin as they ricochet
      ctx.save();
      ctx.translate(p.x, p.y + 0.5);
      ctx.rotate(face * c.rot);
      txt(lucky ? '★' : Mv.coin.sym, 0, 0,
          '900 ' + Math.max(6, ry * 1.05) + 'px Georgia, serif', pal.sym);
      ctx.restore();
    }
    const gph = (t * 0.5 + c.glint) % (Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, rx * 0.9, ry * 0.9, 0, gph, gph + 0.9);
    ctx.strokeStyle = 'rgba(255,252,230,0.85)'; ctx.lineWidth = 1.6;
    ctx.stroke();
    if (lucky && (t * 0.9 + c.glint) % 2.3 < 0.12) {
      ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 1.4;
      const sx2 = p.x + rx * 0.4, sy2 = p.y - ry * 0.4;
      ctx.beginPath();
      ctx.moveTo(sx2 - 5, sy2); ctx.lineTo(sx2 + 5, sy2);
      ctx.moveTo(sx2, sy2 - 5); ctx.lineTo(sx2, sy2 + 5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGem(c, p, rx, t) {
    ctx.translate(p.x, p.y);
    const s = rx * 1.15;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.62);
    ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.lineTo(0, s * 0.62);
    ctx.lineTo(-s * 0.72, -s * 0.1);
    ctx.closePath();
    const g = ctx.createLinearGradient(-s, -s, s, s);
    g.addColorStop(0, '#d8fbff'); g.addColorStop(0.45, '#4ecbe8'); g.addColorStop(1, '#1b6fa8');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = '#0d3f66'; ctx.lineWidth = 1.4; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.72, -s * 0.1); ctx.lineTo(s * 0.72, -s * 0.1);
    ctx.moveTo(0, -s * 0.62); ctx.lineTo(0, s * 0.62);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1; ctx.stroke();
    if ((t + c.glint) % 1.6 < 0.14) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3 - 5, -s * 0.3); ctx.lineTo(-s * 0.3 + 5, -s * 0.3);
      ctx.moveTo(-s * 0.3, -s * 0.3 - 5); ctx.lineTo(-s * 0.3, -s * 0.3 + 5);
      ctx.stroke();
    }
  }

  function drawTag(c, p, rx, ry) {
    // a plastic value card lying on the pile
    const w = rx * 1.9, h = ry * 2.4;
    ctx.translate(p.x, p.y);
    ctx.fillStyle = 'rgba(10,10,16,0.3)';
    rr(-w / 2 + 1.5, -h / 2 + 2.5, w, h, 4); ctx.fill();
    rr(-w / 2, -h / 2, w, h, 4);
    ctx.fillStyle = c.col || '#43d17c'; ctx.fill();
    ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.stroke();
    rr(-w / 2 + 2.5, -h / 2 + 2.5, w - 5, h - 5, 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, -h / 2 + 4, 1.6, 0, 7);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    txt('' + c.val, 0, 2, '900 ' + Math.max(7, h * 0.42) + 'px Verdana, sans-serif', '#ffffff',
        'center', { w: 2.5, col: 'rgba(0,0,0,0.45)' });
  }

  function drawBill(c, p, rx, ry) {
    const w = rx * 2.1, h = ry * 2.1;
    ctx.translate(p.x, p.y);
    rr(-w / 2, -h / 2, w, h, 2);
    ctx.fillStyle = '#3f9d5a'; ctx.fill();
    ctx.lineWidth = 1.2; ctx.strokeStyle = '#1d5c31'; ctx.stroke();
    rr(-w / 2 + 2, -h / 2 + 2, w - 4, h - 4, 2);
    ctx.strokeStyle = 'rgba(230,255,235,0.5)'; ctx.stroke();
    // band wrap like the real gas-station pushers
    ctx.fillStyle = '#e8dfb0';
    ctx.fillRect(-w * 0.14, -h / 2, w * 0.28, h);
    txt('$', 0, 1, '900 ' + Math.max(7, h * 0.6) + 'px Georgia, serif', '#1d5c31');
  }

  function drawPrize(c, p, rx, t) {
    // a real prize riding the pile: soft base pad + the item, gently bobbing
    const pz = c.kind === 'chest' ? null : PRIZES.find(q => q.id === c.pid);
    const bob = c.st === 'plat' ? Math.sin(t * 2 + c.glint) * 1.2 : 0;
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.35, rx * 1.05, rx * 0.45, 0, 0, 7);
    ctx.fillStyle = 'rgba(20,12,8,0.45)'; ctx.fill();
    ctx.save();
    ctx.translate(p.x, p.y - rx * 0.4 + bob);
    if (c.st === 'fall' || c.st === 'air') ctx.rotate(Math.sin(c.rot) * 0.3);
    if (c.kind === 'chest' || !c.pid) txt('\u{1F381}', 0, 0, Math.round(rx * 2.4) + 'px serif', '#fff');
    else drawPIcon(c.pid, 0, 0, rx * 3.0);
    ctx.restore();
    // glow ring so it reads as the thing to win
    ctx.globalAlpha = 0.30 + 0.18 * Math.sin(t * 3 + c.glint);
    ctx.beginPath(); ctx.ellipse(p.x, p.y + rx * 0.3, rx * 1.25, rx * 0.55, 0, 0, 7);
    ctx.strokeStyle = c.kind === 'chest' ? '#ffb0e0' : '#ffe066';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawChip(c, p, rx, ry, t, face) {
    const edgeH = Math.max(1.5, C.COIN_H * p.u * 0.5) * (1 - (face || 0));
    ctx.beginPath(); ctx.ellipse(p.x, p.y + edgeH, rx, ry, 0, 0, 7);
    ctx.fillStyle = '#0c4a5e'; ctx.fill();
    ctx.fillRect(p.x - rx, p.y, rx * 2, edgeH);
    const g = ctx.createRadialGradient(p.x - rx * 0.3, p.y - ry * 0.4, rx * 0.1, p.x, p.y, rx * 1.2);
    g.addColorStop(0, '#e8fdff'); g.addColorStop(0.5, '#57d8f0'); g.addColorStop(1, '#1a7ca0');
    ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, 7);
    ctx.fillStyle = g; ctx.fill();
    // spinning rainbow rim marks it as a wheel token
    const hue = (t * 140 + c.glint * 60) % 360;
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'hsl(' + hue + ',95%,65%)';
    ctx.stroke();
    if (ry > 3) {
      txt('W', p.x, p.y + 0.5, '900 ' + Math.max(6, ry * 1.1) + 'px Verdana, sans-serif', 'rgba(8,50,66,0.9)');
    }
  }

  function drawBall(c, p, rx, t) {
    const g = ctx.createRadialGradient(p.x - rx * 0.3, p.y - rx * 0.3, rx * 0.1, p.x, p.y, rx * 1.2);
    g.addColorStop(0, '#ffffff'); g.addColorStop(0.4, '#63e7ff'); g.addColorStop(1, '#7a2ce8');
    ctx.beginPath(); ctx.arc(p.x, p.y, rx * 0.95, 0, 7);
    ctx.fillStyle = g; ctx.fill();
    ctx.globalAlpha = 0.4 + 0.25 * Math.sin(t * 6 + c.glint);
    ctx.beginPath(); ctx.arc(p.x, p.y, rx * 1.4, 0, 7);
    ctx.strokeStyle = '#63e7ff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    txt('B', p.x, p.y + 0.5, '900 ' + rx + 'px Verdana, sans-serif', 'rgba(40,10,80,0.7)');
  }

  function drawFrontAndTray() {
    const lt = lastTier();
    const front = tierFront(lt);
    const l = w2s(0, front, 0), r = w2s(100, front, 0);
    ctx.beginPath();
    ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y);
    ctx.lineTo(r.x + 4, 648); ctx.lineTo(l.x - 4, 648);
    ctx.closePath();
    const g = ctx.createLinearGradient(0, l.y, 0, 648);
    g.addColorStop(0, '#4b515c'); g.addColorStop(0.15, '#2c3138'); g.addColorStop(1, '#15171c');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(235,240,250,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y); ctx.stroke();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(l.x, l.y + 3); ctx.lineTo(r.x, r.y + 3);
    ctx.lineTo(r.x + 1, l.y + 12); ctx.lineTo(l.x - 1, l.y + 12);
    ctx.closePath(); ctx.clip();
    for (let x = l.x - 20; x < r.x + 20; x += 18) {
      ctx.fillStyle = 'rgba(240,190,60,0.5)';

      ctx.lineTo(x + 18, l.y + 2); ctx.lineTo(x + 9, l.y + 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    rr(58, 648, LW - 116, 52, 14);
    const tg = ctx.createLinearGradient(0, 648, 0, 700);
    tg.addColorStop(0, '#050507'); tg.addColorStop(1, '#1d1410');
    ctx.fillStyle = tg; ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#6e4c1c'; ctx.stroke();
    if (S.combo > 0 && S.time - S.lastCollect < C.COMBO_WIN) {
      ctx.save();

      rr(58, 648, LW - 116, 52, 14);
      ctx.fillStyle = '#ffae34'; ctx.fill();
      ctx.restore();
    }

  function drawBoardGlass(t) {
    const Mv = M();
    if (!Mv.pegs) return;
    const slotY = Mv.tiers[0].slotY;
    const tl = w2s(11, slotY, (Mv.dropZ || C.DROP_Z) - 3);
    const br = w2s(89, slotY, C.PEG_EXIT - 1);
    const x = tl.x, y = tl.y, w = br.x - tl.x, h = br.y - tl.y;
    ctx.save();
    rr(x, y, w, h, 10);
    ctx.clip();
    // cool glass tint, brighter at the edges like a real pane
    const g = ctx.createLinearGradient(0, y, 0, y + h);
    g.addColorStop(0, 'rgba(210,235,255,0.11)');
    g.addColorStop(0.5, 'rgba(210,235,255,0.03)');
    g.addColorStop(1, 'rgba(210,235,255,0.08)');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    // fixed diagonal reflections
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.08;
    poly([{ x: x + w * 0.10, y }, { x: x + w * 0.26, y }, { x: x - w * 0.06, y: y + h }, { x: x - w * 0.22, y: y + h }]);
    ctx.fill();
    poly([{ x: x + w * 0.68, y }, { x: x + w * 0.74, y }, { x: x + w * 0.50, y: y + h }, { x: x + w * 0.44, y: y + h }]);
    ctx.fill();
    // sweeping sheen
    const sx = x - 80 + ((t * 55) % (w + 160));
    ctx.globalAlpha = 0.13;
    poly([{ x: sx, y }, { x: sx + 24, y }, { x: sx - 22, y: y + h }, { x: sx - 46, y: y + h }]);
    ctx.fill();
    // marquee bulbs mirrored faintly in the top of the pane
    ctx.globalAlpha = 0.10;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(x + w * (0.14 + 0.18 * i), y + 9, 2.6, 0, 7);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // exit slit where the coins leave the board
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    rr(x + w * 0.08, y + h - 5, w * 0.84, 5, 2.5);
    ctx.fill();
    ctx.restore();
    // metal bezel with a catch-light on the glass edge
    rr(x - 2.5, y - 2.5, w + 5, h + 5, 12);
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#141b26';
    ctx.stroke();
    rr(x - 2.5, y - 2.5, w + 5, h + 5, 12);
    ctx.lineWidth = 2;
    ctx.strokeStyle = Mv.theme.trim;
    ctx.stroke();
    rr(x + 1, y + 1, w - 2, h - 2, 9);
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(220,244,255,0.5)';
    ctx.stroke();
    // corner screws
    for (const [cxs, cys] of [[x + 4, y + 4], [x + w - 4, y + 4], [x + 4, y + h - 4], [x + w - 4, y + h - 4]]) {
      const sg = ctx.createRadialGradient(cxs - 0.8, cys - 0.8, 0.3, cxs, cys, 2.6);
      sg.addColorStop(0, '#e8f0fa'); sg.addColorStop(1, '#3e4550');
      ctx.beginPath(); ctx.arc(cxs, cys, 2.3, 0, 7);
      ctx.fillStyle = sg; ctx.fill();
    }
  }

  function drawGlass(t) {
    ctx.save();
    ctx.beginPath();

    ctx.clip();

    ctx.fillStyle = '#ffffff';

    ctx.fill();

    const sx = ((t * 40) % (LW + 400)) - 200;
    ctx.globalAlpha = 0.09;
    poly([{ x: sx, y: 172 }, { x: sx + 60, y: 172 }, { x: sx - 130, y: 642 }, { x: sx - 190, y: 642 }]);

  function drawParticles(dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = S.parts.length - 1; i >= 0; i--) {
      const p = S.parts[i];
      p.life += dt;
      if (p.life >= p.max) { S.parts.splice(i, 1); continue; }
      p.vy += p.g * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      ctx.globalAlpha = 1 - p.life / p.max;
      ctx.fillStyle = p.col;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.spin * p.life * 4);
      ctx.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawFloats() {
    for (const f of S.floats) {
      const p = w2s(f.wx, f.wy, C.TRAY_Z);
      const k = f.age / f.max;
      const pop = k < 0.18 ? k / 0.18 : 1;
      const scl = (f.big ? 1.5 : 1) * (0.6 + 0.4 * pop);
      ctx.save();
      ctx.globalAlpha = Math.min(1, (1 - k) * 2);
      ctx.translate(p.x, p.y - 14 - k * 46);
      ctx.scale(scl, scl);
      txt(f.txt, 0, 0, '900 22px Verdana, sans-serif', f.col, 'center', { w: 5, col: 'rgba(30,10,5,0.9)' });
      ctx.restore();
    }
  }

  function drawBanner(t) {
    if (!S.banner) return;
    const b = S.banner;
    const k = 1 - b.ttl / b.max;
    const pop = k < 0.12 ? Math.sin((k / 0.12) * Math.PI / 2) : 1 + Math.sin(t * 9) * 0.04;
    ctx.save();
    ctx.globalAlpha = b.ttl < 0.5 ? b.ttl * 2 : 1;
    ctx.translate(LW / 2, 400);

    ctx.font = '900 54px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 10; ctx.strokeStyle = '#4a0f1a';
    ctx.strokeText(b.txt, 0, 0);
    const g = ctx.createLinearGradient(0, -30, 0, 30);
    g.addColorStop(0, '#fff6c8'); g.addColorStop(0.5, '#ffd24a'); g.addColorStop(1, '#ff8a2a');
    ctx.fillStyle = g;
    ctx.fillText(b.txt, 0, 0);
    ctx.restore();
  }

  function drawSlot(t) {
    if (!S.slotAnim) return;

  const WHEEL_COLS = ['#f2c04a', '#ef4b5d', '#37b6e6', '#b06be8'];
  function drawWheel() {
    if (!S.wheelAnim) return;
    const a = S.wheelAnim;
    // tap to dismiss once the result is in
    uiButtons.push({ x: 0, y: 0, w: LW, h: LH, cb: () => { if (a.t > 2.8) S.wheelAnim = null; } });
    ctx.fillStyle = 'rgba(5,3,8,0.72)';
    ctx.fillRect(0, 0, LW, LH);
    const cx = LW / 2, cy = 390, R = 132;
    // spin: four full turns easing out onto the winning segment
    const k = Math.min(1, a.t / 2.6);
    const ease = 1 - Math.pow(1 - k, 3);
    const target = (Math.PI * 2) * 4 + (-Math.PI / 2) - (a.seg + 0.5) * (Math.PI / 4);
    const rot = ease * target;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, R, i * Math.PI / 4, (i + 1) * Math.PI / 4);
      ctx.closePath();
      ctx.fillStyle = WHEEL_COLS[i % 4];
      ctx.fill();
      ctx.strokeStyle = 'rgba(20,8,4,0.6)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save();
      ctx.rotate((i + 0.5) * Math.PI / 4);
      txt(WHEEL[i].label, R * 0.62, 0, '900 13px Verdana, sans-serif', '#1d1016');
      ctx.restore();
    }
    ctx.restore();
    // hub + rim + pointer
    ctx.beginPath(); ctx.arc(cx, cy, R + 5, 0, 7);
    ctx.lineWidth = 8; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, 7);
    ctx.fillStyle = '#ffd75e'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - 14, cy - R - 16); ctx.lineTo(cx + 14, cy - R - 16); ctx.lineTo(cx, cy - R + 8);
    ctx.closePath();
    ctx.fillStyle = '#ff5a4e'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    txt('LUCKY WHEEL', cx, cy - R - 44, '900 26px Georgia, serif', '#ffd75e', 'center', { w: 5, col: '#3a1006' });
    if (a.t > 2.6) {
      const pop = 1 + Math.sin((a.t - 2.6) * 8) * 0.05;
      ctx.save();
      ctx.translate(cx, cy + R + 44);
      ctx.scale(pop, pop);
      txt(a.label, 0, 0, '900 30px Verdana, sans-serif', '#fff6c8', 'center', { w: 6, col: '#3a1006' });
      ctx.restore();
      txt('tap to continue', cx, cy + R + 76, '600 11px Verdana, sans-serif', '#c8a8b0');
    }
  }
