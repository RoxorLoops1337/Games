  function drawGame(t, dt) {
    drawBackground();
    drawMarquee(t);
    drawMeter(t);
    drawCabinet();
    drawBackWall(t);
    const Mv = M();
    const lt = lastTier();
    // payout tier floor + gutters + lip
    const tdL = Mv.tiers[lt];
    drawTierFloor(tdL.back, tierFront(lt), tdL.z, true);
    drawGutters();
    drawLip();
    if (lt > 0) drawShelf(t);
    else drawPusherBlock(0, t);
    const onPlat = [], offEdge = [];
    for (const c of S.coins) {
      (c.st === 'fall' || c.st === 'tray' || c.st === 'gutter' ? offEdge : onPlat).push(c);
    }
    const byDepth = (a, b) => (a.y + a.lay * 0.5) - (b.y + b.lay * 0.5);
    onPlat.sort(byDepth); offEdge.sort(byDepth);
    for (const c of onPlat) drawCoin(c, t);
    drawFrontAndTray();
    for (const c of offEdge) drawCoin(c, t);
    drawBoardGlass(t);
    drawGlass(t);
    drawParticles(dt);
    drawFloats();
    drawBanner(t);
    drawSlot(t);
    drawHUD(t, dt);
  }

  // ------------------------------------------------------------ lobby screen
  function drawMiniMachine(x, y, w, h, id, t) {
    const m = MACHINES[id];
    const T = m.theme;
    rr(x, y, w, h, 14);
    const g = ctx.createLinearGradient(0, y, 0, y + h);
    g.addColorStop(0, T.cabA); g.addColorStop(1, T.cabB);
    ctx.fillStyle = g; ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = T.trim; ctx.stroke();
    // marquee stripe with bulbs
    rr(x + 10, y + 8, w - 20, 30, 10);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    for (let i = 0; i < 7; i++) {
      const on = (i + Math.floor(t * 5)) % 3 === 0;
      ctx.beginPath(); ctx.arc(x + 20 + i * (w - 40) / 6, y + 13, 2.2, 0, 7);
      ctx.fillStyle = on ? '#ffe9a3' : 'rgba(0,0,0,0.4)'; ctx.fill();
    }
    txt(m.name, x + w / 2, y + 25, '900 15px Georgia, serif', T.titleA);
    // mini playfield with a coin pile
    const fx = x + 16, fy = y + 46, fw = w - 32, fh = h - 100;
    rr(fx, fy, fw, fh, 8);
    const fg = ctx.createLinearGradient(0, fy, 0, fy + fh);
    fg.addColorStop(0, T.floorA); fg.addColorStop(1, T.floorB);
    ctx.fillStyle = fg; ctx.fill();
    const pal = COIN_PAL[m.coin.style] || COIN_PAL.gold;
    for (let i = 0; i < 12; i++) {
      const cx2 = fx + 12 + ((i * 37) % (fw - 24));
      const cy2 = fy + fh - 10 - ((i * 13) % (fh - 26));
      ctx.beginPath(); ctx.ellipse(cx2, cy2 + 1.6, 6.5, 3, 0, 0, 7);
      ctx.fillStyle = pal.edge; ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2, cy2, 6.5, 3, 0, 0, 7);
      ctx.fillStyle = pal.f1; ctx.fill();
    }
    if (m.tiers.length > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.fillRect(fx + 4, fy + 8, fw - 8, fh * 0.32);
      txt('2-TIER', fx + fw / 2, fy + 8 + fh * 0.16, '800 10px Verdana, sans-serif', 'rgba(255,255,255,0.7)');
    }
    if (m.special === 'ball') txt('SLOT BONUS', fx + fw / 2, fy + fh * 0.24, '800 10px Verdana, sans-serif', T.accent);
    if (m.special === 'bill') txt('CASH BILLS', fx + fw / 2, fy + fh * 0.24, '800 10px Verdana, sans-serif', '#7ee787');
    txt(m.sub, x + w / 2, y + h - 40, '600 9px Verdana, sans-serif', T.sub);
  }

  function drawLobby(t) {
    const g = ctx.createRadialGradient(LW / 2, 260, 80, LW / 2, 420, 640);
    g.addColorStop(0, '#2a1520'); g.addColorStop(1, '#0b0609');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, LW, LH);
    // header
    const tg = ctx.createLinearGradient(0, 36, 0, 76);
    tg.addColorStop(0, '#fff0b8'); tg.addColorStop(1, '#b07a14');
    ctx.font = '900 36px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 6; ctx.strokeStyle = '#3a1006';
    ctx.strokeText('GOLD RUSH ARCADE', LW / 2, 52);
    ctx.fillStyle = tg;
    ctx.fillText('GOLD RUSH ARCADE', LW / 2, 52);
    txt('pick a machine • win points • collect prizes', LW / 2, 84, '700 13px Georgia, serif', '#e8b6be');
    // balances: points / coins / money
    rr(16, 104, LW - 32, 40, 12);
    ctx.fillStyle = 'rgba(20,10,14,0.8)'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#7d5a24'; ctx.stroke();
    txt('✦ ' + fmt(S.score), 76, 125, '800 15px Verdana, sans-serif', '#ffd75e');
    txt('● ' + fmt(S.wallet), 190, 125, '800 15px Verdana, sans-serif', '#f2c04a');
    txt(fmt$(S.money), 290, 125, '800 15px Verdana, sans-serif', '#7ee787');
    uiBtn(346, 109, 104, 30, '+ BUY COINS', () => { S.buyOpen = true; },
          { grad: ['#3f9d5a', '#1d5c31'], border: '#7ee787', col: '#eaffef', font: '800 11px Verdana, sans-serif', r: 9 });
    // daily gift
    const dayKey = new Date().toDateString();
    if (S.lastDaily !== dayKey) {
      const pulse = 0.6 + 0.4 * Math.sin(t * 4);
      uiBtn(120, 150, 240, 26, '\u{1F381} DAILY GIFT — CLAIM!', () => claimDaily(dayKey),
            { grad: ['#8c2f6b', '#4a1038'], border: 'rgba(255,176,224,' + pulse + ')',
              col: '#ffd9ee', font: '900 13px Verdana, sans-serif', r: 13 });
    } else {
      txt('daily gift claimed ✓', LW / 2, 163, '600 11px Verdana, sans-serif', '#6f8f78');
    }
    // machine cards
    const cw = 210, ch = 244;
    MACH_IDS.forEach((id, i) => {
      const x = 22 + (i % 2) * (cw + 16), y = 184 + Math.floor(i / 2) * (ch + 14);
      const m = MACHINES[id];
      const owned = S.unlocked.indexOf(id) >= 0;
      drawMiniMachine(x, y, cw, ch, id, t);
      if (owned) {
        uiBtn(x + 30, y + ch - 34, cw - 60, 26, 'PLAY', () => setMachine(id),
              { grad: ['#3f9d5a', '#1d5c31'], border: '#7ee787', col: '#eaffef', font: '900 14px Verdana, sans-serif' });
      } else {
        const afford = S.score >= m.unlock;
        uiBtn(x + 16, y + ch - 34, cw - 32, 26, '\u{1F512} ' + fmt(m.unlock) + ' pts',
              () => { if (!buyMachine(id)) { S.uiFlash = { msg: 'NEED ' + fmt(m.unlock) + ' POINTS', t: 1.2 }; SND.deny(); } },
              { bg: afford ? 'rgba(90,60,10,0.9)' : 'rgba(30,20,25,0.9)',
                border: afford ? '#ffd75e' : '#5a4048',
                col: afford ? '#ffe9a3' : '#8f6f78', font: '800 13px Verdana, sans-serif' });
      }
    });
    // bottom buttons
    uiBtn(28, 712, (LW - 72) / 2, 58, '\u{1F9F8}  PRIZE SHOP', () => { S.screen = 'shop'; },
          { grad: ['#8c1f2e', '#4a0f1a'], border: '#f2cd5e', font: '900 16px Verdana, sans-serif' });
    uiBtn(44 + (LW - 72) / 2, 712, (LW - 72) / 2, 58, '\u{1F3F7}\u{FE0F}  PUSHERBAY', () => { S.screen = 'store'; },
          { grad: ['#1d6d7a', '#0d3742'], border: '#63e7ff', col: '#d9fbff', font: '900 16px Verdana, sans-serif' });
    const nl = S.listings.length;
    if (nl) txt(nl + ' listing' + (nl > 1 ? 's' : '') + ' active', LW - 130, 792, '600 11px Verdana, sans-serif', '#63e7ff');
    txt('best haul: ' + fmt(S.best) + ' pts', 130, 792, '600 11px Verdana, sans-serif', '#8f6f78');
  }

  // ------------------------------------------------------------- shop screen
  function drawShop(t) {
    ctx.fillStyle = '#150a10';
    ctx.fillRect(0, 0, LW, LH);
    const g = ctx.createRadialGradient(LW / 2, 200, 60, LW / 2, 300, 560);
    g.addColorStop(0, '#33121e'); g.addColorStop(1, '#150a10');
    ctx.fillStyle = g; ctx.fillRect(0, 0, LW, LH);
    uiBtn(14, 14, 44, 38, '←', () => { S.screen = 'lobby'; }, { r: 10, font: '20px serif' });
    txt('PRIZE SHOP', LW / 2, 36, '900 30px Georgia, serif', '#ffd75e', 'center', { w: 5, col: '#3a1006' });
    txt('✦ ' + fmt(S.score) + ' pts to spend • prizes trade back at ' + Math.round(C.EXCHANGE * 100) + '%',
        LW / 2, 70, '800 13px Verdana, sans-serif', '#fff0c0');
    const cw = 146, chh = 168;
    const PER = 9;
    const pages = Math.ceil(PRIZES.length / PER);
    S.shopPage = Math.max(0, Math.min(S.shopPage || 0, pages - 1));
    const pageItems = PRIZES.slice(S.shopPage * PER, S.shopPage * PER + PER);
    pageItems.forEach((p, i) => {
      const x = 12 + (i % 3) * (cw + 9), y = 96 + Math.floor(i / 3) * (chh + 10);
      const afford = S.score >= p.cost;
      rr(x, y, cw, chh, 12);
      const cg = ctx.createLinearGradient(0, y, 0, y + chh);
      cg.addColorStop(0, afford ? '#31202a' : '#221820'); cg.addColorStop(1, '#170e14');
      ctx.fillStyle = cg; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = afford ? '#7d5a24' : '#40323a'; ctx.stroke();
      drawPIcon(p.id, x + cw / 2, y + 40, 58, '40px serif');
      txt(p.name, x + cw / 2, y + 78, '700 11px Verdana, sans-serif', afford ? '#f5e3c8' : '#8f7f88');
      txt('sells ~' + fmt$(p.base), x + cw / 2, y + 95, '600 10px Verdana, sans-serif', '#63b7c4');
      const owned = S.prizes[p.id] || 0;
      if (owned) {
        rr(x + cw - 34, y + 6, 28, 20, 8);
        ctx.fillStyle = '#3f9d5a'; ctx.fill();
        txt('×' + owned, x + cw - 20, y + 16, '800 11px Verdana, sans-serif', '#eaffef');
      }
      uiBtn(x + 8, y + chh - 44, owned ? cw - 62 : cw - 16, 32, '✦ ' + fmt(p.cost), () => buyPrize(p.id),
            { bg: afford ? 'rgba(140,90,20,0.9)' : 'rgba(40,30,36,0.9)',
              border: afford ? '#ffd75e' : '#5a4048',
              col: afford ? '#ffe9a3' : '#7a6a72', font: '800 12px Verdana, sans-serif' });
      if (owned) {
        // trade one back for points
        const xc = Math.round(p.cost * C.EXCHANGE);
        const short = xc >= 1000 ? (Math.round(xc / 100) / 10) + 'k' : '' + xc;
        uiBtn(x + cw - 50, y + chh - 44, 42, 32, '⇄' + short,
              () => exchangePrize(p.id),
              { bg: 'rgba(20,60,72,0.9)', border: '#37e6b0', col: '#eafff8', font: '800 9px Verdana, sans-serif' });
      }
    });
    // page flippers
    uiBtn(LW / 2 - 110, 648, 60, 36, '◀', () => { S.shopPage = (S.shopPage + pages - 1) % pages; },
          { bg: 'rgba(40,20,30,0.9)', border: '#7d5a24', font: '18px serif' });
    uiBtn(LW / 2 + 50, 648, 60, 36, '▶', () => { S.shopPage = (S.shopPage + 1) % pages; },
          { bg: 'rgba(40,20,30,0.9)', border: '#7d5a24', font: '18px serif' });
    txt('page ' + (S.shopPage + 1) + ' / ' + pages, LW / 2, 666, '800 13px Verdana, sans-serif', '#caa25a');
    if (S.uiFlash) {
      txt(S.uiFlash.msg, LW / 2, 820, '900 15px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#ffd75e');
    }
  }

  // ------------------------------------------------------------ store screen
  function drawStore(t, now) {
    ctx.fillStyle = '#0a141c';
    ctx.fillRect(0, 0, LW, LH);
    const g = ctx.createRadialGradient(LW / 2, 160, 60, LW / 2, 260, 560);
    g.addColorStop(0, '#10303c'); g.addColorStop(1, '#0a141c');
    ctx.fillStyle = g; ctx.fillRect(0, 0, LW, LH);
    uiBtn(14, 14, 44, 38, '←', () => { S.screen = 'lobby'; S.sellPick = null; }, { r: 10, font: '20px serif', border: '#2e6b7a' });
    txt('PusherBay', LW / 2, 36, '900 32px Georgia, serif', '#63e7ff', 'center', { w: 5, col: '#04222e' });
    txt('your online prize store • balance ' + fmt$(S.money), LW / 2, 70, '700 13px Verdana, sans-serif', '#a8d8de');
    // inventory
    txt('YOUR PRIZES — tap to list for sale', 24, 104, '800 12px Verdana, sans-serif', '#7fb8c4', 'left');
    const inv = Object.keys(S.prizes);
    if (!inv.length) {
      txt('no prizes yet — win points and visit the Prize Shop!', LW / 2, 150, '600 12px Verdana, sans-serif', '#5f8f9a');
    }
    inv.slice(0, 5).forEach((pid, i) => {
      const p = PRIZES.find(q => q.id === pid);
      const x = 20 + i * 90, y = 118;
      uiBtn(x, y, 82, 74, '', () => { S.sellPick = pid; S.sellQty = 1; },
            { bg: 'rgba(10,40,52,0.9)', border: S.sellPick === pid ? '#ffe066' : '#2e6b7a', r: 10 });
      drawPIcon(pid, x + 41, y + 26, 40, '28px serif');
      txt('×' + S.prizes[pid], x + 41, y + 56, '800 12px Verdana, sans-serif', '#d9fbff');
    });
    if (inv.length > 5) txt('+' + (inv.length - 5) + ' more', LW - 40, 155, '600 10px Verdana, sans-serif', '#5f8f9a');
    // active listings
    txt('LIVE LISTINGS (' + S.listings.length + '/' + C.LIST_MAX + ')', 24, 222, '800 12px Verdana, sans-serif', '#7fb8c4', 'left');
    S.listings.forEach((l, i) => {
      const p = PRIZES.find(q => q.id === l.pid);
      const y = 236 + i * 42;
      rr(20, y, LW - 40, 36, 9);
      ctx.fillStyle = 'rgba(10,40,52,0.85)'; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#2e6b7a'; ctx.stroke();
      drawPIcon(l.pid, 42, y + 18, 26, '18px serif');
      txt(p.name + (l.qty > 1 ? '  ×' + l.qty : ''), 62, y + 12, '700 11px Verdana, sans-serif', '#d9fbff', 'left');
      txt(fmt$(l.price) + ' ea', LW - 36, y + 12, '800 12px Verdana, sans-serif', '#ffe066', 'right');
      const left = Math.max(0, l.nextT - now);
      const frac = 1 - Math.min(1, left / (l.iv || 600e3));
      rr(62, y + 22, LW - 160, 7, 3.5);
      ctx.fillStyle = '#0a222c'; ctx.fill();
      rr(62, y + 22, Math.max(5, (LW - 160) * frac), 7, 3.5);
      ctx.fillStyle = '#37e6b0'; ctx.fill();
      const mins = Math.ceil(left / 60000);
      txt(left <= 0 ? 'selling…' : '~' + mins + 'm', LW - 36, y + 25, '600 9px Verdana, sans-serif', '#7fb8c4', 'right');
    });
    // sale log
    const ly = 236 + C.LIST_MAX * 42 + 14;
    txt('SOLD', 24, ly, '800 12px Verdana, sans-serif', '#7fb8c4', 'left');
    S.slog.slice(0, 5).forEach((s2, i) => {
      const p = PRIZES.find(q => q.id === s2.pid);
      drawPIcon(s2.pid, 34, ly + 22 + i * 24, 20, '14px serif');
      txt((p ? p.name : s2.pid) + '  →  @' + s2.buyer, 50, ly + 22 + i * 24,
          '600 11px Verdana, sans-serif', '#9fd4de', 'left');
      txt('+' + fmt$(s2.price), LW - 24, ly + 22 + i * 24, '800 12px Verdana, sans-serif', '#7ee787', 'right');
    });
    if (!S.slog.length) txt('nothing sold yet', 24, ly + 22, '600 11px Verdana, sans-serif', '#5f8f9a', 'left');
    // price + quantity picker popup
    if (S.sellPick && S.prizes[S.sellPick]) {
      const p = PRIZES.find(q => q.id === S.sellPick);
      const maxQ = Math.min(S.prizes[S.sellPick], 5);
      S.sellQty = Math.min(S.sellQty, maxQ);
      rr(50, 520, LW - 100, 264, 16);
      ctx.fillStyle = 'rgba(6,20,28,0.97)'; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = '#63e7ff'; ctx.stroke();
      drawPIcon(S.sellPick, LW / 2 - 90, 548, 30, '20px serif');
      txt(p.name, LW / 2 + 12, 548, '800 16px Verdana, sans-serif', '#d9fbff');
      // how many to list (one sells per interval)
      txt('quantity:', 96, 578, '600 11px Verdana, sans-serif', '#7fb8c4', 'left');
      for (let q = 1; q <= maxQ; q++) {
        uiBtn(160 + (q - 1) * 46, 564, 38, 28, '×' + q, () => { S.sellQty = q; },
              { bg: S.sellQty === q ? 'rgba(55,230,176,0.25)' : 'rgba(10,40,52,0.9)',
                border: S.sellQty === q ? '#37e6b0' : '#2e6b7a',
                col: '#eafff8', font: '800 12px Verdana, sans-serif', r: 8 });
      }
      C.SELL_TIERS.forEach((tr, i) => {
        const price = Math.round(p.base * tr.mul);
        const mins = Math.round(tr.dur / 60000) || 1;
        uiBtn(70, 604 + i * 44, LW - 140, 36,
              tr.name + '  ' + fmt$(price) + ' ea  (~' + mins + ' min each)',
              () => { listPrize(S.sellPick, i, Date.now(), S.sellQty); S.sellPick = null; },
              { bg: 'rgba(20,60,72,0.95)', border: '#37e6b0', col: '#eafff8', font: '800 12px Verdana, sans-serif' });
      });
      txt('sales pay MONEY — buy coin packs with it', LW / 2, 758, '600 10px Verdana, sans-serif', '#7fb8c4');
    }
    if (S.uiFlash) {
      txt(S.uiFlash.msg, LW / 2, 820, '900 15px Verdana, sans-serif',
          Math.floor(S.uiFlash.t * 8) % 2 ? '#ff5a4e' : '#63e7ff');
    }
  }

  // ------------------------------------------------------------------ loop
  let last = 0, saleT = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    const dt = Math.min((ts - last) / 1000 || 0.016, 0.05);
    last = ts;
    const now = Date.now();
    saleT += dt;
    if (saleT > 1) { saleT = 0; resolveSales(now); }
    if (S.screen === 'game') {
      tick(dt);
      if (held) {
        holdT += dt;
        if (holdT > 0.45 && S.cd <= 0) drop(S.aimX);
      }
    } else {
      // keep light UI timers alive outside the machine
      if (S.uiFlash) { S.uiFlash.t -= dt; if (S.uiFlash.t <= 0) S.uiFlash = null; }
      if (S.wheelAnim) { S.wheelAnim.t += dt; if (S.wheelAnim.t > 4.6) S.wheelAnim = null; }
    }
    uiButtons = [];
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    if (S.screen === 'game' && S.shake > 0.1) {
      ctx.translate((Math.random() - 0.5) * S.shake, (Math.random() - 0.5) * S.shake);
    }
    const t = S.screen === 'game' ? S.time : ts / 1000;
    if (S.screen === 'lobby') drawLobby(t);
    else if (S.screen === 'shop') drawShop(t);
    else if (S.screen === 'store') drawStore(t, now);
    else drawGame(t, dt);
    drawBuyModal();
    drawWheel();
  }
  requestAnimationFrame(frame);
})();

// particle burst — no-op headless, screen-space in the browser
function burst(wx, wy, wz, kind) {
  if (window.__cpBurst) window.__cpBurst(wx, wy, wz, kind);
}
</script>
