<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beatbox Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0c0a09; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body, html { overscroll-behavior: none; touch-action: manipulation; }
  #root { min-height: 100vh; }
  /* Center the mobile-frame layout on desktop */
  @media (min-width: 600px) {
    #root { display: flex; justify-content: center; align-items: flex-start; padding-top: 16px; }
    #root > * { max-width: 480px; width: 100%; min-height: calc(100vh - 32px); border-radius: 12px; overflow: hidden; box-shadow: 0 0 60px rgba(212, 160, 23, 0.1); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// === Polyfill window.storage with localStorage ===
// The artifact runtime provides window.storage; we emulate it for standalone use.
window.storage = {
  async get(key) {
    try {
      const value = localStorage.getItem('bbs:' + key);
      if (value === null) throw new Error('Key not found');
      return { key, value, shared: false };
    } catch (e) {
      throw e;
    }
  },
  async set(key, value, shared = false) {
    try {
      localStorage.setItem('bbs:' + key, value);
      return { key, value, shared };
    } catch (e) {
      console.error('storage.set failed', e);
      return null;
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem('bbs:' + key);
      return { key, deleted: true, shared: false };
    } catch (e) {
      return null;
    }
  },
  async list(prefix = '') {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('bbs:' + prefix)) {
        keys.push(k.substring(4));
      }
    }
    return { keys, prefix };
  },
};
</script>

<!-- The bundled game (built by `npm run build` from beatbox_story/main.jsx) -->
<script src="beatbox-story.bundle.js?v=2741f6d809" defer></script>
</body>
</html>
