<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Spijker Master</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#0e1526;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  #cv { position:fixed; inset:0; width:100%; height:100%; display:block; }
  #hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between;
    padding:calc(10px + env(safe-area-inset-top)) 14px 0; pointer-events:none; z-index:5; }
  .pill { background:rgba(10,16,32,.72); border:1px solid rgba(140,170,255,.25); color:#eaf0ff;
    border-radius:999px; padding:7px 14px; font-weight:700; font-size:15px; letter-spacing:.3px;
    box-shadow:0 2px 10px rgba(0,0,0,.35); }
  .pill b { color:#ffd76a; }
  #mute { pointer-events:auto; cursor:pointer; }
  #bub { position:fixed; z-index:4; transform:translate(-50%,-100%); pointer-events:none;
    background:#2f6bff; color:#fff; font-weight:900; font-size:18px; padding:4px 12px;
    border-radius:999px; border:2px solid #dce8ff; box-shadow:0 3px 12px rgba(0,0,30,.45);
    display:none; }
  #bub:after { content:''; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#dce8ff; border-bottom:0; }
  #vin { position:fixed; inset:0; z-index:7; pointer-events:none; opacity:0; transition:opacity .35s;
    background:radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(255,45,25,.55) 100%); }
  .pop { position:fixed; z-index:6; transform:translate(-50%,-50%); font-weight:900; font-size:26px;
    pointer-events:none; text-shadow:0 2px 6px rgba(0,0,0,.5); animation:popfly 1s ease-out forwards; }
  @keyframes popfly { 0%{opacity:0; margin-top:0; scale:.6} 15%{opacity:1; scale:1.15}
    100%{opacity:0; margin-top:-70px; scale:1} }
  #ov { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; background:radial-gradient(ellipse at 50% 35%, rgba(20,32,64,.55), rgba(6,10,22,.88));
    color:#fff; text-align:center; padding:20px; }
  #ovTitle { font-size:min(11vw,52px); font-weight:900; letter-spacing:1px; margin:0;
    background:linear-gradient(180deg,#fff,#9db8ff); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; filter:drop-shadow(0 4px 14px rgba(60,110,255,.45));
    animation:floaty 2.4s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0) rotate(-.6deg)} 50%{transform:translateY(-8px) rotate(.6deg)} }
  @keyframes btnpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.045)} }
  #ovSub { font-size:17px; color:#c7d4f5; max-width:340px; line-height:1.45; margin:0; white-space:pre-line; }
  #ovBtn { font-size:20px; font-weight:800; color:#fff; background:linear-gradient(180deg,#4f8bff,#2c5ae0);
    border:none; border-radius:16px; padding:15px 44px; cursor:pointer; letter-spacing:.5px;
    box-shadow:0 6px 0 #1c3da0, 0 10px 24px rgba(0,0,40,.5); transition:transform .08s;
    animation:btnpulse 1.7s ease-in-out infinite; }
  #ovBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #1c3da0; }
  #ovHint { font-size:13px; color:#8fa3cf; margin:4px 0 0; }
  #ovShop { font-size:15px; font-weight:800; color:#ffd76a; background:rgba(10,16,32,.72);
    border:1px solid rgba(255,215,106,.4); border-radius:12px; padding:10px 26px; cursor:pointer; }
  #ovAlt { display:none; font-size:14px; color:#8fa3cf; text-decoration:underline; cursor:pointer; padding:4px; }
  #tcard { position:fixed; top:22%; left:50%; transform:translateX(-50%); z-index:6; pointer-events:none;
    font-weight:900; font-size:min(7.5vw,34px); letter-spacing:1px; color:#fff; white-space:nowrap;
    text-shadow:0 3px 0 #1c3da0, 0 6px 18px rgba(0,0,30,.6); opacity:0; }
  #tcard.show { animation:tcard 2.6s ease forwards; }
  @keyframes tcard { 0%{opacity:0; transform:translateX(-50%) scale(.6)} 12%{opacity:1; transform:translateX(-50%) scale(1.08)}
    20%{transform:translateX(-50%) scale(1)} 80%{opacity:1} 100%{opacity:0; transform:translateX(-50%) translateY(-30px) scale(.95)} }
  #gift { background:rgba(10,16,32,.8); border:1px solid rgba(255,215,106,.45); border-radius:16px;
    padding:12px 22px; text-align:center; display:none; }
  #giftTitle { font-weight:900; font-size:16px; color:#ffd76a; letter-spacing:.5px; }
  #giftDots { font-size:13px; color:#ffd76a; letter-spacing:3px; margin:4px 0; }
  #giftSub { font-size:12px; color:#8fa3cf; margin-bottom:8px; }
  #giftBtn { font-size:16px; font-weight:900; color:#5a3c00; background:linear-gradient(180deg,#ffd76a,#e0a92f);
    border:none; border-radius:12px; padding:10px 26px; cursor:pointer; box-shadow:0 4px 0 #8a6a1a; }
  #giftBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #8a6a1a; }
  #shop { position:fixed; inset:0; z-index:12; display:none; align-items:center; justify-content:center;
    background:rgba(4,7,16,.6); }
  #shopPanel { background:rgba(8,13,28,.96); border:1px solid rgba(140,170,255,.3); border-radius:18px;
    padding:18px; width:min(92vw,360px); max-height:82vh; overflow-y:auto; color:#eaf0ff; }
  #shopTitle { margin:0 0 10px; font-size:20px; font-weight:900; color:#ffd76a; letter-spacing:1px; text-align:center; }
  .srow { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0;
    border-bottom:1px solid rgba(140,170,255,.12); }
  .sinfo b { color:#ffd76a; font-size:15px; display:block; }
  .sinfo span { color:#c7d4f5; font-size:12.5px; display:block; }
  .sinfo i { color:#5cff9b; font-style:normal; font-size:11px; letter-spacing:2px; }
  .sbuy { font-size:13px; font-weight:800; color:#fff; background:linear-gradient(180deg,#4f8bff,#2c5ae0);
    border:none; border-radius:10px; padding:9px 12px; cursor:pointer; white-space:nowrap; }
  .sbuy[disabled] { opacity:.45; } .sbuy[data-poor] { opacity:.55; }
  .shead { color:#ffd76a; font-size:12px; font-weight:800; letter-spacing:1.5px; margin:12px 0 6px; }
  .skinrow { display:flex; flex-wrap:wrap; gap:6px; }
  .schip { font-size:12px; font-weight:700; border-radius:10px; padding:7px 10px; cursor:pointer;
    border:1px solid rgba(140,170,255,.3); background:rgba(10,16,32,.72); color:#eaf0ff; }
  .schip em { display:block; font-style:normal; font-size:10px; color:#8fa3cf; }
  .schip.sel { border-color:#5cff9b; box-shadow:0 0 8px rgba(92,255,155,.35); }
  .skin0{color:#9fc2ff}.skin1{color:#e08a4e}.skin2{color:#ffd166}.skin3{color:#3dffa0}
  .skin4{background:linear-gradient(90deg,#ff6a6a,#ffd76a,#5cff9b,#6ab8ff,#c28bff); -webkit-background-clip:text;
    background-clip:text; -webkit-text-fill-color:transparent; border-color:rgba(255,255,255,.4); }
  .sgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .sgrid div { background:rgba(10,16,32,.72); border-radius:12px; padding:8px; text-align:center; }
  .sgrid b { font-size:17px; display:block; }
  .sgrid span { font-size:10.5px; color:#8fa3cf; text-transform:uppercase; letter-spacing:.5px; }
  #shopBack { width:100%; margin-top:12px; font-size:15px; font-weight:800; color:#fff;
    background:rgba(60,80,140,.5); border:1px solid rgba(140,170,255,.3); border-radius:12px;
    padding:11px; cursor:pointer; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span class="pill">Level <b id="lvl">1</b></span>
  <span class="pill" id="mute">🔊</span>
  <span class="pill" id="music">🎵</span>
  <span class="pill">🪙 <b id="coins">0</b></span>
</div>
<div id="tcard"></div>
<div id="bub">5</div>
<div id="vin"></div>
<div id="ov">
  <h1 id="ovTitle">SPIJKER MASTER</h1>
  <p id="ovSub">Steer your nails. Pick the best gates.\nHammer them home for coins!</p>
  <div id="gift">
    <div id="giftTitle">🎁 DAILY GIFT</div>
    <div id="giftDots">●○○○○○○</div>
    <div id="giftSub"></div>
    <button id="giftBtn">CLAIM</button>
  </div>
  <button id="ovBtn">PLAY</button>
  <button id="ovShop">🛠 THE NAIL AISLE</button>
  <span id="ovAlt"></span>
  <p id="ovHint">drag left / right to steer</p>
</div>
<div id="shop">
  <div id="shopPanel">
    <h2 id="shopTitle">THE NAIL AISLE</h2>
    <div id="shopRows"></div>
    <button id="shopBack">BACK</button>
  </div>
</div>
<script src="three.min.js"></script>
<script>
'use strict';
/* ============================================================
   SPIJKER MASTER — a 3D crowd-runner. You herd a swarm of nails
   (spijkers) down a workbench: multiply through gates, dodge
   saws/hammers/spike strips, brawl rival screw-crowds, and get
   hammered into the multiplier plank at the end.

   The SIM section below is fully headless-safe (no THREE, no
   real DOM needed) — tests/spijker_master.test.mjs drives it
   through window.SM. All rendering lives behind HEADLESS.
   ============================================================ */

// ---------------------------- SIM ----------------------------
const C = {
  TRACK_W: 9, XMAX: 3.6,
  SPEED: 10,
  START: 5,
  CAP: 2000,       // hard crowd cap
  VIS: 240,        // rendered instance cap per crowd
  FIGHT_TICK: 0.055,
  STEP_D: 2.2, STEP_H: 0.55,                       // finish stair size
  STEPS: [0, 10, 25, 50, 90, 150, 250, 400, 650, 1000], // count needed per ×mult
  MILESTONES: [25, 50, 100, 250, 500, 1000],       // crowd sizes worth celebrating
};

const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

// deterministic per-level rng (mulberry32)
function rngf(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function applyOp(c, op) {
  if (op.t === 'mul') return c * op.v;
  if (op.t === 'add') return c + op.v;
  if (op.t === 'sub') return c - op.v;
  return Math.max(1, Math.floor(c / op.v)); // div never zeroes you
}
const opLabel = (op) =>
  op.t === 'mul' ? '×' + op.v : op.t === 'add' ? '+' + op.v :
  op.t === 'sub' ? '−' + op.v : '÷' + op.v;
const opGood = (op) => op.t === 'mul' || op.t === 'add';

// Content unlock schedule: L1 teaches steering + saw/spikes; L2 golden nails +
// mid foes; L3 hammer; L4 golden gates; L6 mystery gates; L7 pendulum;
// L8 flanking; L16+ spicy numbers. Stairs & bosses calibrate to the player's
// actual start count so upgrades raise the ceiling, not just the floor.
function genLevel(lv, start) {
  start = start || C.START;
  const r = rngf((lv * 2654435761 + 7) % 4294967296);
  const len = Math.min(900, 240 + lv * 28);
  const gates = [], hazards = [], foes = [];
  let e = start, ePerf = start, z = 34; // e: sloppy-player estimate, ePerf: perfect play
  let goldenPlaced = false, mystCount = 0;
  while (z < len - 80) {
    const roll = r();
    if (roll < (lv <= 2 ? 0.62 : 0.52)) {
      // rare GOLDEN pair: both sides good, one huge — pure spectacle + choice
      if (lv >= 4 && !goldenPlaced && z > len * 0.40 && r() < 0.10) {
        goldenPlaced = true;
        const huge = { t: 'mul', v: lv < 12 ? 3 : (lv < 20 ? 4 : 5) };
        const small = { t: 'add', v: Math.min(60, 10 + lv + Math.floor(r() * 6)) };
        const ggs = r() < 0.5 ? -1 : 1;
        gates.push({ z, side: ggs, op: huge, used: false, gold: true });
        gates.push({ z, side: -ggs, op: small, used: false, gold: true });
        e = Math.max(1, Math.round(applyOp(e, small)));
        ePerf = Math.min(C.CAP, Math.round(applyOp(ePerf, huge)));
        z += 30 + r() * 18;
        continue;
      }
      // normal pair: one clearly good, one punishing (or a mystery gamble)
      let good;
      if (r() < 0.35 + Math.min(0.25, lv * 0.012)) good = { t: 'mul', v: r() < 0.75 ? 2 : 3 };
      else good = { t: 'add', v: 4 + Math.floor(r() * (8 + lv * 2)) };
      let bad = r() < 0.5
        ? { t: 'sub', v: 2 + Math.floor(r() * (4 + Math.min(lv, 14))) }
        : { t: 'div', v: (lv >= 16 && r() < 0.30) ? 3 : 2 };
      let myst = false;
      if (lv >= 6 && mystCount < 2 && r() < 0.18) {
        // mystery '?' gate: outcome pre-rolled here (deterministic), hidden until hit
        myst = true; mystCount++;
        const q = r();
        bad = q < 0.40 ? { t: 'add', v: 6 + Math.floor(r() * (10 + 2 * lv)) }
            : q < 0.65 ? { t: 'mul', v: 2 }
            : q < 0.75 ? { t: 'mul', v: 3 }
            : q < 0.90 ? { t: 'sub', v: 3 + Math.floor(r() * Math.min(lv, 12)) }
            : { t: 'div', v: 2 };
      }
      const gs = r() < 0.5 ? -1 : 1;
      gates.push({ z, side: gs, op: good, used: false });
      gates.push({ z, side: -gs, op: bad, used: false, myst });
      e = Math.max(1, Math.round(applyOp(e, good) * 0.82)); // imperfect-player estimate
      ePerf = Math.min(C.CAP, Math.round(applyOp(ePerf, good)));
      z += 30 + r() * 18;
    } else if (roll < 0.78 || e < 6 || z < 120 || lv < 2) {
      // (a too-early or too-big rival crowd would be a guaranteed wipe,
      //  so those rolls fall back to a hazard)
      const ht = r();
      if (lv < 3) { // teaching levels: only the two dodgeable-on-sight hazards
        if (ht < 0.5) hazards.push({ k: 'saw', z, ph: r() * 6.28, sp: 1.1 + r() * 0.9 });
        else hazards.push({ k: 'spikes', z, x: (r() * 2 - 1) * 2.2, w: 2.6 });
      } else if (lv < 7) {
        if (ht < 0.4) hazards.push({ k: 'saw', z, ph: r() * 6.28, sp: 1.1 + r() * 0.9 });
        else if (ht < 0.7) hazards.push({ k: 'spikes', z, x: (r() * 2 - 1) * 2.2, w: 2.6 });
        else hazards.push({ k: 'hammer', z, period: 1.5 + r() * 0.5, ph: r(), prev: 0 });
      } else {
        if (ht < 0.30) hazards.push({ k: 'saw', z, ph: r() * 6.28, sp: 1.1 + r() * 0.9 });
        else if (ht < 0.55) hazards.push({ k: 'spikes', z, x: (r() * 2 - 1) * 2.2, w: 2.6 });
        else if (ht < 0.78) hazards.push({ k: 'hammer', z, period: 1.5 + r() * 0.5, ph: r(), prev: 0 });
        else hazards.push({ k: 'pend', z, w: 2.4 + r() * 0.8, ph: r() * 6.28 });
      }
      e = Math.max(1, Math.round(e * 0.9));
      ePerf = Math.max(1, Math.round(ePerf * 0.97)); // even aces clip a saw tooth now and then
      z += 26 + r() * 12;
    } else {
      const fc = Math.min(Math.round(e * 0.6), Math.max(2, Math.round(e * (0.3 + r() * 0.3))));
      foes.push({ z, x: (r() * 2 - 1) * 1.6, count: fc, alive: true, boss: false });
      e = Math.max(1, e - fc);
      ePerf = Math.max(1, ePerf - fc);
      z += 30 + r() * 14;
    }
  }
  // boss crowd guards the plank
  const bc = Math.max(4, Math.round(e * ((lv >= 16 ? 0.60 : 0.55) + r() * 0.25) + lv * (lv >= 16 ? 3 : 2)));
  foes.push({ z: len - 45, x: 0, count: bc, alive: true, boss: true });
  ePerf = Math.max(1, ePerf - bc);
  // stair thresholds scale to THIS level: a near-perfect run tops out at ×10
  const top = Math.max(15, Math.round(ePerf * (lv <= 3 ? 0.75 : 0.85)));
  const t1 = Math.max(3, Math.round(top * 0.05));
  const ratio = Math.pow(top / t1, 1 / 8);
  const steps = [0];
  for (let i = 1; i < 10; i++) {
    steps.push(Math.max(steps[i - 1] + 1, Math.round(t1 * Math.pow(ratio, i - 1))));
  }
  // golden nail pickups (drawn last so the layout above keeps its tuning)
  const picks = [];
  if (lv >= 2) {
    picks.push({ z: 60 + r() * (len * 0.35), x: (r() * 2 - 1) * 2.8, taken: false });
    if (lv >= 5 && r() < 0.5) picks.push({ z: len * 0.55 + r() * (len * 0.30), x: (r() * 2 - 1) * 2.8, taken: false });
  }
  return { len, gates, hazards, foes, finishZ: len - 18, steps, picks };
}

// sunflower formation: unit i -> lateral/forward offset from the leader
function fOff(i) {
  let rr = 0.42 * Math.sqrt(i);
  if (rr > 3.3) rr = Math.min(4.4, 3.3 + (rr - 3.3) * 0.22); // compress the outer rings
  const th = i * 2.399963;
  return [rr * Math.cos(th), rr * Math.sin(th) * 0.85];
}

let S = null;
const hooks = { level: null, hud: null, over: null, skin: null }; // render layer plugs in here

function save() {
  try {
    localStorage.setItem('sm_lv', '' + S.nextLv);
    localStorage.setItem('sm_coins', '' + S.coins);
  } catch (e) {}
}
function lsInt(k) { try { return parseInt(localStorage.getItem(k) || '0', 10) || 0; } catch (e) { return 0; } }
function lsSet(k, v) { try { localStorage.setItem(k, '' + v); } catch (e) {} }

// --- permanent upgrades (bought with earned coins only) ---
const UPG = {
  crowd: { name: 'NAIL PACK',   max: 10, costs: [100, 160, 260, 410, 660, 1050, 1680, 2680, 4290, 6870],
    desc: (l) => 'Start with ' + (C.START + 2 * l) + ' nails' },
  tips:  { name: 'STEEL TIPS',  max: 6,  costs: [150, 300, 600, 1200, 2400, 4800],
    desc: (l) => 'Brawl damage +' + (15 * l) + '%' },
  grip:  { name: 'GOLDEN GRIP', max: 5,  costs: [250, 500, 1000, 2000, 4000],
    desc: (l) => 'Plank coins +' + (10 * l) + '%' },
};
function upgLevels() { return { crowd: lsInt('sm_u_crowd'), tips: lsInt('sm_u_tips'), grip: lsInt('sm_u_grip') }; }
function startCount() { return C.START + 2 * lsInt('sm_u_crowd'); }
function buyUpg(id) {
  const u = UPG[id], l = lsInt('sm_u_' + id);
  if (!u || l >= u.max) return false;
  const cost = u.costs[l];
  const coins = S ? S.coins : loadMeta().coins;
  if (coins < cost) return false;
  if (S) S.coins = coins - cost;
  lsSet('sm_coins', coins - cost);
  lsSet('sm_u_' + id, l + 1);
  if (hooks.hud) hooks.hud();
  return true;
}

// --- crowd skins (cosmetic; material specs live in the render layer) ---
const SKINS = [
  { id: 0, name: 'Bench Steel',   price: 0,     flavor: 'Fresh from the box: straight, true, dependable.' },
  { id: 1, name: 'Copper Crew',   price: 750,   flavor: 'Warm-rolled copper with a hand-hammered glow.' },
  { id: 2, name: 'Gold Standard', price: 2500,  flavor: 'Solid gold. Even the mallet is impressed.' },
  { id: 3, name: 'Neon Pulse',    price: 6000,  flavor: 'Glow-in-the-dark hardware from the future aisle.' },
  { id: 4, name: 'Prisma',        price: 15000, flavor: 'Every color of the rainbow, one nail at a time.' },
];
function ownedSkins() {
  try { return (localStorage.getItem('sm_owned') || '0').split(',').map(Number); } catch (e) { return [0]; }
}
function curSkin() { return lsInt('sm_skin'); }
function buySkin(id) { // buys if needed, then selects; returns true on select
  const sk = SKINS[id];
  if (!sk) return false;
  const owned = ownedSkins();
  if (!owned.includes(id)) {
    const coins = S ? S.coins : loadMeta().coins;
    if (coins < sk.price) return false;
    if (S) S.coins = coins - sk.price;
    lsSet('sm_coins', coins - sk.price);
    owned.push(id);
    lsSet('sm_owned', owned.join(','));
  }
  lsSet('sm_skin', id);
  if (hooks.hud) hooks.hud();
  if (hooks.skin) hooks.skin();
  return true;
}

// --- daily gift & streak (date string injected: the sim never reads the clock) ---
const DAILY = [0, 100, 150, 225, 350, 500, 750, 1000];
function dailyState(today) {
  let last = null;
  try { last = localStorage.getItem('sm_day'); } catch (e) {}
  const streak = lsInt('sm_streak');
  if (last === today) return { claimable: false, streak };
  const diff = last ? Math.round((Date.parse(today) - Date.parse(last)) / 86400000) : 99;
  const ns = diff === 1 ? streak + 1 : 1;
  return { claimable: true, streak: ns, reward: DAILY[Math.min(ns, 7)], reset: diff >= 2 && streak >= 2 };
}
function claimDaily(today) {
  const d = dailyState(today);
  if (!d.claimable) return null;
  const coins = (S ? S.coins : loadMeta().coins) + d.reward;
  if (S) S.coins = coins;
  lsSet('sm_coins', coins);
  try { localStorage.setItem('sm_day', today); } catch (e) {}
  lsSet('sm_streak', d.streak);
  if (hooks.hud) hooks.hud();
  return d;
}
function loadMeta() {
  let lv = 1, coins = 0, mute = false;
  try {
    lv = parseInt(localStorage.getItem('sm_lv') || '1', 10) || 1;
    coins = parseInt(localStorage.getItem('sm_coins') || '0', 10) || 0;
    mute = localStorage.getItem('sm_mute') === '1';
  } catch (e) {}
  return { lv, coins, mute };
}

function newRun(lv) {
  const meta = S ? { coins: S.coins, mute: S.mute } : loadMeta();
  const upg = upgLevels();
  const start = C.START + 2 * upg.crowd;
  S = {
    phase: 'run', lv, nextLv: lv, upg,
    coins: meta.coins, mute: meta.mute,
    z: 0, zPrev: 0, x: 0, tx: 0,
    count: start, peak: start, revived: false,
    time: 0, fight: null, fightT: 0,
    finT: 0, finTarget: 0, res: null, planted: 0, slamT: 0,
    events: [],
    lvl: genLevel(lv, start),
  };
  lsSet('sm_s_runs', lsInt('sm_s_runs') + 1);
  if (hooks.level) hooks.level();
  pushEv({ t: 'title', lv });
  if (hooks.hud) hooks.hud();
  return S;
}

function pushEv(ev) {
  S.events.push(ev);
  if (S.events.length > 300) S.events.splice(0, S.events.length - 300);
}

function killN(n, x, z, side, src) {
  n = Math.min(n, S.count);
  if (n <= 0) return;
  S.count -= n;
  pushEv({ t: 'kill', n, x, z, side: side || 'p', src });
  if (S.count <= 0) doLose();
}

function doLose() {
  S.count = Math.max(0, S.count);
  S.phase = 'lose';
  lsSet('sm_coins', S.coins); // golden-nail pickups survive a wipe
  if (S.peak > lsInt('sm_s_peak')) lsSet('sm_s_peak', S.peak);
  pushEv({ t: 'lose' });
  if (hooks.over) hooks.over();
}

// once per level: half your peak crowd gets straightened back up
function revive() {
  if (!S || S.phase !== 'lose' || S.revived) return false;
  S.revived = true;
  S.upg = upgLevels(); // upgrades bought on the lose overlay apply to the revived run
  S.count = Math.max(10, Math.ceil(S.peak * 0.5));
  if (S.fight) { S.fight.alive = false; S.fight = null; } // whoever got you is cleared
  S.z += 4; S.zPrev = S.z; S.tx = 0; S.x = 0;             // and you respawn past the scene
  S.phase = 'run';
  pushEv({ t: 'revive', n: S.count });
  if (hooks.hud) hooks.hud();
  return true;
}

function applyGate(g) {
  g.used = true;
  const before = S.count;
  S.count = clamp(Math.round(applyOp(S.count, g.op)), 0, C.CAP);
  pushEv({ t: 'gate', good: opGood(g.op), d: S.count - before, x: g.side * C.TRACK_W / 4, z: g.z,
    gold: !!g.gold, myst: !!g.myst, label: opLabel(g.op) });
  if (S.count > S.peak) S.peak = S.count;
  let mile = 0;
  for (const th of C.MILESTONES) if (before < th && S.count >= th) mile = th;
  if (mile) pushEv({ t: 'milestone', v: mile });
  if (S.count <= 0) doLose();
}

// how many units currently satisfy pred(ux, uz, uzPrev)
function countIn(pred) {
  let k = 0;
  for (let i = 0; i < S.count; i++) {
    const o = fOff(i);
    const ux = clamp(S.x + o[0], -C.XMAX, C.XMAX);
    if (pred(ux, S.z + o[1], S.zPrev + o[1])) k++;
  }
  return k;
}

function sawX(h) { return Math.sin(S.time * h.sp + h.ph) * 2.5; }
function hammerPhase(h) { return (S.time / h.period + h.ph) % 1; }
function pendS(h) { return Math.sin(S.time * h.w + h.ph); }
function pendX(h) { return 4.2 * Math.sin(0.9 * pendS(h)); }

function startFinish() {
  const T = S.lvl.steps || C.STEPS;
  let step = 0;
  while (step + 1 < T.length && S.count >= T[step + 1]) step++;
  const mult = step + 1;
  if (S.count > S.peak) S.peak = S.count; // the crowd that reaches the plank counts
  S.res = { step, mult, start: S.count, gain: Math.round(S.count * mult * (1 + 0.10 * S.upg.grip)) };
  S.finTarget = S.lvl.finishZ + (step + 0.5) * C.STEP_D;
  S.phase = 'finish';
  S.finT = 0; S.planted = 0; S.slamT = 0;
  pushEv({ t: 'finish' });
}

function doWin() {
  S.coins += S.res.gain;
  S.nextLv = S.lv + 1;
  S.phase = 'win';
  save();
  lsSet('sm_s_wins', lsInt('sm_s_wins') + 1);
  lsSet('sm_s_planted', lsInt('sm_s_planted') + S.res.start);
  if (S.peak > lsInt('sm_s_peak')) lsSet('sm_s_peak', S.peak);
  pushEv({ t: 'win' });
  if (hooks.hud) hooks.hud();
  if (hooks.over) hooks.over();
}

function tick(dt) {
  if (!S) return;
  S.time += dt;

  if (S.phase === 'run') {
    S.x += (S.tx - S.x) * Math.min(1, dt * 10);
    S.zPrev = S.z;
    const spd = C.SPEED * (1 + Math.min(0.55, S.lv * 0.015));
    S.z += spd * dt;

    // gates: leader crossing picks the side you're on
    for (const g of S.lvl.gates) {
      if (g.used || !(S.zPrev < g.z && g.z <= S.z)) continue;
      const mySide = S.x <= 0 ? -1 : 1;
      const pair = S.lvl.gates.filter(o => o.z === g.z);
      for (const o of pair) o.used = true;
      const hit = pair.find(o => o.side === mySide) || g;
      hit.used = false; applyGate(hit); // applyGate re-marks it; keeps `used` semantics single-sourced
      if (S.phase !== 'run') return;
    }

    // golden nail pickups (before hazards: the coin lands even on a lethal tick)
    for (const p of S.lvl.picks) {
      if (!p.taken && S.zPrev < p.z && p.z <= S.z && Math.abs(S.x - p.x) < 1.2) {
        p.taken = true;
        const v = 25 + 5 * S.lv;
        S.coins += v;
        lsSet('sm_coins', S.coins);
        pushEv({ t: 'pick', x: p.x, z: p.z, v });
      }
    }

    // hazards
    for (const h of S.lvl.hazards) {
      if (Math.abs(h.z - S.z) > 8) continue;
      if (h.k === 'saw') {
        const sx = sawX(h);
        let k = countIn((ux, uz) => Math.abs(uz - h.z) < 0.55 && Math.abs(ux - sx) < 1.0);
        // the blade nicks the crowd, it doesn't liquefy it: cap the per-tick bite
        if (k) k = Math.min(k, Math.max(1, Math.round(S.count * 0.03)));
        if (k) killN(k, sx, h.z, 'p', 'saw');
      } else if (h.k === 'spikes') {
        const k = countIn((ux, uz, uzp) => uzp < h.z && h.z <= uz && ux > h.x - h.w / 2 && ux < h.x + h.w / 2);
        if (k) killN(k, h.x, h.z, 'p');
      } else if (h.k === 'pend') { // pendulum: lethal only while the blade is low
        const s = pendS(h);
        if (Math.abs(s) < 0.65) {
          const bx = pendX(h);
          let k = countIn((ux, uz) => Math.abs(uz - h.z) < 0.5 && Math.abs(ux - bx) < 0.85);
          if (k) k = Math.min(k, Math.max(1, Math.round(S.count * 0.04)));
          if (k) killN(k, bx, h.z, 'p', 'pend');
        }
      } else { // hammer: kills at the slam instant
        const p = hammerPhase(h);
        if (h.prev < 0.5 && p >= 0.5) {
          const k = countIn((ux, uz) => Math.abs(ux) < 1.7 && Math.abs(uz - h.z) < 1.0);
          if (k) killN(k, 0, h.z, 'p');
          pushEv({ t: 'slam', z: h.z });
        }
        h.prev = p;
      }
      if (S.phase !== 'run') return;
    }

    // rival crowds
    for (const f of S.lvl.foes) {
      if (f.alive && S.z + 1.5 >= f.z - 1.4) {
        S.phase = 'fight'; S.fight = f; S.fightT = 0;
        pushEv({ t: 'clash', z: f.z });
        return;
      }
    }

    if (S.z >= S.lvl.finishZ) startFinish();

  } else if (S.phase === 'fight') {
    const f = S.fight;
    S.x += (S.tx - S.x) * Math.min(1, dt * 6); // steering stays live: swing wide to flank
    S.fightT += dt;
    while (S.fightT >= C.FIGHT_TICK && S.phase === 'fight') {
      S.fightT -= C.FIGHT_TICK;
      const k = Math.max(1, Math.round(Math.min(S.count, f.count) * 0.05));
      const kf = Math.min(f.count, Math.max(1, Math.round(k * (1 + 0.15 * S.upg.tips))));
      f.count -= kf;
      if (kf) pushEv({ t: 'kill', n: kf, x: f.x, z: f.z + 1, side: 'e' });
      const flank = S.lv >= 8 && Math.abs(S.x - f.x) >= 1.3; // unlocks at L8
      killN(Math.min(S.count, flank ? Math.max(1, Math.round(k * 0.6)) : k), S.x, S.z + 2.6, 'p'); // flanked trade ≈ 0.6:1
      if (S.phase !== 'fight') return; // we died
      if (f.count <= 0) {
        f.alive = false; S.fight = null;
        S.zPrev = S.z; S.phase = 'run';
        pushEv({ t: 'won_fight', z: f.z });
      }
    }

  } else if (S.phase === 'finish') {
    // the payoff: the crowd marches up the plank and every nail gets
    // hammered in along the way; the last one lands on the top step
    S.finT += dt;
    S.zPrev = S.z;
    S.x += (0 - S.x) * Math.min(1, dt * 4); // drift to the middle of the plank
    S.z = Math.min(S.finTarget, S.z + C.SPEED * 0.42 * dt);
    const z0 = S.lvl.finishZ - 1.5;
    const prog = clamp((S.z - z0) / (S.finTarget - z0), 0, 1);
    const want = Math.round(S.res.start * prog);
    if (want > S.planted) {
      const n = want - S.planted;
      S.planted = want;
      S.count = S.res.start - S.planted;
      pushEv({ t: 'plant', n, x: S.x, z: S.z,
        step: clamp(Math.floor((S.z - S.lvl.finishZ) / C.STEP_D), 0, S.res.step) });
    }
    if (S.z >= S.finTarget && S.planted >= S.res.start) {
      if (S.slamT === 0) pushEv({ t: 'slam_final', z: S.z, step: S.res.step });
      S.slamT += dt;
      if (S.slamT > 1.1) doWin();
    } else if (S.finT > 12) doWin(); // safety net, should never trigger
  }

  if (hooks.hud) hooks.hud();
}

// stair height under world-z (0 before the plank)
function yAt(z) {
  if (!S || z < S.lvl.finishZ) return 0;
  const step = Math.min(C.STEPS.length - 1, Math.floor((z - S.lvl.finishZ) / C.STEP_D));
  return (step + 1) * C.STEP_H;
}

    const nx = genLevel(S.lv + 1, startCount());

      ? nb + ' mallets say your nails fold like tin.'
      : 'a mob of ' + nb + ' mallets is already laughing at you.';

      '\n⚠️ Level ' + (S.lv + 1) + ': ' + taunt, 'NEXT LEVEL');
  } else if (S.phase === 'lose') {

    } else {
      showOv('BENT & BROKEN', LOSE_LINES[(S.lv + S.peak) % LOSE_LINES.length], 'RETRY');
    }
  }
}

// ---------------------------- audio (tiny synth) ----------------------------
let AC = null;
function sfx(kind) {
  if ((S ? S.mute : meta0.mute)) return;
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    const t = AC.currentTime;
    const tone = (f0, f1, dur, type, vol, at) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type; o.frequency.setValueAtTime(f0, t + at);
      o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + at + dur);
      g.gain.setValueAtTime(vol, t + at);
      g.gain.exponentialRampToValueAtTime(0.001, t + at + dur);
      o.connect(g); g.connect(AC.destination);
      o.start(t + at); o.stop(t + at + dur + 0.02);
    };
    const crack = (vol, at) => { // white-noise transient: what makes wood impacts crunch
      mkNoise();
      const s = AC.createBufferSource(); s.buffer = NOISE;
      const g = AC.createGain();
      g.gain.setValueAtTime(vol, t + at);
      g.gain.exponentialRampToValueAtTime(0.001, t + at + 0.07);
      s.connect(g); g.connect(AC.destination);
      s.start(t + at); s.stop(t + at + 0.08);
    };
    if (kind === 'good') { tone(987.77, 987.77, 0.075, 'square', 0.2, 0); tone(1318.51, 1318.51, 0.3, 'square', 0.16, 0.075); tone(2637.02, 2637.02, 0.12, 'triangle', 0.07, 0.075); }
    else if (kind === 'bad') tone(300, 140, 0.2, 'sawtooth', 0.2, 0);
    else if (kind === 'kill') tone(200, 90, 0.08, 'square', 0.12, 0);
    else if (kind === 'clash') { tone(150, 90, 0.25, 'sawtooth', 0.25, 0); tone(400, 200, 0.15, 'square', 0.15, 0); }
    else if (kind === 'slam') { tone(120, 36, 0.28, 'sine', 0.45, 0); tone(320, 60, 0.09, 'square', 0.22, 0); crack(0.3, 0); }
    else if (kind === 'pick') { tone(880, 1320, 0.12, 'triangle', 0.22, 0); tone(1320, 1760, 0.1, 'triangle', 0.18, 0.08); }
    else if (kind === 'whoosh') tone(180, 320, 0.12, 'sine', 0.1, 0);
    else if (kind === 'plant') { tone(620, 320, 0.05, 'square', 0.14, 0); tone(140, 90, 0.07, 'sine', 0.2, 0); }
    else if (kind === 'milestone') [659, 784, 1046, 1318].forEach((f, i) => tone(f, f * 1.02, 0.09, 'triangle', 0.2, i * 0.055));

  // --- event drain (sim -> fx/sfx) ---

  // --- frame loop ---
  const m4 = M4(), quat = new THREE.Quaternion(), sc1 = new THREE.Vector3(1, 1, 1),
    posV = new THREE.Vector3(), eul = new THREE.Euler(), colV = new THREE.Color(),
    scV = new THREE.Vector3();
  let lastT = 0;
  // ease-out-back: 0 -> overshoot ~1.1 -> 1
  const backEase = (p) => p >= 1 ? 1 : p <= 0 ? 0.001 :
    1 + 2.7 * Math.pow(p - 1, 3) + 1.7 * Math.pow(p - 1, 2);

  function updateCrowd(t) {
    const n = Math.min(S.count, C.VIS);
    const active = S.phase === 'run' || S.phase === 'fight' || S.phase === 'finish';
    const squeeze = S.phase === 'finish' ? 0.55 : 1; // huddle up on the stairs
    if (n > lastN) for (let i = lastN; i < n; i++) spawnAt[i] = t; // newcomers pop in
    lastN = n;
    for (let i = 0; i < n; i++) {
      const o = fOff(i);
      const ux = clamp(S.x + o[0] * squeeze, -C.XMAX, C.XMAX);
      const uz = S.z + o[1] * squeeze;
      const bob = active ? Math.abs(Math.sin(t * 9 + i * 1.7)) * 0.14 : 0;
      posV.set(ux, yAt(uz) + bob, uz);
      eul.set(active ? 0.14 : 0, Math.sin(i * 2.4) * 0.25, Math.sin(t * 9 + i * 1.7) * 0.06);
      quat.setFromEuler(eul);
      const sp = backEase((t - spawnAt[i]) / 0.32);
      m4.compose(posV, quat, sp === 1 ? sc1 : scV.set(sp, sp, sp));
      crowd.setMatrixAt(i, m4);
    }
    crowd.count = n;
    crowd.instanceMatrix.needsUpdate = true;
  }

  function updateFoes(t) {
    let idx = 0;
    for (const f of S.lvl.foes) {
      if (!f.alive || Math.abs(f.z - S.z) > 70) continue;
      const fighting = S.fight === f;
      const n = Math.min(f.count, 130);
      for (let i = 0; i < n && idx < 400; i++) {
        const o = fOff(i);
        const jig = fighting ? Math.sin(t * 22 + i * 3.1) * 0.1 : 0;
        // mallets rear back and pound toward the crowd (-z) while fighting
        const swing = fighting
          ? Math.pow(Math.max(0, Math.sin(t * 9 + i * 2.3)), 3) * 1.05
          : Math.abs(Math.sin(t * 4 + i * 2.1)) * 0.1;
        posV.set(clamp(f.x + o[0], -C.XMAX, C.XMAX) + jig, Math.abs(Math.sin(t * 4 + i * 2.1)) * 0.06, f.z + 1.2 + o[1] * 0.9);
        eul.set(-swing, Math.sin(i * 1.3) * 0.3, 0);
        quat.setFromEuler(eul);
        m4.compose(posV, quat, sc1);
        foesMesh.setMatrixAt(idx++, m4);
      }
    }
    foesMesh.count = idx;
    foesMesh.instanceMatrix.needsUpdate = true;
    for (const fl of dyn.foeLabels) {
      if (!fl.f.alive) { fl.spr.visible = false; continue; }
      // green label = you're flanking and winning the trade
      const flanking = S.fight === fl.f && S.lv >= 8 && Math.abs(S.x - fl.f.x) >= 1.3;
      if (fl.f.count !== fl.last || flanking !== fl.fl) {
        fl.last = fl.f.count; fl.fl = flanking;
        const bg = flanking ? 'rgba(30,120,60,.92)' : fl.f.boss ? 'rgba(140,20,90,.95)' : 'rgba(190,40,40,.92)';
        const lbl = textCanvas('' + fl.f.count, '#fff', bg, 64);
        fl.spr.material.map.dispose();
        fl.spr.material.map = lbl.tex;
        fl.spr.scale.set(1.4 * lbl.aspect, 1.4, 1);
      }
    }
  }

  function updateParts(dt) {
    let i = 0;
    for (let k = pPool.length - 1; k >= 0; k--) {
      const p = pPool[k];
      p.life -= dt;
      if (p.life <= 0) { pPool.splice(k, 1); continue; }
      p.vy -= (p.grav === undefined ? 12 : p.grav) * dt;
      p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
      if (p.y < 0.05) { p.y = 0.05; p.vy *= -0.3; }
      posV.set(p.x, p.y, p.z);
      eul.set(p.life * 7, p.life * 9, 0);
      quat.setFromEuler(eul);
      const s = Math.min(1, p.life * 2.5);
      m4.compose(posV, quat, new THREE.Vector3(s, s, s));
      parts.setMatrixAt(i, m4);
      parts.setColorAt(i, colV.setHex(p.col));
      i++;
    }
    parts.count = i;
    parts.instanceMatrix.needsUpdate = true;
    if (parts.instanceColor) parts.instanceColor.needsUpdate = true;
  }

  function frame(tms) {
    requestAnimationFrame(frame);
    const t = tms / 1000;
    const rawDt = Math.min(0.033, t - lastT || 0.016);
    lastT = t;
    let dt = rawDt * tScale; // slow-mo on clashes and defeat
    tScale += (1 - tScale) * Math.min(1, rawDt * 3.2);
    const wantDuck = tScale < 0.9; // music dips with the slow-mo, swells back after
    if (wantDuck !== mDucked && MUSIC && AC) {
      mDucked = wantDuck;
      try { MUSIC.gain.setTargetAtTime(wantDuck ? 0.18 : 0.5, AC.currentTime, wantDuck ? 0.05 : 0.25); } catch (e) {}
    }
    fovKick *= Math.max(0, 1 - 3.5 * rawDt);
    camera.fov = 55 + fovKick;
    camera.updateProjectionMatrix();

    if (S && (S.phase === 'run' || S.phase === 'fight' || S.phase === 'finish')) {
      if (keys.ArrowLeft || keys.a) S.tx = clamp(S.tx + 8 * dt, -C.XMAX, C.XMAX); // +x is screen-left
      if (keys.ArrowRight || keys.d) S.tx = clamp(S.tx - 8 * dt, -C.XMAX, C.XMAX);
      tick(dt);
    }

    if (S) {
      drainEvents(t);
      updateCrowd(t);
      updateFoes(t);

      // casualties sinking flush into the wood
      for (let i = 0; i < sinks.length; i++) {
        const sk = sinks[i];
        const p = Math.min(1, (t - sk.born) / 0.35);
        posV.set(sk.x, sk.y0 - 0.62 * p * p, sk.z);
        eul.set(sk.rot * p, 0, sk.rot * 0.6 * p);
        quat.setFromEuler(eul);
        m4.compose(posV, quat, sc1);
        sinkMesh.setMatrixAt(i, m4);
      }
      sinkMesh.count = sinks.length;
      sinkMesh.instanceMatrix.needsUpdate = true;

      // finale: the golden mallet pounds the crowd into the plank
      gHammer.visible = S.phase === 'finish' || (S.phase === 'win' && finalBoom);
      if (gHammer.visible) {
        const gy = yAt(S.z);
        let th;
        if (S.slamT > 0) {
          // the last nail gets one big wind-up... and BOOM
          const p = Math.min(1, S.slamT * 2.4);
          th = -1.5 + (HAM_IMP + 1.5) * p * p * p;
          if (p >= 1 && !finalBoomFired) {
            finalBoomFired = true;
            shake = Math.max(shake, 0.5);
            burst(S.x, gy + 0.6, S.z, 40, 0xffd76a, 1.4);
            ring(S.x, gy + 0.4, S.z, 0xfff2c0, 8);
            sfx('slam');
          }
        } else {
          // tack-tack-tack: slow raise, fast snap down, brief rest on the nail
          const p = (t * 1.9) % 1;
          th = p < 0.55 ? HAM_IMP + (HAM_UP - HAM_IMP) * (1 - Math.pow(1 - p / 0.55, 2))
             : p < 0.72 ? HAM_UP + (HAM_IMP - HAM_UP) * Math.pow((p - 0.55) / 0.17, 3)
             : HAM_IMP;
          if (hamPrevTh < HAM_IMP - 0.01 && th >= HAM_IMP - 0.001 && p >= 0.7) {
            shake = Math.max(shake, 0.05); // little thud on every strike
          }
          hamPrevTh = th;
        }
        gHammer.rotation.z = th;
        const gs = S.slamT > 0 ? 1.3 : 1;
        gHammer.scale.set(gs, gs, gs);
        gHammer.position.set(S.x + 2.7 * gs, gy + 1.35 * gs, S.z + 0.7);
      }

      for (const s of dyn.saws) {
        s.mesh.position.x = sawX(s.h);
        s.disc.rotation.x += dt * 9;
      }
      for (const pd of dyn.pends) {
        const s = pendS(pd.h);
        pd.pivot.rotation.z = 0.9 * s;
        if (pd.prevS * s < 0 && Math.abs(pd.h.z - S.z) < 20) sfx('whoosh'); // bottom of the arc
        pd.prevS = s;
      }
      for (const pk of dyn.picks) {
        pk.mesh.visible = !pk.p.taken;
        if (pk.mesh.visible) {
          pk.mesh.rotation.y = t * 2.5;
          pk.mesh.position.y = 0.9 + 0.15 * Math.sin(t * 3);
        }
      }
      if (skinId === 4) { // Prisma: every color of the rainbow, one frame at a time
        const hh = (t * 0.12) % 1;
        playerMat.color.setHSL(hh, 0.85, 0.62);
        playerMat.emissive.setHSL(hh, 0.9, 0.16);
      }
      for (const hm of dyn.hammers) {
        const p = hammerPhase(hm.h);
        const raise = Math.abs(p - 0.5) * 2;
        hm.pivot.rotation.x = -Math.pow(raise, 0.7) * 1.15;
      }
      for (const gp of dyn.gatePanels) {
        gp.panel.visible = !gp.g.used;
        // used mystery gates keep their revealed sign up briefly so the swap is seen
        gp.sign.visible = !gp.g.used || gp.g.z > S.z || (gp.g.myst && S.z - gp.g.z < 12);
        if (gp.sign.visible && Math.abs(gp.g.z - S.z) < 60) {
          gp.sign.position.y = 1.55 + Math.sin(t * 2.2 + gp.g.z) * 0.08; // gentle bob
        }
      }

      // dust kicked up by all those little running feet (theme-flavored:
      // sparks in the garage, motes at sunset, sprinkles in the candy factory)
      if (S.phase === 'run') {
        dustAcc += dt;
        while (dustAcc > 0.13) {
          dustAcc -= 0.13;
          const dcol = themeIdx === 4
            ? [0x7ee8fa, 0xffe08a, 0xb28dff, 0xff8ad0][(sprinkleN++) & 3]
            : theme.dust;
          burst(S.x + (Math.random() - 0.5) * 2.5, 0.05, S.z - 1.6, 1, dcol, themeIdx === 2 ? 0.35 : 0.5);
        }
        // dramatic heads-up when the boss mob comes into view
        const bossF = S.lvl.foes[S.lvl.foes.length - 1];
        if (!bossWarned && bossF.alive && bossF.z - S.z < 42) {
          bossWarned = true;
          popup('🔨 BOSS: ' + BOSS_NAMES[(S.lv - 1) % BOSS_NAMES.length], '#ffd76a');
          shake = Math.max(shake, 0.12);
          sfx('boss');
        }
      }
      // Frostworks: gentle snowfall out of the existing particle pool
      if (themeIdx === 3 && S.phase !== 'win') {
        snowAcc += rawDt;
        while (snowAcc > 0.12) {
          snowAcc -= 0.12;
          if (pPool.length < P_MAX) pPool.push({
            x: S.x + (Math.random() - 0.5) * 14, y: 6.5, z: S.z + 4 + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 0.4, vy: -1.8, vz: 0, life: 3.8, col: 0xffffff, grav: 0, // 3.8s: reaches the bench from y=6.5
          });
        }
      }

      // confetti rain while basking in victory
      if (S.phase === 'win') {
        confAcc += rawDt;
        if (confAcc > 0.4) {
          confAcc = 0;
          burst(S.x + (Math.random() - 0.5) * 7, 3.5 + Math.random() * 2, S.z + (Math.random() - 0.5) * 6,
            8, [0xffd76a, 0x5cff9b, 0x6ab8ff, 0xff8ad0][(Math.random() * 4) | 0], 0.8);
        }
      }

      // camera follows, rising with crowd size and the finish stairs
      const camY = 5.2 + Math.min(3.5, S.count * 0.012) + yAt(S.z);
      const camZ = S.z - 8.5 - Math.min(3, S.count * 0.008);
      camera.position.lerp(posV.set(S.x * 0.55, camY, camZ), Math.min(1, dt * 4.5));
      if (shake > 0.004) {
        camera.position.x += (Math.random() - 0.5) * shake;
        camera.position.y += (Math.random() - 0.5) * shake * 0.7;
        shake *= Math.max(0, 1 - 5 * dt);
      }
      camera.lookAt(S.x * 0.4, 0.9 + yAt(S.z + 6) * 0.7, S.z + 9);
      sun.position.set(camera.position.x + 6, camera.position.y + 10, S.z - 4);
      sun.target.position.set(S.x, 0, S.z + 4);

      // crowd count bubble
      const bub = $('bub');
      if (S.phase === 'run' || S.phase === 'fight' || S.phase === 'finish') {
        posV.set(S.x, yAt(S.z) + 1.6 + Math.min(2.6, Math.sqrt(S.count) * 0.16), S.z);
        posV.project(camera);
        bub.style.left = ((posV.x * 0.5 + 0.5) * window.innerWidth) + 'px';
        bub.style.top = ((-posV.y * 0.5 + 0.5) * window.innerHeight) + 'px';
        bub.textContent = '' + S.count;
        if (S.count !== lastBub) { // punch the counter on every change
          bubPopT = t;
          if (lastBub >= 0 && S.count < lastBub) bubRedT = t;
          lastBub = S.count;
        }
        const bs = 1 + 0.4 * Math.max(0, 1 - (t - bubPopT) * 5);
        bub.style.transform = 'translate(-50%,-100%) scale(' + bs.toFixed(3) + ')';
        bub.style.background = S.phase === 'finish' ? '#d99a1f' // gold: shrinking is winning here
          : (t - bubRedT < 0.28) ? '#e0402c' : '#2f6bff';
      }
    }

    updateParts(dt);
    renderer.render(scene, camera);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
