function onClick(mx,my){
  if(G.tutActive){ dismissTut(); sfx('select'); return; }
  { const mb=hitButton(mx,my);
    if(mb){ if(mb.id==='mute'){ toggleMute(); return; } sfx('select'); } }
  if(G.state==='title'){ const b=hitButton(mx,my); if(b){ if(b.id==='tutskip') skipTutorial(); else if(b.id==='dex') openPokedex('title'); else if(b.id==='records') openRecords('title'); else if(b.id==='sanctuary') openSanctuary('title'); else if(b.id==='ach') openAchievements('title'); else if(b.id==='settings') openSettings('title'); else if(b.id==='daily'){ startDaily(); } else { openStarter('title'); } } return; }
  if(G.state==='gameover'){ const b=hitButton(mx,my); if(b){ if(b.id==='dex') openPokedex('gameover'); else if(b.id==='records') openRecords('gameover'); else if(b.id==='sanctuary') openSanctuary('gameover'); else if(b.id==='ach') openAchievements('gameover'); else { openStarter('gameover'); } } return; }
  if(G.state==='starter'){
    const b=hitButton(mx,my); if(!b) return;
    if(b.id==='back'){ G.state=G.starterFrom||'title'; clearButtons(); }
    else if(b.id==='random'){ newGame(); startWalk(); }
    else if(b.id.startsWith('pick_')){ newGame(starterPool()[+b.id.slice(5)]); startWalk(); }
    return;
  }
  if(G.state==='sanctuary'){
    const b=hitButton(mx,my);
    if(b){ if(b.id==='back'){ G.state=G.sanctuaryFrom||'title'; clearButtons(); }
           else if(b.id==='asc_dn'){ ascSel(-1); }
           else if(b.id==='asc_up'){ ascSel(+1); }
           else if(b.id.startsWith('buy_')){ buyUpgrade(b.id.slice(4)); } }
    return;
  }
  if(G.state==='settings'){
    if(sliderHit(mx,my,'music')){ const r=sliderRect('music');
      gset().musicVol=clamp((mx-r.x)/r.w,0,1); Dex.save(); applyAudioSettings(); return; }
    if(sliderHit(mx,my,'sfx')){ const r=sliderRect('sfx');
      gset().sfxVol=clamp((mx-r.x)/r.w,0,1); Dex.save(); applyAudioSettings(); return; }
    const b=hitButton(mx,my);
    if(b){ if(b.id==='back'){ G.state=G.settingsFrom||'title'; clearButtons(); }
           else if(b.id==='tg_motion'){ gset().reducedMotion=!gset().reducedMotion; Dex.save(); }
           else if(b.id==='tg_cb'){ gset().colorblind=!gset().colorblind; Dex.save(); applyPalette(); } }
    return;
  }
  if(G.state==='pokedex'){
    if(G.pokedexSel!=null){ G.pokedexSel=null; return; }   // any tap closes detail
    const b=hitButton(mx,my);
    if(b && b.id==='back'){ G.state=G.pokedexFrom||'title'; clearButtons(); return; }
    const i=pokedexCardAt(mx,my);
    if(i>=0){ const k=Object.keys(SPECIES)[i]; if(dexStatus(k)>=1) G.pokedexSel=i; }  // seen/caught open detail; locked inert
    return;
  }
  if(G.state==='achievements'){ const b=hitButton(mx,my); if(b && b.id==='back'){ G.state=G.achFrom||'title'; clearButtons(); } return; }
  if(G.state==='records'){
    const b=hitButton(mx,my); if(!b) return;
    if(b.id==='back'){ G.state=G.recordsFrom||'title'; clearButtons(); return; }
    if(b.id==='tab_local'){ G.recordsTab='local'; return; }
    if(b.id==='tab_global'){ G.recordsTab='global'; ensureBoard(); return; }
    if(b.id==='setname'){
      const cur = Dex.data.playerName||'';
      const inp = (typeof prompt==='function') ? prompt('Leaderboard name:', cur) : null;
      if(inp!=null){
        Dex.data.playerName = String(inp).replace(/[^\w \-.']/g,'').trim().slice(0,16);
        Dex.save();
      }
      return;
    }
    return;
  }
  if(G.state==='battle' && G.battleIntro<=0){ const idx=teamCardAt(mx,my); if(idx>=0){ trySwitch(idx); return; } }
  const b=hitButton(mx,my); if(!b) return;
  const id=b.id;
  switch(G.state){
    case 'battle':
      if(id==='speed'){ G.speed = G.speed>=3?1:G.speed+1; }
      else if(id==='potion'){ usePotion(); } break;
    case 'choice':
      if(id==='catch') doCatch(); else if(id==='kill') doKill(); else if(id==='release') doRelease(); break;
    case 'crossroads':
      if(id.startsWith('x')){ resolveCross(G.xoptions[+id[1]].id); } break;
    case 'relic':
      if(id.startsWith('relic_')) takeRelic(+id.slice(6)); break;
    case 'shop':
      if(id==='leave') proceed();
      else if(id==='reroll') rerollShop();
      else if(id.startsWith('slot_')) buyStock(+id.slice(5));
      break;
    case 'rest':
      if(G.equipSel!=null){
        if(id==='equipclose') G.equipSel=null;
        else if(id==='unequip') unequipTrinket(G.equipSel);
        else if(id.startsWith('equipinv_')){ equipTrinket(G.equipSel,+id.slice(9)); G.equipSel=null; }
        break;
      }
      if(id==='leave') proceed();
      else if(id.startsWith('train_')) train(+id.slice(6));
      else if(id.startsWith('swap_')) swapBox(+id.slice(5));
      else if(id.startsWith('equip_')) G.equipSel=+id.slice(6);
      break;
    case 'story':
      if(id==='act'){ G.storyRevealed=true; G.story.apply(G.storyGood); }
      else if(id==='skip'){ G.storyRevealed=true; G.storyGood=true; /* nothing happens */ G.story={t:G.story.t,good:'You walk on, untroubled.',bad:'',apply:()=>{}}; }
      else if(id==='leave'){ if(activeMon()&&activeMon().hp<=0){/*safety*/} proceed(); }
      break;
    case 'gamble':
      if(id==='leave') proceed(); else if(id.startsWith('bet_')) doGamble(+id.slice(4)); break;
    case 'shrine':
      if(id==='leave') proceed(); else if(id==='bless_vigor') shrineBless('vigor');
      else if(id==='bless_catch') shrineBless('catch'); else if(id==='bless_power') shrineBless('power'); break;
    case 'nest':
      if(id.startsWith('nest_')) takeNest(+id.slice(5)); break;
    case 'swapchoice':
      if(id.startsWith('swapout_')) swapOut(+id.slice(8));
      else if(id==='keepbox') pendingToBox();
      else if(id==='relnew') pendingRelease(); break;
  }
}
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  const px=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const py=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
  return { x: px*(W/r.width), y: py*(H/r.height) };
}
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); unlockAudio(); const p=canvasPos(e); onClick(p.x,p.y); }, {passive:false});
window.addEventListener('keydown', e=>{
  unlockAudio();
  if(e.key==='m'||e.key==='M'){ toggleMute(); e.preventDefault(); return; }
  if((G.state==='title'||G.state==='gameover') && (e.key==='d'||e.key==='D')){ openPokedex(G.state); e.preventDefault(); return; }
  if(G.state==='pokedex' && (e.key==='Escape'||e.key==='Backspace'||e.key==='d'||e.key==='D')){ if(G.pokedexSel!=null) G.pokedexSel=null; else { G.state=G.pokedexFrom||'title'; clearButtons(); } e.preventDefault(); return; }
  if((G.state==='title'||G.state==='gameover') && (e.key==='s'||e.key==='S')){ openSanctuary(G.state); e.preventDefault(); return; }
  if(G.state==='sanctuary' && (e.key==='Escape'||e.key==='Backspace')){ G.state=G.sanctuaryFrom||'title'; clearButtons(); e.preventDefault(); return; }
  if(G.state==='settings' && (e.key==='Escape'||e.key==='Backspace')){ G.state=G.settingsFrom||'title'; clearButtons(); e.preventDefault(); return; }
  if((G.state==='title'||G.state==='gameover') && (e.key==='a'||e.key==='A')){ openAchievements(G.state); e.preventDefault(); return; }
  if(G.state==='achievements' && (e.key==='Escape'||e.key==='Backspace'||e.key==='a'||e.key==='A')){ G.state=G.achFrom||'title'; clearButtons(); e.preventDefault(); return; }
  if((G.state==='title'||G.state==='gameover') && (e.key==='r'||e.key==='R')){ openRecords(G.state); e.preventDefault(); return; }
  if(G.state==='records' && (e.key==='Escape'||e.key==='Backspace'||e.key==='r'||e.key==='R')){ G.state=G.recordsFrom||'title'; clearButtons(); e.preventDefault(); return; }
  if(e.key===' '){ if(G.state==='battle') G.speed=G.speed>=3?1:G.speed+1; e.preventDefault(); }
  const n=parseInt(e.key);
  if(n>=1 && n<=4){
    // map number to the nth actionable button of choice-like states
    if(n<=3 && G.state==='choice'){ onClickById(['catch','kill','release'][n-1]); }
    else if(n<=3 && G.state==='crossroads'){ onClickById('x'+(n-1)); }
    else if(n<=3 && G.state==='relic'){ onClickById('relic_'+(n-1)); }
    else if(n<=3 && G.state==='nest'){ onClickById('nest_'+(n-1)); }
    else if(G.state==='swapchoice'){ onClickById('swapout_'+(n-1)); }
    else if(n>=1 && n<=4 && G.state==='battle'){ trySwitch(n-1); }
  }
});
function onClickById(id){ const b=G.buttons.find(x=>x.id===id && x.enabled); if(b){ const cx=b.x+2,cy=b.y+2; onClick(cx,cy);} }

// ===================================================================
// Main loop
// ===================================================================
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
  G.t += dt;
  if(G.msgT>0) G.msgT-=dt;
  if(G.achMsgT>0) G.achMsgT-=dt;
  const sdt = dt * (G.state==='battle'? G.speed : 1);

  if(G.state==='walk'){
    G.scroll += sdt*180;
    if(G.biomeFxT>0) G.biomeFxT = Math.max(0, G.biomeFxT - dt);
    updateFx(dt);
    if(G.scroll>=G.walkTarget){ if(bossDue()) spawnBoss(); else spawnWild(false); }
  } else if(G.state==='battle'){
    updateBattle(sdt);
  } else {
    // idle scroll for ambiance on menus
    G.scroll += dt*8;
    updateFx(dt);
  }
  tutStep();
  draw();
  requestAnimationFrame(loop);
}

newGame();
requestAnimationFrame(loop);
})();
</script>
