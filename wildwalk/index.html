let seed = (Date.now() ^ 0x9e3779b9) >>> 0;
function rnd(){ seed = (seed*1664525 + 1013904223) >>> 0; return seed / 4294967296; }
function reseed(n){ seed = (n>>>0) || 1; }
const rr   = (a,b)=> a + rnd()*(b-a);
const ri   = (a,b)=> Math.floor(rr(a,b+1));
const pick = a => a[Math.floor(rnd()*a.length)];
const clamp= (v,a,b)=> v<a?a:(v>b?b:v);

function gset(){
  let s=Dex.data.settings;
  if(!s||typeof s!=='object') s=Dex.data.settings={};

  if(typeof s.sfxVol!=='number')         s.sfxVol=1;
  if(typeof s.reducedMotion!=='boolean') s.reducedMotion=false;
  if(typeof s.colorblind!=='boolean')    s.colorblind=false;
  return s;
}
function reducedMotion(){ return !!gset().reducedMotion; }
function motionAmt(){ return reducedMotion()?0:1; }
function musicBaseGain(){ return clamp(gset().musicVol,0,1)*0.35; }  // 0..0.35
function sfxScale(){ return clamp(gset().sfxVol,0,1); }              // 0..1
// ---------- daily-seed challenge ----------
function dayInt(d){                        // Date -> UTC date int YYYYMMDD (one run per planet-day)
  d = d || new Date();
  return d.getUTCFullYear()*10000 + (d.getUTCMonth()+1)*100 + d.getUTCDate();
}
function dailySeedFor(day){                // avalanche day int -> well-mixed 32-bit LCG seed (pure)
  let h = (day ^ 0x9e3779b9) >>> 0;
  h = Math.imul(h ^ (h>>>15), 0x2c1b3c6d) >>> 0;
  h = Math.imul(h ^ (h>>>13), 0x297a2d39) >>> 0;
  h = (h ^ (h>>>16)) >>> 0;
  return h;
}

// deterministic, monotonic non-decreasing: 1-2 meadow, 3-4 forest, 5-6 shore,

function biomeForTier(tier){ return Math.min(7, Math.floor((tier-1)/2)); }
// Endless band: the tier where biomeForTier clamps to the final biome (The
// Firstlight). No new content unlocks past it, so it's the natural post-game
// depth. Pure presentation — combat/spawn math is untouched.
const ENDLESS_TIER = 15;
function isEndless(t){ return (t==null?G.tier:t) >= ENDLESS_TIER; }
function endlessDepth(t){ return (t==null?G.tier:t) - ENDLESS_TIER + 1; }
// advance the biome as the walk deepens (called from setupCrossroads). Starts a
// single timer that drives both the crossfade and the name label.
function updateBiome(){
  const b = biomeForTier(G.tier);
  if(b !== G.biome){ G.biomePrev = G.biome; G.biome = b;
    G.biomeLabel = BIOMES[b].name; G.biomeFxT = 2.6;
    G.weather = weatherFor(b, G.fights); }   // refresh sky on biome change
}
// Pure integer hash → does NOT consume rnd(), so the spawn RNG stream is unperturbed
// and weather is fully reproducible for tests. Out-of-range biome falls back to Meadow.
function weatherFor(biome, fights){
  const arr = BIOME_WEATHER[biome] || BIOME_WEATHER[0];
  const h = ((biome*73856093) ^ (fights*19349663)) >>> 0;
  return arr[h % arr.length];
}
function setWeather(){ G.weather = weatherFor(G.biome, G.fights); }

// ---------- biome spawn bias ----------
// Soft weighting: favored types get +BIOME_BOOST weight, everything keeps a base
// weight of 1, so no pool is ever empty and every species stays reachable. A pool
// with no favored type collapses to uniform = identical to unbiased picking.
const BIOME_BOOST = 2.5;
function pickBiased(keys){
  if(!keys||!keys.length) return pick(COMMONS);
  const fav = (BIOMES[G.biome]||BIOMES[0]).favor||[];
  let sum=0; const w=keys.map(k=>{ const x=1+(fav.includes(SPECIES[k].type)?BIOME_BOOST:0); sum+=x; return x; });
  let r=rnd()*sum;
  for(let i=0;i<keys.length;i++){ r-=w[i]; if(r<0) return keys[i]; }
  return keys[keys.length-1];
}

// ---------- monster instance ----------
function statAt(base,level){ return base * (1 + 0.14*(level-1)); }
// Held-trinket stat helpers (holder-keyed; hasTrinket defined near hasRelic).
function baseMaxHp(m){ return Math.round(statAt(m.sp.base.hp,m.level)*(hasTrinket(m,'vigorcharm')?1.2:1)); }
function applyTrinketStats(m){
  const wasDead = m.hp<=0;                       // a fainted mon stays fainted — equipping never revives
  const nm=baseMaxHp(m); m.hp += (nm-m.maxhp); m.maxhp=nm;
  if(m.hp>nm)m.hp=nm;
  if(wasDead) m.hp=0; else if(m.hp<1) m.hp=1;
  m.spd = m.sp.base.spd * (hasTrinket(m,'swiftfeather')?1.15:1);
  m.hpShown = m.hp;
}
function makeMon(key,level){
  const sp = SPECIES[key];
  const lvl = Math.max(1, Math.round(level));
  const hp = Math.round(statAt(sp.base.hp,lvl));
  return {
    key, sp, level:lvl,
    maxhp: hp, hp,
    atk: statAt(sp.base.atk,lvl),
    spd: sp.base.spd,
    trinket:null,               // held trinket id (transient; never serialized)
    xp: 0, xpNext: 12 + lvl*8,
    cd: 0, alive:true,
    // anim
    lunge:0, hurt:0, bob: rnd()*6.28, hpShown:hp, levelFlash:0,
    // transient status bag (never serialized) — reset each fight in finishSpawn
    status:{ burn:0, burnT:0, stun:0, stunImm:0, regen:0, regenRate:0, fBurn:0, fStun:0, fGuard:0, fDodge:0, fHeal:0 },
  };
}
function freshStatus(){ return { burn:0, burnT:0, stun:0, stunImm:0, regen:0, regenRate:0, fBurn:0, fStun:0, fGuard:0, fDodge:0, fHeal:0 }; }
function xpToLevels(m, gain){
  m.xp += gain;
  let leveled = [];
  while(m.xp >= m.xpNext && m.level < 60){
    m.xp -= m.xpNext; m.level++; m.xpNext = 12 + m.level*8;
    m.atk = statAt(m.sp.base.atk, m.level);
    { const newMax = baseMaxHp(m); m.hp += (newMax - m.maxhp); m.maxhp = newMax; }
    // evolution
    if(m.sp.evo && m.level >= (m.sp.rarity===0?8:16)){
      const oldName = m.sp.name;
      const ek = m.sp.evo; m.key = ek; m.sp = SPECIES[ek];
      m.atk = statAt(m.sp.base.atk, m.level);
      const nm = baseMaxHp(m); m.hp += (nm - m.maxhp); m.maxhp = nm;
      leveled.push({evo:true, from:oldName, to:m.sp.name});
      Dex.caught(ek);
    } else leveled.push({evo:false});
  }
  return leveled;
}

// ---------- pokedex / persistence ----------
const Dex = {
  data:{ seen:{}, caught:{}, best:0, runs:0, essence:0, ascension:{ max:0, sel:0 }, upgrades:{}, muted:false, playerName:'',
         ach:{}, killed:0, released:0, bossKills:0, bestTier:0, fullPartyWin:0, wildCatch:0, runsLog:[],
         daily:{ day:0, dist:0, tier:0 }, tutorialDone:false,
         settings:{ musicVol:1, sfxVol:1, reducedMotion:false, colorblind:false } },
  load(){ try{ const d=JSON.parse(localStorage.getItem(SAVE)); if(d) this.data=Object.assign(this.data,d); }catch(e){} },
  save(){ try{ localStorage.setItem(SAVE, JSON.stringify(this.data)); }catch(e){} },
  see(k){ if(!this.data.seen[k]){ this.data.seen[k]=1; this.save(); } },
  caught(k){ this.data.seen[k]=1; this.data.caught[k]=1; this.save(); },
  record(dist){ if(dist>this.data.best){ this.data.best=dist; } this.data.runs++; this.save(); },
  recordRun(rec){
    if(!Array.isArray(this.data.runsLog)) this.data.runsLog=[];
    this.data.runsLog.push({dist:+rec.dist||0, tier:+rec.tier||0, fights:+rec.fights||0, dex:+rec.dex||0});
    const clean=this.data.runsLog[this.data.runsLog.length-1];
    this.data.runsLog.sort((a,b)=>(b.dist||0)-(a.dist||0));
    this.data.runsLog=this.data.runsLog.slice(0,10);
    this.save();
    return {rec:clean, rank:this.data.runsLog.indexOf(clean)};
  },
  up(key){ return this.data.upgrades[key]||0; },
  awardEssence(n){ this.data.essence=(this.data.essence||0)+n; this.save(); },
  nSeen(){ return Object.keys(this.data.seen).length; },
  nCaught(){ return Object.keys(this.data.caught).length; },
  recordDaily(day, dist, tier){
    const d = this.data.daily;
    if(!d || d.day !== day){                      // first run of a new UTC day -> reset to this run
      this.data.daily = { day:+day||0, dist:+dist||0, tier:+tier||0 };
    } else if((+dist||0) > d.dist){               // same day -> keep best distance + that run's tier
      d.dist = +dist||0; d.tier = +tier||0;
    }
    this.save();
    return this.data.daily;
  },
};

function award(id){
  if(Dex.data.ach[id]) return false;                 // exactly-once gate
  const a=ACH.find(x=>x.id===id); if(!a) return false;
  Dex.data.ach[id]=1;
  if(a.essence) Dex.data.essence=(Dex.data.essence||0)+a.essence;
  Dex.save();
  achToast(a); sfx('evolve'); burst(W/2,250);        // runtime-only; safe to reference
  return true;
}
function checkAch(){
  if(!Dex.data.ach) Dex.data.ach={};
  for(const a of ACH){ if(!Dex.data.ach[a.id] && a.test()) award(a.id); }
}
function achCount(){ let n=0; for(const a of ACH) if(Dex.data.ach[a.id]) n++; return n; }

// ===================================================================
// Audio — Web Audio chiptune music + SFX (fully self-guarding).
// Never throws when AudioContext is unavailable (headless) or muted.
// Nothing here touches audioCtx() at load; the ctx is created/resumed
// only on the first user gesture (unlockAudio, from pointerdown/keydown).
// ===================================================================
let _ac=null,_master=null,_musicGain=null,_acFailed=false,_voices=0;
let _musicStarted=false,_nextNoteTime=0,_step=0,_schedTimer=null,_curMood=null;

function audioCtx(){
  if(_ac) return _ac;
  if(_acFailed) return null;
  if(typeof window==='undefined'){ _acFailed=true; return null; }
  const AC=(typeof AudioContext!=='undefined')?AudioContext:(typeof webkitAudioContext!=='undefined'?webkitAudioContext:null);
  if(!AC){ _acFailed=true; return null; }
  try{
    _ac=new AC();
    _master=_ac.createGain(); _master.gain.value=0.55; _master.connect(_ac.destination);
    _musicGain=_ac.createGain(); _musicGain.gain.value=Dex.data.muted?0:musicBaseGain(); _musicGain.connect(_master);
  }catch(e){ _acFailed=true; _ac=null; return null; }
  return _ac;
}

// one-shot SFX voice → _master
function blip(wave,f0,f1,dur,peak,when){
  if(_voices>16) return;
  const p=peak*sfxScale();
  if(p<=0) return;                                  // sfxVol 0 → silent; skip voice (avoids ramp-from-0 NaN)
  const ac=_ac;
  const osc=ac.createOscillator(), g=ac.createGain();
  osc.type=wave;
  osc.frequency.setValueAtTime(f0,when);
  if(f1!=null) osc.frequency.linearRampToValueAtTime(f1,when+dur);
  g.gain.setValueAtTime(0.0001,when);
  g.gain.linearRampToValueAtTime(p,when+0.008);     // was: peak
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  osc.connect(g); g.connect(_master);
  osc.start(when); osc.stop(when+dur+0.02);
  _voices++;
  osc.onended=()=>{ _voices--; try{ g.disconnect(); osc.disconnect(); }catch(e){} };
}

function sfx(name){
  const ac=audioCtx(); if(!ac||Dex.data.muted) return;
  const t=ac.currentTime;
  switch(name){
    case 'hit': blip('square',220,160,0.09,0.22,t); break;
    case 'crit': blip('square',330,180,0.12,0.28,t); blip('triangle',660,null,0.10,0.16,t); break;
    case 'catch': blip('triangle',523,null,0.14,0.24,t); blip('triangle',659,null,0.14,0.24,t+0.09); blip('triangle',784,null,0.14,0.24,t+0.18); break;
    case 'catchfail': blip('sawtooth',300,110,0.28,0.20,t); break;
    case 'levelup': blip('square',587,null,0.16,0.24,t); blip('square',880,null,0.16,0.24,t+0.10); break;
    case 'evolve': blip('triangle',523,null,0.16,0.26,t); blip('triangle',659,null,0.16,0.26,t+0.08); blip('triangle',784,null,0.16,0.26,t+0.16); blip('triangle',1047,null,0.16,0.26,t+0.24); blip('sawtooth',1047,null,0.12,0.12,t+0.24); break;
    case 'boss': blip('sawtooth',110,55,0.5,0.30,t); blip('square',220,null,0.18,0.20,t); break;
    case 'select': blip('square',440,null,0.05,0.16,t); break;
    case 'defeat': blip('triangle',392,null,0.30,0.24,t); blip('triangle',311,null,0.30,0.24,t+0.16); blip('triangle',262,null,0.30,0.24,t+0.32); break;
    case 'potion': blip('sine',660,990,0.2,0.18,t); break;
  }
}

// Music patterns — 16 eighth-notes per loop; 0 = rest.
const PAT={
  walk:{ tempo:96, bassWave:'sine', leadWave:'triangle',
    bass:[110,0,0,0,110,0,0,0,110,0,0,0,110,0,0,0],
    lead:[440,0,0,523,0,659,0,0,784,0,659,0,0,523,0,0] },
  battle:{ tempo:132, bassWave:'square', leadWave:'square',
    bass:[110,0,110,0,82,0,110,0,110,0,110,0,82,0,110,0],
    lead:[440,0,523,587,0,659,587,0,523,0,440,0,392,0,440,0] },
  boss:{ tempo:108, bassWave:'sawtooth', leadWave:'square',
    bass:[82,0,0,0,116,0,0,0,82,0,0,0,116,0,0,0],
    lead:[0,0,330,0,0,0,0,311,0,0,392,0,0,0,0,0] },
};

function musicMood(){
  if(G.state==='battle') return (G.wild&&G.wild.boss)?'boss':'battle';
  return 'walk';
}

// music voice → _musicGain
function mblip(wave,freq,dur,peak,when){
  if(_voices>16) return;
  const ac=_ac;
  const osc=ac.createOscillator(), g=ac.createGain();
  osc.type=wave;
  osc.frequency.setValueAtTime(freq,when);
  g.gain.setValueAtTime(0.0001,when);
  g.gain.linearRampToValueAtTime(peak,when+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  osc.connect(g); g.connect(_musicGain);
  osc.start(when); osc.stop(when+dur+0.02);
  _voices++;
  osc.onended=()=>{ _voices--; try{ g.disconnect(); osc.disconnect(); }catch(e){} };
}

function scheduleStep(step,when){
  const P=PAT[_curMood]; if(!P) return;
  const bf=P.bass[step], lf=P.lead[step];
  if(bf) mblip(P.bassWave,bf,0.18,0.5,when);
  if(lf) mblip(P.leadWave,lf,0.18,0.4,when);
}

function scheduler(){
  const ac=audioCtx(); if(!ac) return;
  if(Dex.data.muted) return;
  const m=musicMood(); if(m!==_curMood) _curMood=m;
  while(_nextNoteTime<ac.currentTime+0.10){
    scheduleStep(_step,_nextNoteTime);
    const spb=60/PAT[_curMood].tempo/2;
    _nextNoteTime+=spb;
    _step=(_step+1)%16;
  }
}

function startMusic(){
  if(_musicStarted||!audioCtx()||Dex.data.muted) return;
  _musicStarted=true;
  _nextNoteTime=_ac.currentTime+0.1;
  _step=0;
  _curMood=musicMood();
  _schedTimer=setInterval(scheduler,25);
}

function unlockAudio(){
  const ac=audioCtx(); if(!ac) return;
  if(ac.state==='suspended') ac.resume();
  if(!Dex.data.muted) startMusic();
}

function muteIcon(){ return Dex.data.muted?'🔇':'🔊'; }

function stopMusicHard(){
  if(_schedTimer){ clearInterval(_schedTimer); _schedTimer=null; }
  _musicStarted=false;
  if(_musicGain) _musicGain.gain.value=0;
}

function toggleMute(){
  Dex.data.muted=!Dex.data.muted; Dex.save();
  if(Dex.data.muted){ stopMusicHard(); }
  else { if(_musicGain) _musicGain.gain.value=musicBaseGain(); unlockAudio(); sfx('select'); }
}
function applyAudioSettings(){
  if(!_ac || !_musicGain) return;                          // headless / not-yet-unlocked → no-op
  try{ _musicGain.gain.value = Dex.data.muted ? 0 : musicBaseGain(); }catch(e){}
}

// ===================================================================
// Sprite renderer — procedural monsters from species traits
// ===================================================================
function withShadow(x,y,rw,rh){
  ctx.save(); ctx.globalAlpha=.28; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(x,y,rw,rh,0,0,6.283); ctx.fill(); ctx.restore();
}
// draw a monster centered at (x,y). size ~ body radius. dir: 1 faces right, -1 left.
function drawMon(sp, x, y, size, dir, t, opts){
  opts = opts||{};
  const s = size;
  ctx.save();
  ctx.translate(x,y);
  if(dir<0) ctx.scale(-1,1);
  const bob = Math.sin(t*3 + (opts.bob||0)) * s*0.05*(0.3+0.7*motionAmt());
  ctx.translate(0, bob);
  // attack lean forward / hurt recoil back — unscaled space so no shear; dir<0 mirror already aims it at the foe
  ctx.rotate(((opts.lunge||0)*0.16 - (opts.hurtAmt||0)*0.12)*motionAmt());
  // motion transforms (idle breathe + lunge stretch + windup crouch + hurt squash)
  const sq=1+Math.sin(t*3+(opts.bob||0))*0.04*(0.3+0.7*motionAmt());
  const lg=opts.lunge||0;
  let sx=(1+lg*0.12)/sq, sy=sq*(1-lg*0.10);
  if(opts.wind) ctx.translate(0,opts.wind*s*0.06);
  if(opts.hurtAmt){const h=opts.hurtAmt; sx*=1+h*0.12; sy*=1-h*0.10;}
  ctx.scale(sx,sy);

  const body=sp.body, acc=sp.acc, belly=sp.belly;
  // ---- feet / base ----
  ctx.fillStyle = shade(body,-30);
  if(sp.shape!=='winged'){
    ctx.beginPath(); ctx.ellipse(-s*0.4, s*0.78, s*0.26, s*0.18, 0,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.ellipse( s*0.4, s*0.78, s*0.26, s*0.18, 0,0,6.283); ctx.fill();
  }
  // ---- body shape ----
  const g=ctx.createRadialGradient(-s*0.35,-s*0.4,s*0.15, 0,0,s*1.15);
  g.addColorStop(0,shade(body,34)); g.addColorStop(0.55,body); g.addColorStop(1,shade(body,-34));
  ctx.fillStyle = g;
  ctx.strokeStyle = shade(body,-40); ctx.lineWidth = s*0.05;
  ctx.beginPath();
  if(sp.shape==='round'){
    ctx.arc(0,0,s,0,6.283);
  } else if(sp.shape==='long'){
    ctx.ellipse(0,0,s*1.15,s*0.82,0,0,6.283);
  } else if(sp.shape==='spiky'){
    const spikes=9;
    for(let i=0;i<spikes*2;i++){
      const a=i/(spikes*2)*6.283 - 1.57;
      const r = (i%2===0)? s*1.12 : s*0.82;
      const px=Math.cos(a)*r, py=Math.sin(a)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();
  } else if(sp.shape==='winged'){
    ctx.ellipse(0,0,s*0.92,s*0.95,0,0,6.283);
  } else { // blob
    ctx.moveTo(-s, s*0.2);
    ctx.quadraticCurveTo(-s*1.05,-s*0.9, 0,-s*0.98);
    ctx.quadraticCurveTo( s*1.05,-s*0.9, s, s*0.2);
    ctx.quadraticCurveTo( s*0.9, s*0.9, 0, s*0.92);
    ctx.quadraticCurveTo(-s*0.9, s*0.9, -s, s*0.2);
    ctx.closePath();
  }
  ctx.fill(); ctx.stroke();
  // upper-left rim light on the same path
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=s*0.05; ctx.stroke(); ctx.restore();

  // wings behind for winged
  if(sp.shape==='winged'){
    const wf = Math.sin(t*6)*0.3*motionAmt();
    ctx.fillStyle = shade(acc,10);
    for(const wdir of [-1,1]){
      ctx.save(); ctx.scale(wdir,1); ctx.rotate(-0.3+wf*0.5);
      ctx.beginPath();
      ctx.moveTo(s*0.6,-s*0.2);
      ctx.quadraticCurveTo(s*1.7,-s*0.9-wf*s, s*1.5, s*0.2);
      ctx.quadraticCurveTo(s*1.1, s*0.1, s*0.6, s*0.3);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    // redraw body over wing roots
    ctx.fillStyle=body; ctx.beginPath(); ctx.ellipse(0,0,s*0.92,s*0.95,0,0,6.283); ctx.fill(); ctx.stroke();
  }

  // belly
  const bg=ctx.createLinearGradient(0, s*0.22-s*0.58, 0, s*0.22+s*0.58);
  bg.addColorStop(0,shade(belly,25)); bg.addColorStop(1,belly);
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, s*0.22, s*0.5, s*0.58, 0, 0, 6.283); ctx.fill();

  // ---- feature ----
  drawFeature(sp, s, t, acc, body);

  // ---- face ----
  const ex = s*0.32, ey = -s*0.12, er = s*0.2;
  // deterministic per-mon blink: ~1 spike / 3.4s, brief ~0.18s close, floored so eyes never vanish
  const bk = Math.max(0, Math.sin(t*1.85 + (opts.bob||0)*7.0));
  const blink = 1 - 0.88*Math.pow(bk, 40);   // ∈ [0.12, 1]; ==1 except a short blink spike
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-ex,ey,er,er*blink,0,0,6.283); ctx.fill();
  ctx.beginPath(); ctx.ellipse( ex,ey,er,er*blink,0,0,6.283); ctx.fill();
  ctx.fillStyle='#16203a';
  const look = opts.hurt? 0 : s*0.06;
  ctx.beginPath(); ctx.ellipse(-ex+look,ey,er*0.5,er*0.5*blink,0,0,6.283); ctx.fill();
  ctx.beginPath(); ctx.ellipse( ex+look,ey,er*0.5,er*0.5*blink,0,0,6.283); ctx.fill();
  // shine (shrinks out during the close)
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath(); ctx.arc(-ex-er*0.2,ey-er*0.3,er*0.18*blink,0,6.283); ctx.fill();
  ctx.beginPath(); ctx.arc( ex-er*0.2,ey-er*0.3,er*0.18*blink,0,6.283); ctx.fill();
  // mouth
  ctx.strokeStyle='#16203a'; ctx.lineWidth=s*0.05; ctx.lineCap='round';
  ctx.beginPath();
  if(opts.hurt){ ctx.arc(s*0.05, s*0.2, s*0.14, 3.6,5.8); }
  else { ctx.moveTo(-s*0.12, s*0.16); ctx.quadraticCurveTo(s*0.06,s*0.3, s*0.18,s*0.14); }
  ctx.stroke();

  ctx.restore();
}
function drawFeature(sp, s, t, acc, body){
  ctx.save();
  const f = sp.feat;
  if(f==='flame'){
    const fl = Math.sin(t*10)*0.15;
    ctx.fillStyle = acc;
    for(let i=-1;i<=1;i++){
      const bx=i*s*0.42, h=s*(0.5+0.12*Math.sin(t*9+i));
      ctx.beginPath();
      ctx.moveTo(bx-s*0.16,-s*0.85);
      ctx.quadraticCurveTo(bx-s*0.05,-s*0.85-h, bx,-s*1.0-h*(1+fl));
      ctx.quadraticCurveTo(bx+s*0.05,-s*0.85-h, bx+s*0.16,-s*0.85);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = shade(acc,60);
    ctx.beginPath(); ctx.moveTo(-s*0.08,-s*0.9); ctx.quadraticCurveTo(0,-s*1.25,s*0.08,-s*0.9); ctx.closePath(); ctx.fill();
  } else if(f==='leaf'){
    ctx.fillStyle = acc; ctx.strokeStyle=shade(acc,-30); ctx.lineWidth=s*0.03;
    for(let i=-1;i<=1;i++){
      ctx.save(); ctx.translate(i*s*0.3,-s*0.85); ctx.rotate(i*0.5 + Math.sin(t*3+i)*0.08);
      ctx.beginPath(); ctx.ellipse(0,-s*0.28,s*0.14,s*0.34,0,0,6.283); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  } else if(f==='drip'){
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.ellipse(-s*0.3,-s*0.55,s*0.12,s*0.18,0.3,0,6.283); ctx.fill();
    const dy = (t*40)%(s*1.4);
    ctx.fillStyle=shade(acc,20);
    ctx.beginPath(); ctx.arc(s*0.55,-s*0.3+dy, s*0.08*(1-dy/(s*1.4)+0.3),0,6.283); ctx.fill();
  } else if(f==='bolt'){
    ctx.strokeStyle=acc; ctx.lineWidth=s*0.12; ctx.lineJoin='round'; ctx.lineCap='round';
    const j = Math.sin(t*20)>0? 1:0.7;
    ctx.beginPath();
    ctx.moveTo(-s*0.1,-s*0.85); ctx.lineTo(s*0.12,-s*1.05*j); ctx.lineTo(-s*0.05,-s*1.1*j); ctx.lineTo(s*0.14,-s*1.35*j);
    ctx.stroke();
  } else if(f==='rock'){
    ctx.fillStyle=shade(body,-25);
    const rocks=[[-s*0.5,-s*0.5,0.22],[s*0.45,-s*0.55,0.18],[s*0.6,s*0.1,0.16],[-s*0.62,s*0.05,0.14]];
    for(let ri=0;ri<rocks.length;ri++){ const p=rocks[ri];
      const ry=p[1]+Math.sin(t*2.4+ri*1.7)*s*0.03;   // ±3% micro-bob, own phase per chunk
      ctx.beginPath();
      ctx.moveTo(p[0]-s*p[2],ry); ctx.lineTo(p[0],ry-s*p[2]); ctx.lineTo(p[0]+s*p[2],ry); ctx.lineTo(p[0],ry+s*p[2]*0.7);
      ctx.closePath(); ctx.fill();
    }
  } else if(f==='ghost'){
    ctx.globalAlpha=0.5; ctx.fillStyle=acc;
    for(let i=0;i<3;i++){
      const a=t*2+i*2.1;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*1.1, Math.sin(a)*s*0.7 - s*0.3, s*0.12,0,6.283); ctx.fill();
    }
    ctx.globalAlpha=1;
    // little horns
    ctx.fillStyle=shade(body,-30);
    ctx.beginPath(); ctx.moveTo(-s*0.4,-s*0.8); ctx.lineTo(-s*0.55,-s*1.15); ctx.lineTo(-s*0.28,-s*0.85); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo( s*0.4,-s*0.8); ctx.lineTo( s*0.55,-s*1.15); ctx.lineTo( s*0.28,-s*0.85); ctx.closePath(); ctx.fill();
  } else if(f==='horn'){
    ctx.fillStyle=acc; ctx.strokeStyle=shade(acc,-45); ctx.lineWidth=s*0.03;
    for(const d of [-1,1]){
      ctx.beginPath();
      ctx.moveTo(d*s*0.22,-s*0.78);
      ctx.quadraticCurveTo(d*s*0.52,-s*1.06, d*s*0.66,-s*1.34);
      ctx.quadraticCurveTo(d*s*0.44,-s*1.00, d*s*0.42,-s*0.72);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.fillStyle=shade(acc,55);
    for(const d of [-1,1]){ const tw=0.8+0.2*Math.sin(t*4+d*1.3);   // 0.6..1.0 specular twinkle
      ctx.beginPath(); ctx.ellipse(d*s*0.42,-s*1.0,s*0.045*tw,s*0.13*tw,d*0.5,0,6.283); ctx.fill(); }
  }
  ctx.restore();
}
function shade(hex, amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// draw the wanderer (you)
function drawTrainer(x,y,s,t,walking){
  ctx.save(); ctx.translate(x,y);
  const step = walking? Math.sin(t*8):0;
  withShadow(0, s*1.15, s*0.55, s*0.16);
  // legs
  ctx.strokeStyle='#3a2f52'; ctx.lineWidth=s*0.16; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-s*0.1,s*0.5); ctx.lineTo(-s*0.2+step*s*0.2,s*1.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( s*0.1,s*0.5); ctx.lineTo( s*0.2-step*s*0.2,s*1.05); ctx.stroke();
  // cloak body
  ctx.fillStyle='#4a3d6b';
  ctx.beginPath(); ctx.moveTo(-s*0.45,s*0.6); ctx.quadraticCurveTo(-s*0.5,-s*0.3,0,-s*0.5);
  ctx.quadraticCurveTo(s*0.5,-s*0.3,s*0.45,s*0.6); ctx.quadraticCurveTo(0,s*0.8,-s*0.45,s*0.6); ctx.fill();
  // scarf
  ctx.fillStyle='#e0576b'; ctx.fillRect(-s*0.3,-s*0.15,s*0.6,s*0.16);
  ctx.beginPath(); ctx.moveTo(s*0.2,0); ctx.lineTo(s*0.4+step*s*0.1,s*0.4); ctx.lineTo(s*0.15,s*0.1); ctx.fill();
  // head
  ctx.fillStyle='#f0c9a0'; ctx.beginPath(); ctx.arc(0,-s*0.5,s*0.3,0,6.283); ctx.fill();
  // hood
  ctx.fillStyle='#4a3d6b';
  ctx.beginPath(); ctx.arc(0,-s*0.62,s*0.34,3.4,6.02); ctx.fill();
  ctx.restore();
}

const Board = {
  URL: '/api/wildwalk_board',
  async fetchTop(){
    if(typeof globalThis.fetch !== 'function') return null;
    try{
      const r = await globalThis.fetch(this.URL);

      const j = await r.json();
      return (j && Array.isArray(j.top)) ? j.top : null;

  submit(name, dist, tier){
    if(typeof globalThis.fetch !== 'function') return;
    try{

        method:'POST', headers:{'content-type':'application/json'},
        body:JSON.stringify({ name:name, dist:dist, tier:tier })
      });
      if(p && typeof p.catch === 'function') p.catch(()=>{});
    }catch(_){ }
  }
};

function tutStep(){

// ---------- button system ----------
function btn(id,x,y,w,h,label,sub,opts){

    tcol:opts.tcol||'#eaf0ff', accent:opts.accent, big:opts.big});
}
function clearButtons(){ G.buttons=[]; }
function hitButton(mx,my){
  for(const b of G.buttons){

function drawButtons(){
  for(const b of G.buttons){
    const grd=ctx.createLinearGradient(0,b.y,0,b.y+b.h);
    if(b.enabled){ grd.addColorStop(0,shade(b.col,18)); grd.addColorStop(1,shade(b.col,-18)); }
    else { grd.addColorStop(0,'#1a2036'); grd.addColorStop(1,'#141a2c'); }
    ctx.save();
    if(b.enabled && (b.accent||b.big)){ ctx.shadowColor=b.accent||shade(b.col,40); ctx.shadowBlur=14; }
    roundRect(b.x,b.y,b.w,b.h,10); ctx.fillStyle=grd; ctx.fill();
    ctx.restore();
    if(b.enabled){ ctx.save(); ctx.globalAlpha=1; ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(b.x+11,b.y+1.5); ctx.lineTo(b.x+b.w-11,b.y+1.5); ctx.stroke(); ctx.restore(); }
    ctx.lineWidth=2; ctx.strokeStyle=b.enabled?(b.accent||shade(b.col,40)):'#2a3150'; roundRect(b.x,b.y,b.w,b.h,10); ctx.stroke();

    if(b.sub){ ctx.font='600 12px Segoe UI'; ctx.fillStyle=b.enabled?'#aab6d8':'#4a5478';
      ctx.fillText(b.sub, b.x+b.w/2, b.y+b.h/2+16); }
  }

}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function flash(m){ G.msg=m; G.msgT=2.2; }

// Flow control
// ===================================================================
function startWalk(){
  G.state='walk';
  G.lastRunRec=null; G.lastRunRank=-1;
  updateBiome();                 // idempotent desync guard (no-op when unchanged)
  G.scroll=0; G.walkTarget = 320 + G.tier*10;
  setWeather();                  // walk leg previews the coming sky
  clearButtons();
}
function startDaily(){
  const day = dayInt();
  reseed(dailySeedFor(day));          // 1) reseed LCG — world is deterministic for the day
  const k = DAILY_POOL[Math.floor(rnd()*DAILY_POOL.length)];   // 2) deterministic starter (fixed pool → identical for every player), consumes 1 rnd()
  newGame(k);                         // 3) build G; k ∈ COMMONS ⊆ starterPool() so NO extra rnd()
  G.daily = true; G.dailySeed = day; G.asc = 0;  // 4) latch mode AFTER newGame (survives startWalk, read in gameOver); daily always ascension 0
  startWalk();                        // 5) skip starter-select entirely
}
function bossDue(){ return ((G.fights+1) % BOSS_EVERY) === 0; }
function spawnBoss(forceKey){
  const teamAvg = G.team.reduce((s,m)=>s+m.level,0)/G.team.length;
  const pool = G.tier<4 ? RARES : LEGENDS;
  const favor = (BIOMES[G.biome]||BIOMES[0]).favor || [];
  const themed = pool.filter(k => favor.includes(SPECIES[k].type));
  const key = forceKey || pick(themed.length ? themed : pool);   // forceKey = test hook only
  const lvl = Math.round(teamAvg + (G.tier-1)*0.9 + BOSS_LVL_BONUS);
  const w = makeMon(key, Math.max(3,lvl));
  w.maxhp = Math.round(w.maxhp*BOSS_HP_MUL); w.hp = w.maxhp;
  w.atk *= BOSS_ATK_MUL; w.spd *= BOSS_SPD_MUL;
  w.boss=true; w.elite=true;
  w.phaseMax = (G.tier>=6?3:2); w.phase = w.phaseMax; w.phaseBreak=0; w.enrage=1;
  w.tele=0; w.teleActive=false; w.teleCd = rr(TELE_GAP[0],TELE_GAP[1]);
  w.clock=0; w.noHeal=false;
  w.bossTitle = BOSS_TITLES[key] || w.sp.name;
  Dex.see(key);
  w.maxhp = Math.round(w.maxhp * ascHpMul()); w.hp = w.maxhp; w.atk *= ascAtkMul();
  finishSpawn(w);                                     // resets cds/status/pops, sets battleIntro=1.0
  G.battleIntro = BOSS_INTRO_T;                        // extend to cover the banner (single timer)
  sfx('boss');
  return w;
}
function spawnWild(elite){
  if(!elite) G.enc = (G.enc||0)+1;
  const lead = activeMon() || G.team[0];
  // The first couple of encounters are gentle weaklings that don't hard-counter
  // your starter — so a solo trainer reliably reaches their first catch.
  if(!elite && G.enc<=2 && lead){
    const safe = COMMONS.filter(k=> typeMult(SPECIES[k].type, lead.sp.type) <= 1);
    const key = pick(safe.length?safe:COMMONS);
    const lvl = Math.max(2, lead.level-1);
    const w = makeMon(key, lvl);
    w.atk *= 0.5; w.maxhp = Math.round(w.maxhp*0.8); w.hp = w.maxhp;
    Dex.see(key);
    finishSpawn(w); return;
  }
  // choose species pool by tier + rarity roll
  let poolKey;
  const roll = rnd();
  if(elite){
    poolKey = (G.tier>=6 && roll<0.4)? LEGENDS : (roll<0.55? RARES : UNCOMMONS);
  } else {
    if(G.tier<=1) poolKey = roll<0.85? COMMONS : UNCOMMONS;
    else if(G.tier<=3) poolKey = roll<0.6? COMMONS : (roll<0.92? UNCOMMONS : RARES);
    else if(G.tier<=5) poolKey = roll<0.35? COMMONS : (roll<0.8? UNCOMMONS : RARES);
    else poolKey = roll<0.2? UNCOMMONS : (roll<0.8? RARES : LEGENDS);
  }
  const key = pickBiased(poolKey);   // biome-biased (base weight 1 → never empty)
  // wild level tracks your team so encounters stay fair, drifting up with depth
  const teamAvg = G.team.reduce((s,m)=>s+m.level,0)/G.team.length;
  let lvl = Math.round(teamAvg + (G.tier-1)*0.9 + ri(-1,1));
  lvl = Math.max(2, lvl + (elite?3:0));
  const w = makeMon(key, lvl);
  // wild creatures are untrained — weaker early, ramping to near-parity by mid-run
  const weakness = clamp(0.6 + Math.min(G.tier,6)*0.05, 0.6, 0.9);
  w.atk *= weakness;
  if(elite){ w.maxhp=Math.round(w.maxhp*1.4); w.hp=w.maxhp; w.atk = statAt(SPECIES[key].base.atk,lvl)*1.15; w.elite=true; }
  Dex.see(key);
  w.maxhp = Math.round(w.maxhp * ascHpMul()); w.hp = w.maxhp; w.atk *= ascAtkMul();
  finishSpawn(w);
}
function finishSpawn(w){
  G.wild = w;
  G.state='battle';
  G.outcome=null; G.dmgPops=[]; G.parts=[]; G.shake=0;
  setWeather();                  // same hash inputs → walk & battle agree
  G.battleIntro = 1.0;
  // set active lead to first healthy companion
  G.lead = G.team.findIndex(m=>m.hp>0);
  if(G.lead<0) G.lead=0;
  G.team.forEach(m=>{ m.cd=0.3; m.status=freshStatus(); m.spd = m.sp.base.spd * (hasTrinket(m,'swiftfeather')?1.15:1); });
  if(hasRelic('startheal')) G.team.forEach(m=>{ if(m.hp>0) m.hp=Math.min(m.maxhp, m.hp+Math.round(m.maxhp*0.15)); });
  G.wild.cd = 0.6; G.wild.status = freshStatus();
  G.switchCd = 0; G.switchAnim = 0;
  clearButtons();
}
function activeMon(){ return G.team[G.lead]; }
function hasRelic(id){ return !!G.relics && G.relics.indexOf(id)>=0; }
function hasTrinket(m,id){ return !!m && m.trinket===id; }
function relicCount(id){ return G.relics? G.relics.reduce((n,x)=>n+(x===id?1:0),0):0; }
function switchCdMax(){ return SWITCH_CD * (hasRelic('swiftpaw')?0.6:1); }

function afterFightChoices(){
  if(G.wild && G.wild.boss){ G.bossWin=true; burst(660,470); Dex.data.bossKills=(Dex.data.bossKills||0)+1; Dex.save(); checkAch(); }   // latch + defeat flourish
  G.state='choice';
  clearButtons();
}
function doCatch(){
  const w=G.wild;
  const chance = catchChance(w);
  const success = rnd() < chance;
  if(success){
    const cap = makeMon(w.key, w.level);
    Dex.caught(w.key);
    Dex.data.wildCatch=(Dex.data.wildCatch||0)+1; Dex.save();   // a genuine wild catch (not the auto-caught starter)
    checkAch();
    G.honor += 1;
    flash('Caught '+w.sp.name+'!');
    burst(W/2,250);
    sfx('catch');
    acquire(cap, ()=>endFight(true));
  } else {
    flash(w.sp.name+' broke free and fled!');
    sfx('catchfail');
    endFight(false);
  }
}
// Bring a new companion into the roster. If the party (4) is full, hand control
// to the swap picker so the player chooses who to keep; otherwise slot it in.
function acquire(mon, ret){
  if(G.team.length<4){ G.team.push(mon); flash(mon.sp.name+' joined the party!'); if(ret) ret(); return; }
  G.pendingMon=mon; G.afterAcquire=ret||startWalk; G.state='swapchoice'; clearButtons();
}
function finishSwap(){ const ret=G.afterAcquire; G.pendingMon=null; G.afterAcquire=null; if(ret) ret(); }
function swapOut(i){
  const out=G.team[i]; G.box.push(out); G.team[i]=G.pendingMon;
  flash('Swapped '+out.sp.name+' → '+G.pendingMon.sp.name+' (sent to box).');
  finishSwap();
}
function pendingToBox(){ G.box.push(G.pendingMon); flash(G.pendingMon.sp.name+' sent to your box.'); finishSwap(); }
function pendingRelease(){ const m=G.pendingMon; const h=Math.round(m.level*(1+m.sp.rarity*0.4)*1.6);
  G.honor+=h; flash('Released '+m.sp.name+'. +'+h+' honor.'); finishSwap(); }
function catchChance(w){
  let c = CATCH_BASE[w.sp.rarity];
  c += G.ballTier*0.1;
  c += Math.min(G.honor*0.0025, 0.15);
  c -= (w.level>G.tier*2? 0.05:0);
  if(hasRelic('catch')) c += 0.08;
  if(hasRelic('rare') && w.sp.rarity>=2) c += 0.12;
  c += Dex.up('catch')*0.04;
  c += weatherCatchBonus();
  if(w.boss) return Math.max(BOSS_CATCH_FLOOR, clamp(c,0.05,0.96));
  return clamp(c, 0.05, 0.96);
}
function doKill(){
  const w=G.wild;
  const s = (Math.round(w.level * (1+w.sp.rarity*0.6) * 2.2) + (w.elite?15:0)) * (w.boss?BOSS_SOULS_MUL:1);
  G.souls += s;
  Dex.see(w.key);
  Dex.data.killed=(Dex.data.killed||0)+1; Dex.save(); checkAch();
  flash('Slain. +'+s+' souls.');
  endFight(true);
}
function doRelease(){
  const w=G.wild;
  const h = (Math.round(w.level * (1+w.sp.rarity*0.4) * 1.6) + (w.elite?10:0)) * (w.boss?BOSS_HONOR_MUL:1);
  let hh = h; if(hasRelic('honor')) hh = Math.round(hh*1.5); G.honor += hh;
  Dex.see(w.key);
  Dex.data.released=(Dex.data.released||0)+1; Dex.save(); checkAch();
  flash('Released to the wild. +'+hh+' honor.');
  endFight(true);
}
function endFight(won){
  const wasBoss = G.bossWin;
  // XP + gold to team
  const w=G.wild;
  const xp = (10 + Math.round(w.level*4) + w.sp.rarity*6 + (w.elite?20:0)) * (w.boss?BOSS_XP_MUL:1);
  let gold = ri(4,9) + w.sp.rarity*3 + (w.elite?12:0) + (w.boss?BOSS_GOLD:0);
  gold = Math.round(gold * (1 + 0.30*relicCount('gold')));
  if(hasTrinket(activeMon(),'luckycoin')) gold=Math.round(gold*1.3);
  G.gold += gold;
  let evoMsg=''; let leveledAny=false, evoAny=false;
  for(const m of G.team){ if(m.hp>0){
    const res = xpToLevels(m, m===activeMon()? xp : Math.round(xp*0.6));
    for(const r of res) if(r.evo) evoMsg = m.sp.name!==r.from? (r.from+' evolved into '+r.to+'!') : evoMsg;
    if(res.length) leveledAny=true;
    if(res.some(x=>x.evo)) evoAny=true;
    if(res.length) m.levelFlash = res.some(x=>x.evo)?1.4:0.9;
  }}
  if(evoAny) sfx('evolve'); else if(leveledAny) sfx('levelup');
  if(evoMsg) setTimeout(()=>flash(evoMsg), 400);
  G.fights++; G.dist += 40 + G.tier*4;
  if(won && G.team.length===4 && G.team.every(m=>m.hp>0)){ Dex.data.fullPartyWin=1; Dex.save(); }
  Dex.data.best=Math.max(Dex.data.best||0,G.dist); Dex.save(); checkAch();
  G.wild=null;
  // survivors catch their breath after a win
  for(const m of G.team){ if(m.hp>0) m.hp=Math.min(m.maxhp, m.hp+m.maxhp*0.30); }
  // boss trophy — full heal of survivors + a consumable + a small permanent buff
  if(G.bossWin){
    G.team.forEach(m=>{ if(m.hp>0) m.hp=m.maxhp; });   // extra full heal of survivors
    G.potions += 1;                                     // consumable reward
    if(hasRelic('bosspotion')) G.potions += 1;          // Phoenix Feather relic
    G.team.forEach(m=> m.atk *= 1.04);                  // small permanent trophy buff
    G.bossWin=false;
  }
  const nextStep = (G.fights % 3 === 0) ? setupCrossroads : startWalk;
  if(wasBoss) setupRelicPick(nextStep); else nextStep();
}

// Rotating stock: on entry openShop() rolls a small randomized offer set from
// SHOP_CATALOG (the single price source), biased by G.tier so deeper runs surface
// rarer wares. Stock + reroll counter are TRANSIENT on G (never serialized).
const REROLL_BASE=5, REROLL_STEP=3, SHOP_STOCK_SIZE=4;
const SHOP_CATALOG = {
  heal:{icon:'💖',name:'Full Heal',desc:'Restore all HP',price:15},
  potion:{icon:'🧪',name:'Potion',desc:'+1 mid-battle heal',price:12},
  ball:{icon:'🎯',name:'Ball Upgrade',desc:'Catch rate ↑',price:30},
  revive:{icon:'✚',name:'Revive',desc:'Restore a fainted ally',price:20},
  egg:{icon:'🥚',name:'Mystery Egg',desc:'Hatch a new companion',price:25},
  trinket:{icon:'🎁',name:'Trinket Bag',desc:'A random held trinket',price:35},
};
function genShopStock(){
  const T=G.tier;
  const pool=[ {id:'heal',w:10}, {id:'potion',w:10} ];
  if(G.team.some(m=>m.hp<=0)) pool.push({id:'revive',w:8});
  if(G.ballTier<3) pool.push({id:'ball',w:Math.max(1,8-2*T)});
  pool.push({id:'egg',w:4+T*1.5});
  pool.push({id:'trinket',w:3+T*2});
  const total=pool.reduce((s,e)=>s+e.w,0);
  const draw=()=>{ let r=rnd()*total; for(const e of pool){ r-=e.w; if(r<=0) return e.id; } return 'heal'; };
  const stock=[];
  for(let i=0;i<SHOP_STOCK_SIZE;i++){ const id=draw(); stock.push({id, price:SHOP_CATALOG[id].price, sold:false}); }
  return stock;
}
function rerollCost(){ return REROLL_BASE + REROLL_STEP*G.shopRerolls; }
function rerollShop(){
  const c=rerollCost();
  if(G.gold<c){ flash('Not enough gold to reroll.'); return; }
  G.gold-=c; G.shopRerolls++; G.shopStock=genShopStock(); flash('New wares!');
}
function buyStock(i){
  const s=G.shopStock[i];
  if(!s||s.sold) return;
  if(buy(s.id)) s.sold=true;
}
function openShop(){ G.state='shop'; clearButtons(); G.shopRerolls=0; G.shopStock=genShopStock(); }
function buy(item){
  const price=SHOP_CATALOG[item] ? SHOP_CATALOG[item].price : Infinity;
  if(item==='potion' && G.gold>=price){ G.gold-=price; G.potions++; flash('Bought a potion.'); return true; }
  else if(item==='ball' && G.gold>=price){
    if(G.ballTier>=3){ flash('Ball already maxed.'); return false; }
    G.gold-=price; G.ballTier++; flash('Ball upgraded! Catch rate up.'); return true;
  }
  else if(item==='egg' && G.gold>=price){
    G.gold-=price; const k=pick(rnd()<0.7?COMMONS:UNCOMMONS); const m=makeMon(k, Math.max(3,G.tier*2-2));
    Dex.caught(k);
    flash('The egg hatched into '+m.sp.name+'!');
    acquire(m, ()=>{ G.state='shop'; });
    return true;
  }
  else if(item==='revive' && G.gold>=price){
    const dead=G.team.find(m=>m.hp<=0);
    if(dead){ G.gold-=price; dead.hp=Math.round(dead.maxhp*0.5); flash(dead.sp.name+' revived!'); return true; }
    flash('No fainted companions.'); return false;
  }
  else if(item==='heal' && G.gold>=price){
    G.gold-=price; G.team.forEach(m=>{ if(m.hp>0) m.hp=m.maxhp; }); flash('Team fully healed!'); return true;
  }
  else if(item==='trinket' && G.gold>=price){
    G.gold-=price; const tid=pick(TRINKET_KEYS); G.trinkets.push(tid); flash('Bought '+TRINKETS[tid].name+'!'); return true;
  }
  flash('Not enough gold.'); return false;
}

// ===================================================================
// Battle simulation
// ===================================================================
function updateBattle(dt){
  if(G.battleIntro>0){ G.battleIntro-=dt; return; }
  if(G.switchCd>0) G.switchCd = Math.max(0, G.switchCd - dt);
  const you=activeMon(), w=G.wild;
  if(!you || you.hp<=0){ // switch
    if(you && you.hp<=0 && hasTrinket(you,'reviveberry')){
      you.trinket=null;                 // CONSUMED — not returned to inventory
      you.hp=Math.round(you.maxhp*0.5);
      you.status=freshStatus();
      burst(300,470); flash(you.sp.name+' clung to life!');
      return;
    }
    const nxt=G.team.findIndex(m=>m.hp>0);
    if(nxt<0){ gameOver(); return; }
    G.lead=nxt; return;
  }
  if(!w || w.hp<=0){ afterFightChoices(); return; }

  // status DoT/regen/timers (a hit to 0 HP is caught by the hp<=0 branches next frame)
  statusTick(you,dt); statusTick(w,dt);

  // ---- boss engine (transient boss fields only; guarantees termination) ----
  let bossPaused=false;
  if(w.boss){
    w.clock += dt;
    // (a) EXECUTE VALVE — guarantees termination even vs a self-healing boss
    if(w.clock > BOSS_SOFTCAP){ w.noHeal=true; w.hp=Math.max(0, w.hp - w.maxhp*BOSS_EXECUTE_DPS*dt); }
    // (b) PHASE ADVANCE — monotonic decrement, guarded, fires once per threshold
    if(w.phase>1 && w.hp <= w.maxhp*(w.phase-1)/w.phaseMax) bossPhaseAdvance(w);
    // (c) PHASE-BREAK beat — freezes BOTH strikes, bounded ≤ BOSS_PHASE_PAUSE
    if(w.phaseBreak>0){ w.phaseBreak = Math.max(0, w.phaseBreak-dt); bossPaused=true; }
    // (d) TELEGRAPH scheduler (only when not paused)
    else bossTelegraphTick(w, you, dt);
  }

  // tick attacks — player DPS is never gated; boss holds fire during pause/wind-up
  you.cd -= dt;
  if(!(w.boss && (bossPaused || w.tele>0))) w.cd -= dt;
  if(you.cd<=0 && !bossPaused){ if(you.status.stun>0){ you.cd=0; } else { you.cd = 1/you.spd; strike(you, w, +1); } }
  if(w.cd<=0 && !(w.boss && (bossPaused || w.tele>0))){ if(w.status.stun>0){ w.cd=0; } else { w.cd = 1/w.spd; strike(w, you, -1); } }

  // anim decay
  for(const m of [you,w]){ m.lunge=Math.max(0,m.lunge-dt*4); m.hurt=Math.max(0,m.hurt-dt*4); }
  if(G.switchAnim>0) G.switchAnim = Math.max(0, G.switchAnim - dt);
  updateFx(dt);
}
function strike(att, def, dir){
  const mult = typeMult(att.sp.type, def.sp.type);
  const crit = rnd() < (0.13*weatherCritMul() + (hasRelic('crit')?0.10:0) + (hasTrinket(att,'critfang')?0.12:0));
  let dmg = att.atk * mult * (crit?(hasRelic('critdmg')?2.2:1.8):1) * rr(0.86,1.14) * (hasTrinket(att,'typegem')?1.2:1) * weatherDmgMul(att.sp.type);
  dmg = Math.max(1, Math.round(dmg));
  const dtx = dir>0? 660 : 300;   // defender's on-screen x
  // Shadow dodge (defender passive): full evade, no HP change, no on-hit effects
  if(def.sp.type==='Shadow' && rnd()<SHADOW_DODGE){
    def.status.fDodge=0.4; att.lunge=1;
    G.dmgPops.push({x:dtx+rr(-20,20), y:200, vy:-40, life:1, txt:'DODGE', dodge:true, col:'#a06bff', age:0, rot:0});
    for(let i=0;i<4;i++){ if(G.parts.length<160) G.parts.push({x:dtx,y:210,vx:rr(-70,70),vy:rr(-110,-20),life:rr(0.3,0.6),col:'#a06bff',r:rr(2,4)}); }
    return;
  }
  // Rock guard (defender passive): reduce incoming, floor at 1 so every hit still bites
  if(def.sp.type==='Rock'){ dmg=Math.max(1, Math.round(dmg*(1-ROCK_GUARD))); def.status.fGuard=0.35; }
  if(hasTrinket(def,'guardstone')) dmg=Math.max(1, Math.round(dmg*0.85));
  def.hp = Math.max(0, def.hp - dmg);
  if(hasTrinket(att,'lifeamulet')){ const h=Math.round(dmg*0.15); if(h>0) att.hp=Math.min(att.maxhp, att.hp+h); }
  if(dir>0 && hasRelic('lifesteal')){ const h=Math.round(dmg*0.12); if(h>0) att.hp=Math.min(att.maxhp, att.hp+h); }
  if(dir<0 && hasRelic('thorns')) att.hp=Math.max(0, att.hp - Math.round(dmg*0.20));
  att.lunge=1; def.hurt=1;
  sfx(crit?'crit':'hit');
  G.shake = Math.min(10, G.shake + (crit?7:3));
  const tx = dir>0? 660 : 300;
  G.dmgPops.push({x:tx+rr(-20,20), y:200, vy:-40, life:1, txt:'-'+dmg, crit, eff:mult, age:0, rot: crit?rr(-0.12,0.12):0});
  // hit particles — biased away from attacker
  for(let i=0;i<(crit?14:8);i++){
    const a=(-dir)*0.9 + rr(-1.1,1.1), sp=rr(40,160);
    if(G.parts.length<160) G.parts.push({x:tx,y:210,vx:Math.cos(a)*sp + dir*60,vy:Math.sin(a)*sp-30,life:rr(0.3,0.7),
      col: crit?'#fff': TYPE_COL[att.sp.type], r:rr(2,5)});
  }
  // bright core sparks
  for(let i=0;i<(crit?3:2);i++){
    const a=(-dir)*0.9 + rr(-0.8,0.8), sp=rr(60,140);
    if(G.parts.length<160) G.parts.push({x:tx,y:210,vx:Math.cos(a)*sp + dir*50,vy:Math.sin(a)*sp-30,life:0.15,
      col: crit?'#ffdf5a':'#fff', r:rr(4,7)});
  }
  if(crit && G.parts.length<160) G.parts.push({x:tx,y:210,ring:true,r:6,life:0.5,col:'#ffdf5a'});

  // ---- attacker on-hit effects (only on a landed hit) ----
  switch(att.sp.type){
    case 'Fire': { // burn stacks (capped), refresh duration
      const inc=hasRelic('burn')?2:1, bcap=BURN_MAX+(hasRelic('burn')?1:0);
      def.status.burn=Math.min(bcap, def.status.burn+inc); def.status.burnT=BURN_DUR + (hasTrinket(att,'emberbrand')?1.5:0); def.status.fBurn=0.4;
      for(let i=0;i<3;i++){ if(G.parts.length<160) G.parts.push({x:tx,y:210,vx:rr(-40,40),vy:rr(-120,-40),life:rr(0.3,0.6),col:'#ff7a3d',r:rr(2,4)}); }
      break; }
    case 'Water': { // instant lifesteal
      if(att.boss && att.noHeal) break;
      const h=Math.round(dmg*WATER_STEAL);
      if(h>0){ att.hp=Math.min(att.maxhp, att.hp+h); att.status.fHeal=0.4;
        G.dmgPops.push({x:(dir>0?300:660)+rr(-20,20), y:200, vy:-40, life:1, txt:'+'+h, heal:true, col:'#7fe0d0', age:0, rot:0});
        for(let i=0;i<3;i++){ if(G.parts.length<160) G.parts.push({x:(dir>0?300:660),y:210,vx:rr(-40,40),vy:rr(-120,-40),life:rr(0.3,0.6),col:'#7fe0d0',r:rr(2,4)}); }
      }
      break; }
    case 'Grass': { // over-time leech (regen pip)
      if(att.boss && att.noHeal) break;
      att.status.regen=LEECH_DUR; att.status.regenRate=(dmg*GRASS_LEECH)/LEECH_DUR; att.status.fHeal=0.3;
      break; }
    case 'Volt': { // chance to stun (respects immunity window)
      if(def.status.stunImm<=0 && rnd()<VOLT_STUN*(hasTrinket(def,'focusband')?0.4:1)){
        def.status.stun=STUN_DUR; def.status.stunImm=STUN_IMM; def.status.fStun=0.5;
        G.dmgPops.push({x:tx+rr(-20,20), y:200, vy:-40, life:1, txt:'STUN', stun:true, col:'#ffd23d', age:0, rot:0});
        for(let i=0;i<5;i++){ if(G.parts.length<160) G.parts.push({x:tx,y:210,vx:rr(-90,90),vy:rr(-120,20),life:rr(0.2,0.5),col:'#ffd23d',r:rr(2,4)}); }
      }
      break; }
  }
}
// tick one mon's status effects (DoT/regen/timers). Fractional HP is fine; hpShown lerps.
function statusTick(m,dt){
  if(!m || !m.status) return;
  const s=m.status;
  if(m.boss && m.noHeal) s.regen=0;
  if(s.burnT>0){ s.burnT-=dt; m.hp=Math.max(0, m.hp - m.maxhp*BURN_PCT*s.burn*dt); if(s.burnT<=0) s.burn=0; }
  if(s.regen>0 && m.hp>0){ m.hp=Math.min(m.maxhp, m.hp+s.regenRate*dt); s.regen-=dt; }
  s.stun=Math.max(0,s.stun-dt); s.stunImm=Math.max(0,s.stunImm-dt);
  s.fBurn=Math.max(0,s.fBurn-dt); s.fStun=Math.max(0,s.fStun-dt);
  s.fGuard=Math.max(0,s.fGuard-dt); s.fDodge=Math.max(0,s.fDodge-dt); s.fHeal=Math.max(0,s.fHeal-dt);
}
// ---- boss phase-break / telegraph / capped heavy attack ----
function bossPhaseAdvance(w){
  w.phase--; w.phaseBreak = BOSS_PHASE_PAUSE;
  w.enrage *= BOSS_ENRAGE; w.atk *= BOSS_ENRAGE; w.spd *= 1.05;   // enrage beat
  if(w.status) w.status.regen = 0;                                // heal-block beat (boss only, never player)
  G.shake = Math.min(12, G.shake+8);
  G.dmgPops.push({x:660, y:150, vy:-30, life:1.2, txt:'ENRAGED!', heavy:true, col:BOSS_DANGER, age:0, rot:0});
  for(let i=0;i<12;i++){ if(G.parts.length<160) G.parts.push({x:660,y:210,vx:rr(-130,130),vy:rr(-150,30),life:rr(0.3,0.6),col:BOSS_PHASE_COL[Math.min(2,w.phaseMax-w.phase)],r:rr(3,6)}); }
  if(G.parts.length<160) G.parts.push({x:660,y:210,ring:true,r:6,life:0.5,col:BOSS_DANGER});
  w.tele = TELE_WINDUP; w.teleActive = true;                      // arm a telegraph on the new phase
}
function bossTelegraphTick(w, def, dt){
  if(w.tele>0){
    w.tele -= dt; w.teleActive = true;
    if(w.tele<=0){ w.tele=0; w.teleActive=false; bossHeavyStrike(w,def); w.teleCd = rr(TELE_GAP[0],TELE_GAP[1]); }
  } else {
    w.teleCd -= dt;
    if(w.teleCd<=0){ w.tele=TELE_WINDUP; w.teleActive=true; }
  }
}
function bossHeavyStrike(w, def){
  const mult = typeMult(w.sp.type, def.sp.type);
  if(def.sp.type==='Shadow' && rnd()<SHADOW_DODGE){        // reuse existing dodge
    def.status.fDodge=0.4; w.lunge=1;
    G.dmgPops.push({x:300+rr(-20,20),y:200,vy:-40,life:1,txt:'DODGE',dodge:true,col:'#a06bff',age:0,rot:0}); return;
  }
  let dmg = w.atk * mult * BOSS_HEAVY_MUL * weatherDmgMul(w.sp.type);   // enrage already folded into w.atk — do NOT re-multiply
  if(def.sp.type==='Rock') dmg *= (1-ROCK_GUARD);
  if(hasTrinket(def,'guardstone')) dmg *= 0.85;
  dmg = Math.min(dmg, def.maxhp*BOSS_HEAVY_CAP);           // HARD CAP — full-HP mon always survives with ≥40%
  dmg = Math.max(1, Math.round(dmg));
  def.hp = Math.max(0, def.hp - dmg); def.hurt=1; w.lunge=1;
  G.shake = Math.min(14, G.shake+10);
  G.dmgPops.push({x:300+rr(-20,20),y:200,vy:-40,life:1.1,txt:'-'+dmg,heavy:true,col:BOSS_DANGER,age:0,rot:0});
  for(let i=0;i<12;i++){ if(G.parts.length<160) G.parts.push({x:300,y:210,vx:rr(-120,120),vy:rr(-160,40),life:rr(0.3,0.7),col:BOSS_DANGER,r:rr(3,6)}); }
  if(G.parts.length<160) G.parts.push({x:300,y:210,ring:true,r:6,life:0.5,col:BOSS_DANGER});
}
function updateFx(dt){
  for(const p of G.dmgPops){ p.y+=p.vy*dt; p.vy+=40*dt; p.life-=dt*0.9; p.age=(p.age||0)+dt; }
  G.dmgPops=G.dmgPops.filter(p=>p.life>0);
  for(const p of G.parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; if(!p.ring) p.vy+=260*dt; p.life-=dt; }
  G.parts=G.parts.filter(p=>p.life>0);
  G.shake=Math.max(0,G.shake-dt*36);
  // animate visible HP bars toward the real value
  const lerpHP=(m)=>{ if(!m) return; if(m.hpShown==null) m.hpShown=m.hp; m.hpShown+=(m.hp-m.hpShown)*Math.min(1,dt*6); if(Math.abs(m.hp-m.hpShown)<0.5) m.hpShown=m.hp; };
  for(const m of G.team) lerpHP(m);
  lerpHP(G.wild);
  for(const m of G.team) if(m && m.levelFlash>0) m.levelFlash-=dt*1.4;
}
// celebratory burst of stars + a ring at (x,y)
function burst(x,y){
  for(let i=0;i<18;i++){
    if(G.parts.length>=160) break;
    const a=rnd()*6.283, sp=rr(60,180);
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,life:rr(0.5,1.0),
      col: (i%2)?'#ffdf5a':'#fff', r:rr(4,8), star:true});
  }
  if(G.parts.length<160) G.parts.push({x,y,ring:true,r:6,life:0.5,col:'#ffdf5a'});
}

// ---- palette color helpers (biome crossfade) ----
function lerpHex(c1,c2,k){
  const a=parseInt(c1.slice(1),16), b=parseInt(c2.slice(1),16);
  const r=Math.round(((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*k);
  const g=Math.round(((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*k);
  const bl=Math.round((a&255)+((b&255)-(a&255))*k);
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
function lerpRGB(s1,s2,k){
  const a=s1.split(','), b=s2.split(',');
  return a.map((v,i)=>Math.round(+v+(+b[i]- +v)*k)).join(',');
}
// blend two biome palettes; colors/rgb-strings lerp, scalars/flags come from pb.
function blend(pa,pb,k){
  const HEX=['skyTop','skyMid','skyBot','orb','hillFar','hillNear','tree','ground','groundEdge','path','pathStone'];
  const RGB=['orbHalo','haze','moteCol'];
  const o=Object.assign({},pb);
  for(const f of HEX) o[f]=lerpHex(pa[f]||pb[f], pb[f], k);
  for(const f of RGB) o[f]=lerpRGB(pa[f]||pb[f], pb[f], k);
  return o;
}

function drawBG(scrollX, tier){   // 'tier' kept for call-site stability; palette keys off G.biome
  const b = BIOMES[G.biome] || BIOMES[0];                         // graceful default
  const P = (G.biomeFxT>0)
    ? blend(BIOMES[G.biomePrev]||b, b, 1-Math.min(1,G.biomeFxT/2.6))
    : b;
  // sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, P.skyTop);
  sky.addColorStop(0.6, P.skyMid);
  sky.addColorStop(1, P.skyBot);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // sun/moon — kept clear of the HP panels up top
  if(P.orbKind!=='none'){
    ctx.save();
    const halo=ctx.createRadialGradient(150,205,10, 150,205,120);
    halo.addColorStop(0,'rgba('+P.orbHalo+',0.55)'); halo.addColorStop(1,'rgba('+P.orbHalo+',0)');
    ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(150,205,120,0,6.283); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = P.orbKind==='moon'? 0.75 : 0.85;
    ctx.fillStyle = P.orb;
    ctx.beginPath(); ctx.arc(150,205,44,0,6.283); ctx.fill();
    if(P.orbKind==='moon'){ ctx.globalAlpha=0.22; ctx.fillStyle=P.skyTop;
      ctx.beginPath(); ctx.arc(168,197,40,0,6.283); ctx.fill(); }   // crescent shade
    ctx.restore();
  }
  // haze band on the horizon
  ctx.save();
  const haze=ctx.createLinearGradient(0,H*0.5,0,H*0.62);
  haze.addColorStop(0,'rgba('+P.haze+',0.25)'); haze.addColorStop(1,'rgba('+P.haze+',0)');
  ctx.fillStyle=haze; ctx.fillRect(0,H*0.5,W,H*0.12);
  ctx.restore();
  // far hills (parallax)
  drawHills(scrollX*0.15, 380, P.hillFar, 180);
  drawHills(scrollX*0.35, 430, P.hillNear, 150);
  // trees mid
  for(let i=0;i<P.treeN;i++){
    const bx = ((i*180 - scrollX*0.6) % (W+220)+ (W+220))%(W+220) -110;
    drawTree(bx, 460, 40, P.tree);
  }
  // ground
  ctx.fillStyle=P.ground; ctx.fillRect(0,470,W,H-470);
  ctx.fillStyle=P.groundEdge; ctx.fillRect(0,470,W,10);
  // path
  ctx.fillStyle=P.path;
  ctx.beginPath(); ctx.moveTo(0,540); ctx.lineTo(W,530); ctx.lineTo(W,560); ctx.lineTo(0,570); ctx.fill();
  // path stones
  ctx.fillStyle=P.pathStone;
  for(let i=0;i<12;i++){ const px=((i*100 - scrollX*0.9)%(W+120)+(W+120))%(W+120)-60; ctx.fillRect(px,545,44,10); }
  // drifting motes / embers (deterministic, no allocation, flag-driven)
  const mo = P.mote || {col:'rgba(255,255,255,1)',additive:false,density:14,mode:'drift'};
  const n = mo.mode==='none'? 0 : (mo.density||0);
  const mdir = (mo.mode==='ember'||mo.mode==='rise')? -1 : 1;   // upward for embers/rising ash
  if(n){
    ctx.save();
    if(mo.additive) ctx.globalCompositeOperation='lighter';
    ctx.fillStyle = mo.col;
    for(let i=0;i<n;i++){
      const spd = 8 + (i%5)*4;
      const bx = ( i*137 - G.t*spd - scrollX*0.05 );
      const px = ((bx % (W+40)) + (W+40)) % (W+40) - 20;
      const py = ( (i*97 - mdir*G.t*spd*0.6) % (H*0.6) + H*0.6) % (H*0.6) + 40;
      const r = 1 + (i%3)*0.8;
      ctx.globalAlpha = mo.additive? 0.55 : 0.3;
      ctx.beginPath(); ctx.arc(px,py,r,0,6.283); ctx.fill();
    }
    ctx.restore();
  }
  // signature prop
  if(P.prop==='canopy') drawCanopy(scrollX);
  else if(P.prop==='shore') drawShoreWater(scrollX);
  else if(P.prop==='cave') drawStalactites(scrollX);
  else if(P.prop==='starfield') drawStarfield();
  drawWeatherBg(scrollX);   // weather sky overlay, behind sprites
}

  let a = el<0.35 ? el/0.35 : (G.biomeFxT<0.7 ? G.biomeFxT/0.7 : 1);
  a=clamp(a,0,1);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
  ctx.font='600 12px Segoe UI, sans-serif'; ctx.fillStyle='#aeb8d8';
  ctx.fillText('Now entering', W/2, 100);
  ctx.font='700 26px Segoe UI, sans-serif'; ctx.fillStyle=b.accent;
  ctx.fillText(G.biomeLabel||b.name, W/2, 128);
  ctx.restore(); ctx.textAlign='left';
}
function drawHills(off, y, col, h){

}
function drawTree(x,y,s,col){

function chip(icon,val,col,x){
  ctx.font='600 14px Segoe UI';
  const txt=' '+val;
  const w = 26 + ctx.measureText(String(val)).width;
  roundRect(x,8,w,28,7); ctx.fillStyle='#141b30'; ctx.fill();

function drawRelicStrip(sx){
  if(!G.relics || !G.relics.length) return;
  const seen=[]; for(const id of G.relics){ if(!seen.some(s=>s.id===id)) seen.push({id,n:relicCount(id)}); }
  let x=sx;
  for(const s of seen){
    if(x>720) break;
    const R=RELICS[s.id];
    roundRect(x,12,20,20,5); ctx.fillStyle='#141b30'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=R.col; roundRect(x,12,20,20,5); ctx.stroke();
    ctx.textAlign='center'; ctx.font='13px system-ui'; ctx.fillStyle='#fff'; ctx.fillText(R.icon, x+10, 27);
    if(s.n>1){ ctx.font='700 8px Segoe UI'; ctx.fillStyle='#ffe9a8'; ctx.textAlign='right'; ctx.fillText('×'+s.n, x+20, 32); }
    ctx.textAlign='left'; x+=24;
  }
}

// team strip
function drawTeam(){
  const y=H-70, x0=14;
  for(let i=0;i<4;i++){
    const m=G.team[i];
    const x=x0+i*118;
    const active = m===activeMon()&&G.state==='battle';
    ctx.save();
    if(active && m){ ctx.shadowColor=TYPE_COL[m.sp.type]||'#6fa0e0'; ctx.shadowBlur=10; }
    roundRect(x,y,110,60,9); ctx.fillStyle= active? '#243358':'#141b30'; ctx.fill();
    ctx.restore();
    ctx.strokeStyle= m&&m.hp>0? shade(m.sp.body,10):'#2a3150'; ctx.lineWidth=2; roundRect(x,y,110,60,9); ctx.stroke();
    if(!m){ ctx.fillStyle='#3a4468'; ctx.textAlign='center'; ctx.font='12px Segoe UI'; ctx.fillText('—',x+55,y+34); ctx.textAlign='left'; continue; }
    // level-up flash ring
    if(m.levelFlash>0){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=clamp(m.levelFlash,0,1);
      const lgg=ctx.createRadialGradient(x+55,y+30,4, x+55,y+30,60);
      lgg.addColorStop(0,'rgba(255,223,90,.6)'); lgg.addColorStop(1,'rgba(255,223,90,0)');
      ctx.fillStyle=lgg; roundRect(x,y,110,60,9); ctx.fill(); ctx.restore(); }
    // mini sprite (grey wash + faded when fainted)
    ctx.save(); ctx.beginPath(); roundRect(x+2,y+2,32,56,8); ctx.clip();
    if(m.hp<=0) ctx.globalAlpha=0.4;
    drawMon(m.sp, x+20, y+34, 16, 1, G.t, {bob:i});
    if(m.hp<=0){ ctx.fillStyle='rgba(120,130,150,.5)'; ctx.fillRect(x+2,y+2,32,56); }
    ctx.restore();
    ctx.fillStyle= m.hp>0?'#eaf0ff':'#7a8199'; ctx.font='700 12px Segoe UI';
    ctx.fillText(m.sp.name.slice(0,9), x+40, y+18);
    ctx.fillStyle=TYPE_COL[m.sp.type]; ctx.font='600 10px Segoe UI';
    ctx.fillText(m.sp.type+' · Lv'+m.level, x+40, y+31);
    // hp bar
    hpBar(x+40, y+38, 62, 7, m.hp, m.hpShown, m.maxhp);
    // xp bar
    bar(x+40, y+48, 62, 4, m.xp/m.xpNext, '#5a8fe0','#0c1120');
    // held-trinket badge (read-only; guard against a missing id)
    if(m.trinket && TRINKETS[m.trinket]){
      const T=TRINKETS[m.trinket];
      roundRect(x+88,y+4,18,18,5); ctx.fillStyle='#141b30'; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=T.col; roundRect(x+88,y+4,18,18,5); ctx.stroke();
      centerText(T.icon,x+97,y+17,'11px system-ui','#fff');
    }
    // switch-availability overlay (top layer) for living, non-active cards in battle
    if(G.state==='battle' && G.battleIntro<=0 && m.hp>0 && !active){
      const tcol=TYPE_COL[m.sp.type]||'#6fa0e0';
      if((G.switchCd||0)<=0){
        // READY: pulsing type border + swap glyph
        ctx.save(); ctx.globalAlpha=0.6+0.4*Math.sin(G.t*4);
        ctx.strokeStyle=tcol; ctx.lineWidth=2; roundRect(x,y,110,60,9); ctx.stroke();
        ctx.globalAlpha=1; ctx.fillStyle=tcol; ctx.font='11px Segoe UI'; ctx.textAlign='left';
        ctx.fillText('↔', x+98, y+52); ctx.restore();
      } else {
        // LOCKED: dim + radial cooldown sweep + seconds
        ctx.save(); ctx.fillStyle='rgba(10,14,28,.55)'; roundRect(x,y,110,60,9); ctx.fill();
        const cx=x+55, cy=y+30;
        ctx.beginPath(); ctx.arc(cx,cy,24, -Math.PI/2, -Math.PI/2 + 2*Math.PI*(1 - G.switchCd/switchCdMax()));
        ctx.strokeStyle='#6a76a0'; ctx.lineWidth=3; ctx.stroke();
        ctx.fillStyle='#cdd6f0'; ctx.font='700 14px Segoe UI'; ctx.textAlign='center';
        ctx.fillText(Math.ceil(G.switchCd), cx, cy+5); ctx.textAlign='left'; ctx.restore();
      }
    }
  }
  if(G.box.length){ ctx.fillStyle='#6a76a0'; ctx.font='600 11px Segoe UI';
    ctx.fillText('📦 Box: '+G.box.length, x0+4*118+4, y+34); }
}
function bar(x,y,w,h,f,col,bg){
  roundRect(x,y,w,h,h/2); ctx.fillStyle=bg||'#0c1120'; ctx.fill();
  if(f>0){ roundRect(x,y,Math.max(2,w*clamp(f,0,1)),h,h/2); ctx.fillStyle=col; ctx.fill(); }
}
// animated HP bar: ghost trail at shown value, real fill (ratio-colored) on top
function hpBar(x,y,w,h,cur,shown,max){
  const r=clamp(cur/max,0,1), gr=clamp((shown==null?cur:shown)/max,0,1);
  roundRect(x,y,w,h,h/2); ctx.fillStyle='#0c1120'; ctx.fill();
  if(gr>0){ roundRect(x,y,Math.max(2,w*gr),h,h/2); ctx.fillStyle='#ff9b9b'; ctx.fill(); }
  const col = r>0.5?'#5fd06a': r>=0.25?'#ffc34d':'#ff5a5a';
  if(r>0){ roundRect(x,y,Math.max(2,w*r),h,h/2); ctx.fillStyle=col; ctx.fill();
    // thin top-highlight line inside the fill
    ctx.save(); ctx.globalAlpha=.35; ctx.fillStyle='#fff';
    ctx.fillRect(x+1,y+1,Math.max(2,w*r)-2,Math.max(1,h*0.25)); ctx.restore();
  }
}
function bigHP(m,x,y,w,facing){

}
// ---- boss HP bar (segmented phase bar) / telegraph / intro banner ----
function drawBossHP(w){
  const BX=360,BY=98,BW=480,BH=16, RX=840;
  ctx.textAlign='right';
  ctx.fillStyle=RARITY_COL[3]; ctx.font='800 20px Segoe UI';
  ctx.fillText(w.sp.name, RX, 72);
  ctx.fillStyle='#c9b8ff'; ctx.font='600 11px Segoe UI';
  ctx.fillText(w.sp.type+' · ☠ BOSS · Lv'+w.level, RX, 88);
  ctx.textAlign='left';
  const gr=clamp((w.hpShown==null?w.hp:w.hpShown)/w.maxhp,0,1), r=clamp(w.hp/w.maxhp,0,1);
  roundRect(BX,BY,BW,BH,8); ctx.fillStyle='#0c1120'; ctx.fill();                        // track
  if(gr>0){ roundRect(BX,BY,Math.max(2,BW*gr),BH,8); ctx.fillStyle='#ff9b9b'; ctx.fill(); } // drain trail
  if(r>0){ roundRect(BX,BY,Math.max(2,BW*r),BH,8); ctx.fillStyle=BOSS_PHASE_COL[Math.min(2,w.phaseMax-w.phase)]; ctx.fill();
    ctx.save(); ctx.globalAlpha=.35; ctx.fillStyle='#fff'; ctx.fillRect(BX+1,BY+1,Math.max(2,BW*r)-2,4); ctx.restore(); }
  for(let i=1;i<w.phaseMax;i++){ const nx=BX+BW*(i/w.phaseMax);                          // segment ticks
    ctx.fillStyle='#0c1120'; ctx.fillRect(nx-1,BY,2,BH); ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillRect(nx-1,BY,1,BH); }
  ctx.strokeStyle=w.enrage>1?BOSS_DANGER:'#0c1120'; ctx.lineWidth=1.5; roundRect(BX,BY,BW,BH,8); ctx.stroke();
  centerText('PHASE '+w.phase+' / '+w.phaseMax, BX+50, BY+30, '700 11px Segoe UI', BOSS_PHASE_COL[Math.min(2,w.phaseMax-w.phase)]);
  drawStatusRow(w, BX, BY, BW, -1);
  if(w.phaseBreak>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=clamp(w.phaseBreak/BOSS_PHASE_PAUSE,0,.8); ctx.fillStyle='#fff';
    roundRect(BX,BY,BW,BH,8); ctx.fill(); ctx.restore(); }
}
function drawBossTelegraph(w, yx, wx){

// status pips under a big HP bar. Fixed order, ≤4 pips, 14px, stride 17.
function drawStatusRow(m,x,y,w,facing){
  const s=m.status; if(!s) return;
  const pipY=y+26;
  const pips=[];
  if(m.sp.type==='Rock')  pips.push({key:'guard', col:TYPE_COL.Rock,  glyph:'shield', on:s.fGuard>0, flash:s.fGuard});
  if(m.sp.type==='Shadow')pips.push({key:'phase', col:TYPE_COL.Shadow,glyph:'phase',  on:s.fDodge>0, flash:s.fDodge});
  if(s.burn>0)  pips.push({key:'burn', col:TYPE_COL.Fire,  glyph:'flame', on:s.fBurn>0, n:s.burn>1?s.burn:0, flash:s.fBurn, t:s.burnT, tmax:BURN_DUR});
  if(s.stun>0)  pips.push({key:'stun', col:TYPE_COL.Volt,  glyph:'bolt',  on:s.fStun>0, flash:s.fStun, t:s.stun,  tmax:STUN_DUR});
  if(s.regen>0) pips.push({key:'regen',col:TYPE_COL.Grass, glyph:'plus',  on:s.fHeal>0, flash:s.fHeal, t:s.regen, tmax:LEECH_DUR});
  for(let i=0;i<pips.length && i<4;i++){
    const p=pips[i];
    const px= facing>0? x+i*17 : x+w-14-i*17;
    ctx.save();
    roundRect(px,pipY,14,14,4); ctx.globalAlpha=0.22; ctx.fillStyle=p.col; ctx.fill();
    ctx.globalAlpha=1; ctx.lineWidth=1; ctx.strokeStyle=p.col; roundRect(px,pipY,14,14,4); ctx.stroke();
    if(p.on){ // fresh-proc pulse: soft additive ring that fades with the flash timer
      const pulse=0.5+0.5*Math.sin(G.t*8);
      const k=clamp((p.flash||0)*2,0,1);
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=(0.25+0.35*pulse)*k;
      ctx.lineWidth=1.5; ctx.strokeStyle=p.col;
      roundRect(px-2,pipY-2,18,18,6); ctx.stroke();
      ctx.restore();
    }
    const gc=p.on?'#ffffff':p.col; ctx.fillStyle=gc; ctx.strokeStyle=gc;
    const cx=px+7, cy=pipY+7;
    if(p.glyph==='shield'){ ctx.beginPath(); ctx.moveTo(cx,cy-4); ctx.lineTo(cx+3,cy-2); ctx.lineTo(cx+3,cy+1); ctx.lineTo(cx,cy+4); ctx.lineTo(cx-3,cy+1); ctx.lineTo(cx-3,cy-2); ctx.closePath(); ctx.fill(); }
    else if(p.glyph==='phase'){ ctx.globalAlpha=0.85; ctx.beginPath(); ctx.arc(cx,cy,3.2,0,6.283); ctx.fill(); }
    else if(p.glyph==='flame'){ ctx.beginPath(); ctx.moveTo(cx,cy-4); ctx.quadraticCurveTo(cx+3.5,cy,cx,cy+4); ctx.quadraticCurveTo(cx-3.5,cy,cx,cy-4); ctx.fill(); }
    else if(p.glyph==='bolt'){ ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx+2,cy-4); ctx.lineTo(cx-2,cy); ctx.lineTo(cx+1,cy); ctx.lineTo(cx-2,cy+4); ctx.stroke(); }
    else if(p.glyph==='plus'){ ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,cy-3); ctx.lineTo(cx,cy+3); ctx.moveTo(cx-3,cy); ctx.lineTo(cx+3,cy); ctx.stroke(); }
    if(p.n){ ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font='700 8px Segoe UI'; ctx.textAlign='right'; ctx.fillText('x'+p.n, px+13, pipY+13); ctx.textAlign='left'; }
    if(p.tmax>0){ // depletion bar for countdown pips (burn/stun/regen). Flash-only pips have no tmax.
      const frac=clamp(p.t/p.tmax,0,1);
      const bx=px, by=pipY+15, bw=14, bh=2;
      ctx.globalAlpha=0.20; ctx.fillStyle=p.col; ctx.fillRect(bx,by,bw,bh);
      ctx.globalAlpha=0.90; ctx.fillStyle=p.col; ctx.fillRect(bx,by,bw*frac,bh);
    }
    ctx.restore();
  }
}

function drawDmgPops(){
  ctx.textAlign='center';
  for(const p of G.dmgPops){
    const age=p.age||0;
    ctx.save();
    ctx.globalAlpha=clamp(p.life,0,1);
    ctx.translate(p.x,p.y);
    const s= age<0.08? lerp(0.4,1.25,age/0.08) : lerp(1.25,1.0,clamp((age-0.08)/0.10,0,1));
    ctx.scale(s,s);
    if(p.dodge||p.stun||p.heal){
      ctx.font='800 20px Segoe UI';
      const txt=p.txt; ctx.lineWidth=4; ctx.strokeStyle='rgba(6,8,18,.85)'; ctx.strokeText(txt,0,0);
      ctx.fillStyle=p.col||'#ffffff'; ctx.fillText(txt,0,0);
      ctx.restore(); continue;
    }
    if(p.heavy){ ctx.font='900 40px Segoe UI'; ctx.lineWidth=5; ctx.strokeStyle='rgba(6,8,18,.9)';
      ctx.strokeText(p.txt,0,0); ctx.fillStyle=p.col||BOSS_DANGER; ctx.fillText(p.txt,0,0); ctx.restore(); continue; }
    if(p.crit){ ctx.rotate(p.rot||0); ctx.shadowColor='#ffdf5a'; ctx.shadowBlur=8; }
    ctx.font='800 '+(p.crit?34:22)+'px Segoe UI';
    const txt=p.txt + (p.crit?'!':'');
    ctx.lineWidth=4; ctx.strokeStyle='rgba(6,8,18,.85)'; ctx.strokeText(txt,0,0);
    ctx.fillStyle= p.crit?'#ffdf5a': (p.eff>1?'#ff8f6f': p.eff<1?'#8fb0ff':'#ffffff');
    ctx.fillText(txt, 0, 0);
    if(p.eff!==1){ ctx.shadowBlur=0; ctx.font='700 11px Segoe UI';
      const sub=p.eff>1?'super effective':'not effective';
      ctx.lineWidth=4; ctx.strokeStyle='rgba(6,8,18,.85)'; ctx.strokeText(sub,0,16);
      ctx.fillStyle=p.eff>1?'#ff8f6f':'#8fb0ff'; ctx.fillText(sub, 0, 16); }
    ctx.restore();
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}
function drawFx(){ drawParts(); drawDmgPops(); }
function drawParts(){
  if(reducedMotion()) return;
  for(const p of G.parts){
    if(p.ring){
      ctx.save(); ctx.globalAlpha=clamp(p.life*2,0,1);
      const radius=6+(1-p.life/0.5)*40;
      ctx.strokeStyle=p.col; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x,p.y,radius,0,6.283); ctx.stroke();
      ctx.restore();
    } else if(p.star){
      ctx.save(); ctx.globalAlpha=clamp(p.life*1.6,0,1); ctx.fillStyle=p.col;
      ctx.translate(p.x,p.y);
      ctx.beginPath();
      for(let k=0;k<8;k++){ const a=k/8*6.283; const rr2=(k%2===0)?p.r:p.r*0.4; const px=Math.cos(a)*rr2, py=Math.sin(a)*rr2; k===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      ctx.globalAlpha=clamp(p.life*1.6,0,1); ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283); ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

// ---- panel helper ----
function panel(x,y,w,h,title){
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=18;
  const pg=ctx.createLinearGradient(0,y,0,y+h);
  pg.addColorStop(0,'rgba(20,28,52,.95)'); pg.addColorStop(1,'rgba(10,14,28,.96)');
  roundRect(x,y,w,h,14); ctx.fillStyle=pg; ctx.fill();
  ctx.restore();
  ctx.strokeStyle='#2a3760'; ctx.lineWidth=2; roundRect(x,y,w,h,14); ctx.stroke();
  // inner top-highlight stroke
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x+16,y+2); ctx.lineTo(x+w-16,y+2); ctx.stroke(); ctx.restore();
  if(title){ ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#eaf0ff'; ctx.font='800 24px Segoe UI';
    ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=6;
    ctx.fillText(title, x+w/2, y+38); ctx.restore(); ctx.textAlign='left'; }
}
function centerText(txt,x,y,font,col){ ctx.textAlign='center'; ctx.font=font; ctx.fillStyle=col; ctx.fillText(txt,x,y); ctx.textAlign='left'; }
function wrapText(txt, maxW, maxLines){
  const words=(txt||'').split(' ');
  const lines=[]; let cur='';
  for(const wd of words){
    const trial=cur?cur+' '+wd:wd;
    if(cur && ctx.measureText(trial).width>maxW){
      lines.push(cur); cur=wd;
      if(lines.length===maxLines){ cur=''; break; }
    } else cur=trial;
  }
  if(cur && lines.length<maxLines) lines.push(cur);
  return lines;
}
function drawTut(){

function draw(){
  ctx.clearRect(0,0,W,H);
  const sh = (G.shake>0 && !reducedMotion()) ? {x:rr(-G.shake,G.shake)*1.2,y:rr(-G.shake,G.shake)*0.7} : {x:0,y:0};
  ctx.save(); ctx.translate(sh.x,sh.y);

  if(G.state==='title'){ drawTitle(); ctx.restore(); return; }
  if(G.state==='pokedex'){ drawPokedex(); ctx.restore(); return; }
  if(G.state==='achievements'){ drawAchievements(); ctx.restore(); return; }
  if(G.state==='sanctuary'){ drawSanctuary(); ctx.restore(); return; }
  if(G.state==='settings'){ drawSettings(); ctx.restore(); return; }
  if(G.state==='records'){ drawRecords(); ctx.restore(); return; }
  if(G.state==='starter'){ drawStarter(); ctx.restore(); return; }

  drawBG(G.scroll, G.tier);

  if(G.state==='walk'){ drawWalk(); drawBiomeLabel(); }
  else if(G.state==='battle') drawBattle();
  else if(G.state==='choice') drawChoice();
  else if(G.state==='crossroads') drawCrossroads();
  else if(G.state==='relic') drawRelic();
  else if(G.state==='shop') drawShop();
  else if(G.state==='rest') drawRest();
  else if(G.state==='story') drawStory();
  else if(G.state==='gamble') drawGamble();
  else if(G.state==='shrine') drawShrine();
  else if(G.state==='nest') drawNest();
  else if(G.state==='swapchoice') drawSwapChoice();
  else if(G.state==='gameover') drawGameOver();

  drawFx();
  drawHUD();
  drawWeatherChip();
  if(G.state!=='title' && G.state!=='gameover' && G.state!=='sanctuary') drawTeam();
  drawButtons();

  // flash msg
  if(G.msgT>0){
    ctx.globalAlpha=clamp(G.msgT,0,1);
    const w=ctx.measureText(G.msg).width;
    roundRect(W/2-Math.max(160,w/2+30)/1, 0,0,0,0);
    ctx.font='700 18px Segoe UI';
    const mw=ctx.measureText(G.msg).width+40;
    roundRect(W/2-mw/2, H-118, mw, 34, 10); ctx.fillStyle='rgba(10,14,28,.92)'; ctx.fill();
    ctx.strokeStyle='#3a4780'; ctx.lineWidth=1.5; ctx.stroke();
    centerText(G.msg, W/2, H-95, '700 18px Segoe UI', '#ffe9a8');
    ctx.globalAlpha=1;
  }
  // achievement-unlock toast — parallel top-center channel (never stomps combat flash)
  if(G.achMsgT>0){
    ctx.globalAlpha=clamp(G.achMsgT,0,1);
    ctx.font='700 16px Segoe UI';
    const mw=ctx.measureText(G.achMsg).width+70;
    roundRect(W/2-mw/2, 40, mw, 40, 12); ctx.fillStyle='rgba(20,28,52,.95)'; ctx.fill();
    ctx.strokeStyle='#ffe9a8'; ctx.lineWidth=2; ctx.stroke();
    ctx.textAlign='left'; ctx.font='700 20px Segoe UI'; ctx.fillStyle='#ffe9a8';
    ctx.fillText(G.achIcon, W/2-mw/2+14, 66);
    centerText(G.achMsg, W/2+14, 65, '700 16px Segoe UI', '#ffe9a8');
    ctx.globalAlpha=1;
  }
  if(G.tutActive) drawTut();
  // vignette (skip on title, which returns early)
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.35, W/2,H/2,H*0.75);
  vig.addColorStop(0,'rgba(6,8,18,0)'); vig.addColorStop(1,'rgba(6,8,18,.4)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function buyUpgrade(key){
  const u=UPGRADES.find(x=>x.key===key); if(!u) return false;
  const cur=Dex.up(key); if(cur>=u.max) return false;      // max-tier guard
  const price=u.price[cur]; if(Dex.data.essence<price) return false;  // overspend guard
  Dex.data.essence-=price; Dex.data.upgrades[key]=cur+1; Dex.save();
  flash('Blessing acquired.'); return true;
}
function dexProgress(){
  const keys=Object.keys(SPECIES);
  const byRarity=[{caught:0,total:0},{caught:0,total:0},{caught:0,total:0},{caught:0,total:0}];
  for(const k of keys){ const sp=SPECIES[k]; const r=byRarity[sp.rarity]; r.total++; if(Dex.data.caught[k]) r.caught++; }
  return { caught:Dex.nCaught(), seen:Dex.nSeen(), total:keys.length, byRarity };
}
function pokedexCardRect(i){ const c=i%6,r=(i/6)|0; return {x:22+c*155, y:112+r*114, w:140, h:104}; }
function pokedexCardAt(mx,my){
  for(let i=0;i<Object.keys(SPECIES).length;i++){ const r=pokedexCardRect(i);
    if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h) return i; }
  return -1;
}
// max base stats across the roster — used to normalize detail stat bars
function dexMaxBase(){
  let hp=1,atk=1,spd=1;
  for(const k of Object.keys(SPECIES)){ const b=SPECIES[k].base; if(b.hp>hp)hp=b.hp; if(b.atk>atk)atk=b.atk; if(b.spd>spd)spd=b.spd; }
  return {hp,atk,spd};
}
function drawPokedex(){

function statusGlow(x,m){ if(!m||!m.status)return; const s=m.status;

  for(const [t,rgb] of g){ if(t>0){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=clamp(t*0.5,0,0.6);
    const rg=ctx.createRadialGradient(x,470,0,x,470,56); rg.addColorStop(0,'rgba('+rgb+',1)'); rg.addColorStop(1,'rgba('+rgb+',0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(x,470,56,0,6.283); ctx.fill(); ctx.restore(); } }
  if(s.burn>0){ for(let i=0;i<2;i++){ if(G.parts.length<140) G.parts.push({x:x+rr(-16,16),y:490,vx:rr(-14,14),vy:rr(-70,-30),life:rr(0.3,0.6),col:'#ff7a3d',r:rr(1.5,3)}); } }

// overhead "stunned" read: 3 twinkling stars orbiting a squashed ring, fading with remaining stun
function star4(cx,cy,r){ const r2=r*0.4;
  ctx.beginPath();
  ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r2,cy-r2); ctx.lineTo(cx+r,cy); ctx.lineTo(cx+r2,cy+r2);
  ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r2,cy+r2); ctx.lineTo(cx-r,cy); ctx.lineTo(cx-r2,cy-r2);
  ctx.closePath(); ctx.fill();
}
function stunStars(x,y,m){ if(!m||!m.status) return; const s=m.status; if(!(s.stun>0)) return;
  const a=clamp(s.stun/STUN_DUR,0,1); if(a<=0) return;
  const N=3, R=13;
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle='#ffd23d';
  for(let i=0;i<N;i++){
    const ph=i*(6.2832/N), ang=G.t*4+ph;
    const sx=x+Math.cos(ang)*R, sy=y+Math.sin(ang)*R*0.45;
    const tw=0.7+0.3*Math.sin(G.t*9+ph);
    ctx.globalAlpha=a*tw; star4(sx,sy,3.2);
  }
  ctx.restore();
}

// Mid-battle party switch: tap a living, non-active team card to send it in.
// Gated by a battle-time cooldown + entry cd so it can't dodge every hit.
function trySwitch(idx){
  if(G.state!=='battle') return false;
  if(G.battleIntro>0) return false;
  if(idx===G.lead) return false;
  if(!G.team[idx] || G.team[idx].hp<=0){
    if(G.team[idx] && G.team[idx].hp<=0) flash(G.team[idx].sp.name+' has fainted!');
    return false;
  }
  if((G.switchCd||0)>0){ flash('Swap recharging…'); return false; }
  G.lead = idx;
  const m=G.team[idx]; m.cd = Math.max(1/m.spd, SWITCH_ENTRY);
  G.switchCd = switchCdMax(); G.switchAnim = 0.35;
  m.lunge = 1; flash('Go, '+m.sp.name+'!');
  return true;
}

  return -1;
}

// Equip trinket j (from G.trinkets) onto team member i. Swap-neutral: any current
// trinket returns to inventory, id count is conserved (no dup / no loss).
function equipTrinket(i,j){
  const m=G.team[i], id=G.trinkets[j];
  if(!m||id==null) return;
  G.trinkets.splice(j,1);
  if(m.trinket) G.trinkets.push(m.trinket);
  m.trinket=id; applyTrinketStats(m);
  flash(m.sp.name+' equipped '+TRINKETS[id].name+'.');
}
function unequipTrinket(i){
  const m=G.team[i]; if(!m||!m.trinket) return;
  G.trinkets.push(m.trinket); m.trinket=null; applyTrinketStats(m);
  flash('Unequipped.');
}
function swapBox(i){
  const m=G.box[i]; if(!m) return;
  if(G.team.length<4){ G.box.splice(i,1); G.team.push(m); flash(m.sp.name+' joined the party.'); return; }
  // swap with the lowest-level party member
  let li=0; for(let k=1;k<G.team.length;k++) if(G.team[k].level<G.team[li].level) li=k;
  const out=G.team[li]; G.team[li]=m; G.box[i]=out;
  flash('Swapped '+out.sp.name+' ↔ '+m.sp.name+'.');
}
