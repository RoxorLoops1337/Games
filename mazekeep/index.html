<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MAZEKEEP — Tower Defense Roguelite</title>
<style>
  :root {
    --bg: #070b14; --panel: #0e1626; --panel2: #131f33; --line: #1e2c44;
    --ink: #e2e8f0; --dim: #7c8aa3; --accent: #4ade80; --accent2: #38bdf8;
    --gold: #fbbf24; --danger: #f87171;
    --font: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: radial-gradient(circle at 50% -10%, #122036, #070b14 60%); color: var(--ink); font-family: var(--font); overflow: hidden; }
  #app { height: 100%; }
  .screen { height: 100%; width: 100%; display: none; flex-direction: column; align-items: center; }

  /* Buttons */
  .btn { font-family: var(--font); cursor: pointer; background: var(--panel2); color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 9px 16px; font-size: 14px; transition: transform .08s, background .15s, border-color .15s; letter-spacing: .3px; }
  .btn:hover { background: #1b2a44; border-color: #2e466e; transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: linear-gradient(180deg, #1d8a4e, #14633a); border-color: #2bd06f; color: #eafff2; font-weight: 700; }
  .btn.primary:hover { background: linear-gradient(180deg, #24a85f, #178043); }
  .btn.big { padding: 13px 22px; font-size: 17px; min-width: 220px; }
  .btn.small { padding: 7px 12px; font-size: 13px; }
  .btn.tiny { padding: 5px 9px; font-size: 12px; min-width: 0; }
  .btn.danger { border-color: #7f1d1d; color: #fca5a5; }
  .btn.done, .btn[disabled] { opacity: .45; cursor: not-allowed; }
  .btn.back { position: absolute; top: 18px; left: 18px; }

  /* Menus */
  .menu { margin: auto; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; max-width: 100%; position: relative; }
  .menu.wide { width: min(960px, 96vw); height: 100%; justify-content: flex-start; padding-top: 64px; overflow-y: auto; }
  .menu h2 { margin: 4px 0; font-size: 26px; letter-spacing: 1px; }
  .menu h3 { color: var(--accent2); margin: 18px 0 8px; }
  .logo { text-align: center; margin-bottom: 6px; }
  .title-main { font-size: clamp(48px, 11vw, 104px); margin: 0; letter-spacing: 6px; font-weight: 800;
    background: linear-gradient(180deg, #eafff5, #4ade80 60%, #16a34a);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 6px 30px rgba(74,222,128,.25); }
  .title-sub { color: var(--dim); letter-spacing: 5px; text-transform: uppercase; font-size: 13px; margin-top: -6px; }
  .menu-btns { display: flex; flex-direction: column; gap: 11px; margin-top: 8px; }
  .shard-count { color: var(--gold); font-size: 15px; margin-top: 6px; }
  .shard-count.big { font-size: 18px; }
  .hint { color: var(--dim); font-size: 13px; max-width: 380px; text-align: center; line-height: 1.5; }

  /* Biome select */
  .biome-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 16px; width: 100%; padding-bottom: 30px; }
  .biome-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; cursor: pointer; transition: transform .1s, border-color .15s, box-shadow .15s; }
  .biome-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,.4); }
  .biome-card.locked { opacity: .55; cursor: not-allowed; }
  .biome-name { font-size: 19px; font-weight: 700; margin-bottom: 10px; }
  .biome-desc { color: var(--ink); font-size: 13px; margin-top: 10px; line-height: 1.4; }
  .biome-passive { color: var(--gold); font-size: 12px; margin-top: 8px; }
  .lock-tag { color: var(--danger); font-size: 12px; margin-top: 8px; }
  .minimap { display: grid; gap: 1px; width: 100%; aspect-ratio: 13 / 6; background: #05080f; border-radius: 6px; overflow: hidden; }
  .mm-cell { width: 100%; height: 100%; }

  /* Meta shop */
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; width: 100%; }
  .meta-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .meta-card.maxed { border-color: #2bd06f55; }
  .meta-name { font-weight: 700; font-size: 15px; }
  .meta-desc { color: var(--dim); font-size: 13px; flex: 1; line-height: 1.4; }
  .meta-foot { display: flex; justify-content: space-between; align-items: center; }
  .meta-lvl { color: var(--accent2); font-size: 12px; }

  /* Codex */
  .codex-body { width: 100%; padding-bottom: 40px; }
  .codex-section { margin-bottom: 12px; }
  .codex-section p { color: var(--dim); line-height: 1.5; font-size: 14px; margin: 6px 0; }
  .codex-entry { display: flex; gap: 12px; align-items: center; padding: 7px 10px; border-bottom: 1px solid var(--line); }
  .codex-glyph { font-size: 24px; width: 30px; text-align: center; }
  .codex-desc { color: var(--dim); font-size: 12.5px; }

  .settings-row { display: flex; justify-content: space-between; align-items: center; gap: 24px; width: min(420px, 90vw); padding: 12px 0; border-bottom: 1px solid var(--line); }

  /* Game screen */
  .game-screen { flex-direction: column; width: 100%; height: 100%; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .stat { font-size: 15px; color: var(--dim); }
  .stat b { color: var(--ink); font-size: 17px; }
  #stat-lives b { color: var(--danger); } #stat-gold b { color: var(--gold); }
  .spacer { flex: 1; }
  .play-area { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; min-width: 0; }
  canvas#game { max-width: 100%; max-height: 100%; image-rendering: auto; border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 8px 40px rgba(0,0,0,.5); touch-action: none; }
  .sidebar { width: 290px; flex-shrink: 0; background: var(--panel); border-left: 1px solid var(--line); padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

  .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .tower-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 7px 4px; cursor: pointer; color: var(--ink); transition: border-color .12s, background .12s; }
  .tower-btn:hover { background: #1b2a44; }
  .tower-btn.sel { border-color: var(--accent); background: #14331f; }
  .tower-btn.poor { opacity: .5; }
  .tw-glyph { font-size: 21px; line-height: 1; }
  .tw-name { font-size: 10.5px; color: var(--dim); }
  .tw-cost { font-size: 11px; color: var(--gold); }

  .tower-info { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 11px; min-height: 80px; }
  .ti-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .ti-tier { color: var(--accent2); font-size: 12px; font-weight: 400; }
  .ti-stats { color: var(--dim); font-size: 12.5px; line-height: 1.5; }
  .ti-hint { color: var(--dim); font-size: 11.5px; margin-top: 8px; opacity: .8; }
  .ti-btns { display: flex; gap: 7px; margin-top: 10px; }
  .ti-btns .btn { flex: 1; }

  .omen-panel, .wave-box { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 11px; }
  .panel-head { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .panel-head .dim, .dim { color: var(--dim); font-weight: 400; font-size: 12px; }
  .omen-list { display: flex; flex-direction: column; gap: 6px; }
  .omen-chip { display: flex; align-items: center; gap: 7px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; cursor: pointer; color: var(--ink); text-align: left; transition: border-color .12s, background .12s; }
  .omen-chip .omen-ico { font-size: 15px; }
  .omen-chip .omen-name { flex: 1; font-size: 12.5px; }
  .omen-chip .omen-risk { font-size: 10px; color: var(--gold); }
  .omen-chip.risk1 { border-left: 3px solid #fbbf24; }
  .omen-chip.risk2 { border-left: 3px solid #fb923c; }
  .omen-chip.risk3 { border-left: 3px solid #ef4444; }
  .omen-chip.sel { background: #2a1530; border-color: #c084fc; box-shadow: 0 0 12px rgba(192,132,252,.3); }

  .wave-head { font-size: 14px; font-weight: 700; margin-bottom: 7px; }
  .boss-tag { color: var(--danger); font-size: 11px; border: 1px solid var(--danger); border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
  .wave-comp { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; font-size: 13px; }
  .wave-comp .wc { background: var(--panel); border-radius: 5px; padding: 2px 6px; }
  .wave-comp .wc.boss { width: 100%; font-weight: 700; }
  .btn.send { width: 100%; }
  .build-hint { color: var(--dim); font-size: 12px; }

  /* Overlays */
  .overlay { position: fixed; inset: 0; background: rgba(4,8,16,.86); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .overlay-inner { width: min(820px, 96vw); text-align: center; }
  .draft-title { font-size: 26px; margin-bottom: 22px; letter-spacing: 1px; }
  .card-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .up-card { width: 210px; min-height: 188px; background: linear-gradient(180deg, var(--panel), #0a1120); border: 2px solid var(--line); border-radius: 14px; padding: 18px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 10px; transition: transform .1s, box-shadow .15s; }
  .up-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 14px 36px rgba(0,0,0,.5), 0 0 22px var(--rc); }
  .up-rarity { text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 700; }
  .up-name { font-size: 19px; font-weight: 800; }
  .up-desc { color: var(--dim); font-size: 13.5px; line-height: 1.5; }
  .draft-foot { margin-top: 22px; display: flex; gap: 16px; align-items: center; justify-content: center; }
  .owned-note { font-size: 12px; }

  .result { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 34px; }
  .res-win { color: var(--accent); font-size: 30px; letter-spacing: 1px; }
  .res-lose { color: var(--danger); font-size: 28px; letter-spacing: 1px; }
  .res-stats { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; margin: 22px 0; }
  .rs-val { font-size: 26px; font-weight: 800; }
  .rs-lbl { color: var(--dim); font-size: 12px; }
  .res-shards { color: var(--gold); font-size: 19px; margin-bottom: 22px; }
  .res-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Mobile: sidebar below the board */
  @media (max-width: 760px) {
    .play-area { flex-direction: column; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--line); flex-direction: column; }
    .canvas-wrap { padding: 6px; }
    .palette { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <!-- Hidden until a run starts; UI moves it into the game screen. -->
  <canvas id="game" width="572" height="264"></canvas>

  <script src="js/audio.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pathfind.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
