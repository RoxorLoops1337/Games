<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Boss Monster — Build the Dungeon</title>
<style>
  :root{
    --ink:#e9e0ff; --gold:#ffd34d; --hp:#ff4d6d; --mana:#4dc3ff; --xp:#7bdc6b;
    --panel:#1b1530; --panel2:#241a40; --line:#6b4fb0; --accent:#b985ff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#0c0916;color:var(--ink);
    font-family:'Trebuchet MS',system-ui,sans-serif;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  /* Use the DYNAMIC viewport so the bottom panel is never hidden behind the
     mobile browser toolbar / gesture bar; fall back to vh on older browsers. */
  #app{position:relative;width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;
    max-width:1100px;margin:0 auto;}
  /* Top status bar */
  #topbar{display:flex;align-items:center;gap:8px;background:#140f24;
    padding:calc(6px + env(safe-area-inset-top,0px)) 10px 6px;
    border-bottom:2px solid var(--line);font-size:13px;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:5px;background:#221a3c;border:1px solid #3a2c66;
    padding:3px 8px;border-radius:6px;white-space:nowrap;}
  .stat b{font-size:14px;}
  .bar{position:relative;width:140px;height:14px;background:#0a0716;border:1px solid #3a2c66;
    border-radius:7px;overflow:hidden;}
  .bar > i{position:absolute;left:0;top:0;bottom:0;border-radius:7px;transition:width .2s;}
  .bar > span{position:absolute;inset:0;text-align:center;font-size:10px;line-height:14px;
    text-shadow:0 1px 1px #000;font-weight:bold;}
  .gold{color:var(--gold);} .small{font-size:11px;opacity:.85;}
  /* boss HP+mana readout beside the run abilities */
  .bossmini{display:flex;align-items:center;gap:5px;padding:3px 7px;border-radius:9px;
    background:#140f24;border:1px solid var(--line);}
  .bossmini > span{font-size:20px;}
  .bmbars{display:flex;flex-direction:column;gap:2px;}
  .bmbars .bar{width:88px;height:11px;}
  .bmbars .bar > span{line-height:11px;font-size:9px;}
  /* Canvas */
  #stage{flex:1;position:relative;min-height:0;overflow:hidden;background:#0c0916;
    display:flex;line-height:0;}
  canvas{display:block;image-rendering:pixelated;
    image-rendering:crisp-edges;touch-action:none;}
  #hint{position:absolute;left:50%;top:8px;transform:translateX(-50%);
    background:rgba(10,7,22,.85);border:1px solid var(--line);padding:4px 12px;border-radius:8px;
    font-size:12px;pointer-events:none;opacity:0;transition:opacity .25s;max-width:90%;text-align:center;}
  #hint.show{opacity:1;}
  /* Floaty combat text */
  /* Bottom control panels */
  #panel{background:#140f24;border-top:2px solid var(--line);
    padding:7px 8px calc(7px + env(safe-area-inset-bottom,0px));
    min-height:74px;flex:0 0 auto;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  button{font-family:inherit;cursor:pointer;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;
    min-height:42px;touch-action:manipulation;transition:transform .05s,background .15s;}
  button:hover:not(:disabled){background:#34265e;}
  button:active:not(:disabled){transform:translateY(1px);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.go{background:#2c8a4a;border-color:#52d97e;}
  button.go:hover:not(:disabled){background:#36a558;}
  button.buy{background:#5a4a18;border-color:var(--gold);}
  /* hand scrolls horizontally so it never shoves the action buttons away */
  .cards{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;}
  .cards .card{flex:0 0 auto;}
  .card{position:relative;width:78px;min-height:62px;border-radius:8px;border:2px solid var(--line);
    background:linear-gradient(160deg,#2a2046,#1a1330);padding:5px 4px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;cursor:grab;touch-action:none;
    transition:transform .08s,border-color .15s;}
  .card:hover{transform:translateY(-3px);}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
  .cardghost{position:fixed;left:0;top:0;transform:translate(-50%,-65%);z-index:60;pointer-events:none;
    opacity:.92;cursor:grabbing;box-shadow:0 8px 22px rgba(0,0,0,.6);border-color:var(--gold);}
  .card .ic{font-size:24px;line-height:1;}
  .card .nm{font-size:10px;margin-top:3px;font-weight:bold;}
  .card .lv{position:absolute;top:2px;right:4px;font-size:9px;color:var(--gold);}
  .card .x{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;
    background:#a02040;border:1px solid #ff6b8a;font-size:11px;line-height:16px;text-align:center;color:#fff;}
  .abil{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:74px;padding:6px 8px;}
  .abil .c{font-size:10px;color:var(--mana);}
  .abil:disabled .c{color:#888;}
  .pill{font-size:11px;padding:2px 8px;border-radius:10px;background:#2a2046;border:1px solid #3a2c66;}
  /* Overlay screens */
  #overlay{position:absolute;inset:0;background:rgba(8,6,16,.93);z-index:50;display:none;
    flex-direction:column;align-items:center;justify-content:safe center;text-align:center;overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:calc(18px + env(safe-area-inset-top,0px)) 18px calc(18px + env(safe-area-inset-bottom,0px));}
  #overlay.show{display:flex;}
  #overlay h1{font-size:34px;margin:0 0 4px;color:var(--gold);letter-spacing:1px;
    text-shadow:0 2px 0 #4a2e7a,0 0 18px rgba(185,133,255,.5);}
  #overlay h2{font-size:20px;margin:6px 0;color:var(--accent);}
  #overlay p{max-width:620px;line-height:1.5;font-size:14px;opacity:.92;margin:6px 0;}
  .choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .choice{width:160px;background:linear-gradient(160deg,#241a40,#15102a);border:2px solid var(--line);
    border-radius:12px;padding:12px;cursor:pointer;transition:transform .1s,border-color .15s;}
  .choice:hover{transform:translateY(-4px);border-color:var(--gold);}
  .choice .big{font-size:40px;}
  .choice h3{margin:6px 0 4px;font-size:16px;color:var(--gold);}
  .choice .desc{font-size:12px;opacity:.85;line-height:1.35;}
  .choice .stats{font-size:11px;margin-top:6px;opacity:.8;}
  .menu-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .menu-btns button{font-size:16px;padding:12px 22px;}
  .ko{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px;font-size:13px;opacity:.85;}
  .tag{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;background:#2a2046;margin:2px;}
  @media (max-width:560px){
    #topbar{font-size:11px;gap:5px;padding:5px 7px;}
    .stat{padding:2px 6px;gap:3px;}
    .bar{width:80px;height:13px;}
    #overlay h1{font-size:26px;} .choice{width:140px;}
    .card{width:66px;min-height:58px;}
    .abil{min-width:62px;padding:5px 6px;}
    button{padding:8px 10px;}
  }
  @media (max-width:380px){ .bar{width:64px;} #topbar{font-size:10px;} }
  /* inspection tooltip */
  #inspect{position:absolute;left:8px;bottom:8px;max-width:min(340px,calc(100% - 16px));
    background:rgba(12,9,22,.94);border:1.5px solid var(--accent);border-radius:10px;
    padding:8px 26px 8px 10px;font-size:12px;line-height:1.5;z-index:20;
    opacity:0;transform:translateY(6px);transition:opacity .12s,transform .12s;pointer-events:none;}
  #inspect.show{opacity:1;transform:translateY(0);pointer-events:auto;}
  #inspect b{color:var(--gold);}
  #inspect .ix{position:absolute;top:3px;right:6px;cursor:pointer;color:#ff8a9a;font-size:13px;}
  #inspect button{margin-top:6px;padding:6px 10px;min-height:34px;font-size:12px;}
  #inspect .small{opacity:.7;font-size:11px;}
  #audiobtn{position:absolute;top:6px;right:6px;z-index:21;width:34px;height:34px;padding:0;
    font-size:16px;border-radius:8px;background:rgba(20,15,36,.8);border:1px solid var(--line);}
  #pausebtn{position:absolute;top:6px;right:46px;z-index:21;width:34px;height:34px;padding:0;
    font-size:18px;border-radius:8px;background:rgba(20,15,36,.8);border:1px solid var(--line);}
  .pauserow{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .pauserow label{font-weight:bold;font-size:14px;}
  .pauserow input[type=range]{flex:1;max-width:210px;accent-color:var(--accent);height:24px;}
  .pauserow button{font-size:12px;padding:6px 10px;min-height:34px;}
  #relicbar{position:absolute;top:5px;left:5px;z-index:21;display:flex;gap:3px;flex-wrap:wrap;
    max-width:calc(100% - 128px);}
  .relicchip{width:32px;height:32px;border-radius:7px;border:2px solid;
    background:radial-gradient(circle at 50% 38%, rgba(60,52,86,.95), rgba(20,15,34,.95));
    display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer;
    font-size:19px;
    font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla","EmojiOne Color","Android Emoji",sans-serif;
    text-shadow:0 1px 2px rgba(0,0,0,.6);overflow:hidden;}
  .relicchip .ric{display:block;transform:translateY(.5px);}
  #zoomctl{position:absolute;right:6px;bottom:6px;z-index:21;display:flex;flex-direction:column;gap:4px;}
  #zoomctl button{width:34px;height:34px;padding:0;font-size:18px;font-weight:bold;border-radius:8px;
    background:rgba(20,15,36,.8);border:1px solid var(--line);color:var(--ink);}
  /* ---- Rune Page: spellbook skill tree ---- */
  .runebook{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .rbback{position:absolute;top:10px;left:10px;z-index:6;font-weight:bold;letter-spacing:1px;
    padding:8px 16px;border-radius:9px;background:linear-gradient(#5a4326,#3a2a16);
    border:2px solid #caa15e;color:#ffe9b8;box-shadow:0 3px 0 #2a1d0e;}
  .rbpts{position:absolute;top:12px;right:16px;z-index:6;font-size:26px;font-weight:bold;
    color:#ffe9a8;text-shadow:0 2px 4px #000,0 0 10px #c9881f;display:flex;align-items:center;gap:4px;}
  .rbpts .rbscroll-ic{font-size:22px}
  .rbview{max-width:100%;max-height:100%;overflow:auto;-webkit-overflow-scrolling:touch;
    padding:54px 14px 16px;}
  .rtree{position:relative;margin:0 auto;border-radius:16px;
    background:radial-gradient(ellipse at 50% 28%,#f0e3c2 0%,#e0c99e 62%,#cdb487 100%);
    border:7px solid #6a4a2a;
    box-shadow:inset 0 0 46px rgba(110,74,30,.45),inset 0 0 0 3px #b58a52,0 10px 34px rgba(0,0,0,.55);}
  .rnode{position:absolute;border-radius:12px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;cursor:pointer;border:2.5px solid;box-sizing:border-box;
    transition:transform .08s;}
  .rnode:active{transform:scale(.92);}
  .rnode .ric{font-size:27px;line-height:1;}
  .rnode .rcnt{position:absolute;bottom:-10px;font-size:11px;font-weight:bold;line-height:1;
    background:#171024;border:1.5px solid;border-radius:7px;padding:1px 5px;white-space:nowrap;}
  .rn-max{background:linear-gradient(#2e6a3c,#1c3f25);border-color:#6ad97e;box-shadow:0 0 12px #6ad97e88,inset 0 0 8px #0006;}
  .rn-max .rcnt{color:#abf3b4;border-color:#6ad97e;}
  .rn-buy{background:linear-gradient(#4a3a14,#2c2410);border-color:#ffd34d;box-shadow:0 0 13px #ffd34daa,inset 0 0 8px #0006;animation:runepulse 1.3s ease-in-out infinite;}
  .rn-buy .rcnt{color:#ffe9a8;border-color:#ffd34d;}
  .rn-cost{background:linear-gradient(#3a241a,#241812);border-color:#b0563a;box-shadow:inset 0 0 8px #0007;}
  .rn-cost .rcnt{color:#e0a98c;border-color:#b0563a;}
  .rn-lock{background:linear-gradient(#211b30,#15111f);border-color:#3a3450;opacity:.78;}
  .rn-lock .ric{filter:grayscale(1);opacity:.55;}
  .rn-lock .rcnt{color:#8a7aa8;border-color:#3a3450;}
  @keyframes runepulse{0%,100%{box-shadow:0 0 9px #ffd34d88,inset 0 0 8px #0006;}50%{box-shadow:0 0 18px #ffd34d,inset 0 0 8px #0006;}}
  .rnode.rn-sel{outline:3px solid #fff;outline-offset:1px;transform:scale(1.08);z-index:3;}
  .rbranchhdr{position:absolute;transform:translateX(-50%);white-space:nowrap;font-size:12px;
    font-weight:bold;letter-spacing:.3px;padding:2px 8px;border-radius:8px;border:1.5px solid;
    background:rgba(245,235,205,.92);box-shadow:0 1px 3px rgba(80,50,10,.35);}
  .rbview{padding-bottom:74px;}
  .rbdetail{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(8px + env(safe-area-inset-bottom,0px));
    z-index:7;display:flex;align-items:center;gap:10px;width:min(560px,calc(100% - 20px));
    padding:8px 12px;border-radius:12px;background:rgba(16,11,30,.96);border:2px solid var(--accent);
    box-shadow:0 6px 24px rgba(0,0,0,.6);}
  .rbdetail button.go{white-space:nowrap;}
  /* ---- Tutorial coach banner + highlights ---- */
  #tutbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:22;
    width:min(520px,calc(100% - 56px));display:none;align-items:center;gap:10px;
    padding:9px 12px;border-radius:12px;background:rgba(20,14,40,.96);
    border:2px solid var(--accent);box-shadow:0 6px 22px rgba(0,0,0,.6);}
  #tutbar.show{display:flex;}
  #tutbar .tuttext{flex:1;font-size:13px;line-height:1.4;text-align:left;}
  #tutbar .tutskip{font-size:11px;padding:5px 8px;min-height:0;background:#2a2040;border-color:#4a3a72;}
  @keyframes tutpulse{0%,100%{box-shadow:0 0 0 0 #ffd34d00;}50%{box-shadow:0 0 0 4px #ffd34d99;}}
  .tut-pulse{animation:tutpulse 1s ease-in-out infinite;border-color:var(--gold)!important;}
  /* locked content (boss select / unlocks screen) */
  .choice.rlocked{opacity:.55;cursor:default;border-color:#3a3450;}
  .unlockgrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:680px;margin:0 auto;}
  .ucard{width:96px;padding:8px 4px;border-radius:10px;border:2px solid #3a3450;background:#1a1430;
    display:flex;flex-direction:column;align-items:center;gap:2px;}
  .ucard.uok{border-color:#52d97e;background:#1f3a26;}
  .ucard .uic{font-size:24px;}
  .ucard .un{font-size:11px;font-weight:bold;}
  .ucard .ureq{font-size:10px;opacity:.8;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar"></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint"></div>
    <div id="inspect"></div>
    <div id="tutbar"></div>
    <div id="relicbar"></div>
    <button id="pausebtn" title="Menu &amp; settings" onclick="openPauseMenu()">☰</button>
    <button id="audiobtn" title="Sound on/off">🔊</button>
    <div id="zoomctl">
      <button onclick="zoomBy(1.2)" title="Zoom in">＋</button>
      <button onclick="zoomFit()" title="Fit dungeon">⤢</button>
      <button onclick="zoomBy(0.83)" title="Zoom out">－</button>
    </div>
  </div>
  <div id="panel"></div>
  <div id="overlay"></div>
</div>
<script>
"use strict";
/* ============================================================================
   BOSS MONSTER — build a reverse dungeon. Heroes walk in from the left toward
   your boss on the right; kill them with trap rooms, monster rooms and a shop
   that arms them (so you can loot it all back). Auto-resolve combat + manual
   boss abilities. Campaign + Endless.
   ========================================================================== */

const CV = document.getElementById('cv');
const X = CV.getContext('2d');
const stage = document.getElementById('stage');
const topbar = document.getElementById('topbar');
const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const hintEl = document.getElementById('hint');
const inspectEl = document.getElementById('inspect');
const tutBar = document.getElementById('tutbar');
const relicBar = document.getElementById('relicbar');
let inspectHover = false;

// Virtual render space. VH is fixed so sprites stay a constant size; VW is
// derived from the live screen aspect each resize, so the canvas is crisp and
// undistorted in any orientation (portrait shows fewer rooms, camera follows).
let VW = 960, VH = 420;          // virtual units (recomputed in resize())
let baseK = 1;                   // virtual→device-pixel scale
let cssW = 960, cssH = 420;      // canvas CSS size in px
let zoom = 1;                    // dungeon zoom (pinch / buttons / wheel)
const ZMIN = 0.45, ZMAX = 1.7;
const STAGEW = 132;              // staging area (left of the entrance) for waiting heroes
const FLOOR = 330;          // y of the floor line
const ROOM_W = 200;         // pixel width of one room/cell

/* ----------------------------- content tables ---------------------------- */
// Room cards. type = id. "trap" rooms hit passing heroes; "monster" rooms
// spawn a blocker that must be killed; "shop" arms heroes (you profit).
const ROOMS = {
  spike:    {kind:'trap',   name:'Spike Pit',  ic:'🦷', col:'#9aa4b2', dmg:6,  rate:0.45, elem:'phys', desc:'Fast cheap spikes. Shatters frozen heroes.'},
  flame:    {kind:'trap',   name:'Flame Jet',  ic:'🔥', col:'#ff7a2e', dmg:11, rate:0.8,  burn:4, elem:'fire', desc:'Hits hard + burns. Ignites oiled heroes.'},
  arrow:    {kind:'trap',   name:'Dart Wall',  ic:'🎯', col:'#caa15e', dmg:5,  rate:0.3,  elem:'phys', pierce:true, desc:'Very rapid, pierces armor.'},
  oil:      {kind:'trap',   name:'Oil Slick',  ic:'🛢️', col:'#3a3a2a', dmg:3,  rate:0.7,  elem:'oil',  desc:'Coats heroes in oil — slows them, primes fire & lightning.'},
  frost:    {kind:'trap',   name:'Frost Trap', ic:'❄️', col:'#9adfff', dmg:5,  rate:0.6,  elem:'ice',  desc:'Chills heroes (slow). Then any hit SHATTERS for a burst.'},
  tesla:    {kind:'trap',   name:'Tesla Coil', ic:'⚡', col:'#fff34d', dmg:9,  rate:0.7,  elem:'shock',desc:'Lightning. Chains across the party if they are oiled.'},
  // ---- counter cards (unlockable) ----
  magebane: {kind:'trap',   name:'Mage-Bane',  ic:'🔮', col:'#b163ff', dmg:7,  rate:0.5,  elem:'phys', vsClass:['mage','cleric'], vsMult:2.6, desc:'2.6× damage to mages & clerics.'},
  maul:     {kind:'trap',   name:'Armor Crusher',ic:'🔨',col:'#9aa4b2', dmg:13, rate:0.7,  elem:'phys', pierceAll:true, desc:'Ignores ALL armor — crushes armored heroes.'},
  gallows:  {kind:'trap',   name:'Gallows',    ic:'⚰️', col:'#6a5a8a', dmg:8,  rate:0.6,  elem:'phys', vsLowHp:0.4, vsMult:3, desc:'Executes the wounded: 3× damage under 40% HP.'},
  hexward:  {kind:'trap',   name:'Hexward',    ic:'🧿', col:'#4dc3ff', dmg:6,  rate:0.45, elem:'phys', vsElite:true, vsMult:2.2, desc:'2.2× damage to elite (trait-bearing) heroes.'},
  goblin:   {kind:'monster',name:'Goblin Den', ic:'👺', col:'#5fae54', hp:16, atk:6, feeds:true, desc:'Weak early — but grows +10% stronger for every hero that dies in this room.'},
  skeleton: {kind:'monster',name:'Bone Pit',   ic:'💀', col:'#d8d2c2', hp:26, atk:9,  desc:'Scales hard with levels.'},
  ogre:     {kind:'monster',name:'Ogre Lair',  ic:'👹', col:'#b0563a', hp:48, atk:16, desc:'Late-game wall of pain.'},
  shop:     {kind:'shop',   name:'Shop',       ic:'🛒', col:'#caa15e', desc:'Heroes buy your stock — you keep the gold. Higher levels sell at a steeper markup.'},
  minion:   {kind:'monster',name:'Corrupted',  ic:'🧟', col:'#9a5cff', hp:30, atk:7, minion:true, desc:'A turned hero that guards a room.'},
};
// Cards you can DRAFT (minions only come from corrupting heroes in town).
const ROOM_KEYS = Object.keys(ROOMS).filter(k=>k!=='minion');
const MAX_LEVEL = 5;   // a trap/monster can be upgraded this many times
const FUSE_KILLS = 3;  // hero deaths in a room before it can fuse a 2nd part
// Effective values after rune bonuses (RB):
function maxLevel(){ return MAX_LEVEL + (RB.upCap||0); }
function fuseKills(){ return Math.max(1, FUSE_KILLS - (RB.fuseFast||0)); }
function handCap(){ return 5 + (RB.hand||0); }
function abilCost(c){ const p=G.boss?G.boss.pAbilCost||0:0; return Math.max(1, Math.round(c*(1-Math.min(0.8,(RB.abilCost||0)+p)))); }
function abilDmg(x){ const p=G.boss?G.boss.pAbilDmg||0:0; return Math.round(x*(1+(RB.abilDmg||0)+p)); }
function townCost(c){ return Math.max(1, Math.round(c*(1-(RB.townDisc||0)))); }
// Shop sale price scales with the shop room's level (+40% markup per level).
function shopMarkup(lvl){ return 1.6 + ((lvl||1)-1)*0.4; }
function salePrice(room, key){ return Math.round(ITEMS[key].price * shopMarkup(room?room.lvl:1)); }

// Fusing two components yields a synergy multiplier on the room's output.
// Some pairs are great, some are duds (diminishing returns).
const SYNERGY_PAIRS = {
  'flame+skeleton':{m:1.35,name:'Funeral Pyre'},
  'flame+goblin':  {m:1.25,name:'Roasting Pit'},

function synergyInfo(parts){
  if(parts.length<2) return {m:1, name:'', tone:'neutral'};

}

// ---- Aging dungeon: veteran rooms, merging & corruption ----------------
// Rooms that have killed a lot of heroes become "veterans": they hit harder
// AND bite a % of the hero's max HP every strike, so they never fall off vs
// late-game tanks. The kill count that already drives fusing also drives this.
const VET_KILLS = 6;     // hero deaths in a room per veteran rank
const VET_MAX   = 8;     // rank cap
const VET_DMG   = 0.12;  // +12% trap/monster output per rank
const VET_BITE  = 0.012; // + this fraction of the hero's MAX HP per rank, every hit
const CORRUPT_PCT  = 0.015; // toll: drain this % of max HP each populated room a hero passes
const CORRUPT_BOSS = 0.06;  // the boss strikes +6% harder per corruption stack a hero carries
function vetRank(room){ return room ? Math.min(VET_MAX, Math.floor((room.kills||0)/VET_KILLS)) : 0; }
function vetMul(room){ return 1 + vetRank(room)*VET_DMG; }
function roomUpgradeCost(room){ return Math.max(1, Math.round((25 + 22*room.lvl) * (room.part2?1.4:1) * (1-(RB.townDisc||0)))); }
// Can room `from` be merged INTO room `into` (turning `into` into a combo)?
function canFuseRooms(into, from){
  return !!(into && from && (into.kills||0)>=fuseKills() && !into.part2 && !from.part2
    && into.def.kind!=='shop' && from.def.kind!=='shop' && from.type!==into.type);
}

function bossLevelOf(key){ return Math.min(BOSS_LVL_MAX, 1 + Math.floor(bossXpOf(key)/BOSS_XP_PER_LVL)); }

  const into = lvl>=BOSS_LVL_MAX ? BOSS_XP_PER_LVL : bossXpOf(key) - (lvl-1)*BOSS_XP_PER_LVL;
  return { lvl, into, need:BOSS_XP_PER_LVL, max:lvl>=BOSS_LVL_MAX }; }
function bossMasteryHp(lvl){ return 1 + (lvl-1)*0.04; }   // +4% max HP per level

function relicRB(){
  const b=blankRB();
  for(const id of (G&&G.relics||[])){ const r=RELICS[id]; if(r&&r.rb){ for(const k in r.rb) b[k]=(b[k]||0)+r.rb[k]; } }
  return b;

function recomputeRB(){
  const rl=relicRB(); const o=blankRB();
  for(const k in o) o[k]=(RUNE_RB[k]||0)+(rl[k]||0);
  o.bossDR=Math.min(0.75,o.bossDR); o.abilCost=Math.min(0.8,o.abilCost);
  o.slotCost=Math.min(0.8,o.slotCost); o.townDisc=Math.min(0.8,o.townDisc);
  RB=o;
}
function addRelic(id){
  const r=RELICS[id]; if(!r) return;
  G.relics.push(id);
  const b=G.boss, rb=r.rb||{};
  if(r.hp){ b.maxHp+=r.hp; b.hp+=r.hp; }
  if(r.gold) G.gold+=r.gold;
  if(r.dread) G.dread+=r.dread;
  // Stats that are normally locked in at run start must be applied on pickup
  // too (mana cap, mana regen, boss attack) — otherwise a mid-run relic looks
  // like it did nothing.
  if(b){
    if(rb.manaFlat){ b.maxMana+=rb.manaFlat; b.mana=Math.min(b.maxMana, b.mana+rb.manaFlat); }
    if(rb.manaRegen){ b.manaRegen=(b.manaRegen||6)+rb.manaRegen; }
    if(rb.bossAtk){ b.atk+=Math.round((BOSSES[b.key]?BOSSES[b.key].atk:b.atk)*rb.bossAtk); }
    if(rb.bossAtkFlat){ b.atk+=rb.bossAtkFlat; }
  }
  recomputeRB();
  if(typeof renderRelicBar==='function') renderRelicBar();
}

const RELIC_BY_TIER={};
TIER_ORDER.forEach(t=>RELIC_BY_TIER[t]=Object.keys(RELICS).filter(k=>RELICS[k].tier===t));

function tierWeights(L){
  return { common:Math.max(2,28-L*4), special:18, rare:6+L*1.6,
    epic:2+L*1.3, legendary:.4+L*.7, mythic:.08+L*.3 };
}
function rollTier(L){
  const w=tierWeights(L); let tot=0; for(const t in w) tot+=w[t];
  let r=Math.random()*tot;
  for(const t of TIER_ORDER){ r-=w[t]; if(r<=0) return t; }
  return 'common';
}
function rollRelicChoices(n){
  const L = G.mode==='campaign' ? G.levelIdx*1.3 : G.totalSlain/12;
  const owned=new Set(G.relics);
  const picks=[]; let guard=0;
  while(picks.length<n && guard++<200){
    let t=rollTier(L);
    let pool=RELIC_BY_TIER[t].filter(id=>!owned.has(id)&&!picks.includes(id));
    if(!pool.length){ // fall back across tiers
      pool=Object.keys(RELICS).filter(id=>!owned.has(id)&&!picks.includes(id));
      if(!pool.length) break;
    }
    picks.push(pool[ri(0,pool.length-1)]);
  }
  return picks;
}

function resize(){
  const r = stage.getBoundingClientRect();
  if(r.width<2 || r.height<2) return;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cssW = r.width; cssH = r.height;
  VH = 420;                                   // fixed virtual height
  VW = Math.max(360, Math.round(VH * cssW / cssH));
  CV.width  = Math.round(cssW * dpr);
  CV.height = Math.round(cssH * dpr);
  CV.style.width = cssW + 'px';
  CV.style.height = cssH + 'px';

}

}catch(_){ } }
function setSfxVol(v){ sfxVol=clamp(+v,0,1); if(sfxBus) sfxBus.gain.value=sfxVol; try{ localStorage.setItem('bm_sfxvol',sfxVol); }catch(_){ } }

function initAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  try{ AC=new (window.AudioContext||window.webkitAudioContext)();
    sfxBus=AC.createGain();   sfxBus.gain.value=sfxVol;   sfxBus.connect(AC.destination);
    musicBus=AC.createGain(); musicBus.gain.value=musVol; musicBus.connect(AC.destination);
    startMusic(); }catch(_){ AC=null; }

function tone(freq,dur,type,vol,slideTo,bus){
  if(!AC||!audioOn) return;
  const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(bus||sfxBus||AC.destination); o.start(t); o.stop(t+dur+0.02);
}
function noiseBurst(dur,vol,cut){
  if(!AC||!audioOn) return;
  const t=AC.currentTime, n=Math.max(1,Math.floor(AC.sampleRate*dur));
  const buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf;
  const g=AC.createGain(); g.gain.value=vol||0.18;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||2600;
  s.connect(f); f.connect(g); g.connect(sfxBus||AC.destination); s.start();
}

let musicMood='calm', _musicMs=440, _mBeat=0, _mProg=0, _mMelOn=true, _mDensity=0.5;
function musicTick(){
  if(!audioOn||!AC) return;
  try{
    const M=MOODS[musicMood]||MOODS.calm; const progs=M.progs;
    if(_mProg>=progs.length) _mProg=0;
    const bar=Math.floor(_mBeat/4)%4;
    const chord=progs[_mProg][bar];
    if(_mBeat%4===0){
      chord.forEach(f=>tone(f,1.6,M.pad,M.padVol,f,musicBus));
      tone(chord[0]/2,1.9,'triangle',M.padVol*0.9,null,musicBus);
      if(bar===0){ if(Math.random()<0.55) _mProg=(_mProg+1)%progs.length;
        _mMelOn=Math.random()<0.85; _mDensity=M.density*(0.7+Math.random()*0.5); }
    } else if(_mBeat % M.bassEvery===0){
      tone(chord[0]/2,0.45,'triangle',M.padVol*0.8,null,musicBus);
    }
    if(_mMelOn && Math.random()<_mDensity){
      const scale=M.penta||_BASE_PENTA; const n=scale[ri(0,scale.length-1)];
      tone(n,0.32,M.mel,M.melVol,n,musicBus);
      if(Math.random()<0.33){ const n2=scale[ri(0,scale.length-1)];
        setTimeout(()=>{ if(audioOn&&AC) try{ tone(n2,0.24,M.mel,M.melVol*0.85,n2,musicBus); }catch(_){ } }, Math.floor(_musicMs/2)); }
    }
    _mBeat++;
  }catch(_){ }
}

  if(!MOODS[mood] || mood===musicMood) return;
  musicMood=mood;

  let mood='calm';

      if(G.heroes && G.heroes.some(h=>h.champion && h.state!=='dead')) mood='champion';
      else if(G.boss && G.boss.hp/G.boss.maxHp < 0.30) mood='danger';

  // campaign chapter multiplier × bounty/threat dial.
  const cumulative = 1 + G.totalSlain*0.05;
  const threat = 1 + G.bounty*0.15;
  if(G.mode==='campaign') return cumulative * CAMPAIGN[G.levelIdx].diff * threat;
  return (cumulative + G.survived*0.05) * threat;
}

function tutDoneGet(){ try{ return localStorage.getItem('bm_tut_done')==='1'; }catch(_){ return false; } }

let runeSel=null;
function openRunes(){ runeSel=null; overlay.classList.add('show'); renderRunes(); }
// First tap a node to inspect it (detail bar appears); tap it again — or the
// Buy button — to spend a point on the next rank.
function tapRune(id){
  const n=RUNE_NODES[id]; if(!n) return;
  if(runeSel!==id){ runeSel=id; sfx('buy'); renderRunes(); return; }   // 1st tap: select+inspect
  buyRune(id);                                                          // 2nd tap: buy
}
function buyRune(id){
  const n=RUNE_NODES[id]; if(!n) return;
  runeSel=id;
  if(!runeUnlocked(n)){ const p=RUNE_NODES[n.req]; showHint('🔒 Unlock '+(p?p.name:'the rune above')+' first.'); renderRunes(); return; }
  if(ranksOf(id)>=n.maxRank){ showHint('✔ '+n.name+' is maxed.'); renderRunes(); return; }
  const cost=runeCost(n);
  if(RUNES.points<cost){ showHint('Need '+cost+'◆ (you have '+RUNES.points+').'); renderRunes(); return; }
  RUNES.points-=cost; RUNES.ranks[id]=ranksOf(id)+1; saveRunes();
  sfx('upgrade'); showHint(n.ic+' '+n.name+' → rank '+ranksOf(id)+'/'+n.maxRank);
  renderRunes();
}
function renderRunes(){
  overlay.classList.add('show');
  const COLW=126, ROWH=104, PAD=26, NODE=58, HDR=30;
  const topPad=PAD+HDR;                              // header band above the tree
  let maxCol=0,maxRow=0; RUNE_LIST.forEach(n=>{ if(n.col>maxCol)maxCol=n.col; if(n.row>maxRow)maxRow=n.row; });
  const W=Math.round(PAD*2+maxCol*COLW+NODE), H=Math.round(topPad+PAD+maxRow*ROWH+NODE);
  const cx=n=>PAD+n.col*COLW+NODE/2, cy=n=>topPad+n.row*ROWH+NODE/2;
  let paths='';
  RUNE_LIST.forEach(n=>{ if(!n.req)return; const p=RUNE_NODES[n.req]; if(!p)return;
    const lit=ranksOf(p.id)>0; const x1=cx(p),y1=cy(p)+NODE/2-6,x2=cx(n),y2=cy(n)-NODE/2+6, my=(y1+y2)/2;
    paths+=`<path d="M${x1} ${y1} V${my} H${x2} V${y2}" stroke="${lit?'#e8c06a':'#7a6038'}" stroke-width="${lit?5:3}" fill="none" opacity="${lit?0.95:0.5}" stroke-linejoin="round"/>`; });
  const heads=RUNE_BRANCHES.map(b=>{
    const x=PAD+b.col*COLW+NODE/2;
    return `<div class="rbranchhdr" style="left:${x}px;top:${topPad+ROWH-28}px;color:${b.c};border-color:${b.c}">${b.ic} ${b.name}</div>`;}).join('');
  const nodes=RUNE_LIST.map(n=>{
    const r=ranksOf(n.id), maxed=r>=n.maxRank, unlocked=runeUnlocked(n), cost=runeCost(n), afford=RUNES.points>=cost;
    const cls = (maxed?'rn-max':(unlocked?(afford?'rn-buy':'rn-cost'):'rn-lock')) + (n.id===runeSel?' rn-sel':'');
    const x=Math.round(PAD+n.col*COLW), y=Math.round(topPad+n.row*ROWH);
    const ic = unlocked? n.ic : '🔒';
    return `<div class="rnode ${cls}" style="left:${x}px;top:${y}px;width:${NODE}px;height:${NODE}px"
      onclick="tapRune('${n.id}')" title="${n.name}: ${n.desc} (${cost}◆/rank)">
      <span class="ric">${ic}</span><span class="rcnt">${r}/${n.maxRank}</span></div>`;}).join('');
  // detail bar for the selected node
  let detail='';
  const s=runeSel?RUNE_NODES[runeSel]:null;
  if(s){ const r=ranksOf(s.id), maxed=r>=s.maxRank, unlocked=runeUnlocked(s), cost=runeCost(s), afford=RUNES.points>=cost;
    const action = maxed ? '<span style="color:#7bdc6b;font-weight:bold">✔ MAXED</span>'
      : !unlocked ? `<span style="color:#ff9aae;font-size:12px">🔒 unlock ${RUNE_NODES[s.req].name} first</span>`
      : `<button class="go" ${afford?'':'disabled'} onclick="buyRune('${s.id}')">Buy · ${cost}◆</button>`;
    detail=`<div class="rbdetail">
      <span style="font-size:26px">${unlocked?s.ic:'🔒'}</span>
      <div style="flex:1;text-align:left;min-width:0">
        <b>${s.name}</b> <span class="small">· rank ${r}/${s.maxRank} · ${cost}◆/rank</span><br>
        <span class="small" style="opacity:.9">${s.desc}</span>
      </div>${action}</div>`;
  } else {
    detail=`<div class="rbdetail" style="justify-content:center"><span class="small" style="opacity:.8">Tap a rune to inspect it · tap again (or Buy) to spend a point.</span></div>`;
  }
  overlay.innerHTML=`<div class="runebook">
    <button class="rbback" onclick="gotoMenu()">‹ BACK</button>
    <div class="rbpts">${RUNES.points} <span class="rbscroll-ic">📜</span></div>
    <div class="rbview"><div class="rtree" style="width:${W}px;height:${H}px">
      <svg width="${W}" height="${H}" style="position:absolute;left:0;top:0;pointer-events:none">${paths}</svg>
      ${heads}
      ${nodes}
    </div></div>
    ${detail}
  </div>`;
}

function chooseBoss(key){
  applyRunes();                                  // lock in this run's rune bonuses
  G.hand=[];                                     // reset (safe if you backed out & re-picked)
  const b=BOSSES[key];
  const mLvl=bossLevelOf(key);                    // boss mastery: permanent +HP/+ATK
  const maxHp=Math.round(b.maxHp*(1+RB.bossHp)*bossMasteryHp(mLvl)) + RB.bossHpFlat;
  const atk=Math.round(b.atk*(1+RB.bossAtk)*bossMasteryAtk(mLvl)) + RB.bossAtkFlat;
  G.boss={ key, ...b, atk, hp:maxHp, maxHp, lvl:1, masteryLvl:mLvl,
    mana:60+RB.manaFlat, maxMana:100+RB.manaFlat, manaRegen:6+RB.manaRegen,
    abil:b.abilities.map(id=>({id,cd:0})) };
  applyBossPassive(G.boss);                       // signature passive effects
  // starter dungeon + rune head-starts
  G.slots=1+RB.slot0;
  G.rooms=Array(G.slots).fill(null);
  G.gold=30+RB.gold0;
  G.dread=RB.dread0;
  G.guildLvl=Math.min(GUILD_MAX, RB.guild0);
  zoom=1; camX=0;
  for(let i=0;i<RB.cards0;i++) G.hand.push({type:pick(unlockedRoomKeys()), lvl:1});
  gotoLoadout();                                  // pick your 3 abilities
}

/* ====================== PHASE: ABILITY LOADOUT ========================= */
let loadoutSel=[];
function gotoLoadout(){ G.phase='loadout'; loadoutSel=[...G.boss.abilities]; renderLoadout(); }
function toggleLoadout(id){

  else { if(loadoutSel.length>=3){ showHint('Pick exactly 3 — deselect one first.'); return; } loadoutSel.push(id); }

function confirmLoadout(){

  G.phase='loadout'; overlay.classList.add('show');
  const b=G.boss;
  const cards=Object.keys(ABIL).map(id=>{ const d=ABIL[id]; const on=loadoutSel.includes(id);
    return `<div class="choice" style="width:150px;cursor:pointer;${on?'border-color:#ffd34d;box-shadow:0 0 8px #ffd34d':''}" onclick="toggleLoadout('${id}')">
      <div class="big">${d.ic}</div><h3 style="font-size:13px;margin:2px 0">${d.name}</h3>
      <div class="small" style="opacity:.85">${d.desc}</div>
      <div class="small" style="color:#4dc3ff">🔷${d.cost} · ${d.cd}s</div>
      <div class="small" style="color:${on?'#ffd34d':'#6a5a9a'}">${on?'✔ equipped':'tap to equip'}</div>
    </div>`;}).join('');

    <p>Equip <b>3 abilities</b> for this run — <b>${loadoutSel.length}/3</b> chosen.</p>

}

/* ============================== PHASE: BUILD ============================= */
// In build, allow the camera a little past the entrance so the upcoming heroes
// waiting at the gate are visible.
function minCam(){ return (G && G.phase==='build' && G.queue && G.queue.length) ? -STAGEW : 0; }
function gotoBuild(first){
  G.phase='build'; G.hero=null; G.heroes=[]; selCard=-1; pickupIdx=-1;
  ensureQueue(Math.max(3, G.guildLvl+1));        // pre-roll the next arrivals to preview
  camX=minCam();                                  // reveal the staging area
  if(first){
    showHint('Tap a card then a slot to build · tap a room to move it · drag to pan.');
    if(cssH>cssW*1.1) setTimeout(()=>showHint('↻ Tip: rotate to landscape for a wider dungeon view.'),2800);
  }
  render();
}

// Geometry helper: corridor = slots (left→right) then boss room (rightmost).
function corridorWidth(){ return (G.slots+1)*ROOM_W; }
function cellX(i){ return i*ROOM_W; }        // left edge of cell i (0..slots-1 rooms, slots=boss)

// Slots get steeply more expensive the longer your dungeon already is, so
// stretching the corridor is a real escalating investment (≈40,64,102,164,…).
function slotCost(){ return Math.max(1, Math.round(25*Math.pow(1.6,G.slots)*(1-(RB.slotCost||0)))); }

function buySlot(){
  const c=slotCost();
  if(G.gold<c){ showHint('Not enough gold.'); return; }
  G.gold-=c; G.slots++; G.rooms.unshift(null);   // new slot extends to the LEFT
  // existing rooms keep their objects; unshift(null) puts new empty slot far left
  pickupIdx=-1; camX=0;                           // pan to reveal the new slot
  showHint('New slot added on the far left. Drag to pan the dungeon.');
  render();
}

function selectCard(i){
  selCard = (selCard===i?-1:i);
  pickupIdx=-1;
  if(selCard>=0 && G.hand[selCard]){ showInspect(describeCard(G.hand[selCard]), false); tutEvent('select'); }
  else hideInspect();
  render();
}
function discardCard(i){
  G.hand.splice(i,1); if(selCard===i)selCard=-1; else if(selCard>i)selCard--;
  render();
}
function roomName(r){ return r?(r.type==='minion'?(r.label||'Corrupted'):ROOMS[r.type].name):'empty'; }
function canFuse(room,card){
  return (room.kills||0)>=fuseKills() && !room.part2
    && room.def.kind!=='shop' && ROOMS[card.type].kind!=='shop'
    && card.type!==room.type;
}

// Place / upgrade by tapping a slot index (0..slots-1).
function tapSlot(idx){
  // No card selected → REARRANGE mode: tap a room to pick up, tap a slot to drop.
  if(selCard<0){
    const here=G.rooms[idx];
    if(pickupIdx<0){
      if(!here){ showHint('Pick a card to build, or tap a room to move it.'); return; }
      pickupIdx=idx; showHint('Moving '+roomName(here)+' — tap any slot to drop (swaps if full).');
      render(); return;
    }
    if(pickupIdx===idx){ pickupIdx=-1; showHint('Move cancelled.'); render(); return; }
    const tmp=G.rooms[pickupIdx]; G.rooms[pickupIdx]=G.rooms[idx]; G.rooms[idx]=tmp;
    pickupIdx=-1; showHint('Rooms rearranged.'); render(); return;
  }
  placeCard(selCard, idx);
}
// Apply hand card `ci` to slot `idx` (build / upgrade / fuse). Returns true on success.
function placeCard(ci, idx){
  const card=G.hand[ci]; if(!card) return false;
  const room=G.rooms[idx];
  if(!room){
    // build new room here
    G.rooms[idx]=makeRoom(card.type, card.lvl, card);
    G.hand.splice(ci,1);
    burst(cellX(idx)+ROOM_W/2, FLOOR-30, ROOMS[card.type].col, 14);
    showHint(ROOMS[card.type].name+' built!'); tutEvent('place');
  } else if(room.type===card.type || room.part2===card.type){
    // upgrade matching room/part (capped)
    if(room.lvl>=maxLevel()){ showHint(comboName(room)+' is already max level ('+maxLevel()+').'); return false; }
    room.lvl++;
    G.hand.splice(ci,1);
    burst(cellX(idx)+ROOM_W/2, FLOOR-30, '#ffd34d', 16);
    floater(cellX(idx)+ROOM_W/2, FLOOR-70, 'LVL '+room.lvl, '#ffd34d');
    showHint(comboName(room)+' upgraded to Lv '+room.lvl+(room.lvl>=maxLevel()?' (max)':'')+'!'); tutEvent('upgrade');
  } else if(canFuse(room,card)){
    // fuse a second trap/monster into this room
    room.part2=card.type;
    if(card.type==='minion'){ room.minHp=card.minHp; room.minAtk=card.minAtk; if(!room.label) room.label=card.label; }  // carry the corrupted hero's stats
    G.hand.splice(ci,1);
    const info=synergyInfo(roomParts(room));
    burst(cellX(idx)+ROOM_W/2, FLOOR-40, '#9a5cff', 20);
    floater(cellX(idx)+ROOM_W/2, FLOOR-80, info.name||'COMBO', info.tone==='bad'?'#ff7a8a':'#7bdc6b');
    showHint('Fused → '+comboName(room)+(info.name?' ('+info.name+', ×'+info.m.toFixed(2)+')':'')+'!');
  } else if(room.def.kind!=='shop' && ROOMS[card.type].kind!=='shop' && !room.part2){
    showHint(ROOMS[room.type].name+' needs '+fuseKills()+' kills before it can fuse a 2nd part ('+(room.kills||0)+'/'+fuseKills()+').');
    return false;
  } else {
    showHint('Can\'t place that here.');
    return false;
  }
  selCard=-1; sfx('upgrade');
  render();
  return true;
}

function makeRoom(type,lvl,card){
  const def=ROOMS[type];
  const r={type,lvl,def,kills:0,part2:null};
  if(def.kind==='shop') r.stock=[];
  if(type==='minion'){            // carry the corrupted hero's stats + name
    r.minHp = card?.minHp || def.hp;
    r.minAtk = card?.minAtk || def.atk;
    r.label = card?.label || 'Corrupted';
  }
  return r;
}

// Stock the shop (build phase). Adds item to first shop room.
function stockShop(itemKey){
  const it=ITEMS[itemKey];
  if(G.gold<it.price){ showHint('Not enough gold to stock that.'); return; }
  const shop=G.rooms.find(r=>r&&r.type==='shop');
  if(!shop){ showHint('Build a Shop room first.'); return; }
  G.gold-=it.price; shop.stock.push({key:itemKey, sold:false});
  showHint(it.name+' stocked. Heroes pay '+salePrice(shop,itemKey)+'g (Lv '+shop.lvl+' shop).');
  render();
}

// Begin a wave: build cells geometry, spawn the raiding party, switch to run.
function startWave(){
  buildCells();
  spawnGroup(G.guildLvl+1);
  G.phase='run'; speedMul=1; camX=0;
  // refill some mana each wave + rune-granted HP regen
  G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana+30);
  if(RB.bossRegen) G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+RB.bossRegen);
  tutEvent('wave');
  render();
}

function buildCells(){
  G.cells=[];
  for(let i=0;i<G.slots;i++){
    const r=G.rooms[i];
    const cell={index:i, x0:cellX(i), x1:cellX(i)+ROOM_W, room:r, kind:'empty', traps:[], mon:null, shop:false};
    if(r){
      const parts=roomParts(r);
      const syn=synergyInfo(parts).m + (parts.length>1?(RB.synergy||0):0);
      cell.syn=syn;
      const vm=vetMul(r); cell.vet=vetRank(r);   // veteran rank powers this cell
      let monHp=0, monAtk=0, hasMon=false, hasShop=false;
      for(const p of parts){
        const def=ROOMS[p];
        if(def.kind==='trap'){
          cell.traps.push({type:p, def, fireT:0});
        } else if(def.kind==='monster'){
          hasMon=true;
          const bHp = p==='minion'? (r.minHp||def.hp) : def.hp;   // ||def guards a NaN/missing minion stat
          const bAtk= p==='minion'? (r.minAtk||def.atk): def.atk;
          // "Fed" monsters (goblins) grow with every hero that died in this room — uncapped.
          const feed = def.feeds ? (1 + (r.kills||0)*0.10) : 1;
          // Monsters scale HARD: weak at Lv1, brutal at high level.
          monHp += bHp  * (0.9 + (r.lvl-1)*0.85) * feed;
          monAtk+= bAtk * (1.0 + (r.lvl-1)*0.9)  * feed;
        } else if(def.kind==='shop'){
          hasShop=true; (r.stock||[]).forEach(s=>s.sold=false);
        }
      }
      if(hasMon){ const hp=Math.round(monHp*syn*vm*(1+(RB.monHp||0)));
        cell.mon={hp, maxHp:hp, atk:Math.round(monAtk*syn*vm*(1+(RB.monDmg||0))), atkT:0, alive:true}; }
      cell.shop=hasShop;
      cell.kind = hasMon ? 'monster' : (cell.traps.length ? 'trap' : (hasShop ? 'shop' : 'empty'));
    }
    G.cells.push(cell);
  }
  // boss cell
  G.cells.push({index:G.slots, x0:cellX(G.slots), x1:cellX(G.slots)+ROOM_W, kind:'boss', traps:[]});
}

/* ============================== PHASE: RUN =============================== */
// Heroes are pre-generated into a queue so the town can preview & sabotage the
// next arrivals. A spec is a lightweight seed; buildHero turns it into a unit.
function genHeroSpec(){
  const power=G.heroSeq++;
  // every CHAMP_EVERY-th arrival (after the early game) is a champion mini-boss
  if(power>0 && power%CHAMP_EVERY===0){
    const type=pick(CHAMP_KEYS);
    return {cls:CHAMPIONS[type].cls, power, traits:[], name:rollName(), champion:type, rivalGen:0,
            debuff:{atkMul:1, burn:0, robbed:false}};
  }
  const cls=pickHeroClass();
  // elite chance climbs with progress; later heroes can roll two traits.
  const eliteChance=clamp(0.06 + power*0.02, 0, 0.7);
  const traits=[];
  if(Math.random()<eliteChance){
    const pool=[...TRAIT_KEYS];
    traits.push(pool.splice(ri(0,pool.length-1),1)[0]);
    if(power>=7 && Math.random()<0.35) traits.push(pool.splice(ri(0,pool.length-1),1)[0]);
  }
  return {cls, power, traits, name:rollName(), rivalGen:0,
          debuff:{atkMul:1, burn:0, robbed:false}};
}
// Pull the next spec, letting a due rival cut the line ahead of fresh heroes.
function nextSpec(){
  for(const r of G.pendingRivals) r.eta--;
  const i=G.pendingRivals.findIndex(r=>r.eta<=0);
  if(i>=0) return G.pendingRivals.splice(i,1)[0].spec;
  return genHeroSpec();
}
function ensureQueue(k){ while(G.queue.length<k) G.queue.push(nextSpec()); }

// A hero who reached the throne swears revenge and returns stronger.
function makeRival(h){
  const gen=(h.rivalGen||0)+1;
  const traits=[...new Set([...(h.specTraits||[]), pick(TRAIT_KEYS)])];
  G.pendingRivals.push({ eta: ri(2,4), spec:{
    cls:h.cls, power:(h.specPower||0)+2+gen, traits,
    name:h.heroName, rivalGen:gen,
    title: RIVAL_TITLES[Math.min(gen-1, RIVAL_TITLES.length-1)],
    rival:true, debuff:{atkMul:1, burn:0, robbed:false}
  }});
}

function pickHeroClass(){
  const r=Math.random();
  if(r<0.4) return 'warrior';
  if(r<0.65) return 'rogue';
  if(r<0.85) return 'mage';
  return 'cleric';
}

// Loot economy. Gold scales gently (softened difficulty) so income doesn't
// balloon as heroes get stronger — power should outpace your purse.
function softGoldD(d){ return 1 + (d-1)*0.45; }
function heroGold(n,d,robbed){ return Math.round((7 + n*2.2)*softGoldD(d)*(robbed?0.35:1)); }
function heroBounty(n,d){ return Math.round((4 + n*1.2)*softGoldD(d)); }

// Preview a spec's headline stats (for the town roster) without instantiating.
function previewStats(spec){
  const c=CLASSES[spec.cls]; const n=spec.power; const d=difficulty();
  let hp=(32 + n*8.5)*c.hp*d, atk=(5 + n*1.6)*c.atk*d;
  if(spec.traits.includes('hardy')) hp*=1.6;
  if(spec.traits.includes('berserk')) atk*=1.4;
  atk*=spec.debuff.atkMul;
  if(spec.champion){ const ch=CHAMPIONS[spec.champion]; hp*=ch.hpMul; atk*=ch.atkMul; }
  return {hp:Math.round(hp), atk:+atk.toFixed(1), gold:heroGold(n,d,spec.debuff.robbed)};
}

// Build a single hero unit from a spec (applies traits, sabotage, schemes).
function buildHeroFromSpec(spec){
  let cls=spec.cls;
  if(G.fx.temple>0 && cls==='cleric') cls='warrior';   // temple burned: no clerics
  const d=difficulty(); const c=CLASSES[cls]; const n=spec.power;
  const tr=spec.traits;
  let hp=(32 + n*8.5) * c.hp * d;
  let atk=(5 + n*1.6) * c.atk * d;
  let armor=c.armor + Math.floor(n*0.45);
  let spd=c.spd;
  let atkSpeed=1;                       // multiplier on attack interval (<1 faster)
  // ---- elite traits ----
  if(tr.includes('hardy'))   hp*=1.6;
  if(tr.includes('berserk')){ atk*=1.4; atkSpeed*=0.65; }
  if(tr.includes('armored')) armor+=6;
  if(tr.includes('swift')){ spd*=1.5; atkSpeed*=0.8; }
  // ---- town sabotage ----
  atk*=spec.debuff.atkMul;
  // ---- champion mini-boss ----
  const champ = spec.champion ? CHAMPIONS[spec.champion] : null;
  let gold=heroGold(n,d,spec.debuff.robbed), bounty=heroBounty(n,d);
  if(champ){ hp*=champ.hpMul; atk*=champ.atkMul; armor+=2; gold=Math.round(gold*2.5); bounty=Math.round(bounty*3); }
  hp=Math.round(hp); atk=+atk.toFixed(1);
  const h={
    cls, ...c, name:cls, traits:tr,
    elite: tr.length>0 || !!champ,
    heroName: spec.name, title: spec.title || (champ?champ.title:null),
    champion: spec.champion||null, champIc: champ?champ.ic:null, champCol: champ?champ.col:null,
    rival: !!spec.rival, rivalGen: spec.rivalGen||0,
    specPower: n, specTraits: tr,
    maxHp:hp, hp:hp, atk, _atkBase:atk, armor, spd, atkSpeed,
    gold, bounty,
    vampiric: tr.includes('vampiric'),
    regen: tr.includes('zealot') || c.selfheal,
    reachedThrone:false,
    x: 8, y: FLOOR-34, yOff:0,
    state:'walking',         // walking | fighting | shopping | boss | dead
    cellIndex:-1,
    atkT:0, hasPotion:false, items:[], burn:0, burnT:0,
    freeze:0, shopT:0, walkAnim:0,
    shieldT:0, specialT:5,   // champion special timers
  };
  let startBurn=spec.debuff.burn + (G.fx.well>0 ? 5+Math.floor(n*0.5) : 0);
  if(startBurn>0){ h.burn=startBurn; h.burnT=6; }
  return h;
}

// Spawn a raiding party of n heroes (guild house size) that enter together.
// A champion arrives ALONE — a dramatic mini-boss duel.
function spawnGroup(n){
  ensureQueue(1);
  const champ = !!(G.queue[0] && G.queue[0].champion);
  const count = champ ? 1 : n;
  ensureQueue(count);
  G.heroes=[];
  for(let k=0;k<count;k++){
    const h=buildHeroFromSpec(G.queue.shift());
    h.x = 8 - k*46;                       // stagger entry from the left
    h.yOff = (k - (count-1)/2) * 8;       // slight vertical offset so they don't fully overlap
    G.heroes.push(h); G.heroNum++;
  }
  if(champ){ const h=G.heroes[0];
    showHint('⚔️ CHAMPION APPROACHES: '+h.heroName+' '+h.title+'!');
    shake(8); sfx('boss'); }
  // town-wide schemes last per WAVE, not per hero
  if(G.fx.well>0) G.fx.well--; if(G.fx.smith>0) G.fx.smith--; if(G.fx.temple>0) G.fx.temple--;
  G.waveStartSlain=G.totalSlain; G.waveEnding=false;
  G.hero=leadHero();
}
function leadHero(){
  let best=null;
  for(const h of G.heroes){ if(h.state!=='dead' && (!best || h.x>best.x)) best=h; }
  return best;
}
// Is h the frontmost (enemy-facing) hero in its current fight/boss group?
function isFrontHero(h){
  for(const o of G.heroes){
    if(o===h || o.state==='dead') continue;
    if(h.state==='boss'){ if(o.state==='boss' && o.x>h.x) return false; }
    else if(o.cellIndex===h.cellIndex && (o.state==='fighting'||o.state==='walking') && o.x>h.x) return false;
  }
  return true;
}

function heroDmg(h, raw, pierce){
  let armor = pierce==='full' ? 0 : pierce ? Math.max(0,h.armor-3) : h.armor;
  return Math.max(1, Math.round(raw - armor));
}
function dealToHero(h, raw, label, pierce, elem){
  if(!h||h.state==='dead') return;
  // rogue dodge
  if(h.dodge && Math.random()<h.dodge){ floater(h.x, h.y-50,'DODGE','#9adfff'); return; }
  let dmg=heroDmg(h,raw,pierce);
  const crit = Math.random()<0.12;              // your dungeon can land critical hits
  if(crit) dmg*=2;
  if(h.shieldT>0){ dmg=Math.max(1,Math.round(dmg*0.4)); }   // champion shield (−60%)
  h.hp-=dmg;
  if(crit){ floater(h.x, h.y-52, 'CRIT -'+dmg, '#ffd34d'); burst(h.x,h.y-20,'#ffd34d',12);
    shake(6); hitStop=0.05; sfx('crit'); }
  else { floater(h.x+ri(-8,8), h.y-44, '-'+dmg, label==='HEAL'?'#7bdc6b':'#ff7a8a');
    burst(h.x, h.y-20, '#ff4d6d', 6); sfx('hit'); }
  if(h.hp<=0){ h.hp=0; heroDies(h); return; }
  elementReact(h, elem||'phys', dmg);           // elemental status + reactions
}
// Apply an element's status to a hero and resolve reactions with existing ones.
// Elemental priming & reactions are a KEY mechanic: traps coat heroes with a
// status that PERSISTS as they walk the corridor, so the ORDER of your rooms
// decides the combo. Oil them first, then a later flame room IGNITES; chill
// then crush to SHATTER; oil then frost to ENCASE; etc. Each reaction a hero
// suffers in quick succession escalates the next (reaction chain).
const PRIME_OIL=12, PRIME_ICE=10, PRIME_SHOCK=9;   // long enough to cross rooms
// Teach the ordering combos in tooltips. Element → how to chain it across rooms.
const ELEM_COMBO={
  oil:  'Coats heroes (slows them) and primes them. Put it <b>before</b> a 🔥flame (Ignite), ⚡tesla (Conduct) or ❄frost (Encase) room.',
  fire: '🔥 Ignites <b>oiled</b> heroes and 💥 thermal-shocks <b>chilled</b> ones. Put it <b>after</b> an oil or frost room.',
  ice:  '❄ Chills (slows); a later phys/shock hit then <b>Shatters</b>. Encases <b>oiled</b> heroes. Put before crushers, or after oil.',
  shock:'⚡ Conducts through <b>oiled</b> heroes to the whole party. Put it <b>after</b> an oil room.',
  phys: '💥 Shatters <b>chilled/frozen</b> heroes for a burst. Put it <b>after</b> a frost room.',
};
function reactMul(h){ return 1 + (h.reactCount||0)*0.25; }   // escalating chain
function popReact(h,label,col,x){
  h.reactCount=(h.reactCount||0)+1; h.reactT=3;              // combo window
  floater(h.x,h.y-66, label+(h.reactCount>1?' ×'+h.reactCount:'')+' -'+x, col);
  burst(h.x,h.y-24,col,16); shake(6); sfx('crit');
}
function elementReact(h, elem, baseDmg){
  if(!h || h.state==='dead') return;
  // priming statuses — refreshed while in the room, then carried down the hall
  if(elem==='oil')  h.oil  =Math.max(h.oil||0,  PRIME_OIL);
  else if(elem==='ice')  h.chill=Math.max(h.chill||0,PRIME_ICE);
  else if(elem==='shock') h.shock=Math.max(h.shock||0,PRIME_SHOCK);

  // 🔥 IGNITE — fire on an OILED hero: the oil flashes off in a heavy burst + burn
  if(elem==='fire' && h.oil>0){
    h.oil=0; const x=Math.round((baseDmg*1.3+18)*reactMul(h)); h.hp-=x;
    h.burn=(h.burn||0)+10; h.burnT=5; popReact(h,'🔥 IGNITE','#ff7a2e',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // 🧊 ENCASE — ice on an OILED hero: wet + cold freezes them SOLID (a sitting duck)
  else if(elem==='ice' && h.oil>0 && !(h.freeze>0)){
    const x=Math.round((baseDmg*0.7+8)*reactMul(h)); h.hp-=x;
    h.freeze=2.0; h.chill=PRIME_ICE; popReact(h,'🧊 ENCASE','#bfefff',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ❄ SHATTER — a phys/shock impact on a CHILLED/frozen hero cracks the ice
  if((elem==='phys'||elem==='shock') && (h.chill>0||h.freeze>0)){
    h.chill=0; const x=Math.round((baseDmg*0.9+12)*reactMul(h)); h.hp-=x;
    popReact(h,'❄ SHATTER','#9adfff',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // 💥 THERMAL SHOCK — opposite temperatures: fire on a CHILLED hero, or ice on a
  // BURNING hero. The sudden swing cracks them for a burst.
  if((elem==='fire' && h.chill>0) || (elem==='ice' && h.burn>0)){
    const x=Math.round((baseDmg*1.0+12)*reactMul(h)); h.hp-=x;
    if(elem==='fire') h.chill=0; else { h.burn=0; h.burnT=0; }
    popReact(h,'💥 THERMAL SHOCK','#ff5470',x);
    if(h.hp<=0){h.hp=0;heroDies(h);return;}
  }
  // ⚡ CONDUCT — lightning on an OILED (wet) hero arcs to the rest of the party.
  // Oil is NOT consumed, so a wet hero can still be ignited afterwards.
  if(elem==='shock' && h.oil>0){
    const m=reactMul(h); let arced=0;
    for(const o of G.heroes){ if(o===h||o.state==='dead') continue;
      const cd=Math.round(baseDmg*0.6*m); o.hp-=cd; floater(o.x,o.y-50,'⚡-'+cd,'#fff34d'); burst(o.x,o.y-20,'#fff34d',6);
      arced++; if(o.hp<=0){o.hp=0;heroDies(o);} }
    if(arced){ h.reactCount=(h.reactCount||0)+1; h.reactT=3;
      floater(h.x,h.y-66,'⚡ CONDUCT ×'+arced,'#fff34d'); shake(5); sfx('crit'); }
  }
}
function healBoss(amt){
  const b=G.boss; const before=b.hp;
  b.hp=Math.min(b.maxHp,b.hp+amt);
  if(b.hp>before){ floater(bossX(), FLOOR-90, '+'+Math.round(b.hp-before), '#7bdc6b');
    burst(bossX(), FLOOR-50, '#7bdc6b', 8); }
}
function bossX(){ return cellX(G.slots)+ROOM_W*0.6; }

function castAbility(slot){
  if(G.phase!=='run') return;
  const target=leadHero();
  if(!target){ return; }
  const a=G.boss.abil[slot]; const def=ABIL[a.id];
  const cost=abilCost(def.cost);
  if(a.cd>0){ showHint(def.name+' on cooldown.'); return; }
  if(G.boss.mana<cost){ showHint('Not enough mana.'); return; }
  G.boss.mana-=cost; a.cd=def.cd*(1-(RB.abilCd||0));
  def.run(target);
  burst(bossX(), FLOOR-40, G.boss.col, 10);
  shake(5); sfx('cast');
  render();
}

function heroDies(h){
  if(!h || h.state==='dead') return;
  h.state='dead';
  // loot: carried gold + bounty (threat dial + rune bonuses)
  const loot=Math.round((h.gold + h.bounty) * (1 + G.bounty*0.12) * (1+(RB.loot||0))) + (RB.goldKill||0);
  G.gold+=loot;
  // dread: 1 base + per trait + bonus for elites/rivals/throne-reachers + runes
  const dread=1 + h.traits.length + (h.elite?1:0) + (h.rival?2:0) + (h.reachedThrone?1:0)
    + (RB.dreadKill||0) + (h.elite?(RB.eliteDread||0):0) + (h.reachedThrone?(RB.throneDread||0):0);
  G.dread+=dread;
  G.survived++; G.totalSlain++;
  // Devour passive: the boss feasts on the fallen
  if(G.boss.feed) healBoss(Math.round(G.boss.maxHp*G.boss.feed));
  // kill streak: rewards an airtight dungeon (resets if a hero strikes the boss)
  G.combo=(G.combo||0)+1;
  let comboBonus=0;
  if(G.combo>=3){ comboBonus=G.combo; G.gold+=comboBonus;
    floater(h.x, h.y-78, '🔥 COMBO x'+G.combo+' +'+comboBonus+'g', '#ff9a3a'); sfx('combo'); }
  // room XP: credit the room the hero fell in (toward fusing a 2nd part)
  const dcell=cellAt(h.x);
  if(dcell && dcell.room && dcell.room.def.kind!=='shop'){
    dcell.room.kills=(dcell.room.kills||0)+1;
    if(dcell.room.kills===fuseKills() && !dcell.room.part2)
      floater(dcell.x0+ROOM_W/2, FLOOR-96, 'FUSE READY!', '#ffd34d');
  }
  // a hero who touched the throne returns with a grudge
  if(h.reachedThrone) makeRival(h);
  burst(h.x, h.y-20, '#ffd34d', 22);
  floater(h.x, h.y-60, '+'+loot+'g', '#ffd34d');
  floater(h.x+18, h.y-44, '+'+dread+'☠', '#b985ff');
  shake(4); sfx('kill');
  const nm = h.heroName ? h.heroName+(h.title?' '+h.title:'') : CLASSES[h.cls].name;
  if(h.champion){
    // a felled champion is a big payday + a guaranteed relic
    G.dread+=6; G.relicDue=true;
    floater(h.x, h.y-92, 'CHAMPION SLAIN! 🏺', '#ffd34d'); burst(h.x,h.y-30,h.champCol||'#ffd34d',30);
    shake(10); sfx('relic');
    showHint('🏆 '+nm+' is slain! Big loot + a relic awaits.');
  } else {
    showHint(nm+' slain! +'+loot+'g, +'+dread+' dread'+(h.reachedThrone?' — but they vow to return…':'.'));
  }
  tutEvent('kill');
}

// Called once after the whole raiding party is wiped out.
function afterWave(){
  G.waveEnding=false;
  if(G.mode==='campaign' && G.survived>=curLevel().target){ winLevel(); return; }
  // a town is due if the party's kills crossed a 5-kill boundary
  G.townDue = Math.floor(G.waveStartSlain/5) !== Math.floor(G.totalSlain/5);
  // Endless earns a relic draft every 10 kills (campaign gets one per chapter)
  if(G.mode!=='campaign')
    G.relicDue = Math.floor(G.waveStartSlain/10) !== Math.floor(G.totalSlain/10);
  gotoReward();
}

function heroReachesThrone(){
  // hero now fights the boss; handled in update. nothing here.
}
function bossDies(){
  const b=G.boss;
  // Phylactery: rise once instead of falling
  if(b.reviveHp && !b.revived){
    b.revived=true; b.hp=Math.round(b.maxHp*b.reviveHp); b.mana=b.maxMana;
    floater(bossX(), FLOOR-100, '☠️ THE LICH RISES!', '#7ad0c0'); burst(bossX(),FLOOR-50,'#7ad0c0',30);
    shake(10); sfx('relic'); showHint('Phylactery! '+b.name+' claws back from death.');
    return;
  }
  G.phase='lose'; overlay.classList.add('show');
  shake(12); sfx('lose');
  const earned=awardRunes();
  const score = G.mode==='campaign'
    ? `You fell on Chapter ${G.levelIdx+1} after slaying ${totalKills()} heroes.`
    : `You reigned ${G.survived} heroes before the throne fell.`;
  overlay.innerHTML=`<h1 style="color:#ff6b8a">THE THRONE HAS FALLEN</h1>
    <div style="font-size:54px">${G.boss.ic}💔</div>
    <p>${G.boss.name} was struck down by a hero who reached the throne.</p>
    <p>${score}</p>
    <p style="opacity:.7">Dead is dead — this run is over.</p>
    <p style="color:#ffd34d">🔮 +${earned} rune points earned (${RUNES.points}◆ total)</p>
    ${G.newUnlocks&&G.newUnlocks.length?`<p style="color:#6ad97e">🔓 Unlocked: ${G.newUnlocks.join(', ')}!</p>`:''}
    <div class="menu-btns">
      <button class="go" onclick="openRunes()">🔮 Rune Page</button>
      <button onclick="gotoMenu()">Main menu</button>
    </div>`;
}
function totalKills(){ return G.totalSlain; }
// Bank this run's rune points (delta since last banking) into the pool.
// Income is deliberately stingy: ~1 point per 4 kills + 1 per chapter cleared.
function awardRunes(){
  const total = Math.floor(G.totalSlain/4) + (G.mode==='campaign'? G.levelIdx : 0);
  const delta = Math.max(0, total - (G.runesBanked||0));
  G.runesBanked = total;
  RUNES.points += delta;
  // bank lifetime kills + detect newly-unlocked content
  const before=RUNES.kills;
  const kd=Math.max(0, G.totalSlain - (G.killsBanked||0));
  G.killsBanked=G.totalSlain; RUNES.kills+=kd;
  const after=RUNES.kills;
  G.newUnlocks=[];
  for(const k in UNLOCK_BOSS){ if(UNLOCK_BOSS[k]>before && UNLOCK_BOSS[k]<=after) G.newUnlocks.push(BOSSES[k].ic+' '+BOSSES[k].name); }
  for(const k in UNLOCK_CARD){ if(UNLOCK_CARD[k]>before && UNLOCK_CARD[k]<=after) G.newUnlocks.push(ROOMS[k].ic+' '+ROOMS[k].name); }
  // bank boss mastery XP for the boss you played + detect a level-up
  if(G.boss && G.boss.key){
    if(!RUNES.bossXp) RUNES.bossXp={};
    const bk=G.boss.key, lvlBefore=bossLevelOf(bk);
    const bd=Math.max(0, G.totalSlain - (G.bossXpBanked||0)); G.bossXpBanked=G.totalSlain;
    RUNES.bossXp[bk]=(RUNES.bossXp[bk]||0)+bd;
    const lvlAfter=bossLevelOf(bk);
    if(lvlAfter>lvlBefore) G.newUnlocks.push(`${BOSSES[bk].ic} ${BOSSES[bk].name.split(' ')[0]} → Mastery Lv ${lvlAfter}`);
  }
  saveRunes();
  return delta;
}

/* ============================= PHASE: REWARD ============================= */
function gotoReward(){
  G.phase='reward';
  // draft 3 room cards, weighted by what helps (slightly favor what you own to enable upgrades)
  const owned = new Set(G.rooms.filter(Boolean).map(r=>r.type).filter(t=>t!=='minion'));
  G.drafts=[];
  const pool=unlockedRoomKeys();
  const choices=3+(RB.draft||0);
  for(let i=0;i<choices;i++){
    let t;
    if(Math.random()<0.45 && owned.size){ t=pick([...owned]); }
    else t=pick(pool);
    G.drafts.push({type:t, lvl:1});
  }
  overlay.classList.add('show');
  overlay.innerHTML=`<h1>Spoils of War</h1>
    <p>Draft one room card. ${G.hand.length>=handCap()?`<b style="color:#ff8a8a">Hand full (${handCap()}) — picking will need a discard, or skip.</b>`:`Hold up to ${handCap()}.`}</p>
    <div class="choices">${G.drafts.map((c,i)=>{
      const d=ROOMS[c.type];
      return `<div class="choice" onclick="takeDraft(${i})">
        <div class="big">${d.ic}</div><h3>${d.name}</h3>
        <div class="desc">${d.desc}</div>
        <div class="stats">${d.kind.toUpperCase()}</div></div>`;}).join('')}</div>
    <div class="menu-btns"><button onclick="skipDraft()">Skip draft</button></div>`;
}
function takeDraft(i){
  if(G.hand.length>=handCap()){
    showHint('Hand full — discard a card in build, or skip.'); return;
  }
  G.hand.push(G.drafts[i]);
  overlay.classList.remove('show');
  afterReward();
}
function skipDraft(){ overlay.classList.remove('show'); afterReward(); }
// After the card draft, drop into the town if a 5-kill interlude is due.
function afterReward(){
  if(G.relicDue){ G.relicDue=false;
    gotoRelicChoice('Relic Unearthed', 'A power stirs in the deep — claim one.', townOrBuild); return; }
  townOrBuild();
}
function townOrBuild(){ if(G.townDue){ G.townDue=false; gotoTown(); } else gotoBuild(false); }

/* ============================== RELIC DRAFT ============================= */
function gotoRelicChoice(title, subHtml, onPick){
  G.phase='relic'; G._relicPick=onPick||null;
  const choices=rollRelicChoices(3); G._relicChoices=choices;
  overlay.classList.add('show');
  overlay.innerHTML=`<h1 style="color:#b163ff">🏺 ${title}</h1>
    <p>${subHtml||'Choose a relic to empower your dungeon.'}</p>
    <div class="choices">${choices.map((id,i)=>{ const r=RELICS[id]; const tc=RELIC_TIERS[r.tier];
      return `<div class="choice" style="width:208px;border-color:${tc.col}" onclick="pickRelic(${i})">
        <div class="big">${r.ic}</div>
        <div class="small" style="color:${tc.col};font-weight:bold;letter-spacing:1px">${tc.name.toUpperCase()}</div>
        <h3 style="margin:4px 0">${r.name}</h3>
        <div class="desc">${r.desc}</div></div>`;}).join('')}</div>
    ${G.relics.length?`<p class="small" style="opacity:.75">Held: ${G.relics.map(id=>RELICS[id].ic).join(' ')}</p>`:''}`;
}
function pickRelic(i){
  if(G.phase!=='relic') return;
  const id=G._relicChoices && G._relicChoices[i]; if(!id) return;
  addRelic(id); sfx('relic');
  const r=RELICS[id]; showHint(r.ic+' '+r.name+' ('+RELIC_TIERS[r.tier].name+') claimed!');
  const done=G._relicPick; G._relicChoices=null; G._relicPick=null;
  overlay.classList.remove('show');
  if(done) done(); else gotoBuild(false);
}

/* ============================== PHASE: WIN =============================== */
function winLevel(){
  if(G.mode!=='campaign'){ return; }
  const lvl=curLevel();
  G.gold+=lvl.reward;
  if(G.levelIdx>=CAMPAIGN.length-1){
    // game complete
    G.phase='win'; overlay.classList.add('show');
    sfx('win');
    const earned=awardRunes();
    overlay.innerHTML=`<h1 style="color:#ffd34d">DUNGEON SUPREME</h1>
      <div style="font-size:60px">${G.boss.ic}👑</div>
      <p>Every crusade broke upon your halls. ${G.boss.name} reigns eternal,
         having buried <b>${G.totalSlain}</b> heroes.</p>
      <p style="color:#ffd34d">🔮 +${earned} rune points (${RUNES.points}◆ total)</p>
      ${G.newUnlocks&&G.newUnlocks.length?`<p style="color:#6ad97e">🔓 Unlocked: ${G.newUnlocks.join(', ')}!</p>`:''}
      <div class="menu-btns">
        <button class="go" onclick="gotoMenu()">★ Main menu</button>
        <button onclick="openRunes()">🔮 Rune Page</button>
        <button onclick="startEndless()">Try Endless</button></div>`;
    return;
  }
  // heal boss 30% as a chapter reward, then draft a relic before continuing
  const heal=Math.round(G.boss.maxHp*0.3);
  G.boss.hp=Math.min(G.boss.maxHp, G.boss.hp+heal);
  gotoRelicChoice('Chapter Survived!',
    `<b>${lvl.name}</b> cleared · <span class="gold">+${lvl.reward}g</span> · boss recovers +${heal} HP.<br>`+
    `Fortify with a relic, then face <b>${CAMPAIGN[G.levelIdx+1].name}</b> (${CAMPAIGN[G.levelIdx+1].target} heroes).`,
    nextLevel);
}
function nextLevel(){
  G.levelIdx++; G.survived=0;
  overlay.classList.remove('show');
  gotoBuild(false);
  render();
}

/* ============================== PHASE: TOWN ============================== */
// Interlude every 5 kills. Runs on DREAD (earned per kill). You reach into the
// hero town to: resolve an EVENT, set your THREAT, empower the boss, buy
// town-wide SCHEMES, and sabotage/corrupt the previewed arrivals.

// Random dilemmas. Each option's run() applies an effect and returns a line.
const EVENTS = [
  { t:'Cursed Caravan 🛒', d:'A smuggler will sell the heroes cursed war-gear — for a cut.',
    opts:[
      {l:'Take the cut (+6 ☠, next 3 heroes +20% ATK)', run:()=>{ G.dread+=6;
        G.queue.slice(0,3).forEach(s=>s.debuff.atkMul*=1.2); return 'Blood money taken.'; }},
      {l:'Burn the caravan', run:()=>'The smuggler flees empty-handed.'} ]},
  { t:'Plague Rats 🐀', d:'Diseased rats nest beneath the town well.',
    opts:[
      {l:'Loose the plague (poison next 5)', run:()=>{ G.fx.well=Math.max(G.fx.well,5); return 'The well runs foul.'; }},
      {l:'Sell the antidote (+5 ☠)', run:()=>{ G.dread+=5; return 'Coin from the desperate.'; }} ]},
  { t:'Black Market 💱', d:'A hooded broker trades in gold and dread alike.',
    opts:[
      {l:'Gold → Dread (−30g, +6 ☠)', cond:()=>G.gold>=30, run:()=>{ G.gold-=30; G.dread+=6; return 'Gold laundered into fear.'; }},
      {l:'Dread → Gold (−4 ☠, +45g)', cond:()=>G.dread>=4, run:()=>{ G.dread-=4; G.gold+=45; return 'Fear sold for coin.'; }} ]},
  { t:'The Deserter 🚪', d:'A frightened recruit will betray his comrades for the right master.',
    opts:[
      {l:'Corrupt him (free minion)', cond:()=>G.hand.length<5, run:()=>{ grantMinionCard(G.totalSlain+1); return 'A turncoat joins your halls.'; }},
      {l:'Make an example (+5 ☠)', run:()=>{ G.dread+=5; return 'His screams spread dread.'; }} ]},
  { t:"Champion's Vow ⚔️", d:'A famed champion swears to end you and rallies the town.',
    opts:[
      {l:'Taunt them (+1 threat, +6 ☠)', run:()=>{ G.bounty=clamp(G.bounty+1,-2,3); G.dread+=6; return 'You raise the stakes.'; }},
      {l:'Lie low (−1 threat)', run:()=>{ G.bounty=clamp(G.bounty-1,-2,3); return 'You fade into rumor.'; }} ]},
];

function gotoTown(){
  G.phase='town'; ensureQueue(3);
  G.townEvent={ ...pick(EVENTS), done:false, outcome:'' };
  renderTown();
}
function chooseEvent(i){
  const ev=G.townEvent; if(!ev||ev.done) return;
  const opt=ev.opts[i];
  if(opt.cond && !opt.cond()){ showHint('You can\'t do that right now.'); return; }
  ev.done=true; ev.outcome=opt.run();
  showHint(ev.outcome); renderTown(); renderTop();
}

// Boss empowerments are repeatable — each level costs ~40% more than the last.
function upgradeCost(key){ return townCost(Math.round(TOWN_UPGRADES[key].base * Math.pow(1.4, G.townBuys[key]||0))); }
function buyUpgrade(key){
  const cost=upgradeCost(key);
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  G.dread-=cost; G.townBuys[key]=(G.townBuys[key]||0)+1;
  const b=G.boss;
  if(key==='reinforce'){ b.maxHp+=30; b.hp+=30; }
  else if(key==='sharpen'){ b.atk+=5; }
  else if(key==='attune'){ b.maxMana+=20; b.mana=Math.min(b.maxMana,b.mana+20); b.manaRegen=(b.manaRegen||6)+2; }
  else if(key==='ascend'){ b.lvl+=1; }
  showHint(TOWN_UPGRADES[key].name+'!'); renderTown(); renderTop();
}

function schemeCost(key){ return townCost(TOWN_SCHEMES[key].cost); }
function buyScheme(key){
  const s=TOWN_SCHEMES[key]; const c=schemeCost(key);
  if(G.fx[key]>0){ showHint('Already active.'); return; }
  if(G.dread<c){ showHint('Not enough dread.'); return; }
  G.dread-=c; G.fx[key]=s.waves;
  showHint(s.name+' — active '+s.waves+' waves.'); renderTown(); renderTop();
}
function setThreat(d){ G.bounty=clamp(G.bounty+d,-2,3); renderTown(); renderTop(); }

const GUILD_MAX=3;   // party of up to 4
function guildCost(){ return townCost(9 + G.guildLvl*7); }
function buyGuild(){
  if(G.guildLvl>=GUILD_MAX){ showHint('Guild house is at max level.'); return; }
  const cost=guildCost();
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  G.dread-=cost; G.guildLvl++;
  showHint('Guild House Lv '+G.guildLvl+' — heroes now raid in parties of '+(G.guildLvl+1)+'!');
  renderTown(); renderTop();
}

function sabotageCost(spec,key){ return townCost(TOWN_SABOTAGE[key].cost + Math.floor(spec.power*0.3)); }
function sabotage(idx,key){
  const spec=G.queue[idx]; if(!spec) return;
  const cost=sabotageCost(spec,key);
  if(G.dread<cost){ showHint('Not enough dread.'); return; }
  if(key==='intimidate'){
    if(spec.debuff.atkMul<1){ showHint('Already intimidated.'); return; }
    G.dread-=cost; spec.debuff.atkMul=0.7;
  } else if(key==='poison'){
    G.dread-=cost; spec.debuff.burn += 6 + Math.floor(spec.power);
  } else if(key==='rob'){
    if(spec.debuff.robbed){ showHint('Already robbed.'); return; }
    const g=previewStats(spec).gold; G.dread-=cost; G.gold+=Math.round(g*0.6); spec.debuff.robbed=true;
    showHint('Robbed for '+Math.round(g*0.6)+'g — they arrive poorer.');
  }
  renderTown(); renderTop();
}

// ---- corruption: turn a previewed hero into a placeable minion card ----
function minionCardFromSpec(spec){
  // A corrupted hero defends with a solid chunk of their former might — but a
  // champion is turned into a normal-scale minion (no boss-tier HP multiplier).
  const base = spec.champion ? {...spec, champion:null} : spec;
  const ps=previewStats(base);
  return { type:'minion', lvl:1, minHp:Math.round(ps.hp*0.6),
           minAtk:Math.max(3,Math.round(ps.atk*0.65)), label:(spec.name||'Thrall') };
}
function grantMinionCard(power){
  if(G.hand.length>=handCap()){ showHint('Hand full — make room first.'); return false; }
  const spec={cls:pick(CLASS_KEYS), power, traits:[], name:rollName(), debuff:{atkMul:1,burn:0,robbed:false}};
  G.hand.push(minionCardFromSpec(spec)); return true;
}
function corruptHero(idx){
  const spec=G.queue[idx]; if(!spec) return;
  const cc=townCost(CORRUPT_COST);
  if(G.dread<cc){ showHint('Not enough dread.'); return; }
  if(G.hand.length>=handCap()){ showHint('Hand full — play a card first.'); return; }
  G.dread-=cc; G.queue.splice(idx,1);
  G.hand.push(minionCardFromSpec(spec)); ensureQueue(3);
  showHint((spec.name||'A hero')+' is corrupted into a minion!'); renderTown(); renderTop();
}

function leaveTown(){ overlay.classList.remove('show'); gotoBuild(false); }

function renderTown(){
  overlay.classList.add('show');
  const ev=G.townEvent;

      <span class="small">Threat: <b>${G.bounty>0?'+':''}${G.bounty}</b> ${G.bounty>0?'🔥 tougher heroes, richer loot':G.bounty<0?'🌫 weaker heroes, leaner loot':'⚖ neutral'}</span>

      <button onclick="setThreat(-1)" ${G.bounty<=-2?'disabled':''} style="padding:5px 9px;min-height:0">Lie low ▼</button>
    </div>`;
  const ups=Object.keys(TOWN_UPGRADES).map(k=>{

    return `<button ${can?'':'disabled'} onclick="buyUpgrade('${k}')"
      style="display:flex;flex-direction:column;align-items:center;min-width:112px;gap:1px;height:auto;padding:7px;border-color:var(--accent)">
      <span style="font-size:20px">${u.ic}</span><span>${u.name}${n>0?` <span style="color:#ffd34d">Lv ${n}</span>`:''}</span>
      <span class="small" style="opacity:.8;font-weight:normal">${u.desc}</span>

    return `<button ${can?'':'disabled'} onclick="buyScheme('${k}')"
      style="display:flex;flex-direction:column;align-items:center;min-width:112px;gap:1px;height:auto;padding:7px">
      <span style="font-size:20px">${s.ic}</span><span>${s.name}</span>
      <span class="small" style="opacity:.8;font-weight:normal">${s.desc}</span>
      <span style="color:#b985ff">${active?('active '+G.fx[k]+'w'):sc+' ☠'}</span></button>`;}).join('');
  const roster=G.queue.slice(0,3).map((spec,i)=>{
    const c=CLASSES[spec.cls]; const ps=previewStats(spec);
    const nm = spec.name ? `${spec.name}${spec.title?' '+spec.title:''}` : c.name;
    const traits=spec.traits.map(t=>`<span class="tag" style="color:${TRAITS[t].col}">${TRAITS[t].ic}${TRAITS[t].name}</span>`).join('');
    const sab=Object.keys(TOWN_SABOTAGE).map(k=>{
      const s=TOWN_SABOTAGE[k]; const cost=sabotageCost(spec,k);
      const done=(k==='intimidate'&&spec.debuff.atkMul<1)||(k==='rob'&&spec.debuff.robbed);
      const dis=done||G.dread<cost;
      return `<button ${dis?'disabled':''} onclick="sabotage(${i},'${k}')" style="padding:5px 6px;font-size:11px;min-height:0">

    const corruptDis = G.dread<townCost(CORRUPT_COST) || G.hand.length>=handCap();
    const ch = spec.champion ? CHAMPIONS[spec.champion] : null;
    return `<div class="choice" style="width:208px;${ch?'border-color:'+ch.col+';box-shadow:0 0 10px '+ch.col:spec.rival?'border-color:#ff6b8a':''}">
      <div class="big">${ch?ch.ic+'👑':c.ic}${spec.rival?'⚔️':''}${spec.traits.length?'⭐':''}${spec.debuff.burn>0?'☠️':''}</div>
      ${ch?`<div class="small" style="color:${ch.col};font-weight:bold;letter-spacing:1px">CHAMPION</div>`:''}
      <h3 style="font-size:14px">${nm}</h3>
      <div class="small" style="opacity:.6">${ch?ch.desc:c.name+' · power '+(spec.power+1)}</div>
      <div style="min-height:20px;margin:3px 0">${traits||'<span class="small" style="opacity:.5">no traits</span>'}</div>

    </div>`;}).join('');
  overlay.innerHTML=`<h1 style="margin-bottom:2px">🏚️ Hero Town</h1>
    <p style="margin:4px 0"><b>${G.totalSlain}</b> slain · 💰 <span class="gold">${G.gold}</span> · <span style="color:#b985ff">☠ ${G.dread} dread</span></p>
    ${evHtml}
    ${threat}
    <div class="row" style="justify-content:center;margin:6px 0">
      <button ${G.guildLvl>=GUILD_MAX||G.dread<guildCost()?'disabled':''} onclick="buyGuild()"
        style="border-color:#ffd34d;display:flex;flex-direction:column;align-items:center;min-width:180px;height:auto;padding:8px;gap:1px">
        <span style="font-size:18px">🏛️ Guild House${G.guildLvl>0?' · Lv '+G.guildLvl:''}</span>
        <span class="small" style="opacity:.85;font-weight:normal">${G.guildLvl>=GUILD_MAX?'Max — heroes raid in parties of '+(G.guildLvl+1):'Heroes raid in parties of '+(G.guildLvl+1)+' → '+(G.guildLvl+2)}</span>
