function drawHero(sx,h){
  const y=FLOOR+(h.yOff||0); const c=h; const bob=h.state==='walking'?Math.sin(h.walkAnim)*2:0;
  const yy=y+bob;
  const champ=!!h.champion;
  // aura (champion = its colour, bigger/brighter; elite = trait colour)
  if(champ || h.elite){
    const t=performance.now()/200;
    const col=champ?(h.champCol||'#ffd34d'):(h.traits.length?TRAITS[h.traits[0]].col:'#ffd34d');
    X.globalAlpha=(champ?0.30:0.18)+0.08*Math.sin(t);
    X.fillStyle=col; X.beginPath(); X.ellipse(sx,yy-26,champ?30:20,champ?42:30,0,0,7); X.fill();
    X.globalAlpha=1;
  }
  // shadow
  X.fillStyle='rgba(0,0,0,.3)'; X.beginPath(); X.ellipse(sx,y,champ?20:14,4,0,0,7); X.fill();
  // legs
  px(sx-7,yy-14,5,14,'#3a3050'); px(sx+2,yy-14,5,14,'#3a3050');
  // body
  px(sx-9,yy-34,18,22,c.col);
  // head
  px(sx-7,yy-46,14,14,c.tint);
  px(sx-4,yy-42,3,3,'#000'); px(sx+2,yy-42,3,3,'#000');
  // class flair
  if(h.cls==='warrior'){ px(sx+9,yy-40,4,30,'#cfd6e0'); px(sx+8,yy-44,6,8,'#9aa4b2'); } //sword
  if(h.cls==='mage'){ px(sx+9,yy-48,4,34,'#7a5a3a'); px(sx+7,yy-52,8,8,'#9adfff'); } //staff
  if(h.cls==='rogue'){ px(sx+9,yy-30,5,16,'#cfd6e0'); } //dagger
  if(h.cls==='cleric'){ px(sx-2,yy-58,4,10,'#ffec99'); px(sx-5,yy-54,10,4,'#ffec99'); } //cross
  // frozen / elemental status tints
  if(h.freeze>0){ X.globalAlpha=.4; px(sx-10,yy-48,20,48,'#9adfff'); X.globalAlpha=1; }
  else if(h.chill>0){ X.globalAlpha=.25; px(sx-10,yy-48,20,48,'#9adfff'); X.globalAlpha=1; }
  if(h.oil>0){ X.globalAlpha=.3; px(sx-10,yy-46,20,46,'#0a0a06'); X.globalAlpha=1; }
  if(h.shock>0){ X.globalAlpha=.3+0.2*Math.sin(performance.now()/70); px(sx-10,yy-48,20,48,'#fff34d'); X.globalAlpha=1; }
  // champion shield bubble
  if(h.shieldT>0){ X.globalAlpha=0.35+0.1*Math.sin(performance.now()/90);
    X.strokeStyle='#ffd34d'; X.lineWidth=2; X.beginPath(); X.ellipse(sx,yy-26,18,28,0,0,7); X.stroke();
    X.globalAlpha=1; }
  // hp bar (wider for champions)
  const bw=champ?52:36;
  bar(sx-bw/2, yy-(champ?66:60), bw, champ?8:6, h.hp/h.maxHp, h.hp/h.maxHp>0.3?'#5ad97e':'#ff4d6d');
  // gold + elite trait markers
  X.font='10px Trebuchet MS'; X.textAlign='center'; X.fillStyle='#ffd34d';

  if(champ){
    X.font='18px Trebuchet MS'; X.fillText('👑', sx, yy-78);          // crown above head
    X.font='bold 10px Trebuchet MS'; X.fillStyle=h.champCol||'#ffd34d';
    X.fillText((h.champIc||'')+' '+h.heroName, sx, yy-90);            // name banner

    X.fillText(h.traits.map(t=>TRAITS[t].ic).join(''), sx, yy-74); }
  X.textAlign='left';
}

/* ============================== TOP BAR / UI ============================ */
function render(){
  if(!G || (G.phase!=='build' && G.phase!=='run')) hideInspect();
  renderTop();
  renderPanel();
  draw();
}
function renderTop(){
  if(!G||G.phase==='menu'){ topbar.innerHTML=`<div class="stat">🐉 <b>BOSS MONSTER</b></div>`; return; }
  if(!G.boss){ topbar.innerHTML=''; return; }
  const b=G.boss;
  const modeLbl = G.mode==='campaign'
    ? `Ch.${G.levelIdx+1}/5 · ${G.survived}/${curLevel().target} slain`
    : `Endless · ${G.survived} slain`;
  topbar.innerHTML=`
    <div class="stat">${b.ic}<span class="small">${b.name.split(' ')[0]}</span></div>
    <div class="stat">❤️<div class="bar"><i style="width:${b.hp/b.maxHp*100}%;background:linear-gradient(90deg,#ff4d6d,#ff8a8a)"></i>
      <span>${Math.ceil(b.hp)}/${b.maxHp}</span></div></div>
    <div class="stat">🔷<div class="bar"><i style="width:${b.mana/b.maxMana*100}%;background:linear-gradient(90deg,#2a7adf,#4dc3ff)"></i>
      <span>${Math.floor(b.mana)}/${b.maxMana}</span></div></div>
    <div class="stat gold">💰<b>${G.gold}</b></div>
    <div class="stat" style="color:#b985ff">☠<b>${G.dread}</b></div>
    ${G.bounty?`<div class="stat small" title="threat dial">${G.bounty>0?'🔥':'🌫'} ${G.bounty>0?'+':''}${G.bounty}</div>`:''}
    ${G.relics&&G.relics.length?`<div class="stat small" title="relics">🏺 ${G.relics.map(id=>RELICS[id].ic).join('')}</div>`:''}
    ${G.combo>=3?`<div class="stat small" title="kill streak" style="color:#ff9a3a">🔥x${G.combo}</div>`:''}
    <div class="stat small">${modeLbl}</div>`;
}

function renderPanel(){
  if(!G||G.phase==='menu'||G.phase==='bossSelect'){ panel.innerHTML=''; return; }

  if(G.phase==='build'){
    const shopExists=G.rooms.some(r=>r&&r.type==='shop');
    panel.innerHTML=`
      <div class="row" style="margin-bottom:6px">
        <button class="buy" onclick="buySlot()" ${G.gold<slotCost()?'disabled':''}>➕ Slot (${slotCost()}g)</button>
        ${shopExists?`<span class="pill">🛒 Stock:</span>`+Object.keys(ITEMS).map(k=>{
          const it=ITEMS[k];
          return `<button onclick="stockShop('${k}')" ${G.gold<it.price?'disabled':''}
            style="padding:6px 9px">${it.ic} ${it.price}g</button>`;}).join('')
          :`<span class="small">Build a 🛒 Shop to sell gear for gold.</span>`}
        <span style="flex:1"></span>
        <button class="go" onclick="startWave()">⚔️ Start Wave</button>
      </div>
      <div class="row">
        <span class="small" style="min-width:46px">Hand:</span>
        <div class="cards">${G.hand.length? G.hand.map((c,i)=>{
          const d=ROOMS[c.type];
          return `<div class="card ${selCard===i?'sel':''}" onclick="selectCard(${i})"${c.type==='minion'?' style="border-color:#9a5cff"':''}>
            <div class="x" onclick="event.stopPropagation();discardCard(${i})">✕</div>
            <div class="ic">${d.ic}</div><div class="nm">${c.label||d.name}</div></div>`;}).join('')
          :`<span class="small" style="opacity:.6;align-self:center">No cards — survive a hero to draft one.</span>`}
        </div>
      </div>`;
  }
  else if(G.phase==='run'){
    panel.innerHTML=`<div class="row">
      ${G.boss.abil.map((a,i)=>{ const def=ABIL[a.id]; const cost=abilCost(def.cost);
        const dis=(a.cd>0||G.boss.mana<cost);
        return `<button class="abil" onclick="castAbility(${i})" ${dis?'disabled':''}
          title="${def.desc}">
          <span style="font-size:18px">${def.ic}</span>
          <span style="font-size:11px">${def.name}</span>
          <span class="c">${a.cd>0?'⏳'+a.cd.toFixed(1)+'s':'🔷'+cost}</span>
        </button>`;}).join('')}
      <span style="flex:1"></span>
      <button onclick="toggleSpeed()">⏩ ${speedMul}×</button>
    </div>`;
  }
  else { panel.innerHTML=`<div class="row"><span class="small">…</span></div>`; }
}
function toggleSpeed(){ speedMul = speedMul===1?2: speedMul===2?3:1; renderPanel(); }

/* ============================== INSPECTION ============================== */
// Hover (desktop) or tap (mobile/run) a room, hero or the boss to read its stats.
function hideInspect(){ inspectEl.classList.remove('show'); }
function showInspectEntity(ent, hover){
  if(!ent || ent.kind==='empty'){ hideInspect(); return; }
  let html='';
  if(ent.kind==='hero') html=describeHero(ent.h);
  else if(ent.kind==='boss') html=describeBoss();
  else if(ent.kind==='room') html=describeRoom(ent.room);
  else return;
  inspectEl.innerHTML=html+'<span class="ix" onclick="hideInspect()">✕</span>';
  inspectEl.classList.add('show'); inspectHover=!!hover;
}
function entityAt(wx){
  if(G.phase==='run' && G.heroes){
    let best=null,bd=26;
    for(const h of G.heroes){ if(h.state==='dead')continue; const d=Math.abs(h.x-wx); if(d<bd){bd=d;best=h;} }
    if(best) return {kind:'hero',h:best};
  }
  const idx=Math.floor(wx/ROOM_W);
  if(idx===G.slots) return {kind:'boss'};
  if(idx>=0 && idx<G.slots){ const r=G.rooms[idx]; return r?{kind:'room',room:r}:{kind:'empty'}; }
  return null;
}
function describeRoom(room){
  const parts=roomParts(room);
  const synI=synergyInfo(parts); const syn=synI.m + (parts.length>1?(RB.synergy||0):0);
  const title = parts.length>1 ? comboName(room) : roomName(room);
  const lines=[`<b>${title}</b> · Lv ${room.lvl}/${maxLevel()}`];
  parts.filter(p=>ROOMS[p].kind==='trap').forEach(p=>{ const def=ROOMS[p];
    const dmg=Math.round(def.dmg*(1+(room.lvl-1)*0.4)*syn*(1+(RB.trapDmg||0)));
    lines.push(`${def.ic} ${def.name}: <b>${dmg}</b> dmg / ${def.rate}s · ~${Math.round(dmg/def.rate)}/s${def.burn?' +burn':''}`); });
  const monParts=parts.filter(p=>ROOMS[p].kind==='monster');
  if(monParts.length){ let hp=0,atk=0, fed=false;
    monParts.forEach(p=>{ const def=ROOMS[p]; const bHp=p==='minion'?room.minHp:def.hp, bAtk=p==='minion'?room.minAtk:def.atk;
      const feed=def.feeds?(1+Math.min(12,(room.kills||0))*0.10):1; if(def.feeds)fed=true;
      hp+=bHp*(0.9+(room.lvl-1)*0.85)*feed; atk+=bAtk*(1.0+(room.lvl-1)*0.9)*feed; });
    lines.push(`👹 Guard: <b>${Math.round(hp*syn*(1+(RB.monHp||0)))}</b> HP · <b>${Math.round(atk*syn*(1+(RB.monDmg||0)))}</b> atk /0.9s`);
    if(fed) lines.push(`🍖 Fed: <b>${Math.min(12,room.kills||0)}</b> corpses · +${Math.min(12,room.kills||0)*10}% (max +120%)`); }
  if(parts.includes('shop')){
    const unsold=(room.stock||[]).filter(s=>!s.sold);
    lines.push(`🛒 Shop Lv ${room.lvl}: ×${shopMarkup(room.lvl).toFixed(2)} markup`);
    if(unsold.length) lines.push('Selling: '+unsold.map(s=>`${ITEMS[s.key].ic} <b>${salePrice(room,s.key)}g</b>`).join(', '));
    else lines.push('<span style="opacity:.7">empty — stock it in build</span>');
  }
  if(parts.length>1) lines.push(`Synergy: <span style="color:${synI.tone==='bad'?'#ff7a8a':'#7bdc6b'}">${synI.name||'—'} ×${syn.toFixed(2)}</span>`);
  else if(ROOMS[room.type].kind!=='shop'){ const k=room.kills||0;
    lines.push(k>=fuseKills()?'⚡ <b>Ready to fuse</b> a 2nd part':`XP: ${k}/${fuseKills()} kills to fuse`); }
  return lines.join('<br>');
}
function describeHero(h){
  const C=CLASSES[h.cls];
  const nm=h.heroName?`${h.heroName}${h.title?' '+h.title:''}`:C.name;
  const ch=h.champion?CHAMPIONS[h.champion]:null;
  const lines=[`<b>${ch?ch.ic+' 👑 ':C.ic+' '}${nm}</b> · ${ch?'<span style="color:'+ch.col+'">CHAMPION</span>':C.name}${h.rival?' · ⚔️ rival':''}${!ch&&h.elite?' · ⭐ elite':''}`,
    `❤️ <b>${Math.ceil(h.hp)}</b>/${h.maxHp} HP · 🗡️ <b>${(+h.atk).toFixed(1)}</b> atk · 🛡 ${h.armor} armor`,
    `🏃 speed ${Math.round(h.spd)} · 💰 ${h.gold}${h.dodge?' · 35% dodge':''}`];
  if(ch) lines.push(`<span style="color:${ch.col}">${ch.desc}</span>`+(h.shieldT>0?' · 🛡 shielded':''));
  if(h.traits&&h.traits.length) lines.push('Traits: '+h.traits.map(t=>TRAITS[t].ic+' '+TRAITS[t].name).join(', '));
  const fx=[h.burn>0?'🔥 burning':'',h.freeze>0?'❄️ frozen':'',h.chill>0?'❄️ chilled':'',
    h.oil>0?'🛢️ oiled':'',h.shock>0?'⚡ shocked':'',h.hasPotion?'🧪 potion':''].filter(Boolean).join(' · ');
  if(fx) lines.push(fx);
  return lines.join('<br>');
}
function describeBoss(){
  const b=G.boss;
  const lines=[`<b>${b.ic} ${b.name}</b> · Lv ${b.lvl}`,
    `❤️ <b>${Math.ceil(b.hp)}</b>/${b.maxHp} HP · 🗡️ ${b.atk} atk · 🔷 ${Math.floor(b.mana)}/${b.maxMana} mana`,
    'Abilities: '+b.abil.map(a=>ABIL[a.id].ic+' '+ABIL[a.id].name).join(', ')];
  if(b.passive&&PASSIVES[b.passive]) lines.push(`<span style="color:${b.col}">✦ ${PASSIVES[b.passive].name}</span> — ${PASSIVES[b.passive].desc}`);
  const totalDR=Math.min(0.85,(RB.bossDR||0)+(b.passiveDR||0));
  if(totalDR) lines.push(`Damage reduction: ${Math.round(totalDR*100)}%`);
  if(G.relics&&G.relics.length)
    lines.push('Relics: '+G.relics.map(id=>{const r=RELICS[id];return `<span style="color:${RELIC_TIERS[r.tier].col}">${r.ic}${r.name}</span>`;}).join(', '));
  return lines.join('<br>');
}

/* ============================ CANVAS INPUT =============================== */
// Drag to pan the dungeon (build + run); a tap (no drag) places/upgrades a room
// in the build phase. Panning during a run temporarily suspends auto-follow.
let drag=null, panning=false;
function clientToVX(e){ const rect=CV.getBoundingClientRect();
  return (e.clientX-rect.left)*(VW/rect.width); }

CV.addEventListener('pointerdown', e=>{
  if(!G || (G.phase!=='build' && G.phase!=='run')) return;
  e.preventDefault();
  try{ CV.setPointerCapture(e.pointerId); }catch(_){}
  drag={ id:e.pointerId, startCX:e.clientX, cam0:camX, moved:false };
  panning=true;
}, {passive:false});

CV.addEventListener('pointermove', e=>{
  if(!drag || e.pointerId!==drag.id) return;
  const rect=CV.getBoundingClientRect();
  const dxV=(e.clientX-drag.startCX)*(VW/rect.width);
  if(Math.abs(e.clientX-drag.startCX)>6) drag.moved=true;
  const maxCam=Math.max(0, corridorWidth()-VW);
  camX=clamp(drag.cam0 - dxV, 0, maxCam);
});

function endDrag(e){
  if(!drag || (e && e.pointerId!==drag.id)) return;
  if(!drag.moved){                              // a clean tap
    const wx=clientToVX(e)+camX;
    const idx=Math.floor(wx/ROOM_W);
    if(G.phase==='build' && idx>=0 && idx<G.slots){
      tapSlot(idx);
      const r=G.rooms[idx]; showInspectEntity(r?{kind:'room',room:r}:{kind:'empty'});
    } else {
      showInspectEntity(entityAt(wx));          // boss in build, or hero/room/boss in run
    }
  }
  drag=null; panning=false;
}
CV.addEventListener('pointerup', endDrag);
CV.addEventListener('pointercancel', endDrag);

// Desktop hover inspection
CV.addEventListener('mousemove', e=>{
  if(drag || !G || (G.phase!=='build' && G.phase!=='run')) return;
  showInspectEntity(entityAt(clientToVX(e)+camX), true);
});
CV.addEventListener('mouseleave', ()=>{ if(inspectHover) hideInspect(); });

/* keyboard: ability hotkeys + space=start/speed */
window.addEventListener('keydown', e=>{
  if(!G) return;
  if(G.phase==='run'){
    if(e.key>='1'&&e.key<='3'){ const i=+e.key-1; if(i<G.boss.abil.length) castAbility(i); }
    if(e.key===' '){ e.preventDefault(); toggleSpeed(); }
  } else if(G.phase==='build' && e.key===' '){ e.preventDefault(); startWave(); }
});

/* ================================ LOOP ================================== */
function frame(ts){
  const dt=Math.min(0.05,(ts-last)/1000)||0; last=ts;
  if(G && G.phase==='run'){ update(dt); renderTop(); }
  else { update(dt); }
  draw();
  // keep run panel cooldowns fresh
  if(G&&G.phase==='run'){ updateRunPanel(); }
  requestAnimationFrame(frame);
}
// Update ability buttons WITHOUT rebuilding the DOM — rebuilding mid-tap was
// destroying the button between touchstart/touchend, eating the click.
function updateRunPanel(){
  if(!G||G.phase!=='run') return;
  const btns=panel.querySelectorAll('.abil');
  if(btns.length!==G.boss.abil.length){ renderPanel(); return; }
  G.boss.abil.forEach((a,i)=>{
    const def=ABIL[a.id];
    const cost=abilCost(def.cost);
    btns[i].disabled = (a.cd>0 || G.boss.mana<cost);
    const c=btns[i].querySelector('.c');
    if(c) c.textContent = a.cd>0 ? ('⏳'+a.cd.toFixed(1)+'s') : ('🔷'+cost);
  });
}

/* keep the canvas matched to the stage (rotation, panel-height changes, etc.) */
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,150));
if(window.ResizeObserver){ new ResizeObserver(resize).observe(stage); }

loadRunes();
loadAudioPref();
// Audio can only start after a user gesture; wake it on the first interaction.
window.addEventListener('pointerdown', ()=>{ if(audioOn) initAudio(); }, {once:false});
window.addEventListener('keydown', ()=>{ if(audioOn) initAudio(); }, {once:false});
{ const ab=document.getElementById('audiobtn');
  if(ab){ ab.textContent=audioOn?'🔊':'🔇';
    ab.addEventListener('click', e=>{ e.stopPropagation(); toggleAudio(); }); } }
resize();
gotoMenu();
requestAnimationFrame(frame);
</script>
