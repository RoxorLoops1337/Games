    <div class="row" style="justify-content:center;gap:6px;flex-wrap:wrap">${ups}</div>
    <h2 style="margin:10px 0 4px">Town Schemes</h2>
    <div class="row" style="justify-content:center;gap:6px;flex-wrap:wrap">${schemes}</div>
    <h2 style="margin:10px 0 4px">Next Arrivals — meddle &amp; corrupt</h2>
    <div class="choices">${roster}</div>
    <div class="menu-btns"><button class="go" onclick="leaveTown()">⚔️ Back to the dungeon</button></div>`;
}

/* ============================ UPDATE / SIM ============================== */
function update(dt){
  if(paused) return;                 // pause menu freezes the whole simulation
  // animate floaters/particles always
  floats.forEach(f=>{ f.y+=f.vy*dt; f.life-=dt*0.9; });
  floats=floats.filter(f=>f.life>0);
  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=380*dt; p.life-=dt; });
  particles=particles.filter(p=>p.life>0);
  if(shakeT>0) shakeT=Math.max(0,shakeT-dt);   // screen-shake decay

  if(G.phase!=='run' || !G.heroes.length) return;
  // hit-pause: briefly freeze the sim on big hits for impact
  if(hitStop>0){ hitStop=Math.max(0,hitStop-dt); return; }
  const steps=speedMul; // scale sim by running update multiple conceptual times
  for(let s=0;s<steps && G.phase==='run';s++){
    for(const h of G.heroes){ if(G.phase!=='run') break; if(h.state!=='dead') simStep(h,dt); }
  }
  if(G.phase!=='run') return;
  G.hero=leadHero();

  // ability cooldowns + mana regen
  G.boss.abil.forEach(a=>{ if(a.cd>0)a.cd=Math.max(0,a.cd-dt*speedMul); });
  G.boss.mana=Math.min(G.boss.maxMana, G.boss.mana + dt*speedMul*(G.boss.manaRegen||6));

  // wave ends when the whole party is wiped — survived the raid
  if(G.phase==='run' && !G.waveEnding && G.heroes.every(h=>h.state==='dead')){
    G.waveEnding=true; setTimeout(afterWave, 850);
  }

  // camera follows the lead hero — but pause the auto-follow for a moment after
  // you pan, so you can scroll over to inspect the boss on the right.
  const lead=G.hero;
  if(!panning && performance.now()>panHoldUntil && lead){
    const target=clamp(lead.x - VW*0.42, 0, Math.max(0,corridorWidth()-VW));
    camX += (target-camX)*Math.min(1,dt*6);
  }
}

function simStep(h,dt){
  if(!h||h.state==='dead') return;

  // status: burn
  if(h.burn>0 && h.burnT>0){
    h._burnAcc=(h._burnAcc||0)+dt;
    if(h._burnAcc>=0.5){ h._burnAcc=0; h.hp-=h.burn; floater(h.x,h.y-50,'-'+h.burn,'#ff9a3a');
      if(h.hp<=0){h.hp=0;heroDies(h);return;} }
    h.burnT-=dt;
  }
  // regeneration trickle (clerics + zealot trait)
  if(h.regen && h.state!=='dead' && h.hp<h.maxHp){
    h.hp=Math.min(h.maxHp, h.hp + h.maxHp*0.025*dt);
  }
  // champion mini-boss specials
  if(h.champion) championTick(h,dt);
  // elemental status timers
  if(h.oil>0) h.oil-=dt;
  if(h.chill>0) h.chill-=dt;
  if(h.shock>0) h.shock-=dt;
  // reaction-chain window: combo decays if no new reaction lands in time
  if(h.reactT>0){ h.reactT-=dt; if(h.reactT<=0) h.reactCount=0; }
  // freeze: the HERO is immobilised (can't move or attack) — but the dungeon's
  // traps and monsters keep punishing the sitting duck.
  const frozen = h.freeze>0;
  if(frozen) h.freeze-=dt;

  const cell=cellAt(h.x);
  if(cell && cell.index!==h.cellIndex && h.state==='walking' && !frozen){
    h.cellIndex=cell.index; onEnterCell(h,cell);
  }

  if(h.state==='walking'){
    // traps still fire on a frozen/standing hero
    if(cell && cell.traps && cell.traps.length) trapTick(h,cell,dt);
    if(h.state==='dead' || frozen) return;
    const slow=(h.oil>0?0.6:1)*(h.chill>0?0.7:1);   // oil & chill slow movement
    h.x += h.spd*slow*dt;
    h.walkAnim+=dt*10;
    // a living monster blocks: walk up to it (through the trap), THEN fight
    if(cell && cell.mon && cell.mon.alive && h.x >= cell.x0+ROOM_W*0.5){
      h.state='fighting'; h.x=cell.x0+ROOM_W*0.55; h.atkT=0; cell.mon.atkT=0;
      return;
    }
    // reached boss room? stand INSIDE it (in front of the boss), not at the door
    if(h.x >= cellX(G.slots)+ROOM_W*0.30){
      if(h.champion==='thief'){ thiefSteal(h); return; }   // robs you instead of fighting
      h.state='boss'; h.reachedThrone=true; h.x=cellX(G.slots)+ROOM_W*0.44;
    }
  }
  else if(h.state==='fighting'){
    const cellM=G.cells[h.cellIndex];
    // combo synergy: traps keep chipping while the monster pins the hero
    if(cellM && cellM.traps && cellM.traps.length) trapTick(h,cellM,dt);
    if(h.state==='dead') return;
    if(!cellM||!cellM.mon||!cellM.mon.alive){ if(!frozen) h.state='walking'; return; }
    fightTick(h, cellM.mon, dt, cellM, isFrontHero(h), frozen);
  }
  else if(h.state==='shopping'){
    if(frozen) return;
    h.shopT-=dt;
    if(h.shopT<=0){ doShopping(h, G.cells[h.cellIndex]); h.state='walking'; }
  }
  else if(h.state==='boss'){
    bossFightTick(h,dt,isFrontHero(h),frozen);
  }
}

function cellAt(x){
  for(const c of G.cells){ if(x>=c.x0 && x<c.x1) return c; }
  // Left of the corridor (party members still entering) → first cell, NOT the
  // boss. Only x past the far end falls through to the boss cell.
  return x<0 ? G.cells[0] : G.cells[G.cells.length-1];
}
function onEnterCell(h,cell){
  // Corruption toll: every populated room a hero walks through drains a slice of
  // their MAX HP and leaves a corruption stack. Even a worthless early room still
  // softens the raider — and the deeper the dungeon, the more stacks pile up,
  // which the boss cashes in (see bossFightTick).
  if(cell.room && cell.kind!=='boss'){
    h.corrupt=(h.corrupt||0)+1;
    const toll=Math.round(CORRUPT_PCT*h.maxHp);
    if(toll>0){ h.hp-=toll; floater(h.x, h.y-58, '☣ -'+toll, '#b06bff'); burst(h.x,h.y-22,'#9a5cff',5);
      if(h.hp<=0){ h.hp=0; heroDies(h); return; } }
  }
  // Monsters are handled by the walking branch: the hero walks up to the
  // blocker (passing through any trap in the room) before the fight starts.
  if(cell.shop && G.fx.smith===0 && cell.room.stock.some(s=>!s.sold)){
    h.state='shopping'; h.x=cell.x0+ROOM_W*0.5; h.shopT=0.8;
  } else if(cell.kind==='boss'){
    if(h.champion==='thief'){ thiefSteal(h); return; }
    // step inside the throne room rather than stopping at the door
    h.state='boss'; h.reachedThrone=true; h.x=cell.x0+ROOM_W*0.44;
  }
}

// Champion specials, ticked each frame for champion heroes.
function championTick(h,dt){
  if(h.shieldT>0) h.shieldT-=dt;
  if(h.champion==='berserker'){
    h.atk = +(h._atkBase*(1 + (1 - h.hp/h.maxHp)*0.6)).toFixed(1);   // enrage as HP drops (max +60%)
    return;
  }
  h.specialT-=dt;
  if(h.specialT>0) return;
  if(h.champion==='paladin'){
    h.specialT=6; h.shieldT=1.8;
    floater(h.x, h.y-72, '🛡 SHIELD UP', '#ffd34d'); sfx('cast');
  } else if(h.champion==='necromancer'){
    h.specialT=6; const heal=Math.round(h.maxHp*0.10);
    h.hp=Math.min(h.maxHp, h.hp+heal);
    floater(h.x, h.y-72, '💀 SIPHON +'+heal, '#b163ff'); healHero(h,0); sfx('cast');
  }
}
// The gold thief reaches the throne and escapes with your gold (no loot, no kill).
function thiefSteal(h){
  if(h.state==='dead') return;
  const stolen=Math.round(G.gold*0.20)+30;
  G.gold=Math.max(0, G.gold-stolen);
  floater(bossX(), FLOOR-92, h.heroName+' ROBBED you −'+stolen+'g', '#ff7a8a');
  showHint('💰 '+h.heroName+' '+(h.title||'the Gold Thief')+' escaped with '+stolen+' gold!');
  shake(8); sfx('lose');
  G.combo=0; h.state='dead'; h.escaped=true;   // gone — no loot, no kill credit
}

// Fire every trap in the cell (a combo room can hold two), scaled by synergy.
function trapTick(h,cell,dt){
  const r=cell.room; const syn=cell.syn||1;
  for(const tr of cell.traps){
    tr.fireT-=dt;
    if(tr.fireT<=0){
      tr.fireT=tr.def.rate;
      const d=tr.def;
      let dmg=d.dmg * (1 + (r.lvl-1)*0.4) * syn * (1+(RB.trapDmg||0));
      // counter-card bonuses vs certain heroes
      if(d.vsClass && d.vsClass.includes(h.cls)) dmg*=d.vsMult;
      if(d.vsElite && h.elite) dmg*=d.vsMult;
      if(d.vsLowHp && h.hp < h.maxHp*d.vsLowHp) dmg*=d.vsMult;
      // veteran rooms hit harder AND bite a slice of max HP (stays relevant late)
      const vr=cell.vet||0; if(vr){ dmg=dmg*(1+vr*VET_DMG) + vr*VET_BITE*h.maxHp; }
      const pierce = d.pierceAll ? 'full' : !!d.pierce;
      dealToHero(h, Math.round(dmg), 'HIT', pierce, d.elem);
      if(d.burn){ h.burn=d.burn+(r.lvl-1)*2; h.burnT=3; }
      burst(h.x, h.y-20, d.col, 5);
      if(h.state==='dead') return;
    }
  }
}

function fightTick(h, mon, dt, cell, isFront, frozen){
  // hero attacks monster (all party members in the room gang up) — unless frozen
  if(!frozen){
    h.atkT-=dt;
    if(h.atkT<=0){
      h.atkT=0.7*h.atkSpeed;
      const dmg=Math.max(1,Math.round(h.atk));
      mon.hp-=dmg;
      if(h.vampiric) healHero(h, dmg*0.4);
      floater(cell.x0+ROOM_W*0.7, FLOOR-60,'-'+dmg,'#fff');
      if(mon.hp<=0){ mon.alive=false; burst(cell.x0+ROOM_W*0.68,FLOOR-30,cell.room.def.col,16);
        floater(cell.x0+ROOM_W*0.68,FLOOR-70,'SLAIN','#ff9a9a');
        return; }
    }
  }
  // monster strikes only the front hero (a frozen hero still gets mauled)
  if(isFront){
    mon.atkT-=dt;
    if(mon.atkT<=0){
      mon.atkT=0.9;
      const vr=cell.vet||0; const bite=vr?Math.round(vr*VET_BITE*h.maxHp):0;
      dealToHero(h, mon.atk+bite, 'HIT');
      maybePotion(h);
    }
  }
}

function healHero(h, amt){
  if(!h||h.state==='dead'||amt<=0) return;
  const before=h.hp; h.hp=Math.min(h.maxHp, h.hp+amt);
  if(Math.round(h.hp)-Math.round(before)>=1) floater(h.x+10, h.y-46, '+'+Math.round(h.hp-before), '#7bdc6b');
}
function maybePotion(h){
  if(h.hasPotion && h.hp < h.maxHp*0.4){
    h.hasPotion=false;
    const heal=Math.round(h.maxHp*0.5);
    h.hp=Math.min(h.maxHp,h.hp+heal);
    floater(h.x,h.y-56,'+'+heal,'#7bdc6b');
  }
}

function doShopping(h, cell){
  // buy affordable, unsold items; price scales with the shop's level → you profit
  for(const s of cell.room.stock){
    if(s.sold) continue;
    const price=salePrice(cell.room, s.key);
    if(h.gold>=price){
      h.gold-=price; G.gold+=price; s.sold=true;
      const it=ITEMS[s.key];
      if(it.atk) h.atk+=it.atk;
      if(it.def) h.armor+=it.def;
      if(it.heal) h.hasPotion=true;
      floater(cell.x0+ROOM_W*0.5, FLOOR-70, '+'+price+'g', '#ffd34d');
      floater(h.x, h.y-44, it.ic+' bought', '#caa15e');
      sfx('buy');
    }
  }
}

function bossFightTick(h,dt,isFront,frozen){
  const b=G.boss;
  // every hero at the throne hammers the boss — unless frozen in place
  if(!frozen){
    h.atkT-=dt;
    if(h.atkT<=0){
      h.atkT=0.8*h.atkSpeed;
      const dr=Math.min(0.85,(RB.bossDR||0)+(b.passiveDR||0));
      const dmg=Math.max(1,Math.round(h.atk*(1-dr)));
      b.hp-=dmg;
      if(G.combo>0) G.combo=0;                 // defense breached — streak broken
      if(h.vampiric) healHero(h, dmg*0.4);
      if(b.thorns){ dealToHero(h, Math.round(dmg*b.thorns), 'THORNS'); }  // Spiked Throne reflect
      floater(bossX(), FLOOR-90, '-'+dmg, '#ff7a8a');
      burst(bossX(), FLOOR-50, '#ff4d6d', 6);
      shake(3); sfx('boss');
      if(b.hp<=0){ b.hp=0; bossDies(); return; }
    }
  }
  // boss only swings at the front hero
  if(isFront){
    h._batk=(h._batk||0)-dt;
    if(h._batk<=0){
      h._batk=1.0;
      const cm=1+(h.corrupt||0)*CORRUPT_BOSS;          // corruption empowers the boss
      dealToHero(h, Math.round(b.atk*cm), 'SLAM');
      maybePotion(h);
    }
  }
}

/* ============================== RENDER =================================== */
function draw(){
  const sh = shakeT>0 ? shakeMag*(shakeT/0.22) : 0;
  const ox = sh? (Math.random()*2-1)*sh : 0, oy = sh? (Math.random()*2-1)*sh : 0;
  // background fills the WHOLE canvas at any zoom (device space)
  X.setTransform(1,0,0,1,0,0); X.imageSmoothingEnabled=false;
  const g=X.createLinearGradient(0,0,0,CV.height);
  g.addColorStop(0,'#1a1230'); g.addColorStop(1,'#0c0916');
  X.fillStyle=g; X.fillRect(0,0,CV.width,CV.height);

  if(!G) return;
  if(G.phase==='menu'||G.phase==='bossSelect'){ X.setTransform(baseK,0,0,baseK,0,0); drawIdleScene(); return; }

  // Zoom: scale the world about the floor line so it stays pinned to the bottom.
  const z = (G.phase==='build'||G.phase==='run') ? zoom : 1;
  const k = baseK*z, tY = FLOOR*baseK*(1-z);
  X.setTransform(k,0,0,k, ox*baseK, tY+oy*baseK);

  // Camera: follows the hero in run; drag to pan in build. Visible world width
  // grows when zoomed out (VW/z), so the whole dungeon can fit on screen.
  const maxCam=Math.max(0, corridorWidth()-VW/z);
  camX=clamp(camX,minCam(),maxCam);
  const tx = (wx)=>wx-camX;
  const isBuild = (G.phase==='build');
  drawDungeon(tx, 1, isBuild);

  // floaters & particles (world space)
  particles.forEach(p=>{ X.globalAlpha=clamp(p.life,0,1); X.fillStyle=p.col;
    const sx=tx(p.x); X.fillRect(sx, p.y, p.sz, p.sz); });
  X.globalAlpha=1;
  floats.forEach(f=>{ X.globalAlpha=clamp(f.life,0,1); X.fillStyle=f.col;
    X.font='bold 16px Trebuchet MS'; X.textAlign='center';
    X.fillText(f.txt, tx(f.x), f.y); });
  X.globalAlpha=1; X.textAlign='left';
}

function drawDungeon(tx, scale, isBuild){
  // floor (drawn wide/tall so it still covers the screen when zoomed out)
  X.fillStyle='#241a3a';
  X.fillRect(-VW, FLOOR, VW*4, VH);
  X.fillStyle='#2e2350';
  X.fillRect(-VW, FLOOR, VW*4, 6);

  // each cell
  for(let i=0;i<G.slots+1;i++){
    const isBoss=(i===G.slots);
    const x0=tx(cellX(i)); const w=ROOM_W*scale;
    drawRoomBg(x0,w,isBoss,i);
    if(isBoss){ drawBoss(x0+w*0.6); continue; }
    const room=G.rooms[i];
    const dropTarget = isBuild && pickupIdx>=0;   // we're holding a room to move
    if(!room){
      // empty slot — show the stone room art; overlay the placeable hint in build
      const ea = ROOM_IMG.empty && ROOM_IMG.empty._ok;
      if(ea) drawRoomArt(x0,w,ROOM_IMG.empty);
      if(isBuild || !ea){
        X.strokeStyle=(isBuild&&(selCard>=0||dropTarget))?'#ffd34d':'#4a3a72';
        X.setLineDash([6,5]); X.lineWidth=2;
        X.strokeRect(x0+6, FLOOR-120, w-12, 110); X.setLineDash([]);
        X.fillStyle=(isBuild&&(selCard>=0||dropTarget))?'#ffd34d':'#8a7ab8'; X.font='12px Trebuchet MS'; X.textAlign='center';
        X.fillText(dropTarget?'drop here':'empty', x0+w/2, FLOOR-58); X.textAlign='left';
      }
      // tutorial: pulse the first empty slot during the "place" step
      if(isBuild && G && G.tutHi==='slot' && i===G.rooms.findIndex(r=>!r)){
        const pu=0.5+0.5*Math.sin(performance.now()/220);
        X.strokeStyle='#ffd34d'; X.globalAlpha=0.5+0.5*pu; X.lineWidth=3; X.setLineDash([]);
        X.strokeRect(x0+3, FLOOR-126, w-6, 122); X.globalAlpha=1;
      }
    } else if(roomDrag && roomDrag.dragging && i===roomDrag.from){
      // the room being dragged: lifted + faded
      X.save(); X.globalAlpha=0.5; X.translate(0,-48); drawRoomFull(x0, w, room, i); X.restore();
    } else {
      drawRoomFull(x0, w, room, i);
    }
    // picked-up room highlight
    if(isBuild && i===pickupIdx){
      X.strokeStyle='#ffd34d'; X.setLineDash([4,4]); X.lineWidth=3;
      X.strokeRect(x0+3, FLOOR-150, w-6, 150); X.setLineDash([]);
    }
    // drop-target highlight (dragging a card OR re-ordering/merging a room here)
    if(isBuild && (i===cardDragSlot || (roomDrag && roomDrag.dragging && i===roomDragTo))){
      const merge = roomDrag && roomDrag.dragging && i===roomDragTo && roomDragMerge;
      const pu=0.5+0.5*Math.sin(performance.now()/160);
      X.strokeStyle=merge?'#b06bff':'#7bdc6b'; X.globalAlpha=0.5+0.5*pu; X.lineWidth=4; X.setLineDash([]);
      X.strokeRect(x0+2, FLOOR-152, w-4, 152); X.globalAlpha=1;
      if(merge){ X.fillStyle='#e0c2ff'; X.font='bold 12px Trebuchet MS'; X.textAlign='center';
        X.fillText('⊕ MERGE', x0+w/2, FLOOR-160); X.textAlign='left'; }
    }
    // slot number tag in build
    if(isBuild){
      X.fillStyle='rgba(0,0,0,.4)'; X.fillRect(x0+4, FLOOR-138, 22,16);
      X.fillStyle='#cdbaff'; X.font='11px Trebuchet MS';
      X.fillText(i+1, x0+10, FLOOR-126);
    }
  }
  // upcoming heroes waiting at the gate (build only)
  if(isBuild) drawWaitingHeroes(tx);
  // hero
  // draw the whole raiding party (dead first so living draw on top)
  const party=(G.heroes&&G.heroes.length)?G.heroes:(G.hero?[G.hero]:[]);
  party.filter(h=>h.state==='dead').forEach(h=>drawHeroDead(tx(h.x), h));
  party.filter(h=>h.state!=='dead').forEach(h=>drawHero(tx(h.x), h));
}
// Build a lightweight hero object from a queued spec for drawing/preview.
function previewHeroObj(spec){
  let cls=spec.cls; if(G.fx.temple>0 && cls==='cleric') cls='warrior';
  const c=CLASSES[cls]; const ps=previewStats(spec);
  const champ=spec.champion?CHAMPIONS[spec.champion]:null;
  return { cls, ...c, traits:spec.traits, elite:(spec.traits.length>0)||!!champ,
    champion:spec.champion||null, champIc:champ?champ.ic:null, champCol:champ?champ.col:null,
    heroName:spec.name, title:spec.title||(champ?champ.title:null),
    hp:ps.hp, maxHp:ps.hp, gold:ps.gold, state:'idle', walkAnim:0, yOff:0,
    shieldT:0, freeze:0, chill:0, oil:0, shock:0 };
}
// Show the next wave standing ready in the staging zone left of the entrance.
function drawWaitingHeroes(tx){
  if(!G.queue || !G.queue.length) return;
  const champ=!!G.queue[0].champion;
  const n=champ?1:Math.min(G.queue.length, G.guildLvl+1);
  // gate line at the entrance
  X.strokeStyle='rgba(120,100,170,.5)'; X.setLineDash([4,5]); X.lineWidth=2;
  X.beginPath(); X.moveTo(tx(0), FLOOR-150); X.lineTo(tx(0), FLOOR); X.stroke(); X.setLineDash([]);
  for(let k=0;k<n;k++){
    const h=previewHeroObj(G.queue[k]);
    const wx = -STAGEW*0.62 + k*14;
    h.yOff = (k-(n-1)/2)*13;
    X.globalAlpha=0.92; drawHero(tx(wx), h); X.globalAlpha=1;
  }
  X.fillStyle=champ?'#ff7a8a':'#cdbaff'; X.font='bold 11px Trebuchet MS'; X.textAlign='center';
  X.fillText(champ?'⚔️ CHAMPION!':'⏳ Next wave →', tx(-STAGEW*0.5), FLOOR-128);
  X.textAlign='left';
}

function drawRoomBg(x0,w,isBoss,i){
  X.fillStyle=isBoss?'#2a1530':'#191230';
  X.fillRect(x0, FLOOR-150, w, 150);
  // wall pillars
  X.fillStyle='#120c24';
  X.fillRect(x0, FLOOR-150, 4, 150);
  X.fillStyle=isBoss?'#5a2a4a':'#251b44';
  X.fillRect(x0, FLOOR-150, w, 5);
  if(isBoss){
    // throne glow
    const gg=X.createRadialGradient(x0+w*0.6,FLOOR-70,8,x0+w*0.6,FLOOR-70,90);
    gg.addColorStop(0,'rgba(180,60,140,.35)'); gg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=gg; X.fillRect(x0,FLOOR-150,w,150);
  }
}

// chunky pixel rect helper
function px(x,y,w,h,c){ X.fillStyle=c; X.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

function drawTrapProp(x0,w,cx,type){
  if(type==='spike'){
    for(let s=0;s<5;s++){ const sx=x0+18+s*((w-36)/4);
      px(sx,FLOOR-14,10,14,'#cfd6e0'); px(sx+2,FLOOR-14,6,8,'#9aa4b2'); }
  } else if(type==='flame'){
    px(cx-26,FLOOR-10,52,10,'#3a2a1a');
    for(let f=0;f<3;f++){ const fx=cx-20+f*20;
      px(fx,FLOOR-34,8,24,'#ff7a2e'); px(fx+1,FLOOR-26,6,16,'#ffd34d'); }
  } else if(type==='arrow'){
    px(x0+8,FLOOR-90,8,80,'#3a2c1a');
    for(let a=0;a<4;a++){ px(x0+16,FLOOR-80+a*18,18,3,'#caa15e'); }
  } else if(type==='oil'){
    px(cx-28,FLOOR-7,56,7,'#23231a');                       // slick puddle
    X.globalAlpha=0.5; px(cx-20,FLOOR-9,40,4,'#4a4a2a'); X.globalAlpha=1;
    px(cx-10,FLOOR-22,8,15,'#1a1a12'); px(cx-9,FLOOR-30,6,8,'#2a2a1a'); // barrel
  } else if(type==='frost'){
    for(let s=0;s<4;s++){ const sx=cx-21+s*14;
      px(sx,FLOOR-20,6,20,'#bfefff'); px(sx+1,FLOOR-26,4,8,'#9adfff'); }
    X.globalAlpha=0.25; px(cx-26,FLOOR-12,52,12,'#9adfff'); X.globalAlpha=1;
  } else if(type==='tesla'){
    px(cx-3,FLOOR-40,6,40,'#6a6a7a'); px(cx-9,FLOOR-46,18,8,'#caa15e');  // coil
    const t=performance.now()/120;

    X.beginPath(); X.moveTo(cx-9,FLOOR-44); X.lineTo(cx-2,FLOOR-52); X.lineTo(cx+6,FLOOR-46); X.lineTo(cx+10,FLOOR-54); X.stroke();

// Real room artwork (small quantized PNGs in rooms/). A single-trap room's art
// replaces its procedural prop; a shop shows the shop art; any monster room gets
// the "lair" backdrop with the live monster sprite drawn in front. Fused rooms
// and art-less types fall back to the procedural look.
const ROOM_IMG={};
const ROOM_ART_TRAPS={spike:1, flame:1, oil:1};
if(typeof Image!=='undefined'){
  ['spike','flame','oil','shop','lair','empty'].forEach(k=>{
    const im=new Image(); im.onload=()=>{ im._ok=true; }; im.src='rooms/'+k+'.png'; ROOM_IMG[k]=im;
  });
}
const ROOM_ART_DROP=12;   // px the art bottom sits below the floor line
function roomArtKey(room){
  const parts=roomParts(room);
  if(parts.some(p=>ROOMS[p].kind==='monster')) return 'lair';      // backdrop
  if(parts.includes('shop')) return 'shop';
  if(parts.length===1 && ROOM_ART_TRAPS[parts[0]]) return parts[0]; // replaces the prop
  return null;
}
function roomArtReady(room){ const k=roomArtKey(room); const im=k&&ROOM_IMG[k]; return (im&&im._ok)?k:null; }
function drawRoomArt(x0,w,img){
  const dh=Math.round(w*(img.height/img.width));
  const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=false;
  X.drawImage(img, Math.round(x0), Math.round(FLOOR+ROOM_ART_DROP-dh), Math.round(w), dh);
  X.imageSmoothingEnabled=sm;
}
function drawRoomFull(x0,w,room,i){
  const k=roomArtReady(room);
  if(k) drawRoomArt(x0,w,ROOM_IMG[k]);                                   // dedicated full art
  else if(ROOM_IMG.empty && ROOM_IMG.empty._ok) drawRoomArt(x0,w,ROOM_IMG.empty); // stone backdrop for art-less rooms
  drawRoomContents(x0,w,room,i);
}
function drawRoomContents(x0,w,room,i){
  const cx=x0+w/2; const cell=G.cells[i]; const parts=roomParts(room);
  const art=roomArtReady(room);                 // suppress props the art already shows
  // traps (the single-trap art replaces its own prop; 'lair' backdrop keeps them)
  for(const p of parts){ if(ROOMS[p].kind==='trap' && art!==p) drawTrapProp(x0,w,cx,p); }
  // monsters (a combo room can hold two) — draw each so both stay visible
  const monParts=parts.filter(p=>ROOMS[p].kind==='monster');
  if(monParts.length){
    const alive = G.phase!=='run' ? true : (!cell || !cell.mon || cell.mon.alive);
    monParts.forEach((mp,mi)=>{
      const def=ROOMS[mp]; const sprite = mp==='minion'?'minion':mp;
      const ox = monParts.length>1 ? (mi===0? -22 : 22) : 0;   // stand them side by side
      if(alive) drawMonster(cx+ox, sprite, def.col);
      else { X.globalAlpha=0.35; drawMonster(cx+ox, sprite, def.col); X.globalAlpha=1;
             px(cx+ox-12,FLOOR-10,24,6,'#3a3a3a'); }
    });
    if(cell&&cell.mon&&cell.mon.alive&&G.phase==='run')
      bar(cx-26,FLOOR-78,52,6, cell.mon.hp/cell.mon.maxHp,'#ff4d6d');
  }
  // shop counter
  if(parts.includes('shop') && art!=='shop') drawShopProp(cx,room);

  drawLvlBadge(cx,FLOOR-128,room.lvl,ROOMS[room.type].col);
  // veteran rank badge: a gold star with the rank, shown in build AND run
  const vr=vetRank(room);
  if(vr>0){
    X.fillStyle='#ffd34d'; X.font='bold 11px Trebuchet MS'; X.textAlign='center';
    X.fillText('⭐'+vr, cx+26, FLOOR-124); X.textAlign='left';
  }

  // build-time room info: XP pips, fuse-ready, combo synergy
  if(G.phase!=='run' && ROOMS[room.type].kind!=='shop'){
    const fk=fuseKills(); const k=Math.min(fk, room.kills||0);
    for(let p=0;p<fk;p++) px(cx-16+p*11, FLOOR-118, 8,5, p<k?'#ffd34d':'#3a2c5a');
    if(room.part2){
      const info=synergyInfo(parts);
      X.fillStyle=info.tone==='good'?'#7bdc6b':info.tone==='bad'?'#ff7a8a':'#cdbaff';
      X.font='bold 9px Trebuchet MS'; X.textAlign='center';
      X.fillText((info.name||'Combo')+' ×'+info.m.toFixed(2), cx, FLOOR-104); X.textAlign='left';
    } else if((room.kills||0)>=fuseKills()){
      X.fillStyle='#ffd34d'; X.font='bold 9px Trebuchet MS'; X.textAlign='center';
      X.fillText('⚡ FUSE READY', cx, FLOOR-104); X.textAlign='left';
    }
  }
}

function drawLvlBadge(cx,y,lvl,col){
  X.fillStyle='rgba(0,0,0,.5)'; X.beginPath();
  X.arc(cx, y, 11, 0, 7); X.fill();
  X.strokeStyle=col; X.lineWidth=2; X.stroke();
  X.fillStyle='#ffd34d'; X.font='bold 12px Trebuchet MS'; X.textAlign='center';
  X.fillText(lvl, cx, y+4); X.textAlign='left';
}

function bar(x,y,w,h,frac,col){
  px(x,y,w,h,'#000'); px(x,y,Math.max(0,w*clamp(frac,0,1)),h,col);
  X.strokeStyle='rgba(255,255,255,.25)'; X.lineWidth=1; X.strokeRect(x+.5,y+.5,w-1,h-1);
}

function drawHero(sx,h){
  const y=FLOOR+(h.yOff||0); const c=h; const bob=h.state==='walking'?Math.sin(h.walkAnim)*2:0;
  const yy=y+bob;
  const champ=!!h.champion;
  // aura (champion = its colour, bigger/brighter; elite = trait colour)
  if(champ || h.elite){
    const t=performance.now()/200;
    const col=champ?(h.champCol||'#ffd34d'):(h.traits.length?TRAITS[h.traits[0]].col:'#ffd34d');
    X.globalAlpha=(champ?0.30:0.18)+0.08*Math.sin(t);
    X.fillStyle=col; X.beginPath(); X.ellipse(sx,yy-26,champ?30:20,champ?42:30,0,0,7); X.fill();
    X.globalAlpha=1;
  }
  // shadow
  X.fillStyle='rgba(0,0,0,.3)'; X.beginPath(); X.ellipse(sx,y,champ?20:14,4,0,0,7); X.fill();
  // legs
  px(sx-7,yy-14,5,14,'#3a3050'); px(sx+2,yy-14,5,14,'#3a3050');
  // body
  px(sx-9,yy-34,18,22,c.col);
  // head
  px(sx-7,yy-46,14,14,c.tint);
  px(sx-4,yy-42,3,3,'#000'); px(sx+2,yy-42,3,3,'#000');
  // class flair
  if(h.cls==='warrior'){ px(sx+9,yy-40,4,30,'#cfd6e0'); px(sx+8,yy-44,6,8,'#9aa4b2'); } //sword
  if(h.cls==='mage'){ px(sx+9,yy-48,4,34,'#7a5a3a'); px(sx+7,yy-52,8,8,'#9adfff'); } //staff
  if(h.cls==='rogue'){ px(sx+9,yy-30,5,16,'#cfd6e0'); } //dagger
  if(h.cls==='cleric'){ px(sx-2,yy-58,4,10,'#ffec99'); px(sx-5,yy-54,10,4,'#ffec99'); } //cross
  // frozen / elemental status tints
  if(h.freeze>0){ X.globalAlpha=.4; px(sx-10,yy-48,20,48,'#9adfff'); X.globalAlpha=1; }
  else if(h.chill>0){ X.globalAlpha=.25; px(sx-10,yy-48,20,48,'#9adfff'); X.globalAlpha=1; }
  if(h.oil>0){ X.globalAlpha=.3; px(sx-10,yy-46,20,46,'#0a0a06'); X.globalAlpha=1; }
  if(h.shock>0){ X.globalAlpha=.3+0.2*Math.sin(performance.now()/70); px(sx-10,yy-48,20,48,'#fff34d'); X.globalAlpha=1; }
  // champion shield bubble
  if(h.shieldT>0){ X.globalAlpha=0.35+0.1*Math.sin(performance.now()/90);
    X.strokeStyle='#ffd34d'; X.lineWidth=2; X.beginPath(); X.ellipse(sx,yy-26,18,28,0,0,7); X.stroke();
    X.globalAlpha=1; }
  // hp bar (wider for champions)
  const bw=champ?52:36;
  bar(sx-bw/2, yy-(champ?66:60), bw, champ?8:6, h.hp/h.maxHp, h.hp/h.maxHp>0.3?'#5ad97e':'#ff4d6d');
  // gold + elite trait markers
  X.font='10px Trebuchet MS'; X.textAlign='center'; X.fillStyle='#ffd34d';
  X.fillText('💰'+h.gold, sx, yy-64);
  if(champ){
    X.font='18px Trebuchet MS'; X.fillText('👑', sx, yy-78);          // crown above head
    X.font='bold 10px Trebuchet MS'; X.fillStyle=h.champCol||'#ffd34d';
    X.fillText((h.champIc||'')+' '+h.heroName, sx, yy-90);            // name banner
  } else if(h.elite){ X.font='11px Trebuchet MS';
    X.fillText(h.traits.map(t=>TRAITS[t].ic).join(''), sx, yy-74); }
  X.textAlign='left';
}
function drawHeroDead(sx,h){
  const y=FLOOR+(h.yOff||0);

// Real boss artwork (small quantized PNGs in bosses/). Preloaded; drawBoss

const BOSS_IMG={};
if(typeof Image!=='undefined'){

/* ============================ CANVAS INPUT =============================== */
// Drag to pan the dungeon (build + run); a tap (no drag) places/upgrades a room
// in the build phase. Panning during a run temporarily suspends auto-follow.
let drag=null, panning=false, panHoldUntil=0;
let pointers={}, pinch=null;
let roomDrag=null, roomDragTo=-1, roomDragX=0, roomDragMerge=false;
function clientToVX(e){ const rect=CV.getBoundingClientRect();
  return (e.clientX-rect.left)*(VW/rect.width); }
function clientToWorldX(e){ return camX + clientToVX(e)/zoom; }
function clientToVY(e){ const rect=CV.getBoundingClientRect();
  const deviceY=(e.clientY-rect.top)*(CV.height/rect.height);
  const z=(G&&(G.phase==='build'||G.phase==='run'))?zoom:1; const k=baseK*z; const tY=FLOOR*baseK*(1-z);
  return (deviceY - tY)/k; }
// Move a room from one slot to another, pushing the rooms in between over.
function moveRoom(from,to){
  if(from===to || from<0 || to<0 || from>=G.slots || to>=G.slots) return;
  const [r]=G.rooms.splice(from,1); G.rooms.splice(to,0,r);
  sfx('upgrade'); showHint('Rooms rearranged.'); render();
}
// Merge built room `from` INTO `to`, recycling an old room into a combo.
function fuseRooms(from,to){
  const a=G.rooms[from], b=G.rooms[to];
  if(!canFuseRooms(b,a)) return;
  b.part2=a.type;
  if(a.type==='minion'){ b.minHp=a.minHp; b.minAtk=a.minAtk; if(!b.label) b.label=a.label; }  // carry the corrupted hero's stats
  b.kills=(b.kills||0)+(a.kills||0);   // carry the absorbed room's veteran progress
  b.lvl=Math.min(maxLevel(), Math.max(b.lvl, a.lvl));
  G.rooms[from]=null;                  // the absorbed room's slot opens up
  if(selCard>=0) selCard=-1; pickupIdx=-1;
  const info=synergyInfo(roomParts(b));
  burst(cellX(to)+ROOM_W/2, FLOOR-40, '#9a5cff', 24);
  floater(cellX(to)+ROOM_W/2, FLOOR-86, info.name||'MERGED', info.tone==='bad'?'#ff7a8a':'#7bdc6b');
  sfx('upgrade'); showHint('Merged → '+comboName(b)+(info.name?' ('+info.name+' ×'+info.m.toFixed(2)+')':'')+'!');
  render(); showInspectEntity({kind:'room',room:b});
}
// Spend gold to level a room up (alternative to drawing a matching card).
function upgradeRoomGold(idx){
  if(!G || G.phase!=='build') return;
  const room=G.rooms[idx]; if(!room) return;
  if(room.lvl>=maxLevel()){ showHint(comboName(room)+' is already max level.'); return; }
  const cost=roomUpgradeCost(room);
  if(G.gold<cost){ showHint('Not enough gold — need '+cost+'g.'); return; }
  G.gold-=cost; room.lvl++;
  burst(cellX(idx)+ROOM_W/2, FLOOR-30, '#ffd34d', 16);
  floater(cellX(idx)+ROOM_W/2, FLOOR-70, 'LVL '+room.lvl, '#ffd34d');
  sfx('upgrade'); showHint(comboName(room)+' upgraded to Lv '+room.lvl+' for '+cost+'g.');
  render(); showInspectEntity({kind:'room',room});
}
function setZoom(z){ zoom=clamp(z, ZMIN, ZMAX); }
function zoomBy(f){ setZoom(zoom*f); draw(); }
function zoomFit(){ if(!G) return; zoom=clamp(VW/Math.max(1,corridorWidth()), ZMIN, 1.2); camX=0; draw(); }

CV.addEventListener('pointerdown', e=>{
  if(!G || (G.phase!=='build' && G.phase!=='run')) return;
  e.preventDefault();
  pointers[e.pointerId]={x:e.clientX,y:e.clientY};
  if(Object.keys(pointers).length===2){           // begin pinch-zoom
    const v=Object.values(pointers);
    pinch={ d0:Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y)||1, z0:zoom };
    drag=null; panning=false; cardDrag=null; endCardGhost(); return;
  }
  try{ CV.setPointerCapture(e.pointerId); }catch(_){}
  // In build, pressing ON a placed room (no card selected) picks it up to drag.
  if(G.phase==='build' && selCard<0){
    const slot=Math.floor(clientToWorldX(e)/ROOM_W); const vy=clientToVY(e);
    if(slot>=0 && slot<G.slots && G.rooms[slot] && vy>FLOOR-152 && vy<FLOOR+16){
      roomDrag={ id:e.pointerId, from:slot, sx:e.clientX, sy:e.clientY, dragging:false };
      return;
    }
  }
  drag={ id:e.pointerId, startCX:e.clientX, cam0:camX, moved:false };
  panning=true;
}, {passive:false});

CV.addEventListener('pointermove', e=>{
  if(pointers[e.pointerId]) pointers[e.pointerId]={x:e.clientX,y:e.clientY};
  if(pinch){ const v=Object.values(pointers); if(v.length>=2){
    const d=Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y); setZoom(pinch.z0*(d/pinch.d0)); } return; }
  if(roomDrag && e.pointerId===roomDrag.id){
    const dx=e.clientX-roomDrag.sx, dy=e.clientY-roomDrag.sy;
    if(!roomDrag.dragging && Math.hypot(dx,dy)>8){ roomDrag.dragging=true; hideInspect(); }
    if(roomDrag.dragging){ e.preventDefault();
      roomDragX=clientToWorldX(e);
      roomDragTo=clamp(Math.floor(roomDragX/ROOM_W), 0, G.slots-1);
      // dropping onto the CENTRE of another (fusable) room merges; edges reorder
      const frac=roomDragX/ROOM_W - roomDragTo;
      roomDragMerge = roomDragTo!==roomDrag.from && frac>0.28 && frac<0.72
        && canFuseRooms(G.rooms[roomDragTo], G.rooms[roomDrag.from]);
      draw();
    }
    return;
  }
  if(!drag || e.pointerId!==drag.id) return;
  const rect=CV.getBoundingClientRect();
  const dxV=(e.clientX-drag.startCX)*(VW/rect.width);
  if(Math.abs(e.clientX-drag.startCX)>6) drag.moved=true;
  const maxCam=Math.max(0, corridorWidth()-VW/zoom);
  camX=clamp(drag.cam0 - dxV/zoom, minCam(), maxCam);
});
CV.addEventListener('wheel', e=>{
  if(!G || (G.phase!=='build' && G.phase!=='run')) return;
  e.preventDefault(); zoomBy(e.deltaY<0 ? 1.12 : 0.9);
}, {passive:false});

function endDrag(e){
  if(e){ delete pointers[e.pointerId]; if(Object.keys(pointers).length<2) pinch=null; }
  if(roomDrag && (!e || e.pointerId===roomDrag.id)){
    if(roomDrag.dragging && roomDragTo>=0 && roomDragTo!==roomDrag.from){
      if(roomDragMerge && canFuseRooms(G.rooms[roomDragTo], G.rooms[roomDrag.from]))
        fuseRooms(roomDrag.from, roomDragTo);
      else moveRoom(roomDrag.from, roomDragTo);
    } else if(!roomDrag.dragging){
      const r=G.rooms[roomDrag.from]; if(r) showInspectEntity({kind:'room',room:r});   // tap = inspect
    }
    roomDrag=null; roomDragTo=-1; roomDragMerge=false; draw(); return;
  }
  if(!drag || (e && e.pointerId!==drag.id)) return;
  if(!drag.moved){                              // a clean tap
    const wx=clientToWorldX(e);
    const idx=Math.floor(wx/ROOM_W);
    if(G.phase==='build' && idx>=0 && idx<G.slots){
      tapSlot(idx);
      const r=G.rooms[idx]; showInspectEntity(r?{kind:'room',room:r}:{kind:'empty'});
    } else {
      showInspectEntity(entityAt(wx));          // boss in build, or hero/room/boss in run
    }
  } else if(G.phase==='run'){
    panHoldUntil = performance.now()+3500;       // keep your panned view for a bit
  }
  drag=null; panning=false;
}
CV.addEventListener('pointerup', endDrag);
CV.addEventListener('pointercancel', endDrag);

// Desktop hover inspection
CV.addEventListener('mousemove', e=>{
  if(drag || !G || (G.phase!=='build' && G.phase!=='run')) return;
  showInspectEntity(entityAt(clientToWorldX(e)), true);
});
CV.addEventListener('mouseleave', ()=>{ if(inspectHover) hideInspect(); });

function endCardGhost(){ if(cardGhost){ cardGhost.remove(); cardGhost=null; } }
panel.addEventListener('pointerdown', e=>{
  if(!G || G.phase!=='build') return;
  if(e.target.closest('.x')) return;                 // discard button
  const cardEl=e.target.closest('.card'); if(!cardEl) return;
  cardDrag={ id:e.pointerId, ci:+cardEl.dataset.ci, sx:e.clientX, sy:e.clientY, dragging:false };
});
window.addEventListener('pointermove', e=>{
  if(!cardDrag || e.pointerId!==cardDrag.id) return;
  const dx=e.clientX-cardDrag.sx, dy=e.clientY-cardDrag.sy;
  if(!cardDrag.dragging && Math.hypot(dx,dy)>8){ cardDrag.dragging=true; startCardGhost(cardDrag.ci); hideInspect(); }
  if(cardDrag.dragging){
    e.preventDefault();
    moveCardGhost(e.clientX,e.clientY);
    const s=slotUnderPointer(e);
    if(s!==cardDragSlot){ cardDragSlot=s; draw(); }
  }
}, {passive:false});
function endCardDrag(e){
  if(!cardDrag || (e && e.pointerId!==cardDrag.id)) return;
  if(cardDrag.dragging){
    const slot=slotUnderPointer(e);
    endCardGhost();
    if(slot>=0) placeCard(cardDrag.ci, slot);
    else showHint('Drop a card onto a room slot to build there.');
  } else {
    selectCard(cardDrag.ci);                          // it was a tap, not a drag
  }
  cardDrag=null; cardDragSlot=-1;
  if(G && (G.phase==='build')) draw();
}
window.addEventListener('pointerup', endCardDrag);
window.addEventListener('pointercancel', e=>{ endCardGhost(); cardDrag=null; cardDragSlot=-1; });

/* keyboard: ability hotkeys + space=start/speed */
window.addEventListener('keydown', e=>{
  if(!G) return;
  if(G.phase==='run'){
    if(e.key>='1'&&e.key<='3'){ const i=+e.key-1; if(i<G.boss.abil.length) castAbility(i); }
    if(e.key===' '){ e.preventDefault(); toggleSpeed(); }
  } else if(G.phase==='build' && e.key===' '){ e.preventDefault(); startWave(); }
});

/* ================================ LOOP ================================== */
function frame(ts){
  const dt=Math.min(0.05,(ts-last)/1000)||0; last=ts;
  if(G && G.phase==='run'){ update(dt); renderTop(); }
  else { update(dt); }
  draw();
  if(AC) updateMusicMood();   // music follows the game state
  // keep run panel cooldowns fresh
  if(G&&G.phase==='run'){ updateRunPanel(); }
  requestAnimationFrame(frame);
}
// Update ability buttons WITHOUT rebuilding the DOM — rebuilding mid-tap was
// destroying the button between touchstart/touchend, eating the click.
function updateRunPanel(){
  if(!G||G.phase!=='run') return;
  const btns=panel.querySelectorAll('.abil');
  if(btns.length!==G.boss.abil.length){ renderPanel(); return; }
  G.boss.abil.forEach((a,i)=>{
    const def=ABIL[a.id];
    const cost=abilCost(def.cost);
    btns[i].disabled = (a.cd>0 || G.boss.mana<cost);
    const c=btns[i].querySelector('.c');
    if(c) c.textContent = a.cd>0 ? ('⏳'+a.cd.toFixed(1)+'s') : ('🔷'+cost);
  });
  // live boss HP + mana readout next to the abilities
  const b=G.boss;
  const hp=document.getElementById('pbhp'), hpT=document.getElementById('pbhpT');
  const mn=document.getElementById('pbmana'), mnT=document.getElementById('pbmanaT');
  if(hp) hp.style.width=(b.hp/b.maxHp*100)+'%';
  if(hpT) hpT.textContent=Math.ceil(b.hp)+'/'+b.maxHp;
  if(mn) mn.style.width=(b.mana/b.maxMana*100)+'%';
  if(mnT) mnT.textContent=Math.floor(b.mana)+'/'+b.maxMana;
}

/* keep the canvas matched to the stage (rotation, panel-height changes, etc.) */
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,150));
if(window.ResizeObserver){ new ResizeObserver(resize).observe(stage); }

loadRunes();
loadAudioPref();
loadVolPrefs();
// Audio can only start after a user gesture; wake it on the first interaction.
window.addEventListener('pointerdown', ()=>{ if(audioOn) initAudio(); }, {once:false});
window.addEventListener('keydown', ()=>{ if(audioOn) initAudio(); }, {once:false});
{ const ab=document.getElementById('audiobtn');
  if(ab){ ab.textContent=audioOn?'🔊':'🔇';
    ab.addEventListener('click', e=>{ e.stopPropagation(); toggleAudio(); }); } }
resize();
gotoMenu();
requestAnimationFrame(frame);
</script>
