<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROXOR ARCADE — all the games</title>
<meta name="description" content="A homemade arcade: real screenshots and gameplay clips from every game, from dungeon builders to fry shops.">
<style>
  :root{
    --bg:#0b0b12; --panel:#14141f; --panel2:#1a1a28; --ink:#e8e6f0; --dim:#8b88a0;
    --neon:#39ff88; --neon2:#ff3d81; --gold:#ffcf4d;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; }
  body{ min-height:100%;
    background:
      radial-gradient(1200px 500px at 50% -100px, #1c1533 0%, transparent 60%),
      radial-gradient(900px 400px at 90% 110%, #0e2a1e 0%, transparent 55%),
      var(--bg);
  }

  /* ---------- header ---------- */
  header{ text-align:center; padding:34px 16px 10px; }
  .marquee{
    display:inline-block; padding:14px 34px 12px; border:3px solid #2c2c44; border-radius:14px;
    background:linear-gradient(180deg,#191926,#101018);
    box-shadow:0 0 0 3px #0a0a10, 0 0 28px rgba(57,255,136,.13), inset 0 0 22px rgba(0,0,0,.6);
    position:relative;
  }
  .marquee::before,.marquee::after{
    content:''; position:absolute; top:8px; bottom:8px; width:6px; border-radius:3px;
    background:repeating-linear-gradient(180deg,var(--gold) 0 6px,transparent 6px 12px);
    opacity:.7; animation:bulbs 1s steps(2) infinite;
  }
  .marquee::before{ left:8px; } .marquee::after{ right:8px; animation-delay:.5s; }
  @keyframes bulbs{ 50%{ opacity:.25; } }
  h1{
    margin:0; font-family:'Courier New',monospace; font-weight:900; letter-spacing:6px;
    font-size:clamp(26px,6vw,46px); color:var(--neon);
    text-shadow:0 0 6px rgba(57,255,136,.9), 0 0 24px rgba(57,255,136,.45), 0 0 60px rgba(57,255,136,.25);
    animation:flicker 7s infinite;
  }
  h1 .pink{ color:var(--neon2);
    text-shadow:0 0 6px rgba(255,61,129,.9), 0 0 24px rgba(255,61,129,.45), 0 0 60px rgba(255,61,129,.25); }
  @keyframes flicker{ 0%,93%,95%,97%,100%{opacity:1} 94%,96%{opacity:.55} }
  .tagline{ margin:12px 0 0; color:var(--dim); font-size:14px; letter-spacing:2px; text-transform:uppercase; }
  .tagline b{ color:var(--ink); }

  /* ---------- toolbar ---------- */
  .toolbar{ max-width:1180px; margin:22px auto 6px; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; }
  #search{
    flex:1 1 220px; max-width:340px; padding:10px 14px; font-size:15px; color:var(--ink);
    background:var(--panel); border:2px solid #2c2c44; border-radius:10px; outline:none;
    font-family:inherit;
  }
  #search:focus{ border-color:var(--neon); box-shadow:0 0 12px rgba(57,255,136,.25); }
  #search::placeholder{ color:var(--dim); }
  #lucky{
    padding:10px 16px; font-size:15px; cursor:pointer; color:#0b0b12; font-weight:700;
    background:linear-gradient(180deg,var(--gold),#e0a92e); border:none; border-radius:10px;
    font-family:inherit; letter-spacing:.5px; transition:transform .12s ease, box-shadow .12s ease;
  }
  #lucky:hover{ transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,207,77,.35); }
  .chips{ max-width:1180px; margin:8px auto 4px; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .chip{
    padding:7px 14px; font-size:13px; letter-spacing:1px; cursor:pointer; user-select:none;
    color:var(--dim); background:var(--panel); border:2px solid #2c2c44; border-radius:999px;
    font-family:inherit; transition:all .15s ease; text-transform:uppercase;
  }
  .chip:hover{ color:var(--ink); border-color:#454568; }
  .chip.on{ color:#0b0b12; background:var(--neon); border-color:var(--neon); font-weight:700;
    box-shadow:0 0 14px rgba(57,255,136,.4); }
  .chip .n{ opacity:.6; font-size:11px; margin-left:4px; }
  .chip.on .n{ opacity:.75; }
  #count{ text-align:center; color:var(--dim); font-size:13px; margin:10px 0 0; letter-spacing:1px; min-height:18px; }

  /* ---------- grid ---------- */
  .grid{
    max-width:1180px; margin:18px auto 40px; padding:0 16px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:18px;
  }
  .card{
    position:relative; display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
    background:var(--panel); border:2px solid #26263c; border-radius:14px; overflow:hidden;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    cursor:pointer;
  }
  .card:hover{ transform:translateY(-5px) scale(1.015); border-color:var(--ac,#39ff88);
    box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 22px color-mix(in srgb, var(--ac,#39ff88) 35%, transparent); }
  .card.hidden{ display:none; }
  .cover{ position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
  .cover canvas{ width:100%; height:100%; display:block; image-rendering:pixelated; }
  .cover img.poster,.cover video.clip{ position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block; }
  .cover video.clip{ opacity:0; transition:opacity .3s ease; }
  .cover video.clip.show{ opacity:1; }
  .play{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(5,5,12,.35); opacity:0; transition:opacity .16s ease; pointer-events:none;
  }
  .card:hover .play{ opacity:1; }
  .play span{
    font-family:'Courier New',monospace; font-weight:900; letter-spacing:3px; font-size:18px;
    color:#fff; background:color-mix(in srgb, var(--ac,#39ff88) 85%, black); padding:8px 18px;
    border-radius:8px; box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  .info{ padding:12px 14px 13px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .name{ font-weight:800; font-size:16px; letter-spacing:.4px; display:flex; align-items:center; gap:7px; }
  .name .nl{ font-size:11px; font-weight:700; color:#0b0b12; background:var(--gold);
    border-radius:5px; padding:1px 5px; letter-spacing:.5px; }
  .desc{ font-size:13px; color:var(--dim); line-height:1.45; flex:1; }
  .pills{ display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
  .pill{ font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--dim);
    border:1px solid #33334e; border-radius:999px; padding:2px 8px; }
  .ribbon{
    position:absolute; top:10px; left:-32px; transform:rotate(-38deg); z-index:2;
    background:var(--gold); color:#0b0b12; font-size:10px; font-weight:900; letter-spacing:2px;
    padding:3px 36px; box-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none;
  }
  .card.featured{ border-color:#6b5a22; }

  #empty{ display:none; text-align:center; color:var(--dim); padding:50px 20px; font-size:15px; letter-spacing:1px; }
  #empty.show{ display:block; }

  footer{ text-align:center; color:#55536a; font-size:12px; padding:10px 16px 34px; letter-spacing:1px; }
  footer a{ color:var(--dim); }

  /* ---------- snake modal ---------- */
  #snakeModal{ display:none; position:fixed; inset:0; z-index:50; background:rgba(4,4,10,.92);
    align-items:center; justify-content:center; flex-direction:column; gap:12px; padding:16px; }
  #snakeModal.open{ display:flex; }
  #snakeModal h2{ margin:0; color:#0f0; font-family:'Courier New',monospace; letter-spacing:5px; }
  #snakeScore{ color:#0f0; font-family:'Courier New',monospace; }
  #snakeCv{ background:#000; border:2px solid #0f0; max-width:min(90vw,400px); max-height:min(55vh,400px); }
  #snakeMsg{ color:#0f0; font-family:'Courier New',monospace; font-size:14px; min-height:18px; text-align:center; }
  #snakeClose{ margin-top:2px; background:none; border:1px solid #0f0; color:#0f0; padding:8px 22px;
    font-family:'Courier New',monospace; letter-spacing:2px; cursor:pointer; font-size:13px; }
  #snakeClose:hover{ background:rgba(0,255,0,.15); }

  @media (max-width:560px){
    .grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .desc{ display:none; }
    .name{ font-size:14px; }
  }
  @media (prefers-reduced-motion: reduce){
    h1,.marquee::before,.marquee::after{ animation:none; }
  }
</style>
</head>
<body>

<header>
  <div class="marquee"><h1>ROXOR<span class="pink"> ARCADE</span></h1></div>
  <p class="tagline"><b id="total"></b> homemade games &amp; toys — pick your poison</p>
</header>

<div class="toolbar">
  <input id="search" type="search" placeholder="Search games…" autocomplete="off">
  <button id="lucky" title="Open a random game">🎲 Surprise me</button>
</div>
<div class="chips" id="chips"></div>
<div id="count"></div>

<main class="grid" id="grid"></main>
<div id="empty">Nothing here… try another filter 👾</div>

<footer>
  Built one game at a time · <a href="https://github.com/RoxorLoops1337/Games">source on GitHub</a>
</footer>

<!-- Snake easter egg (the old menu WAS snake — it lives on) -->
<div id="snakeModal">
  <h2>SNAKE</h2>
  <div id="snakeScore">Score: 0</div>
  <canvas id="snakeCv" width="400" height="400"></canvas>
  <div id="snakeMsg">Arrow keys / swipe to move</div>
  <button id="snakeClose">EXIT (ESC)</button>
</div>

<script>
'use strict';
/* =========================================================================
   ROXOR ARCADE — game menu with real screenshots + gameplay clips.
   Snake keeps its own tiny animated canvas preview (it's the inline
   easter egg, not an external game with its own capture).
   ========================================================================= */

function drawSnakePreview(c, t){
  c.fillStyle = '#020a02'; c.fillRect(0,0,160,90);
  c.strokeStyle='rgba(0,255,0,.07)';
  for(let x=0;x<160;x+=10){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,90); c.stroke(); }
  for(let y=0;y<90;y+=10){ c.beginPath(); c.moveTo(0,y); c.lineTo(160,y); c.stroke(); }
  // circuit path (cells): rectangle lap 12x5 at (20,20)..(140,70)
  const laps=[], pw=12, ph=5;
  for(let i=0;i<pw;i++) laps.push([20+i*10,20]);
  for(let i=1;i<ph;i++) laps.push([130,20+i*10]);
  for(let i=1;i<pw;i++) laps.push([130-i*10,60]);
  for(let i=1;i<ph-1;i++) laps.push([20,60-i*10]);
  const head=(t*7|0)%laps.length;
  for(let s=0;s<9;s++){
    const p=laps[(head-s+laps.length*2)%laps.length];
    c.fillStyle=s?`rgba(0,255,0,${1-s*.09})`:'#7fff7f';
    c.fillRect(p[0],p[1],9,9);
  }
  if(((t*2)|0)%2){ c.fillStyle='#f00'; c.fillRect(70,40,9,9); }
  c.fillStyle='rgba(0,255,0,.8)'; c.font='8px monospace';
  c.fillText('CLICK TO PLAY',48,14);
}

/* ---------- game catalogue ---------- */
// tags: action, arcade, strategy, cards, sim (tycoon & sim), cozy, music, toys
const GAMES = [
  { id:'nrfh', href:'/no_room_for_heroes/', title:'No Room For Heroes', featured:true, ac:'#ffcf4d',
    desc:'Build the dungeon, feed the monsters, break the heroes. The flagship.', tags:['strategy','action'] },
  { id:'mazekeep', href:'/mazekeep/', title:'Mazekeep', ac:'#7ec8ff',
    desc:'Tower-defense roguelite — wall off the maze and let the towers sing.', tags:['strategy','action'] },
  { id:'ballistic', href:'/ballistic/', title:'Ballistic', ac:'#39ff88',
    desc:'Drag, aim, release — endless volley brick-breaking. One more run.', tags:['arcade','action'] },
  { id:'pitchdeck', href:'/pitchdeck/', title:'Pitch Deck', ac:'#9dff6d',
    desc:'A football roguelike. Play cards to pass, tackle, shoot — lose once and the run ends.', tags:['cards','strategy'] },
  { id:'decktest', href:'/decktest/', title:'Decktest', ac:'#c88aff',
    desc:'Beatbox auto-battler — draft bass, snare and hi-hat units into a deck.', tags:['cards','strategy','music'] },
  { id:'collection', href:'/the_collection/', title:'The Collection', ac:'#ffcf4d',
    desc:'Rip packs, chase rares, fill the binder. A 100-card set to complete.', tags:['cards','cozy'] },
  { id:'verbs', href:'/verb_collector/', title:'Verb Collector', ac:'#e8b86d',
    desc:'A word-built deckbuilder — assemble sentences and swing them as cards.', tags:['cards','strategy'] },
  { id:'evolve', href:'/evolve_and_conquer/', title:'Evolve & Conquer', ac:'#3ad0a0',
    desc:'Bolt parts onto your organism and climb the food chain.', tags:['strategy'] },
  { id:'carnegiendon', href:'/Carnegiendon/', title:'Carnegiendon', ac:'#e8c832',
    desc:'Vehicular mayhem, 1997 style. Nitro, combos and wanted stars.', tags:['action','arcade'] },
  { id:'dhauwie', href:'/DhauwieSurvival/', title:'Dhauwie Survival', ac:'#ff4d6d',
    desc:'The last human vs. the swarm. Drag to aim, fight the recoil, survive the wave.', tags:['action','arcade'] },
  { id:'horde', href:'/horde_runner/', title:'Horde Runner', ac:'#ff5d1e',
    desc:'Run the lane, dodge the lava, shoot through the horde. How deep can you march?', tags:['action','arcade'] },
  { id:'chasehq', href:'/chase_hq/', title:'Jellei H.Q.', ac:'#ff3d3d',
    desc:'Full-throttle pursuit driving — birthday edition. Landscape mode!', tags:['action','arcade'] },
  { id:'kingshot', href:'/kingshot_endless/', title:'Kingshot Endless', ac:'#d05dff',
    desc:'Endless base-builder: staff the castle, collect pets, dash through foe families.', tags:['sim','action'] },
  { id:'nightshift', href:'/night_shift/', title:'Night Shift', ac:'#39ff88',
    desc:'Nurse rush! Triage the ward, carry three patients at once, survive till dawn.', tags:['sim','action'] },
  { id:'gamedev', href:'/gamedevloop/', title:'GameDev Loop', ac:'#9dffd0',
    desc:'Run a studio: shape the retention funnel, squash bugs, survive review day.', tags:['sim','strategy'] },
  { id:'frietkot', href:'/frietkot_tycoon/', title:'Rudy Friet', nl:true, ac:'#ffd94d',
    desc:'Frituur story — run the fry shop the Belgian way.', tags:['sim','cozy'] },
  { id:'carmanager', href:'/carmanager/', title:'CarManager', nl:true, ac:'#f5c518',
    desc:'Shady used-car dealing, Essene 1995. Buy East, haggle hard, watch the heat.', tags:['sim','strategy'] },
  { id:'headliner', href:'/headliner/', title:'Headliner', ac:'#c88aff',
    desc:'DJ idle tycoon. Work the crowd, chase the aliases, headline the world.', tags:['sim','music'] },
  { id:'ranch', href:'/horse_ranch/', title:'Skyhorse Stables', ac:'#87b8e8',
    desc:'Raise, groom and race your horses on a ranch in the clouds.', tags:['sim','cozy'] },
  { id:'beatbox', href:'/beatbox_story/', title:'Beatbox Story', ac:'#7ec8ff',
    desc:'Live the beatboxer life — open mics, rooftops, and rhythm bonuses.', tags:['music','sim'] },
  { id:'loopjam', href:'/loop_jam/', title:'Loop Jam', ac:'#ff3d81',
    desc:'Tap tiles, layer loops — a Rox & Jas jam machine that never falls off beat.', tags:['music','toys'] },
  { id:'messenger', href:'/messenger/', title:'Messenger', ac:'#ff8da1',
    desc:'Cozy deliveries on a tiny planet. Everyone gets their letter.', tags:['cozy'] },
  { id:'cutie', href:'/cutie_merge/', title:'Cutie Merge', ac:'#ffa1c2',
    desc:'Merge two cuties, get a cuter one. Pet everything.', tags:['cozy','arcade'] },
  { id:'wildwalk', href:'/wildwalk/', title:'Wildwalk', ac:'#9dff6d',
    desc:'Catch • Kill • Release — snap decisions as the wildlife parades by.', tags:['arcade','cozy'] },
  { id:'goldrush', href:'/coin_pusher/', title:'Gold Rush', ac:'#ffcf4d',
    desc:'Coin pusher machine — drop coins, tip the hoard over the edge.', tags:['arcade','cozy'] },
  { id:'dungeonpusher', href:'/dungeon_pusher/', title:'Dungeon Pusher', ac:'#c86bff',
    desc:'Coin pusher roguelike — push swords & bombs into the tray to slay what lurks behind the doors.', tags:['arcade','strategy'] },
  { id:'spijker', href:'/spijker_master/', title:'Spijker Master', ac:'#c8ccd4',
    desc:'Steer the nail through the gates, then hammer it home for coins.', tags:['arcade'] },
  { id:'cars90', href:'/nineties_cars/', title:"'90s Cars 3D", ac:'#7ec8ff',
    desc:'Twenty low-poly legends on a turntable. Drag to admire.', tags:['toys'] },
  { id:'ralph', href:'/ralpherizer/', title:'Ralpherizer', ac:'#39ff88',
    desc:'Feed it a sentence, get it Ralpherized. Science.', tags:['toys'] },
  { id:'thieu', href:'/thieu_excuses_app/', title:'Thieu Excuses', nl:true, ac:'#ff9d4d',
    desc:'One button. One perfect excuse. Never be blamed again.', tags:['toys'] },
  { id:'snake', href:'#snake', title:'Snake', ac:'#00ff00', snake:true,
    desc:'The original menu screen refuses to die. Click to play right here.', tags:['arcade'] },
];

const CHIP_DEFS = [
  ['all','All'], ['action','Action'], ['arcade','Arcade'], ['strategy','Strategy'],
  ['cards','Cards'], ['sim','Tycoon & Sim'], ['cozy','Cozy'], ['music','Music'], ['toys','Toys'],
];

/* ---------- build DOM ---------- */
const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
document.getElementById('total').textContent = GAMES.length;

const allCards = []; // every card <a> element, for filtering/search/lucky
const covers = [];   // {el, video, folder} — the 28 real games (posters+clips)
let snakePreview = null; // {ctx, el} — Snake's own tiny live canvas preview

GAMES.forEach(g => {
  const a = document.createElement('a');
  a.className = 'card' + (g.featured ? ' featured' : '');
  a.href = g.href;
  a.style.setProperty('--ac', g.ac);
  a.dataset.tags = g.tags.join(' ');
  a.dataset.text = (g.title + ' ' + g.desc + ' ' + g.tags.join(' ')).toLowerCase();

  const folder = g.snake ? null : g.href.replace(/^\/|\/$/g, '');
  const coverHtml = g.snake
    ? '<canvas class="snakecv" width="160" height="90"></canvas>'
    : `<img class="poster" loading="lazy" src="${folder}/cover.webp" alt="">` +
      `<video class="clip" muted loop playsinline webkit-playsinline preload="none" data-src="${folder}/cover.webm"></video>`;

  a.innerHTML =
    (g.featured ? '<div class="ribbon">FLAGSHIP</div>' : '') +
    `<div class="cover">${coverHtml}<div class="play"><span>${g.snake ? 'INSERT COIN' : 'PLAY ▶'}</span></div></div>` +
    '<div class="info">' +
      `<div class="name">${g.title}${g.nl ? '<span class="nl">NL</span>' : ''}</div>` +
      `<div class="desc">${g.desc}</div>` +
      `<div class="pills">${g.tags.map(tg => `<span class="pill">${(CHIP_DEFS.find(cd => cd[0]===tg)||[,tg])[1]}</span>`).join('')}</div>` +
    '</div>';
  if (g.snake) a.addEventListener('click', e => { e.preventDefault(); openSnake(); });
  grid.appendChild(a);
  allCards.push(a);

  if (g.snake) {
    const cv = a.querySelector('canvas.snakecv');
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    snakePreview = { ctx, el: a, visible: true };
  } else {
    const video = a.querySelector('video.clip');
    covers.push({ el: a, video, started: false });
  }
});

/* ---------- lazy-load + play/pause real gameplay clips on scroll ---------- */
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
if ('IntersectionObserver' in window) {
  const io = new IntersectionObserver(es => es.forEach(e => {
    const cv = covers.find(x => x.el === e.target);
    if (!cv) return;
    if (e.isIntersecting) {
      if (!cv.started) {
        cv.started = true;
        cv.video.addEventListener('playing', () => cv.video.classList.add('show'), { once: true });
        cv.video.src = cv.video.dataset.src;
        cv.video.load();
      }
      if (!reduced) cv.video.play().catch(() => {});
    } else {
      cv.video.pause();
    }
  }), { rootMargin: '150px' });
  covers.forEach(cv => io.observe(cv.el));
} else {
  // no IntersectionObserver support: just load+play everything up front
  covers.forEach(cv => { cv.video.src = cv.video.dataset.src; if (!reduced) cv.video.play().catch(() => {}); cv.video.classList.add('show'); });
}

/* ---------- Snake's own tiny live preview loop ---------- */
if (snakePreview && 'IntersectionObserver' in window) {
  const io2 = new IntersectionObserver(es => es.forEach(e => { snakePreview.visible = e.isIntersecting; }), { rootMargin: '80px' });
  io2.observe(snakePreview.el);
}
let last = 0;
function frame(ms) {
  if (snakePreview && snakePreview.visible && !snakePreview.el.classList.contains('hidden') && ms - last > 40) {
    last = ms;
    try { drawSnakePreview(snakePreview.ctx, ms / 1000); } catch (_) {}
  }
  if (!reduced) requestAnimationFrame(frame);
}
if (snakePreview) { try { drawSnakePreview(snakePreview.ctx, 0.5); } catch (_) {} } // first paint
if (!reduced) requestAnimationFrame(frame);

/* ---------- filtering ---------- */
let activeTag = 'all';
CHIP_DEFS.forEach(([key, label]) => {
  const n = key === 'all' ? GAMES.length : GAMES.filter(g => g.tags.includes(key)).length;
  const b = document.createElement('button');
  b.className = 'chip' + (key === 'all' ? ' on' : '');
  b.innerHTML = `${label}<span class="n">${n}</span>`;
  b.addEventListener('click', () => {
    activeTag = key;
    chipsEl.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    applyFilter();
  });
  chipsEl.appendChild(b);
});

const searchEl = document.getElementById('search');
searchEl.addEventListener('input', applyFilter);

function applyFilter() {
  const q = searchEl.value.trim().toLowerCase();
  let shown = 0;
  allCards.forEach(el => {
    const ok = (activeTag === 'all' || el.dataset.tags.split(' ').includes(activeTag)) &&
               (!q || el.dataset.text.includes(q));
    el.classList.toggle('hidden', !ok);
    if (ok) shown++;
  });
  emptyEl.classList.toggle('show', shown === 0);
  countEl.textContent = shown === GAMES.length ? '' : `${shown} of ${GAMES.length} games`;
}

document.getElementById('lucky').addEventListener('click', () => {
  const pool = covers.filter(cv => !cv.el.classList.contains('hidden'));
  if (!pool.length) return;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  pick.el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  pick.el.style.boxShadow = '0 0 0 3px var(--gold), 0 0 40px rgba(255,207,77,.6)';
  setTimeout(() => { location.href = pick.el.href; }, 650);
});

/* =========================================================================
   SNAKE — the old index.html game, preserved as an easter egg
   ========================================================================= */
const modal = document.getElementById('snakeModal');
const sCv = document.getElementById('snakeCv');
const sCtx = sCv.getContext('2d');
const sScore = document.getElementById('snakeScore');
const sMsg = document.getElementById('snakeMsg');
const cellSize = 20, cols = 20, rows = 20;
let snake, direction, nextDirection, food, score, gameOver, tickHandle = null;

function snakeReset() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  direction = {x:1,y:0}; nextDirection = {x:1,y:0};
  score = 0; gameOver = false;
  placeFood(); sScore.textContent = 'Score: 0';
  sMsg.textContent = 'Arrow keys / swipe to move';
}
function placeFood() {
  while (true) {
    const fx = Math.floor(Math.random()*cols), fy = Math.floor(Math.random()*rows);
    if (!snake.some(s => s.x===fx && s.y===fy)) { food = {x:fx,y:fy}; return; }
  }
}
function snakeTick() {
  if (gameOver) return;
  direction = nextDirection;
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
  if (head.x<0 || head.x>=cols || head.y<0 || head.y>=rows ||
      snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver = true; sMsg.textContent = 'Game Over! Space / tap to restart'; snakeDraw(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score++; sScore.textContent='Score: '+score; placeFood(); }
  else snake.pop();
  snakeDraw();
}
function snakeDraw() {
  sCtx.fillStyle='#000'; sCtx.fillRect(0,0,400,400);
  sCtx.fillStyle='#f00'; sCtx.fillRect(food.x*cellSize, food.y*cellSize, cellSize, cellSize);
  sCtx.fillStyle='#0f0';
  for (const s of snake) sCtx.fillRect(s.x*cellSize, s.y*cellSize, cellSize-1, cellSize-1);
}
function openSnake() {
  modal.classList.add('open');
  snakeReset(); snakeDraw();
  if (tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(snakeTick, 120);
}
function closeSnake() {
  modal.classList.remove('open');
  if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
}
document.getElementById('snakeClose').addEventListener('click', closeSnake);
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('open')) return;
  switch (e.key) {
    case 'ArrowUp':    if (direction.y!==1)  nextDirection={x:0,y:-1}; e.preventDefault(); break;
    case 'ArrowDown':  if (direction.y!==-1) nextDirection={x:0,y:1};  e.preventDefault(); break;
    case 'ArrowLeft':  if (direction.x!==1)  nextDirection={x:-1,y:0}; e.preventDefault(); break;
    case 'ArrowRight': if (direction.x!==-1) nextDirection={x:1,y:0};  e.preventDefault(); break;
    case ' ': if (gameOver) snakeReset(); e.preventDefault(); break;
    case 'Escape': closeSnake(); break;
  }
});
let touchStart = null;
sCv.addEventListener('touchstart', e => {
  touchStart = [e.touches[0].clientX, e.touches[0].clientY];
  if (gameOver) snakeReset();
}, {passive:true});
sCv.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart[0];
  const dy = e.changedTouches[0].clientY - touchStart[1];
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 12 && direction.x!==-1) nextDirection={x:1,y:0};
    else if (dx < -12 && direction.x!==1) nextDirection={x:-1,y:0};
  } else {
    if (dy > 12 && direction.y!==-1) nextDirection={x:0,y:1};
    else if (dy < -12 && direction.y!==1) nextDirection={x:0,y:-1};
  }
  touchStart = null;
}, {passive:true});
modal.addEventListener('click', e => { if (e.target === modal) closeSnake(); });
</script>
