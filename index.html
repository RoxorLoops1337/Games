<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #0f0;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 {
    margin: 10px 0;
    letter-spacing: 4px;
  }
  #score {
    margin-bottom: 10px;
    font-size: 18px;
  }
  canvas {
    background: #000;
    border: 2px solid #0f0;
    display: block;
  }
  #message {
    margin-top: 12px;
    height: 20px;
    font-size: 16px;
  }
  #links {
    margin-top: 8px;
    font-size: 14px;
  }
  #links a { color: #0ff; text-decoration: none; }
  #links a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="message">Use arrow keys to move</div>
  <div id="links"><a href="multiplayer-snake/index.html">&#9654; Play multiplayer online</a></div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const messageEl = document.getElementById('message');

  const cellSize = 20;
  const cols = canvas.width / cellSize;
  const rows = canvas.height / cellSize;

  let snake, direction, nextDirection, food, score, gameOver, tickHandle;

  function reset() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    gameOver = false;
    placeFood();
    updateScore();
    messageEl.textContent = 'Use arrow keys to move';
  }

  function placeFood() {
    while (true) {
      const fx = Math.floor(Math.random() * cols);
      const fy = Math.floor(Math.random() * rows);
      if (!snake.some(s => s.x === fx && s.y === fy)) {
        food = { x: fx, y: fy };
        return;
      }
    }
  }

  function updateScore() {
    scoreEl.textContent = 'Score: ' + score;
  }

  function tick() {
    if (gameOver) return;

    direction = nextDirection;
    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver = true;
      messageEl.textContent = 'Game Over! Press Space to restart';
      draw();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      updateScore();
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#f00';
    ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize, cellSize);

    ctx.fillStyle = '#0f0';
    for (const segment of snake) {
      ctx.fillRect(segment.x * cellSize, segment.y * cellSize, cellSize - 1, cellSize - 1);
    }
  }

  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':
        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        e.preventDefault();
        break;
      case 'ArrowDown':
        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        e.preventDefault();
        break;
      case 'ArrowLeft':
        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        e.preventDefault();
        break;
      case 'ArrowRight':
        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        e.preventDefault();
        break;
      case ' ':
        if (gameOver) {
          reset();
        }
        e.preventDefault();
        break;
    }
  });

  reset();
  draw();
  tickHandle = setInterval(tick, 120);
</script>
</body>
</html>
