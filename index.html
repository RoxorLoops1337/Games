<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROXOR ARCADE — all the games</title>
<meta name="description" content="A homemade arcade: 28 games and toys, from dungeon builders to fry shops.">
<style>
  :root{
    --bg:#0b0b12; --panel:#14141f; --panel2:#1a1a28; --ink:#e8e6f0; --dim:#8b88a0;
    --neon:#39ff88; --neon2:#ff3d81; --gold:#ffcf4d;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; }
  body{ min-height:100%;
    background:
      radial-gradient(1200px 500px at 50% -100px, #1c1533 0%, transparent 60%),
      radial-gradient(900px 400px at 90% 110%, #0e2a1e 0%, transparent 55%),
      var(--bg);
  }

  /* ---------- header ---------- */
  header{ text-align:center; padding:34px 16px 10px; }
  .marquee{
    display:inline-block; padding:14px 34px 12px; border:3px solid #2c2c44; border-radius:14px;
    background:linear-gradient(180deg,#191926,#101018);
    box-shadow:0 0 0 3px #0a0a10, 0 0 28px rgba(57,255,136,.13), inset 0 0 22px rgba(0,0,0,.6);
    position:relative;
  }
  .marquee::before,.marquee::after{
    content:''; position:absolute; top:8px; bottom:8px; width:6px; border-radius:3px;
    background:repeating-linear-gradient(180deg,var(--gold) 0 6px,transparent 6px 12px);
    opacity:.7; animation:bulbs 1s steps(2) infinite;
  }
  .marquee::before{ left:8px; } .marquee::after{ right:8px; animation-delay:.5s; }
  @keyframes bulbs{ 50%{ opacity:.25; } }
  h1{
    margin:0; font-family:'Courier New',monospace; font-weight:900; letter-spacing:6px;
    font-size:clamp(26px,6vw,46px); color:var(--neon);
    text-shadow:0 0 6px rgba(57,255,136,.9), 0 0 24px rgba(57,255,136,.45), 0 0 60px rgba(57,255,136,.25);
    animation:flicker 7s infinite;
  }
  h1 .pink{ color:var(--neon2);
    text-shadow:0 0 6px rgba(255,61,129,.9), 0 0 24px rgba(255,61,129,.45), 0 0 60px rgba(255,61,129,.25); }
  @keyframes flicker{ 0%,93%,95%,97%,100%{opacity:1} 94%,96%{opacity:.55} }
  .tagline{ margin:12px 0 0; color:var(--dim); font-size:14px; letter-spacing:2px; text-transform:uppercase; }
  .tagline b{ color:var(--ink); }

  /* ---------- toolbar ---------- */
  .toolbar{ max-width:1180px; margin:22px auto 6px; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; }
  #search{
    flex:1 1 220px; max-width:340px; padding:10px 14px; font-size:15px; color:var(--ink);
    background:var(--panel); border:2px solid #2c2c44; border-radius:10px; outline:none;
    font-family:inherit;
  }
  #search:focus{ border-color:var(--neon); box-shadow:0 0 12px rgba(57,255,136,.25); }
  #search::placeholder{ color:var(--dim); }
  #lucky{
    padding:10px 16px; font-size:15px; cursor:pointer; color:#0b0b12; font-weight:700;
    background:linear-gradient(180deg,var(--gold),#e0a92e); border:none; border-radius:10px;
    font-family:inherit; letter-spacing:.5px; transition:transform .12s ease, box-shadow .12s ease;
  }
  #lucky:hover{ transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,207,77,.35); }
  .chips{ max-width:1180px; margin:8px auto 4px; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .chip{
    padding:7px 14px; font-size:13px; letter-spacing:1px; cursor:pointer; user-select:none;
    color:var(--dim); background:var(--panel); border:2px solid #2c2c44; border-radius:999px;
    font-family:inherit; transition:all .15s ease; text-transform:uppercase;
  }
  .chip:hover{ color:var(--ink); border-color:#454568; }
  .chip.on{ color:#0b0b12; background:var(--neon); border-color:var(--neon); font-weight:700;
    box-shadow:0 0 14px rgba(57,255,136,.4); }
  .chip .n{ opacity:.6; font-size:11px; margin-left:4px; }
  .chip.on .n{ opacity:.75; }
  #count{ text-align:center; color:var(--dim); font-size:13px; margin:10px 0 0; letter-spacing:1px; min-height:18px; }

  /* ---------- grid ---------- */
  .grid{
    max-width:1180px; margin:18px auto 40px; padding:0 16px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:18px;
  }
  .card{
    position:relative; display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
    background:var(--panel); border:2px solid #26263c; border-radius:14px; overflow:hidden;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    cursor:pointer;
  }
  .card:hover{ transform:translateY(-5px) scale(1.015); border-color:var(--ac,#39ff88);
    box-shadow:0 10px 30px rgba(0,0,0,.55), 0 0 22px color-mix(in srgb, var(--ac,#39ff88) 35%, transparent); }
  .card.hidden{ display:none; }
  .cover{ position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
  .cover canvas{ width:100%; height:100%; display:block; image-rendering:pixelated; }
  .play{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(5,5,12,.35); opacity:0; transition:opacity .16s ease; pointer-events:none;
  }
  .card:hover .play{ opacity:1; }
  .play span{
    font-family:'Courier New',monospace; font-weight:900; letter-spacing:3px; font-size:18px;
    color:#fff; background:color-mix(in srgb, var(--ac,#39ff88) 85%, black); padding:8px 18px;
    border-radius:8px; box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  .info{ padding:12px 14px 13px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .name{ font-weight:800; font-size:16px; letter-spacing:.4px; display:flex; align-items:center; gap:7px; }
  .name .nl{ font-size:11px; font-weight:700; color:#0b0b12; background:var(--gold);
    border-radius:5px; padding:1px 5px; letter-spacing:.5px; }
  .desc{ font-size:13px; color:var(--dim); line-height:1.45; flex:1; }
  .pills{ display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
  .pill{ font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--dim);
    border:1px solid #33334e; border-radius:999px; padding:2px 8px; }
  .ribbon{
    position:absolute; top:10px; left:-32px; transform:rotate(-38deg); z-index:2;
    background:var(--gold); color:#0b0b12; font-size:10px; font-weight:900; letter-spacing:2px;
    padding:3px 36px; box-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none;
  }
  .card.featured{ border-color:#6b5a22; }

  #empty{ display:none; text-align:center; color:var(--dim); padding:50px 20px; font-size:15px; letter-spacing:1px; }
  #empty.show{ display:block; }

  footer{ text-align:center; color:#55536a; font-size:12px; padding:10px 16px 34px; letter-spacing:1px; }
  footer a{ color:var(--dim); }

  /* ---------- snake modal ---------- */
  #snakeModal{ display:none; position:fixed; inset:0; z-index:50; background:rgba(4,4,10,.92);
    align-items:center; justify-content:center; flex-direction:column; gap:12px; padding:16px; }
  #snakeModal.open{ display:flex; }
  #snakeModal h2{ margin:0; color:#0f0; font-family:'Courier New',monospace; letter-spacing:5px; }
  #snakeScore{ color:#0f0; font-family:'Courier New',monospace; }
  #snakeCv{ background:#000; border:2px solid #0f0; max-width:min(90vw,400px); max-height:min(55vh,400px); }
  #snakeMsg{ color:#0f0; font-family:'Courier New',monospace; font-size:14px; min-height:18px; text-align:center; }
  #snakeClose{ margin-top:2px; background:none; border:1px solid #0f0; color:#0f0; padding:8px 22px;
    font-family:'Courier New',monospace; letter-spacing:2px; cursor:pointer; font-size:13px; }
  #snakeClose:hover{ background:rgba(0,255,0,.15); }

  @media (max-width:560px){
    .grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .desc{ display:none; }
    .name{ font-size:14px; }
  }
  @media (prefers-reduced-motion: reduce){
    h1,.marquee::before,.marquee::after{ animation:none; }
  }
</style>
</head>
<body>

<header>
  <div class="marquee"><h1>ROXOR<span class="pink"> ARCADE</span></h1></div>
  <p class="tagline"><b id="total"></b> homemade games &amp; toys — pick your poison</p>
</header>

<div class="toolbar">
  <input id="search" type="search" placeholder="Search games…" autocomplete="off">
  <button id="lucky" title="Open a random game">🎲 Surprise me</button>
</div>
<div class="chips" id="chips"></div>
<div id="count"></div>

<main class="grid" id="grid"></main>
<div id="empty">Nothing here… try another filter 👾</div>

<footer>
  Built one game at a time · <a href="https://github.com/RoxorLoops1337/Games">source on GitHub</a>
</footer>

<!-- Snake easter egg (the old menu WAS snake — it lives on) -->
<div id="snakeModal">
  <h2>SNAKE</h2>
  <div id="snakeScore">Score: 0</div>
  <canvas id="snakeCv" width="400" height="400"></canvas>
  <div id="snakeMsg">Arrow keys / swipe to move</div>
  <button id="snakeClose">EXIT (ESC)</button>
</div>

<script>
'use strict';
/* =========================================================================
   ROXOR ARCADE — game menu with procedural animated covers.
   Every cover is a tiny 160x90 canvas scene drawn from (ctx, t seconds).
   ========================================================================= */

const TAU = Math.PI*2;
// deterministic pseudo-random: same n -> same value, no per-frame flicker
const rnd = n => { const x = Math.sin(n*127.1+311.7)*43758.5453; return x - Math.floor(x); };

/* ---------- shared scene helpers (W=160, H=90) ---------- */
function bg(c, col){ c.fillStyle = col; c.fillRect(0,0,160,90); }
function vgrad(c, top, bot, h=90){
  const g = c.createLinearGradient(0,0,0,h); g.addColorStop(0,top); g.addColorStop(1,bot);
  c.fillStyle = g; c.fillRect(0,0,160,h);
}
function stars(c, t, n=26){
  for(let i=0;i<n;i++){
    const tw = .4 + .6*Math.abs(Math.sin(t*2 + i*1.7));
    c.fillStyle = `rgba(255,255,255,${(0.25+rnd(i)*0.5)*tw})`;
    c.fillRect((rnd(i*3)*160)|0, (rnd(i*7)*60)|0, 1, 1);
  }
}
function dot(c, x, y, r, col){ c.fillStyle = col; c.beginPath(); c.arc(x,y,r,0,TAU); c.fill(); }
function guy(c, x, y, col, s=1){ // tiny person: head + body
  c.fillStyle = col;
  c.fillRect(x-1*s, y-6*s, 3*s, 4*s);
  dot(c, x+0.5*s, y-8*s, 1.6*s, col);
}

/* ---------- per-game cover scenes ---------- */
const SCENES = {

  nrfh(c,t){ // dungeon side-view: torches, marching heroes, boss eyes
    bg(c,'#0d0a12');
    c.fillStyle='#2a2036'; c.fillRect(0,64,160,26);          // floor
    c.fillStyle='#1a1424';
    for(let i=0;i<4;i++){ const x=14+i*38; c.fillRect(x,20,28,44); }   // rooms
    c.fillStyle='#0d0a12';
    for(let i=0;i<4;i++){ const x=14+i*38; c.fillRect(x+9,34,10,30); } // doorways
    for(let i=0;i<4;i++){                                    // torches
      const x=20+i*38, f=.6+.4*rnd((t*9|0)+i);
      dot(c,x,26,2.5,`rgba(255,${140+f*80|0},40,${f})`);
      dot(c,x,26,5,`rgba(255,150,40,${f*.22})`);
    }
    for(let i=0;i<3;i++){                                    // heroes march in
      const x=160-((t*22+i*44)%190);
      guy(c,x,72,['#6db2ff','#ffd36d','#9dff6d'][i],1.4);
    }
    const b=.5+.5*Math.sin(t*3);                             // boss eyes, left
    c.fillStyle=`rgba(255,40,60,${.6+.4*b})`;
    c.fillRect(4,42,4,3); c.fillRect(11,42,4,3);
    dot(c,9,44,9,`rgba(255,30,60,${.12+.1*b})`);
  },

  mazekeep(c,t){ // maze path, creeps, tower zaps
    bg(c,'#0c1410');
    c.strokeStyle='#22402e'; c.lineWidth=10; c.lineJoin='round';
    const P=[[0,60],[46,60],[46,26],[104,26],[104,64],[160,64]];
    c.beginPath(); P.forEach((p,i)=> i?c.lineTo(p[0],p[1]):c.moveTo(p[0],p[1])); c.stroke();
    const segLen=[46,34,58,38,56], tot=232;
    const along=d=>{ let r=d%tot; for(let i=0;i<5;i++){ if(r<=segLen[i]){ const a=P[i],b=P[i+1];
      return [a[0]+(b[0]-a[0])*r/segLen[i], a[1]+(b[1]-a[1])*r/segLen[i]]; } r-=segLen[i]; } return P[5]; };
    const creeps=[]; for(let i=0;i<4;i++) creeps.push(along(t*34+i*26));
    c.fillStyle='#39221c';
    c.fillRect(66,42,10,10); c.fillRect(120,38,10,10);       // tower bases
    c.fillStyle='#7ec8ff'; c.fillRect(68,38,6,6); c.fillRect(122,34,6,6);
    const zap=(t*2.4|0)%2, tw=zap?[71,41]:[125,37], tg=creeps[zap?1:2];
    c.strokeStyle=`rgba(126,200,255,${.4+.5*rnd(t*8|0)})`; c.lineWidth=1;
    c.beginPath(); c.moveTo(tw[0],tw[1]); c.lineTo(tg[0],tg[1]); c.stroke();
    creeps.forEach((p,i)=> dot(c,p[0],p[1],3,i%2?'#ff5d5d':'#ff9d4d'));
  },

  ballistic(c,t){ // bricks + bouncing volley + aim line
    bg(c,'#0a0e1c');
    for(let r=0;r<3;r++) for(let i=0;i<8;i++){
      if(rnd(r*8+i)<.25) continue;
      c.fillStyle=['#ff3d81','#ffcf4d','#39ff88'][(r+i)%3];
      c.fillRect(4+i*19,6+r*11,17,9);
    }
    const bx=Math.abs(((t*95)%300)-150)+5, by=Math.abs(((t*70)%116)-58)+34;
    c.strokeStyle='rgba(255,255,255,.25)'; c.setLineDash([3,3]);
    c.beginPath(); c.moveTo(80,88); c.lineTo(bx,by); c.stroke(); c.setLineDash([]);
    for(let k=1;k<5;k++){                                    // trail
      const tx=Math.abs((((t-k*.04)*95)%300)-150)+5, ty=Math.abs((((t-k*.04)*70)%116)-58)+34;
      dot(c,tx,ty,2.5-k*.4,`rgba(140,220,255,${.5-k*.1})`);
    }
    dot(c,bx,by,3,'#dff4ff'); dot(c,80,88,4,'#ffcf4d');
  },

  carnegiendon(c,t){ // top-down streets, drifting car, wanted stars
    bg(c,'#26262b');
    c.fillStyle='#1c1c20'; c.fillRect(0,0,160,14); c.fillRect(0,76,160,14);
    c.fillRect(0,0,18,90); c.fillRect(142,0,18,90);          // sidewalks
    c.strokeStyle='#4a4a35'; c.setLineDash([6,6]); c.lineWidth=1;
    c.beginPath(); c.moveTo(18,45); c.lineTo(142,45); c.stroke(); c.setLineDash([]);
    const cx=80+Math.cos(t*1.4)*44, cy=45+Math.sin(t*2.8)*22;
    for(let k=1;k<9;k++){                                    // skid trail
      const px=80+Math.cos((t-k*.05)*1.4)*44, py=45+Math.sin((t-k*.05)*2.8)*22;
      c.fillStyle=`rgba(10,10,10,${.5-k*.05})`; c.fillRect(px-2,py-2,4,4);
    }
    c.save(); c.translate(cx,cy); c.rotate(Math.atan2(Math.cos(t*2.8)*2.8*22,-Math.sin(t*1.4)*1.4*44));
    c.fillStyle='#e8c832'; c.fillRect(-7,-4,14,8);
    c.fillStyle='#222'; c.fillRect(1,-4,3,8); c.restore();
    for(let i=0;i<3;i++){                                    // wanted stars
      const on=(t*1.5|0)%4>i;
      c.fillStyle=on?'#ffcf4d':'#3a3a44'; c.font='10px monospace'; c.fillText('★',126+i*11,12);
    }
  },

  dhauwie(c,t){ // arena survivor: closing enemy ring + muzzle flash
    bg(c,'#120d1a');
    c.strokeStyle='#241a33'; c.lineWidth=1;
    for(let i=0;i<5;i++){ c.beginPath(); c.arc(80,45,12+i*11,0,TAU); c.stroke(); }
    const shrink=42-((t*26)%42);
    for(let i=0;i<9;i++){
      const a=i/9*TAU+t*.3, r=shrink+rnd(i)*8;
      dot(c,80+Math.cos(a)*r*1.5,45+Math.sin(a)*r*.8,2.5,'#ff4d6d');
    }
    const fa=rnd(t*4|0)*TAU;                                 // muzzle flash
    c.strokeStyle=`rgba(255,240,150,${.8*rnd(t*11|0)})`; c.lineWidth=2;
    c.beginPath(); c.moveTo(80,45); c.lineTo(80+Math.cos(fa)*55,45+Math.sin(fa)*30); c.stroke();
    guy(c,80,50,'#e8f4ff',1.6);
  },

  horde(c,t){ // lane runner: scrolling lava, runner, horde
    bg(c,'#171313');
    c.fillStyle='#241d1d'; c.fillRect(30,0,100,90);          // lane
    for(let i=0;i<4;i++){                                    // lava bars scroll down
      const y=((i*34+t*52)%124)-17;
      c.fillStyle='#ff5d1e'; c.fillRect(30+((i%2)*50),y,50,7);
      c.fillStyle='#ffcf4d'; c.fillRect(30+((i%2)*50)+6,y+2,38,2);
    }
    const rx=80+Math.sin(t*2.2)*24;
    for(let i=0;i<3;i++)                                     // bullets
      dot(c,rx,((70-((t*140+i*40)%90))),1.5,'#fff2b0');
    guy(c,rx,76,'#7ee0ff',1.6);
    for(let i=0;i<8;i++) guy(c,20+rnd(i)*120,92+rnd(i*3)*6,'#9dff6d',1.1); // horde behind
  },

  chasehq(c,t){ // pseudo-3D chase: road, stripes, swaying car, sirens
    vgrad(c,'#1a1040','#3d1f66',40); c.fillStyle='#120d20'; c.fillRect(0,40,160,50);
    c.fillStyle='#2e2e38'; c.beginPath();
    c.moveTo(70,40); c.lineTo(90,40); c.lineTo(150,90); c.lineTo(10,90); c.fill();
    c.fillStyle='#e8e0c0';
    for(let i=0;i<5;i++){                                    // center dashes rush at you
      const p=((i/5+t*.9)%1), y=40+p*50, w=1+p*4, h=2+p*6;
      c.fillRect(80-w/2, y, w, h);
    }
    const sway=Math.sin(t*3)*8;
    c.fillStyle='#c22'; c.fillRect(64+sway,64,32,16);        // hero car
    c.fillStyle='#111'; c.fillRect(66+sway,80,8,5); c.fillRect(86+sway,80,8,5);
    c.fillStyle='#7ec8ff'; c.fillRect(70+sway,67,20,5);
    const fx=76-sway*.4;
    c.fillStyle='#555'; c.fillRect(fx,48,9,6);               // fleeing car up the road
    const siren=(t*6|0)%2;                                   // sirens
    dot(c,68+sway,63,2.5,siren?'#ff3d3d':'#3d6dff');
    dot(c,92+sway,63,2.5,siren?'#3d6dff':'#ff3d3d');
    dot(c,80,20,7,'rgba(255,240,200,.8)');                   // moon
  },

  cars90(c,t){ // showroom turntable, fake-rotating low-poly car
    vgrad(c,'#101022','#232338');
    c.fillStyle='#2c2c48'; c.beginPath(); c.ellipse(80,68,52,10,0,0,TAU); c.fill();
    const sq=Math.cos(t*1.2), w=Math.max(.25,Math.abs(sq)), hue=(t*30)%360;
    c.save(); c.translate(80,58); c.scale(w,1);
    c.fillStyle=`hsl(${hue},70%,55%)`;
    c.beginPath(); c.moveTo(-46,0); c.lineTo(-34,-12); c.lineTo(-12,-20); c.lineTo(18,-20);
    c.lineTo(34,-10); c.lineTo(46,0); c.lineTo(46,8); c.lineTo(-46,8); c.fill();
    c.fillStyle='#0e0e18';
    c.beginPath(); c.arc(-26,8,7,0,TAU); c.arc(28,8,7,0,TAU); c.fill();
    c.fillStyle=`hsl(${hue},40%,25%)`; c.fillRect(-10,-17,24,8);
    c.restore();
    c.fillStyle='rgba(255,255,255,.5)'; c.font='8px monospace'; c.fillText("'9"+((t|0)%10),8,14);
  },

  kingshot(c,t){ // castle volleys arrows at marching foes
    vgrad(c,'#12203a','#1d3a2a');
    c.fillStyle='#2f5d3a'; c.fillRect(0,66,160,24);
    c.fillStyle='#6a6a78'; c.fillRect(10,26,26,44);          // tower
    c.fillStyle='#54545f'; for(let i=0;i<4;i++) c.fillRect(10+i*7,20,5,7);
    c.fillStyle='#ffcf4d'; c.fillRect(19,38,8,8);            // window glow
    for(let i=0;i<3;i++){                                    // arrow arcs
      const p=(t*.8+i*.33)%1, x=36+p*112, y=40-Math.sin(p*Math.PI)*30+i*6;
      c.save(); c.translate(x,y+14); c.rotate(Math.atan2(.6-Math.sin(p*Math.PI+.2),1));
      c.fillStyle='#e8dcc0'; c.fillRect(-4,0,8,1.5); c.restore();
    }
    for(let i=0;i<4;i++){                                    // foe family walks left
      const x=170-((t*18+i*30)%160);
      guy(c,x,74,i%2?'#ff6d5d':'#d05dff',1.3);
    }
    const sp=(t*2|0)%3;                                      // coin sparkle

  cutie(c,t){ // two blobs waddle together and merge, hearts pop
    vgrad(c,'#2a1830','#3d2244');
    const p=(t%2.4)/2.4, m=Math.min(1,p*1.7), gap=52*(1-m);
    const blob=(x,y,r,col,ph)=>{
      const sq=1+Math.sin(t*6+ph)*.08;
      c.fillStyle=col; c.beginPath(); c.ellipse(x,y,r*sq,r/sq,0,0,TAU); c.fill();
      c.fillStyle='#241222';
      dot(c,x-r*.3,y-r*.15,1.5,'#241222'); dot(c,x+r*.3,y-r*.15,1.5,'#241222');
      c.beginPath(); c.arc(x,y+r*.15,r*.25,0.2,Math.PI-.2); c.strokeStyle='#241222'; c.lineWidth=1; c.stroke();
    };
    if(p<.6){ blob(80-gap/2-12,56,11,'#ffa1c2',0); blob(80+gap/2+12,56,11,'#a1d8ff',2); }
    else{
      blob(80,54,15+Math.sin((p-.6)*8)*2,'#d9a1ff',1);
      for(let i=0;i<4;i++){ const q=(p-.6)/.4;
        c.fillStyle=`rgba(255,120,170,${1-q})`; c.font='9px monospace';
        c.fillText('♥',70+rnd(i)*24, 40-q*22-rnd(i*5)*8);
      }
    }
    for(let i=0;i<8;i++) dot(c,rnd(i*2)*160,rnd(i*9)*90,1,'rgba(255,200,230,.35)');
  },

  nightshift(c,t){ // ward + scrolling ECG + dashing nurse
    bg(c,'#0d1a1c');

    for(let x=0;x<160;x++){
      const ph=((x+t*70)%56)/56; let y=26;
      if(ph>.42&&ph<.5) y=26-(ph-.42)*260; else if(ph>=.5&&ph<.58) y=5.2+(ph-.5)*260;
      x?c.lineTo(x,y):c.moveTo(x,y);
    } c.stroke();
    c.fillStyle='rgba(57,255,136,.08)'; c.fillRect(0,0,160,44);
    for(let i=0;i<3;i++){                                    // beds
      const x=14+i*52;
      c.fillStyle='#e8e6f0'; c.fillRect(x,62,34,12);
      c.fillStyle='#4d7dff'; c.fillRect(x,58,34,6);
      dot(c,x+6,58,3.5,'#ffd9b0');
      const bad=(t*1.3+i|0)%3===0;                           // patient alert
      if(bad){ c.fillStyle=`rgba(255,60,60,${.5+.5*Math.sin(t*8)})`; c.font='9px monospace'; c.fillText('!',x+30,56); }
    }
    guy(c,80+Math.sin(t*2.6)*56,84,'#ffffff',1.5);
  },

  ranch(c,t){ // field, fence, galloping horse

  },

  messenger(c,t){ // tiny planet, orbiting courier, blinking parcels

  wildwalk(c,t){ // forest parade + 3 action buttons

  frietkot(c,t){ // frituur: cone of fries, steam, BE flag

    for(let i=0;i<9;i++){                                    // fries
      const x=68+i*5, h=12+rnd(i)*10, sw=Math.sin(t*2+i)*1.5;

  headliner(c,t){ // DJ set: EQ bars, jumping crowd, strobe
    bg(c,'#0c0a14');

  gamedev(c,t){ // retention funnel with flowing players + bug
    bg(c,'#0e1218');

    for(let i=0;i<stages;i++){                               // funnel stages

      const drop=rnd(i*7)<p*.8;
      const y=drop? 45+hh/2+(p*40)%22 : 45+(rnd(i*3)-.5)*(hh-6);
      dot(c,x,y,1.5,drop?'rgba(255,90,90,.7)':'#9dffd0');
    }
    const bx=80+Math.sin(t*1.7)*60;                          // the bug
    c.fillStyle='#ff4d4d'; dot(c,bx,78,3,'#ff4d4d');
    c.strokeStyle='#ff4d4d';
    for(let l=0;l<3;l++){ c.beginPath(); c.moveTo(bx-3,76+l*2); c.lineTo(bx-6,74+l*3); c.stroke();
      c.beginPath(); c.moveTo(bx+3,76+l*2); c.lineTo(bx+6,74+l*3); c.stroke(); }
    c.fillStyle='#8b88a0'; c.font='8px monospace'; c.fillText('RETENTION',6,14);
  },

  beatbox(c,t){ // night skyline, mic, expanding sound rings

      const x=i*24-4, h=20+rnd(i)*30;
      c.fillStyle='#12142a'; c.fillRect(x,90-h,20,h);

    c.fillStyle='#333344';
    for(let y=-5;y<5;y+=3) c.fillRect(74,40+y,12,1);
    c.fillStyle='#555566'; c.fillRect(78,47,4,16);
    c.fillStyle='#8b88a0'; c.fillRect(72,63,16,3);
  },

  loopjam(c,t){ // step sequencer sweep
    bg(c,'#141020');

    for(let gx=0;gx<4;gx++) for(let gy=0;gy<3;gy++){

  verbs(c,t){ // floating word cards

    card(80,44+Math.sin(t*1.6+2)*4, Math.sin(t+1)*0.04, '#3a7ad0', 3);
    card(120,46+Math.sin(t*1.6+4)*4, .12+Math.sin(t+2)*0.03, '#3ad07a', 3);

  evolve(c,t){ // primordial soup: pulsing organism, fleeing fish
    vgrad(c,'#04202a','#062e24');

      const p=(t*.25+i*.17)%1;

      c.beginPath(); c.moveTo(px-8,py+4);
      c.quadraticCurveTo(px-16-i*3, py+8+Math.sin(t*5+i)*4, px-22-i*4, py+2+i*6); c.stroke(); }
    dot(c,px+5,py-4,2.2,'#082a20'); dot(c,px+5.6,py-4.6,.8,'#d0ffe8'); // eye
    for(let i=0;i<4;i++){                                    // fleeing fish

      c.fillStyle='#8ad0e0';
      c.beginPath(); c.moveTo(fx,fy); c.lineTo(fx+7,fy-3); c.lineTo(fx+7,fy+3); c.fill();
    }
  },

  collection(c,t){ // pack rip: cards fan out, gold rare sparkles
    vgrad(c,'#123020','#0c2416');

  decktest(c,t){ // auto-battler: two card rows clash

  pitchdeck(c,t){ // top-down pitch, passing play, card played
    bg(c,'#1d5a2e');
    c.fillStyle='#226635';
    for(let i=0;i<5;i++) if(i%2) c.fillRect(0,i*18,160,18);   // mow stripes

    c.beginPath(); c.arc(80,45,13,0,TAU); c.stroke();
    c.strokeRect(6,26,16,38); c.strokeRect(138,26,16,38);
    const R=[[30,30],[52,60],[86,26],[112,52],[136,44]];      // pass chain
    const seg=(t*.9%1)*4|0, sp=(t*.9%1)*4%1;

  spijker(c,t){ // nail steering through gates

      c.fillStyle='#39ff88'; c.fillRect(gx-24,y,4,7); c.fillRect(gx+20,y,4,7);

  thieu(c,t){ // chat app: excuses bubbles + typing dots
    bg(c,'#101418');
    c.fillStyle='#1c2228'; c.fillRect(0,0,160,14);
    c.fillStyle='#e8e6f0'; c.font='8px monospace'; c.fillText('🦊 Thieu',6,10);
    dot(c,150,7,3,'#39ff88');
    const step=(t*.9|0)%4;
    const bubble=(y,left,w,col)=>{ c.fillStyle=col;
      const x=left?8:152-w;
      c.beginPath(); c.roundRect ? c.roundRect(x,y,w,14,5) : c.rect(x,y,w,14); c.fill();
      c.fillStyle='rgba(255,255,255,.5)';
      for(let l=0;l<3;l++) c.fillRect(x+6+l*(w/3.6), y+6, w/5, 2);
    };
    if(step>=0) bubble(20,true,74,'#233240');
    if(step>=1) bubble(38,false,92,'#2e5a3a');
    if(step>=2) bubble(56,true,60,'#233240');
    if(step===3){ bubble(74,false,80,'#2e5a3a'); }
    else{                                                    // typing dots
      c.fillStyle='#233240'; c.fillRect(118,74,34,14);
      for(let i=0;i<3;i++)
        dot(c,127+i*8, 81-(((t*3|0)%3)===i?2.5:0), 2, '#8b88a0');
    }
  },

  ralph(c,t){ // text scrambler terminal
    bg(c,'#0c1210');
    c.fillStyle='#0f1a14'; c.fillRect(8,14,144,20); c.fillRect(8,52,144,20);
    c.font='11px monospace';
    const G='RALPHERIZERabcdxyz*#@!~%&', k=(t*7|0);
    c.fillStyle='#8b88a0';
    for(let i=0;i<11;i++) c.fillText(G[(rnd(k*.13+i)*G.length)|0], 16+i*12.5, 28);
    c.fillStyle='#39ff88';
    for(let i=0;i<11;i++){
      const settled=rnd(i)*8<(t%6);
      c.fillText(settled?'RALPHERIZED'[i]:G[(rnd(k+i*9)*G.length)|0], 16+i*12.5, 66);
    }
    const p=(t*1.4%1);                                       // arrow pulse
    c.fillStyle=`rgba(255,207,77,${.5+.5*Math.sin(t*4)})`;
    c.beginPath(); c.moveTo(74,38); c.lineTo(86,43); c.lineTo(74,48); c.fill();
    if(((t*2)|0)%2) { c.fillStyle='#39ff88'; c.fillRect(146,58,6,10); } // cursor
  },

  snake(c,t){ // the OG: snake doing laps + blinking food
    bg(c,'#020a02');
    c.strokeStyle='rgba(0,255,0,.07)';
    for(let x=0;x<160;x+=10){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,90); c.stroke(); }
    for(let y=0;y<90;y+=10){ c.beginPath(); c.moveTo(0,y); c.lineTo(160,y); c.stroke(); }
    // circuit path (cells): rectangle lap 12x5 at (20,20)..(140,70)
    const laps=[], pw=12, ph=5;
    for(let i=0;i<pw;i++) laps.push([20+i*10,20]);
    for(let i=1;i<ph;i++) laps.push([130,20+i*10]);
    for(let i=1;i<pw;i++) laps.push([130-i*10,60]);
    for(let i=1;i<ph-1;i++) laps.push([20,60-i*10]);
    const head=(t*7|0)%laps.length;
    for(let s=0;s<9;s++){
      const p=laps[(head-s+laps.length*2)%laps.length];
      c.fillStyle=s?`rgba(0,255,0,${1-s*.09})`:'#7fff7f';
      c.fillRect(p[0],p[1],9,9);
    }
    if(((t*2)|0)%2){ c.fillStyle='#f00'; c.fillRect(70,40,9,9); }
    c.fillStyle='rgba(0,255,0,.8)'; c.font='8px monospace';
    c.fillText('CLICK TO PLAY',48,14);
  },
};

/* ---------- build DOM ---------- */
const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
document.getElementById('total').textContent = GAMES.length;

const covers = []; // {ctx, scene, el, visible}

GAMES.forEach(g => {
  const a = document.createElement('a');
  a.className = 'card' + (g.featured ? ' featured' : '');
  a.href = g.href;
  a.style.setProperty('--ac', g.ac);
  a.dataset.tags = g.tags.join(' ');
  a.dataset.text = (g.title + ' ' + g.desc + ' ' + g.tags.join(' ')).toLowerCase();
  a.innerHTML =
    (g.featured ? '<div class="ribbon">FLAGSHIP</div>' : '') +
    '<div class="cover"><canvas width="160" height="90"></canvas>' +
    `<div class="play"><span>${g.snake ? 'INSERT COIN' : 'PLAY ▶'}</span></div></div>` +
    '<div class="info">' +
      `<div class="name">${g.title}${g.nl ? '<span class="nl">NL</span>' : ''}</div>` +
      `<div class="desc">${g.desc}</div>` +
      `<div class="pills">${g.tags.map(tg => `<span class="pill">${(CHIP_DEFS.find(cd => cd[0]===tg)||[,tg])[1]}</span>`).join('')}</div>` +
    '</div>';
  if (g.snake) a.addEventListener('click', e => { e.preventDefault(); openSnake(); });
  grid.appendChild(a);
  const ctx = a.querySelector('canvas').getContext('2d');
  ctx.imageSmoothingEnabled = false;
  covers.push({ ctx, scene: SCENES[g.id], el: a, visible: true });
});

/* ---------- cover animation loop ---------- */
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
if ('IntersectionObserver' in window) {
  const io = new IntersectionObserver(es => es.forEach(e => {
    const cv = covers.find(x => x.el === e.target);
    if (cv) cv.visible = e.isIntersecting;
  }), { rootMargin: '80px' });
  covers.forEach(cv => io.observe(cv.el));
}
let last = 0;
function frame(ms) {
  if (ms - last > 40) { // ~25fps is plenty for pixel covers
    last = ms;
    const t = ms / 1000;
    for (const cv of covers) {
      if (!cv.visible || cv.el.classList.contains('hidden')) continue;
      try { cv.scene(cv.ctx, t); } catch (_) {}
    }
  }
  if (!reduced) requestAnimationFrame(frame);
}
covers.forEach(cv => { try { cv.scene(cv.ctx, 0.5); } catch (_) {} }); // first paint
if (!reduced) requestAnimationFrame(frame);

/* ---------- filtering ---------- */
let activeTag = 'all';
CHIP_DEFS.forEach(([key, label]) => {
  const n = key === 'all' ? GAMES.length : GAMES.filter(g => g.tags.includes(key)).length;
  const b = document.createElement('button');
  b.className = 'chip' + (key === 'all' ? ' on' : '');
  b.innerHTML = `${label}<span class="n">${n}</span>`;
  b.addEventListener('click', () => {
    activeTag = key;
    chipsEl.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    applyFilter();
  });
  chipsEl.appendChild(b);
});

const searchEl = document.getElementById('search');
searchEl.addEventListener('input', applyFilter);

function applyFilter() {
  const q = searchEl.value.trim().toLowerCase();
  let shown = 0;
  covers.forEach(cv => {
    const ok = (activeTag === 'all' || cv.el.dataset.tags.split(' ').includes(activeTag)) &&
               (!q || cv.el.dataset.text.includes(q));
    cv.el.classList.toggle('hidden', !ok);
    if (ok) shown++;
  });
  emptyEl.classList.toggle('show', shown === 0);
  countEl.textContent = shown === GAMES.length ? '' : `${shown} of ${GAMES.length} games`;
}

document.getElementById('lucky').addEventListener('click', () => {
  const pool = covers.filter(cv => !cv.el.classList.contains('hidden') && !cv.el.href.endsWith('#snake'));
  if (!pool.length) return;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  pick.el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  pick.el.style.boxShadow = '0 0 0 3px var(--gold), 0 0 40px rgba(255,207,77,.6)';
  setTimeout(() => { location.href = pick.el.href; }, 650);
});

/* =========================================================================
   SNAKE — the old index.html game, preserved as an easter egg
   ========================================================================= */
const modal = document.getElementById('snakeModal');
const sCv = document.getElementById('snakeCv');
const sCtx = sCv.getContext('2d');
const sScore = document.getElementById('snakeScore');
const sMsg = document.getElementById('snakeMsg');
const cellSize = 20, cols = 20, rows = 20;
let snake, direction, nextDirection, food, score, gameOver, tickHandle = null;

function snakeReset() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  direction = {x:1,y:0}; nextDirection = {x:1,y:0};
  score = 0; gameOver = false;
  placeFood(); sScore.textContent = 'Score: 0';
  sMsg.textContent = 'Arrow keys / swipe to move';
}
function placeFood() {
  while (true) {
    const fx = Math.floor(Math.random()*cols), fy = Math.floor(Math.random()*rows);
    if (!snake.some(s => s.x===fx && s.y===fy)) { food = {x:fx,y:fy}; return; }
  }
}
function snakeTick() {
  if (gameOver) return;
  direction = nextDirection;
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
  if (head.x<0 || head.x>=cols || head.y<0 || head.y>=rows ||
      snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver = true; sMsg.textContent = 'Game Over! Space / tap to restart'; snakeDraw(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score++; sScore.textContent='Score: '+score; placeFood(); }
  else snake.pop();
  snakeDraw();
}
function snakeDraw() {
  sCtx.fillStyle='#000'; sCtx.fillRect(0,0,400,400);
  sCtx.fillStyle='#f00'; sCtx.fillRect(food.x*cellSize, food.y*cellSize, cellSize, cellSize);
  sCtx.fillStyle='#0f0';
  for (const s of snake) sCtx.fillRect(s.x*cellSize, s.y*cellSize, cellSize-1, cellSize-1);
}
function openSnake() {
  modal.classList.add('open');
  snakeReset(); snakeDraw();
  if (tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(snakeTick, 120);
}
function closeSnake() {
  modal.classList.remove('open');
  if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
}
document.getElementById('snakeClose').addEventListener('click', closeSnake);
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('open')) return;
  switch (e.key) {
    case 'ArrowUp':    if (direction.y!==1)  nextDirection={x:0,y:-1}; e.preventDefault(); break;
    case 'ArrowDown':  if (direction.y!==-1) nextDirection={x:0,y:1};  e.preventDefault(); break;
    case 'ArrowLeft':  if (direction.x!==1)  nextDirection={x:-1,y:0}; e.preventDefault(); break;
    case 'ArrowRight': if (direction.x!==-1) nextDirection={x:1,y:0};  e.preventDefault(); break;
    case ' ': if (gameOver) snakeReset(); e.preventDefault(); break;
    case 'Escape': closeSnake(); break;
  }
});
let touchStart = null;
sCv.addEventListener('touchstart', e => {
  touchStart = [e.touches[0].clientX, e.touches[0].clientY];
  if (gameOver) snakeReset();
}, {passive:true});
sCv.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart[0];
  const dy = e.changedTouches[0].clientY - touchStart[1];
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 12 && direction.x!==-1) nextDirection={x:1,y:0};
    else if (dx < -12 && direction.x!==1) nextDirection={x:-1,y:0};
  } else {
    if (dy > 12 && direction.y!==-1) nextDirection={x:0,y:1};
    else if (dy < -12 && direction.y!==1) nextDirection={x:0,y:-1};
  }
  touchStart = null;
}, {passive:true});
modal.addEventListener('click', e => { if (e.target === modal) closeSnake(); });
</script>
