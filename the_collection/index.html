function toast(msg, kind){
  var stack = $('toast-stack');
  if (!stack) return;
  var el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : '');
  el.textContent = msg;
  stack.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('show'); });
  setTimeout(function(){
    el.classList.remove('show');
    setTimeout(function(){ el.remove(); }, 260);
  }, 1700);
}

var CONFETTI_COLORS = {
  rareholo: ['#58b0dc', '#a8e0f8'],
  doublerare: ['#7f8ae8', '#c0c6ff'],
  ultrarare: ['#c77ae8', '#ffd76a', '#6ad4ff'],
};
function burstConfetti(container, tierKey){
  var palette = CONFETTI_COLORS[tierKey];
  if (!palette || typeof document === 'undefined') return;
  try { if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; } catch (e) {}
  var rect = container.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  var canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  canvas.width = rect.width;
  canvas.height = rect.height;
  container.appendChild(canvas);
  var ctx2d = canvas.getContext('2d');
  var count = tierKey === 'ultrarare' ? 46 : (tierKey === 'doublerare' ? 30 : 20);
  var parts = [];
  for (var i = 0; i < count; i++) {
    parts.push({
      x: canvas.width / 2, y: canvas.height * 0.32,
      vx: (Math.random() - 0.5) * 7.5, vy: -(Math.random() * 6 + 3),
      size: Math.random() * 5 + 3, color: palette[i % palette.length],
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
    });
  }
  var start = null;
  function frame(ts){
    if (!start) start = ts;
    var elapsed = ts - start;
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(function(p){
      p.vy += 0.2; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx2d.save();
      ctx2d.translate(p.x, p.y);
      ctx2d.rotate(p.rot);
      ctx2d.fillStyle = p.color;
      ctx2d.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx2d.restore();
    });
    if (elapsed < 900) requestAnimationFrame(frame);
    else canvas.remove();
  }
  requestAnimationFrame(frame);
}

/* ================= card art: seeded pixel creatures ================= */
var TYPE_COLORS = {
  Ember: '#e07a4a', Aqua: '#5aa3dc', Verdant: '#7ab35e', Volt: '#e3c455', Stone: '#b39072',
  Shadow: '#8a7ab0', Crystal: '#6cc8cc', Wind: '#9cc4ae', Lumen: '#eace7a', Umbra: '#b06a90',
};
function typeColor(t){ return TYPE_COLORS[t] || '#b3a58e'; }
function lightenHex(hex, amt){
  var n = parseInt(hex.slice(1), 16);
  var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * amt);
  g = Math.round(g + (255 - g) * amt);
  b = Math.round(b + (255 - b) * amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// Every card gets a unique creature: a half-grid of on/off cells mirrored
// down the middle (the classic invader-sprite trick), two-tone in the
// card's type color, with a pair of dark eye pixels for personality.
// Deterministic per card id; cached per size; falls back to null (and the
// UI to a plain type-colored blob) if canvas isn't available.
var spriteCache = {};
function spriteFor(card, px){
  var key = card.id + '@' + px;
  if (Object.prototype.hasOwnProperty.call(spriteCache, key)) return spriteCache[key];
  var url = null;
  try {
    var rand = seededRandom('sprite-' + card.id);
    var G = 10, half = 5;
    var grid = [];
    var filled = 0;
    for (var y = 0; y < G; y++) {
      grid[y] = [];
      for (var x = 0; x < half; x++) {
        var edge = (y === 0 || y === G - 1 || x === 0);
        var on = rand() < (edge ? 0.24 : 0.55);
        grid[y][x] = on;
        if (on) filled++;
      }
    }
    // guarantee a solid torso so no creature is just scattered dust
    for (var yy = 3; yy <= 6; yy++) { if (!grid[yy][3]) { grid[yy][3] = true; filled++; } if (!grid[yy][4]) { grid[yy][4] = true; filled++; } }
    var eyeY = 3 + Math.floor(rand() * 2);
    var eyeX = 2 + Math.floor(rand() * 2);
    grid[eyeY][eyeX] = true;

    var base = typeColor(card.type);
    var light = lightenHex(base, 0.38);
    var c = document.createElement('canvas');
    c.width = G; c.height = G;
    var g2 = c.getContext('2d');
    var accentRand = seededRandom('accent-' + card.id);
    for (var py = 0; py < G; py++) {
      for (var pxx = 0; pxx < half; pxx++) {
        if (!grid[py][pxx]) continue;
        g2.fillStyle = accentRand() < 0.28 ? light : base;
        g2.fillRect(pxx, py, 1, 1);
        g2.fillRect(G - 1 - pxx, py, 1, 1);
      }
    }
    g2.fillStyle = '#241c12';
    g2.fillRect(eyeX, eyeY, 1, 1);
    g2.fillRect(G - 1 - eyeX, eyeY, 1, 1);

    var out = document.createElement('canvas');
    out.width = px; out.height = px;
    var og = out.getContext('2d');
    og.imageSmoothingEnabled = false;
    og.drawImage(c, 0, 0, px, px);
    url = out.toDataURL();
  } catch (e) { url = null; }
  spriteCache[key] = url;
  return url;
}

function mixHex(hexA, hexB, t){
  var a = parseInt(hexA.slice(1), 16), b = parseInt(hexB.slice(1), 16);
  var r = Math.round(((a >> 16) & 255) * (1 - t) + ((b >> 16) & 255) * t);
  var g = Math.round(((a >> 8) & 255) * (1 - t) + ((b >> 8) & 255) * t);
  var bl = Math.round((a & 255) * (1 - t) + (b & 255) * t);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + bl).toString(16).slice(1);
}

// Richer creature for full-card art: 12x12 mirrored grid with a
// center-weighted body, row-based shading, a dark outline pass, and eyes.
function creatureCanvas(card){
  var G = 12, half = 6;
  var rand = seededRandom('beast-' + card.id);
  var grid = [];
  for (var y = 0; y < G; y++) {
    grid[y] = [];
    for (var x = 0; x < half; x++) {
      var dx = (half - 1 - x) / half;
      var dy = Math.abs(y - G * 0.55) / (G * 0.55);
      var p = 0.82 - 0.55 * Math.max(dx, dy);
      grid[y][x] = rand() < p;
    }
  }
  for (var ty = 4; ty <= 8; ty++) { grid[ty][4] = true; grid[ty][5] = true; }
  if (rand() < 0.6) { grid[1][3] = true; grid[2][3] = true; }
  var eyeY = 3 + Math.floor(rand() * 2);
  var eyeX = 3 + Math.floor(rand() * 2);
  grid[eyeY][eyeX] = true;

  var base = typeColor(card.type);
  var light = lightenHex(base, 0.4);
  var dark = mixHex(base, '#241c12', 0.4);
  var outline = mixHex(base, '#241c12', 0.68);
  var c = document.createElement('canvas');
  c.width = G; c.height = G;
  var g = c.getContext('2d');
  var filledAt = function(x, y){
    if (x < 0 || y < 0 || x >= G || y >= G) return false;
    var hx = x < half ? x : G - 1 - x;
    return !!grid[y][hx];
  };
  for (var py = 0; py < G; py++) {
    for (var px2 = 0; px2 < G; px2++) {
      if (filledAt(px2, py)) continue;
      if (filledAt(px2 - 1, py) || filledAt(px2 + 1, py) || filledAt(px2, py - 1) || filledAt(px2, py + 1)) {
        g.fillStyle = outline;
        g.fillRect(px2, py, 1, 1);
      }
    }
  }
  var srand = seededRandom('shade-' + card.id);
  for (var qy = 0; qy < G; qy++) {
    for (var qx = 0; qx < G; qx++) {
      if (!filledAt(qx, qy)) continue;
      var shade = base;
      if (qy <= 3 && srand() < 0.5) shade = light;
      else if (qy >= 9 && srand() < 0.5) shade = dark;
      else if (srand() < 0.14) shade = light;
      g.fillStyle = shade;
      g.fillRect(qx, qy, 1, 1);
    }
  }
  g.fillStyle = '#1c150c';
  g.fillRect(eyeX, eyeY, 1, 1);
  g.fillRect(G - 1 - eyeX, eyeY, 1, 1);
  return c;
}

// Full-art scene for the card's art window: type-colored sky (day or
// night), moon/sun, stars or clouds, a horizon with silhouettes, and the
// creature standing in it. Deterministic per card; cached; null on any
// canvas failure (UI falls back to a flat type-colored window).
var sceneCache = {};
function sceneFor(card, w, h){
  var key = card.id + '@' + w + 'x' + h;
  if (Object.prototype.hasOwnProperty.call(sceneCache, key)) return sceneCache[key];
  var url = null;
  try {
    var rand = seededRandom('scene-' + card.id);
    var base = typeColor(card.type);
    var nightBias = (card.type === 'Shadow' || card.type === 'Umbra') ? 0.85 : 0.4;
    var night = rand() < nightBias;
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    var g = c.getContext('2d');

    var skyTop = night ? mixHex(base, '#191436', 0.74) : lightenHex(base, 0.6);
    var skyBot = night ? mixHex(base, '#3a3468', 0.42) : lightenHex(base, 0.25);
    var sky = g.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, skyTop);
    sky.addColorStop(1, skyBot);
    g.fillStyle = sky;
    g.fillRect(0, 0, w, h);

    if (night) {
      g.fillStyle = 'rgba(255,255,255,.75)';
      for (var s = 0; s < 22; s++) {
        g.globalAlpha = 0.25 + rand() * 0.6;
        g.fillRect(rand() * w, rand() * h * 0.42, 1.5, 1.5);
      }
      g.globalAlpha = 1;
    } else {
      g.fillStyle = 'rgba(255,255,255,.5)';
      for (var cl = 0; cl < 3; cl++) {
        var cw = 22 + rand() * 30, cx2 = rand() * w, cy2 = 8 + rand() * h * 0.3;
        g.beginPath();
        g.ellipse(cx2, cy2, cw / 2, 5 + rand() * 4, 0, 0, Math.PI * 2);
        g.fill();
      }
    }

    var mx = w * (rand() < 0.5 ? 0.2 : 0.78), my = h * 0.13, mr = h * 0.09;
    var glow = g.createRadialGradient(mx, my, 1, mx, my, mr * 3);
    glow.addColorStop(0, night ? 'rgba(240,235,255,.5)' : 'rgba(255,235,170,.65)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = glow;
    g.fillRect(0, 0, w, h);
    g.fillStyle = night ? '#eae6f2' : '#ffe9a8';
    g.beginPath();
    g.arc(mx, my, mr, 0, Math.PI * 2);
    g.fill();

    // horizon and creature sit in the top ~60% — the info panel overlays the rest
    var hy = h * 0.5;
    var groundA = mixHex(base, night ? '#141020' : '#3a2f20', night ? 0.6 : 0.35);
    var groundB = mixHex(groundA, '#100c14', 0.4);
    var ground = g.createLinearGradient(0, hy, 0, h);
    ground.addColorStop(0, groundA);
    ground.addColorStop(1, groundB);
    g.fillStyle = ground;
    g.fillRect(0, hy, w, h - hy);

    g.fillStyle = mixHex(base, night ? '#191436' : '#4a3c28', night ? 0.5 : 0.3);
    var nSil = 3 + Math.floor(rand() * 3);
    for (var t2 = 0; t2 < nSil; t2++) {
      var sx = rand() * w, sw2 = 8 + rand() * 16, sh2 = 8 + rand() * 20;
      g.beginPath();
      g.moveTo(sx - sw2 / 2, hy);
      g.lineTo(sx, hy - sh2);
      g.lineTo(sx + sw2 / 2, hy);
      g.closePath();
      g.fill();
    }

    var beast = creatureCanvas(card);
    var size = h * 0.34;
    var bx = (w - size) / 2, by = h * 0.6 - size;
    g.fillStyle = 'rgba(10,8,14,.4)';
    g.beginPath();
    g.ellipse(w / 2, h * 0.59, size * 0.42, size * 0.09, 0, 0, Math.PI * 2);
    g.fill();
    g.imageSmoothingEnabled = false;
    g.drawImage(beast, bx, by, size, size);

    url = c.toDataURL();
  } catch (e) { url = null; }
  sceneCache[key] = url;
  return url;
}

// Owner-supplied painted art: if the_collection/art/<id>.png exists it
// replaces the procedural scene automatically (probe result cached).
// Generate with the repo's local ComfyUI pipeline — see art/README.md.
var ownerArt = {};
function hydrateOwnerArt(root){
  if (!root || !root.querySelectorAll) return;
  root.querySelectorAll('[data-art]').forEach(function(el){
    var id = el.getAttribute('data-art');
    if (ownerArt[id] === false) return;
    if (typeof ownerArt[id] === 'string') {
      el.style.backgroundImage = 'url(' + ownerArt[id] + ')';
      return;
    }
    if (typeof Image === 'undefined') return;
    try {
      var img = new Image();
      img.onload = function(){
        ownerArt[id] = 'art/' + id + '.png';
        el.style.backgroundImage = 'url(art/' + id + '.png)';
      };
      img.onerror = function(){ ownerArt[id] = false; };
      img.src = 'art/' + id + '.png';
    } catch (e) {}
  });
}

function animateCoinsTo(target){
  var el = $('coin-count');
  if (!el) return;
  if (displayedCoins === null || displayedCoins === target) {
    displayedCoins = target;
    el.textContent = fmtCoins(target);
    return;
  }
  var start = displayedCoins;
  var startTime = null;
  var duration = 450;
  function step(ts){
    if (startTime === null) startTime = ts;
    var t = Math.min((ts - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - t, 3);
    var value = Math.round(start + (target - start) * eased);
    el.textContent = fmtCoins(value);
    if (t < 1) requestAnimationFrame(step);
    else displayedCoins = target;
  }
  requestAnimationFrame(step);
}

var TIER_CHIP = { common: 'COMMON', uncommon: 'UNCOMMON', rare: 'RARE', rareholo: 'HOLO', doublerare: 'DOUBLE', ultrarare: 'ULTRA' };

  var illus = c.illus || full.illus;

        (opts.badges ? '<div class="tcg2-badges">' + opts.badges + '</div>' : '') +
        '<div class="move-row">' +
          '<span class="energy">' + costDots + '</span>' +
          '<span class="move-name">' + move.name + '</span>' +
          '<span class="move-dmg">' + move.dmg + (move.plus ? '+' : '') + '</span>' +

// Do the chore (outcome already decided + banked), then spin a little reel
// of icons that decelerates and lands on what you found.
function openChoreReel(choreId){
  var chore = CHORE_BY_ID[choreId];
  var res = doChore(save, choreId);
  if (!res) return;
  persist(save);
  renderTopbar();
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<h3 class="modal-title">' + chore.name + '</h3>' +
    '<div class="reel-window"><div class="reel-icon" id="reel-icon">' + chore.emoji + '</div></div>' +
    '<div class="reel-result" id="reel-result">&nbsp;</div>' +
    '<button class="bigbtn" id="reel-done" disabled>Spinning&hellip;</button>';
  $('modal-backdrop').classList.add('open');
  var iconEl = $('reel-icon');
  var landIcon = OUTCOME_ICON[res.kind] || '🪙';
  var seq = [];
  for (var i = 0; i < 16; i++) seq.push(chore.reel[i % chore.reel.length]);
  seq.push(landIcon);
  var idx = 0;
  function tick(){
    iconEl.textContent = seq[idx];
    sfxTick();
    idx++;
    if (idx >= seq.length) {
      iconEl.classList.add('reel-land');
      showChoreResult(res);
      return;
    }
    var t = idx / seq.length;
    setTimeout(tick, 45 + Math.pow(t, 3) * 300);
  }
  tick();

  function showChoreResult(r){
    var parts = [];
    if (r.coins) parts.push('+' + r.coins + ' coins');
    if (r.candy) parts.push('+' + r.candy + ' candy 🍬');
    if (r.cardId) parts.push('a loose card — ' + BY_ID[r.cardId].name + '!');
    var msg = parts.length ? parts.join(' &middot; ') : 'Nothing this time.';
    var resEl = $('reel-result');
    resEl.innerHTML = msg;
    resEl.classList.add(parts.length ? 'good' : 'nada');
    if (parts.length) { sfxCoins(); hapticPulse(r.cardId ? 'rare' : 'common'); }
    var doneBtn = $('reel-done');
    doneBtn.disabled = false;
    doneBtn.textContent = parts.length ? 'Nice!' : 'Ah well';
    doneBtn.addEventListener('click', function(){
      closeModal();
      renderHome();
    });
  }
}

function closeOpener(){

function openerDots(){
  var s = opener.session;
  if (!s) return;
  $('opener-dots').innerHTML = s.pulls.map(function(_, i){
    return '<span class="' + (i < s.index ? 'done' : '') + '"></span>';
  }).join('');
}

function openerStagePack(){
  var stage = $('opener-stage');
  stage.innerHTML =
    '<div class="pack" id="opener-pack">' +
      '<div class="pack-crimp top" id="pack-crimp"><span class="pull-tab">PULL &#8649;</span></div>' +
      '<div class="pack-body"><div class="pack-star">&#9733;</div><div class="pack-set">CORE SET</div><div class="pack-count-label">5 CARDS</div></div>' +
      '<div class="pack-crimp bottom"></div>' +
    '</div>';
  $('opener-dots').innerHTML = '';
  $('opener-hint').textContent = 'Pull the strip to tear the pack open';
  var pack = $('opener-pack');
  var crimp = $('pack-crimp');
  var torn = false;
  function doTear(){
    if (torn) return;
    torn = true;
    crimp.classList.remove('dragging', 'springback');
    crimp.style.transform = '';
    pack.classList.add('tearing');
    sfxTear();
    hapticPulse('rare');
    setTimeout(openerStageCards, 430);
  }
  // Drag the foil strip sideways like a real wrapper; a plain tap still
  // tears it (desktop clicks, accessibility).
  var startX = null;
  var dist = 0;
  var dragging = false;
  var TEAR_THRESHOLD = 70;
  crimp.addEventListener('pointerdown', function(e){
    if (torn) return;
    startX = e.clientX;
    dist = 0;
    dragging = true;
    crimp.classList.add('dragging');
    try { crimp.setPointerCapture(e.pointerId); } catch (err) {}
  });
  crimp.addEventListener('pointermove', function(e){
    if (!dragging || torn) return;
    dist = Math.max(0, e.clientX - startX);
    crimp.style.transform = 'translateX(' + Math.min(dist, 110) + 'px) rotate(' + Math.min(dist * 0.06, 7) + 'deg)';
    if (dist > TEAR_THRESHOLD) { dragging = false; doTear(); }
  });
  function endDrag(){
    if (!dragging || torn) return;
    dragging = false;
    crimp.classList.remove('dragging');
    if (dist < 8) { doTear(); return; }
    crimp.classList.add('springback');
    crimp.style.transform = '';
    setTimeout(function(){ crimp.classList.remove('springback'); }, 200);
  }
  crimp.addEventListener('pointerup', endDrag);
  crimp.addEventListener('pointercancel', endDrag);
  // tapping the pack body (not the strip) also tears — guarded by `torn`
  pack.addEventListener('click', doTear);
}

function openerStageCards(){
  $('opener-stage').innerHTML = '<div class="rstack" id="rstack"></div>';
  rebuildStack();
}

function rebuildStack(){
  var s = opener.session;
  if (!s) return;
  if (s.index >= s.pulls.length) { openerStageSummary(); return; }
  var el = $('rstack');
  var html = '';
  for (var i = s.pulls.length - 1; i >= s.index; i--) {
    var off = i - s.index;
    html += '<div class="rcard' + (off === 0 ? ' top' : '') + '"' +
      (off > 0 ? ' style="transform:translate(' + (off * 3) + 'px,' + (-off * 4) + 'px)"' : '') + '>' +
      '<div class="cardback"><div class="cb-in"><span class="cb-mono">C</span></div></div>' +
    '</div>';
  }
  el.innerHTML = html;
  openerDots();
  $('opener-hint').textContent = 'Card ' + (s.index + 1) + ' of ' + s.pulls.length + ' — tap to reveal';
  var top = el.querySelector('.rcard.top');
  top.addEventListener('click', function(){
    sfxClick();
    // rarer pull = longer charge-up: commons snap over, an Ultra Rare
    // makes you sit through the full glow cycle
    var chargeMs = CHARGE_MS[s.pulls[s.index].tier] || 650;
    top.style.animationDuration = chargeMs + 'ms';
    top.classList.add('charging');
    var done = false;
    var timeoutId;
    var finishCharge = function(){
      if (done) return;
      done = true;
      clearTimeout(timeoutId);
      top.removeEventListener('animationend', finishCharge);
      top.classList.remove('charging');
      top.style.animationDuration = '';
      pinchReveal(top, s.pulls[s.index]);
    };
    top.addEventListener('animationend', finishCharge);
    timeoutId = setTimeout(finishCharge, chargeMs + 150);
  }, { once: true });
}

var CHARGE_MS = { common: 350, uncommon: 480, rare: 650, rareholo: 950, doublerare: 1200, ultrarare: 1600 };

// Pinch the card shut (scaleX -> 0), swap back for face while edge-on,
// pinch open. Deliberately NOT a perspective/preserve-3d flip — true 3D
// transforms left stale composited frames on screen in earlier testing.
function pinchReveal(card, pull){
  card.classList.add('closing');
  var done = false;
  var timeoutId;
  var finishClose = function(e){
    if (e && e.propertyName && e.propertyName !== 'transform') return;
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    card.removeEventListener('transitionend', finishClose);
    var badges =
      (pull.isNew ? '<span class="badge new">NEW</span>' : '') +
      (pull.reverseHolo ? '<span class="badge foil">REVERSE HOLO</span>' : '');
    card.innerHTML = cardHTML(pull, { reverseHolo: pull.reverseHolo, badges: badges });
    hydrateOwnerArt(card);
    card.classList.remove('closing');
    card.classList.add('twirl');
    var done2 = false;
    var t2;
    var finishOpen = function(){
      if (done2) return;
      done2 = true;
      clearTimeout(t2);
      card.removeEventListener('animationend', finishOpen);
      card.classList.remove('twirl');
      onRevealed(card, pull);
    };
    card.addEventListener('animationend', finishOpen);
    t2 = setTimeout(finishOpen, 600);
  };
  card.addEventListener('transitionend', finishClose);
  timeoutId = setTimeout(finishClose, 380);
}

function onRevealed(card, pull){
  sfxReveal(pull.tier);
  hapticPulse(pull.tier);
  card.style.boxShadow = '0 0 26px 5px var(--t-' + pull.tier + ')';
  card.style.borderRadius = '11px';
  burstConfetti(card, pull.tier);
  // big pulls hit harder: Double Rare shakes the table, Ultra Rare adds a gold flash
  if (pull.tier === 'doublerare' || pull.tier === 'ultrarare') {
    var stage = $('opener-stage');
    stage.classList.add('shake');
    setTimeout(function(){ stage.classList.remove('shake'); }, 460);
  }
  if (pull.tier === 'ultrarare') {
    var flash = document.createElement('div');
    flash.className = 'gold-flash';
    $('opener').appendChild(flash);
    setTimeout(function(){ flash.remove(); }, 700);
  }
  $('opener-hint').textContent = 'Tap anywhere to continue';
  $('opener-stage').addEventListener('click', function(){
    card.classList.add('flyoff');
    setTimeout(function(){
      if (!opener.session) return;
      opener.session.index += 1;
      rebuildStack();
    }, 300);
  }, { once: true });
}

function openerStageSummary(){
  var s = opener.session;
  if (!s) return;
  var newCount = s.pulls.filter(function(p){ return p.isNew; }).length;
  var order = ['common','uncommon','rare','rareholo','doublerare','ultrarare'];
  var best = s.pulls.reduce(function(a, p){ return order.indexOf(p.tier) > order.indexOf(a.tier) ? p : a; }, s.pulls[0]);
  var dotsRow = s.pulls.map(function(p){ return '<span class="pd" style="background:var(--t-' + p.tier + ')"></span>'; }).join('');
  var headline = order.indexOf(best.tier) >= order.indexOf('rareholo') ? 'Great pack!' : 'Pack complete';
  openerDots();
  $('opener-hint').textContent = '';
  $('opener-stage').innerHTML =
    '<div class="summary-card">' +
      '<h2>' + headline + '</h2>' +
      '<p>' + newCount + ' new card' + (newCount === 1 ? '' : 's') + '. Best pull: ' + best.name + ' (' + TIER_BY_KEY[best.tier].name + ').</p>' +
      '<div class="pull-dots">' + dotsRow + '</div>' +
      '<button class="bigbtn" id="btn-opener-done" style="margin-top:18px;">Done</button>' +
    '</div>';
  $('btn-opener-done').addEventListener('click', closeOpener);
}

/* ---- binder: 9-pocket pages ---- */
var binderPage = 0;
var binderShowMissing = false;

function pocketHTML(c, rec, isNew){
  var tc = 'var(--t-' + c.tier + ')';
  if (!rec) {
    return '<div class="pocket">' +
      '<span class="pk-num">#' + c.id.slice(1) + '</span>' +
      '<span class="pk-gem" style="color:' + tc + '">&#9670;</span>' +
      '<span class="pk-q">?</span>' +
    '</div>';
  }
  var sprite = spriteFor(c, 64);
  var art = sprite
    ? '<div class="pk-art" style="background-image:url(' + sprite + ')"></div>'
    : '<div class="pk-fallback" style="background:' + typeColor(c.type) + '">' + c.name.charAt(0) + '</div>';
  return '<div class="pocket owned" data-id="' + c.id + '" style="--tc:' + tc + '">' +
    '<span class="pk-num">#' + c.id.slice(1) + '</span>' +
    '<span class="pk-gem" style="color:' + tc + '">&#9670;</span>' +
    art +
    '<div class="pk-name">' + c.name + '</div>' +
    (rec.reverseHolo ? '<span class="foil-dot"></span>' : '') +
    (rec.count > 1 ? '<span class="pk-count">x' + rec.count + '</span>' : '') +
    (isNew ? '<span class="pk-new">NEW</span>' : '') +
  '</div>';
}

function renderBinder(){
  var el = $('screen-binder');
  if (!el) return;
  var owned = Object.keys(save.collection).length;
  var pct = Math.round(completionFraction(save) * 100);
  var dupValue = duplicateValue(save);
  var totalPages = Math.ceil(CORE_SET.length / PAGE_SIZE);
  binderPage = Math.max(0, Math.min(binderPage, totalPages - 1));

  var body;
  if (binderShowMissing) {
    var missing = CORE_SET.filter(function(c){ return !save.collection[c.id]; });
    body = missing.length
      ? '<div class="missing-grid">' + missing.map(function(c){ return pocketHTML(c, null); }).join('') + '</div>'
      : '<div class="pcard"><h2>Set complete!</h2><p class="sub">Every card in the Core Set is in your binder.</p></div>';
  } else {
    var cardsOnPage = pageCards(binderPage);
    var ownedOnPage = cardsOnPage.filter(function(c){ return !!save.collection[c.id]; }).length;
    var complete = isPageComplete(save, binderPage);
    var rewarded = !!(save.pagesRewarded && save.pagesRewarded[binderPage]);
    var rewardStrip;
    if (complete && !rewarded) {
      rewardStrip = '<button class="bigbtn page-reward" id="btn-page-reward">Page complete! Claim +' + PAGE_REWARD + ' coins</button>';
    } else if (complete) {
      rewardStrip = '<div class="smallnote page-reward">Page complete &#10003; reward claimed</div>';
    } else {
      rewardStrip = '<div class="smallnote page-reward">' + ownedOnPage + '/' + cardsOnPage.length + ' on this page &mdash; fill it for +' + PAGE_REWARD + ' coins</div>';
    }
    body =
      '<div class="binder-page">' +
        cardsOnPage.map(function(c){ return pocketHTML(c, save.collection[c.id], !!(save.newCards && save.newCards[c.id])); }).join('') +
      '</div>' +
      rewardStrip +
      '<div class="binder-nav">' +
        '<button id="btn-page-prev"' + (binderPage === 0 ? ' disabled' : '') + '>&larr; Prev</button>' +
        '<span class="page-label">Page ' + (binderPage + 1) + ' / ' + totalPages + '</span>' +
        '<button id="btn-page-next"' + (binderPage === totalPages - 1 ? ' disabled' : '') + '>Next &rarr;</button>' +
      '</div>';
  }

  el.innerHTML =
    '<div class="binder-head"><h2>Core Set &middot; ' + owned + '/' + CORE_SET.length + '</h2>' +
      '<button class="binder-toggle' + (binderShowMissing ? ' active' : '') + '" id="btn-toggle-missing">Missing only</button>' +
    '</div>' +
    '<div class="progress-bar binder-progress"><div class="fill" style="width:' + pct + '%"></div></div>' +
    '<div class="dupe-bar">' +
      '<p>Duplicates sell to the kiosk for quick coins — school trades pay more.</p>' +
      '<button id="btn-sell-dupes"' + (dupValue <= 0 ? ' disabled' : '') + '>' +
        (dupValue > 0 ? 'Sell all (+' + dupValue + ')' : 'None to sell') +
      '</button>' +
    '</div>' +
    body;

  $('btn-toggle-missing').addEventListener('click', function(){
    binderShowMissing = !binderShowMissing;
    renderBinder();
  });
  var prev = $('btn-page-prev');
  if (prev) prev.addEventListener('click', function(){ sfxClick(); binderPage--; renderBinder(); });
  var next = $('btn-page-next');
  if (next) next.addEventListener('click', function(){ sfxClick(); binderPage++; renderBinder(); });
  el.querySelectorAll('.pocket.owned').forEach(function(slotEl){
    slotEl.addEventListener('click', function(){ sfxClick(); openCardModal(slotEl.getAttribute('data-id')); });
  });
  var sellDupesBtn = $('btn-sell-dupes');
  if (sellDupesBtn) sellDupesBtn.addEventListener('click', function(){
    var gained = sellAllDuplicates(save);
    if (gained > 0) {
      persist(save); renderTopbar(); renderBinder();
      sfxCoins();
      toast('Sold duplicates (+' + gained + ')', 'coin');
    }
  });
  var rewardBtn = $('btn-page-reward');
  if (rewardBtn) rewardBtn.addEventListener('click', function(){
    var gained = claimPageReward(save, binderPage);
    if (gained > 0) {
      persist(save); renderTopbar(); renderBinder();
      sfxCoins();
      hapticPulse('rareholo');
      toast('Page ' + (binderPage + 1) + ' complete! +' + gained + ' coins', 'coin');
      var pageEl = $('screen-binder').querySelector('.binder-page');
      if (pageEl) burstConfetti(pageEl, 'ultrarare');
    }
  });
}

function openCardModal(id){
  var card = BY_ID[id];
  var rec = save.collection[id];
  if (!card || !rec) return;
  if (markCardSeen(save, id)) { persist(save); renderBinder(); }   // clear the "NEW" badge once looked at
  var tier = TIER_BY_KEY[card.tier];
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<div class="modal-cardwrap">' + cardHTML(card, { reverseHolo: rec.reverseHolo }) + '</div>' +
    '<div class="modal-row">' +
      '<button class="bigbtn ghost" id="btn-sell"' + (rec.count <= 1 ? ' disabled' : '') + '>Sell duplicate (+' + tier.sell + ')</button>' +
    '</div>' +
    '<p class="modal-owned">Owned: ' + rec.count + (rec.reverseHolo ? ' &middot; reverse holo' : '') + '</p>';
  hydrateOwnerArt(sheet);
  $('btn-close-modal').addEventListener('click', closeModal);
  var sellBtn = $('btn-sell');
  if (sellBtn) sellBtn.addEventListener('click', function(){
    var gained = sellDuplicate(save, id);
    if (gained > 0) {
      persist(save); renderTopbar(); openCardModal(id); renderBinder();
      sfxCoins();
      toast('+' + gained + ' coins', 'coin');
    }
  });
  $('modal-backdrop').classList.add('open');
}
function closeModal(){ $('modal-backdrop').classList.remove('open'); }

/* ---- school: flip duels + haggling ---- */
var NPC_ACCENTS = { finn: 'var(--t-rare)', ren: 'var(--t-rareholo)', tova: 'var(--t-doublerare)', beck: 'var(--accent)' };

function npcById(id){ return NPCS.filter(function(n){ return n.id === id; })[0]; }

function miniCardHTML(cardId, opts){
  opts = opts || {};
  var c = BY_ID[cardId];
  var tier = TIER_BY_KEY[c.tier];
  var sprite = spriteFor(c, 64);
  var art = sprite
    ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
    : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
  return '<div class="want-mini" style="--type-c:' + typeColor(c.type) + '; margin:4px 0 8px;">' +
    '<div class="wm-art">' + art + '</div>' +
    '<div style="min-width:0;"><div class="wm-name">' + c.name + '</div>' +
      '<span class="tier-chip" style="background:var(--t-' + c.tier + ');">' + tier.name + '</span>' +
      '<div class="mini-meta">POW ' + c.power + ' &middot; sells for ' + tier.sell + 'c' + (opts.note ? ' &middot; ' + opts.note : '') + '</div>' +
    '</div>' +
    (opts.coins ? '<span class="coin-chip">+' + opts.coins + 'c</span>' : '') +

}

function duelCardHTML(duel, idx){
  var npc = npcById(duel.npcId);
  var stakeCard = BY_ID[duel.stake];
  if (duel.done) {
    var myCard = duel.myCard ? BY_ID[duel.myCard] : null;
    return '<div class="pcard accent-gold">' +
      '<h2>Flip duel &mdash; ' + (duel.won ? 'you won!' : 'you lost') + '</h2>' +
      '<p class="sub">' + (duel.won
        ? 'Your ' + (myCard ? myCard.name : 'card') + ' flipped ' + npc.name + '\'s ' + stakeCard.name + ' — it\'s yours now.'
        : npc.name + ' pocketed your ' + (myCard ? myCard.name : 'card') + '. Tomorrow\'s another day.') + '</p>' +
    '</div>';
  }
  return '<div class="pcard accent-gold duel-box" data-duel="' + idx + '">' +
    '<h2>Flip duel!</h2>' +
    '<p class="sub">' + npc.name + ' slaps a card on the table. Winner takes both — higher POW is favored, but a flip is a flip.</p>' +
    miniCardHTML(duel.stake, {}) +
    '<button class="bigbtn" data-duel-pick="' + idx + '"' + (Object.keys(save.collection).length === 0 ? ' disabled' : '') + '>Pick a card to flip</button>' +
  '</div>';
}

function offerCardHTML(npc){
  var o = save.school.offers[npc.id];
  var rel = relOf(save, npc.id);
  var tier = relTier(rel);
  var head =
    '<div class="npc-head">' +
      '<span class="npc-avatar" style="background:' + NPC_ACCENTS[npc.id] + '">' + npc.name.charAt(0) + '</span>' +
      '<div style="flex:1; min-width:0;"><h2>' + npc.name + '</h2>' +
      '<span class="rel-badge" style="color:' + tier.color + '; border-color:' + tier.color + '">' + tier.label + '</span></div>' +
    '</div>' +
    '<p class="sub">' + npc.line + '</p>';

  var body;
  if (o.state === 'refused') {
    body = '<p class="sub">' + npc.name + ' is mad at you and won\'t trade today. Give them candy to patch things up.</p>';
  } else if (o.state === 'done') {
    body = '<p class="sub">Deal done. ' + npc.name + ' is showing everyone their new ' + BY_ID[o.want].name + '.</p>';
  } else if (o.state === 'withdrawn') {
    body = '<p class="sub">You pushed too hard — ' + npc.name + ' walked off with the offer.</p>';
  } else if (o.state === 'declined') {
    body = '<p class="sub">You passed. Maybe tomorrow\'s offer is better.</p>';
  } else {
    var haveWant = !!save.collection[o.want];
    var lastCopy = haveWant && save.collection[o.want].count === 1;
    body =
      '<span class="offer-label">' + npc.name + ' gives you</span>' +
      miniCardHTML(o.give, { coins: o.coins }) +
      '<span class="offer-label">For your</span>' +
      miniCardHTML(o.want, { note: haveWant ? (lastCopy ? '<span class="lastcopy">your last copy!</span>' : 'you have x' + save.collection[o.want].count) : 'not in your binder' }) +
      '<div class="offer-actions">' +
        '<button class="bigbtn" data-accept="' + npc.id + '"' + (canAcceptOffer(save, npc.id) ? '' : ' disabled') + '>Accept</button>' +
        '<button class="bigbtn ghost" data-counter="' + npc.id + '"' + (o.countered ? ' disabled' : '') + '>Ask more</button>' +
        '<button class="bigbtn ghost" data-decline="' + npc.id + '">Pass</button>' +
      '</div>' +
      (o.countered && o.state === 'open' ? '<div class="smallnote">They already agreed to sweeten it once.</div>' : '');
  }

  // social actions available whatever the trade state
  var gaveCandy = save.school.gaveCandy && save.school.gaveCandy[npc.id];
  var stole = !canSteal(save, npc.id);
  var social =
    '<div class="social-row">' +
      '<button class="social-btn" data-candy="' + npc.id + '"' + ((save.candy < 1 || gaveCandy) ? ' disabled' : '') + '>' +
        (gaveCandy ? '🍬 shared today' : '🍬 Give candy') + '</button>' +
      '<button class="social-btn risky" data-steal="' + npc.id + '"' + (stole ? ' disabled' : '') + '>' +
        (stole ? 'Tried already' : 'Swipe a card&hellip;') + '</button>' +
    '</div>';

  return '<div class="pcard" style="border-left-color:' + tier.color + '">' + head + body + social + '</div>';
}

function renderSchool(){
  var el = $('screen-school');
  if (!el) return;
  refreshSchoolIfNeeded(save);
  persist(save);
  var duelsHTML = (save.school.duels || []).map(function(d, i){ return duelCardHTML(d, i); }).join('');
  var offersHTML = NPCS.map(function(npc){ return offerCardHTML(npc); }).join('');
  el.innerHTML = duelsHTML + offersHTML;

  el.querySelectorAll('button[data-duel-pick]').forEach(function(btn){
    btn.addEventListener('click', function(){ sfxClick(); openDuelPicker(parseInt(btn.getAttribute('data-duel-pick'), 10)); });
  });
  el.querySelectorAll('button[data-accept]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-accept');
      var result = acceptOffer(save, npcId);
      if (result) {
        persist(save); renderTopbar(); renderSchool();
        sfxTrade();
        toast('Got ' + BY_ID[result.got].name + (result.coins ? ' +' + result.coins + 'c' : '') + ' for ' + BY_ID[result.gave].name, 'good');
      }
    });
  });
  el.querySelectorAll('button[data-counter]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-counter');
      var result = counterOffer(save, npcId);
      if (result) {
        persist(save); renderSchool();
        if (result.accepted) { sfxCoins(); toast(npcById(npcId).name + ' caved — more coins on the table!', 'coin'); }
        else { sfxClick(); toast(npcById(npcId).name + ' walked off. Deal\'s dead.', ''); }
      }
    });
  });
  el.querySelectorAll('button[data-decline]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if (declineOffer(save, btn.getAttribute('data-decline'))) { sfxClick(); persist(save); renderSchool(); }
    });
  });
  el.querySelectorAll('button[data-candy]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-candy');
      var result = giveCandy(save, npcId);
      if (result) {
        persist(save); renderTopbar(); renderSchool();
        sfxTrade();
        toast(npcById(npcId).name + ' loves it! ' + relTier(result.rel).label, 'good');
      }
    });
  });
  el.querySelectorAll('button[data-steal]').forEach(function(btn){
    btn.addEventListener('click', function(){ openStealConfirm(btn.getAttribute('data-steal')); });
  });
}

// Stealing is a real gamble: a warning first, then a coin-flip resolution.
function openStealConfirm(npcId){
  var npc = npcById(npcId);
  var chance = Math.round(stealChance(relOf(save, npcId)) * 100);
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<h3 class="modal-title">Swipe a card from ' + npc.name + '?</h3>' +
    '<p class="smallnote" style="margin:4px 0 12px;">Roughly <b>' + chance + '%</b> to pull it off. Get caught and ' + npc.name +
      ' turns on you — they grab one of your spare cards and won\'t forget it.</p>' +
    '<div class="modal-row">' +
      '<button class="bigbtn" id="btn-do-steal">Do it 😼</button>' +
      '<button class="bigbtn ghost" id="btn-no-steal">Chicken out</button>' +
    '</div>';
  $('modal-backdrop').classList.add('open');
  $('btn-close-modal').addEventListener('click', closeModal);
  $('btn-no-steal').addEventListener('click', closeModal);
  $('btn-do-steal').addEventListener('click', function(){
    var res = attemptSteal(save, npcId);
    persist(save);
    closeModal();
    renderTopbar();
    renderSchool();
    if (!res) return;
    if (res.caught) {
      sfxBusted();
      hapticPulse('doublerare');
      toast('Busted! ' + npc.name + (res.lostCardId ? ' took your ' + BY_ID[res.lostCardId].name : ' is furious'), '');
    } else {
      sfxSneak();
      hapticPulse('rare');
      toast('Swiped ' + BY_ID[res.cardId].name + ' — nobody saw!', 'good');
    }
  });
}

/* duel flow: pick a card from your binder, then a short suspense flip */
function openDuelPicker(duelIdx){
  var duel = save.school.duels[duelIdx];
  if (!duel || duel.done) return;
  var stakeCard = BY_ID[duel.stake];
  var owned = Object.keys(save.collection).map(function(id){ return BY_ID[id]; });
  owned.sort(function(a, b){ return b.power - a.power; });
  var rows = owned.map(function(c){
    var rec = save.collection[c.id];
    var chance = Math.round(duelChance(c.power, stakeCard.power) * 100);
    var sprite = spriteFor(c, 64);
    var art = sprite
      ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
      : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
    return '<div class="picker-row" data-pick="' + c.id + '">' +
      '<div class="wm-art" style="--type-c:' + typeColor(c.type) + '">' + art + '</div>' +
      '<div><div class="picker-name">' + c.name + '</div>' +
      '<div class="picker-meta">POW ' + c.power + (rec.count === 1 ? ' &middot; <span class="lastcopy">last copy</span>' : ' &middot; x' + rec.count) + '</div></div>' +
      '<div class="picker-right"><div class="picker-name">' + chance + '%</div><div class="picker-meta">to win</div></div>' +
    '</div>';
  }).join('');
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<h3 class="modal-title">Stake a card vs ' + stakeCard.name + ' (POW ' + stakeCard.power + ')</h3>' +
    '<p class="smallnote" style="margin-top:2px;">Winner takes both cards. Lose, and yours is gone.</p>' +
    '<div class="picker-list">' + rows + '</div>';
  $('btn-close-modal').addEventListener('click', closeModal);
  sheet.querySelectorAll('.picker-row').forEach(function(row){
    row.addEventListener('click', function(){
      closeModal();
      playDuel(duelIdx, row.getAttribute('data-pick'));
    });
  });
  $('modal-backdrop').classList.add('open');
}

// The duel ceremony: your card slams the table, theirs answers, the POW
// numbers pop, a suspense glow, then the verdict stamps in and STAYS
// until you tap the button — no blink-and-you-missed-it.
function playDuel(duelIdx, myCardId){
  var duel = save.school.duels[duelIdx];
  if (!duel || duel.done) return;
  var result = resolveDuel(save, duelIdx, myCardId);
  if (!result) return;
  persist(save);
  var box = document.querySelector('.duel-box[data-duel="' + duelIdx + '"]');
  var myCard = BY_ID[myCardId];
  var stakeCard = BY_ID[result.stake];
  if (!box) { renderSchool(); renderTopbar(); return; }

  var bcardHTML = function(c, id){
    var sprite = spriteFor(c, 64);
    var art = sprite
      ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
      : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
    return '<div class="bcard" id="' + id + '">' +
      '<div class="wm-art" style="--type-c:' + typeColor(c.type) + '">' + art + '</div>' +
      '<div class="duel-name">' + c.name + '</div>' +
      '<div class="b-pow">POW ' + c.power + '</div>' +
    '</div>';
  };
  box.innerHTML =
    '<h2>Flip duel!</h2>' +
    '<div class="duel-table">' +
      bcardHTML(myCard, 'bcard-me') +
      '<span class="duel-vs" id="duel-vs">VS</span>' +
      bcardHTML(stakeCard, 'bcard-them') +
      '<div class="duel-stamp" id="duel-stamp"></div>' +
    '</div>' +
    '<div id="duel-done-slot"></div>';
  box.scrollIntoView({ block: 'nearest' });

  var me = $('bcard-me');
  var them = $('bcard-them');
  // beat 1: your card hits the table
  me.classList.add('slam');
  sfxSlam();
  hapticPulse('rare');
  // beat 2: theirs answers
  setTimeout(function(){
    them.classList.add('slam');
    sfxSlam();
    hapticPulse('rare');
  }, 550);
  // beat 3: the numbers come out
  setTimeout(function(){
    me.classList.add('show-pow');
    them.classList.add('show-pow');
    $('duel-vs').classList.add('show-pow');
    sfxClick();
  }, 1100);
  // beat 4: suspense
  setTimeout(function(){ box.classList.add('charging'); }, 1250);
  // beat 5: the verdict — and it stays on the table
  setTimeout(function(){
    box.classList.remove('charging');
    var stamp = $('duel-stamp');
    stamp.textContent = result.won ? 'YOU WON!' : 'YOU LOST';
    stamp.classList.add(result.won ? 'win' : 'lose', 'stamp-in');
    var winner = result.won ? me : them;
    var loser = result.won ? them : me;
    winner.classList.add('winner');
    loser.classList.add('loser');
    if (result.won) {
      sfxWin();
      hapticPulse('ultrarare');
      burstConfetti(box, 'ultrarare');
    } else {
      sfxLose();
      hapticPulse('common');
    }
    $('duel-done-slot').innerHTML =
      '<button class="bigbtn' + (result.won ? '' : ' ghost') + '" id="btn-duel-done" style="margin-top:10px;">' +
        (result.won ? 'Take both cards' : 'Fine... take it') +
      '</button>';
    $('btn-duel-done').addEventListener('click', function(){
      sfxClick();
      renderSchool();
      renderTopbar();
    });
  }, 2250);
}

/* ---- tabs ---- */
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');
    // Every render* function rebuilds its screen's innerHTML from scratch when
    // it becomes active again, so it's safe to tear down whatever we're leaving.
    if (s.id !== 'screen-' + tab) s.innerHTML = '';
  });
  document.querySelectorAll('nav.tabbar button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tab') === tab); });
  $('screen-' + tab).classList.add('active');
  // main's scroll position carries over between screens (they share one
  // scroll container) — without this, arriving on a short screen right after
  // a long scrolled-down one renders it pushed almost entirely out of view.
  var mainEl = document.querySelector('main');
  if (mainEl) mainEl.scrollTop = 0;
  if (tab === 'world') worldResume();
  else worldPause();
  if (tab === 'home') renderHome();
  if (tab === 'shop') renderShop();
  if (tab === 'binder') renderBinder();
  if (tab === 'school') renderSchool();
}

// Apply owner design tweaks exported from the Card Lab (card.html).
// Missing/invalid design.json is a silent no-op — defaults live in the CSS.
function loadDesign(){
  if (typeof fetch !== 'function') return;
  try {
    fetch('design.json').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
      if (!d) return;
      Object.keys(d).forEach(function(k){
        if (k.indexOf('--') === 0) document.documentElement.style.setProperty(k, String(d[k]));
      });
    }).catch(function(){});
  } catch (e) {}
}

function boot(){
  loadDesign();
  document.querySelectorAll('nav.tabbar button').forEach(function(btn){
    btn.addEventListener('click', function(){
      var tab = btn.getAttribute('data-tab');
      if (tab !== activeTab) sfxClick();
      switchTab(tab);
    });
  });
  $('modal-backdrop').addEventListener('click', function(e){ if (e.target === this) closeModal(); });
  $('opener-close').addEventListener('click', function(){
    // Cards were already added when the pack opened; skipping ahead to the
    // summary keeps the recap honest instead of silently swallowing pulls.
    if (opener.session && opener.session.index < opener.session.pulls.length) openerStageSummary();
    else closeOpener();
  });
  renderTopbar();
  activeTab = 'world';
  worldInit();
}

/* =====================================================================
   THE TOWN — a small walkable top-down overworld.
   Pure UI on top of the existing logic: walking into a building opens an
   interior, and interacting with a person/prop calls the same functions
   the old menus did (chores, allowance, kiosk, lottery, school trades).
   Headless-safe: worldInit() bails if there's no real 2D canvas context,
   so the test harness (which stubs the DOM) never touches this.
   ===================================================================== */
var W = {
  cv: null, ctx: null, dpr: 1, vw: 0, vh: 0,
  map: 'town', px: 270, py: 512, dir: 'down',
  vx: 0, vy: 0, moving: false, walk: 0,
  keys: {}, dpad: {}, running: false, last: 0, active: true,
  prompt: null,       // the currently-focusable interaction
  cam: { x: 0, y: 0 }, camSnap: true,
  target: null,       // tap-to-walk destination {x,y,spot}
  lastX: 0, lastY: 0, stall: 0,
  maps: null, actorPhase: 0,
  goalsOpen: true, goalsSig: '', goalsT: 0,
  pet: { x: 250, y: 546, dir: 'down', walk: 0, moving: false, emote: null, emoteT: 0, name: 'Biscuit' },
  petIntroed: false, sitting: false,
  petSpot: { isPet: true, label: function(){ return 'Pet ' + W.pet.name; }, action: function(){ openPetMenu(); } },
  fade: 0, fadeState: 'idle', fadeHold: 0, pendingTravel: null, pendingSleep: false, sleepCard: null,
};
var ZOOM = 1.15, WALK_SPEED = 168, PLAYER_R = 13;

function worldInit(){
  W.cv = $('world-canvas');
  if (!W.cv || typeof W.cv.getContext !== 'function') return;
  var ctx = W.cv.getContext('2d');
  if (!ctx || typeof ctx.fillRect !== 'function') return;   // headless stub → skip
  W.ctx = ctx;
  if (save.pet && save.pet.name) W.pet.name = save.pet.name;   // remember your cat's name
  W.maps = buildMaps();
  worldResize();
  window.addEventListener('resize', worldResize);
  bindWorldInput();
  goMap('town', 270, 520, true);
  W.running = true; W.active = true; W.last = 0;
  try { window.__W = W; } catch (e) {}   // dev aid: inspect world state from the console
  requestAnimationFrame(worldLoop);
  if (!W.petIntroed) { W.petIntroed = true; setTimeout(function(){ if (typeof toast === 'function') toast('🐱 ' + W.pet.name + ' the cat tags along!', 'good'); }, 1000); }
}
function worldResume(){ W.active = true; }
function worldPause(){ W.active = false; W.keys = {}; W.dpad = {}; }

function worldResize(){
  if (!W.cv) return;
  var r = W.cv.getBoundingClientRect();
  W.dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  W.vw = r.width; W.vh = r.height;
  W.cv.width = Math.round(r.width * W.dpr);
  W.cv.height = Math.round(r.height * W.dpr);
}

/* ---------- input ---------- */
function worldBlocked(){
  // paused while a modal / pack opener is up, mid-fade, or off the world tab
  return !W.active || W.fadeState !== 'idle' ||
    ($('modal-backdrop') && $('modal-backdrop').classList.contains('open')) ||
    ($('opener') && $('opener').classList.contains('open'));
}
function bindWorldInput(){
  window.addEventListener('keydown', function(e){
    if (worldBlocked() || activeTab !== 'world') return;
    var k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') W.keys.up = 1;
    else if (k === 'arrowdown' || k === 's') W.keys.down = 1;
    else if (k === 'arrowleft' || k === 'a') W.keys.left = 1;
    else if (k === 'arrowright' || k === 'd') W.keys.right = 1;
    else if (k === ' ' || k === 'enter' || k === 'e') { worldInteract(); return; }
    else return;
    W.target = null;               // manual steering cancels tap-to-walk
    e.preventDefault();
  });
  // tap / click anywhere on the map to walk there; tap near a person or door
  // to walk over and interact automatically.
  W.cv.addEventListener('pointerdown', function(e){
    if (worldBlocked() || activeTab !== 'world') return;
    var p = screenToWorld(e.clientX, e.clientY);
    var m = curMap(), snap = null, sd = 52;
    m.spots.forEach(function(sp){ var d = Math.hypot(p.x - sp.x, p.y - sp.y); if (d < sd) { sd = d; snap = sp; } });
    W.target = { x: p.x, y: p.y, spot: snap };
    W.stall = 0;
  });
  window.addEventListener('keyup', function(e){
    var k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') W.keys.up = 0;
    else if (k === 'arrowdown' || k === 's') W.keys.down = 0;
    else if (k === 'arrowleft' || k === 'a') W.keys.left = 0;
    else if (k === 'arrowright' || k === 'd') W.keys.right = 0;
  });
  document.querySelectorAll('#dpad .dbtn').forEach(function(btn){
    var dir = btn.getAttribute('data-dir');
    function on(e){ e.preventDefault(); W.dpad[dir] = 1; W.target = null; btn.classList.add('on'); }
    function off(e){ if (e) e.preventDefault(); W.dpad[dir] = 0; btn.classList.remove('on'); }
    btn.addEventListener('pointerdown', on);
    btn.addEventListener('pointerup', off);
    btn.addEventListener('pointerleave', off);
    btn.addEventListener('pointercancel', off);
  });
  var actBtn = $('act-btn');
  if (actBtn) actBtn.addEventListener('pointerdown', function(e){ e.preventDefault(); worldInteract(); });
}
function inputVector(){
  var x = (W.keys.right || W.dpad.right ? 1 : 0) - (W.keys.left || W.dpad.left ? 1 : 0);
  var y = (W.keys.down || W.dpad.down ? 1 : 0) - (W.keys.up || W.dpad.up ? 1 : 0);
  if (x && y) { x *= 0.7071; y *= 0.7071; }
  return { x: x, y: y };
}
function screenToWorld(cx, cy){
  var r = W.cv.getBoundingClientRect();
  return { x: (cx - r.left - W.vw / 2) / ZOOM + W.cam.x, y: (cy - r.top - W.vh / 2) / ZOOM + W.cam.y };
}

/* ---------- world helpers ---------- */
function curMap(){ return W.maps[W.map]; }
function goMap(id, sx, sy, silent){
  W.map = id; W.px = sx; W.py = sy; W.vx = W.vy = 0; W.moving = false; W.dir = 'down';
  W.target = null; W.camSnap = true;
  W.pet.x = sx - 26; W.pet.y = sy + 8; W.pet.emoteT = 0; W.pet.moving = false;  // the pet comes with you
  setLocLabel();
  refreshGoals(true);
  if (!silent) sfxClick();
}
function setLocLabel(){
  var loc = $('world-loc'); if (!loc || !W.maps) return;
  var m = W.maps[W.map]; if (!m) return;
  var fest = m.kind === 'indoor' ? null : festivalFor(save.day);
  var wx = m.kind === 'indoor' ? '' : ' · ' + weatherFor(save.day) + ' · ' + seasonFor(save.day) + (fest ? ' · ' + FESTIVAL_LABEL[fest] + '!' : '');
  loc.textContent = m.title + ' · ' + daypart().key + wx;
}
// The collapsible "Today" checklist, shown only on the town.
function refreshGoals(force){
  var el = $('world-goals'); if (!el) return;
  var onTown = W.maps && W.map === 'town';
  el.classList.toggle('show', onTown);
  if (!onTown) return;
  var goals = dailyGoals(save);
  var done = goals.filter(function(g){ return g.done; }).length;
  // clearing the whole list pays a one-time bonus, celebrated on the spot
  if (dailyBonusClaimable(save)) {
    var gained = claimDailyBonus(save);
    if (gained > 0) { persist(save); renderTopbar(); sfxCoins(); hapticPulse('rareholo');
      toast('All goals done! +' + gained + ' coins 🎉', 'coin'); }
  }
  var bonusDone = save.goalBonus && save.goalBonus.day === save.day;
  var sig = (W.goalsOpen ? 'o' : 'c') + goals.map(function(g){ return g.done ? 1 : 0; }).join('') + (bonusDone ? 'B' : '');
  if (!force && sig === W.goalsSig) return;
  W.goalsSig = sig;
  el.classList.toggle('collapsed', !W.goalsOpen);
  el.innerHTML =
    '<div class="wg-head"><span class="wg-title">Today</span><span class="wg-count">' + done + '/' + goals.length + (W.goalsOpen ? ' ▾' : ' ▸') + '</span></div>' +
    '<ul>' + goals.map(function(g){
      return '<li class="' + (g.done ? 'done' : '') + '"><span class="wg-box">' + (g.done ? '✓' : '') + '</span><span>' + g.label + '</span></li>';
    }).join('') +
    (bonusDone ? '<li class="wg-bonus">🎉 All done — bonus +' + DAILY_GOAL_BONUS + ' claimed</li>'
               : '<li class="wg-bonus pending">Clear all ' + goals.length + ' for +' + DAILY_GOAL_BONUS + ' coins</li>') +
    '</ul>';
  var head = el.querySelector('.wg-head');
  if (head) head.addEventListener('click', function(){ W.goalsOpen = !W.goalsOpen; refreshGoals(true); });
}
function rectHit(px, py, r, rc){
  return px + r > rc.x && px - r < rc.x + rc.w && py + r > rc.y && py - r < rc.y + rc.h;
}
function moveAxis(dx, dy){
  var m = curMap();
  var nx = W.px + dx, ny = W.py + dy;
  // walls / map bounds via feet circle
  var r = PLAYER_R * 0.8;
  if (dx) {
    var okx = nx > r && nx < m.w - r;
    if (okx) for (var i = 0; i < m.solids.length; i++) if (rectHit(nx, W.py, r, m.solids[i])) { okx = false; break; }
    if (okx) W.px = nx;
  }
  if (dy) {
    var oky = ny > r && ny < m.h - r;
    if (oky) for (var j = 0; j < m.solids.length; j++) if (rectHit(W.px, ny, r, m.solids[j])) { oky = false; break; }
    if (oky) W.py = ny;
  }
}

/* ---------- main loop ---------- */
function worldLoop(ts){
  if (!W.running) return;
  requestAnimationFrame(worldLoop);
  var dt = W.last ? Math.min((ts - W.last) / 1000, 0.05) : 0.016;
  W.last = ts;
  if (activeTab === 'world' && W.active) { worldUpdate(dt); worldDraw(); }
}
function worldUpdate(dt){
  W.actorPhase += dt;
  updateFade(dt);
  updateAmbient(curMap(), dt);
  // keep the "Today" checklist current as state changes (throttled)
  W.goalsT += dt; if (W.goalsT > 0.4) { W.goalsT = 0; refreshGoals(false); }
  var kv = inputVector();
  var v = { x: 0, y: 0 };
  if (worldBlocked()) { W.target = null; }
  else if (kv.x || kv.y) { v = kv; W.target = null; }
  else if (W.target) {
    var dx = W.target.x - W.px, dy = W.target.y - W.py, dist = Math.hypot(dx, dy);
    if (dist < 7) {
      var t = W.target; W.target = null;
      if (t.spot && t.spot.action) { W.prompt = t.spot; sfxClick(); t.spot.action(); }
    } else { v = { x: dx / dist, y: dy / dist }; }
  }
  W.moving = !!(v.x || v.y);
  if (W.moving && W.sitting) W.sitting = false;   // getting up when you walk
  if (W.moving) {
    if (Math.abs(v.x) > Math.abs(v.y)) W.dir = v.x > 0 ? 'right' : 'left';
    else W.dir = v.y > 0 ? 'down' : 'up';
    moveAxis(v.x * WALK_SPEED * dt, 0);
    moveAxis(0, v.y * WALK_SPEED * dt);
    W.walk += dt * 9;
    W.footT = (W.footT || 0) + dt;
    if (W.footT > 0.30) { W.footT = 0; sfxStep();
      W.puffs = W.puffs || [];
      W.puffs.push({ x: W.px + (W.dir === 'left' ? 5 : W.dir === 'right' ? -5 : 0), y: W.py + 11, t: 0 });
      if (W.puffs.length > 8) W.puffs.shift();
    }
  } else { W.walk = 0; W.footT = 0.3; }
  // age footstep dust; a puff lives ~0.5s then is culled
  if (W.puffs && W.puffs.length) {
    for (var pf = W.puffs.length - 1; pf >= 0; pf--) { W.puffs[pf].t += dt; if (W.puffs[pf].t > 0.5) W.puffs.splice(pf, 1); }
  }
  // give up on a tap target we can't reach (blocked by a wall)
  if (W.target) {
    W.stall = (Math.hypot(W.px - W.lastX, W.py - W.lastY) < 0.4) ? W.stall + dt : 0;
    if (W.stall > 0.4) { W.target = null; W.stall = 0; }
  }
  W.lastX = W.px; W.lastY = W.py;
  updatePet(dt);

  var m = curMap();
  // auto-portals: step onto a door to travel
  for (var i = 0; i < m.portals.length; i++) {
    var p = m.portals[i];
    if (rectHit(W.px, W.py, PLAYER_R, p)) {
      if (p.guard && !p.guard()) { showPrompt(p.blocked || 'Locked.', false); }
      else { doPortal(p); return; }
    }
  }
  // nearest interactable spot within range
  var best = null, bestD = 1e9;
  for (var s = 0; s < m.spots.length; s++) {
    var sp = m.spots[s];
    var d = Math.hypot(W.px - sp.x, W.py - sp.y);
    if (d < (sp.r || 56) && d < bestD) { bestD = d; best = sp; }
  }
  // Biscuit is pettable when you're beside it and there's no real interaction
  // spot in range (so people/props always take priority over the cat)
  if (!best && Math.hypot(W.px - W.pet.x, W.py - W.pet.y) < 44) { best = W.petSpot; }
  W.prompt = best;
  if (best) showPrompt((best.label ? best.label() : 'Look'), true);
  else hidePrompt();
}
function doPortal(p){
  travel(p.to, p.sx, p.sy);
}
// Fade out → switch map → fade in, so doorways feel like real thresholds.
function travel(id, sx, sy){
  if (W.fadeState !== 'idle') return;
  W.pendingTravel = { id: id, sx: sx, sy: sy };
  W.fadeState = 'out';
}
// Sleep: fade to night, show a "Day N" card, wake on the new day.
function sleepTransition(){
  if (W.fadeState !== 'idle') return;
  W.pendingSleep = true;
  W.fadeState = 'out';
}
var FADE_SPEED = 6;   // ~0.17s per fade half
function updateFade(dt){
  if (W.fadeState === 'out') {
    W.fade = Math.min(1, W.fade + dt * FADE_SPEED);
    if (W.fade >= 1) {
      if (W.pendingSleep) {
        W.pendingSleep = false;
        var r = nextDay(save);
        save.dayStart = daySnapshot(save);   // baseline for tomorrow's bedtime recap
        dayEventMessage = r.event !== 'none' ? DAY_EVENTS[r.event].label : null;
        persist(save); renderTopbar(); setLocLabel(); refreshGoals(true); sfxDay();
        W.sleepCard = { day: r.day, event: r.event };
        W.fadeState = 'hold'; W.fadeHold = 0;
      } else if (W.pendingTravel) {
        var t = W.pendingTravel; W.pendingTravel = null;
        goMap(t.id, t.sx, t.sy, true);
        W.fadeState = 'in';
      } else { W.fadeState = 'in'; }
    }
  } else if (W.fadeState === 'hold') {
    W.fadeHold += dt;
    if (W.fadeHold > 1.0) W.fadeState = 'in';
  } else if (W.fadeState === 'in') {
    W.fade = Math.max(0, W.fade - dt * FADE_SPEED);
    if (W.fade <= 0) { W.fade = 0; W.fadeState = 'idle'; W.sleepCard = null; }
  }
}
// The pet trails a fixed distance behind the player's facing, easing in and
// catching up if it lags. Rests just behind you when you stop.
function updatePet(dt){
  var p = W.pet;
  var off = 30 - Math.min(8, (save.pet && save.pet.affection) || 0);   // a well-fed cat sticks closer
  var dv = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] }[W.dir] || [0,1];
  var tx = W.px - dv[0] * off, ty = W.py - dv[1] * off + 4;
  var dx = tx - p.x, dy = ty - p.y, d = Math.hypot(dx, dy);
  if (d > 4) {
    var spd = Math.min(WALK_SPEED * 1.2, 26 + d * 5);
    p.x += (dx / d) * spd * dt; p.y += (dy / d) * spd * dt;
    p.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    p.moving = true; p.walk += dt * 12;
  } else { p.moving = false; }
  if (p.emoteT > 0) p.emoteT -= dt;
}
function petReact(kind){ W.pet.emote = kind; W.pet.emoteT = 1.3; }
function showPrompt(text, ready){
  var el = $('world-prompt'); if (!el) return;
  el.innerHTML = (ready ? '<span class="akey">A</span>' : '') + '<span>' + text + '</span>';
  el.classList.add('show');
  var act = $('act-btn'); if (act) act.classList.toggle('ready', !!ready);
}
function hidePrompt(){
  var el = $('world-prompt'); if (el) el.classList.remove('show');
  var act = $('act-btn'); if (act) act.classList.remove('ready');
}
function worldInteract(){
  if (worldBlocked() || activeTab !== 'world') return;
  if (W.prompt && W.prompt.action) { sfxClick(); petReact('heart'); W.prompt.action(); }
}

/* =====================================================================

  var rand = seededRandom(seed), pts = [];
  for (var i = 0; i < n; i++) pts.push({ x: rand() * w, y: rand() * h, s: 0.6 + rand() * 0.9, t: rand() });
  return pts;
}

// school jump-rope — keep tapping on the beat to build a streak
function actJumpRope(){
  if (!canJumpRope(save)) { toast('Too puffed to skip again today', ''); return; }
  var buddy = NPCS[0];
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<h3 class="modal-title">🪢 Jump Rope</h3>' +
    '<p class="smallnote" style="margin:2px 0 10px;">Tap JUMP each time the light hits the green. Keep the rhythm!' +
      (save.jrBest ? ' <b>Best: ' + save.jrBest + '</b>' : '') + '</p>' +
    '<div class="arc-bar"><div class="arc-zone"><i></i></div><div class="arc-mark" id="jr-mark"></div></div>' +
    '<div class="reel-result" id="jr-res">Streak: 0</div>' +
    '<button class="bigbtn" id="jr-btn">JUMP</button>';
  $('modal-backdrop').classList.add('open');
  var mark = $('jr-mark'), pos = 0, dir = 1, speed = 1.8, streak = 0, ended = false, raf = null;
  function frame(){ if (ended) return; pos += dir * speed; if (pos >= 100) { pos = 100; dir = -1; } else if (pos <= 0) { pos = 0; dir = 1; } mark.style.left = pos + '%'; raf = requestAnimationFrame(frame); }
  raf = requestAnimationFrame(frame);
  function jump(){
    if (ended) return;
    var offset = Math.abs(pos - 50) / 50;
    if (offset <= 0.34) {
      streak++; speed = Math.min(4.4, speed + 0.2); $('jr-res').textContent = 'Streak: ' + streak; sfxTick();
      if (streak >= 15) endRun(true);   // a perfect run caps out
    } else { endRun(false); }
  }
  function endRun(perfect){
    ended = true; if (raf) cancelAnimationFrame(raf);
    var res = jumpRopePlay(save, streak, buddy.id);
    var rec = updateJumpBest(save, streak);
    persist(save); renderTopbar();
    var el = $('jr-res');
    if (res && res.coins) {
      el.innerHTML = (rec.isNew && streak > 0 ? '🏅 New record — ' + streak + ' jumps! ' : perfect ? 'Perfect run! ' : 'Streak ' + streak + '! ') +
        '+' + res.coins + ' coins' + (res.rel ? ' &middot; ' + buddy.name + ' had fun with you!' : '');
      el.classList.add('good'); sfxCoins(); hapticPulse(rec.isNew || perfect ? 'rare' : 'common');
      if (rec.isNew && streak > 0) { var jw = $('modal-sheet'); if (jw) burstConfetti(jw, 'rare'); }
    } else { el.innerHTML = 'Tripped! No coins that time.'; el.classList.add('nada'); sfxClick(); }
    var left = jumpRopeTriesLeft(save);
    $('jr-btn').textContent = left > 0 ? 'Again (' + left + ')' : 'Done';
  }
  $('jr-btn').addEventListener('click', function(){
    if (!ended) jump();
    else if (canJumpRope(save)) actJumpRope();
    else closeModal();
  });
}

var CART_DASH_ITEMS = ['🥫','🍎','🥖','🧀','🍫','🥛','🧃','🍪'];
function actCartDash(){
  if (!canCartDash(save)) { toast('You already dashed the cart today', ''); return; }
  var sheet = $('modal-sheet');
  var cells = '';
  for (var i = 0; i < 6; i++) cells += '<button class="cd-cell" data-i="' + i + '"><span></span></button>';
  sheet.innerHTML =
    '<h3 class="modal-title">🛒 Cart Dash</h3>' +
    '<p class="smallnote" style="margin:2px 0 8px;">Tap the glowing item to toss it in the cart — grab all you can!</p>' +
    '<div class="cd-hud"><span id="cd-time">8.0s</span><span id="cd-score">0 grabbed</span></div>' +
    '<div class="cd-grid">' + cells + '</div>' +
    '<div class="reel-result" id="cd-res">&nbsp;</div>' +
    '<button class="bigbtn" id="cd-btn" style="display:none;">Done</button>';
  $('modal-backdrop').classList.add('open');
  var grid = sheet.querySelector('.cd-grid'), cellsEl = sheet.querySelectorAll('.cd-cell');
  var hits = 0, lit = -1, timeLeft = 8.0, over = false, hop = null, tick = null;
  function relight(){
    if (over) return;
    if (lit >= 0) { cellsEl[lit].classList.remove('lit'); cellsEl[lit].firstChild.textContent = ''; }
    var next; do { next = Math.floor(seededRandom('cd-' + save.day + '-' + hits + '-' + Math.round(timeLeft * 10))() * 6); } while (next === lit);
    lit = next; cellsEl[lit].classList.add('lit');
    cellsEl[lit].firstChild.textContent = CART_DASH_ITEMS[Math.floor(seededRandom('cdi-' + save.day + '-' + hits + '-' + lit)() * CART_DASH_ITEMS.length)];
    hop = setTimeout(relight, 780);
  }
  function finish(){
    over = true; if (hop) clearTimeout(hop); if (tick) clearInterval(tick);
    var res = cartDash(save, hits); persist(save); renderTopbar();
    var el = $('cd-res');
    el.innerHTML = (res.tier === 'sweep' ? 'Clean sweep! ' : res.tier === 'great' ? 'Great haul! ' : res.tier === 'ok' ? 'Nice. ' : 'Slow today. ') +
      '+' + res.coins + ' coins' + (res.candy ? ' & a candy 🍬' : '');
    el.classList.add(res.coins >= 8 ? 'good' : 'nada'); sfxCoins();
    $('cd-btn').style.display = ''; $('cd-btn').addEventListener('click', closeModal);
  }
  grid.addEventListener('click', function(e){
    var b = e.target.closest('.cd-cell'); if (!b || over) return;
    if (+b.dataset.i === lit) { hits++; $('cd-score').textContent = hits + ' grabbed'; sfxClick();
      if (hop) clearTimeout(hop); relight(); }
  });
  var t0 = timeLeft;
  tick = setInterval(function(){ timeLeft -= 0.1; if (timeLeft <= 0) { timeLeft = 0; $('cd-time').textContent = '0.0s'; finish(); }
    else $('cd-time').textContent = timeLeft.toFixed(1) + 's'; }, 100);
  relight();
}

function worldDraw(){
  var ctx = W.ctx, m = curMap();
  var vw = W.vw, vh = W.vh;
  // camera centers on player, clamped to map, and eases toward the target

function drawFence(ctx, f){

function roundRectPath(ctx, x, y, w, h, r){

// small per-building details drawn over the base box so each storefront

function drawFacade(ctx, b){

    ctx.fillStyle = '#bfe6f2'; roundRectPath(ctx, b.x + 20, b.y + 58, b.w - 40, 44, 5); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.fillRect(b.x + 26, b.y + 62, (b.w - 52) * 0.4, 8);

// does this building have an action available right now? drives the "!" marker
function buildingBusiness(key){

  if (key === 'kiosk') return save.coins >= packPrice(save) || save.packsUnopened > 0;
  if (key === 'market') return canEnterMarket(save);
  if (key === 'school') {
    var s = save.school; if (!s) return false;
    if (s.wantDay !== save.day) return true;              // a fresh day's offers are waiting
    var open = s.offers && Object.keys(s.offers).some(function(id){ return s.offers[id].state === 'open'; });
    var duel = s.duels && s.duels.some(function(d){ return !d.done; });
    return !!(open || duel);
  }
  return false;

function drawHouse(ctx, h){

function drawPond(ctx, p){

}

function drawTownBench(ctx, x, y){
