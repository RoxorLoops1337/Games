<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f2e7d1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Collection">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>The Collection</title>
<style>
/* @tokens-start (extracted by card.html — keep markers) */
:root{
  --bg:#f2e7d1; --surface:#fdf8ec; --surface-2:#f2e9d6; --pocket:#ece0c8;
  --ink:#3a2f20; --ink-soft:#75644c; --ink-faint:#a08d70;
  --accent:#e2a04a; --accent-ink:#2a1c08; --accent-deep:#a8731d;
  --accent2:#1f8a6d;
  --line:#dccbaa; --line-soft:#e8dcc4;
  --stock:#fffcf3; --stock-ink:#2a241c; --stock-ink-soft:#6b6152;
  --serif:'Iowan Old Style','Palatino Linotype','Book Antiqua',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --mono:'SF Mono','IBM Plex Mono',Menlo,Consolas,monospace;
  --t-common:#98917f; --t-uncommon:#6aa14e; --t-rare:#2f9a77;
  --t-rareholo:#3391c6; --t-doublerare:#6a6fd8; --t-ultrarare:#b45fd8;
  --t-reverseholo:#3a7fb8;
}
/* @tokens-end */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; color:var(--ink); font-family:var(--sans);
  background:
    radial-gradient(circle at 15% 8%, rgba(226,160,74,.14), transparent 34%),
    radial-gradient(circle at 88% 12%, rgba(84,184,153,.13), transparent 32%),
    radial-gradient(circle at 70% 90%, rgba(90,163,220,.10), transparent 38%),
    var(--bg);
  -webkit-font-smoothing:antialiased; overflow:hidden; position:fixed; inset:0;
  touch-action:manipulation; user-select:none;
}
button{font-family:inherit; -webkit-tap-highlight-color:transparent;}

#app{position:absolute; inset:0; display:flex; flex-direction:column;}
/* faint notebook dot-grid over the scroll area */
main{
  background-image:radial-gradient(rgba(58,47,32,.06) 1px, transparent 1.2px);
  background-size:17px 17px;
}

/* ---- top bar ---- */
header.topbar{
  flex:none; padding:calc(env(safe-area-inset-top,0px) + 13px) 18px 11px;
  border-bottom:1px solid var(--line); background:var(--surface);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  position:relative; z-index:6;
}
/* bunting scallops hanging off the header */
header.topbar::after{
  content:""; position:absolute; left:0; right:0; bottom:-9px; height:9px; pointer-events:none;
  background:
    radial-gradient(circle at 8px 0, #e2a04a 0 6.5px, transparent 7.5px) 0 0/48px 9px repeat-x,
    radial-gradient(circle at 8px 0, #54b899 0 6.5px, transparent 7.5px) 16px 0/48px 9px repeat-x,
    radial-gradient(circle at 8px 0, #5aa3dc 0 6.5px, transparent 7.5px) 32px 0/48px 9px repeat-x;
}
header.topbar h1{font-family:var(--serif); font-size:18px; margin:0; font-weight:600; letter-spacing:.01em;}
.topbar-stats{display:flex; align-items:center; gap:14px;}
.day-badge{font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); letter-spacing:.04em; white-space:nowrap;}
.coins{
  font-family:var(--mono); font-size:14px; font-weight:600; color:var(--accent-deep);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.coins .coin-dot{width:9px;height:9px;border-radius:50%;background:var(--accent); box-shadow:0 0 6px rgba(226,160,74,.7);}
.candy{font-family:var(--mono); font-size:13px; font-weight:600; color:var(--t-doublerare); display:flex; align-items:center; gap:4px; white-space:nowrap;}
.candy .candy-ico{font-size:13px;}

main{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative;}
.screen{display:none; min-height:100%; padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 16px);}
.screen.active{display:block;}

/* ---- tab bar ---- */
nav.tabbar{
  flex:none; display:flex; border-top:1px solid var(--line); background:var(--surface);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
nav.tabbar button{
  flex:1; background:none; border:none; color:var(--ink-faint); padding:9px 4px 8px;
  font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:3px; min-height:52px;
  transition:color 150ms ease;
}
.tabicon{width:19px; height:19px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; transition:transform 150ms ease;}
nav.tabbar button .tabdot{width:4px;height:4px;border-radius:50%;background:transparent;}
nav.tabbar button.active{color:var(--accent);}
nav.tabbar button.active .tabicon{transform:translateY(-1px);}
nav.tabbar button.active .tabdot{background:var(--accent); box-shadow:0 0 5px var(--accent);}
nav.tabbar button:active{opacity:.6;}
nav.tabbar button:active .tabicon{transform:scale(.88);}

/* ---- walkable world ---- */
#screen-world{padding:0; position:absolute; inset:0; overflow:hidden; background:#3f7a3a;}
#screen-world.active{display:block;}
#world-canvas{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}
.world-loc{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  font-family:var(--serif); font-size:13px; font-weight:600; color:#fff;
  background:rgba(30,24,16,.55); padding:5px 16px; border-radius:20px;
  letter-spacing:.03em; pointer-events:none; z-index:4; backdrop-filter:blur(3px);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.world-goals{
  position:absolute; top:44px; left:calc(env(safe-area-inset-left,0px) + 10px);
  z-index:4; width:172px; font-size:12px; color:#fff;
  background:rgba(30,24,16,.62); border-radius:12px; padding:8px 10px; backdrop-filter:blur(3px);
  box-shadow:0 3px 10px rgba(0,0,0,.25); display:none; pointer-events:auto;
  border:1px solid rgba(255,220,150,.18);
}
.world-goals.show{display:block;}
.world-goals .wg-head{display:flex; align-items:center; justify-content:space-between; gap:8px; cursor:pointer;}
.world-goals .wg-title{font-family:var(--serif); font-weight:600; font-size:12.5px; letter-spacing:.02em;}
.world-goals .wg-count{font-family:var(--mono); font-size:10px; color:#ffd98a;}
.world-goals ul{list-style:none; margin:7px 0 0; padding:0; display:flex; flex-direction:column; gap:5px;}
.world-goals.collapsed ul{display:none;}
.world-goals li{display:flex; align-items:center; gap:7px; line-height:1.15;}
.world-goals li .wg-box{
  flex:none; width:14px; height:14px; border-radius:4px; border:1.5px solid rgba(255,235,200,.55);
  display:flex; align-items:center; justify-content:center; font-size:10px; color:#2a1c08;
}
.world-goals li.done .wg-box{background:#7ec86a; border-color:#7ec86a;}
.world-goals li.done span{opacity:.55; text-decoration:line-through;}
.world-goals li.wg-bonus{display:block; margin-top:4px; padding-top:5px; border-top:1px solid rgba(255,235,200,.18); font-size:11px; font-weight:600;}
.world-goals li.wg-bonus.pending{color:#ffd98a; opacity:.85;}
.world-goals li.wg-bonus:not(.pending){color:#8fe08a;}
.world-prompt{
  position:absolute; left:50%; bottom:150px; transform:translateX(-50%) translateY(8px);
  background:rgba(20,16,10,.82); color:#ffe9c2; font-size:13.5px; font-weight:600;
  padding:9px 16px 9px 14px; border-radius:12px; opacity:0; transition:opacity .16s, transform .16s;
  pointer-events:none; z-index:5; white-space:nowrap; display:flex; align-items:center; gap:9px;
  box-shadow:0 4px 14px rgba(0,0,0,.3); border:1px solid rgba(255,220,150,.25);
}
.world-prompt.show{opacity:1; transform:translateX(-50%) translateY(0);}
.world-prompt .akey{
  display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px;
  border-radius:6px; background:#e2a04a; color:#2a1c08; font-weight:800; font-size:12px;
  box-shadow:0 2px 0 #a8731d;
}
#world-controls{position:absolute; inset:0; pointer-events:none; z-index:4;}
.dpad{
  position:absolute; left:calc(env(safe-area-inset-left,0px) + 20px); bottom:calc(env(safe-area-inset-bottom,0px) + 28px);
  width:150px; height:150px; pointer-events:none;
}
.dbtn{
  position:absolute; width:52px; height:52px; border:none; pointer-events:auto;
  background:rgba(253,248,236,.86); color:var(--ink); font-size:15px; line-height:1;
  border-radius:13px; box-shadow:0 3px 8px rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center;
  transition:transform .06s, background .1s; touch-action:none; -webkit-user-select:none; user-select:none;
}
.dbtn:active,.dbtn.on{transform:scale(.9); background:var(--accent); color:#2a1c08;}
.dbtn.up{left:49px; top:0;} .dbtn.down{left:49px; top:98px;}
.dbtn.left{left:0; top:49px;} .dbtn.right{left:98px; top:49px;}
.act-btn{
  position:absolute; right:calc(env(safe-area-inset-right,0px) + 26px); bottom:calc(env(safe-area-inset-bottom,0px) + 52px);
  width:74px; height:74px; border-radius:50%; border:none; pointer-events:auto;
  background:radial-gradient(circle at 38% 32%, #f4bd6a, #e2a04a 60%, #c07f27);
  color:#2a1c08; font-size:26px; font-weight:800; font-family:var(--serif);
  box-shadow:0 5px 0 #a8731d, 0 8px 16px rgba(0,0,0,.3); touch-action:none;
  transition:transform .06s, box-shadow .06s;
}
.act-btn:active,.act-btn.on{transform:translateY(4px); box-shadow:0 1px 0 #a8731d, 0 3px 8px rgba(0,0,0,.3);}
.act-btn.ready{animation:actpulse 1.1s ease-in-out infinite;}
@keyframes actpulse{0%,100%{box-shadow:0 5px 0 #a8731d, 0 8px 16px rgba(0,0,0,.3);}50%{box-shadow:0 5px 0 #a8731d, 0 0 0 6px rgba(226,160,74,.35), 0 8px 16px rgba(0,0,0,.3);}}
/* the interior menu list used inside buildings */
.wmenu{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
.wmenu button{
  display:flex; align-items:center; gap:12px; text-align:left; width:100%;
  padding:13px 14px; border-radius:12px; border:1px solid var(--line);
  background:var(--surface); color:var(--ink); font-size:14px; font-weight:600;
}
.wmenu button .wm-emoji{font-size:22px; width:26px; text-align:center;}
.wmenu button small{display:block; font-weight:500; color:var(--ink-soft); font-size:11.5px; margin-top:2px;}
.notice-row{display:flex; gap:10px; align-items:baseline; padding:7px 2px; border-bottom:1px dashed var(--line); font-size:13px;}
.notice-row .notice-k{flex:none; width:74px; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-deep);}
.notice-cardhead{text-align:center; font-family:var(--serif); font-size:12px; color:var(--ink-soft); margin:12px 0 2px; letter-spacing:.04em;}
.wmenu button:disabled{opacity:.5;}
.wmenu button:active:not(:disabled){transform:scale(.98);}

/* ---- shared panels ---- */
.pcard{
  background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--line);
  border-radius:10px 12px 12px 10px; padding:18px; margin-bottom:14px;
  box-shadow:0 2px 8px rgba(93,70,35,.10);
}
.pcard.accent-gold{border-left-color:#e2a04a; background:linear-gradient(180deg,#fdf1da,#fdf8ec 55%);}
.pcard.accent-teal{border-left-color:#2fa583; background:linear-gradient(180deg,#e6f5ec,#fdf8ec 55%);}
.pcard.accent-night{border-left-color:var(--t-doublerare); background:linear-gradient(180deg,#ecebfb,#fdf8ec 55%);}
.pcard h2{font-family:var(--serif); font-size:17px; margin:0 0 4px; font-weight:600;}
.pcard p.sub{color:var(--ink-soft); font-size:13px; margin:0 0 14px;}
.bigbtn{
  width:100%; padding:14px; border-radius:9px; border:none; font-size:15px; font-weight:700;
  background:var(--accent); color:var(--accent-ink); min-height:48px; transition:transform 120ms ease;
}
.bigbtn:active{transform:scale(.96);}
.bigbtn[disabled]{background:var(--surface-2); color:var(--ink-faint);}
.bigbtn.ghost{background:transparent; border:1px solid var(--accent2); color:var(--accent2);}
.bigbtn.ghost[disabled]{background:transparent; border-color:var(--line); color:var(--ink-faint);}
.streak-row{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-top:10px;}
.streak-flame{color:var(--accent); display:inline-block; animation:flamePulse 1.8s ease-in-out infinite;}
@keyframes flamePulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.55; transform:scale(1.25);}}
@media (prefers-reduced-motion: reduce){.streak-flame{animation:none;}}

.progress-ribbon{
  background:var(--surface); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; margin-bottom:14px; box-shadow:0 2px 8px rgba(93,70,35,.10);
}
.ribbon-row{display:flex; justify-content:space-between; align-items:baseline; font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-bottom:8px;}
.ribbon-row strong{color:var(--ink); font-size:13px;}
.ribbon-hint{margin-top:7px; font-family:var(--mono); font-size:11.5px; color:var(--accent-deep);}
.ribbon-value{margin-top:5px; font-family:var(--mono); font-size:11.5px; color:var(--ink-soft);}
.progress-bar{height:8px; border-radius:5px; background:var(--surface-2); overflow:hidden; box-shadow:inset 0 1px 2px rgba(93,70,35,.15);}
.progress-bar .fill{height:100%; border-radius:5px; background:linear-gradient(90deg,#54b899,#5aa3dc,#8a7ae0,#e2a04a);}

/* @card-css-start (extracted by card.html — keep markers)
   Full-art luxe anatomy: art bleeds edge to edge, text floats on a dark
   translucent panel with gold pinstripes, beveled metal frame per tier.
   Tunable knobs are var(--tcg-*, default); design.json overrides them at
   boot and the Card Lab (card.html) edits them live. */
.tcg-card{
  position:relative; width:100%; aspect-ratio:5/7; border-radius:var(--tcg-radius, 12px);
  background:linear-gradient(160deg,#cdc6b8,#918a7c 26%,#ddd6c8 50%,#827b6c 76%,#c3bcae);
  padding:var(--tcg-frame-pad, 7px); display:flex; overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.55), inset 0 -2px 3px rgba(0,0,0,.35), 0 6px 18px rgba(60,40,15,.4);
}
/* beveled metal frames per tier: pewter, bronze, jade, silver, violet chrome, animated gold */
.tcg-card.f-uncommon{background:linear-gradient(160deg,#d2ac7c,#8e6d44 26%,#e2be92 50%,#7e5e3a 76%,#c6a072);}
.tcg-card.f-rare{background:linear-gradient(160deg,#a4d2ba,#548e70 26%,#c6e8d4 50%,#437e60 76%,#92c2aa);}
.tcg-card.f-rareholo{background:linear-gradient(135deg,#cfd8e6,#f4f8ff 28%,#9fb2c8 52%,#e8eef8 78%,#b9c6d8);}
.tcg-card.f-doublerare{background:linear-gradient(135deg,#b9b0ec,#e6e2ff 28%,#8f84d8 52%,#d6d0fa 78%,#a79ce4);}
.tcg-card.f-ultrarare{
  background:linear-gradient(120deg,#f7df8e,#fff3c4 20%,#d9a93f 44%,#ffe9a0 64%,#c8922a 84%,#f4d478);
  background-size:220% 220%; animation:foilShift var(--tcg-foil-speed, 4s) linear infinite alternate;
}
@keyframes foilShift{0%{background-position:0% 0%;}100%{background-position:100% 100%;}}
@media (prefers-reduced-motion: reduce){.tcg-card.f-ultrarare{animation:none;}}
.tcg2{
  flex:1; min-width:0; position:relative; border-radius:var(--tcg-inner-radius, 7px); overflow:hidden;
  background:#181423;
  box-shadow:inset 0 0 0 1px rgba(255,240,200,.55);
}
.tcg2-art{position:absolute; inset:0; background-size:cover; background-position:center 28%;}
.tcg2-scrim{position:absolute; left:0; right:0; top:0; height:var(--tcg-scrim-h, 46px); background:linear-gradient(rgba(10,8,20,var(--tcg-scrim-a, .7)), rgba(10,8,20,0));}
.tcg2-head{position:absolute; left:8px; right:8px; top:6px; display:flex; align-items:center; gap:5px;}
.stage-chip{
  font-family:var(--mono); font-size:var(--tcg-chip-fs, 7.5px); font-weight:700; letter-spacing:.07em; text-transform:uppercase;
  background:linear-gradient(180deg,#f6e0a0,#c89f48); color:#3a2508; border:1px solid rgba(255,242,205,.85);
  border-radius:8px; padding:2px 7px; flex:none; white-space:nowrap; box-shadow:0 1px 2px rgba(0,0,0,.4);
}
.tcg2-name{
  font-family:var(--serif); font-weight:700; font-size:var(--tcg-name-fs, 14px); color:#fffdf4;
  text-shadow:0 1px 3px rgba(0,0,0,.8); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0;
}
.name-spark{font-style:normal; color:#f4d478; font-size:.75em; margin-left:3px; text-shadow:0 0 6px rgba(244,212,120,.8);}
.tcg2-pow{font-family:var(--mono); font-weight:700; color:#fffdf4; text-shadow:0 1px 3px rgba(0,0,0,.8); font-size:var(--tcg-pow-fs, 15px); flex:none;}
.tcg2-pow i{font-style:normal; font-size:7.5px; vertical-align:3px; margin-right:2px; color:#f0c869;}
.type-orb{
  flex:none; width:var(--tcg-orb, 16px); height:var(--tcg-orb, 16px); border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.8), transparent 45%), var(--type-c);
  border:1.5px solid rgba(255,240,200,.9); box-shadow:0 1px 4px rgba(0,0,0,.55), inset 0 -2px 3px rgba(0,0,0,.35);
}
/* the floating info panel over the bottom of the art */
.tcg2-panel{
  position:absolute; left:0; right:0; bottom:0;
  background:rgba(14,11,24,var(--tcg-panel-a, .8));
  border-top:1px solid rgba(230,190,110,.65);
  padding:var(--tcg-body-pad, 7px) 10px 6px; display:flex; flex-direction:column; gap:var(--tcg-body-gap, 4px);
  color:#f2ead6;
}
.tcg2-panel::before{
  content:""; position:absolute; left:0; right:0; top:-16px; height:16px; pointer-events:none;
  background:linear-gradient(rgba(14,11,24,0), rgba(14,11,24,var(--tcg-panel-a, .8)));
}
.tcg2-badges{position:absolute; right:8px; top:-26px; display:flex; gap:5px;}
.move-row{display:flex; align-items:center; gap:6px;}
.energy{display:flex; gap:3px; flex:none;}
.energy i{
  width:var(--tcg-energy, 11px); height:var(--tcg-energy, 11px); border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.85), transparent 45%), var(--type-c);
  border:1px solid rgba(255,240,200,.6); box-shadow:inset 0 -2px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.4);
}
.move-name{font-family:var(--serif); font-weight:700; font-size:var(--tcg-move-name-fs, 13px); color:#fff; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.move-dmg{font-family:var(--mono); font-weight:700; font-size:var(--tcg-move-dmg-fs, 13.5px); color:#fff; flex:none;}
.move-text{font-size:var(--tcg-move-text-fs, 9px); line-height:1.35; color:#e8e0cc; min-height:2.6em;}
.tcg2-div{display:flex; align-items:center; gap:6px;}
.tcg2-div::before, .tcg2-div::after{content:""; flex:1; height:1px; background:linear-gradient(90deg, transparent, rgba(230,190,110,.75), transparent);}
.tcg2-div i{color:#e2b45f; font-size:7px; font-style:normal; line-height:1;}
.tcg2-flavor{font-size:var(--tcg-flavor-fs, 8.5px); font-style:italic; color:#e6c98f; line-height:1.3;}
.tcg2-foot{
  display:flex; justify-content:space-between; align-items:center; gap:4px;
  font-family:var(--mono); font-size:var(--tcg-foot-fs, 7.5px); color:#dfb96a;
  text-transform:uppercase; letter-spacing:.05em; white-space:nowrap;
}
.badge{font-family:var(--mono); font-size:9.5px; padding:2px 7px; border-radius:20px; font-weight:700;}
.badge.new{background:var(--accent2); color:#ecfff7;}
.badge.foil{background:var(--t-reverseholo); color:#fff;}
.holo-sheen{
  position:absolute; inset:0; border-radius:var(--tcg-radius, 12px); pointer-events:none; opacity:var(--tcg-sheen-a, 1);
  background:linear-gradient(115deg, transparent 22%, rgba(255,255,255,.20) 36%, rgba(130,205,255,.16) 46%, rgba(255,150,220,.14) 56%, transparent 72%);
  background-size:250% 250%; animation:holoSlide 3.2s linear infinite alternate; mix-blend-mode:screen;
}
@keyframes holoSlide{0%{background-position:0% 0%;}100%{background-position:100% 100%;}}
@media (prefers-reduced-motion: reduce){.holo-sheen{animation:none; background-position:50% 50%;}}
/* @card-css-end */

/* card back: same cream stock, night-sky inside */
.cardback{
  position:absolute; inset:0; border-radius:11px; background:var(--stock); padding:7px;
  box-shadow:0 4px 14px rgba(0,0,0,.4);
}
.cardback .cb-in{

/* ---- booster pack art ---- */
.pack{

}

@media (prefers-reduced-motion: reduce){.pack-crimp{transition:opacity 200ms;} .pack.tearing .pack-body{animation:none;}}

/* ---- opening ritual overlay ---- */
/* The opening ritual keeps a dark room — the one place drama beats daylight.
   Tokens are re-scoped locally so shared components (summary card, close
   button, hints) render in night colors only in here. */
#opener{
  --surface:#282152; --surface-2:#332b63; --line:#463c85; --line-soft:#3a3272;
  --ink:#f2e8d8; --ink-soft:#bfb3e0; --ink-faint:#918aae; --accent-deep:#e2a755;
  position:fixed; inset:0; z-index:50; display:none; flex-direction:column;

    radial-gradient(circle at 45% 82%, rgba(255,255,255,.07) 1px, transparent 1.9px) 0 0/140px 100px,
    radial-gradient(ellipse at 50% 30%, #332a5e, #171233 78%);
  padding:calc(env(safe-area-inset-top,0px) + 10px) 16px calc(env(safe-area-inset-bottom,0px) + 18px);
}
#opener.open{display:flex;}
.opener-top{flex:none; display:flex; align-items:center; justify-content:space-between; min-height:38px;}

.opener-foot{flex:none; text-align:center; min-height:58px;}

.pack-progress span{width:7px;height:7px;border-radius:50%; background:var(--line);}
.pack-progress span.done{background:var(--accent);}

.rstack{position:relative; width:min(68vw,250px); aspect-ratio:5/7;}
.rcard{position:absolute; inset:0;}
.rcard .tcg-card, .rcard .cardback{position:absolute; inset:0;}
.rcard.top{cursor:pointer;}
.rcard.charging{animation:chargeCycle 900ms ease-out; border-radius:11px;}
@keyframes chargeCycle{
  0%{box-shadow:0 0 10px 2px var(--t-common);}
  20%{box-shadow:0 0 14px 3px var(--t-uncommon);}
  40%{box-shadow:0 0 18px 4px var(--t-rare);}
  60%{box-shadow:0 0 22px 6px var(--t-rareholo);}

.rcard.twirl{animation:twirlIn 500ms cubic-bezier(.3,1.35,.45,1);}
@keyframes twirlIn{
  0%{transform:scaleX(.04) scale(.85) rotate(-14deg);}
  55%{transform:scaleX(1.06) scale(1.05) rotate(4deg);}
  100%{transform:none;}
}

.arc-zone{position:absolute; left:33%; width:34%; top:0; bottom:0; background:rgba(60,180,110,.55);
  box-shadow:0 0 8px rgba(60,180,110,.5);}
.arc-zone i{position:absolute; left:calc(50% - 8%); width:16%; top:0; bottom:0; background:rgba(60,200,120,.9);}
.arc-zone::before{content:""; position:absolute; left:50%; top:0; bottom:0; width:2px; margin-left:-1px; background:rgba(255,255,255,.7);}
.arc-mark{position:absolute; top:-2px; bottom:-2px; width:4px; margin-left:-2px; left:0; background:#fff; border-radius:2px; box-shadow:0 0 6px rgba(255,255,255,.9);}
@keyframes reelPop{0%{transform:scale(1.5);}60%{transform:scale(.9);}100%{transform:scale(1);}}
@media (prefers-reduced-motion: reduce){.reel-icon.reel-land{animation:none;}}
.reel-result{text-align:center; font-family:var(--mono); font-size:14px; font-weight:700; min-height:20px; margin-bottom:14px;}
.reel-result.good{color:var(--accent-deep);}
.reel-result.nada{color:var(--ink-faint);}
.cd-hud{display:flex; justify-content:space-between; font-family:var(--mono); font-weight:700; font-size:13px; color:var(--ink); margin:2px 2px 8px;}
.cd-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px;}
.cd-cell{aspect-ratio:1/1; border:none; border-radius:12px; background:var(--panel,#efe6d4); font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .06s, box-shadow .12s, background .12s;}
.cd-cell.lit{background:#ffe6a6; box-shadow:0 0 0 3px #e2a04a, 0 0 14px rgba(226,160,74,.7); transform:scale(1.06);}
.cd-cell:active{transform:scale(.94);}
.ach-list{display:flex; flex-direction:column; gap:6px; max-height:52vh; overflow-y:auto;}
.ach-row{display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; background:var(--panel,#efe6d4); opacity:.6;}
.ach-row.on{opacity:1; background:#fff6e0; box-shadow:inset 0 0 0 1.5px #e2a04a;}
.ach-ic{font-size:20px; width:24px; text-align:center;}
.ach-tx{display:flex; flex-direction:column; min-width:0; flex:1;}
.ach-tx b{font-size:13px; color:var(--ink);}
.ach-tx small{font-size:11px; color:var(--ink-faint);}
.ach-chk{color:var(--accent-deep); font-weight:800;}
.daysum{background:#fff6e0; box-shadow:inset 0 0 0 1.5px #e2a04a; border-radius:10px; padding:9px 12px; margin:2px 0 10px; font-size:13px; font-weight:600; color:var(--ink); text-align:center;}
.streak-strip{background:linear-gradient(90deg,#ffe0b0,#ffd0a0); box-shadow:inset 0 0 0 1.5px #e2874f; border-radius:10px; padding:8px 12px; margin:2px 0 10px; font-size:12.5px; font-weight:700; color:#8a4a1e; text-align:center;}

/* ---- relationships + social actions ---- */
.rel-badge{
  display:inline-block; font-family:var(--mono); font-size:9.5px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; padding:1px 8px; border-radius:20px;
  border:1px solid; margin-top:2px;
}
.social-row{display:flex; gap:8px; margin-top:12px; border-top:1px dashed var(--line); padding-top:11px;}
.social-btn{
  flex:1; font-family:var(--mono); font-size:12px; font-weight:700; padding:9px 6px; border-radius:8px;
  background:var(--surface-2); border:1px solid var(--t-doublerare); color:var(--t-doublerare); cursor:pointer;
}
.social-btn.risky{border-color:#c85f2c; color:#c85f2c;}
.social-btn:active{transform:scale(.97);}
.social-btn[disabled]{opacity:.45; border-color:var(--line); color:var(--ink-faint);}

/* ---- toasts ---- */
#toast-stack{
  position:fixed; left:0; right:0; top:calc(env(safe-area-inset-top,0px) + 68px);
  z-index:70; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;
}
.toast{
  background:#fffdf6; border:1.5px solid var(--line); color:var(--ink);
  font-family:var(--mono); font-size:12.5px; font-weight:600; padding:9px 16px; border-radius:20px;
  box-shadow:0 6px 18px rgba(93,70,35,.28); opacity:0; transform:translateY(-10px) scale(.96);
  transition:opacity 220ms ease, transform 220ms ease; max-width:82vw; text-align:center;
}
.toast.show{opacity:1; transform:translateY(0) scale(1);}
.toast.coin{border-color:var(--accent); color:var(--accent-deep);}
.toast.good{border-color:var(--accent2); color:var(--accent2);}
@media (prefers-reduced-motion: reduce){.toast{transition:opacity 120ms ease;}}

/* ---- modal ---- */
#modal-backdrop{position:fixed; inset:0; background:rgba(70,52,26,.45); display:none; align-items:flex-end; z-index:20;}
#modal-backdrop.open{display:flex;}
.modal-sheet{
  background:var(--surface); border-radius:16px 16px 0 0; padding:20px 20px calc(env(safe-area-inset-bottom,0px)+20px);
  width:100%; border-top:1px solid var(--line); position:relative;
}
.modal-cardwrap{width:min(56vw,210px); margin:0 auto 14px;}
.modal-row{display:flex; gap:10px;}
.modal-owned{margin-top:10px; text-align:center; color:var(--ink-faint); font-family:var(--mono); font-size:12px;}
.closebtn{
  width:32px; height:32px; border-radius:50%; flex:none;
  background:var(--surface-2); border:1px solid var(--line); color:var(--ink-soft); font-size:15px;
}
.modal-sheet .closebtn{position:absolute; top:14px; right:14px;}
</style>
</head>

<script>
(function(){
'use strict';

/* ================= RNG ================= */
function hashStr(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h ^ (h >>> 16)) >>> 0;
}
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededRandom(str){ return mulberry32(hashStr(str)); }

/* ================= data ================= */
var TIERS = [
  { key:'common',     name:'Common',      sell:1  },
  { key:'uncommon',   name:'Uncommon',    sell:2  },
  { key:'rare',       name:'Rare',        sell:5  },
  { key:'rareholo',   name:'Rare Holo',   sell:12 },
  { key:'doublerare', name:'Double Rare', sell:30 },
  { key:'ultrarare',  name:'Ultra Rare',  sell:80 },
];
var TIER_BY_KEY = {};
TIERS.forEach(function(t){ TIER_BY_KEY[t.key] = t; });

var TIER_COUNTS = { common:41, uncommon:25, rare:15, rareholo:10, doublerare:6, ultrarare:3 };
var TIER_POWER_RANGE = {
  common: [20, 40], uncommon: [35, 58], rare: [50, 78],
  rareholo: [65, 95], doublerare: [82, 112], ultrarare: [102, 140],
};
var TYPES = ['Ember','Aqua','Verdant','Volt','Stone','Shadow','Crystal','Wind','Lumen','Umbra'];
var NAME_PRE = ['Pyr','Aqua','Ver','Volt','Ston','Shad','Crys','Wynd','Lum','Umbr','Ker','Fen','Glo','Sil','Tor','Bram','Frost','Emb','Grim','Sol','Riv','Thal','Nyx','Ash','Petal','Quill','Moth','Drift','Coal','Marsh'];
var NAME_SUF = ['ling','ander','ix','ator','oth','ara','ino','ux','ell','wyn','bok','ryn','ash','ora','iss','eth','umo','ika','orn','ael','yx','oba','und','iel','ossom'];
var FLAVORS = [
  "Naps in warm patches of sun and grumbles if woken early.",
  "First recorded near the old quarry road, chasing dropped coins.",
  "Hums a two-note tune when it thinks nobody's listening.",
  "Leaves small scorch marks wherever it sits too long.",
  "Collects shiny bottle caps in an underground burrow.",
  "Freezes puddles solid just by stepping in them.",
  "Only comes out after the streetlights flicker on.",
  "Known to trade favors for anything sugary.",
  "Grows a little taller every time it wins a staring contest.",
  "Its footprints glow faintly for a few seconds after it passes.",
  "Considered good luck by kids at the bus stop.",
  "Sheds a fine dust that smells like rain.",
  "Can balance on a single toe for hours, out of stubbornness.",
  "Answers to its name only if you already have food.",
  "Curious about zippers, backpacks, and anything that clicks."
];

// Every card carries a printed move (name, energy cost, damage, effect
// text) and an illustrator credit, like a real TCG card. Purely
// collectible text — nothing executes it. Generated from a SEPARATE seed
// stream per card so existing card identities (name/type/power) stay
// byte-identical across releases and old saves keep pointing at the
// same creatures.
var MOVE_ADJ = {
  Ember: 'Cinder', Aqua: 'Tide', Verdant: 'Thorn', Volt: 'Static', Stone: 'Boulder',
  Shadow: 'Night', Crystal: 'Prism', Wind: 'Zephyr', Lumen: 'Sun', Umbra: 'Dusk',
};
var MOVE_VERBS = ['Rush','Pounce','Burst','Snap','Charge','Slam','Dance','Spark','Howl','Drift','Bloom','Quake','Gale','Glow','Hex','Nibble','Flick','Roll','Stare','Whirl'];
var MOVE_FX = [
  '',
  '',
  'Flip a coin. If heads, this attack does 20 more damage.',
  'The other card is Dazed — it flips last in the next duel.',
  'Heal 10 POW of playground scuffs.',
  'If this is your last copy, this attack does 10 more damage.',
  'Sparkles menacingly. That is all.',
  'Your opponent must say "whoa" out loud.',
  'Cannot be blocked by anyone wearing a backpack.',
  'Smells faintly of victory and pocket lint.',
];
var ILLUSTRATORS = ['Pixelwick','Tinbrush','MossPen','DoodleFin','Inkling Ada','Salt & Umber','KiloKilo','BeanJar','Cricketink','Waxwing'];

function buildCoreSet(){
  var order = [];
  Object.keys(TIER_COUNTS).forEach(function(k){
    for (var i = 0; i < TIER_COUNTS[k]; i++) order.push(k);
  });
  var shuffleRand = seededRandom('the-collection-core-shuffle-v1');
  for (var i = order.length - 1; i > 0; i--) {
    var j = Math.floor(shuffleRand() * (i + 1));
    var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
  }
  var seen = {};
  var cards = order.map(function(tierKey, idx){
    var id = 'c' + String(idx + 1).padStart(3, '0');
    var rand = seededRandom(id);
    var pre = NAME_PRE[Math.floor(rand() * NAME_PRE.length)];
    var suf = NAME_SUF[Math.floor(rand() * NAME_SUF.length)];
    var type = TYPES[Math.floor(rand() * TYPES.length)];
    var flavor = FLAVORS[Math.floor(rand() * FLAVORS.length)];
    var range = TIER_POWER_RANGE[tierKey];
    var power = range[0] + Math.floor(rand() * (range[1] - range[0] + 1));
    var name = pre + suf;
    if (seen[name]) name = name + (idx + 1);
    seen[name] = true;
    var mrand = seededRandom('move-' + id);
    var move = {
      name: MOVE_ADJ[type] + ' ' + MOVE_VERBS[Math.floor(mrand() * MOVE_VERBS.length)],
      dmg: Math.max(10, Math.round(power * 0.8 / 10) * 10),
      plus: mrand() < 0.35,
      text: MOVE_FX[Math.floor(mrand() * MOVE_FX.length)],
      cost: 1 + (power >= 60 ? 1 : 0) + (power >= 100 ? 1 : 0),
    };
    var illus = ILLUSTRATORS[Math.floor(mrand() * ILLUSTRATORS.length)];
    return { id: id, name: name, type: type, tier: tierKey, flavor: flavor, power: power, move: move, illus: illus };
  });
  return cards;
}
var CORE_SET = buildCoreSet();
var BY_ID = {};
var BY_TIER = {};
CORE_SET.forEach(function(c){
  BY_ID[c.id] = c;
  (BY_TIER[c.tier] = BY_TIER[c.tier] || []).push(c);
});

/* ================= economy ================= */
var PACK_PRICE = 40;
var STARTER_PACKS = 3;
var ALLOWANCE_BASE = 15;
var SOFT_PITY_START = 8;
var HARD_PITY_RAREHOLO = 15;
var HARD_PITY_ULTRARARE = 40;
var HIT_WEIGHTS_BASE = { rare: 0.55, rareholo: 0.30, doublerare: 0.10, ultrarare: 0.05 };
var SAVE_KEY = 'tc_save_v1';

var NPCS = [
  { id: 'finn', name: 'Finn', line: 'Trades hard, but keeps his word.' },
  { id: 'ren', name: 'Ren', line: 'Only wants the shiniest foils.' },
  { id: 'tova', name: 'Tova', line: 'Collects anything with wings, or claims to.' },
  { id: 'beck', name: 'Beck', line: 'Always short on coins, always has a card to offer.' },
];
// Each day has one event, seeded off the day number — and the evening
// before, the rumor at school tells you what tomorrow holds, so going to
// bed is a decision (save coins for the sale? hold spares for binder day?)
// instead of a reset button.
var DAY_EVENTS = {
  none:        { label: 'a normal day',                          weight: 34 },
  sale:        { label: 'kiosk sale — packs cost 30',            weight: 15 },
  supermarket: { label: 'supermarket trip with mom (free pack)', weight: 14 },
  grandma:     { label: 'grandma visits — double allowance',     weight: 12 },
  binderday:   { label: 'binder day — better trade offers',      weight: 13 },
  duelday:     { label: 'flip-duel craze — two duels today',     weight: 12 },
};
var SALE_PACK_PRICE = 30;
function dayEvent(day){
  if (day <= 1) return 'none';
  var rand = seededRandom('day-event-' + day);
  var weights = {};
  Object.keys(DAY_EVENTS).forEach(function(k){ weights[k] = DAY_EVENTS[k].weight; });
  return pickWeighted(rand, weights);
}
function packPrice(save){ return dayEvent(save.day) === 'sale' ? SALE_PACK_PRICE : PACK_PRICE; }

function freshSchool(){
  return { wantDay: null, offers: {}, duels: [], gaveCandy: {}, stoleToday: {} };
}

function freshSave(){
  return {
    version: 1,
    day: 1,
    coins: 0,
    candy: 0,
    packsUnopened: STARTER_PACKS,
    collection: {},
    pity: { sinceRareHoloPlus: 0, sinceUltraRare: 0 },
    allowance: { lastClaimDay: null, streak: 0 },
    packsOpenedTotal: 0,
    chores: { lastDoneDay: {} },
    rels: {},
    school: freshSchool(),
    pagesRewarded: {},
    lawns: { lastMowed: {}, lastAnyDay: null },
    lottery: { bought: 0 },
    mail: { lastDay: null },
    fishing: { day: null, casts: 0 },
    arcade: { day: null, plays: 0 },
    cart: { day: null },
    jumprope: { day: null, tries: 0 },
    pet: { name: 'Biscuit', affection: 0 },
    achSeen: {},
    dayStart: { day: 1, coins: 0, cards: 0, ach: 0 },
    newCards: {},
    goalBonus: { day: null },
    jrBest: 0,
    arcadeBulls: 0,
  };
}

/* ================= chores: daily odd jobs with a reveal reel ================= */
// A handful of once-a-day money actions so the early game isn't just
// "claim allowance and wait". Each opens a spinning reel that lands on
// what you found. Outcome is seeded per chore per day (pure + testable);
// the reel is just the reveal.
var CHORES = [
  { id: 'laundry', name: 'Check the laundry', emoji: '🧺',
    desc: 'Loose change hides in jeans pockets.',
    reel: ['🪙','🍬','🕳️','🪙','💰','🪙'],
    prizes: { coin_sm: 42, coin_md: 20, candy: 16, nothing: 14, lucky: 8 } },
  { id: 'lawn', name: 'Mow the lawn', emoji: '🌱',
    desc: 'Sweaty work, but the neighbours pay well.',
    reel: ['🪙','💰','🪙','💰','🪙','🍬'],
    prizes: { coin_md: 50, coin_lg: 30, candy: 10, nothing: 10 } },
  { id: 'dishes', name: 'Do the dishes', emoji: '🍽️',
    desc: 'Mom always slips you a little something.',
    reel: ['🪙','🪙','🍬','🪙','🕳️','🪙'],
    prizes: { coin_sm: 48, coin_md: 22, candy: 22, nothing: 8 } },
];
var CHORE_BY_ID = {};
CHORES.forEach(function(c){ CHORE_BY_ID[c.id] = c; });
var OUTCOME_ICON = { coin_sm: '🪙', coin_md: '💰', coin_lg: '💰', candy: '🍬', lucky: '🃏', nothing: '🕳️' };

function choreOutcome(choreId, day){
  var chore = CHORE_BY_ID[choreId];
  if (!chore) return null;
  var rand = seededRandom('chore-' + choreId + '-day-' + day);
  var kind = pickWeighted(rand, chore.prizes);
  var res = { kind: kind, coins: 0, candy: 0, cardId: null };
  if (kind === 'coin_sm') res.coins = 2 + Math.floor(rand() * 5);
  else if (kind === 'coin_md') res.coins = 6 + Math.floor(rand() * 7);
  else if (kind === 'coin_lg') res.coins = 12 + Math.floor(rand() * 10);
  else if (kind === 'candy') res.candy = 1 + Math.floor(rand() * 2);
  else if (kind === 'lucky') {
    var pool = BY_TIER['common'].concat(BY_TIER['uncommon']);
    res.cardId = pool[Math.floor(rand() * pool.length)].id;
    res.coins = 3;
  }
  return res;
}
function canDoChore(save, choreId){ return save.chores.lastDoneDay[choreId] !== save.day; }
function doChore(save, choreId){
  if (!canDoChore(save, choreId)) return null;
  var res = choreOutcome(choreId, save.day);
  if (!res) return null;
  save.coins += res.coins;
  save.candy += res.candy;
  if (res.cardId) addCardById(save, res.cardId);
  save.chores.lastDoneDay[choreId] = save.day;
  return res;
}

/* ================= candy: a second currency spent on friendships ================= */
var CANDY_PRICE = 8;
var CANDY_GIFT_REL = 8;
function buyCandy(save){
  if (save.coins < CANDY_PRICE) return false;
  save.coins -= CANDY_PRICE;
  save.candy += 1;
  return true;
}

/* ================= your cat: feed it, name it ================= */
function feedPet(save){
  if (save.candy < 1) return null;
  save.candy -= 1;
  save.pet = save.pet || { name: 'Biscuit', affection: 0 };
  save.pet.affection = (save.pet.affection || 0) + 1;
  return { affection: save.pet.affection };
}
function petMood(affection){
  if (affection >= 12) return 'adores you.';
  if (affection >= 6) return 'is very fond of you.';
  if (affection >= 1) return 'is warming up to you.';
  return '';
}

/* ================= relationships: friends & enemies at school ================= */
var ENEMY_THRESHOLD = -40;
var REL_TIERS = [
  { min: 60,   key: 'bestfriend', label: 'Best friend', color: 'var(--t-rare)' },
  { min: 20,   key: 'friend',     label: 'Friend',      color: 'var(--accent2)' },
  { min: -19,  key: 'neutral',    label: 'Neutral',     color: 'var(--ink-faint)' },
  { min: -59,  key: 'cold',       label: 'Cold',        color: '#c88a3a' },
  { min: -100, key: 'enemy',      label: 'Enemy',       color: '#c85f2c' },
];
function relOf(save, npcId){ return (save.rels && save.rels[npcId]) || 0; }
function changeRel(save, npcId, delta){
  save.rels = save.rels || {};
  save.rels[npcId] = Math.max(-100, Math.min(100, relOf(save, npcId) + delta));
  return save.rels[npcId];
}
function relTier(score){
  for (var i = 0; i < REL_TIERS.length; i++) { if (score >= REL_TIERS[i].min) return REL_TIERS[i]; }
  return REL_TIERS[REL_TIERS.length - 1];
}
function giveCandy(save, npcId){
  if (save.candy < 1) return null;
  save.school.gaveCandy = save.school.gaveCandy || {};
  if (save.school.gaveCandy[npcId]) return null;
  save.candy -= 1;
  save.school.gaveCandy[npcId] = true;
  return { rel: changeRel(save, npcId, CANDY_GIFT_REL) };
}

/* ================= steal a card: risky, relationship-gated ================= */
function canSteal(save, npcId){
  return !(save.school.stoleToday && save.school.stoleToday[npcId]);
}
// Friends trust you (easier to swipe); enemies keep an eye on you (harder).
function stealChance(rel){ return Math.min(0.8, Math.max(0.2, 0.45 + rel / 300)); }
function stealLoot(npcId, day, rand){
  var tier = pickWeighted(rand, { common: 45, uncommon: 30, rare: 18, rareholo: 7 });
  var pool = BY_TIER[tier];
  return pool[Math.floor(rand() * pool.length)].id;
}
function attemptSteal(save, npcId, rand){
  if (!canSteal(save, npcId)) return null;
  rand = rand || Math.random;
  save.school.stoleToday = save.school.stoleToday || {};
  save.school.stoleToday[npcId] = true;
  var chance = stealChance(relOf(save, npcId));
  var caught = rand() >= chance;
  if (!caught) {
    var loot = stealLoot(npcId, save.day, rand);
    addCardById(save, loot);
    return { caught: false, cardId: loot };
  }
  // caught red-handed: friendship crashes and they grab a spare of yours
  changeRel(save, npcId, -35);
  var lost = null;
  var spares = spareCardIds(save);
  if (spares.length) { lost = spares[Math.floor(rand() * spares.length)]; removeCardById(save, lost); }
  return { caught: true, lostCardId: lost };
}

// The game runs on its own day counter, not the real calendar date — a
// single sitting can cover as many in-game days as the player wants, each
// with a fresh allowance claim and a fresh school scene, instead of
// waiting on a real 24 hours between them.
function canClaimAllowance(save){ return save.allowance.lastClaimDay !== save.day; }
function claimAllowance(save){
  if (!canClaimAllowance(save)) return 0;
  save.allowance.streak = (save.allowance.lastClaimDay === save.day - 1) ? save.allowance.streak + 1 : 1;
  var bonus = Math.min(save.allowance.streak - 1, 10) * 2;
  var amount = (ALLOWANCE_BASE + bonus) * (dayEvent(save.day) === 'grandma' ? 2 : 1);
  save.coins += amount;
  save.allowance.lastClaimDay = save.day;
  return amount;
}
// What claiming allowance TODAY would give — the streak it becomes, the streak
// bonus, and the total. Pure, so the Dad modal shows exactly what he'll pay.
function allowanceStreakInfo(save){
  var a = save.allowance || { streak: 0, lastClaimDay: null };
  var continues = a.lastClaimDay === save.day - 1;
  var streak = continues ? (a.streak || 0) + 1 : 1;
  var bonus = Math.min(streak - 1, 10) * 2;
  var grandma = dayEvent(save.day) === 'grandma';
  return { streak: streak, bonus: bonus, continues: continues, grandma: grandma, amount: (ALLOWANCE_BASE + bonus) * (grandma ? 2 : 1) };
}

function nextDay(save){
  save.day += 1;
  var event = dayEvent(save.day);
  if (event === 'supermarket') save.packsUnopened += 1;
  return { day: save.day, event: event, rumor: dayEvent(save.day + 1), supermarketPack: event === 'supermarket' };
}

/* ================= the town: neighbours & their lawns ================= */
// Five neighbours line the street. You can mow ONE lawn per day, and each
// neighbour's grass only grows back after a week — so you rotate through
// them for a steady trickle of coins. House colours drive the map art.
var NEIGHBORS = [
  { id: 'delgado', name: 'Mr. Delgado', wall: '#6fb7a6', roof: '#2f7d6c' },
  { id: 'okafor',  name: 'Mrs. Okafor', wall: '#d98da0', roof: '#a63f5c' },
  { id: 'petrov',  name: 'Old Petrov',  wall: '#b7b06f', roof: '#7d762f' },
  { id: 'huang',   name: 'The Huangs',  wall: '#7f9ad9', roof: '#3a52a6' },
  { id: 'santos',  name: 'Ms. Santos',  wall: '#b58dd9', roof: '#6a3fa6' },
];
var NEIGHBOR_BY_ID = {};
NEIGHBORS.forEach(function(n){ NEIGHBOR_BY_ID[n.id] = n; });
var LAWN_COOLDOWN = 7;

function lawnState(save, neighborId){
  var lawns = save.lawns || {};
  var last = lawns.lastMowed && lawns.lastMowed[neighborId];
  var mowedAnyToday = lawns.lastAnyDay === save.day;
  var daysSince = (typeof last === 'number') ? (save.day - last) : Infinity;
  var onCooldown = daysSince < LAWN_COOLDOWN;
  return {
    canMow: !mowedAnyToday && !onCooldown,
    mowedAnyToday: mowedAnyToday,
    onCooldown: onCooldown,
    daysLeft: onCooldown ? (LAWN_COOLDOWN - daysSince) : 0,
  };
}
// Fully seeded per neighbour+day so the payout is replayable and testable.
function lawnOutcome(neighborId, day){
  var chore = CHORE_BY_ID['lawn'];
  var rand = seededRandom('lawn-' + neighborId + '-day-' + day);
  var kind = pickWeighted(rand, chore.prizes);
  var res = { kind: kind, coins: 0, candy: 0, cardId: null };
  if (kind === 'coin_md') res.coins = 8 + Math.floor(rand() * 8);
  else if (kind === 'coin_lg') res.coins = 16 + Math.floor(rand() * 12);
  else if (kind === 'candy') res.candy = 1 + Math.floor(rand() * 2);
  return res;
}
function mowLawn(save, neighborId){
  if (!NEIGHBOR_BY_ID[neighborId]) return null;
  var st = lawnState(save, neighborId);
  if (!st.canMow) return null;
  var res = lawnOutcome(neighborId, save.day);
  save.coins += res.coins;
  save.candy += res.candy;
  save.lawns = save.lawns || { lastMowed: {}, lastAnyDay: null };
  save.lawns.lastMowed = save.lawns.lastMowed || {};
  save.lawns.lastMowed[neighborId] = save.day;
  save.lawns.lastAnyDay = save.day;
  return res;
}

/* ================= the kiosk lottery (18+, wink wink) ================= */
// A scratch ticket the shopkeeper isn't sure he should sell you. Mostly a
// coin sink with the odd payout and a rare card jackpot — pure gambling
// dopamine, seeded per purchase so it's deterministic in tests.
var LOTTERY_PRICE = 5;
function lotteryOutcome(day, ticketNo){
  var rand = seededRandom('lottery-' + day + '-' + ticketNo);
  var kind = pickWeighted(rand, { nothing: 52, coin_sm: 24, coin_md: 13, coin_lg: 7, jackpot: 4 });
  var res = { kind: kind, coins: 0, cardId: null };
  if (kind === 'coin_sm') res.coins = 2 + Math.floor(rand() * 4);
  else if (kind === 'coin_md') res.coins = 8 + Math.floor(rand() * 6);
  else if (kind === 'coin_lg') res.coins = 16 + Math.floor(rand() * 12);
  else if (kind === 'jackpot') {
    var pool = BY_TIER['rare'].concat(BY_TIER['rareholo']);
    res.cardId = pool[Math.floor(rand() * pool.length)].id;
    res.coins = 20;
  }
  return res;
}
function buyLottery(save){
  if (save.coins < LOTTERY_PRICE) return null;
  save.coins -= LOTTERY_PRICE;
  save.lottery = save.lottery || { bought: 0 };
  save.lottery.bought += 1;
  var res = lotteryOutcome(save.day, save.lottery.bought);
  save.coins += res.coins;
  if (res.cardId) addCardById(save, res.cardId);
  return res;
}
// The supermarket is only reachable when a parent takes you — that's the
// "supermarket trip" day event.
function canEnterMarket(save){ return dayEvent(save.day) === 'supermarket'; }

// The mailbox: a short flavour note each day, and now and then some loose
// change or a fan letter. Seeded per day so it's stable and testable.
var MAIL_NOTES = [
  'A flyer for the school fair.',
  'Grandma sent a postcard from the seaside.',
  'A kiosk coupon — “buy one, get nothing free!”',
  'Just bills for mom and dad.',
  'A doodle from a friend at school.',
  'A trading-card club newsletter.',
  'Somebody’s lost-cat poster. (Not Biscuit.)',
];
function mailboxContent(day){
  var rand = seededRandom('mail-' + day);
  var note = MAIL_NOTES[Math.floor(rand() * MAIL_NOTES.length)];
  var roll = rand();
  var coins = roll < 0.26 ? 2 + Math.floor(rand() * 5) : 0;
  var letter = (roll >= 0.26 && roll < 0.34);   // a fan letter, purely nice
  return { note: note, coins: coins, letter: letter };
}
function canCheckMail(save){ return !save.mail || save.mail.lastDay !== save.day; }
function checkMail(save){
  if (!canCheckMail(save)) return null;
  var c = mailboxContent(save.day);
  save.mail = save.mail || { lastDay: null };
  save.mail.lastDay = save.day;
  if (c.coins) save.coins += c.coins;
  return c;
}

// The pond: a handful of casts a day. Mostly a few coins, sometimes candy
// or a soggy card, sometimes just an old boot. Seeded per day + cast number.
var FISH_CASTS_PER_DAY = 4;
function fishOutcome(day, castNo){
  var rand = seededRandom('fish-' + day + '-' + castNo);
  var kind = pickWeighted(rand, { coin: 38, bigcoin: 16, candy: 12, card: 15, boot: 19 });
  var res = { kind: kind, coins: 0, candy: 0, cardId: null, label: '' };
  if (kind === 'coin') { res.coins = 2 + Math.floor(rand() * 5); res.label = 'a handful of wet coins'; }
  else if (kind === 'bigcoin') { res.coins = 8 + Math.floor(rand() * 10); res.label = 'a dropped coin purse!'; }
  else if (kind === 'candy') { res.candy = 1 + Math.floor(rand() * 2); res.label = 'a floating candy 🍬'; }
  else if (kind === 'card') { var pool = BY_TIER['common'].concat(BY_TIER['uncommon']); res.cardId = pool[Math.floor(rand() * pool.length)].id; res.coins = 2; res.label = 'a waterlogged card'; }
  else { res.label = 'an old boot'; }
  return res;
}
// How many of the street's townsfolk are out today — a smaller crowd when
// the weather's bad. Deterministic off the day's weather.
function walkersOutCount(day){
  var w = weatherFor(day);
  if (w === 'rain') return 1;
  if (w === 'overcast') return 2;
  return 3;
}
function fishCastsLeft(save){
  var f = save.fishing || {};
  var used = (f.day === save.day) ? (f.casts || 0) : 0;
  return Math.max(0, FISH_CASTS_PER_DAY - used);
}
function canFish(save){ return fishCastsLeft(save) > 0; }
function fishCast(save){
  if (!canFish(save)) return null;
  save.fishing = save.fishing || { day: null, casts: 0 };
  if (save.fishing.day !== save.day) { save.fishing.day = save.day; save.fishing.casts = 0; }
  save.fishing.casts += 1;
  var res = fishOutcome(save.day, save.fishing.casts);
  save.coins += res.coins;
  save.candy += res.candy;
  if (res.cardId) addCardById(save, res.cardId);
  return res;
}

// The kiosk arcade cabinet: a timing game. offset is how far the marker
// stopped from the target centre (0 = bullseye, 1 = the far edge). The
// reward mapping is pure + tested; the sweeping bar lives in the UI.
var ARCADE_PLAYS_PER_DAY = 3;
function arcadeReward(offset){
  if (offset <= 0.08) return { tier: 'bullseye', coins: 12 };
  if (offset <= 0.20) return { tier: 'good',     coins: 6 };
  if (offset <= 0.34) return { tier: 'edge',     coins: 2 };
  return { tier: 'miss', coins: 0 };
}
function arcadePlaysLeft(save){
  var a = save.arcade || {};
  var used = (a.day === save.day) ? (a.plays || 0) : 0;
  return Math.max(0, ARCADE_PLAYS_PER_DAY - used);
}
function canPlayArcade(save){ return arcadePlaysLeft(save) > 0; }
function arcadePlay(save, offset){
  if (!canPlayArcade(save)) return null;
  save.arcade = save.arcade || { day: null, plays: 0 };
  if (save.arcade.day !== save.day) { save.arcade.day = save.day; save.arcade.plays = 0; }
  save.arcade.plays += 1;
  var res = arcadeReward(offset);
  save.coins += res.coins;
  if (res.tier === 'bullseye') save.arcadeBulls = (save.arcadeBulls || 0) + 1;   // lifetime precision tally
  res.totalBulls = save.arcadeBulls || 0;
  return res;
}

// Supermarket cart-dash: while a parent shops, you grab as many items off the
// shelves as you can in a short window. Reward scales with the tally; playable
// once per shopping day (canEnterMarket already gates the whole supermarket).
// Reward mapping is pure + tested; the whack-a-shelf UI lives in the modal.
function cartDashReward(hits){
  if (hits >= 8) return { tier: 'sweep',  coins: 14, candy: 1 };
  if (hits >= 5) return { tier: 'great',  coins: 8,  candy: 0 };
  if (hits >= 2) return { tier: 'ok',     coins: 4,  candy: 0 };
  return { tier: 'slow', coins: 1, candy: 0 };
}
function cartDashLeft(save){
  var c = save.cart || {};
  return (c.day === save.day) ? 0 : 1;
}
function canCartDash(save){ return cartDashLeft(save) > 0; }
function cartDash(save, hits){
  if (!canCartDash(save)) return null;
  save.cart = save.cart || { day: null };
  save.cart.day = save.day;
  var res = cartDashReward(Math.max(0, hits | 0));
  save.coins += res.coins;
  if (res.candy) save.candy = (save.candy || 0) + res.candy;
  return res;
}

// School jump-rope: keep the rhythm going. streak = jumps landed on the beat.
// Reward and relationship bump are pure + tested; the beat lives in the UI.
var JUMPROPE_TRIES_PER_DAY = 3;
function jumpRopeReward(streak){
  var coins = Math.min(streak, 12) * 2 + (streak >= 10 ? 6 : 0);
  var rel = streak >= 5 ? Math.min(6, Math.floor(streak / 3)) : 0;
  return { coins: coins, rel: rel, streak: streak };
}
function jumpRopeTriesLeft(save){
  var j = save.jumprope || {};
  var used = (j.day === save.day) ? (j.tries || 0) : 0;
  return Math.max(0, JUMPROPE_TRIES_PER_DAY - used);
}
function canJumpRope(save){ return jumpRopeTriesLeft(save) > 0; }
function jumpRopePlay(save, streak, npcId){
  if (!canJumpRope(save)) return null;
  save.jumprope = save.jumprope || { day: null, tries: 0 };
  if (save.jumprope.day !== save.day) { save.jumprope.day = save.day; save.jumprope.tries = 0; }
  save.jumprope.tries += 1;
  var res = jumpRopeReward(streak);
  save.coins += res.coins;
  if (res.rel && npcId) res.relNow = changeRel(save, npcId, res.rel);
  return res;
}
// Track the best jump-rope streak ever, so there's a record to chase. Pure.
function updateJumpBest(save, streak){
  var best = save.jrBest || 0;
  var isNew = streak > best;
  if (isNew) save.jrBest = streak;
  return { best: save.jrBest || 0, isNew: isNew };
}

// A short "today" checklist derived purely from existing state, so the
// player always has direction. No new save fields — everything is read
// back off the day's chores / lawns / allowance / school.
function dailyGoals(save){
  var s = save.school || {};
  var choreDone = !canDoChore(save, 'dishes') || !canDoChore(save, 'laundry');
  var lawnDone = !!(save.lawns && save.lawns.lastAnyDay === save.day);
  var schoolHandled = s.wantDay === save.day &&
    !(s.offers && Object.keys(s.offers).some(function(id){ return s.offers[id].state === 'open'; })) &&
    !(s.duels && s.duels.some(function(d){ return !d.done; }));
  return [
    { id: 'allowance', label: 'Claim your allowance',    done: !canClaimAllowance(save) },
    { id: 'chore',     label: 'Do a chore at home',      done: choreDone },
    { id: 'lawn',      label: 'Mow a neighbour’s lawn',  done: lawnDone },
    { id: 'school',    label: 'Sort things out at school', done: !!schoolHandled },
  ];
}
// Clearing all of the day's goals earns a one-time bonus — a reason to make
// the full round rather than cherry-pick. Pure + tested.
var DAILY_GOAL_BONUS = 30;
function allGoalsDone(save){ return dailyGoals(save).every(function(g){ return g.done; }); }
function dailyBonusClaimable(save){ return allGoalsDone(save) && !(save.goalBonus && save.goalBonus.day === save.day); }
function claimDailyBonus(save){
  if (!dailyBonusClaimable(save)) return 0;
  save.goalBonus = save.goalBonus || { day: null };
  save.goalBonus.day = save.day;
  save.coins += DAILY_GOAL_BONUS;
  return DAILY_GOAL_BONUS;
}
// The notice board's "card of the day" — a deterministic pick per day.
function cardOfDay(day){
  var rand = seededRandom('card-of-day-' + day);
  return CORE_SET[Math.floor(rand() * CORE_SET.length)].id;
}

function buyPack(save){
  var price = packPrice(save);
  if (save.coins < price) return false;
  save.coins -= price;
  save.packsUnopened += 1;
  return true;
}

function pickWeighted(rand, weights){
  var keys = Object.keys(weights);
  var total = keys.reduce(function(a, k){ return a + weights[k]; }, 0);
  var r = rand() * total;
  for (var i = 0; i < keys.length; i++) {
    r -= weights[keys[i]];
    if (r <= 0) return keys[i];
  }
  return keys[keys.length - 1];
}

function hitTierForPack(save, rand){
  if (save.pity.sinceUltraRare >= HARD_PITY_ULTRARARE) return 'ultrarare';
  if (save.pity.sinceRareHoloPlus >= HARD_PITY_RAREHOLO) return 'rareholo';
  var boost = Math.min(save.pity.sinceRareHoloPlus / SOFT_PITY_START, 1) * 0.25;
  var weights = {
    rare: Math.max(HIT_WEIGHTS_BASE.rare - boost, 0.15),
    rareholo: HIT_WEIGHTS_BASE.rareholo + boost * 0.6,
    doublerare: HIT_WEIGHTS_BASE.doublerare + boost * 0.25,
    ultrarare: HIT_WEIGHTS_BASE.ultrarare + boost * 0.15,
  };
  return pickWeighted(rand, weights);
}

function drawCard(tierKey, rand){
  var pool = BY_TIER[tierKey];
  var card = pool[Math.floor(rand() * pool.length)];
  var reverseEligible = tierKey === 'common' || tierKey === 'uncommon' || tierKey === 'rare';
  var reverseHolo = reverseEligible && rand() < 0.12;
  return { id: card.id, reverseHolo: reverseHolo };
}

function applyPull(save, pull){
  var rec = save.collection[pull.id];
  var isNew = !rec;
  if (!rec) { rec = { count: 0, reverseHolo: false }; save.collection[pull.id] = rec; }
  rec.count += 1;
  if (pull.reverseHolo) rec.reverseHolo = true;
  return isNew;
}

function openPack(save, rand){
  rand = rand || Math.random;
  if (save.packsUnopened <= 0) return null;
  save.packsUnopened -= 1;
  save.packsOpenedTotal += 1;

  var pulls = [];
  for (var i = 0; i < 3; i++) pulls.push(drawCard('common', rand));
  pulls.push(drawCard(pickWeighted(rand, { uncommon: 0.70, rare: 0.25, rareholo: 0.05 }), rand));

  var hitTier = hitTierForPack(save, rand);
  if (hitTier === 'ultrarare') save.pity.sinceUltraRare = 0;
  else save.pity.sinceUltraRare += 1;
  if (hitTier === 'rareholo' || hitTier === 'doublerare' || hitTier === 'ultrarare') save.pity.sinceRareHoloPlus = 0;
  else save.pity.sinceRareHoloPlus += 1;
  pulls.push(drawCard(hitTier, rand));

  var results = pulls.map(function(p){
    var isNew = applyPull(save, p);
    var card = BY_ID[p.id];
    return { id: p.id, name: card.name, type: card.type, tier: card.tier, power: card.power, flavor: card.flavor, move: card.move, illus: card.illus, reverseHolo: p.reverseHolo, isNew: isNew };
  });
  return results;
}

function sellDuplicate(save, id){
  var rec = save.collection[id];
  if (!rec || rec.count <= 1) return 0;
  var card = BY_ID[id];
  var tier = TIER_BY_KEY[card.tier];
  rec.count -= 1;
  save.coins += tier.sell;
  return tier.sell;
}

function duplicateValue(save){
  var total = 0;
  Object.keys(save.collection).forEach(function(id){
    var rec = save.collection[id];
    if (rec.count > 1) total += (rec.count - 1) * TIER_BY_KEY[BY_ID[id].tier].sell;
  });
  return total;
}

function sellAllDuplicates(save){
  var total = 0;
  Object.keys(save.collection).forEach(function(id){
    var rec = save.collection[id];
    if (rec.count > 1) {
      total += (rec.count - 1) * TIER_BY_KEY[BY_ID[id].tier].sell;
      rec.count = 1;
    }
  });
  save.coins += total;
  return total;
}

function cardValue(id){ return TIER_BY_KEY[BY_ID[id].tier].sell; }

function addCardById(save, id){
  var rec = save.collection[id];
  if (!rec) {
    rec = { count: 0, reverseHolo: false }; save.collection[id] = rec;
    save.newCards = save.newCards || {}; save.newCards[id] = true;   // flag first-time pulls for the binder "NEW" badge
  }
  rec.count += 1;
}
// clear a card's "NEW" flag once the player has looked at it in the binder
function markCardSeen(save, id){ if (save.newCards && save.newCards[id]) { delete save.newCards[id]; return true; } return false; }

function removeCardById(save, id){
  var rec = save.collection[id];
  if (!rec || rec.count < 1) return false;
  rec.count -= 1;
  if (rec.count === 0) delete save.collection[id];
  return true;
}

// Cards you own more than one of — the ones you can trade away without
// losing them from the binder.
function spareCardIds(save){
  return Object.keys(save.collection).filter(function(id){ return save.collection[id].count > 1; });
}

/* ---- haggling: kids offer card-for-card deals of varying fairness ---- */
// quality = how good the deal is FOR YOU: what they give (card + coins)
// versus the kiosk value of what they want. Kids being kids, plenty of
// offers are lowballs — and a few are accidentally generous.
var OFFER_QUALITIES = {
  lowball:  { mul: [0.55, 0.80], counterAccept: 0.70 },
  fair:     { mul: [0.90, 1.10], counterAccept: 0.45 },
  generous: { mul: [1.20, 1.60], counterAccept: 0.15 },
};
var QUALITY_WEIGHTS = { lowball: 40, fair: 40, generous: 20 };
var BINDER_DAY_WEIGHTS = { lowball: 15, fair: 45, generous: 40 };
var OFFER_WANT_TIERS = { common: 30, uncommon: 26, rare: 22, rareholo: 14, doublerare: 6, ultrarare: 2 };

// Friends skew their offers generous; enemies skew lowball. rel runs -100..100.
function offerWeightsForRel(rel, binderDay){
  var base = binderDay ? BINDER_DAY_WEIGHTS : QUALITY_WEIGHTS;
  var shift = (rel || 0) / 20;
  return {
    lowball:  Math.max(2, base.lowball - shift * 6),
    fair:     base.fair,
    generous: Math.max(2, base.generous + shift * 6),
  };
}

// sparePool = card ids the player owns spares of; when present the kid
// usually wants one of THOSE (so trades are actually fulfillable), which
// is what "only kids who want something you have" means in practice.
function makeOffer(npcId, day, binderDay, rel, sparePool){
  var rand = seededRandom('offer-' + npcId + '-day-' + day);
  var want;
  if (sparePool && sparePool.length && rand() < 0.72) {
    want = sparePool[Math.floor(rand() * sparePool.length)];
  } else {
    var wantTier = pickWeighted(rand, OFFER_WANT_TIERS);
    var wantPool = BY_TIER[wantTier];
    want = wantPool[Math.floor(rand() * wantPool.length)].id;
  }
  var quality = pickWeighted(rand, offerWeightsForRel(rel, binderDay));
  var band = OFFER_QUALITIES[quality].mul;
  var targetValue = cardValue(want) * (band[0] + rand() * (band[1] - band[0]));
  // their card is the biggest tier that fits inside the target; coins top it up
  var give = null;
  for (var i = TIERS.length - 1; i >= 0; i--) {
    if (TIERS[i].sell <= targetValue || i === 0) {
      var givePool = BY_TIER[TIERS[i].key];
      give = givePool[Math.floor(rand() * givePool.length)].id;
      break;
    }
  }
  var coins = Math.max(0, Math.round(targetValue - cardValue(give)));
  return { npcId: npcId, want: want, give: give, coins: coins, quality: quality, state: 'open', countered: false };
}

function canAcceptOffer(save, npcId){
  var o = save.school.offers[npcId];
  if (!o || o.state !== 'open') return false;
  var rec = save.collection[o.want];
  return !!rec && rec.count >= 1;
}

function acceptOffer(save, npcId){
  if (!canAcceptOffer(save, npcId)) return null;
  var o = save.school.offers[npcId];
  removeCardById(save, o.want);
  addCardById(save, o.give);
  save.coins += o.coins;
  o.state = 'done';
  changeRel(save, npcId, 5); // a completed trade warms things up
  return { gave: o.want, got: o.give, coins: o.coins };
}

// Push for more coins. Lowballers usually cave; someone who already made
// you a generous offer mostly just walks off — the counter is a gamble.
function counterOffer(save, npcId, rand){
  var o = save.school.offers[npcId];
  if (!o || o.state !== 'open' || o.countered) return null;
  o.countered = true;
  rand = rand || Math.random;
  if (rand() < OFFER_QUALITIES[o.quality].counterAccept) {
    o.coins += Math.max(2, Math.round(cardValue(o.want) * 0.3));
    return { accepted: true, coins: o.coins };
  }
  o.state = 'withdrawn';
  return { accepted: false };
}

function declineOffer(save, npcId){
  var o = save.school.offers[npcId];
  if (!o || o.state !== 'open') return false;
  o.state = 'declined';
  changeRel(save, npcId, -2); // a small snub
  return true;
}

/* ---- flip duels: stake a card, higher POW is favored, winner takes both ---- */
var DUEL_STAKE_TIERS = { common: 25, uncommon: 30, rare: 28, rareholo: 13, doublerare: 4 };
var DUEL_DAY_STAKE_TIERS = { uncommon: 25, rare: 35, rareholo: 25, doublerare: 12, ultrarare: 3 };

function buildDuelsForDay(day){
  var rand = seededRandom('duel-' + day);
  var isDuelDay = dayEvent(day) === 'duelday';
  var count = isDuelDay ? 2 : 1;
  var duels = [];
  for (var i = 0; i < count; i++) {
    var npc = NPCS[Math.floor(rand() * NPCS.length)];
    var tier = pickWeighted(rand, isDuelDay ? DUEL_DAY_STAKE_TIERS : DUEL_STAKE_TIERS);
    var pool = BY_TIER[tier];
    duels.push({ npcId: npc.id, stake: pool[Math.floor(rand() * pool.length)].id, done: false, won: null, myCard: null });
  }
  return duels;
}

function duelChance(myPow, theirPow){
  var p = myPow / (myPow + theirPow);
  return Math.min(0.85, Math.max(0.15, p));
}

function resolveDuel(save, duelIdx, myCardId, rand){
  var d = save.school.duels && save.school.duels[duelIdx];
  if (!d || d.done) return null;
  var rec = save.collection[myCardId];
  if (!rec || rec.count < 1) return null;
  rand = rand || Math.random;
  var chance = duelChance(BY_ID[myCardId].power, BY_ID[d.stake].power);
  var won = rand() < chance;
  if (won) addCardById(save, d.stake);
  else removeCardById(save, myCardId);
  d.done = true;
  d.won = won;
  d.myCard = myCardId;
  return { won: won, chance: chance, stake: d.stake, myCard: myCardId };
}

function refreshSchoolIfNeeded(save){
  if (save.school.wantDay === save.day && save.school.offers && save.school.duels) return;
  save.school.wantDay = save.day;
  var binderDay = dayEvent(save.day) === 'binderday';
  var spares = spareCardIds(save);
  var offers = {};
  NPCS.forEach(function(npc){
    var rel = relOf(save, npc.id);
    var o = makeOffer(npc.id, save.day, binderDay, rel, spares);
    // enemies aren't in the mood to trade with you
    if (rel <= ENEMY_THRESHOLD) o.state = 'refused';
    offers[npc.id] = o;
  });
  save.school.offers = offers;
  save.school.duels = buildDuelsForDay(save.day);
  save.school.gaveCandy = {};
  save.school.stoleToday = {};
  delete save.school.wants;
  delete save.school.fulfilledToday;
}

/* ---- binder page rewards ---- */
var PAGE_SIZE = 9;
var PAGE_REWARD = 50;
function pageCards(pageIdx){ return CORE_SET.slice(pageIdx * PAGE_SIZE, pageIdx * PAGE_SIZE + PAGE_SIZE); }
function isPageComplete(save, pageIdx){
  var cs = pageCards(pageIdx);
  return cs.length > 0 && cs.every(function(c){ return !!save.collection[c.id]; });
}
function claimPageReward(save, pageIdx){
  if (!isPageComplete(save, pageIdx)) return 0;
  save.pagesRewarded = save.pagesRewarded || {};
  if (save.pagesRewarded[pageIdx]) return 0;
  save.pagesRewarded[pageIdx] = true;
  save.coins += PAGE_REWARD;
  return PAGE_REWARD;
}

function completionFraction(save){
  return Object.keys(save.collection).length / CORE_SET.length;
}

// The trophy wall at home: persistent goals derived purely from existing save
// stats (no new save field — read defensively so old saves are fine). Each has
// a check(save) predicate; the modal renders locked/unlocked state.
var ACHIEVEMENTS = [
  { id:'firstpack', icon:'🎴', title:'First Rip',     desc:'Open your first pack',        check:function(s){ return (s.packsOpenedTotal||0) >= 1; } },
  { id:'ten',       icon:'📇', title:'Getting Started', desc:'Collect 10 different cards',  check:function(s){ return Object.keys(s.collection||{}).length >= 10; } },
  { id:'half',      icon:'📖', title:'Half Full',      desc:'Fill half the binder',        check:function(s){ return completionFraction(s) >= 0.5; } },
  { id:'complete',  icon:'🏆', title:'Completionist',  desc:'Complete the whole binder',   check:function(s){ return completionFraction(s) >= 1; } },
  { id:'week',      icon:'📅', title:'Regular',        desc:'Reach day 7',                 check:function(s){ return (s.day||1) >= 7; } },
  { id:'saver',     icon:'💰', title:'Piggy Bank',     desc:'Save up 100 coins',           check:function(s){ return (s.coins||0) >= 100; } },

// Return achievements newly unlocked since last check and mark them seen. Pure
// (mutates only save.achSeen); the UI celebrates whatever this returns.
function checkNewAchievements(save){
  save.achSeen = save.achSeen || {};

  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];

}

function seedAchSeen(save){ save.achSeen = save.achSeen || {}; for (var i = 0; i < ACHIEVEMENTS.length; i++) if (ACHIEVEMENTS[i].check(save)) save.achSeen[ACHIEVEMENTS[i].id] = true; return save.achSeen; }

function daySnapshot(save){ return { day: save.day, coins: save.coins || 0, cards: Object.keys(save.collection || {}).length, ach: achievementCount(save) }; }

  return {
    cards: Math.max(0, Object.keys(save.collection || {}).length - (s.cards || 0)),
    coins: (save.coins || 0) - (s.coins || 0),
    ach: Math.max(0, achievementCount(save) - (s.ach || 0)),

}

function loadSave(){
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      var base = freshSave();
      base.day = (typeof parsed.day === 'number') ? parsed.day : 1;
      base.coins = parsed.coins || 0;
      base.candy = parsed.candy || 0;
      base.packsUnopened = (typeof parsed.packsUnopened === 'number') ? parsed.packsUnopened : STARTER_PACKS;
      base.collection = parsed.collection || {};
      base.pity = parsed.pity || base.pity;
      base.allowance = parsed.allowance || base.allowance;
      base.packsOpenedTotal = parsed.packsOpenedTotal || 0;
      base.chores = (parsed.chores && parsed.chores.lastDoneDay) ? parsed.chores : { lastDoneDay: {} };
      base.rels = parsed.rels || {};
      // pre-haggling saves stored wants/fulfilledToday; refreshSchoolIfNeeded
      // rebuilds the day's offers/duels because school.offers is missing
      base.school = (parsed.school && parsed.school.offers) ? parsed.school : base.school;
      if (!base.school.gaveCandy) base.school.gaveCandy = {};
      if (!base.school.stoleToday) base.school.stoleToday = {};
      base.pagesRewarded = parsed.pagesRewarded || {};
      base.lawns = (parsed.lawns && parsed.lawns.lastMowed) ? parsed.lawns : { lastMowed: {}, lastAnyDay: null };
      base.lottery = (parsed.lottery && typeof parsed.lottery.bought === 'number') ? parsed.lottery : { bought: 0 };
      base.mail = (parsed.mail && typeof parsed.mail.lastDay !== 'undefined') ? parsed.mail : { lastDay: null };
      base.fishing = (parsed.fishing && typeof parsed.fishing.casts === 'number') ? parsed.fishing : { day: null, casts: 0 };
      base.arcade = (parsed.arcade && typeof parsed.arcade.plays === 'number') ? parsed.arcade : { day: null, plays: 0 };
      base.cart = (parsed.cart && typeof parsed.cart.day !== 'undefined') ? parsed.cart : { day: null };
      base.jumprope = (parsed.jumprope && typeof parsed.jumprope.tries === 'number') ? parsed.jumprope : { day: null, tries: 0 };
      base.pet = (parsed.pet && parsed.pet.name) ? { name: parsed.pet.name, affection: parsed.pet.affection || 0 } : { name: 'Biscuit', affection: 0 };
      // seed the achievement seen-set so existing progress isn't re-toasted on load
      base.achSeen = (parsed.achSeen && typeof parsed.achSeen === 'object') ? parsed.achSeen : {};
      seedAchSeen(base);
      // seed today's snapshot from current progress so an existing save doesn't

      base.dayStart = (parsed.dayStart && typeof parsed.dayStart.day === 'number') ? parsed.dayStart : daySnapshot(base);
      base.newCards = (parsed.newCards && typeof parsed.newCards === 'object') ? parsed.newCards : {};
      base.goalBonus = (parsed.goalBonus && typeof parsed.goalBonus.day !== 'undefined') ? parsed.goalBonus : { day: null };
      base.jrBest = (typeof parsed.jrBest === 'number') ? parsed.jrBest : 0;
      base.arcadeBulls = (typeof parsed.arcadeBulls === 'number') ? parsed.arcadeBulls : 0;
      return base;
    }
  } catch (e) { /* corrupt/blocked storage falls back to a fresh save */ }
  return freshSave();
}
function persist(save){
  try { celebrateNewAchievements(save); } catch (e) {}
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
}
// Toast each freshly-unlocked achievement (staggered so several read cleanly).
function celebrateNewAchievements(save){
  var neu = checkNewAchievements(save);
  for (var i = 0; i < neu.length; i++) (function(a, d){
    setTimeout(function(){ toast(a.icon + ' ' + a.title + ' unlocked!', 'good'); try { hapticPulse('rare'); } catch (e) {} }, d);
  })(neu[i], i * 500);
  return neu.length;
}

/* ================= feel: sound, haptics, toasts, confetti ================= */
var audioCtx = null;
function getAudioCtx(){
  if (audioCtx) return audioCtx;
  var Ctx = (typeof AudioContext !== 'undefined') ? AudioContext : (typeof webkitAudioContext !== 'undefined' ? webkitAudioContext : null);
  if (!Ctx) return null;
  try { audioCtx = new Ctx(); } catch (e) { audioCtx = null; }
  return audioCtx;
}
function beep(freq, duration, opts){
  var ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended' && ctx.resume) { try { ctx.resume(); } catch (e) {} }
  opts = opts || {};
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = opts.type || 'square';
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  var now = ctx.currentTime;
  var peak = opts.volume || 0.05;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(peak, now + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}

var HAPTIC_PATTERNS = { common: 10, uncommon: 14, rare: 22, rareholo: [28, 18, 28], doublerare: [35, 20, 35, 20, 35], ultrarare: [55, 25, 55, 25, 55, 25, 85] };
function hapticPulse(tierKey){
