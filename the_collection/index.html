// Do the chore (outcome already decided + banked), then spin a little reel
// of icons that decelerates and lands on what you found.
function openChoreReel(choreId){
  var chore = CHORE_BY_ID[choreId];
  var res = doChore(save, choreId);
  if (!res) return;
  persist(save);
  renderTopbar();
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<h3 class="modal-title">' + chore.name + '</h3>' +
    '<div class="reel-window"><div class="reel-icon" id="reel-icon">' + chore.emoji + '</div></div>' +
    '<div class="reel-result" id="reel-result">&nbsp;</div>' +
    '<button class="bigbtn" id="reel-done" disabled>Spinning&hellip;</button>';
  $('modal-backdrop').classList.add('open');
  var iconEl = $('reel-icon');
  var landIcon = OUTCOME_ICON[res.kind] || '🪙';
  var seq = [];
  for (var i = 0; i < 16; i++) seq.push(chore.reel[i % chore.reel.length]);
  seq.push(landIcon);
  var idx = 0;
  function tick(){
    iconEl.textContent = seq[idx];
    sfxTick();
    idx++;
    if (idx >= seq.length) {
      iconEl.classList.add('reel-land');
      showChoreResult(res);
      return;
    }
    var t = idx / seq.length;
    setTimeout(tick, 45 + Math.pow(t, 3) * 300);
  }
  tick();

  function showChoreResult(r){
    var parts = [];
    if (r.coins) parts.push('+' + r.coins + ' coins');
    if (r.candy) parts.push('+' + r.candy + ' candy 🍬');
    if (r.cardId) parts.push('a loose card — ' + BY_ID[r.cardId].name + '!');
    var msg = parts.length ? parts.join(' &middot; ') : 'Nothing this time.';
    var resEl = $('reel-result');
    resEl.innerHTML = msg;
    resEl.classList.add(parts.length ? 'good' : 'nada');
    if (parts.length) { sfxCoins(); hapticPulse(r.cardId ? 'rare' : 'common'); }
    var doneBtn = $('reel-done');
    doneBtn.disabled = false;
    doneBtn.textContent = parts.length ? 'Nice!' : 'Ah well';
    doneBtn.addEventListener('click', function(){
      closeModal();
      renderHome();
    });
  }
}

/* ---- opening ritual ---- */
var opener = { session: null };

function startPackOpening(){
  if (save.packsUnopened <= 0) return;
  var pulls = openPack(save, Math.random);
  persist(save);
  renderTopbar();
  opener.session = { pulls: pulls, index: 0 };
  $('opener').classList.add('open');
  openerStagePack();
}

function closeOpener(){
  $('opener').classList.remove('open');
  $('opener-stage').innerHTML = '';
  $('opener-dots').innerHTML = '';
  $('opener-hint').textContent = '';
  opener.session = null;
  renderTopbar();
  if (activeTab === 'shop') renderShop();
  if (activeTab === 'home') renderHome();
}

function openerDots(){
  var s = opener.session;
  if (!s) return;
  $('opener-dots').innerHTML = s.pulls.map(function(_, i){
    return '<span class="' + (i < s.index ? 'done' : '') + '"></span>';
  }).join('');
}

function openerStagePack(){
  var stage = $('opener-stage');
  stage.innerHTML =
    '<div class="pack" id="opener-pack">' +
      '<div class="pack-crimp top" id="pack-crimp"><span class="pull-tab">PULL &#8649;</span></div>' +
      '<div class="pack-body"><div class="pack-star">&#9733;</div><div class="pack-set">CORE SET</div><div class="pack-count-label">5 CARDS</div></div>' +
      '<div class="pack-crimp bottom"></div>' +
    '</div>';
  $('opener-dots').innerHTML = '';
  $('opener-hint').textContent = 'Pull the strip to tear the pack open';
  var pack = $('opener-pack');
  var crimp = $('pack-crimp');
  var torn = false;
  function doTear(){
    if (torn) return;
    torn = true;
    crimp.classList.remove('dragging', 'springback');
    crimp.style.transform = '';
    pack.classList.add('tearing');
    sfxTear();
    hapticPulse('rare');
    setTimeout(openerStageCards, 430);
  }
  // Drag the foil strip sideways like a real wrapper; a plain tap still
  // tears it (desktop clicks, accessibility).
  var startX = null;
  var dist = 0;
  var dragging = false;
  var TEAR_THRESHOLD = 70;
  crimp.addEventListener('pointerdown', function(e){
    if (torn) return;
    startX = e.clientX;
    dist = 0;
    dragging = true;
    crimp.classList.add('dragging');
    try { crimp.setPointerCapture(e.pointerId); } catch (err) {}
  });
  crimp.addEventListener('pointermove', function(e){
    if (!dragging || torn) return;
    dist = Math.max(0, e.clientX - startX);
    crimp.style.transform = 'translateX(' + Math.min(dist, 110) + 'px) rotate(' + Math.min(dist * 0.06, 7) + 'deg)';
    if (dist > TEAR_THRESHOLD) { dragging = false; doTear(); }
  });
  function endDrag(){
    if (!dragging || torn) return;
    dragging = false;
    crimp.classList.remove('dragging');
    if (dist < 8) { doTear(); return; }
    crimp.classList.add('springback');
    crimp.style.transform = '';
    setTimeout(function(){ crimp.classList.remove('springback'); }, 200);
  }
  crimp.addEventListener('pointerup', endDrag);
  crimp.addEventListener('pointercancel', endDrag);
  // tapping the pack body (not the strip) also tears — guarded by `torn`
  pack.addEventListener('click', doTear);
}

function openerStageCards(){
  $('opener-stage').innerHTML = '<div class="rstack" id="rstack"></div>';
  rebuildStack();
}

function rebuildStack(){
  var s = opener.session;
  if (!s) return;
  if (s.index >= s.pulls.length) { openerStageSummary(); return; }
  var el = $('rstack');
  var html = '';
  for (var i = s.pulls.length - 1; i >= s.index; i--) {
    var off = i - s.index;
    html += '<div class="rcard' + (off === 0 ? ' top' : '') + '"' +
      (off > 0 ? ' style="transform:translate(' + (off * 3) + 'px,' + (-off * 4) + 'px)"' : '') + '>' +
      '<div class="cardback"><div class="cb-in"><span class="cb-mono">C</span></div></div>' +
    '</div>';
  }
  el.innerHTML = html;
  openerDots();
  $('opener-hint').textContent = 'Card ' + (s.index + 1) + ' of ' + s.pulls.length + ' — tap to reveal';
  var top = el.querySelector('.rcard.top');
  top.addEventListener('click', function(){
    sfxClick();
    // rarer pull = longer charge-up: commons snap over, an Ultra Rare
    // makes you sit through the full glow cycle
    var chargeMs = CHARGE_MS[s.pulls[s.index].tier] || 650;
    top.style.animationDuration = chargeMs + 'ms';
    top.classList.add('charging');
    var done = false;
    var timeoutId;
    var finishCharge = function(){
      if (done) return;
      done = true;
      clearTimeout(timeoutId);
      top.removeEventListener('animationend', finishCharge);
      top.classList.remove('charging');
      top.style.animationDuration = '';
      pinchReveal(top, s.pulls[s.index]);
    };
    top.addEventListener('animationend', finishCharge);
    timeoutId = setTimeout(finishCharge, chargeMs + 150);
  }, { once: true });
}

var CHARGE_MS = { common: 350, uncommon: 480, rare: 650, rareholo: 950, doublerare: 1200, ultrarare: 1600 };

// Pinch the card shut (scaleX -> 0), swap back for face while edge-on,
// pinch open. Deliberately NOT a perspective/preserve-3d flip — true 3D
// transforms left stale composited frames on screen in earlier testing.
function pinchReveal(card, pull){
  card.classList.add('closing');
  var done = false;
  var timeoutId;
  var finishClose = function(e){
    if (e && e.propertyName && e.propertyName !== 'transform') return;
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    card.removeEventListener('transitionend', finishClose);
    var badges =
      (pull.isNew ? '<span class="badge new">NEW</span>' : '') +
      (pull.reverseHolo ? '<span class="badge foil">REVERSE HOLO</span>' : '');
    card.innerHTML = cardHTML(pull, { reverseHolo: pull.reverseHolo, badges: badges });
    hydrateOwnerArt(card);
    card.classList.remove('closing');
    card.classList.add('twirl');
    var done2 = false;
    var t2;
    var finishOpen = function(){
      if (done2) return;
      done2 = true;
      clearTimeout(t2);
      card.removeEventListener('animationend', finishOpen);
      card.classList.remove('twirl');
      onRevealed(card, pull);
    };
    card.addEventListener('animationend', finishOpen);
    t2 = setTimeout(finishOpen, 600);
  };
  card.addEventListener('transitionend', finishClose);
  timeoutId = setTimeout(finishClose, 380);
}

function onRevealed(card, pull){
  sfxReveal(pull.tier);
  hapticPulse(pull.tier);
  card.style.boxShadow = '0 0 26px 5px var(--t-' + pull.tier + ')';
  card.style.borderRadius = '11px';
  burstConfetti(card, pull.tier);
  // big pulls hit harder: Double Rare shakes the table, Ultra Rare adds a gold flash
  if (pull.tier === 'doublerare' || pull.tier === 'ultrarare') {
    var stage = $('opener-stage');
    stage.classList.add('shake');
    setTimeout(function(){ stage.classList.remove('shake'); }, 460);
  }
  if (pull.tier === 'ultrarare') {
    var flash = document.createElement('div');
    flash.className = 'gold-flash';
    $('opener').appendChild(flash);
    setTimeout(function(){ flash.remove(); }, 700);
  }
  $('opener-hint').textContent = 'Tap anywhere to continue';
  $('opener-stage').addEventListener('click', function(){
    card.classList.add('flyoff');
    setTimeout(function(){
      if (!opener.session) return;
      opener.session.index += 1;
      rebuildStack();
    }, 300);
  }, { once: true });
}

function openerStageSummary(){
  var s = opener.session;
  if (!s) return;
  var newCount = s.pulls.filter(function(p){ return p.isNew; }).length;
  var order = ['common','uncommon','rare','rareholo','doublerare','ultrarare'];
  var best = s.pulls.reduce(function(a, p){ return order.indexOf(p.tier) > order.indexOf(a.tier) ? p : a; }, s.pulls[0]);
  var dotsRow = s.pulls.map(function(p){ return '<span class="pd" style="background:var(--t-' + p.tier + ')"></span>'; }).join('');
  var headline = order.indexOf(best.tier) >= order.indexOf('rareholo') ? 'Great pack!' : 'Pack complete';
  openerDots();
  $('opener-hint').textContent = '';
  $('opener-stage').innerHTML =
    '<div class="summary-card">' +
      '<h2>' + headline + '</h2>' +
      '<p>' + newCount + ' new card' + (newCount === 1 ? '' : 's') + '. Best pull: ' + best.name + ' (' + TIER_BY_KEY[best.tier].name + ').</p>' +
      '<div class="pull-dots">' + dotsRow + '</div>' +
      '<button class="bigbtn" id="btn-opener-done" style="margin-top:18px;">Done</button>' +
    '</div>';
  $('btn-opener-done').addEventListener('click', closeOpener);
}

/* ---- binder: 9-pocket pages ---- */
var binderPage = 0;
var binderShowMissing = false;

function pocketHTML(c, rec){
  var tc = 'var(--t-' + c.tier + ')';
  if (!rec) {
    return '<div class="pocket">' +
      '<span class="pk-num">#' + c.id.slice(1) + '</span>' +
      '<span class="pk-gem" style="color:' + tc + '">&#9670;</span>' +
      '<span class="pk-q">?</span>' +
    '</div>';
  }
  var sprite = spriteFor(c, 64);
  var art = sprite
    ? '<div class="pk-art" style="background-image:url(' + sprite + ')"></div>'
    : '<div class="pk-fallback" style="background:' + typeColor(c.type) + '">' + c.name.charAt(0) + '</div>';
  return '<div class="pocket owned" data-id="' + c.id + '" style="--tc:' + tc + '">' +
    '<span class="pk-num">#' + c.id.slice(1) + '</span>' +
    '<span class="pk-gem" style="color:' + tc + '">&#9670;</span>' +
    art +
    '<div class="pk-name">' + c.name + '</div>' +
    (rec.reverseHolo ? '<span class="foil-dot"></span>' : '') +
    (rec.count > 1 ? '<span class="pk-count">x' + rec.count + '</span>' : '') +
  '</div>';
}

function renderBinder(){
  var el = $('screen-binder');
  if (!el) return;
  var owned = Object.keys(save.collection).length;
  var pct = Math.round(completionFraction(save) * 100);
  var dupValue = duplicateValue(save);
  var totalPages = Math.ceil(CORE_SET.length / PAGE_SIZE);
  binderPage = Math.max(0, Math.min(binderPage, totalPages - 1));

  var body;
  if (binderShowMissing) {
    var missing = CORE_SET.filter(function(c){ return !save.collection[c.id]; });
    body = missing.length
      ? '<div class="missing-grid">' + missing.map(function(c){ return pocketHTML(c, null); }).join('') + '</div>'
      : '<div class="pcard"><h2>Set complete!</h2><p class="sub">Every card in the Core Set is in your binder.</p></div>';
  } else {
    var cardsOnPage = pageCards(binderPage);
    var ownedOnPage = cardsOnPage.filter(function(c){ return !!save.collection[c.id]; }).length;
    var complete = isPageComplete(save, binderPage);
    var rewarded = !!(save.pagesRewarded && save.pagesRewarded[binderPage]);
    var rewardStrip;
    if (complete && !rewarded) {
      rewardStrip = '<button class="bigbtn page-reward" id="btn-page-reward">Page complete! Claim +' + PAGE_REWARD + ' coins</button>';
    } else if (complete) {
      rewardStrip = '<div class="smallnote page-reward">Page complete &#10003; reward claimed</div>';
    } else {
      rewardStrip = '<div class="smallnote page-reward">' + ownedOnPage + '/' + cardsOnPage.length + ' on this page &mdash; fill it for +' + PAGE_REWARD + ' coins</div>';
    }
    body =
      '<div class="binder-page">' +
        cardsOnPage.map(function(c){ return pocketHTML(c, save.collection[c.id]); }).join('') +
      '</div>' +
      rewardStrip +
      '<div class="binder-nav">' +
        '<button id="btn-page-prev"' + (binderPage === 0 ? ' disabled' : '') + '>&larr; Prev</button>' +
        '<span class="page-label">Page ' + (binderPage + 1) + ' / ' + totalPages + '</span>' +
        '<button id="btn-page-next"' + (binderPage === totalPages - 1 ? ' disabled' : '') + '>Next &rarr;</button>' +
      '</div>';
  }

  el.innerHTML =
    '<div class="binder-head"><h2>Core Set &middot; ' + owned + '/' + CORE_SET.length + '</h2>' +
      '<button class="binder-toggle' + (binderShowMissing ? ' active' : '') + '" id="btn-toggle-missing">Missing only</button>' +
    '</div>' +
    '<div class="progress-bar binder-progress"><div class="fill" style="width:' + pct + '%"></div></div>' +
    '<div class="dupe-bar">' +
      '<p>Duplicates sell to the kiosk for quick coins — school trades pay more.</p>' +
      '<button id="btn-sell-dupes"' + (dupValue <= 0 ? ' disabled' : '') + '>' +
        (dupValue > 0 ? 'Sell all (+' + dupValue + ')' : 'None to sell') +
      '</button>' +
    '</div>' +
    body;

  $('btn-toggle-missing').addEventListener('click', function(){
    binderShowMissing = !binderShowMissing;
    renderBinder();
  });
  var prev = $('btn-page-prev');
  if (prev) prev.addEventListener('click', function(){ sfxClick(); binderPage--; renderBinder(); });
  var next = $('btn-page-next');
  if (next) next.addEventListener('click', function(){ sfxClick(); binderPage++; renderBinder(); });
  el.querySelectorAll('.pocket.owned').forEach(function(slotEl){
    slotEl.addEventListener('click', function(){ sfxClick(); openCardModal(slotEl.getAttribute('data-id')); });
  });
  var sellDupesBtn = $('btn-sell-dupes');
  if (sellDupesBtn) sellDupesBtn.addEventListener('click', function(){
    var gained = sellAllDuplicates(save);
    if (gained > 0) {
      persist(save); renderTopbar(); renderBinder();
      sfxCoins();
      toast('Sold duplicates (+' + gained + ')', 'coin');
    }
  });
  var rewardBtn = $('btn-page-reward');
  if (rewardBtn) rewardBtn.addEventListener('click', function(){
    var gained = claimPageReward(save, binderPage);
    if (gained > 0) {
      persist(save); renderTopbar(); renderBinder();
      sfxCoins();
      hapticPulse('rareholo');
      toast('Page ' + (binderPage + 1) + ' complete! +' + gained + ' coins', 'coin');
      var pageEl = $('screen-binder').querySelector('.binder-page');
      if (pageEl) burstConfetti(pageEl, 'ultrarare');
    }
  });
}

function openCardModal(id){
  var card = BY_ID[id];
  var rec = save.collection[id];
  if (!card || !rec) return;
  var tier = TIER_BY_KEY[card.tier];
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<div class="modal-cardwrap">' + cardHTML(card, { reverseHolo: rec.reverseHolo }) + '</div>' +
    '<div class="modal-row">' +
      '<button class="bigbtn ghost" id="btn-sell"' + (rec.count <= 1 ? ' disabled' : '') + '>Sell duplicate (+' + tier.sell + ')</button>' +
    '</div>' +
    '<p class="modal-owned">Owned: ' + rec.count + (rec.reverseHolo ? ' &middot; reverse holo' : '') + '</p>';
  hydrateOwnerArt(sheet);
  $('btn-close-modal').addEventListener('click', closeModal);
  var sellBtn = $('btn-sell');
  if (sellBtn) sellBtn.addEventListener('click', function(){
    var gained = sellDuplicate(save, id);
    if (gained > 0) {
      persist(save); renderTopbar(); openCardModal(id); renderBinder();
      sfxCoins();
      toast('+' + gained + ' coins', 'coin');
    }
  });
  $('modal-backdrop').classList.add('open');
}
function closeModal(){ $('modal-backdrop').classList.remove('open'); }

/* ---- school: flip duels + haggling ---- */
var NPC_ACCENTS = { finn: 'var(--t-rare)', ren: 'var(--t-rareholo)', tova: 'var(--t-doublerare)', beck: 'var(--accent)' };

function npcById(id){ return NPCS.filter(function(n){ return n.id === id; })[0]; }

function miniCardHTML(cardId, opts){
  opts = opts || {};
  var c = BY_ID[cardId];
  var tier = TIER_BY_KEY[c.tier];
  var sprite = spriteFor(c, 64);
  var art = sprite
    ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
    : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
  return '<div class="want-mini" style="--type-c:' + typeColor(c.type) + '; margin:4px 0 8px;">' +
    '<div class="wm-art">' + art + '</div>' +
    '<div style="min-width:0;"><div class="wm-name">' + c.name + '</div>' +
      '<span class="tier-chip" style="background:var(--t-' + c.tier + ');">' + tier.name + '</span>' +
      '<div class="mini-meta">POW ' + c.power + ' &middot; sells for ' + tier.sell + 'c' + (opts.note ? ' &middot; ' + opts.note : '') + '</div>' +
    '</div>' +
    (opts.coins ? '<span class="coin-chip">+' + opts.coins + 'c</span>' : '') +
  '</div>';
}

function duelCardHTML(duel, idx){
  var npc = npcById(duel.npcId);
  var stakeCard = BY_ID[duel.stake];
  if (duel.done) {
    var myCard = duel.myCard ? BY_ID[duel.myCard] : null;
    return '<div class="pcard accent-gold">' +
      '<h2>Flip duel &mdash; ' + (duel.won ? 'you won!' : 'you lost') + '</h2>' +
      '<p class="sub">' + (duel.won
        ? 'Your ' + (myCard ? myCard.name : 'card') + ' flipped ' + npc.name + '\'s ' + stakeCard.name + ' — it\'s yours now.'
        : npc.name + ' pocketed your ' + (myCard ? myCard.name : 'card') + '. Tomorrow\'s another day.') + '</p>' +
    '</div>';
  }
  return '<div class="pcard accent-gold duel-box" data-duel="' + idx + '">' +
    '<h2>Flip duel!</h2>' +
    '<p class="sub">' + npc.name + ' slaps a card on the table. Winner takes both — higher POW is favored, but a flip is a flip.</p>' +
    miniCardHTML(duel.stake, {}) +
    '<button class="bigbtn" data-duel-pick="' + idx + '"' + (Object.keys(save.collection).length === 0 ? ' disabled' : '') + '>Pick a card to flip</button>' +
  '</div>';
}

function offerCardHTML(npc){
  var o = save.school.offers[npc.id];
  var rel = relOf(save, npc.id);
  var tier = relTier(rel);
  var head =
    '<div class="npc-head">' +
      '<span class="npc-avatar" style="background:' + NPC_ACCENTS[npc.id] + '">' + npc.name.charAt(0) + '</span>' +
      '<div style="flex:1; min-width:0;"><h2>' + npc.name + '</h2>' +
      '<span class="rel-badge" style="color:' + tier.color + '; border-color:' + tier.color + '">' + tier.label + '</span></div>' +
    '</div>' +
    '<p class="sub">' + npc.line + '</p>';

  var body;
  if (o.state === 'refused') {
    body = '<p class="sub">' + npc.name + ' is mad at you and won\'t trade today. Give them candy to patch things up.</p>';
  } else if (o.state === 'done') {
    body = '<p class="sub">Deal done. ' + npc.name + ' is showing everyone their new ' + BY_ID[o.want].name + '.</p>';
  } else if (o.state === 'withdrawn') {
    body = '<p class="sub">You pushed too hard — ' + npc.name + ' walked off with the offer.</p>';
  } else if (o.state === 'declined') {
    body = '<p class="sub">You passed. Maybe tomorrow\'s offer is better.</p>';
  } else {
    var haveWant = !!save.collection[o.want];
    var lastCopy = haveWant && save.collection[o.want].count === 1;
    body =
      '<span class="offer-label">' + npc.name + ' gives you</span>' +
      miniCardHTML(o.give, { coins: o.coins }) +
      '<span class="offer-label">For your</span>' +
      miniCardHTML(o.want, { note: haveWant ? (lastCopy ? '<span class="lastcopy">your last copy!</span>' : 'you have x' + save.collection[o.want].count) : 'not in your binder' }) +
      '<div class="offer-actions">' +
        '<button class="bigbtn" data-accept="' + npc.id + '"' + (canAcceptOffer(save, npc.id) ? '' : ' disabled') + '>Accept</button>' +
        '<button class="bigbtn ghost" data-counter="' + npc.id + '"' + (o.countered ? ' disabled' : '') + '>Ask more</button>' +
        '<button class="bigbtn ghost" data-decline="' + npc.id + '">Pass</button>' +
      '</div>' +
      (o.countered && o.state === 'open' ? '<div class="smallnote">They already agreed to sweeten it once.</div>' : '');
  }

  // social actions available whatever the trade state
  var gaveCandy = save.school.gaveCandy && save.school.gaveCandy[npc.id];
  var stole = !canSteal(save, npc.id);
  var social =
    '<div class="social-row">' +
      '<button class="social-btn" data-candy="' + npc.id + '"' + ((save.candy < 1 || gaveCandy) ? ' disabled' : '') + '>' +
        (gaveCandy ? '🍬 shared today' : '🍬 Give candy') + '</button>' +
      '<button class="social-btn risky" data-steal="' + npc.id + '"' + (stole ? ' disabled' : '') + '>' +
        (stole ? 'Tried already' : 'Swipe a card&hellip;') + '</button>' +
    '</div>';

  return '<div class="pcard" style="border-left-color:' + tier.color + '">' + head + body + social + '</div>';
}

function renderSchool(){
  var el = $('screen-school');
  if (!el) return;
  refreshSchoolIfNeeded(save);
  persist(save);
  var duelsHTML = (save.school.duels || []).map(function(d, i){ return duelCardHTML(d, i); }).join('');
  var offersHTML = NPCS.map(function(npc){ return offerCardHTML(npc); }).join('');
  el.innerHTML = duelsHTML + offersHTML;

  el.querySelectorAll('button[data-duel-pick]').forEach(function(btn){
    btn.addEventListener('click', function(){ sfxClick(); openDuelPicker(parseInt(btn.getAttribute('data-duel-pick'), 10)); });
  });
  el.querySelectorAll('button[data-accept]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-accept');
      var result = acceptOffer(save, npcId);
      if (result) {
        persist(save); renderTopbar(); renderSchool();
        sfxTrade();
        toast('Got ' + BY_ID[result.got].name + (result.coins ? ' +' + result.coins + 'c' : '') + ' for ' + BY_ID[result.gave].name, 'good');
      }
    });
  });
  el.querySelectorAll('button[data-counter]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-counter');
      var result = counterOffer(save, npcId);
      if (result) {
        persist(save); renderSchool();
        if (result.accepted) { sfxCoins(); toast(npcById(npcId).name + ' caved — more coins on the table!', 'coin'); }
        else { sfxClick(); toast(npcById(npcId).name + ' walked off. Deal\'s dead.', ''); }
      }
    });
  });
  el.querySelectorAll('button[data-decline]').forEach(function(btn){
    btn.addEventListener('click', function(){
      if (declineOffer(save, btn.getAttribute('data-decline'))) { sfxClick(); persist(save); renderSchool(); }
    });
  });
  el.querySelectorAll('button[data-candy]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var npcId = btn.getAttribute('data-candy');
      var result = giveCandy(save, npcId);
      if (result) {
        persist(save); renderTopbar(); renderSchool();
        sfxTrade();
        toast(npcById(npcId).name + ' loves it! ' + relTier(result.rel).label, 'good');
      }
    });
  });
  el.querySelectorAll('button[data-steal]').forEach(function(btn){
    btn.addEventListener('click', function(){ openStealConfirm(btn.getAttribute('data-steal')); });
  });
}

// Stealing is a real gamble: a warning first, then a coin-flip resolution.
function openStealConfirm(npcId){
  var npc = npcById(npcId);
  var chance = Math.round(stealChance(relOf(save, npcId)) * 100);
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<h3 class="modal-title">Swipe a card from ' + npc.name + '?</h3>' +
    '<p class="smallnote" style="margin:4px 0 12px;">Roughly <b>' + chance + '%</b> to pull it off. Get caught and ' + npc.name +
      ' turns on you — they grab one of your spare cards and won\'t forget it.</p>' +
    '<div class="modal-row">' +
      '<button class="bigbtn" id="btn-do-steal">Do it 😼</button>' +
      '<button class="bigbtn ghost" id="btn-no-steal">Chicken out</button>' +
    '</div>';
  $('modal-backdrop').classList.add('open');
  $('btn-close-modal').addEventListener('click', closeModal);
  $('btn-no-steal').addEventListener('click', closeModal);
  $('btn-do-steal').addEventListener('click', function(){
    var res = attemptSteal(save, npcId);
    persist(save);
    closeModal();
    renderTopbar();
    renderSchool();
    if (!res) return;
    if (res.caught) {
      sfxBusted();
      hapticPulse('doublerare');
      toast('Busted! ' + npc.name + (res.lostCardId ? ' took your ' + BY_ID[res.lostCardId].name : ' is furious'), '');
    } else {
      sfxSneak();
      hapticPulse('rare');
      toast('Swiped ' + BY_ID[res.cardId].name + ' — nobody saw!', 'good');
    }
  });
}

/* duel flow: pick a card from your binder, then a short suspense flip */
function openDuelPicker(duelIdx){
  var duel = save.school.duels[duelIdx];
  if (!duel || duel.done) return;
  var stakeCard = BY_ID[duel.stake];
  var owned = Object.keys(save.collection).map(function(id){ return BY_ID[id]; });
  owned.sort(function(a, b){ return b.power - a.power; });
  var rows = owned.map(function(c){
    var rec = save.collection[c.id];
    var chance = Math.round(duelChance(c.power, stakeCard.power) * 100);
    var sprite = spriteFor(c, 64);
    var art = sprite
      ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
      : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
    return '<div class="picker-row" data-pick="' + c.id + '">' +
      '<div class="wm-art" style="--type-c:' + typeColor(c.type) + '">' + art + '</div>' +
      '<div><div class="picker-name">' + c.name + '</div>' +
      '<div class="picker-meta">POW ' + c.power + (rec.count === 1 ? ' &middot; <span class="lastcopy">last copy</span>' : ' &middot; x' + rec.count) + '</div></div>' +
      '<div class="picker-right"><div class="picker-name">' + chance + '%</div><div class="picker-meta">to win</div></div>' +
    '</div>';
  }).join('');
  var sheet = $('modal-sheet');
  sheet.innerHTML =
    '<button class="closebtn" id="btn-close-modal">&times;</button>' +
    '<h3 class="modal-title">Stake a card vs ' + stakeCard.name + ' (POW ' + stakeCard.power + ')</h3>' +
    '<p class="smallnote" style="margin-top:2px;">Winner takes both cards. Lose, and yours is gone.</p>' +
    '<div class="picker-list">' + rows + '</div>';
  $('btn-close-modal').addEventListener('click', closeModal);
  sheet.querySelectorAll('.picker-row').forEach(function(row){
    row.addEventListener('click', function(){
      closeModal();
      playDuel(duelIdx, row.getAttribute('data-pick'));
    });
  });
  $('modal-backdrop').classList.add('open');
}

// The duel ceremony: your card slams the table, theirs answers, the POW
// numbers pop, a suspense glow, then the verdict stamps in and STAYS
// until you tap the button — no blink-and-you-missed-it.
function playDuel(duelIdx, myCardId){
  var duel = save.school.duels[duelIdx];
  if (!duel || duel.done) return;
  var result = resolveDuel(save, duelIdx, myCardId);
  if (!result) return;
  persist(save);
  var box = document.querySelector('.duel-box[data-duel="' + duelIdx + '"]');
  var myCard = BY_ID[myCardId];
  var stakeCard = BY_ID[result.stake];
  if (!box) { renderSchool(); renderTopbar(); return; }

  var bcardHTML = function(c, id){
    var sprite = spriteFor(c, 64);
    var art = sprite
      ? '<div class="wm-sprite" style="background-image:url(' + sprite + ')"></div>'
      : '<span style="font-family:var(--serif);font-weight:700;color:#fff;">' + c.name.charAt(0) + '</span>';
    return '<div class="bcard" id="' + id + '">' +
      '<div class="wm-art" style="--type-c:' + typeColor(c.type) + '">' + art + '</div>' +
      '<div class="duel-name">' + c.name + '</div>' +
      '<div class="b-pow">POW ' + c.power + '</div>' +
    '</div>';
  };
  box.innerHTML =
    '<h2>Flip duel!</h2>' +
    '<div class="duel-table">' +
      bcardHTML(myCard, 'bcard-me') +
      '<span class="duel-vs" id="duel-vs">VS</span>' +
      bcardHTML(stakeCard, 'bcard-them') +
      '<div class="duel-stamp" id="duel-stamp"></div>' +
    '</div>' +
    '<div id="duel-done-slot"></div>';
  box.scrollIntoView({ block: 'nearest' });

  var me = $('bcard-me');
  var them = $('bcard-them');
  // beat 1: your card hits the table
  me.classList.add('slam');
  sfxSlam();
  hapticPulse('rare');
  // beat 2: theirs answers
  setTimeout(function(){
    them.classList.add('slam');
    sfxSlam();
    hapticPulse('rare');
  }, 550);
  // beat 3: the numbers come out
  setTimeout(function(){
    me.classList.add('show-pow');
    them.classList.add('show-pow');
    $('duel-vs').classList.add('show-pow');
    sfxClick();
  }, 1100);
  // beat 4: suspense
  setTimeout(function(){ box.classList.add('charging'); }, 1250);
  // beat 5: the verdict — and it stays on the table
  setTimeout(function(){
    box.classList.remove('charging');
    var stamp = $('duel-stamp');
    stamp.textContent = result.won ? 'YOU WON!' : 'YOU LOST';
    stamp.classList.add(result.won ? 'win' : 'lose', 'stamp-in');
    var winner = result.won ? me : them;
    var loser = result.won ? them : me;
    winner.classList.add('winner');
    loser.classList.add('loser');
    if (result.won) {
      sfxWin();
      hapticPulse('ultrarare');
      burstConfetti(box, 'ultrarare');
    } else {
      sfxLose();
      hapticPulse('common');
    }
    $('duel-done-slot').innerHTML =
      '<button class="bigbtn' + (result.won ? '' : ' ghost') + '" id="btn-duel-done" style="margin-top:10px;">' +
        (result.won ? 'Take both cards' : 'Fine... take it') +
      '</button>';
    $('btn-duel-done').addEventListener('click', function(){
      sfxClick();
      renderSchool();
      renderTopbar();
    });
  }, 2250);
}

/* ---- tabs ---- */
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');
    // Every render* function rebuilds its screen's innerHTML from scratch when
    // it becomes active again, so it's safe to tear down whatever we're leaving.
    if (s.id !== 'screen-' + tab) s.innerHTML = '';
  });
  document.querySelectorAll('nav.tabbar button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tab') === tab); });
  $('screen-' + tab).classList.add('active');
  // main's scroll position carries over between screens (they share one
  // scroll container) — without this, arriving on a short screen right after
  // a long scrolled-down one renders it pushed almost entirely out of view.
  var mainEl = document.querySelector('main');
  if (mainEl) mainEl.scrollTop = 0;
  if (tab === 'home') renderHome();
  if (tab === 'shop') renderShop();
  if (tab === 'binder') renderBinder();
  if (tab === 'school') renderSchool();
}

// Apply owner design tweaks exported from the Card Lab (card.html).
// Missing/invalid design.json is a silent no-op — defaults live in the CSS.
function loadDesign(){
  if (typeof fetch !== 'function') return;
  try {
    fetch('design.json').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
      if (!d) return;
      Object.keys(d).forEach(function(k){
        if (k.indexOf('--') === 0) document.documentElement.style.setProperty(k, String(d[k]));
      });
    }).catch(function(){});
  } catch (e) {}
}

function boot(){
  loadDesign();
  document.querySelectorAll('nav.tabbar button').forEach(function(btn){
    btn.addEventListener('click', function(){
      var tab = btn.getAttribute('data-tab');
      if (tab !== activeTab) sfxClick();
      switchTab(tab);
    });
  });
  $('modal-backdrop').addEventListener('click', function(e){ if (e.target === this) closeModal(); });
  $('opener-close').addEventListener('click', function(){
    // Cards were already added when the pack opened; skipping ahead to the
    // summary keeps the recap honest instead of silently swallowing pulls.
    if (opener.session && opener.session.index < opener.session.pulls.length) openerStageSummary();
    else closeOpener();
  });
  renderTopbar();
  renderHome();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();

}
