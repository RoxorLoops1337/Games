<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kingshot Endless</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1b2b1e; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: none; overscroll-behavior: none;
  }
  #game { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
// ============================================================
// KINGSHOT ENDLESS — arcade-idle collector
// Auto-firing knight ⇒ enemies drop helmets ⇒ stack them on
// your back ⇒ sell or SMELT them ⇒ coins pile on the pallet ⇒
// pour them into stations: archer towers, wizard towers,
// catapults, war drums, porters, boss altars, waygates — and
// endless procedurally-scaled new lands. Golden foes drop gems
// for permanent shrine upgrades.
// One file, vanilla canvas, mobile-first. window.KS = test hooks.
// ============================================================

const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

// ---- world geometry -----------------------------------------
const WORLD_H = 1000;
const HUB_W   = 820;          // hub strip at the left
const ZONE_W  = 1050;         // each combat zone appended to the right
const PEN_PAD = 90;           // fence inset inside a zone
const SELL    = { x: 320, y: 430, r: 60 };
const PALLET  = { x: 320, y: 640, r: 62 };
const FORGE   = { x: 615, y: 430, r: 55 };     // helmet intake
const TRAY    = { x: 615, y: 575, r: 55 };     // smelted bars pickup
const HUBPAD  = { x: 680, y: 872, r: 44 };     // waygate pad (hub side)

// ---- balance dials ------------------------------------------
const PICK_R      = 78;    // helmet magnet radius (gem upgrade scales it)
const CAP0        = 8,  CAP_UP = 4;
const SPEED0      = 185,   SPEED_UP = 0.12;
const DMG0        = 6,     DMG_UP = 1.45;
const RATE0       = 0.55,  RATE_UP = 0.90;
const FIRE_RANGE  = 270;
const SELL_RATE   = 7;     // stack items per second offloaded
const VAC_RATE    = 55;    // pallet coins per second vacuumed
const BUILD_RATE  = 60;    // wallet coins per second poured into plates
const ECO         = 2.35;  // per-zone economy multiplier
const HP_T        = 2.15;  // per-zone enemy hp multiplier
const UNLOCK0     = 220, UNLOCK_MUL = 2.65;
const OFFLINE_CAP = 4 * 3600;
const TOWER_RANGE = 340, TOWER_RATE = 1.05;
const WIZ_RATE    = 2.0, WIZ_CHAIN = 3, WIZ_JUMP = 160;
const CAT_RATE    = 4.2, CAT_AOE = 115;
const DRUM_MUL    = 0.75;  // fire-interval multiplier inside a drummed zone
const PORTER_CAP  = 10, PORTER_SPD = 135;
const FORGE_T     = 1.8;   // s per smelt
const FORGE_Q     = 12, TRAY_MAX = 10;
const BAR_MUL     = 3;     // bars sell for 3x the helmet
const CROWN_MUL   = 22;    // boss crowns sell for 22x
const GOLD_CHANCE = 0.045; // golden enemy spawn chance
const BOSS_CD     = 45;    // altar cooldown
const WARP_T      = 0.55;  // s standing on a pad to warp

function eco(k)      { return Math.pow(ECO, k - 1); }
function helmVal(k)  { return Math.ceil(4 * eco(k)); }
function foeHp(k)    { return Math.ceil(13 * Math.pow(HP_T, k - 1)); }
function foeDmg(k)   { return Math.ceil(4 * Math.pow(1.55, k - 1)); }
function towerDmg(k) { return Math.ceil(9 * Math.pow(HP_T, k - 1)); }
function unlockCost(k) { return Math.ceil(UNLOCK0 * Math.pow(UNLOCK_MUL, k - 1)); }
const UPG = {
  speed: { icon: '👟', name: 'SPEED',    base: 35 },
  cap:   { icon: '🎒', name: 'CAPACITY', base: 30 },
  dmg:   { icon: '⚔️', name: 'DAMAGE',   base: 45 },
  rate:  { icon: '🏹', name: 'FIRE RATE', base: 55 },
};
function upgCost(key, lvl) { return Math.ceil(UPG[key].base * Math.pow(1.65, lvl)); }
const GEMU = {
  magnet: { icon: '🧲', name: 'MAGNET',   what: '+30% pickup range' },
  crit:   { icon: '💥', name: 'CRIT',     what: '+10% chance, 3x dmg' },
  coin:   { icon: '🪙', name: 'MIDAS',    what: '+25% coin value' },
};
function gemUpCost(key, lvl) { return 2 + lvl * (key === 'magnet' ? 2 : 3); }
const FOE_NAMES = ['Grunt', 'Raider', 'Ogre', 'Wraith', 'Golem', 'Demon', 'Titan', 'Dread'];
const FOE_COLS  = ['#c15840', '#c99a3a', '#7c52c9', '#4ba8b5', '#8a9a4a', '#c94a8a', '#5a6dcf', '#3f3f4f'];
function foeName(k) { const i = (k - 1) % FOE_NAMES.length; const cyc = Math.floor((k - 1) / FOE_NAMES.length); return FOE_NAMES[i] + (cyc ? ' ' + ('II III IV V VI VII VIII IX X'.split(' ')[cyc - 1] || cyc) : ''); }
function foeCol(k)  { return FOE_COLS[(k - 1) % FOE_COLS.length]; }

// ---- deterministic rng --------------------------------------
let seed = 987654321;
function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

// ---- zone factory -------------------------------------------
// zone 1 is the tutorial layout; zones 2+ rotate two bonus
// stations from a pool so every new land plays differently.
const POOL = [
  { id: 'tower2',   icon: '🏹', name: 'ARCHER TOWER', mul: 1.5 },
  { id: 'wizard',   icon: '⚡', name: 'WIZARD TOWER', mul: 1.8 },
  { id: 'catapult', icon: '💣', name: 'CATAPULT',     mul: 1.7 },
  { id: 'drums',    icon: '🥁', name: 'WAR DRUMS',    mul: 1.4 },
  { id: 'gate2',    icon: '🚪', name: 'MORE MONSTERS', mul: 1.15 },
];
function mkZone(k) {
  const x0 = HUB_W + (k - 1) * ZONE_W;
  const P = (id, icon, name, x, y, cost) => ({ id, icon, name, x, y, cost: Math.ceil(cost), paid: 0, built: false });
  const plates = [P('tower1', '🏹', 'ARCHER TOWER', x0 + 260, 265, 95 * eco(k))];
  if (k === 1) {
    plates.push(P('tower2', '🏹', 'ARCHER TOWER', x0 + 260, 735, 150 * eco(k)));
    plates.push(P('gate2', '🚪', 'MORE MONSTERS', x0 + 640, 230, 110 * eco(k)));
  } else {
    const a = POOL[k % POOL.length], b = POOL[(k + 2) % POOL.length];
    plates.push(P(a.id, a.icon, a.name, x0 + 260, 735, 95 * eco(k) * a.mul));
    plates.push(P(b.id, b.icon, b.name, x0 + 640, 230, 95 * eco(k) * b.mul));
    plates.push(P('altar', '💀', 'BOSS ALTAR', x0 + 640, 770, 200 * eco(k)));
  }
  plates.push(P('porter', '🧺', 'PORTER', x0 + 130, 500, 120 * eco(k)));
  plates.push(P('unlock', '🔓', 'NEW LANDS', x0 + ZONE_W - 60, 500, unlockCost(k)));
  return {
    k, x0, x1: x0 + ZONE_W,
    pen: { x0: x0 + PEN_PAD, x1: x0 + ZONE_W - PEN_PAD, y0: 160, y1: WORLD_H - 160 },
    spawnCd: 1.2, plates,
    towers: [], porters: [], drums: false, altar: null,
  };
}

// ---- state --------------------------------------------------
let S;
function reset() {
  S = {
    started: false, t: 0,
    player: {
      x: 620, y: 700, hp: 60, maxHp: 60, fireCd: 0, hurtT: 0, invuln: 0,
      helmets: [],           // stack entries: {k, bar?, crown?}
      face: 1, moving: 0, deaths: 0, warpT: 0,
    },
    wallet: 0, gems: 0,
    pallet: 0,
    up: { speed: 0, cap: 0, dmg: 0, rate: 0 },
    upPaid: { speed: 0, cap: 0, dmg: 0, rate: 0 },
    gemUp: { magnet: 0, crit: 0, coin: 0 },
    gemPaid: { magnet: 0, crit: 0, coin: 0 },
    forge: null,             // {queue:[k..], tray:[k..], smeltT}
    forgePlate: { cost: 260, paid: 0, built: false },
    waygate: false,
    wayPlate: { cost: 400, paid: 0, built: false },
    zones: [mkZone(1)],
    enemies: [], items: [], shots: [], parts: [], floats: [], fx: [],
    stick: null, keys: {},
    cam: { x: 620, y: 640 },
    stats: { kills: 0, earned: 0, sold: 0, bosses: 0 },
    offlineMsg: 0, offlineAmt: 0,
    shake: 0, saveCd: 5,
  };
}
function cap()     { return CAP0 + CAP_UP * S.up.cap; }
function speed()   { return SPEED0 * (1 + SPEED_UP * S.up.speed); }
function pDmg()    { return DMG0 * Math.pow(DMG_UP, S.up.dmg); }
function pRate()   { const z = zoneAt(S.player.x); return RATE0 * Math.pow(RATE_UP, S.up.rate) * (z && z.drums ? DRUM_MUL : 1); }
function pickR()   { return PICK_R * (1 + 0.3 * S.gemUp.magnet); }
function coinMul() { return 1 + 0.25 * S.gemUp.coin; }
function boundX()  { return S.zones[S.zones.length - 1].x1 - 30; }
function entryVal(e) { return Math.ceil(helmVal(e.k) * (e.crown ? CROWN_MUL : e.bar ? BAR_MUL : 1) * coinMul()); }

// ---- save / load --------------------------------------------
const SAVE_KEY = 'ks_idle_save';
function save() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 2, wallet: S.wallet, pallet: S.pallet, gems: S.gems,
      up: S.up, gemUp: S.gemUp,
      zoneCount: S.zones.length,
      built: S.zones.map(z => z.plates.filter(p => p.built).map(p => p.id)),
      paid: S.zones.map(z => { const o = {}; z.plates.forEach(p => { if (p.paid > 0 && !p.built) o[p.id] = p.paid; }); return o; }),
      forge: S.forge ? { queue: S.forge.queue, tray: S.forge.tray } : null,
      waygate: S.waygate,
      stats: S.stats, deaths: S.player.deaths, last: Date.now(),
    }));
  } catch (e) {}
}
function idleRate() {
  let r = 0;
  for (const z of S.zones) {
    if (!z.porters.length || !z.towers.length) continue;
    const killsPerSec = Math.min(z.towers.length / TOWER_RATE * 0.5, 1 / 2.2);
    r += killsPerSec * helmVal(z.k) * 1.4 * coinMul();
  }
  return r;
}
function load() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (e) {}
  if (!d || !(d.v >= 1)) return false;
  S.wallet = d.wallet || 0; S.pallet = d.pallet || 0; S.gems = d.gems || 0;
  Object.assign(S.up, d.up || {});
  Object.assign(S.gemUp, d.gemUp || {});
  Object.assign(S.stats, d.stats || {});
  S.player.deaths = d.deaths || 0;
  const n = Math.max(1, d.zoneCount || 1);
  S.zones = []; for (let k = 1; k <= n; k++) S.zones.push(mkZone(k));
  (d.built || []).forEach((ids, i) => {
    const z = S.zones[i]; if (!z) return;
    for (const id of ids) { const p = z.plates.find(q => q.id === id); if (p && id !== 'unlock') buildPlate(z, p, true); if (p && id === 'unlock') p.built = true; }
  });
  (d.paid || []).forEach((o, i) => {
    const z = S.zones[i]; if (!z) return;
    for (const id in o) { const p = z.plates.find(q => q.id === id); if (p && !p.built) p.paid = o[id]; }
  });
  if (d.forge) { S.forgePlate.built = true; S.forge = { queue: d.forge.queue || [], tray: d.forge.tray || [], smeltT: 0 }; }
  if (d.waygate) { S.wayPlate.built = true; S.waygate = true; }
  const away = Math.min(OFFLINE_CAP, Math.max(0, (Date.now() - (d.last || Date.now())) / 1000));
  const amt = Math.floor(idleRate() * away);
  if (amt > 0) { S.pallet += amt; S.offlineAmt = amt; S.offlineMsg = 6; }
  return true;
}

// ---- tiny synth sfx -----------------------------------------
let AC = null, muted = false;
try { muted = localStorage.getItem('ks_idle_muted') === '1'; } catch (e) {}
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  return AC;
}
let sfxGate = 0;
function sfx(kind, importance) {
  if (muted) return;
  if (!importance && S && S.t < sfxGate) return;
  const ac = audio(); if (!ac) return;
  if (!importance && S) sfxGate = S.t + 0.03;
  const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  const P = {
    shoot: [700, 300, 0.03, 0.05, 'square'],
    hit:   [200, 90, 0.05, 0.07, 'sawtooth'],
    kill:  [300, 90, 0.07, 0.14, 'sawtooth'],
    pick:  [880, 1320, 0.05, 0.07, 'square'],
    sell:  [1100, 1650, 0.05, 0.08, 'square'],
    coin:  [1400, 1870, 0.045, 0.07, 'triangle'],
    pour:  [500, 720, 0.04, 0.05, 'triangle'],
    built: [330, 990, 0.14, 0.4, 'triangle'],
    unlock:[220, 880, 0.16, 0.7, 'triangle'],
    hurt:  [140, 60, 0.10, 0.15, 'sawtooth'],
    die:   [200, 40, 0.18, 0.5, 'sawtooth'],
    zap:   [1600, 200, 0.07, 0.12, 'sawtooth'],
    boom:  [90, 35, 0.20, 0.4, 'sawtooth'],
    gem:   [1560, 2340, 0.10, 0.25, 'triangle'],
    smelt: [260, 520, 0.05, 0.09, 'triangle'],
    warp:  [300, 1200, 0.12, 0.3, 'sine'],
    boss:  [80, 55, 0.25, 0.8, 'square'],
  }[kind] || [440, 440, 0.04, 0.05, 'square'];
  o.type = P[4];
  o.frequency.setValueAtTime(P[0], t);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, P[1]), t + P[3]);
  g.gain.setValueAtTime(P[2], t);
  g.gain.exponentialRampToValueAtTime(0.001, t + P[3]);
  o.start(t); o.stop(t + P[3] + 0.02);
}
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ---- helpers ------------------------------------------------
function fmt(n) {
  n = Math.floor(n);
  if (n < 1000) return '' + n;
  if (n < 1e6) return (n / 1000).toFixed(n < 1e4 ? 1 : 0) + 'k';
  if (n < 1e9) return (n / 1e6).toFixed(n < 1e7 ? 1 : 0) + 'M';
  return (n / 1e9).toFixed(1) + 'B';
}
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }
function float(x, y, txt, color, big) {
  S.floats.push({ x, y, txt: String(txt), color, t: 0, big });
  if (S.floats.length > 50) S.floats.shift();
}
function puff(x, y, color, n, up) {
  for (let i = 0; i < n; i++)
    S.parts.push({ x, y, vx: (rnd() - 0.5) * 200, vy: (rnd() - (up ? 0.85 : 0.5)) * 220, t: 0, dur: 0.45 + rnd() * 0.2, r: 2 + rnd() * 3, color, g: up ? 1 : 0 });
}
function zoneAt(x) { for (const z of S.zones) if (x >= z.x0 && x < z.x1) return z; return null; }

// ---- spawning / combat --------------------------------------
function spawnEnemy(z, opts) {
  opts = opts || {};
  const gx = z.pen.x1 - 60, gy = 500;
  const boss = !!opts.boss;
  const gold = !boss && rnd() < GOLD_CHANCE;
  const hp = Math.ceil(foeHp(z.k) * (boss ? 22 : gold ? 2 : 1));
  S.enemies.push({
    k: z.k, x: gx, y: gy + (rnd() - 0.5) * 200,
    hp, max: hp,
    spd: (boss ? 26 : 42) * (0.92 + rnd() * 0.16),
    dmg: foeDmg(z.k) * (boss ? 3.5 : 1),
    tx: z.pen.x0 + rnd() * (z.pen.x1 - z.pen.x0), ty: z.pen.y0 + rnd() * (z.pen.y1 - z.pen.y0),
    wanderT: 1 + rnd() * 2, atkCd: 0, hurt: 0, sway: rnd() * 6.28,
    r: boss ? 34 : (15 + Math.min(9, z.k)), boss, gold,
  });
  if (boss) { float(gx - 60, gy, '💀 ' + foeName(z.k).toUpperCase() + ' KING!', '#ff6a5a', true); sfx('boss', true); S.shake = 12; }
}
function summonBoss(z) {
  if (!z.altar || z.altar.cd > 0) return false;
  z.altar.cd = BOSS_CD;
  spawnEnemy(z, { boss: true });
  return true;
}
function maxAlive(z) { return (z.plates.some(p => p.id === 'gate2' && p.built) ? 15 : 9); }
function spawnInt(z) { return z.plates.some(p => p.id === 'gate2' && p.built) ? 1.4 : 2.4; }
function dropItem(x, y, spec) {
  S.items.push(Object.assign({ x: x + (rnd() - 0.5) * 46, y: y + (rnd() - 0.5) * 36, t: 0, vy: -60 - rnd() * 60, vx: (rnd() - 0.5) * 80 }, spec));
}
function dropHelmet(x, y, k) { dropItem(x, y, { k }); }
function hurtEnemy(e, dmg) {
  if (e.hp <= 0) return;
  e.hp -= dmg; e.hurt = 0.1;
  float(e.x, e.y - e.r - 12, Math.ceil(dmg), '#fff');
  if (e.hp <= 0) {
    S.stats.kills++;
    if (e.boss) {
      S.stats.bosses++;
      dropItem(e.x, e.y, { k: e.k, crown: true });
      dropItem(e.x, e.y, { gem: true }); dropItem(e.x, e.y, { gem: true });
      for (let i = 0; i < 6; i++) dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 40, '👑 CROWN!', '#ffd94a', true);
      S.shake = 14; sfx('boom', true); buzz([50, 30, 80]);
    } else if (e.gold) {
      dropItem(e.x, e.y, { gem: true });
      dropHelmet(e.x, e.y, e.k); dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 30, '💎', '#6ee0d8', true);
      sfx('gem', true);
    } else {
      const drops = 1 + (rnd() < 0.35 ? 1 : 0);
      for (let i = 0; i < drops; i++) dropHelmet(e.x, e.y, e.k);
      sfx('kill');
    }
    puff(e.x, e.y, e.gold ? '#ffd94a' : foeCol(e.k), e.boss ? 26 : 10, true);
  } else sfx('hit');
}
function hurtPlayer(d) {
  const p = S.player;
  if (p.invuln > 0) return;
  p.hp -= d; p.hurtT = 0.15; p.invuln = 0.5; S.shake = Math.max(S.shake, 5);
  sfx('hurt', true); buzz(30);
  if (p.hp <= 0) playerDie();
}
function playerDie() {
  const p = S.player;
  p.deaths++;
  for (const e of p.helmets) dropItem(p.x, p.y, e.crown ? { k: e.k, crown: true } : e.bar ? { k: e.k, bar: true } : { k: e.k });
  p.helmets = [];
  p.hp = p.maxHp; p.invuln = 2.5;
  p.x = 620; p.y = 700;
  float(620, 640, 'YOU DROPPED EVERYTHING!', '#ff6a5a', true);
  S.shake = 14; sfx('die', true); buzz([60, 40, 60]);
}

// ---- building -----------------------------------------------
function buildPlate(z, p, silent) {
  p.built = true;
  if (p.id === 'tower1' || p.id === 'tower2') z.towers.push({ type: 'archer', x: p.x, y: p.y, k: z.k, cd: rnd() * 0.5 });
  else if (p.id === 'wizard')   z.towers.push({ type: 'wizard', x: p.x, y: p.y, k: z.k, cd: rnd() * 0.5 });
  else if (p.id === 'catapult') z.towers.push({ type: 'catapult', x: p.x, y: p.y, k: z.k, cd: 1 + rnd() });
  else if (p.id === 'drums')    z.drums = true;
  else if (p.id === 'altar')    z.altar = { x: p.x, y: p.y, cd: 0 };
  else if (p.id === 'porter')   z.porters.push({ x: p.x, y: p.y, k: z.k, state: 'seek', carry: [], cd: 0 });
  else if (p.id === 'unlock') {
    S.zones.push(mkZone(z.k + 1));
    if (!silent) { float(p.x, p.y - 60, '🌍 ZONE ' + (z.k + 1) + ' UNLOCKED!', '#ffd94a', true); sfx('unlock', true); buzz([40, 30, 80]); }
    return;
  }
  if (!silent) { float(p.x, p.y - 50, p.name + ' BUILT!', '#6ecb5a', true); sfx('built', true); buzz(50); puff(p.x, p.y, '#ffd94a', 16, true); }
}
function pourInto(p, z, dt) {
  if (p.built || S.wallet <= 0) return;
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * dt), p.cost - p.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; p.paid += chunk;
  sfx('pour');
  if (p.paid >= p.cost) buildPlate(z, p, false);
}
function pourHub(plate, dt, done) {
  if (plate.built || S.wallet <= 0) return;
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * dt), plate.cost - plate.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; plate.paid += chunk; sfx('pour');
  if (plate.paid >= plate.cost) { plate.built = true; done(); sfx('built', true); buzz(50); }
}

// ---- main update --------------------------------------------
function tick(dt) {
  if (!S.started) return;
  S.t += dt;
  if (S.shake > 0) S.shake = Math.max(0, S.shake - dt * 40);
  if (S.offlineMsg > 0) S.offlineMsg -= dt;
  const p = S.player;
  p.invuln = Math.max(0, p.invuln - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  if (p.hp < p.maxHp && p.invuln <= 0) p.hp = Math.min(p.maxHp, p.hp + 5 * dt);

  // -- movement (joystick + keys)
  let mx = 0, my = 0;
  if (S.stick) { mx = S.stick.dx; my = S.stick.dy; }
  if (S.keys.a || S.keys.ArrowLeft) mx -= 1;
  if (S.keys.d || S.keys.ArrowRight) mx += 1;
  if (S.keys.w || S.keys.ArrowUp) my -= 1;
  if (S.keys.s || S.keys.ArrowDown) my += 1;
  const ml = Math.hypot(mx, my);
  if (ml > 0.1) {
    mx /= Math.max(1, ml); my /= Math.max(1, ml);
    const slow = 1 - Math.min(0.35, p.helmets.length / cap() * 0.35);
    p.x += mx * speed() * slow * dt;
    p.y += my * speed() * slow * dt;
    p.moving = 1; if (Math.abs(mx) > 0.15) p.face = mx > 0 ? 1 : -1;
  } else p.moving = 0;
  p.x = Math.max(40, Math.min(boundX(), p.x));
  p.y = Math.max(50, Math.min(WORLD_H - 50, p.y));

  // -- waygate pads
  if (S.waygate && S.zones.length >= 2) {
    const pads = warpPads();
    let onPad = null;
    for (const pad of pads) if (dist2(p.x, p.y, pad.x, pad.y) < pad.r * pad.r) onPad = pad;
    if (onPad && !p.moving) {
      p.warpT += dt;
      if (p.warpT >= WARP_T) {
        p.warpT = 0;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        p.x = onPad.to.x; p.y = onPad.to.y - 70;
        S.cam.x = p.x; S.cam.y = p.y;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        sfx('warp', true); buzz(20);
      }
    } else p.warpT = 0;
  }

  // -- auto-fire (with crits)
  p.fireCd -= dt;
  if (p.fireCd <= 0) {
    let tgt = null, bd = FIRE_RANGE * FIRE_RANGE;
    for (const e of S.enemies) { const d = dist2(e.x, e.y, p.x, p.y); if (e.hp > 0 && d < bd) { bd = d; tgt = e; } }
    if (tgt) {
      p.fireCd = pRate();
      const crit = rnd() < 0.10 * S.gemUp.crit;
      S.shots.push({ x: p.x, y: p.y - 26, tgt, dmg: pDmg() * (crit ? 3 : 1), spd: 460, crit });
      p.face = tgt.x > p.x ? 1 : -1;
      sfx('shoot');
    }
  }

  // -- item pickup (helmets/bars/crowns to stack, gems to counter)
  const pr = pickR();
  for (const it of S.items) {
    if (it.dead || it.t < 0.25) continue;
    if (dist2(it.x, it.y, p.x, p.y) >= pr * pr) continue;
    if (it.gem) {
      it.dead = true; S.gems++;
      float(p.x, p.y - 50, '💎 +1', '#6ee0d8', true); sfx('gem', true);
    } else if (p.helmets.length < cap()) {
      it.dead = true;
      p.helmets.push({ k: it.k, bar: !!it.bar, crown: !!it.crown });
      sfx('pick');
      if (p.helmets.length >= cap()) float(p.x, p.y - 60, 'FULL! Go sell →', '#ffd94a', true);
    }
  }

  // -- sell stand (sells helmets, bars, crowns at their value)
  if (p.helmets.length && dist2(p.x, p.y, SELL.x, SELL.y) < SELL.r * SELL.r) {
    p.sellAcc = (p.sellAcc || 0) + dt * SELL_RATE;
    while (p.sellAcc >= 1 && p.helmets.length) {
      p.sellAcc -= 1;
      const e = p.helmets.pop();
      const v = entryVal(e);
      S.pallet += v; S.stats.sold++; S.stats.earned += v;
      float(SELL.x + 30, SELL.y - 46, '+' + fmt(v), e.crown ? '#ffd94a' : e.bar ? '#e8b93a' : '#ffd94a', e.crown);
      puff(PALLET.x, PALLET.y - 20, '#ffd94a', 2, true);
      sfx('sell');
    }
  } else p.sellAcc = 0;

  // -- forge: intake helmets, smelt into bars, tray pickup
  if (S.forge) {
    const f = S.forge;
    if (dist2(p.x, p.y, FORGE.x, FORGE.y) < FORGE.r * FORGE.r && f.queue.length < FORGE_Q) {
      p.forgeAcc = (p.forgeAcc || 0) + dt * SELL_RATE;
      while (p.forgeAcc >= 1 && f.queue.length < FORGE_Q) {
        p.forgeAcc -= 1;
        let idx = -1;
        for (let i = p.helmets.length - 1; i >= 0; i--) if (!p.helmets[i].bar && !p.helmets[i].crown) { idx = i; break; }
        if (idx < 0) break;
        f.queue.push(p.helmets.splice(idx, 1)[0].k);
        sfx('smelt');
      }
    } else p.forgeAcc = 0;
    if (f.queue.length && f.tray.length < TRAY_MAX) {
      f.smeltT += dt;
      if (f.smeltT >= FORGE_T) {
        f.smeltT = 0;
        f.tray.push(f.queue.shift());
        puff(TRAY.x, TRAY.y - 10, '#e8b93a', 5, true);
        sfx('smelt');
      }
    } else f.smeltT = 0;
    if (f.tray.length && p.helmets.length < cap() && dist2(p.x, p.y, TRAY.x, TRAY.y) < TRAY.r * TRAY.r) {
      p.trayAcc = (p.trayAcc || 0) + dt * SELL_RATE;
      while (p.trayAcc >= 1 && f.tray.length && p.helmets.length < cap()) {
        p.trayAcc -= 1;
        p.helmets.push({ k: f.tray.pop(), bar: true });
        sfx('pick');
      }
    } else p.trayAcc = 0;
  }

  // -- vacuum coins from pallet
  if (S.pallet > 0 && dist2(p.x, p.y, PALLET.x, PALLET.y) < PALLET.r * PALLET.r) {
    const take = Math.min(S.pallet, Math.max(1, Math.ceil(VAC_RATE * dt)));
    S.pallet -= take; S.wallet += take;
    if ((S.coinFxT = (S.coinFxT || 0) + dt) > 0.09) { S.coinFxT = 0; float(p.x, p.y - 46, '+' + fmt(take), '#ffd94a'); sfx('coin'); }
  }

  // -- coin upgrade plates (hub)
  let ux = 130;
  for (const key in UPG) {
    const cost = upgCost(key, S.up[key]);
    if (dist2(p.x, p.y, ux, 190) < 52 * 52 && S.wallet > 0 && S.upPaid[key] < cost) {
      const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * dt), cost - S.upPaid[key]);
      S.wallet -= chunk; S.upPaid[key] += chunk; sfx('pour');
      if (S.upPaid[key] >= cost) {
        S.up[key]++; S.upPaid[key] = 0;
        float(ux, 140, UPG[key].name + ' LV' + (S.up[key] + 1) + '!', '#6ecb5a', true);
        sfx('built', true); buzz(40);
      }
    }
    ux += 165;
  }

  // -- gem shrine plates (hub, paid in gems)
  let gy = 480;
  for (const key in GEMU) {
    const cost = gemUpCost(key, S.gemUp[key]);
    if (dist2(p.x, p.y, 110, gy) < 46 * 46 && S.gems > 0 && S.gemPaid[key] < cost) {
      S.gemAcc = (S.gemAcc || 0) + dt * 3;
      while (S.gemAcc >= 1 && S.gems > 0 && S.gemPaid[key] < cost) {
        S.gemAcc -= 1; S.gems--; S.gemPaid[key]++;
        sfx('gem');
        if (S.gemPaid[key] >= cost) {
          S.gemUp[key]++; S.gemPaid[key] = 0;
          float(110, gy - 60, GEMU[key].name + ' LV' + S.gemUp[key] + '!', '#6ee0d8', true);
          sfx('built', true); buzz(40);
        }
      }
    }
    gy += 140;
  }

  // -- hub build plates: forge + waygate
  if (!S.forgePlate.built && dist2(p.x, p.y, FORGE.x, FORGE.y) < 56 * 56)
    pourHub(S.forgePlate, dt, () => { S.forge = { queue: [], tray: [], smeltT: 0 }; float(FORGE.x, FORGE.y - 50, 'FORGE BUILT! Helmets → gold bars (x' + BAR_MUL + ')', '#6ecb5a', true); });
  if (!S.wayPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, HUBPAD.x, HUBPAD.y) < 56 * 56)
    pourHub(S.wayPlate, dt, () => { S.waygate = true; float(HUBPAD.x, HUBPAD.y - 50, 'WAYGATE OPEN! Stand still on it to warp', '#6ec9e0', true); });

  // -- zone build plates + boss altars
  for (const z of S.zones) {
    for (const pl of z.plates) {
      if (pl.built) continue;
      if (pl.id === 'unlock' && z.k < S.zones.length) continue;
      if (dist2(p.x, p.y, pl.x, pl.y) < 56 * 56) pourInto(pl, z, dt);
    }
    if (z.altar) {
      z.altar.cd = Math.max(0, z.altar.cd - dt);
      if (z.altar.cd <= 0 && dist2(p.x, p.y, z.altar.x, z.altar.y) < 50 * 50) summonBoss(z);
    }
  }

  // -- zone spawners
  for (const z of S.zones) {
    const alive = S.enemies.reduce((n, e) => n + (e.k === z.k && !e.boss ? 1 : 0), 0);
    z.spawnCd -= dt;
    if (z.spawnCd <= 0 && alive < maxAlive(z)) { z.spawnCd = spawnInt(z); spawnEnemy(z); }
  }

  // -- enemies
  for (const e of S.enemies) {
    if (e.hp <= 0) continue;
    e.hurt = Math.max(0, e.hurt - dt);
    const z = S.zones[e.k - 1];
    const aggroR = e.boss ? 900 : 200;
    const nearPlayer = dist2(e.x, e.y, p.x, p.y) < aggroR * aggroR && p.x > z.pen.x0 - 60;
    let tx = e.tx, ty = e.ty, spd = e.boss ? e.spd : 42;
    if (nearPlayer) { tx = p.x; ty = p.y; spd = e.boss ? e.spd : 62 + e.k * 2; }
    else { e.wanderT -= dt; if (e.wanderT <= 0) { e.wanderT = 1.5 + rnd() * 2.5; e.tx = z.pen.x0 + rnd() * (z.pen.x1 - z.pen.x0); e.ty = z.pen.y0 + rnd() * (z.pen.y1 - z.pen.y0); } }
    const dx = tx - e.x, dy = ty - e.y, dl = Math.hypot(dx, dy) || 1;
    if (dl > 30) { e.x += dx / dl * spd * dt; e.y += dy / dl * spd * dt; }
    e.x = Math.max(z.pen.x0, Math.min(z.pen.x1, e.x));
    e.y = Math.max(z.pen.y0, Math.min(z.pen.y1, e.y));
    e.atkCd -= dt;
    if (e.atkCd <= 0 && dist2(e.x, e.y, p.x, p.y) < (e.r + 22) * (e.r + 22)) {
      e.atkCd = 0.85; hurtPlayer(e.dmg);
    }
  }
  S.enemies = S.enemies.filter(e => e.hp > 0);

  // -- towers (archer / wizard / catapult)
  for (const z of S.zones) {
    const rateMul = z.drums ? DRUM_MUL : 1;
    for (const tw of z.towers) {
      tw.cd -= dt;
      if (tw.cd > 0) continue;
      if (tw.type === 'archer') {
        let tgt = null, bd = TOWER_RANGE * TOWER_RANGE;
        for (const e of S.enemies) { if (e.k !== z.k || e.hp <= 0) continue; const d = dist2(e.x, e.y, tw.x, tw.y); if (d < bd) { bd = d; tgt = e; } }
        if (tgt) { tw.cd = TOWER_RATE * rateMul; S.shots.push({ x: tw.x, y: tw.y - 52, tgt, dmg: towerDmg(z.k), spd: 430 }); }
      } else if (tw.type === 'wizard') {
        let tgt = null, bd = TOWER_RANGE * TOWER_RANGE;
        for (const e of S.enemies) { if (e.k !== z.k || e.hp <= 0) continue; const d = dist2(e.x, e.y, tw.x, tw.y); if (d < bd) { bd = d; tgt = e; } }
        if (tgt) {
          tw.cd = WIZ_RATE * rateMul;
          const hitOrder = [tgt];
          let cur = tgt;
          for (let j = 1; j < WIZ_CHAIN; j++) {
            let nxt = null, nb = WIZ_JUMP * WIZ_JUMP;
            for (const e of S.enemies) {
              if (e.k !== z.k || e.hp <= 0 || hitOrder.includes(e)) continue;
              const d = dist2(e.x, e.y, cur.x, cur.y); if (d < nb) { nb = d; nxt = e; }
            }
            if (!nxt) break;
            hitOrder.push(nxt); cur = nxt;
          }
          const pts = [{ x: tw.x, y: tw.y - 60 }].concat(hitOrder.map(e => ({ x: e.x, y: e.y - 10 })));
          S.fx.push({ kind: 'zap', pts, t: 0, dur: 0.2 });
          for (const e of hitOrder) hurtEnemy(e, towerDmg(z.k) * 1.2);
          sfx('zap', true);
        }
      } else { // catapult: aim at the densest cluster
        let tgt = null, best = -1;
        for (const e of S.enemies) {
          if (e.k !== z.k || e.hp <= 0) continue;
          let n = 0;
          for (const e2 of S.enemies) if (e2.k === z.k && e2.hp > 0 && dist2(e.x, e.y, e2.x, e2.y) < 120 * 120) n++;
          if (n > best) { best = n; tgt = e; }
        }
        if (tgt) {
          tw.cd = CAT_RATE * rateMul;
          S.shots.push({ boulder: true, sx: tw.x, sy: tw.y - 40, tx: tgt.x, ty: tgt.y, x: tw.x, y: tw.y - 40, t: 0, dur: 0.9, dmg: towerDmg(z.k) * 2.6, k: z.k });
        }
      }
    }
  }

  // -- porters
  for (const z of S.zones) {
    for (const po of z.porters) {
      if (po.state === 'seek') {
        let it = null, bd = 1e12;
        for (const i2 of S.items) { if (i2.dead || i2.gem || i2.x < z.x0 || i2.x >= z.x1) continue; const d = dist2(i2.x, i2.y, po.x, po.y); if (d < bd) { bd = d; it = i2; } }
        if (!it) { if (po.carry.length) po.state = 'sell'; else {
            const hx = z.x0 + 130, hy = 500, dl = Math.hypot(hx - po.x, hy - po.y);
            if (dl > 12) { po.x += (hx - po.x) / dl * PORTER_SPD * 0.6 * dt; po.y += (hy - po.y) / dl * PORTER_SPD * 0.6 * dt; } }
        } else {
          const dl = Math.hypot(it.x - po.x, it.y - po.y) || 1;
          po.x += (it.x - po.x) / dl * PORTER_SPD * dt; po.y += (it.y - po.y) / dl * PORTER_SPD * dt;
          if (dl < 26 && it.t > 0.25 && !it.dead) { it.dead = true; po.carry.push({ k: it.k, bar: !!it.bar, crown: !!it.crown }); if (po.carry.length >= PORTER_CAP) po.state = 'sell'; }
        }
      } else {
        const dl = Math.hypot(SELL.x - po.x, SELL.y - po.y) || 1;
        po.x += (SELL.x - po.x) / dl * PORTER_SPD * dt; po.y += (SELL.y - po.y) / dl * PORTER_SPD * dt;
        if (dl < 46) {
          po.cd -= dt;
          if (po.cd <= 0 && po.carry.length) {
            po.cd = 0.12;
            const v = entryVal(po.carry.pop());
            S.pallet += v; S.stats.earned += v; S.stats.sold++;
            puff(PALLET.x, PALLET.y - 20, '#ffd94a', 1, true);
          }
          if (!po.carry.length) po.state = 'seek';
        }
      }
    }
  }

  // -- items physics
  for (const it of S.items) {
    it.t += dt;
    if (it.t < 0.4) { it.x += it.vx * dt; it.y += it.vy * dt; it.vy += 380 * dt; }
  }
  S.items = S.items.filter(i => !i.dead);
  if (S.items.length > 320) S.items.splice(0, S.items.length - 320);

  // -- shots
  for (const sh of S.shots) {
    if (sh.boulder) {
      sh.t += dt;
      const f = Math.min(1, sh.t / sh.dur);
      sh.x = sh.sx + (sh.tx - sh.sx) * f;
      sh.y = sh.sy + (sh.ty - sh.sy) * f - Math.sin(f * 3.14159) * 150;
      if (sh.t >= sh.dur) {
        sh.done = true;
        S.fx.push({ kind: 'boom', x: sh.tx, y: sh.ty, r: CAT_AOE, t: 0, dur: 0.4 });
        for (const e of S.enemies) if (e.hp > 0 && dist2(e.x, e.y, sh.tx, sh.ty) < CAT_AOE * CAT_AOE) hurtEnemy(e, sh.dmg);
        puff(sh.tx, sh.ty, '#8a7a5c', 14, true);
        S.shake = Math.max(S.shake, 6); sfx('boom', true);
      }
      continue;
    }
    const tx = sh.tgt.hp > 0 ? sh.tgt.x : sh.lx || sh.x, ty = sh.tgt.hp > 0 ? sh.tgt.y : sh.ly || sh.y;
    if (sh.tgt.hp > 0) { sh.lx = tx; sh.ly = ty; }
    const dx = tx - sh.x, dy = ty - sh.y, dl = Math.hypot(dx, dy) || 1;
    sh.x += dx / dl * sh.spd * dt; sh.y += dy / dl * sh.spd * dt;
    sh.a = Math.atan2(dy, dx);
    if (dl < 18) {
      sh.done = true;
      if (sh.tgt.hp > 0) {
        hurtEnemy(sh.tgt, sh.dmg);
        if (sh.crit) float(sh.tgt.x, sh.tgt.y - sh.tgt.r - 26, 'CRIT!', '#ff8a3c', true);
      }
    }
    sh.life = (sh.life || 0) + dt; if (sh.life > 3) sh.done = true;
  }
  S.shots = S.shots.filter(sh => !sh.done);

  // -- fx / particles / floats
  for (const q of S.fx) q.t += dt;
  S.fx = S.fx.filter(q => q.t < q.dur);
  for (const q of S.parts) { q.t += dt; q.x += q.vx * dt; q.y += q.vy * dt; if (q.g) q.vy += 420 * dt; }
  S.parts = S.parts.filter(q => q.t < q.dur);
  for (const f of S.floats) { f.t += dt; f.y -= 30 * dt; }
  S.floats = S.floats.filter(f => f.t < (f.big ? 1.6 : 0.8));

  // -- camera
  S.cam.x += (p.x - S.cam.x) * Math.min(1, 5 * dt);
  S.cam.y += (p.y - S.cam.y) * Math.min(1, 5 * dt);

  // -- autosave
  S.saveCd -= dt;
  if (S.saveCd <= 0) { S.saveCd = 5; save(); }
}
function warpPads() {
  // hub pad warps to the newest zone; every zone entrance pad warps home
  const pads = [];
  const newest = S.zones[S.zones.length - 1];
  pads.push({ x: HUBPAD.x, y: HUBPAD.y, r: HUBPAD.r, to: { x: newest.x0 + 70, y: 872 } });
  for (const z of S.zones) pads.push({ x: z.x0 + 70, y: 872, r: 44, to: { x: HUBPAD.x, y: HUBPAD.y } });
  return pads;
}

// ---- guidance arrow -----------------------------------------
function guideTarget() {
  const p = S.player;
  if (p.helmets.length >= cap()) return { x: SELL.x, y: SELL.y, label: 'SELL' };
  if (S.pallet >= 25) return { x: PALLET.x, y: PALLET.y, label: 'COINS' };
  let gy = 480;
  for (const key in GEMU) {
    if (S.gems >= gemUpCost(key, S.gemUp[key]) - S.gemPaid[key]) return { x: 110, y: gy, label: '💎 ' + GEMU[key].name };
    gy += 140;
  }
  let best = null, bc = 1e18;
  let ux = 130;
  for (const key in UPG) {
    const c = upgCost(key, S.up[key]) - S.upPaid[key];
    if (S.wallet >= c * 0.6 && c < bc) { bc = c; best = { x: ux, y: 190, label: UPG[key].name }; }
    ux += 165;
  }
  if (!S.forgePlate.built && S.wallet >= (S.forgePlate.cost - S.forgePlate.paid) * 0.6 && S.forgePlate.cost - S.forgePlate.paid < bc) { bc = S.forgePlate.cost - S.forgePlate.paid; best = { x: FORGE.x, y: FORGE.y, label: 'FORGE' }; }
  if (!S.wayPlate.built && S.zones.length >= 2 && S.wallet >= (S.wayPlate.cost - S.wayPlate.paid) * 0.6 && S.wayPlate.cost - S.wayPlate.paid < bc) { bc = S.wayPlate.cost - S.wayPlate.paid; best = { x: HUBPAD.x, y: HUBPAD.y, label: 'WAYGATE' }; }
  for (const z of S.zones) for (const pl of z.plates) {
    if (pl.built) continue;
    if (pl.id === 'unlock' && z.k < S.zones.length) continue;
    const c = pl.cost - pl.paid;
    if (S.wallet >= c * 0.6 && c < bc) { bc = c; best = { x: pl.x, y: pl.y, label: pl.name }; }
  }
  if (best) return best;
  const z = S.zones[S.zones.length - 1];
  return { x: (z.pen.x0 + z.pen.x1) / 2, y: 500, label: 'FIGHT' };
}

// ---- drawing ------------------------------------------------
let vw = 480, vh = 840, scl = 1, dpr = 1;
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function shadow(x, y, w) {
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(x, y, w, w * 0.4, 0, 0, 6.29); ctx.fill();
}
function drawHelmetIcon(x, y, k, s) {
  s = s || 1;
  ctx.fillStyle = k === 1 ? '#b9c2cc' : foeCol(k);
  ctx.beginPath(); ctx.arc(x, y, 9 * s, 3.14159, 0); ctx.fill();
  ctx.fillRect(x - 9 * s, y - 1, 18 * s, 3 * s);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(x - 3 * s, y - 4 * s, 2.5 * s, 0, 6.29); ctx.fill();
}
function drawBarIcon(x, y, s) {
  s = s || 1;
  ctx.fillStyle = '#e8b93a';
  ctx.beginPath();
  ctx.moveTo(x - 10 * s, y + 4 * s); ctx.lineTo(x - 7 * s, y - 4 * s);
  ctx.lineTo(x + 7 * s, y - 4 * s); ctx.lineTo(x + 10 * s, y + 4 * s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(x - 5 * s, y - 2.5 * s, 6 * s, 2 * s);
}
function drawCrownIcon(x, y, s) {
  s = s || 1;
  ctx.fillStyle = '#ffd94a';
  ctx.beginPath();

    else if (it.crown) drawCrownIcon(it.x, it.y + wob, 1);
    else if (it.bar) drawBarIcon(it.x, it.y + wob, 0.9);
    else drawHelmetIcon(it.x, it.y + wob, it.k, 0.9);
  }
  const actors = [];
  for (const z of S.zones) {
    for (const tw of z.towers) actors.push({ y: tw.y, f: () => drawTower(tw) });
    for (const po of z.porters) actors.push({ y: po.y, f: () => drawPorter(po) });
  }
  for (const e of S.enemies) actors.push({ y: e.y, f: () => drawEnemy(e) });
  actors.push({ y: S.player.y, f: drawPlayer });
  actors.sort((a, b) => a.y - b.y);
  for (const a of actors) a.f();
  for (const sh of S.shots) {
    if (sh.boulder) {
      ctx.fillStyle = '#5c5c66';
      ctx.beginPath(); ctx.arc(sh.x, sh.y, 9, 0, 6.29); ctx.fill();
      continue;
    }
    ctx.save(); ctx.translate(sh.x, sh.y); ctx.rotate(sh.a || 0);
    ctx.strokeStyle = sh.crit ? '#ff8a3c' : '#e8dcc0'; ctx.lineWidth = sh.crit ? 3.5 : 2.5;
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(8, 0); ctx.stroke();
    ctx.fillStyle = sh.crit ? '#ff8a3c' : '#e8dcc0';
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(3, -3); ctx.lineTo(3, 3); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  for (const q of S.fx) {
    const f = 1 - q.t / q.dur;
    if (q.kind === 'zap') {
      ctx.strokeStyle = 'rgba(190,150,255,' + f + ')'; ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < q.pts.length; i++) {
        const pt = q.pts[i];
        const jx = i === 0 ? 0 : (rnd() - 0.5) * 14, jy = i === 0 ? 0 : (rnd() - 0.5) * 14;
        if (i === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x + jx, pt.y + jy);
      }
      ctx.stroke();
    } else if (q.kind === 'boom') {
      ctx.strokeStyle = 'rgba(255,180,90,' + f + ')'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(q.x, q.y, q.r * (1 - f * 0.6), 0, 6.29); ctx.stroke();
    }
  }
  for (const q of S.parts) {
    ctx.globalAlpha = 1 - q.t / q.dur;
    ctx.fillStyle = q.color;
    ctx.fillRect(q.x - q.r / 2, q.y - q.r / 2, q.r, q.r);
  }
  ctx.globalAlpha = 1;
  for (const f of S.floats) {
    const life = f.big ? 1.6 : 0.8;
    ctx.globalAlpha = Math.min(1, 3 * (1 - f.t / life));
    ctx.font = 'bold ' + (f.big ? 20 : 14) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#000'; ctx.fillText(f.txt, f.x + 1.5, f.y + 1.5);
    ctx.fillStyle = f.color; ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}
let hits = [];
function hudBtn(x, y, w, h, label, act) {
  ctx.fillStyle = 'rgba(20,25,36,0.8)'; rr(x, y, w, h, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(label, x + w / 2, y + h / 2 + 5);
  hits.push({ x, y, w, h, act });
}
function drawHud() {
  const p = S.player;
  ctx.fillStyle = 'rgba(20,25,36,0.8)'; rr(10, 10, 128, 36, 10); ctx.fill();
  ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('¢ ' + fmt(S.wallet), 22, 35);
  ctx.fillStyle = 'rgba(20,25,36,0.8)'; rr(10, 52, 128, 16, 8); ctx.fill();
  ctx.fillStyle = '#d1553f'; rr(12, 54, 124 * Math.max(0, p.hp / p.maxHp), 12, 6); ctx.fill();
  ctx.fillStyle = 'rgba(20,25,36,0.8)'; rr(10, 74, 128, 24, 8); ctx.fill();
  ctx.fillStyle = '#9aa7b5'; ctx.font = 'bold 11px sans-serif';
  ctx.fillText('ZONES ' + S.zones.length + '  ⚔ ' + fmt(S.stats.kills), 20, 90);
  if (S.gems > 0 || S.gemUp.magnet + S.gemUp.crit + S.gemUp.coin > 0) {
    ctx.fillStyle = 'rgba(20,25,36,0.8)'; rr(10, 104, 128, 26, 8); ctx.fill();
    drawGemIcon(26, 117, 1);
    ctx.fillStyle = '#6ee0d8'; ctx.font = 'bold 14px sans-serif';
    ctx.fillText(' ' + S.gems, 38, 122);
  }
  hudBtn(vw - 46, 10, 36, 30, muted ? '🔇' : '🔊', () => {
    muted = !muted;
    try { localStorage.setItem('ks_idle_muted', muted ? '1' : '0'); } catch (e) {}
  });
  if (S.offlineMsg > 0 && S.offlineAmt > 0) {
    ctx.fillStyle = 'rgba(20,25,36,0.9)'; rr(vw / 2 - 150, 14, 300, 44, 10); ctx.fill();
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('While you were away…', vw / 2, 32);
    ctx.fillText('+' + fmt(S.offlineAmt) + ' ¢ piled up at the pallet!', vw / 2, 50);
  }
  const g = guideTarget();
  const dx = g.x - S.cam.x, dy = g.y - S.cam.y;
  if (dx * dx + dy * dy > 190 * 190) {
    const a = Math.atan2(dy, dx);
    const ax = vw / 2 + Math.cos(a) * Math.min(vw, vh) * 0.32;
    const ay = vh / 2 + Math.sin(a) * Math.min(vw, vh) * 0.32;
    const pulse = 1 + Math.sin(S.t * 6) * 0.12;
    ctx.save(); ctx.translate(ax, ay); ctx.rotate(a); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ffd94a';
    ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(-8, -11); ctx.lineTo(-3, 0); ctx.lineTo(-8, 11); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(g.label, ax, ay + 26);
  }
  if (S.stick) {
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(S.stick.ax, S.stick.ay, 44, 0, 6.29); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(S.stick.ax + S.stick.dx * 40, S.stick.ay + S.stick.dy * 40, 20, 0, 6.29); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (!S.started) {
    ctx.fillStyle = 'rgba(8,10,16,0.8)'; ctx.fillRect(0, 0, vw, vh);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 44px sans-serif';
    ctx.fillText('KINGSHOT', vw / 2, vh * 0.32);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('E N D L E S S', vw / 2, vh * 0.32 + 34);
    ctx.fillStyle = '#9aa7b5'; ctx.font = '14px sans-serif';
    ctx.fillText('You fire automatically. Enemies drop helmets —', vw / 2, vh * 0.45);
    ctx.fillText('stack them, sell them (or smelt them into gold),', vw / 2, vh * 0.45 + 22);
    ctx.fillText('and build towers, wizards, catapults, war drums,', vw / 2, vh * 0.45 + 44);
    ctx.fillText('boss altars and endless new lands.', vw / 2, vh * 0.45 + 66);
    ctx.fillText('Drag anywhere to walk.', vw / 2, vh * 0.45 + 98);
    const pulse = 1 + Math.sin(S.t * 4) * 0.05;
    ctx.save(); ctx.translate(vw / 2, vh * 0.68); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#7a5f18'; rr(-110, -26, 220, 52, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('▶ TAP TO PLAY', 0, 7);
    ctx.restore();
  }
}
function draw() {
  hits = [];
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#1b2b1e'; ctx.fillRect(0, 0, vw, vh);
  ctx.save();
  const shx = S.shake > 0 ? (rnd() - 0.5) * S.shake : 0;
  const shy = S.shake > 0 ? (rnd() - 0.5) * S.shake : 0;
  const cx = Math.max(vw / scl / 2 - 200, Math.min(boundX() + 200 - vw / scl / 2, S.cam.x));
  const cy = Math.max(Math.min(vh / scl / 2, WORLD_H / 2), Math.min(WORLD_H - vh / scl / 2, S.cam.y));
  ctx.translate(vw / 2 + shx, vh / 2 + shy);
  ctx.scale(scl, scl);
  ctx.translate(-cx, -(vh / scl >= WORLD_H ? WORLD_H / 2 : cy));
  drawWorld();
  ctx.restore();
  drawHud();
}

// ---- input --------------------------------------------------
function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  vw = window.innerWidth; vh = window.innerHeight;
  cvs.width = Math.round(vw * dpr); cvs.height = Math.round(vh * dpr);
  cvs.style.width = vw + 'px'; cvs.style.height = vh + 'px';
  scl = Math.max(0.55, Math.min(1.35, Math.min(vw, vh) / 700));
}
function pointerXY(ev) {
  const r = cvs.getBoundingClientRect();
  return { x: (ev.clientX !== undefined ? ev.clientX : ev.touches[0].clientX) - r.left,
           y: (ev.clientY !== undefined ? ev.clientY : ev.touches[0].clientY) - r.top };
}
let activePointer = null;
function onDown(ev) {
  ev.preventDefault();
  audio();
  const p = pointerXY(ev);
  if (!S.started) { S.started = true; sfx('built', true); return; }
  for (const h of hits) {
    if (p.x >= h.x && p.x <= h.x + h.w && p.y >= h.y && p.y <= h.y + h.h) { h.act(); return; }
  }
  activePointer = ev.pointerId !== undefined ? ev.pointerId : 'touch';
  S.stick = { ax: p.x, ay: p.y, dx: 0, dy: 0 };
}
function onMove(ev) {
  if (!S.stick) return;
  if (ev.pointerId !== undefined && activePointer !== null && ev.pointerId !== activePointer) return;
  const p = pointerXY(ev);
  let dx = (p.x - S.stick.ax) / 44, dy = (p.y - S.stick.ay) / 44;
  const l = Math.hypot(dx, dy);
  if (l > 1) { dx /= l; dy /= l; }
  S.stick.dx = dx; S.stick.dy = dy;
}
function onUp(ev) {
  if (ev.pointerId !== undefined && activePointer !== null && ev.pointerId !== activePointer) return;
  S.stick = null; activePointer = null;
}
cvs.addEventListener('pointerdown', onDown);
cvs.addEventListener('pointermove', onMove);
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);
window.addEventListener('keydown', (ev) => {
  const k = ev.key.length === 1 ? ev.key.toLowerCase() : ev.key;
  S.keys[k] = true;
  if (!S.started) { S.started = true; }
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.length === 1 ? ev.key.toLowerCase() : ev.key;
  S.keys[k] = false;
});
window.addEventListener('resize', resize);
document.addEventListener('visibilitychange', () => { if (document.hidden) save(); });

// ---- boot ---------------------------------------------------
reset();
load();
resize();
let lastT = 0;
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0.016);
  lastT = t;
  tick(dt);
  draw();
  requestAnimationFrame(frame);
}
if (typeof window.__KS_HEADLESS__ === 'undefined') requestAnimationFrame(frame);

// ---- test hooks ---------------------------------------------
window.KS = {
  get S() { return S; }, reset, tick, draw, save, load, idleRate,
  spawnEnemy, summonBoss, hurtEnemy, hurtPlayer, playerDie, buildPlate, mkZone, dropHelmet, dropItem,
  cap, speed, pDmg, pRate, pickR, coinMul, entryVal, boundX, eco, helmVal, foeHp, towerDmg, unlockCost, upgCost, gemUpCost, fmt,
  guideTarget, zoneAt, foeName, warpPads,
  constants: { WORLD_H, HUB_W, ZONE_W, SELL, PALLET, FORGE, TRAY, HUBPAD, CAP0, SELL_RATE, VAC_RATE, BUILD_RATE, SAVE_KEY, PORTER_CAP, FORGE_T, BAR_MUL, CROWN_MUL, BOSS_CD, WARP_T, DRUM_MUL, GOLD_CHANCE },
  start() { S.started = true; },
};
</script>
