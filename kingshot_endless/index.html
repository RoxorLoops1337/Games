<!DOCTYPE html>
<html lang="en">
<head>

<title>Kingshot Endless</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #16241a; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;

<body>
<canvas id="game"></canvas>
<script>
'use strict';
// ============================================================
// KINGSHOT ENDLESS — arcade-idle collector
// Auto-firing knight ⇒ enemies drop helmets ⇒ stack them on
// your back ⇒ sell or SMELT them ⇒ coins pile into a mountain ⇒
// pour them into stations: archer/wizard/catapult towers, war
// drums, porters, horde gates, boss altars, waygates — and the
// kingdom expands in ALL FOUR DIRECTIONS, land by land, carved
// out of the dark forest. Golden foes drop gems for permanent
// shrine upgrades.
// One file, vanilla canvas, mobile-first. window.KS = test hooks.
// ============================================================

const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

// ---- world geometry -----------------------------------------
// The world is a grid of cells. The hub sits at cell (0,0);
// zone k grows outward along four arms: E, S, W, N, E+2, S+2, …
const CELL_W = 1050, CELL_H = 1000;
const DIRS = [[1, 0], [0, 1], [-1, 0], [0, -1]];
const DIR_NAME = ['EAST', 'SOUTH', 'WEST', 'NORTH'];
function cellFor(k) { const d = DIRS[(k - 1) % 4], dist = Math.floor((k - 1) / 4) + 1; return { cx: d[0] * dist, cy: d[1] * dist, dir: (k - 1) % 4 }; }
// hub furniture (all inside cell (0,0))
const SELL    = { x: 435, y: 430, r: 60 };
const PALLET  = { x: 435, y: 640, r: 66 };
const FORGE   = { x: 730, y: 430, r: 55 };
const TRAY    = { x: 730, y: 575, r: 55 };
const HUBPAD  = { x: 790, y: 872, r: 44 };
const SPAWN   = { x: 525, y: 720 };
const UPG_X0  = 225, UPG_STEP = 150, UPG_Y = 190;
const GEM_X   = 225, GEM_Y0 = 480, GEM_STEP = 140;
const MONU    = { x: 525, y: 315, r: 46 };     // New Kingdom monument (prestige)
const KENNEL  = { x: 300, y: 872, r: 44 };     // war dog kennel
const CAMP    = { x: 160, y: 330, r: 55 };     // lumber camp (logs pile up here)
// industry district — a peaceful production cell at the SE diagonal (1,1)
const DX = CELL_W, DY = CELL_H;                // district cell origin
const DIST = {
  plate:  { x: DX + 525, y: 940 },             // purchase plate at zone 1's south edge
  grove:  { x: DX + 250, y: DY + 270, r: 60 },
  quarry: { x: DX + 800, y: DY + 270, r: 60 },
  saw:    { x: DX + 250, y: DY + 660, r: 55 },
  sawTray:{ x: DX + 250, y: DY + 820, r: 55 },
  tool:   { x: DX + 800, y: DY + 660, r: 55 },
  toolTray:{ x: DX + 800, y: DY + 820, r: 55 },
  hauler: { x: DX + 525, y: DY + 400, r: 46 },
  trader: { x: DX + 525, y: DY + 620, r: 46 },
  pad:    { x: DX + 80, y: DY + 80, r: 44 },
};
const DIST_COSTS = { grove: 220, quarry: 260, saw: 320, tool: 420, hauler: 520, trader: 520 };

// ---- balance dials ------------------------------------------
const PICK_R      = 78;
const CAP0        = 8,  CAP_UP = 4;
const SPEED0      = 195,   SPEED_UP = 0.12;
const DMG0        = 6,     DMG_UP = 1.45;
const RATE0       = 0.55,  RATE_UP = 0.90;
const FIRE_RANGE  = 270;
const SELL_RATE   = 7;
const VAC_RATE    = 55;
const BUILD_RATE  = 60;
const FLOW_ACCEL  = 2.6;   // coin flow multiplies by this per second standing still
const FLOW_CAP    = 600;   // max flow multiplier (~33k coins/s)
const ECO         = 2.35;
const HP_T        = 2.15;
const UNLOCK0     = 180, UNLOCK_MUL = 2.35; // tracks the economy so each land costs similar effort
const OFFLINE_CAP = 4 * 3600;
const TOWER_RANGE = 340, TOWER_RATE = 1.05;
const TOWER_TRAIN = 0.35;  // +35% tower dmg per training level
const WIZ_RATE    = 2.0, WIZ_CHAIN = 3, WIZ_JUMP = 160;
const CAT_RATE    = 4.2, CAT_AOE = 115;
const DRUM_MUL    = 0.75;
const PORTER_CAP  = 10, PORTER_SPD = 135;
const FORGE_T     = 1.8;
const FORGE_Q     = 12, TRAY_MAX = 10;
const BAR_MUL     = 3;
const CROWN_MUL   = 22;
const STONE_MUL   = 1.2;   // raw stone sells slightly above a helmet
const PLANK_MUL   = 3.5;   // sawmill: 2 logs → 1 plank
const TOOL_MUL    = 12;    // toolmaker: 1 plank + 2 stones → 1 tool
const GROVE_T     = 1.9, QUARRY_T = 2.4, SAW_T = 2.5, TOOL_T = 3.0;
const PILE_MAX    = 30, SAW_IN_MAX = 12, TRAY12 = 12, TOOL_IN = 8, TOOLTRAY_MAX = 8;
const GOLD_CHANCE = 0.045;
const BOSS_CD     = 45;
const WARP_T      = 0.55;
const CHOP_T       = 3.2;  // s per log chopped at the lumber camp
const CAMP_MAX     = 24;   // logs the pile can hold
const PRESTIGE_MIN = 5;    // lands required to found a New Kingdom
const PREST_T      = 3;    // s holding still on the monument
const CROWN_BONUS  = 0.20; // +20% coin value per crown, forever
const CROWN_DMG    = 0.30; // royal armory: +30% hero damage per crown
const CROWN_HP     = 0.25; // royal vigor: +25% max HP per crown
const HP0          = 60, HP_UP = 45;  // max HP: base + per VITALITY level
const CHEST_CD     = 160;  // s between wandering treasure chests
const DOG_SPD      = 250, DOG_FETCH_R = 320;

function eco(k)      { return Math.pow(ECO, k - 1); }
function helmVal(k)  { return Math.ceil(5 * eco(k)); }
function foeHp(k)    { return Math.ceil(13 * Math.pow(HP_T, k - 1)); }
function foeDmg(k)   { return Math.ceil(4 * Math.pow(1.55, k - 1)); }
function towerDmg(k) { return Math.ceil(9 * Math.pow(HP_T, k - 1)); }
function unlockCost(k) { return Math.ceil(UNLOCK0 * Math.pow(UNLOCK_MUL, k - 1)); }
const UPG = {
  speed: { icon: '👟', name: 'SPEED',    base: 35, grow: 1.75 },
  cap:   { icon: '🎒', name: 'CAPACITY', base: 30, grow: 1.75 },
  dmg:   { icon: '⚔️', name: 'DAMAGE',   base: 45, grow: 1.9 },
  rate:  { icon: '🏹', name: 'FIRE RATE', base: 55, grow: 1.9 },
  hp:    { icon: '❤️', name: 'VITALITY', base: 60, grow: 1.9 },
};
function upgCost(key, lvl) { return Math.ceil(UPG[key].base * Math.pow(UPG[key].grow || 1.75, lvl)); }
const GEMU = {
  magnet: { icon: '🧲', name: 'MAGNET',   what: '+30% pickup range' },
  crit:   { icon: '💥', name: 'CRIT',     what: '+10% chance, 3x dmg' },
  coin:   { icon: '🪙', name: 'MIDAS',    what: '+25% coin value' },
};
function gemUpCost(key, lvl) { return 2 + lvl * (key === 'magnet' ? 2 : 3); }
const FOE_NAMES = ['Grunt', 'Raider', 'Ogre', 'Wraith', 'Golem', 'Demon', 'Titan', 'Dread'];
const FOE_COLS  = ['#c15840', '#c99a3a', '#7c52c9', '#4ba8b5', '#8a9a4a', '#c94a8a', '#5a6dcf', '#3f3f4f'];
// behavior archetype per foe family — every land plays differently
const FOE_ARCH  = ['melee', 'fast', 'tank', 'spitter', 'tank', 'fast', 'tank', 'spitter'];
function foeArch(k) { return FOE_ARCH[(k - 1) % FOE_ARCH.length]; }
function foeName(k) { const i = (k - 1) % FOE_NAMES.length; const cyc = Math.floor((k - 1) / FOE_NAMES.length); return FOE_NAMES[i] + (cyc ? ' ' + ('II III IV V VI VII VIII IX X'.split(' ')[cyc - 1] || cyc) : ''); }
function foeCol(k)  { return FOE_COLS[(k - 1) % FOE_COLS.length]; }
function hexRgb(h)  { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }

// ---- deterministic rng --------------------------------------
let seed = 987654321;
function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

// ---- zone factory -------------------------------------------
// Every zone: archer tower, porter, horde gate (repeatable),
// tower training (repeatable), +porter (repeatable), unlock.
// Zones 2+ also rotate two bonus stations + a boss altar.
const POOL = [
  { id: 'tower2',   icon: '🏹', name: 'ARCHER TOWER', mul: 1.5 },
  { id: 'wizard',   icon: '⚡', name: 'WIZARD TOWER', mul: 1.8 },
  { id: 'catapult', icon: '💣', name: 'CATAPULT',     mul: 1.7 },
  { id: 'drums',    icon: '🥁', name: 'WAR DRUMS',    mul: 1.4 },
];
function mkZone(k) {
  const cell = cellFor(k);
  const x0 = cell.cx * CELL_W, y0 = cell.cy * CELL_H;
  const x1 = x0 + CELL_W, y1 = y0 + CELL_H;
  const P = (id, icon, name, px, py, cost, rep) => ({
    id, icon, name, x: x0 + px, y: y0 + py,
    base: Math.ceil(cost), mul: rep ? rep.mul : 0, maxLvl: rep ? rep.max : 0,
    cost: Math.ceil(cost), paid: 0, lvl: 0, built: false, repeat: !!rep,
  });
  const plates = [
    P('tower1', '🏹', 'ARCHER TOWER', 260, 265, 70 * eco(k)),
    P('gate2', '🚪', 'HORDE GATE', 640, 230, 110 * eco(k), { mul: 1.6, max: 4 }),
    P('towersUp', '🎯', 'TRAIN TOWERS', 525, 500, 130 * eco(k), { mul: 1.7, max: 6 }),
    P('porter', '🧺', 'PORTER', 150, 380, 90 * eco(k)),
    P('porterPlus', '🧺', '+PORTER', 150, 620, 150 * eco(k), { mul: 1.9, max: 2 }),
  ];
  if (k === 1) {
    plates.push(P('tower2', '🏹', 'ARCHER TOWER', 260, 735, 120 * eco(k)));
  } else {
    const a = POOL[k % POOL.length], b = POOL[(k + 2) % POOL.length];
    plates.push(P(a.id, a.icon, a.name, 260, 735, 95 * eco(k) * a.mul));
    plates.push(P(b.id, b.icon, b.name, 790, 265, 95 * eco(k) * b.mul));
    plates.push(P('altar', '💀', 'BOSS ALTAR', 640, 770, 200 * eco(k)));
  }
  // unlock plate sits on the outward edge; entrance pad faces the hub
  const d = DIRS[cell.dir];
  const ux = d[0] ? (d[0] > 0 ? x1 - 60 : x0 + 60) : x0 + 525;
  const uy = d[1] ? (d[1] > 0 ? y1 - 60 : y0 + 60) : y0 + 500;
  plates.push({ id: 'unlock', icon: '🔓', name: 'NEW LANDS', x: ux, y: uy, base: unlockCost(k), mul: 0, maxLvl: 0, cost: unlockCost(k), paid: 0, lvl: 0, built: false, repeat: false });
  const padx = d[0] ? (d[0] > 0 ? x0 + 60 : x1 - 60) : x0 + 525;
  const pady = d[1] ? (d[1] > 0 ? y0 + 60 : y1 - 60) : y0 + 500;
  const gatex = d[0] ? (d[0] > 0 ? x1 - 130 : x0 + 130) : x0 + 525;
  const gatey = d[1] ? (d[1] > 0 ? y1 - 200 : y0 + 200) : y0 + 500;
  return {
    k, x0, y0, x1, y1, cx: cell.cx, cy: cell.cy, dir: cell.dir,
    pen: { x0: x0 + 90, x1: x1 - 90, y0: y0 + 160, y1: y1 - 160 },
    gate: { x: gatex, y: gatey },
    pad: { x: padx, y: pady, r: 44 },
    spawnCd: 1.2, plates,
    towers: [], porters: [], drums: false, altar: null,
    towerLvl: 0, hordeLvl: 0,
  };
}
function towerMul(z) { return 1 + TOWER_TRAIN * z.towerLvl; }
function maxAlive(z) { return 9 + 3 * z.hordeLvl; }
function spawnInt(z) { return 2.4 * Math.pow(0.82, z.hordeLvl); }

// ---- state --------------------------------------------------
let S;
function reset() {
  S = {
    started: false, t: 0,
    player: {
      x: SPAWN.x, y: SPAWN.y, hp: HP0, maxHp: HP0, fireCd: 0, hurtT: 0, invuln: 0,
      helmets: [],           // stack entries: {k, bar?, crown?}
      face: 1, moving: 0, deaths: 0, warpT: 0, dustT: 0,
    },
    wallet: 0, gems: 0,
    pallet: 0,
    up: { speed: 0, cap: 0, dmg: 0, rate: 0, hp: 0 },
    upPaid: { speed: 0, cap: 0, dmg: 0, rate: 0, hp: 0 },
    gemUp: { magnet: 0, crit: 0, coin: 0 },
    gemPaid: { magnet: 0, crit: 0, coin: 0 },
    forge: null,
    forgePlate: { cost: 260, paid: 0, built: false },
    waygate: false,
    wayPlate: { cost: 400, paid: 0, built: false },
    dog: null,
    dogPlate: { cost: 500, paid: 0, built: false },
    camp: null,              // {logs:[tier..], chopT}
    campPlate: { cost: 350, paid: 0, built: false },
    crowns: 0, prestiges: 0, prestT: 0,
    ach: {}, toasts: [], achCd: 0,
    quests: [], dailies: [], dailyDay: '', streak: 0, lastStreakDay: '',
    showQuests: false, goldPulse: 0, hitStop: 0, amb: [],
    district: null,
    distPlate: { cost: 400, paid: 0, built: false },
    d2: Object.fromEntries(Object.keys(D2CFG).map(dk => [dk, null])),
    d2Plate: Object.fromEntries(Object.keys(D2CFG).map(dk => [dk, { cost: D2CFG[dk].cost, paid: 0, built: false }])),
    zones: [mkZone(1)],
    enemies: [], items: [], shots: [], eshots: [], parts: [], floats: [], fx: [],
    chest: null, chestCd: 100,
    stick: null, keys: {},
    cam: { x: SPAWN.x, y: SPAWN.y },
    stats: { kills: 0, earned: 0, sold: 0, bosses: 0, gemsFound: 0 },
    offlineMsg: 0, offlineAmt: 0,
    shake: 0, saveCd: 5,
  };
}
function cap()     { return CAP0 + CAP_UP * S.up.cap; }
function pMaxHp()  { return Math.round((HP0 + HP_UP * S.up.hp) * (1 + CROWN_HP * S.crowns)); }
function speed()   { return SPEED0 * (1 + SPEED_UP * S.up.speed); }
function pDmg()    { return DMG0 * Math.pow(DMG_UP, S.up.dmg) * (1 + CROWN_DMG * S.crowns); }
function pRate()   { const z = zoneAt(S.player.x, S.player.y); return RATE0 * Math.pow(RATE_UP, S.up.rate) * (z && z.drums ? DRUM_MUL : 1); }
function pickR()   { return PICK_R * (1 + 0.3 * S.gemUp.magnet); }
function coinMul() { return (1 + 0.25 * S.gemUp.coin) * (1 + CROWN_BONUS * S.crowns); }
// value multipliers per carried resource kind (vs a frontier helmet)
const RES_MUL = {
  helm: 1, log: 1, stone: STONE_MUL, bar: BAR_MUL, plank: PLANK_MUL, tool: TOOL_MUL, crown: CROWN_MUL,
  wheat: 1, apple: 1.3, flour: 3, pie: 11,
  ore: 1.4, coal: 1.1, ingot: 6, sword: 20,
  wool: 1.2, dye: 1.5, cloth: 5, regalia: 34,
};
function entryRes(e) { return e.res || (e.crown ? 'crown' : e.tool ? 'tool' : e.plank ? 'plank' : e.bar ? 'bar' : e.log ? 'log' : e.stone ? 'stone' : 'helm'); }
function entryVal(e) { return Math.ceil(helmVal(e.k) * (RES_MUL[entryRes(e)] || 1) * coinMul()); }
function cloneEntry(e) { return { k: e.k, bar: !!e.bar, crown: !!e.crown, log: !!e.log, plank: !!e.plank, stone: !!e.stone, tool: !!e.tool, res: e.res }; }
// coin flow ramps up exponentially the longer you keep transacting at
// the same spot (vacuuming the pallet / pouring into a plate)
function touchFlow(key, dt) {
  if (S.flowKey === key) S.flowT += dt;
  else { S.flowKey = key; S.flowT = 0; }
  S.flowTouched = true;
}
function flowMul() { return Math.min(FLOW_CAP, Math.pow(FLOW_ACCEL, S.flowT || 0)); }
function zoneAt(x, y) { for (const z of S.zones) if (x >= z.x0 && x < z.x1 && y >= z.y0 && y < z.y1) return z; return null; }
function inCell(z, x, y, m) { m = m || 0; return x >= z.x0 - m && x < z.x1 + m && y >= z.y0 - m && y < z.y1 + m; }
function inWalkable(x, y) {
  if (x >= 0 && x < CELL_W && y >= 0 && y < CELL_H) return true; // hub
  if (S.distPlate.built && x >= DX && x < DX + CELL_W && y >= DY && y < DY + CELL_H) return true; // industry district
  for (const dk in D2CFG) {
    if (!S.d2Plate[dk].built) continue;
    const [cx, cy] = D2CFG[dk].cell;
    if (x >= cx * CELL_W && x < (cx + 1) * CELL_W && y >= cy * CELL_H && y < (cy + 1) * CELL_H) return true;
  }
  return !!zoneAt(x, y);
}
function worldBounds() {
  let minX = 0, minY = 0, maxX = CELL_W, maxY = CELL_H;
  for (const z of S.zones) {
    if (z.x0 < minX) minX = z.x0; if (z.x1 > maxX) maxX = z.x1;
    if (z.y0 < minY) minY = z.y0; if (z.y1 > maxY) maxY = z.y1;
  }
  if (S.distPlate.built) { if (DX + CELL_W > maxX) maxX = DX + CELL_W; if (DY + CELL_H > maxY) maxY = DY + CELL_H; }
  for (const dk in D2CFG) {
    if (!S.d2Plate[dk].built) continue;
    const [cx, cy] = D2CFG[dk].cell;
    if (cx * CELL_W < minX) minX = cx * CELL_W; if ((cx + 1) * CELL_W > maxX) maxX = (cx + 1) * CELL_W;
    if (cy * CELL_H < minY) minY = cy * CELL_H; if ((cy + 1) * CELL_H > maxY) maxY = (cy + 1) * CELL_H;
  }
  return { minX, minY, maxX, maxY };
}
// ---- expansion districts: farmlands (SW) + deep mines (NW) ---
// generic engine: producers grow piles, crafters combine recipes,
// hauler/trader NPCs automate. Unlock ties to lands 3 and 4.
const D2CFG = (() => {
  const at = (cell, x, y, r) => ({ x: cell[0] * CELL_W + x, y: cell[1] * CELL_H + y, r: r || 55 });
  const cfg = {
    farm: {
      key: 'farm', name: 'FARMLANDS', icon: '🌾', cell: [-1, 1], need: 3, cost: 700, ground: '#4c5a2e',
      plate: { x: 60, y: CELL_H + 500 },              // land 2's west edge
      producers: [
        { id: 'wheat', icon: '🌾', name: 'WHEAT FIELD', cost: 300, out: 'wheat', t: 1.7 },
        { id: 'orchard', icon: '🍎', name: 'ORCHARD', cost: 340, out: 'apple', t: 2.1 },
      ],
      crafters: [
        { id: 'mill', icon: '🌬️', name: 'WINDMILL', cost: 420, recipe: { wheat: 2 }, out: 'flour', t: 2.2 },
        { id: 'bakery', icon: '🥧', name: 'BAKERY', cost: 520, recipe: { flour: 1, apple: 1 }, out: 'pie', t: 2.8 },
      ],
    },
    mine: {
      key: 'mine', name: 'DEEP MINES', icon: '⚒️', cell: [-1, -1], need: 4, cost: 1200, ground: '#4a4448',
      plate: { x: -CELL_W + 525, y: 60 },             // land 3's north edge
      producers: [
        { id: 'orevein', icon: '⛓️', name: 'ORE VEIN', cost: 500, out: 'ore', t: 2.6 },
        { id: 'coal', icon: '⚫', name: 'COAL SEAM', cost: 450, out: 'coal', t: 2.3 },
      ],
      crafters: [
        { id: 'smelter', icon: '🔥', name: 'SMELTERY', cost: 700, recipe: { ore: 2, coal: 1 }, out: 'ingot', t: 3.0 },
        { id: 'smith', icon: '⚔️', name: 'WEAPONSMITH', cost: 900, recipe: { ingot: 1, plank: 1 }, out: 'sword', t: 3.4 },
      ],
    },
    artisan: {
      key: 'artisan', name: 'ARTISAN QUARTER', icon: '🎨', cell: [1, -1], need: 6, cost: 2600, ground: '#4a4054',
      plate: { x: CELL_W + 525, y: 60 },              // land 1's north edge
      producers: [
        { id: 'sheep', icon: '🐑', name: 'SHEEP PEN', cost: 900, out: 'wool', t: 2.1 },
        { id: 'dye', icon: '🏵️', name: 'DYE GARDEN', cost: 950, out: 'dye', t: 2.5 },
      ],
      crafters: [
        { id: 'weaver', icon: '🧵', name: 'WEAVER', cost: 1300, recipe: { wool: 2 }, out: 'cloth', t: 2.9 },
        // masterwork: combines woven cloth + dye + an INGOT hauled from the Deep Mines
        { id: 'atelier', icon: '🎭', name: 'GRAND ATELIER', cost: 1800, recipe: { cloth: 1, dye: 1, ingot: 1 }, out: 'regalia', t: 3.6 },
      ],
    },
  };
  for (const k in cfg) {
    const d = cfg[k];
    d.producers[0].pos = at(d.cell, 250, 270, 60);
    if (d.producers[1]) d.producers[1].pos = at(d.cell, 800, 270, 60);
    d.crafters[0].pos = at(d.cell, 250, 660); d.crafters[0].trayPos = at(d.cell, 250, 820);
    d.crafters[1].pos = at(d.cell, 800, 660); d.crafters[1].trayPos = at(d.cell, 800, 820);
    d.hauler = at(d.cell, 525, 400, 46);
    d.trader = at(d.cell, 525, 620, 46);
    d.pad = at(d.cell, 80, 80, 44);
  }
  return cfg;
})();
function initD2(dk) {
  const cfg = D2CFG[dk];
  const plates = {};
  for (const pr of cfg.producers) plates[pr.id] = { cost: pr.cost, paid: 0, built: false };
  for (const cr of cfg.crafters) plates[cr.id] = { cost: cr.cost, paid: 0, built: false };
  plates.hauler = { cost: 550, paid: 0, built: false };
  plates.trader = { cost: 550, paid: 0, built: false };
  const piles = {}, crafts = {};
  for (const pr of cfg.producers) piles[pr.id] = { arr: [], t: 0 };
  for (const cr of cfg.crafters) { const inp = {}; for (const r in cr.recipe) inp[r] = []; crafts[cr.id] = { in: inp, t: 0, tray: [] }; }
  S.d2[dk] = { plates, piles, crafts, haulerNpc: null, traderNpc: null };
}
function spawnD2Hauler(dk) { S.d2[dk].haulerNpc = { x: D2CFG[dk].hauler.x, y: D2CFG[dk].hauler.y, state: 'idle', carry: [], job: null }; }
function spawnD2Trader(dk) { S.d2[dk].traderNpc = { x: D2CFG[dk].trader.x, y: D2CFG[dk].trader.y, state: 'idle', carry: [] }; }
// every place a hauler could pull a resource from, across ALL districts
function anyResSources(res) {
  const out = [];
  if (S.district) {
    if (res === 'log' && S.district.grove.logs.length) out.push({ at: DIST.grove, arr: S.district.grove.logs });
    if (res === 'stone' && S.district.quarry.stones.length) out.push({ at: DIST.quarry, arr: S.district.quarry.stones });
    if (res === 'plank' && S.district.plates.saw.built && S.district.saw.tray.length) out.push({ at: DIST.sawTray, arr: S.district.saw.tray });
    if (res === 'tool' && S.district.plates.tool.built && S.district.tool.tray.length) out.push({ at: DIST.toolTray, arr: S.district.tool.tray });
  }
  for (const dk2 in D2CFG) {
    const d2 = S.d2[dk2]; if (!d2) continue;
    const cfg2 = D2CFG[dk2];
    for (const pr of cfg2.producers) if (pr.out === res && d2.piles[pr.id].arr.length) out.push({ at: pr.pos, arr: d2.piles[pr.id].arr });
    for (const cr of cfg2.crafters) if (cr.out === res && d2.crafts[cr.id].tray.length) out.push({ at: cr.trayPos, arr: d2.crafts[cr.id].tray });
  }
  return out;
}
// a hauler prefers local piles/trays, else fetches from any other district
function d2Sources(dk, res) {
  const d = S.d2[dk], cfg = D2CFG[dk], out = [];
  for (const pr of cfg.producers) if (pr.out === res && d.piles[pr.id].arr.length) out.push({ at: pr.pos, arr: d.piles[pr.id].arr });
  for (const cr of cfg.crafters) if (cr.out === res && d.crafts[cr.id].tray.length) out.push({ at: cr.trayPos, arr: d.crafts[cr.id].tray });
  if (out.length) return out;
  return anyResSources(res);
}

function idleRate() {
  let r = 0;
  for (const z of S.zones) {
    if (!z.porters.length || !z.towers.length) continue;
    const killsPerSec = Math.min(z.towers.length / TOWER_RATE * 0.5, 1 / 2.2);
    r += killsPerSec * helmVal(z.k) * 1.4 * coinMul() * Math.min(2, 1 + 0.3 * (z.porters.length - 1));
  }
  return r;
}
function load() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (e) {}
  if (!d || !(d.v >= 1)) return false;
  S.wallet = d.wallet || 0; S.pallet = d.pallet || 0; S.gems = d.gems || 0;
  Object.assign(S.up, d.up || {});
  Object.assign(S.gemUp, d.gemUp || {});
  Object.assign(S.stats, d.stats || {});
  S.player.deaths = d.deaths || 0;
  const n = Math.max(1, d.zoneCount || 1);
  S.zones = []; for (let k = 1; k <= n; k++) S.zones.push(mkZone(k));
  if (d.zs) { // v3
    d.zs.forEach((o, i) => {
      const z = S.zones[i]; if (!z) return;
      for (const id in o) {
        const pl = z.plates.find(q => q.id === id); if (!pl) continue;
        const st = o[id];
        if (pl.repeat) { for (let j = 0; j < (st.l || 0); j++) applyPlate(z, pl); pl.lvl = st.l || 0; pl.cost = Math.ceil(pl.base * Math.pow(pl.mul, pl.lvl)); }
        else if (st.b && id !== 'unlock') applyPlate(z, pl);
        if (st.b) pl.built = true;
        if (!pl.built) pl.paid = st.p || 0;
      }
    });
  } else { // v1/v2 migration: arrays of built plate ids
    (d.built || []).forEach((ids, i) => {
      const z = S.zones[i]; if (!z) return;
      for (const id of ids) {
        const pl = z.plates.find(q => q.id === id); if (!pl) continue;
        if (pl.repeat) { applyPlate(z, pl); pl.lvl = 1; pl.cost = Math.ceil(pl.base * pl.mul); }
        else if (id !== 'unlock') { applyPlate(z, pl); pl.built = true; }
        else pl.built = true;
      }
    });
  }
  if (d.forge) { S.forgePlate.built = true; S.forge = { queue: d.forge.queue || [], tray: d.forge.tray || [], smeltT: 0 }; }
  if (d.waygate) { S.wayPlate.built = true; S.waygate = true; }
  if (d.dog) { S.dogPlate.built = true; spawnDog(); }
  if (d.camp) { S.campPlate.built = true; S.camp = { logs: d.camp.logs || [], chopT: 0 }; }
  S.quests = d.quests || []; S.dailies = d.dailies || [];
  S.dailyDay = d.dailyDay || ''; S.streak = d.streak || 0; S.lastStreakDay = d.lastStreakDay || '';
  S.showQuests = !!d.showQuests;
  if (d.district) {
    S.distPlate.built = true;
    initDistrict();
    for (const id in d.district.plates || {}) {
      const pl = S.district.plates[id]; if (!pl) continue;
      pl.paid = d.district.plates[id].p || 0;
      if (d.district.plates[id].b) { pl.built = true; if (id === 'hauler') spawnHauler(); if (id === 'trader') spawnTrader(); }
    }
    S.district.grove.logs = d.district.grove || [];
    S.district.quarry.stones = d.district.quarry || [];
    S.district.saw.ks = (d.district.saw || {}).ks || []; S.district.saw.tray = (d.district.saw || {}).tray || [];
    S.district.tool.wood = (d.district.tool || {}).wood || []; S.district.tool.stone = (d.district.tool || {}).stone || [];
    S.district.tool.tray = (d.district.tool || {}).tray || [];
  }
  for (const dk in (d.d2 || {})) {
    if (!D2CFG[dk]) continue;
    S.d2Plate[dk].built = true;
    initD2(dk);
    const dd = S.d2[dk], sv = d.d2[dk];
    for (const id in sv.plates || {}) {
      const pl = dd.plates[id]; if (!pl) continue;
      pl.paid = sv.plates[id].p || 0;
      if (sv.plates[id].b) { pl.built = true; if (id === 'hauler') spawnD2Hauler(dk); if (id === 'trader') spawnD2Trader(dk); }
    }
    for (const id in sv.piles || {}) if (dd.piles[id]) dd.piles[id].arr = sv.piles[id] || [];
    for (const id in sv.crafts || {}) {
      if (!dd.crafts[id]) continue;
      dd.crafts[id].tray = (sv.crafts[id] || {}).tray || [];
      for (const r in (sv.crafts[id] || {}).in || {}) if (dd.crafts[id].in[r]) dd.crafts[id].in[r] = sv.crafts[id].in[r] || [];
    }
  }

  const amt = Math.floor(idleRate() * away);
  if (amt > 0) { S.pallet += amt; S.offlineAmt = amt; S.offlineMsg = 6; }
  return true;
}

// ---- tiny synth sfx -----------------------------------------
let AC = null, muted = false;
try { muted = localStorage.getItem('ks_idle_muted') === '1'; } catch (e) {}
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  return AC;
}
let sfxGate = 0;
function sfx(kind, importance) {
  if (muted) return;
  if (!importance && S && S.t < sfxGate) return;
  const ac = audio(); if (!ac) return;
  if (!importance && S) sfxGate = S.t + 0.03;
  const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  const P = {
    shoot: [700, 300, 0.03, 0.05, 'square'],
    hit:   [200, 90, 0.05, 0.07, 'sawtooth'],
    kill:  [300, 90, 0.07, 0.14, 'sawtooth'],
    pick:  [880, 1320, 0.05, 0.07, 'square'],
    sell:  [1100, 1650, 0.05, 0.08, 'square'],
    coin:  [1400, 1870, 0.045, 0.07, 'triangle'],
    pour:  [500, 720, 0.04, 0.05, 'triangle'],
    built: [330, 990, 0.14, 0.4, 'triangle'],
    unlock:[220, 880, 0.16, 0.7, 'triangle'],
    hurt:  [140, 60, 0.10, 0.15, 'sawtooth'],
    die:   [200, 40, 0.18, 0.5, 'sawtooth'],
    zap:   [1600, 200, 0.07, 0.12, 'sawtooth'],
    boom:  [90, 35, 0.20, 0.4, 'sawtooth'],
    gem:   [1560, 2340, 0.10, 0.25, 'triangle'],
    smelt: [260, 520, 0.05, 0.09, 'triangle'],
    warp:  [300, 1200, 0.12, 0.3, 'sine'],
    boss:  [80, 55, 0.25, 0.8, 'square'],
  }[kind] || [440, 440, 0.04, 0.05, 'square'];
  o.type = P[4];
  o.frequency.setValueAtTime(P[0], t);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, P[1]), t + P[3]);
  g.gain.setValueAtTime(P[2], t);
  g.gain.exponentialRampToValueAtTime(0.001, t + P[3]);
  o.start(t); o.stop(t + P[3] + 0.02);
}
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ---- chiptune loop (scheduled a beat ahead of the clock) -----
const MELODY = [0, 3, 5, 7, 10, 7, 5, 3, 0, 3, 7, 12, 10, 7, 5, 3]; // A-minor pentatonic
const BASSLN = [-12, -12, -5, -7];
const M_STEP = 0.21;
let mNext = 0, mStep = 0;
function mNote(freq, at, dur, type, vol) {
  const ac = AC; if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, at);
  g.gain.setValueAtTime(vol, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  o.start(at); o.stop(at + dur + 0.02);
}
function musicTick() {
  if (muted || !AC || !S.started) return;
  const now = AC.currentTime;
  if (mNext < now - 1) mNext = now;   // resync after tab sleep / mute
  while (mNext < now + 0.55) {
    const i = mStep % 16, bar = Math.floor(mStep / 4) % 4;
    mNote(220 * Math.pow(2, MELODY[i] / 12), mNext, M_STEP * 0.95, 'square', 0.026);
    if (i % 4 === 0) mNote(110 * Math.pow(2, BASSLN[bar] / 12), mNext, M_STEP * 3.8, 'triangle', 0.05);
    if (i % 2 === 1) mNote(2200 + (i * 37) % 500, mNext, 0.03, 'square', 0.007);
    mNext += M_STEP; mStep++;
  }
}

// ---- helpers ------------------------------------------------
function fmt(n) {
  n = Math.floor(n);
  if (n < 1000) return '' + n;
  if (n < 1e6) return (n / 1000).toFixed(n < 1e4 ? 1 : 0) + 'k';
  if (n < 1e9) return (n / 1e6).toFixed(n < 1e7 ? 1 : 0) + 'M';
  return (n / 1e9).toFixed(1) + 'B';
}
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }
function float(x, y, txt, color, big) {

// ---- spawning / combat --------------------------------------
function spawnEnemy(z, opts) {
  opts = opts || {};
  const boss = !!opts.boss;
  const gold = !boss && rnd() < GOLD_CHANCE;
  const arch = boss ? 'melee' : foeArch(z.k);
  const archHp = arch === 'tank' ? 1.8 : arch === 'fast' ? 0.7 : arch === 'spitter' ? 0.85 : 1;
  const hp = Math.ceil(foeHp(z.k) * (boss ? 22 : gold ? 2 : 1) * archHp);
  S.enemies.push({
    k: z.k, arch,
    x: z.gate.x + (rnd() - 0.5) * 80, y: z.gate.y + (rnd() - 0.5) * 80,
    hp, max: hp,
    spd: (boss ? 26 : 42) * (0.92 + rnd() * 0.16),
    dmg: foeDmg(z.k) * (boss ? 3.5 : arch === 'tank' ? 1.3 : 1),
    tx: z.pen.x0 + rnd() * (z.pen.x1 - z.pen.x0), ty: z.pen.y0 + rnd() * (z.pen.y1 - z.pen.y0),
    wanderT: 1 + rnd() * 2, atkCd: 0, hurt: 0, sway: rnd() * 6.28,
    r: (boss ? 34 : (15 + Math.min(9, z.k))) + (arch === 'tank' ? 4 : 0), boss, gold,
  });
  if (boss) { float(z.gate.x, z.gate.y - 60, '💀 ' + foeName(z.k).toUpperCase() + ' KING!', '#ff6a5a', true); sfx('boss', true); S.shake = 12; }
}
function summonBoss(z) {
  if (!z.altar || z.altar.cd > 0) return false;
  z.altar.cd = BOSS_CD;
  spawnEnemy(z, { boss: true });
  return true;
}
function dropItem(x, y, spec) {
  S.items.push(Object.assign({ x: x + (rnd() - 0.5) * 46, y: y + (rnd() - 0.5) * 36, t: 0, vy: -60 - rnd() * 60, vx: (rnd() - 0.5) * 80 }, spec));
}
function dropHelmet(x, y, k) { dropItem(x, y, { k }); }
function hurtEnemy(e, dmg) {
  if (e.hp <= 0) return;
  e.hp -= dmg; e.hurt = 0.1;
  float(e.x, e.y - e.r - 12, Math.ceil(dmg), '#fff');
  if (e.hp <= 0) {
    S.stats.kills++;
    questEvent('kill', 1);
    if (e.boss) {
      S.stats.bosses++;
      questEvent('boss', 1);
      S.hitStop = 0.14;
      dropItem(e.x, e.y, { k: e.k, crown: true });
      dropItem(e.x, e.y, { gem: true }); dropItem(e.x, e.y, { gem: true });
      for (let i = 0; i < 6; i++) dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 40, '👑 CROWN!', '#ffd94a', true);
      S.shake = 14; sfx('boom', true); buzz([50, 30, 80]);
    } else if (e.gold) {
      dropItem(e.x, e.y, { gem: true });
      dropHelmet(e.x, e.y, e.k); dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 30, '💎', '#6ee0d8', true);
      sfx('gem', true);
    } else {
      const drops = 1 + (rnd() < 0.55 ? 1 : 0);
      for (let i = 0; i < drops; i++) dropHelmet(e.x, e.y, e.k);
      sfx('kill');
    }
    puff(e.x, e.y, e.gold ? '#ffd94a' : foeCol(e.k), e.boss ? 26 : 10, true);
  } else sfx('hit');
}
function hurtPlayer(d) {
  const p = S.player;
  if (p.invuln > 0) return;

  p.hp -= d; p.hurtT = 0.15; p.invuln = 0.5; S.shake = Math.max(S.shake, 5);
  sfx('hurt', true); buzz(30);

}
function playerDie() {
  const p = S.player;

// ---- building -----------------------------------------------
function applyPlate(z, pl) {
  if (pl.id === 'tower1' || pl.id === 'tower2') z.towers.push({ type: 'archer', x: pl.x, y: pl.y, k: z.k, cd: rnd() * 0.5 });
  else if (pl.id === 'wizard')     z.towers.push({ type: 'wizard', x: pl.x, y: pl.y, k: z.k, cd: rnd() * 0.5 });
  else if (pl.id === 'catapult')   z.towers.push({ type: 'catapult', x: pl.x, y: pl.y, k: z.k, cd: 1 + rnd() });
  else if (pl.id === 'drums')      z.drums = true;
  else if (pl.id === 'altar')      z.altar = { x: pl.x, y: pl.y, cd: 0 };
  else if (pl.id === 'porter' || pl.id === 'porterPlus')
    z.porters.push({ x: pl.x, y: pl.y, hx: pl.x, hy: pl.y, k: z.k, state: 'seek', carry: [], cd: 0 });
  else if (pl.id === 'gate2')      z.hordeLvl++;
  else if (pl.id === 'towersUp')   z.towerLvl++;
  else if (pl.id === 'unlock')   { S.zones.push(mkZone(z.k + 1)); questEvent('land', 1); }
}
function buildPlate(z, pl, silent) {
  applyPlate(z, pl);
  if (pl.repeat) {
    pl.lvl++; pl.paid = 0;
    pl.cost = Math.ceil(pl.base * Math.pow(pl.mul, pl.lvl));
    if (pl.lvl >= pl.maxLvl) pl.built = true;
    if (!silent) { float(pl.x, pl.y - 50, pl.name + ' LV' + pl.lvl + '!', '#6ecb5a', true); sfx('built', true); buzz(40); puff(pl.x, pl.y, '#ffd94a', 12, true); }
    return;
  }
  pl.built = true;
  if (pl.id === 'unlock') {
    if (!silent) {
      const nz = S.zones[S.zones.length - 1];
      float(pl.x, pl.y - 60, '🌍 NEW LAND ' + DIR_NAME[nz.dir] + '!', '#ffd94a', true);
      sfx('unlock', true); buzz([40, 30, 80]);
    }
    return;
  }
  if (!silent) { float(pl.x, pl.y - 50, pl.name + ' BUILT!', '#6ecb5a', true); sfx('built', true); buzz(50); puff(pl.x, pl.y, '#ffd94a', 16, true); }
}
function pourInto(pl, z, dt) {
  if (pl.built || S.wallet <= 0) return;
  touchFlow(pl, dt);
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), pl.cost - pl.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; pl.paid += chunk;
  sfx('pour');
  if (pl.paid >= pl.cost) buildPlate(z, pl, false);
}
function pourHub(plate, dt, done) {
  if (plate.built || S.wallet <= 0) return;
  touchFlow(plate, dt);
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), plate.cost - plate.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; plate.paid += chunk; sfx('pour');
  if (plate.paid >= plate.cost) { plate.built = true; done(); sfx('built', true); buzz(50); }
}

    // trot behind the player, sniff out nearby drops if there's room on the stack
    if (p.helmets.length < cap()) {
      let it = null, bd = DOG_FETCH_R * DOG_FETCH_R;
      for (const i2 of S.items) {
        if (i2.dead || i2.gem || i2.t < 0.25) continue;
        const q = dist2(i2.x, i2.y, p.x, p.y); if (q < bd) { bd = q; it = i2; }
      }
      if (it) { d.state = 'fetch'; d.item = it; }
    }
    const hx = p.x - p.face * 30, hy = p.y + 12;
    const dl = Math.hypot(hx - d.x, hy - d.y);
    if (dl > 16) { d.x += (hx - d.x) / dl * Math.min(DOG_SPD, dl * 6) * dt; d.y += (hy - d.y) / dl * Math.min(DOG_SPD, dl * 6) * dt; }
  } else if (d.state === 'fetch') {
    const it = d.item;
    if (!it || it.dead) { d.state = 'follow'; d.item = null; }
    else {
      const dl = Math.hypot(it.x - d.x, it.y - d.y) || 1;
      d.x += (it.x - d.x) / dl * DOG_SPD * dt; d.y += (it.y - d.y) / dl * DOG_SPD * dt;
      if (dl < 20) { it.dead = true; d.carry = cloneEntry(it); d.item = null; d.state = 'return'; }
    }
  } else { // return to the player
    const dl = Math.hypot(p.x - d.x, p.y - d.y) || 1;
    d.x += (p.x - d.x) / dl * DOG_SPD * dt; d.y += (p.y - d.y) / dl * DOG_SPD * dt;
    if (dl < 30) {
      if (p.helmets.length < cap()) { p.helmets.push(d.carry); sfx('pick'); }
      else dropItem(p.x, p.y, cloneEntry(d.carry));
      d.carry = null; d.state = 'follow';
    }
  }
}

// ---- quests & daily tasks -----------------------------------
const QTPL = [
  { id: 'kill',  icon: '⚔️', txt: 'Slay # foes',       n: t => 20 + t * 12, ev: 'kill' },
  { id: 'sell',  icon: '⚖️', txt: 'Sell # items',      n: t => 15 + t * 8,  ev: 'sell' },
  { id: 'earn',  icon: '🪙', txt: 'Earn #¢',           n: t => Math.ceil(150 * Math.pow(1.9, t)), ev: 'earn' },
  { id: 'boss',  icon: '💀', txt: 'Defeat # boss',     n: () => 1, ev: 'boss' },
  { id: 'chest', icon: '💰', txt: 'Open # chest',      n: () => 1, ev: 'chest' },
  { id: 'bar',   icon: '🥇', txt: 'Smelt # gold bars', n: t => 5 + t * 2, ev: 'bar' },
  { id: 'log',   icon: '🪵', txt: 'Haul # logs',       n: t => 5 + t * 2, ev: 'log' },
  { id: 'gem',   icon: '💎', txt: 'Collect # gems',    n: t => 2 + Math.ceil(t / 2), ev: 'gem' },
  { id: 'land',  icon: '🌍', txt: 'Unlock # new land', n: () => 1, ev: 'land' },
  { id: 'tool',  icon: '🔨', txt: 'Craft # tools',     n: t => 2 + Math.ceil(t / 2), ev: 'tool' },
  { id: 'craft', icon: '🏭', txt: 'Craft # goods',     n: t => 3 + t, ev: 'craft' },
];
function qTier() { return S.zones.length - 1; }
function streakMul() { return 1 + Math.min(1, 0.1 * Math.max(0, S.streak - 1)); }
function qReward(t, daily) { return Math.ceil(80 * Math.pow(1.75, t) * (daily ? 2 * streakMul() : 1)); }
function mkQuest(tpl, daily) {
  const t = qTier();
  const target = tpl.n(t);
  return { tpl: tpl.id, icon: tpl.icon, ev: tpl.ev, txt: tpl.txt.replace('#', fmt(target)), target, prog: 0, reward: qReward(t, daily), gem: rnd() < 0.3, daily: !!daily, done: false, doneT: 0 };
}
function rollQuest() {
  const avoid = new Set(S.quests.map(q => q.tpl));
  let pick = null, g2 = 0;
  while (g2++ < 40) { const tpl = QTPL[Math.floor(rnd() * QTPL.length)]; if (!avoid.has(tpl.id)) { pick = tpl; break; } }
  return mkQuest(pick || QTPL[0], false);
}
function dayStr(off) { return new Date(Date.now() + (off || 0) * 86400000).toISOString().slice(0, 10); }
function rollDailies() {
  // deterministic template picks from the calendar day
  const s = dayStr(0);
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0x7fffffff;
  const list = [];
  for (let i = 0; i < 3; i++) {
    h = (h * 1103515245 + 12345) & 0x7fffffff;
    let idx = h % QTPL.length, g2 = 0;
    while (list.some(q => q.tpl === QTPL[idx].id) && g2++ < 10) idx = (idx + 1) % QTPL.length;
    list.push(mkQuest(QTPL[idx], true));
  }
  S.dailies = list; S.dailyDay = s;
}
function questEvent(ev, n) {
  for (const q of S.quests.concat(S.dailies)) {
    if (q.done || q.ev !== ev) continue;
    q.prog += n;
    if (q.prog >= q.target) completeQuest(q);
  }
}
function completeQuest(q) {
  q.done = true; q.doneT = 0;
  S.wallet += q.reward;
  if (q.gem) { S.gems++; S.stats.gemsFound++; }
  if (q.daily) {
    const today = dayStr(0);
    if (S.lastStreakDay !== today) {
      S.streak = (S.lastStreakDay === dayStr(-1)) ? S.streak + 1 : 1;
      S.lastStreakDay = today;
    }
  }
  S.stats.quests = (S.stats.quests || 0) + 1;
  S.toasts.push({ txt: '📜 ' + q.txt + '  +' + fmt(q.reward) + '¢' + (q.gem ? ' +💎' : ''), t: 0 });
  confetti(S.player.x, S.player.y - 30);
  S.goldPulse = 0.6;
  sfx('unlock', true); buzz([40, 30, 60]);
}
function confetti(x, y) {
  const cols = ['#ffd94a', '#ff6a5a', '#6ee0d8', '#6ecb5a', '#c98aff'];
  for (let i = 0; i < 24; i++)
    S.parts.push({ x, y, vx: (rnd() - 0.5) * 320, vy: -120 - rnd() * 220, t: 0, dur: 0.8 + rnd() * 0.4, r: 3 + rnd() * 2, color: cols[i % cols.length], g: 1 });
}

// ---- main update --------------------------------------------
function tick(dt) {
  if (!S.started) return;
  S.t += dt;
  S.flowTouched = false;
  if (S.shake > 0) S.shake = Math.max(0, S.shake - dt * 40);
  if (S.offlineMsg > 0) S.offlineMsg -= dt;
  const p = S.player;
  p.invuln = Math.max(0, p.invuln - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  // keep max HP in sync with VITALITY level + crowns; buying HP / prestige heals
  const mh = pMaxHp();
  if (mh > p.maxHp) p.hp += mh - p.maxHp;
  p.maxHp = mh;
  if (p.hp > p.maxHp) p.hp = p.maxHp;
  // regen scales with the pool so it stays meaningful on a big HP bar
  if (p.hp < p.maxHp && p.invuln <= 0) p.hp = Math.min(p.maxHp, p.hp + Math.max(5, p.maxHp * 0.04) * dt);

  // -- movement (joystick + keys), constrained to unlocked lands
  let mx = 0, my = 0;
  if (S.stick) { mx = S.stick.dx; my = S.stick.dy; }
  if (S.keys.a || S.keys.ArrowLeft) mx -= 1;
  if (S.keys.d || S.keys.ArrowRight) mx += 1;
  if (S.keys.w || S.keys.ArrowUp) my -= 1;
  if (S.keys.s || S.keys.ArrowDown) my += 1;
  const ml = Math.hypot(mx, my);
  if (ml > 0.1) {
    mx /= Math.max(1, ml); my /= Math.max(1, ml);
    const slow = 1 - Math.min(0.35, p.helmets.length / cap() * 0.35);
    const nx = p.x + mx * speed() * slow * dt;
    const ny = p.y + my * speed() * slow * dt;
    if (inWalkable(nx, ny)) { p.x = nx; p.y = ny; }
    else if (inWalkable(nx, p.y)) p.x = nx;
    else if (inWalkable(p.x, ny)) p.y = ny;
    p.moving = 1; if (Math.abs(mx) > 0.15) p.face = mx > 0 ? 1 : -1;
    p.dustT += dt;
    if (p.dustT > 0.18) {
      p.dustT = 0;
      S.parts.push({ x: p.x - mx * 10, y: p.y + 14, vx: -mx * 30, vy: -10, t: 0, dur: 0.4, r: 3, color: 'rgba(180,170,150,0.5)' });
    }
  } else p.moving = 0;

  // -- waygate pads
  if (S.waygate) {
    const pads = warpPads();
    let onPad = null;
    for (const pad of pads) if (dist2(p.x, p.y, pad.x, pad.y) < pad.r * pad.r) onPad = pad;
    if (onPad && !p.moving) {
      p.warpT += dt;
      if (p.warpT >= WARP_T) {
        p.warpT = 0;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        p.x = onPad.to.x; p.y = onPad.to.y;
        S.cam.x = p.x; S.cam.y = p.y;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        sfx('warp', true); buzz(20);
      }
    } else p.warpT = 0;
  }

  // -- auto-fire (with crits)
  p.fireCd -= dt;
  if (p.fireCd <= 0) {
    let tgt = null, bd = FIRE_RANGE * FIRE_RANGE;
    for (const e of S.enemies) { const d = dist2(e.x, e.y, p.x, p.y); if (e.hp > 0 && d < bd) { bd = d; tgt = e; } }
    if (tgt) {
      p.fireCd = pRate();
      const crit = rnd() < 0.10 * S.gemUp.crit;
      S.shots.push({ x: p.x, y: p.y - 26, tgt, dmg: pDmg() * (crit ? 3 : 1), spd: 460, crit });
      p.face = tgt.x > p.x ? 1 : -1;
      sfx('shoot');
    }
  }

  // -- item pickup
  const pr = pickR();
  for (const it of S.items) {
    if (it.dead || it.t < 0.25) continue;
    if (dist2(it.x, it.y, p.x, p.y) >= pr * pr) continue;
    if (it.gem) {
      it.dead = true; S.gems++; S.stats.gemsFound++; questEvent('gem', 1);
      float(p.x, p.y - 50, '💎 +1', '#6ee0d8', true); sfx('gem', true);
    } else if (p.helmets.length < cap()) {
      it.dead = true;
      p.helmets.push(cloneEntry(it));
      sfx('pick');
      if (p.helmets.length >= cap()) float(p.x, p.y - 60, 'FULL! Go sell →', '#ffd94a', true);
    }
  }

  // -- sell stand
  if (p.helmets.length && dist2(p.x, p.y, SELL.x, SELL.y) < SELL.r * SELL.r) {
    p.sellAcc = (p.sellAcc || 0) + dt * SELL_RATE;
    while (p.sellAcc >= 1 && p.helmets.length) {
      p.sellAcc -= 1;
      const e = p.helmets.pop();
      const v = entryVal(e);
      S.pallet += v; S.stats.sold++; S.stats.earned += v;
      questEvent('sell', 1); questEvent('earn', v);
      float(SELL.x + 30, SELL.y - 46, '+' + fmt(v), e.crown ? '#ffd94a' : e.bar ? '#e8b93a' : '#ffd94a', e.crown);
      puff(PALLET.x, PALLET.y - 30, '#ffd94a', 3, true);
      sfx('sell');
    }
  } else p.sellAcc = 0;

  // -- forge chain
  if (S.forge) {
    const f = S.forge;
    if (dist2(p.x, p.y, FORGE.x, FORGE.y) < FORGE.r * FORGE.r && f.queue.length < FORGE_Q) {
      p.forgeAcc = (p.forgeAcc || 0) + dt * SELL_RATE;
      while (p.forgeAcc >= 1 && f.queue.length < FORGE_Q) {
        p.forgeAcc -= 1;
        let idx = -1;
        for (let i = p.helmets.length - 1; i >= 0; i--) if (!p.helmets[i].bar && !p.helmets[i].crown) { idx = i; break; }
        if (idx < 0) break;
        f.queue.push(p.helmets.splice(idx, 1)[0].k);
        sfx('smelt');
      }
    } else p.forgeAcc = 0;
    if (f.queue.length && f.tray.length < TRAY_MAX) {
      f.smeltT += dt;
      if (f.smeltT >= FORGE_T) {
        f.smeltT = 0;
        f.tray.push(f.queue.shift());
        questEvent('bar', 1);
        puff(TRAY.x, TRAY.y - 10, '#e8b93a', 5, true);
        sfx('smelt');
      }
    } else f.smeltT = 0;
    if (f.tray.length && p.helmets.length < cap() && dist2(p.x, p.y, TRAY.x, TRAY.y) < TRAY.r * TRAY.r) {
      p.trayAcc = (p.trayAcc || 0) + dt * SELL_RATE;
      while (p.trayAcc >= 1 && f.tray.length && p.helmets.length < cap()) {
        p.trayAcc -= 1;
        p.helmets.push({ k: f.tray.pop(), bar: true });
        sfx('pick');
      }
    } else p.trayAcc = 0;
  }

  // -- industry district: production chains + hand-feeding
  if (S.district) {
    const D = S.district, fk = S.zones.length;
    // grove: two woodcutters chop logs
    if (D.plates.grove.built && D.grove.logs.length < PILE_MAX) {
      D.grove.t += dt;
      if (D.grove.t >= GROVE_T) { D.grove.t = 0; D.grove.logs.push(fk); puff(DIST.grove.x - 40, DIST.grove.y - 20, '#8a5c30', 3, true); }
    }
    // quarry: miner chips stones
    if (D.plates.quarry.built && D.quarry.stones.length < PILE_MAX) {
      D.quarry.t += dt;
      if (D.quarry.t >= QUARRY_T) { D.quarry.t = 0; D.quarry.stones.push(fk); puff(DIST.quarry.x + 30, DIST.quarry.y - 20, '#9aa0a8', 3, true); }
    }
    // sawmill: 2 logs → 1 plank
    if (D.plates.saw.built && D.saw.ks.length >= 2 && D.saw.tray.length < TRAY12) {
      D.saw.t += dt;
      if (D.saw.t >= SAW_T) { D.saw.t = 0; const a = D.saw.ks.shift(), b = D.saw.ks.shift(); D.saw.tray.push(Math.max(a, b)); puff(DIST.sawTray.x, DIST.sawTray.y - 10, '#d9b98a', 4, true); sfx('smelt'); }
    } else if (!(D.saw.ks.length >= 2)) D.saw.t = 0;
    // toolmaker: 1 plank + 2 stones → 1 tool
    if (D.plates.tool.built && D.tool.wood.length >= 1 && D.tool.stone.length >= 2 && D.tool.tray.length < TOOLTRAY_MAX) {
      D.tool.t += dt;
      if (D.tool.t >= TOOL_T) {
        D.tool.t = 0;
        D.tool.wood.shift(); D.tool.stone.shift(); D.tool.stone.shift();
        D.tool.tray.push(fk);
        questEvent('tool', 1); questEvent('craft', 1);
        puff(DIST.toolTray.x, DIST.toolTray.y - 10, '#ffd94a', 5, true); sfx('built');
      }
    } else if (!(D.tool.wood.length >= 1 && D.tool.stone.length >= 2)) D.tool.t = 0;
    // station purchase plates
    for (const id in D.plates) {
      const pl = D.plates[id];
      if (pl.built) continue;
      const pos = DIST[id === 'grove' ? 'grove' : id === 'quarry' ? 'quarry' : id === 'saw' ? 'saw' : id === 'tool' ? 'tool' : id];
      if (dist2(p.x, p.y, pos.x, pos.y) < 60 * 60) {
        pourHub(pl, dt, () => {
          float(pos.x, pos.y - 50, id.toUpperCase() + ' BUILT!', '#6ecb5a', true);
          if (id === 'hauler') spawnHauler();
          if (id === 'trader') spawnTrader();
        });
      }
    }
    // hand interactions
    const take = (arr, mk) => { // pile → back stack
      if (arr.length && p.helmets.length < cap()) {
        p.hAcc = (p.hAcc || 0) + dt * SELL_RATE;
        while (p.hAcc >= 1 && arr.length && p.helmets.length < cap()) { p.hAcc -= 1; p.helmets.push(mk(arr.pop())); sfx('pick'); }
      }
    };
    if (D.plates.grove.built && dist2(p.x, p.y, DIST.grove.x, DIST.grove.y) < DIST.grove.r * DIST.grove.r)
      take(D.grove.logs, k => { questEvent('log', 1); return { k, log: true }; });
    if (D.plates.quarry.built && dist2(p.x, p.y, DIST.quarry.x, DIST.quarry.y) < DIST.quarry.r * DIST.quarry.r)
      take(D.quarry.stones, k => ({ k, stone: true }));
    if (D.plates.saw.built && dist2(p.x, p.y, DIST.saw.x, DIST.saw.y) < DIST.saw.r * DIST.saw.r && D.saw.ks.length < SAW_IN_MAX) {
      p.sawAcc = (p.sawAcc || 0) + dt * SELL_RATE;
      while (p.sawAcc >= 1 && D.saw.ks.length < SAW_IN_MAX) {
        p.sawAcc -= 1;
        const i = p.helmets.map(e => !!e.log).lastIndexOf(true);
        if (i < 0) break;
        D.saw.ks.push(p.helmets.splice(i, 1)[0].k); sfx('smelt');
      }
    } else p.sawAcc = 0;
    if (D.plates.saw.built && dist2(p.x, p.y, DIST.sawTray.x, DIST.sawTray.y) < DIST.sawTray.r * DIST.sawTray.r)
      take(D.saw.tray, k => ({ k, plank: true }));
    if (D.plates.tool.built && dist2(p.x, p.y, DIST.tool.x, DIST.tool.y) < DIST.tool.r * DIST.tool.r) {
      p.toolAcc = (p.toolAcc || 0) + dt * SELL_RATE;
      while (p.toolAcc >= 1) {
        p.toolAcc -= 1;
        let i = D.tool.wood.length < TOOL_IN ? p.helmets.map(e => !!e.plank).lastIndexOf(true) : -1;
        if (i >= 0) { D.tool.wood.push(p.helmets.splice(i, 1)[0].k); sfx('smelt'); continue; }
        i = D.tool.stone.length < TOOL_IN ? p.helmets.map(e => !!e.stone).lastIndexOf(true) : -1;
        if (i >= 0) { D.tool.stone.push(p.helmets.splice(i, 1)[0].k); sfx('smelt'); continue; }
        break;
      }
    } else p.toolAcc = 0;
    if (D.plates.tool.built && dist2(p.x, p.y, DIST.toolTray.x, DIST.toolTray.y) < DIST.toolTray.r * DIST.toolTray.r)
      take(D.tool.tray, k => ({ k, tool: true }));
    // hauler NPC: keeps the chain fed (grove→saw, quarry→tool, sawTray→tool)
    const H = D.haulerNpc;
    if (H) {
      const jobs = [];
      if (D.plates.saw.built && D.saw.ks.length < SAW_IN_MAX - 3 && D.grove.logs.length) jobs.push({ from: DIST.grove, to: DIST.saw, src: D.grove.logs, put: k => D.saw.ks.push(k), kind: 'log' });
      if (D.plates.tool.built && D.tool.stone.length < TOOL_IN - 3 && D.quarry.stones.length) jobs.push({ from: DIST.quarry, to: DIST.tool, src: D.quarry.stones, put: k => D.tool.stone.push(k), kind: 'stone' });
      if (D.plates.tool.built && D.tool.wood.length < TOOL_IN - 3 && D.saw.tray.length) jobs.push({ from: DIST.sawTray, to: DIST.tool, src: D.saw.tray, put: k => D.tool.wood.push(k), kind: 'plank' });
      if (H.state === 'idle') {
        if (jobs.length) { H.job = jobs[0]; H.state = 'pick'; }
        else { const dl = Math.hypot(DIST.hauler.x - H.x, DIST.hauler.y - H.y); if (dl > 12) { H.x += (DIST.hauler.x - H.x) / dl * PORTER_SPD * 0.6 * dt; H.y += (DIST.hauler.y - H.y) / dl * PORTER_SPD * 0.6 * dt; } }
      } else if (H.state === 'pick') {
        const dl = Math.hypot(H.job.from.x - H.x, H.job.from.y - H.y) || 1;
        H.x += (H.job.from.x - H.x) / dl * PORTER_SPD * dt; H.y += (H.job.from.y - H.y) / dl * PORTER_SPD * dt;
        if (dl < 30) {
          H.carry = [];
          while (H.carry.length < 4 && H.job.src.length) H.carry.push(H.job.src.pop());
          H.state = H.carry.length ? 'drop' : 'idle';
        }
      } else { // drop
        const dl = Math.hypot(H.job.to.x - H.x, H.job.to.y - H.y) || 1;
        H.x += (H.job.to.x - H.x) / dl * PORTER_SPD * dt; H.y += (H.job.to.y - H.y) / dl * PORTER_SPD * dt;
        if (dl < 30) { for (const k of H.carry) H.job.put(k); H.carry = []; H.state = 'idle'; }
      }
    }
    // trader NPC: sells finished goods at the hub sell stand
    const T = D.traderNpc;
    if (T) {
      if (T.state === 'idle') {
        const src = D.tool.tray.length ? { arr: D.tool.tray, mk: k => ({ k, tool: true }), at: DIST.toolTray }
          : (!D.plates.tool.built && D.saw.tray.length >= 4 ? { arr: D.saw.tray, mk: k => ({ k, plank: true }), at: DIST.sawTray } : null);
        if (src) { T.src = src; T.state = 'pick'; }
        else { const dl = Math.hypot(DIST.trader.x - T.x, DIST.trader.y - T.y); if (dl > 12) { T.x += (DIST.trader.x - T.x) / dl * PORTER_SPD * 0.6 * dt; T.y += (DIST.trader.y - T.y) / dl * PORTER_SPD * 0.6 * dt; } }
      } else if (T.state === 'pick') {
        const dl = Math.hypot(T.src.at.x - T.x, T.src.at.y - T.y) || 1;
        T.x += (T.src.at.x - T.x) / dl * PORTER_SPD * dt; T.y += (T.src.at.y - T.y) / dl * PORTER_SPD * dt;
        if (dl < 30) {
          T.carry = [];
          while (T.carry.length < 6 && T.src.arr.length) T.carry.push(T.src.mk(T.src.arr.pop()));
          T.state = T.carry.length ? 'sell' : 'idle';
        }
      } else {
        const dl = Math.hypot(SELL.x - T.x, SELL.y - T.y) || 1;
        T.x += (SELL.x - T.x) / dl * PORTER_SPD * dt; T.y += (SELL.y - T.y) / dl * PORTER_SPD * dt;
        if (dl < 46) {
          T.cd = (T.cd || 0) - dt;
          if (T.cd <= 0 && T.carry.length) {
            T.cd = 0.15;
            const v = entryVal(T.carry.pop());
            S.pallet += v; S.stats.earned += v; S.stats.sold++;
            questEvent('sell', 1); questEvent('earn', v);
            puff(PALLET.x, PALLET.y - 30, '#ffd94a', 1, true);
          }
          if (!T.carry.length) T.state = 'idle';
        }
      }
    }
  }
  // district purchase plate (at zone 1's south edge)
  if (!S.distPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, DIST.plate.x, DIST.plate.y) < 56 * 56)
    pourHub(S.distPlate, dt, () => { initDistrict(); float(DIST.plate.x, DIST.plate.y - 50, '🏭 INDUSTRY DISTRICT OPEN — head southeast!', '#ffd94a', true); });

  // -- expansion districts (farmlands / deep mines)
  for (const dk in D2CFG) {
    const cfg = D2CFG[dk];
    if (!S.d2Plate[dk].built) {
      if (S.zones.length >= cfg.need && dist2(p.x, p.y, cfg.plate.x, cfg.plate.y) < 56 * 56)
        pourHub(S.d2Plate[dk], dt, () => { initD2(dk); float(cfg.plate.x, cfg.plate.y - 50, cfg.icon + ' ' + cfg.name + ' OPEN!', '#ffd94a', true); });
      continue;
    }
    const d = S.d2[dk], fk = S.zones.length;
    // producers grow their piles
    for (const pr of cfg.producers) {
      const pile = d.piles[pr.id];
      if (d.plates[pr.id].built && pile.arr.length < PILE_MAX) {
        pile.t += dt;
        if (pile.t >= pr.t) { pile.t = 0; pile.arr.push(fk); }
      }
    }
    // crafters combine recipes
    for (const cr of cfg.crafters) {
      const c = d.crafts[cr.id];
      const ready = d.plates[cr.id].built && c.tray.length < TRAY12 && Object.keys(cr.recipe).every(r => c.in[r].length >= cr.recipe[r]);
      if (ready) {
        c.t += dt;
        if (c.t >= cr.t) {
          c.t = 0;
          for (const r in cr.recipe) for (let i = 0; i < cr.recipe[r]; i++) c.in[r].shift();
          c.tray.push(fk);
          questEvent('craft', 1);
          puff(cr.trayPos.x, cr.trayPos.y - 10, '#ffd94a', 4, true); sfx('smelt');
        }
      } else c.t = 0;
    }
    // station purchase plates
    for (const id in d.plates) {
      const pl = d.plates[id];
      if (pl.built) continue;
      const pos = id === 'hauler' ? cfg.hauler : id === 'trader' ? cfg.trader
        : (cfg.producers.find(q => q.id === id) || {}).pos || cfg.crafters.find(q => q.id === id).pos;
      if (dist2(p.x, p.y, pos.x, pos.y) < 60 * 60)
        pourHub(pl, dt, () => {
          float(pos.x, pos.y - 50, 'BUILT!', '#6ecb5a', true);
          if (id === 'hauler') spawnD2Hauler(dk);
          if (id === 'trader') spawnD2Trader(dk);
        });
    }
    // hand interactions: piles → stack, stack → crafter inputs, trays → stack
    for (const pr of cfg.producers) {
      if (!d.plates[pr.id].built) continue;
      const pile = d.piles[pr.id];
      if (pile.arr.length && p.helmets.length < cap() && dist2(p.x, p.y, pr.pos.x, pr.pos.y) < pr.pos.r * pr.pos.r) {
        p.hAcc = (p.hAcc || 0) + dt * SELL_RATE;
        while (p.hAcc >= 1 && pile.arr.length && p.helmets.length < cap()) { p.hAcc -= 1; p.helmets.push({ k: pile.arr.pop(), res: pr.out }); sfx('pick'); }
      }
    }
    for (const cr of cfg.crafters) {
      if (!d.plates[cr.id].built) continue;
      const c = d.crafts[cr.id];
      if (dist2(p.x, p.y, cr.pos.x, cr.pos.y) < cr.pos.r * cr.pos.r) {
        p.cAcc = (p.cAcc || 0) + dt * SELL_RATE;
        while (p.cAcc >= 1) {
          p.cAcc -= 1;
          let fed = false;
          for (const r in cr.recipe) {
            if (c.in[r].length >= TOOL_IN) continue;
            const i = p.helmets.map(e => entryRes(e) === r).lastIndexOf(true);
            if (i >= 0) { c.in[r].push(p.helmets.splice(i, 1)[0].k); sfx('smelt'); fed = true; break; }
          }
          if (!fed) break;
        }
      }
      if (c.tray.length && p.helmets.length < cap() && dist2(p.x, p.y, cr.trayPos.x, cr.trayPos.y) < cr.trayPos.r * cr.trayPos.r) {
        p.hAcc = (p.hAcc || 0) + dt * SELL_RATE;
        while (p.hAcc >= 1 && c.tray.length && p.helmets.length < cap()) { p.hAcc -= 1; p.helmets.push({ k: c.tray.pop(), res: cr.out }); sfx('pick'); }
      }
    }
    // hauler NPC: feed crafters from piles/trays (incl. cross-district planks)
    const H = d.haulerNpc;
    if (H) {
      if (H.state === 'idle') {
        let job = null;
        for (const cr of cfg.crafters) {
          if (!d.plates[cr.id].built) continue;
          for (const r in cr.recipe) {
            if (d.crafts[cr.id].in[r].length >= TOOL_IN - 3) continue;
            const srcs = d2Sources(dk, r);
            if (srcs.length) { job = { from: srcs[0], to: cr.pos, put: k => d.crafts[cr.id].in[r].push(k), res: r }; break; }
          }
          if (job) break;
        }
        if (job) { H.job = job; H.state = 'pick'; }
        else { const dl = Math.hypot(cfg.hauler.x - H.x, cfg.hauler.y - H.y); if (dl > 12) { H.x += (cfg.hauler.x - H.x) / dl * PORTER_SPD * 0.6 * dt; H.y += (cfg.hauler.y - H.y) / dl * PORTER_SPD * 0.6 * dt; } }
      } else if (H.state === 'pick') {
        const dl = Math.hypot(H.job.from.at.x - H.x, H.job.from.at.y - H.y) || 1;
        H.x += (H.job.from.at.x - H.x) / dl * PORTER_SPD * dt; H.y += (H.job.from.at.y - H.y) / dl * PORTER_SPD * dt;
        if (dl < 30) {
          H.carry = [];
          while (H.carry.length < 4 && H.job.from.arr.length) H.carry.push(H.job.from.arr.pop());
          H.state = H.carry.length ? 'drop' : 'idle';
        }
      } else {
        const dl = Math.hypot(H.job.to.x - H.x, H.job.to.y - H.y) || 1;
        H.x += (H.job.to.x - H.x) / dl * PORTER_SPD * dt; H.y += (H.job.to.y - H.y) / dl * PORTER_SPD * dt;
        if (dl < 30) { for (const k of H.carry) H.job.put(k); H.carry = []; H.state = 'idle'; }
      }
    }
    // trader NPC: sell the final product (or the first tray while the last crafter is unbuilt)
    const T = d.traderNpc;
    if (T) {
      if (T.state === 'idle') {
        const last = cfg.crafters[1], first = cfg.crafters[0];
        const src = d.crafts[last.id].tray.length ? { at: last.trayPos, arr: d.crafts[last.id].tray, res: last.out }
          : (!d.plates[last.id].built && d.crafts[first.id].tray.length >= 4 ? { at: first.trayPos, arr: d.crafts[first.id].tray, res: first.out } : null);
        if (src) { T.src = src; T.state = 'pick'; }
        else { const dl = Math.hypot(cfg.trader.x - T.x, cfg.trader.y - T.y); if (dl > 12) { T.x += (cfg.trader.x - T.x) / dl * PORTER_SPD * 0.6 * dt; T.y += (cfg.trader.y - T.y) / dl * PORTER_SPD * 0.6 * dt; } }
      } else if (T.state === 'pick') {
        const dl = Math.hypot(T.src.at.x - T.x, T.src.at.y - T.y) || 1;
        T.x += (T.src.at.x - T.x) / dl * PORTER_SPD * dt; T.y += (T.src.at.y - T.y) / dl * PORTER_SPD * dt;
        if (dl < 30) {
          T.carry = [];
          while (T.carry.length < 6 && T.src.arr.length) T.carry.push({ k: T.src.arr.pop(), res: T.src.res });
          T.state = T.carry.length ? 'sell' : 'idle';
        }
      } else {
        const dl = Math.hypot(SELL.x - T.x, SELL.y - T.y) || 1;
        T.x += (SELL.x - T.x) / dl * PORTER_SPD * dt; T.y += (SELL.y - T.y) / dl * PORTER_SPD * dt;
        if (dl < 46) {
          T.cd = (T.cd || 0) - dt;
          if (T.cd <= 0 && T.carry.length) {
            T.cd = 0.15;
            const v = entryVal(T.carry.pop());
            S.pallet += v; S.stats.earned += v; S.stats.sold++;
            questEvent('sell', 1); questEvent('earn', v);
            puff(PALLET.x, PALLET.y - 30, '#ffd94a', 1, true);
          }
          if (!T.carry.length) T.state = 'idle';
        }
      }
    }
  }

  // -- vacuum coins from pallet (flow ramps up the longer you stand)
  if (S.pallet > 0 && dist2(p.x, p.y, PALLET.x, PALLET.y) < PALLET.r * PALLET.r) {
    touchFlow('pallet', dt);
    const take = Math.min(S.pallet, Math.max(1, Math.ceil(VAC_RATE * flowMul() * dt)));
    S.pallet -= take; S.wallet += take;
    if ((S.coinFxT = (S.coinFxT || 0) + dt) > 0.09) {
      S.coinFxT = 0; float(p.x, p.y - 46, '+' + fmt(take), '#ffd94a'); sfx('coin');
      S.parts.push({ x: PALLET.x + (rnd() - 0.5) * 60, y: PALLET.y - 10, vx: (p.x - PALLET.x) * 2, vy: (p.y - 40 - PALLET.y) * 2, t: 0, dur: 0.5, r: 4, color: '#ffd94a' });
    }
  }

  // -- coin upgrade plates (hub)
  let ux = UPG_X0;
  for (const key in UPG) {
    const cost = upgCost(key, S.up[key]);
    if (dist2(p.x, p.y, ux, UPG_Y) < 52 * 52 && S.wallet > 0 && S.upPaid[key] < cost) {
      touchFlow('upg:' + key, dt);
      const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), cost - S.upPaid[key]);
      S.wallet -= chunk; S.upPaid[key] += chunk; sfx('pour');
      if (S.upPaid[key] >= cost) {
        S.up[key]++; S.upPaid[key] = 0;
        float(ux, UPG_Y - 50, UPG[key].name + ' LV' + (S.up[key] + 1) + '!', '#6ecb5a', true);
        sfx('built', true); buzz(40);
      }
    }
    ux += UPG_STEP;
  }

  // -- gem shrine plates (hub, paid in gems)
  let gy = GEM_Y0;
  for (const key in GEMU) {
    const cost = gemUpCost(key, S.gemUp[key]);
    if (dist2(p.x, p.y, GEM_X, gy) < 46 * 46 && S.gems > 0 && S.gemPaid[key] < cost) {
      S.gemAcc = (S.gemAcc || 0) + dt * 3;
      while (S.gemAcc >= 1 && S.gems > 0 && S.gemPaid[key] < cost) {
        S.gemAcc -= 1; S.gems--; S.gemPaid[key]++;
        sfx('gem');
        if (S.gemPaid[key] >= cost) {
          S.gemUp[key]++; S.gemPaid[key] = 0;
          float(GEM_X, gy - 60, GEMU[key].name + ' LV' + S.gemUp[key] + '!', '#6ee0d8', true);
          sfx('built', true); buzz(40);
        }
      }
    }
    gy += GEM_STEP;
  }

  // -- hub build plates: forge + waygate + kennel
  if (!S.forgePlate.built && dist2(p.x, p.y, FORGE.x, FORGE.y) < 56 * 56)
    pourHub(S.forgePlate, dt, () => { S.forge = { queue: [], tray: [], smeltT: 0 }; float(FORGE.x, FORGE.y - 50, 'FORGE BUILT! Helmets → gold bars (x' + BAR_MUL + ')', '#6ecb5a', true); });
  if (!S.wayPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, HUBPAD.x, HUBPAD.y) < 56 * 56)
    pourHub(S.wayPlate, dt, () => { S.waygate = true; float(HUBPAD.x, HUBPAD.y - 50, 'WAYGATE OPEN! Stand still on it to warp', '#6ec9e0', true); });
  if (!S.dogPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, KENNEL.x, KENNEL.y) < 56 * 56)
    pourHub(S.dogPlate, dt, () => { spawnDog(); float(KENNEL.x, KENNEL.y - 50, '🐕 WAR DOG! He fetches drops for you', '#6ecb5a', true); });
  if (!S.campPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, CAMP.x, CAMP.y) < 56 * 56)
    pourHub(S.campPlate, dt, () => { S.camp = { logs: [], chopT: 0 }; float(CAMP.x, CAMP.y - 50, '🪵 LUMBER CAMP! Logs pile up on their own', '#6ecb5a', true); });

  // -- lumber camp: woodcutter chops, logs pile, player hauls them
  if (S.camp) {
    if (S.camp.logs.length < CAMP_MAX) {
      S.camp.chopT += dt;
      if (S.camp.chopT >= CHOP_T) {
        S.camp.chopT = 0;
        S.camp.logs.push(S.zones.length); // log value tracks your frontier
        puff(CAMP.x - 30, CAMP.y - 20, '#8a5c30', 4, true);
        sfx('smelt');
      }
    }
    if (S.camp.logs.length && p.helmets.length < cap() && dist2(p.x, p.y, CAMP.x, CAMP.y) < CAMP.r * CAMP.r) {
      p.campAcc = (p.campAcc || 0) + dt * SELL_RATE;
      while (p.campAcc >= 1 && S.camp.logs.length && p.helmets.length < cap()) {
        p.campAcc -= 1;
        p.helmets.push({ k: S.camp.logs.pop(), log: true });
        questEvent('log', 1);
        sfx('pick');
      }
    } else p.campAcc = 0;
  }

  // -- war dog
  dogTick(dt);

  // -- New Kingdom monument (prestige)
  if (S.zones.length >= PRESTIGE_MIN && dist2(p.x, p.y, MONU.x, MONU.y) < MONU.r * MONU.r && !p.moving) {
    S.prestT += dt;
    if (S.prestT >= PREST_T) { S.prestT = 0; prestige(); }
  } else S.prestT = 0;

  // -- wandering treasure chest
  if (!S.chest) {
    S.chestCd -= dt;
    if (S.chestCd <= 0) spawnChest();
  } else if (dist2(p.x, p.y, S.chest.x, S.chest.y) < 60 * 60) {
    S.wallet += S.chest.val;
    float(S.chest.x, S.chest.y - 40, '💰 +' + fmt(S.chest.val) + '¢', '#ffd94a', true);
    if (S.chest.gem) { S.gems++; S.stats.gemsFound++; questEvent('gem', 1); float(S.chest.x, S.chest.y - 66, '💎 +1', '#6ee0d8', true); }
    for (let i = 0; i < 16; i++) puff(S.chest.x, S.chest.y, '#ffd94a', 1, true);
    S.stats.chests = (S.stats.chests || 0) + 1;
    questEvent('chest', 1);
    sfx('unlock', true); buzz([30, 20, 50]);
    S.chest = null; S.chestCd = CHEST_CD * (0.8 + rnd() * 0.5);
  }

  // -- quests housekeeping: keep 3 side quests rolling, roll dailies at midnight
  while (S.quests.length < 3) S.quests.push(rollQuest());
  for (let i = 0; i < S.quests.length; i++) {
    const q = S.quests[i];
    if (q.done) { q.doneT += dt; if (q.doneT > 2.5) S.quests[i] = rollQuest(); }
  }
  S.dayCd = (S.dayCd || 0) - dt;
  if (S.dayCd <= 0) { S.dayCd = 30; if (S.dailyDay !== dayStr(0)) rollDailies(); }
  if (S.goldPulse > 0) S.goldPulse -= dt;

  // -- ambient butterflies
  while (S.amb.length < 10) S.amb.push({ x: p.x + (rnd() - 0.5) * 800, y: p.y + (rnd() - 0.5) * 800, a: rnd() * 6.28, ph: rnd() * 6.28, col: rnd() < 0.5 ? '#fff8c0' : '#ffd94a' });
  for (const b of S.amb) {
    b.a += (rnd() - 0.5) * 3 * dt; b.ph += dt * 14;
    b.x += Math.cos(b.a) * 30 * dt; b.y += Math.sin(b.a) * 22 * dt + Math.sin(b.ph) * 8 * dt;
    if (dist2(b.x, b.y, p.x, p.y) > 1100 * 1100) { b.x = p.x + (rnd() - 0.5) * 800; b.y = p.y + (rnd() - 0.5) * 800; }
  }

  // -- milestones + toasts
  S.achCd -= dt;
  if (S.achCd <= 0) { S.achCd = 0.5; checkAch(); }
  for (const to of S.toasts) to.t += dt;
  S.toasts = S.toasts.filter(to => to.t < 3);

  // -- zone build plates + boss altars
  for (const z of S.zones) {
    for (const pl of z.plates) {
      if (pl.built) continue;
      if (pl.id === 'unlock' && z.k < S.zones.length) continue;
      if (dist2(p.x, p.y, pl.x, pl.y) < 56 * 56) pourInto(pl, z, dt);
    }
    if (z.altar) {
      z.altar.cd = Math.max(0, z.altar.cd - dt);
      if (z.altar.cd <= 0 && dist2(p.x, p.y, z.altar.x, z.altar.y) < 50 * 50) summonBoss(z);
    }
  }

  // -- zone spawners
  for (const z of S.zones) {
    const alive = S.enemies.reduce((n, e) => n + (e.k === z.k && !e.boss ? 1 : 0), 0);
    z.spawnCd -= dt;
    if (z.spawnCd <= 0 && alive < maxAlive(z)) { z.spawnCd = spawnInt(z); spawnEnemy(z); }
  }

  // -- enemies (behavior varies by archetype)
  for (const e of S.enemies) {
    if (e.hp <= 0) continue;
    e.hurt = Math.max(0, e.hurt - dt);
    const z = S.zones[e.k - 1];
    const aggroR = e.boss ? 1200 : e.arch === 'spitter' ? 360 : 220;
    const pd2 = dist2(e.x, e.y, p.x, p.y);
    const nearPlayer = pd2 < aggroR * aggroR && inCell(z, p.x, p.y, 60);
    const spdMul = e.arch === 'fast' ? 1.55 : e.arch === 'tank' ? 0.7 : 1;
    let tx = e.tx, ty = e.ty, spd = (e.boss ? e.spd : 42) * spdMul;
    if (nearPlayer) {
      if (e.arch === 'spitter' && !e.boss) {
        // keep range and spit
        if (pd2 < 190 * 190) { tx = e.x + (e.x - p.x); ty = e.y + (e.y - p.y); }
        else if (pd2 < 300 * 300) { tx = e.x; ty = e.y; }
        else { tx = p.x; ty = p.y; }
        spd = 52 * spdMul;
        e.atkCd -= dt;

function guideTarget() {
  const p = S.player;
  if (p.helmets.length >= cap()) return { x: SELL.x, y: SELL.y, label: 'SELL' };
  // only interrupt for the pallet when it holds real money relative to the wallet
  if (S.pallet >= Math.max(60, S.wallet * 0.5)) return { x: PALLET.x, y: PALLET.y, label: 'COINS' };
  let gy = GEM_Y0;
  for (const key in GEMU) {
    if (S.gems >= gemUpCost(key, S.gemUp[key]) - S.gemPaid[key]) return { x: GEM_X, y: gy, label: '💎 ' + GEMU[key].name };
    gy += GEM_STEP;
  }
  // progression ladder on the frontier land: get the tower up, hire the
  // porter, then push to NEW LANDS. Everything else is discretionary —
  // the arrow always shows the road forward, even while you save up.
  const fz = S.zones[S.zones.length - 1];
  for (const id of ['tower1', 'porter', 'unlock']) {
    const pl = fz.plates.find(q => q.id === id);
    if (pl && !pl.built) return { x: pl.x, y: pl.y, label: pl.name };
  }
  return { x: (fz.x0 + fz.x1) / 2, y: (fz.y0 + fz.y1) / 2, label: 'FIGHT' };
}

function drawZoneStands() {

      ctx.font = '28px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';

function drawTower(tw) {

    ctx.fillStyle = '#7c52c9';

    return;
  }
  ctx.fillStyle = '#6a5138'; rr(tw.x - 22, tw.y - 30, 44, 60, 6); ctx.fill();
  ctx.fillStyle = '#584330'; rr(tw.x - 28, tw.y - 44, 56, 18, 5); ctx.fill();

  ctx.fillStyle = '#e8c49a'; ctx.beginPath(); ctx.arc(tw.x, tw.y - 70, 5.5, 0, 6.29); ctx.fill();
  ctx.strokeStyle = '#d9c9a0'; ctx.lineWidth = 2;

    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(to.txt, vw / 2, ty + 22);
    ctx.globalAlpha = 1;
    ty += 40;
  }
  hudBtn(vw - 46, 10, 36, 30, muted ? '🔇' : '🔊', () => {
    muted = !muted;
    try { localStorage.setItem('ks_idle_muted', muted ? '1' : '0'); } catch (e) {}
  });
  drawMinimap();
  drawQuests();
  // quest-complete golden pulse
  if (S.goldPulse > 0) {
    ctx.strokeStyle = 'rgba(255,217,74,' + (S.goldPulse * 0.9) + ')';
    ctx.lineWidth = 10;
    rr(5, 5, vw - 10, vh - 10, 18); ctx.stroke();
  }
  if (S.offlineMsg > 0 && S.offlineAmt > 0) {
    ctx.fillStyle = 'rgba(20,25,36,0.9)'; rr(vw / 2 - 150, 14, 300, 44, 10); ctx.fill();
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('While you were away…', vw / 2, 32);
    ctx.fillText('+' + fmt(S.offlineAmt) + ' ¢ piled up at the pallet!', vw / 2, 50);
  }
  const g = guideTarget();
  const dx = g.x - S.cam.x, dy = g.y - S.cam.y;
  if (dx * dx + dy * dy > 190 * 190) {
    const a = Math.atan2(dy, dx);
    const ax = vw / 2 + Math.cos(a) * Math.min(vw, vh) * 0.32;
    const ay = vh / 2 + Math.sin(a) * Math.min(vw, vh) * 0.32;
    const pulse = 1 + Math.sin(S.t * 6) * 0.12;
    ctx.save(); ctx.translate(ax, ay); ctx.rotate(a); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ffd94a';
    ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(-8, -11); ctx.lineTo(-3, 0); ctx.lineTo(-8, 11); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(g.label, ax, ay + 26);
  }
  if (S.stick) {
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(S.stick.ax, S.stick.ay, 44, 0, 6.29); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(S.stick.ax + S.stick.dx * 40, S.stick.ay + S.stick.dy * 40, 20, 0, 6.29); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (!S.started) {
    ctx.fillStyle = 'rgba(8,10,16,0.8)'; ctx.fillRect(0, 0, vw, vh);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 44px sans-serif';
    ctx.fillText('KINGSHOT', vw / 2, vh * 0.32);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('E N D L E S S', vw / 2, vh * 0.32 + 34);
    ctx.fillStyle = '#9aa7b5'; ctx.font = '14px sans-serif';
    ctx.fillText('You fire automatically. Enemies drop helmets —', vw / 2, vh * 0.45);
    ctx.fillText('stack them, sell them (or smelt them into gold),', vw / 2, vh * 0.45 + 22);
    ctx.fillText('build towers, drums, altars and waygates, and', vw / 2, vh * 0.45 + 44);
    ctx.fillText('carve new lands out of the forest — in all directions.', vw / 2, vh * 0.45 + 66);
    ctx.fillText('Drag anywhere to walk.', vw / 2, vh * 0.45 + 98);
    const pulse = 1 + Math.sin(S.t * 4) * 0.05;
    ctx.save(); ctx.translate(vw / 2, vh * 0.68); ctx.scale(pulse, pulse);
    ctx.fillStyle = '#7a5f18'; rr(-110, -26, 220, 52, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('▶ TAP TO PLAY', 0, 7);
    ctx.restore();
  }
}
function drawQuests() {
  hudBtn(vw - 46, 44, 36, 30, '📜', () => { S.showQuests = !S.showQuests; save(); });
  if (S.goldPulse > 0) { // fresh completion ping on the button
    ctx.fillStyle = '#ffd94a';
    ctx.beginPath(); ctx.arc(vw - 14, 48, 4 + Math.sin(S.t * 8), 0, 6.29); ctx.fill();
  }
  if (!S.showQuests) return;
  const rows = S.dailies.concat(S.quests);
  if (!rows.length) return;
  const w = 208, rh = 27, oy = 170;
  const h = rows.length * rh + (S.streak > 0 ? 18 : 6) + 6;
  ctx.fillStyle = 'rgba(20,25,36,0.72)'; rr(10, oy, w, h, 10); ctx.fill();
  let y = oy + 6;
  ctx.textAlign = 'left';
  for (const q of rows) {
    ctx.globalAlpha = q.done ? 0.45 : 1;
    ctx.font = '12px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText((q.daily ? '☀️' : '') + q.icon, 16, y + 13);
    ctx.font = 'bold 10px sans-serif';
    ctx.fillStyle = q.done ? '#6ecb5a' : '#e8e8e8';
    ctx.fillText(q.done ? '✓ ' + q.txt : q.txt, 44, y + 9);
    // progress bar
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; rr(44, y + 13, 100, 6, 3); ctx.fill();
    const f = Math.min(1, q.prog / q.target);
    if (f > 0) { ctx.fillStyle = q.done ? '#6ecb5a' : '#ffd94a'; rr(44, y + 13, 100 * f, 6, 3); ctx.fill(); }
    ctx.fillStyle = '#ffd94a'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText('+' + fmt(q.reward) + '¢' + (q.gem ? '💎' : ''), 150, y + 19);
    ctx.globalAlpha = 1;
    y += rh;
  }
  if (S.streak > 0) {
    ctx.fillStyle = '#ff9a4a'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText('🔥 ' + S.streak + '-day streak  (+' + Math.round((streakMul() - 1) * 100) + '% daily pay)', 16, y + 10);
  }
}
function drawMinimap() {
  // tiny map of the land grid in the top-right corner
  const cells = [{ cx: 0, cy: 0, k: 0 }].concat(S.zones.map(z => ({ cx: z.cx, cy: z.cy, k: z.k })));
  if (S.distPlate.built) cells.push({ cx: 1, cy: 1, k: -1 });
  for (const dk in D2CFG) if (S.d2Plate[dk].built) cells.push({ cx: D2CFG[dk].cell[0], cy: D2CFG[dk].cell[1], k: -1 });
  const nxt = cellFor(S.zones.length + 1);
  let minC = 0, maxC = 0, minR = 0, maxR = 0;
  for (const c of cells.concat([nxt])) {
    if (c.cx < minC) minC = c.cx; if (c.cx > maxC) maxC = c.cx;
    if (c.cy < minR) minR = c.cy; if (c.cy > maxR) maxR = c.cy;
  }
  const cols = maxC - minC + 1, rows = maxR - minR + 1;
  const size = 108, pad = 3;
  const cs = Math.min(22, Math.floor((size - pad * 2) / Math.max(cols, rows)));
  const w = cols * cs + pad * 2, h = rows * cs + pad * 2;
  const ox = vw - 10 - w, oy = 48;
  ctx.fillStyle = 'rgba(20,25,36,0.75)'; rr(ox, oy, w, h, 8); ctx.fill();
  const cellXY = (cx2, cy2) => ({ x: ox + pad + (cx2 - minC) * cs, y: oy + pad + (cy2 - minR) * cs });
  for (const c of cells) {
    const q = cellXY(c.cx, c.cy);
    ctx.fillStyle = c.k === 0 ? '#d9c9a0' : c.k === -1 ? '#e0a13c' : foeCol(c.k);
    ctx.globalAlpha = c.k === 0 ? 0.95 : 0.8;
    rr(q.x + 1, q.y + 1, cs - 2, cs - 2, 3); ctx.fill();
    ctx.globalAlpha = 1;
  }
  const nq = cellXY(nxt.cx, nxt.cy);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
  rr(nq.x + 1, nq.y + 1, cs - 2, cs - 2, 3); ctx.stroke(); ctx.setLineDash([]);
  // treasure chest ping
  if (S.chest) {
    const ccx = Math.floor(S.chest.x / CELL_W), ccy = Math.floor(S.chest.y / CELL_H);
    const cq = cellXY(ccx, ccy);
    ctx.fillStyle = Math.floor(S.t * 3) % 2 ? '#ffd94a' : '#fff8c0';
    ctx.beginPath(); ctx.arc(cq.x + cs / 2, cq.y + cs / 2, 3, 0, 6.29); ctx.fill();
  }
  // player dot
  const pcx = Math.floor(S.player.x / CELL_W + (S.player.x < 0 ? -1e-9 : 0));
  const pcy = Math.floor(S.player.y / CELL_H + (S.player.y < 0 ? -1e-9 : 0));
  const pq = cellXY(pcx, pcy);
  const fx = (S.player.x - pcx * CELL_W) / CELL_W, fy = (S.player.y - pcy * CELL_H) / CELL_H;
  const pulse = 2.4 + Math.sin(S.t * 6) * 0.7;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(pq.x + 1 + fx * (cs - 2), pq.y + 1 + fy * (cs - 2), pulse, 0, 6.29); ctx.fill();
}
function draw() {
  hits = [];
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#16241a'; ctx.fillRect(0, 0, vw, vh);
  ctx.save();
  const shx = S.shake > 0 ? (rnd() - 0.5) * S.shake : 0;
  const shy = S.shake > 0 ? (rnd() - 0.5) * S.shake : 0;
  const b = worldBounds();
  const vwW = vw / scl, vhW = vh / scl, M = 240;
  let cx, cy;
  if (b.maxX - b.minX + 2 * M <= vwW) cx = (b.minX + b.maxX) / 2;
  else cx = Math.max(b.minX + vwW / 2 - M, Math.min(b.maxX - vwW / 2 + M, S.cam.x));
  if (b.maxY - b.minY + 2 * M <= vhW) cy = (b.minY + b.maxY) / 2;
  else cy = Math.max(b.minY + vhW / 2 - M, Math.min(b.maxY - vhW / 2 + M, S.cam.y));
  vL = cx - vwW / 2 - 120; vR = cx + vwW / 2 + 120;
  vT = cy - vhW / 2 - 120; vB = cy + vhW / 2 + 120;
  ctx.translate(vw / 2 + shx, vh / 2 + shy);
  ctx.scale(scl, scl);
  ctx.translate(-cx, -cy);
  drawWorld();
  ctx.restore();
  drawHud();
}

// ---- input --------------------------------------------------
function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  vw = window.innerWidth; vh = window.innerHeight;
  cvs.width = Math.round(vw * dpr); cvs.height = Math.round(vh * dpr);
  cvs.style.width = vw + 'px'; cvs.style.height = vh + 'px';
  scl = Math.max(0.55, Math.min(1.35, Math.min(vw, vh) / 700));
}
function pointerXY(ev) {
  const r = cvs.getBoundingClientRect();
  return { x: (ev.clientX !== undefined ? ev.clientX : ev.touches[0].clientX) - r.left,
           y: (ev.clientY !== undefined ? ev.clientY : ev.touches[0].clientY) - r.top };
}
let activePointer = null;
function onDown(ev) {
  ev.preventDefault();
  audio();
  const p = pointerXY(ev);
  if (!S.started) { S.started = true; sfx('built', true); return; }
  for (const h of hits) {
    if (p.x >= h.x && p.x <= h.x + h.w && p.y >= h.y && p.y <= h.y + h.h) { h.act(); return; }
  }
  activePointer = ev.pointerId !== undefined ? ev.pointerId : 'touch';
  S.stick = { ax: p.x, ay: p.y, dx: 0, dy: 0 };
}
function onMove(ev) {
  if (!S.stick) return;
  if (ev.pointerId !== undefined && activePointer !== null && ev.pointerId !== activePointer) return;
  const p = pointerXY(ev);
  let dx = (p.x - S.stick.ax) / 44, dy = (p.y - S.stick.ay) / 44;
  const l = Math.hypot(dx, dy);
  if (l > 1) { dx /= l; dy /= l; }
  S.stick.dx = dx; S.stick.dy = dy;
}
function onUp(ev) {
  if (ev.pointerId !== undefined && activePointer !== null && ev.pointerId !== activePointer) return;
  S.stick = null; activePointer = null;
}
cvs.addEventListener('pointerdown', onDown);
cvs.addEventListener('pointermove', onMove);
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);
window.addEventListener('keydown', (ev) => {
  const k = ev.key.length === 1 ? ev.key.toLowerCase() : ev.key;
  S.keys[k] = true;
  if (!S.started) { S.started = true; }
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.length === 1 ? ev.key.toLowerCase() : ev.key;
  S.keys[k] = false;
});
window.addEventListener('resize', resize);
document.addEventListener('visibilitychange', () => { if (document.hidden) save(); });

// ---- boot ---------------------------------------------------
reset();
load();
resize();
let lastT = 0;
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0.016);
  lastT = t;
  if (S.hitStop > 0) { S.hitStop -= dt; tick(dt * 0.15); } // brief slow-mo on big kills
  else tick(dt);
  musicTick();
  draw();
  requestAnimationFrame(frame);
}
if (typeof window.__KS_HEADLESS__ === 'undefined') requestAnimationFrame(frame);

// ---- test hooks ---------------------------------------------
window.KS = {
  get S() { return S; }, reset, tick, draw, save, load, idleRate,
  spawnEnemy, summonBoss, hurtEnemy, hurtPlayer, playerDie, buildPlate, applyPlate, mkZone, dropHelmet, dropItem, pMaxHp, foeDmg,
  cap, speed, pDmg, pRate, pickR, coinMul, entryVal, eco, helmVal, foeHp, towerDmg, unlockCost, upgCost, gemUpCost, fmt,
  guideTarget, zoneAt, inWalkable, worldBounds, cellFor, towerMul, maxAlive, spawnInt, foeName, warpPads,
  prestige, crownsToGain, spawnDog, checkAch, ACH, flowMul, musicTick, drawMinimap, foeArch, spawnChest,
  questEvent, rollDailies, streakMul, completeQuest, initDistrict, spawnHauler, spawnTrader, cloneEntry,
  initD2, spawnD2Hauler, spawnD2Trader, entryRes, D2CFG, RES_MUL,
  constants: { CELL_W, CELL_H, SELL, PALLET, FORGE, TRAY, HUBPAD, SPAWN, MONU, KENNEL, UPG_X0, UPG_STEP, UPG_Y, GEM_X, GEM_Y0, GEM_STEP, CAP0, SELL_RATE, VAC_RATE, BUILD_RATE, SAVE_KEY, PORTER_CAP, FORGE_T, BAR_MUL, CROWN_MUL, BOSS_CD, WARP_T, DRUM_MUL, GOLD_CHANCE, TOWER_TRAIN, PRESTIGE_MIN, PREST_T, CROWN_BONUS, FLOW_ACCEL, FLOW_CAP, CAMP, CHOP_T, CAMP_MAX, CROWN_DMG, CHEST_CD, DIST, DIST_COSTS, STONE_MUL, PLANK_MUL, TOOL_MUL, GROVE_T, QUARRY_T, SAW_T, TOOL_T, HP0, HP_UP, CROWN_HP },
  start() { S.started = true; },
};
