<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kingshot Endless</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #16241a; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: none; overscroll-behavior: none;
  }
  #game { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
// ============================================================
// KINGSHOT ENDLESS — arcade-idle collector
// Auto-firing knight ⇒ enemies drop helmets ⇒ stack them on
// your back ⇒ sell or SMELT them ⇒ coins pile into a mountain ⇒
// pour them into stations: archer/wizard/catapult towers, war
// drums, porters, horde gates, boss altars, waygates — and the
// kingdom expands in ALL FOUR DIRECTIONS, land by land, carved
// out of the dark forest. Golden foes drop gems for permanent
// shrine upgrades.
// One file, vanilla canvas, mobile-first. window.KS = test hooks.
// ============================================================

const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

// ---- world geometry -----------------------------------------
// The world is a grid of cells. The hub sits at cell (0,0);
// zone k grows outward along four arms: E, S, W, N, E+2, S+2, …
const CELL_W = 1050, CELL_H = 1000;
const DIRS = [[1, 0], [0, 1], [-1, 0], [0, -1]];
const DIR_NAME = ['EAST', 'SOUTH', 'WEST', 'NORTH'];
function cellFor(k) { const d = DIRS[(k - 1) % 4], dist = Math.floor((k - 1) / 4) + 1; return { cx: d[0] * dist, cy: d[1] * dist, dir: (k - 1) % 4 }; }
// hub furniture (all inside cell (0,0))
const SELL    = { x: 435, y: 430, r: 60 };
const PALLET  = { x: 435, y: 640, r: 66 };
const FORGE   = { x: 730, y: 430, r: 55 };
const TRAY    = { x: 730, y: 575, r: 55 };
const HUBPAD  = { x: 790, y: 872, r: 44 };
const SPAWN   = { x: 525, y: 720 };
const UPG_X0  = 245, UPG_STEP = 165, UPG_Y = 190;
const GEM_X   = 225, GEM_Y0 = 480, GEM_STEP = 140;
const MONU    = { x: 525, y: 315, r: 46 };     // New Kingdom monument (prestige)
const KENNEL  = { x: 300, y: 872, r: 44 };     // war dog kennel
const CAMP    = { x: 160, y: 330, r: 55 };     // lumber camp (logs pile up here)

// ---- balance dials ------------------------------------------
const PICK_R      = 78;
const CAP0        = 8,  CAP_UP = 4;
const SPEED0      = 195,   SPEED_UP = 0.12;
const DMG0        = 6,     DMG_UP = 1.45;
const RATE0       = 0.55,  RATE_UP = 0.90;
const FIRE_RANGE  = 270;
const SELL_RATE   = 7;
const VAC_RATE    = 55;
const BUILD_RATE  = 60;
const FLOW_ACCEL  = 2.6;   // coin flow multiplies by this per second standing still
const FLOW_CAP    = 600;   // max flow multiplier (~33k coins/s)
const ECO         = 2.35;
const HP_T        = 2.15;
const UNLOCK0     = 180, UNLOCK_MUL = 2.35; // tracks the economy so each land costs similar effort
const OFFLINE_CAP = 4 * 3600;
const TOWER_RANGE = 340, TOWER_RATE = 1.05;
const TOWER_TRAIN = 0.35;  // +35% tower dmg per training level
const WIZ_RATE    = 2.0, WIZ_CHAIN = 3, WIZ_JUMP = 160;
const CAT_RATE    = 4.2, CAT_AOE = 115;
const DRUM_MUL    = 0.75;
const PORTER_CAP  = 10, PORTER_SPD = 135;
const FORGE_T     = 1.8;
const FORGE_Q     = 12, TRAY_MAX = 10;
const BAR_MUL     = 3;
const CROWN_MUL   = 22;
const GOLD_CHANCE = 0.045;
const BOSS_CD     = 45;
const WARP_T      = 0.55;
const CHOP_T       = 3.2;  // s per log chopped at the lumber camp
const CAMP_MAX     = 24;   // logs the pile can hold
const PRESTIGE_MIN = 5;    // lands required to found a New Kingdom
const PREST_T      = 3;    // s holding still on the monument
const CROWN_BONUS  = 0.20; // +20% coin value per crown, forever
const DOG_SPD      = 250, DOG_FETCH_R = 320;

function eco(k)      { return Math.pow(ECO, k - 1); }
function helmVal(k)  { return Math.ceil(5 * eco(k)); }
function foeHp(k)    { return Math.ceil(13 * Math.pow(HP_T, k - 1)); }
function foeDmg(k)   { return Math.ceil(4 * Math.pow(1.55, k - 1)); }
function towerDmg(k) { return Math.ceil(9 * Math.pow(HP_T, k - 1)); }
function unlockCost(k) { return Math.ceil(UNLOCK0 * Math.pow(UNLOCK_MUL, k - 1)); }
const UPG = {
  speed: { icon: '👟', name: 'SPEED',    base: 35 },
  cap:   { icon: '🎒', name: 'CAPACITY', base: 30 },
  dmg:   { icon: '⚔️', name: 'DAMAGE',   base: 45 },
  rate:  { icon: '🏹', name: 'FIRE RATE', base: 55 },
};
function upgCost(key, lvl) { return Math.ceil(UPG[key].base * Math.pow(1.65, lvl)); }
const GEMU = {
  magnet: { icon: '🧲', name: 'MAGNET',   what: '+30% pickup range' },
  crit:   { icon: '💥', name: 'CRIT',     what: '+10% chance, 3x dmg' },
  coin:   { icon: '🪙', name: 'MIDAS',    what: '+25% coin value' },
};
function gemUpCost(key, lvl) { return 2 + lvl * (key === 'magnet' ? 2 : 3); }
const FOE_NAMES = ['Grunt', 'Raider', 'Ogre', 'Wraith', 'Golem', 'Demon', 'Titan', 'Dread'];
const FOE_COLS  = ['#c15840', '#c99a3a', '#7c52c9', '#4ba8b5', '#8a9a4a', '#c94a8a', '#5a6dcf', '#3f3f4f'];
function foeName(k) { const i = (k - 1) % FOE_NAMES.length; const cyc = Math.floor((k - 1) / FOE_NAMES.length); return FOE_NAMES[i] + (cyc ? ' ' + ('II III IV V VI VII VIII IX X'.split(' ')[cyc - 1] || cyc) : ''); }
function foeCol(k)  { return FOE_COLS[(k - 1) % FOE_COLS.length]; }
function hexRgb(h)  { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }

// ---- deterministic rng --------------------------------------
let seed = 987654321;
function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

// ---- zone factory -------------------------------------------
// Every zone: archer tower, porter, horde gate (repeatable),
// tower training (repeatable), +porter (repeatable), unlock.
// Zones 2+ also rotate two bonus stations + a boss altar.
const POOL = [
  { id: 'tower2',   icon: '🏹', name: 'ARCHER TOWER', mul: 1.5 },
  { id: 'wizard',   icon: '⚡', name: 'WIZARD TOWER', mul: 1.8 },
  { id: 'catapult', icon: '💣', name: 'CATAPULT',     mul: 1.7 },
  { id: 'drums',    icon: '🥁', name: 'WAR DRUMS',    mul: 1.4 },
];
function mkZone(k) {
  const cell = cellFor(k);
  const x0 = cell.cx * CELL_W, y0 = cell.cy * CELL_H;
  const x1 = x0 + CELL_W, y1 = y0 + CELL_H;
  const P = (id, icon, name, px, py, cost, rep) => ({
    id, icon, name, x: x0 + px, y: y0 + py,
    base: Math.ceil(cost), mul: rep ? rep.mul : 0, maxLvl: rep ? rep.max : 0,
    cost: Math.ceil(cost), paid: 0, lvl: 0, built: false, repeat: !!rep,
  });
  const plates = [
    P('tower1', '🏹', 'ARCHER TOWER', 260, 265, 70 * eco(k)),
    P('gate2', '🚪', 'HORDE GATE', 640, 230, 110 * eco(k), { mul: 1.6, max: 4 }),
    P('towersUp', '🎯', 'TRAIN TOWERS', 525, 500, 130 * eco(k), { mul: 1.7, max: 6 }),
    P('porter', '🧺', 'PORTER', 150, 380, 90 * eco(k)),
    P('porterPlus', '🧺', '+PORTER', 150, 620, 150 * eco(k), { mul: 1.9, max: 2 }),
  ];
  if (k === 1) {
    plates.push(P('tower2', '🏹', 'ARCHER TOWER', 260, 735, 120 * eco(k)));
  } else {
    const a = POOL[k % POOL.length], b = POOL[(k + 2) % POOL.length];
    plates.push(P(a.id, a.icon, a.name, 260, 735, 95 * eco(k) * a.mul));
    plates.push(P(b.id, b.icon, b.name, 790, 265, 95 * eco(k) * b.mul));
    plates.push(P('altar', '💀', 'BOSS ALTAR', 640, 770, 200 * eco(k)));
  }
  // unlock plate sits on the outward edge; entrance pad faces the hub
  const d = DIRS[cell.dir];
  const ux = d[0] ? (d[0] > 0 ? x1 - 60 : x0 + 60) : x0 + 525;
  const uy = d[1] ? (d[1] > 0 ? y1 - 60 : y0 + 60) : y0 + 500;
  plates.push({ id: 'unlock', icon: '🔓', name: 'NEW LANDS', x: ux, y: uy, base: unlockCost(k), mul: 0, maxLvl: 0, cost: unlockCost(k), paid: 0, lvl: 0, built: false, repeat: false });
  const padx = d[0] ? (d[0] > 0 ? x0 + 60 : x1 - 60) : x0 + 525;
  const pady = d[1] ? (d[1] > 0 ? y0 + 60 : y1 - 60) : y0 + 500;
  const gatex = d[0] ? (d[0] > 0 ? x1 - 130 : x0 + 130) : x0 + 525;
  const gatey = d[1] ? (d[1] > 0 ? y1 - 200 : y0 + 200) : y0 + 500;
  return {
    k, x0, y0, x1, y1, cx: cell.cx, cy: cell.cy, dir: cell.dir,
    pen: { x0: x0 + 90, x1: x1 - 90, y0: y0 + 160, y1: y1 - 160 },
    gate: { x: gatex, y: gatey },
    pad: { x: padx, y: pady, r: 44 },
    spawnCd: 1.2, plates,
    towers: [], porters: [], drums: false, altar: null,
    towerLvl: 0, hordeLvl: 0,
  };
}
function towerMul(z) { return 1 + TOWER_TRAIN * z.towerLvl; }
function maxAlive(z) { return 9 + 3 * z.hordeLvl; }
function spawnInt(z) { return 2.4 * Math.pow(0.82, z.hordeLvl); }

// ---- state --------------------------------------------------
let S;
function reset() {
  S = {
    started: false, t: 0,
    player: {
      x: SPAWN.x, y: SPAWN.y, hp: 60, maxHp: 60, fireCd: 0, hurtT: 0, invuln: 0,
      helmets: [],           // stack entries: {k, bar?, crown?}
      face: 1, moving: 0, deaths: 0, warpT: 0, dustT: 0,
    },
    wallet: 0, gems: 0,
    pallet: 0,
    up: { speed: 0, cap: 0, dmg: 0, rate: 0 },
    upPaid: { speed: 0, cap: 0, dmg: 0, rate: 0 },
    gemUp: { magnet: 0, crit: 0, coin: 0 },
    gemPaid: { magnet: 0, crit: 0, coin: 0 },
    forge: null,
    forgePlate: { cost: 260, paid: 0, built: false },
    waygate: false,
    wayPlate: { cost: 400, paid: 0, built: false },
    dog: null,
    dogPlate: { cost: 500, paid: 0, built: false },
    camp: null,              // {logs:[tier..], chopT}
    campPlate: { cost: 350, paid: 0, built: false },
    crowns: 0, prestiges: 0, prestT: 0,
    ach: {}, toasts: [], achCd: 0,
    zones: [mkZone(1)],
    enemies: [], items: [], shots: [], parts: [], floats: [], fx: [],
    stick: null, keys: {},
    cam: { x: SPAWN.x, y: SPAWN.y },
    stats: { kills: 0, earned: 0, sold: 0, bosses: 0, gemsFound: 0 },
    offlineMsg: 0, offlineAmt: 0,
    shake: 0, saveCd: 5,
  };
}
function cap()     { return CAP0 + CAP_UP * S.up.cap; }
function speed()   { return SPEED0 * (1 + SPEED_UP * S.up.speed); }
function pDmg()    { return DMG0 * Math.pow(DMG_UP, S.up.dmg); }
function pRate()   { const z = zoneAt(S.player.x, S.player.y); return RATE0 * Math.pow(RATE_UP, S.up.rate) * (z && z.drums ? DRUM_MUL : 1); }
function pickR()   { return PICK_R * (1 + 0.3 * S.gemUp.magnet); }
function coinMul() { return (1 + 0.25 * S.gemUp.coin) * (1 + CROWN_BONUS * S.crowns); }
function entryVal(e) { return Math.ceil(helmVal(e.k) * (e.crown ? CROWN_MUL : e.bar ? BAR_MUL : 1) * coinMul()); }
// coin flow ramps up exponentially the longer you keep transacting at
// the same spot (vacuuming the pallet / pouring into a plate)
function touchFlow(key, dt) {
  if (S.flowKey === key) S.flowT += dt;
  else { S.flowKey = key; S.flowT = 0; }
  S.flowTouched = true;
}
function flowMul() { return Math.min(FLOW_CAP, Math.pow(FLOW_ACCEL, S.flowT || 0)); }
function zoneAt(x, y) { for (const z of S.zones) if (x >= z.x0 && x < z.x1 && y >= z.y0 && y < z.y1) return z; return null; }
function inCell(z, x, y, m) { m = m || 0; return x >= z.x0 - m && x < z.x1 + m && y >= z.y0 - m && y < z.y1 + m; }
function inWalkable(x, y) {
  if (x >= 0 && x < CELL_W && y >= 0 && y < CELL_H) return true; // hub
  return !!zoneAt(x, y);
}
function worldBounds() {
  let minX = 0, minY = 0, maxX = CELL_W, maxY = CELL_H;
  for (const z of S.zones) {
    if (z.x0 < minX) minX = z.x0; if (z.x1 > maxX) maxX = z.x1;
    if (z.y0 < minY) minY = z.y0; if (z.y1 > maxY) maxY = z.y1;
  }
  return { minX, minY, maxX, maxY };
}

// ---- save / load --------------------------------------------
const SAVE_KEY = 'ks_idle_save';
function save() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 3, wallet: S.wallet, pallet: S.pallet, gems: S.gems,
      up: S.up, gemUp: S.gemUp,
      zoneCount: S.zones.length,
      zs: S.zones.map(z => {
        const o = {};
        z.plates.forEach(pl => {
          if (pl.built || pl.lvl > 0 || pl.paid > 0) o[pl.id] = { l: pl.lvl, b: pl.built ? 1 : 0, p: pl.built ? 0 : pl.paid };
        });
        return o;
      }),
      forge: S.forge ? { queue: S.forge.queue, tray: S.forge.tray } : null,
      waygate: S.waygate,
      dog: S.dogPlate.built,
      camp: S.camp ? { logs: S.camp.logs } : null,
      crowns: S.crowns, prestiges: S.prestiges,
      ach: Object.keys(S.ach),
      stats: S.stats, deaths: S.player.deaths, last: Date.now(),
    }));
  } catch (e) {}
}
function idleRate() {
  let r = 0;
  for (const z of S.zones) {
    if (!z.porters.length || !z.towers.length) continue;
    const killsPerSec = Math.min(z.towers.length / TOWER_RATE * 0.5, 1 / 2.2);
    r += killsPerSec * helmVal(z.k) * 1.4 * coinMul() * Math.min(2, 1 + 0.3 * (z.porters.length - 1));
  }
  return r;
}
function load() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (e) {}
  if (!d || !(d.v >= 1)) return false;
  S.wallet = d.wallet || 0; S.pallet = d.pallet || 0; S.gems = d.gems || 0;
  Object.assign(S.up, d.up || {});
  Object.assign(S.gemUp, d.gemUp || {});
  Object.assign(S.stats, d.stats || {});
  S.player.deaths = d.deaths || 0;
  const n = Math.max(1, d.zoneCount || 1);
  S.zones = []; for (let k = 1; k <= n; k++) S.zones.push(mkZone(k));
  if (d.zs) { // v3
    d.zs.forEach((o, i) => {
      const z = S.zones[i]; if (!z) return;
      for (const id in o) {
        const pl = z.plates.find(q => q.id === id); if (!pl) continue;
        const st = o[id];
        if (pl.repeat) { for (let j = 0; j < (st.l || 0); j++) applyPlate(z, pl); pl.lvl = st.l || 0; pl.cost = Math.ceil(pl.base * Math.pow(pl.mul, pl.lvl)); }
        else if (st.b && id !== 'unlock') applyPlate(z, pl);
        if (st.b) pl.built = true;
        if (!pl.built) pl.paid = st.p || 0;
      }
    });
  } else { // v1/v2 migration: arrays of built plate ids
    (d.built || []).forEach((ids, i) => {
      const z = S.zones[i]; if (!z) return;
      for (const id of ids) {
        const pl = z.plates.find(q => q.id === id); if (!pl) continue;
        if (pl.repeat) { applyPlate(z, pl); pl.lvl = 1; pl.cost = Math.ceil(pl.base * pl.mul); }
        else if (id !== 'unlock') { applyPlate(z, pl); pl.built = true; }
        else pl.built = true;
      }
    });
  }
  if (d.forge) { S.forgePlate.built = true; S.forge = { queue: d.forge.queue || [], tray: d.forge.tray || [], smeltT: 0 }; }
  if (d.waygate) { S.wayPlate.built = true; S.waygate = true; }
  if (d.dog) { S.dogPlate.built = true; spawnDog(); }
  if (d.camp) { S.campPlate.built = true; S.camp = { logs: d.camp.logs || [], chopT: 0 }; }
  S.crowns = d.crowns || 0; S.prestiges = d.prestiges || 0;
  (d.ach || []).forEach(id => { S.ach[id] = true; });
  const away = Math.min(OFFLINE_CAP, Math.max(0, (Date.now() - (d.last || Date.now())) / 1000));
  const amt = Math.floor(idleRate() * away);
  if (amt > 0) { S.pallet += amt; S.offlineAmt = amt; S.offlineMsg = 6; }
  return true;
}

// ---- tiny synth sfx -----------------------------------------
let AC = null, muted = false;
try { muted = localStorage.getItem('ks_idle_muted') === '1'; } catch (e) {}
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  return AC;
}
let sfxGate = 0;
function sfx(kind, importance) {
  if (muted) return;
  if (!importance && S && S.t < sfxGate) return;
  const ac = audio(); if (!ac) return;
  if (!importance && S) sfxGate = S.t + 0.03;
  const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  const P = {
    shoot: [700, 300, 0.03, 0.05, 'square'],
    hit:   [200, 90, 0.05, 0.07, 'sawtooth'],
    kill:  [300, 90, 0.07, 0.14, 'sawtooth'],
    pick:  [880, 1320, 0.05, 0.07, 'square'],
    sell:  [1100, 1650, 0.05, 0.08, 'square'],
    coin:  [1400, 1870, 0.045, 0.07, 'triangle'],
    pour:  [500, 720, 0.04, 0.05, 'triangle'],
    built: [330, 990, 0.14, 0.4, 'triangle'],
    unlock:[220, 880, 0.16, 0.7, 'triangle'],
    hurt:  [140, 60, 0.10, 0.15, 'sawtooth'],
    die:   [200, 40, 0.18, 0.5, 'sawtooth'],
    zap:   [1600, 200, 0.07, 0.12, 'sawtooth'],
    boom:  [90, 35, 0.20, 0.4, 'sawtooth'],
    gem:   [1560, 2340, 0.10, 0.25, 'triangle'],
    smelt: [260, 520, 0.05, 0.09, 'triangle'],
    warp:  [300, 1200, 0.12, 0.3, 'sine'],
    boss:  [80, 55, 0.25, 0.8, 'square'],
  }[kind] || [440, 440, 0.04, 0.05, 'square'];
  o.type = P[4];
  o.frequency.setValueAtTime(P[0], t);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, P[1]), t + P[3]);
  g.gain.setValueAtTime(P[2], t);
  g.gain.exponentialRampToValueAtTime(0.001, t + P[3]);
  o.start(t); o.stop(t + P[3] + 0.02);
}
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ---- chiptune loop (scheduled a beat ahead of the clock) -----
const MELODY = [0, 3, 5, 7, 10, 7, 5, 3, 0, 3, 7, 12, 10, 7, 5, 3]; // A-minor pentatonic
const BASSLN = [-12, -12, -5, -7];
const M_STEP = 0.21;
let mNext = 0, mStep = 0;
function mNote(freq, at, dur, type, vol) {
  const ac = AC; if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, at);
  g.gain.setValueAtTime(vol, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  o.start(at); o.stop(at + dur + 0.02);
}
function musicTick() {
  if (muted || !AC || !S.started) return;
  const now = AC.currentTime;
  if (mNext < now - 1) mNext = now;   // resync after tab sleep / mute
  while (mNext < now + 0.55) {
    const i = mStep % 16, bar = Math.floor(mStep / 4) % 4;
    mNote(220 * Math.pow(2, MELODY[i] / 12), mNext, M_STEP * 0.95, 'square', 0.026);
    if (i % 4 === 0) mNote(110 * Math.pow(2, BASSLN[bar] / 12), mNext, M_STEP * 3.8, 'triangle', 0.05);
    if (i % 2 === 1) mNote(2200 + (i * 37) % 500, mNext, 0.03, 'square', 0.007);
    mNext += M_STEP; mStep++;
  }
}

// ---- helpers ------------------------------------------------
function fmt(n) {
  n = Math.floor(n);
  if (n < 1000) return '' + n;
  if (n < 1e6) return (n / 1000).toFixed(n < 1e4 ? 1 : 0) + 'k';
  if (n < 1e9) return (n / 1e6).toFixed(n < 1e7 ? 1 : 0) + 'M';
  return (n / 1e9).toFixed(1) + 'B';
}
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }
function float(x, y, txt, color, big) {
  S.floats.push({ x, y, txt: String(txt), color, t: 0, big });
  if (S.floats.length > 50) S.floats.shift();
}
function puff(x, y, color, n, up) {
  for (let i = 0; i < n; i++)
    S.parts.push({ x, y, vx: (rnd() - 0.5) * 200, vy: (rnd() - (up ? 0.85 : 0.5)) * 220, t: 0, dur: 0.45 + rnd() * 0.2, r: 2 + rnd() * 3, color, g: up ? 1 : 0 });
}

// ---- spawning / combat --------------------------------------
function spawnEnemy(z, opts) {
  opts = opts || {};
  const boss = !!opts.boss;
  const gold = !boss && rnd() < GOLD_CHANCE;
  const hp = Math.ceil(foeHp(z.k) * (boss ? 22 : gold ? 2 : 1));
  S.enemies.push({
    k: z.k,
    x: z.gate.x + (rnd() - 0.5) * 80, y: z.gate.y + (rnd() - 0.5) * 80,
    hp, max: hp,
    spd: (boss ? 26 : 42) * (0.92 + rnd() * 0.16),
    dmg: foeDmg(z.k) * (boss ? 3.5 : 1),
    tx: z.pen.x0 + rnd() * (z.pen.x1 - z.pen.x0), ty: z.pen.y0 + rnd() * (z.pen.y1 - z.pen.y0),
    wanderT: 1 + rnd() * 2, atkCd: 0, hurt: 0, sway: rnd() * 6.28,
    r: boss ? 34 : (15 + Math.min(9, z.k)), boss, gold,
  });
  if (boss) { float(z.gate.x, z.gate.y - 60, '💀 ' + foeName(z.k).toUpperCase() + ' KING!', '#ff6a5a', true); sfx('boss', true); S.shake = 12; }
}
function summonBoss(z) {
  if (!z.altar || z.altar.cd > 0) return false;
  z.altar.cd = BOSS_CD;
  spawnEnemy(z, { boss: true });
  return true;
}
function dropItem(x, y, spec) {
  S.items.push(Object.assign({ x: x + (rnd() - 0.5) * 46, y: y + (rnd() - 0.5) * 36, t: 0, vy: -60 - rnd() * 60, vx: (rnd() - 0.5) * 80 }, spec));
}
function dropHelmet(x, y, k) { dropItem(x, y, { k }); }
function hurtEnemy(e, dmg) {
  if (e.hp <= 0) return;
  e.hp -= dmg; e.hurt = 0.1;
  float(e.x, e.y - e.r - 12, Math.ceil(dmg), '#fff');
  if (e.hp <= 0) {
    S.stats.kills++;
    if (e.boss) {
      S.stats.bosses++;
      dropItem(e.x, e.y, { k: e.k, crown: true });
      dropItem(e.x, e.y, { gem: true }); dropItem(e.x, e.y, { gem: true });
      for (let i = 0; i < 6; i++) dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 40, '👑 CROWN!', '#ffd94a', true);
      S.shake = 14; sfx('boom', true); buzz([50, 30, 80]);
    } else if (e.gold) {
      dropItem(e.x, e.y, { gem: true });
      dropHelmet(e.x, e.y, e.k); dropHelmet(e.x, e.y, e.k);
      float(e.x, e.y - 30, '💎', '#6ee0d8', true);
      sfx('gem', true);
    } else {
      const drops = 1 + (rnd() < 0.55 ? 1 : 0);
      for (let i = 0; i < drops; i++) dropHelmet(e.x, e.y, e.k);
      sfx('kill');
    }
    puff(e.x, e.y, e.gold ? '#ffd94a' : foeCol(e.k), e.boss ? 26 : 10, true);
  } else sfx('hit');
}
function hurtPlayer(d) {
  const p = S.player;
  if (p.invuln > 0) return;
  p.hp -= d; p.hurtT = 0.15; p.invuln = 0.5; S.shake = Math.max(S.shake, 5);
  sfx('hurt', true); buzz(30);
  if (p.hp <= 0) playerDie();
}
function playerDie() {
  const p = S.player;
  p.deaths++;
  for (const e of p.helmets) dropItem(p.x, p.y, { k: e.k, crown: !!e.crown, bar: !!e.bar, log: !!e.log });
  p.helmets = [];
  p.hp = p.maxHp; p.invuln = 2.5;
  p.x = SPAWN.x; p.y = SPAWN.y;
  float(SPAWN.x, SPAWN.y - 60, 'YOU DROPPED EVERYTHING!', '#ff6a5a', true);
  S.shake = 14; sfx('die', true); buzz([60, 40, 60]);
}

// ---- building -----------------------------------------------
function applyPlate(z, pl) {
  if (pl.id === 'tower1' || pl.id === 'tower2') z.towers.push({ type: 'archer', x: pl.x, y: pl.y, k: z.k, cd: rnd() * 0.5 });
  else if (pl.id === 'wizard')     z.towers.push({ type: 'wizard', x: pl.x, y: pl.y, k: z.k, cd: rnd() * 0.5 });
  else if (pl.id === 'catapult')   z.towers.push({ type: 'catapult', x: pl.x, y: pl.y, k: z.k, cd: 1 + rnd() });
  else if (pl.id === 'drums')      z.drums = true;
  else if (pl.id === 'altar')      z.altar = { x: pl.x, y: pl.y, cd: 0 };
  else if (pl.id === 'porter' || pl.id === 'porterPlus')
    z.porters.push({ x: pl.x, y: pl.y, hx: pl.x, hy: pl.y, k: z.k, state: 'seek', carry: [], cd: 0 });
  else if (pl.id === 'gate2')      z.hordeLvl++;
  else if (pl.id === 'towersUp')   z.towerLvl++;
  else if (pl.id === 'unlock')     S.zones.push(mkZone(z.k + 1));
}
function buildPlate(z, pl, silent) {
  applyPlate(z, pl);
  if (pl.repeat) {
    pl.lvl++; pl.paid = 0;
    pl.cost = Math.ceil(pl.base * Math.pow(pl.mul, pl.lvl));
    if (pl.lvl >= pl.maxLvl) pl.built = true;
    if (!silent) { float(pl.x, pl.y - 50, pl.name + ' LV' + pl.lvl + '!', '#6ecb5a', true); sfx('built', true); buzz(40); puff(pl.x, pl.y, '#ffd94a', 12, true); }
    return;
  }
  pl.built = true;
  if (pl.id === 'unlock') {
    if (!silent) {
      const nz = S.zones[S.zones.length - 1];
      float(pl.x, pl.y - 60, '🌍 NEW LAND ' + DIR_NAME[nz.dir] + '!', '#ffd94a', true);
      sfx('unlock', true); buzz([40, 30, 80]);
    }
    return;
  }
  if (!silent) { float(pl.x, pl.y - 50, pl.name + ' BUILT!', '#6ecb5a', true); sfx('built', true); buzz(50); puff(pl.x, pl.y, '#ffd94a', 16, true); }
}
function pourInto(pl, z, dt) {
  if (pl.built || S.wallet <= 0) return;
  touchFlow(pl, dt);
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), pl.cost - pl.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; pl.paid += chunk;
  sfx('pour');
  if (pl.paid >= pl.cost) buildPlate(z, pl, false);
}
function pourHub(plate, dt, done) {
  if (plate.built || S.wallet <= 0) return;
  touchFlow(plate, dt);
  const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), plate.cost - plate.paid);
  if (chunk <= 0) return;
  S.wallet -= chunk; plate.paid += chunk; sfx('pour');
  if (plate.paid >= plate.cost) { plate.built = true; done(); sfx('built', true); buzz(50); }
}

// ---- war dog ------------------------------------------------
function spawnDog() {
  S.dog = { x: KENNEL.x, y: KENNEL.y - 30, state: 'follow', carry: null, tail: 0 };
}
function dogTick(dt) {
  const d = S.dog, p = S.player;
  if (!d) return;
  d.tail += dt;
  if (d.state === 'follow') {
    // trot behind the player, sniff out nearby drops if there's room on the stack
    if (p.helmets.length < cap()) {
      let it = null, bd = DOG_FETCH_R * DOG_FETCH_R;
      for (const i2 of S.items) {
        if (i2.dead || i2.gem || i2.t < 0.25) continue;
        const q = dist2(i2.x, i2.y, p.x, p.y); if (q < bd) { bd = q; it = i2; }
      }
      if (it) { d.state = 'fetch'; d.item = it; }
    }
    const hx = p.x - p.face * 30, hy = p.y + 12;
    const dl = Math.hypot(hx - d.x, hy - d.y);
    if (dl > 16) { d.x += (hx - d.x) / dl * Math.min(DOG_SPD, dl * 6) * dt; d.y += (hy - d.y) / dl * Math.min(DOG_SPD, dl * 6) * dt; }
  } else if (d.state === 'fetch') {
    const it = d.item;
    if (!it || it.dead) { d.state = 'follow'; d.item = null; }
    else {
      const dl = Math.hypot(it.x - d.x, it.y - d.y) || 1;
      d.x += (it.x - d.x) / dl * DOG_SPD * dt; d.y += (it.y - d.y) / dl * DOG_SPD * dt;
      if (dl < 20) { it.dead = true; d.carry = { k: it.k, bar: !!it.bar, crown: !!it.crown }; d.item = null; d.state = 'return'; }
    }
  } else { // return to the player
    const dl = Math.hypot(p.x - d.x, p.y - d.y) || 1;
    d.x += (p.x - d.x) / dl * DOG_SPD * dt; d.y += (p.y - d.y) / dl * DOG_SPD * dt;
    if (dl < 30) {
      if (p.helmets.length < cap()) { p.helmets.push(d.carry); sfx('pick'); }
      else dropItem(p.x, p.y, d.carry.crown ? { k: d.carry.k, crown: true } : d.carry.bar ? { k: d.carry.k, bar: true } : { k: d.carry.k });
      d.carry = null; d.state = 'follow';
    }
  }
}

// ---- prestige: found a New Kingdom --------------------------
function crownsToGain() { return Math.max(1, S.zones.length - (PRESTIGE_MIN - 1)); }
function prestige() {
  const gain = crownsToGain();
  S.crowns += gain; S.prestiges++;
  // burn the old kingdom; keep gems, shrines, crowns, achievements, stats
  S.wallet = 0; S.pallet = 0;
  S.up = { speed: 0, cap: 0, dmg: 0, rate: 0 };
  S.upPaid = { speed: 0, cap: 0, dmg: 0, rate: 0 };
  S.forge = null; S.forgePlate = { cost: 260, paid: 0, built: false };
  S.waygate = false; S.wayPlate = { cost: 400, paid: 0, built: false };
  S.dog = null; S.dogPlate = { cost: 500, paid: 0, built: false };
  S.zones = [mkZone(1)];
  S.enemies = []; S.items = []; S.shots = [];
  const p = S.player;
  p.helmets = []; p.hp = p.maxHp; p.x = SPAWN.x; p.y = SPAWN.y; p.invuln = 2;
  S.cam.x = p.x; S.cam.y = p.y;
  float(SPAWN.x, SPAWN.y - 80, '👑 NEW KINGDOM!  +' + gain + ' crown' + (gain > 1 ? 's' : ''), '#ffd94a', true);
  float(SPAWN.x, SPAWN.y - 50, 'All coins now worth +' + Math.round(CROWN_BONUS * 100 * S.crowns) + '%', '#ffd94a', true);
  S.shake = 16; sfx('unlock', true); buzz([80, 40, 120]);
  save();
}

// ---- main update --------------------------------------------
function tick(dt) {
  if (!S.started) return;
  S.t += dt;
  S.flowTouched = false;
  if (S.shake > 0) S.shake = Math.max(0, S.shake - dt * 40);
  if (S.offlineMsg > 0) S.offlineMsg -= dt;
  const p = S.player;
  p.invuln = Math.max(0, p.invuln - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  if (p.hp < p.maxHp && p.invuln <= 0) p.hp = Math.min(p.maxHp, p.hp + 5 * dt);

  // -- movement (joystick + keys), constrained to unlocked lands
  let mx = 0, my = 0;
  if (S.stick) { mx = S.stick.dx; my = S.stick.dy; }
  if (S.keys.a || S.keys.ArrowLeft) mx -= 1;
  if (S.keys.d || S.keys.ArrowRight) mx += 1;
  if (S.keys.w || S.keys.ArrowUp) my -= 1;
  if (S.keys.s || S.keys.ArrowDown) my += 1;
  const ml = Math.hypot(mx, my);
  if (ml > 0.1) {
    mx /= Math.max(1, ml); my /= Math.max(1, ml);
    const slow = 1 - Math.min(0.35, p.helmets.length / cap() * 0.35);
    const nx = p.x + mx * speed() * slow * dt;
    const ny = p.y + my * speed() * slow * dt;
    if (inWalkable(nx, ny)) { p.x = nx; p.y = ny; }
    else if (inWalkable(nx, p.y)) p.x = nx;
    else if (inWalkable(p.x, ny)) p.y = ny;
    p.moving = 1; if (Math.abs(mx) > 0.15) p.face = mx > 0 ? 1 : -1;
    p.dustT += dt;
    if (p.dustT > 0.18) {
      p.dustT = 0;
      S.parts.push({ x: p.x - mx * 10, y: p.y + 14, vx: -mx * 30, vy: -10, t: 0, dur: 0.4, r: 3, color: 'rgba(180,170,150,0.5)' });
    }
  } else p.moving = 0;

  // -- waygate pads
  if (S.waygate) {
    const pads = warpPads();
    let onPad = null;
    for (const pad of pads) if (dist2(p.x, p.y, pad.x, pad.y) < pad.r * pad.r) onPad = pad;
    if (onPad && !p.moving) {
      p.warpT += dt;
      if (p.warpT >= WARP_T) {
        p.warpT = 0;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        p.x = onPad.to.x; p.y = onPad.to.y;
        S.cam.x = p.x; S.cam.y = p.y;
        puff(p.x, p.y, '#6ec9e0', 14, true);
        sfx('warp', true); buzz(20);
      }
    } else p.warpT = 0;
  }

  // -- auto-fire (with crits)
  p.fireCd -= dt;
  if (p.fireCd <= 0) {
    let tgt = null, bd = FIRE_RANGE * FIRE_RANGE;
    for (const e of S.enemies) { const d = dist2(e.x, e.y, p.x, p.y); if (e.hp > 0 && d < bd) { bd = d; tgt = e; } }
    if (tgt) {
      p.fireCd = pRate();
      const crit = rnd() < 0.10 * S.gemUp.crit;
      S.shots.push({ x: p.x, y: p.y - 26, tgt, dmg: pDmg() * (crit ? 3 : 1), spd: 460, crit });
      p.face = tgt.x > p.x ? 1 : -1;
      sfx('shoot');
    }
  }

  // -- item pickup
  const pr = pickR();
  for (const it of S.items) {
    if (it.dead || it.t < 0.25) continue;
    if (dist2(it.x, it.y, p.x, p.y) >= pr * pr) continue;
    if (it.gem) {
      it.dead = true; S.gems++; S.stats.gemsFound++;
      float(p.x, p.y - 50, '💎 +1', '#6ee0d8', true); sfx('gem', true);
    } else if (p.helmets.length < cap()) {
      it.dead = true;
      p.helmets.push({ k: it.k, bar: !!it.bar, crown: !!it.crown, log: !!it.log });
      sfx('pick');
      if (p.helmets.length >= cap()) float(p.x, p.y - 60, 'FULL! Go sell →', '#ffd94a', true);
    }
  }

  // -- sell stand
  if (p.helmets.length && dist2(p.x, p.y, SELL.x, SELL.y) < SELL.r * SELL.r) {
    p.sellAcc = (p.sellAcc || 0) + dt * SELL_RATE;
    while (p.sellAcc >= 1 && p.helmets.length) {
      p.sellAcc -= 1;
      const e = p.helmets.pop();
      const v = entryVal(e);
      S.pallet += v; S.stats.sold++; S.stats.earned += v;
      float(SELL.x + 30, SELL.y - 46, '+' + fmt(v), e.crown ? '#ffd94a' : e.bar ? '#e8b93a' : '#ffd94a', e.crown);
      puff(PALLET.x, PALLET.y - 30, '#ffd94a', 3, true);
      sfx('sell');
    }
  } else p.sellAcc = 0;

  // -- forge chain
  if (S.forge) {
    const f = S.forge;
    if (dist2(p.x, p.y, FORGE.x, FORGE.y) < FORGE.r * FORGE.r && f.queue.length < FORGE_Q) {
      p.forgeAcc = (p.forgeAcc || 0) + dt * SELL_RATE;
      while (p.forgeAcc >= 1 && f.queue.length < FORGE_Q) {
        p.forgeAcc -= 1;
        let idx = -1;
        for (let i = p.helmets.length - 1; i >= 0; i--) if (!p.helmets[i].bar && !p.helmets[i].crown) { idx = i; break; }
        if (idx < 0) break;
        f.queue.push(p.helmets.splice(idx, 1)[0].k);
        sfx('smelt');
      }
    } else p.forgeAcc = 0;
    if (f.queue.length && f.tray.length < TRAY_MAX) {
      f.smeltT += dt;
      if (f.smeltT >= FORGE_T) {
        f.smeltT = 0;
        f.tray.push(f.queue.shift());
        puff(TRAY.x, TRAY.y - 10, '#e8b93a', 5, true);
        sfx('smelt');
      }
    } else f.smeltT = 0;
    if (f.tray.length && p.helmets.length < cap() && dist2(p.x, p.y, TRAY.x, TRAY.y) < TRAY.r * TRAY.r) {
      p.trayAcc = (p.trayAcc || 0) + dt * SELL_RATE;
      while (p.trayAcc >= 1 && f.tray.length && p.helmets.length < cap()) {
        p.trayAcc -= 1;
        p.helmets.push({ k: f.tray.pop(), bar: true });
        sfx('pick');
      }
    } else p.trayAcc = 0;
  }

  // -- vacuum coins from pallet (flow ramps up the longer you stand)
  if (S.pallet > 0 && dist2(p.x, p.y, PALLET.x, PALLET.y) < PALLET.r * PALLET.r) {
    touchFlow('pallet', dt);
    const take = Math.min(S.pallet, Math.max(1, Math.ceil(VAC_RATE * flowMul() * dt)));
    S.pallet -= take; S.wallet += take;
    if ((S.coinFxT = (S.coinFxT || 0) + dt) > 0.09) {
      S.coinFxT = 0; float(p.x, p.y - 46, '+' + fmt(take), '#ffd94a'); sfx('coin');
      S.parts.push({ x: PALLET.x + (rnd() - 0.5) * 60, y: PALLET.y - 10, vx: (p.x - PALLET.x) * 2, vy: (p.y - 40 - PALLET.y) * 2, t: 0, dur: 0.5, r: 4, color: '#ffd94a' });
    }
  }

  // -- coin upgrade plates (hub)
  let ux = UPG_X0;
  for (const key in UPG) {
    const cost = upgCost(key, S.up[key]);
    if (dist2(p.x, p.y, ux, UPG_Y) < 52 * 52 && S.wallet > 0 && S.upPaid[key] < cost) {
      touchFlow('upg:' + key, dt);
      const chunk = Math.min(S.wallet, Math.ceil(BUILD_RATE * flowMul() * dt), cost - S.upPaid[key]);
      S.wallet -= chunk; S.upPaid[key] += chunk; sfx('pour');
      if (S.upPaid[key] >= cost) {
        S.up[key]++; S.upPaid[key] = 0;
        float(ux, UPG_Y - 50, UPG[key].name + ' LV' + (S.up[key] + 1) + '!', '#6ecb5a', true);
        sfx('built', true); buzz(40);
      }
    }
    ux += UPG_STEP;
  }

  // -- gem shrine plates (hub, paid in gems)
  let gy = GEM_Y0;
  for (const key in GEMU) {
    const cost = gemUpCost(key, S.gemUp[key]);
    if (dist2(p.x, p.y, GEM_X, gy) < 46 * 46 && S.gems > 0 && S.gemPaid[key] < cost) {
      S.gemAcc = (S.gemAcc || 0) + dt * 3;
      while (S.gemAcc >= 1 && S.gems > 0 && S.gemPaid[key] < cost) {
        S.gemAcc -= 1; S.gems--; S.gemPaid[key]++;
        sfx('gem');
        if (S.gemPaid[key] >= cost) {
          S.gemUp[key]++; S.gemPaid[key] = 0;
          float(GEM_X, gy - 60, GEMU[key].name + ' LV' + S.gemUp[key] + '!', '#6ee0d8', true);
          sfx('built', true); buzz(40);
        }
      }
    }
    gy += GEM_STEP;
  }

  // -- hub build plates: forge + waygate + kennel
  if (!S.forgePlate.built && dist2(p.x, p.y, FORGE.x, FORGE.y) < 56 * 56)
    pourHub(S.forgePlate, dt, () => { S.forge = { queue: [], tray: [], smeltT: 0 }; float(FORGE.x, FORGE.y - 50, 'FORGE BUILT! Helmets → gold bars (x' + BAR_MUL + ')', '#6ecb5a', true); });
  if (!S.wayPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, HUBPAD.x, HUBPAD.y) < 56 * 56)
    pourHub(S.wayPlate, dt, () => { S.waygate = true; float(HUBPAD.x, HUBPAD.y - 50, 'WAYGATE OPEN! Stand still on it to warp', '#6ec9e0', true); });
  if (!S.dogPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, KENNEL.x, KENNEL.y) < 56 * 56)
    pourHub(S.dogPlate, dt, () => { spawnDog(); float(KENNEL.x, KENNEL.y - 50, '🐕 WAR DOG! He fetches drops for you', '#6ecb5a', true); });
  if (!S.campPlate.built && S.zones.length >= 2 && dist2(p.x, p.y, CAMP.x, CAMP.y) < 56 * 56)
    pourHub(S.campPlate, dt, () => { S.camp = { logs: [], chopT: 0 }; float(CAMP.x, CAMP.y - 50, '🪵 LUMBER CAMP! Logs pile up on their own', '#6ecb5a', true); });

  // -- lumber camp: woodcutter chops, logs pile, player hauls them
  if (S.camp) {
    if (S.camp.logs.length < CAMP_MAX) {
      S.camp.chopT += dt;
      if (S.camp.chopT >= CHOP_T) {
        S.camp.chopT = 0;
        S.camp.logs.push(S.zones.length); // log value tracks your frontier

function guideTarget() {
  const p = S.player;
  if (p.helmets.length >= cap()) return { x: SELL.x, y: SELL.y, label: 'SELL' };
  // only interrupt for the pallet when it holds real money relative to the wallet
  if (S.pallet >= Math.max(60, S.wallet * 0.5)) return { x: PALLET.x, y: PALLET.y, label: 'COINS' };
  let gy = GEM_Y0;
  for (const key in GEMU) {
    if (S.gems >= gemUpCost(key, S.gemUp[key]) - S.gemPaid[key]) return { x: GEM_X, y: gy, label: '💎 ' + GEMU[key].name };
    gy += GEM_STEP;
  }
  // progression ladder on the frontier land: get the tower up, hire the
  // porter, then push to NEW LANDS. Everything else is discretionary —
  // the arrow always shows the road forward, even while you save up.
  const fz = S.zones[S.zones.length - 1];
  for (const id of ['tower1', 'porter', 'unlock']) {
    const pl = fz.plates.find(q => q.id === id);
    if (pl && !pl.built) return { x: pl.x, y: pl.y, label: pl.name };
  }
  return { x: (fz.x0 + fz.x1) / 2, y: (fz.y0 + fz.y1) / 2, label: 'FIGHT' };
}

    for (let fx = z.pen.x0 - 20; fx <= z.pen.x1 + 20; fx += step) {
      const gapTop = z.dir === 1 && Math.abs(fx - gapC) < 90; // south zone: gap on north fence

      if (!gapTop) ctx.fillRect(fx - 4, z.pen.y0 - 30, 8, 18);

      if (!gapR) ctx.fillRect(z.pen.x1 + 12, fy - 4, 18, 8);
      if (!gapL) ctx.fillRect(z.pen.x0 - 30, fy - 4, 18, 8);

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center';

  ctx.fillStyle = '#584330'; rr(tw.x - 28, tw.y - 44, 56, 18, 5); ctx.fill();

  ctx.fillStyle = '#e8c49a'; ctx.beginPath(); ctx.arc(tw.x, tw.y - 70, 5.5, 0, 6.29); ctx.fill();
