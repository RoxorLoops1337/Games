<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>'90s Cars — 20 low-poly 3D models</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #14141c;
    color: #e8e8f0;
    font-family: monospace;
  }
  header {
    text-align: center;
    padding: 26px 12px 6px;
  }
  h1 { margin: 0; letter-spacing: 3px; font-size: 26px; }
  header p { color: #9aa; margin: 8px 0 0; font-size: 13px; }
  #garage {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 18px;
    max-width: 1340px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }
  .card {
    background: #1d1d29;
    border: 1px solid #33334a;
    border-radius: 10px;
    padding: 12px 12px 10px;
    box-sizing: border-box;
  }
  .card h2 { margin: 0 0 2px; font-size: 15px; letter-spacing: 1px; }
  .card .sub { color: #8a8aa8; font-size: 11px; margin: 0 0 8px; }
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0 0 8px;
    font-size: 11px;
  }
  .badge {
    background: #2a2a3e;
    border: 1px solid #44446a;
    border-radius: 4px;
    padding: 2px 7px;
    color: #b8b8d8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .price { color: #8fdf9f; }
  canvas {
    display: block;
    width: 100%;
    height: 185px;
    background: linear-gradient(#232336 0%, #1a1a26 70%, #15151f 100%);
    border-radius: 6px;
    cursor: grab;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }
  .dl {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    font-size: 11px;
  }
  .dl a {
    color: #7fd7ff;
    text-decoration: none;
    border: 1px solid #3a5a70;
    border-radius: 4px;
    padding: 4px 9px;
  }
  .dl a:hover { background: rgba(127,215,255,0.12); }
  footer { text-align: center; padding: 0 12px 30px; }
  footer a { color: #7fd7ff; font-size: 12px; }
  footer p { color: #667; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>'90S CARS</h1>
  <p>20 low-poly 3D models based on real '90s legends — built procedurally, no libraries.<br>
     Drag to spin · every model downloads as .obj/.mtl · data lives in <b>cars.js</b>.</p>
</header>
<div id="garage"></div>
<footer>
  <p>All geometry is original. Names are fictional; each card notes the real car the model is based on.</p>
  <a href="/">← back to the arcade</a>
</footer>

<script src="cars.js"></script>
<script>
'use strict';

/* ---------- software renderer: painter's algorithm, flat shading ---------- */

function hexRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}

function shade(hex, k) {
  const [r, g, b] = hexRgb(hex);
  return `rgb(${Math.min(255, r * k) | 0},${Math.min(255, g * k) | 0},${Math.min(255, b * k) | 0})`;
}

const viewers = [];

function makeViewer(canvas, mesh) {
  const ctx = canvas.getContext('2d');
  const st = {
    canvas, ctx, mesh,
    yaw: 0.7 + viewers.length * 0.45, pitch: 0.42,
    auto: true, dragging: false, px: 0, py: 0, visible: true,
  };

  canvas.addEventListener('pointerdown', (e) => {
    st.dragging = true; st.auto = false;
    st.px = e.clientX; st.py = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!st.dragging) return;
    st.yaw += (e.clientX - st.px) * 0.012;
    st.pitch = Math.max(0.05, Math.min(1.1, st.pitch + (e.clientY - st.py) * 0.008));
    st.px = e.clientX; st.py = e.clientY;
  });
  const stop = () => { st.dragging = false; setTimeout(() => { if (!st.dragging) st.auto = true; }, 2200); };
  canvas.addEventListener('pointerup', stop);
  canvas.addEventListener('pointercancel', stop);

  viewers.push(st);
  return st;
}

function drawViewer(st) {
  const { canvas, ctx, mesh } = st;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  if (!W || !H) return;
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const cy = Math.cos(st.yaw), sy = Math.sin(st.yaw);
  const cp = Math.cos(st.pitch), sp = Math.sin(st.pitch);
  const DIST = 8.6, F = Math.min(W * 0.82, H * 1.35) * 1.55;
  const midY = 0.75;

  const tv = mesh.verts.map(([x, y, z]) => {
    const x1 = x * cy + z * sy;
    const z1 = -x * sy + z * cy;
    const y1 = y - midY;
    const y2 = y1 * cp + z1 * sp;
    const z2 = z1 * cp - y1 * sp + DIST;
    return [x1, y2, z2];
  });
  const proj = tv.map(([x, y, z]) => [W / 2 + (F * x) / z, H * 0.52 - (F * y) / z]);

  // ground shadow
  ctx.save();
  ctx.translate(W / 2, H * 0.52 + F * (midY * cp) / DIST);
  ctx.scale(1, Math.max(0.18, sp * 0.9));
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 0, F * 2.5 / DIST, F * 1.15 / DIST, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const L = [0.45, 0.72, -0.53];
  const order = mesh.faces.map((f, i) => {
    let z = 0;
    for (const vi of f.idx) z += tv[vi][2];
    return [z / f.idx.length, i];
  }).sort((a, b) => b[0] - a[0]);

  for (const [, fi] of order) {
    const f = mesh.faces[fi];
    const a = tv[f.idx[0]], b = tv[f.idx[1]], c = tv[f.idx[2]];
    const u = [b[0] - a[0], b[1] - a[1], b[2] - a[2]];
    const v = [c[0] - a[0], c[1] - a[1], c[2] - a[2]];
    const nx = u[1] * v[2] - u[2] * v[1];
    const ny = u[2] * v[0] - u[0] * v[2];
    const nz = u[0] * v[1] - u[1] * v[0];
    const nl = Math.hypot(nx, ny, nz) || 1;
    const d = Math.abs((nx * L[0] + ny * L[1] + nz * L[2]) / nl);
    const col = shade(f.color, 0.52 + 0.55 * d);
    ctx.fillStyle = col;
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(proj[f.idx[0]][0], proj[f.idx[0]][1]);
    for (let k = 1; k < f.idx.length; k++) ctx.lineTo(proj[f.idx[k]][0], proj[f.idx[k]][1]);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

/* ---------- page assembly ---------- */

const CATEGORY_ORDER = ['supercar', 'sports', 'roadster', 'rally', 'coupe', 'sedan', 'wagon', 'hatch', 'suv', 'van'];
const cars = window.NINETIES_CARS.cars.slice().sort((a, b) => {
  const c = CATEGORY_ORDER.indexOf(a.category) - CATEGORY_ORDER.indexOf(b.category);
  return c !== 0 ? c : b.price - a.price;
});

const fmt = (n) => '$' + n.toLocaleString('en-US');
const garage = document.getElementById('garage');
const io = 'IntersectionObserver' in window
  ? new IntersectionObserver((entries) => {
      for (const e of entries) {
        const st = viewers.find((v) => v.canvas === e.target);
        if (st) st.visible = e.isIntersecting;
      }
    })
  : null;

for (const car of cars) {
  const mesh = car.build();
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>${car.name}</h2>
    <p class="sub">based on the ${car.year} ${car.basis} · ${mesh.faces.length} faces</p>
    <div class="meta"><span class="badge">${car.category}</span><span class="price">${fmt(car.price)}</span></div>
    <canvas></canvas>
    <div class="dl">
      <a href="#" data-kind="obj">⬇ ${car.id}.obj</a>
      <a href="#" data-kind="mtl">⬇ ${car.id}.mtl</a>
    </div>`;
  garage.appendChild(card);
  const canvas = card.querySelector('canvas');
  makeViewer(canvas, mesh);
  if (io) io.observe(canvas);
  card.querySelectorAll('.dl a').forEach((a) => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const files = window.NINETIES_CARS.toObj(mesh, car.id);
      const el = document.createElement('a');
      el.href = URL.createObjectURL(new Blob([files[a.dataset.kind]], { type: 'text/plain' }));
      el.download = `${car.id}.${a.dataset.kind}`;
      el.click();
      setTimeout(() => URL.revokeObjectURL(el.href), 5000);
    });
  });
}

function tick() {
  for (const st of viewers) {
    if (!st.visible) continue;
    if (st.auto) st.yaw += 0.008;
    drawViewer(st);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
