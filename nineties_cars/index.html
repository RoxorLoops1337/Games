<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>'90s Cars — low-poly 3D models</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #14141c;
    color: #e8e8f0;
    font-family: monospace;
  }
  header {
    text-align: center;
    padding: 26px 12px 6px;
  }
  h1 { margin: 0; letter-spacing: 3px; font-size: 26px; }
  header p { color: #9aa; margin: 8px 0 0; font-size: 13px; }
  #garage {
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    justify-content: center;
    padding: 24px 16px 40px;
  }
  .card {
    background: #1d1d29;
    border: 1px solid #33334a;
    border-radius: 10px;
    padding: 14px 14px 12px;
    width: 380px;
    max-width: 94vw;
    box-sizing: border-box;
  }
  .card h2 { margin: 0 0 2px; font-size: 17px; letter-spacing: 1px; }
  .card .sub { color: #8a8aa8; font-size: 12px; margin: 0 0 10px; }
  canvas {
    display: block;
    width: 100%;
    height: 240px;
    background: linear-gradient(#232336 0%, #1a1a26 70%, #15151f 100%);
    border-radius: 6px;
    cursor: grab;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }
  .dl {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
  }
  .dl a {
    color: #7fd7ff;
    text-decoration: none;
    border: 1px solid #3a5a70;
    border-radius: 4px;
    padding: 5px 10px;
  }
  .dl a:hover { background: rgba(127,215,255,0.12); }
  .hint { color: #667; font-size: 11px; margin-top: 8px; }
  footer { text-align: center; padding: 0 12px 30px; }
  footer a { color: #7fd7ff; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>'90S CARS</h1>
  <p>Three low-poly 3D models — built procedurally, no libraries. Drag to spin, or grab the .obj files.</p>
</header>
<div id="garage"></div>
<footer><a href="/">← back to the arcade</a></footer>

<script>
'use strict';

/* ============================================================
   Mesh building
   Coordinates: x = length (+x is the nose), y = up, z = width.
   Units are roughly meters; the viewer scales to fit.
   ============================================================ */

function newMesh() { return { verts: [], faces: [] }; }

function addVert(m, x, y, z) { m.verts.push([x, y, z]); return m.verts.length - 1; }

function addFace(m, idx, color) { m.faces.push({ idx, color }); }

// Axis-aligned box between two corners.
function addBox(m, x0, x1, y0, y1, z0, z1, color) {
  const v = [
    addVert(m, x0, y0, z0), addVert(m, x1, y0, z0),
    addVert(m, x1, y1, z0), addVert(m, x0, y1, z0),
    addVert(m, x0, y0, z1), addVert(m, x1, y0, z1),
    addVert(m, x1, y1, z1), addVert(m, x0, y1, z1),
  ];
  addFace(m, [v[0], v[1], v[2], v[3]], color); // z0 side
  addFace(m, [v[5], v[4], v[7], v[6]], color); // z1 side
  addFace(m, [v[4], v[0], v[3], v[7]], color); // rear (x0)
  addFace(m, [v[1], v[5], v[6], v[2]], color); // front (x1)
  addFace(m, [v[3], v[2], v[6], v[7]], color); // top
  addFace(m, [v[4], v[5], v[1], v[0]], color); // bottom
}

/*
  Body loft. Each slice is a 6-point cross-section at position x:
    { x, yb, ym, yt, wb, wm, wt, sw, tw }
  yb/ym/yt = heights of sill, beltline, roofline.
  wb/wm/wt = half-widths at those heights (wm > wb,wt gives tumblehome).
  sw = the segment starting at this slice gets glass on the upper sides.
  tw = the segment starting at this slice gets glass on top (screens).
*/
function loftBody(m, slices, C) {
  const ring = (s) => [
    [ s.wb, s.yb], [ s.wm, s.ym], [ s.wt, s.yt],
    [-s.wt, s.yt], [-s.wm, s.ym], [-s.wb, s.yb],
  ];
  const ids = slices.map((s) => ring(s).map(([z, y]) => addVert(m, s.x, y, z)));
  for (let i = 0; i < slices.length - 1; i++) {
    const a = ids[i], b = ids[i + 1], s = slices[i];
    const bandColor = [
      s.sw ? C.glass : C.body,  // right upper (band 1-2)
      s.tw ? C.glass : C.body,  // top (band 2-3)
      s.sw ? C.glass : C.body,  // left upper (band 3-4)
    ];
    addFace(m, [a[0], b[0], b[1], a[1]], C.body);        // right lower
    addFace(m, [a[1], b[1], b[2], a[2]], bandColor[0]);  // right upper
    addFace(m, [a[2], b[2], b[3], a[3]], bandColor[1]);  // top
    addFace(m, [a[3], b[3], b[4], a[4]], bandColor[2]);  // left upper
    addFace(m, [a[4], b[4], b[5], a[5]], C.body);        // left lower
    addFace(m, [a[5], b[5], b[0], a[0]], C.under);       // bottom
  }
  addFace(m, ids[0].slice().reverse(), C.body);          // tail panel
  addFace(m, ids[ids.length - 1], C.body);               // nose panel
}

// 12-sided wheel; axis along z. side=+1 right, -1 left.
function addWheel(m, cx, cy, cz, r, w, side) {
  const N = 12, out = cz + side * w / 2, inn = cz - side * w / 2;
  const TIRE = '#181820', CAP = '#20202b', HUB = '#b9b9c4';
  const ringO = [], ringI = [];
  for (let k = 0; k < N; k++) {
    const a = (k / N) * Math.PI * 2;
    const y = cy + Math.sin(a) * r, x = cx + Math.cos(a) * r;
    ringO.push(addVert(m, x, y, out));
    ringI.push(addVert(m, x, y, inn));
  }
  for (let k = 0; k < N; k++) {
    const k2 = (k + 1) % N;
    addFace(m, [ringO[k], ringO[k2], ringI[k2], ringI[k]], TIRE);
  }
  addFace(m, ringO.slice(), CAP);
  addFace(m, ringI.slice().reverse(), CAP);
  const hub = [];
  for (let k = 0; k < 8; k++) {
    const a = (k / 8) * Math.PI * 2;
    hub.push(addVert(m, cx + Math.cos(a) * r * 0.55, cy + Math.sin(a) * r * 0.55, out + side * 0.015));
  }
  addFace(m, hub, HUB);
}

function addWheels(m, frontX, rearX, trackZ, r, w) {
  addWheel(m, frontX, r, trackZ, r, w, +1);
  addWheel(m, frontX, r, -trackZ, r, w, -1);
  addWheel(m, rearX, r, trackZ, r, w, +1);
  addWheel(m, rearX, r, -trackZ, r, w, -1);
}

function addMirrors(m, x, y, z, color) {
  addBox(m, x - 0.07, x + 0.07, y, y + 0.1, z - 0.09, z + 0.02, color);
  addBox(m, x - 0.07, x + 0.07, y, y + 0.1, -z - 0.02, -z + 0.09, color);
}

/* ============================================================
   The three cars
   ============================================================ */

const LIGHT = '#ffedb0', TAIL = '#c1132f', DARKTRIM = '#26262e', GLASS = '#39566e';

// 1. Sports coupe — long hood, fat rear haunches, big wing. Pure Gran Turismo cover car.
function buildCoupe() {
  const m = newMesh();
  const C = { body: '#c62831', glass: GLASS, under: '#16161c' };
  loftBody(m, [
    { x: -2.15, yb: 0.30, ym: 0.62, yt: 0.92, wb: 0.78, wm: 0.86, wt: 0.72 },
    { x: -1.55, yb: 0.22, ym: 0.62, yt: 1.00, wb: 0.82, wm: 0.90, wt: 0.76, sw: 1, tw: 1 },
    { x: -0.85, yb: 0.20, ym: 0.60, yt: 1.24, wb: 0.82, wm: 0.90, wt: 0.62, sw: 1 },
    { x:  0.15, yb: 0.20, ym: 0.60, yt: 1.26, wb: 0.82, wm: 0.90, wt: 0.60, sw: 1, tw: 1 },
    { x:  0.75, yb: 0.20, ym: 0.60, yt: 0.92, wb: 0.82, wm: 0.92, wt: 0.78 },
    { x:  1.85, yb: 0.22, ym: 0.50, yt: 0.70, wb: 0.80, wm: 0.88, wt: 0.74 },
    { x:  2.18, yb: 0.28, ym: 0.42, yt: 0.55, wb: 0.72, wm: 0.80, wt: 0.68 },
  ], C);
  addWheels(m, 1.42, -1.42, 0.80, 0.33, 0.24);
  // slim pop-up-era light bar + indicators
  addBox(m, 2.16, 2.21, 0.44, 0.53, -0.62, -0.24, LIGHT);
  addBox(m, 2.16, 2.21, 0.44, 0.53, 0.24, 0.62, LIGHT);
  // full-width tail light panel (very '90s)
  addBox(m, -2.19, -2.14, 0.60, 0.80, -0.66, 0.66, TAIL);
  // lower valances
  addBox(m, 2.02, 2.22, 0.18, 0.30, -0.78, 0.78, DARKTRIM);
  addBox(m, -2.20, -2.02, 0.18, 0.30, -0.78, 0.78, DARKTRIM);
  // rear wing
  addBox(m, -1.98, -1.84, 0.92, 1.12, 0.48, 0.62, C.body);
  addBox(m, -1.98, -1.84, 0.92, 1.12, -0.62, -0.48, C.body);
  addBox(m, -2.16, -1.76, 1.12, 1.19, -0.84, 0.84, C.body);
  // exhaust
  addBox(m, -2.20, -2.10, 0.20, 0.30, 0.30, 0.48, '#555560');
  addMirrors(m, 0.70, 0.92, 0.92, C.body);
  return m;
}

// 2. Boxy sedan — three-box silhouette, chrome-less bumpers, teal metallic.
function buildSedan() {
  const m = newMesh();
  const C = { body: '#0e7a6f', glass: GLASS, under: '#16161c' };
  loftBody(m, [
    { x: -2.25, yb: 0.30, ym: 0.65, yt: 1.02, wb: 0.76, wm: 0.84, wt: 0.72 },
    { x: -1.35, yb: 0.22, ym: 0.65, yt: 1.06, wb: 0.80, wm: 0.88, wt: 0.74, sw: 1, tw: 1 },
    { x: -0.75, yb: 0.22, ym: 0.62, yt: 1.40, wb: 0.80, wm: 0.88, wt: 0.60, sw: 1 },
    { x:  0.55, yb: 0.22, ym: 0.62, yt: 1.42, wb: 0.80, wm: 0.88, wt: 0.60, sw: 1, tw: 1 },
    { x:  1.15, yb: 0.22, ym: 0.62, yt: 1.02, wb: 0.80, wm: 0.88, wt: 0.76 },
    { x:  2.00, yb: 0.22, ym: 0.55, yt: 0.88, wb: 0.78, wm: 0.86, wt: 0.72 },
    { x:  2.25, yb: 0.30, ym: 0.45, yt: 0.72, wb: 0.72, wm: 0.80, wt: 0.66 },
  ], C);
  addWheels(m, 1.45, -1.45, 0.78, 0.32, 0.22);
  // twin rectangular headlights + grille
  addBox(m, 2.23, 2.28, 0.48, 0.62, -0.64, -0.30, LIGHT);
  addBox(m, 2.23, 2.28, 0.48, 0.62, 0.30, 0.64, LIGHT);
  addBox(m, 2.23, 2.27, 0.48, 0.60, -0.24, 0.24, '#1c1c24');
  // tail lights
  addBox(m, -2.29, -2.24, 0.60, 0.82, -0.70, -0.30, TAIL);
  addBox(m, -2.29, -2.24, 0.60, 0.82, 0.30, 0.70, TAIL);
  // body-color bumpers with a rub strip
  addBox(m, 2.14, 2.32, 0.26, 0.46, -0.80, 0.80, C.body);
  addBox(m, -2.32, -2.14, 0.26, 0.46, -0.80, 0.80, C.body);
  addBox(m, 2.30, 2.33, 0.34, 0.40, -0.78, 0.78, DARKTRIM);
  addBox(m, -2.33, -2.30, 0.34, 0.40, -0.78, 0.78, DARKTRIM);
  // side rub strips
  addBox(m, -1.9, 1.6, 0.50, 0.56, 0.87, 0.90, DARKTRIM);
  addBox(m, -1.9, 1.6, 0.50, 0.56, -0.90, -0.87, DARKTRIM);
  addMirrors(m, 1.05, 0.98, 0.90, C.body);
  return m;
}

// 3. Hot hatch — short, tall vertical tailgate, chunky black plastic bumpers.
function buildHatch() {
  const m = newMesh();
  const C = { body: '#6a3ab2', glass: GLASS, under: '#16161c' };
  loftBody(m, [
    { x: -1.95, yb: 0.28, ym: 0.60, yt: 1.24, wb: 0.74, wm: 0.82, wt: 0.64, sw: 1, tw: 1 },
    { x: -1.55, yb: 0.22, ym: 0.60, yt: 1.42, wb: 0.78, wm: 0.86, wt: 0.60, sw: 1 },
    { x:  0.45, yb: 0.22, ym: 0.60, yt: 1.44, wb: 0.78, wm: 0.86, wt: 0.60, sw: 1, tw: 1 },
    { x:  1.05, yb: 0.22, ym: 0.60, yt: 1.00, wb: 0.78, wm: 0.86, wt: 0.72 },
    { x:  1.75, yb: 0.24, ym: 0.52, yt: 0.86, wb: 0.76, wm: 0.84, wt: 0.70 },
    { x:  1.97, yb: 0.30, ym: 0.44, yt: 0.70, wb: 0.70, wm: 0.78, wt: 0.64 },
  ], C);
  addWheels(m, 1.22, -1.22, 0.74, 0.31, 0.22);
  // headlights + grille slot
  addBox(m, 1.95, 2.00, 0.48, 0.62, -0.60, -0.26, LIGHT);
  addBox(m, 1.95, 2.00, 0.48, 0.62, 0.26, 0.60, LIGHT);
  addBox(m, 1.95, 1.99, 0.50, 0.58, -0.20, 0.20, '#1c1c24');
  // tall tail lights hugging the hatch
  addBox(m, -1.99, -1.94, 0.62, 1.06, -0.66, -0.44, TAIL);
  addBox(m, -1.99, -1.94, 0.62, 1.06, 0.44, 0.66, TAIL);
  // chunky unpainted bumpers
  addBox(m, 1.86, 2.06, 0.24, 0.46, -0.78, 0.78, DARKTRIM);
  addBox(m, -2.06, -1.86, 0.24, 0.46, -0.78, 0.78, DARKTRIM);
  // side plastic cladding
  addBox(m, -1.7, 1.4, 0.30, 0.44, 0.83, 0.87, DARKTRIM);
  addBox(m, -1.7, 1.4, 0.30, 0.44, -0.87, -0.83, DARKTRIM);
  // roof spoiler lip on the hatch
  addBox(m, -1.72, -1.50, 1.42, 1.48, -0.58, 0.58, C.body);
  addMirrors(m, 0.95, 0.96, 0.88, C.body);
  return m;
}

/* ============================================================
   Software renderer — painter's algorithm, flat shading.
   ============================================================ */

function hexRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}

function shade(hex, k) {
  const [r, g, b] = hexRgb(hex);
  return `rgb(${Math.min(255, r * k) | 0},${Math.min(255, g * k) | 0},${Math.min(255, b * k) | 0})`;
}

function makeViewer(canvas, mesh) {
  const ctx = canvas.getContext('2d');
  const st = { yaw: 0.7, pitch: 0.42, auto: true, dragging: false, px: 0, py: 0 };

  canvas.addEventListener('pointerdown', (e) => {
    st.dragging = true; st.auto = false;
    st.px = e.clientX; st.py = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!st.dragging) return;
    st.yaw += (e.clientX - st.px) * 0.012;
    st.pitch = Math.max(0.05, Math.min(1.1, st.pitch + (e.clientY - st.py) * 0.008));
    st.px = e.clientX; st.py = e.clientY;
  });
  const stop = () => { st.dragging = false; setTimeout(() => { if (!st.dragging) st.auto = true; }, 2200); };
  canvas.addEventListener('pointerup', stop);
  canvas.addEventListener('pointercancel', stop);

  function draw() {
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.clientWidth, H = canvas.clientHeight;
    if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
      canvas.width = W * dpr; canvas.height = H * dpr;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const cy = Math.cos(st.yaw), sy = Math.sin(st.yaw);
    const cp = Math.cos(st.pitch), sp = Math.sin(st.pitch);
    const DIST = 8.2, F = Math.min(W, H) * 2.05;
    const midY = 0.7; // vertical center of the car, roughly

    // view transform: yaw around y, then pitch, then push back
    const tv = mesh.verts.map(([x, y, z]) => {
      const x1 = x * cy + z * sy;
      const z1 = -x * sy + z * cy;
      const y1 = y - midY;
      const y2 = y1 * cp + z1 * sp;
      const z2 = z1 * cp - y1 * sp + DIST;
      return [x1, y2, z2];
    });
    const proj = tv.map(([x, y, z]) => [W / 2 + (F * x) / z, H * 0.52 - (F * y) / z]);

    // ground shadow
    ctx.save();
    ctx.translate(W / 2, H * 0.52 + F * (midY * cp) / DIST);
    ctx.scale(1, Math.max(0.18, sp * 0.9));
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 0, F * 2.4 / DIST, F * 1.1 / DIST, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // light direction in view space
    const L = [0.45, 0.72, -0.53];
    const order = mesh.faces.map((f, i) => {
      let z = 0;
      for (const vi of f.idx) z += tv[vi][2];
      return [z / f.idx.length, i];
    }).sort((a, b) => b[0] - a[0]);

    for (const [, fi] of order) {
      const f = mesh.faces[fi];
      const a = tv[f.idx[0]], b = tv[f.idx[1]], c = tv[f.idx[2]];
      const u = [b[0] - a[0], b[1] - a[1], b[2] - a[2]];
      const v = [c[0] - a[0], c[1] - a[1], c[2] - a[2]];
      let nx = u[1] * v[2] - u[2] * v[1];
      let ny = u[2] * v[0] - u[0] * v[2];
      let nz = u[0] * v[1] - u[1] * v[0];
      const nl = Math.hypot(nx, ny, nz) || 1;
      const d = Math.abs((nx * L[0] + ny * L[1] + nz * L[2]) / nl);
      const col = shade(f.color, 0.52 + 0.55 * d);
      ctx.fillStyle = col;
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(proj[f.idx[0]][0], proj[f.idx[0]][1]);
      for (let k = 1; k < f.idx.length; k++) ctx.lineTo(proj[f.idx[k]][0], proj[f.idx[k]][1]);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }

  function tick() {
    if (st.auto) st.yaw += 0.008;
    draw();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ============================================================
   OBJ / MTL export
   ============================================================ */

function toObj(mesh, name) {
  const mats = [];
  const matOf = {};
  for (const f of mesh.faces) {
    if (!(f.color in matOf)) { matOf[f.color] = 'm' + mats.length; mats.push(f.color); }
  }
  let obj = `# ${name} — low-poly '90s car\nmtllib ${name}.mtl\no ${name}\n`;
  for (const [x, y, z] of mesh.verts) {
    obj += `v ${x.toFixed(4)} ${y.toFixed(4)} ${z.toFixed(4)}\n`;
  }
  let cur = null;
  for (const f of mesh.faces) {
    const mn = matOf[f.color];
    if (mn !== cur) { obj += `usemtl ${mn}\n`; cur = mn; }
    obj += 'f ' + f.idx.map((i) => i + 1).join(' ') + '\n';
  }
  let mtl = `# materials for ${name}\n`;
  mats.forEach((hex, i) => {
    const [r, g, b] = hexRgb(hex);
    mtl += `newmtl m${i}\nKd ${(r / 255).toFixed(4)} ${(g / 255).toFixed(4)} ${(b / 255).toFixed(4)}\nKa 0 0 0\nKs 0.1 0.1 0.1\nNs 12\n`;
  });
  return { obj, mtl };
}

function downloadText(filename, text) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

/* ============================================================
   Page assembly
   ============================================================ */

const CARS = [
  { id: 'coupe_92', name: "'92 Kaze GT", sub: 'twin-turbo coupe · pop-up era nose · big wing', build: buildCoupe },
  { id: 'sedan_94', name: "'94 Brentwood 525", sub: 'three-box executive sedan · teal metallic', build: buildSedan },
  { id: 'hatch_96', name: "'96 Pronto GTi", sub: 'hot hatch · unpainted bumpers · roof lip', build: buildHatch },
];

const garage = document.getElementById('garage');
for (const car of CARS) {
  const mesh = car.build();
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>${car.name}</h2>
    <p class="sub">${car.sub} · ${mesh.faces.length} faces</p>
    <canvas></canvas>
    <div class="dl">
      <a href="#" data-kind="obj">⬇ ${car.id}.obj</a>
      <a href="#" data-kind="mtl">⬇ ${car.id}.mtl</a>
    </div>
    <p class="hint">drag to rotate · auto-spins when idle</p>`;
  garage.appendChild(card);
  makeViewer(card.querySelector('canvas'), mesh);
  const files = toObj(mesh, car.id);
  card.querySelectorAll('.dl a').forEach((a) => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const kind = a.dataset.kind;
      downloadText(`${car.id}.${kind}`, files[kind]);
    });
  });
}
