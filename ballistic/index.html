<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Ballistic ⚡ one more volley</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background:#0a0a18; overflow:hidden;
    overscroll-behavior:none; touch-action:none; user-select:none; -webkit-user-select:none; }
  canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================================
// BALLISTIC — endless volley brick-breaker, tuned for "one more run".
// One file, vanilla canvas. Logical world is fixed 420x780 (7 cols x 60px),
// letterboxed to the viewport. All UI is canvas-drawn (hit-tested rects).
// Save lives in localStorage 'ballistic_meta_v1' — NEVER rename.
// ============================================================================

const W = 420, H = 780;
const COLS = 7, CELL = 60, ROWS = 9;
const GY = 96;                        // grid top
const LAUNCH_Y = GY + ROWS * CELL;    // 636 — balls land / fire from here
const BALL_R = 7;
const BALL_SPD = 820;                 // units/sec
const VOLLEY_GAP = 0.065;             // sec between balls leaving the launcher
const PERK_EVERY = 5;                 // waves between perk offers
const REVIVE_COST = 75;               // gems, once per run
const ENERGY_MAX = 100;               // active-ability meter cap

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ---- seeded rng (deterministic under test) --------------------------------
let rngState = (Math.random() * 2 ** 31) | 0 || 1;
function reseed(n){ rngState = n | 0 || 1; }
function rand(){                                   // mulberry32
  rngState |= 0; rngState = (rngState + 0x6D2B79F5) | 0;
  let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
const ri = (a, b) => a + Math.floor(rand() * (b - a + 1));
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

// ---- difficulty curve ------------------------------------------------------
// HP grows quadratically while the volley only grows linearly (one orb per
// wave), so runs tighten instead of coasting forever.
function brickHp(w){ return w + Math.floor(w * w / 45); }
const toughChance = w => Math.min(0.35, 0.18 + w * 0.004);
const doubleWave = w => w >= 18 && w % 6 === 0;   // surprise double-descent waves

// ---- persistent meta -------------------------------------------------------
const META_KEY = 'ballistic_meta_v1';
let meta = null;
function defaultMeta(){
  return { gems: 0, best: 0, bestWave: 0, streak: 0, lastDay: 0, sound: 1,
           up: { balls: 0, power: 0, head: 0, gemx: 0 }, skin: 0,
           runs: 0, bricks: 0, topRuns: [] };
}
function loadMeta(){
  meta = defaultMeta();
  try {
    const raw = localStorage.getItem(META_KEY);
    if (raw){ const m = JSON.parse(raw); Object.assign(meta, m); meta.up = Object.assign(defaultMeta().up, m.up || {}); }
  } catch (e) {}
}
function saveMeta(){ try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {} }

// Daily streak — the Wordle hook. First run of each new day bumps the streak
// (a 1-day gap resets it) and pays gems scaled by it.
function dailyBonus(day){
  const d = day !== undefined ? day : Math.floor(Date.now() / 86400000);
  if (meta.lastDay === d) return 0;
  meta.streak = (meta.lastDay === d - 1) ? meta.streak + 1 : 1;
  meta.lastDay = d;
  const bonus = 10 * Math.min(meta.streak, 10);
  meta.gems += bonus;
  saveMeta();
  return bonus;
}

// ---- meta shop (permanent upgrades — the idle-game hook) -------------------
const UPGRADES = [
  { id:'balls', name:'Extra Ball',  desc:'+1 starting ball',        icon:'●',  max:5, cost:l => 30 * 2 ** l },
  { id:'power', name:'Power Core',  desc:'+1 ball damage',          icon:'⚡', max:3, cost:l => 120 * 3 ** l },
  { id:'head',  name:'Head Start',  desc:'start 5 waves deep',      icon:'⏩', max:2, cost:l => 150 * 3 ** l },
  { id:'gemx',  name:'Gem Boost',   desc:'+25% gems earned',        icon:'💎', max:4, cost:l => 50 * 2 ** l },
];
function buyUpgrade(id){
  const u = UPGRADES.find(x => x.id === id);
  const lvl = meta.up[id] || 0;
  if (!u || lvl >= u.max) return false;
  const c = u.cost(lvl);
  if (meta.gems < c) return false;
  meta.gems -= c; meta.up[id] = lvl + 1; saveMeta();
  sfx('buy'); return true;
}

// ---- skins (trail colors) unlocked by best-score milestones ----------------
const SKINS = [
  { name:'Ember',  need:0,     c:'#ffd166', glow:'#ff7b00' },
  { name:'Frost',  need:500,   c:'#8be9ff', glow:'#2f9dff' },
  { name:'Toxin',  need:2000,  c:'#9dff6b', glow:'#2fbf3f' },
  { name:'Blush',  need:5000,  c:'#ff8fc7', glow:'#ff2f9d' },
  { name:'Void',   need:12000, c:'#c9a6ff', glow:'#7b2fff' },
  { name:'Gold',   need:30000, c:'#fff3b0', glow:'#ffcf00' },
];
const skinUnlocked = i => meta.best >= SKINS[i].need;

// ---- in-run perks (the roguelite hook: pick 1 of 3 every 5 waves) ----------
const PERKS = [
  { id:'balls',  name:'+3 Balls',     desc:'three more in the volley', icon:'●●●', apply:g => { g.ballCount += 3; } },
  { id:'power',  name:'Power +1',     desc:'every hit does +1',        icon:'⚡',  apply:g => { g.power += 1; } },
  { id:'pierce', name:'Piercing',     desc:'balls smash through kills',icon:'➤',  once:true, apply:g => { g.pierce = true; } },
  { id:'crit',   name:'Critical +15%',desc:'crits hit for 3×',         icon:'✸',  apply:g => { g.crit += 0.15; } },
  { id:'boom',   name:'Volatile +15%',desc:'kills may explode',        icon:'💥', apply:g => { g.boom += 0.15; } },
  { id:'gemx',   name:'Gems ×2',      desc:'double gem pickups',       icon:'💎', apply:g => { g.gemMul *= 2; } },
  { id:'shrink', name:'Shrink Ray',   desc:'all bricks lose 30% HP',   icon:'🌀', apply:g => { for (const b of g.bricks) b.hp = Math.max(1, Math.ceil(b.hp * 0.7)); } },
  { id:'lucky',  name:'Lucky Drops',  desc:'+50% bonus item spawns',   icon:'🍀', apply:g => { g.luck *= 1.5; } },
  { id:'charge', name:'Power Cell',   desc:'refill your energy now',   icon:'🔋', apply:g => { addEnergy(ENERGY_MAX); } },
  { id:'effic',  name:'Efficient',    desc:'abilities cost 25% less',  icon:'♻️', apply:g => { g.abilityMul *= 0.75; } },
  { id:'siphon', name:'Energy Siphon',desc:'+50% energy per kill',     icon:'🌊', apply:g => { g.energyMul *= 1.5; } },
];

// ---- ACTIVE ABILITIES — the "more to do" layer -----------------------------
// A meter charges as you break bricks; between volleys you tap to spend it.
// Every turn becomes a decision: nuke now, freeze for breathing room, or bank
// energy for an Overcharged volley that doubles damage and pierces.
const ABILITIES = [
  { id:'blast',  name:'Blast',      icon:'💥', cost:40,
    desc:'obliterate the bottom row',
    cast:g => {
      if (!g.bricks.length) return;
      const maxRow = Math.max(...g.bricks.map(b => b.row));
      g.flash = 0.7; g.flashCol = '#ff7b00'; g.shake = Math.max(g.shake, 14); buzz(60);
      const heavy = Math.ceil(brickHp(g.wave) * 1.5) + g.power * 4;
      for (const b of g.bricks.slice()){
        if (b.row === maxRow) killBrick(b);                 // wipe the front line outright
        else if (b.row === maxRow - 1){ b.hp -= heavy; b.flash = 1; if (b.hp <= 0) killBrick(b); }
      }
      ringFx(W / 2, GY + maxRow * CELL + CELL / 2, '#ff7b00', 260);
    } },
  { id:'freeze', name:'Freeze',     icon:'❄️', cost:30,
    desc:'skip the next descent',
    cast:g => { g.freeze = true; addText(W / 2, GY + 130, '❄ FROZEN ❄', '#8be9ff', 26); ringFx(W / 2, LAUNCH_Y - CELL, '#8be9ff', 200); } },
  { id:'over',   name:'Overcharge', icon:'⚡', cost:55,
    desc:'next volley: 2× dmg + pierce',
    cast:g => { g.overcharge = true; addText(g.launchX, LAUNCH_Y - 40, '⚡ CHARGED', '#ffd166', 20); } },
];
const abilityCost = ab => Math.ceil(ab.cost * (G.abilityMul || 1));

function addEnergy(n){ G.energy = clamp(G.energy + n, 0, ENERGY_MAX); }

function castAbility(id){
  if (!G || G.phase !== 'aim') return false;
  const ab = ABILITIES.find(a => a.id === id);
  if (!ab) return false;
  const cost = abilityCost(ab);
  if (G.energy < cost) return false;
  G.energy -= cost;
  ab.cast(G);
  sfx('perk'); buzz(30);
  return true;
}
function offerPerks(){
  const pool = PERKS.filter(p => !(p.once && G.perksTaken.includes(p.id)));
  const offer = [];
  while (offer.length < 3 && pool.length){
    offer.push(pool.splice(Math.floor(rand() * pool.length), 1)[0]);
  }
  return offer;
}
function applyPerk(p){
  p.apply(G);
  G.perksTaken.push(p.id);
  sfx('perk'); buzz(30);
}

// ---- run state -------------------------------------------------------------
let G = null;
let brickId = 1;

function newRun(){
  G = {
    phase: 'aim',            // aim | fly | perk | over
    wave: 0, score: 0, combo: 0, bestCombo: 0, nextPerkAt: PERK_EVERY,
    bricks: [], items: [], balls: [], parts: [], texts: [], beams: [], frags: [], rings: [],
    flash: 0, flashCol: '#ffd166', scorePunch: 0,
    ballCount: 1 + (meta.up.balls || 0),
    power: 1 + (meta.up.power || 0),
    pierce: false, crit: 0, boom: 0, gemMul: 1, luck: 1,
    energy: 0, energyMul: 1, abilityMul: 1, freeze: false, overcharge: false,
    volleyDmg: 1, volleyPierce: false, perfects: 0,
    launchX: W / 2, nextX: null, queue: 0, queueT: 0, firstBall: true,
    aim: null, timeScale: 1, flyT: 0,
    perkOffer: null, perksTaken: [],
    revived: false, runGems: 0, shake: 0, dangerPulse: 0,
    newBest: false, over: null,
  };
  meta.runs++;
  // Head start: jump the wave counter, prefill 3 aged rows, credit some score.
  const head = 5 * (meta.up.head || 0);
  if (head){
    G.wave = Math.max(0, head - 3);
    for (let i = 0; i < 3; i++){
      spawnWave();
      for (const b of G.bricks) b.row++;
      for (const it of G.items) it.row++;
    }
    G.score = 8 * head;
  }
  spawnWave();
  saveMeta();
}

// Each wave: a fresh row of bricks at the top plus a guaranteed +1-ball orb
// (the genre's pacing trick — your volley grows roughly as fast as the walls).
function spawnWave(){
  G.wave++;
  const w = G.wave;
  const cols = [0, 1, 2, 3, 4, 5, 6];
  for (let i = cols.length - 1; i > 0; i--){ const j = Math.floor(rand() * (i + 1)); [cols[i], cols[j]] = [cols[j], cols[i]]; }
  const n = clamp(3 + Math.floor(w / 6) + (rand() < 0.5 ? 1 : 0), 3, 6);
  const base = brickHp(w);
  for (let i = 0; i < n; i++){
    let hp = base;
    if (rand() < toughChance(w)) hp = base * 2;
    else if (w > 25 && rand() < 0.1) hp = base * 3;
    const bomb = rand() < 0.12 * G.luck;
    const species = Math.floor(rand() * SPECIES.length);
    G.bricks.push({ id: brickId++, col: cols[i], row: 0, hp: bomb ? 1 : hp, max: bomb ? 1 : hp, bomb, species, sc: 0, yo: 0 });
  }
  const free = cols.slice(n);
  // the free +1-ball orb: guaranteed while learning, then no longer a given —
  // the volley has to lag the walls or nothing ever threatens you
  if (free.length && (w <= 3 || rand() < 0.8)) G.items.push({ col: free.shift(), row: 0, type: 'orb', sc: 0, yo: 0 });
  const extras = [['gem', 0.4], ['laserH', 0.07], ['laserV', 0.07], ['star', 0.08]];
  for (const [type, p] of extras){
    if (free.length && rand() < p * G.luck) G.items.push({ col: free.shift(), row: 0, type, sc: 0, yo: 0 });
  }
}

function descend(){
  for (const b of G.bricks){ b.row++; b.yo = (b.yo || 0) - CELL; }   // yo eases back to 0 (visual tween)
  for (let i = G.items.length - 1; i >= 0; i--){
    const it = G.items[i];
    it.row++; it.yo = (it.yo || 0) - CELL;
    if (it.row >= ROWS){                       // mercy: pickups at the line auto-collect
      if (it.type === 'orb' || it.type === 'gem') collectItem(it, null, true);
      G.items.splice(i, 1);
    }
  }
}
const checkOver = () => G.bricks.some(b => b.row >= ROWS);

function gameOver(){
  G.phase = 'over';
  const endGems = addGems(Math.floor(G.score / 150) + G.wave);
  G.over = { endGems };
  if (G.score > meta.best){ meta.best = G.score; G.newBest = true; }
  if (G.wave > meta.bestWave) meta.bestWave = G.wave;
  meta.topRuns.push({ score: G.score, wave: G.wave, t: Date.now() });
  meta.topRuns.sort((a, b) => b.score - a.score);
  if (meta.topRuns.length > 5) meta.topRuns.length = 5;
  saveMeta();
  sfx('over'); buzz(120); G.shake = 14;
}

function revive(){
  if (G.revived || meta.gems < REVIVE_COST) return false;
  meta.gems -= REVIVE_COST; saveMeta();
  G.revived = true;
  G.bricks = G.bricks.filter(b => b.row < ROWS - 4);
  G.items = G.items.filter(it => it.row < ROWS - 4);
  G.phase = 'aim'; G.over = null;
  sfx('perk'); boomFx(W / 2, LAUNCH_Y - CELL * 2, '#8be9ff', 40);
  return true;
}

// gems bank instantly (mid-run spending on revives, and it just feels better)
function addGems(n){
  const amt = Math.max(0, Math.round(n * G.gemMul * (1 + 0.25 * (meta.up.gemx || 0))));
  meta.gems += amt; G.runGems += amt;
  return amt;
}

// ---- combat ----------------------------------------------------------------
const COMBO_CALLS = [[50, 'GODLIKE!!'], [35, 'UNREAL!'], [20, 'MEGA!'], [10, 'GREAT!'], [5, 'NICE!']];

function damageBrick(b, dmg, bx, by){
  let d = dmg;
  const crit = rand() < G.crit;
  if (crit) d *= 3;
  b.hp -= d;
  b.flash = 1;
  if (crit) addText(bx ?? cx(b), by ?? cy(b), 'CRIT', '#ffb347', 18);
  sfx('hit', clamp(200 + G.combo * 10, 200, 900));
  if (b.hp <= 0){ killBrick(b); return true; }
  return false;
}

function killBrick(b){
  const i = G.bricks.indexOf(b);
  if (i < 0) return;
  G.bricks.splice(i, 1);
  meta.bricks++;
  G.score += b.max;
  G.combo++;
  G.scorePunch = 1;
  addEnergy((2 + Math.min(6, Math.floor(G.combo / 4))) * (G.energyMul || 1));   // combos charge faster
  if (G.combo > G.bestCombo) G.bestCombo = G.combo;
  boomFx(cx(b), cy(b), brickColor(b), b.bomb ? 26 : 12);
  shatterFx(b);
  ringFx(cx(b), cy(b), brickColor(b), 40);
  addText(cx(b), cy(b), '+' + fmt(b.max), '#ffffff', 15);
  for (const [at, msg] of COMBO_CALLS){
    if (G.combo === at){
      addText(W / 2, GY + 150, msg, '#ffd166', 34);
      G.shake = Math.max(G.shake, 8);
      G.flash = 0.6; G.flashCol = '#ffd166';
      sfx('combo'); buzz(25); break;
    }
  }
  sfx('pop'); buzz(8);
  if (b.bomb || rand() < G.boom) explode(b.col, b.row);
}

function explode(col, row){
  sfx('bomb'); buzz(40); G.shake = Math.max(G.shake, 10);
  G.flash = Math.max(G.flash, 0.45); G.flashCol = '#ff7b00';
  boomFx(col * CELL + CELL / 2, GY + row * CELL + CELL / 2, '#ff7b00', 30);
  ringFx(col * CELL + CELL / 2, GY + row * CELL + CELL / 2, '#ff7b00', 110);
  const dmg = Math.ceil(G.wave / 2) + G.power * 2;
  for (const b of G.bricks.slice()){
    if (Math.abs(b.col - col) <= 1 && Math.abs(b.row - row) <= 1 && !(b.col === col && b.row === row)){
      b.hp -= dmg; b.flash = 1;
      if (b.hp <= 0) killBrick(b);
    }
  }
}

function laser(it, horizontal){
  sfx('laser'); G.shake = Math.max(G.shake, 6);
  const dmg = G.power * 2;
  G.beams.push({ h: horizontal, col: it.col, row: it.row, t: 0.25 });
  for (const b of G.bricks.slice()){
    if (horizontal ? b.row === it.row : b.col === it.col){
      b.hp -= dmg; b.flash = 1;
      if (b.hp <= 0) killBrick(b);
    }
  }
}

function collectItem(it, ball, auto){
  const i = G.items.indexOf(it);
  if (i >= 0) G.items.splice(i, 1);
  const x = it.col * CELL + CELL / 2, y = GY + it.row * CELL + CELL / 2;
  if (it.type === 'orb'){ G.ballCount++; addText(x, y, '+1 pal 🐾', '#8be9ff', 16); sfx('orb'); }
  else if (it.type === 'gem'){ const got = addGems(1); addText(x, y, '+' + got + ' 💎', '#8be9ff', 15); sfx('gem'); }
  else if (it.type === 'star'){ const s = 10 * G.wave; G.score += s; addText(x, y, '+' + fmt(s) + ' ★', '#ffd166', 16); sfx('gem'); }
  else if (it.type === 'laserH'){ laser(it, true); }
  else if (it.type === 'laserV'){ laser(it, false); }
  if (!auto) boomFx(x, y, '#8be9ff', 8);
}

// ---- volley / physics ------------------------------------------------------
function fireVolley(dx, dy){
  const len = Math.hypot(dx, dy);
  if (!len || dy > -0.08 * len) return false;       // must aim upward
  let nx = dx / len, ny = dy / len;
  const maxSide = 0.985;                            // never fully horizontal
  if (Math.abs(nx) > maxSide){ nx = maxSide * Math.sign(nx); ny = -Math.sqrt(1 - nx * nx); }
  G.dir = { x: nx, y: ny };
  G.queue = G.ballCount; G.queueT = 0;
  G.balls = []; G.nextX = null; G.firstBall = true;
  G.combo = 0; G.flyT = 0;
  // Overcharge (spent this shot): the whole volley hits for 2× and pierces.
  G.volleyDmg = G.power * (G.overcharge ? 2 : 1);
  G.volleyPierce = G.pierce || G.overcharge;
  G.overcharge = false;
  G.phase = 'fly';
  sfx('fire');
  return true;
}

function stepPhysics(dt){
  // launcher feeds the queue
  if (G.queue > 0){
    G.queueT -= dt;
    if (G.queueT <= 0){
      G.balls.push({ x: G.launchX, y: LAUNCH_Y - BALL_R, vx: G.dir.x * BALL_SPD, vy: G.dir.y * BALL_SPD, trail: [], lastHit: 0 });
      G.queue--; G.queueT = VOLLEY_GAP;
    }
  }
  const sub = Math.max(1, Math.ceil((BALL_SPD * dt) / 6));
  const sdt = dt / sub;
  for (let bi = G.balls.length - 1; bi >= 0; bi--){
    const ball = G.balls[bi];
    let landed = false;
    for (let s = 0; s < sub && !landed; s++){
      ball.x += ball.vx * sdt;
      ball.y += ball.vy * sdt;
      if (ball.x < BALL_R){ ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
      if (ball.x > W - BALL_R){ ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
      if (ball.y < GY + BALL_R){ ball.y = GY + BALL_R; ball.vy = Math.abs(ball.vy); }
      if (ball.y >= LAUNCH_Y - BALL_R && ball.vy > 0){ landed = true; break; }
      collideBricks(ball);
      collideItems(ball);
    }
    ball.trail.push(ball.x, ball.y);
    if (ball.trail.length > 12) ball.trail.splice(0, 2);
    if (landed){
      if (G.firstBall){ G.nextX = clamp(ball.x, BALL_R + 2, W - BALL_R - 2); G.firstBall = false; }
      G.balls.splice(bi, 1);
    }
  }
  if (G.queue === 0 && G.balls.length === 0) endVolley();
}

function collideBricks(ball){
  const c0 = clamp(Math.floor((ball.x - BALL_R) / CELL), 0, COLS - 1);
  const c1 = clamp(Math.floor((ball.x + BALL_R) / CELL), 0, COLS - 1);
  const r0 = clamp(Math.floor((ball.y - BALL_R - GY) / CELL), 0, ROWS - 1);
  const r1 = clamp(Math.floor((ball.y + BALL_R - GY) / CELL), 0, ROWS - 1);
  for (const b of G.bricks){
    if (b.col < c0 || b.col > c1 || b.row < r0 || b.row > r1) continue;
    const bx = b.col * CELL, by = GY + b.row * CELL;
    const nx = clamp(ball.x, bx, bx + CELL), ny = clamp(ball.y, by, by + CELL);
    const ddx = ball.x - nx, ddy = ball.y - ny;
    if (ddx * ddx + ddy * ddy > BALL_R * BALL_R) continue;
    if (ball.lastHit === b.id) continue;             // no double-tick on one contact
    ball.lastHit = b.id;
    const killed = damageBrick(b, G.volleyDmg, ball.x, ball.y);
    if (killed && G.volleyPierce) return;            // smash through
    // reflect off the axis of least penetration
    const penX = BALL_R - Math.abs(ddx), penY = BALL_R - Math.abs(ddy);
    if (Math.abs(ddx) > Math.abs(ddy)){
      ball.vx = Math.abs(ball.vx) * (ddx > 0 ? 1 : -1);
      ball.x += (ddx > 0 ? penX : -penX);
    } else {
      ball.vy = Math.abs(ball.vy) * (ddy > 0 ? 1 : -1);
      ball.y += (ddy > 0 ? penY : -penY);
    }
    return;
  }
  ball.lastHit = 0;
}

function collideItems(ball){
  for (const it of G.items.slice()){
    const x = it.col * CELL + CELL / 2, y = GY + it.row * CELL + CELL / 2;
    const dx = ball.x - x, dy = ball.y - y;
    if (dx * dx + dy * dy < (BALL_R + 14) * (BALL_R + 14)) collectItem(it, ball);
  }
}

function endVolley(){
  if (G.combo >= 5) G.score += G.combo * Math.ceil(G.wave / 2);
  if (G.nextX != null) G.launchX = G.nextX;
  G.timeScale = 1;
  // Perfect clear: emptied the whole board in one volley — big payoff.
  if (G.bricks.length === 0){
    G.perfects++;
    const bonus = addGems(3 + G.wave);
    addEnergy(30);
    G.score += 25 * G.wave;
    addText(W / 2, GY + 130, 'PERFECT! +' + fmt(bonus) + '💎', '#ffd166', 30);
    G.flash = 0.8; G.flashCol = '#8be9ff'; G.shake = Math.max(G.shake, 10);
    sfx('combo'); buzz(60);
  }
  // Freeze ability: consume it to skip this turn's descent.
  if (G.freeze){ G.freeze = false; }
  else {
    descend();
    if (checkOver()){ gameOver(); return; }
  }
  spawnWave();
  if (doubleWave(G.wave)){                     // surge wave: two rows at once
    descend();
    if (checkOver()){ gameOver(); return; }
    spawnWave();
    addText(W / 2, GY + 130, '⚠ SURGE ⚠', '#ff5570', 30);
    G.shake = Math.max(G.shake, 8);
    sfx('bomb'); buzz(40);
  }
  if (G.wave >= G.nextPerkAt){
    G.nextPerkAt += PERK_EVERY;
    G.perkOffer = offerPerks();
    G.phase = 'perk';
    sfx('perkOffer');
  } else {
    G.phase = 'aim';
  }
}

// ---- juice: particles / floating text / shake ------------------------------
function boomFx(x, y, color, n){
  for (let i = 0; i < n; i++){
    const a = rand() * Math.PI * 2, sp = 60 + rand() * 240;
    G.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.4 + rand() * 0.4, t: 0, color, r: 1.5 + rand() * 2.5 });
  }
}
// brick shatters into spinning shards that tumble off the board
function shatterFx(b){
  const color = brickColor(b);
  for (let i = 0; i < 7; i++){
    G.frags.push({
      x: cx(b) + (rand() - 0.5) * 30, y: cy(b) + (rand() - 0.5) * 30,
      vx: (rand() - 0.5) * 320, vy: -80 - rand() * 180,
      rot: rand() * Math.PI, vr: (rand() - 0.5) * 14,

    });

}
function ringFx(x, y, color, r){

}

// ---- audio (tiny webaudio synth) + haptics ---------------------------------
let AC = null;
function ac(){
  if (AC) return AC;
  const Ctor = (typeof window !== 'undefined') && (window.AudioContext || window.webkitAudioContext);
  if (!Ctor) return null;
  try { AC = new Ctor(); } catch (e) { return null; }
  return AC;
}
function beep(freq, dur, type, vol, slide){
  const a = ac(); if (!a || !meta.sound) return;
  try {
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, slide), a.currentTime + dur);
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  } catch (e) {}
}
function sfx(kind, p){
  if (kind === 'hit') beep(p || 300, 0.05, 'square', 0.035);
  else if (kind === 'pop') beep(500, 0.09, 'triangle', 0.09, 900);
  else if (kind === 'gem') beep(880, 0.12, 'triangle', 0.08, 1320);
  else if (kind === 'orb') beep(660, 0.1, 'sine', 0.1, 990);
  else if (kind === 'fire') beep(220, 0.08, 'sawtooth', 0.05, 440);
  else if (kind === 'combo') beep(700, 0.18, 'square', 0.09, 1400);
  else if (kind === 'laser') beep(1300, 0.22, 'sawtooth', 0.07, 180);
  else if (kind === 'bomb') beep(90, 0.3, 'sawtooth', 0.14, 40);
  else if (kind === 'perk'){ beep(523, 0.1, 'square', 0.07); beep(784, 0.16, 'square', 0.07, 1046); }
  else if (kind === 'perkOffer') beep(440, 0.12, 'triangle', 0.07, 660);
  else if (kind === 'over') beep(300, 0.6, 'sawtooth', 0.12, 60);
  else if (kind === 'buy') beep(600, 0.1, 'square', 0.08, 900);
  else if (kind === 'click') beep(440, 0.05, 'square', 0.05);
}
function buzz(ms){ try { if (typeof navigator !== 'undefined' && navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ---- screens / phases outside the run --------------------------------------
let screen = 'menu';        // menu | game | shop
let toast = null;           // {str, t}
function toMenu(){ screen = 'menu'; }
function startGame(){
  const bonus = dailyBonus();
  if (bonus) toast = { str: '🔥 Day ' + meta.streak + ' streak! +' + bonus + ' 💎', t: 3 };
  newRun();
  screen = 'game';
  sfx('click');
}

// ---- layout / input --------------------------------------------------------
let scale = 1, offX = 0, offY = 0;
function fit(){
  const vw = window.innerWidth || W, vh = window.innerHeight || H;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  canvas.style.width = vw + 'px'; canvas.style.height = vh + 'px';
  scale = Math.min(vw / W, vh / H) * dpr;
  offX = (vw * dpr - W * scale) / 2;
  offY = (vh * dpr - H * scale) / 2;
}
function toWorld(e){
  const r = canvas.getBoundingClientRect();
  const dpr = canvas.width / (r.width || 1);
  return { x: ((e.clientX - r.left) * dpr - offX) / scale,
           y: ((e.clientY - r.top) * dpr - offY) / scale };
}

let UI = [];                // rebuilt every frame by the draw pass
function button(id, x, y, w, h){ UI.push({ id, x, y, w, h }); }
function uiAt(x, y){
  for (let i = UI.length - 1; i >= 0; i--){
    const b = UI[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return b.id;
  }
  return null;
}

function uiClick(id){
  sfx('click');
  if (id === 'play') startGame();
  else if (id === 'shop') screen = 'shop';
  else if (id === 'back') screen = 'menu';
  else if (id === 'sound'){ meta.sound = meta.sound ? 0 : 1; saveMeta(); }
  else if (id === 'speed'){ G.timeScale = G.timeScale >= 3 ? 1 : G.timeScale + 1; }
  else if (id === 'retry') startGame();
  else if (id === 'menu'){ toMenu(); }
  else if (id === 'revive') revive();
  else if (id.startsWith('perk')){
    const p = G.perkOffer[+id.slice(4)];
    if (p){ applyPerk(p); G.perkOffer = null; G.phase = 'aim'; }
  }
  else if (id.startsWith('ability:')) castAbility(id.slice(8));
  else if (id.startsWith('buy:')) buyUpgrade(id.slice(4));
  else if (id.startsWith('skin:')){
    const i = +id.slice(5);
    if (skinUnlocked(i)){ meta.skin = i; saveMeta(); }
  }
}

let pointer = { down: false, sx: 0, sy: 0, x: 0, y: 0, btn: null };
function onDown(x, y){
  ac() && AC && AC.state === 'suspended' && AC.resume && AC.resume();
  pointer.down = true; pointer.sx = pointer.x = x; pointer.sy = pointer.y = y;
  pointer.btn = uiAt(x, y);
  if (!pointer.btn && screen === 'game' && G.phase === 'aim') G.aim = { x, y };
}
function onMove(x, y){
  if (!pointer.down) return;
  pointer.x = x; pointer.y = y;
  if (G && G.aim) { G.aim.x = x; G.aim.y = y; }
}
function onUp(x, y){
  pointer.down = false;
  const btn = uiAt(x, y);
  if (pointer.btn && btn === pointer.btn){ pointer.btn = null; if (G) G.aim = null; uiClick(btn); return; }
  pointer.btn = null;
  if (screen === 'game' && G.phase === 'aim' && G.aim){
    const dx = x - G.launchX, dy = y - (LAUNCH_Y - BALL_R);
    G.aim = null;
    fireVolley(dx, dy);
  }
}
canvas.addEventListener('pointerdown', e => { e.preventDefault(); const p = toWorld(e); onDown(p.x, p.y); }, { passive: false });
canvas.addEventListener('pointermove', e => { e.preventDefault(); const p = toWorld(e); onMove(p.x, p.y); }, { passive: false });
canvas.addEventListener('pointerup',   e => { e.preventDefault(); const p = toWorld(e); onUp(p.x, p.y); }, { passive: false });
canvas.addEventListener('pointercancel', () => { pointer.down = false; pointer.btn = null; if (G) G.aim = null; });
window.addEventListener('resize', fit);

// ---- update ----------------------------------------------------------------
let animT = 0;                 // global clock for ambient animation (stars, pulses)
function update(dt){
  animT += dt;
  if (toast){ toast.t -= dt; if (toast.t <= 0) toast = null; }
  if (!G || screen !== 'game') return;
  G.dangerPulse += dt * 5;
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 40);
  if (G.flash > 0) G.flash = Math.max(0, G.flash - dt * 2.2);
  if (G.scorePunch > 0) G.scorePunch = Math.max(0, G.scorePunch - dt * 4);
  if (G.phase === 'fly'){
    G.flyT += dt;
    const steps = G.timeScale;
    for (let i = 0; i < steps && G.phase === 'fly'; i++) stepPhysics(dt);
  }
  for (let i = G.parts.length - 1; i >= 0; i--){
    const p = G.parts[i];
    p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 300 * dt;
    if (p.t >= p.life) G.parts.splice(i, 1);
  }
  for (let i = G.frags.length - 1; i >= 0; i--){
    const f = G.frags[i];
    f.t += dt; f.x += f.vx * dt; f.y += f.vy * dt; f.vy += 900 * dt; f.rot += f.vr * dt;
    if (f.t >= f.life) G.frags.splice(i, 1);
  }
  for (let i = G.rings.length - 1; i >= 0; i--){
    const r = G.rings[i];
    r.t += dt; r.r = 6 + (r.max - 6) * (r.t / r.life);
    if (r.t >= r.life) G.rings.splice(i, 1);
  }
  for (let i = G.texts.length - 1; i >= 0; i--){
    const t = G.texts[i];
    t.t += dt; t.y -= 30 * dt;
    if (t.t >= t.life) G.texts.splice(i, 1);
  }
  for (let i = G.beams.length - 1; i >= 0; i--){
    G.beams[i].t -= dt;
    if (G.beams[i].t <= 0) G.beams.splice(i, 1);
  }
  // spawn pop-in + descend tween
  const ease = Math.min(1, dt * 9);
  for (const b of G.bricks){
    if (b.flash) b.flash = Math.max(0, b.flash - dt * 6);
    if (b.sc < 1) b.sc = Math.min(1, b.sc + dt * 4);
    if (b.yo) { b.yo *= (1 - ease); if (Math.abs(b.yo) < 0.5) b.yo = 0; }
  }
  for (const it of G.items){
    if (it.sc < 1) it.sc = Math.min(1, (it.sc || 0) + dt * 4);
    if (it.yo) { it.yo *= (1 - ease); if (Math.abs(it.yo) < 0.5) it.yo = 0; }
  }
}

// ---- draw ------------------------------------------------------------------
const cx = b => b.col * CELL + CELL / 2;
const cy = b => GY + b.row * CELL + CELL / 2;
function fmt(n){
  if (n >= 1e6) return (n / 1e6).toFixed(n % 1e6 ? 1 : 0) + 'm';
  if (n >= 1e4) return Math.floor(n / 1e3) + 'k';
  return '' + Math.floor(n);
}
// ---- cute critters — each brick is a little animal, drawn on canvas --------
// Pastel body + ear style + cheek accent. A brick's species is picked at spawn
// (b.species) so it's stable; the HP number rides on its tummy.
const SPECIES = [
  { n:'cat',   body:'#ffcf87', ear:'cat',      accent:'#ff9ec4', ink:'#5a3d1e' },
  { n:'fox',   body:'#ff9d5c', ear:'cat',      accent:'#fff2e0', ink:'#7a3510' },
  { n:'panda', body:'#f4f4fb', ear:'round',    accent:'#ffb3c9', ink:'#3a3a4a', patch:true },
  { n:'bunny', body:'#ffc2dc', ear:'long',     accent:'#ff7eb0', ink:'#7a3a55' },
  { n:'frog',  body:'#a6e26b', ear:'toad',     accent:'#ff9ec4', ink:'#3e6b1e' },
  { n:'bear',  body:'#c99b6a', ear:'round',    accent:'#ff9ec4', ink:'#5a3d20' },
  { n:'pig',   body:'#ffb0c8', ear:'cat',      accent:'#ff7ea6', ink:'#8a3f57', snout:true },
  { n:'koala', body:'#b9c1cd', ear:'biground', accent:'#ffb3c9', ink:'#464e5a' },
];
const spec = b => SPECIES[(b && b.species != null ? b.species : 0) % SPECIES.length] || SPECIES[0];
function brickColor(b){ return b && b.bomb ? '#ff6b5c' : spec(b).body; }
function rr(x, y, w, h, r){
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, r); else ctx.rect(x, y, w, h);
}

function drawBtn(id, x, y, w, h, label, color, size){
  button(id, x, y, w, h);
  ctx.fillStyle = color || '#22224a';
  rr(x, y, w, h, 14); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = '700 ' + (size || 20) + 'px system-ui,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
}

// ---- render caches ----------------------------------------------------------
// Glow is expensive per-frame but free at build time: every brick color and
// ball glow is rendered ONCE (shadowBlur, gradients, sheen) into an offscreen
// canvas, then blitted with drawImage. Additive passes ('lighter') give bloom.
const spriteCache = new Map();
function makeCanvas(w, h){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function withAlpha(col, a){
  if (col[0] === '#') return col + Math.round(a * 255).toString(16).padStart(2, '0');
  if (col.startsWith('hsl(')) return col.replace('hsl(', 'hsla(').replace(')', ',' + a + ')');
  return col;
}
function pathRR(g, x, y, w, h, r){
  g.beginPath();
  if (g.roundRect) g.roundRect(x, y, w, h, r); else g.rect(x, y, w, h);
}
function glowSprite(color){
  const key = 'glow:' + color;
  if (spriteCache.has(key)) return spriteCache.get(key);
  const S = 64, c = makeCanvas(S, S), g = c.getContext('2d');
  const gr = g.createRadialGradient(S / 2, S / 2, 1, S / 2, S / 2, S / 2);
  gr.addColorStop(0, withAlpha(color, 0.85));
  gr.addColorStop(0.35, withAlpha(color, 0.3));
  gr.addColorStop(1, withAlpha(color, 0));
  g.fillStyle = gr;
  g.fillRect(0, 0, S, S);
  spriteCache.set(key, c);
  return c;
}
function brickSprite(color){
  const key = 'brick:' + color;
  if (spriteCache.has(key)) return spriteCache.get(key);
  const S = 72, c = makeCanvas(S, S), g = c.getContext('2d');
  g.shadowColor = color; g.shadowBlur = 9;                 // baked-in neon halo
  g.fillStyle = color;
  pathRR(g, 9, 9, 54, 54, 13); g.fill();
  g.shadowBlur = 0;
  const gr = g.createLinearGradient(0, 9, 0, 63);          // glassy sheen
  gr.addColorStop(0, 'rgba(255,255,255,0.42)');
  gr.addColorStop(0.35, 'rgba(255,255,255,0.06)');
  gr.addColorStop(1, 'rgba(0,0,0,0.30)');
  g.fillStyle = gr;
  pathRR(g, 9, 9, 54, 54, 13); g.fill();
  g.strokeStyle = 'rgba(255,255,255,0.35)'; g.lineWidth = 1.5;
  pathRR(g, 10, 10, 52, 52, 12); g.stroke();
  spriteCache.set(key, c);
  return c;
}
// A cute animal face baked into a 72px sprite (cached). Ears + eyes + rosy
// cheeks live in the upper half; the HP number is drawn over the tummy later.
function animalSprite(idx, bomb){
  const key = 'animal:' + idx + (bomb ? 'b' : '');
  if (spriteCache.has(key)) return spriteCache.get(key);
  const sp = SPECIES[idx % SPECIES.length] || SPECIES[0];
  const body = bomb ? '#ff6b5c' : sp.body;
  const ink = bomb ? '#5a1e18' : sp.ink;
  const S = 72, c = makeCanvas(S, S), g = c.getContext('2d');
  const disc = (x, y, r) => { g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill(); };
  const ex = 27, ex2 = 45, ey = 33;                         // eye anchors
  // ears (drawn under the body so they tuck in) --------------------------------
  g.fillStyle = body;
  const ear = bomb ? 'cat' : sp.ear;
  if (ear === 'cat'){                                        // triangle ears
    for (const dx of [-1, 1]){
      const bx = 36 + dx * 17;
      g.beginPath(); g.moveTo(bx - 9, 16); g.lineTo(bx + 9, 16); g.lineTo(bx + dx * 4, 2); g.closePath(); g.fill();
      g.fillStyle = sp.accent; g.globalAlpha = 0.85;
      g.beginPath(); g.moveTo(bx - 4, 14); g.lineTo(bx + 4, 14); g.lineTo(bx + dx * 2, 6); g.closePath(); g.fill();
      g.globalAlpha = 1; g.fillStyle = body;
    }
  } else if (ear === 'round'){ disc(20, 16, 9); disc(52, 16, 9); }
  else if (ear === 'biground'){ disc(17, 18, 12); disc(55, 18, 12); }
  else if (ear === 'long'){                                  // bunny ears
    for (const dx of [-1, 1]){
      const bx = 36 + dx * 12;
      g.beginPath(); g.ellipse(bx, 8, 6, 15, dx * 0.2, 0, Math.PI * 2); g.fill();
      g.fillStyle = sp.accent; g.globalAlpha = 0.8;
      g.beginPath(); g.ellipse(bx, 9, 2.6, 10, dx * 0.2, 0, Math.PI * 2); g.fill();
      g.globalAlpha = 1; g.fillStyle = body;
    }
  } else if (ear === 'toad'){ disc(24, 16, 8); disc(48, 16, 8); }   // frog eye bumps (whites drawn below)
  // body ----------------------------------------------------------------------
  g.shadowColor = bomb ? '#ff7b00' : body; g.shadowBlur = 9;
  g.fillStyle = body; pathRR(g, 9, 12, 54, 51, 20); g.fill();
  g.shadowBlur = 0;
  const gr = g.createLinearGradient(0, 12, 0, 63);
  gr.addColorStop(0, 'rgba(255,255,255,0.38)');
  gr.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  gr.addColorStop(1, 'rgba(0,0,0,0.22)');
  g.fillStyle = gr; pathRR(g, 9, 12, 54, 51, 20); g.fill();
  // panda eye patches / pig snout ---------------------------------------------
  if (sp.patch && !bomb){ g.fillStyle = sp.ink; g.globalAlpha = 0.9;
    g.beginPath(); g.ellipse(ex, ey, 7, 9, 0.5, 0, 7); g.fill();
    g.beginPath(); g.ellipse(ex2, ey, 7, 9, -0.5, 0, 7); g.fill(); g.globalAlpha = 1; }
  // cheeks ---------------------------------------------------------------------
  g.fillStyle = sp.accent; g.globalAlpha = 0.55;
  disc(22, 44, 5); disc(50, 44, 5); g.globalAlpha = 1;
  // eyes -----------------------------------------------------------------------
  if (ear === 'toad'){                                       // frog: eyes on the bumps
    g.fillStyle = '#fff'; disc(24, 16, 6); disc(48, 16, 6);
    g.fillStyle = ink; disc(25, 17, 3); disc(49, 17, 3);
    g.fillStyle = '#fff'; disc(26, 16, 1); disc(50, 16, 1);
  } else if (bomb){                                          // grumpy angry eyes + brows
    g.strokeStyle = ink; g.lineWidth = 2.4; g.lineCap = 'round';
    g.beginPath(); g.moveTo(ex - 6, ey - 6); g.lineTo(ex + 5, ey - 2); g.stroke();
    g.beginPath(); g.moveTo(ex2 + 6, ey - 6); g.lineTo(ex2 - 5, ey - 2); g.stroke();
    g.fillStyle = ink; disc(ex, ey + 2, 4); disc(ex2, ey + 2, 4);
    g.fillStyle = '#ffd166'; disc(52, 15, 2.4);              // spark
  } else {
    g.fillStyle = ink; disc(ex, ey, 4.6); disc(ex2, ey, 4.6);
    g.fillStyle = '#fff'; disc(ex - 1.4, ey - 1.6, 1.7); disc(ex2 - 1.4, ey - 1.6, 1.7);
  }
  // nose / mouth ---------------------------------------------------------------
  if (!bomb){
    g.fillStyle = sp.snout ? '#e888a4' : ink;
    if (sp.snout){ g.beginPath(); g.ellipse(36, 42, 6, 4, 0, 0, 7); g.fill();
      g.fillStyle = '#b9506a'; disc(34, 42, 1); disc(38, 42, 1); }
    else { g.beginPath(); g.moveTo(33, 40); g.lineTo(39, 40); g.lineTo(36, 43.5); g.closePath(); g.fill();
      g.strokeStyle = ink; g.lineWidth = 1.6; g.lineCap = 'round';
      g.beginPath(); g.arc(36, 44, 3.2, 0.15 * Math.PI, 0.85 * Math.PI); g.stroke(); }
  }
  spriteCache.set(key, c);
  return c;
}
const easeOutBack = t => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2; };

// parallax starfield, drifting down slowly — twinkle via per-star phase
const STARS = [];
for (let i = 0; i < 90; i++){
  STARS.push({ x: Math.random() * W, y: Math.random() * H, z: 0.25 + Math.random() * 0.75, tw: Math.random() * 6.28 });
}

function drawBg(){
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#0d0d28'); g.addColorStop(0.6, '#0a0a1c'); g.addColorStop(1, '#060610');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// nebula + stars in world space; hue drifts deeper with the wave count
function drawSpace(){
  const wave = (G && screen === 'game') ? G.wave : 0;
  const hue = (250 + wave * 4) % 360;
  ctx.globalCompositeOperation = 'lighter';
  let neb = ctx.createRadialGradient(W * 0.8, H * 0.22, 10, W * 0.8, H * 0.22, 330);
  neb.addColorStop(0, 'hsla(' + hue + ',70%,30%,0.16)');
  neb.addColorStop(1, 'hsla(' + hue + ',70%,30%,0)');
  ctx.fillStyle = neb; ctx.fillRect(0, 0, W, H);
  neb = ctx.createRadialGradient(W * 0.12, H * 0.72, 10, W * 0.12, H * 0.72, 300);
  neb.addColorStop(0, 'hsla(' + ((hue + 70) % 360) + ',75%,32%,0.13)');
  neb.addColorStop(1, 'hsla(' + ((hue + 70) % 360) + ',75%,32%,0)');
  ctx.fillStyle = neb; ctx.fillRect(0, 0, W, H);
  for (const s of STARS){
    const y = (s.y + animT * 9 * s.z) % H;
    const a = (0.2 + 0.5 * s.z) * (0.55 + 0.45 * Math.sin(animT * 2 + s.tw));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#cfe4ff';
    ctx.fillRect(s.x, y, 1.6 * s.z + 0.6, 1.6 * s.z + 0.6);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function draw(){
  UI = [];
  drawBg();
  let shx = 0, shy = 0;
  if (G && G.shake > 0.3){ shx = (rand() - 0.5) * G.shake; shy = (rand() - 0.5) * G.shake; }
  ctx.setTransform(scale, 0, 0, scale, offX + shx * scale, offY + shy * scale);
  drawSpace();
  if (screen === 'menu') drawMenu();
  else if (screen === 'shop') drawShop();
  else drawGame();
  if (toast){
    ctx.globalAlpha = Math.min(1, toast.t);
    ctx.fillStyle = '#22224a'; rr(W / 2 - 150, 130, 300, 44, 22); ctx.fill();
    ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#ffd166'; ctx.font = '700 17px system-ui,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(toast.str, W / 2, 152);
    ctx.globalAlpha = 1;
  }
}

function drawGame(){
  const skin = SKINS[meta.skin] || SKINS[0];
  const danger = G.bricks.some(b => b.row >= ROWS - 1);

  // neon side walls
  ctx.globalCompositeOperation = 'lighter';
  let wallG = ctx.createLinearGradient(0, GY, 0, LAUNCH_Y);
  wallG.addColorStop(0, withAlpha(skin.glow, 0));
  wallG.addColorStop(1, withAlpha(skin.glow, 0.5));
  ctx.fillStyle = wallG;
  ctx.fillRect(0, GY, 3, ROWS * CELL);
  ctx.fillRect(W - 3, GY, 3, ROWS * CELL);
  ctx.globalCompositeOperation = 'source-over';

  // danger heat rising from the line
  if (danger){
    const a = 0.22 + 0.16 * Math.sin(G.dangerPulse);
    const dg = ctx.createLinearGradient(0, LAUNCH_Y - 110, 0, LAUNCH_Y);
    dg.addColorStop(0, 'rgba(255,50,80,0)');
    dg.addColorStop(1, 'rgba(255,50,80,' + a + ')');
    ctx.fillStyle = dg;
    ctx.fillRect(0, LAUNCH_Y - 110, W, 110);
  }
  ctx.strokeStyle = danger
    ? 'rgba(255,60,80,' + (0.55 + 0.45 * Math.sin(G.dangerPulse)) + ')'
    : 'rgba(139,233,255,0.22)';
  ctx.lineWidth = danger ? 3 : 1.5;
  ctx.setLineDash([8, 8]);
  ctx.lineDashOffset = -animT * 30;
  ctx.beginPath(); ctx.moveTo(0, LAUNCH_Y); ctx.lineTo(W, LAUNCH_Y); ctx.stroke();
  ctx.setLineDash([]); ctx.lineDashOffset = 0;

  // bricks — cute cached animal sprites, spawn pop + descend tween
  for (const b of G.bricks){
    const bx = cx(b), by = cy(b) + (b.yo || 0);
    const sc = easeOutBack(Math.min(1, b.sc == null ? 1 : b.sc));
    const wob = Math.sin(animT * 3 + b.id) * 0.04;           // gentle idle wobble
    const spr = animalSprite(b.species || 0, b.bomb);
    const half = 36 * sc;
    ctx.save();
    ctx.translate(bx, by); ctx.rotate(wob);
    ctx.drawImage(spr, -half, -half, half * 2, half * 2);
    if (b.flash > 0){
      ctx.globalAlpha = b.flash * 0.85;
      ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(spr, -half, -half, half * 2, half * 2);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    if (b.row === ROWS - 1){
      ctx.strokeStyle = 'rgba(255,60,80,' + (0.5 + 0.5 * Math.sin(G.dangerPulse)) + ')';
      ctx.lineWidth = 3;
      rr(bx - 28, by - 26, 56, 54, 16); ctx.stroke();
    }
    // HP number rides on the tummy (lower half of the face)
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const ny = by + 13;
    ctx.font = '800 ' + (b.hp >= 1000 ? 14 : 17) + 'px system-ui,sans-serif';
    ctx.lineWidth = 3.5; ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.strokeText(fmt(b.hp), bx, ny);
    ctx.fillStyle = '#fff';
    ctx.fillText(fmt(b.hp), bx, ny);
  }

  // items — glowing pickups
  for (const it of G.items){
    const x = it.col * CELL + CELL / 2, y = GY + it.row * CELL + CELL / 2 + (it.yo || 0);
    const pulse = 1 + 0.1 * Math.sin(animT * 5 + it.col);
    if (it.type === 'orb'){
      // a little friend waiting to join the volley (+1 ball)
      ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(glowSprite('#8be9ff'), x - 22 * pulse, y - 22 * pulse, 44 * pulse, 44 * pulse);
      ctx.globalCompositeOperation = 'source-over';
      const r = 11 * pulse;
      ctx.fillStyle = '#bff0ff';
      ctx.beginPath(); ctx.arc(x - r * 0.55, y - r * 0.7, r * 0.42, 0, Math.PI * 2); ctx.fill();  // ears
      ctx.beginPath(); ctx.arc(x + r * 0.55, y - r * 0.7, r * 0.42, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#eaffff';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(40,80,110,0.9)';
      ctx.beginPath(); ctx.arc(x - r * 0.32, y - r * 0.08, r * 0.14, 0, Math.PI * 2); ctx.fill();  // eyes
      ctx.beginPath(); ctx.arc(x + r * 0.32, y - r * 0.08, r * 0.14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,150,190,0.7)';
      ctx.beginPath(); ctx.arc(x - r * 0.5, y + r * 0.22, r * 0.13, 0, Math.PI * 2); ctx.fill();    // cheeks
      ctx.beginPath(); ctx.arc(x + r * 0.5, y + r * 0.22, r * 0.13, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(glowSprite(it.type === 'star' ? '#ffd166' : '#8be9ff'), x - 20, y - 20, 40, 40);
      ctx.globalCompositeOperation = 'source-over';
      const icon = { gem: '💎', star: '⭐', laserH: '↔️', laserV: '↕️' }[it.type] || '?';
      ctx.font = (22 * pulse) + 'px system-ui,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(icon, x, y + 1);
    }
  }

  // additive pass: beams, particles, shockwaves, balls
  ctx.globalCompositeOperation = 'lighter';
  for (const bm of G.beams){
    const a = clamp(bm.t * 4, 0, 1);
    ctx.globalAlpha = a;
    if (bm.h){
      const y = GY + bm.row * CELL + CELL / 2;
      const bg = ctx.createLinearGradient(0, y - 14, 0, y + 14);
      bg.addColorStop(0, 'rgba(139,233,255,0)'); bg.addColorStop(0.5, 'rgba(139,233,255,0.9)'); bg.addColorStop(1, 'rgba(139,233,255,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, y - 14, W, 28);
      ctx.fillStyle = '#fff'; ctx.fillRect(0, y - 2, W, 4);
    } else {
      const x = bm.col * CELL + CELL / 2;
      const bg = ctx.createLinearGradient(x - 14, 0, x + 14, 0);
      bg.addColorStop(0, 'rgba(139,233,255,0)'); bg.addColorStop(0.5, 'rgba(139,233,255,0.9)'); bg.addColorStop(1, 'rgba(139,233,255,0)');
      ctx.fillStyle = bg; ctx.fillRect(x - 14, GY, 28, ROWS * CELL);
      ctx.fillStyle = '#fff'; ctx.fillRect(x - 2, GY, 4, ROWS * CELL);
    }
  }
  ctx.globalAlpha = 1;
  for (const p of G.parts){
    ctx.globalAlpha = 1 - p.t / p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  for (const r of G.rings){
    ctx.globalAlpha = (1 - r.t / r.life) * 0.9;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 3.5 * (1 - r.t / r.life) + 0.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const ball of G.balls){
    // tapered motion-blur trail
    const tr = ball.trail;
    for (let i = 2; i < tr.length; i += 2){
      const f = i / tr.length;
      ctx.globalAlpha = f * 0.5;
      ctx.strokeStyle = skin.glow;
      ctx.lineWidth = BALL_R * 1.6 * f;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(tr[i - 2], tr[i - 1]); ctx.lineTo(tr[i], tr[i + 1]); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.drawImage(glowSprite(skin.glow), ball.x - 20, ball.y - 20, 40, 40);
    ctx.fillStyle = skin.c;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ball.x - 2, ball.y - 2, BALL_R * 0.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  // tiny eyes so each pellet reads as a little critter
  ctx.fillStyle = 'rgba(35,25,20,0.92)';
  for (const ball of G.balls){
    ctx.beginPath(); ctx.arc(ball.x - 2.4, ball.y - 0.5, 1.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x + 2.4, ball.y - 0.5, 1.4, 0, Math.PI * 2); ctx.fill();
  }

  // shatter debris (normal blend so shards read as solid)
  for (const f of G.frags){
    ctx.globalAlpha = 1 - f.t / f.life;
    ctx.save();
    ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    ctx.fillStyle = f.color;
    ctx.fillRect(-f.s / 2, -f.s / 2, f.s, f.s);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // launcher + aim guide
  if (G.phase === 'aim' || G.phase === 'perk'){
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(glowSprite(skin.glow), G.launchX - 24, LAUNCH_Y - BALL_R - 24, 48, 48);
    ctx.globalCompositeOperation = 'source-over';
    const lx = G.launchX, ly = LAUNCH_Y - BALL_R;
    ctx.fillStyle = skin.c;
    ctx.beginPath(); ctx.arc(lx, ly, BALL_R + 1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(35,25,20,0.92)';
    ctx.beginPath(); ctx.arc(lx - 2.6, ly - 0.5, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx + 2.6, ly - 0.5, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '700 15px system-ui,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('×' + G.ballCount, lx, LAUNCH_Y + 20);
  }
  if (G.phase === 'aim' && G.aim){
    const dx = G.aim.x - G.launchX, dy = G.aim.y - (LAUNCH_Y - BALL_R);
    const len = Math.hypot(dx, dy);
    if (len > 8 && dy < -0.08 * len){
      let px = G.launchX, py = LAUNCH_Y - BALL_R, vx = dx / len, vy = dy / len;
      const total = 560, step = 22;
      const march = (animT * 130) % step;       // dots march toward the target
      ctx.globalCompositeOperation = 'lighter';
      for (let d = -march; d < total; d += step){
        if (d > 0){
          ctx.globalAlpha = 1 - d / total;
          ctx.drawImage(glowSprite(skin.glow), px - 9, py - 9, 18, 18);
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
        }
        px += vx * step; py += vy * step;
        if (px < BALL_R){ px = BALL_R; vx = Math.abs(vx); }
        if (px > W - BALL_R){ px = W - BALL_R; vx = -Math.abs(vx); }
        if (py < GY + BALL_R) break;
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }
  }
  if (G.phase === 'aim' && G.wave <= 1 && !G.aim){
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '600 17px system-ui,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('drag to aim ✦ release to fire', W / 2, GY + ROWS * CELL * 0.6);
  }

  // floating texts
  for (const t of G.texts){
    ctx.globalAlpha = 1 - t.t / t.life;
    ctx.font = '900 ' + t.size + 'px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.strokeText(t.str, t.x, t.y);
    ctx.fillStyle = t.color;
    ctx.fillText(t.str, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  // HUD on top of the action
  ctx.textBaseline = 'middle';
  ctx.font = '700 17px system-ui,sans-serif';
  ctx.textAlign = 'left'; ctx.fillStyle = '#9999cc';
  ctx.fillText('WAVE ' + G.wave, 16, 34);
  ctx.textAlign = 'right'; ctx.fillStyle = '#8be9ff';
  ctx.fillText('💎 ' + fmt(meta.gems), W - 16, 34);
  ctx.textAlign = 'center';
  const punch = 34 + 12 * G.scorePunch;
  ctx.font = '900 ' + punch + 'px system-ui,sans-serif';
  ctx.shadowColor = skin.glow; ctx.shadowBlur = 14 * G.scorePunch;
  ctx.fillStyle = '#fff';
  ctx.fillText(fmt(G.score), W / 2, 44);
  ctx.shadowBlur = 0;
  ctx.font = '600 12px system-ui,sans-serif'; ctx.fillStyle = '#666699';
  ctx.fillText('best ' + fmt(meta.best), W / 2, 74);

  // launcher-zone controls: abilities while aiming, combo + fast-forward in flight
  if (G.phase === 'aim') drawAbilityBar(skin);
  if (G.phase === 'fly'){
    if (G.combo >= 2){
      ctx.fillStyle = '#ffd166'; ctx.font = '900 22px system-ui,sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('×' + G.combo, 18, LAUNCH_Y + 44);
    }
    drawBtn('speed', W - 108, LAUNCH_Y + 22, 92, 46, '▶▶ ×' + G.timeScale, G.timeScale > 1 ? '#e0356e' : '#22224a', 17);
  }

  // combo / explosion vignette flash
  if (G.flash > 0){
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.72);
    vg.addColorStop(0, withAlpha(G.flashCol, 0));
    vg.addColorStop(1, withAlpha(G.flashCol, 0.4 * G.flash));
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  if (G.phase === 'perk') drawPerkOverlay();
  if (G.phase === 'over') drawOver();
}

// active-ability dock: energy meter + three tappable powers, drawn in the
// launcher zone during the aim phase
function drawAbilityBar(skin){
  const bx = 16, bw = W - 32, by = 684, bh = 9;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#8be9ff'; ctx.font = '700 11px system-ui,sans-serif';
  ctx.fillText('⚡ ENERGY  ' + Math.floor(G.energy) + ' / ' + ENERGY_MAX, W / 2, by - 9);
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; rr(bx, by, bw, bh, 4); ctx.fill();
  const frac = clamp(G.energy / ENERGY_MAX, 0, 1);
  if (frac > 0){
    ctx.save(); rr(bx, by, bw, bh, 4); ctx.clip();
    const eg = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    eg.addColorStop(0, '#2f9dff'); eg.addColorStop(1, '#8be9ff');
    ctx.fillStyle = eg; ctx.fillRect(bx, by, bw * frac, bh);
    ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.4 + 0.25 * Math.sin(animT * 4);
    ctx.fillStyle = '#eaffff'; ctx.fillRect(bx + bw * frac - 4, by, 4, bh);
    ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }
  const n = ABILITIES.length, gap = 9, w = (bw - (n - 1) * gap) / n, y = 700, h = 62;
  for (let i = 0; i < n; i++){
    const ab = ABILITIES[i], x = bx + i * (w + gap);
    const cost = abilityCost(ab), ready = G.energy >= cost;
    button('ability:' + ab.id, x, y, w, h);
    ctx.fillStyle = ready ? '#183456' : '#1c1c34';
    rr(x, y, w, h, 13); ctx.fill();
    ctx.strokeStyle = ready ? '#8be9ff' : 'rgba(255,255,255,0.10)'; ctx.lineWidth = ready ? 2 : 1.5; ctx.stroke();
    if (ready){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.2 + 0.14 * Math.sin(animT * 4 + i);
      ctx.drawImage(glowSprite('#8be9ff'), x + w / 2 - 32, y + h / 2 - 32, 64, 64);
      ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
    }
    ctx.globalAlpha = ready ? 1 : 0.45;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '21px system-ui,sans-serif';
    ctx.fillText(ab.icon, x + w / 2, y + 18);
    ctx.font = '700 12px system-ui,sans-serif'; ctx.fillStyle = ready ? '#fff' : '#8888aa';
    ctx.fillText(ab.name, x + w / 2, y + 38);
    ctx.font = '700 11px system-ui,sans-serif'; ctx.fillStyle = ready ? '#ffd166' : '#8888aa';
    ctx.fillText('⚡' + cost, x + w / 2, y + 52);
    ctx.globalAlpha = 1;
  }
}

function drawPerkOverlay(){
  ctx.fillStyle = 'rgba(8,8,20,0.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd166'; ctx.font = '900 30px system-ui,sans-serif';
  ctx.fillText('WAVE ' + G.wave + ' — PICK ONE', W / 2, 160);
  const offer = G.perkOffer || [];
  for (let i = 0; i < offer.length; i++){
    const p = offer[i], y = 220 + i * 130;
    button('perk' + i, 40, y, W - 80, 110);
    ctx.fillStyle = '#1c1c40'; rr(40, y, W - 80, 110, 18); ctx.fill();
    ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2; ctx.stroke();
    ctx.font = '34px system-ui,sans-serif';
    ctx.fillText(p.icon, 88, y + 55);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff'; ctx.font = '800 21px system-ui,sans-serif';
    ctx.fillText(p.name, 140, y + 40);
    ctx.fillStyle = '#9999cc'; ctx.font = '500 15px system-ui,sans-serif';
    ctx.fillText(p.desc, 140, y + 70);
    ctx.textAlign = 'center';
  }
}

function drawOver(){
  ctx.fillStyle = 'rgba(8,8,20,0.88)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff5570'; ctx.font = '900 44px system-ui,sans-serif';
  ctx.fillText('GAME OVER', W / 2, 150);
  if (G.newBest){
    ctx.fillStyle = '#ffd166'; ctx.font = '900 26px system-ui,sans-serif';
    ctx.fillText('★ NEW BEST! ★', W / 2, 198);
  }
  ctx.fillStyle = '#fff'; ctx.font = '900 52px system-ui,sans-serif';
  ctx.fillText(fmt(G.score), W / 2, 268);
  ctx.font = '600 18px system-ui,sans-serif'; ctx.fillStyle = '#9999cc';
  ctx.fillText('wave ' + G.wave + '  ·  best combo ×' + G.bestCombo, W / 2, 312);
  ctx.fillStyle = '#8be9ff';
  ctx.fillText('+' + fmt(G.runGems) + ' 💎 this run', W / 2, 344);
  let y = 400;
  if (!G.revived){
    const can = meta.gems >= REVIVE_COST;
    drawBtn('revive', W / 2 - 130, y, 260, 62,
      '💖 REVIVE — 💎 ' + REVIVE_COST, can ? '#2a6f4e' : '#333350', 20);
    y += 82;
  }
  drawBtn('retry', W / 2 - 130, y, 260, 66, '↻  ONE MORE RUN', '#e0356e', 22);
  drawBtn('menu', W / 2 - 90, y + 86, 180, 50, 'MENU', '#22224a', 17);
  // local top runs
  const top = meta.topRuns || [];
  if (top.length){
    ctx.fillStyle = '#666699'; ctx.font = '600 13px system-ui,sans-serif';
    let ty = y + 168;
    ctx.fillText('— your top runs —', W / 2, ty);
    for (let i = 0; i < top.length && i < 3; i++){
      ty += 22;
      ctx.fillStyle = i === 0 ? '#ffd166' : '#9999cc';
      ctx.fillText((i + 1) + '.  ' + fmt(top[i].score) + '  (wave ' + top[i].wave + ')', W / 2, ty);
    }
  }
}

// ---- main loop --------------------------------------------------------------
let lastT = 0;
function loop(t){
  requestAnimationFrame(loop);
  const dt = clamp((t - lastT) / 1000 || 0.016, 0, 0.05);
  lastT = t;
  update(dt);
  draw();
}

fit();
loadMeta();
toMenu();
requestAnimationFrame(loop);
</script>
</body>
</html>
